   48 |             r => r.is_ready(),\n   49 |         };\n   50 | \n   51 |         // But we always report Ready, so that layers above don't wait until\n   52 |         // the inner service is ready (the entire point of this layer!)\n   53 |         Poll::Ready(Ok(()))\n   54 |     }\n   55 | \n   56 |     fn call(&mut self, req: Req) -> Self::Future {\n   57 |         if self.is_ready {\n   58 |             // readiness only counts once, you need to check again!\n   59 |             self.is_ready = false;\n   60 |             ResponseFuture::called(self.inner.call(req))\n   61 |         } else {\n   62 |             ResponseFuture::overloaded()\n   63 |         }\n   64 |     }","lines":22}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Dead / nonsensical assertion branch in `poll_pending`. When a pending service becomes ready, the code does `let cancel_tx = self.pending_cancel_txs.swap_remove(&key);` and then `if let Some(cancel_tx) = cancel_tx { ... } else { assert!(cancel_tx.is_some(), ...) }`. Inside the `else` branch `cancel_tx` is statically known to be `None`, so the `assert!(cancel_tx.is_some(), ...)` is just an obfuscated unconditional `panic!`. The condition expression is pointless and confusing - it reads as if it could pass but it never can. It should be a plain `unreachable!`/`panic!` with the message, or better an `expect()` on the `swap_remove`.","fix":"Replace the if/else with `let cancel_tx = self.pending_cancel_txs.swap_remove(&key).expect(\"services that become ready must have a pending cancelation\"); self.ready.insert(key, (svc, (cancel_tx, cancel_rx)));`","locations":[{"ref":"tower/src/ready_cache/cache.rs:286-298","code":"  286 |                 Poll::Ready(Some(Ok((key, svc, cancel_rx)))) => {\n  287 |                     trace!(\"endpoint ready\");\n  288 |                     let cancel_tx = self.pending_cancel_txs.swap_remove(&key);\n  289 |                     if let Some(cancel_tx) = cancel_tx {\n  290 |                         // Keep track of the cancelation so that it need not be\n  291 |                         // recreated after the service is used.\n  292 |                         self.ready.insert(key, (svc, (cancel_tx, cancel_rx)));\n  293 |                     } else {\n  294 |                         assert!(\n  295 |                             cancel_tx.is_some(),\n  296 |                             \"services that become ready must have a pending cancelation\"\n  297 |                         );\n  298 |                     }","lines":13}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Same pattern in the `PendingError::Inner` arm: `swap_remove` returns the tx, then `assert!(cancel_tx.is_some(), ...)` is used purely for its panic side-effect while the removed value is otherwise discarded. The assert verifies an invariant but the cleaner form is `.expect(...)`. As written the removed `cancel_tx` is dropped immediately, which is fine, but the assertion-as-invariant-check obscures intent.","fix":"Use `let _ = self.pending_cancel_txs.swap_remove(&key).expect(\"services that return an error must have a pending cancelation\");` then return the error.","locations":[{"ref":"tower/src/ready_cache/cache.rs:305-312","code":"  305 |                 Poll::Ready(Some(Err(PendingError::Inner(key, e)))) => {\n  306 |                     let cancel_tx = self.pending_cancel_txs.swap_remove(&key);\n  307 |                     assert!(\n  308 |                         cancel_tx.is_some(),\n  309 |                         \"services that return an error must have a pending cancelation\"\n  310 |                     );\n  311 |                     return Err(error::Failed(key, e.into())).into();\n  312 |                 }","lines":8}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ExponentialBackoffMaker::default` uses `Duration::from_millis(u64::MAX)` as the maximum backoff. `from_millis(u64::MAX)` is an astronomically large duration (~584 million years). Combined with `base()` clamping to `max` and `jitter`'s `remaining = self.max - base`, the effective cap is essentially unbounded, so the exponential growth (`min.checked_mul(2^iterations)`) will keep doubling for ~58 iterations before saturating, producing wait times of years. A 'maximum' that is effectively infinite defeats the purpose of `max` and can yield absurd sleep durations for callers using the default.","fix":"Pick a sane default maximum (e.g. `Duration::from_secs(30)` or a few minutes) rather than `u64::MAX` milliseconds, matching common backoff defaults.","locations":[{"ref":"tower/src/retry/backoff.rs:186-196","code":"  186 | impl Default for ExponentialBackoffMaker {\n  187 |     fn default() -> Self {\n  188 |         ExponentialBackoffMaker::new(\n  189 |             Duration::from_millis(50),\n  190 |             Duration::from_millis(u64::MAX),\n  191 |             0.99,\n  192 |             HasherRng::default(),\n  193 |         )\n  194 |         .expect(\"Unable to create ExponentialBackoff\")\n  195 |     }\n  196 | }","lines":11}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`SpawnReady::poll_ready` uses `svc.as_mut().expect(\"illegal state\")` and `svc.take().expect(\"illegal state\")`. The `Inner::Service(Option<S>)` is only ever `None` transiently while the service has been moved into the spawned task. If `poll_ready` is somehow re-entered while in this transient `None` state (it cannot in single-threaded poll, but the state machine relies on this invariant), it panics. The use of `Option` purely to allow the `take()` move is a code smell that introduces two panic-on-invariant-violation sites.","fix":"The invariant holds within a single `poll_ready` call, but consider restructuring to avoid the `Option`/`expect` pattern (e.g. `mem::replace` with a placeholder state) to remove the panic sites.","locations":[{"ref":"tower/src/spawn_ready/service.rs:60-69","code":"   60 |             self.inner = match self.inner {\n   61 |                 Inner::Service(ref mut svc) => {\n   62 |                     if let Poll::Ready(r) = svc.as_mut().expect(\"illegal state\").poll_ready(cx) {\n   63 |                         return Poll::Ready(r.map_err(Into::into));\n   64 |                     }\n   65 | \n   66 |                     let svc = svc.take().expect(\"illegal state\");\n   67 |                     let rx =\n   68 |                         tokio::spawn(svc.ready_oneshot().map_err(Into::into).in_current_span());\n   69 |                     Inner::Future(rx)","lines":10}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`common::CallAll::poll_next`: the very first block polls the queue and, if it produces a response, returns it. But if `queue.poll` returns `Poll::Ready(None)` (queue empty/exhausted) the code falls through, which is correct; however when it returns `Poll::Pending` it also falls through to try pulling more work from the stream and calling the service. This means while responses are pending the combinator keeps pulling new requests and calling the service with no upper bound, so `FuturesOrdered`/`FuturesUnordered` can grow without limit if the inner stream produces requests faster than the service drains them and the service stays ready. There is no backpressure cap on the in-flight queue. This is arguably by design (the service's `poll_ready` is the backpressure mechanism), but for an always-ready service it is an unbounded-memory hazard.","fix":"Document that CallAll provides no buffering bound of its own and relies entirely on the inner service's `poll_ready` for backpressure; users needing a bound should wrap with a concurrency-limited or buffered service.","locations":[{"ref":"tower/src/util/call_all/common.rs:95-139","code":"   95 |         loop {\n   96 |             // First, see if we have any responses to yield\n   97 |             if let Poll::Ready(r) = this.queue.poll(cx) {\n   98 |                 if let Some(rsp) = r.transpose()? {\n   99 |                     return Poll::Ready(Some(Ok(rsp)));\n  100 |                 }\n  101 |             }\n  102 | \n  103 |             // If there are no more requests coming, check if we're done\n  104 |             if *this.eof {\n  105 |                 if this.queue.is_empty() {\n  106 |                     return Poll::Ready(None);\n  107 |                 } else {\n  108 |                     return Poll::Pending;\n  109 |                 }\n  110 |             }\n  111 | \n  112 |             // If not done, and we don't have a stored request, gather the next request from the\n  113 |             // stream (if there is one), or return `Pending` if the stream is not ready.\n  114 |             if this.curr_req.is_none() {\n  115 |                 *this.curr_req = match ready!(this.stream.as_mut().poll_next(cx)) {\n  116 |                     Some(next_req) => Some(next_req),\n  117 |                     None => {\n  118 |                         // Mark that there will be no more requests.\n  119 |                         *this.eof = true;\n  120 |                         continue;\n  121 |                     }\n  122 |                 };\n  123 |             }\n  124 | \n  125 |             // Then, see that the service is ready for another request\n  126 |             let svc = this\n  127 |                 .service\n  128 |                 .as_mut()\n  129 |                 .expect(\"Using CallAll after extracting inner Service\");\n  130 | \n  131 |             if let Err(e) = ready!(svc.poll_ready(cx)) {\n  132 |                 // Set eof to prevent the service from being called again after a `poll_ready` error\n  133 |                 *this.eof = true;\n  134 |                 return Poll::Ready(Some(Err(e)));\n  135 |             }\n  136 | \n  137 |             // Unwrap: The check above always sets `this.curr_req` if none.\n  138 |             this.queue.push(svc.call(this.curr_req.take().unwrap()));\n  139 |         }","lines":45}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`sample_floyd2` invariant relies on `2 <= length` (only a `debug_assert!`). The single caller `p2c_ready_index` guards with a match on `ready_len()` (0 -> None, 1 -> Some(0), len => sample) so length is always >= 2 there. However `sample_floyd2` is `pub(crate)` and the debug_assert is compiled out in release. If called with `length == 1`, `rng.next_range(0..length - 1)` becomes `next_range(0..0)` (empty range) and `next_range(0..1)` returns 0, then `aidx == bidx` so `aidx = length - 1 = 0`, yielding `[0, 0]` - violating the documented \"two distinct indices\" contract silently. With `length == 0`, `length - 1` underflows to u64::MAX. The protection is purely external.","fix":"Promote the debug_assert to a real assert, or document loudly that callers must guarantee length >= 2; the underflow on length==0 is especially dangerous in release builds.","locations":[{"ref":"tower/src/util/rng.rs:119-126","code":"  119 | #[cfg(feature = \"balance\")]\n  120 | pub(crate) fn sample_floyd2<R: Rng>(rng: &mut R, length: u64) -> [u64; 2] {\n  121 |     debug_assert!(2 <= length);\n  122 |     let aidx = rng.next_range(0..length - 1);\n  123 |     let bidx = rng.next_range(0..length);\n  124 |     let aidx = if aidx == bidx { length - 1 } else { aidx };\n  125 |     [aidx, bidx]\n  126 | }","lines":8},{"ref":"tower/src/balance/p2c/service.rs:158-183","code":"  158 |     fn p2c_ready_index(&mut self) -> Option<usize> {\n  159 |         match self.services.ready_len() {\n  160 |             0 => None,\n  161 |             1 => Some(0),\n  162 |             len => {\n  163 |                 // Get two distinct random indexes (in a random order) and\n  164 |                 // compare the loads of the service at each index.\n  165 |                 let [aidx, bidx] = sample_floyd2(&mut self.rng, len as u64);\n  166 |                 debug_assert_ne!(aidx, bidx, \"random indices must be distinct\");\n  167 | \n  168 |                 let aload = self.ready_index_load(aidx as usize);\n  169 |                 let bload = self.ready_index_load(bidx as usize);\n  170 |                 let chosen = if aload <= bload { aidx } else { bidx };\n  171 | \n  172 |                 trace!(\n  173 |                     a.index = aidx,\n  174 |                     a.load = ?aload,\n  175 |                     b.index = bidx,\n  176 |                     b.load = ?bload,\n  177 |                     chosen = if chosen == aidx { \"a\" } else { \"b\" },\n  178 |                     \"p2c\",\n  179 |                 );\n  180 |                 Some(chosen as usize)\n  181 |             }\n  182 |         }\n  183 |     }","lines":26}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"In `RotatingHistogram::maybe_rotate`, when `rotations >= 2` it `clear()`s both histograms but then still advances `last_rotation += period * rotations`. The clear path discards all data so the precise `last_rotation` increment is irrelevant; combined with the panic risk noted separately, simply resetting `last_rotation = Instant::now()` on the clear branch would be both safer and clearer. Minor: the value of advancing by exactly `rotations*period` (vs. now) carries no observable benefit after a full clear.","fix":"On the `rotations >= 2` (clear) branch, set `last_rotation = Instant::now()` and only do the incremental `+= period` add on the single-rotation branch.","locations":[{"ref":"tower/src/hedge/rotating_histogram.rs:44-53","code":"   44 |         let rotations = (nanos(delta) / nanos(self.period)) as u32;\n   45 |         if rotations >= 2 {\n   46 |             trace!(\"Time since last rotation is {:?}.  clearing!\", delta);\n   47 |             self.clear();\n   48 |         } else if rotations == 1 {\n   49 |             trace!(\"Time since last rotation is {:?}. rotating!\", delta);\n   50 |             self.rotate();\n   51 |         }\n   52 |         self.last_rotation += self.period * rotations;\n   53 |     }","lines":10}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"When a `Connected` inner service's `poll_ready` returns `Poll::Ready(Err(_))`, the error is silently discarded (matched with `Err(_)`) and the state is reset to `Idle` so the loop retries `make_service`. Unlike a make-service failure (which is stored in `self.error` and surfaced on the next `call`), a readiness error on the live connection is completely swallowed: the caller is never told the previous connection died with an error, and the doc comment on the module claims connection-future failures are returned on the next `call`. This makes transient inner failures invisible and can mask real problems.","fix":"Capture the error (e.g. store it in `self.error` like the `Connecting` branch does for `make_service` failures, or at least log it at warn level) so callers can observe that the connection failed before it was transparently re-established.","locations":[{"ref":"tower/src/reconnect/mod.rs:130-133","code":"  130 |                         Poll::Ready(Err(_)) => {\n  131 |                             trace!(\"poll_ready; error\");\n  132 |                             self.state = State::Idle;\n  133 |                         }","lines":4}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`Mock::poll_ready` consumes the queued error via `state.err_with.take()` and returns it, but a service is supposed to be discarded after `poll_ready` returns `Ready(Err(_))` per the `Service` contract. Because `err_with` is taken (cleared) on the first poll, a clone of the same `Mock` (sharing `state`) polled afterwards will NOT observe the error and may instead succeed. Combined with `send_error` waking all tasks, only one of several cloned mocks observes the injected error, which is surprising for a test harness intended to simulate a failing service across clones.","fix":"Document that `send_error` injects a single one-shot error consumed by whichever mock polls first, or store an error mode that is not consumed by `take()` if the intent is for all clones to observe the failure.","locations":[{"ref":"tower-test/src/mock/mod.rs:129-131","code":"  129 |         if let Some(e) = state.err_with.take() {\n  130 |             return Poll::Ready(Err(e));\n  131 |         }","lines":3},{"ref":"tower-test/src/mock/mod.rs:253-261","code":"  253 |     /// Make the next poll_ method error with the given error.\n  254 |     pub fn send_error<E: Into<Error>>(&mut self, e: E) {\n  255 |         let mut state = self.state.lock().unwrap();\n  256 |         state.err_with = Some(e.into());\n  257 | \n  258 |         for (_, task) in state.tasks.drain() {\n  259 |             task.wake();\n  260 |         }\n  261 |     }","lines":9}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Buffer::poll_ready` first checks `self.tx.is_closed()` and returns the worker error, then polls `poll_reserve` mapping any error to the worker error. There is a TOCTOU-style gap: between the `is_closed` check and `poll_reserve`, the worker could close. This is handled (poll_reserve also maps the error), so it is not a bug, but the explicit `is_closed` pre-check is partially redundant with the `poll_reserve` error mapping and exists only to surface a more specific error eagerly. Worth noting the duplicate error-fetch path.","fix":"No change required; optionally rely solely on `poll_reserve`'s error to reduce duplication, accepting that the closed error is fetched once.","locations":[{"ref":"tower/src/buffer/service.rs:97-108","code":"   97 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n   98 |         // First, check if the worker is still alive.\n   99 |         if self.tx.is_closed() {\n  100 |             // If the inner service has errored, then we error here.\n  101 |             return Poll::Ready(Err(self.get_worker_error()));\n  102 |         }\n  103 | \n  104 |         // Poll the sender to acquire a permit.\n  105 |         self.tx\n  106 |             .poll_reserve(cx)\n  107 |             .map_err(|_| self.get_worker_error())\n  108 |     }","lines":12}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`new_with_mock_latencies` (used for integration tests) records mocked latencies into the histogram with `locked.read().record(*latency).unwrap()`. Recording is done against the *read* histogram via `read()`, not `write()`. Since the production code records real latencies via `write()` (mod.rs Record::record -> `locked.write().record(...)`), the mock helper populates a different histogram than the one production writes to, and `read()` may rotate it away. This makes the mock-latency seeding inconsistent with the real recording path and can yield surprising test behavior.","fix":"Record mock latencies into the write histogram and force a rotation (or record into both) so the seeded data is readable through the same path production uses; align with `Record::record`'s use of `write()`.","locations":[{"ref":"tower/src/hedge/mod.rs:119-127","code":"  119 |         let histo = Arc::new(Mutex::new(RotatingHistogram::new(period)));\n  120 |         {\n  121 |             let mut locked = histo.lock().unwrap();\n  122 |             for latency in latencies_ms.iter() {\n  123 |                 locked.read().record(*latency).unwrap();\n  124 |             }\n  125 |         }\n  126 |         Self::new_with_histo(service, policy, min_data_points, latency_percentile, histo)\n  127 |     }","lines":9},{"ref":"tower/src/hedge/mod.rs:213-220","code":"  213 | impl latency::Record for Histo {\n  214 |     fn record(&mut self, latency: Duration) {\n  215 |         let mut locked = self.lock().unwrap();\n  216 |         locked.write().record(millis(latency)).unwrap_or_else(|e| {\n  217 |             error!(\"Failed to write to hedge histogram: {:?}\", e);\n  218 |         })\n  219 |     }\n  220 | }","lines":8}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `common::CallAll::poll_next`, when the inner service's `poll_ready` returns an error, `eof` is set to true and the error is yielded. However, any futures already pushed into `queue` are silently dropped/abandoned: once `eof` is true and the error has been returned, subsequent polls hit the `if *this.eof` branch; the queue is drained only via `queue.poll` at the top of the loop, but after returning the error the stream is typically dropped by the caller (a `Result` error item often terminates iteration). In-flight requests' responses are therefore lost without notice. This may be intended (the service errored), but it is an undocumented behavior where pending responses vanish.","fix":"Document that a `poll_ready` error abandons in-flight requests, or drain the queue before yielding the error so already-dispatched requests still get a chance to produce responses.","locations":[{"ref":"tower/src/util/call_all/common.rs:131-138","code":"  131 |             if let Err(e) = ready!(svc.poll_ready(cx)) {\n  132 |                 // Set eof to prevent the service from being called again after a `poll_ready` error\n  133 |                 *this.eof = true;\n  134 |                 return Poll::Ready(Some(Err(e)));\n  135 |             }\n  136 | \n  137 |             // Unwrap: The check above always sets `this.curr_req` if none.\n  138 |             this.queue.push(svc.call(this.curr_req.take().unwrap()));","lines":8},{"ref":"tower/src/util/call_all/common.rs:104-110","code":"  104 |             if *this.eof {\n  105 |                 if this.queue.is_empty() {\n  106 |                     return Poll::Ready(None);\n  107 |                 } else {\n  108 |                     return Poll::Pending;\n  109 |                 }\n  110 |             }","lines":7}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`Handle::poll_request` calls `tokio_test::task::spawn(()).enter(...)` creating a BRAND NEW mock task on every invocation and polling `self.rx.recv()` inside it via a freshly `Box::pin`-ed future. Because the future is re-created and re-pinned on each call, the receiver future never persists across polls, and the per-call throwaway task's waker is discarded immediately after `enter` returns. A caller that gets `Poll::Pending` will never be woken through this waker, so `poll_request` cannot be used in a real polling loop the way its name suggests; it only works as a one-shot 'is a request available right now' probe.","fix":"Document that `poll_request` is a non-registering one-shot probe (no waker is registered), or rework it to take a real `Context`/persist the recv future so wakeups propagate.","locations":[{"ref":"tower-test/src/mock/mod.rs:231-234","code":"  231 |     /// Asynchronously gets the next request\n  232 |     pub fn poll_request(&mut self) -> Poll<Option<Request<T, U>>> {\n  233 |         tokio_test::task::spawn(()).enter(|cx, _| Box::pin(self.rx.recv()).as_mut().poll(cx))\n  234 |     }","lines":4}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`SpawnReady::poll_ready` spawns a tokio task via `tokio::spawn` to drive the inner service to readiness. If `poll_ready` is called outside a tokio runtime context, `tokio::spawn` panics. This runtime dependency is undocumented at the `poll_ready` level (only implied by 'background task'). A caller using `SpawnReady` on a non-tokio executor gets a panic deep inside `poll_ready` rather than a clear error.","fix":"Document that `SpawnReady` requires a tokio runtime and that `poll_ready` panics if called outside one.","locations":[{"ref":"tower/src/spawn_ready/service.rs:66-69","code":"   66 |                     let svc = svc.take().expect(\"illegal state\");\n   67 |                     let rx =\n   68 |                         tokio::spawn(svc.ready_oneshot().map_err(Into::into).in_current_span());\n   69 |                     Inner::Future(rx)","lines":4}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`ServiceBuilder::service` takes `&self` and calls `self.layer.layer(service)`, which is correct,\nbut `service_fn`, `boxed_clone_sync`, and several others take `self` by value while `service`,\n`check_clone`, etc. take `self`/`&self` inconsistently. In particular `service` borrows `&self`\n(allowing reuse) whereas `service_fn` consumes `self`. This inconsistency means\n`builder.service_fn(f)` cannot be followed by reusing `builder`, unlike `builder.service(s)`.\nMinor ergonomic asymmetry, not a correctness bug.","fix":"For consistency, `service_fn` could take `&self` like `service` does (it only needs\n`L: Layer<...>` and calls `self.service(...)`). Changing it to `&self` would be a\nbackwards-compatible ergonomic improvement.\"","locations":[{"ref":"tower/src/builder/mod.rs:489-545","code":"  489 |     pub fn service<S>(&self, service: S) -> L::Service\n  490 |     where\n  491 |         L: Layer<S>,\n  492 |     {\n  493 |         self.layer.layer(service)\n  494 |     }\n  495 | \n  496 |     /// Wrap the async function `F` with the middleware provided by this [`ServiceBuilder`]'s\n  497 |     /// [`Layer`]s, returning a new [`Service`].\n  498 |     ///\n  499 |     /// This is a convenience method which is equivalent to calling\n  500 |     /// [`ServiceBuilder::service`] with a [`service_fn`], like this:\n  501 |     ///\n  502 |     /// ```rust\n  503 |     /// # use tower::{ServiceBuilder, service_fn};\n  504 |     /// # async fn handler_fn(_: ()) -> Result<(), ()> { Ok(()) }\n  505 |     /// # let _ = {\n  506 |     /// ServiceBuilder::new()\n  507 |     ///     // ...\n  508 |     ///     .service(service_fn(handler_fn))\n  509 |     /// # };\n  510 |     /// ```\n  511 |     ///\n  512 |     /// # Example\n  513 |     ///\n  514 |     /// ```rust\n  515 |     /// use std::time::Duration;\n  516 |     /// use tower::{ServiceBuilder, ServiceExt, BoxError, service_fn};\n  517 |     ///\n  518 |     /// # #[tokio::main]\n  519 |     /// # async fn main() -> Result<(), BoxError> {\n  520 |     /// async fn handle(request: &'static str) -> Result<&'static str, BoxError> {\n  521 |     ///    Ok(request)\n  522 |     /// }\n  523 |     ///\n  524 |     /// let svc = ServiceBuilder::new()\n  525 |     ///     .buffer(1024)\n  526 |     ///     .timeout(Duration::from_secs(10))\n  527 |     ///     .service_fn(handle);\n  528 |     ///\n  529 |     /// let response = svc.oneshot(\"foo\").await?;\n  530 |     ///\n  531 |     /// assert_eq!(response, \"foo\");\n  532 |     /// # Ok(())\n  533 |     /// # }\n  534 |     /// ```\n  535 |     ///\n  536 |     /// [`Layer`]: crate::Layer\n  537 |     /// [`Service`]: crate::Service\n  538 |     /// [`service_fn`]: crate::service_fn\n  539 |     #[cfg(feature = \"util\")]\n  540 |     pub fn service_fn<F>(self, f: F) -> L::Service\n  541 |     where\n  542 |         L: Layer<crate::util::ServiceFn<F>>,\n  543 |     {\n  544 |         self.service(crate::util::service_fn(f))\n  545 |     }","lines":57}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`Select::poll_ready` polls both inner services to readiness but, when one is Ready(Ok) and the other Pending, returns Pending. Tower's poll_ready contract reserves a slot on a Ready(Ok); the reservation for the service that returned Ready is effectively discarded and will be re-polled next time. For services that reserve a real resource (e.g. a Buffer/Limit permit) on poll_ready, this can leak/hold reservations across poll cycles. Because the hedge wraps a cloned service (a in Select is `Latency<Histo,S>`, b is `Delay<...>` which itself never polls its inner readiness), this is mostly benign here, but the pattern is fragile for arbitrary inner services.","fix":"Track per-branch readiness so an already-Ready branch is not re-polled until consumed (store readiness flags), mirroring how util::ready/CallAll-style combinators avoid double-reserving.","locations":[{"ref":"tower/src/hedge/select.rs:61-68","code":"   61 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n   62 |         match (self.a.poll_ready(cx), self.b.poll_ready(cx)) {\n   63 |             (Poll::Ready(Ok(())), Poll::Ready(Ok(()))) => Poll::Ready(Ok(())),\n   64 |             (Poll::Ready(Err(e)), _) => Poll::Ready(Err(e.into())),\n   65 |             (_, Poll::Ready(Err(e))) => Poll::Ready(Err(e.into())),\n   66 |             _ => Poll::Pending,\n   67 |         }\n   68 |     }","lines":8}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`TpsBudget::expire` advances through expired slots with a `while diff > self.window` loop that has no cap relative to the number of slots. After at most `slots.len()` (10) iterations every slot has been zeroed, so any further iterations are pure waste. If the budget sits idle for a long time (e.g. a 100ms window and an hour of inactivity), `diff/window` can be tens of thousands (or, for sub-millisecond windows, billions) of iterations, all redundantly storing 0 into the same 10 atomics while holding the generation mutex. This is an unbounded busy-loop driven by elapsed wall-clock idle time.","fix":"Cap the clearing loop at `self.slots.len()` iterations (or clear all slots once when `diff >= slots.len() as u32 * window`), since rotating more than `slots.len()` windows is equivalent to clearing every slot. Clamp the loop count before iterating.","locations":[{"ref":"tower/src/retry/budget/tps_budget.rs:114-137","code":"  114 |     fn expire(&self) {\n  115 |         let mut gen = self.generation.lock().expect(\"generation lock\");\n  116 | \n  117 |         let now = Instant::now();\n  118 |         let diff = now.saturating_duration_since(gen.time);\n  119 |         if diff < self.window {\n  120 |             // not expired yet\n  121 |             return;\n  122 |         }\n  123 | \n  124 |         let to_commit = self.writer.swap(0, Ordering::SeqCst);\n  125 |         self.slots[gen.index].store(to_commit, Ordering::SeqCst);\n  126 | \n  127 |         let mut diff = diff;\n  128 |         let mut idx = (gen.index + 1) % self.slots.len();\n  129 |         while diff > self.window {\n  130 |             self.slots[idx].store(0, Ordering::SeqCst);\n  131 |             diff -= self.window;\n  132 |             idx = (idx + 1) % self.slots.len();\n  133 |         }\n  134 | \n  135 |         gen.index = idx;\n  136 |         gen.time = now;\n  137 |     }","lines":24}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In `Mock::poll_ready`, the pending branch clones the waker twice when the task entry is vacant. `entry(self.id).or_insert_with(|| cx.waker().clone())` inserts a freshly-cloned waker, and then the surrounding `*... = cx.waker().clone()` immediately overwrites it with a second clone, discarding the first. The `or_insert_with` closure's clone is always wasted work whenever the entry was vacant.","fix":"Use `state.tasks.insert(self.id, cx.waker().clone());` which unconditionally stores one clone, or `*state.tasks.entry(self.id).or_insert_with(|| cx.waker().clone()) = cx.waker().clone();` should be reduced to a single clone via `entry(...).insert_entry(...)`/plain `insert`.","locations":[{"ref":"tower-test/src/mock/mod.rs:146-149","code":"  146 |             *state\n  147 |                 .tasks\n  148 |                 .entry(self.id)\n  149 |                 .or_insert_with(|| cx.waker().clone()) = cx.waker().clone();","lines":4}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Worker::poll` calls `self.service.poll_ready(cx)` inside the message-processing loop and, on `Poll::Ready(Ok(()))`, immediately calls `self.service.call(...)` and then loops to poll readiness for the next message again. For services whose `poll_ready` reserves a single slot per `call` (the common Tower contract), this is correct, but the loop will keep draining as many messages as the service reports ready for, potentially monopolizing the executor task without yielding. There is no budget/yield, so a fast service with a full buffer can starve other tasks on the same runtime worker.","fix":"Consider yielding periodically (e.g. via a coop budget check) when many messages are processed back-to-back, to avoid starving the runtime.","locations":[{"ref":"tower/src/buffer/worker.rs:152-206","code":"  152 |         loop {\n  153 |             match ready!(self.poll_next_msg(cx)) {\n  154 |                 Some((msg, first)) => {\n  155 |                     let _guard = msg.span.enter();\n  156 |                     if let Some(ref failed) = self.failed {\n  157 |                         tracing::trace!(\"notifying caller about worker failure\");\n  158 |                         let _ = msg.tx.send(Err(failed.clone()));\n  159 |                         continue;\n  160 |                     }\n  161 | \n  162 |                     // Wait for the service to be ready\n  163 |                     tracing::trace!(\n  164 |                         resumed = !first,\n  165 |                         message = \"worker received request; waiting for service readiness\"\n  166 |                     );\n  167 |                     match self.service.poll_ready(cx) {\n  168 |                         Poll::Ready(Ok(())) => {\n  169 |                             tracing::debug!(service.ready = true, message = \"processing request\");\n  170 |                             let response = self.service.call(msg.request);\n  171 | \n  172 |                             // Send the response future back to the sender.\n  173 |                             //\n  174 |                             // An error means the request had been canceled in-between\n  175 |                             // our calls, the response future will just be dropped.\n  176 |                             tracing::trace!(\"returning response future\");\n  177 |                             let _ = msg.tx.send(Ok(response));\n  178 |                         }\n  179 |                         Poll::Pending => {\n  180 |                             tracing::trace!(service.ready = false, message = \"delay\");\n  181 |                             // Put out current message back in its slot.\n  182 |                             drop(_guard);\n  183 |                             self.current_message = Some(msg);\n  184 |                             return Poll::Pending;\n  185 |                         }\n  186 |                         Poll::Ready(Err(e)) => {\n  187 |                             let error = e.into();\n  188 |                             tracing::debug!({ %error }, \"service failed\");\n  189 |                             drop(_guard);\n  190 |                             self.failed(error);\n  191 |                             let _ = msg.tx.send(Err(self\n  192 |                                 .failed\n  193 |                                 .as_ref()\n  194 |                                 .expect(\"Worker::failed did not set self.failed?\")\n  195 |                                 .clone()));\n  196 |                         }\n  197 |                     }\n  198 |                 }\n  199 |                 None => {\n  200 |                     // No more more requests _ever_.\n  201 |                     self.finish = true;\n  202 |                     return Poll::Ready(());\n  203 |                 }\n  204 |             }\n  205 |         }\n  206 |     }","lines":55}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Steer::poll_ready` requires *all* services to be ready before any request can be dispatched,\ncausing head-of-line blocking (acknowledged in the docs). More subtly, because `call` re-queues\nthe used index into `not_ready`, each request round forces a re-poll of that service's readiness\neven when only one service is ever used, and a single slow/never-ready service blocks dispatch to\nall others. This is inherent to the design but the per-call re-queue amplifies the cost for the\ncommon single-hot-service routing case.","fix":"Consider tracking readiness per service and only re-polling the service that was actually used,\nor documenting that Steer is intended to be paired with always-ready (e.g. Buffer-wrapped)\ninner services as the module docs already suggest.","locations":[{"ref":"tower/src/steer/mod.rs:138-167","code":"  138 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n  139 |         loop {\n  140 |             // must wait for *all* services to be ready.\n  141 |             // this will cause head-of-line blocking unless the underlying services are always ready.\n  142 |             if self.not_ready.is_empty() {\n  143 |                 return Poll::Ready(Ok(()));\n  144 |             } else {\n  145 |                 if self.services[self.not_ready[0]]\n  146 |                     .poll_ready(cx)?\n  147 |                     .is_pending()\n  148 |                 {\n  149 |                     return Poll::Pending;\n  150 |                 }\n  151 | \n  152 |                 self.not_ready.pop_front();\n  153 |             }\n  154 |         }\n  155 |     }\n  156 | \n  157 |     fn call(&mut self, req: Req) -> Self::Future {\n  158 |         assert!(\n  159 |             self.not_ready.is_empty(),\n  160 |             \"Steer must wait for all services to be ready. Did you forget to call poll_ready()?\"\n  161 |         );\n  162 | \n  163 |         let idx = self.router.pick(&req, &self.services[..]);\n  164 |         let cl = &mut self.services[idx];\n  165 |         self.not_ready.push_back(idx);\n  166 |         cl.call(req)\n  167 |     }","lines":30}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Mock` stores its `Tx` inside a `Mutex<Tx<T,U>>` even though `mpsc::UnboundedSender` is already cheaply `Clone` and `Send`/`Sync` and supports concurrent `send` without external locking. Each `call` takes `self.tx.lock().unwrap()` only to call `send`, adding an unnecessary mutex acquisition (and a `.clone()` of the sender under lock in `Mock::clone`). The sender could be stored directly without the `Mutex`.","fix":"Store `tx: Tx<T, U>` directly (UnboundedSender is Sync and clonable); drop the Mutex wrapper.","locations":[{"ref":"tower-test/src/mock/mod.rs:56-60","code":"   56 |     id: u64,\n   57 |     tx: Mutex<Tx<T, U>>,\n   58 |     state: Arc<Mutex<State>>,\n   59 |     can_send: bool,\n   60 | }","lines":5},{"ref":"tower-test/src/mock/mod.rs:177-177","code":"  177 |         match self.tx.lock().unwrap().send((request, send_response)) {","lines":1},{"ref":"tower-test/src/mock/mod.rs:200-200","code":"  200 |         let tx = Mutex::new(self.tx.lock().unwrap().clone());","lines":1}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Handle::get_error_on_closed` locks the mutex and clones the `ServiceError` (an `Arc` clone, cheap) or constructs a `Closed`. It is called in three places in `Buffer` (poll_ready closed-check, poll_reserve error map, call send error) and each acquires the mutex. On the hot error path this is acceptable, but the closed-check in `poll_ready` plus the `poll_reserve` map can lock the mutex twice in one `poll_ready` invocation when the worker has died.","fix":"Minor; could fetch the worker error once per poll_ready when needed.","locations":[{"ref":"tower/src/buffer/worker.rs:209-218","code":"  209 | impl Handle {\n  210 |     pub(crate) fn get_error_on_closed(&self) -> crate::BoxError {\n  211 |         self.inner\n  212 |             .lock()\n  213 |             .unwrap()\n  214 |             .as_ref()\n  215 |             .map(|svc_err| svc_err.clone().into())\n  216 |             .unwrap_or_else(|| Closed::new().into())\n  217 |     }\n  218 | }","lines":10},{"ref":"tower/src/buffer/service.rs:97-108","code":"   97 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n   98 |         // First, check if the worker is still alive.\n   99 |         if self.tx.is_closed() {\n  100 |             // If the inner service has errored, then we error here.\n  101 |             return Poll::Ready(Err(self.get_worker_error()));\n  102 |         }\n  103 | \n  104 |         // Poll the sender to acquire a permit.\n  105 |         self.tx\n  106 |             .poll_reserve(cx)\n  107 |             .map_err(|_| self.get_worker_error())\n  108 |     }","lines":12}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`PeakEwma::load` acquires the `rtt_estimate` mutex and mutates shared state (decays the estimate and writes `update_at`/`rtt_ns`) on every load query via `update_estimate` -> `RttEstimate::decay`. In a P2C balancer, `load()` is called for two random endpoints on every `poll_ready`, so the read-only-looking `load(&self)` actually takes a lock and performs a write each call. Under high concurrency this serializes load reads against request-completion updates (Handle::drop also locks the same mutex). This is by design (decay must advance), but it makes `load()` a hidden write path; a contended balancer can see lock contention proportional to request rate times fan-out.","fix":"Consider an atomics-based or RwLock design, or document that load() mutates and locks so callers understand the contention characteristics.","locations":[{"ref":"tower/src/load/peak_ewma.rs:137-159","code":"  137 |     fn load(&self) -> Self::Metric {\n  138 |         let pending = Arc::strong_count(&self.rtt_estimate) as u32 - 1;\n  139 | \n  140 |         // Update the RTT estimate to account for decay since the last update.\n  141 |         // If an estimate has not been established, a default is provided\n  142 |         let estimate = self.update_estimate();\n  143 | \n  144 |         let cost = Cost(estimate * f64::from(pending + 1));\n  145 |         trace!(\n  146 |             \"load estimate={:.0}ms pending={} cost={:?}\",\n  147 |             estimate / NANOS_PER_MILLI,\n  148 |             pending,\n  149 |             cost,\n  150 |         );\n  151 |         cost\n  152 |     }\n  153 | }\n  154 | \n  155 | impl<S, C> PeakEwma<S, C> {\n  156 |     fn update_estimate(&self) -> f64 {\n  157 |         let mut rtt = self.rtt_estimate.lock().expect(\"peak ewma prior_estimate\");\n  158 |         rtt.decay(self.decay_ns)\n  159 |     }","lines":23},{"ref":"tower/src/load/peak_ewma.rs:287-294","code":"  287 | impl Drop for Handle {\n  288 |     fn drop(&mut self) {\n  289 |         let recv_at = Instant::now();\n  290 | \n  291 |         if let Ok(mut rtt) = self.rtt_estimate.lock() {\n  292 |             rtt.update(self.sent_at, recv_at, self.decay_ns);\n  293 |         }\n  294 |     }","lines":8}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`HasherRng::next_u64` allocates and initializes a brand-new hasher (`self.hasher.build_hasher()`) on every single call. For `RandomState`, `build_hasher` reinitializes SipHash state from the stored keys each time. In a hot path (e.g. balance peer selection calling this twice per pick) this is more work than necessary versus maintaining a single long-lived hasher or a cheap arithmetic PRNG. Minor given typical call frequency, but combined with the weak-quality concern it argues for replacing the construction entirely.","fix":"Use a persistent PRNG state (seeded once) rather than rebuilding a hasher per call.","locations":[{"ref":"tower/src/util/rng.rs:104-109","code":"  104 |     fn next_u64(&mut self) -> u64 {\n  105 |         let mut hasher = self.hasher.build_hasher();\n  106 |         hasher.write_u64(self.counter);\n  107 |         self.counter = self.counter.wrapping_add(1);\n  108 |         hasher.finish()\n  109 |     }","lines":6}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`Mock::call` has a branch handling `self.tx.lock().unwrap().send(...)` returning `Err` and returns `ResponseFuture::closed()`, annotated with `// TODO: Can this be reached`. The `Handle` holds the only `Rx`; if the `Handle` were dropped, `is_closed` is set to true and the earlier `if state.is_closed` check (line 159-161) returns first. Because `call` holds the `state` lock while checking `is_closed` and then sending, and the `Handle::drop` sets `is_closed` under the same lock, the send-error branch is effectively unreachable - dead/defensive code with an unresolved TODO.","fix":"Either resolve the TODO by documenting that the branch is defensive (Handle drop always sets is_closed under the state lock first), or remove the unreachable branch and use `.expect()`.","locations":[{"ref":"tower-test/src/mock/mod.rs:177-183","code":"  177 |         match self.tx.lock().unwrap().send((request, send_response)) {\n  178 |             Ok(_) => {}\n  179 |             Err(_) => {\n  180 |                 // TODO: Can this be reached\n  181 |                 return ResponseFuture::closed();\n  182 |             }\n  183 |         }","lines":7}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"The `assert!(cancel_tx.is_some(), ...)` defensive checks in `poll_pending` (both the ready-promotion else-branch and the Inner-error arm) combined with the `expect(...)` panics throughout `Pending::poll` represent a layer of invariant-checking that is never expected to trigger. They are not harmful but constitute a notable amount of panic-on-impossible code; if the invariants hold they are dead, if they do not they are silent panics. Grouped here as a maintainability observation.","fix":"Consolidate invariant checks into expect() on the relevant Option operations and document the single-task invariant once at the type level rather than re-asserting it per poll.","locations":[{"ref":"tower/src/ready_cache/cache.rs:293-298","code":"  293 |                     } else {\n  294 |                         assert!(\n  295 |                             cancel_tx.is_some(),\n  296 |                             \"services that become ready must have a pending cancelation\"\n  297 |                         );\n  298 |                     }","lines":6},{"ref":"tower/src/ready_cache/cache.rs:441-482","code":"  441 |     fn poll(self: Pin<&mut Self>, cx: &mut Context<'_>) -> Poll<Self::Output> {\n  442 |         let this = self.project();\n  443 |         // Before checking whether the service is ready, check to see whether\n  444 |         // readiness has been canceled.\n  445 |         let CancelRx(cancel) = this.cancel.as_mut().expect(\"polled after complete\");\n  446 |         if cancel.canceled.load(Ordering::SeqCst) {\n  447 |             let key = this.key.take().expect(\"polled after complete\");\n  448 |             return Err(PendingError::Canceled(key)).into();\n  449 |         }\n  450 | \n  451 |         match this\n  452 |             .ready\n  453 |             .as_mut()\n  454 |             .expect(\"polled after ready\")\n  455 |             .poll_ready(cx)\n  456 |         {\n  457 |             Poll::Pending => {\n  458 |                 // Before returning Pending, register interest in cancelation so\n  459 |                 // that this future is polled again if the state changes.\n  460 |                 let CancelRx(cancel) = this.cancel.as_mut().expect(\"polled after complete\");\n  461 |                 cancel.waker.register(cx.waker());\n  462 |                 // Because both the cancel receiver and cancel sender are held\n  463 |                 // by the `ReadyCache` (i.e., on a single task), then it must\n  464 |                 // not be possible for the cancelation state to change while\n  465 |                 // polling a `Pending` service.\n  466 |                 assert!(\n  467 |                     !cancel.canceled.load(Ordering::SeqCst),\n  468 |                     \"cancelation cannot be notified while polling a pending service\"\n  469 |                 );\n  470 |                 Poll::Pending\n  471 |             }\n  472 |             Poll::Ready(Ok(())) => {\n  473 |                 let key = this.key.take().expect(\"polled after complete\");\n  474 |                 let cancel = this.cancel.take().expect(\"polled after complete\");\n  475 |                 Ok((key, this.ready.take().expect(\"polled after ready\"), cancel)).into()\n  476 |             }\n  477 |             Poll::Ready(Err(e)) => {\n  478 |                 let key = this.key.take().expect(\"polled after compete\");\n  479 |                 Err(PendingError::Inner(key, e)).into()\n  480 |             }\n  481 |         }\n  482 |     }","lines":42}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"In `reconnect/future.rs`, the helper constructors `Inner::future` and `Inner::error` add an indirection layer that is only used once each by `ResponseFuture::new` and `ResponseFuture::error`. They are trivially small and add no value; the enum variants could be constructed inline. Minor; harmless.","fix":"Optionally inline the `Inner::future`/`Inner::error` constructors into `ResponseFuture::new`/`ResponseFuture::error`.","locations":[{"ref":"tower/src/reconnect/future.rs:31-39","code":"   31 | impl<F, E> Inner<F, E> {\n   32 |     fn future(fut: F) -> Self {\n   33 |         Self::Future { fut }\n   34 |     }\n   35 | \n   36 |     fn error(error: Option<E>) -> Self {\n   37 |         Self::Error { error }\n   38 |     }\n   39 | }","lines":9}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`Elapsed::new` (timeout) and `Overloaded::new` (load_shed) are public const constructors that are\nnever used internally - the crate constructs these errors via `Elapsed(())` and `Overloaded::new()`\nrespectively (Overloaded::new is used; Elapsed::new is not). `Elapsed::new()` exists but the future\nconstructs `Elapsed(())` directly (future.rs line 50), so `Elapsed::new` is effectively dead within\nthe crate (kept for the public API). Minor; flagged for completeness as the two error types use\ninconsistent construction styles internally.","fix":"Use `Elapsed::new()` in the future instead of the private tuple constructor `Elapsed(())` for\nconsistency, or leave as-is since both are intentional public API.\"","locations":[{"ref":"tower/src/timeout/error.rs:9-14","code":"    9 | impl Elapsed {\n   10 |     /// Construct a new elapsed error\n   11 |     pub const fn new() -> Self {\n   12 |         Elapsed(())\n   13 |     }\n   14 | }","lines":6},{"ref":"tower/src/timeout/future.rs:50","code":"   50 |             Poll::Ready(_) => Poll::Ready(Err(Elapsed(()).into())),","lines":1}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Doc on `error::Closed` says 'Error yielded when a mocked service does not yet accept requests.' but `Closed` is actually produced when the service/channel is CLOSED (Handle dropped, response sender dropped, or recv channel closed) - see `poll_ready` returning `Closed` on `is_closed`, `ResponseFuture` returning `Closed` on a dropped/None receiver, and the Display string 'service closed'. The doc describes the opposite (a not-yet-ready service) of the actual meaning.","fix":"Reword to 'Error yielded when the mocked service (or its handle) has been closed/dropped.'","locations":[{"ref":"tower-test/src/mock/error.rs:7-8","code":"    7 | /// Error yielded when a mocked service does not yet accept requests.\n    8 | #[derive(Debug)]","lines":2},{"ref":"tower-test/src/mock/error.rs:17-21","code":"   17 | impl fmt::Display for Closed {\n   18 |     fn fmt(&self, fmt: &mut fmt::Formatter) -> fmt::Result {\n   19 |         write!(fmt, \"service closed\")\n   20 |     }\n   21 | }","lines":5}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Stale/misleading comments in `Balance::update_pending_from_discover`. The doc says \"adding new items to `not_ready`\" and \"Removals may alter the order of either `ready` or `not_ready`\", referencing a `not_ready` field/concept that no longer exists - the implementation uses a `ReadyCache` with `pending`/`ready` terminology. The naming drift makes the code harder to follow and the `ready` ordering remark here actually contradicts the (also questionable) claim in poll_ready that order cannot be disturbed.","fix":"Update comments to use `pending`/`ready` terminology consistent with ReadyCache, and reconcile with the ordering note in poll_ready.","locations":[{"ref":"tower/src/balance/p2c/service.rs:102-128","code":"  102 |     /// Polls `discover` for updates, adding new items to `not_ready`.\n  103 |     ///\n  104 |     /// Removals may alter the order of either `ready` or `not_ready`.\n  105 check(&mut self, request: Request) -> Result<Self::Request, BoxError>;","lines":4}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The assertion message and surrounding doc comment in `Pending::poll` claim that \"cancelation cannot be notified while polling a pending service\" because both the CancelTx and CancelRx are held by the ReadyCache on a single task. This invariant is fragile: `evict`, `check_ready_index`, `call_ready_index` all call `c.cancel()` / `push_pending` synchronously from the same task that drives `poll_pending`, so it holds today, but the comment presents it as a structural guarantee. More importantly, the assert at line 466-469 fires only if the cancel flag flips between the top-of-poll check (line 446) and here - which, given the single-task argument, is claimed impossible, making the assert dead defensive code. If the invariant is truly guaranteed it is dead code; if it is not guaranteed it is a latent panic. Either way it deserves clarification.","fix":"Either remove the assert (if the single-task invariant truly holds) or downgrade it to a debug_assert with a comment explaining it guards against future multi-task misuse.","locations":[{"ref":"tower/src/ready_cache/cache.rs:457-470","code":"  457 |             Poll::Pending => {\n  458 |                 // Before returning Pending, register interest in cancelation so\n  459 |                 // that this future is polled again if the state changes.\n  460 |                 let CancelRx(cancel) = this.cancel.as_mut().expect(\"polled after complete\");\n  461 |                 cancel.waker.register(cx.waker());\n  462 |                 // Because both the cancel receiver and cancel sender are held\n  463 |                 // by the `ReadyCache` (i.e., on a single task), then it must\n  464 |                 // not be possible for the cancelation state to change while\n  465 |                 // polling a `Pending` service.\n  466 |                 assert!(\n  467 |                     !cancel.canceled.load(Ordering::SeqCst),\n  468 |                     \"cancelation cannot be notified while polling a pending service\"\n  469 |                 );\n  470 |                 Poll::Pending","lines":14}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `jitter` says it 'Returns a random, uniform duration on `[0, base*self.jitter]` no greater than `self.max`.' Two inaccuracies: (1) the result is clamped to `self.max - base` (the remaining headroom), not to `self.max`; (2) `base*self.jitter` is computed by multiplying the seconds and nanos parts of `base` separately by `rand_jitter` and recombining, which is not exactly `base * jitter` for fractional carry between secs and nanos. The upper bound and the multiplication described do not match the implementation.","fix":"Update the comment to state the bound is `min(base*jitter, max-base)`. Optionally compute the jittered amount from total nanos (e.g. via `base.as_secs_f64()`) to avoid the secs/nanos split inaccuracy.","locations":[{"ref":"tower/src/retry/backoff.rs:150-167","code":"  150 |     /// Returns a random, uniform duration on `[0, base*self.jitter]` no greater\n  151 |     /// than `self.max`.\n  152 |     fn jitter(&mut self, base: time::Duration) -> time::Duration {\n  153 |         if self.jitter == 0.0 {\n  154 |             time::Duration::default()\n  155 |         } else {\n  156 |             let jitter_factor = self.rng.next_f64();\n  157 |             debug_assert!(\n  158 |                 jitter_factor > 0.0,\n  159 |                 \"rng returns values between 0.0 and 1.0\"\n  160 |             );\n  161 |             let rand_jitter = jitter_factor * self.jitter;\n  162 |             let secs = (base.as_secs() as f64) * rand_jitter;\n  163 |             let nanos = (base.subsec_nanos() as f64) * rand_jitter;\n  164 |             let remaining = self.max - base;\n  165 |             time::Duration::new(secs as u64, nanos as u32).min(remaining)\n  166 |         }\n  167 |     }","lines":18}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Grammar error in module doc: 'A layer decorates an service' should be 'a service'.","fix":"Change 'an service' to 'a service'.","locations":[{"ref":"tower-layer/src/lib.rs:12-12","code":"   12 | //! A layer decorates an service and provides additional functionality. It","lines":1}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Typo in Stack Debug comment: 'inject padding to that each line is at the same indentation level' - 'to that' should be 'so that'.","fix":"Change 'to that each line' to 'so that each line'.","locations":[{"ref":"tower-layer/src/stack.rs:73-74","code":"   73 |         //   the `DebugStruct` used in the `ServiceBuilder` will inject padding\n   74 |         //   to that each line is at the same indentation level.","lines":2}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment '// Bit weird... but whatevz' in `Mock::poll_ready` is unprofessional filler and does not explain the (non-obvious) waker-overwrite behavior it sits above.","fix":"Replace with a comment explaining why the waker is (re)stored for this mock id, or remove it.","locations":[{"ref":"tower-test/src/mock/mod.rs:145-149","code":"  145 |             // Bit weird... but whatevz\n  146 |             *state\n  147 |                 .tasks\n  148 |                 .entry(self.id)\n  149 |                 .or_insert_with(|| cx.waker().clone()) = cx.waker().clone();","lines":5}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Typo in doc comment: 'Get how many futurs are holding onto the waker.' ears in `AsyncFilter::new` layer docs.","fix":"Update the doc-link in the AsyncFilterLayer/AsyncFilter sections to reference\n`crate::filter::AsyncFilter` rather than `crate::filter::Filter`.\"","locations":[{"ref":"tower/src/filter/layer.rs:17-28","code":"   17 | /// Conditionally dispatch requests to the inner service based on an asynchronous\n   18 | /// [predicate].\n   19 | ///\n   20 | /// This [`Layer`] produces instances of the [`AsyncFilter`] service.\n   21 | ///\n   22 | /// [predicate]: crate::filter::AsyncPredicate\n   23 | /// [`Layer`]: crate::Layer\n   24 | /// [`Filter`]: crate::filter::AsyncFilter\n   25 | #[derive(Debug, Clone)]\n   26 | pub struct AsyncFilterLayer<U> {\n   27 |     predicate: U,\n   28 | }","lines":12},{"ref":"tower/src/filter/layer.rs:58-59","code":"   58 |     /// [`AsyncPredicate`]: crate::filter::AsyncPredicate\n   59 |     /// [`Filter`]: crate::filter::Filter","lines":2}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc typo / stray double period: \"before a meaningful baseline can be established..\" (two periods) and the surrounding sentence in the PeakEwma struct docs. Cosmetic.","fix":"Remove the doubled period.","locations":[{"ref":"tower/src/load/peak_ewma.rs:33-34","code":"   33 | /// RTT of 1 second is used to prevent the endpoint from being overloaded before a\n   34 | /// meaningful baseline can be established..","lines":2}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment for `RttEstimate::update` is truncated mid-sentence: \"The elapsed time from `sent_at` to `recv_at` is added\" - the sentence has no object/verb completion and does not describe what is actually done with the elapsed time (it is compared to the current estimate, taking the peak or decaying toward the observed value). Misleading/incomplete documentation of a subtle algorithm.","fix":"Complete the doc comment to describe the peak-vs-decay logic actually implemented.","locations":[{"ref":"tower/src/load/peak_ewma.rs:234-237","code":"  234 |     /// Updates the Peak-EWMA RTT estimate.\n  235 |     ///\n  236 |     /// The elapsed time from `sent_at` to `recv_at` is added\n  237 |     fn update(&mut self, sent_at: Instant, recv_at: Instant, decay_ns: f64) -> f64 {","lines":4}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Typo in panic message: `expect(\"polled after compete\")` should be \"polled after complete\" (matching the other arms in the same function which use \"complete\"). Cosmetic but appears in panic output.","fix":"Fix the typo: change \"compete\" to \"complete\" at cache.rs:478 inside Pending::poll's error arm.","locations":[{"ref":"tower/src/ready_cache/cache.rs:478","code":"  478 |                 let key = this.key.take().expect(\"polled after compete\");","lines":1}]},{"id":"CMT_17","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"In `rng.rs` `next_f64`, the borrowed-from comment links to a `master`-branch line number (`.../master/src/distr/float.rs#L108`). Branch-pointing line references rot quickly because `master` moves; the line cited will not match upstream over time. The neighboring `sample_floyd2` reference correctly pins a commit hash. Use a pinned commit for the float reference too.","fix":"Pin the URL to a specific commit hash like the sample_floyd2 reference does (rng.rs:117-118).","locations":[{"ref":"tower/src/util/rng.rs:27-28","code":"   27 |         // Borrowed from:\n   28 |         // https://github.com/rust-random/rand/blob/master/src/distr/float.rs#L108","lines":2}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"`boxed_clone.rs` and `boxed_clone_sync.rs` are near-identical files (the `CloneService` trait, the blanket impl, the `BoxCloneService`/`BoxCloneSyncService` struct, `new`, `layer`, `Service`, `Clone`, and `Debug` impls). The only differences are the added `+ Sync` bounds and the type name. The same duplication pattern repeats across `boxed/layer_clone.rs` vs `boxed/layer_clone_sync.rs`. This is a maintenance hazard: a fix applied to one (such as the recent removal of the Future `Sync` bound) must be manually mirrored to the other, and divergence is easy to miss.","fix":"Factor the shared body into a macro (the codebase already uses `opaque_future!`), parameterized over the extra `Sync` bound and the type name, to keep the sync and non-sync variants in lockstep.","locations":[{"ref":"tower/src/util/boxed_clone.rs:58-136","code":"   58 | pub struct BoxCloneService<T, U, E>(\n   59 |     Box<\n   60 |         dyn CloneService<T, Response = U, Error = E, Future = BoxFuture<'static, Result<U, E>>>\n   61 |             + Send,\n   62 |     >,\n   63 | );\n   64 | \n   65 | impl<T, U, E> BoxCloneService<T, U, E> {\n   66 |     /// Create a new `BoxCloneService`.\n   67 |     pub fn new<S>(inner: S) -> Self\n   68 |     where\n   69 |         S: Service<T, Response = U, Error = E> + Clone + Send + 'static,\n   70 |         S::Future: Send + 'static,\n   71 |     {\n   72 |         let inner = inner.map_future(|f| Box::pin(f) as _);\n   73 |         BoxCloneService(Box::new(inner))\n   74 |     }\n   75 | \n   76 |     /// Returns a [`Layer`] for wrapping a [`Service`] in a [`BoxCloneService`]\n   77 |     /// middleware.\n   78 |     ///\n   79 |     /// [`Layer`]: crate::Layer\n   80 |     pub fn layer<S>() -> LayerFn<fn(S) -> Self>\n   81 |     where\n   82 |         S: Service<T, Response = U, Error = E> + Clone + Send + 'static,\n   83 |         S::Future: Send + 'static,\n   84 |     {\n   85 |         layer_fn(Self::new)\n   86 |     }\n   87 | }\n   88 | \n   89 | impl<T, U, E> Service<T> for BoxCloneService<T, U, E> {\n   90 |     type Response = U;\n   91 |     type ish()\n  128 |     }\n  129 | }","lines":44}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`Layer for &T` (tower-layer) forwards by reference, but there is no blanket `Layer` impl for `Box<L>` or `Arc<L>`, while `tower-service` provides `Service` impls for both `&mut S` and `Box<S>`. This asymmetry means boxed/Arc'd layers (common when erasing layer types) do not transparently implement `Layer`, forcing callers to deref manually. Not a bug, but an ergonomic/architecture gap relative to the Service trait's reference impls.","fix":"Consider adding blanket `Layer` impls for `Box<L>`/`Arc<L>` mirroring the `&T` impl, if type-erased layers are expected to be used as layers directly.","locations":[{"ref":"tower-layer/src/lib.rs:108-117","code":"  108 | impl<T, S> Layer<S> for &T\n  109 | where\n  110 |     T: ?Sized + Layer<S>,\n  111 | {\n  112 |     type Service = T::Service;\n  113 | \n  114 |     fn layer(&self, inner: S) -> Self::Service {\n  115 |         (**self).layer(inner)\n  116 |     }\n  117 | }","lines":10},{"ref":"tower-service/src/lib.rs:369-401","code":"  369 | impl<S, Request> Service<Request> for &mut S\n  370 | where\n  371 |     S: Service<Request> + ?Sized,\n  372 | {\n  373 |     type Response = S::Response;\n  374 |     type Error = S::Error;\n  375 |     type Future = S::Future;\n  376 | \n  377 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), S::Error>> {\n  378 |         (**self).poll_ready(cx)\n  379 |     }\n  380 | \n  381 |     fn call(&mut self, request: Request) -> S::Future {\n  382 |         (**self).call(request)\n  383 |     }\n  384 | }\n  385 | \n  386 | impl<S, Request> Service<Request> for Box<S>\n  387 | where\n  388 |     S: Service<Request> + ?Sized,\n  389 | {\n  390 |     type Response = S::Response;\n  391 |     type Error = S::Error;\n  392 |     type Future = S::Future;\n  393 | \n  394 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), S::Error>> {\n  395 |         (**self).poll_ready(cx)\n  396 |     }\n  397 | \n  398 |     fn call(&mut self, request: Request) -> S::Future {\n  399 |         (**self).call(request)\n  400 |     }\n  401 | }","lines":33}]},{"id":"ARCH_2","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`Worker::poll` is a single ~55-line function mixing: shutdown check, message dequeue/cancellation filtering (delegated), failure short-circuit, inner readiness polling, response forwarding, and failure propagation including a nested `self.failed()` + re-fetch + `expect`. The `Poll::Ready(Err(e))` branch in particular interleaves error storage, channel closing (inside `failed()`), and a fragile `expect` on `self.failed`. This concentration of state transitions in one match arm makes the failure invariants hard to verify (see related finding on the `expect` panic).","fix":"Extract the failure-and-notify sequence into a single helper that both records the error and returns the cloned error to send, eliminating the `expect` and clarifying the invariant.","locations":[{"ref":"tower/src/buffer/worker.rs:147-207","code":"  147 |     fn poll(mut self: Pin<&mut Self>, cx: &mut Context<'_>) -> Poll<Self::Output> {\n  148 |         if self.finish {\n  149 |             return Poll::Ready(());\n  150 |         }\n  151 | \n  152 |         loop {\n  153 |             match ready!(self.poll_next_msg(cx)) {\n  154 |                 Some((msg, first)) => {\n  155 |                     let _guard = msg.span.enter();\n  156 |                     if let Some(ref failed) = self.failed {\n  157 |                         tracing::trace!(\"notifying caller about worker failure\");\n  158 |                         let _ = msg.tx.send(Err(failed.clone()));\n  159 |                         continue;\n  160 |                     }\n  161 | \n  162 |                     // Wait for the service to be ready\n  163 |                     tracing::trace!(\n  164 |                         resumed = !first,\n  165 |                         message = \"worker received request; waiting for service readiness\"\n  166 |                     );\n  167 |                     match self.service.poll_ready(cx) {\n  168 |                         Poll::Ready(Ok(())) => {\n  169 |                             tracing::debug!(service.ready = true, message = \"processing request\");\n  170 |                             let response = self.service.call(msg.request);\n  171 | \n  172 |                             // Send the response future back to the sender.\n  173 |                             //\n  174 |                             // An error means the request had been canceled in-between\n  175 |                             // our calls, the response future will just be dropped.\n  176 |                             tracing::trace!(\"returning response future\");\n  177 |                             let _ = msg.tx.send(Ok(response));\n  178 |                         }\n  179 |                         Poll::Pending => {\n  180 |                             tracing::trace!(service.ready = false, message = \"delay\");\n  181 |                             // Put out current message back in its slot.\n  182 |                             drop(_guard);\n  183 |                             self.current_message = Some(msg);\n  184 |                             return Poll::Pending;\n  185 |                         }\n  186 |                         Poll::Ready(Err(e)) => {\n  187 |                             let error = e.into();\n  188 |                             tracing::debug!({ %error }, \"service failed\");\n  189 |                             drop(_guard);\n  190 |                             self.failed(error);\n  191 |                             let _ = msg.tx.send(Err(self\n  192 |                                 .failed\n  193 |                                 .as_ref()\n  194 |                                 .expect( -> Result<Response, Error> + Clone,\n  549 |     {\n  550 |         MapResult::new(self, f)\n  551 |     }\n  552 | \n  553 |     /// Composes a function *in front of* the service.\n  554 |     ///\n  555 |     /// This adapter produces a new service that passes each value through the\n  556 |     /// given function `f` before sending it to `self`.\n  557 |     ///\n  558 |     /// # Example\n  559 |     /// ```\n  560 |     /// # use std::convert::TryFrom;\n  561 |     /// # use std::task::{Poll, Context};\n  562 |     /// # use tower::{Service, ServiceExt};\n  563 |     /// #\n  564 |     /// # struct DatabaseService;\n  565 |     /// # impl DatabaseService {\n  566 |     /// #   fn new(address: &str) -> Self {\n  567 |     /// #       DatabaseService\n  568 |     /// #   }\n  569 |     /// # }\n  570 |     /// #\n  571 |     /// # impl Service<String> for DatabaseService {\n  572 |     /// #   type Response = String;\n  573 |     /// #   type Error = u8;\n  574 |     /// #   type Future = std::future::Ready<Result<String, u8>>;\n  575 |     /// #\n  576 |     /// #   fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n  577 |     /// #       Poll::Ready(Ok(()))\n  578 |     /// #   }\n  579 |     /// #\n  580 |     /// #   fn call(&mut self, request: String) -> Self::Future {\n  581 |     /// #       std::future::ready(Ok(String::new()))\n  582 |     /// #   }\n  583 |     /// # }\n  584 |     /// #\n  585 |     /// # fn main() {\n  586 |     /// #   async {\n  587 |     /// // A service taking a String as a request\n  588 |     /// let service = DatabaseService::new(\"127.0.0.1:8080\");\n  589 |     ///\n  590 |     /// // Map the request to a new request\n  591 |     /// let mut new_service = service.map_request(|id: u32| id.to_string());\n  592 |     ///\n  593 |     /// // Call the new service\n  594 |     /// let id = 13;\n  595 |     /// let response = new_service\n  596 |     ///     .ready()\n  597 |     ///     .await?\n  5 binator, [`ServiceExt::then`] can be used to implement asynchronous\n  785 |     /// error recovery, by calling some asynchronous function with errors\n  786 |     /// returned by this service. Alternatively, it may also be used to call a\n  787 |     /// fallible async function with the successful response of this service.\n  788 |     ///\n  789 |     /// This method can be used to change the [`Response`] type of the service\n  790 |     /// into a different type. It can also be used to change the [`Error`] type\n  791 |     /// of the service. However, because the `then` function is not applied\n  792 |     /// to the errors returned by the service's [`poll_ready`] method, it must\n  793 |     /// be possible to convert the service's [`Error`] type into the error type\n  794 |     /// returned by the `then` future. This is trivial when the function\n  795 |     /// returns the same error type as the service, but in other cases, it can\n  796 |     /// be useful to use [`BoxError`] to erase differing error types.\n  797 |     ///\n  798 |     /// # Examples\n  799 |     ///\n  800 |     /// ```\n  801 |     /// # use std::task::{Poll, Context};\n  802 |     /// # use tower::{Service, ServiceExt};\n  803 |     /// #\n  804 |     /// # struct DatabaseService;\n  805 |     /// # impl DatabaseService {\n  806 |     /// #   fn new(address: &str) -> Self {\n  807 |     /// #       DatabaseService\n  808 |     /// #   }\n  809 |     /// # }\n  810 |     /// #\n  811 |     /// # type Record = ();\n  812 |     /// # type DbError = ();\n  813 |     /// #\n  814 |     /// # impl Service<u32> for DatabaseService {\n  815 |     /// #   type Response = Record;\n  816 |     /// #   type Error = DbError;\n  817 |     /// #   type Future = std::future::Ready<Result<Record, DbError>>;\n  818 |     /// #\n  819 |     /// #   fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n  820 |     /// #       Poll::Ready(Ok(()))\n  821 |     /// #   }\n  822 |     /// #\n  823 |     /// #   fn call(&mut self, request: u32) -> Self::Future {\n  824 |     /// #       std::future::ready(Ok(()))\n  825 |     /// #   }\n  826 |     /// # }\n  827 |     /// #\n  828 |     /// # fn main() {\n  829 |     /// // A service returning Result<Record, DbError>\n  830 |     /// let service = DatabaseService::new(\"127.0.0.1:8080\");\n  831 |     ///\n  832 |     /// // An async function that attempts to recover from errors returned by the\n  833 |     /// // database.\n  834 |     /// async fn recover_from_error(error: DbError) -> Result<Record, DbError> {\n  835 |     ///     // ...\n  836 |     ///     # Ok(())\n  837 |     /// }\n  838 |     /// #    async {\n  839 |     ///\n  840 |     /// // If the database service returns an error, attempt to recover by\n  841 |     /// // calling `recover_from_error`. Otherwise, return the successful response.\n  842 |     /// let mut new_service = service.then(|result| async move {\n  843 |     ///     match result {\n  844 |     ///         Ok(record) => Ok(record),\n  845 |     ///         Err(e) => recover_from_error(e).await,\n  846 |     ///     }\n  847 |     /// });\n  848 |     ///\n  849 |     /// // Call the new service\n  850 |     /// let id = 13;\n  851 |     /// let record = new_service\n  852 |     ///     .ready()\n  853 |     ///     .await?\n  854 |     ///     .call(id)\n  855 |     ///     .await?;\n  856 |     /// # Ok::<(), DbError>(())\n  857 |     /// #    };\n  858 |     /// # }\n  859 |     /// ```\n  860 |     ///\n  861 |     /// [`Future`]: crate::Service::Future\n  862 |     /// [`Output`]: std::future::Future::Output\n  863 |     /// [`futures` crate]: https://docs.rs/futures\n  864 |     /// [`FutureExt::then`]: https://docs.rs/futures/latest/futures/future/trait.FutureExt.html#method.then\n  865 |     /// [`Error`]: crate::Service::Error\n  866 |     /// [`Response`]: crate::Service::Response\n  867 |     /// [`poll_ready`]: crate::Service::poll_ready\n  868 |
