<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"The jitter debug_assert claims the RNG never returns 0.0, but `Rng::next_f64` is documented and implemented to return a value in the half-open range `[0, 1)`, i.e. it CAN return exactly 0.0 (when `next_u64()` produces a value whose top 53 bits are zero). In debug builds this `debug_assert!(jitter_factor > 0.0, ...)` will therefore panic on a perfectly valid RNG output. The assert is simply wrong: it should be `>= 0.0`. The accompanying message 'rng returns values between 0.0 and 1.0' is also misleading (the range is [0,1), exclusive of 1.0).","fix":"Change the assertion to `debug_assert!((0.0..1.0).contains(&jitter_factor), ...)` (or simply `jitter_factor >= 0.0`) and correct the message to reflect the `[0, 1)` range. A 0.0 factor just yields zero jitter, which is harmless.","locations":[{"ref":"tower/src/retry/backoff.rs:156-160","code":"  156 |             let jitter_factor = self.rng.next_f64();\n  157 |             debug_assert!(\n  158 |                 jitter_factor > 0.0,\n  159 |                 \"rng returns values between 0.0 and 1.0\"\n  160 |             );","lines":5},{"ref":"tower/src/util/rng.rs:25-37","code":"   25 |     /// Generate a random [`f64`] between `[0, 1)`.\n   26 |     fn next_f64(&mut self) -> f64 {\n   27 |         // Borrowed from:\n   28 |         // https://github.com/rust-random/rand/blob/master/src/distr/float.rs#L108\n   29 |         let float_size = std::mem::size_of::<f64>() as u32 * 8;\n   30 |         let precision = 52 + 1;\n   31 |         let scale = 1.0 / ((1u64 << precision) as f64);\n   32 | \n   33 |         let value = self.next_u64();\n   34 |         let value = value >> (float_size - precision);\n   35 | \n   36 |         scale * value as f64\n   37 |     }","lines":13}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`SpawnReady::poll_ready` propagates the `JoinHandle` result with `??`: the first `?` handles `JoinError` (task panicked or was cancelled), the second handles the inner readiness error. If the background readiness task panicked, the `JoinError` is converted via `Into<BoxError>` and returned as a normal error - but the panic in the spawned task is effectively swallowed and turned into an opaque readiness error, losing the panic backtrace. Additionally, if the task was aborted (e.g. by the Drop impl racing), `poll_ready` returns a cancellation error that may surprise callers.","fix":"Consider distinguishing a panicked task (JoinError::is_panic) and re-propagating the panic, or document that a panic in the inner service's readiness is surfaced as a generic error.","locations":[{"ref":"tower/src/spawn_ready/service.rs:71-73","code":"   71 |                 Inner::Future(ref mut fut) => {\n   72 |                     let svc = ready!(Pin::new(fut).poll(cx))??;\n   73 |                     Inner::Service(Some(svc))","lines":3}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Steer::call` indexes `self.services[idx]` with the index returned by the user-supplied\n`Picker::pick`. If the picker returns an index >= services.len(), this panics with an\nout-of-bounds slice access. The `Picker` trait contract documents that `pick` returns \"an\nindex into the iterator of Service\", but nothing validates it, and a buggy picker (or one\nwritten against a different service list length) will crash the whole task rather than\nreturning a graceful error. The doc comment on `Picker::pick` does not warn about the\npanic, nor is there a `# Panics` section.","fix":"Either document the panic explicitly in a `# Panics` section on `Picker::pick`/`Steer::call`,\nor bounds-check `idx` and panic with a clear message (e.g. assert!(idx < self.services.len(),\n\"Picker returned out-of-bounds index {idx} for {} services\", self.services.len())) so the\nfailure mode is diagnosable rather than a raw slice panic.","locations":[{"ref":"tower/src/steer/mod.rs:157-167","code":"  157 |     fn call(&mut self, req: Req) -> Self::Future {\n  158 |         assert!(\n  159 |             self.not_ready.is_empty(),\n  160 |             \"Steer must wait for all services to be ready. Did you forget to call poll_ready()?\"\n  161 |         );\n  162 | \n  163 |         let idx = self.router.pick(&req, &self.services[..]);\n  164 |         let cl = &mut self.services[idx];\n  165 |         self.not_ready.push_back(idx);\n  166 |         cl.call(req)\n  167 |     }","lines":11},{"ref":"tower/src/steer/mod.rs:74-78","code":"   74 | /// This is how callers of [`Steer`] tell it which `Service` a `Req` corresponds to.\n   75 | pub trait Picker<S, Req> {\n   76 |     /// Return an index into the iterator of `Service` passed to [`Steer::new`].\n   77 |     fn pick(&mut self, r: &Req, services: &[S]) -> usize;\n   78 | }","lines":5}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Balance::poll_ready` -> `p2c_ready_index` -> `ready_index_load` calls `self.services.get_ready_index(index).expect(\"invalid index\")`. The indices come from `sample_floyd2(&mut self.rng, len as u64)` where `len = self.services.ready_len()`. This is safe as long as `ready_len()` is read and the indices are used within the same `&mut self` borrow without any intervening mutation of the ready set - which is currently the case. But the `expect` is a hard panic that depends on this non-local invariant; if any future refactor lets the ready set shrink between `ready_len()` and the load lookups, this becomes an out-of-bounds panic. Worth a defensive note. (Not a current bug.)","fix":"Add a comment that the indices are only valid because the ready set is not mutated between ready_len() and the load lookups within this single &mut self borrow.","locations":[{"ref":"tower/src/balance/p2c/service.rs:158-189","code":"  158 |     fn p2c_ready_index(&mut self) -> Option<usize> {\n  159 |         match self.services.ready_len() {\n  160 |             0 => None,\n  161 |             1 => Some(0),\n  162 |             len => {\n  163 |                 // Get two distinct random indexes (in a random order) and\n  164 |                 // compare the loads of the service at each index.\n  165 |                 let [aidx, bidx] = sample_floyd2(&mut self.rng, len as u64);\n  166 |                 debug_assert_ne!(aidx, bidx, \"random indices must be distinct\");\n  167 | \n  168 |                 let aload = self.ready_index_load(aidx as usize);\n  169 |                 let bload = self.ready_index_load(bidx as usize);\n  170 |                 let chosen = if aload <= bload { aidx } else { bidx };\n  171 | \n  172 |                 trace!(\n  173 |                     a.index = aidx,\n  174 |                     a.load = ?aload,\n  175 |                     b.index = bidx,\n  176 |                     b.load = ?bload,\n  177 |                     chosen = if chosen == aidx { \"a\" } else { \"b\" },\n  178 |                     \"p2c\",\n  179 |                 );\n  180 |                 Some(chosen as usize)\n  181 |             }\n  182 |         }\n  183 |     }\n  184 | \n  185 |     /// Accesses a ready endpoint by index and returns its current load.\n  186 |     fn ready_index_load(&self, index: usize) -> <D::Service as Load>::Metric {\n  187 |         let (_, svc) = self.services.get_ready_index(index).expect(\"invalid index\");\n  188 |         svc.load()\n  189 |     }","lines":32}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`maybe_rotate` does `self.last_rotation += self.period * rotations` where `rotations: u32` is computed from elapsed nanoseconds. `Duration * u32` panics on overflow. With a large `period` and a long idle interval (large `rotations`), `self.period * rotations` can overflow `Duration` and panic. The histogram is shared behind a `Mutex`, so a panic here also poisons the mutex and subsequently propagates panics to every `lock().unwrap()` in the hedge path (delay.rs DelayPolicy, mod.rs Record::record, select.rs).","fix":"Saturate the multiplication, e.g. `self.last_rotation += self.period.saturating_mul(rotations)` (Duration::saturating_mul is stable), or set `last_rotation = Instant::now()` when `rotations >= 2` since the histogram was fully cleared anyway.","locations":[{"ref":"tower/src/hedge/rotating_histogram.rs:41-53","code":"   41 |     fn maybe_rotate(&mut self) {\n   42 |         let delta = Instant::now().saturating_duration_since(self.last_rotation);\n   43 |         // TODO: replace with delta.duration_div when it becomes stable.\n   44 |         let rotations = (nanos(delta) / nanos(self.period)) as u32;\n   45 |         if rotations >= 2 {\n   46 |             trace!(\"Time since last rotation is {:?}.  clearing!\", delta);\n   47 |             self.clear();\n   48 |         } else if rotations == 1 {\n   49 |             trace!(\"Time since last rotation is {:?}. rotating!\", delta);\n   50 |             self.rotate();\n   51 |         }\n   52 |         self.last_rotation += self.period * rotations;\n   53 |     }","lines":13}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Reconnect::call` panics with `panic!(\"service not ready; poll_ready must be called first\")` if state is not `Connected` and no pending error exists. This is the documented Service contract, but note that `poll_ready` can legitimately return `Ready(Ok(()))` only from the `Connected` branch, so the panic is reachable only on contract misuse. Acceptable, but the panic message and the `unreachable!`-style assumptions should be consistent with the rest of the crate.","fix":"No change required for correctness; consider documenting the panic in the `Service` impl docs.","locations":[{"ref":"tower/src/reconnect/mod.rs:147-150","code":"  147 |         let service = match self.state {\n  148 |             State::Connected(ref mut service) => service,\n  149 |             _ => panic!(\"service not ready; poll_ready must be called first\"),\n  150 |         };","lines":4}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`FutureService::call` panics if called before `poll_ready` has driven the inner future to completion (state still `Future`). This is the documented Service contract (call after poll_ready), so it is acceptable, but note that `poll_ready` mutates `self.state` in place via a `loop` that reassigns `self.state` - if the inner future returns `Pending`, state stays `Future` and a subsequent erroneous `call` panics. This is correct per contract but worth flagging as a panic-on-misuse path with no `Debug`-safe fallback.","fix":"No change required if contract adherence is assumed; consider returning a pending/error future instead of panicking for robustness.","locations":[{"ref":"tower/src/util/future_service.rs:165-171","code":"  165 |     fn call(&mut self, req: R) -> Self::Future {\n  166 |         if let State::Service(svc) = &mut self.state {\n  167 |             svc.call(req)\n  168 |         } else {\n  169 |             panic!(\"FutureService::call was called before FutureService::poll_ready\")\n  170 |         }\n  171 |     }","lines":7}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`State::<S,Req>::fmt` (Debug impl for Oneshot's internal state) calls `unreachable!()` for the `NotReady { req: None, .. }` case. The invariant that `req` is `Some` while in `NotReady` holds during normal operation, but a `Debug` implementation should never be able to panic - formatting is frequently invoked from logging/error paths and panicking inside `fmt` can abort or mask the original error. A `None` here (e.g. due to a future bug) would turn a diagnostic print into a panic.","fix":"Render a placeholder string instead of panicking, e.g. `State::NotReady { req: None, .. } => f.debug_tuple(\"State::NotReady\").field(&\"<taken>\").finish()`.","locations":[{"ref":"tower/src/util/oneshot.rs:53-64","code":"   53 |             State::NotReady {\n   54 |                 svc,\n   55 |                 req: Some(req),\n   56 |             } => f\n   57 |                 .debug_tuple(\"State::NotReady\")\n   58 |                 .field(svc)\n   59 |                 .field(req)\n   60 |                 .finish(),\n   61 |             State::NotReady { req: None, .. } => unreachable!(),\n   62 |             State::Called { .. } => f.debug_tuple(\"State::Called\").field(&\"S::Future\").finish(),\n   63 |             State::Done => f.debug_tuple(\"State::Done\").finish(),\n   64 |         }","lines":12}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`Oneshot::poll` panics with \"polled after complete\" if the future is polled again after it has already resolved (state `Done`). While polling a future after it returns `Poll::Ready` is a contract violation by the caller, many other futures in this same crate (e.g. via fused combinators) avoid panicking. This panic-on-overpoll is a hard crash rather than a benign `Pending`/hang, and is easy to hit when `Oneshot` is composed inside other combinators that may not perfectly fuse.","fix":"Consider returning `Poll::Pending` or documenting the fuse requirement prominently. If the panic is intentional as a debugging aid, that is defensible, but it should be noted in the public docs of `Oneshot`.","locations":[{"ref":"tower/src/util/oneshot.rs:95-101","code":"   95 |                 StateProj::Called { fut } => {\n   96 |                     let res = ready!(fut.poll(cx))?;\n   97 |                     this.state.set(State::Done);\n   98 |                     return Poll::Ready(Ok(res));\n   99 |                 }\n  100 |                 StateProj::Done => panic!(\"polled after complete\"),\n  101 |             }","lines":7}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"negligible","easy":true,"description":"`ReadyOneshot::poll` and `Ready` (which wraps it) use `.expect(\"poll after Poll::Ready\")` on `self.inner`, so polling after completion panics. Same fuse-contract caveat as `Oneshot`. Acceptable per Future contract but is a hard panic on overpoll rather than a benign behavior.","fix":"Document the fuse requirement; or return Pending on re-poll. Low priority.","locations":[{"ref":"tower/src/util/ready.rs:42-50","code":"   42 |     fn poll(mut self: Pin<&mut Self>, cx: &mut Context<'_>) -> Poll<Self::Output> {\n   43 |         ready!(self\n   44 |             .inner\n   45 |             .as_mut()\n   46 |             .expect(\"poll after Poll::Ready\")\n   47 |             .poll_ready(cx))?;\n   48 | \n   49 |         Poll::Ready(Ok(self.inner.take().expect(\"poll after Poll::Ready\")))\n   50 |     }","lines":9}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`RateLimit::call` computes `until = now + self.rate.per()` (line 97) and the constructor computes\n`Instant::now() + self.rate.per()`. `Rate::new` only asserts `per.as_nanos() > 0`, with no upper\nbound. A pathologically large `Duration` (e.g. near `Duration::MAX`) added to an `Instant` will\npanic on overflow inside tokio's `Instant`/`Sleep` arithmetic. This is an unlikely misuse but the\npublic `Rate::new`/`RateLimitLayer::new`/`ServiceBuilder::rate_limit` accept any Duration and the\npanic surface is not documented.","fix":"Document the potential panic for extreme durations, or saturate the `Instant + Duration`\narithmetic (e.g. `now.checked_add(per).unwrap_or(far_future)`), matching how tokio handles\nfar-future sleeps.","locations":[{"ref":"tower/src/limit/rate/service.rs:82-98","code":"   82 |         self.state = State::Ready {\n   83 |             until: Instant::now() + self.rate.per(),\n   84 |             rem: self.rate.num(),\n   85 |         };\n   86 | \n   87 |         self.inner.poll_ready(cx)\n   88 |     }\n   89 | \n   90 |     fn call(&mut self, request: Request) -> Self::Future {\n   91 |         match self.state {\n   92 |             State::Ready { mut until, mut rem } => {\n   93 |                 let now = Instant::now();\n   94 | \n   95 |                 // If the period has elapsed, reset it.\n   96 |                 if now >= until {\n   97 |                     until = now + self.rate.per();\n   98 |                     rem = self.rate.num();","lines":17},{"ref":"tower/src/limit/rate/rate.rs:16-21","code":"   16 |     pub const fn new(num: u64, per: Duration) -> Self {\n   17 |         assert!(num > 0);\n   18 |         assert!(per.as_nanos() > 0);\n   19 | \n   20 |         Rate { num, per }\n   21 |     }","lines":6}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`PeakEwma::load` computes `Arc::strong_count(&self.rtt_estimate) as u32 - 1`. The cast to `u32` truncates the `usize` strong count before the subtraction. On a 64-bit target a strong count exceeding `u32::MAX` (~4.29e9 outstanding Handles) would wrap the cast and then the `- 1` could underflow to a huge value if the truncated count were 0. This is practically unreachable (you cannot hold 4 billion in-flight handles), but the `as u32` narrowing is gratuitous and removes the natural safety of `usize`. The subsequent `pending + 1` (line 144) is also a `u32` add that could in principle overflow.","fix":"Keep the count as `usize`: `let pending = Arc::strong_count(&self.rtt_estimate) - 1;` and use `pending as f64 + 1.0` (or `f64::from(... )` after a checked conversion) when computing cost.","locations":[{"ref":"tower/src/load/peak_ewma.rs:138-144","code":"  138 |         let pending = Arc::strong_count(&self.rtt_estimate) as u32 - 1;\n  139 | \n  140 |         // Update the RTT estimate to account for decay since the last update.\n  141 |         // If an estimate has not been established, a default is provided\n  142 |         let estimate = self.update_estimate();\n  143 | \n  144 |         let cost = Cost(estimate * f64::from(pending + 1));","lines":7}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":true,"description":"`Mock::clone` does `state.next_clone_id += 1` with no overflow guard. After 2^64 clones this would panic in debug / wrap in release. Practically unreachable, noted for completeness.","fix":"Use `next_clone_id.wrapping_add(1)` or ignore as practically unreachable.","locations":[{"ref":"tower-test/src/mock/mod.rs:189-208","code":"  189 | impl<T, U> Clone for Mock<T, U> {\n  190 |     fn clone(&self) -> Self {\n  191 |         let id = {\n  192 |             let mut state = self.state.lock().unwrap();\n  193 |             let id = state.next_clone_id;\n  194 | \n  195 |             state.next_clone_id += 1;\n  196 | \n  197 |             id\n  198 |         };\n  199 | \n  200 |         let tx = Mutex::new(self.tx.lock().unwrap().clone());\n  201 | \n  202 |         Mock {\n  203 |             id,\n  204 |             tx,\n  205 |             state: self.state.clone(),\n  206 |             can_send: false,\n  207 |         }\n  208 |     }","lines":20}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"`TpsBudget::try_get` and `put` use `writer.fetch_add(-amt, ...)` / `fetch_add(amt, ...)` on an `AtomicIsize` with no overflow protection. While `sum()` and `reserve` use saturating arithmetic, the raw `writer` accumulator can in principle wrap on `isize` overflow under pathological sustained deposits without expiry (expiry only swaps writer to a slot each window, bounding it in practice). Low likelihood given windowing, but the writer arithmetic is the one place not using saturating ops, inconsistent with the rest of the file's deliberate saturating strategy (see fold comment).","fix":"Document that the windowing bounds `writer` magnitude, or guard the deposit path (it is unbounded between window expirations within a single window if deposit() is called extremely frequently).","locations":[{"ref":"tower/src/retry/budget/tps_budget.rs:153-170","code":"  153 |     fn put(&self, amt: isize) {\n  154 |         self.expire();\n  155 |         self.writer.fetch_add(amt, Ordering::SeqCst);\n  156 |     }\n  157 | \n  158 |     fn try_get(&self, amt: isize) -> bool {\n  159 |         debug_assert!(amt >= 0);\n  160 | \n  161 |         self.expire();\n  162 | \n  163 |         let sum = self.sum();\n  164 |         if sum >= amt {\n  165 |             self.writer.fetch_add(-amt, Ordering::SeqCst);\n  166 |             true\n  167 |         } else {\n  168 |             false\n  169 |         }\n  170 |     }","lines":18},{"ref":"tower/src/retry/budget/tps_budget.rs:139-151","code":"  139 |     fn sum(&self) -> isize {\n  140 |         let current = self.writer.load(Ordering::SeqCst);\n  141 |         let windowed_sum: isize = self\n  142 |             .slots\n  143 |             .iter()\n  144 |             .map(|slot| slot.load(Ordering::SeqCst))\n  145 |             // fold() is used instead of sum() to determine overflow behavior\n  146 |             .fold(0, isize::saturating_add);\n  147 | \n  148 |         current\n  149 |             .saturating_add(windowed_sum)\n  150 |             .saturating_add(self.reserve)\n  151 |     }","lines":13}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In `SpawnReady::poll_ready`, after the spawned readiness task completes (`Inner::Future` branch), the recovered service is placed back in `Inner::Service(Some(svc))` and the loop continues, immediately calling `svc.poll_ready(cx)` AGAIN. Driving a service to readiness on a background task and then re-polling it on the foreground task means the service is polled for readiness twice. For services that consume a readiness slot per ready poll (the Tower contract guarantees `poll_ready` is idempotent only until `call`), this double-poll is usually fine, but for services that reserve a resource on each `Ready` (e.g. semaphore permits, buffer slots), the background `ready_oneshot` reserves one, and the immediate foreground re-poll may reserve a SECOND, leaking the first reservation until the service is dropped. This is a real reservation leak for slot-reserving inner services.","fix":"Do not re-poll the recovered service after the background readiness task resolves; the service is already ready, so return `Poll::Ready(Ok(()))` directly (the `ready_oneshot` future already established readiness), breaking the loop instead of looping back into the `Inner::Service` poll.","locations":[{"ref":"tower/src/spawn_ready/service.rs:59-77","code":"   59 |         loop {\n   60 |             self.inner = match self.inner {\n   61 |                 Inner::Service(ref mut svc) => {\n   62 |                     if let Poll::Ready(r) = svc.as_mut().expect(\"illegal state\").poll_ready(cx) {\n   63 |                         return Poll::Ready(r.map_err(Into::into));\n   64 |                     }\n   65 | \n   66 |                     let svc = svc.take().expect(\"illegal state\");\n   67 |                     let rx =\n   68 |                         tokio::spawn(svc.ready_oneshot().map_err(Into::into).in_current_span());\n   69 |                     Inner::Future(rx)\n   70 |                 }\n   71 |                 Inner::Future(ref mut fut) => {\n   72 |                     let svc = ready!(Pin::new(fut).poll(cx))??;\n   73 |                     Inner::Service(Some(svc))\n   74 |                 }\n   75 |             }\n   76 |         }\n   77 |     }","lines":19}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Mock::poll_ready` returns `Ready(Ok(()))` early when `self.can_send` is already true (line 133-135), BEFORE checking `state.rem`. After this short-circuit, a subsequent `call` decrements `rem` (line 170-172). This means a mock that was granted readiness while `rem > 0` can still consume a request slot even if `Handle::allow` later reset `rem` to 0 between the `poll_ready` and the `call` - the reserved permit is not re-validated. This is the documented `poll_ready` reservation semantics, but the early return also bypasses the `is_closed`/`err_with` checks ordering in a way that lets a previously-readied mock send a request even after `allow(0)`; the reservation can outlive the budget the test author set.","fix":"If reservations should be revocable, re-check `state.rem` (or a per-mock reserved flag) in `call` rather than trusting the cached `can_send`. Otherwise document that a granted readiness permit cannot be revoked by `allow`.","locations":[{"ref":"tower-test/src/mock/mod.rs:122-153","code":"  122 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n  123 |         let mut state = self.state.lock().unwrap();\n  124 | \n  125 |         if state.is_closed {\n  126 |             return Poll::Ready(Err(error::Closed::new().into()));\n  127 |         }\n  128 | \n  129 |         if let Some(e) = state.err_with.take() {\n  130 |             return Poll::Ready(Err(e));\n  131 |         }\n  132 | \n  133 |         if self.can_send {\n  134 |             return Poll::Ready(Ok(()));\n  135 |         }\n  136 | \n  137 |         if state.rem > 0 {\n  138 |             assert!(!state.tasks.contains_key(&self.id));\n  139 | \n  140 |             // Returning `Ready` means the next call to `call` must succeed.\n  141 |             self.can_send = true;\n  142 | \n  143 |             Poll::Ready(Ok(()))\n  144 |         } else {\n  145 |             // Bit weird... but whatevz\n  146 |             *state\n  147 |                 .tasks\n  148 |                 .entry(self.id)\n  149 |                 .or_insert_with(|| cx.waker().clone()) = cx.waker().clone();\n  150 | \n  151 |             Poll::Pending\n  152 |         }\n  153 |     }","lines":32},{"ref":"tower-test/src/mock/mod.rs:155-187","code":"  155 |     fn call(&mut self, request: T) -> Self::Future {\n  156 |         // Make sure that the service has capacity\n  157 |         let mut state = self.state.lock().unwrap();\n  158 | \n  159 |         if state.is_closed {\n  160 |             return ResponseFuture::closed();\n  161 |         }\n  162 | \n  163 |         if !self.can_send {\n  164 |             panic!(\"service not ready; poll_ready must be called first\");\n  165 |         }\n  166 | \n  167 |         self.can_send = false;\n  168 | \n  169 |         // Decrement the number of remaining requests that can be sent\n  170 |         if state.rem > 0 {\n  171 |             state.rem -= 1;\n  172 |         }\n  173 | \n  174 |         let (tx, rx) = oneshot::channel();\n  175 |         let send_response = SendResponse { tx };\n  176 | \n  177 |         match self.tx.lock().unwrap().send((request, send_response)) {\n  178 |             Ok(_) => {}\n  179 |             Err(_) => {\n  180 |                 // TODO: Can this be reached\n  181 |                 return ResponseFuture::closed();\n  182 |             }\n  183 |         }\n  184 | \n  185 |         ResponseFuture::new(rx)\n  186 |     }\n  187 | }","lines":33}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Misleading correctness comment in `Balance::poll_ready`. The comment at lines 209-210 says the discover/pending updates \"cannot disturb the order of existing ready services\", justifying reuse of the previously cached `self.ready_index`. That is only true for `Change::Insert` (IndexMap append). However `update_pending_from_discover` also processes `Change::Remove`, which calls `self.services.evict(&key)`, and `evict` does `self.ready.swap_remove_full(key)` - a swap-remove that DOES perturb the order of the ready set (the last element is moved into the removed slot). So a cached `ready_index` set in a prior poll can, after a Remove, silently point at a different endpoint. `check_ready_index` will still poll a valid (different) ready service or return false if out of range, so it does not crash and any ready service is acceptable for P2C, but the documented invariant is false and the cached index semantics are subtly wrong.","fix":"Correct the comment to acknowledge that evictions can perturb the ready set, and note that re-validating via check_ready_index is what makes a stale index safe (any ready endpoint is acceptable).","locations":[{"ref":"tower/src/balance/p2c/service.rs:208-238","code":"  208 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n  209 |         // `ready_index` may have already been set by a prior invocation. These\n  210 |         // updates cannot disturb the order of existing ready services.\n  211 |         let _ = self.update_pending_from_discover(cx)?;\n  212 |         self.promote_pending_to_ready(cx);\n  213 | \n  214 |         loop {\n  215 |             // If a service has already been selected, ensure that it is ready.\n  216 |             // This ensures that the underlying service is ready immediately\n  217 |             // before a request is dispatched to it (i.e. in the same task\n  218 |             // invocation). If, e.g., a failure detector has changed the state\n  219 |             // of the service, it may be evicted from the ready set so that\n  220 |             // another service can be selected.\n  221 |             if let Some(index) = self.ready_index.take() {\n  222 |                 match self.services.check_ready_index(cx, index) {\n  223 |                     Ok(true) => {\n  224 |                         // The service remains ready.\n  225 |                         self.ready_index = Some(index);\n  226 |                         return Poll::Ready(Ok(()));\n  227 |                     }\n  228 |                     Ok(false) => {\n  229 |                         // The service is no longer ready. Try to find a new one.\n  230 |                         trace!(\"ready service became unavailable\");\n  231 |                     }\n  232 |                     Err(Failed(_, error)) => {\n  233 |                         // The ready endpoint failed, so log the error and try\n  234 |                         // to find a new one.\n  235 |                         debug!(%error, \"endpoint failed\");\n  236 |                     }\n  237 |                 }\n  238 |             }","lines":31},{"ref":"tower/src/ready_cache/cache.rs:217-229","code":"  217 |     pub fn evict<Q: Hash + Equivalent<K>>(&mut self, key: &Q) -> bool {\n  218 |         let canceled = if let Some(c) = self.pending_cancel_txs.swap_remove(key) {\n  219 |             c.cancel();\n  220 |             true\n  221 |         } else {\n  222 |             false\n  223 |         };\n  224 | \n  225 |         self.ready\n  226 |             .swap_remove_full(key)\n  227 |             .map(|_| true)\n  228 |             .unwrap_or(canceled)\n  229 |     }","lines":13}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Buffer::call` calls `self.tx.send_item(...)` which requires a permit previously acquired by `poll_reserve` in `poll_ready`. If `call` is invoked without a successful prior `poll_ready` (contract violation), `PollSender::send_item` returns `Err` and the code maps it to `get_worker_error()` - returning a worker/Closed error rather than panicking. This silently masks the contract violation as a 'closed' error, which is misleading: the worker may be perfectly alive but the caller forgot to reserve a slot. Diagnosing this in the field is hard because the error says the worker closed.","fix":"Distinguish 'no permit reserved' (contract misuse) from 'channel closed' (worker died), e.g. by debug-asserting a permit was reserved, or by returning a distinct error message for the send failure.","locations":[{"ref":"tower/src/buffer/service.rs:122-129","code":"  122 |         match self.tx.send_item(Message { request, span, tx }) {\n  123 |             Ok(_) => ResponseFuture::new(rx),\n  124 |             // If the channel is closed, propagate the error from the worker.\n  125 |             Err(_) => {\n  126 |                 tracing::trace!(\"buffer channel closed\");\n  127 |                 ResponseFuture::failed(self.get_worker_error())\n  128 |             }\n  129 |         }","lines":8}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the worker error path, after `self.failed(error)` is called the code sends `self.failed.as_ref().expect(...)` to the current message, then the `loop` continues. On the next iteration `poll_next_msg` is called; because `self.failed` is now `Some`, every subsequent message gets the error - correct. But note `failed()` early-returns without setting `self.failed` if `self.handle.inner` was already `Some` (line 123-126). In that case, after `self.failed(error)` returns, `self.failed` may still be `None`, and the immediately following `.expect(\"Worker::failed did not set self.failed?\")` will PANIC. This happens if `poll` is somehow re-entered after the handle error was already set by a prior failure.","fix":"Either set `self.failed` before the early-return guard in `failed()`, or in the call site fall back to the handle's stored error instead of `expect`-panicking when `self.failed` is `None`.","locations":[{"ref":"tower/src/buffer/worker.rs:121-137","code":"  121 |         let mut inner = self.handle.inner.lock().unwrap();\n  122 | \n  123 |         if inner.is_some() {\n  124 |             // Future::poll was called after we've already errored out!\n  125 |             return;\n  126 |         }\n  127 | \n  128 |         *inner = Some(error.clone());\n  129 |         drop(inner);\n  130 | \n  131 |         self.rx.close();\n  132 | \n  133 |         // By closing the mpsc::Receiver, we know that poll_next_msg will soon return Ready(None),\n  134 |         // which will trigger the `self.finish == true` phase. We just need to make sure that any\n  135 |         // requests that we receive before we've exhausted the receiver receive the error:\n  136 |         self.failed = Some(error);\n  137 |     }","lines":17},{"ref":"tower/src/buffer/worker.rs:190-195","code":"  190 |                             self.failed(error);\n  191 |                             let _ = msg.tx.send(Err(self\n  192 |                                 .failed\n  193 |                                 .as_ref()\n  194 |                                 .expect(\"Worker::failed did not set self.failed?\")\n  195 |                                 .clone()));","lines":6}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `Worker::poll`, when `self.service.poll_ready(cx)` returns `Poll::Pending`, the current message is stored in `self.current_message` and `Poll::Pending` is returned. The `cx` waker was registered by the inner service's `poll_ready`. This is correct. However, when `poll_next_msg` returns `Poll::Pending` (from `rx.poll_recv`), the waker is registered with the channel. The risk: between processing messages, the same `cx` is reused for both `poll_recv` and `service.poll_ready`. If the service becomes ready but no new message arrives, the worker is only woken by the channel, not by service readiness - but since a stored `current_message` is what triggers the service poll, and that path returns Pending registering the service waker, this is actually fine. No bug, but the dual-waker source is subtle and undocumented.","fix":"Add a comment clarifying that when a message is buffered awaiting service readiness, the returned Pending is driven by the service's waker, and when no message is buffered it is driven by the channel's waker; the two states never overlap.","locations":[{"ref":"tower/src/buffer/worker.rs:179-185","code":"  179 |                         Poll::Pending => {\n  180 |                             tracing::trace!(service.ready = false, message = \"delay\");\n  181 |                             // Put out current message back in its slot.\n  182 |                             drop(_guard);\n  183 |                             self.current_message = Some(msg);\n  184 |                             return Poll::Pending;\n  185 |                         }","lines":7},{"ref":"tower/src/buffer/worker.rs:94-103","code":"   94 |         while let Some(msg) = ready!(Pin::new(&mut self.rx).poll_recv(cx)) {\n   95 |             if !msg.tx.is_closed() {\n   96 |                 tracing::trace!(\"processing new request\");\n   97 |                 return Poll::Ready(Some((msg, true)));\n   98 |             }\n   99 |             // Otherwise, request is canceled, so pop the next one.\n  100 |             tracing::trace!(\"dropping cancelled request\");\n  101 |         }\n  102 | \n  103 |         Poll::Ready(None)","lines":10}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`ConcurrencyLimit` is `Clone` (when inner is Clone) and intentionally drops the acquired permit\non clone (permit: None). However, `poll_ready` acquires a permit and then polls the inner service;\nif the inner service's `poll_ready` returns `Pending`, the permit has already been acquired and is\nheld in `self.permit` while we wait. If the caller then drops this service (or never calls\n`call`), the permit is released on drop - fine. But if the caller polls readiness, gets the permit,\nthen clones the service before calling, the clone starts with no permit while the original still\nholds it; the held permit is only released when the original is dropped or `call`ed. This is the\ndocumented behavior, but combined with the fact that a permit is held across a `Pending` inner\npoll, a stack where the inner service is permanently `Pending` will hold a semaphore slot\nindefinitely, reducing effective concurrency below `max` for other clones sharing the semaphore.","fix":"This matches Tower's intended semantics (a service that has reserved capacity holds it until it\ncalls or is dropped). Consider documenting on `poll_ready` that a permit may be held while the\ninner service is not ready, so users sharing a global semaphore understand reserved-but-unused\nslots can occur.","locations":[{"ref":"tower/src/limit/concurrency/service.rs:64-92","code":"   64 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n   65 |         // If we haven't already acquired a permit from the semaphore, try to\n   66 |         // acquire one first.\n   67 |         if self.permit.is_none() {\n   68 |             self.permit = ready!(self.semaphore.poll_acquire(cx));\n   69 |             debug_assert!(\n   70 |                 self.permit.is_some(),\n   71 |                 \"ConcurrencyLimit semaphore is never closed, so `poll_acquire` \\\n   72 |                  should never fail\",\n   73 |             );\n   74 |         }\n   75 | \n   76 |         // Once we've acquired a permit (or if we already had one), poll the\n   77 |         // inner service.\n   78 |         self.inner.poll_ready(cx)\n   79 |     }\n   80 | \n   81 |     fn call(&mut self, request: Request) -> Self::Future {\n   82 |         // Take the permit\n   83 |         let permit = self\n   84 |             .permit\n   85 |             .take()\n   86 |             .expect(\"max requests in-flight; poll_ready must be called first\");\n   87 | \n   88 |         // Call the inner service\n   89 |         let future = self.inner.call(request);\n   90 | \n   91 |         ResponseFuture::new(future, permit)\n   92 |     }","lines":29},{"ref":"tower/src/limit/concurrency/service.rs:95-106","code":"   95 | impl<T: Clone> Clone for ConcurrencyLimit<T> {\n   96 |     fn clone(&self) -> Self {\n   97 |         // Since we hold an `OwnedSemaphorePermit`, we can't derive `Clone`.\n   98 |         // Instead, when cloning the service, create a new service with the\n   99 |         // same semaphore, but with the permit in the un-acquired state.\n  100 |         Self {\n  101 |             inner: self.inner.clone(),\n  102 |             semaphore: self.semaphore.clone(),\n  103 |             permit: None,\n  104 |         }\n  105 |     }\n  106 | }","lines":12}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `Reconnect::poll_ready`, when the inner connected service errors and the state is reset to `Idle`, the loop immediately re-enters the `Idle` branch and calls `self.mk_service.poll_ready(cx)` followed by `make_service`. If `make_service` keeps succeeding but the produced service keeps failing readiness, this becomes a busy reconnect loop with no backoff. More subtly, on the `Idle` -> `Connecting` transition the code calls `make_service` unconditionally every time readiness errors, so a flapping backend produces unbounded reconnect attempts within a single `poll_ready` call until one path returns `Pending`.","fix":"Document that `Reconnect` performs no backoff and that callers should wrap it (e.g. with a retry/backoff layer), or add optional backoff between reconnect attempts. At minimum surface the readiness error rather than looping silently.","locations":[{"ref":"tower/src/reconnect/mod.rs:84-140","code":"   84 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n   85 |         loop {\n   86 |             match &mut self.state {\n   87 |                 State::Idle => {\n   88 |                     trace!(\"poll_ready; idle\");\n   89 |                     match self.mk_service.poll_ready(cx) {\n   90 |                         Poll::Ready(r) => r?,\n   91 |                         Poll::Pending => {\n   92 |                             trace!(\"poll_ready; MakeService not ready\");\n   93 |                             return Poll::Pending;\n   94 |                         }\n   95 |                     }\n   96 | \n   97 |                     let fut = self.mk_service.make_service(self.target.clone());\n   98 |                     self.state = State::Connecting(fut);\n   99 |                     continue;\n  100 |                 }\n  101 |                 State::Connecting(ref mut f) => {\n  102 |                     trace!(\"poll_ready; connecting\");\n  103 |                     match Pin::new(f).poll(cx) {\n  104 |                         Poll::Ready(Ok(service)) => {\n  105 |                             self.state = State::Connected(service);\n  106 |                         }\n  107 |                         Poll::Pending => {\n  108 |                             trace!(\"poll_ready; not ready\");\n  109 |                             return Poll::Pending;\n  110 |                         }\n  111 |                         Poll::Ready(Err(e)) => {\n  112 |                             trace!(\"poll_ready; error\");\n  113 |                             self.state = State::Idle;\n  114 |                             self.error = Some(e);\n  115 |                             break;\n  116 |                         }\n  117 |                     }\n  118 |                 }\n  119 |                 State::Connected(ref mut inner) => {\n  120 |                     trace!(\"poll_ready; connected\");\n  121 |                     match inner.poll_ready(cx) {\n  122 |                         Poll::Ready(Ok(())) => {\n  123 |                             trace!(\"poll_ready; ready\");\n  124 |                             return Poll::Ready(Ok(()));\n  125 |                         }\n  126 |                         Poll::Pending => {\n  127 |                             trace!(\"poll_ready; not ready\");\n  128 |                             return Poll::Pending;\n  129 |                         }\n  130 |                         Poll::Ready(Err(_)) => {\n  131 |                             trace!(\"poll_ready; error\");\n  132 |                             self.state = State::Idle;\n  133 |                         }\n  134 |                     }\n  135 |                 }\n  136 |             }\n  137 |         }\n  138 | \n  139 |         Poll::Ready(Ok(()))\n  140 |     }","lines":57}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Reconnect::call` checks `self.error.take()` before looking at the state. The `error` field is only ever set from a `make_service` future failure (Connecting branch). However if `poll_ready` left the service in `State::Connected` AND a stale `error` were somehow present, `call` would return the error and skip the live service. In the current code paths `error` is cleared whenever a connection succeeds is NOT guaranteed: after `Connecting` succeeds (line 104-105) `self.error` is never cleared. A leftover `error` from a prior failed make attempt that was never consumed by a `call` (e.g. poll_ready succeeded on a later attempt) will be returned on the next `call` even though a healthy connection now exists, dropping a request against a working service.","fix":"Clear `self.error = None` when a connection is successfully established in the `Connecting` -> `Connected` transition, so a stale make error cannot shadow a healthy connection in a later `call`.","locations":[{"ref":"tower/src/reconnect/mod.rs:104-105","code":"  104 |                         Poll::Ready(Ok(service)) => {\n  105 |                             self.state = State::Connected(service);","lines":2},{"ref":"tower/src/reconnect/mod.rs:142-145","code":"  142 |     fn call(&mut self, request: Request) -> Self::Future {\n  143 |         if let Some(error) = self.error.take() {\n  144 |             return ResponseFuture::error(error);\n  145 |         }","lines":4}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`SpawnReady::call` matches only `Inner::Service(Some(ref mut svc))` and treats everything else as `unreachable!`. If `poll_ready` last returned `Poll::Ready(Ok(()))` the state IS `Inner::Service(Some(_))`, so this is correct per contract. However, the `Drop` impl aborts a pending `Inner::Future` task. If a user clones/moves the service after `poll_ready` returned Pending and then calls `call`, the `unreachable!` fires. This is contract misuse but the `unreachable!` will panic in release builds too (unlike `debug_assert`), which is intentional but worth confirming is desired.","fix":"Confirmed acceptable as a contract-violation panic; optionally use a clearer panic message consistent with reconnect's `panic!`.","locations":[{"ref":"tower/src/spawn_ready/service.rs:79-86","code":"   79 |     fn call(&mut self, request: Req) -> Self::Future {\n   80 |         match self.inner {\n   81 |             Inner::Service(Some(ref mut svc)) => {\n   82 |                 ResponseFuture::new(svc.call(request).map_err(Into::into))\n   83 |             }\n   84 |             _ => unreachable!(\"poll_ready must be called\"),\n   85 |         }\n   86 |     }","lines":8}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Steer::call` pushes the just-used service index back onto `not_ready` (line 165) and asserts\nthat `not_ready` is empty on entry (lines 158-161). This means after every single `call`, the\ncaller MUST drive `poll_ready` to readiness again before the next `call`, and `poll_ready` must\nre-poll *every* service that was used. Combined with the assertion, a perfectly reasonable usage\npattern - calling `poll_ready` once and then issuing several `call`s while it reported Ready -\npanics on the second `call`. Most Tower services tolerate this; Steer does not, and the only\nhint is the assert message. This is a sharp, undocumented edge of the Service contract.","fix":"Document clearly (in the Steer type docs and the Service impl) that exactly one `call` is\npermitted per successful `poll_ready`, and that all services are re-polled each round. Consider\nwhether only the picked service needs re-readiness rather than re-queuing it while still\nrequiring a full `poll_ready` sweep.","locations":[{"ref":"tower/src/steer/mod.rs:157-167","code":"  157 |     fn call(&mut self, req: Req) -> Self::Future {\n  158 |         assert!(\n  159 |             self.not_ready.is_empty(),\n  160 |             \"Steer must wait for all services to be ready. Did you forget to call poll_ready()?\"\n  161 |         );\n  162 | \n  163 |         let idx = self.router.pick(&req, &self.services[..]);\n  164 |         let cl = &mut self.services[idx];\n  165 |         self.not_ready.push_back(idx);\n  166 |         cl.call(req)\n  167 |     }","lines":11}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Timeout::poll_ready` does not arm or account for the timeout at all - the sleep is created fresh\nin `call` (line 66). This means the timeout clock starts only when `call` is invoked, not when the\nrequest was accepted/`poll_ready` succeeded. More importantly, the timeout covers only the inner\nservice's *response future*, not the time spent waiting for the inner service to become ready. If\nthe inner service is slow to become ready (backpressure), the caller can wait arbitrarily long in\n`poll_ready` with no timeout, defeating the purpose for users who expect \"fail requests that take\nlonger than `timeout`\" (the doc wording). The doc says \"If the next layer takes more than\n`timeout` to respond to a request\" which is technically accurate but easy to misread.","fix":"Clarify in the docs that the timeout applies only to the response future after `call`, not to\nreadiness/backpressure time. Users needing an end-to-end deadline should combine with other\nmechanisms.","locations":[{"ref":"tower/src/timeout/mod.rs:57-69","code":"   57 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n   58 |         match self.inner.poll_ready(cx) {\n   59 |             Poll::Pending => Poll::Pending,\n   60 |             Poll::Ready(r) => Poll::Ready(r.map_err(Into::into)),\n   61 |         }\n   62 |     }\n   63 | \n   64 |     fn call(&mut self, request: Request) -> Self::Future {\n   65 |         let response = self.inner.call(request);\n   66 |         let sleep = tokio::time::sleep(self.timeout);\n   67 | \n   68 |         ResponseFuture::new(response, sleep)\n   69 |     }","lines":13},{"ref":"tower/src/builder/mod.rs:253-268","code":"  253 |     /// Fail requests that take longer than `timeout`.\n  254 |     ///\n  255 |     /// If the next layer takes more than `timeout` to respond to a request,\n  256 |     /// processing is terminated and an error is returned.\n  257 |     ///\n  258 |     /// This wraps the inner service with an instance of the [`timeout`]\n  259 |     /// middleware.\n  260 |     ///\n  261 |     /// [`timeout`]: crate::timeout\n  262 |     #[cfg(feature = \"timeout\")]\n  263 |     pub fn timeout(\n  264 |         self,\n  265 |         timeout: std::time::Duration,\n  266 |     ) -> ServiceBuilder<Stack<crate::timeout::TimeoutLayer, L>> {\n  267 |         self.layer(crate::timeout::TimeoutLayer::new(timeout))\n  268 |     }","lines":16}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Rng::next_range` uses the naive modulo method `(n % range) + start`, which introduces modulo bias whenever `range` (= end - start) does not evenly divide 2^64. For small ranges the bias is negligible, but it is a genuine non-uniform distribution and the doc comment for the trait advertises a \"random number generator\" without noting the bias. `sample_floyd2` (used by the balance middleware) relies on `next_range` for peer selection, so the bias propagates to load balancing. rand's own `Uniform` sampler explicitly rejects this method in favor of rejection sampling for exactly this reason.","fix":"Use Lemire's method or simple rejection sampling to eliminate modulo bias, or document the bias explicitly. Given the ranges in practice are tiny (number of peers), documenting the limitation is the minimum acceptable fix.","locations":[{"ref":"tower/src/util/rng.rs:44-57","code":"   44 |     fn next_range(&mut self, range: Range<u64>) -> u64 {\n   45 |         debug_assert!(\n   46 |             range.start < range.end,\n   47 |             \"The range start must be smaller than the end\"\n   48 |         );\n   49 |         let start = range.start;\n   50 |         let end = range.end;\n   51 | \n   52 |         let range = end - start;\n   53 | \n   54 |         let n = self.next_u64();\n   55 | \n   56 |         (n % range) + start\n   57 |     }","lines":14},{"ref":"tower/src/util/rng.rs:120-126","code":"  120 | pub(crate) fn sample_floyd2<R: Rng>(rng: &mut R, length: u64) -> [u64; 2] {\n  121 |     debug_assert!(2 <= length);\n  122 |     let aidx = rng.next_range(0..length - 1);\n  123 |     let bidx = rng.next_range(0..length);\n  124 |     let aidx = if aidx == bidx { length - 1 } else { aidx };\n  125 |     [aidx, bidx]\n  126 | }","lines":7}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Mock::poll_ready` asserts `!state.tasks.contains_key(&self.id)` (line 138) on the path where `rem > 0`. If a mock previously returned `Pending` (inserting its id into `tasks`) and `rem` later becomes > 0 WITHOUT draining tasks for that id, this assert will panic instead of gracefully proceeding. `allow` and `send_error` both drain all tasks so the common paths are safe, but the assert encodes a fragile cross-method invariant: any future code path that raises `rem` without draining `tasks` turns a benign state into a panic in a test helper.","fix":"Replace the assert with an unconditional `state.tasks.remove(&self.id);` before granting readiness, removing the stale waker rather than asserting it is absent.","locations":[{"ref":"tower-test/src/mock/mod.rs:137-143","code":"  137 |         if state.rem > 0 {\n  138 |             assert!(!state.tasks.contains_key(&self.id));\n  139 | \n  140 |             // Returning `Ready` means the next call to `call` must succeed.\n  141 |             self.can_send = true;\n  142 | \n  143 |             Poll::Ready(Ok(()))","lines":7},{"ref":"tower-test/src/mock/mod.rs:242-251","code":"  242 |     pub fn allow(&mut self, num: u64) {\n  243 |         let mut state = self.state.lock().unwrap();\n  244 |         state.rem = num;\n  245 | \n  246 |         if num > 0 {\n  247 |             for (_, task) in state.tasks.drain() {\n  248 |                 task.wake();\n  249 |             }\n  250 |         }\n  251 |     }","lines":10}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ServiceList::poll_next` ignores the `Context`/waker entirely (parameter named `_`) and always\nreturns `Poll::Ready`. This is correct for a finite static list, but the `Stream`/`Discover`\ncontract is that once `None`/`Ready` stops being produced a waker must be registered. Here it never\nreturns `Pending`, so it is fine - flagged only to confirm there is no missing-wakeup bug. No issue\nfound; the comment in the struct doc (\"yield this list once and do nothing after\") matches behavior.","fix":"No change needed. Behavior is correct for a static finite list.\"","locations":[{"ref":"tower/src/discover/list.rs:47-52","code":"   47 |     fn poll_next(self: Pin<&mut Self>, _: &mut Context<'_>) -> Poll<Option<Self::Item>> {\n   48 |         match self.project().inner.next() {\n   49 |             Some((i, service)) => Poll::Ready(Some(Ok(Change::Insert(i, service)))),\n   50 |             None => Poll::Ready(None),\n   51 |         }\n   52 |     }","lines":6}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`AsyncFilter::poll_ready` calls `self.inner.poll_ready(cx)`, but in `call` it clones the inner\nservice and swaps the poll_ready'd instance into the future (lines 179-184), leaving the *clone*\n(which has NOT been driven to readiness) in `self.inner`. The next `poll_ready` then polls this\nfresh clone. For services whose readiness is per-clone (the comment's stated motivation), this is\ncorrect, but it means every `call` discards readiness work: a caller doing\npoll_ready/call/poll_ready/call pays a fresh readiness round each time, and a service that is\nexpensive to drive to readiness (and shares no readiness across clones) is re-driven on every\nrequest. The sync `Filter` does not clone and avoids this. The asymmetry/overhead is undocumented.","fix":"Document that `AsyncFilter` requires `inner: Clone` and re-establishes readiness per request\nbecause the request is consumed asynchronously; note the per-call clone+readiness cost so users\nprefer the synchronous `Filter` when no async work is needed (the module docs already hint at the\noverhead but not this clone behavior).\"","locations":[{"ref":"tower/src/filter/mod.rs:172-191","code":"  172 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n  173 |         self.inner.poll_ready(cx).map_err(Into::into)\n  174 |     }\n  175 | \n  176 |     fn call(&mut self, request: Request) -> Self::Future {\n  177 |         use std::mem;\n  178 | \n  179 |         let inner = self.inner.clone();\n  180 |         // In case the inner service has state that's driven to readiness and\n  181 |         // not tracked by clones (such as `Buffer`), pass the version we have\n  182 |         // already called `poll_ready` on into the future, and leave its clone\n  183 |         // behind.\n  184 |         let inner = mem::replace(&mut self.inner, inner);\n  185 | \n  186 |         // Check the request\n  187 |         let check = self.predicate.check(request);\n  188 | \n  189 |         AsyncResponseFuture::new(check, inner)\n  190 |     }\n  191 | }","lines":20}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Data-race / TOCTOU between the hedge SelectPolicy::clone_request `len()` check and the DelayPolicy::delay quantile lookup. `clone_request` locks the histogram, checks `len() >= min_data_points`, then releases the lock and decides to issue the hedge. Later `DelayPolicy::delay` re-locks and calls `value_at_quantile`. Between these, a `maybe_rotate` (triggered by either `read()` call) can clear/rotate the histogram, so the delay can be computed from an empty histogram (`value_at_quantile` on empty returns 0), causing the hedge request to fire immediately with zero delay despite the intent to wait for a latency percentile.","fix":"Acceptable as a heuristic, but document that the delay may be 0 when the histogram rotates to empty. If precise behavior matters, compute and capture the delay under the same lock acquisition used for the data-point check, or guard against a 0 quantile by falling back to a minimum delay.","locations":[{"ref":"tower/src/hedge/mod.rs:245-267","code":"  245 | impl<Request> delay::Policy<Request> for DelayPolicy {\n  246 |     fn delay(&self, _req: &Request) -> Duration {\n  247 |         let mut locked = self.histo.lock().unwrap();\n  248 |         let millis = locked\n  249 |             .read()\n  250 |             .value_at_quantile(self.latency_percentile.into());\n  251 |         Duration::from_millis(millis)\n  252 |     }\n  253 | }\n  254 | \n  255 | impl<P, Request> select::Policy<Request> for SelectPolicy<P>\n  256 | where\n  257 |     P: Policy<Request>,\n  258 | {\n  259 |     fn clone_request(&self, req: &Request) -> Option<Request> {\n  260 |         self.policy.clone_request(req).filter(|_| {\n  261 |             let mut locked = self.histo.lock().unwrap();\n  262 |             // Do not attempt a retry if there are insufficiently many data\n  263 |             // points in the histogram.\n  264 |             locked.read().len() >= self.min_data_points\n  265 |         })\n  266 |     }\n  267 | }","lines":23},{"ref":"tower/src/hedge/rotating_histogram.rs:31-53","code":"   31 |     pub fn read(&mut self) -> &mut Histogram<u64> {\n   32 |         self.maybe_rotate();\n   33 |         &mut self.read\n   34 |     }\n   35 | \n   36 |     pub fn write(&mut self) -> &mut Histogram<u64> {\n   37 |         self.maybe_rotate();\n   38 |         &mut self.write\n   39 |     }\n   40 | \n   41 |     fn maybe_rotate(&mut self) {\n   42 |         let delta = Instant::now().saturating_duration_since(self.last_rotation);\n   43 |         // TODO: replace with delta.duration_div when it becomes stable.\n   44 |         let rotations = (nanos(delta) / nanos(self.period)) as u32;\n   45 |         if rotations >= 2 {\n   46 |             trace!(\"Time since last rotation is {:?}.  clearing!\", delta);\n   47 |             self.clear();\n   48 |         } else if rotations == 1 {\n   49 |             trace!(\"Time since last rotation is {:?}. rotating!\", delta);\n   50 |             self.rotate();\n   51 |         }\n   52 |         self.last_rotation += self.period * rotations;\n   53 |     }","lines":23}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`RateLimit::poll_ready` returns `self.inner.poll_ready(cx)` directly while in `State::Ready`\nwithout ever checking whether the rate window (`until`) has expired. The window reset and `rem`\nrefresh happen only inside `call`. Consequently, after the window expires, a client that keeps\ncalling `poll_ready` (without yet calling `call`) sees Ready, but the `until`/`rem` recorded in\nthe state are stale until the next `call` recomputes them. While `call` does recover correctly\n(it resets when `now >= until`), this split-brain between where the window is checked\n(`poll_ready` for the Limited->Ready transition, `call` for the Ready window rollover) makes the\ntime/quota accounting harder to reason about and means readiness reported by `poll_ready` does\nnot reflect the actual remaining quota.","fix":"Centralize the window/quota bookkeeping. Either perform the `now >= until` rollover check in\n`poll_ready` as well, or store the rollover decision once and have `call` simply consume it, so\nthat the Ready-state quota is always consistent with wall-clock time.","locations":[{"ref":"tower/src/limit/rate/service.rs:71-118","code":"   71 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n   72 |         match self.state {\n   73 |             State::Ready { .. } => return self.inner.poll_ready(cx),\n   74 |             State::Limited => {\n   75 |                 if Pin::new(&mut self.sleep).poll(cx).is_pending() {\n   76 |                     tracing::trace!(\"rate limit exceeded; sleeping.\");\n   77 |                     return Poll::Pending;\n   78 |                 }\n   79 |             }\n   80 |         }\n   81 | \n   82 |         self.state = State::Ready {\n   83 |             until: Instant::now() + self.rate.per(),\n   84 |             rem: self.rate.num(),\n   85 |         };\n   86 | \n   87 |         self.inner.poll_ready(cx)\n   88 |     }\n   89 | \n   90 |     fn call(&mut self, request: Request) -> Self::Future {\n   91 |         match self.state {\n   92 |             State::Ready { mut until, mut rem } => {\n   93 |                 let now = Instant::now();\n   94 | \n   95 |                 // If the period has elapsed, reset it.\n   96 |                 if now >= until {\n   97 |                     until = now + self.rate.per();\n   98 |                     rem = self.rate.num();\n   99 |                 }\n  100 | \n  101 |                 if rem > 1 {\n  102 |                     rem -= 1;\n  103 |                     self.state = State::Ready { until, rem };\n  104 |                 } else {\n  105 |                     // The service is disabled until further notice\n  106 |                     // Reset the sleep future in place, so that we don't have to\n  107 |                     // deallocate the existing box and allocate a new one.\n  108 |                     self.sleep.as_mut().reset(until);\n  109 |                     self.state = State::Limited;\n  110 |                 }\n  111 | \n  112 |                 // Call the inner future\n  113 |                 self.inner.call(request)\n  114 |             }\n  115 |             State::Limited => panic!(\"service not ready; poll_ready must be called first\"),\n  116 |         }\n  117 |     }\n  118 | }","lines":48}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `RttEstimate::update`, the `rtt` is measured between `sent_at` and `recv_at` (the real request span), but the decay timestamp is taken from a third, independent `Instant::now()` fetched at line 246, and `update_at` is set to that `now` rather than to `recv_at`. Since `Handle::drop` calls `update(self.sent_at, recv_at, ..)` where `recv_at = Instant::now()` captured just before locking the mutex, there can be a gap between `recv_at` and the `now` fetched inside `update` (mutex contention). The decay `elapsed` is computed from the older `update_at` to this newer `now`, and the stored `update_at` advances slightly past the moment the RTT was actually observed. The effect is negligible in practice but means the decay window includes lock-acquisition latency. The duplicate `Instant::now()` is also a minor inconsistency with `decay()`, which passes `now,now` explicitly.","fix":"Use `recv_at` as the reference time for both the decay elapsed computation and the new `update_at`, instead of fetching a separate `Instant::now()` inside `update`.","locations":[{"ref":"tower/src/load/peak_ewma.rs:237-282","code":"  237 |     fn update(&mut self, sent_at: Instant, recv_at: Instant, decay_ns: f64) -> f64 {\n  238 |         debug_assert!(\n  239 |             sent_at <= recv_at,\n  240 |             \"recv_at={:?} after sent_at={:?}\",\n  241 |             recv_at,\n  242 |             sent_at\n  243 |         );\n  244 |         let rtt = nanos(recv_at.saturating_duration_since(sent_at));\n  245 | \n  246 |         let now = Instant::now();\n  247 |         debug_assert!(\n  248 |             self.update_at <= now,\n  249 |             \"update_at={:?} in the future\",\n  250 |             self.update_at\n  251 |         );\n  252 | \n  253 |         self.rtt_ns = if self.rtt_ns < rtt {\n  254 |             // For Peak-EWMA, always use the worst-case (peak) value as the estimate for\n  255 |             // subsequent requests.\n  256 |             trace!(\n  257 |                 \"update peak rtt={}ms prior={}ms\",\n  258 |                 rtt / NANOS_PER_MILLI,\n  259 |                 self.rtt_ns / NANOS_PER_MILLI,\n  260 |             );\n  261 |             rtt\n  262 |         } else {\n  263 |             // When an RTT is observed that is less than the estimated RTT, we decay the\n  264 |             // prior estimate according to how much time has elapsed since the last\n  265 |             // update. The inverse of the decay is used to scale the estimate towards the\n  266 |             // observed RTT value.\n  267 |             let elapsed = nanos(now.saturating_duration_since(self.update_at));\n  268 |             let decay = (-elapsed / decay_ns).exp();\n  269 |             let recency = 1.0 - decay;\n  270 |             let next_estimate = (self.rtt_ns * decay) + (rtt * recency);\n  271 |             trace!(\n  272 |                 \"update rtt={:03.0}ms decay={:06.0}ns; next={:03.0}ms\",\n  273 |                 rtt / NANOS_PER_MILLI,\n  274 |                 self.rtt_ns - next_estimate,\n  275 |                 next_estimate / NANOS_PER_MILLI,\n  276 |             );\n  277 |             next_estimate\n  278 |         };\n  279 |         self.update_at = now;\n  280 | \n  281 |         self.rtt_ns\n  282 |     }","lines":46}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`LoadShed::poll_ready` always returns `Poll::Ready(Ok(()))` (except on inner error), recording the\ninner readiness in `self.is_ready`. Because `poll_ready` returns Ready without registering the\ntask waker against the inner service when the inner is `Pending`, the layer is correct for its\npurpose (immediately shed). However, the `is_ready` flag captured in `poll_ready` can be stale by\nthe time `call` runs: between `poll_ready` reporting `is_ready = true` and `call`, capacity in the\ninner service may have been consumed by another clone sharing state, yet `call` will still invoke\n`self.inner.call(req)` based on the stale flag, potentially violating the inner service's\n\"poll_ready must return Ready before call\" contract. This is a real TOCTOU window for shared-state\ninner services (e.g. a shared semaphore/Buffer).","fix":"Document that `LoadShed` should wrap a service whose readiness it exclusively owns, or note the\nTOCTOU caveat for shared-state inner services. Alternatively re-poll readiness inside `call` is\nnot possible without a cx; the safe guidance is exclusive ownership of the inner service.\"","locations":[{"ref":"tower/src/load_shed/mod.rs:43-64","code":"   43 |     fn poll_ready(&mut self, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n   44 |         // We check for readiness here, so that we can know in `call` if\n   45 |         // the inner service is overloaded or not.\n   46 |         self.is_ready = match self.inner.poll_ready(cx) {\n   47 |             Poll::Ready(Err(e)) => return Poll::Ready(Err(e.into())),\n
