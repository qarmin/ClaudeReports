<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In the dry-run + re-chunking branch of transfer_chunks, the size is computed as `len(chunk.data) if chunk.data is not None else chunk.size`. The objects yielded by chunker.chunkify are `_Chunk` namedtuples whose only fields are `meta` and `data` (see src/borg/chunkers/reader.pyx:18, `namedtuple('_Chunk', 'meta data')`); there is no `size` field. The chunk size lives in `chunk.meta['size']`. For all-zero chunks the chunker sets `data = None` (src/borg/chunkers/buzhash.pyx:317-323 and buzhash64.pyx similarly), so `chunk.data is None` becomes True and `chunk.size` is evaluated, raising AttributeError. This crashes `borg transfer --dry-run --chunker-params=...` whenever a transferred archive contains any all-zero/sparse chunk (a common case), aborting the whole dry-run.","fix":"Use `chunk.meta[\"size\"]` instead of `chunk.size`: `size = len(chunk.data) if chunk.data is not None else chunk.meta[\"size\"]`.","locations":[{"ref":"src/borg/archiver/transfer_cmd.py:73","code":"   73 |                 size = len(chunk.data) if chunk.data is not None else chunk.size","lines":1}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"watch_rc() passes rc straight into classify_ec(), but classify_ec() raises ValueError for any code outside {0, 1, 2, 3..99, 100..127, 128..255}. The runner emits rc=-1 on a launch exception (runner.py:63), and asyncio's process.wait() returns a NEGATIVE returncode when the subprocess is killed by a signal. On a normal quit while borg is still running, app.action_quit -> runner.stop() calls process.terminate() (SIGTERM), so start() observes returncode -15 and emits process_finished with rc=-15. watch_rc(-15) then calls classify_ec(-15), which raises ValueError inside the Textual reactive watcher, surfacing an unhandled-exception error in the TUI on a routine quit-during-backup. Same crash for rc=-1.","fix":"Sanitize rc before classification: in watch_rc, guard with try/except around classify_ec, or normalize negative/out-of-range codes (e.g. map a negative signal returncode -n to 128+n, and treat -1/launch errors as the error class). Alternatively have the runner translate negative returncodes to the borg signal-base convention before emitting process_finished.","locations":[{"ref":"src/borg/cockpit/widgets.py:78-96","code":"   78 |     def watch_rc(self, rc: int):\n   79 |         label = self.query_one(\"#status-rc\")\n   80 |         if rc is None:\n   81 |             label.update(T(\"RC: RUNNING\"))\n   82 |             return\n   83 | \n   84 |         label.remove_class(\"rc-ok\")\n   85 |         label.remove_class(\"rc-warning\")\n   86 |         label.remove_class(\"rc-error\")\n   87 | \n   88 |         status = classify_ec(rc)\n   89 |         if status == \"success\":\n   90 |             label.add_class(\"rc-ok\")\n   91 |         elif status == \"warning\":\n   92 |             label.add_class(\"rc-warning\")\n   93 |         else:  # error, signal\n   94 |             label.add_class(\"rc-error\")\n   95 | \n   96 |         label.update(T(f\"RC: {rc}\"))","lines":19},{"ref":"src/borg/cockpit/runner.py:58-63","code":"   58 |             rc = await self.process.wait()\n   59 |             self.log_callback({\"type\": \"process_finished\", \"rc\": rc})\n   60 | \n   61 |         except Exception as e:\n   62 |             self.logger.error(f\"Failed to run Borg process: {e}\")\n   63 |             self.log_callback({\"type\": \"process_finished\", \"rc\": -1, \"error\": str(e)})","lines":6},{"ref":"src/borg/cockpit/runner.py:71-75","code":"   71 |         if self.process and self.process.returncode is None:\n   72 |             self.logger.info(\"Terminating Borg process...\")\n   73 |             try:\n   74 |                 self.process.terminate()\n   75 |                 await self.process.wait()","lines":5},{"ref":"src/borg/cockpit/app.py:126-129","code":"  126 |         elif msg_type == \"process_finished\":\n  127 |             self.process_running = False\n  128 |             rc = data.get(\"rc\", 0)\n  129 |             self.query_one(\"#status\").rc = rc","lines":4}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In import_paperkey, parsing the 'id' line count does `lines = int(id_lines)` inside a try/except ValueError. On ValueError it prints 'internal error while parsing length' but is MISSING a `continue`, so control falls through to the `break` at line 230 with `lines` left unbound. On the first iteration `lines` was never assigned, so the body-line loop reaches `if idx == lines` (line 258) and raises NameError, crashing the import instead of re-prompting. A user pasting a corrupted id line (non-numeric length) gets an unhandled NameError traceback rather than a retry prompt.","fix":"Add `continue` in the except branch (after the print) so a bad length re-prompts the id line, e.g.:\n                    except ValueError:\n                        print(\"internal error while parsing length\")\n                        continue","locations":[{"ref":"src/borg/crypto/keymanager.py:225-230","code":"  225 |                     try:\n  226 |                         lines = int(id_lines)\n  227 |                     except ValueError:\n  228 |                         print(\"internal error while parsing length\")\n  229 | \n  230 |                     break","lines":6},{"ref":"src/borg/crypto/keymanager.py:258","code":"  258 |                     if idx == lines:","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"archive_get_items() returns None implicitly when metadata has neither 'item_ptrs' nor 'items' (both `if` branches fall through with no return). _load_meta then assigns metadata.items = None, and a later iter_items() -> DownloadPipeline.unpack_many(None) would fail. Normal archives always have one of these keys and the version check precedes this, so this only triggers on malformed/corrupted metadata, but it produces an opaque TypeError instead of a clear error.","fix":"After the two `if` blocks in archive_get_items, raise a clear error (e.g. `raise ValueError('archive metadata has neither item_ptrs nor items')`) instead of falling through to an implicit None return.","locations":[{"ref":"src/borg/archive.py:411-423","code":"  411 | def archive_get_items(metadata, *, repo_objs, repository):\n  412 |     if \"item_ptrs\" in metadata:  # looks like a v2+ archive\n  413 |         assert \"items\" not in metadata\n  414 |         items = []\n  415 |         for id, cdata in zip(metadata.item_ptrs, repository.get_many(metadata.item_ptrs)):\n  416 |             _, data = repo_objs.parse(id, cdata, ro_type=ROBJ_ARCHIVE_CHUNKIDS)\n  417 |             ids = msgpack.unpackb(data)\n  418 |             items.extend(ids)\n  419 |         return items\n  420 | \n  421 |     if \"items\" in metadata:  # legacy, v1 archive\n  422 |         assert \"item_ptrs\" not in metadata\n  423 |         return metadata.items","lines":13},{"ref":"src/borg/archive.py:537","code":"  537 |         metadata.items = archive_get_items(metadata, repo_objs=self.repo_objs, repository=self.repository)","lines":1}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"do_debug_dump_repo_objs and do_debug_search_repo_objs set up the crypto key by reading the first repository object: result = repository.list(limit=1, marker=None) followed by id, _ = result[0]. repository.list returns an empty list for an empty repository (no packs), so result[0] raises an uncaught IndexError instead of a clean error message. Running these debug commands against a freshly created/empty repository crashes with a traceback.","fix":"Check the result before indexing, e.g. `if not result: raise CommandError(\"repository has no objects\")` (or print a friendly message) before doing `id, _ = result[0]`.","locations":[{"ref":"src/borg/archiver/debug_cmd.py:126-129","code":"  126 |         result = repository.list(limit=1, marker=None)\n  127 |         id, _ = result[0]\n  128 |         cdata = repository.get(id)\n  129 |         key = key_factory(repository, cdata)","lines":4},{"ref":"src/borg/archiver/debug_cmd.py:166-169","code":"  166 |         result = repository.list(limit=1, marker=None)\n  167 |         id, _ = result[0]\n  168 |         cdata = repository.get(id)\n  169 |         key = key_factory(repository, cdata)","lines":4}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"ChunkerFailing accepts an empty map string: `set('').issubset({'R','E'})` is True, so the constructor validation passes. In chunkify(), once a non-empty read occurs, `idx = self.count if self.count < len(self.map) else -1` yields -1 (since len is 0), and `self.map[idx]` (i.e. ''[-1]) raises IndexError instead of a controlled error. The fail-map is user-supplied via `--chunker-params fail,BLOCKSIZE,MAP` (parsed in helpers/parseformat.py ChunkerParams without a non-empty check), so an empty map crashes with an unhandled IndexError rather than a clear validation error.","fix":"Reject an empty map in __init__: add `if not map: raise ValueError('map must not be empty')` after the upper()/subset check (or validate non-empty fail_map in ChunkerParams).","locations":[{"ref":"src/borg/chunkers/failing.py:22-25","code":"   22 |         map = map.upper()\n   23 |         if not set(map).issubset({\"R\", \"E\"}):\n   24 |             raise ValueError(\"unsupported map character\")\n   25 |         self.map = map","lines":4},{"ref":"src/borg/chunkers/failing.py:43-44","code":"   43 |                 idx = self.count if self.count < len(self.map) else -1\n   44 |                 behavior = self.map[idx]","lines":2}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In both read() implementations, when a chunk is missing and allow_damaged_files is set, data = zeros[:s] is followed by `assert len(data) == s`. `zeros` is exactly MAX_DATA_SIZE bytes (constants.py: zeros = bytes(MAX_DATA_SIZE)). If a chunk size entry `s` taken from archive item.chunks metadata exceeds MAX_DATA_SIZE (corrupted/crafted metadata), the slice yields fewer than s bytes and the assertion fails, raising AssertionError out of the FUSE read handler instead of returning EIO or zeros. This turns a recoverable damaged-file case into an unhandled exception.","fix":"Replace the assert with a robust fill, e.g. data = bytes(s) (allocates exactly s zero bytes) or pad zeros[:s] up to s, removing the assumption that s <= len(zeros).","locations":[{"ref":"src/borg/fuse.py:731-733","code":"  731 |                     if self.allow_damaged_files:\n  732 |                         data = zeros[:s]\n  733 |                         assert len(data) == s","lines":3},{"ref":"src/borg/hlfuse.py:650-652","code":"  650 |                     if self.allow_damaged_files:\n  651 |                         data = zeros[:s]\n  652 |                         assert len(data) == s","lines":3}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"interval() is used as an argparse type validator (e.g. for prune --keep-within). When passed an empty string, `s.endswith(tuple(...))` is False, so execution falls into the else branch at line 155 which evaluates `s[-1]` to build the error message. On an empty string `s[-1]` raises IndexError, producing an unhandled traceback instead of a clean ArgumentTypeError.","fix":"Handle the empty-string case before indexing, e.g. raise ArgumentTypeError early if `not s`, or avoid `s[-1]` in the message (use the whole value `s`).","locations":[{"ref":"src/borg/helpers/parseformat.py:151-155","code":"  151 |     if s.endswith(tuple(multiplier.keys())):\n  152 |         number = s[:-1]\n  153 |         suffix = s[-1]\n  154 |     else:\n  155 |         raise ArgumentTypeError(f'Unexpected time unit \"{s[-1]}\": choose from {\", \".join(multiplier)}')","lines":5}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"ProgressIndicatorPercent defaults total=0 and progress() computes `pct = self.counter * 100 / self.total`, which raises ZeroDivisionError if show()/progress() is called while total is still 0. Several call sites (e.g. tar_cmds.py, extract_cmd.py) construct the indicator with the default total and only set pi.total later from a computed size; if that size is 0 the indicator is in a divide-by-zero state. In current call paths show() happens not to be reached when total is 0, but the class itself offers no guard.","fix":"Guard against total == 0 in progress(), e.g. `pct = self.counter * 100 / self.total if self.total else 100.0`, or skip output entirely when total is 0.","locations":[{"ref":"src/borg/helpers/progress.py:64-71","code":"   64 |     def progress(self, current=None, increase=1):\n   65 |         if current is not None:\n   66 |             self.counter = current\n   67 |         pct = self.counter * 100 / self.total\n   68 |         self.counter += increase\n   69 |         if pct >= self.trigger_at:\n   70 |             self.trigger_at += self.step\n   71 |             return pct","lines":8}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"RepoObj.parse() reads meta_compressed[\"ctype\"], [\"clevel\"], [\"csize\"] (lines 150-152) and parse_meta()/parse() read meta[\"type\"] (lines 109, 145) directly with [] indexing. When the AUTHENTICATED_NO_KEY workaround is enabled, key.decrypt() does not authenticate, so a tampered/truncated metadata blob that still msgpack-unpacks into a dict missing these keys raises an unhandled KeyError instead of an IntegrityError, crashing the operation rather than being reported as a repository integrity problem.","fix":"Use meta.get(...) with validation and raise IntegrityError when a required key (type/ctype/clevel/csize) is missing, so corrupt metadata surfaces as an integrity error rather than a KeyError.","locations":[{"ref":"src/borg/repoobj.py:150-152","code":"  150 |             ctype = meta_compressed[\"ctype\"]\n  151 |             clevel = meta_compressed[\"clevel\"]\n  152 |             csize = meta_compressed[\"csize\"]  # always the overall size","lines":3},{"ref":"src/borg/repoobj.py:109","code":"  109 |         if ro_type != ROBJ_DONTCARE and meta[\"type\"] != ro_type:","lines":1},{"ref":"src/borg/repoobj.py:145","code":"  145 |         if ro_type != ROBJ_DONTCARE and meta_compressed[\"type\"] != ro_type:","lines":1}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"assert_no_manifest_replay compares the stored security timestamp string with manifest.timestamp via `timestamp > manifest.timestamp`. manifest.timestamp defaults to None (manifest.py:476) and is set from m.get(\"timestamp\") (manifest.py:502), so it can be None for a manifest lacking a timestamp field (e.g. legacy or crafted manifest). When the security dir has a non-empty stored timestamp and manifest.timestamp is None, the `str > None` comparison raises an unhandled TypeError, aborting the command with a confusing traceback instead of a proper security check/error.","fix":"Guard against manifest.timestamp being None, e.g. `if timestamp and manifest.timestamp and timestamp > manifest.timestamp:` (and decide explicitly how to treat a missing manifest timestamp), so the replay check degrades gracefully instead of crashing.","locations":[{"ref":"src/borg/security.py:153","code":"  153 |         if timestamp and timestamp > manifest.timestamp:","lines":1}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In the mfusepy hardlink handling, _create_node(item, ...) allocates a fresh inode number and writes its packed item into self.inodes via set_inode, but the code then overwrites file_node.ino / node.ino with the hardlink target's existing ino. The freshly allocated inode entry in self.inodes becomes orphaned (never referenced by any DirEntry) and is never reclaimed, leaking one packed-item entry per hardlink encountered. Over an archive with many hardlinks this wastes memory.","fix":"When reusing a target inode, either create the DirEntry without allocating/storing a new inode (e.g. add a _create_node variant that does not call set_inode), or pop the orphaned ino from self.inodes after reassigning .ino.","locations":[{"ref":"src/borg/hlfuse.py:243-250","code":"  243 |                             # Reuse ino and item from target\n  244 |                             node.ino = target_node.ino\n  245 |                             # node.item = target_node.item  # implicitly shared via ID\n  246 |                             item = self.get_inode(node.ino)\n  247 |                             if \"nlink\" not in item:\n  248 |                                 item.nlink = 1\n  249 |                             item.nlink += 1\n  250 |                             self.set_inode(node.ino, item)","lines":8},{"ref":"src/borg/hlfuse.py:326-336","code":"  326 |                                 item = self.get_inode(original_node.ino)\n  327 |                                 file_node = self._create_node(item, parent=intermediate_node)\n  328 |                                 file_node.ino = original_node.ino\n  329 |                                 # Update nlink count\n  330 |                                 item = self.get_inode(file_node.ino)\n  331 |                                 if \"nlink\" not in item:\n  332 |                                     item.nlink = 1\n  333 |                                 item.nlink += 1\n  334 |                                 self.set_inode(file_node.ino, item)\n  335 |                                 intermediate_node.add_child(versioned_name, file_node)\n  336 |                                 return","lines":11}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In translate(), the escape check for the alternation/group meta-characters '(', '|', ')' is broken. At line 30 `i` is incremented immediately after reading the current char into `c`, so at line 63 `pat[i - 1]` is the CURRENT character `c` itself (always one of '(', '|', ')'), never the preceding character. Thus `pat[i - 1] != \"\\\\\"` is always True and a user-escaped literal like `\\(` is never recognized: the backslash is emitted via re.escape and the `(` is still emitted as an unescaped regex group-open. The intended check is the previous char `pat[i - 2]`. Result: shell patterns containing escaped parens/pipes do not match the literal character and can even create an invalid/unintended regex.","fix":"Check the character before the current one: `if i < 2 or pat[i - 2] != \"\\\\\": res += c` (and emit an escaped literal otherwise), mirroring how the escape state is checked elsewhere.","locations":[{"ref":"src/borg/helpers/shellpattern.py:62-64","code":"   62 |         elif c in \"(|)\":\n   63 |             if i > 0 and pat[i - 1] != \"\\\\\":\n   64 |                 res += c","lines":3}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the mfusepy backend, _process_leaf_versioned only links the file leaf into the tree when version is not None (the entire add-to-tree block is inside `if version is not None:` at line 301). version is None for any item without 'chunks' (see _file_version returning None at lines 344-345), i.e. symlinks, FIFOs, sockets, and device nodes. For such items the intermediate directory is created (lines 293-296) but the actual entry is never added via add_child, so these files are completely invisible when mounting with the `versions` option under mfusepy. The llfuse/ previous_id:\n  355 |             current_version += 1\n  356 |             self.versions_index[file_id] = current_version, contents_id\n  357 | \n  358 |         return current_version","lines":17}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In Repository.check() repair path, when an object initially looked corrupted but a reload made it valid again, the code calls log_error(\"reloading did help, inconsistent behaviour detected!\"). log_error (defined at lines 452-455) has the side effect of setting obj_corrupted = True. As a result, at line 539 the guard `if not (obj_corrupted and repair)` evaluates to False for this now-healthy object, so the valid recovered chunk is NOT added to the rebuilt ChunkIndex. During a full --repair run the rebuilt index is written with delete_other=True/clear=True, so this good chunk is dropped from the index and will be treated as missing afterwards. The branch should log informationally without flipping obj_corrupted back to True.","fix":"Replace the log_error(...) call in the 'reloading did help' branch with a plain logger.warning(...)/logger.error(...) that does not set obj_corrupted, so the recovered object stays uncorrupted and gets added to the ChunkIndex.","locations":[{"ref":"src/borg/repository.py:537-549","code":"  537 |                             else:\n  538 |                                 log_error(\"reloading did help, inconsistent behaviour detected!\")\n  539 |                 if not (obj_corrupted and repair):\n  540 |                     # add all existing objects to the index.\n  541 |                     # borg check: the index may have corrupted objects (we did not delete them)\n  542 |                     # borg check --repair: the index will only have non-corrupted objects.\n  543 |                     pack_id = hex_to_bin(info.name)\n  544 |                     pack_size = info.size\n  545 |                     chunk_id = pack_id  # N=1: chunk_id == pack_id\n  546 |                     obj_size = pack_size  # correct for N=1\n  547 |                     chunks[chunk_id] = ChunkIndexEntry(\n  548 |                         flags=ChunkIndex.F_USED, size=0, pack_id=pack_id, obj_offset=0, obj_size=obj_size\n  549 |                     )","lines":13},{"ref":"src/borg/repository.py:452-455","code":"  452 |         def log_error(msg):\n  453 |             nonlocal obj_corrupted\n  454 |             obj_corrupted = True\n  455 |             logger.error(f\"Repo object {info.name} is corrupted: {msg}\")","lines":4}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"build_filter (used for the export-tar/extract item filter and progress-size pass) splits item paths with os.sep, while borg item paths always use '/' internally and the extract loop strips with '/'.split. On Windows (os.sep == '\\\\') the filter's `len(item.path.split(os.sep)) > strip_components` never splits the '/'-separated path, so with --strip-components it filters out all items for the progress total (and, in export-tar, for the actual output), diverging from the real extraction which strips on '/'.","fix":"Use '/' (the borg path separator) consistently in build_filter instead of os.sep, matching the extract loop's orig_path.split('/').","locations":[{"ref":"src/borg/archiver/_common.py:609-622","code":"  609 | def build_filter(matcher, strip_components):\n  610 |     if strip_components:\n  611 | \n  612 |         def item_filter(item):\n  613 |             matched = matcher.match(item.path) and len(item.path.split(os.sep)) > strip_components\n  614 |             return matched\n  615 | \n  616 |     else:\n  617 | \n  618 |         def item_filter(item):\n  619 |             matched = matcher.match(item.path)\n  620 |             return matched\n  621 | \n  622 |     return item_filter","lines":14},{"ref":"src/borg/archiver/extract_cmd.py:60-66","code":"   60 |         for item in archive.iter_items():\n   61 |             orig_path = item.path\n   62 |             if strip_components:\n   63 |                 stripped_path = \"/\".join(orig_path.split(\"/\")[strip_components:])\n   64 |                 if not stripped_path:\n   65 |                     continue\n   66 |                 item.path = stripped_path","lines":7},{"ref":"src/borg/archiver/tar_cmds.py:233-236","code":"  233 |         for item in archive.iter_items(filter):\n  234 |             orig_path = item.path\n  235 |             if strip_components:\n  236 |                 item.path = os.sep.join(orig_path.split(os.sep)[strip_components:])","lines":4}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The nested helper analyze_path_change(path) reads its data from `base[path]` and `new[path]` (the parameter) but accumulates results into `self.difference_by_path[directory_path]`, referencing the enclosing loop variable `directory_path` instead of its own `path` parameter. It only works because both call sites pass `directory_path` as the argument, making them coincidentally equal. This is a latent bug: any refactor that calls the helper with a different argument, or reorders the loops, would silently write to the wrong directory bucket.","fix":"Inside analyze_path_change use the `path` parameter consistently: write to `self.difference_by_path[path]` rather than `self.difference_by_path[directory_path]`.","locations":[{"ref":"src/borg/archiver/analyze_cmd.py:73-87","code":"   73 |         def analyze_path_change(path):\n   74 |             base_chunks = base[path]\n   75 |             new_chunks = new[path]\n   76 |             # add up added chunks' sizes\n   77 |             for id in new_chunks.keys() - base_chunks.keys():\n   78 |                 self.difference_by_path[directory_path] += new_chunks[id]\n   79 |             # add up removed chunks' sizes\n   80 |             for id in base_chunks.keys() - new_chunks.keys():\n   81 |                 self.difference_by_path[directory_path] += base_chunks[id]\n   82 | \n   83 |         for directory_path in base:\n   84 |             analyze_path_change(directory_path)\n   85 |         for directory_path in new:\n   86 |             if directory_path not in base:\n   87 |                 analyze_path_change(directory_path)","lines":15}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the generated zsh completion for archive IDs, the hex-prefix validation uses the glob `[[ -n \"$prefix\" && ! \"$prefix\" == [0-9a-fA-F]# ]]`. The `#` quantifier (meaning 'zero or more') in zsh only works when EXTENDED_GLOB is set, which is not guaranteed inside a completion widget. Without extendedglob, `#` is a literal, so the pattern only matches a single hex char followed by a literal '#'. As a result, any multi-character prefix like `aid:d34d` fails the match and the function returns with no candidates, silently breaking aid: completion for the common case of more than one typed hex digit. The bash sibling at line 103 correctly uses an ERE `^[0-9a-fA-F]*$`.","fix":"Use a robust test independent of extendedglob, e.g. `[[ -n \"$prefix\" && \"$prefix\" != <-> && ! \"$prefix\" == [0-9a-fA-F]## ]]` is still glob-dependent; prefer `[[ -n \"$prefix\" && \"$prefix\" =~ '[^0-9a-fA-F]' ]] && return 0` (regex match for a non-hex char), mirroring the bash implementation.","locations":[{"ref":"src/borg/archiver/completion_cmd.py:372-373","code":"  372 |     # allow only hex digits as prefix; empty prefix also allowed (list all)\n  373 |     [[ -n \"$prefix\" && ! \"$prefix\" == [0-9a-fA-F]# ]] && return 0","lines":2}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In do_debug_search_repo_objs the cross-object boundary scan uses slices of width len(wanted)-1. For a single-byte search term (str: with one char, or hex: with one byte) len(wanted)-1 == 0, and last_data[-0:] is the ENTIRE previous object (Python treats -0 as 0), not the intended empty/last-0-bytes slice; data[:0] is empty. As a result the boundary check rescans the whole previous object and can emit a spurious/duplicate finding already reported by the per-object scan. Only affects 1-byte search terms in a debug command.","fix":"Skip the boundary scan when len(wanted) <= 1, or special-case the slice so a zero width yields an empty bytes object (e.g. use last_data[len(last_data)-(len(wanted)-1):] which is correct for width 0).","locations":[{"ref":"src/borg/archiver/debug_cmd.py:179-185","code":"  179 |             # try to locate wanted sequence crossing the border of last_data and data\n  180 |             boundary_data = last_data[-(len(wanted) - 1) :] + data[: len(wanted) - 1]\n  181 |             if wanted in boundary_data:\n  182 |                 boundary_data = last_data[-(len(wanted) - 1 + context) :] + data[: len(wanted) - 1 + context]\n  183 |                 offset = boundary_data.find(wanted)\n  184 |                 info = \"%d %s | %s\" % (i, last_id.hex(), id.hex())\n  185 |                 print_finding(info, wanted, boundary_data, offset)","lines":7}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The status-errors widget is created with the initial CSS class 'error-ok' (singular), but the stylesheet only defines '.errors-ok' / '.errors-warning' (plural), and watch_error_count adds/removes the plural names. Because the error_count reactive uses init=False, its watcher does not fire at startup, so the initial 'Errors: 0' label carries the unstyled 'error-ok' class and is not rendered in the success color until the count first changes.","fix":"Change the initial class on line 43 from 'error-ok' to 'errors-ok' to match the CSS rule and the watcher.","locations":[{"ref":"src/borg/cockpit/widgets.py:43","code":"   43 |                 yield Static(T(\"Errors: 0 ().parse(None)` raises TypeError ('expected str, got NoneType'), and parsing an empty string would silently produce an empty key set inconsistent with the default format that is actually used for output. Currently the only caller (diff_cmd.py) always passes a non-empty string, so this is latent, but the two lines disagree about whether `format` may be falsy.","fix":"Compute the effective format once, e.g. `fmt = format or \"{content}{link}{directory}{blkdev}{chrdev}{fifo} {path}{NL}\"`, pass it to super().__init__, and derive self.format_keys from `fmt` instead of the raw `format`.","locations":[{"ref":"src/borg/helpers/parseformat.py:1124-1128","code":" 1124 |     def __init__(self, format, content_only=False):\n 1125 |         static_data = {} | self.FIXED_KEYS\n 1126 |         super().__init__(format or \"{content}{link}{directory}{blkdev}{chrdev}{fifo} {path}{NL}\", static_data)\n 1127 |         self.content_only = content_only\n 1128 |         self.format_keys = {f[1] for f in Formatter().parse(format)}","lines":5}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"info() builds the returned dict with self.version (the repository format version read from config, e.g. 2) BEFORE calling _load_hints(), which overwrites self.version with hints[\"version\"] (the hints-file FORMAT version, which is 1 or 2 and is a different concept than the repo version). After info() returns, self.version no longer reflects the repository version but the hints format version, which is misleading for any later code reading self.version on the same instance.","fix":"Do not clobber self.version with the hints format version in _load_hints(); store the hints format version in a separate attribute (e.g. self.hints_version) or drop the assignment, since the repo version is already known from config.","locations":[{"ref":"src/borg/legacy/repository.py:465-477","code":"  465 |     def _load_hints(self):\n  466 |         if (transaction_id := self.get_transaction_id()) is None:\n  467 |             # self is a fresh repo, so transaction_id is None and there is no hints file\n  468 |             return\n  469 |         hints = self._unpack_hints(transaction_id)\n  470 |         self.version = hints[\"version\"]\n  471 |         self.shadow_index = hints[\"shadow_index\"]\n  472 | \n  473 |     def info(self):\n  474 |         \"\"\"return some infos about the repo (must be opened first)\"\"\"\n  475 |         info = dict(id=self.id, version=self.version)\n  476 |         self._load_hints()\n  477 |         return info","lines":13}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"In the --content-from-command branch, after process_pipe sets status and print_file_status is called, the per-status counter fso.stats.files_stats[status] is never incremented, unlike every other path-processing branch (stdin path at lines 171-172, paths-from-stdin at 143-144, and _rec_walk at 582-583). As a result the single file produced by --content-from-command is not counted in the per-status statistics shown with --stats/--json.","fix":"After print_file_status(status, path) in the content_from_command branch, add `if not dry_run and status is not None: fso.stats.files_stats[status] += 1` to match the other branches.","locations":[{"ref":"src/borg/archiver/create_cmd.py:83-93","code":"   83 |                         status = fso.process_pipe(\n   84 |                             path=path, cache=cache, fd=proc.stdout, mode=mode, user=user, group=group\n   85 |                         )\n   86 |                         rc = proc.wait()\n   87 |                         if rc != 0:\n   88 |                             raise CommandError(f\"Command {args.paths[0]!r} exited with status {rc}\")\n   89 |                     except BackupError as e:\n   90 |                         raise Error(f\"{path!r}: {e}\")\n   91 |                 else:\n   92 |                     status = \"+\"  # included\n   93 |                 self.print_file_status(status, path)","lines":11}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"In do_help, the `--epilog-only` branch prints `commands[args.topic].epilog` directly. If a subcommand has no epilog set, this prints the literal string 'None' to stdout instead of producing empty/no output, which is misleading for scripts or users running `borg help <cmd> --epilog-only`.","fix":"Guard the print, e.g. `epilog = commands[args.topic].epilog; if epilog: print(epilog)` so a missing epilog yields no output rather than 'None'.","locations":[{"ref":"src/borg/archiver/help_cmd.py:538-539","code":"  538 |             if args.epilog_only:\n  539 |                 print(commands[args.topic].epilog)","lines":2}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"The --keep-13weekly and --keep-3monthly arguments are the only keep-* options that do not specify `action=Highlander`, unlike every other keep-* option (e.g. --keep-daily, --keep-yearly) in the same parser. This makes their duplicate-detection / last-wins behavior inconsistent with the other retention options when an option is given more than once on the command line.","fix":"Add `action=Highlander` to both quarterly_group.add_argument calls for consistency with the other --keep-* options.","locations":[{"ref":"src/borg/archiver/prune_cmd.py:393-407","code":"  393 |         quarterly_group = subparser.add_mutually_exclusive_group()\n  394 |         quarterly_group.add_argument(\n  395 |             \"--keep-13weekly\",\n  396 |             dest=\"quarterly_13weekly\",\n  397 |             type=int,\n  398 |             default=0,\n  399 |             help=\"number of quarterly archives to keep (13 week strategy)\",\n  400 |         )\n  401 |         quarterly_group.add_argument(\n  402 |             \"--keep-3monthly\",\n  403 |             dest=\"quarterly_3monthly\",\n  404 |             type=int,\n  405 |             default=0,\n  406 |             help=\"number of quarterly archives to keep (3 month strategy)\",\n  407 |         )","lines":15}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"format_timedelta assumes a non-negative timedelta. For a negative td, td.total_seconds() is negative and Python's `%` yields a positive remainder while int(ts/60) truncates toward zero, producing an inconsistent/garbled human string (e.g. mixing positive seconds with a negative day count). Borg durations are always non-negative so this is not hit in practice.","fix":"If negative durations are ever possible, take abs() and prepend a minus sign, or assert td >= timedelta(0).","locations":[{"ref":"src/borg/helpers/time.py:108-121","code":"  108 | def format_timedelta(td):\n  109 |     \"\"\"Format a timedelta in a human-friendly format.\"\"\"\n  110 |     ts = td.total_seconds()\n  111 |     s = ts % 60\n  112 |     m = int(ts / 60) % 60\n  113 |     h = int(ts / 3600) % 24\n  114 |     txt = \"%.3f seconds\" % s\n  115 |     if m:\n  116 |         txt = \"%d minutes %s\" % (m, txt)\n  117 |     if h:\n  118 |         txt = \"%d hours %s\" % (h, txt)\n  119 |     if td.days:\n  120 |         txt = \"%d days %s\" % (td.days, txt)\n  121 |     return txt","lines":14}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In assert_no_manifest_replay, the OSError handler logs \"Could not read previous location file\" but this code path reads the manifest-timestamp file (self.manifest_ts_file), not the location file. The wrong message was copy-pasted verbatim from assert_location_matches (line 114). A user debugging an I/O error on the manifest-timestamp file would be misled into looking at the wrong file.","fix":"Change the log message to \"Could not read mani : {bin_to_hex(old_id):.8} -> {bin_to_hex(archive.id):.8}, \"\n   41 |                 f\"tags: {','.join(sorted(archive.tags))}.\"\n   42 |             )","lines":18}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"BORG_FILES_CACHE_TTL is parsed with int(os.environ.get(\"BORG_FILES_CACHE_TTL\", 2)) inside _write_files_cache, which runs during Cache.close() after the backup work is already done. If the env var is set to a non-integer value, int() raises an unhandled ValueError at the very end of the run, crashing the command and preventing the files cache from being saved (so the next run cannot benefit from the cache).","fix":"Parse the env var defensively, e.g. wrap in try/except ValueError and fall back to the default 2 with a warning, or validate the value once at startup.","locations":[{"ref":"src/borg/cache.py:400","code":"  400 |         ttl = int(os.environ.get(\"BORG_FILES_CACHE_TTL\", 2))","lines":1}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In BorgRunner.start(), if the subprocess is created successfully but an exception is raised while reading streams or in asyncio.gather, the broad except sets process=None in finally without terminating the still-running child process, leaking the borg subprocess. The except also reports rc=-1 even though the process may still be alive.","fix":"In the except/finally, if self.process is not None and returncode is None, call self.process.terminate() (and await wait) before clearing self.process, so a partially-started run does not orphan the child.","locations":[{"ref":"src/borg/cockpit/runner.py:41-65","code":"   41 |         try:\n   42 |             self.process = await asyncio.create_subprocess_exec(\n   43 |                 *cmd, stdout=asyncio.subprocess.PIPE, stderr=asyncio.subprocess.PIPE, env=env\n   44 |             )\n   45 | \n   46 |             async def read_stream(stream, stream_name):\n   47 |                 while True:\n   48 |                     line = await stream.readline()\n   49 |                     if not line:\n   50 |                         break\n   51 |                     decoded_line = line.decode(\"utf-8\", errors=\"replace\").rstrip()\n   52 |                     if decoded_line:\n   53 |                         self.log_callback({\"type\": \"stream_line\", \"stream\": stream_name, \"line\": decoded_line})\n   54 | \n   55 |             # Read both streams concurrently\n   56 |             await asyncio.gather(read_stream(self.process.stdout, \"stdout\"), read_stream(self.process.stderr, \"stderr\"))\n   57 | \n   58 |             rc = await self.process.wait()\n   59 |             self.log_callback({\"type\": \"process_finished\", \"rc\": rc})\n   60 | \n   61 |         except Exception as e:\n   62 |             self.logger.error(f\"Failed to run Borg process: {e}\")\n   63 |             self.log_callback({\"type\": \"process_finished\", \"rc\": -1, \"error\": str(e)})\n   64 |         finally:\n   65 |             self.process = None","lines":25}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"keyfile_parse does `header, b64data = data.split(\"\\n\", 1)` (line 73) after only checking is_keyfile (a prefix check). A keyfile whose content is exactly 'BORG_KEY <repoid>' with no trailing newline passes is_keyfile but the split returns a single-element list, raising ValueError: not enough values to unpack. sanity_check (line 607) calls keyfile_parse without catching ValueError, and _find_key_in_keys_dir / _find_all_keys_in_keys_dir only catch KeyfileInvalidError/KeyfileMismatchError, so a malformed keyfile in the keys directory aborts key detection with an unhandled exception instead of being skipped as invalid.","fix":"In keyfile_parse, handle the missing-newline case (e.g. `parts = data.split(\"\\n\", 1); if len(parts) < 2: raise ValueError(\"Not a keyfile\")`) so it raises a meaningful error, and/or have sanity_check catch ValueError from keyfile_parse and re-raise KeyfileInvalidError.","locations":[{"ref":"src/borg/crypto/key.py:64-75","code":"   64 | def keyfile_parse(data: str | bytes, repoid: Optional[str] = None) -> tuple[str, str]:\n   65 |     if repoid is None:\n   66 |         if not is_keyfile(data):\n   67 |             raise ValueError(\"Not a keyfile\")\n   68 |     else:\n   69 |         if not is_keyfile(data, repoid):\n   70 |             raise ValueError(\"Not a keyfile for repo %s\" % repoid)\n   71 |     if isinstance(data, bytes):\n   72 |         data = data.decode()\n   73 |     header, b64data = data.split(\"\\n\", 1)\n   74 |     repoid = header[len(KEYFILE_ID) + 1 :]\n   75 |     return repoid, b64data","lines":12},{"ref":"src/borg/crypto/key.py:595-614","code":"  595 |     def sanity_check(self, filename, id):\n  596 |         repo_id_hex = bin_to_hex(id)\n  597 |         with open(filename, \"rb\") as fd:\n  598 |             # we do the magic / id check in binary mode to avoid stumbling over\n  599 |             # decoding errors if somebody has binary files in the keys dir for some reason.\n  600 |             data = fd.read(10000)\n  601 |         if not is_keyfile(data):\n  602 |             raise KeyfileInvalidError(self.repository._location.canonical_path(), filename)\n  603 |         if not is_keyfile(data, repo_id_hex):\n  604 |             raise KeyfileMismatchError(self.repository._location.canonical_path(), filename)\n  605 |         # we get here if it really looks like a borg key for this repo,\n  606 |         # do some more checks that are close to how borg reads/parses the key.\n  607 |         _, key_b64 = keyfile_parse(data, repo_id_hex)\n  608 |         try:\n  609 |             binascii.a2b_base64(key_b64)\n  610 |         except (ValueError, binascii.Error):\n  611 |             logger.warning(f\"borg (10000)\n  601 |         if not is_keyfile(data):\n  602 |             raise KeyfileInvalidError(self.repository._location.canonical_path(), filename)\n  603 |         if not is_keyfile(data, repo_id_hex):\n  604 |             raise KeyfileMismatchError(self.repository._location.canonical_path(), filename)","lines":10},{"ref":"src/borg/crypto/key.py:639-663","code":"  639 |     def _find_key_in_keys_dir(self):\n  640 |         id = self.repository.id\n  641 |         keys_path = Path(get_keys_dir())\n  642 |         for entry in keys_path.iterdir():\n  643 |             filename = keys_path / entry.name\n  644 |             try:\n  645 |                 return self.sanity_check(str(filename), id)\n  646 |             except (KeyfileInvalidError, KeyfileMismatchError):\n  647 |                 pass\n  648 | \n  649 |     def _find_all_keys_in_keys_dir(self):\n  650 |         # return all keyfiles in the keys dir that belong to this repository (multiple passphrases).\n  651 |         id = self.repository.id\n  652 |         keys_path = Path(get_keys_dir())\n  653 |         found = []\n  654 |         if not keys_path.exists():\n  655 |             return found\n  656 |         for entry in sorted(keys_path.iterdir()):\n  657 |             filename = keys_path / entry.name\n  658 |             try:\n  659 |                 self.sanity_check(str(filename), id)\n  660 |             except (KeyfileInvalidError, KeyfileMismatchError):\n  661 |                 continue\n  662 |             found.append(str(filename))\n  663 |         return found","lines":25}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"dir_is_cachedir() relies on a single os.read(tag_fd, len(CACHE_TAG_CONTENTS)) returning the full content in one call. os.read is permitted to return fewer bytes than requested; on a short read the equality comparison fails and a genuine cache directory would be misclassified as not-a-cachedir, causing it to be backed up instead of excluded. In practice CACHE_TAG_CONTENTS is 43 bytes and regular-file reads almost always return it fully, so the risk is small.","fix":"Read in a loop until len(CACHE_TAG_CONTENTS) bytes are accumulated or EOF/short-read, then compare; or read len+1 bytes and compare the prefix.","locations":[{"ref":"src/borg/helpers/fs.py:236-247","code":"  236 |     tag_fd = None\n  237 |     try:\n  238 |         if dir_fd is not None:\n  239 |             tag_fd = os.open(CACHE_TAG_NAME, os.O_RDONLY, dir_fd=dir_fd)\n  240 |         else:\n  241 |             tag_fd = os.open(str(Path(path) / CACHE_TAG_NAME), os.O_RDONLY)\n  242 |         return os.read(tag_fd, len(CACHE_TAG_CONTENTS)) == CACHE_TAG_CONTENTS\n  243 |     except (FileNotFoundError, OSError):\n  244 |         return False\n  245 |     finally:\n  246 |         if tag_fd is not None:\n  247 |             os.close(tag_fd)","lines":12}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The server side can serialize an exception with exception_class == \"StoreObjectNotFound\" (remote.py lines 790-791), but the client's handle_error() in call_many has no branch for \"StoreObjectNotFound\". Such a response therefore falls through to the generic else and is raised as a raw RPCError instead of a proper StoreObjectNotFound, losing the typed exception. In normal legacy operation get() raises LegacyRepository.ObjectNotFound (which IS handled), so this only bites if the served repository code ever raises StoreObjectNotFound, but the explicit server-side handling implies it is considered possible.","fix":"Add an elif branch in handle_error for error == \"StoreObjectNotFound\" that raises StoreObjectNotFound(args[0]) (import it from ..repository, already imported).","locations":[{"ref":"src/borg/legacy/remote.py:428-466","code":"  428 |         def handle_error(unpacked):\n  429 |             if \"exception_class\" not in unpacked:\n  430 |                 return\n  431 | \n  432 |             error = unpacked[\"exception_class\"]\n  433 |             args = unpacked[\"exception_args\"]\n  434 | \n  435 |             if error == \"Error\":\n  436 |                 raise Error(args[0])\n  437 |             elif error == \"ErrorWithTraceback\":\n  438 |                 raise ErrorWithTraceback(args[0])\n  439 |             elif error == \"DoesNotExist\":\n  440 |                 raise LegacyRepository.DoesNotExist(self.location.processed)\n  441 |             elif error == \"AlreadyExists\":\n  442 |                 raise LegacyRepository.AlreadyExists(self.location.processed)\n  443 |             elif error == \"CheckNeeded\":\n  444 |                 raise LegacyRepository.CheckNeeded(self.location.processed)\n  445 |             elif error == \"IntegrityError\":\n  446 |                 raise IntegrityError(args[0])\n  447 |             elif error == \"PathNotAllowed\":\n  448 |                 raise PathNotAllowed(args[0])\n  449 |             elif error == \"PathPermissionDenied\":\n  450 |                 raise LegacyRepository.PathPermissionDenied(args[0])\n  451 |             elif error == \"ParentPathDoesNotExist\":\n  452 |                 raise LegacyRepository.ParentPathDoesNotExist(args[0])\n  453 |             elif error == \"ObjectNotFound\":\n  454 |                 raise LegacyRepository.ObjectNotFound(args[0], self.location.processed)\n  455 |             elif error == \"InvalidRPCMethod\":\n  456 |                 raise InvalidRPCMethod(args[0])\n  457 |             elif error == \"LockTimeout\":\n  458 |                 raise LockTimeout(args[0])\n  459 |             elif error == \"LockFailed\":\n  460 |                 raise LockFailed(args[0], args[1])\n  461 |             elif error == \"NotLocked\":\n  462 |                 raise NotLocked(args[0])\n  463 |             elif error == \"NotMyLock\":\n  464 |                 raise NotMyLock(args[0])\n  465 |             else:\n  466 |                 raise self.RPCError(unpacked)","lines":39},{"ref":"src/borg/legacy/remote.py:787-792","code":"  787 |                             # StoreObjectNotFound and Repository.ObjectNotFound both have\n  788 |                             # __name__ == \"ObjectNotFound\", so we need to distinguish them\n  789 |                             # explicitly for correct client-side reconstruction.\n  790 |                             exc_cls_name = (\n  791 |                                 \"StoreObjectNotFound\" if isinstance(e, StoreObjectNotFound) else e.__class__.__name__\n  792 |                             )","lines":6}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"RepoObj.parse() asserts `csize == len(data_compressed)` and `psize <= csize` (lines 153, 157) on values read from decrypted metadata. With the AUTHENTICATED_NO_KEY workaround, metadata is not authenticated, so a tampered csize/psize from a malicious or corrupted repo triggers an AssertionError (and AssertionError can be stripped entirely under python -O) instead of a clean IntegrityError. Same pattern as the documented integrity checks elsewhere in the file which correctly raise IntegrityError.","fix":"Replace these assertions with explicit checks that raise IntegrityError on mismatch, consistent with the other size-consistency checks in this module.","locations":[{"ref":"src/borg/repoobj.py:153-157","code":"  153 |             assert csize == len(data_compressed)\n  154 |             psize = meta_compressed.get(\n  155 |                 \"psize\", csize\n  156 |             )  # obfuscation: psize (payload size) is potentially less than csize.\n  157 |             assert psize <= csize","lines":5}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":true,"description":"Statistics.__add__ rebuilds a new Statistics copying osize, usize, nfiles, chunking_time, hashing_time and files_stats, but silently drops rx_bytes and tx_bytes (they reset to 0 in the new object). In the borg create flow this is masked because create_cmd.py reassigns archive.stats.rx_bytes/tx_bytes immediately after `archive.stats += fso.stats`, but the omission is a latent inconsistency for any other `+` use (e.g. the tar import path does not re-set them).","fix":"Add `stats.rx_bytes = self.rx_bytes + other.rx_bytes` and `stats.tx_bytes = self.tx_bytes + other.tx_bytes` to __add__ for completeness/consistency.","locations":[{"ref":"src/borg/archive.py:81-93","code":"   81 |     def __add__(self, other):\n   82 |         if not isinstance(other, Statistics):\n   83 |             raise TypeError(\"can only add Statistics objects\")\n   84 |         stats = Statistics(self.output_json, self.iec)\n   85 |         stats.osize = self.osize + other.osize\n   86 |         stats.usize = self.usize + other.usize\n   87 |         stats.nfiles = self.nfiles + other.nfiles\n   88 |         stats.chunking_time = self.chunking_time + other.chunking_time\n   89 |         stats.hashing_time = self.hashing_time + other.hashing_time\n   90 |         st1, st2 = self.files_stats, other.files_stats\n   91 |         stats.files_stats = defaultdict(int, {key: (st1[key] + st2[key]) for key in st1.keys() | st2.keys()})\n   92 | \n   93 |         return stats","lines":13}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"on_unmount awaits runner.stop() (which terminates and waits for the process) but does not await runner_task, whereas action_quit awaits both runner.stop() and runner_task. On an unmount-driven shutdown the read_stream/gather coroutine in start() may still be pending, so the final process_finished callback can race with teardown.","fix":"Mirror action_quit in on_unmount: after awaiting runner.stop(), also await sel
