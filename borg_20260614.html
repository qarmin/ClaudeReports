disallowing the most extreme cases of abuse here - this does NOT imply\n  263 |             # that cutting chunks of the minimum allowed size is efficient concerning storage\n  264 |             # or in-memory chunk management.\n  265 |             # choose the block (chunk) size wisely: if you have a lot of data and you cut\n  266 |             # it into very small chunks, you are asking for trouble!\n  267 |             raise ArgumentTypeError(\"block_size must not be less than 64 Bytes\")\n  268 |         if block_size > MAX_DATA_SIZE or header_size > MAX_DATA_SIZE:\n  269 |             raise ArgumentTypeError(\"block_size and header_size must not exceed MAX_DATA_SIZE [%d]\" % MAX_DATA_SIZE)\n  270 |         return algo, block_size, header_size","lines":13}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":true,"description":"key_matches has no return statement in its OSError handler, so on a read error it implicitly returns None. The only caller, assert_key_type, evaluates `not self.key_matches(key)` which makes None behave like False and thus raises EncryptionMethodMismatch. This happens to fail closed (safe), but the implicit None return is unintentional and obscures the real I/O failure as an encryption-mismatch error.","fix":"Make the OSError branch return an explicit value (e.g. re-raise, or return False after logging) so the failure mode is intentional and the error is not misclassified as an encryption method mismatch.","locations":[{"ref":"src/borg/security.py:81-89","code":"   81 |     def key_matches(self, key):\n   82 |         if not self.known():\n   83 |             return False\n   84 |         try:\n   85 |             with self.key_type_file.open() as fd:\n   86 |                 type = fd.read()\n   87 |                 return type == str(key.TYPE)\n   88 |         except OSError as exc:\n   89 |             logger.warning(\"Could not read/parse key type file: %s\", exc)","lines":9},{"ref":"src/borg/security.py:161","code":"  161 |         if self.known() and not self.key_matches(key):","lines":1}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Starfield._update_art and LogoPanel.on_resize call random.seed(self._seed) on the process-global random module to make the star/pulsar layout stable across resizes. This mutates global RNG state as a side effect every render/resize, clobbering any other consumer of the module-level random sequence. It is also fragile: two widgets reseeding the same global generator can interfere with each other's intended determinism.","fix":"Use a local generator: store self._rng = random.Random(seed) in __init__ and call self._rng.random()/_rng.randint()/_rng.choice() instead of reseeding the global random module.","locations":[{"ref":"src/borg/cockpit/widgets.py:204-225","code":"  204 |         random.seed(self._seed)\n  205 | \n  206 |         star_density = 0.1\n  207 |         big_star_chance = 0.1\n  208 | \n  209 |         from .theme import theme\n  210 | \n  211 |         star_color = f\"[{theme.variables['star-color']}]\"\n  212 |         star_bright_color = f\"[{theme.variables['star-bright-color']}]\"\n  213 | \n  214 |         # 1. Create canvas (Starfield)\n  215 |         canvas = [[(\" \", \"\")] * w for _ in range(h)]\n  216 |         for y in range(h):\n  217 |             for x in range(w):\n  218 |                 if random.random() < star_density:  # nosec B311 - visual effect randomness\n  219 |                     if random.random() < big_star_chance:  # nosec B311 - visual effect randomness\n  220 |                         char = \"*\"\n  221 |                         color = star_bright_color\n  222 |                     else:\n  223 |                         char = random.choice([\".\", \"·\"])  # nosec B311 - visual effect randomness\n  224 |                         color = star_color\n  225 |                     canvas[y][x] = (char, color)","lines":22},{"ref":"src/borg/cockpit/widgets.py:312-353","code":"  312 |         if w > 4 and h > 4:\n  313 |             random.seed(self._seed)\n  314 | \n  315 |             # Exclusion Zone Calculation\n  316 |             # --------------------------\n  317 | \n  318 |             # Logo top-left\n  319 |             logo_y = (h - Logo.H) // 2 - 1\n  320 |             logo_x = (w - Logo.W) // 2\n  321 | \n  322 |             # Slogan top-left\n  323 |             slogan_y = logo_y + Logo.H + 2\n  324 |             slogan_x = (w - Slogan.W) // 2\n  325 | \n  326 |             # Forbidden area\n  327 |             # --------------\n  328 |             # Combined rect over Logo and Slogan\n  329 |             f_y1 = logo_y\n  330 |             f_y2 = slogan_y + Slogan.H\n  331 |             f_x1 = min(logo_x, slogan_x)\n  332 |             f_x2 = max(logo_x + Logo.W, slogan_x + Slogan.W)\n  333 | \n  334 |             # Update Logo and Slogan position\n  335 |             # Note: In the overlay layer, widgets stack vertically.\n  336 |             # Logo is at y=0 (height Logo.H).\n  337 |             # Slogan is at y=Logo.H (height Slogan.H).\n  338 |             # Pulsar is at y=Logo.H+Slogan.H (height Pulsar.H)\n  339 |             # We must subtract these flow positions from the desired absolute positions.\n  340 |             self.query_one(Logo).styles.offset = (logo_x, logo_y)\n  341 |             self.query_one(Slogan).styles.offset = (slogan_x, slogan_y - Logo.H)\n  342 | \n  343 |             # Pulsar: styles.offset moves the top-left corner.\n  344 |             # So if offset is (px, py), it occupies x=[px, px+Pulsar.W), y=[py, py+Pulsar.H).\n  345 | \n  346 |             # Find a valid Pulsar position\n  347 |             for _ in range(20):\n  348 |                 # Random position\n  349 |                 max_x = max(0, w - Pulsar.W)\n  350 |                 max_y = max(0, h - Pulsar.H)\n  351 | \n  352 |                 px = random.randint(0, max_x)  # nosec B311 - visual placement randomness\n  353 |                 py = random.randint(0, max_y)  # nosec B311 - visual placement randomness","lines":42}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In _process_any's retry loop, time.sleep(sleep_s) at line 412 runs unconditionally BEFORE the check at line 413 that determines whether this is the final retry. On the last retry (retry == MAX_RETRIES-1 == 9), sleep_s = 0.001 * 10**(9/2) is about 31.6 seconds, so borg sleeps ~31s and then immediately raises at line 419, giving up on the file anyway. This wastes ~31 seconds per unrecoverable file error (and accumulates across many failing files), with no benefit since no further retry follows.","fix":"Compute last_try (already available) and skip the sleep when it is the final attempt, e.g. only sleep when `retry < MAX_RETRIES - 1`, and raise immediately otherwise without sleeping.","locations":[{"ref":"src/borg/archiver/create_cmd.py:410-419","code":"  410 |                 # sleep a bit, so temporary problems might go away...\n  411 |                 sleep_s = 1000.0 / 1e6 * 10 ** (retry / 2)  # retry 0: 1ms, retry 6: 1s, ...\n  412 |                 time.sleep(sleep_s)\n  413 |                 if retry < MAX_RETRIES - 1:\n  414 |                     logger.warning(\n  415 |                         f\"{path}: {err}, slept {sleep_s:.3f}s, next: retry: {retry + 1} of {MAX_RETRIES - 1}...\"\n  416 |                     )\n  417 |                 else:\n  418 |                     # giving up with retries, error will be dealt with (logged) by upper error handler\n  419 |                     raise","lines":10}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In the recreate/rechunkify path the chunking time is never accounted: ChunksProcessor.process_file_chunks (used by ArchiveRecreater via create_target) never updates stats.chunking_time, while FilesystemObjectProcessors.process_file does set `self.stats.chunking_time = self.chunker.chunking_time` (line 1452). As a result `borg recreate` statistics always report 0 time spent in chunking even when rechunkifying, which is misleading.","fix":"Have ChunksProcessor.process_file_chunks also propagate chunking time from the chunker into stats.chunking_time (the recreater holds the chunker on the target archive).","locations":[{"ref":"src/borg/archive.py:1172-1188","code":" 1172 |     def process_file_chunks(self, item, cache, stats, show_progress, chunk_iter, chunk_processor=None):\n 1173 |         if not chunk_processor:\n 1174 | \n 1175 |             def chunk_processor(chunk):\n 1176 |                 started_hashing = time.monotonic()\n 1177 |                 chunk_id, data = cached_hash(chunk, self.key.id_hash)\n 1178 |                 stats.hashing_time += time.monotonic() - started_hashing\n 1179 |                 chunk_entry = cache.add_chunk(chunk_id, {}, data, stats=stats, wait=False, ro_type=ROBJ_FILE_STREAM)\n 1180 |                 self.cache.repository.async_response(wait=False)\n 1181 |                 return chunk_entry\n 1182 | \n 1183 |         item.chunks = []\n 1184 |         for chunk in chunk_iter:\n 1185 |             chunk_entry = chunk_processor(chunk)\n 1186 |             item.chunks.append(chunk_entry)\n 1187 |             if show_progress:\n 1188 |                 stats.show_progress(item=item, dt=0.2)","lines":17},{"ref":"src/borg/archive.py:1452","code":" 1452 |                             self.stats.chunking_time = self.chunker.chunking_time","lines":1}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"OutputTimestamp.__format__ calls `format_time(self.ts.astimezone(), ...)`, and format_time() itself immediately calls `ts.astimezone()` again on its argument. The timezone conversion is applied twice. It is harmless (astimezone on an aware datetime is idempotent) but is redundant work and slightly misleading.","fix":"Pass self.ts directly: `return format_time(self.ts, format_spec=format_spec)`, since format_time already converts to local time.","locations":[{"ref":"src/borg/helpers/time.py:183-185","code":"  183 |     def __format__(self, format_spec):\n  184 |         # we want to output a timestamp in the user's local timezone\n  185 |         return format_time(self.ts.astimezone(), format_spec=format_spec)","lines":3},{"ref":"src/borg/helpers/time.py:101-105","code":"  101 | def format_time(ts: datetime, format_spec=\"\"):\n  102 |     \"\"\"\n  103 |     Convert *ts* to a human-friendly format with textual weekday (in local timezone).\n  104 |     \"\"\"\n  105 |     return ts.astimezone().strftime(\"%a, %Y-%m-%d %H:%M:%S %z\" if format_spec == \"\" else format_spec)","lines":5}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"The user/group lookup caches use `@lru_cache(maxsize=None)` keyed on (id, default). Because `default` is part of the key, the same uid/gid looked up with different default values is cached as separate entries, and the cache grows without bound. For the Windows stubs (windows_ug.py) the uid/gid argument is entirely ignored yet still keys the cache, so every distinct uid/gid grows the unbounded cache for no benefit.","fix":"Either exclude `default` from the cache key (cache only the successful name<->id mapping and apply default outside the cached function) or use a bounded maxsize. For the Windows stubs, drop lru_cache entirely since the result is constant.","locations":[{"ref":"src/borg/platform/posix_ug.py:6-39","code":"    6 | @lru_cache(maxsize=None)\n    7 | def _uid2user(uid, default=None):\n    8 |     try:\n    9 |         return pwd.getpwuid(uid).pw_name\n   10 |     except KeyError:\n   11 |         return default\n   12 | \n   13 | \n   14 | @lru_cache(maxsize=None)\n   15 | def _user2uid(user, default=None):\n   16 |     if not user:\n   17 |         return default\n   18 |     try:\n   19 |         return pwd.getpwnam(user).pw_uid\n   20 |     except KeyError:\n   21 |         return default\n   22 | \n   23 | \n   24 | @lru_cache(maxsize=None)\n   25 | def _gid2group(gid, default=None):\n   26 |     try:\n   27 |         return grp.getgrgid(gid).gr_name\n   28 |     except KeyError:\n   29 |         return default\n   30 | \n   31 | \n   32 | @lru_cache(maxsize=None)\n   33 | def _group2gid(group, default=None):\n   34 |     if not group:\n   35 |         return default\n   36 |     try:\n   37 |         return grp.getgrnam(group).gr_gid\n   38 |     except KeyError:\n   39 |         return default","lines":34},{"ref":"src/borg/platform/windows_ug.py:4-33","code":"    4 | @lru_cache(maxsize=None)\n    5 | def _uid2user(uid, default=None):\n    6 |     # On Windows, Borg uses a simplified mapping for ownership fields.\n    7 |     # Return a stable placeholder name.\n    8 |     return \"root\"\n    9 | \n   10 | \n   11 | @lru_cache(maxsize=None)\n   12 | def _user2uid(user, default=None):\n   13 |     if not user:\n   14 |         # user is either None or the empty string\n   15 |         return default\n   16 |     # Use 0 as the canonical uid placeholder on Windows.\n   17 |     return 0\n   18 | \n   19 | \n   20 | @lru_cache(maxsize=None)\n   21 | def _gid2group(gid, default=None):\n   22 |     # On Windows, Borg uses a simplified mapping for ownership fields.\n   23 |     # Return a stable placeholder name.\n   24 |     return \"root\"\n   25 | \n   26 | \n   27 | @lru_cache(maxsize=None)\n   28 | def _group2gid(group, default=None):\n   29 |     if not group:\n   30 |         # group is either None or the empty string\n   31 |         return default\n   32 |     # Use 0 as the canonical gid placeholder on Windows.\n   33 |     return 0","lines":30}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"ArchiveRecreater.iter_chunks() has an `else` branch (the non-rechunkify case yielding Chunk objects) that is unreachable. Its only caller, process_chunks() (line 2259-2266), calls iter_chunks() exclusively inside the `if not target.recreate_rechunkify: ... return` early-out's negation - i.e. only when target.recreate_rechunkify is True. Inside iter_chunks the same condition `if target.recreate_rechunkify:` is therefore always True, so the else at lines 2285-2287 never executes.","fix":"Either remove the dead else branch (and the redundant inner `if target.recreate_rechunkify`) in iter_chunks, or simplify process_chunks to not pre-check, so the branch becomes meaningful again.","locations":[{"ref":"src/borg/archive.py:2278-2287","code":" 2278 |     def iter_chunks(self, archive, target, chunks):\n 2279 |         chunk_iterator = archive.pipeline.fetch_many(chunks, ro_type=ROBJ_FILE_STREAM)\n 2280 |         if target.recreate_rechunkify:\n 2281 |             # The target.chunker will read the file contents through ChunkIteratorFileWrapper chunk-by-chunk\n 2282 |             # (does not load the entire file into memory)\n 2283 |             file = ChunkIteratorFileWrapper(chunk_iterator)\n 2284 |             yield from target.chunker.chunkify(file)\n 2285 |         else:\n 2286 |             for chunk in chunk_iterator:\n 2287 |                 yield Chunk(chunk, size=len(chunk), allocation=CH_DATA)","lines":10},{"ref":"src/borg/archive.py:2259-2266","code":" 2259 |     def process_chunks(self, archive, target, item):\n 2260 |         if not target.recreate_rechunkify:\n 2261 |             for chunk_id, size in item.chunks:\n 2262 |                 self.cache.reuse_chunk(chunk_id, size, target.stats)\n 2263 |             return item.chunks\n 2264 |         chunk_iterator = self.iter_chunks(archive, target, list(item.chunks))\n 2265 |         chunk_processor = partial(self.chunk_processor, target)\n 2266 |         target.process_file_chunks(item, self.cache, target.stats, self.progress, chunk_iterator, chunk_processor)","lines":8}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In hlfuse.py readdir, the offset is initialized to 0 and then mutated only via `offset += 0  # += 1` four times (lines 679, 682, 690). These statements are no-ops; offset stays 0 for every yielded entry. The trailing `# += 1` comments document an intended-but-abandoned offset-tracking implementation, making the code misleading. While returning offset 0 happens to work with fusepy's no-offset readdir mode, the dead increments and stale comments should be removed.","fix":"Remove the `offset` variable and the `offset += 0  # += 1` lines, yielding entries with a constant offset of 0 (or implement real offsets if desired), and drop the misleading comments.","locations":[{"ref":"src/borg/hlfuse.py:678-692","code":"  678 |         offset = 0\n  679 |         offset += 0  # += 1\n  680 |         debug_log(f\"readdir yielding . {offset}\")\n  681 |         yield (\".\", self._make_stat_dict(node), offset)\n  682 |         offset += 0  # += 1\n  683 |         debug_log(f\"readdir yielding .. {offset}\")\n  684 |         parent = node.parent if node.parent else node\n  685 |         yield (\"..\", self._make_stat_dict(parent), offset)\n  686 | \n  687 |         for name, child_node in node.iter_children():\n  688 |             name_str = name.decode(\"utf-8\", \"surrogateescape\")\n  689 |             st = self._make_stat_dict(child_node)\n  690 |             offset += 0  # += 1\n  691 |             debug_log(f\"readdir yielding {name_str} {offset} {st}\")\n  692 |             yield (name_str, st, offset)","lines":15}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"In ChunkerParams, `count = len(params)` where params = s.strip().split(\",\"). str.split always returns at least one element, so `count == 0` is impossible and the `if count == 0: raise ArgumentTypeError(\"no chunker params given\")` branch is unreachable. An empty input falls through and is reported by the final generic 'invalid chunker params' instead.","fix":"Remove the unreachable `count == 0` check, or replace it with a real empty-input check such as `if not params[0]:`.","locations":[{"ref":"src/borg/helpers/parseformat.py:249-252","code":"  249 |     params = s.strip().split(\",\")\n  250 |     count = len(params)\n  251 |     if count == 0:\n  252 |         raise ArgumentTypeError(\"no chunker params given\")","lines":4}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"In ItemFormatter.hash_item, `hash` is only bound inside `if hash_function in self.hash_algorithms:` (line 1083-1084). hash_item is only ever registered for functions already in self.hash_algorithms (lines 1020-1021), so the guard is always true and redundant; if it were ever false, the subsequent `hash.update`/`hash.hexdigest()` would raise UnboundLocalError. The conditional adds no value and hides a potential UnboundLocalError behind an always-true check.","fix":"Drop the always-true `if hash_function in self.hash_algorithms:` guard and unconditionally do `hash = hashlib.new(hash_function)`, or raise a clear error if the algorithm is unsupported.","locations":[{"ref":"src/borg/helpers/parseformat.py:1080-1087","code":" 1080 |     def hash_item(self, hash_function, item):\n 1081 |         if \"chunks\" not in item:\n 1082 |             return \"\"\n 1083 |         if hash_function in self.hash_algorithms:\n 1084 |             hash = hashlib.new(hash_function)\n 1085 |         for data in self.archive.pipeline.fetch_many(item.chunks, ro_type=ROBJ_FILE_STREAM):\n 1086 |             hash.update(data)\n 1087 |         return hash.hexdigest()","lines":8}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"In iter_objects, `assert size >= 0` is placed AFTER the (function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);

// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);

  const p = new URLSearchParams(location.hash.slice(1));

  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;

  while ((m = FENCE.exec(src)) !== null) {

    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
