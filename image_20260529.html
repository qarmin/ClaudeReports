<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"RLE decoding writes `pixel[0]`, `pixel[1]` and `pixel[2]` into each output pixel chunk regardless of the number of output channels. When the caller has enabled indexed-color output via `set_indexed_color(true)`, `num_channels()` returns 1, so `row.chunks_exact_mut(num_channels)` yields 1-byte chunks. Writing `pixel[1]`/`pixel[2]` then indexes out of bounds and panics. This is reachable for any RLE4/RLE8/RLE24 BMP once indexed-color mode is requested (a public API). The palettized (non-RLE) path is guarded by `skip_palette`, but the RLE path has no equivalent guard.","fix":"In read_rle_data, when self.indexed_color is true, write only the palette index into pixel[0] (mirroring the skip_palette branch in read_palettized_pixel_data), or reject RLE+indexed_color combinations up front with an error.","locations":[{"ref":"src/codecs/bmp/decoder.rs:2256-2258","code":" 2256 |                                                 pixel[0] = r;\n 2257 |                                                 pixel[1] = g;\n 2258 |                                                 pixel[2] = b;"},{"ref":"src/codecs/bmp/decoder.rs:2281-2285","code":" 2281 |                                 (&mut pixel_iter).take(n_pixels).for_each(|p| {\n 2282 |                                     p[0] = repeat_pixel[0];\n 2283 |                                     p[1] = repeat_pixel[1];\n 2284 |                                     p[2] = repeat_pixel[2];\n 2285 |                                 });"},{"ref":"src/codecs/bmp/decoder.rs:2307-2309","code":" 2307 |                                         pixel[0] = r;\n 2308 |                                         pixel[1] = g;\n 2309 |                                         pixel[2] = b;"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"`ensure_reader_and_header` returns `self.reader.as_mut().ok_or_else(|| unreachable!())`. `unreachable!()` is a macro that panics immediately when evaluated; it is not a value of the error type. Because `ok_or_else` always evaluates its closure when the Option is `None`, if `self.reader` were ever `None` at this point the process would panic instead of returning an error. The surrounding comment claims the None case is not reachable, but using `unreachable!()` as an error producer is fragile and abuses the API — any future refactor that allows `reader` to be None turns a recoverable error into a hard panic.","fix":"Return a proper error value, e.g. `.ok_or_else(reader_finished_already)`, instead of `unreachable!()`, so an unexpected None becomes a recoverable error rather than a panic.","locations":[{"ref":"src/codecs/png.rs:67-72","code":"   67 |     fn ensure_reader_and_header(&mut self) -> ImageResult<&mut png::Reader<R>> {\n   68 |         if self.reader.is_some() {\n   69 |             // We do this for borrow-checking issues, do not borrow self outside the conditional\n   70 |             // branch. So the None/Err case here is not reachable.\n   71 |             return self.reader.as_mut().ok_or_else(|| unreachable!());\n   72 |         }"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"PnmEncoder::encode is a public API. When called with a 16-bit color type (L16/La16/Rgb16/Rgba16) and a FlatSamples::U8 slice whose length is odd and not bytemuck-castable to &[u16], the reallocation path does `u16::from_ne_bytes([chunk[0], chunk[1]])` over `samples.chunks(2)`. The final chunk of an odd-length slice has only one element, so `chunk[1]` indexes out of bounds and panics. The internal write_image path is guarded by an assert on buffer_size, but encode() itself performs no such length validation.","fix":"Validate that `samples.len()` is even (and matches width*height*channels*2) before the conversion, returning a ParameterError on mismatch, or use `chunks_exact(2)` and reject a non-empty remainder.","locations":[{"ref":"src/codecs/pnm/encoder.rs:176-179","code":"  176 |                         let new_samples: Vec<u16> = samples\n  177 |                             .chunks(2)\n  178 |                             .map(|chunk| u16::from_ne_bytes([chunk[0], chunk[1]]))\n  179 |                             .collect();"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"TIFF `read_image` uses `buf.copy_from_slice(bytemuck::cast_slice(v))` (and the CMYK/L1/YCbCr branches use `as_chunks`/`copy_from_slice`) on the decoded `self.buffer` against the output `buf` sized from `prepare_image`. These `copy_from_slice` calls panic if the decoded sample count does not exactly match the expected output length. The decoded length comes from the (untrusted) TIFF via the `tiff` crate; while dimensions are validated, a mismatch between the advertised color type/dimensions and the actually decoded sample buffer (e.g. a malformed strip/tile count) would produce a length mismatch and panic rather than a clean decoding error.","fix":"Validate that the decoded buffer length matches the expected output length and return a `DecodingError` on mismatch, instead of relying on `copy_from_slice`/`as_chunks` which panic on length mismatch.","locations":[{"ref":"src/codecs/tiff.rs:585-616","code":"  585 |             DecodingResult::U8(v) => {\n  586 |                 buf.copy_from_slice(v);\n  587 |             }\n  588 |             DecodingResult::U16(v) => {\n  589 |                 buf.copy_from_slice(bytemuck::cast_slice(v));\n  590 |             }\n  591 |             DecodingResult::U32(v) => {\n  592 |                 buf.copy_from_slice(bytemuck::cast_slice(v));\n  593 |             }\n  594 |             DecodingResult::U64(v) => {\n  595 |                 buf.copy_from_slice(bytemuck::cast_slice(v));\n  596 |             }\n  597 |             DecodingResult::I8(v) => {\n  598 |                 buf.copy_from_slice(bytemuck::cast_slice(v));\n  599 |             }\n  600 |             DecodingResult::I16(v) => {\n  601 |                 buf.copy_from_slice(bytemuck::cast_slice(v));\n  602 |             }\n  603 |             DecodingResult::I32(v) => {\n  604 |                 buf.copy_from_slice(bytemuck::cast_slice(v));\n  605 |             }\n  606 |             DecodingResult::I64(v) => {\n  607 |                 buf.copy_from_slice(bytemuck::cast_slice(v));\n  608 |             }\n  609 |             DecodingResult::F32(v) => {\n  610 |                 buf.copy_from_slice(bytemuck::cast_slice(v));\n  611 |             }\n  612 |             DecodingResult::F64(v) => {\n  613 |                 buf.copy_from_slice(bytemuck::cast_slice(v));\n  614 |             }\n  615 |             DecodingResult::F16(_) => unreachable!(),\n  616 |         }"},{"ref":"src/codecs/tiff.rs:555-577","code":"  555 |             DecodingResult::U8(v) if info.original_color_type == ExtendedColorType::Cmyk8 => {\n  556 |                 let buf = buf.as_chunks_mut::<3>().0;\n  557 |                 for (cmyk, rgb) in v.as_chunks::<4>().0.iter().zip(buf) {\n  558 |                     *rgb = cmyk_to_rgb(cmyk);\n  559 |                 }\n  560 |             }\n  561 |             DecodingResult::U16(v) if info.original_color_type == ExtendedColorType::Cmyk16 => {\n  562 |                 let buf = buf.as_chunks_mut::<6>().0;\n  563 |                 for (cmyk, rgb) in v.as_chunks::<4>().0.iter().zip(buf) {\n  564 |                     *rgb = bytemuck::cast(cmyk_to_rgb16(cmyk));\n  565 |                 }\n  566 |             }\n  567 |             DecodingResult::U8(v) if info.original_color_type == ExtendedColorType::L1 => {\n  568 |                 let width = info.dimensions.0;\n  569 |                 let row_bytes = width.div_ceil(8);\n  570 | \n  571 |                 for (in_row, out_row) in v\n  572 |                     .chunks_exact(row_bytes as usize)\n  573 |                     .zip(buf.chunks_exact_mut(width as usize))\n  574 |                 {\n  575 |                     out_row.copy_from_slice(&utils::expand_bits(1, width, in_row));\n  576 |                 }\n  577 |             }"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","description":"`filter3x3` iterates `for y in 1..height - 1` and `for x in 1..width - 1`. When `width` or `height` is 0 (empty image), `width - 1` / `height - 1` underflows: it panics in debug builds and wraps to `u32::MAX` (a near-infinite loop with out-of-bounds `get_pixel`) in release builds. Images of width/height 0 or 1 are not handled.","fix":"Early-return the zeroed output buffer when `width < 3 || height < 3` (or use saturating/checked bounds), since the loop produces no inner pixels in those cases anyway.","locations":[{"ref":"src/imageops/sample.rs:925-926","code":"  925 |     for y in 1..height - 1 {\n  926 |         for x in 1..width - 1 {"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"`Pixels::next` (the default `GenericImageView::pixels()` iterator) panics and also skips the first row for zero-width images. On the first call `self.x (0) >= self.width (0)` is true, so it sets `x=0` and increments `y` to 1 (skipping row y=0 entirely). For any non-zero height it then calls `self.image.get_pixel(0, 1)`, which is out of bounds for a width-0 image and panics. A zero-width image should yield an empty iterator (the slice-based `ImageBuffer::enumerate_pixels` does this correctly), not panic.","fix":"Short-circuit when `self.width == 0 || self.height == 0` (return `None`), or restructure so the column-wrap check does not advance into an out-of-bounds row. E.g. only wrap when `self.x >= self.width && self.width != 0`, and guard the get_pixel with the height check first.","locations":[{"ref":"src/images/generic_image.rs:159-175","code":"  159 |     fn next(&mut self) -> Option<(u32, u32, I::Pixel)> {\n  160 |         if self.x >= self.width {\n  161 |             self.x = 0;\n  162 |             self.y += 1;\n  163 |         }\n  164 | \n  165 |         if self.y >= self.height {\n  166 |             None\n  167 |         } else {\n  168 |             let pixel = self.image.get_pixel(self.x, self.y);\n  169 |             let p = (self.x, self.y, pixel);\n  170 | \n  171 |             self.x += 1;\n  172 | \n  173 |             Some(p)\n  174 |         }\n  175 |     }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","description":"`read_metadata_in_ico_format` halves `self.height` (`self.height /= 2`) AFTER `check_for_overflow` has already validated the original (doubled) height. A malformed embedded BMP with an odd height value (e.g. 1) becomes height 0 after the division, with no re-validation. The subsequent pixel-read paths compute `let last_row: u32 = (self.height - 1).try_into().unwrap();`, which for height 0 evaluates `(-1).try_into::<u32>()` and panics on the unwrap. Reachable only through the ICO decoder feeding a crafted embedded BMP.","fix":"After halving the height for ICO, re-validate that height > 0 (and re-run check_for_overflow), returning a decoding error instead of letting later code panic on the try_into().unwrap().","locations":[{"ref":"src/codecs/bmp/decoder.rs:1729-1732","code":" 1729 |         // The height field in an ICO file is doubled to account for the AND mask\n 1730 |         // (whether or not an AND mask is actually present).\n 1731 |         self.height /= 2;\n 1732 |         Ok(())"},{"ref":"src/codecs/bmp/decoder.rs:1853","code":" 1853 |         let last_row: u32 = (self.height - 1).try_into().unwrap();"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"GIF `animation_attributes` calls `NonZeroU32::new(actl.num_plays).expect(\"num_plays should be non-zero\")` inside the `Some(actl)` arm. The `num_plays == 0` case is matched by a separate guard arm above, but this relies on the guard ordering staying correct; the PNG analogue at png.rs:656-658 has the same pattern. If the guard arm were ever removed/reordered, a crafted file with `num_plays == 0` would panic. It is defensible today but is an `expect` on attacker-influenced data.","fix":"Replace the `expect` with a saturating/fallback path (e.g. treat 0 as Infinite) that does not depend on guard ordering, removing any possibility of panic on malformed input.","locations":[{"ref":"src/codecs/gif.rs:131-135","code":"  131 |             gif::Repeat::Finite(n @ 1..) => {\n  132 |                 LoopCount::Finite(NonZeroU32::new(n.into()).expect(\"repeat is non-zero\"))\n  133 |             }\n  134 |             gif::Repeat::Finite(0) | gif::Repeat::Infinite => LoopCount::Infinite,\n  135 |         };"},{"ref":"src/codecs/png.rs:653-659","code":"  653 |         let loop_count = match count {\n  654 |             None => LoopCount::Infinite,\n  655 |             Some(actl) if actl.num_plays == 0 => LoopCount::Infinite,\n  656 |             Some(actl) => LoopCount::Finite(\n  657 |                 NonZeroU32::new(actl.num_plays).expect(\"num_plays should be non-zero\"),\n  658 |             ),\n  659 |         };"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"negligible","description":"expand_bits computes `8 / bit_depth` and `(1 << bit_depth) - 1` without validating bit_depth. A bit_depth of 0 causes a divide-by-zero panic (8 / 0) and the loop bound `1..=8/bit_depth`; a bit_depth > 8 (e.g. 8) makes scaling_factor `255/255=1` ok but bit_depth that does not divide 8 produces incorrect shifts. The function is pub(crate) and relies entirely on callers passing 1/2/4; there is no debug_assert documenting the contract.","fix":"Add a debug_assert!(matches!(bit_depth, 1 | 2 | 4)) (or 1..=8 with divisibility) at the top to document and enforce the precondition and fail fast in debug builds.","locations":[{"ref":"src/utils/mod.rs:9-19","code":"    9 | pub(crate) fn expand_bits(bit_depth: u8, row_size: u32, buf: &[u8]) -> Vec<u8> {\n   10 |     // Note: this conversion assumes that the scanlines begin on byte boundaries\n   11 |     let mask = (1u8 << bit_depth as usize) - 1;\n   12 |     let scaling_factor = 255 / ((1 << bit_depth as usize) - 1);\n   13 |     let bit_width = row_size * u32::from(bit_depth);\n   14 |     let skip = if bit_width.is_multiple_of(8) {\n   15 |         0\n   16 |     } else {\n   17 |         (8 - bit_width % 8) / u32::from(bit_depth)\n   18 |     };\n   19 |     let row_len = row_size + skip;"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"The size-mismatch error branch recomputes `stride * height` with an unchecked multiply, but this branch is reached precisely when `stride.checked_mul(height)` already returned `None` (i.e. the product overflows `usize`). On malformed/FFI-provided plane strides this re-multiply panics in debug builds (attempt to multiply with overflow) and silently wraps to a misleading value in release. The whole point of using `checked_mul` in the condition is defeated by recomputing it unchecked in the error payload.","fix":"Store the `Option<usize>` from `checked_mul` and put a sentinel (e.g. `usize::MAX` or `received`) into `expected` when it is `None`, or compute `expected` with `stride.saturating_mul(height)` so the error construction can never overflow.","locations":[{"ref":"src/codecs/avif/yuv.rs:92-100","code":"   92 |     if Some(plane.len()) != stride.checked_mul(height) {\n   93 |         return Err(ImageError::Decoding(DecodingError::new(\n   94 |             ImageFormat::Avif.into(),\n   95 |             YuvConversionError::YuvPlaneSizeMismatch(\n   96 |                 plane_definition,\n   97 |                 ErrorSize {\n   98 |                     expected: stride * height,\n   99 |                     received: plane.len(),\n  100 |                 },"},{"ref":"src/codecs/avif/yuv.rs:113-119","code":"  113 |     if Some(rgb_data.len()) != stride.checked_mul(height) {\n  114 |         return Err(ImageError::Decoding(DecodingError::new(\n  115 |             ImageFormat::Avif.into(),\n  116 |             YuvConversionError::RgbDestinationSizeMismatch(ErrorSize {\n  117 |                 expected: stride * height,\n  118 |                 received: rgb_data.len(),\n  119 |             }),"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In IcoEncoder::encode_images the data offset is accumulated in a u32: `offset = ICO_ICONDIR_SIZE + ICO_DIRENTRY_SIZE * images.len() as u32` then `offset += image.encoded_image.len() as u32`. With many or large pre-encoded frames the multiplication and additions can overflow u32, panicking in debug builds and silently wrapping in release builds, producing a corrupt ICO with wrong data offsets. `encoded_image.len() as u32` also truncates frames larger than 4 GiB.","fix":"Accumulate the offset and per-image lengths in u64 with checked arithmetic, validate each value fits in u32 before writing the directory entry, and return a ParameterError if any offset or size exceeds u32::MAX.","locations":[{"ref":"src/codecs/ico/encoder.rs:106-118","code":"  106 |         let mut offset = ICO_ICONDIR_SIZE + (ICO_DIRENTRY_SIZE * (images.len() as u32));\n  107 |         write_icondir(&mut self.w, num_images)?;\n  108 |         for image in images {\n  109 |             write_direntry(\n  110 |                 &mut self.w,\n  111 |                 image.width,\n  112 |                 image.height,\n  113 |                 image.color_type,\n  114 |                 offset,\n  115 |                 image.encoded_image.len() as u32,\n  116 |             )?;\n  117 | \n  118 |             offset += image.encoded_image.len() as u32;"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In the OpenEXR read closure, the pixel staging buffer is allocated with `vec![0_f32; display_window.size.area() * channel_count]`. `display_window.size.area()` is derived from untrusted file metadata; multiplying a usize area by `channel_count` (1..4) can overflow on 32-bit targets (or simply request an enormous allocation) before any limit check applies. The earlier buffer-size validation only checks `unaligned_bytes.len()` against `width*height*bpp` using checked math, but this internal allocation uses unchecked multiplication.","fix":"Use checked multiplication for `display_window.size.area() * channel_count` and return a limit/decoding error on overflow, mirroring the checked logic already used for the output buffer size.","locations":[{"ref":"src/codecs/openexr.rs:184","code":"  184 |                 move |_size, _channels| vec![0_f32; display_window.size.area() * channel_count],"},{"ref":"src/codecs/openexr.rs:160-178","code":"  160 |         {\n  161 |             // check whether the buffer is large enough for the dimensions of the file\n  162 |             let bytes_per_pixel = usize::from(layout.layout.color.bytes_per_pixel());\n  163 |             let expected_byte_count = (width as usize)\n  164 |                 .checked_mul(height as usize)\n  165 |                 .and_then(|size| size.checked_mul(bytes_per_pixel));\n  166 | \n  167 |             // if the width and height does not match the length of the bytes, the arguments are invalid\n  168 |             let has_invalid_size_or_overflowed = expected_byte_count\n  169 |                 .map(|expected_byte_count| unaligned_bytes.len() != expected_byte_count)\n  170 |                 // otherwise, size calculation overflowed, is bigger than memory,\n  171 |                 // therefore data is too small, so it is invalid.\n  172 |                 .unwrap_or(true);\n  173 | \n  174 |             assert!(\n  175 |                 !has_invalid_size_or_overflowed,\n  176 |                 \"byte buffer not large enough for the specified dimensions and f32 pixels\"\n  177 |             );\n  178 |         }"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`ImageBuffer`'s overridden `copy_within` underflows when the source `Rect` has `width == 0` (or `height == 0`). The guard `self.width() - dx.max(sx) < width` is always false for `width == 0` (unsigned, never `< 0`), so execution proceeds into the copy loops which compute `self.pixel_indices_unchecked(sx + width - 1, sy)`. With `width == 0` this is `sx - 1`, underflowing (debug panic, release wrap to a huge index then slice panic). The default `GenericImage::copy_within` in generic_image.rs is not affected because it iterates `0..width`, which is simply empty for width 0.","fix":"Return `true` early when `width == 0 || height == 0` (nothing to copy), or compute the row end as `pixel_indices_unchecked(sx, sy).start + width * CHANNEL_COUNT` instead of using `sx + width - 1`.","locations":[{"ref":"src/images/buffer.rs:1290-1311","code":" 1290 |         if self.width() - dx.max(sx) < width || self.height() - dy.max(sy) < height {\n 1291 |             return false;\n 1292 |         }\n 1293 | \n 1294 |         if sy < dy {\n 1295 |             for y in (0..height).rev() {\n 1296 |                 let sy = sy + y;\n 1297 |                 let dy = dy + y;\n 1298 |                 let Range { start, .. } = self.pixel_indices_unchecked(sx, sy);\n 1299 |                 let Range { end, .. } = self.pixel_indices_unchecked(sx + width - 1, sy);\n 1300 |                 let dst = self.pixel_indices_unchecked(dx, dy).start;\n 1301 |                 self.data.copy_within(start..end, dst);\n 1302 |             }\n 1303 |         } else {\n 1304 |             for y in 0..height {\n 1305 |                 let sy = sy + y;\n 1306 |                 let dy = dy + y;\n 1307 |                 let Range { start, .. } = self.pixel_indices_unchecked(sx, sy);\n 1308 |                 let Range { end, .. } = self.pixel_indices_unchecked(sx + width - 1, sy);\n 1309 |                 let dst = self.pixel_indices_unchecked(dx, dy).start;\n 1310 |                 self.data.copy_within(start..end, dst);\n 1311 |             }"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`to_rgbe8` computes `e: (exp + 128) as u8` where `exp = mx.log2().floor() as i32 + 1`. For sufficiently large input radiance values (mx >= 2^127) `exp + 128` exceeds 255 and the `as u8` cast wraps, silently producing a wrong (much smaller) exponent and corrupting the encoded pixel rather than clamping to the maximum representable value. This is on the encode path with user-supplied f32 data.","fix":"Clamp `exp` to the representable range before adding the bias, e.g. `let exp = exp.clamp(-128, 127);`, or saturate the resulting exponent byte, so out-of-range bright pixels are clamped instead of wrapping.","locations":[{"ref":"src/codecs/hdr/encoder.rs:287-296","code":"  287 |         let exp = mx.log2().floor() as i32 + 1;\n  288 |         let mul = f32::powi(2.0, exp);\n  289 |         let mut conv = [0u8; 3];\n  290 |         for (cv, &sv) in conv.iter_mut().zip(pix.iter()) {\n  291 |             *cv = f32::trunc(sv / mul * 256.0) as u8;\n  292 |         }\n  293 |         Rgbe8Pixel {\n  294 |             c: conv,\n  295 |             e: (exp + 128) as u8,\n  296 |         }"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"TIFF `ycbcr_to_rgb8` casts the computed float channel values to u8 with `(r + 0.5) as u8` etc. For YCbCr inputs near the extremes, `r`/`g`/`b` can fall outside 0..=255; an `as u8` cast saturates floats to 0/255 in Rust (so no UB), but values are not clamped before the +0.5 rounding, meaning a value like 255.6 rounds to 256.1 and saturates to 255 (fine) while negative values become 0 — acceptable, but NaN from a pathological coefficient (e.g. lg derived from a zero-ish coefficient causing inv_lg = inf) yields `0` silently and produces wrong colors without any diagnostic.","fix":"Explicitly clamp r/g/b to [0.0, 255.0] (and guard against non-finite coefficients, e.g. lg==0) before the cast to make output deterministic and correct.","locations":[{"ref":"src/codecs/tiff.rs:660-678","code":"  660 | fn ycbcr_to_rgb8(ycbcr: &[[u8; 3]], lr: f32, lg: f32, lb: f32, out: &mut [[u8; 3]]) {\n  661 |     let coeff_r = 2.0 * (1.0 - lr);\n  662 |     let coeff_b = 2.0 * (1.0 - lb);\n  663 |     let inv_lg = 1.0 / lg;\n  664 | \n  665 |     for (src, dst) in ycbcr.iter().zip(out.iter_mut()) {\n  666 |         let y = f32::from(src[0]);\n  667 |         let cb = f32::from(src[1]) - 128.0;\n  668 |         let cr = f32::from(src[2]) - 128.0;\n  669 | \n  670 |         let r = y + cr * coeff_r;\n  671 |         let b = y + cb * coeff_b;\n  672 |         let g = (y - lr * r - lb * b) * inv_lg;\n  673 | \n  674 |         dst[0] = (r + 0.5) as u8;\n  675 |         dst[1] = (g + 0.5) as u8;\n  676 |         dst[2] = (b + 0.5) as u8;\n  677 |     }\n  678 | }"},{"ref":"src/codecs/tiff.rs:315-351","code":"  315 | fn read_ycbcr_coefficients<R: BufRead + Seek>(decoder: &mut Decoder<R>) -> ImageResult<[f32; 3]> {\n  316 |     let value = decoder\n  317 |         .find_tag(TAG_YCBCR_COEFFICIENTS)\n  318 |         .map_err(ImageError::from_tiff_decode)?;\n  319 | \n  320 |     const DEFAULT_YCBCR_COEFFICIENTS: [f32; 3] = [0.299, 0.587, 0.114];\n  321 |     let Some(value) = value else {\n  322 |         return Ok(DEFAULT_YCBCR_COEFFICIENTS);\n  323 |     };\n  324 | \n  325 |     let list = match value {\n  326 |         Value::List(list) if list.len() == 3 => list,\n  327 |         _ => {\n  328 |             return Err(ImageError::Decoding(DecodingError::new(\n  329 |                 ImageFormat::Tiff.into(),\n  330 |                 \"YCbCrCoefficients tag (529) must contain exactly 3 rational values\".to_string(),\n  331 |             )));\n  332 |         }\n  333 |     };\n  334 | \n  335 |     let mut coefficients = [0.0f32; 3];\n  336 |     for (i, value) in list.iter().enumerate() {\n  337 |         match value {\n  338 |             Value::Rational(num, denom) if *denom != 0 => {\n  339 |                 coefficients[i] = *num as f32 / *denom as f32\n  340 |             }\n  341 |             _ => {\n  342 |                 return Err(ImageError::Decoding(DecodingError::new(\n  343 |                     ImageFormat::Tiff.into(),\n  344 |                     \"YCbCrCoefficients tag (529) contains an invalid rational value\".to_string(),\n  345 |                 )));\n  346 |             }\n  347 |         }\n  348 |     }\n  349 | \n  350 |     Ok(coefficients)\n  351 | }"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`huerotate` and `huerotate_in_place` hardcode `let max = 255f64;` as the clamp ceiling for all pixel types. For 16-bit images (max 65535) every output channel is clamped to 255, effectively destroying the image; for f32 images (nominal max 1.0) values are not clamped meaningfully either. The functions are generic over `S: Primitive`, so they are reachable for u16 and f32 pixels.","fix":"Use `S::DEFAULT_MAX_VALUE` cast to f64 as the clamp ceiling instead of the literal 255, matching the pattern used in `contrast`/`brighten`.","locations":[{"ref":"src/imageops/colorops.rs:279-283","code":"  279 |         let max = 255f64;\n  280 | \n  281 |         channels[0] = NumCast::from(clamp(new_r, 0.0, max)).unwrap();\n  282 |         channels[1] = NumCast::from(clamp(new_g, 0.0, max)).unwrap();\n  283 |         channels[2] = NumCast::from(clamp(new_b, 0.0, max)).unwrap();"},{"ref":"src/imageops/colorops.rs:337-341","code":"  337 |             let max = 255f64;\n  338 | \n  339 |             channels[0] = NumCast::from(clamp(new_r, 0.0, max)).unwrap();\n  340 |             channels[1] = NumCast::from(clamp(new_g, 0.0, max)).unwrap();\n  341 |             channels[2] = NumCast::from(clamp(new_b, 0.0, max)).unwrap();"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"The vertical resampling accumulator is initialized to `Rgba([1.0; 4])` instead of zero. Since the filter weights are normalized to sum to 1.0, every channel of the intermediate float image ends up biased by an extra +1.0. This bias propagates straight through `horizontal_sample` (whose weights also sum to 1) into the final clamped output, so every resized/blurred pixel is off by roughly +1 in each channel. Git history confirms the previous (correct) accumulator was `(0.0, 0.0, 0.0, 0.0)`.","fix":"Initialize the accumulator to zero: `let mut pix = crate::Rgba([0.0; 4]);`.","locations":[{"ref":"src/imageops/sample.rs:545","code":"  545 |             let mut pix = crate::Rgba([1.0; 4]);"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"When a thumbnail block is larger than 256x256 it is split into sub-blocks, but the divisor `sample_count` is computed as `(right-left)/STEP * (top-bottom)/STEP` using truncating integer division, while the loops actually iterate `ceil` times in each dimension. For example a 300-wide block iterates 2 sub-blocks in x but divides by `300/256 = 1`, so the summed sub-block averages are divided by far too small a number, roughly doubling (then clamping) the result. The `thumbnail_huge_block` test only passes because it uses a constant image where the over-large average is clamped back to the constant value.","fix":"Divide by the number of sub-blocks actually summed (use `(right-left).div_ceil(STEP) * (top-bottom).div_ceil(STEP)`), or better, weight each sub-block average by its true pixel count and divide by the total pixel count.","locations":[{"ref":"src/imageops/sample.rs:701-714","code":"  701 |         for y in (bottom..top).step_by(STEP_SIZE as usize) {\n  702 |             for x in (left..right).step_by(STEP_SIZE as usize) {\n  703 |                 let k = thumbnail_sample_block(\n  704 |                     image,\n  705 |                     x,\n  706 |                     x.saturating_add(STEP_SIZE).min(right),\n  707 |                     y,\n  708 |                     y.saturating_add(STEP_SIZE).min(top),\n  709 |                 );\n  710 |                 sum.add_pixel(k);\n  711 |             }\n  712 |         }\n  713 | \n  714 |         ((right - left) as u64 / STEP_SIZE as u64) * ((top - bottom) as u64 / STEP_SIZE as u64)"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The default ImageDecoder::set_limits implementation silently discards the max_alloc (memory) limit. It only validates dimensions via check_layout_dimensions and never stores or applies the limits, so any third-party decoder relying on the default impl ignores the caller's memory limit entirely. The trait docs (lines 30-43) tell implementors to call check_support and check_dimensions but give no indication that the memory limit is dropped, making it easy to ship a decoder that defeats the DoS memory guard.","fix":"Document explicitly that the default impl ignores max_alloc (non-strict) and that decoders must override set_limits to honor it, or have the default store the limits for later use; at minimum strengthen the doc comment so implementors do not assume max_alloc is enforced.","locations":[{"ref":"src/io/decoder.rs:44-49","code":"   44 |     fn set_limits(&mut self, limits: crate::Limits) -> ImageResult<()> {\n   45 |         limits.check_support(&crate::LimitSupport::default())?;\n   46 |         let layout = self.prepare_image()?;\n   47 |         limits.check_layout_dimensions(&layout)?;\n   48 |         Ok(())\n   49 |     }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Rect::from_xy_ranges's debug_assert for the y range prints x.start/x.end in the panic message instead of y.start/y.end (copy-paste from the x check). A caller debugging an inverted y range gets misleading values: it reports the (valid) x range while claiming y is empty.","fix":"Change the format arguments of the y debug_assert to y.start and y.end.","locations":[{"ref":"src/math/rect.rs:43-48","code":"   43 |         debug_assert!(\n   44 |             y.start <= y.end,\n   45 |             \"Range for y is incorrectly empty: {}..{}\",\n   46 |             x.start,\n   47 |             x.end\n   48 |         );"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In strict spec-compliance mode the RLE8 *encoded run* silently truncates a run that overflows the current row via `(&mut pixel_iter).take(n_pixels)` and never reports an error. The analogous RLE4 encoded run (just below) does check the `set_4bit_pixel_run` return value and returns `DecoderError::CorruptRleData` in strict mode, as does the RLE8 *absolute* run. This makes strict mode inconsistent: an over-long RLE8 encoded run that a spec-strict decoder should reject is accepted.","fix":"Count how many pixels were actually written for the RLE8 encoded run and, when spec_strictness == Strict and the run overflowed the row, return DecoderError::CorruptRleData, matching the RLE4/RLE8-absolute behavior.","locations":[{"ref":"src/codecs/bmp/decoder.rs:2276-2285","code":" 2276 |                             ImageType::RLE8 => {\n 2277 |                                 // Clamp to row length for compat with imagemagick:\n 2278 |                                 // https://github.com/image-rs/image/issues/2321\n 2279 |                                 let palette_index = rle_reader.read_byte()?;\n 2280 |                                 let repeat_pixel: [u8; 3] = p.unwrap()[palette_index as usize];\n 2281 |                                 (&mut pixel_iter).take(n_pixels).for_each(|p| {\n 2282 |                                     p[0] = repeat_pixel[0];\n 2283 |                                     p[1] = repeat_pixel[1];\n 2284 |                                     p[2] = repeat_pixel[2];\n 2285 |                                 });"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","description":"GIF `convert_frame` divides the delay (already in milliseconds derived from `Ratio::to_integer`) by 10 to convert to GIF 10ms units, but `encode`/`Frame::from_*` paths set `frame.delay` to whatever the gif crate computes and `encode_gif` unconditionally overwrites `frame.dispose = DisposalMethod::Background`. This means any per-frame disposal method coming from `animation::Frame` (via `convert_frame`) is silently discarded for every frame, so animations that rely on Keep/Previous disposal are re-encoded incorrectly.","fix":"Preserve the frame's intended disposal method instead of hard-coding `DisposalMethod::Background` in `encode_gif`, or document that only Background disposal is supported on encode.","locations":[{"ref":"src/codecs/gif.rs:611-633","code":"  611 |     pub(crate) fn encode_gif(&mut self, mut frame: Frame) -> ImageResult<()> {\n  612 |         let gif_encoder;\n  613 |         if let Some(ref mut encoder) = self.gif_encoder {\n  614 |             gif_encoder = encoder;\n  615 |         } else {\n  616 |             let writer = self.w.take().unwrap();\n  617 |             let mut encoder = gif::Encoder::new(writer, frame.width, frame.height, &[])\n  618 |                 .map_err(ImageError::from_encoding)?;\n  619 |             if let Some(ref repeat) = self.repeat {\n  620 |                 encoder\n  621 |                     .set_repeat(repeat.to_gif_enum())\n  622 |                     .map_err(ImageError::from_encoding)?;\n  623 |             }\n  624 |             self.gif_encoder = Some(encoder);\n  625 |             gif_encoder = self.gif_encoder.as_mut().unwrap();\n  626 |         }\n  627 | \n  628 |         frame.dispose = DisposalMethod::Background;\n  629 | \n  630 |         gif_encoder\n  631 |             .write_frame(&frame)\n  632 |             .map_err(ImageError::from_encoding)\n  633 |     }"},{"ref":"src/codecs/gif.rs:575-594","code":"  575 |     pub(crate) fn convert_frame(\n  576 |         &mut self,\n  577 |         img_frame: animation::Frame,\n  578 |     ) -> ImageResult<Frame<'static>> {\n  579 |         // get the delay before converting img_frame\n  580 |         let frame_delay = img_frame.delay().into_ratio().to_integer();\n  581 |         // convert img_frame into RgbaImage\n  582 |         let mut rbga_frame = img_frame.into_buffer();\n  583 |         let (width, height) = self.gif_dimensions(rbga_frame.width(), rbga_frame.height())?;\n  584 | \n  585 |         // Create the gif::Frame from the animation::Frame\n  586 |         let mut frame = Frame::from_rgba_speed(width, height, &mut rbga_frame, self.speed);\n  587 |         // Saturate the conversion to u16::MAX instead of returning an error as that\n  588 |         // would require a new special cased variant in ParameterErrorKind which most\n  589 |         // likely couldn't be reused for other cases. This isn't a bad trade-off given\n  590 |         // that the current algorithm is already lossy.\n  591 |         frame.delay = (frame_delay / 10).try_into().unwrap_or(u16::MAX);\n  592 | \n  593 |         Ok(frame)\n  594 |     }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","description":"PNG `attributes_from_info` comment says 'PNG delays are rations in seconds' and computes `num = delay_num * 1000`, denom defaulting to 100 when 0. APNG fcTL delay is delay_num/delay_den seconds; multiplying numerator by 1000 yields milliseconds only if the consumer treats the Ratio as ms. The typo ('rations') aside, the unit handling depends on `Delay::from_ratio` interpreting the ratio as milliseconds, which is not stated here, making the conversion easy to get wrong on edits.","fix":"Fix the typo and document that the resulting Ratio is in milliseconds (numerator scaled by 1000), matching `Delay::from_ratio`'s expected unit.","locations":[{"ref":"src/codecs/png.rs:228-239","code":"  228 | fn attributes_from_info(info: &png::Info<'_>) -> DecodedImageAttributes {\n  229 |     let delay = info.frame_control().map(|fc| {\n  230 |         // PNG delays are rations in seconds.\n  231 |         let num = u32::from(fc.delay_num) * 1_000u32;\n  232 |         let denom = match fc.delay_den {\n  233 |             // The standard dictates to replace by 100 when the denominator is 0.\n  234 |             0 => 100,\n  235 |             d => u32::from(d),\n  236 |         };\n  237 | \n  238 |         Delay::from_ratio(Ratio::new(num, denom))\n  239 |     });"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In ArbitraryHeader::tuple_type, the second GRAYSCALE arm uses `self.depth <= 1` whereas every other tuple-type arm uses an exact depth equality (depth == 1, == 2, == 3, == 4). This inadvertently accepts a depth of 0 for grayscale images with maxval in 256..=65535, producing TupleType::GrayU16 for a structurally invalid (depth 0) PAM header instead of rejecting it like the analogous GrayU8 arm (which requires depth == 1).","fix":"Change `self.depth <= 1` to `self.depth == 1` for consistency with the other tuple-type checks so depth 0 is rejected.","locations":[{"ref":"src/codecs/pnm/decoder.rs:932-937","code":"  932 |             Some(ArbitraryTuplType::Grayscale) if self.depth == 1 && self.maxval <= 0xFF => {\n  933 |                 Ok(TupleType::GrayU8)\n  934 |             }\n  935 |             Some(ArbitraryTuplType::Grayscale) if self.depth <= 1 && self.maxval <= 0xFFFF => {\n  936 |                 Ok(TupleType::GrayU16)\n  937 |             }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"TGA color-type detection accepts `(0, 16, true)` (16 'other' bits, 0 attribute bits) and maps it to `Rgb8` with `original_color_type = Rgb5x1`. A true 16-bit-per-pixel TGA has 5+5+5 color bits plus 1 attribute bit (total 16). Treating the 16th bit as a color bit and decoding via `expand_rgb15_to_rgb24` (which only reads 15 bits) silently ignores that bit; this is arguably correct for 5x5x5 but the `(0,16,true)` case can also arise from `map_entry_size == 16` color maps where the 16th bit is meaningful, so the classification merges semantically different inputs under one path.","fix":"Document/verify that the 16th bit is always an ignorable attribute bit for the inputs reaching this arm, or distinguish genuine 5-6-5/5-5-5-1 layouts explicitly.","locations":[{"ref":"src/codecs/tga/decoder.rs:164-170","code":"  164 |             (1, 15, true) | (0, 15, true) | (0, 16, true) => {\n  165 |                 // the 'A' bit for 5-bit-per-primary images is an 'attribute'\n  166 |                 // bit, and cannot safely be interpreted as an alpha channel.\n  167 |                 // (It may contain all zero values or a pattern unrelated to the image.)\n  168 |                 color_type = ColorType::Rgb8;\n  169 |                 original_color_type = Some(ExtendedColorType::Rgb5x1);\n  170 |             }"},{"ref":"src/codecs/tga/decoder.rs:80-97","code":"   80 | /// Convert TGA's 15/16-bit pixel format to its 24 bit pixel format\n   81 | fn expand_rgb15_to_rgb24(data: [u8; 2]) -> [u8; 3] {\n   82 |     /// Converts a 5-bit unorm to a 8-bit unorm.\n   83 |     /// This is equivalent to `round(x * 255 / 31)`.\n   84 |     /// Source: https://rundevelopment.github.io/blog/fast-unorm-conversions#constants\n   85 |     #[inline(always)]\n   86 |     fn unorm5_to_unorm8(x: u16) -> u8 {\n   87 |         debug_assert!(x <= 31);\n   88 |         ((x * 2108 + 92) >> 8) as u8\n   89 |     }\n   90 | \n   91 |     let val = u16::from_le_bytes(data);\n   92 |     [\n   93 |         unorm5_to_unorm8(val & 0b11111),\n   94 |         unorm5_to_unorm8((val >> 5) & 0b11111),\n   95 |         unorm5_to_unorm8((val >> 10) & 0b11111),\n   96 |     ]\n   97 | }"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rgb_to_luma uses integer division (`l / SRGB_LUMA_DIV`) which truncates toward zero instead of rounding to nearest. Every RGB->Luma conversion is therefore biased slightly downward (up to ~1 LSB darker). The neighboring float->int conversions in this same file deliberately add a +0.5 rounding bias, so the truncation here is an inconsistency. The library already documents luma as imperfect, hence low severity, but a `(l + DIV/2) / DIV` rounding would be a trivial accuracy improvement.","fix":"Round instead of truncate: `T::clamp_from((l + half) / div)` where `half = div/2` in the Larger type, or document the intentional truncation.","locations":[{"ref":"src/color.rs:648-654","code":"  648 | #[inline]\n  649 | fn rgb_to_luma<T: Primitive + Enlargeable>(rgb: &[T]) -> T {\n  650 |     let l = <T::Larger as NumCast>::from(SRGB_LUMA[0]).unwrap() * rgb[0].to_larger()\n  651 |         + <T::Larger as NumCast>::from(SRGB_LUMA[1]).unwrap() * rgb[1].to_larger()\n  652 |         + <T::Larger as NumCast>::from(SRGB_LUMA[2]).unwrap() * rgb[2].to_larger();\n  653 |     T::clamp_from(l / <T::Larger as NumCast>::from(SRGB_LUMA_DIV).unwrap())\n  654 | }"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`new_anisotropic_kernel_size` validates the X axis incompletely: it checks `x_axis_kernel_size > 0.` but never checks `x_axis_kernel_size.is_normal()`, while the Y axis is checked twice (both `is_normal()` and `> 0.` appear for `y_axis_kernel_size`, and the X `is_normal` check is missing). A non-normal X kernel size (NaN/inf/subnormal) can slip through.","fix":"Add `assert!(x_axis_kernel_size.is_normal(), ...)` for the X axis and remove the duplicated Y-axis `> 0.`/`is_normal` check.","locations":[{"ref":"src/imageops/sample.rs:1174-1189","code":" 1174 |         assert!(\n 1175 |             x_axis_kernel_size > 0.,\n 1176 |             \"Kernel size do not allow infinities, zeros, NaNs or subnormals or negatives\"\n 1177 |         );\n 1178 |         assert!(\n 1179 |             y_axis_kernel_size.is_normal(),\n 1180 |             \"Kernel size do not allow infinities, zeros, NaNs or subnormals or negatives\"\n 1181 |         );\n 1182 |         assert!(\n 1183 |             y_axis_kernel_size > 0.,\n 1184 |             \"Kernel size do not allow infinities, zeros, NaNs or subnormals or negatives\"\n 1185 |         );\n 1186 |         assert!(\n 1187 |             y_axis_kernel_size.is_normal(),\n 1188 |             \"Kernel size do not allow infinities, zeros, NaNs or subnormals or negatives\"\n 1189 |         );"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`resize_to_fill` computes `iheight - nheight` and `iwidth - nwidth` on u32. It relies on `resize_exact` having produced dimensions >= the requested fill size. This holds for the chosen branch (the dimension that overflows the target is the one being cropped), but the invariant is implicit and undocumented; if `resize_dimensions(..., true)` ever returns a dimension smaller than requested (e.g. due to rounding at extreme aspect ratios), these subtractions underflow and panic in debug / wrap in release, producing a bogus crop rectangle. There is no clamp or assert guarding it.","fix":"Use saturating_sub for the offsets, or assert that `iheight >= nheight` / `iwidth >= nwidth` in the respective branches before subtracting.","locations":[{"ref":"src/images/dynimage.rs:978-996","code":"  978 |     pub fn resize_to_fill(&mut self, nwidth: u32, nheight: u32, filter: imageops::FilterType) {\n  979 |         let (width2, height2) =\n  980 |             resize_dimensions(self.width(), self.height(), nwidth, nheight, true);\n  981 |         self.resize_exact(width2, height2, filter);\n  982 | \n  983 |         let (iwidth, iheight) = self.dimensions();\n  984 |         let ratio = u64::from(iwidth) * u64::from(nheight);\n  985 |         let nratio = u64::from(nwidth) * u64::from(iheight);\n  986 | \n  987 |         let select = if nratio > ratio {\n  988 |             let y = (iheight - nheight) / 2;\n  989 |             Rect::from_xy_ranges(0..nwidth, y..y + nheight)\n  990 |         } else {\n  991 |             let x = (iwidth - nwidth) / 2;\n  992 |             Rect::from_xy_ranges(x..x + nwidth, 0..nheight)\n  993 |         };\n  994 | \n  995 |         *self = self.crop(select);\n  996 |     }"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ImageReader::set_limits halves max_alloc ('half for ourselves, half to the decoder') but ImageReaderOptions::into_decoder passes the full, unhalved limits straight to the decoder while into_reader goes through the halving path. The same Limits value therefore yields different effective decoder memory budgets depending on which conversion method the caller chose, which is surprising and undocumented on into_decoder.","fix":"Document the discrepancy, or apply consistent budgeting in both paths so a given Limits maps to the same decoder allocation budget regardless of into_decoder vs into_reader.","locations":[{"ref":"src/io/image_reader_type.rs:246-251","code":"  246 |     pub fn into_decoder(mut self) -> ImageResult<impl ImageDecoder + 'a> {\n  247 |         let mut decoder =\n  248 |             Self::make_decoder(self.require_format()?, self.inner, self.spec_compliance)?;\n  249 |         decoder.set_limits(self.limits)?;\n  250 |         Ok(decoder)\n  251 |     }"},{"ref":"src/io/image_reader_type.rs:800-809","code":"  800 |     pub fn set_limits(&mut self, mut limits: Limits) -> ImageResult<()> {\n  801 |         if let Some(max_alloc) = &mut limits.max_alloc {\n  802 |             // We'll take half for ourselves, half to the decoder.\n  803 |             *max_alloc /= 2;\n  804 |         }\n  805 | \n  806 |         self.inner.set_limits(limits.clone())?;\n  807 |         self.limits = limits;\n  808 |         Ok(())\n  809 |     }"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"`closest_bounded_fraction` initial guess `(u64::from(nom * 2 > denom), 1u64)` computes `nom * 2` in u32. It is safe for the only in-crate caller (nom = submillis < 1_000_000) but the function is written as a general fraction approximator with only `assert!(nom < denom)`; a caller passing nom near u32::MAX would overflow `nom * 2` in release builds before the comparison. The guard relies entirely on the caller bounding nom well below u32::MAX/2.","fix":"Compute the comparison in u64 (`u64::from(nom) * 2 > u64::from(denom)`) or assert `nom <= u32::MAX/2` to make the bound explicit.","locations":[{"ref":"src/animation.rs:221-252","code":"  221 |     fn closest_bounded_fraction(denom_bound: u32, nom: u32, denom: u32) -> (u32, u32) {\n  222 |         use std::cmp::Ordering::*;\n  223 |         assert!(0 < denom);\n  224 |         assert!(0 < denom_bound);\n  225 |         assert!(nom < denom);\n  226 | \n  227 |         // Avoid a few type troubles. All intermediate results are bounded by `denom_bound` which\n  228 |         // is in turn bounded by u32::MAX. Representing with u64 allows multiplication of any two\n  229 |         // values without fears of overflow.\n  230 | \n  231 |         // Compare two fractions whose parts fit into a u32.\n  232 |         fn compare_fraction((an, ad): (u64, u64), (bn, bd): (u64, u64)) -> Ordering {\n  233 |             (an * bd).cmp(&(bn * ad))\n  234 |         }\n  235 | \n  236 |         // Computes the nominator of the absolute difference between two such fractions.\n  237 |         fn abs_diff_nom((an, ad): (u64, u64), (bn, bd): (u64, u64)) -> u64 {\n  238 |             let c0 = an * bd;\n  239 |             let c1 = ad * bn;\n  240 | \n  241 |             let d0 = c0.max(c1);\n  242 |             let d1 = c0.min(c1);\n  243 |             d0 - d1\n  244 |         }\n  245 | \n  246 |         let exact = (u64::from(nom), u64::from(denom));\n  247 |         // The lower bound fraction, numerator and denominator.\n  248 |         let mut lower = (0u64, 1u64);\n  249 |         // The upper bound fraction, numerator and denominator.\n  250 |         let mut upper = (1u64, 1u64);\n  251 |         // The closest approximation for now.\n  252 |         let mut guess = (u64::from(nom * 2 > denom), 1u64);"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","description":"ImageReader::decode_to_dynimage reserves from the reader's own `max_alloc` limit (self.limits.reserve(layout.total_bytes())) but never calls self.limits.free() after the image buffer is dropped. into_frames() calls decode_to_dynimage once per frame, so for a multi-frame animation each frame permanently subtracts its full buffer size from the running limit even though the previous frame's buffer has already been moved out / dropped. After enough frames the reader spuriously fails with LimitErrorKind::InsufficientMemory even though peak memory never approached the limit. Compare skip_image (lines 637-639) which correctly pairs reserve/free.","fix":"After the buffer is no longer needed (or symmetrically after decode_raw returns and the image has been handed back), call self.limits.free(layout.total_bytes()). For the per-frame case in into_frames, reserve/free around each iteration, or move the reservation+free inside decode_to_dynimage so each call is balanced.","locations":[{"ref":"src/io/image_reader_type.rs:546-552","code":"  546 |         self.limits.check_layout_dimensions(&layout)?;\n  547 |         // Check that we do not allocate a bigger buffer than we are allowed to\n  548 |         // FIXME: should this rather go in `DynamicImage::from_decoder` somehow?\n  549 |         self.limits.reserve(layout.total_bytes())?;\n  550 | \n  551 |         // Retrieve the raw image data as indicated by the layout.\n  552 |         self.last_attributes = image.decode_raw(self.inner.as_mut(), layout)?;"},{"ref":"src/io/image_reader_type.rs:829-851","code":"  829 |         let iter = core::iter::from_fn(move || {\n  830 |             match self.inner.more_images() {\n  831 |                 SequenceControl::MaybeMore => {}\n  832 |                 SequenceControl::None => return None,\n  833 |             }\n  834 | \n  835 |             let no_delay = Delay::from_saturating_duration(Default::default());\n  836 | \n  837 |             let mut frame = DynamicImage::default();\n  838 |             let frame_decoded = match self.decode_to_dynimage(&mut frame) {\n  839 |                 Ok(frame) => frame,\n  840 |                 Err(ref err) if is_end_reached(err) => return None,\n  841 |                 Err(err) => return Some(Err(err)),\n  842 |             };\n  843 | \n  844 |             let x = frame_decoded.attributes().x;\n  845 |             let y = frame_decoded.attributes().y;\n  846 |             let delay = frame_decoded.attributes().delay.unwrap_or(no_delay);\n  847 |             let frame = frame.into_rgba8();\n  848 | \n  849 |             let frame = Frame::from_parts(frame, x, y, delay);\n  850 |             Some(Ok(frame))\n  851 |         });"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`JpegDecoder::set_limits` stores `self.limits` but never forwards any memory/allocation limit to the underlying `zune_jpeg::JpegDecoder`. Only `check_layout_dimensions` is performed. The zune decoder is even explicitly configured with `set_max_width(usize::MAX)`/`set_max_height(usize::MAX)` in the constructor. As a result, decoding an untrusted JPEG can allocate large internal buffers regardless of the `Limits` the caller set, defeating the purpose of `set_limits` for memory safety against malicious input.","fix":"Propagate `limits.max_alloc` to the zune decoder options (or otherwise constrain its allocations) so the configured limit actually bounds decode-time memory, rather than only validating dimensions.","locations":[{"ref":"src/codecs/jpeg/decoder.rs:173-179","code":"  173 |     fn set_limits(&mut self, limits: Limits) -> ImageResult<()> {\n  174 |         limits.check_support(&crate::LimitSupport::default())?;\n  175 |         let layout = self.prepare_image()?;\n  176 |         limits.check_layout_dimensions(&layout)?;\n  177 |         self.limits = limits;\n  178 |         Ok(())\n  179 |     }"},{"ref":"src/codecs/jpeg/decoder.rs:34-49","code":"   34 |     pub(crate) fn with_spec_compliance(r: R, spec: SpecCompliance) -> JpegDecoder<R> {\n   35 |         let options = zune_core::options::DecoderOptions::default()\n   36 |             .set_strict_mode(matches!(spec, SpecCompliance::Strict))\n   37 |             .set_max_width(usize::MAX)\n   38 |             .set_max_height(usize::MAX);\n   39 | \n   40 |         let decoder = zune_jpeg::JpegDecoder::new_with_options(r, options);\n   41 |         // Limits are disabled by default in the constructor for all decoders\n   42 |         let limits = Limits::no_limits();\n   43 | \n   44 |         JpegDecoder {\n   45 |             decoder,\n   46 |             header: None,\n   47 |             limits,\n   48 |         }\n   49 |     }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In read_next_u32, an I/O error encountered while reading the digits of a header number is silently swallowed. The byte iterator yields Err(err) which is matched by `Err(_) => break`, ending number parsing as if EOF was reached. If at least one digit was already read, the function returns a possibly-truncated value and the underlying I/O error is lost; the decoder then proceeds with garbage dimensions/maxval instead of surfacing the failure.","fix":"Propagate the I/O error instead of breaking: change the `Err(_) => break` arm to `Err(e) => return Err(ImageError::IoError(e))` (or break only when `found_digit` is true AND the error is a genuine EOF), so real read errors are not masked as a successful parse.","locations":[{"ref":"src/codecs/pnm/decoder.rs:437-470","code":"  437 |         for (_, byte) in mark_comments.filter(|e| e.0) {\n  438 |             match byte {\n  439 |                 Ok(b'\\t' | b'\\n' | b'\\x0b' | b'\\x0c' | b'\\r' | b' ') => {\n  440 |                     if found_digit {\n  441 |                         break; // We're done as we already have some content\n  442 |                     }\n  443 |                 }\n  444 |                 Ok(byte) if !byte.is_ascii() => {\n  445 |                     return Err(DecoderError::NonAsciiByteInHeader(byte).into())\n  446 |                 }\n  447 |                 Ok(byte) => {\n  448 |                     let digit = match byte {\n  449 |                         b'0'..=b'9' => u32::from(byte - b'0'),\n  450 |                         _ => {\n  451 |                             return Err(DecoderError::InvalidDigit(ErrorDataSource::Preamble).into())\n  452 |                         }\n  453 |                     };\n  454 |                     value = value\n  455 |                         .checked_mul(10)\n  456 |                         .ok_or(DecoderError::Overflow(ErrorDataSource::Preamble))?;\n  457 |                     value = value\n  458 |                         .checked_add(digit)\n  459 |                         .ok_or(DecoderError::Overflow(ErrorDataSource::Preamble))?;\n  460 |                     found_digit = true;\n  461 |                 }\n  462 |                 Err(_) => break,\n  463 |             }\n  464 |         }\n  465 | \n  466 |         if !found_digit {\n  467 |             return Err(ImageError::IoError(io::ErrorKind::UnexpectedEof.into()));\n  468 |         }\n  469 | \n  470 |         Ok(value)"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"When a V4/V5 calibrated-RGB color space is parsed, the synthesized ICC profile is produced via `params.to_color_profile().encode()` and any encode error is silently dropped (`if let Ok(encoded) = ...`). A malformed/edge-case calibration that fails to encode results in no ICC profile and no diagnostic, silently losing color information without surfacing the problem.","fix":"At minimum log/propagate the encode failure, or document explicitly that calibration-profile encode failures are intentionally ignored as best-effort.","locations":[{"ref":"src/codecs/bmp/decoder.rs:1696-1698","code":" 1696 |                     if let Ok(encoded) = params.to_color_profile().encode() {\n 1697 |                         self.icc_profile = Some(encoded);\n 1698 |                     }"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"TIFF `icc_profile` swallows all decode errors via `decoder.get_tag_u8_vec(Tag::IccProfile).ok()`, returning `Ok(None)` whether the ICC tag is absent OR a genuine I/O/format error occurred while reading it. A corrupt-but-present ICC tag is silently reported as 'no profile' instead of surfacing the error.","fix":"Distinguish the 'tag not found' case (return Ok(None)) from real errors (propagate via `from_tiff_decode`), as is already done for the XMP tag at tiff.rs:481-492.","locations":[{"ref":"src/codecs/tiff.rs:468-474","code":"  468 |     fn icc_profile(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  469 |         if let Some(decoder) = &mut self.inner {\n  470 |             Ok(decoder.get_tag_u8_vec(Tag::IccProfile).ok())\n  471 |         } else {\n  472 |             Ok(None)\n  473 |         }\n  474 |     }"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`gaussian_blur_dyn_image` and `gaussian_blur_indirect_impl` call `.unwrap()` on every `filter_2d_sep_*` result and on `ImageBuffer::from_raw(...).unwrap()`. The filter functions return `Result` specifically to report dimension/limit errors (e.g. capacity overflow on huge images), but these are turned into panics rather than propagated, so a public blur call can panic instead of returning an error.","fix":"Propagate the error (the public `blur`/`blur_advanced` API would need to return a Result), or document and guard the size limits before calling so the unwrap is provably infallible.","locations":[{"ref":"src/imageops/sample.rs:1324","code":" 1324 |             .unwrap();"},{"ref":"src/imageops/sample.rs:1531","code":" 1531 |             .unwrap();"},{"ref":"src/imageops/sample.rs:1561","code":" 1561 |             .unwrap();"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"In the ring-queue separable filter, a fresh `Vec` of row slice references (`vec![image; column_kernel_len]`) is heap-allocated for every output row inside the hot per-row loop. For tall images this is one allocation/free per scanline, which the column pass otherwise avoids.","fix":"Allocate the `buffer_rows` Vec once before the loop and only rewrite its contents each iteration, or use a fixed-size stack array / SmallVec sized to the kernel length.","locations":[{"ref":"src/imageops/filter_1d.rs:582-586","code":"  582 |             let mut buffer_rows = vec![image; column_kernel_len];\n  583 |             for (i, row) in buffer_rows.iter_mut().enumerate() {\n  584 |                 let ky = (i + start_ky + 1) % column_kernel_len;\n  585 |                 *row = &buffer[ky * full_width..(ky + 1) * full_width];\n  586 |             }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","description":"In the non-ring (large-kernel) separable filter path, a `Vec<&[T]>` of row references is heap-allocated on every output row inside the hot per-row loop, then refilled. This adds an allocation/free per scanline of the column pass.","fix":"Hoist the `rows` Vec allocation out of the `for (y, dst)` loop and only update its entries each iteration.","locations":[{"ref":"src/imageops/filter_1d.rs:743","code":"  743 |         let mut rows: Vec<&[T]> = vec![&transient_image_slice[0..]; column_kernel_shape.height];"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","description":"`filter3x3` recomputes the full 9-tap convolution for every pixel and converts each subpixel through `NumCast::from(...).unwrap()` per tap. The code's own TODO acknowledges that a separable / running-sum approach would avoid most of the per-pixel work. This is a hot per-pixel inner loop.","fix":"For separable kernels use a two-pass running-sum; otherwise hoist the float conversions and avoid the per-tap `unwrap` by reading channels into a local array once.","locations":[{"ref":"src/imageops/sample.rs:929-941","code":"  929 |             // TODO: There is no need to recalculate the kernel for each pixel.\n  930 |             // Only a subtract and addition is needed for pixels after the first\n  931 |             // in each row.\n  932 |             for (&k, &(a, b)) in kernel.iter().zip(taps.iter()) {\n  933 |                 let x0 = x as isize + a;\n  934 |                 let y0 = y as isize + b;\n  935 | \n  936 |                 let p = image.get_pixel(x0 as u32, y0 as u32);\n  937 | \n  938 |                 for (tc, &c) in t.iter_mut().zip(p.channels()) {\n  939 |                     *tc += <f32 as NumCast>::from(c).unwrap() * k;\n  940 |                 }\n  941 |             }"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","description":"`apply_color_space` clones the entire image (`let mut target = self.clone();`) and then immediately overwrites every pixel via `copy_from_color_space`. The clone's pixel data is never read — only its dimensions/color-type/color-space slots are used as a destination buffer. For large images this is a full redundant allocation + memcpy of the whole pixel buffer that is thrown away. A fresh `DynamicImage::new(w, h, color)` plus copying only the color-space annotation would avoid copying the pixel bytes.","fix":"Allocate an empty target via `DynamicImage::new(self.width(), self.height(), self.color())`, copy over the color-space metadata, then `copy_from_color_space`, instead of cloning the pixel data.","locations":[{"ref":"src/images/dynimage.rs:1343-1352","code":" 1343 |         // We could conceivably do this in-place faster but to handle the Luma conversion as we\n 1344 |         // want this requires the full machinery as `CicpTransform::transform_dynamic` which is\n 1345 |         // quite the replication. Let's just see if it is fast enough. Feel free to PR something if\n 1346 |         // it is easy enough to review.\n 1347 |         let mut target = self.clone();\n 1348 |         target.set_color_space(cicp)?;\n 1349 |         target.copy_from_color_space(self, options)?;\n 1350 | \n 1351 |         *self = target;\n 1352 |         Ok(())"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"medium","description":"`View::get_pixel` and `ViewMut::get_pixel` allocate and zero-initialize a stack buffer `[Zero::zero(); 256]` of the subpixel type on every single pixel access, then copy only `CHANNEL_COUNT` (<=4) elements out of it. For `Subpixel = f32`/`u16` this zeroes 1KB / 512 bytes per pixel in a hot per-pixel loop, which the optimizer cannot always elide. This penalizes every `get_pixel`-based traversal of a flat `View`.","fix":"Use a fixed small buffer sized to the maximum supported channel count (e.g. `[Subpixel; 4]` or a const-generic of `P::CHANNEL_COUNT`) instead of 256, or build the pixel directly without the intermediate zeroed array.","locations":[{"ref":"src/images/flat.rs:1652-1662","code":" 1652 |         let mut buffer = [Zero::zero(); 256];\n 1653 |         buffer\n 1654 |             .iter_mut()\n 1655 |             .enumerate()\n 1656 |             .take(channels)\n 1657 |             .for_each(|(c, to)| {\n 1658 |                 let index = base_index + c * self.inner.layout.channel_stride;\n 1659 |                 *to = image[index];\n 1660 |             });\n 1661 | \n 1662 |         *P::from_slice(&buffer[..channels])"},{"ref":"src/images/flat.rs:1696-1706","code":" 1696 |         let mut buffer = [Zero::zero(); 256];\n 1697 |         buffer\n 1698 |             .iter_mut()\n 1699 |             .enumerate()\n 1700 |             .take(channels)\n 1701 |             .for_each(|(c, to)| {\n 1702 |                 let index = base_index + c * self.inner.layout.channel_stride;\n 1703 |                 *to = image[index];\n 1704 |             });\n 1705 | \n 1706 |         *P::from_slice(&buffer[..channels])"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"`process_halved_chroma_row_cgco` recomputes `scale_coef` (a float division, multiply and float-to-int cast) once for every chroma row, even though it depends only on `range.range_y`, `max_value` and `PRECISION`, which are constant across the whole image. The analogous YCbCr path (`process_halved_chroma_row_cbcr`) precomputes its transform once outside the per-row work. For tall images this is a redundant per-row float op in the hot decode loop.","fix":"Compute `scale_coef` once in the invoker (like `CbCrInverseTransform`) and thread it into the row handler, or hoist it out of the per-row closure so it is evaluated a single time per conversion.","locations":[{"ref":"src/codecs/avif/ycgco.rs:125","code":"  125 |     let scale_coef = ((max_value as f32 / range.range_y as f32) * (1 << PRECISION) as f32) as i32;"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"`read_scanline` performs two seeks per invocation on the final scanline in lenient mode: `stream_position()`, `seek(SeekFrom::End(0))`, then `seek(SeekFrom::Start(current_pos))` to measure remaining bytes. In resumable decoding the last row can be attempted repeatedly, and the End seek can be expensive on some readers. The remaining-byte check is only needed to handle the missing-final-byte case.","fix":"Avoid the End/Start seek round-trip when not needed (e.g. attempt a normal read_exact first and only fall back to the short-read handling on UnexpectedEof), or cache the stream length once.","locations":[{"ref":"src/codecs/bmp/decoder.rs:720-735","code":"  720 |     if is_last_row && spec_strictness == SpecCompliance::Lenient {\n  721 |         let current_pos = reader.stream_position()?;\n  722 |         let end_pos = reader.seek(SeekFrom::End(0))?;\n  723 |         reader.seek(SeekFrom::Start(current_pos))?;\n  724 | \n  725 |         let Some((last, head)) = buf.split_last_mut() else {\n  726 |             // Empty row, nothing to read.\n  727 |             return Ok(());\n  728 |         };\n  729 | \n  730 |         if Ok(head.len()) == usize::try_from(end_pos - current_pos) {\n  731 |             reader.read_exact(head)?;\n  732 |             *last = b'\\0';\n  733 |             return Ok(());\n  734 |         }\n  735 |     }"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","description":"GIF `encode` for `Rgba8` does `&mut data.to_owned()` to obtain a mutable buffer for `Frame::from_rgba_speed`, allocating a full copy of every frame's pixel data on each call. For large or numerous frames this is a significant avoidable allocation/copy.","fix":"Where the caller owns the buffer, accept/move an owned buffer or reuse a scratch buffer across frames rather than cloning via `to_owned()` on every encode call.","locations":[{"ref":"src/codecs/gif.rs:519-524","code":"  519 |             ExtendedColorType::Rgba8 => self.encode_gif(Frame::from_rgba_speed(\n  520 |                 width,\n  521 |                 height,\n  522 |                 &mut data.to_owned(),\n  523 |                 self.speed,\n  524 |             )),"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","description":"OpenEXR `read_image` reads the entire decoded layer into an internally-allocated `Vec<f32>` and then `copy_from_slice`s it into the caller's `unaligned_bytes`. The code itself acknowledges this with `// TODO this copy is strictly not necessary`. For large float images this doubles peak memory and adds a full-image memcpy on every decode.","fix":"Read directly into the caller-provided buffer (writing f32 values at their computed byte offsets) to avoid the extra full-image allocation and copy.","locations":[{"ref":"src/codecs/openexr.rs:214-220","code":"  214 |         // TODO this copy is strictly not necessary, but the exr api is a little too simple for reading into a borrowed target slice\n  215 | \n  216 |         // this cast is safe and works with any alignment, as bytes are copied, and not f32 values.\n  217 |         // note: buffer slice length is checked in the beginning of this function and will be correct at this point\n  218 |         unaligned_bytes.copy_from_slice(bytemuck::cast_slice(\n  219 |             result.layer_data.channel_data.pixels.as_slice(),\n  220 |         ));"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","description":"In PnmEncoder sample-value validation, `image.all_smaller(header_maxval)` iterates over the entire sample buffer to confirm no sample exceeds the header maxval. For large images encoded with a non-saturated maxval (header_maxval < max_sample) this is an O(n) extra pass over all pixel data on every encode. The guard `header_maxval < max_sample` avoids it only when the header was chosen to be saturated.","fix":"Where the encoder itself selects the header (dynamic/subtyped paths), it can guarantee max_sample == header_maxval and skip the scan; only the user-supplied with_header path needs the full check. Consider threading that knowledge through so the common dynamic-header path never pays for the linear validation.","locations":[{
