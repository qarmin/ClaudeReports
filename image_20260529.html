"ref":"src/codecs/pnm/encoder.rs:536-547","code":"  536 |         // Avoid the performance heavy check if possible, e.g. if the header has been chosen by us.\n  537 |         if header_maxval < max_sample && !image.all_smaller(header_maxval) {\n  538 |             // Sample value greater than allowed for chosen header.\n  539 |             return Err(ImageError::Unsupported(\n  540 |                 UnsupportedError::from_format_and_kind(\n  541 |                     ImageFormat::Pnm.into(),\n  542 |                     UnsupportedErrorKind::GenericFeature(\n  543 |                         \"Sample value greater than allowed for chosen header\".to_owned(),\n  544 |                     ),\n  545 |                 ),\n  546 |             ));\n  547 |         }"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","description":"TGA decoder allocates a full-image temporary `rawbuf` and copies the entire raw buffer into it both for color-map expansion and for 15-bit expansion, purely to read from one buffer while writing to another. The code comments acknowledge this could be avoided. For large images this doubles peak memory.","fix":"Expand in place from the end of the buffer toward the start (since output stride >= input stride), or expand row-by-row into a small scratch buffer, to avoid the full-image temporary allocation and copy.","locations":[{"ref":"src/codecs/tga/decoder.rs:434-453","code":"  434 |         if let Some(ref color_map) = self.color_map {\n  435 |             // This allocation could be avoided by expanding each row (or block of pixels) as it is\n  436 |             // read, or by doing the color map expansion in-place. But those may be more effort than\n  437 |             // it is worth.\n  438 |             let mut rawbuf = vec_try_with_capacity(num_raw_bytes)?;\n  439 |             rawbuf.extend_from_slice(&buf[..num_raw_bytes]);\n  440 | \n  441 |             self.expand_color_map(&rawbuf, buf, color_map)?;\n  442 |         } else if self.original_color_type == Some(ExtendedColorType::Rgb5x1) {\n  443 |             // Expand the 15-bit to 24-bit representation for non-color-mapped images;\n  444 |             // the expansion for color-mapped 15-bit images was already done in the color map\n  445 |             let mut rawbuf = vec_try_with_capacity(num_raw_bytes)?;\n  446 |             rawbuf.extend_from_slice(&buf[..num_raw_bytes]);\n  447 | \n  448 |             let rawbuf_chunks = rawbuf.as_chunks::<2>().0.iter();\n  449 |             let buf_chunks = buf.as_chunks_mut::<3>().0.iter_mut();\n  450 |             for (&src, dst) in rawbuf_chunks.zip(buf_chunks) {\n  451 |                 *dst = expand_rgb15_to_rgb24(src);\n  452 |             }\n  453 |         }"}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","description":"TGA encoder copies the entire input image with `Vec::from(buf)` solely to swap the R and B byte of each pixel before writing (both in the RLE and uncompressed Rgb8/Rgba8 paths). This is a full-image allocation and copy per encode.","fix":"Stream the BGR swap during writing (e.g. write each pixel with bytes reordered) or reuse a small per-row scratch buffer instead of cloning the whole image.","locations":[{"ref":"src/codecs/tga/encoder.rs:204-217","code":"  204 |                     ExtendedColorType::Rgb8 | ExtendedColorType::Rgba8 => {\n  205 |                         let mut image = Vec::from(buf);\n  206 | \n  207 |                         for pixel in image.chunks_mut(usize::from(color_type.bits_per_pixel() / 8))\n  208 |                         {\n  209 |                             pixel.swap(0, 2);\n  210 |                         }\n  211 | \n  212 |                         self.run_length_encode(&image, color_type)?;\n  213 |                     }\n  214 |                     _ => {\n  215 |                         self.run_length_encode(buf, color_type)?;\n  216 |                     }\n  217 |                 }"},{"ref":"src/codecs/tga/encoder.rs:222-236","code":"  222 |                 match color_type {\n  223 |                     ExtendedColorType::Rgb8 | ExtendedColorType::Rgba8 => {\n  224 |                         let mut image = Vec::from(buf);\n  225 | \n  226 |                         for pixel in image.chunks_mut(usize::from(color_type.bits_per_pixel() / 8))\n  227 |                         {\n  228 |                             pixel.swap(0, 2);\n  229 |                         }\n  230 | \n  231 |                         self.writer.write_all(&image)?;\n  232 |                     }\n  233 |                     _ => {\n  234 |                         self.writer.write_all(buf)?;\n  235 |                     }\n  236 |                 }"}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","description":"`Blend for Rgba` has fast-path early returns for a fully transparent foreground (`other.0[3].is_zero()`) and a fully opaque foreground (`== DEFAULT_MAX_VALUE`, doing `*self = *other`). `Blend for LumaA` has neither fast path and always runs the full float premultiply/unpremultiply pipeline, even for the common opaque-foreground case where the result is simply `*self = *other`. This is an inconsistency between two otherwise-parallel implementations and a missed optimization on the hot per-pixel blend path.","fix":"Mirror the Rgba fast paths in LumaA::blend: early-return when `other.0[1].is_zero()`, and `*self = *other` when `other.0[1] == T::DEFAULT_MAX_VALUE`.","locations":[{"ref":"src/color.rs:867-898","code":"  867 | impl<T: Primitive> Blend for LumaA<T> {\n  868 |     fn blend(&mut self, other: &LumaA<T>) {\n  869 |         let max_t = T::DEFAULT_MAX_VALUE;\n  870 |         let max_t = max_t.to_f32().unwrap();\n  871 |         let (bg_luma, bg_a) = (self.0[0], self.0[1]);\n  872 |         let (fg_luma, fg_a) = (other.0[0], other.0[1]);\n  873 | \n  874 |         let (bg_luma, bg_a) = (\n  875 |             bg_luma.to_f32().unwrap() / max_t,\n  876 |             bg_a.to_f32().unwrap() / max_t,\n  877 |         );\n  878 |         let (fg_luma, fg_a) = (\n  879 |             fg_luma.to_f32().unwrap() / max_t,\n  880 |             fg_a.to_f32().unwrap() / max_t,\n  881 |         );\n  882 | \n  883 |         let alpha_final = bg_a + fg_a - bg_a * fg_a;\n  884 |         if alpha_final == 0.0 {\n  885 |             return;\n  886 |         };\n  887 |         let bg_luma_a = bg_luma * bg_a;\n  888 |         let fg_luma_a = fg_luma * fg_a;\n  889 | \n  890 |         let out_luma_a = fg_luma_a + bg_luma_a * (1.0 - fg_a);\n  891 |         let out_luma = out_luma_a / alpha_final;\n  892 | \n  893 |         *self = LumaA([\n  894 |             T::nearest_from(max_t * out_luma),\n  895 |             T::nearest_from(max_t * alpha_final),\n  896 |         ]);\n  897 |     }\n  898 | }"}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","description":"`unsharpen` computes the blurred image then iterates every pixel re-fetching `image.get_pixel(x,y)` and `tmp.get_pixel_mut(x,y)` with bounds-checked coordinate access in a tight loop, plus per-channel `NumCast::from(...).unwrap()`. The leftover `// FIXME what does this do for f32?` comment also flags that the i32 clamp path is wrong/undefined for f32 subpixels (it casts the max via `NumCast::<i32>` which is 1 for f32, clamping float channels to 0..=1 as integers).","fix":"Iterate with `enumerate_pixels`/zipped row iterators to avoid bounds checks, and handle the f32 case explicitly instead of routing it through i32 clamping.","locations":[{"ref":"src/imageops/sample.rs:1595-1620","code":" 1595 |     let max = S::DEFAULT_MAX_VALUE;\n 1596 |     let max: i32 = NumCast::from(max).unwrap();\n 1597 |     let (width, height) = image.dimensions();\n 1598 | \n 1599 |     for y in 0..height {\n 1600 |         for x in 0..width {\n 1601 |             let a = image.get_pixel(x, y);\n 1602 |             let b = tmp.get_pixel_mut(x, y);\n 1603 | \n 1604 |             let p = a.map2(b, |c, d| {\n 1605 |                 let ic: i32 = NumCast::from(c).unwrap();\n 1606 |                 let id: i32 = NumCast::from(d).unwrap();\n 1607 | \n 1608 |                 let diff = ic - id;\n 1609 | \n 1610 |                 if diff.abs() > threshold {\n 1611 |                     let e = clamp(ic + diff, 0, max); // FIXME what does this do for f32? clamp 0-1 integers??\n 1612 | \n 1613 |                     NumCast::from(e).unwrap()\n 1614 |                 } else {\n 1615 |                     c\n 1616 |                 }\n 1617 |             });\n 1618 | \n 1619 |             *b = p;\n 1620 |         }"}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","description":"`grayscale()` clones the buffer for already-gray variants (ImageLuma8/ImageLuma16 do `p.clone()`), but for `ImageLumaA8`/`ImageLumaA16` it calls `imageops::grayscale_alpha(p)` which recomputes luma for every pixel even though a LumaA image is already grayscale. The luma value of an already-gray pixel is unchanged, so this is wasted per-pixel work; a clone would suffice for the LumaA variants (matching the Luma variants' treatment).","fix":"For ImageLumaA8/ImageLumaA16 return `p.clone()` directly instead of running grayscale_alpha, since the data is already grayscale.","locations":[{"ref":"src/images/dynimage.rs:877-891","code":"  877 |             DynamicImage::ImageLumaA8(ref p) => {\n  878 |                 DynamicImage::ImageLumaA8(imageops::grayscale_alpha(p))\n  879 |             }\n  880 |             DynamicImage::ImageRgb8(ref p) => DynamicImage::ImageLuma8(imageops::grayscale(p)),\n  881 |             DynamicImage::ImageRgba8(ref p) => {\n  882 |                 DynamicImage::ImageLumaA8(imageops::grayscale_alpha(p))\n  883 |             }\n  884 |             DynamicImage::ImageLuma16(ref p) => DynamicImage::ImageLuma16(p.clone()),\n  885 |             DynamicImage::ImageLumaA16(ref p) => {\n  886 |                 DynamicImage::ImageLumaA16(imageops::grayscale_alpha(p))\n  887 |             }\n  888 |             DynamicImage::ImageRgb16(ref p) => DynamicImage::ImageLuma16(imageops::grayscale(p)),\n  889 |             DynamicImage::ImageRgba16(ref p) => {\n  890 |                 DynamicImage::ImageLumaA16(imageops::grayscale_alpha(p))\n  891 |             }"}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"low","description":"`SubImage::to_image` slow path (when no row-major pixel view is available) iterates per pixel calling `borrowed.get_pixel(x + xoffset, y + yoffset)` followed by `out.put_pixel(x, y, p)`, each doing a bounds check. For large sub-images without a fast `to_pixel_view`, this is a doubly bounds-checked per-pixel copy. Acceptable as a fallback but notably slower than necessary.","fix":"Where the target `out` buffer is freshly allocated and known in-bounds, write rows via `out.rows_mut()` and `unsafe_get_pixel`/`unsafe_put_pixel`, or fill row slices directly to avoid per-pixel bounds checks.","locations":[{"ref":"src/images/sub_image.rs:103-108","code":"  103 |         for y in 0..h {\n  104 |             for x in 0..w {\n  105 |                 let p = borrowed.get_pixel(x + self.inner.xoffset, y + self.inner.yoffset);\n  106 |                 out.put_pixel(x, y, p);\n  107 |             }\n  108 |         }"}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"low","description":"MetadataBlock::get() clones the entire metadata Vec<u8> on every successful access (Ok(Some(data.clone()))). ICC profiles and EXIF/XMP/IPTC blocks can be large (ICC profiles routinely tens of KB). apply_metdata calls icc_profile() and exif_metadata() on every single image decode, and users may poll repeatedly, each call re-allocating and copying the whole buffer.","fix":"Return a borrowed slice/Cow where possible, or take the buffer out (mem::take) when the caller is expected to consume it, to avoid repeated full clones of potentially large metadata blocks.","locations":[{"ref":"src/io/image_reader_type.rs:406","code":"  406 |             MetadataBlock::Ok(data) => Ok(Some(data.clone())),"}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"negligible","description":"In the 444 YCgCo conversion the per-row `match yuv_range` re-evaluates the Tv-branch `y_coef` (a float division and cast) inside the outer row loop for every scanline. The branch and the coefficient are invariant over the image, so this repeats work that could be done once before the loop.","fix":"Hoist the `match yuv_range` and the `y_coef` computation above the `for ... rgb_iter` loop, dispatching to a per-row inner loop, so the coefficient is computed once.","locations":[{"ref":"src/codecs/avif/ycgco.rs:249-281","code":"  249 |     for (((y_src, u_src), v_src), rgb) in y_iter.zip(u_iter).zip(v_iter).zip(rgb_iter) {\n  250 |         let rgb_chunks = rgb.as_chunks_mut::<CHANNELS>().0.iter_mut();\n  251 |         match yuv_range {\n  252 |             YuvIntensityRange::Tv => {\n  253 |                 let y_coef =\n  254 |                     ((max_value as f32 / range.range_y as f32) * (1 << PRECISION) as f32) as i32;\n  255 |                 for (((y_src, u_src), v_src), rgb_dst) in\n  256 |                     y_src.iter().zip(u_src).zip(v_src).zip(rgb_chunks)\n  257 |                 {\n  258 |                     let y_value = y_src.as_() - bias_y;\n  259 |                     let cg_value = u_src.as_() - bias_uv;\n  260 |                     let co_value = v_src.as_() - bias_uv;\n  261 | \n  262 |                     ycgco_execute_limited::<V, PRECISION, CHANNELS, BIT_DEPTH>(\n  263 |                         rgb_dst, y_value, cg_value, co_value, y_coef,\n  264 |                     );\n  265 |                 }\n  266 |             }\n  267 |             YuvIntensityRange::Pc => {\n  268 |                 for (((y_src, u_src), v_src), rgb_dst) in\n  269 |                     y_src.iter().zip(u_src).zip(v_src).zip(rgb_chunks)\n  270 |                 {\n  271 |                     let y_value = y_src.as_() - bias_y;\n  272 |                     let cg_value = u_src.as_() - bias_uv;\n  273 |                     let co_value = v_src.as_() - bias_uv;\n  274 | \n  275 |                     ycgco_execute_full::<V, PRECISION, CHANNELS, BIT_DEPTH>(\n  276 |                         rgb_dst, y_value, cg_value, co_value,\n  277 |                     );\n  278 |                 }\n  279 |             }\n  280 |         }\n  281 |     }"}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"negligible","description":"PNG `icc_profile`, `exif_metadata` map the stored profile with `.map(|x| x.to_vec())`, and `iptc_metadata`/`xmp_metadata` clone whole text chunks with `.cloned()` before extracting bytes. These create extra copies of potentially large metadata blobs on each call; if called more than once the cost repeats.","fix":"Cache extracted metadata, or take ownership once, to avoid repeated cloning of large chunks on each accessor call.","locations":[{"ref":"src/codecs/png.rs:296-353","code":"  296 |     fn icc_profile(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  297 |         let reader = self.ensure_reader_and_header()?;\n  298 |         Ok(reader.info().icc_profile.as_ref().map(|x| x.to_vec()))\n  299 |     }\n  300 | \n  301 |     fn exif_metadata(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  302 |         let reader = self.ensure_reader_and_header()?;\n  303 |         Ok(reader.info().exif_metadata.as_ref().map(|x| x.to_vec()))\n  304 |     }\n  305 | \n  306 |     fn xmp_metadata(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  307 |         let reader = self.ensure_reader_and_header()?;\n  308 | \n  309 |         if let Some(mut itx_chunk) = reader\n  310 |             .info()\n  311 |             .utf8_text\n  312 |             .iter()\n  313 |             .find(|chunk| chunk.keyword.contains(XMP_KEY))\n  314 |             .cloned()\n  315 |         {\n  316 |             itx_chunk.decompress_text().map_err(ImageError::from_png)?;\n  317 |             return itx_chunk\n  318 |                 .get_text()\n  319 |                 .map(|text| Some(text.into_bytes()))\n  320 |                 .map_err(ImageError::from_png);\n  321 |         }\n  322 | \n  323 |         Ok(None)\n  324 |     }\n  325 | \n  326 |     fn iptc_metadata(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  327 |         let reader = self.ensure_reader_and_header()?;\n  328 | \n  329 |         if let Some(mut text_chunk) = reader\n  330 |             .info()\n  331 |             .compressed_latin1_text\n  332 |             .iter()\n  333 |             .find(|chunk| IPTC_KEYS.iter().any(|key| chunk.keyword.contains(key)))\n  334 |             .cloned()\n  335 |         {\n  336 |             text_chunk.decompress_text().map_err(ImageError::from_png)?;\n  337 |             return text_chunk\n  338 |                 .get_text()\n  339 |                 .map(|text| Some(text.into_bytes()))\n  340 |                 .map_err(ImageError::from_png);\n  341 |         }\n  342 | \n  343 |         if let Some(text_chunk) = reader\n  344 |             .info()\n  345 |             .uncompressed_latin1_text\n  346 |             .iter()\n  347 |             .find(|chunk| IPTC_KEYS.iter().any(|key| chunk.keyword.contains(key)))\n  348 |             .cloned()\n  349 |         {\n  350 |             return Ok(Some(text_chunk.text.into_bytes()));\n  351 |         }\n  352 |         Ok(None)\n  353 |     }"}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"negligible","description":"FromColor<Rgba<S>> for Luma binds `l` to a local and then immediately uses it once (`let l = rgb_to_luma(rgb); gray[0] = T::from_primitive(l);`), whereas the structurally identical FromColor<Rgb<S>> for Luma inlines the call. Pure stylistic copy-paste divergence between two parallel arms; no runtime effect after optimization.","fix":"Inline as `gray[0] = T::from_primitive(rgb_to_luma(rgb));` to match the Rgb impl.","locations":[{"ref":"src/color.rs:692-697","code":"  692 |     fn from_color(&mut self, other: &Rgba<S>) {\n  693 |         let gray = self.channels_mut();\n  694 |         let rgb = other.channels();\n  695 |         let l = rgb_to_luma(rgb);\n  696 |         gray[0] = T::from_primitive(l);\n  697 |     }"}]},{"id":"PERF_21","type":"performance","type_label":"Performance","severity":"negligible","description":"`ImageBuffer::apply_color_space` uses a fixed-size stack scratch array `[DEFAULT_MIN_VALUE; 1200]`. For `Subpixel = f32` this is a 4.8 KB stack array reinitialized on each call; while functionally correct, the magic constant 1200 is undocumented and the chunked copy adds an extra full copy of the image data through scratch even though `transform` already reads the source separately. Minor and the in-place transform constraint may justify it, but the rationale is undocumented.","fix":"Document why 1200 was chosen, or size the scratch to a small multiple of CHANNEL_COUNT; consider whether the extra copy-through-scratch is required for all transforms.","locations":[{"ref":"src/images/buffer.rs:1721-1729","code":" 1721 |         let mut scratch = [<SelfPixel::Subpixel as Primitive>::DEFAULT_MIN_VALUE; 1200];\n 1722 |         let chunk_len = scratch.len() / usize::from(<SelfPixel as Pixel>::CHANNEL_COUNT)\n 1723 |             * usize::from(<SelfPixel as Pixel>::CHANNEL_COUNT);\n 1724 | \n 1725 |         for chunk in self.subpixels_mut().chunks_mut(chunk_len) {\n 1726 |             let scratch = &mut scratch[..chunk.len()];\n 1727 |             scratch.copy_from_slice(chunk);\n 1728 |             transform(scratch, chunk);\n 1729 |         }"}]},{"id":"PERF_22","type":"performance","type_label":"Performance","severity":"negligible","description":"fill_header_metadata_if_any calls self.inner.format_attributes() and then, for each buffered metadata kind, the access path again calls format_attributes() per getter. format_attributes() constructs a fresh FormatAttributes (and for Box<dyn> dispatches virtually) on each call; it is invoked many times per decode for what is effectively constant header information.","fix":"Fetch format_attributes() once per decode and reuse the cached value across the four metadata kinds instead of re-querying it for each.","locations":[{"ref":"src/io/image_reader_type.rs:661-684","code":"  661 |         let format_attrs = self.inner.format_attributes();\n  662 | \n  663 |         let attributes = [\n  664 |             (\n  665 |                 format_attrs.exif,\n  666 |                 &mut self.metadata_buffers.exif,\n  667 |                 <dyn ImageDecoder + '_>::exif_metadata as MetadataFn,\n  668 |             ),\n  669 |             (\n  670 |                 format_attrs.icc,\n  671 |                 &mut self.metadata_buffers.icc,\n  672 |                 <dyn ImageDecoder + '_>::icc_profile as MetadataFn,\n  673 |             ),\n  674 |             (\n  675 |                 format_attrs.xmp,\n  676 |                 &mut self.metadata_buffers.xmp,\n  677 |                 <dyn ImageDecoder + '_>::xmp_metadata as MetadataFn,\n  678 |             ),\n  679 |             (\n  680 |                 format_attrs.iptc,\n  681 |                 &mut self.metadata_buffers.iptc,\n  682 |                 <dyn ImageDecoder + '_>::iptc_metadata as MetadataFn,\n  683 |             ),\n  684 |         ];"},{"ref":"src/io/image_reader_type.rs:866-903","code":"  866 |     pub fn exif_metadata(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  867 |         Self::access_block_with(\n  868 |             &mut self.metadata_buffers.exif,\n  869 |             self.inner.format_attributes().exif,\n  870 |             self.inner,\n  871 |             <dyn ImageDecoder + '_>::exif_metadata,\n  872 |         )\n  873 |     }\n  874 | \n  875 |     /// Get the ICC profile of the previous image if any.\n  876 |     pub fn icc_profile(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  877 |         Self::access_block_with(\n  878 |             &mut self.metadata_buffers.icc,\n  879 |             self.inner.format_attributes().icc,\n  880 |             self.inner,\n  881 |             <dyn ImageDecoder + '_>::icc_profile,\n  882 |         )\n  883 |     }\n  884 | \n  885 |     /// Get the XMP metadata of the previous image if any.\n  886 |     pub fn xmp_metadata(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  887 |         Self::access_block_with(\n  888 |             &mut self.metadata_buffers.xmp,\n  889 |             self.inner.format_attributes().xmp,\n  890 |             self.inner,\n  891 |             <dyn ImageDecoder + '_>::xmp_metadata,\n  892 |         )\n  893 |     }\n  894 | \n  895 |     /// Get the IPTC metadata of the previous image if any.\n  896 |     pub fn iptc_metadata(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  897 |         Self::access_block_with(\n  898 |             &mut self.metadata_buffers.iptc,\n  899 |             self.inner.format_attributes().iptc,\n  900 |             self.inner,\n  901 |             <dyn ImageDecoder + '_>::iptc_metadata,\n  902 |         )\n  903 |     }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`let _blocks_in_header = reader.headers()[self.header_index].chunk_count as u64;` computes a value that is immediately discarded (bound to `_blocks_in_header` and never read). It is leftover dead code that performs an indexing access for no effect.","fix":"Remove the unused binding.","locations":[{"ref":"src/codecs/openexr.rs:148","code":"  148 |         let _blocks_in_header = reader.headers()[self.header_index].chunk_count as u64;"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"PnmHeaderLine derives PartialOrd and Ord (and ErrorDataSource derives PartialOrd/Ord) but these orderings are never used; the enums are only ever displayed, compared for equality, or stored. The Ord/PartialOrd derivations are dead and add no value.","fix":"Drop the unused PartialOrd/Ord derives unless an ordering is actually required.","locations":[{"ref":"src/codecs/pnm/decoder.rs:175-185","code":"  175 | #[derive(Debug, Copy, Clone, Hash, PartialEq, Eq, PartialOrd, Ord)]\n  176 | enum PnmHeaderLine {\n  177 |     /// \"HEIGHT\"\n  178 |     Height,\n  179 |     /// \"WIDTH\"\n  180 |     Width,\n  181 |     /// \"DEPTH\"\n  182 |     Depth,\n  183 |     /// \"MAXVAL\", a.k.a. `maxwhite`\n  184 |     Maxval,\n  185 | }"},{"ref":"src/codecs/pnm/decoder.rs:198-207","code":"  198 | /// Single-value lines in a PNM header\n  199 | #[derive(Debug, Copy, Clone, Hash, PartialEq, Eq, PartialOrd, Ord)]\n  200 | enum ErrorDataSource {\n  201 |     /// One of the header lines\n  202 |     Line(PnmHeaderLine),\n  203 |     /// Value in the preamble\n  204 |     Preamble,\n  205 |     /// Sample/pixel data\n  206 |     Sample,\n  207 | }"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"Stale TODO/comment block claiming rustc 'does not see this impl any more' and that `into_vec` is redundant, attached to the `impl ImageBuffer<P, Vec<P::Subpixel>>` block. The impl and `into_vec` are clearly still present and used (e.g. in `shrink_to_fit` doctest and tests). The comment is outdated and misleading about the current state of the code.","fix":"Remove or update the stale comment to reflect that the Vec-specific impl is intentional and current.","locations":[{"ref":"src/images/buffer.rs:1321-1326","code":" 1321 | // concrete implementation for `Vec`-backed buffers\n 1322 | // TODO: I think that rustc does not \"see\" this impl any more: the impl with\n 1323 | // Container meets the same requirements. At least, I got compile errors that\n 1324 | // there is no such function as `into_vec`, whereas `into_raw` did work, and\n 1325 | // `into_vec` is redundant anyway, because `into_raw` will give you the vector,\n 1326 | // and it is more generic."}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"DerivedLuminance::Constant variant is marked #[allow(dead_code)] and is never constructed; into_rgb() always uses NonConstant. It is carried purely as a placeholder for future constant-luminance support, adding an unused match arm surface.","fix":"Either implement/construct the Constant path or remove the variant until it is actually needed; the allow(dead_code) hides that it is currently inert.","locations":[{"ref":"src/metadata/cicp.rs:274-282","code":"  274 | pub(crate) enum DerivedLuminance {\n  275 |     /// Luminance is calculated in linear space:\n  276 |     ///     Y' = dot(K_rgb, RGB)'\n  277 |     #[allow(dead_code)] // We do not support this yet but should prepare call sites for the\n  278 |     // eventuality.\n  279 |     Constant,\n  280 |     /// Luminance is calculated in the transferred space:\n  281 |     ///     Y' = dot(K_rgb, RGB')\n  282 |     NonConstant,"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The module-level RGBE-to-RGB formula lists the three output channels as `(R, B, G)` — the green and blue channel sources are swapped in the documentation. The actual code (`Rgbe8Pixel::to_hdr`) correctly maps c[0]->r, c[1]->g, c[2]->b. The example just below it is correct, so only the formula text is wrong and misleads readers.","fix":"Change the formula to `(r,g,b) = (R × 2^(E-136), G × 2^(E-136), B × 2^(E-136))` so the channel order matches the implementation and the example.","locations":[{"ref":"src/codecs/hdr/mod.rs:12-13","code":"   12 | //! <center>(r,g,b) = (R × 2<sup>E - (128 + 8)<\/sup>,\n   13 | //! B × 2<sup>E - (128 + 8)<\/sup>, G × 2<sup>E - (128 + 8)<\/sup>)<\/center>"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comments on DecoderError::IcoEntryTooManyPlanesOrHotspot / IcoEntryTooManyBitsPerPixelOrHotspot and the inline comments in read_entry say the value must not be too big, and the code rejects values strictly greater than 256 (`> 256`). For an actual color-plane count or bit depth the valid maximum is far smaller; the `256` bound is arbitrary and mainly tolerates CUR hotspot coordinates, but the comments do not explain the 256 limit, making the chosen threshold look like an off-by-one or a magic number without rationale.","fix":"Document why 256 is the chosen bound (CUR hotspot tolerance) or tighten/clarify the validation; at minimum add a comment explaining the literal 256.","locations":[{"ref":"src/codecs/ico/decoder.rs:177-187","code":"  177 |     // buf[4..6]: may be color planes (0 or 1) or horizontal hotspot for CUR files\n  178 |     let num_color_planes = u16::from_le_bytes(buf[4..6].try_into().unwrap());\n  179 |     if num_color_planes > 256 {\n  180 |         return Err(DecoderError::IcoEntryTooManyPlanesOrHotspot.into());\n  181 |     }\n  182 | \n  183 |     // buf[6..8]: may be bit depth (0 = unspecified) or vertical hotspot for CUR files\n  184 |     let bits_per_pixel = u16::from_le_bytes(buf[6..8].try_into().unwrap());\n  185 |     if bits_per_pixel > 256 {\n  186 |         return Err(DecoderError::IcoEntryTooManyBitsPerPixelOrHotspot.into());\n  187 |     }"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"`decoding_not_yet_started`, `decoding_started_already`, and `reader_finished_already` all construct the exact same error: `ParameterError::from_kind(ParameterErrorKind::NoMoreData)` (and `decoding_started_already` even uses `NoMoreData` despite its name implying the opposite condition). The distinct names are misleading: callers and users will see identical, generic `NoMoreData` errors regardless of which actual situation occurred, and the names suggest semantics the code does not provide.","fix":"Use distinct `ParameterErrorKind` values (e.g. `FailedAlready` for the started/finished cases) so the error reflects the real condition, or collapse the three helpers into one if they are genuinely meant to be identical.","locations":[{"ref":"src/codecs/png.rs:256-266","code":"  256 | fn decoding_not_yet_started() -> ImageError {\n  257 |     ImageError::Parameter(ParameterError::from_kind(ParameterErrorKind::NoMoreData))\n  258 | }\n  259 | \n  260 | fn decoding_started_already() -> ImageError {\n  261 |     ImageError::Parameter(ParameterError::from_kind(ParameterErrorKind::NoMoreData))\n  262 | }\n  263 | \n  264 | fn reader_finished_already() -> ImageError {\n  265 |     ImageError::Parameter(ParameterError::from_kind(ParameterErrorKind::NoMoreData))\n  266 | }"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment on `IntoColor` and the WARNING on `DynamicImage::to` state conversions 'assume sRGB', but the `into_color`/`from_color` machinery in color.rs performs no transfer-function or primaries handling at all — it only applies fixed sRGB *luma coefficients* (SRGB_LUMA) for the RGB<->Luma step and does straight per-channel sample rescaling otherwise. The comment implies a colorimetric sRGB model that the code does not implement (no gamma linearization), which can mislead readers into thinking color-space conversion happens here.","fix":"Clarify the comment: conversions apply fixed sRGB *luminance coefficients* for grayscale and otherwise rescale raw samples; no gamma/primaries transform is performed.","locations":[{"ref":"src/color.rs:623-630","code":"  623 | /// Copy-based conversions to target pixel types using `FromColor`.\n  624 | // FIXME: this trait should be removed and replaced with real color space models\n  625 | // rather than assuming sRGB.\n  626 | pub(crate) trait IntoColor<Other> {\n  627 |     /// Constructs a pixel of the target type and converts this pixel into it.\n  628 |     #[allow(clippy::wrong_self_convention)]\n  629 |     fn into_color(&self) -> Other;\n  630 | }"},{"ref":"src/color.rs:644-654","code":"  644 | /// Coefficients to transform from sRGB to a CIE Y (luminance) value.\n  645 | const SRGB_LUMA: [u32; 3] = [2126, 7152, 722];\n  646 | const SRGB_LUMA_DIV: u32 = 10000;\n  647 | \n  648 | #[inline]\n  649 | fn rgb_to_luma<T: Primitive + Enlargeable>(rgb: &[T]) -> T {\n  650 |     let l = <T::Larger as NumCast>::from(SRGB_LUMA[0]).unwrap() * rgb[0].to_larger()\n  651 |         + <T::Larger as NumCast>::from(SRGB_LUMA[1]).unwrap() * rgb[1].to_larger()\n  652 |         + <T::Larger as NumCast>::from(SRGB_LUMA[2]).unwrap() * rgb[2].to_larger();\n  653 |     T::clamp_from(l / <T::Larger as NumCast>::from(SRGB_LUMA_DIV).unwrap())\n  654 | }"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Typo in user-visible LimitError Display message: 'opertation' instead of 'operation'. This string is shown to end users for the Unsupported strict-limits error.","fix":"Fix the spelling: 'not supported by the operation'. The message is also left dangling (ends with ': ') without listing the limits; consider completing it.","locations":[{"ref":"src/error.rs:517","code":"  517 |                 write!(fmt, \"The following strict limits are specified but not supported by the opertation: \")?;"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment for `overlay_bounds_ext` states the safe access is `top.get_pixel(origin_top_y + [0..x_range), origin_top_y + [0..y_range))` — the x coordinate uses `origin_top_y` instead of `origin_top_x`, a copy-paste typo in the safety contract documentation.","fix":"Change the first coordinate to `origin_top_x + [0..x_range)`.","locations":[{"ref":"src/imageops/mod.rs:135","code":"  135 | /// 2. `top.get_pixel(origin_top_y + [0..x_range), origin_top_y + [0..y_range))`"}]},{"id":"CMT_7","type":"invalid_comment"   let Range { end, .. } = self.pixel_indices_unchecked(sx + width - 1, sy);\n 1309 |                 let dst = self.pixel_indices_unchecked(dx, dy).start;\n 1310 |                 self.data.copy_within(start..end, dst);\n 1311 |             }\n 1312 |         }"}]},{"id":"DUPLIC_4","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"`decoder_to_image` repeats the identical four-line body (`let buf; (buf, attr) = free_functions::decoder_to_vec(decoder)?; ImageBuffer::from_raw(w, h, buf).map(DynamicImage::Image...)`) for all ten color-type arms, differing only by the DynamicImage variant constructor. This 60-line block is pure boilerplate that a small macro (or matching ColorType -> variant then a single decode) would collapse, reducing the surface for a copy-paste mismatch between arms.","fix":"Factor the decode-and-wrap into a macro or helper parameterized by the variant constructor.","locations":[{"ref":"src/images/dynimage.rs:1587-1647","code":" 1587 |     *image = match color_type {\n 1588 |         color::ColorType::Rgb8 => {\n 1589 |             let buf;\n 1590 |             (buf, attr) = free_functions::decoder_to_vec(decoder)?;\n 1591 |             ImageBuffer::from_raw(w, h, buf).map(DynamicImage::ImageRgb8)\n 1592 |         }\n 1593 | \n 1594 |         color::ColorType::Rgba8 => {\n 1595 |             let buf;\n 1596 |             (buf, attr) = free_functions::decoder_to_vec(decoder)?;\n 1597 |             ImageBuffer::from_raw(w, h, buf).map(DynamicImage::ImageRgba8)\n 1598 |         }\n 1599 | \n 1600 |         color::ColorType::L8 => {\n 1601 |             let buf;\n 1602 |             (buf, attr) = free_functions::decoder_to_vec(decoder)?;\n 1603 |             ImageBuffer::from_raw(w, h, buf).map(DynamicImage::ImageLuma8)\n 1604 |         }\n 1605 | \n 1606 |         color::ColorType::La8 => {\n 1607 |             let buf;\n 1608 |             (buf, attr) = free_functions::decoder_to_vec(decoder)?;\n 1609 | et r = px[0];\n  250 |                 let g = px[1];\n  251 |                 let b = px[2];\n  252 |                 let a = px[3];\n  253 |                 // written as BGRA\n  254 |                 self.writer.write_all(&[b, g, r, a])?;\n  255 |             }\n  256 |             self.write_row_pad(row_padding)?;\n  257 |         }\n  258 | \n  259 |         Ok(())\n  260 |     }"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"negligible","description":"u16_swap_be_ne uses `data.as_chunks_mut::<2>().0`, which silently ignores a trailing odd byte. All in-crate callers pass even-length buffers (header guarantees width*height*8, and the 4096 chunk size is even), so this is currently safe, but the function gives no indication that an odd-length input would be partially processed, which is a latent hazard if reused elsewhere.","fix":"Add a debug_assert!(data.len() % 2 == 0) (or document the even-length precondition) so future misuse is caught.","locations":[{"ref":"src/codecs/farbfeld.rs:62-69","code":"   62 | fn u16_swap_be_ne(data: &mut [u8]) {\n   63 |     #[cfg(target_endian = \"little\")]\n   64 |     {\n   65 |         for [low, high] in data.as_chunks_mut::<2>().0 {\n   66 |             std::mem::swap(low, high);\n   67 |         }\n   68 |     }\n   69 | }"}]}]</script>
<div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-05-29 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
