<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","easy":false,"description":"`ArchivedHashTable::verify()` (the `bytecheck` `Verify` impl used to validate\nuntrusted archived bytes) never counts how many \"full\" control bytes/buckets\nit actually finds while walking the control-byte groups, and never compares\nthat count against `self.len()`. It only rejects `len >= cap`. This is the\nexact same bug class that was just fixed for B-tree maps in commit 4a84145\n(\"Fix B-Tree maps not validating number of entries\"), which added an\n`entries != len` check to `ArchivedBTreeMap::verify()` -- but the analogous\ncheck was never added to the SwissTable hash table's `verify()`.\n\nThe safe post-validation iterator `RawIter::next()` (lines 566-591) trusts\n`items_left` (initialized from `self.len()`, an attacker-controlled archived\nfield) as its sole loop-termination condition, with no bound against\n`control_count`/`cap`:\n\n    fn next(&mut self) -> Option<Self::Item> {\n        if self.items_left == 0 {\n            None\n        } else {\n            let bit = loop {\n                if let Some(bit) = self.controls.next_full() {\n                    break bit;\n                }\n                self.controls.move_next();\n                self.entries = unsafe {\n                    NonNull::new_unchecked(self.entries.as_ptr().sub(Group::WIDTH))\n                };\n            };\n            ...\n        }\n    }\n\nIf a malicious/corrupted archive sets `len` higher than the actual number of\nfull (non-empty) control bytes present in the control-byte array, `verify()`\nwill pass (since it never cross-checks the two), and a subsequent safe\niteration (`ArchivedHashTable::iter`, used throughout `ArchivedHashMap`,\n`ArchivedHashSet`, `ArchivedIndexMap`, `ArchivedIndexSet`) will walk\n`self.controls`/`self.entries` past the end of the actual allocated table,\nreading arbitrary out-of-bounds memory as `T` without any `CheckBytes`\nvalidation (iteration happens post-validation, so bytecheck does not run\nagain). This can read uninitialized/out-of-bounds memory and, depending on\n`T`, potentially produce unsound values (e.g. invalid enum discriminants,\ndangling references) -- a direct memory-safety violation reachable from\nuntrusted input via the safe `access`/`access_pos` API.","fix":"In the `'outer` loop inside `verify()` (lines 680-697), count the number of\nfull buckets actually encountered (e.g. increment a `count` each time the\ninner `while let Some(bit) = controls.next_full()` loop yields an index that\npasses the `index >= cap` check), then after the loop compare `count` against\n`self.len()` and `fail!(...)` with a new error variant (e.g.\n`EntriesLengthMismatch { entries: count, len }`, mirroring the BTreeMap fix in\n`collections/btree/map/mod.rs`) if they differ. This closes the gap before\n`RawIter` is ever allowed to trust `len()` for iteration bounds.","locations":[{"ref":"rkyv/src/collections/swiss_table/table.rs:566-591","code":"  566 | impl<T> Iterator for RawIter<T> {\n  567 |     type Item = NonNull<T>;\n  568 | \n  569 |     fn next(&mut self) -> Option<Self::Item> {\n  570 |         if self.items_left == 0 {\n  571 |             None\n  572 |         } else {\n  573 |             let bit = loop {\n  574 |                 if let Some(bit) = self.controls.next_full() {\n  575 |                     break bit;\n  576 |                 }\n  577 |                 self.controls.move_next();\n  578 |                 self.entries = unsafe {\n  579 |                     NonNull::new_unchecked(\n  580 |                         self.entries.as_ptr().sub(Group::WIDTH),\n  581 |                     )\n  582 |                 };\n  583 |             };\n  584 |             self.items_left -= 1;\n  585 |             let entry = unsafe {\n  586 |                 NonNull::new_unchecked(self.entries.as_ptr().sub(bit + 1))\n  587 |             };\n  588 |             Some(entry)\n  589 |         }\n  590 |     }\n  591 | }","lines":26,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/collections/swiss_table/table.rs#L566-L591"},{"ref":"rkyv/src/collections/swiss_table/table.rs:644-711","code":"  644 |     unsafe impl<C, T> Verify<C> for ArchivedHashTable<T>\n  645 |     where\n  646 |         C: Fallible + ArchiveContext + ?Sized,\n  647 |         C::Error: Source,\n  648 |         T: CheckBytes<C>,\n  649 |     {\n  650 |         fn verify(&self, context: &mut C) -> Result<(), C::Error> {\n  651 |             let len = self.len();\n  652 |             let cap = self.capacity();\n  653 | \n  654 |             if len == 0 && cap == 0 {\n  655 |                 return Ok(());\n  656 |             }\n  657 | \n  658 |             if len >= cap {\n  659 |                 fail!(InvalidLength { len, cap });\n  660 |             }\n  661 | \n  662 |             // Check memory allocation\n  663 |             let probe_cap = Self::probe_cap(cap);\n  664 |             let control_count = Self::control_count(probe_cap);\n  665 |             let (layout, control_offset) =\n  666 |                 Self::memory_layout(cap, control_count)?;\n  667 |             let ptr = self\n  668 |                 .ptr\n  669 |                 .as_ptr_wrapping()\n  670 |                 .cast::<u8>()\n  671 |                 .wrapping_sub(control_offset);\n  672 | \n  673 |             context.in_subtree_raw(ptr, layout, |context| {\n  674 |                 // Check each non-empty bucket\n  675 | \n  676 |                 let this = (self as *const Self).cast_mut();\n  677 |                 // SAFETY: We have checked that `self` is not empty.\n  678 |                 let mut controls = unsafe { Self::control_iter(this) };\n  679 |                 let mut base_index = 0;\n  680 |                 'outer: while base_index < cap {\n  681 |                     while let Some(bit) = controls.next_full() {\n  682 |                         let index = base_index + bit;\n  683 |                         if index >= cap {\n  684 |                             break 'outer;\n  685 |                         }\n  686 | \n  687 |                         unsafe {\n  688 |                             T::check_bytes(\n  689 |                                 Self::bucket_raw(this, index).as_ptr(),\n  690 |                                 context,\n  691 |                             )?;\n  692 |                         }\n  693 |                     }\n  694 | \n  695 |                     controls.move_next();\n  696 |                     base_index += Group::WIDTH;\n  697 |                 }\n  698 | \n  699 |                 // Verify that wrapped bytes are set correctly\n  700 |                 for i in cap..usize::min(2 * cap, control_count - cap) {\n  701 |                     let byte = unsafe { *Self::control_raw(this, i) };\n  702 |                     let wrapped = unsafe { *Self::control_raw(this, i % cap) };\n  703 |                     if wrapped != byte {\n  704 |                         fail!(UnwrappedControlByte { index: i })\n  705 |                     }\n  706 |                 }\n  707 | \n  708 |                 Ok(())\n  709 |             })\n  710 |         }\n  711 |     }","lines":68,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/collections/swiss_table/table.rs#L644-L711"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`ArchivedIndexMap::get_index_of_with` indexes directly into the `entries`\nslice using an index value read from the hash table without any bounds\ncheck:\n\n    pub fn get_index_of_with<Q, C>(&self, key: &Q, cmp: C) -> Option<usize>\n    where ... {\n        let entries = self.entries();\n        let index = self.table.get_with(hash_value::<Q, H>(key), |i| {\n            cmp(key, &entries[i.to_native() as usize].key)\n        })?;\n        Some(index.to_native() as usize)\n    }\n\n`self.table` is an `ArchivedHashTable<ArchivedUsize>` storing index values\ninto `entries`. The table's own `CheckBytes`/`Verify` only validates that\neach stored `ArchivedUsize` is a structurally valid integer (any bit pattern\nis accepted -- it is a plain integer, not a niched/tagged type), never that\nthe value is `< entries.len()`. The `ArchivedIndexMap::verify()` impl (lines\n505-527) only validates the `Entry<K,V>` contents of the `entries` slice\nitself via `<[Entry<K,V>]>::check_bytes`; it does not cross-validate the\nindex values stored in `table` against `entries.len()`. A corrupted/malicious\narchive can therefore store an out-of-range index in the table, which passes\nfull validation, and then trigger a Rust slice-index panic (`entries[i]`)\nthe first time any lookup (`get`, `get_key_value`, `contains_key`,\n`get_index_of`, etc., all of which funnel through `get_index_of_with`) is\nperformed -- a reachable denial-of-service panic from untrusted archived\ndata even after `access`/`access_pos` succeeded.","fix":"Either (a) add a cross-check in `ArchivedIndexMap::verify()` that walks the\ntable's stored indices and confirms each is `< self.table.len()` (the\n`entries` slice length) before accepting the archive as valid, or (b) make\n`get_index_of_with`'s closure use `entries.get(i.to_native() as usize)` and\ntreat an out-of-range index as \"no match\" (returning `None`/falling through\nprobing) instead of panicking. Option (a) is preferable since it keeps the\npost-validation access path panic-free by construction, consistent with the\nrest of rkyv's \"validate once, trust forever\" design.","locations":[{"ref":"rkyv/src/collections/swiss_table/index_map.rs:264-274","code":"  264 |     pub fn get_index_of_with<Q, C>(&self, key: &Q, cmp: C) -> Option<usize>\n  265 |     where\n  266 |         Q: Hash + Eq + ?Sized,\n  267 |         C: Fn(&Q, &K) -> bool,\n  268 |     {\n  269 |         let entries = self.entries();\n  270 |         let index = self.table.get_with(hash_value::<Q, H>(key), |i| {\n  271 |             cmp(key, &entries[i.to_native() as usize].key)\n  272 |         })?;\n  273 |         Some(index.to_native() as usize)\n  274 |     }","lines":11,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/collections/swiss_table/index_map.rs#L264-L274"},{"ref":"rkyv/src/collections/swiss_table/index_map.rs:505-527","code":"  505 |     unsafe impl<C, K, V, H> Verify<C> for ArchivedIndexMap<K, V, H>\n  506 |     where\n  507 |         C: Fallible + ArchiveContext + ?Sized,\n  508 |         C::Error: Source,\n  509 |         K: CheckBytes<C>,\n  510 |         V: CheckBytes<C>,\n  511 |     {\n  512 |         fn verify(\n  513 |             &self,\n  514 |             context: &mut C,\n  515 |         ) -> Result<(), <C as Fallible>::Error> {\n  516 |             let ptr = core::ptr::slice_from_raw_parts(\n  517 |                 self.entries.as_ptr_wrapping(),\n  518 |                 self.table.len(),\n  519 |             );\n  520 | \n  521 |             context.in_subtree(ptr, |context| {\n  522 |                 // SAFETY: `in_subtree` has checked that `ptr` is aligned and\n  523 |                 // points to enough bytes to represent its slice.\n  524 |                 unsafe { <[Entry<K, V>]>::check_bytes(ptr, context) }\n  525 |             })\n  526 |         }\n  527 |     }","lines":23,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/collections/swiss_table/index_map.rs#L505-L527"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`Deserialize<ArrayVec<T, CAP>, D> for ArchivedVec<Archived<T>>` (arrayvec crate)\nand `Deserialize<ArrayVec<A>, D> for ArchivedVec<Archived<A::Item>>` (tinyvec\ncrate's fixed-capacity `ArrayVec`, not its heap-backed `TinyVec`) both\ndeserialize by looping over the archived slice and calling `.push()`\nunconditionally, with no check that `self.as_slice().len()` fits within the\nfixed `CAP`/array capacity of the target container.\n\nBoth `arrayvec::ArrayVec::push` and `tinyvec::ArrayVec::push` panic on capacity\noverflow (as opposed to `try_push`, which returns a `Result`). Since\n`ArchivedVec<T>`'s length is controlled entirely by the archived byte stream,\nand rkyv's `Verify`/`CheckBytes` validation for `ArchivedVec<T>` only checks\nthat the `[T]` slice is well-formed within the archive's bounds (it has no\nawareness of any downstream fixed-capacity container constraint), a corrupted\nor maliciously crafted archive whose stored length exceeds `CAP` will pass\n`access`/`CheckBytes` validation and then panic during `deserialize()` -\na reachable denial-of-service vector on untrusted input, even with bytecheck\nvalidation enabled. ThinVec and TinyVec's hybrid `TinyVec` type are unaffected\nsince they are heap-backed and grow on push instead of panicking.","fix":"Validate the archived length against the target capacity before pushing, and\nreturn a deserialization error (via `D::Error`/`rancor::Source`) instead of\npanicking, e.g. check `self.len() <= CAP` (arrayvec) or\n`self.len() <= A::CAPACITY` (tinyvec) up front and produce a `Fallible` error\nif the bound is exceeded, or use `try_push` and map its error into `D::Error`.","locations":[{"ref":"rkyv/src/impls/ext/arrayvec_0_7.rs:35-52","code":"   35 | impl<T, D, const CAP: usize> Deserialize<ArrayVec<T, CAP>, D>\n   36 |     for ArchivedVec<Archived<T>>\n   37 | where\n   38 |     T: Archive,\n   39 |     Archived<T>: Deserialize<T, D>,\n   40 |     D: Fallible + ?Sized,\n   41 | {\n   42 |     fn deserialize(\n   43 |         &self,\n   44 |         deserializer: &mut D,\n   45 |     ) -> Result<ArrayVec<T, CAP>, D::Error> {\n   46 |         let mut result = ArrayVec::new();\n   47 |         for item in self.as_slice() {\n   48 |             result.push(item.deserialize(deserializer)?);\n   49 |         }\n   50 |         Ok(result)\n   51 |     }\n   52 | }","lines":18,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/impls/ext/arrayvec_0_7.rs#L35-L52"},{"ref":"rkyv/src/impls/ext/tinyvec_1.rs:40-57","code":"   40 | impl<A, D> Deserialize<ArrayVec<A>, D> for ArchivedVec<Archived<A::Item>>\n   41 | where\n   42 |     A: Array,\n   43 |     A::Item: Archive,\n   44 |     Archived<A::Item>: Deserialize<A::Item, D>,\n   45 |     D: Fallible + ?Sized,\n   46 | {\n   47 |     fn deserialize(\n   48 |         &self,\n   49 |         deserializer: &mut D,\n   50 |     ) -> Result<ArrayVec<A>, D::Error> {\n   51 |         let mut result = ArrayVec::new();\n   52 |         for item in self.as_slice() {\n   53 |             result.push(item.deserialize(deserializer)?);\n   54 |         }\n   55 |         Ok(result)\n   56 |     }\n   57 | }","lines":18,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/impls/ext/tinyvec_1.rs#L40-L57"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`ArchivedDynMetadata::lookup_metadata` (rkyv_dyn/src/lib.rs:274-282) indexes `TRAIT_IMPLS.get().expect(...)[self.impl_id() as usize]` with no bounds check. `impl_id` is attacker-controlled data coming from deserialized/archived bytes (it round-trips through `Archived<ImplId>` without any validation in the non-bytecheck path - the `Verify` impl that would catch an out-of-range id lives only in the disabled bytecheck.rs module). A corrupted or maliciously crafted archive with an out-of-range `impl_id` will panic via slice index out of bounds instead of returning an error, when this code is used without the (currently disabled) bytecheck validation.","fix":"Use `.get(self.impl_id() as usize)` and return an error/Option instead of panicking on out-of-range indices, especially since the bytecheck-based `Verify` safeguard that should catch this earlier is currently disabled/non-functional (see related dead_code finding on bytecheck.rs).","locations":[{"ref":"rkyv_dyn/src/lib.rs:274-283","code":"  274 |     pub fn lookup_metadata(&self) -> DynMetadata<T> {\n  275 |         unsafe {\n  276 |             TRAIT_IMPLS\n  277 |                 .get()\n  278 |                 .expect(\"TRAIT_IMPLS was not initialized for rkyv_dyn\")\n  279 |                 [self.impl_id() as usize]\n  280 |                 .downcast_metadata()\n  281 |         }\n  282 |     }\n  283 | }","lines":10,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv_dyn/src/lib.rs#L274-L283"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"`ArenaHandle::push_alloc` computes the size of a new block using unchecked\narithmetic: `size_of::<Block>() + layout.size() + layout.align()` followed by\n`.next_power_of_two()`. If `layout.size()` is attacker/user-controlled and\nlarge (e.g. serializing a very large `Vec`/`String`/collection on a 32-bit\ntarget, or any target where the sum approaches `usize::MAX`), the addition can\noverflow and either panic in debug builds or silently wrap in release builds,\nproducing a much-too-small `size` that is then passed to `Block::alloc`. The\nsubsequent allocation would be undersized relative to the actual requested\nlayout, and the code that writes into the returned allocation would then write\nout of bounds of the actual allocated block.\n\nThis is the same overflow class that was just fixed in `Arena::with_capacity`\n(commit a24b50a, which switched to `checked_add` / `checked_next_power_of_two`\nwith an `.expect(...)`), but the analogous unchecked computation in the\nallocation-growth path of `push_alloc` was left unfixed. `pad + layout.size()`\non the line above (line 223) is also unchecked, though it is bounds-checked\nagainst `self.tail_size - self.used` before being trusted, so the primary risk\nis the block-growth-size computation on lines 227-231.","fix":"Use checked arithmetic mirroring the fix already applied to\n`Arena::with_capacity`, e.g.:\n\nlet size = usize::max(\n    2 * self.tail_size,\n    size_of::<Block>()\n        .checked_add(layout.size())\n        .and_then(|s| s.checked_add(layout.align()))\n        .and_then(|s| s.checked_next_power_of_two())\n        .expect(\"allocation size overflow\"),\n);\n\nand consider also guarding `pad + layout.size()` on line 223 with a checked\nadd (or document why `pad < layout.align()` and `layout.size()` can never sum\npast `usize::MAX` given upstream invariants).","locations":[{"ref":"rkyv/src/ser/allocator/alloc.rs:223","code":"  223 |         if pad + layout.size() <= self.tail_size - self.used {","lines":1,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/ser/allocator/alloc.rs#L223"},{"ref":"rkyv/src/ser/allocator/alloc.rs:227-231","code":"  227 |             let size = usize::max(\n  228 |                 2 * self.tail_size,\n  229 |                 (size_of::<Block>() + layout.size() + layout.align())\n  230 |                     .next_power_of_two(),\n  231 |             );","lines":5,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/ser/allocator/alloc.rs#L227-L231"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Niche::eq` compares two `Niche::Type` variants by calling `syn::Path::get_ident()` on each and comparing the results. `get_ident()` only returns `Some` when the path is a single unqualified segment with no generic arguments; for any module-qualified path (e.g. `my_mod::MyNiche` vs `other_mod::MyNiche`) or generic path (e.g. `MyNiche<A>` vs `MyNiche<B>`), it returns `None` for both sides, so `None == None` evaluates to `true` and two genuinely different niche types are reported as equal. This `PartialEq` impl feeds the duplicate-niche detection in `generate_niching_impls` (struct.rs and enum.rs), so using two distinct qualified/generic niche types across different fields of the same archived type would incorrectly trigger the \"each niching type may be used at most once\" compile error, rejecting valid code.","fix":"Compare the full resolved `Path` (e.g. via `Path`'s own `PartialEq`/`to_token_stream().to_string()` comparison) instead of `get_ident()`, so qualified and generic niche paths are compared structurally rather than only when they happen to be bare single-segment idents.","locations":[{"ref":"rkyv_derive/src/attributes.rs:486-510","code":"  486 | impl PartialEq for Niche {\n  487 |     fn eq(&self, other: &Self) -> bool {\n  488 |         match (self, other) {\n  489 |             (Niche::Type(ty1), Niche::Type(ty2)) => {\n  490 |                 if let (Type::Path(ty1), Type::Path(ty2)) = (&**ty1, &**ty2) {\n  491 |                     ty1.path.get_ident() == ty2.path.get_ident()\n  492 |                 } else {\n  493 |                     false\n  494 |                 }\n  495 |             }\n  496 |             (Niche::Type(ty), Niche::Default)\n  497 |             | (Niche::Default, Niche::Type(ty)) => {\n  498 |                 if let Type::Path(ty) = &**ty {\n  499 |                     match ty.path.get_ident() {\n  500 |                         Some(ident) => ident == \"DefaultNiche\",\n  501 |                         None => false,\n  502 |                     }\n  503 |                 } else {\n  504 |                     false\n  505 |                 }\n  506 |             }\n  507 |             (Niche::Default, Niche::Default) => true,\n  508 |         }\n  509 |     }\n  510 | }","lines":25,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv_derive/src/attributes.rs#L486-L510"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"critical","easy":false,"description":"In the 32-bit and 64-bit blocks of `impl_multi_byte_atomics!`, the explicit\nfixed-endianness `rend` atomic types (`rend::AtomicI32_le`, `rend::AtomicI32_be`,\n`rend::AtomicU32_le`, `rend::AtomicU32_be`, and the matching `_64` variants) are\nall bound to the SAME feature-dependent archived type alias\n(`crate::primitive::ArchivedI32`/`ArchivedU32`/`ArchivedI64`/`ArchivedU64`)\ninstead of the correct fixed-endianness `rend::i32_le`/`i32_be`/`i64_le`/`i64_be`\ntypes (and their unsigned counterparts).\n\n`crate::primitive::ArchivedI32` etc. are type aliases that resolve to either\n`rend::i32_le` or `rend::i32_be` depending on whether the crate's `big_endian`\ncargo feature is enabled (see `rkyv/src/primitive.rs`, `define_archived_primitive!`\nmacro, lines 47-54). They are NOT fixed-endianness types, unlike the explicit\n`rend::AtomicI32_le`/`_be` wrapper types a user picks specifically to force a\nparticular wire endianness regardless of build configuration.\n\nAs a result, when a user serializes a `rend::AtomicI32_be` (explicitly choosing\nbig-endian) under a default (non-`big_endian`-feature) build, the value is\narchived using `ArchivedI32 = i32_le`, i.e. silently written in little-endian\nbyte order despite the type name promising big-endian. The reverse mismatch\noccurs for `rend::AtomicI32_le` under a `big_endian` build. This silently\ncorrupts cross-platform/cross-build archived data with no compiler error,\nruntime error, or panic — only contaminated bytes upon inspection by another\nprocess/build using a fixed-endianness contract.\n\nFor contrast, the 16-bit block immediately above (lines 47-55) is implemented\ncorrectly: `rend::AtomicI16_le`/`_be` map to the genuinely fixed-endianness\n`rend::i16_le`/`i16_be` types, proving the 32-bit/64-bit blocks are a\ncopy-paste regression where the correct `rend::iNN_le`/`_be` archived type\nwas replaced with the feature-dependent `crate::primitive::ArchivedINN` alias.","fix":"Change the archived type for the explicit `rend::AtomicI32_le`/`_be`,\n`rend::AtomicU32_le`/`_be`, `rend::AtomicI64_le`/`_be`, and\n`rend::AtomicU64_le`/`_be` entries to their matching fixed-endianness `rend`\narchived types, mirroring the already-correct 16-bit block, e.g.:\n\nrend::AtomicI32_le, rend::i32_le;\nrend::AtomicI32_be, rend::i32_be;\nrend::AtomicU32_le, rend::u32_le;\nrend::AtomicU32_be, rend::u32_be;\n\nand similarly for the 64-bit block with `rend::i64_le`/`i64_be`/`u64_le`/`u64_be`.\nOnly the `core::sync::atomic::AtomicI32`/`AtomicU32`/`AtomicI64`/`AtomicU64`\nentries (which have no inherent endianness of their own) should legitimately\nuse the feature-dependent `crate::primitive::ArchivedI32`/etc. aliases.","locations":[{"ref":"rkyv/src/impls/core/with/atomic/multibyte.rs:47-55","code":"   47 | #[cfg(target_has_atomic = \"16\")]\n   48 | impl_multi_byte_atomics! {\n   49 |     core::sync::atomic::AtomicI16, crate::primitive::ArchivedI16;\n   50 |     core::sync::atomic::AtomicU16, crate::primitive::ArchivedU16;\n   51 |     rend::AtomicI16_le, rend::i16_le;\n   52 |     rend::AtomicI16_be, rend::i16_be;\n   53 |     rend::AtomicU16_le, rend::u16_le;\n   54 |     rend::AtomicU16_be, rend::u16_be;\n   55 | }","lines":9,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/impls/core/with/atomic/multibyte.rs#L47-L55"},{"ref":"rkyv/src/impls/core/with/atomic/multibyte.rs:56-64","code":"   56 | #[cfg(target_has_atomic = \"32\")]\n   57 | impl_multi_byte_atomics! {\n   58 |     core::sync::atomic::AtomicI32, crate::primitive::ArchivedI32;\n   59 |     core::sync::atomic::AtomicU32, crate::primitive::ArchivedU32;\n   60 |     rend::AtomicI32_le, crate::primitive::ArchivedI32;\n   61 |     rend::AtomicI32_be, crate::primitive::ArchivedI32;\n   62 |     rend::AtomicU32_le, crate::primitive::ArchivedU32;\n   63 |     rend::AtomicU32_be, crate::primitive::ArchivedU32;\n   64 | }","lines":9,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/impls/core/with/atomic/multibyte.rs#L56-L64"},{"ref":"rkyv/src/impls/core/with/atomic/multibyte.rs:65-73","code":"   65 | #[cfg(target_has_atomic = \"64\")]\n   66 | impl_multi_byte_atomics! {\n   67 |     core::sync::atomic::AtomicI64, crate::primitive::ArchivedI64;\n   68 |     core::sync::atomic::AtomicU64, crate::primitive::ArchivedU64;\n   69 |     rend::AtomicI64_le, crate::primitive::ArchivedI64;\n   70 |     rend::AtomicI64_be, crate::primitive::ArchivedI64;\n   71 |     rend::AtomicU64_le, crate::primitive::ArchivedU64;\n   72 |     rend::AtomicU64_be, crate::primitive::ArchivedU64;\n   73 | }","lines":9,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/impls/core/with/atomic/multibyte.rs#L65-L73"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"The `complex_wrapper_types` example demonstrates a custom `with`-wrapper whose `deserialize_with` decodes a hand-rolled binary opcode stream using `bytes.next().unwrap()` repeatedly and `panic!(\"unexpected opcode\")` for unknown tags, and the example accesses the archive via `access_unchecked` (no bytecheck validation) before deserializing. If a user copies this pattern into real code that deserializes untrusted/corrupted input, a truncated or malformed `Vec<u8>` payload (which `access_unchecked` does nothing to validate) will panic instead of returning an error, and `access_unchecked` on attacker-controlled bytes is itself unsound by contract. The in-code comment near the panic does note bytecheck could check the opcodes, but the example never demonstrates safe `access` for this type, so the takeaway pattern as written is read-and-decode-blindly.","fix":"Either use `rkyv::access` (validated) instead of `access_unchecked` in this example, or add an explicit comment warning that `deserialize_with` here assumes trusted/well-formed input and that production code decoding untrusted bytes should replace the `unwrap()`s with fallible error returns (e.g. `Option`/`Result` mapped to `D::Error`) instead of panicking.","locations":[{"ref":"rkyv/examples/complex_wrapper_types.rs:104-163","code":"  104 | impl<D> DeserializeWith<Archived<Vec<u8>>, Vec<Opcode>, D> for EncodeOpcodes\n  105 | where\n  106 |     D: Fallible + ?Sized,\n  107 | {\n  108 |     fn deserialize_with(\n  109 |         field: &Archived<Vec<u8>>,\n  110 |         _: &mut D,\n  111 |     ) -> Result<Vec<Opcode>, D::Error> {\n  112 |         let mut result = Vec::new();\n  113 | \n  114 |         // Decode opcodes from a compact binary format\n  115 |         let mut bytes = field.iter().cloned();\n  116 |         while let Some(op) = bytes.next() {\n  117 |             match op {\n  118 |                 0 => result.push(Opcode::OneByte),\n  119 |                 1 => {\n  120 |                     let arg = bytes.next().unwrap();\n  121 |                     result.push(Opcode::TwoBytes(arg));\n  122 |                 }\n  123 |                 2 => {\n  124 |                     let arg = bytes.next().unwrap() as u16\n  125 |                         | (bytes.next().unwrap() as u16) << 8;\n  126 |                     result.push(Opcode::ThreeBytes(arg));\n  127 |                 }\n  128 |                 3 => {\n  129 |                     let arg = bytes.next().unwrap() as u32\n  130 |                         | (bytes.next().unwrap() as u32) << 8\n  131 |                         | (bytes.next().unwrap() as u32) << 16\n  132 |                         | (bytes.next().unwrap() as u32) << 24;\n  133 |                     result.push(Opcode::FiveBytes(arg));\n  134 |                 }\n  135 |                 4 => {\n  136 |                     let arg = bytes.next().unwrap() as u64\n  137 |                         | (bytes.next().unwrap() as u64) << 8\n  138 |                         | (bytes.next().unwrap() as u64) << 16\n  139 |                         | (bytes.next().unwrap() as u64) << 24\n  140 |                         | (bytes.next().unwrap() as u64) << 32\n  141 |                         | (bytes.next().unwrap() as u64) << 40\n  142 |                         | (bytes.next().unwrap() as u64) << 48\n  143 |                         | (bytes.next().unwrap() as u64) << 56;\n  144 |                     result.push(Opcode::NineBytes(arg));\n  145 |                 }\n  146 |                 n @ 5..=12 => {\n  147 |                     let len = n - 4;\n  148 |                     let mut arg = 0;\n  149 |                     for i in 0..len {\n  150 |                         arg |= (bytes.next().unwrap() as usize) << (8 * i);\n  151 |                     }\n  152 |                     result.push(Opcode::VariableLength(arg));\n  153 |                 }\n  154 |                 // Either the deserializer can be bound to support decode\n  155 |                 // errors, or the opcodes can be checked during\n  156 |                 // validation with bytecheck\n  157 |                 _ => panic!(\"unexpected opcode\"),\n  158 |             }\n  159 |         }\n  160 | \n  161 |         Ok(result)\n  162 |     }\n  163 | }","lines":60,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/examples/complex_wrapper_types.rs#L104-L163"},{"ref":"rkyv/examples/complex_wrapper_types.rs:184-188","code":"  184 |     let buf = rkyv::to_bytes::<Error>(&program).unwrap();\n  185 |     let archived_program = unsafe { access_unchecked::<ArchivedProgram>(&buf) };\n  186 | \n  187 |     println!(\"encoded: {:?}\", archived_program.opcodes);\n  188 |     assert_eq!(archived_program.opcodes.len(), 23);","lines":5,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/examples/complex_wrapper_types.rs#L184-L188"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Verify::verify` in bytecheck.rs uses `if let Some(_) = IMPL_REGISTRY.get::<T>(...)  { Ok(()) } else { fail!(...) }` instead of the more idiomatic `.is_some()`/`is_none()` check or a direct `match`. Purely a style nit on otherwise-dead code, not a functional bug.","fix":"Use `if IMPL_REGISTRY.get::<T>(self.impl_id.to_native()).is_some() { Ok(()) } else { fail!(...) }` for clarity, once this module is fixed and re-enabled.","locations":[{"ref":"rkyv_dyn/src/bytecheck.rs:41-48","code":"   41 |         if let Some(_) = IMPL_REGISTRY.get::<T>(self.type_id.to_native()) {\n   42 |             Ok(())\n   43 |         } else {\n   44 |             fail!(InvalidImplId {\n   45 |                 type_id: self.type_id.to_native(),\n   46 |             });\n   47 |         }\n   48 |     }","lines":8,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv_dyn/src/bytecheck.rs#L41-L48"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`rkyv_dyn/src/bytecheck.rs` is excluded from the crate (the `mod bytecheck;` declaration in lib.rs is commented out with `// TODO: re-enable`), yet the file is left in the tree and is part of this audit's scope. The file does not compile as written even if re-enabled (see related findings), so it is effectively dead, stale code masquerading as live source.","fix":"Either fix and re-enable the module, or remove the file until it's rewritten. Carrying broken unsafe validation code that nobody compiles is worse than not having it, since it bit-rots silently and gives false confidence that vtable validation has been reviewed.","locations":[{"ref":"rkyv_dyn/src/lib.rs:16-19","code":"   16 | mod lazy_static;\n   17 | // TODO: re-enable\n   18 | // #[cfg(feature = \"bytecheck\")]\n   19 | // mod bytecheck;","lines":4,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv_dyn/src/lib.rs#L16-L19"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`rkyv_dyn_test/src/validation.rs` defines a `tests` module (`serialize_and_check` helper and `check_dyn` test) but is never wired up — `lib.rs` has `mod validation;` fully commented out, so the entire file is unreachable/unused. This is consistent with the rest of `rkyv_dyn_test`, which is excluded from the workspace `members` list in the root `Cargo.toml` because `rkyv_dyn`/`rkyv_dyn_derive` are bit-rotted and disabled; flagging at low severity only for completeness since this crate is already known-disabled.","fix":"No action needed unless/until `rkyv_dyn`/`rkyv_dyn_derive` are revived and re-added to the workspace; at that point `validation.rs` would need to be re-enabled and likely updated for current rkyv APIs (it still references `check_archived_root`, `AllocSerializer`, `DefaultValidator` from an older API surface).","locations":[{"ref":"rkyv_dyn_test/src/validation.rs:1-88","code":"    1 | #[cfg(test)]\n    2 | mod tests {\n    3 |     #[cfg_attr(feature = \"wasm\", allow(unused_imports))]\n    4 |     use bytecheck::CheckBytes;\n    5 |     #[cfg_attr(feature = \"wasm\", allow(unused_imports))]\n    6 |     use rkyv::{\n    7 |         check_archived_root,\n    8 |         ser::{serializers::AllocSerializer, Serializer},\n    9 |         validation::validators::DefaultValidator,\n   10 |         Archive, Archived, Serialize,\n   11 |     };\n   12 |     #[cfg_attr(feature = \"wasm\", allow(unused_imports))]\n   13 |     use rkyv_dyn::archive_dyn;\n   14 | \n   15 |     #[cfg_attr(feature = \"wasm\", allow(dead_code))]\n   16 |     fn serialize_and_check<T: Serialize<AllocSerializer<256>>>(value: &T)\n   17 |     where\n   18 |         T::Archived: for<'a> CheckBytes<DefaultValidator<'a>>,\n   19 |     {\n   20 |         let mut serializer = AllocSerializer::<256>::default();\n   21 |         serializer.serialize_value(value).unwrap();\n   22 |         let buf = serializer.into_serializer().into_inner();\n   23 |         check_archived_root::<T>(buf.as_ref()).unwrap();\n   24 |     }\n   25 | \n   26 |     #[test]\n   27 |     #[cfg(not(feature = \"wasm\"))]\n   28 |     #[cfg_attr(miri, ignore = \"miri does not support ctor, see lib.rs\")]\n   29 |     fn check_dyn() {\n   30 |         #[archive_dyn]\n   31 |         pub trait TestTrait {\n   32 |             fn get_id(&self) -> i32;\n   33 |         }\n   34 | \n   35 |         #[derive(Archive, Serialize)]\n   36 |         #[rkyv(bytecheck)]\n   37 |         pub struct Test {\n   38 |             id: i32,\n   39 |         }\n   40 | \n   41 |         #[archive_dyn]\n   42 |         impl TestTrait for Test {\n   43 |             fn get_id(&self) -> i32 {\n   44 |                 self.id\n   45 |             }\n   46 |         }\n   47 | \n   48 |         impl TestTrait for ArchivedTest {\n   49 |             fn get_id(&self) -> i32 {\n   50 |                 self.id.into()\n   51 |             }\n   52 |         }\n   53 | \n   54 |         let value: Box<dyn SerializeTestTrait> = Box::new(Test { id: 42 });\n   55 | \n   56 |         serialize_and_check(&value);\n   57 | \n   58 |         #[derive(Archive, Serialize)]\n   59 |         pub struct TestUnchecked {\n   60 |             id: i32,\n   61 |         }\n   62 | \n   63 |         #[archive_dyn]\n   64 |         impl TestTrait for TestUnchecked {\n   65 |             fn get_id(&self) -> i32 {\n   66 |                 self.id\n   67 |             }\n   68 |         }\n   69 | \n   70 |         impl TestTrait for ArchivedTestUnchecked {\n   71 |             fn get_id(&self) -> i32 {\n   72 |                 self.id.into()\n   73 |             }\n   74 |         }\n   75 | \n   76 |         let value: Box<dyn SerializeTestTrait> =\n   77 |             Box::new(TestUnchecked { id: 42 });\n   78 | \n   79 |         let mut serializer = AllocSerializer::<256>::default();\n   80 |         serializer.serialize_value(&value).unwrap();\n   81 |         let buf = serializer.into_serializer().into_inner();\n   82 |         if let Ok(_) =\n   83 |             check_archived_root::<Box<dyn SerializeTestTrait>>(buf.as_ref())\n   84 |         {\n   85 |             panic!(\"check passed for type that does not implement CheckBytes\");\n   86 |         }\n   87 |     }\n   88 | }","lines":88,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv_dyn_test/src/validation.rs#L1-L88"},{"ref":"rkyv_dyn_test/src/lib.rs:1-3","code":"    1 | // TODO: uncomment and fix\n    2 | // #[cfg(feature = \"bytecheck\")]\n    3 | // mod validation;","lines":3,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv_dyn_test/src/lib.rs#L1-L3"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`Repr::Modifier` (`Packed`/`Align`) is fully parsed out of `#[repr(..)]` attributes in `Repr::from_attrs` (capturing alignment/packed values into `Repr::C { modifier, .. }` / `Repr::Rust { modifier }`) but the parsed `modifier` value is never read anywhere afterward — both fields are explicitly marked `#[allow(dead_code)]`. `is_struct_well_defined`/`is_enum_well_defined` ignore the modifier entirely, so `#[repr(C, packed)]` and `#[repr(C, packed(N))]` are treated identically to plain `#[repr(C)]` for `Portable` derivation eligibility, even though packed layouts can change field alignment in ways a careful reviewer would expect to see explicitly handled or at least commented on.","fix":"Either use the parsed modifier (e.g. to validate/special-case `packed`/`align` reprs for `Portable`) or drop the dead fields and just record presence of a modifier as a bool, with a comment explaining why packed/aligned layouts don't need special handling for the `Portable` well-definedness check.","locations":[{"ref":"rkyv_derive/src/repr.rs:51-67","code":"   51 | pub enum Modifier {\n   52 |     Packed(#[allow(dead_code)] usize),\n   53 |     Align(#[allow(dead_code)] usize),\n   54 | }\n   55 | \n   56 | pub enum Repr {\n   57 |     Transparent,\n   58 |     Primitive(Primitive),\n   59 |     C {\n   60 |         primitive: Option<Primitive>,\n   61 |         #[allow(dead_code)]\n   62 |         modifier: Option<Modifier>,\n   63 |     },\n   64 |     Rust {\n   65 |         #[allow(dead_code)]\n   66 |         modifier: Option<Modifier>,\n   67 |     },","lines":17,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv_derive/src/repr.rs#L51-L67"},{"ref":"rkyv_derive/src/repr.rs:132-148","code":"  132 |     pub fn is_struct_well_defined(&self) -> bool {\n  133 |         !matches!(self, Self::Rust { .. })\n  134 |     }\n  135 | \n  136 |     pub fn is_enum_well_defined(&self) -> bool {\n  137 |         match self {\n  138 |             Self::Rust { .. }\n  139 |             | Self::C {\n  140 |                 primitive: None, ..\n  141 |             } => false,\n  142 |             Self::C {\n  143 |                 primitive: Some(p), ..\n  144 |             }\n  145 |             | Self::Primitive(p) => p.is_well_defined(),\n  146 |             _ => false,\n  147 |         }\n  148 |     }","lines":17,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv_derive/src/repr.rs#L132-L148"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The test `nested_hash_map` contains the comment `// This .unwrap() fails!`\ndirectly above `let _decoded = access::<Archived<MyHashMap>, Panic>(&encoded).unwrap();`,\nimplying the call is expected to panic/fail. However the test is not marked\n`#[should_panic]` or `#[ignore]`, and running it (`cargo test --features\nbytecheck impls::std::collections::hash_map::tests::nested_hash_map`) passes\nsuccessfully - the `.unwrap()` does not fail. The comment is stale/misleading:\nit either documents a bug that has since been fixed (and the comment was never\nremoved), or was never accurate. Either way it risks confusing future\nmaintainers into thinking there is a known-broken nested HashMap validation\npath when there currently is not.","fix":"Remove the stale `// This .unwrap() fails!` comment, or if it refers to a\nreal historical bug that's now fixed, replace it with a comment noting that\nthis test is a regression test for that prior bug (with an issue/PR reference\nif available).","locations":[{"ref":"rkyv/src/impls/std/collections/hash_map.rs:273-298","code":"  273 |     #[cfg(feature = \"bytecheck\")]\n  274 |     #[test]\n  275 |     fn nested_hash_map() {\n  276 |         use rancor::{Error, Panic};\n  277 | \n  278 |         use crate::{access, to_bytes};\n  279 | \n  280 |         #[derive(\n  281 |             Hash, PartialEq, Eq, Archive, Serialize, Deserialize, Debug,\n  282 |         )]\n  283 |         #[rkyv(crate, derive(Hash, PartialEq, Eq, Debug))]\n  284 |         struct Key(u8, u8);\n  285 | \n  286 |         let mut nested_map = std::collections::HashMap::new();\n  287 |         nested_map.insert(1337u16, 42u16);\n  288 | \n  289 |         type MyHashMap = HashMap<Key, HashMap<u16, u16>>;\n  290 |         let mut map: MyHashMap = std::collections::HashMap::new();\n  291 |         map.insert(Key(1, 2), nested_map.clone());\n  292 |         map.insert(Key(3, 4), nested_map.clone());\n  293 | \n  294 |         let encoded = to_bytes::<Error>(&map).unwrap();\n  295 | \n  296 |         // This .unwrap() fails!\n  297 |         let _decoded = access::<Archived<MyHashMap>, Panic>(&encoded).unwrap();\n  298 |     }","lines":26,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/impls/std/collections/hash_map.rs#L273-L298"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"negligible","easy":false,"description":"The `archive_bounds`, `serialize_bounds`, and `deserialize_bounds` branches in `Attributes::parse_meta` are three copy-pasted ~9-line blocks that differ only in which `Option<Punctuated<WherePredicate, Token![,]>>` field is targeted and the string literal used in the error message.","fix":"Factor out a small helper, e.g. `fn parse_bounds(meta) -> Result<Punctuated<WherePredicate, Token![,]>, Error>`, and call `try_set_attribute(&mut self.X, parse_bounds(meta)?, \"X\")` for each of the three attributes.","locations":[{"ref":"rkyv_derive/src/attributes.rs:63-92","code":"   63 |         } else if meta.path.is_ident(\"archive_bounds\") {\n   64 |             let bounds;\n   65 |             parenthesized!(bounds in meta.input);\n   66 |             let clauses =\n   67 |                 bounds.parse_terminated(WherePredicate::parse, Token![,])?;\n   68 |             try_set_attribute(\n   69 |                 &mut self.archive_bounds,\n   70 |                 clauses,\n   71 |                 \"archive_bounds\",\n   72 |             )\n   73 |         } else if meta.path.is_ident(\"serialize_bounds\") {\n   74 |             let bounds;\n   75 |             parenthesized!(bounds in meta.input);\n   76 |             let clauses =\n   77 |                 bounds.parse_terminated(WherePredicate::parse, Token![,])?;\n   78 |             try_set_attribute(\n   79 |                 &mut self.serialize_bounds,\n   80 |                 clauses,\n   81 |                 \"serialize_bounds\",\n   82 |             )\n   83 |         } else if meta.path.is_ident(\"deserialize_bounds\") {\n   84 |             let bounds;\n   85 |             parenthesized!(bounds in meta.input);\n   86 |             let clauses =\n   87 |                 bounds.parse_terminated(WherePredicate::parse, Token![,])?;\n   88 |             try_set_attribute(\n   89 |                 &mut self.deserialize_bounds,\n   90 |                 clauses,\n   91 |                 \"deserialize_bounds\",\n   92 |             )","lines":30,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv_derive/src/attributes.rs#L63-L92"}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"The entire `rkyv_dyn` / `rkyv_dyn_derive` / `rkyv_dyn_test` set of crates is excluded from the workspace (commented out in the root `Cargo.toml` `members` list, and the `rkyv_dyn`/`rkyv_dyn_derive` workspace dependency entries are also commented out). As a direct consequence, none of this code is compiled, type-checked, or tested by CI. Several of the findings below (undefined identifiers, field-name mismatches, API that no longer exists in current `rkyv`) are a result of this crate having bit-rotted while disconnected from the build. Anyone re-enabling these crates will hit a wall of compile errors.","fix":"Either finish porting rkyv_dyn/rkyv_dyn_derive to the current rkyv 0.8 API and re-add them to the workspace with CI coverage, or remove the unmaintained crates from the repository/feature surface (and stop publishing docs that reference them) until someone does the port. Leaving large amounts of uncompiled, unverified unsafe code in the tree is a maintenance hazard.","locations":[{"ref":"Cargo.toml:1-9","code":"    1 | [workspace]\n    2 | members = [\n    3 |     \"benchlib\",\n    4 |     \"rkyv\",\n    5 |     \"rkyv_derive\",\n    6 |     # \"rkyv_dyn\",\n    7 |     # \"rkyv_dyn_derive\",\n    8 |     # \"rkyv_dyn_test\",\n    9 | ]","lines":9,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/Cargo.toml#L1-L9"},{"ref":"Cargo.toml:34-35","code":"   34 | # rkyv_dyn = { version = \"=0.8.0-rc.1\", default-features = false, path = \"rkyv_dyn\" }\n   35 | # rkyv_dyn_derive = { version = \"=0.8.0-rc.1\", default-features = false, path = \"rkyv_dyn_derive\" }","lines":2,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/Cargo.toml#L34-L35"}]},{"id":"ARCH_2","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`rkyv_dyn/src/lib.rs` contains two `/// TODO` doc comments left as placeholder documentation for public, exported items: `AsDynSerializer`/`as_dyn_serializer` (lines 51-55) and `AsDynDeserializer`/`as_dyn_deserializer` (lines 195-199). These are public API surface with no real documentation, only a literal \"TODO\" string, despite the crate enforcing `#![deny(missing_docs)]` at the top of the file.","fix":"Write real documentation for these public traits/methods explaining what `as_dyn_serializer`/`as_dyn_deserializer` are for (object-safe upcasting to the dyn serializer/deserializer types) instead of leaving placeholder TODOs.","locations":[{"ref":"rkyv_dyn/src/lib.rs:51-55","code":"   51 | /// TODO\n   52 | pub trait AsDynSerializer<E> {\n   53 |     /// TODO\n   54 |     fn as_dyn_serializer(&mut self) -> &mut dyn DynSerializer<E>;\n   55 | }","lines":5,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv_dyn/src/lib.rs#L51-L55"},{"ref":"rkyv_dyn/src/lib.rs:195-199","code":"  195 | /// TODO\n  196 | pub trait AsDynDeserializer<E> {\n  197 |     /// TODO\n  198 |     fn as_dyn_deserializer(&mut self) -> &mut dyn DynDeserializer<E>;\n  199 | }","lines":5,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv_dyn/src/lib.rs#L195-L199"}]},{"id":"ARCH_3","type":"architecture","type_label":"Architecture","severity":"negligible","easy":false,"description":"`generate_partial_eq_impl` and `generate_partial_ord_impl` in both struct.rs and enum.rs call `generics.where_clause.clone().unwrap()` (struct.rs:271, struct.rs:318, enum.rs:561, enum.rs:662). This is only safe because the sole caller, `derive_archive_impl` in archive/mod.rs, unconditionally calls `input.generics.make_where_clause()` before passing `&input.generics` down through `impl_struct`/`impl_enum`. None of the four call sites document or assert this precondition locally, so a future refactor of the call chain (e.g. invoking these functions from a new code path, or reordering `derive_archive_impl`) would silently turn this into a panic inside a proc-macro, producing a deeply confusing build failure for end users instead of a normal compile error.","fix":"Either pas ng \"cannot find compiler_error in core\"\ncompiler error instead of the intended friendly, actionable error message\nexplaining the conflicting features and how to fix their `Cargo.toml`.","fix":"Rename `core::compiler_error!` to `core::compile_error!` at both call sites (lines 274 and 283), matching the correctly-spelled invocations at lines 296, 306, 316, and 326.","locations":[{"ref":"rkyv/src/lib.rs:274","code":"  274 | core::compiler_error!(","lines":1,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/lib.rs#L274"},{"ref":"rkyv/src/lib.rs:283","code":"  283 | core::compiler_error!(","lines":1,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/src/lib.rs#L283"}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"low","easy":true,"description":"In the `derive_partial_ord` example, the type names and Rust keywords are swapped: the type declared `pub enum Struct { A { a: i32 } }` is actually an enum (not a struct), and the type declared `pub struct Enum { a: i32 }` is actually a struct (not an enum). A reader skimming the example for guidance on PartialOrd derive behavior on structs vs. enums will be misled by the names, since both blocks use the opposite kind from what their name implies.","fix":"Swap the names so `Struct` is declared as `struct Struct { a: i32 }` and `Enum` is declared as `enum Enum { A { a: i32 } }`, or rename them to something kind-neutral like `MyEnum`/`MyStruct` to avoid the confusion entirely.","locations":[{"ref":"rkyv/examples/derive_partial_ord.rs:9-14","code":"    9 |     pub enum Struct {\n   10 |         A { a: i32 },\n   11 |     }\n   12 | \n   13 |     let small = Struct::A { a: 0 };\n   14 |     let big = Struct::A { a: 1 };","lines":6,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/examples/derive_partial_ord.rs#L9-L14"},{"ref":"rkyv/examples/derive_partial_ord.rs:28-30","code":"   28 |     pub struct Enum {\n   29 |         a: i32,\n   30 |     }","lines":3,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv/examples/derive_partial_ord.rs#L28-L30"}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`bytecheck.rs` line 3 imports `register::Registered` from `crate::register`, but no `register` module exists anywhere in the `rkyv_dyn` crate (only `lazy_static` is declared as a module in lib.rs). This is an unresolved import that would fail to compile immediately if the module were re-enabled.","fix":"Add the missing `register` module (apparently meant to hold the impl-ID -> vtable registry, referenced elsewhere as `IMPL_REGISTRY`/`CHECK_BYTES_REGISTRY`) or update the import path to wherever that registry actually lives once the dyn-registry redesign is finished.","locations":[{"ref":"rkyv_dyn/src/bytecheck.rs:3","code":"    3 | use crate::{ArchivedDynMetadata, register::Registered};","lines":1,"link":"https://github.com/rkyv/rkyv/blob/a24b50a60e3f6417f7b63ff5693f0981cd0860c2/rkyv_dyn/src/bytecheck.rs#L3"}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`Verify` impl bounds `C::Error: Source` (bytecheck.rs:38) but `Source` is never imported — only `Fallible`, `fail`, and `Error` are brought in from `bytecheck::rancor` on line 4. This is an unresolved name and would fail to compile.","fix":"Add `Source` to the `use bytecheck::{CheckBytes, rancor::{...}}` import list.","locations":[{"ref":"rkyv_dyn/src/bytecheck.rs:4-38","code":"    4 | use bytecheck::{CheckBytes, rancor::{Fallible, fail, Error}, Verify};\n    5 | use core::{\n    6 |     alloc::Layout,\n    7 |     fmt,\n    8 |     marker::PhantomData,\n    9 | };\n   10 | use rkyv::validation::ArchiveContext;\n   11 | use std::collections::HashMap;\n   12 | \n   13 | #[doc(hidden)]\n   14 | #[derive(Copy, Clone)]\n   15 | pub struct ImplValidation<E> {\n   16 |     pub layout: La (function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);

const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {

  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
