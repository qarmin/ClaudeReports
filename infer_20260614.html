<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"is_zst is unbounded recursive. Each recursive call consumes at least 8 bytes (the skippable frame header), but data_len can be 0, meaning a crafted input containing many consecutive zero-length skippable frames followed eventually by a Zstd magic produces one recursive call per frame. A buffer ~256 KB long with 32768 zero-length skippable frames triggers a stack overflow. There is no depth limit or iterative fallback.","fix":"Rewrite using a loop: keep slicing buf forward until a non-skippable frame is encountered or the buffer is exhausted. Remove the recursive tail call.","locations":[{"ref":"src/matchers/archive.rs:277-306","code":"  277 | pub fn is_zst(buf: &[u8]) -> bool {\n  278 |     if buf.len() > 3 && buf[0] == 0x28 && buf[1] == 0xB5 && buf[2] == 0x2F && buf[3] == 0xFD {\n  279 |         return true;\n  280 |     }\n  281 | \n  282 |     if buf.len() < 8 {\n  283 |         return false;\n  284 |     }\n  285 | \n  286 |     let magic = u32::from_le_bytes(buf[0..4].try_into().unwrap());\n  287 |     let Ok(magic) = usize::try_from(magic) else {\n  288 |         return false;\n  289 |     };\n  290 | \n  291 |     if magic & ZSTD_SKIP_MASK != ZSTD_SKIP_START {\n  292 |         return false;\n  293 |     }\n  294 | \n  295 |     let data_len = u32::from_le_bytes(buf[4..8].try_into().unwrap());\n  296 |     let Ok(data_len) = usize::try_from(data_len) else {\n  297 |         return false;\n  298 |     };\n  299 | \n  300 |     if buf.len() < 8 + data_len {\n  301 |         return false;\n  302 |     }\n  303 | \n  304 |     let next_frame = &buf[8 + data_len..];\n  305 |     is_zst(next_frame)\n  306 | }","lines":30}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"is_lz4 has the same unbounded recursion issue as is_zst: it recurses with no depth limit over skippable frames, enabling stack overflow via crafted input.","fix":"Rewrite using a loop (same pattern as the is_zst fix).","locations":[{"ref":"src/matchers/archive.rs:313-343","code":"  313 | pub fn is_lz4(buf: &[u8]) -> bool {\n  314 |     // LZ4 frame magic\n  315 |     if buf.len() > 3 && buf[0] == 0x04 && buf[1] == 0x22 && buf[2] == 0x4D && buf[3] == 0x18 {\n  316 |         return true;\n  317 |     }\n  318 | \n  319 |     if buf.len() < 8 {\n  320 |         return false;\n  321 |     }\n  322 | \n  323 |     let magic = u32::from_le_bytes(buf[0..4].try_into().unwrap());\n  324 |     let Ok(magic) = usize::try_from(magic) else {\n  325 |         return false;\n  326 |     };\n  327 | \n  328 |     if magic & ZSTD_SKIP_MASK != ZSTD_SKIP_START {\n  329 |         return false;\n  330 |     }\n  331 | \n  332 |     let data_len = u32::from_le_bytes(buf[4..8].try_into().unwrap());\n  333 |     let Ok(data_len) = usize::try_from(data_len) else {\n  334 |         return false;\n  335 |     };\n  336 | \n  337 |     if buf.len() < 8 + data_len {\n  338 |         return false;\n  339 |     }\n  340 | \n  341 |     let next_frame = &buf[8 + data_len..];\n  342 |     is_lz4(next_frame)\n  343 | }","lines":31}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"epub appears twice in MATCHER_MAP - once under MatcherType::Book (lines 115-120) and again under MatcherType::Archive (lines 441-446). The Archive entry delegates to the same underlying matcher via matchers::archive::is_epub which calls crate::book::is_epub. As a result, infer::get() will always return the Book variant (first match wins), making the Archive epub entry dead. More importantly, the Archive entry registers a duplicate MIME type 'application/epub+zip' and extension 'epub', so is_mime_supported and is_supported find it twice, is_archive() returns true for epub, and users calling MATCHER_MAP.iter() directly see a confusing duplicate.","fix":"Remove the Archive epub entry (lines 441-446) since epub is already covered under Book. If is_archive should match epub, consider querying both MatcherType::Book and MatcherType::Archive in that predicate instead.","locations":[{"ref":"src/map.rs:114-120","code":"  114 |     // Book\n  115 |     (\n  116 |         MatcherType::Book,\n  117 |         \"application/epub+zip\",\n  118 |         \"epub\",\n  119 |         matchers::book::is_epub\n  120 |     ),","lines":7},{"ref":"src/map.rs:441-446","code":"  441 |     (\n  442 |         MatcherType::Archive,\n  443 |         \"application/epub+zip\",\n  444 |         \"epub\",\n  445 |         matchers::archive::is_epub\n  446 |     ),","lines":6}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"woff2 is registered with MIME type 'application/font-woff' (the woff1 MIME type) instead of the correct 'font/woff2'. This means is_mime(&buf, \"font/woff2\") and is_mime_supported(\"font/woff2\") will both return false for woff2 files, and callers relying on the MIME type string will misidentify woff2 as woff1.","fix":"Change the mime_type literal for woff2 from \"application/font-woff\" to \"font/woff2\".","locations":[{"ref":"src/map.rs:366-371","code":"  366 |     (\n  367 |         MatcherType::Font,\n  368 |         \"application/font-woff\",\n  369 |         \"woff2\",\n  370 |         matchers::font::is_woff2\n  371 |     ),","lines":6}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"is_webp only checks bytes 8-11 for the 'WEBP' marker but does not verify the 'RIFF' signature at bytes 0-3. Any buffer >= 12 bytes with 'WEBP' at offset 8 will be wrongly classified as WEBP even if it is a different RIFF variant (e.g. WAV/AVI also use RIFF container).","fix":"Add checks buf[0]==0x52 && buf[1]==0x49 && buf[2]==0x46 && buf[3]==0x46 (i.e. 'RIFF') in addition to the 'WEBP' check at bytes 8-11.","locations":[{"ref":"src/matchers/image.rs:42-44","code":"   42 | pub fn is_webp(buf: &[u8]) -> bool {\n   43 |     buf.len() > 11 && buf[8] == 0x57 && buf[9] == 0x45 && buf[10] == 0x42 && buf[11] == 0x50\n   44 | }","lines":3}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"is_tiff rejects valid TIFF files that happen to have buf[8]==0x43 but buf[9]!=0x52 (or vice versa). The early byte check `buf[8] != 0x43 && buf[9] != 0x52` uses AND instead of OR, so any TIFF with 0x43 at offset 8 (regardless of offset 9) is excluded. The check is also redundant because !is_cr2(buf) already handles the real CR2 exclusion. The correct condition to avoid CR2 is just !is_cr2(buf).","fix":"Remove the `buf[8] != 0x43 && buf[9] != 0x52` lines entirely. Keep only `!is_cr2(buf)` as the CR2 guard.","locations":[{"ref":"src/matchers/image.rs:59-66","code":"   59 | pub fn is_tiff(buf: &[u8]) -> bool {\n   60 |     buf.len() > 9\n   61 |         && ((buf[0] == 0x49 && buf[1] == 0x49 && buf[2] == 0x2A && buf[3] == 0x0)\n   62 |             || (buf[0] == 0x4D && buf[1] == 0x4D && buf[2] == 0x0 && buf[3] == 0x2A))\n   63 |         && buf[8] != 0x43\n   64 |         && buf[9] != 0x52\n   65 |         && !is_cr2(buf) // To avoid conflicts differentiate Tiff from CR2\n   66 | }","lines":8}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"is_isobmff accepts ftyp_length values of 0-7 even though a valid ftyp box must be at least 16 bytes (4 size + 4 'ftyp' + 4 major + 4 minor). If ftyp_length is 0 the condition buf.len() >= 0 is trivially true for any non-empty buffer, allowing false positives. get_ftyp is only called after is_isobmff, so callers may receive malformed ftyp data.","fix":"Add `if ftyp_length < 16 { return false; }` after reading ftyp_length in is_isobmff.","locations":[{"ref":"src/matchers/image.rs:165-177","code":"  165 | // IsISOBMFF checks whether the given buffer represents I  where magic is a u32 can never fail on any platform where usize >= 32 bits (all supported Rust targets). The `else { return false }` branch is unreachable dead code on all practical targets.","fix":"Cast directly with `magic as usize` and add a compile-time assert if you want to document the assumption, or keep as-is if portability to 16-bit targets is desired.","locations":[{"ref":"src/matchers/archive.rs:287-289","code":"  287 |     let Ok(magic) = usize::try_from(magic) else {\n  288 |         return false;\n  289 |     };","lines":3},{"ref":"src/matchers/archive.rs:324-326","code":"  324 |     let Ok(magic) = usize::try_from(magic) else {\n  325 |         return false;\n  326 |     };","lines":3}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In tests/doc.rs, the macro test_format_get_only! is defined with #[cfg(feature = \"std\")] at line 3. All its call sites (lines 27, 38, 49) are also individually guarded with #[cfg(feature = \"std\")]. When building without the std feature, the macro definition does not exist AND none of its call sites are compiled, so the definition is unused when building without std. In the std build the macro is used, but having redundant cfg guards at both definition and call sites creates noise. More importantly, the macro only tests the get()-from-bytes path even though it is named 'get_only' - the reason it omits get_from_path is doc-only apparent from a code comment; the pattern is fragile if a contributor copies it.","fix":"Add a comment inside the macro explaining why get_from_path() is omitted (OLE2 requires cfb which needs std, but the macro itself is already std-only, so the omission needs explicit justification). Consider removing the per-call-site #[cfg(feature = \"std\")] guards since the macro definition guard already prevents compilation without std.","locations":[{"ref":"tests/doc.rs:3-24","code":"    3 | #[cfg(feature = \"std\")]\n    4 | macro_rules! test_format_get_only {\n    5 |     ($exp_matchert:ident, $exp_mimet:expr, $exp_ext:expr, $format:ident, $file:expr) => {\n    6 |         mod $format {\n    7 |             use infer::{MatcherType, Type};\n    8 | \n    9 |             fn matcher(_buf: &[u8]) -> bool {\n   10 |                 false\n   11 |             }\n   12 | \n   13 |             #[test]\n   14 |             fn get() {\n   15 |                 let expected_kind =\n   16 |                     Type::new(MatcherType::$exp_matchert, $exp_mimet, $exp_ext, matcher);\n   17 |                 let buf = include_bytes!(concat!(\"../testdata/\", $file));\n   18 |                 let kind = infer::get(buf).expect(\"test file matches\");\n   19 | \n   20 |                 assert_eq!(expected_kind, kind);\n   21 |             }\n   22 |         }\n   23 |     };\n   24 | }","lines":22},{"ref":"tests/doc.rs:27","code":"   27 | test_format_get_only!(Doc, \"application/msword\", \"doc\", doc, \"sample.doc\");","lines":1},{"ref":"tests/doc.rs:38","code":"   38 | test_format_get_only!(Doc, \"application/vnd.ms-excel\", \"xls\", xls, \"sample.xls\");","lines":1},{"ref":"tests/doc.rs:49","code":"   49 | test_format_get_only!(","lines":1}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc example for the top-level is_archive function uses 'testdata/sample.pdf' to demonstrate an archive match. PDF is technically registered under MatcherType::Archive in this library (which is itself a debatable classification), but the example is misleading: users expect is_archive to match formats like zip, tar, gz, etc. A PDF is not conventionally considered an archive. The comment works only due to an arguably incorrect classification of PDF.","fix":"Use a conventional archive file in the example, such as 'testdata/sample.gz' or 'testdata/sample.zip'.","locations":[{"ref":"src/lib.rs:556-562","code":"  556 | /// Determines whether a buffer is an archive type.\n  557 | /// # Examples\n  558 | ///\n  559 | /// ```rust\n  560 | /// use std::fs;\n  561 | /// assert!(infer::is_archive(&fs::read(\"testdata/sample.pdf\").unwrap()));\n  562 | /// ```","lines":7}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The order comment lists 'Application, Image, Video, Audio, Font, Document, Archive, Text' but the actual order in MATCHER_MAP is Application, Book, Image, Video, Audio, Font, Document, Archive, Text. 'Book' is omitted from the comment, causing the comment to be misleading for contributors trying to maintain the documented ordering.","fix":"Add 'Book' to the order comment after 'Application': 'Order: Application, Book, Image, Video, Audio, Font, Document, Archive, Text.'","locations":[{"ref":"src/map.rs:31-33","code":"   31 | // Order: Application, Image, Video, Audio, Font, Document, Archive, Text.\n   32 | // The above order should be preserved when adding new types since\n   33 | // it may affect match result and/or performances.","lines":3}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"is_zst has a misformatted doc comment describing the non-panic guarantee (lines 271-275). The comment text embeds code in backticks in a way that reads like malformed source rather than prose, and it also states the panic condition inverted: it says `buf.len() < 8` but the actual guard is `buf.len() >= 8`.","fix":"Rewrite as a normal `# Safety` or inline comment: `// Cannot panic: buf.len() >= 8 is checked above, so buf[0..4] and buf[4..8] are valid.`","locations":[{"ref":"src/matchers/archive.rs:271-275","code":"  271 | /// # Panics\n  272 | ///\n  273 | /// let magic = `u32::from_le_bytes(buf`[0..4].`try_into().unwrap()`);\n  274 | /// Cannot panic because buf[0..4] is guaranteed to be 4 bytes long\n  275 | /// by the preceding check of `buf.len()` < 8","lines":5}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"In src/lib.rs line 561, the doctest for is_archive() uses 'testdata/sample.pdf' as the example, claiming a PDF is an archive. PDF is indeed registered under MatcherType::Archive in the matcher map, but the example is misleading to users who expect 'archive' to mean a container of multiple files (zip, tar, etc.). The comment/example does not reflect common understanding.","fix":"Replace the example with a proper archive file such as 'testdata/sample.tar.zst' or 'testdata/sample.cpio' to avoid confusion about what 'archive' means in this library.","locations":[{"ref":"src/lib.rs:559-562","code":"  559 | /// ```rust\n  560 | /// use std::fs;\n  561 | /// assert!(infer::is_archive(&fs::read(\"testdata/sample.pdf\").unwrap()));\n  562 | /// ```","lines":4}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"is_wasm has a grammatically incorrect comment: 'WASM has starts with' should be 'WASM starts with'.","fix":"Change 'WASM has starts with' to 'WASM starts with'.","locations":[{"ref":"src/matchers/app.rs:11","code":"   11 |     // WASM has starts with `\\0asm`, followed by the version.","lines":1}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"is_dex and is_dey both have a comment `// file sise` which is a misspelling of 'file size'. Additionally the comment is misleading: byte 36 of a DEX file is not the file-size field (file size is at bytes 32-35 in the DEX format header); byte 36 is actually the first byte of the SHA-1 signature field.","fix":"Fix the typo to 'file size' and correct the field name to match the DEX spec (it appears to be checking the SHA-1 checksum area, not the file size).","locations":[{"ref":"src/matchers/app.rs:108","code":"  108 |     // file sise","lines":1},{"ref":"src/matchers/app.rs:118","code":"  118 |     // file sise","lines":1}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"is_lz4 reuses ZSTD-named constants (ZSTD_SKIP_START, ZSTD_SKIP_MASK) even though LZ4 skippable frames use the same magic range. The constant names are misleading when read in the LZ4 context.","fix":"Rename the constants to e.g. SKIP_FRAME_START and SKIP_FRAME_MASK, or add a comment explaining that LZ4 and Zstd share the same skippable-frame magic range.","locations":[{"ref":"src/matchers/archive.rs:313-343","code":"  313 | pub fn is_lz4(buf: &[u8]) -> bool {\n  314 |     // LZ4 frame magic\n  315 |     if buf.len() > 3 && buf[0] == 0x04 && buf[1] == 0x22 && buf[2] == 0x4D && buf[3] == 0x18 {\n  316 |         return true;\n  317 |     }\n  318 | \n  319 |     if buf.len() < 8 {\n  320 |         return false;\n  321 |     }\n  322 | \n  323 |     let magic = u32::from_le_bytes(buf[0..4].try_into().unwrap());\n  324 |     let Ok(magic) = usize::try_from(magic) else {\n  325 |         return false;\n  326 |     };\n  327 | \n  328 |     if magic & ZSTD_SKIP_MASK != ZSTD_SKIP_START {\n  329 |         return false;\n  330 |     }\n  331 | \n  332 |     let data_len = u32::from_le_bytes(buf[4..8].try_into().unwrap());\n  333 |     let Ok(data_len) = usize::try_from(data_len) else {\n  334 |         return false;\n  335 |     };\n  336 | \n  337 |     if buf.len() < 8 + data_len {\n  338 |         return false;\n  339 |     }\n  340 | \n  341 |     let next_frame = &buf[8 + data_len..];\n  342 |     is_lz4(next_frame)\n  343 | }","lines":31}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"is_zst and is_lz4 share identical skippable-frame parsing logic (lines 282-305 and 319-342 respectively). The only difference between the two functions is the non-skippable frame magic check at the top (4 bytes). The shared logic (read 4-byte magic, mask it, read data_len, advance buffer, recurse) is duplicated verbatim across both functions (~25 lines).","fix":"Extract a helper `fn skip_frames(buf: &[u8]) -> Option<&[u8]>` that iterates over skippable frames and returns the slice at the first non-skippable frame. Both is_zst and is_lz4 call this helper and then check their respective non-skippable frame magic.","locations":[{"ref":"src/matchers/archive.rs:277-306","code":"  277 | pub fn is_zst(buf: &[u8]) -> bool {\n  278 |     if buf.len() > 3 && buf[0] == 0x28 && buf[1] == 0xB5 && buf[2] == 0x2F && buf[3] == 0xFD {\n  279 |         return true;\n  280 |     }\n  281 | \n  282 |     if buf.len() < 8 {\n  283 |         return false;\n  284 |     }\n  285 | \n  286 |     let magic = u32::from_le_bytes(buf[0..4].try_into().unwrap());\n  287 |     let Ok(magic) = usize::try_from(magic) else {\n  288 |         return false;\n  289 |     };\n  290 | \n  291 |     if magic & ZSTD_SKIP_MASK != ZSTD_SKIP_START {\n  292 |         return false;\n  293 |     }\n  294 | \n  295 |     let data_len = u32::from_le_bytes(buf[4..8].try_into().unwrap());\n  296 |     let Ok(data_len) = usize::try_from(data_len) else {\n  297 |         return false;\n  298 |     };\n  299 | \n  300 |     if buf.len() < 8 + data_len {\n  301 |         return false;\n  302 |     }\n  303 | \n  304 |     let next_frame = &buf[8 + data_len..];\n  305 |     is_zst(next_frame)\n  306 | }","lines":30},{"ref":"src/matchers/archive.rs:313-343","code":"  313 | pub fn is_lz4(buf: &[u8]) -> bool {\n  314 |     // LZ4 frame magic\n  315 |     if buf.len() > 3 && buf[0] == 0x04 && buf[1] == 0x22 && buf[2] == 0x4D && buf[3] == 0x18 {\n  316 |         return true;\n  317 |     }\n  318 | \n  319 |     if buf.len() < 8 {\n  320 |         return false;\n  321 |     }\n  322 | \n  323 |     let magic = u32::from_le_bytes(buf[0..4].try_into().unwrap());\n  324 |     let Ok(magic) = usize::try_from(magic) else {\n  325 |         return false;\n  326 |     };\n  327 | \n  328 |     if magic & ZSTD_SKIP_MASK != ZSTD_SKIP_START {\n  329 |         return false;\n  330 |     }\n  331 | \n  332 |     let data_len = u32::from_le_bytes(buf[4..8].try_into().unwrap());\n  333 |     let Ok(data_len) = usize::try_from(data_len) else {\n  334 |         return false;\n  335 |     };\n  336 | \n  337 |     if buf.len() < 8 + data_len {\n  338 |         return false;\n  339 |     }\n  340 | \n  341 |     let next_frame = &buf[8 + data_len..];\n  342 |     is_lz4(next_frame)\n  343 | }","lines":31}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"medium","easy":true,"description":"In src/map.rs the epub type is registered twice: once as MatcherType::Book at position ~12 (before Image) and once as MatcherType::Archive at position ~30 (after ODF). Because matchers are checked in order and the Book entry comes first, the Archive entry for epub can never match - it is permanently shadowed dead code. Any code calling infer::is_archive() on an epub buffer will return false even though epub is semantically an archive.","fix":"Remove the duplicate MatcherType::Archive epub entry from the matcher_map!. If epub must also be detectable as an archive, add a dedicated archive::is_epub wrapper that delegates to book::is_epub and register it under Archive without the Book entry, or document the intentional precedence.","locations":[{"ref":"src/map.rs:114-120","code":"  114 |     // Book\n  115 |     (\n  116 |         MatcherType::Book,\n  117 |         \"application/epub+zip\",\n  118 |         \"epub\",\n  119 |         matchers::book::is_epub\n  120 |     ),","lines":7},{"ref":"src/map.rs:441-446","code":"  441 |     (\n  442 |         MatcherType::Archive,\n  443 |         \"application/epub+zip\",\n  444 |         \"epub\",\n  445 |         matchers::archive::is_epub\n  446 |     ),","lines":6}]}]</script>

<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildToml() {
  function tomlStr(s) {
    return '"' + String(s == null ? '' : s)
      .replace(/\\/g, '\\\\')
      .replace(/"/g, '\\"')
      .replace(/\n/g, '\\n')
      .replace(/\r/g, '\\r')
      .replace(/\t/g, '\\t') + '"';
  }
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml')     { downloadText(buildToml(),    'findings.toml', 'application/toml'); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
