c/unix/apple/disk.rs:336-343","code":"  336 |             let mount_point = PathBuf::from(OsStr::from_bytes(\n  337 |                 CStr::from_ptr(c_disk.f_mntonname.as_ptr()).to_bytes(),\n  338 |             ));\n  339 | \n  340 |             let uuid = OsStr::from_bytes(CStr::from_ptr(c_disk.f_mntonname.as_ptr()).to_bytes())\n  341 |                 .to_os_string();\n  342 | \n  343 |             let disk = container.iter_mut().find(|d| d.inner.uuid == uuid);","lines":8,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/disk.rs#L336-L343"},{"ref":"src/unix/apple/disk.rs:38","code":"   38 |     uuid: OsString,","lines":1,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/disk.rs#L38"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `Query::add_english_counter`, the early-return branch is taken when the counter map already\n`contains_key(name)`, but the debug message says `\"doesn't have key\"`. The message is the\nopposite of the actual condition (the key already exists), which is misleading when debugging.","fix":"Change the message to something like `\"Query::add_english_counter: key {name:?} already exists\"`.","locations":[{"ref":"src/windows/cpu.rs:231-233","code":"  231 |         if self.internal.data.contains_key(name) {\n  232 |             sysinfo_debug!(\"Query::add_english_counter: doesn't have key `{:?}`\", name);\n  233 |             return false;","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/cpu.rs#L231-L233"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comments on sysinfo_networks_received / sysinfo_networks_transmitted describe the operation as `acc + data.received()` (plain addition), but the implementation uses `saturating_add`. Minor documentation inaccuracy about overflow behavior.","fix":"Update the doc comments to mention saturating addition, or just describe the intent without the misleading literal expression.","locations":[{"ref":"src/c_interface.rs:287-300","code":"  287 | /// Equivalent of\n  288 | /// `system::networks().iter().fold(0, |acc, (_, data)| acc + data.received() as size_t)`.\n  289 | #[unsafe(no_mangle)]\n  290 | pub extern \"C\" fn sysinfo_networks_received(networks: CNetworks) -> size_t {\n  291 |     assert!(!networks.is_null());\n  292 |     unsafe {\n  293 |         let networks: Box<Networks> = Box::from_raw(networks as *mut Networks);\n  294 |         let ret = networks.iter().fold(0, |acc: size_t, (_, data)| {\n  295 |             acc.saturating_add(data.received() as size_t)\n  296 |         });\n  297 |         let _ = Box::into_raw(networks);\n  298 |         ret\n  299 |     }\n  300 | }","lines":14,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/c_interface.rs#L287-L300"},{"ref":"src/c_interface.rs:302-315","code":"  302 | /// Equivalent of\n  303 | /// `system::networks().iter().fold(0, |acc, (_, data)| acc + data.transmitted() as size_t)`.\n  304 | #[unsafe(no_mangle)]\n  305 | pub extern \"C\" fn sysinfo_networks_transmitted(networks: CNetworks) -> size_t {\n  306 |     assert!(!networks.is_null());\n  307 |     unsafe {\n  308 |         let networks: Box<Networks> = Box::from_raw(networks as *mut Networks);\n  309 |         let ret = networks.iter().fold(0, |acc: size_t, (_, data)| {\n  310 |             acc.saturating_add(data.transmitted() as size_t)\n  311 |         });\n  312 |         let _ = Box::into_raw(networks);\n  313 |         ret\n  314 |     }\n  315 | }","lines":14,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/c_interface.rs#L302-L315"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The comment in `os_version()` says it returns something like \"13.0-RELEASE\" and keeps everything before the '-'. On NetBSD `kern.osrelease` is typically just a numeric release like \"9.3\" with no '-RELEASE' suffix, so the FreeBSD-style comment was copy-pasted into the NetBSD backend and is misleading there.","fix":"Adjust the comment to reflect NetBSD's `kern.osrelease` format (or note it is a best-effort split shared with FreeBSD).","locations":[{"ref":"src/unix/bsd/netbsd/system.rs:192-195","code":"  192 |             // It returns something like \"13.0-RELEASE\". We want to keep everything until the \"-\".\n  193 |             get_system_info(&os_release, None)\n  194 |                 .and_then(|s| s.split('-').next().map(|s| s.to_owned()))\n  195 |         }","lines":4,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/system.rs#L192-L195"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"In `network_common.rs` the doc comment on `ifi_oerrors` reads 'similar to `ifi_ierrors`', and `from_flag`'s comment block describes the FreeBSD bsnmp source. The `ifi_oerrors` comment is uninformative copy-paste filler (output errors are not 'similar to' input errors in meaning).","fix":"Document `ifi_oerrors` as the total number of output/transmit errors on the interface.","locations":[{"ref":"src/unix/bsd/network_common.rs:22-24","code":"   22 |     pub(crate) old_ifi_ierrors: u64,\n   23 |     /// similar to `ifi_ierrors`\n   24 |     pub(crate) ifi_oerrors: u64,","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/network_common.rs#L22-L24"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"`host_name` comment says \"Shrink buffer to terminate the null bytes\" while the code\n`buffer.resize(pos, 0)` truncates the buffer at the first NUL (removing the NUL and everything\nafter). The comment is misleading - nothing is being \"terminated\"; the trailing zero bytes are being\nremoved.","fix":"Reword to e.g. \"Truncate the buffer at the first NUL byte to drop the C string terminator and padding.\"","locations":[{"ref":"src/unix/linux/system.rs:469-471","code":"  469 |                 if let Some(pos) = buffer.iter().position(|x| *x == 0) {\n  470 |                     // Shrink buffer to terminate the null bytes\n  471 |                     buffer.resize(pos, 0);","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/system.rs#L469-L471"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"The NUL-terminated sysctl string retrieval logic is duplicated: `get_system_info` (system.rs) and\n`os_version` (system.rs) both do the \"query size, allocate, query value, truncate at first NUL,\nfrom_utf8\" dance, and `get_sysctl_str` (cpu.rs) does a third variant. Three near-identical\nimplementations of the same pattern.","fix":"Factor a single helper that performs the size-then-value sysctl read and NUL-trimmed UTF-8 conversion.","locations":[{"ref":"src/unix/apple/system.rs:546-589","code":"  546 | fn get_system_info(value: c_int, default: Option<&str>) -> Option<String> {\n  547 |     let mut mib: [c_int; 2] = [libc::CTL_KERN, value];\n  548 |     let mut size = 0;\n  549 | \n  550 |     unsafe {\n  551 |         // Call first to get size\n  552 |         sysctl(\n  553 |             mib.as_mut_ptr(),\n  554 |             mib.len() as _,\n  555 |             std::ptr::null_mut(),\n  556 |             &mut size,\n  557 |             std::ptr::null_mut(),\n  558 |             0,\n  559 |         );\n  560 | \n  561 |         // exit early if we did not update the size\n  562 |         if size == 0 {\n  563 |             default.map(|s| s.to_owned())\n  564 |         } else {\n  565 |             // set the buffer to the correct size\n  566 |             let mut buf = vec![0_u8; size as _];\n  567 | \n  568 |             if sysctl(\n  569 |                 mib.as_mut_ptr(),\n  570 |                 mib.len() as _,\n  571 |                 buf.as_mut_ptr() as _,\n  572 |                 &mut size,\n  573 |                 std::ptr::null_mut(),\n  574 |                 0,\n  575 |             ) == -1\n  576 |             {\n  577 |                 // If command fails return default\n  578 |                 default.map(|s| s.to_owned())\n  579 |             } else {\n  580 |                 if let Some(pos) = buf.iter().position(|x| *x == 0) {\n  581 |                     // Shrink buffer to terminate the null bytes\n  582 |                     buf.resize(pos, 0);\n  583 |                 }\n  584 | \n  585 |                 String::from_utf8(buf).ok()\n  586 |             }\n  587 |         }\n  588 |     }\n  589 | }","lines":44,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/system.rs#L546-L589"},{"ref":"src/unix/apple/system.rs:463-493","code":"  463 |     pub(crate) fn os_version() -> Option<String> {\n  464 |         unsafe {\n  465 |             // get the size for the buffer first\n  466 |             let mut size = 0;\n  467 |             if get_sys_value_by_name(b\"kern.osproductversion\\0\", &mut size, std::ptr::null_mut())\n  468 |                 && size > 0\n  469 |             {\n  470 |                 // now create a buffer with the size and get the real value\n  471 |                 let mut buf = vec![0_u8; size as _];\n  472 | \n  473 |                 if get_sys_value_by_name(\n  474 |                     b\"kern.osproductversion\\0\",\n  475 |                     &mut size,\n  476 |                     buf.as_mut_ptr() as *mut c_void,\n  477 |                 ) {\n  478     println!(\"This OS isn't supported (yet?).\");\n   26 | /// }\n   27 | /// ```\n   28 | pub struct System {\n   29 |     pub(crate) inner: SystemInner,\n   30 | }\n   31 | \n   32 | impl Default for System {\n   33 |     fn default() -> System {\n   34 |         System::new()\n   35 |     }\n   36 | }\n   37 | \n   38 | impl System {\n   39 |     /// Creates a new [`System`] instance with nothing loaded.\n   40 |     ///\n   41 |     /// Use one of the refresh methods (like [`refresh_all`]) to update its internal information.\n   42 |     ///\n   43 |     /// [`System`]: crate::System\n   44 |     /// [`refresh_all`]: #method.refresh_all\n   45 |     ///\n   46 |     /// ```no_run\n   47 |     /// use sysinfo::System;\n   48 |     ///\n   49 |     /// let s = System::new();\n   50 |     /// ```\n   51 |     pub fn new() -> Self {\n   52 |         Self::new_with_specifics(RefreshKind::nothing())\n   53 |     }\n   54 | \n   55 |     /// Creates a new [`System`] instance with everything loaded.\n   56 |     ///\n   57 |     /// It is an equivalent of [`System::new_with_specifics`]`(`[`RefreshKind::everything`]`())`.\n   58 |     ///\n   59 |     /// [`System`]: crate::System\n   60 |     ///\n   61 |     /// ```no_run\n   62 |     /// use sysinfo::System;\n   63 |     ///\n   64 |     /// let s = System::new_all();\n   65 |     /// ```\n   66 |     pub fn new_all() -> Self {\n   67 |         Self::new_with_specifics(RefreshKind::everything())\n   68 |     }\n   69 | \n   70 |     /// Creates a new [`System`] instance and refresh the data corresponding to the\n   71 |     /// given [`RefreshKind`].\n   72 |     ///\n   73 |     /// [`System`]: crate::System\n   74 |     ///\n   75 |     /// ```\n   76 |     /// use sysinfo::{ProcessRefreshKind, RefreshKind, System};\n   77 |     ///\n   78 |     /// // We want to only refresh processes.\n   79 |     /// let mut system = System::new_with_specifics(\n   80 |     ///      RefreshKind::nothing().with_processes(ProcessRefreshKind::everything()),\n   81 |     /// );\n   82 |     ///\n   83 |     /// # if sysinfo::IS_SUPPORTED_SYSTEM && !cfg!(feature = \"apple-sandbox\") {\n   84 |     /// assert!(!system.processes().is_empty());\n   85 |     /// # }\n   86 |     /// ```\n   87 |     pub fn new_with_specifics(refreshes: RefreshKind) -> Self {\n   88 |         let mut s = Self {\n   89 |             inner: SystemInner::new(),\n   90 |         };\n   91 |         s.refresh_specifics(refreshes);\n   92 |         s\n   93 |     }\n   94 | \n   95 |     /// Refreshes according to the given [`RefreshKind`]. It calls the corresponding\n   96 |     /// \"refresh_\" methods.\n   97 |     ///\n   98 |     /// It will remove dead processes if [`RefreshKind::processes`] returns `Some`.\n   99 |     /// If you want to keep dead processes, use [`System::refresh_processes_specifics`]\n  100 |     /// directly.\n  101 |     ///\n  102 |     /// ```\n  103 |     /// use sysinfo::{ProcessRefreshKind, RefreshKind, System};\n  104 |     ///\n  105 |     /// let mut s = System::new_all();\n  106 |     ///\n  107 |     /// // Let's just update processes:\n  108 |     /// s.refresh_specifics(\n  109 |     ///     RefreshKind::nothing().with_processes(ProcessRefreshKind::everything()),\n  110 |     /// );\n  111 |     /// ```\n  112 |     pub fn refresh_specifics(&mut self, refreshes: RefreshKind) {\n  113 |         if let Some(kind) = refreshes.memory() {\n  114 |             self.refresh_memory_specifics(kind);\n  115 |         }\n  116 |         if let Some(kind) = refreshes.cpu() {\n  117 |             self.refresh_cpu_specifics(kind);\n  118 |         }\n  119 |         if let Some(kind) = refreshes.processes() {\n  120 |             self.refresh_processes_specifics(ProcessesToUpdate::All, true, kind);\n  121 |         }\n  122 |     }\n  123 | \n  124 |     /// Refreshes all system and processes information.\n  125 |     ///\n  126 |     /// It is the same as calling `system.refresh_specifics(RefreshKind::everything())`.\n  127 |     ///\n  128 |     /// Don't forget to take a look at [`ProcessRefreshKind::everything`] method to see what it\n  129 |     /// will update for processes more in details.\n  130 |     ///\n  131 |     /// It will remove dead processes. If you want to keep dead processes, use\n  132 |     /// [`System::refresh_processes_specifics`] directly.\n  133 |     ///\n  134 |     /// ```no_run\n  135 |     /// use sysinfo::System;\n  136 |     ///\n  137 |     /// let mut s = System::new();\n  138 |     /// s.refresh_all();\n  139 |     /// ```\n  140 |     pub fn refresh_all(&mut self) {\n  141 |         self.refresh_specifics(RefreshKind::everything());\n  142 |     }\n  143 | \n  144 |     /// Refreshes RAM and SWAP usage.\n  145 |     ///\n  146 |     /// It is the same as calling `system.refresh_memory_specifics(MemoryRefreshKind::everything())`.\n  147 |     ///\n  148 |     /// If you don't want to refresh both, take a look at [`System::refresh_memory_specifics`].\n  149 |     ///\n  150 |     /// ```no_run\n  151 |     /// use sysinfo::System;\n  152 |     ///\n  153 |     /// let mut s = System::new();\n  154 |     /// s.refresh_memory();\n  155 |     /// ```\n  156 |     pub fn refresh_memory(&mut self) {\n  157 |         self.refresh_memory_specifics(MemoryRefreshKind::everything())\n  158 |     }\n  159 | \n  160 |     /// Refreshes system memory specific information.\n  161 |     ///\n  162 |     /// ```no_run\n  163 |     /// use sysinfo::{MemoryRefreshKind, System};\n  164 |     ///\n  165 |     /// let mut s = System::new();\n  166 |     /// s.refresh_memory_specifics(MemoryRefreshKind::nothing().with_ram());\n  167 |     /// ```\n  168 |     pub fn refresh_memory_specifics(&mut self, refresh_kind: MemoryRefreshKind) {\n  169 |         self.inner.refresh_memory_specifics(refresh_kind)\n  170 |     }\n  171 | \n  172 |     /// Refreshes CPUs usage.\n  173 |     ///\n  174 |     /// ⚠️ Please note that the result will very likely be inaccurate at the first call.\n  175 |     /// You need to call this method at least twice (with a bit of time between each call, like\n  176 |     /// 200 ms, take a look at [`MINIMUM_CPU_UPDATE_INTERVAL`] for more information)\n  177 |     /// to get accurate value as it uses previous results to compute the next value.\n  178 |     ///\n  179 |     /// Calling this method is the same as calling\n  180 |     /// `system.refresh_cpu_specifics(CpuRefreshKind::nothing().with_usage())`.\n  181 |     ///\n  182 |     /// ```no_run\n  183 |     /// use sysinfo::System;\n  184 |     ///\n  185 |     /// let mut s = System::new_all();\n  186 |     /// // Wait a bit because CPU usage is based on diff.\n  187 |     /// std::thread::sleep(sysinfo::MINIMUM_CPU_UPDATE_INTERVAL);\n  188 |     /// // Refresh CPUs again.\n  189 |     /// s.refresh_cpu_usage();\n  190 |     /// ```\n  191 |     ///\n  192 |     /// [`MINIMUM_CPU_UPDATE_INTERVAL`]: crate::MINIMUM_CPU_UPDATE_INTERVAL\n  193 |     pub fn refresh_cpu_usage(&mut self) {\n  194 |         self.refresh_cpu_specifics(CpuRefreshKind::nothing().with_usage())\n  195 |     }\n  196 | \n  197 |     /// Refreshes CPUs frequency information.\n  198 |     ///\n  199 |     /// Calling this method is the same as calling\n  200 |     /// `system.refresh_cpu_specifics(CpuRefreshKind::nothing().with_frequency())`.\n  201 |     ///\n  202 |     /// ```no_run\n  203 |     /// use sysinfo::System;\n  204 |     ///\n  205 |     /// let mut s = System::new_all();\n  206 |     /// s.refresh_cpu_frequency();\n  207 |     /// ```\n  208 |     pub fn refresh_cpu_frequency(&mut self) {\n  209 |         self.refresh_cpu_specifics(CpuRefreshKind::nothing().with_frequency())\n  210 |     }\n  211 | \n  212 |     /// Refreshes the list of CPU.\n  213 |     ///\n  214 |     /// Normally, this should almost never be needed as it's pretty rare for a computer\n  215 |     /// to add a CPU while running, but it's possible on some computers which shutdown\n  216 |     /// CPU if the load is low enough.\n  217 |     ///\n  218 |     /// The `refresh_kind` argument tells what information you want to be retrieved\n  219 |     /// for each CPU.\n  220 |     ///\n  221 |     /// ```no_run\n  222 |     /// use sysinfo::{CpuRefreshKind, System};\n  223 |     ///\n  224 |     /// let mut s = System::new_all();\n  225 |     /// // We already have the list of CPU filled, but we want to recompute it\n  226 |     /// // in case new CPUs were added.\n  227 |     /// s.refresh_cpu_list(CpuRefreshKind::everything());\n  228 |     /// ```\n  229 |     pub fn refresh_cpu_list(&mut self, refresh_kind: CpuRefreshKind) {\n  230 |         self.inner.refresh_cpu_list(refresh_kind);\n  231 |     }\n  232 | \n  233 |     /// Refreshes all information related to CPUs information. It does not refresh the CPU list.\n  234 |     /// If you want to refresh the CPU list, use [`System::refresh_cpu_list`] instead.\n  235 |     ///\n  236 |     /// If you only want the CPU usage, use [`System::refresh_cpu_usage`] instead.\n  237 |     ///\n  238 |     /// ⚠️ Please note that the result will be inaccurate at the first call.\n  239 |     /// You need to call this method at least twice (with a bit of time between each call, like\n  240 |     /// 200 ms, take a look at [`MINIMUM_CPU_UPDATE_INTERVAL`] for more information)\n  241 |     /// to get accurate value as it uses previous results to compute the next value.\n  242 |     ///\n  243 |     /// Calling this method is the same as calling\n  244 |     /// `system.refresh_cpu_specifics(CpuRefreshKind::everything())`.\n  245 |     ///\n  246 |     /// ```no_run\n  247 |     /// use sysinfo::System;\n  248 |     ///\n  249 |     /// let mut s = System::new_all();\n  250 |     /// s.refresh_cpu_all();\n  251 |     /// ```\n  252 |     ///\n  253 |     /// [`MINIMUM_CPU_UPDATE_INTERVAL`]: crate::MINIMUM_CPU_UPDATE_INTERVAL\n  254 |     pub fn refresh_cpu_all(&mut self) {\n  255 |         self.refresh_cpu_specifics(CpuRefreshKind::everything())\n  256 |     }\n  257 | \n  258 |     /// Refreshes CPUs specific information. It does not refresh the CPU list.\n  259 |     /// If you want to refresh the CPU list, use [`System::refresh_cpu_list`] instead.\n  260 |     ///\n  261 |     /// ```no_run\n  262 |     /// use sysinfo::{System, CpuRefreshKind};\n  263 |     ///\n  264 |     /// let mut s = System::new_all();\n  265 |     /// s.refresh_cpu_specifics(CpuRefreshKind::everything());\n  266 |     /// ```\n  267 |     pub fn refresh_cpu_specifics(&mut self, refresh_kind: CpuRefreshKind) {\n  268 |         self.inner.refresh_cpu_specifics(refresh_kind)\n  269 |     }\n  270 | \n  271 |     /// Gets all processes and updates their information, along with all the tasks each process has.\n  272 |     ///\n  273 |     /// It does the same as:\n  274 |     ///\n  275 |     /// ```no_run\n  276 |     /// # use sysinfo::{ProcessesToUpdate, ProcessRefreshKind, System, UpdateKind};\n  277 |     /// # let mut system = System::new();\n  278 |     /// system.refresh_processes_specifics(\n  279 |     ///     ProcessesToUpdate::All,\n  280 |     ///     true,\n  281 |     ///     ProcessRefreshKind::nothing()\n  282 |     ///         .with_memory()\n  283 |     ///         .with_cpu()\n  284 |     ///         .with_disk_usage()\n  285 |     ///         .with_exe(UpdateKind::OnlyIfNotSet)\n  286 |     /// );\n  287 |     /// ```\n  288 |     ///\n  289 |     /// ⚠️ `remove_dead_processes` works as follows: if an updated process is dead, then it is\n  290 |     /// removed. So if you refresh pids 1, 2 and 3. If 2 and 7 are dead, only 2 will be removed\n  291 |     /// since 7 is not part of the update.\n  292 |     ///\n  293 |     /// ⚠️ On Linux, `sysinfo` keeps the `stat` files open by default. You can change this behaviour\n  294 |     /// by using [`set_open_files_limit`][crate::set_open_files_limit].\n  295 |     ///\n  296 |     /// ⚠️ On Linux, if you dont need the tasks of each process, you can use\n  297 |     /// `refresh_processes_specifics` with `ProcessRefreshKind::everything().without_tasks()`.\n  298 |     /// Refreshing all processes and their tasks can be quite expensive. For more information\n  299 |     /// see [`ProcessRefreshKind`].\n  300 |     ///\n  301 |     /// Example:\n  302 |     ///\n  303 |     /// ```no_run\n  304 |     /// use sysinfo::{ProcessesToUpdate, System};\n  305 |     ///\n  306 |     /// let mut s = System::new_all();\n  307 |     /// s.refresh_processes(ProcessesToUpdate::All, true);\n  308 |     /// ```\n  309 |     pub fn refresh_processes(\n  310 |         &mut self,\n  311 |         processes_to_update: ProcessesToUpdate<'_>,\n  312 |         remove_dead_processes: bool,\n  313 |     ) -> usize {\n  314 |         self.refresh_processes_specifics(\n  315 |             processes_to_update,\n  316 |             remove_dead_processes,\n  317 |             ProcessRefreshKind::nothing()\n  318 |                 .with_memory()\n  319 |                 .with_cpu()\n  320 |                 .with_disk_usage()\n  321 |                 .with_exe(UpdateKind::OnlyIfNotSet)\n  322 |                 .with_tasks(),\n  323 |         )\n  324 |     }\n  325 | \n  326 |     /// Gets all processes and updates the specified information.\n  327 |     ///\n  328 |     /// Returns the number of updated processes.\n  329 |     ///\n  330 |     /// ⚠️ `remove_dead_processes` works as follows: if an updated process is dead, then it is\n  331 |     /// removed. So if you refresh pids 1, 2 and 3. If 2 and 7 are dead, only 2 will be removed\n  332 |     /// since 7 is not part of the update.\n  333 |     ///\n  334 |     /// ⚠️ On Linux, `sysinfo` keeps the `stat` files open by default. You can change this behaviour\n  335 |     /// by using [`set_open_files_limit`][crate::set_open_files_limit].\n  336 |     ///\n  337 |     /// ```no_run\n  338 |     /// use sysinfo::{ProcessesToUpdate, ProcessRefreshKind, System};\n  339 |     ///\n  340 |     /// let mut s = System::new_all();\n  341 |     /// s.refresh_processes_specifics(\n  342 |     ///     ProcessesToUpdate::All,\n  343 |     ///     true,\n  344 |     ///     ProcessRefreshKind::everything(),\n  345 |     /// );\n  346 |     /// ```\n  347 |     pub fn refresh_processes_specifics(\n  348 |         &mut self,\n  349 |         processes_to_update: ProcessesToUpdate<'_>,\n  350 |         remove_dead_processes: bool,\n  351 |         refresh_kind: ProcessRefreshKind,\n  352 |     ) -> usize {\n  353 |         fn update_and_remove(pid: &Pid, processes: &mut HashMap<Pid, Process>) {\n  354 |             let updated = if let Some(proc) = processes.get_mut(pid) {\n  355 |                 proc.inner.switch_updated()\n  356 |             } else {\n  357 |                 return;\n  358 |             };\n  359 |             if !updated {\n  360 |                 processes.remove(pid);\n  361 |             }\n  362 |         }\n  363 |         fn update(pid: &Pid, processes: &mut HashMap<Pid, Process>) {\n  364 |             if let Some(proc) = processes.get_mut(pid)\n  365 |                 && !proc.inner.switch_updated()\n  366 |             {\n  367 |                 proc.inner.set_nonexistent();\n  368 |             }\n  369 |         }\n  370 | \n  371 |         let nb_updated = self\n  372 |             .inner\n  373 |             .refresh_processes_specifics(processes_to_update, refresh_kind);\n  374 |         let processes = self.inner.processes_mut();\n  375 |         match processes_to_update {\n  376 |             ProcessesToUpdate::All => {\n  377 |                 if remove_dead_processes {\n  378 |                     processes.retain(|_, v| v.inner.switch_updated());\n  379 |                 } else {\n  380 |                     for proc in processes.values_mut() {\n  381 |                         proc.inner.switch_updated();\n  382 |                     }\n  383 |                 }\n  384 |             }\n  385 |             ProcessesToUpdate::Some(pids) => {\n  386 |                 let call = if remove_dead_processes {\n  387 |                     update_and_remove\n  388 |                 } else {\n  389 |                     update\n  390 |                 };\n  391 |                 for pid in pids {\n  392 |                     call(pid, processes);\n  393 |                 }\n  394 |             }\n  395 |         }\n  396 |         nb_updated\n  397 |     }\n  398 | \n  399 |     /// Returns the process list.\n  400 |     ///\n  401 |     /// ```no_run\n  402 |     /// use sysinfo::System;\n  403 |     ///\n  404 |     /// let s = System::new_all();\n  405 |     /// for (pid, process) in s.processes() {\n  406 |     ///     println!(\"{} {:?}\", pid, process.name());\n  407 |     /// }\n  408 |     /// ```\n  409 |     pub fn processes(&self) -> &HashMap<Pid, Process> {\n  410 |         self.inner.processes()\n  411 |     }\n  412 | \n  413 |     /// Returns the process corresponding to the given `pid` or `None` if no such process exists.\n  414 |     ///\n  415 |     /// ```no_run\n  416 |     /// use sysinfo::{Pid, System};\n  417 |     ///\n  418 |     /// let s = System::new_all();\n  419 |     /// if let Some(process) = s.process(Pid::from(1337)) {\n  420 |     ///     println!(\"{:?}\", process.name());\n  421 |     /// }\n  422 |     /// ```\n  423 |     pub fn process(&self, pid: Pid) -> Option<&Process> {\n  424 |         self.inner.process(pid)\n  425 |     }\n  426 | \n  427 |     /// Returns an iterator of process containing the given `name`.\n  428 |     ///\n  429 |     /// If you want only the processes with exactly the given `name`, take a look at\n  430 |     /// [`System::processes_by_exact_name`].\n  431 |     ///\n  432 |     /// **⚠️ Important ⚠️**\n  433 |     ///\n  434 |     /// On **Linux**, there are two things to know about processes' name:\n  435 |     ///  1. It is limited to 15 characters.\n  436 |     ///  2. It is not always the exe name.\n  437 | n `signal` to the process.then waits for its termination.\n 1609 |     ///\n 1610 |     /// Internally, this method is calling [`Process::kill_with`] then [`Process::wait`].\n 1611 |     ///\n 1612 |     /// ⚠️ Please note that some processes might not be \"killable\", like if they run with higher\n 1613 |     /// levels than the current process for example. In this case, this method could enter an\n 1614 |     /// infinite loop.\n 1615 |     ///\n 1616 |     /// To get the list of the supported signals on this system, use\n 1617 |     /// [`SUPPORTED_SIGNALS`][crate::SUPPORTED_SIGNALS].\n 1618 |     ///\n 1619 |     /// ```no_run\n 1620 |     /// use sysinfo::{Pid, System};\n 1621 |     ///\n 1622 |     /// let s = System::new_all();\n 1623 |     /// if let Some(process) = s.process(Pid::from(1337)) {\n 1624 |     ///     if let Err(error) = process.kill_and_wait() {\n 1625 |     ///         println!(\"`kill_and_wait` failed: {error:?}\");\n 1626 |     ///     }\n 1627 |     /// }\n 1628 |     /// ```\n 1629 |     pub fn kill_with_and_wait(&self, signal: Signal) -> Result<Option<ExitStatus>, KillError> {\n 1630 |         match self.inner.kill_with(signal) {\n 1631 |             Some(sent) => {\n 1632 |                 if !sent {\n 1633 |                     return Err(KillError::FailedToSendSignal);\n 1634 |                 }\n 1635 |             }\n 1636 |             None => return Err(KillError::SignalDoesNotExist),\n 1637 |         }\n 1638 | \n 1639 |         Ok(self.inner.wait())\n 1640 |     }\n 1641 | \n 1642 |     /// Waits for process termination and returns its [`ExitStatus`] if it could be retrieved,\n 1643 |     /// returns `None` otherwise. It means that as long as the process is alive, this method will\n 1644 |     /// not return.\n 1645 |     ///\n 1646 |     /// ⚠️ On **macOS** and **FreeBSD**, if the process died and a new one took its PID, unless\n 1647 |     /// you refreshed, it will wait for the new process to end.\n 1648 |     ///\n 1649 | e of virtual memory], that is, the amount of memory that the\n 1844 |     /// process can access, whether it is currently mapped in physical RAM or not. It includes\n 1845 |     /// physical RAM, allocated but not used regions, swapped-out regions, and even memory\n 1846 |     /// associated with [memory-mapped files](https://en.wikipedia.org/wiki/Memory-mapped_file).\n 1847 |     ///\n 1848 |     /// This value has limitations though. Depending on the operating system and type of process,\n 1849 |     /// this value might be a good indicator of the total memory that the process will be using over\n 1850 |     /// its lifetime. However, for example, in the version 14 of macOS this value is in the order of\n 1851 |     /// the hundreds of gigabytes for every process, and thus not very informative. Moreover, if a\n 1852 |     /// process maps into memory a very large file, this value will increase accordingly, even if\n 1853 |     /// the process is not actively using the memory.\n 1854 |     ///\n 1855 |     /// ```no_run\n 1856 |     /// use sysinfo::{Pid, System};\n 1857 |     ///\n 1858 |     /// let s = System::new_all();\n 1859 |     /// if let Some(process) = s.process(Pid::from(1337)) {\n 1860 |     ///     println!(\"{} bytes\", process.virtual_memory());\n 1861 |     /// }\n 1862 |     /// ```\n 1863 |     ///\n 1864 |     /// [size of virtual memory]: https://en.wikipedia.org/wiki/Virtual_memory\n 1865 |     pub fn virtual_memory(&self) -> u64 {\n 1866 |         self.inner.virtual_memory()\n 1867 |     }\n 1868 | \n 1869 |     /// Returns the parent PID.\n 1870 |     ///\n 1871 |     /// ```no_run\n 1872 |     /// use sysinfo::{Pid, System};\n 1873 |     ///\n 1874 |     /// let s = System::new_all();\n 1875 |     /// if let Some(process) = s.process(Pid::from(1337)) {\n 1876 |     ///     println!(\"{:?}\", process.parent());\n 1877 |     /// }\n 1878 |     /// ```\n 1879 |     pub fn parent(&self) -> Option<Pid> {\n 1880 |         self.inner.parent()\n 18 // Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
