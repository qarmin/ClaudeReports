<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`slice_to_nb` computes `nb = nb * 10 + (c - b'0')` over raw bytes with no digit validation. If the\n`/proc/<pid>/statm` content contains any non-digit byte (e.g. a leading `-`, a space embedded\nunexpectedly, or corrupted/non-standard data), `c - b'0'` underflows and panics in debug builds\n(wraps to a huge value in release). The multiply can also overflow (panic in debug, wrap in\nrelease). The bytes come straight from a `' '`-split of the file with no filtering, so the first\ntwo fields are passed in verbatim.","fix":"Validate each byte is `b'0'..=b'9'` and use checked/saturating arithmetic (or simply parse the\nfield with `u64::from_str` after `str::from_utf8`, mirroring `old_get_memory`). Return 0 / fall back\non any non-digit instead of subtracting unconditionally.","locations":[{"ref":"src/unix/linux/process.rs:740-747","code":"  740 | fn slice_to_nb(s: &[u8]) -> u64 {\n  741 |     let mut nb: u64 = 0;\n  742 | \n  743 |     for c in s {\n  744 |         nb = nb * 10 + (c - b'0') as u64;\n  745 |     }\n  746 |     nb\n  747 | }","lines":8,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/process.rs#L740-L747"},{"ref":"src/unix/linux/process.rs:768-778","code":"  768 |     let mut parts = buf.split(|c| *c == b' ');\n  769 |     entry.virtual_memory = parts\n  770 |         .next()\n  771 |         .map(slice_to_nb)\n  772 |         .unwrap_or(0)\n  773 |         .saturating_mul(info.page_size_b);\n  774 |     entry.memory = parts\n  775 |         .next()\n  776 |         .map(slice_to_nb)\n  777 |         .unwrap_or(0)\n  778 |         .saturating_mul(info.page_size_b);","lines":11,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/process.rs#L768-L778"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`to_u64` has the same unguarded `c - b'0'` pattern with no digit check and `x *= 10` overflow. It is\nused to parse fields from `/proc/stat` (CPU times, `btime`). A malformed or unexpected `/proc/stat`\nline (non-digit byte in a field) underflow-panics in debug builds; very large accumulated values can\noverflow `*= 10` (panic in debug, silent wrap in release).","fix":"Guard with `if !c.is_ascii_digit() { break; }` and use `x = x.wrapping_mul(10).wrapping_add(...)` or\nsaturating arithmetic, matching the safer digit-bounded loop already used in `network.rs::read`.","locations":[{"ref":"src/unix/linux/utils.rs:75-83","code":"   75 | pub(crate) fn to_u64(v: &[u8]) -> u64 {\n   76 |     let mut x = 0;\n   77 | \n   78 |     for c in v {\n   79 |         x *= 10;\n   80 |         x += u64::from(c - b'0');\n   81 |     }\n   82 |     x\n   83 | }","lines":9,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/utils.rs#L75-L83"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `parse_smbios`, the inner string-skipping loop is guarded by `while i < table.len()` but\naccesses `table[i + 1]`. When `i == table.len() - 1`, `table[i + 1]` indexes one past the end\nand panics. SMBIOS data comes from firmware (`GetSystemFirmwareTable`) and can be malformed or\ntruncated, especially in virtual machines, so this is reachable.","fix":"Change the inner condition to `while i + 1 < table.len()` (and handle the trailing-byte case), or check `i + 1 < table.len()` before reading `table[i + 1]`.","locations":[{"ref":"src/windows/utils.rs:130-136","code":"  130 |                 while i < table.len() {\n  131 |                     if table[i] == 0 && table[i + 1] == 0 {\n  132 |                         i += 2;\n  133 |                         break;\n  134 |                     }\n  135 |                     i += 1;\n  136 |                 }","lines":7,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/utils.rs#L130-L136"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"low","easy":false,"description":"`CustomBufReader::next` returns `Some(unsafe transmute::<&str, &'a str>(self.buffer.as_str()))`,\nlaundering the borrow of `self.buffer` to lifetime `'a` even though the very next call to `next`\ndoes `self.buffer.clear()` and overwrites the buffer. Any consumer that retains a returned `&str`\nacross a subsequent `next` call would read freed/overwritten data (UB). The current callers\n(`find_first_vendor`, `fill_device_map`) only use one line at a time so it is not triggered today,\nbut the API is unsound and a latent footgun.","fix":"Don't expose a lifetime-laundering `Iterator`; instead return owned `String`s, or restructure to a\n`while let Some(line) = reader.read_next()` method that borrows `&mut self` for each line (a lending\niterator), so the borrow checker forbids holding a line across the next read.","locations":[{"ref":"src/unix/linux/gpu.rs:220-240","code":"  220 | impl<'a> Iterator for CustomBufReader<'a> {\n  221 |     type Item = &'a str;\n  222 | \n  223 |     fn next(&mut self) -> Option<Self::Item> {\n  224 |         loop {\n  225 |             self.buffer.clear();\n  226 |             if self.reader.read_line(self.buffer).ok()? == 0 {\n  227 |                 return None;\n  228 |             } else if self.buffer.starts_with(\"C \") {\n  229 |                 // We reached the end of the device list.\n  230 |                 return None;\n  231 |             } else if !self.buffer.starts_with('#') {\n  232 |                 // SAFETY: This is because of `Iterator` trait limitations: we cannot return a\n  233 |                 // reference to the type's fields because that would require changing `next` to\n  234 |                 // `fn next(&'a mut self) -> ...`, which isn't allowed by the compiler. So instead,\n  235 |                 // we `transmute`...\n  236 |                 return Some(unsafe { std::mem::transmute::<&str, &'a str>(self.buffer.as_str()) });\n  237 |             }\n  238 |         }\n  239 |     }\n  240 | }","lines":21,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/gpu.rs#L220-L240"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"In sysinfo_cpus_usage the reported length is computed as `cpus.len() as c_uint - 1`. If `System::cpus()` returns an empty slice (no CPU detected, or before any refresh on some platforms), `0u32 - 1` underflows: it panics in debug builds (a panic unwinding across the `extern \"C\"` boundary is undefined behavior / aborts) and wraps to `u32::MAX` in release builds, causing the C caller to read a huge bogus length and walk off the (zero-sized) allocation.","fix":"Guard for the empty case: `*length = cpus.len().saturating_sub(1) as c_uint;` and skip the malloc/loop when `cpus.len() <= 1`.","locations":[{"ref":"src/c_interface.rs:339-342","code":"  339 |             for (pos, cpu) in cpus.iter().skip(1).enumerate() {\n  340 |                 (*(*procs).offset(pos as isize)) = cpu.usage();\n  341 |             }\n  342 |             *length = cpus.len() as c_uint - 1;","lines":4,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/c_interface.rs#L339-L342"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`free_swap()` computes `self.swap_total - self.swap_used` with a plain subtraction. The two values come from independent sysctl/kvm reads (and on NetBSD from independent `swpages`/`swpginuse` fields), so `swap_used` can transiently exceed `swap_total`, causing a debug-build panic on subtraction overflow (and a huge wrapped value in release). Every other accumulator in this crate uses `saturating_sub`.","fix":"Use `self.swap_total.saturating_sub(self.swap_used)`.","locations":[{"ref":"src/unix/bsd/freebsd/system.rs:132-134","code":"  132 |     pub(crate) fn free_swap(&self) -> u64 {\n  133 |         self.swap_total - self.swap_used\n  134 |     }","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/freebsd/system.rs#L132-L134"},{"ref":"src/unix/bsd/netbsd/system.rs:145-147","code":"  145 |     pub(crate) fn free_swap(&self) -> u64 {\n  146 |         self.swap_total - self.swap_used\n  147 |     }","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/system.rs#L145-L147"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`used_memory()` returns `mem_total - mem_available` and `used_swap()` returns\n`swap_total - swap_free` with plain subtraction. These values are read independently from\n`/proc/meminfo` at (potentially) different refresh times, and `MemAvailable` is an estimate that the\nkernel does not guarantee to be <= `MemTotal`; under some conditions (or when the fields were never\nrefreshed together) `mem_available > mem_total` is possible, causing an underflow panic in debug\nbuilds and a near-`u64::MAX` result in release. Every other arithmetic path in this module already\nuses `saturating_*`.","fix":"Use `self.mem_total.saturating_sub(self.mem_available)` and `self.swap_total.saturating_sub(self.swap_free)`.","locations":[{"ref":"src/unix/linux/system.rs:334-336","code":"  334 |     pub(crate) fn used_memory(&self) -> u64 {\n  335 |         self.mem_total - self.mem_available\n  336 |     }","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/system.rs#L334-L336"},{"ref":"src/unix/linux/system.rs:347-349","code":"  347 |     pub(crate) fn used_swap(&self) -> u64 {\n  348 |         self.swap_total - self.swap_free\n  349 |     }","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/system.rs#L347-L349"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`compute_start` computes `process_times / 10_000_000 - 11_644_473_600` with no underflow\nguard. `get_process_times` returns 0 when `GetProcessTimes` fails (e.g. on a restricted handle),\nand `get_start_time`/`get_start_and_run_time` feed that 0 straight into `compute_start`. For\nany value below 11_644_473_600 (in particular 0), the subtraction underflows: a panic in debug\nbuilds and a wildly wrong wrapped start time in release builds.","fix":"Guard the subtraction, e.g. `(process_times / 10_000_000).saturating_sub(11_644_473_600)`, and/or have `get_process_times` signal failure instead of returning 0.","locations":[{"ref":"src/windows/process.rs:574-596","code":"  574 | #[inline]\n  575 | fn compute_start(process_times: u64) -> u64 {\n  576 |     // 11_644_473_600 is the number of seconds between the Windows epoch (1601-01-01) and\n  577 |     // the Linux epoch (1970-01-01).\n  578 |     process_times / 10_000_000 - 11_644_473_600\n  579 | }\n  580 | \n  581 | fn get_start_and_run_time(handle: HANDLE, now: u64) -> (u64, u64) {\n  582 |     unsafe {\n  583 |         let process_times = get_process_times(handle);\n  584 |         let start = compute_start(process_times);\n  585 |         let run_time = check_sub(now, start);\n  586 |         (start, run_time)\n  587 |     }\n  588 | }\n  589 | \n  590 | #[inline]\n  591 | pub(crate) fn get_start_time(handle: HANDLE) -> u64 {\n  592 |     unsafe {\n  593 |         let process_times = get_process_times(handle);\n  594 |         compute_start(process_times)\n  595 |     }\n  596 | }","lines":23,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/process.rs#L574-L596"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`CpuData::drop` computes `prev_cpu_info_size = size_of::<i32>() as u32 * self.num_cpu_info`. With a\nvery large `num_cpu_info` (returned by `host_processor_info`) this `u32` multiplication can overflow\nand pass a too-small length to `vm_deallocate`, leaking the rest of the mapping. In practice\n`num_cpu_info` is small, but the unchecked `u32` arithmetic is fragile.","fix":"Compute the size in `usize` (or use `checked_mul`) before passing to `vm_deallocate`.","locations":[{"ref":"src/unix/apple/cpu.rs:96-110","code":"   96 | impl Drop for CpuData {\n   97 |     fn drop(&mut self) {\n   98 |         if !self.cpu_info.0.is_null() {\n   99 |             let prev_cpu_info_size = std::mem::size_of::<i32>() as u32 * self.num_cpu_info;\n  100 |             unsafe {\n  101 |                 libc::vm_deallocate(\n  102 |                     #[allow(deprecated)]\n  103 |                     mach_task_self(),\n  104 |                     self.cpu_info.0 as _,\n  105 |                     prev_cpu_info_size as _,\n  106 |                 );\n  107 |             }\n  108 |             self.cpu_info.0 = std::ptr::null_mut();\n  109 |         }\n  110 |     }","lines":15,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/cpu.rs#L96-L110"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"The x86 `ultostr` helper masks each byte with `% 128` instead of `& 0xFF` (or `& 0x7F` if 7-bit was\nintended). For any byte >= 128 this corrupts the reconstructed `data_type` string. It currently works\nonly because the compared type strings (e.g. \"sp78\") are pure ASCII < 128, but the masking is wrong\nfor general 4CC values and is a latent bug.","fix":"Mask with `& 0xFF` (cast `u8`) so the full byte is preserved when reconstructing the type code.","locations":[{"ref":"src/unix/apple/macos/component/x86.rs:220-229","code":"  220 | #[inline]\n  221 | unsafe fn ultostr(s: *mut c_char, val: u32) {\n  222 |     unsafe {\n  223 |         *s.offset(0) = ((val >> 24) % 128) as i8;\n  224 |         *s.offset(1) = ((val >> 16) % 128) as i8;\n  225 |         *s.offset(2) = ((val >> 8) % 128) as i8;\n  226 |         *s.offset(3) = (val % 128) as i8;\n  227 |         *s.offset(4) = 0;\n  228 |     }\n  229 | }","lines":10,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/component/x86.rs#L220-L229"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`get_proc_list` computes `count * mem::size_of::<Pid>() as i32` as an `i32`. On a system with an\nextreme number of pids this `i32` byte count can overflow to a negative/small value, which would\ncause `proc_listallpids` to be told the buffer is far smaller than it is. `count` came from the same\nsyscall so this is unlikely in practice, but the arithmetic is unchecked `i32`.","fix":"Compute the byte size in `usize`/`isize` and pass it without truncating through `i32`.","locations":[{"ref":"src/unix/apple/macos/process.rs:832-849","code":"  832 | pub(crate) fn get_proc_list() -> Option<Vec<Pid>> {\n  833 |     unsafe {\n  834 |         let count = libc::proc_listallpids(::std::ptr::null_mut(), 0);\n  835 |         if count < 1 {\n  836 |             return None;\n  837 |         }\n  838 |         let mut pids: Vec<Pid> = Vec::with_capacity(count as usize);\n  839 |         pids.set_len(count as usize);\n  840 |         let count = count * mem::size_of::<Pid>() as i32;\n  841 |         let x = libc::proc_listallpids(pids.as_mut_ptr() as *mut c_void, count);\n  842 | \n  843 |         if x < 1 || x as usize >= pids.len() {\n  844 |             None\n  845 |         } else {\n  846 |             pids.set_len(x as usize);\n  847 |             Some(pids)\n  848 |         }\n  849 |     }","lines":18,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/process.rs#L832-L849"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`used_swap()` computes `self.swap_total - self.swap_free` with an unchecked subtraction.\nIf `swap_free` is ever greater than `swap_total` (the two values are sampled from `xsw_usage`\nfields that are not guaranteed to be mutually consistent at the instant they are read), this\npanics in debug builds and wraps to a huge value in release builds. Every other delta in this\nfile uses `saturating_sub`; this one was missed (note the `// TODO: need to be checked` comment\nright above it).","fix":"Use `self.swap_total.saturating_sub(self.swap_free)`.","locations":[{"ref":"src/unix/apple/system.rs:366-369","code":"  366 |     // TODO: need to be checked\n  367 |     pub(crate) fn used_swap(&self) -> u64 {\n  368 |         self.swap_total - self.swap_free\n  369 |     }","lines":4,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/system.rs#L366-L369"}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"NetBSD memory/swap computation multiplies kernel-reported i64 page counts by `page_size` and adds them with plain `*`/`+` operators (no saturating arithmetic). `info.active + info.wired`, `(info.filepages + info.execpages)`, `info.npages * page_size`, `info.swpages * page_size`, and `self.mem_used + cached_memory` can overflow/panic in debug builds on machines with very large memory or if the kernel returns an unexpected value. The FreeBSD backend consistently uses `saturating_mul`/`saturating_add` for the same kind of computation.","fix":"Use `saturating_mul`/`saturating_add` (or checked arithmetic) as the FreeBSD backend does in `SystemInfo::get_*_memory`.","locations":[{"ref":"src/unix/bsd/netbsd/system.rs:68-76","code":"   68 |             self.mem_total = info.npages as u64 * self.system_info.page_size;\n   69 |             self.mem_used = (info.active as u64 + info.wired as u64) * self.system_info.page_size;\n   70 |             let cached_memory =\n   71 |                 (info.filepages + info.execpages) as u64 * self.system_info.page_size;\n   72 |             self.mem_free = self.mem_total.saturating_sub(self.mem_used + cached_memory);\n   73 |         }\n   74 |         if refresh_kind.swap() {\n   75 |             self.swap_total = info.swpages as u64 * self.system_info.page_size;\n   76 |             self.swap_used = info.swpginuse as u64 * self.system_info.page_size;","lines":9,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/system.rs#L68-L76"}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `CpuValues`/`CpuUsage::set`, the `min!` macro and the `irq` term use non-saturating arithmetic\nwhile the rest of the file is careful to use `saturating_*`. Specifically `(steal_period +\nguest_period)` (line 352) is a plain `+` on two `u64` periods, and `min!($a, $b, $def)` does `$a -\n$b` after only checking `$a > $b`. While periods are normally small deltas, `/proc/stat` counters\ncan reset (e.g. CPU hotplug, counter wrap) producing inconsistent old/new snapshots; the plain `+`\ncan then overflow (debug panic) and the macro logic is fragile. `steal_period` itself is already\ncomputed with `saturating_sub`, so the inconsistency is purely the final `+`.","fix":"Use `steal_period.saturating_add(guest_period)` for the `irq` numerator to stay consistent with the surrounding saturating math.","locations":[{"ref":"src/unix/linux/cpu.rs:322-352","code":"  322 |         macro_rules! min {\n  323 |             ($a:expr, $b:expr, $def:expr) => {\n  324 |                 if $a > $b { ($a - $b) as f32 } else { $def }\n  325 |             };\n  326 |         }\n  327 | \n  328 |         self.old_values = self.new_values;\n  329 |         self.new_values.set(\n  330 |             user, nice, system, idle, iowait, irq, softirq, steal, guest, guest_nice,\n  331 |         );\n  332 | \n  333 |         self.total_time = self.new_values.total_time();\n  334 |         self.old_total_time = self.old_values.total_time();\n  335 | \n  336 |         let nice_period = self.new_values.nice.saturating_sub(self.old_values.nice);\n  337 |         let user_period = self.new_values.user.saturating_sub(self.old_values.user);\n  338 |         let steal_period = self.new_values.steal.saturating_sub(self.old_values.steal);\n  339 |         let guest_period = self\n  340 |             .new_values\n  341 |             .virtual_time()\n  342 |             .saturating_sub(self.old_values.virtual_time());\n  343 |         let system_period = self\n  344 |             .new_values\n  345 |             .system_time()\n  346 |             .saturating_sub(self.old_values.system_time());\n  347 | \n  348 |         let total = min!(self.total_time, self.old_total_time, 1.);\n  349 |         let nice = nice_period as f32 / total;\n  350 |         let user = user_period as f32 / total;\n  351 |         let system = system_period as f32 / total;\n  352 |         let irq = (steal_period + guest_period) as f32 / total;","lines":31,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/cpu.rs#L322-L352"}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`disk.rs` computes byte counters as `stat.sectors_read * SECTOR_SIZE` and\n`stat.sectors_written * SECTOR_SIZE` with plain `*`. `sectors_read`/`sectors_written` are parsed as\n`u64` directly from `/proc/diskstats` with no clamping, so a very large (or maliciously crafted in a\ncontainer) value multiplied by 512 can overflow `u64` (debug panic, silent wrap in release).","fix":"Use `stat.sectors_read.saturating_mul(SECTOR_SIZE)` and likewise for written.","locations":[{"ref":"src/unix/linux/disk.rs:130-131","code":"  130 |                 self.read_bytes = stat.sectors_read * SECTOR_SIZE;\n  131 |                 self.written_bytes = stat.sectors_written * SECTOR_SIZE;","lines":2,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/disk.rs#L130-L131"}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`used_memory()` returns `self.mem_total - self.mem_available` and `free_swap()` returns\n`self.swap_total - self.swap_used` with plain subtraction. `mem_available`/`swap_used` are read\nfrom independent Win32 calls (`GlobalMemoryStatusEx`, `K32GetPerformanceInfo`) and are not\nguaranteed to be <= the corresponding total, so the subtraction can underflow (debug panic /\nrelease wrap to a huge value). Other counters in this file already use `saturating_sub`.","fix":"Use `self.mem_total.saturating_sub(self.mem_available)` and `self.swap_total.saturating_sub(self.swap_used)`.","locations":[{"ref":"src/windows/system.rs:338-340","code":"  338 |     pub(crate) fn used_memory(&self) -> u64 {\n  339 |         self.mem_total - self.mem_available\n  340 |     }","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/system.rs#L338-L340"},{"ref":"src/windows/system.rs:346-348","code":"  346 |     pub(crate) fn free_swap(&self) -> u64 {\n  347 |         self.swap_total - self.swap_used\n  348 |     }","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/system.rs#L346-L348"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`PCI`'s `Display` impl formats `domain`, `bus` and `device` as hexadecimal\n(`\"{domain:04x}:{bus:02x}:{device:02x}.{function}\"`), but its `FromStr` impl\nparses every field with `value.parse::<u32>()` which is base-10. As a result\n`PCI::from_str(&pci.to_string())` does not round-trip: any hex digit a-f makes\nthe parse fail (\"invalid domain\"/\"invalid bus\"/...) and a value like `0x10`\nparses as decimal 16 rather than 16-hex. The two impls are inconsistent.","fix":"Parse with `u32::from_str_radix(value, 16)` for domain/bus/device (and decide whether `function` is hex or decimal to match `Display`, which prints it without `{:x}`), so that `Display`/`FromStr` round-trip.","locations":[{"ref":"src/common/gpu.rs:145-195","code":"  145 | impl fmt::Display for PCI {\n  146 |     fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n  147 |         let Self {\n  148 |             domain,\n  149 |             bus,\n  150 |             device,\n  151 |             function,\n  152 |         } = self;\n  153 |         write!(f, \"{domain:04x}:{bus:02x}:{device:02x}.{function}\")\n  154 |     }\n  155 | }\n  156 | \n  157 | impl core::str::FromStr for PCI {\n  158 |     type Err = &'static str;\n  159 | \n  160 |     fn from_str(s: &str) -> Result<Self, Self::Err> {\n  161 |         fn get_next_u32<'a>(\n  162 |             iter: &mut impl Iterator<Item = &'a str>,\n  163 |             missing_msg: &'static str,\n  164 |             invalid_msg: &'static str,\n  165 |         ) -> Result<u32, &'static str> {\n  166 |             let Some(value) = iter.next() else {\n  167 |                 return Err(missing_msg);\n  168 |             };\n  169 |             value.parse::<u32>().map_err(|_| invalid_msg)\n  170 |         }\n  171 | \n  172 |         let mut iter = s.split(':');\n  173 |         let domain = get_next_u32(&mut iter, \"missing domain\", \"invalid domain\")?;\n  174 |         let bus = get_next_u32(&mut iter, \"missing bus\", \"invalid bus\")?;\n  175 |         let Some(last) = iter.next() else {\n  176 |             return Err(\"missing device\");\n  177 |         };\n  178 |         if iter.next().is_some() {\n  179 |             return Err(\"unexpected `:` after bus\");\n  180 |         };\n  181 |         let mut iter = last.split('.');\n  182 |         let device = get_next_u32(&mut iter, \"missing device\", \"invalid device\")?;\n  183 |         let function = get_next_u32(&mut iter, \"missing function\", \"invalid function\")?;\n  184 |         if iter.next().is_some() {\n  185 |             return Err(\"unexpected `:` after function\");\n  186 |         };\n  187 | \n  188 |         Ok(Self {\n  189 |             domain,\n  190 |             bus,\n  191 |             device,\n  192 |             function,\n  193 |         })\n  194 |     }\n  195 | }","lines":51,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/common/gpu.rs#L145-L195"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In `update_process` (backup CPU computation branch), `p.old_stime` is overloaded to store\n`mach_absolute_time()` while `p.old_utime` stores cumulative task time. The deltas are then computed\nas `task_time - p.old_utime` and `time - p.old_stime`. But in the *other* branch (`time_interval`\npresent) and in `create_new_process`, `old_stime`/`old_utime` are set to\n`pti_total_system`/`pti_total_user`. So if `time_interval` toggles between `Some` and `None` across\nrefreshes (it is `None` whenever `clock_info` is absent), the backup branch reads an `old_stime` that\nholds a *task-time* value as if it were a *mach timestamp*, producing wildly wrong CPU usage. The two\ncode paths reuse the same fields with incompatible meanings.","fix":"Use separate fields for the backup-path timestamp baseline (e.g. `old_mach_time`) rather than overloading `old_stime`/`old_utime`, so switching between the two CPU-usage strategies cannot mix value domains.","locations":[{"ref":"src/unix/apple/macos/process.rs:284-334","code":"  284 | #[allow(deprecated)] // Because of libc::mach_absolute_time.\n  285 | pub(crate) fn compute_cpu_usage(\n  286 |     p: &mut ProcessInner,\n  287 |     task_info: libc::proc_taskinfo,\n  288 |     system_time: u64,\n  289 |     user_time: u64,\n  290 |     time_interval: Option<f64>,\n  291 | ) {\n  292 |     if let Some(time_interval) = time_interval {\n  293 |         let total_existing_time = p.old_stime.saturating_add(p.old_utime);\n  294 |         if time_interval > 0.000001 && total_existing_time > 0 {\n  295 |             let total_current_time = task_info\n  296 |                 .pti_total_system\n  297 |                 .saturating_add(task_info.pti_total_user);\n  298 | \n  299 |             let total_time_diff = total_current_time.saturating_sub(total_existing_time);\n  300 |             if total_time_diff > 0 {\n  301 |                 p.cpu_usage = (total_time_diff as f64 / time_interval * 100.) as f32;\n  302 |             }\n  303 |         }\n  304 |         p.old_stime = task_info.pti_total_system;\n  305 |         p.old_utime = task_info.pti_total_user;\n  306 |     } else {\n  307 |         unsafe {\n  308 |             // This is the \"backup way\" of CPU computation.\n  309 |             let time = libc::mach_absolute_time();\n  310 |             let task_time = user_time\n  311 |                 .saturating_add(system_time)\n  312 |                 .saturating_add(task_info.pti_total_user)\n  313 |                 .saturating_add(task_info.pti_total_system);\n  314 | \n  315 |             let system_time_delta = if task_time < p.old_utime {\n  316 |                 task_time\n  317 |             } else {\n  318 |                 task_time.saturating_sub(p.old_utime)\n  319 |             };\n  320 |             let time_delta = if time < p.old_stime {\n  321 |                 time\n  322 |             } else {\n  323 |                 time.saturating_sub(p.old_stime)\n  324 |             };\n  325 |             p.old_utime = task_time;\n  326 |             p.old_stime = time;\n  327 |             p.cpu_usage = if time_delta == 0 {\n  328 |                 0f32\n  329 |             } else {\n  330 |                 (system_time_delta as f64 * 100f64 / time_delta as f64) as f32\n  331 |             };\n  332 |         }\n  333 |     }\n  334 | }","lines":51,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/process.rs#L284-L334"},{"ref":"src/unix/apple/macos/process.rs:436-438","code":"  436 | \n  437 |             p.old_stime = task_info.pti_total_system;\n  438 |             p.old_utime = task_info.pti_total_user;","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/process.rs#L436-L438"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"NetBSD global CPU usage accumulates into a buffer that is never zeroed. `global_cp_times = self.global_cp_times.get_mut()` returns the VecSwitcher's 'new' buffer, which still holds the per-state sums computed two refreshes ago (VecSwitcher just flips between v1/v2, it does not clear). The loop then does `global_cp_times[CP_*] += new_cp_times[CP_*]` on top of those stale values, so the global CPU usage is computed from corrupted accumulated totals after the first two refreshes.","fix":"Zero `global_cp_times` (e.g. `global_cp_times.fill(0)`) before summing the per-CPU `new_cp_times` into it.","locations":[{"ref":"src/unix/bsd/netbsd/cpu.rs:72-104","code":"   72 |     fn get_cpu_usage(&mut self) {\n   73 |         let global_cp_times = self.global_cp_times.get_mut();\n   74 |         for (pos, (cpu, cp_times)) in self\n   75 |             .cpus\n   76 |             .iter_mut()\n   77 |             .zip(self.cp_times.iter_mut())\n   78 |             .enumerate()\n   79 |         {\n   80 |             unsafe {\n   81 |                 if !get_sys_value_array(\n   82 |                     &[ffi::CTL_KERN, libc::KERN_CP_TIME, pos as _],\n   83 |                     cp_times.get_mut(),\n   84 |                 ) {\n   85 |                     sysinfo_debug!(\n   86 |                         \"wrong CPU time computation, skipping it. Likely invalid CPU usage result\"\n   87 |                     );\n   88 |                     continue;\n   89 |                 }\n   90 |             }\n   91 | \n   92 |             cpu.inner.cpu_usage = cp_times.compute_cpu_usage();\n   93 | \n   94 |             let new_cp_times = cp_times.get_new();\n   95 |             global_cp_times[ffi::CP_USER] += new_cp_times[ffi::CP_USER];\n   96 |             global_cp_times[ffi::CP_NICE] += new_cp_times[ffi::CP_NICE];\n   97 |             global_cp_times[ffi::CP_SYS] += new_cp_times[ffi::CP_SYS];\n   98 |             global_cp_times[ffi::CP_INTR] += new_cp_times[ffi::CP_INTR];\n   99 |             global_cp_times[ffi::CP_IDLE] += new_cp_times[ffi::CP_IDLE];\n  100 |         }\n  101 |         for global_cp_time in global_cp_times {\n  102 |             *global_cp_time /= self.cpus.len() as u64;\n  103 |         }\n  104 |         self.global_cpu_usage = self.global_cp_times.compute_cpu_usage();","lines":33,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/cpu.rs#L72-L104"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"sysinfo_cpus_usage allocates `size_of::<c_float>() * cpus.len()` bytes but only writes `cpus.len() - 1` floats (the loop does `.skip(1)`), and reports `cpus.len() - 1` as the length. The allocation is one element larger than needed, and more importantly the skip-first-CPU behavior is undocumented: the doc comment claims it returns `System::cpus_usage()` for all CPUs, but it silently drops the first CPU (historically the global CPU). A caller allocating their own buffer of `length` floats and passing it would be fine, but the semantics are surprising and inconsistent with the documented equivalence.","fix":"Allocate `cpus.len() - 1` elements (matching what is written) and document that the first CPU entry is intentionally skipped, or stop skipping it so the function matches its documented `cpus_usage()` equivalence.","locations":[{"ref":"src/c_interface.rs:331-343","code":"  331 |     unsafe {\n  332 |         let system: Box<System> = Box::from_raw(system as *mut System);\n  333 |         {\n  334 |             let cpus = system.cpus();\n  335 |             if (*procs).is_null() {\n  336 |                 (*procs) =\n  337 |                     libc::malloc(::std::mem::size_of::<c_float>() * cpus.len()) as *mut c_float;\n  338 |             }\n  339 |             for (pos, cpu) in cpus.iter().skip(1).enumerate() {\n  340 |                 (*(*procs).offset(pos as isize)) = cpu.usage();\n  341 |             }\n  342 |             *length = cpus.len() as c_uint - 1;\n  343 |         }","lines":13,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/c_interface.rs#L331-L343"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Components::refresh` only clears the per-component `updated` flag inside the\n`remove_not_listed_components == true` branch; when called with `false` there is\nno `else` branch that resets the flags. The analogous `Gpus::refresh`\n(gpu.rs:90-105) resets `updated = false` in both branches. Because of this, after\na `refresh(false)` the `updated` flags stay `true`, so a later `refresh(true)`\ncan retain components that were not actually re-detected (they look \"updated\"\nfrom the previous cycle). `new_with_refreshed_list` happens to call\n`refresh(true)`, which masks the issue, but mixed `refresh(false)`/`refresh(true)`\nsequences are buggy.","fix":"Mirror the `Gpus::refresh` logic: add an `else` branch that iterates the components and sets `updated = false`, so the flag is reset every refresh regardless of `remove_not_listed_components`.","locations":[{"ref":"src/common/component.rs:149-162","code":"  149 |     pub fn refresh(&mut self, remove_not_listed_components: bool) {\n  150 |         self.inner.refresh();\n  151 |         if remove_not_listed_components {\n  152 |             // Remove interfaces which are gone.\n  153 |             self.inner.components.retain_mut(|c| {\n  154 |                 if !c.inner.updated {\n  155 |                     return false;\n  156 |                 }\n  157 |                 c.inner.updated = false;\n  158 |                 true\n  159 |             });\n  160 |         }\n  161 |     }\n  162 | }","lines":14,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/common/component.rs#L149-L162"},{"ref":"src/common/gpu.rs:90-105","code":"   90 |     pub fn refresh(&mut self, remove_not_listed_gpus: bool) {\n   91 |         self.inner.refresh();\n   92 |         if remove_not_listed_gpus {\n   93 |             self.inner.gpus.retain_mut(|c| {\n   94 |                 if !c.inner.updated {\n   95 |                     return false;\n   96 |                 }\n   97 |                 c.inner.updated = false;\n   98 |                 true\n   99 |             });\n  100 |         } else {\n  101 |             for gpu in &mut self.inner.gpus {\n  102 |                 gpu.inner.updated = false;\n  103 |             }\n  104 |         }\n  105 |     }","lines":16,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/common/gpu.rs#L90-L105"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`get_cpu_frequency` (arm) only special-cases brands containing \"M1\"/\"M2\"/\"M3\". Newer Apple Silicon\n(M4 and later) falls into the `else` branch dividing by 1_000 instead of 1_000_000, producing a\nfrequency value 1000x too large. The heuristic is not future-proof and silently mis-scales on every\nchip past M3.","fix":"Match on the `M<digit>` family generically (e.g. regex/prefix check for `M` followed by a digit) rather than enumerating M1/M2/M3, or detect the scale from the value magnitude.","locations":[{"ref":"src/unix/apple/macos/cpu.rs:93-99","code":"   93 |         // Check taken from https://github.com/vladkens/macmon/commit/9e05a6f6e9aee01c4cd6e01e0639ac23f5820f18.\n   94 |         // Not sure if there is a better way to differentiate this.\n   95 |         if brand.contains(\"M1\") || brand.contains(\"M2\") | brand.contains(\"M3\") {\n   96 |             max / 1_000_000\n   97 |         } else {\n   98 |             max / 1_000\n   99 |         }","lines":7,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/cpu.rs#L93-L99"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`open_files` calls `proc_pidinfo(PROC_PIDLISTFDS, 0, NULL, 0)` to get a size, allocates that many\nbytes, then calls again. There is a TOCTOU window: between the two calls the process can open more\nfds, so the second call can return *more* bytes than the buffer holds. `proc_pidinfo` clamps to the\nprovided buffer size so it will not overflow, but the returned count is then silently truncated,\nunder-reporting open files without any indication. Conversely the divisor\n`size_of::<libc::proc_fdinfo>()` assumes the returned byte count is an exact multiple.","fix":"Over-allocate (size + a margin) or loop until the returned size fits the buffer, and document that the count is a best-effort snapshot.","locations":[{"ref":"src/unix/apple/macos/process.rs:247-281","code":"  247 |     pub(crate) fn open_files(&self) -> Option<usize> {\n  248 |         let buffer_size_bytes = unsafe {\n  249 |             libc::proc_pidinfo(\n  250 |                 self.pid.0,\n  251 |                 libc::PROC_PIDLISTFDS,\n  252 |                 0,\n  253 |                 std::ptr::null_mut(),\n  254 |                 0,\n  255 |             )\n  256 |         };\n  257 | \n  258 |         if buffer_size_bytes < 0 {\n  259 |             sysinfo_debug!(\"proc_pidinfo failed\");\n  260 |             return None;\n  261 |         }\n  262 | \n  263 |         let mut buffer = vec![0u8; buffer_size_bytes as usize];\n  264 | \n  265 |         let buffer_filled_bytes = unsafe {\n  266 |             libc::proc_pidinfo(\n  267 |                 self.pid.0,\n  268 |                 libc::PROC_PIDLISTFDS,\n  269 |                 0,\n  270 |                 buffer.as_mut_ptr() as *mut std::ffi::c_void,\n  271 |                 buffer_size_bytes,\n  272 |             )\n  273 |         };\n  274 | \n  275 |         if buffer_filled_bytes < 0 {\n  276 |             sysinfo_debug!(\"proc_pidinfo failed\");\n  277 |             return None;\n  278 |         }\n  279 | \n  280 |         Some(buffer_filled_bytes as usize / std::mem::size_of::<libc::proc_fdinfo>())\n  281 |     }","lines":35,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/process.rs#L247-L281"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `update_networks`, the second `sysctl` call to fill `mib_data` is given the *address of a\ntemporary* `&mut size_of::<ifmibdata>()` as the size in/out parameter. This is correct as input, but\nbecause it is a throwaway temporary the *returned* size is discarded and never validated. More\nimportantly, `mib_data.assume_init()` is called whenever `ret >= 0`, but a successful `sysctl` that\nreturns fewer bytes than `size_of::<ifmibdata>()` would leave part of the struct uninitialized while\nstill being treated as fully initialized. The `ifmibdata` layout is also a local hand-rolled `#[repr(C)]`\nduplicate (FIXME comment) that must exactly match the kernel struct or every field read is wrong.","fix":"Capture the returned length in a real variable and verify it equals `size_of::<ifmibdata>()` before calling `assume_init`; drop the hand-rolled struct once the libc definition lands.","locations":[{"ref":"src/unix/apple/network.rs:170-228","code":"  170 |                     let mut mib_data: MaybeUninit<ifmibdata> = MaybeUninit::uninit();\n  171 | \n  172 |                     mib2[4] = (*if2m).ifm_index as _;\n  173 |                     let ret = sysctl(\n  174 |                         mib2.as_mut_ptr(),\n  175 |                         mib2.len() as _,\n  176 |                         mib_data.as_mut_ptr() as *mut _,\n  177 |                         &mut size_of::<ifmibdata>(),\n  178 |                         null_mut(),\n  179 |                         0,\n  180 |                     );\n  181 | \n  182 |                     match self.interfaces.entry(name) {\n  183 |                         hash_map::Entry::Occupied(mut e) => {\n  184 |                             let interface = e.get_mut();\n  185 |                             let interface = &mut interface.inner;\n  186 | \n  187 |                             if ret < 0 {\n  188 |                                 sysinfo_debug!(\n  189 |                                     \"Cannot get network interface data usage: sysctl failed: {ret}\"\n  190 |                                 );\n  191 |                             } else {\n  192 |                                 let data = mib_data.assume_init();\n  193 |                                 update_network_data(interface, &data.ifmd_data);\n  194 |                             }\n  195 |                             interface.mtu = mtu;\n  196 |                             interface.operational_state = operational_state;\n  197 |                             interface.updated = true;\n  198 |                         }\n  199 |                         hash_map::Entry::Vacant(e) => {\n  200 |                             let current_in;\n  201 |                             let current_out;\n  202 |                             let packets_in;\n  203 |                             let packets_out;\n  204 |                             let errors_in;\n  205 |                             let errors_out;\n  206 | \n  207 |                             if ret < 0 {\n  208 |                                 sysinfo_debug!(\n  209 |                                     \"Cannot get network interface data usage: sysctl failed: {ret}\"\n  210 |                                 );\n  211 | \n  212 |                                 current_in = 0;\n  213 |                                 current_out = 0;\n  214 |                                 packets_in = 0;\n  215 |                                 packets_out = 0;\n  216 |                                 errors_in = 0;\n  217 |                                 errors_out = 0;\n  218 |                             } else {\n  219 |                                 let data = mib_data.assume_init();\n  220 |                                 let data = data.ifmd_data;\n  221 | \n  222 |                                 current_in = data.ifi_ibytes;\n  223 |                                 current_out = data.ifi_obytes;\n  224 |                                 packets_in = data.ifi_ipackets;\n  225 |                                 packets_out = data.ifi_opackets;\n  226 |                                 errors_in = data.ifi_ierrors;\n  227 |                                 errors_out = data.ifi_oerrors;\n  228 |                             }","lines":59,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/network.rs#L170-L228"},{"ref":"src/unix/apple/network.rs:16-26","code":"   16 | #[repr(C)]\n   17 | struct ifmibdata {\n   18 |     ifmd_name: [c_char; IFNAMSIZ],\n   19 |     ifmd_pcount: c_uint,\n   20 |     ifmd_flags: c_uint,\n   21 |     ifmd_snd_len: c_uint,\n   22 |     ifmd_snd_maxlen: c_uint,\n   23 |     ifmd_snd_drops: c_uint,\n   24 |     ifmd_filler: [c_uint; 4],\n   25 |     ifmd_data: if_data64,\n   26 | }","lines":11,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/network.rs#L16-L26"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`refresh_processes_specifics` ignores the `ProcessesToUpdate::Some` filter when counting updates,\nand more importantly it calls `update_process(..., check_if_alive = false)` for every pid even when\nthe caller passed an explicit list of pids (`ProcessesToUpdate::Some`). With `check_if_alive = false`\na dead pid that is passed explicitly will not be detected as dead (see `check_if_pid_is_alive`,\nwhich short-circuits to `true` when `check_if_alive` is false), so stale/dead processes requested by\npid can be kept alive in `process_list`. The `false` is only correct when iterating the full\n`proc_listallpids` result.","fix":"Pass `check_if_alive = matches!(processes_to_update, ProcessesToUpdate::Some(_))` (true when refreshing an explicit pid list) so explicitly-requested dead pids are detected and removed.","locations":[{"ref":"src/unix/apple/system.rs:290-308","code":"  290 |                 into_iter(pids)\n  291 |                     .flat_map(|pid| {\n  292 |                         if !filter_callback(pid, filter) {\n  293 |                             return None;\n  294 |                         }\n  295 |                         nb_updated.fetch_add(1, Ordering::Relaxed);\n  296 |                         update_process(\n  297 |                             wrap,\n  298 |                             pid,\n  299 |                             time_interval,\n  300 |                             now,\n  301 |                             refresh_kind,\n  302 |                             false,\n  303 |                             timebase_to_ms,\n  304 |                         )\n  305 |                         .unwrap_or_default()\n  306 |                     })\n  307 |                     .collect()\n  308 |             };","lines":19,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/system.rs#L290-L308"},{"ref":"src/unix/apple/macos/process.rs:352-369","code":"  352 | #[inline]\n  353 | fn check_if_pid_is_alive(pid: Pid, check_if_alive: bool) -> bool {\n  354 |     // In case we are iterating all pids we got from `proc_listallpids`, then\n  355 |     // there is no point checking if the process is alive since it was returned\n  356 |     // from this function.\n  357 |     if !check_if_alive {\n  358 |         return true;\n  359 |     }\n  360 |     unsafe {\n  361 |         if kill(pid.0, 0) == 0 {\n  362 |             return true;\n  363 |         }\n  364 |         // `kill` failed but it might not be because the process is dead.\n  365 |         let errno = crate::unix::libc_errno();\n  366 |         // If errno is equal to ESCHR, it means the process is dead.\n  367 |         !errno.is_null() && *errno != libc::ESRCH\n  368 |     }\n  369 | }","lines":18,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/process.rs#L352-L369"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"FreeBSD per-process CPU usage is `(100 * kproc.ki_pctcpu) as f32 / fscale`. `ki_pctcpu` is a `u32`/fixed-point value; `100 * ki_pctcpu` is computed in integer space and can overflow `u32` (ki_pctcpu fixed-point can be large), wrapping before the cast to f32. The NetBSD equivalent `(100 * kproc.p_pctcpu) as f32 / system_info.fscale` has the same integer-overflow-before-cast issue.","fix":"Cast to f32 (or u64) before multiplying: `(kproc.ki_pctcpu as f32) * 100.0 / fscale`.","locations":[{"ref":"src/unix/bsd/freebsd/process.rs:155-159","code":"  155 |     let cpu_usage = if refresh_kind.cpu() {\n  156 |         Some((100 * kproc.ki_pctcpu) as f32 / fscale)\n  157 |     } else {\n  158 |         None\n  159 |     };","lines":5,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/freebsd/process.rs#L155-L159"},{"ref":"src/unix/bsd/netbsd/process.rs:162-164","code":"  162 |     if refresh_kind.cpu() {\n  163 |         proc_.cpu_usage = (100 * kproc.p_pctcpu) as f32 / system_info.fscale;\n  164 |     }","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/process.rs#L162-L164"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"NetBSD `MotherboardInner::new()` unconditionally returns `None`, so a `Motherboard` is never constructed and every accessor (`name`, `vendor_name`, `version`, `serial_number`, `asset_tag`) that queries the `machdep.dmi.board-*` sysctls is dead and unreachable. The accessors themselves exist and look functional, so the feature is silently disabled by the `new()` stub.","fix":"Return `Some(Self)` (the accessors already attempt to read the DMI sysctls); if the FIXME about wrong MIB names is the blocker, fix the MIB names instead of disabling the whole type.","locations":[{"ref":"src/unix/bsd/netbsd/motherboard.rs:8-11","code":"    8 |     pub(crate) fn new() -> Option<Self> {\n    9 |         // FIXME\n   10 |         None\n   11 |     }","lines":4,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/motherboard.rs#L8-L11"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"NetBSD `disk_usage()` is hard-coded to return all zeros (the real computation is commented out), even though `read_bytes`/`written_bytes` ARE populated by `update_proc_info` (from `p_uru_inblock`/`p_uru_oublock`) when `refresh_kind.disk_usage()` is set. So per-process disk usage is collected but then discarded, always reporting 0.","fix":"Return the populated values (uncomment the real implementation) since the fields are already maintained.","locations":[{"ref":"src/unix/bsd/netbsd/process.rs:45-52","code":"   45 |     pub(crate) fn disk_usage(&self) -> DiskUsage {\n   46 |         DiskUsage {\n   47 |             written_bytes: 0,       // self.written_bytes.saturating_sub(self.old_written_bytes),\n   48 |             total_written_bytes: 0, // self.written_bytes,\n   49 |             read_bytes: 0,          // self.read_bytes.saturating_sub(self.old_read_bytes),\n   50 |             total_read_bytes: 0,    // self.read_bytes,\n   51 |         }\n   52 |     }","lines":8,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/process.rs#L45-L52"},{"ref":"src/unix/bsd/netbsd/process.rs:124-129","code":"  124 |     if refresh_kind.disk_usage() {\n  125 |         proc_.old_read_bytes = proc_.read_bytes;\n  126 |         proc_.read_bytes = kproc.p_uru_inblock as _;\n  127 |         proc_.old_written_bytes = proc_.written_bytes;\n  128 |         proc_.written_bytes = kproc.p_uru_oublock as _;\n  129 |     }","lines":6,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/process.rs#L124-L129"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"NetBSD maps the LWP state `LSRUN` (runnable / on a run queue) to `ProcessStatus::Suspended`. `LSRUN` means the thread is ready to run, not suspended; the correct mapping is `ProcessStatus::Run` (or a 'Runnable' status). `LSSUSPENDED` (value 8) is the actually-suspended state and is not handled at all.","fix":"Map `LSONPROC`/`LSRUN` to `ProcessStatus::Run` and add an `LSSUSPENDED => ProcessStatus::Suspended` arm.","locations":[{"ref":"src/unix/bsd/netbsd/process.rs:91-97","code":"   91 |             match entry.l_stat {\n   92 |                 ffi::LSONPROC => return Some(ProcessStatus::Run),\n   93 |                 ffi::LSRUN => return Some(ProcessStatus::Suspended),\n   94 |                 ffi::LSSLEEP => return Some(ProcessStatus::Sleep),\n   95 |                 ffi::LSSTOP => return Some(ProcessStatus::Stop),\n   96 |                 _ => {}\n   97 |             }","lines":7,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/process.rs#L91-L97"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`ThermalSensorType::from` has an off-by-one mapping that contradicts both the kernel hwmon API\nand the doc comments right above it. The hwmon `tempN_type` values are documented (and the enum\ndoc comments at lines 57-66 state): 1 = CPU embedded diode, 2 = 3904 transistor, 3 = thermal diode,\n4 = thermistor, 5 = AMD AMDSI, 6 = Intel PECI. But the match arms map `0 => CPUEmbeddedDiode`,\n`1 => Transistor3904`, leaving 3,4,5,6 correct and value 2 (3904 transistor) falling into\n`Unknown(2)`. So a CPU embedded diode (value 1) is misreported as a 3904 transistor, value 0 (never\nemitted by the kernel) is misreported as CPU diode, and value 2 is lost. This is a copy-paste/\noff-by-one slip between the doc table (1-indexed) and the match (0-indexed).","fix":"Shift the arms to match the documented 1-based values: `1 => CPUEmbeddedDiode,\n2 => Transistor3904, 3 => ThermalDiode, 4 => Thermistor, 5 => AMDAMDSI, 6 => IntelPECI,\nn => Unknown(n)`. (`sensor_type` is currently never read by any public API, which is why this has\ngone unnoticed - see the dead-code note - but the mapping is still wrong.)","locations":[{"ref":"src/unix/linux/component.rs:198-210","code":"  198 | impl From<u8> for ThermalSensorType {\n  199 |     fn from(input: u8) -> Self {\n  200 |         match input {\n  201 |             0 => Self::CPUEmbeddedDiode,\n  202 |             1 => Self::Transistor3904,\n  203 |             3 => Self::ThermalDiode,\n  204 |             4 => Self::Thermistor,\n  205 |             5 => Self::AMDAMDSI,\n  206 |             6 => Self::IntelPECI,\n  207 |             n => Self::Unknown(n),\n  208 |         }\n  209 |     }\n  210 | }","lines":13,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/component.rs#L198-L210"},{"ref":"src/unix/linux/component.rs:57-66","code":"   57 |     /// Values integer:\n   58 |     ///\n   59 |     /// - 1: CPU embedded diode\n   60 |     /// - 2: 3904 transistor\n   61 |     /// - 3: thermal diode\n   62 |     /// - 4: thermistor\n   63 |     /// - 5: AMD AMDSI\n   64 |     /// - 6: Intel PECI\n   65 |     ///\n   66 |     /// Not all types are supported by all chips.","lines":10,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/component.rs#L57-L66"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `get_process_params`, the 64-bit branch (`if pwow32info.is_null()`) does not `return` at\nits end. After handling a 64-bit target it falls through into the code that handles a 32-bit\nWOW64 process, which then calls `ReadProcessMemory(handle, pwow32info, ...)` with\n`pwow32info == null` (since the target is 64-bit). The comment \"target is a 32 bit process in\nwow64 mode\" at line 870 is meant to gate that block but is not inside any `else`. The result\nis a wasted/failed `ReadProcessMemory` and a misleading \"Unable to read PEB32\" debug log on\nevery 64-bit process refresh. The two branches should be mutually exclusive (if/else).","fix":"Wrap the 32-bit WOW64 handling (lines 870-915) in an `else` of the `if pwow32info.is_null()` block, or add a `return;` at the end of the 64-bit branch (after line 868).","locations":[{"ref":"src/windows/process.rs:824-915","code":"  824 |         if pwow32info.is_null() {\n  825 |             // target is a 64 bit process\n  826 | \n  827 |             let Some(pinfo) = pinfo else { return };\n  828 | \n  829 |             let mut peb = MaybeUninit::<PEB>::uninit();\n  830 |             if ReadProcessMemory(\n  831 |                 handle,\n  832 |                 pinfo.PebBaseAddress.cast(),\n  833 |                 peb.as_mut_ptr().cast(),\n  834 |                 size_of::<PEB>(),\n  835 |                 None,\n  836 |             )\n  837 |             .is_err()\n  838 |             {\n  839 |                 sysinfo_debug!(\"Unable to read process PEB\");\n  840 |                 return;\n  841 |             }\n  842 | \n  843 |             let peb = peb.assume_init();\n  844 | \n  845 |             let mut proc_params = MaybeUninit::<RTL_USER_PROCESS_PARAMETERS>::uninit();\n  846 |             if ReadProcessMemory(\n  847 |                 handle,\n  848 |                 peb.ProcessParameters.cast(),\n  849 |                 proc_params.as_mut_ptr().cast(),\n  850 |                 size_of::<RTL_USER_PROCESS_PARAMETERS>(),\n  851 |                 None,\n  852 |             )\n  853 |             .is_err()\n  854 |             {\n  855 |                 sysinfo_debug!(\"Unable to read process parameters\");\n  856 |                 return;\n  857 |             }\n  858 | \n  859 |             let proc_params = proc_params.assume_init();\n  860 |             get_cmd_line(&proc_params, handle, refresh_kind, &mut process.cmd);\n  861 |             get_proc_env(&proc_params, handle, refresh_kind, &mut process.environ);\n  862 |             get_cwd_and_root(\n  863 |                 &proc_params,\n  864 |                 handle,\n  865 |                 refresh_kind,\n  866 |                 &mut process.cwd,\n  867 |                 &mut process.root,\n  868 |             );\n  869 |         }\n  870 |         // target is a 32 bit process in wow64 mode\n  871 | \n  872 |         if !has_anything_to_update {\n  873 |             return;\n  874 |         }\n  875 | \n  876 |         let mut peb32 = MaybeUninit::<PEB32>::uninit();\n  877 |         if ReadProcessMemory(\n  878 |             handle,\n  879 |             pwow32info,\n  880 |             peb32.as_mut_ptr().cast(),\n  881 |             size_of::<PEB32>(),\n  882 |             None,\n  883 |         )\n  884 |         .is_err()\n  885 |         {\n  886 |             sysinfo_debug!(\"Unable to read PEB32\");\n  887 |             return;\n  888 |         }\n  889 |         let peb32 = peb32.assume_init();\n  890 | \n  891 |         let mut proc_params = MaybeUninit::<RTL_USER_PROCESS_PARAMETERS32>::uninit();\n  892 |         if ReadProcessMemory(\n  893 |             handle,\n  894 |             peb32.ProcessParameters as *mut _,\n  895 |             proc_params.as_mut_ptr().cast(),\n  896 |             size_of::<RTL_USER_PROCESS_PARAMETERS32>(),\n  897 |             None,\n  898 |         )\n  899 |         .is_err()\n  900 |         {\n  901 |             sysinfo_debug!(\"Unable to read 32 bit process parameters\");\n  902 |             return;\n  903 |         }\n  904 | \n  905 |         let proc_params = proc_params.assume_init();\n  906 |         get_cmd_line(&proc_params, handle, refresh_kind, &mut process.cmd);\n  907 |         get_proc_env(&proc_params, handle, refresh_kind, &mut process.environ);\n  908 |         get_cwd_and_root(\n  909 |             &proc_params,\n  910 |             handle,\n  911 |             refresh_kind,\n  912 |             &mut process.cwd,\n  913 |             &mut process.root,\n  914 |         );\n  915 |     }","lines":92,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/process.rs#L824-L915"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`is_proc_running` treats a process as running iff its exit code equals `STILL_ACTIVE` (259).\nA process that legitimately exits with code 259 is therefore reported as still running. This\ndirectly affects `ProcessInner::wait`, which loops `while is_proc_running(handle)` sleeping\n10ms forever for such a process (an effective hang). This is a well-known Win32 pitfall;\n`GetExitCodeProcess` alone cannot distinguish \"running\" from \"exited with 259\".","fix":"Use `WaitForSingleObject(handle, 0)` (returns WAIT_TIMEOUT if still running, WAIT_OBJECT_0 if signaled) to determine liveness, falling back to GetExitCodeProcess only for the code.","locations":[{"ref":"src/windows/system.rs:477-481","code":"  477 | pub(crate) fn is_proc_running(handle: HANDLE) -> bool {\n  478 |     let mut exit_code = 0;\n  479 |     unsafe { GetExitCodeProcess(handle, &mut exit_code) }.is_ok()\n  480 |         && exit_code == STILL_ACTIVE.0 as u32\n  481 | }","lines":5,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/system.rs#L477-L481"},{"ref":"src/windows/process.rs:465-490","code":"  465 |     pub(crate) fn wait(&self) -> Option<ExitStatus> {\n  466 |         if let Some(handle) = self.get_handle() {\n  467 |             while is_proc_running(handle) {\n  468 |                 if get_start_time(handle) != self.start_time() {\n  469 |                     // PID owner changed so the previous process was finished!\n  470 |                     sysinfo_debug!(\"PID owner changed so cannot get old process exit status\");\n  471 |                     return None;\n  472 |                 }\n  473 |                 std::thread::sleep(std::time::Duration::from_millis(10));\n  474 |             }\n  475 |             let mut exit_status = 0;\n  476 |             unsafe {\n  477 |                 match GetExitCodeProcess(handle, &mut exit_status) {\n  478 |                     Ok(_) => Some(ExitStatus::from_raw(exit_status)),\n  479 |                     Err(_error) => {\n  480 |                         sysinfo_debug!(\"failed to retrieve process exit status: {_error:?}\");\n  481 |                         None\n  482 |                     }\n  483 |                 }\n  484 |             }\n  485 |         } else {\n  486 |             // In this case, we can't do anything so we just return.\n  487 |             sysinfo_debug!(\"can't wait on this process so returning\");\n  488 |             None\n  489 |         }\n  490 |     }","lines":26,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/process.rs#L465-L490"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`MacAddrFromStrError`'s `InvalidAddrFormat` message string (\"invalid address\nformat\") is generic, while `IpNetworkFromStrError::InvalidAddrFormat` prints\n\"invalid address format, should `[IP address]/[number]`\" — note the malformed\nphrasing (missing \"be\": \"should `[IP address]/[number]`\"). Minor user-facing\ngrammar issue in the error `Display`.","fix":"Reword to \"invalid address format, should be `[IP address]/[number]`\".","locations":[{"ref":"src/common/network.rs:564-573","code":"  564 | impl core::fmt::Display for IpNetworkFromStrError {\n  565 |     fn fmt(&self, f: &mut core::fmt::Formatter<'_>) -> core::fmt::Result {\n  566 |         match self {\n  567 |             Self::PrefixError(error) => write!(f, \"prefix is not an integer: {error}\"),\n  568 |             Self::AddrParseError(error) => write!(f, \"failed to parse IP address: {error}\"),\n  569 |             Self::InvalidAddrFormat => {\n  570 |                 f.write_str(\"invalid address format, should `[IP address]/[number]`\")\n  571 |             }\n  572 |         }\n  573 |     }","lines":10,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/common/network.rs#L564-L573"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Serialize impl for Product declares `serialize_struct(\"Product\", 5)` but serializes 7 fields (name, family, serial_number, stock_keeping_unit, uuid, version, vendor_name). The preceding comment even says `7 corresponds to the number of \"fields\"`, yet the code passes 5. Wrong length hint corrupts output for length-prefixed serialization formats.","fix":"Change `serialize_struct(\"Product\", 5)` to `serialize_struct(\"Product\", 7)`.","locations":[{"ref":"src/serde.rs:187-196","code":"  187 |         // `7` corresponds to the number of \"fields\".\n  188 |         let mut state = serializer.serialize_struct(\"Product\", 5)?;\n  189 | \n  190 |         state.serialize_field(\"name\", &Self::name())?;\n  191 |         state.serialize_field(\"family\", &Self::family())?;\n  192 |         state.serialize_field(\"serial_number\", &Self::serial_number())?;\n  193 |         state.serialize_field(\"stock_keeping_unit\", &Self::stock_keeping_unit())?;\n  194 |         state.serialize_field(\"uuid\", &Self::uuid())?;\n  195 |         state.serialize_field(\"version\", &Self::version())?;\n  196 |         state.serialize_field(\"vendor_name\", &Self::vendor_name())?;","lines":10,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/serde.rs#L187-L196"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Serialize impl for Process declares `serialize_struct(\"Process\", 19)` and there are 19 fields, but the NetworkData impl declares 14 while actually serializing 15 fields (received, total_received, transmitted, total_transmitted, packets_received, total_packets_received, packets_transmitted, total_packets_transmitted, errors_on_received, total_errors_on_received, errors_on_transmitted, total_errors_on_transmitted, mac_address, ip_networks, mtu). The struct length hint is wrong by one. serde_json ignores the hint, but length-prefixed formats (e.g. bincode) rely on it and will produce corrupt output.","fix":"Change `serialize_struct(\"NetworkData\", 14)` to `15`.","locations":[{"ref":"src/serde.rs:389-411","code":"  389 |         let mut state = serializer.serialize_struct(\"NetworkData\", 14)?;\n  390 | \n  391 |         state.serialize_field(\"received\", &self.received())?;\n  392 |         state.serialize_field(\"total_received\", &self.total_received())?;\n  393 |         state.serialize_field(\"transmitted\", &self.transmitted())?;\n  394 |         state.serialize_field(\"total_transmitted\", &self.total_transmitted())?;\n  395 |         state.serialize_field(\"packets_received\", &self.packets_received())?;\n  396 |         state.serialize_field(\"total_packets_received\", &self.total_packets_received())?;\n  397 |         state.serialize_field(\"packets_transmitted\", &self.packets_transmitted())?;\n  398 |         state.serialize_field(\n  399 |             \"total_packets_transmitted\",\n  400 |             &self.total_packets_transmitted(),\n  401 |         )?;\n  402 |         state.serialize_field(\"errors_on_received\", &self.errors_on_received())?;\n  403 |         state.serialize_field(\"total_errors_on_received\", &self.total_errors_on_received())?;\n  404 |         state.serialize_field(\"errors_on_transmitted\", &self.errors_on_transmitted())?;\n  405 |         state.serialize_field(\n  406 |             \"total_errors_on_transmitted\",\n  407 |             &self.total_errors_on_transmitted(),\n  408 |         )?;\n  409 |         state.serialize_field(\"mac_address\", &self.mac_address())?;\n  410 |         state.serialize_field(\"ip_networks\", &self.ip_networks())?;\n  411 |         state.serialize_field(\"mtu\", &self.mtu())?;","lines":23,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/serde.rs#L389-L411"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `compute_usage_of_cpu`, when re-using existing data (`std::ptr::eq(old_cpu_info, cpu_info)`),\nthe branch returns the *cumulative* tick counts since boot, while the other branch returns a\n*delta* between two samples. The first refresh therefore reports CPU usage as the lifetime average\nsince boot rather than the instantaneous usage, which is inconsistent with subsequent refreshes.\nThis is an initialization-time inaccuracy rather than a crash.","fix":"Document the first-call semantics, or seed the per-CPU `old` data so the first usage value is computed from a zero baseline consistently.","locations":[{"ref":"src/unix/apple/cpu.rs:261-288","code":"  261 | pub(crate) fn compute_usage_of_cpu(proc_: &Cpu, cpu_info: *mut i32, offset: isize) -> f32 {\n  262 |     let old_cpu_info = proc_.inner.data().cpu_info.0;\n  263 |     let in_use;\n  264 |     let idle;\n  265 | \n  266 |     // In case we are initializing cpus, there is no \"old value\" yet.\n  267 |     if std::ptr::eq(old_cpu_info, cpu_info) {\n  268 |         in_use = get_in_use(cpu_info, offset);\n  269 |         idle = get_idle(cpu_info, offset);\n  270 |     } else {\n  271 |         let new_in_use = get_in_use(cpu_info, offset);\n  272 |         let old_in_use = get_in_use(old_cpu_info, offset);\n  273 | \n  274 |         let new_idle = get_idle(cpu_info, offset);\n  275 |         let old_idle = get_idle(old_cpu_info, offset);\n  276 | \n  277 |         in_use = new_in_use.saturating_sub(old_in_use);\n  278 |         idle = new_idle.saturating_sub(old_idle) as _;\n  279 |     }\n  280 |     let total = in_use.saturating_add(idle as _);\n  281 |     let usage = (in_use as f32 / total as f32) * 100.;\n  282 |     if usage.is_nan() {\n  283 |         // If divided by zero, avoid returning a NaN\n  284 |         0.\n  285 |     } else {\n  286 |         usage\n  287 |     }\n  288 | }","lines":28,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/cpu.rs#L261-L288"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`get_temperature_inner` (x86) checks `val.data_size > 0` and a `sp78` type match, but `val.bytes` is a\n`[i8; 32]` and the sp78 decode reads `val.bytes[0]` and `val.bytes[1]` unconditionally. If a key\nreports `data_type == \"sp78\"` but `data_size < 2`, the decode reads bytes that were not populated by\nthe SMC for this key (they are whatever `read_key`'s 32-byte memcpy copied). The size is validated as\n`> 0` but not `>= 2`.","fix":"Require `val.data_size >= 2` before decoding the sp78 value.","locations":[{"ref":"src/unix/apple/macos/component/x86.rs:289-306","code":"  289 | fn get_temperature_inner(\n  290 |     con: io_connect_t,\n  291 |     input_structure: &ffi::KeyData_t,\n  292 |     original_val: &ffi::Val_t,\n  293 | ) -> Option<f32> {\n  294 |     unsafe {\n  295 |         if let Ok(val) = read_key(con, input_structure, (*original_val).clone()) {\n  296 |             if val.data_size > 0\n  297 |                 && libc::strcmp(val.data_type.as_ptr(), c\"sp78\".as_ptr() as *const i8) == 0\n  298 |             {\n  299 |                 // convert sp78 value to temperature\n  300 |                 let x = (i32::from(val.bytes[0]) << 6) + (i32::from(val.bytes[1]) >> 2);\n  301 |                 return Some(x as f32 / 64f32);\n  302 |             }\n  303 |         }\n  304 |     }\n  305 |     None\n  306 | }","lines":18,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/component/x86.rs#L289-L306"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`get_io_platform_property` for the CFData branch does `CStr::from_bytes_with_nul(&s.to_vec())`. This\nrequires the CFData to contain exactly one trailing NUL and no interior NULs; many IOKit data\nproperties are *not* NUL-terminated, in which case `from_bytes_with_nul` fails and the property is\nsilently dropped (`None`). The string branch handles CFString correctly, but data-backed properties\n(common for board-id, etc.) will frequently return `None`.","fix":"Trim a single trailing NUL if present and build the string from the remaining bytes (e.g. `from_utf8_lossy` over the slice without the trailing NUL) instead of requiring `from_bytes_with_nul`.","locations":[{"ref":"src/unix/apple/macos/system.rs:194-200","code":"  194 |         properties.downcast::<CFData>().ok().and_then(|s| {\n  195 |             CStr::from_bytes_with_nul(&s.to_vec())\n  196 |                 .ok()\n  197 |                 .and_then(|cstr| cstr.to_str().ok())\n  198 |                 .map(str::to_owned)\n  199 |         })\n  200 |     }","lines":7,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/system.rs#L194-L200"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`from_flags` maps an interface that is `IFF_RUNNING` but not `IFF_UP` to `Dormant`, and anything not\n`IFF_RUNNING` to `Down`. On macOS an interface that is administratively up (`IFF_UP`) but whose link\nis not running (`!IFF_RUNNING`, e.g. cable unplugged) is reported as `Down`, while the inverted\ncombination (`IFF_RUNNING && !IFF_UP`) -- which essentially never occurs -- maps to `Dormant`. The\nown comment (`are these the right flags?`) flags the uncertainty; the more meaningful \"interface up\nbut no carrier\" state is collapsed into `Down`.","fix":"Reconsider the mapping: treat `IFF_UP && !IFF_RUNNING` (no carrier) explicitly, and verify against the BSD implementation referenced in the comment.","locations":[{"ref":"src/unix/apple/network.rs:259-272","code":"  259 | impl InterfaceOperationalState {\n  260 |     fn from_flags(flags: core:
