.rs:10-12","code":"   10 |     pub(crate) fn family() -> Option<String> {\n   11 |         Some(get_sysctl_str(b\"hw.model\\0\"))\n   12 |     }","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/product.rs#L10-L12"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`os_version` resizes the buffer with `buf.resize(pos, 0)` where `pos` is the index of the first NUL,\nwith the comment \"Shrink buffer to terminate the null bytes\". The comment is misleading: `resize(pos,\n0)` truncates to length `pos`, dropping the NUL and everything after it (correct), but the `, 0` fill\nvalue is dead (only used when growing, which never happens here). Same pattern is duplicated in\n`get_system_info`. Minor: the fill argument is meaningless and the comment misstates the operation.","fix":"Use `buf.truncate(pos)` and correct the comment.","locations":[{"ref":"src/unix/apple/system.rs:478-481","code":"  478 |                     if let Some(pos) = buf.iter().position(|x| *x == 0) {\n  479 |                         // Shrink buffer to terminate the null bytes\n  480 |                         buf.resize(pos, 0);\n  481 |                     }","lines":4,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/system.rs#L478-L481"},{"ref":"src/unix/apple/system.rs:580-583","code":"  580 |                 if let Some(pos) = buf.iter().position(|x| *x == 0) {\n  581 |                     // Shrink buffer to terminate the null bytes\n  582 |                     buf.resize(pos, 0);\n  583 |                 }","lines":4,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/system.rs#L580-L583"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"On FreeBSD, ZFS dataset disks are named by `f_mntfromname` (the dataset name) but the duplicate-detection in `get_all_list` matches an existing disk by `name` AND a prefix comparison of `file_system` bytes against `fs_type` using `zip(...).all(...)`. The `zip().all()` only compares overlapping bytes, so two filesystems whose type names share a prefix (e.g. an entry whose stored `file_system` is empty) compare as equal, potentially merging distinct disks. This mirrors the `same_name` prefix bug on NetBSD.","fix":"Compare `file_system` for full equality (`d.inner.file_system.as_encoded_bytes() == &fs_type[..]`) instead of a prefix `zip().all()`.","locations":[{"ref":"src/unix/bsd/freebsd/disk.rs:405-413","code":"  405 |         if let Some(disk) = container.iter_mut().find(|d| {\n  406 |             d.inner.name == name\n  407 |                 && d.inner\n  408 |                     .file_system\n  409 |                     .as_encoded_bytes()\n  410 |                     .iter()\n  411 |                     .zip(fs_type.iter())\n  412 |                     .all(|(a, b)| a == b)\n  413 |         }) {","lines":9,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/freebsd/disk.rs#L405-L413"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"On FreeBSD, removable-device detection compares the *filesystem type* against `b\"USB\"`/`b\"usb\"` and against `fs_type.starts_with(b\"/dev/cd\")`. A filesystem type is never `USB`/`usb` nor a `/dev/cd...` path (that would be a device path, not an `f_fstypename`), so `is_removable` is effectively always false. The NetBSD backend copies the same broken check.","fix":"Test the device source (`f_mntfromname`, e.g. `/dev/cd*`, `/dev/da*` USB) rather than the filesystem-type string, or drop the dead branch.","locations":[{"ref":"src/unix/bsd/freebsd/disk.rs:421-426","code":"  421 |             let is_removable = if refresh_kind.storage() {\n  422 |                 [b\"USB\", b\"usb\"].iter().any(|b| *b == &fs_type[..])\n  423 |                     || fs_type.starts_with(b\"/dev/cd\")\n  424 |             } else {\n  425 |                 false\n  426 |             };","lines":6,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/freebsd/disk.rs#L421-L426"},{"ref":"src/unix/bsd/netbsd/disk.rs:370-375","code":"  370 |             let is_removable = if refresh_kind.storage() {\n  371 |                 [b\"USB\", b\"usb\"].iter().any(|b| *b == &fs_type[..])\n  372 |                     || fs_type.starts_with(b\"/dev/cd\")\n  373 |             } else {\n  374 |                 false\n  375 |             };","lines":6,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/disk.rs#L370-L375"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"FreeBSD `available_memory()` returns `self.mem_free` (the same value as `free_memory()`). On most platforms 'available' memory (reclaimable cache + free) is larger than strictly 'free' memory; here they are identical, so `available_memory` understates what is actually reclaimable. NetBSD has the same `available_memory == free_memory` aliasing.","fix":"Compute available memory including reclaimable cache, or document that on BSD it equals free memory.","locations":[{"ref":"src/unix/bsd/freebsd/system.rs:116-122","code":"  116 |     pub(crate) fn free_memory(&self) -> u64 {\n  117 |         self.mem_free\n  118 |     }\n  119 | \n  120 |     pub(crate) fn available_memory(&self) -> u64 {\n  121 |         self.mem_free\n  122 |     }","lines":7,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/freebsd/system.rs#L116-L122"},{"ref":"src/unix/bsd/netbsd/system.rs:129-135","code":"  129 |     pub(crate) fn free_memory(&self) -> u64 {\n  130 |         self.mem_free\n  131 |     }\n  132 | \n  133 |     pub(crate) fn available_memory(&self) -> u64 {\n  134 |         self.mem_free\n  135 |     }","lines":7,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/system.rs#L129-L135"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`same_name` in NetBSD disk.rs returns true when one slice is a prefix of the other: it only iterates over `zip` of the two slices and returns true if all overlapping bytes match, never comparing lengths. A device id like `sd0` would match a drive named `sd0a` (or vice-versa) and I/O stats would be attributed to the wrong disk.","fix":"Compare lengths first (`dev_id.len() == drive_name_len`) or use a proper equality after trimming the trailing NUL bytes of `drive.name`.","locations":[{"ref":"src/unix/bsd/netbsd/disk.rs:225-232","code":"  225 | fn same_name(dev_id: &[c_char], drive_name: &[c_char]) -> bool {\n  226 |     for (c1, c2) in dev_id.iter().zip(drive_name.iter()) {\n  227 |         if c1 != c2 {\n  228 |             return false;\n  229 |         }\n  230 |     }\n  231 |     true\n  232 | }","lines":8,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/disk.rs#L225-L232"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"NetBSD disk `refresh_disk_io` builds the result Vec with `Vec::with_capacity(nb_drives)` and writes into it via a raw pointer, then `set_len(nb_drives)`. If the number of drives grows between the size-probe sysctl and the data sysctl, the kernel could report more drives than the buffer holds; because `size` is reused (capacity-sized) the kernel will truncate, but `nb_drives = size / IO_SYSCTL_SIZE` is then recomputed from the (possibly clamped) returned size, so this happens to be safe only because the kernel clamps to the passed buffer size. The pattern is fragile and undocumented (relies on `set_len` never exceeding capacity).","fix":"Assert/clamp `nb_drives` to the allocated capacity before `set_len`, and add a comment that the second sysctl clamps to the buffer size.","locations":[{"ref":"src/unix/bsd/netbsd/disk.rs:234-267","code":"  234 | unsafe fn refresh_disk_io<T: GetValues>(disks: &mut [T]) {\n  235 |     const IO_SYSCTL_SIZE: usize = std::mem::size_of::<ffi::io_sysctl>();\n  236 |     let mib = &[ffi::CTL_HW, ffi::HW_IOSTATS, IO_SYSCTL_SIZE as libc::c_int];\n  237 |     let mut size: libc::size_t = 0;\n  238 | \n  239 |     unsafe {\n  240 |         if !super::utils::get_sysctl_raw(mib, null_mut(), &mut size) {\n  241 |             sysinfo_debug!(\"failed to get iostats info\");\n  242 |             return;\n  243 |         }\n  244 |         let mut nb_drives = size as usize / IO_SYSCTL_SIZE;\n  245 |         if nb_drives < 1 {\n  246 |             sysinfo_debug!(\"no drive\");\n  247 |             return;\n  248 |         }\n  249 |         let mut drives: Vec<ffi::io_sysctl> = Vec::with_capacity(nb_drives);\n  250 |         if !super::utils::get_sysctl_raw(mib, drives.as_mut_ptr() as *mut _, &mut size) {\n  251 |             sysinfo_debug!(\"failed to get iostats drives\");\n  252 |             return;\n  253 |         }\n  254 |         nb_drives = size as usize / IO_SYSCTL_SIZE;\n  255 |         drives.set_len(nb_drives);\n  256 | \n  257 |         for drive in drives {\n  258 |             if let Some(disk) = disks\n  259 |                 .iter_mut()\n  260 |                 .find(|disk| same_name(disk.dev_id(), &drive.name))\n  261 |             {\n  262 |                 disk.update_old();\n  263 |                 *disk.get_read() = drive.rbytes;\n  264 |                 *disk.get_written() = drive.wbytes;\n  265 |             }\n  266 |         }\n  267 |     }","lines":34,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/disk.rs#L234-L267"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`InterfaceOperationalState::from_flag` treats any interface that is `IFF_RUNNING` but whose `link_state != LINK_STATE_UP` as `Dormant`. `LINK_STATE_UNKNOWN` (the common case for interfaces that don't report link state, e.g. loopback, tun, many virtual interfaces) is thereby reported as `Dormant` rather than `Up`/`Unknown`, which is misleading for the many interface types that never set a concrete link state.","fix":"Treat `LINK_STATE_UNKNOWN` as `Up` (or `Unknown`) when `IFF_RUNNING` is set, reserving `Dormant` for an explicit down/dormant link state.","locations":[{"ref":"src/unix/bsd/network_common.rs:104-116","code":"  104 |     pub(crate) fn from_flag(flags: core::ffi::c_int, link_state: core::ffi::c_int) -> Self {\n  105 |         // https://github.com/freebsd/freebsd-src/blob/7e7d4e711ff94d114c93fd522d4125aa9bd9f5cd/contrib/bsnmp/snmp_mibII/mibII_interfaces.c#L283-L298\n  106 | \n  107 |         if (flags & libc::IFF_RUNNING) != 0 {\n  108 |             if link_state != libc::LINK_STATE_UP {\n  109 |                 InterfaceOperationalState::Dormant\n  110 |             } else {\n  111 |                 InterfaceOperationalState::Up\n  112 |             }\n  113 |         } else {\n  114 |             InterfaceOperationalState::Down\n  115 |         }\n  116 |     }","lines":13,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/network_common.rs#L104-L116"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`read_table` (both copies) splits each line on the separator and takes only `split.next()` for the\nkey and the next for the value. For `/proc/meminfo` the key is `MemTotal` and the colon separator\nworks, but lines such as `Hugepagesize:` and any future field whose key itself can contain the\nseparator are not a concern here; however the value parsing `value.trim_start().split(' ').next()`\nassumes the value's first space-delimited token is the number. This silently ignores any line where\nthe unit precedes the number or the number has thousands separators - acceptable for /proc/meminfo,\nbut the helper is also used for arbitrary `colsep`/files (cgroup `memory.stat` with `' '`), where a\nkey containing a space (none today) would misparse. Low risk, noting the shared assumption.","fix":"No change needed for current inputs; if generalized, document that keys must not contain the separator and values must start with the numeric token.","locations":[{"ref":"src/unix/linux/cgroup.rs:195-230","code":"  195 | fn read_table<F>(filename: &str, colsep: char, mut f: F)\n  196 | where\n  197 |     F: FnMut(&str, u64),\n  198 | {\n  199 |     if let Ok(content) = get_all_utf8_data(filename, 16_635) {\n  200 |         content\n  201 |             .split('\\n')\n  202 |             .flat_map(|line| {\n  203 |                 let mut split = line.split(colsep);\n  204 |                 let key = split.next()?;\n  205 |                 let value = split.next()?;\n  206 |                 let value0 = value.trim_start().split(' ').next()?;\n  207 |                 let value0_u64 = u64::from_str(value0).ok()?;\n  208 |                 Some((key, value0_u64))\n  209 |             })\n  210 |             .for_each(|(k, v)| f(k, v));\n  211 |     }\n  212 | }\n  213 | \n  214 | fn read_table_key(filename: &Path, target_key: &str, colsep: char) -> Option<u64> {\n  215 |     if let Ok(content) = get_all_utf8_data(filename, 16_635) {\n  216 |         return content.split('\\n').find_map(|line| {\n  217 |             let mut split = line.split(colsep);\n  218 |             let key = split.next()?;\n  219 |             if key != target_key {\n  220 |                 return None;\n  221 |             }\n  222 | \n  223 |             let value = split.next()?;\n  224 |             let value0 = value.trim_start().split(' ').next()?;\n  225 |             u64::from_str(value0).ok()\n  226 |         });\n  227 |     }\n  228 | \n  229 |     None\n  230 | }","lines":36,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/cgroup.rs#L195-L230"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`open_files` counts `fs::read_dir(proc_path/fd).count()`. `read_dir` on `/proc/<pid>/fd` itself\nopens a directory file descriptor while it is being read, so the returned count includes that\ntransient fd and is off by one (the process does not actually have that fd open). `read_dir` also\ndoes not include `.`/`..` on Linux, so the only systematic error is the +1 from the directory handle\nused to enumerate. Minor but a documented inaccuracy historically (see commits 2eddedf/1308eee that\njust touched this).","fix":"If exactness matters, subtract the self-referential entry, or document that the count may be off by one due to the enumeration handle.","locations":[{"ref":"src/unix/linux/process.rs:308-320","code":"  308 |     pub(crate) fn open_files(&self) -> Option<usize> {\n  309 |         let open_files_dir = self.proc_path.as_path().join(\"fd\");\n  310 |         match fs::read_dir(&open_files_dir) {\n  311 |             Ok(entries) => Some(entries.count() as _),\n  312 |             Err(_error) => {\n  313 |                 sysinfo_debug!(\n  314 |                     \"Failed to get open files in `{}`: {_error:?}\",\n  315 |                     open_files_dir.display(),\n  316 |                 );\n  317 |                 None\n  318 |             }\n  319 |         }\n  320 |     }","lines":13,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/process.rs#L308-L320"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `compute_cpu_usage`, the \"first cycle\" guard `if p.old_utime == 0 && p.old_stime == 0 { return; }`\nalso fires on every refresh for a genuinely idle process whose accumulated user+system time is still\n0 (e.g. a freshly-spawned process that has done no work, or a kernel/idle thread). For such a process\nthe previous snapshot is `(0,0)`, so its CPU usage is never computed and stays at the default until\nit happens to accumulate any tick. The intent is \"skip the first sample\", but the condition keys off\nthe values being zero rather than off a \"has previous sample\" flag.","fix":"Track whether a previous sample exists with an explicit boolean (set after `set_time` runs once)\nrather than inferring it from `old_utime == 0 && old_stime == 0`, which is ambiguous with a real\nzero-CPU process.","locations":[{"ref":"src/unix/linux/process.rs:346-361","code":"  346 | pub(crate) fn compute_cpu_usage(p: &mut ProcessInner, total_time: f32, max_value: f32) {\n  347 |     // First time updating the values without reference, wait for a second cycle to update cpu_usage\n  348 |     if p.old_utime == 0 && p.old_stime == 0 {\n  349 |         return;\n  350 |     }\n  351 | \n  352 |     // We use `max_value` to ensure that the process CPU usage will never get bigger than:\n  353 |     // `\"number of CPUs\" * 100.`\n  354 |     p.cpu_usage = (p\n  355 |         .utime\n  356 |         .saturating_sub(p.old_utime)\n  357 |         .saturating_add(p.stime.saturating_sub(p.old_stime)) as f32\n  358 |         / total_time\n  359 |         * 100.)\n  360 |         .min(max_value);\n  361 | }","lines":16,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/process.rs#L346-L361"}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`get_disk_kind` returns `DiskKind::Unknown(-1)` on failure, the same sentinel used in\n`get_list` to mean \"kind not yet determined\". In `DiskInner::refresh_specifics`, the kind is\nonly (re)queried while `self.type_ == DiskKind::Unknown(-1)`. So if `get_disk_kind` ever fails\nonce (DeviceIoControl error or wrong returned size), the disk is permanently stuck retrying\nthe IOCTL on every refresh because the sentinel never changes, and the user observes an\n`Unknown(-1)` kind indistinguishable from \"pending\".","fix":"Use a distinct sentinel for a genuine query failure (e.g. `DiskKind::Unknown(0)`), or cache the failure so it is not retried indefinitely.","locations":[{"ref":"src/windows/disk.rs:402-431","code":"  402 | unsafe fn get_disk_kind(handle: &HandleWrapper) -> DiskKind {\n  403 |     let spq_trim = STORAGE_PROPERTY_QUERY {\n  404 |         PropertyId: StorageDeviceSeekPenaltyProperty,\n  405 |         QueryType: PropertyStandardQuery,\n  406 |         AdditionalParameters: [0],\n  407 |     };\n  408 |     let mut result: DEVICE_SEEK_PENALTY_DESCRIPTOR = unsafe { std::mem::zeroed() };\n  409 | \n  410 |     let mut dw_size = 0;\n  411 |     let device_io_control = unsafe {\n  412 |         DeviceIoControl(\n  413 |             handle.0,\n  414 |             IOCTL_STORAGE_QUERY_PROPERTY,\n  415 |             Some(&spq_trim as *const STORAGE_PROPERTY_QUERY as *const _),\n  416 |             size_of::<STORAGE_PROPERTY_QUERY>() as _,\n  417 |             Some(&mut result as *mut DEVICE_SEEK_PENALTY_DESCRIPTOR as *mut _),\n  418 |             size_of::<DEVICE_SEEK_PENALTY_DESCRIPTOR>() as _,\n  419 |             Some(&mut dw_size),\n  420 |             None,\n  421 |         )\n  422 |         .is_ok()\n  423 |     };\n  424 | \n  425 |     if !device_io_control || dw_size != size_of::<DEVICE_SEEK_PENALTY_DESCRIPTOR>() as u32 {\n  426 |         DiskKind::Unknown(-1)\n  427 |     } else {\n  428 |         let is_hdd = result.IncursSeekPenalty;\n  429 |         if is_hdd { DiskKind::HDD } else { DiskKind::SSD }\n  430 |     }\n  431 | }","lines":30,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c4 .rs:164-205","code":"  164 |     pub(crate) fn temperature(&self) -> Option<f32> {\n  165 |         self.temperature\n  166 |     }\n  167 | \n  168 |     pub(crate) fn max(&self) -> Option<f32> {\n  169 |         Some(self.max)\n  170 |     }\n  171 | \n  172 |     pub(crate) fn critical(&self) -> Option<f32> {\n  173 |         self.critical\n  174 |     }\n  175 | \n  176 |     pub(crate) fn label(&self) -> &str {\n  177 |         &self.label\n  178 |     }\n  179 | \n  180 |     pub(crate) fn id(&self) -> Option<&str> {\n  181 |         self.id.as_deref()\n  182 |     }\n  183 | \n  184 |     pub(crate) fn refresh(&mut self) {\n  185 |         unsafe {\n  186 |             let Some(event) =\n  187 |                 IOHIDServiceClientCopyEvent(&self.service, kIOHIDEventTypeTemperature, 0, 0)\n  188 |             else {\n  189 |                 self.temperature = None;\n  190 |                 return;\n  191 |             };\n  192 |             // SAFETY: `IOHIDServiceClientCopyEvent` is a \"copy\" function, so\n  193 |             // the event has +1 retain count.\n  194 |             let event = CFRetained::from_raw(event);\n  195 | \n  196 |             let temperature =\n  197 |                 IOHIDEventGetFloatValue(&event, IOHIDEventFieldBase(kIOHIDEventTypeTemperature))\n  198 |                     as _;\n  199 |             self.temperature = Some(temperature);\n  200 |             if temperature > self.max {\n  201 |                 self.max = temperature;\n  202 |             }\n  203 |         }\n  204 |     }\n  205 | }","lines":42,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/component/arm.rs#L164-L205"},{"ref":"src/unix/apple/app_store/component.rs:9-63","code":"    9 | impl ComponentInner {\n   10 |     pub(crate) fn temperature(&self) -> Option<f32> {\n   11 |         None\n   12 |     }\n   13 | \n   14 |     pub(crate) fn max(&self) -> Option<f32> {\n   15 |         None\n `brand.contains(\"M1\") || brand.contains(\"M2\") || brand.contains(\"M3\")`.","locations":[{"ref":"src/unix/apple/macos/cpu.rs:95","code":"   95 |         if brand.contains(\"M1\") || brand.contains(\"M2\") | brand.contains(\"M3\") {","lines":1,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/cpu.rs#L95"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"`get_user_groups` can call `Vec::set_len(nb_groups)` with `nb_groups` larger than the vector's capacity. When `getgrouplist` returns -1 it writes the *required* group count (which is by definition larger than the buffer it was given) into `nb_groups`; the code then does `groups.set_len(nb_groups as _)` before reserving more. Setting the length beyond the current capacity is immediate undefined behavior, and the subsequent reads of the (uninitialized) elements compound it.","fix":"On the -1 branch do not call `set_len`; instead grow capacity to at least `nb_groups` (`groups.reserve(nb_groups - groups.capacity())`) and retry. Only call `set_len(nb_groups)` on the success branch where `nb_groups <= capacity`.","locations":[{"ref":"src/unix/users.rs:87-103","code":"   87 |     loop {\n   88 |         unsafe {\n   89 |             let mut nb_groups = groups.capacity();\n   90 |             if getgrouplist(\n   91 |                 name,\n   92 |                 group_id as _,\n   93 |                 groups.as_mut_ptr(),\n   94 |                 &mut nb_groups as *mut _ as *mut _,\n   95 |             ) == -1\n   96 |             {\n   97 |                 // Ensure the length matches the number of returned groups.\n   98 |                 // Needs to be updated for `Vec::reserve` to actually add additional capacity.\n   99 |                 groups.set_len(nb_groups as _);\n  100 |                 groups.reserve(256);\n  101 |                 continue;\n  102 |             }\n  103 |             groups.set_len(nb_groups as _);","lines":17,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/users.rs#L87-L103"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`mem_available` is documented to be `active + inactive + free + speculative` (see the comment),\nbut the implementation sums `active + inactive + free` only and omits `speculative_count`. The\nformula in the comment and the code disagree, so available memory is consistently underestimated by\nthe speculative page count.","fix":"Add `.saturating_add(u64::from(stat.speculative_count))` before the `saturating_mul(self.page_size_b)`, or fix the comment to match the intended formula.","locations":[{"ref":"src/unix/apple/system.rs:192-199","code":"  192 |                     // From documentation of Apple XNU:\n  193 |                     // https://github.com/apple-oss-distributions/xnu/blob/main/doc/vm/memorystatus_notify.md#available-memory\n  194 |                     //\n  195 |                     // AVAILABLE_NON_COMPRESSED_MEMORY = (active + inactive + free + speculative)\n  196 |                     self.mem_available = u64::from(stat.active_count)\n  197 |                         .saturating_add(u64::from(stat.inactive_count))\n  198 |                         .saturating_add(u64::from(stat.free_count))\n  199 |                         .saturating_mul(self.page_size_b);","lines":8,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/system.rs#L192-L199"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`refresh_disk_io` on FreeBSD memoizes geom initialization in a `static OnceLock<Result<(),()>>`. If `geom_stats_open` fails once (e.g. transient resource issue, or geom not yet ready at process start), the `Err` is cached permanently and disk I/O stats are disabled for the entire lifetime of the process with no retry.","fix":"Either retry initialization on failure or document that geom I/O is permanently disabled after a single failure.","locations":[{"ref":"src/unix/bsd/freebsd/disk.rs:242-250","code":"  242 | unsafe fn refresh_disk_io<T: GetValues>(disks: &mut [T]) {\n  243 |     static GEOM_STATS: OnceLock<Result<(), ()>> = OnceLock::new();\n  244 | \n  245 |     if GEOM_STATS\n  246 |         .get_or_init(|| unsafe { initialize_geom() })\n  247 |         .is_err()\n  248 |     {\n  249 |         return;\n  250 |     }","lines":9,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/freebsd/disk.rs#L242-L250"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"FreeBSD `open_files()` computes `len = len * 4 / 3` (multiply then divide) on a `size_t` byte count. For an extremely large initial `len` this multiplication could overflow `usize` before the divide. More importantly the comment justifies the magic 4/3 by citing libutil but the resulting `len` is then passed as the *buffer size* to a second `get_sysctl_raw` while the allocation was made for the *original* `len`; the enlarged `len` tells the kernel the buffer is bigger than it actually is, so the kernel may write past the `malloc(len)` allocation.","fix":"Allocate the buffer using the enlarged length (`len * 4 / 3`) before the second sysctl, or pass the original allocation size; use `checked_mul`/`saturating_mul` for the 4/3 scaling.","locations":[{"ref":"src/unix/bsd/freebsd/process.rs:79-89","code":"   79 |             let Some(data) = AllocatedPtr::<()>::new(len) else {\n   80 |                 sysinfo_debug!(\"Failed to allocate memory to get `open_files` info\");\n   81 |                 return None;\n   82 |             };\n   83 |             // No clue why, it's done this way in `freebsd/lib/libutil/kinfo_getfile.c` so I suppose\n   84 |             // they have a good reason...\n   85 |             len = len * 4 / 3;\n   86 |             if get_sysctl_raw(mib, data.0, &mut len).is_none() {\n   87 |                 sysinfo_debug!(\"Couldn't retrieve `open_files` data\");\n   88 |                 return None;\n   89 |             }","lines":11,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/freebsd/process.rs#L79-L89"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`get_uid_and_gid` requests a read capacity of `16_385` (an off-by-one-looking magic number used in\nseveral `get_all_utf8_data` calls) but, more importantly, the `f` closure parses the real uid/gid\nwith `ids.nth(1).unwrap_or(\"0\").parse().ok()` - on a malformed `Uid:`/`Gid:` line with fewer than 2\nwhitespace fields it silently substitutes `0` (root) as the value rather than treating the line as\ninvalid. A truncated/garbled status line could thus cause a process to be reported as owned by\nuid/gid 0.","fix":"On a missing field, return `(None, None)` (treat the line as not-found) instead of defaulting the\nnumeric value to \"0\". Also align the `16_385` capacity constant with the others (`16_384`/`16_635`)\n- it appears to be a typo.","locations":[{"ref":"src/unix/linux/process.rs:1026-1043","code":" 1026 | fn get_uid_and_gid(file_path: &Path) -> Option<((uid_t, uid_t), (gid_t, gid_t))> {\n 1027 |     let status_data = get_all_utf8_data(file_path, 16_385).ok()?;\n 1028 | \n 1029 |     // We're only interested in the lines starting with Uid: and Gid:\n 1030 |     // here. From these lines, we're looking at the first and second entries to get\n 1031 |     // the real u/gid.\n 1032 | \n 1033 |     let f = |h: &str, n: &str| -> (Option<uid_t>, Option<uid_t>) {\n 1034 |         if h.starts_with(n) {\n 1035 |             let mut ids = h.split_whitespace();\n 1036 |             let real = ids.nth(1).unwrap_or(\"0\").parse().ok();\n 1037 |             let effective = ids.next().unwrap_or(\"0\").parse().ok();\n 1038 | \n 1039 |             (real, effective)\n 1040 |         } else {\n 1041 |             (None, None)\n 1042 |         }\n 1043 |     };","lines":18,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/process.rs#L1026-L1043"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"`boot_time()` casts `boot_time.tv_sec as _` to `u64` without checking sign; a negative `tv_sec`\n(should never happen, but the kernel value is `time_t`/`i64`) would wrap to a huge `u64`, and\n`uptime()` then computes `difftime(now, huge)` yielding a nonsensical negative-cast uptime. Minor\nrobustness gap.","fix":"Clamp `tv_sec` to `>= 0` before casting to `u64`.","locations":[{"ref":"src/unix/apple/system.rs:99-122","code":"   99 | fn boot_time() -> Result<u64, crate::Error> {\n  100 |     let mut boot_time = timeval {\n  101 |         tv_sec: 0,\n  102 |         tv_usec: 0,\n  103 |     };\n  104 |     let mut len = std::mem::size_of::<timeval>();\n  105 |     let mut mib: [c_int; 2] = [libc::CTL_KERN, libc::KERN_BOOTTIME];\n  106 | \n  107 |     unsafe {\n  108 |         if sysctl(\n  109 |             mib.as_mut_ptr(),\n  110 |             mib.len() as _,\n  111 |             &mut boot_time as *mut timeval as *mut _,\n  112 |             &mut len,\n  113 |             std::ptr::null_mut(),\n  114 |             0,\n  115 |         ) < 0\n  116 |         {\n  117 |             Err(crate::Error::from(\"sysctl failed\"))\n  118 |         } else {\n  119 |             Ok(boot_time.tv_sec as _)\n  120 |         }\n  121 |     }\n  122 | }","lines":24,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/system.rs#L99-L122"},{"ref":"src/unix/apple/system.rs:371-377","code":"  371 |     pub(crate) fn uptime() -> Result<u64, crate::Error> {\n  372 |         unsafe {\n  373 |             let csec = libc::time(::std::ptr::null_mut());\n  374 | \n  375 |             Ok(libc::difftime(csec, Self::boot_time()? as _) as _)\n  376 |         }\n  377 |     }","lines":7,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/system.rs#L371-L377"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":true,"description":"`os_version` builds the major version from `CurrentMajorVersionNumber` read as little-endian\nbytes via `get_reg_value_u32(...).unwrap_or_default()`. On older Windows where that registry\nvalue does not exist, this silently yields major `0` (e.g. \"0 (build)\"), rather than falling\nback to a sensible value derived from the build number.","fix":"Detect the missing value and fall back (e.g. derive 10 from the build number, or report it as unknown) instead of defaulting the major version to 0.","locations":[{"ref":"src/windows/system.rs:398-418","code":"  398 |     pub(crate) fn os_version() -> Option<String> {\n  399 |         let build_number = get_reg_string_value(\n  400 |             HKEY_LOCAL_MACHINE,\n  401 |             r\"SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\",\n  402 |             \"CurrentBuildNumber\",\n  403 |         )\n  404 |         .unwrap_or_default();\n  405 |         let major = if Self::is_windows_eleven() {\n  406 |             11u32\n  407 |         } else {\n  408 |             u32::from_le_bytes(\n  409 |                 get_reg_value_u32(\n  410 |                     HKEY_LOCAL_MACHINE,\n  411 |                     r\"SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\",\n  412 |                     \"CurrentMajorVersionNumber\",\n  413 |                 )\n  414 |                 .unwrap_or_default(),\n  415 |             )\n  416 |         };\n  417 |         Some(format!(\"{major} ({build_number})\"))\n  418 |     }","lines":21,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/system.rs#L398-L418"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"`update_networks` does `let mut buf = Vec::with_capacity(len); buf.set_len(len);` then passes\n`buf.as_mut_ptr()` to `sysctl`. Between the two `sysctl` calls the routing table can grow, so the\nsecond call may need more than `len` bytes; `sysctl` will then fail with ENOMEM (handled), but if it\ninstead returns a `len` *smaller* than allocated, the subsequent pointer walk uses the kernel-updated\n`len` so that is fine. The real hazard is `buf.set_len(len)` on uninitialized memory followed by\ntreating it as `*const c_char` and walking it via `(*ifm).ifm_msglen`; a zero or corrupt `ifm_msglen`\nmakes `next = next.offset(0)` an infinite loop, and a value pushing `next` past `lim` is only caught\nby the `while next < lim` check *after* the dereference, so a final truncated record can be read OOB.","fix":"Guard against `ifm_msglen == 0` (break/return) and verify `next.offset(ifm_msglen) <= lim` before dereferencing the next header.","locations":[{"ref":"src/unix/apple/network.rs:122-144","code":"  122 |             }\n  123 |             let mut buf = Vec::with_capacity(len);\n  124 |             buf.set_len(len);\n  125 |             if sysctl(\n  126 |                 mib.as_mut_ptr(),\n  127 |                 mib.len() as _,\n  128 |                 buf.as_mut_ptr(),\n  129 |                 &mut len,\n  130 |                 null_mut(),\n  131 |                 0,\n  132 |             ) < 0\n  133 |             {\n  134 |                 // TODO: might be nice to put an error in here...\n  135 |                 return;\n  136 |             }\n  137 |             let buf = buf.as_ptr() as *const c_char;\n  138 |             let lim = buf.add(len);\n  139 |             let mut next = buf;\n  140 | \n  141 |             while next < lim {\n  142 |                 let ifm = next as *const libc::if_msghdr;\n  143 |                 next = next.offset((*ifm).ifm_msglen as isize);\n  144 |                 if (*ifm).ifm_type == RTM_IFINFO2 as u8 {","lines":23,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/network.rs#L122-L144"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`get_idle` dereferences `cpu_info.offset(...)` without first checking the corresponding\n`num_cpu_info` bound, and `compute_usage_of_cpu` indexes `old_cpu_info`/`cpu_info` at `offset`\nderived from the current cpu list length. If `host_processor_info` ever returns fewer CPU entries\nthan the cached `cpus` vector (e.g. a CPU goes offline between `init_cpus` and a later refresh, or\nthe two `host_processor_info` calls disagree), the loop in `CpusWrapper::refresh` reads past the end\nof the kernel-allocated `cpu_info` buffer (out-of-bounds read). There is no length reconciliation\nbetween `cpus.len()` and `num_cpu_info`.","fix":"Bound the per-CPU loop by `min(cpus.len(), num_cpu_info as usize / CPU_STATE_MAX)` and pass `num_cpu_info` into the closure so offsets cannot exceed the buffer.","locations":[{"ref":"src/unix/apple/cpu.rs:51-66","code":"   51 |         if refresh_kind.usage() && need_cpu_usage_update {\n   52 |             self.last_update = Some(Instant::now());\n   53 |             update_cpu_usage(port, &mut self.global_cpu, |proc_data, cpu_info| {\n   54 |                 let mut percentage = 0f32;\n   55 |                 let mut offset = 0;\n   56 |                 for proc_ in cpus.iter_mut() {\n   57 |                     let cpu_usage = compute_usage_of_cpu(proc_, cpu_info, offset);\n   58 |                     proc_.inner.update(cpu_usage, Arc::clone(&proc_data));\n   59 |                     percentage += proc_.inner.cpu_usage();\n   60 | \n   61 |                     offset += libc::CPU_STATE_MAX as isize;\n   62 |                 }\n   63 |                 (percentage, cpus.len())\n   64 |             });\n   65 |         }\n   66 |     }","lines":16,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/cpu.rs#L51-L66"},{"ref":"src/unix/apple/cpu.rs:245-259","code":"  245 | #[inline]\n  246 | fn get_in_use(cpu_info: *mut i32, offset: isize) -> i64 {\n  247 |     unsafe {\n  248 |         let user = *cpu_info.offset(offset + libc::CPU_STATE_USER as isize) as i64;\n  249 |         let system = *cpu_info.offset(offset + libc::CPU_STATE_SYSTEM as isize) as i64;\n  250 |         let nice = *cpu_info.offset(offset + libc::CPU_STATE_NICE as isize) as i64;\n  251 | \n  252 |         user.saturating_add(system).saturating_add(nice)\n  253 |     }\n  254 | }\n  255 | \n  256 | #[inline]\n  257 | fn get_idle(cpu_info: *mut i32, offset: isize) -> i32 {\n  258 |     unsafe { *cpu_info.offset(offset + libc::CPU_STATE_IDLE as isize) }\n  259 | }","lines":15,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/cpu.rs#L245-L259"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`get_sysctl_str` calls `buf.set_len(len)` on a `Vec` created with `Vec::with_capacity(len)` after a\nsecond `sysctlbyname`, but `len` is updated by that second call and could in principle exceed the\noriginal capacity if the underlying value grew between the size query and the fetch. If `len` grows,\n`set_len` would set the length beyond the allocated capacity, leading to reads of uninitialized /\nout-of-bounds memory. The size query and the value fetch are not atomic.","fix":"Re-check that the returned `len` does not exceed the buffer capacity before `set_len`, or pass the capacity as the in/out length to the second call and clamp.","locations":[{"ref":"src/unix/apple/cpu.rs:369-402","code":"  369 | pub(crate) fn get_sysctl_str(s: &[u8]) -> String {\n  370 |     let mut len = 0;\n  371 | \n  372 |     unsafe {\n  373 |         libc::sysctlbyname(\n  374 |             s.as_ptr() as *const c_char,\n  375 |             std::ptr::null_mut(),\n  376 |             &mut len,\n  377 |             std::ptr::null_mut(),\n  378 |             0,\n  379 |         );\n  380 |         if len < 1 {\n  381 |             return String::new();\n  382 |         }\n  383 | \n  384 |         let mut buf = Vec::with_capacity(len);\n  385 |         libc::sysctlbyname(\n  386 |             s.as_ptr() as *const c_char,\n  387 |             buf.as_mut_ptr() as _,\n  388 |             &mut len,\n  389 |             std::ptr::null_mut(),\n  390 |             0,\n  391 |         );\n  392 |         if len > 0 {\n  393 |             buf.set_len(len);\n  394 |             while buf.last() == Some(&b'\\0') {\n  395 |                 buf.pop();\n  396 |             }\n  397 |             String::from_utf8(buf).unwrap_or_else(|_| String::new())\n  398 |         } else {\n  399 |             String::new()\n  400 |         }\n  401 |     }\n  402 | }","lines":34,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/cpu.rs#L369-L402"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`IoService::drop` calls `IOServiceClose(self.0)` outside any `unsafe` block and without checking the\nreturn code. More importantly, `IOServiceClose` is an FFI call and the `Drop` impl is the only place\nthat releases the SMC connection; if `IOServiceOpen` ever returned a connection that was already\nhalf-torn-down this would be a double-close. The result is also silently discarded so a failed close\n(leaked port right) is invisible even in debug builds.","fix":"Wrap the call in `unsafe`, and at least `sysinfo_debug!` on a non-`kIOReturnSuccess` result so leaks during teardown are observable.","locations":[{"ref":"src/unix/apple/macos/component/x86.rs:384-388","code":"  384 | impl Drop for IoService {\n  385 |     fn drop(&mut self) {\n  386 |         IOServiceClose(self.0);\n  387 |     }\n  388 | }","lines":5,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/component/x86.rs#L384-L388"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`get_process_infos` does `Vec::with_capacity(arg_max)` then writes into it via\n`proc_args.as_mut_slice().as_mut_ptr()` and later `proc_args.set_len(arg_max)`. `as_mut_slice()` on a\nzero-length Vec yields an empty slice whose pointer is valid for 0 bytes; the code relies on the\nallocation backing `with_capacity` being writable for `arg_max` bytes, which is true, but writing\nthrough a pointer derived from a zero-length slice is questionable provenance. After the call,\n`set_len(arg_max)` is used even though `sysctl` updates `arg_max` to the *actual* bytes written, which\nmay be smaller -- so trailing uninitialized bytes are included in `proc_args`. They are only ever\nparsed up to null terminators so it is usually harmless, but it formally exposes uninitialized memory.","fix":"Use `proc_args.as_mut_ptr()` directly, and `set_len` to the byte count actually returned by the second `sysctl` (the updated `arg_max`) rather than the originally requested size.","locations":[{"ref":"src/unix/apple/macos/process.rs:590-611","code":"  590 |         let mut proc_args: Vec<u8> = Vec::with_capacity(arg_max as _);\n  591 |         if libc::sysctl(\n  592 |             mib.as_mut_ptr(),\n  593 |             mib.len() as _,\n  594 |             proc_args.as_mut_slice().as_mut_ptr() as *mut _,\n  595 |             &mut arg_max,\n  596 |             std::ptr::null_mut(),\n  597 |             0,\n  598 |         ) == -1\n  599 |         {\n  600 |             sysinfo_debug!(\n  601 |                 \"couldn't get arguments and environment for PID {}\",\n  602 |                 process.pid.0\n  603 |             );\n  604 |             return false; // What changed since the previous call? Dark magic!\n  605 |         }\n  606 | \n  607 |         proc_args.set_len(arg_max);\n  608 | \n  609 |         if proc_args.is_empty() {\n  610 |             return false;\n  611 |         }","lines":22,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/process.rs#L590-L611"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Every FFI function in c_interface.rs uses `assert!(!ptr.is_null())`. A failed assert panics, and panicking across an `extern \"C\"` boundary is undefined behavior (or an abort with the default panic runtime). Returning a null/sentinel or aborting deliberately would be safer than relying on unwind-through-FFI.","fix":"Replace `assert!` with an explicit early `return` of a sentinel value (mirroring the existing null-checks in sysinfo_cpus_usage), or call `std::process::abort()` so no unwinding crosses the FFI boundary.","locations":[{"ref":"src/c_interface.rs:40-44","code":"   40 | pub extern \"C\" fn sysinfo_destroy(system: CSystem) {\n   41 |     assert!(!system.is_null());\n   42 |     unsafe {\n   43 |         drop(Box::from_raw(system as *mut System));\n   44 |     }","lines":5,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/c_interface.rs#L40-L44"},{"ref":"src/c_interface.rs:435-438","code":"  435 | pub extern \"C\" fn sysinfo_process_pid(process: CProcess) -> PID {\n  436 |     assert!(!process.is_null());\n  437 |     let process = process as *const Process;\n  438 |     unsafe { (*process).pid().0 as _ }","lines":4,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/c_interface.rs#L435-L438"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`ProcessorCpuLoadInfo::drop` unmaps the kernel-returned buffer with `munmap(self.cpu_load, vm_page_size)`,\ni.e. it always unmaps exactly one page regardless of how large the `host_processor_info` allocation\nactually was. For machines with many CPUs the load-info array can span more than one page, so this\nleaks the remaining pages on each drop. (Compare `CpuData::drop` in cpu.rs which computes the real\nsize, albeit with its own overflow concern.)","fix":"Track the returned `info_size`/`cpu_count` and unmap the full byte length (`cpu_count * size_of::<processor_cpu_load_info>()`, page-rounded) instead of a single `vm_page_size`.","locations":[{"ref":"src/unix/apple/macos/system.rs:47-53","code":"   47 | impl Drop for ProcessorCpuLoadInfo {\n   48 |     fn drop(&mut self) {\n   49 |         unsafe {\n   50 |             munmap(self.cpu_load as _, vm_page_size);\n   51 |         }\n   52 |     }\n   53 | }","lines":7,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/system.rs#L47-L53"},{"ref":"src/unix/apple/macos/system.rs:19-44","code":"   19 |     fn new(port: mach_port_t) -> Option<Self> {\n   20 |         let mut info_size = std::mem::size_of::<processor_cpu_load_info_t>() as _;\n   21 |         let mut cpu_count = 0;\n   22 |         let mut cpu_load: processor_cpu_load_info_t = null_mut();\n   23 | \n   24 |         unsafe {\n   25 |             if host_processor_info(\n   26 |                 port,\n   27 |                 PROCESSOR_CPU_LOAD_INFO,\n   28 |                 &mut cpu_count,\n   29 |                 &mut cpu_load as *mut _ as *mut _,\n   30 |                 &mut info_size,\n   31 |             ) != 0\n   32 |             {\n   33 |                 sysinfo_debug!(\"host_processor_info failed, not updating CPU ticks usage...\");\n   34 |                 None\n   35 |             } else if cpu_count < 1 || cpu_load.is_null() {\n   36 |                 None\n   37 |             } else {\n   38 |                 Some(Self {\n   39 |                     cpu_load,\n   40 |                     cpu_count,\n   41 |                 })\n   42 |             }\n   43 |         }\n   44 |     }","lines":26,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/system.rs#L19-L44"}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`get_users` performs several `std::mem::transmute::<_, &CFString>(...)` conversions relying on\ntoll-free bridging between `NSString` and `CFString`, with `#[allow(clippy::missing_transmute_annotations)]`.\nThese untyped transmutes are brittle: if the upstream `objc2-open-directory` attribute constant types\nchange, the transmute silently reinterprets a pointer of the wrong type. There is no runtime check.","fix":"Use the typed bridging API (`CFRetained`/`as_ref` conversions) provided by objc2 instead of raw `transmute`, or at minimum add explicit type annotations and a comment asserting the layout invariant.","locations":[{"ref":"src/unix/apple/users.rs:50-61","code":"   50 |         #[allow(clippy::missing_transmute_annotations)]\n   51 |         let attributes: CFRetained<CFArray<CFString>> = CFArray::from_objects(&[\n   52 |             // NSString <-> CFString conversion is \"toll-free bridging\".\n   53 |             std::mem::transmute::<_, &CFString>(attr_name),\n   54 |             std::mem::transmute::<_, &CFString>(attr_uid),\n   55 |             std::mem::transmute::<_, &CFString>(attr_gid),\n   56 |         ]);\n   57 |         let Some(query) = ODQueryRef::with_node(\n   58 |             kCFAllocatorDefault,\n   59 |             node_ref.as_deref(),\n   60 |             // NSString <-> CFString conversion is \"toll-free bridging\".\n   61 |             kODRecordTypeUsers.map(|v| std::mem::transmute(v)),","lines":12,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/users.rs#L50-L61"}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"FreeBSD and NetBSD `physical_core_count()` both query `hw.ncpu`, which is the number of *logical* CPUs (includes SMT/hyperthreads), not physical cores. This makes `System::physical_core_count()` report the logical CPU count, duplicating the value already returned for logical CPUs and giving wrong results on SMT-enabled machines.","fix":"Derive physical cores from topology (e.g. parse `kern.sched.topology_spec` on FreeBSD) or document the limitation; `hw.ncpu` is logical count.","locations":[{"ref":"src/unix/bsd/freebsd/cpu.rs:154-164","code":"  154 | pub(crate) fn physical_core_count() -> Option<usize> {\n  155 |     let mut physical_core_count: u32 = 0;\n  156 | \n  157 |     unsafe {\n  158 |         if get_sys_value_by_name(b\"hw.ncpu\\0\", &mut physical_core_count) {\n  159 |             Some(physical_core_count as _)\n  160 |         } else {\n  161 |             None\n  162 |         }\n  163 |     }\n  164 | }","lines":11,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/freebsd/cpu.rs#L154-L164"},{"ref":"src/unix/bsd/netbsd/cpu.rs:148-158","code":"  148 | pub(crate) fn physical_core_count() -> Option<usize> {\n  149 |     let mut physical_core_count: u32 = 0;\n  150 | \n  151 |     unsafe {\n  152 |         if get_sys_value_by_name(b\"hw.ncpu\\0\", &mut physical_core_count) {\n  153 |             Some(physical_core_count as _)\n  154 |         } else {\n  155 |             None\n  156 |         }\n  157 |     }\n  158 | }","lines":11,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/cpu.rs#L148-L158"}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`get_sys_value_by_name` requires the returned length to exactly equal `size_of::<T>()` (`original == len`). For sysctls whose kernel value is wider than the requested `T` (common for counters exposed as 64-bit but read into a 32-bit `c_int`, e.g. `kern.maxfilesperproc`/`kern.maxfilesper` read into `u32`, or `kern.osrevision`), the call may legitimately succeed yet be rejected because `len` differs, silently returning `None`/0. This makes `open_files_limit()` and `kernel_version()` fragile across kernel versions.","fix":"Accept `len <= original` (the kernel returns the number of bytes written) rather than requiring exact equality, or size `T` to match the kernel's actual type.","locations":[{"ref":"src/unix/bsd/freebsd/utils.rs:122-137","code":"  122 | #[cfg(any(feature = \"system\", feature = \"component\"))]\n  123 | pub(crate) unsafe fn get_sys_value_by_name<T: Sized>(name: &[u8], value: &mut T) -> bool {\n  124 |     let mut len = std::mem::size_of::<T>() as libc::size_t;\n  125 |     let original = len;\n  126 | \n  127 |     unsafe {\n  128 |         libc::sysctlbyname(\n  129 |             name.as_ptr() as *const libc::c_char,\n  130 |             value as *mut _ as *mut _,\n  131 |             &mut len,\n  132 |             std::ptr::null_mut(),\n  133 |             0,\n  134 |         ) == 0\n  135 |             && original == len\n  136 |     }\n  137 | }","lines":16,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/freebsd/utils.rs#L122-L137"},{"ref":"src/unix/bsd/netbsd/utils.rs:153-168","code":"  153 | #[cfg(any(feature = \"system\", feature = \"component\"))]\n  154 | pub(crate) unsafe fn get_sys_value_by_name<T: Sized>(name: &[u8], value: &mut T) -> bool {\n  155 |     let mut len = std::mem::size_of::<T>() as libc::size_t;\n  156 |     let original = len;\n  157 | \n  158 |     unsafe {\n  159 |         libc::sysctlbyname(\n  160 |             name.as_ptr() as *const libc::c_char,\n  161 |             value as *mut _ as *mut _,\n  162 |             &mut len,\n  163 |             std::ptr::null_mut(),\n  164 |             0,\n  165 |         ) == 0\n  166 |             && original == len\n  167 |     }\n  168 | }","lines":16,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/netbsd/utils.rs#L153-L168"}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`Connection::temperature` reads the WMI `CurrentTemperature` (and `CriticalTripPoint`) values\nout of the VARIANT via `variant.Anonymous.decVal.Anonymous2.Lo64`. These properties are\ninteger VARIANTs (VT_I4/VT_UI4), whose value lives in the `lVal`/`ulVal` union member, not in\nthe `DECIMAL` (`decVal`) member. Reinterpreting the union as a DECIMAL and reading `Lo64`\nhappens to work only because the relevant bytes overlap, but it is not the documented field\nand is fragile against VARIANT layout assumptions. It also never inspects `vt` to confirm the\ntype.","fix":"Read the integer via the proper union member (e.g. `variant.Anonymous.Anonymous.Anonymous.lVal`) after checking `vt`, instead of going through `decVal`.","locations":[{"ref":"src/windows/component.rs:315-330","code":"  315 |             let mut variant = variant.assume_init();\n  316 | \n  317 |             // temperature is given in tenth of degrees Kelvin\n  318 |             let temp = (variant.Anonymous.decVal.Anonymous2.Lo64 / 10) as f32 - 273.15;\n  319 |             let _r = VariantClear(&mut variant);\n  320 | \n  321 |             let mut critical = None;\n  322 |             if get_critical {\n  323 |                 class_obj\n  324 |                     .Get(w!(\"CriticalTripPoint\"), 0, &mut variant, None, None)\n  325 |                     .ok()?;\n  326 | \n  327 |                 // temperature is given in tenth of degrees Kelvin\n  328 |                 critical = Some((variant.Anonymous.decVal.Anonymous2.Lo64 / 10) as f32 - 273.15);\n  329 |                 let _r = VariantClear(&mut variant);\n  330 |             }","lines":16,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/component.rs#L315-L330"}]},{"id":"API_12","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In `ph_query_process_variable_size`, `return_length` is only written by the first\n`NtQueryInformationProcess` call inside the `if let Err(err) = ...` block. If that call\nunexpectedly returns success (`Ok`), the `if let Err` is false, the block is skipped, and the\nfollowing `return_length.assume_init()` reads uninitialized memory. In practice a 0-length\nquery always fails with STATUS_INFO_LENGTH_MISMATCH, but relying on that for soundness is\nfragile.","fix":"Initialize `return_length` to 0 before the call, or explicitly return None if the first call returns Ok (which is unexpected for a 0-length buffer).","locations":[{"ref":"src/windows/process.rs:602-623","code":"  602 |     let mut return_length = MaybeUninit::<u32>::uninit();\n  603 | \n  604 |     unsafe {\n  605 |         if let Err(err) = NtQueryInformationProcess(\n  606 |             process_handle,\n  607 |             process_information_class as _,\n  608 |             null_mut(),\n  609 |             0,\n  610 |             return_length.as_mut_ptr() as *mut _,\n  611 |         )\n  612 |         .ok()\n  613 |             && ![\n  614 |                 STATUS_BUFFER_OVERFLOW.into(),\n  615 |                 STATUS_BUFFER_TOO_SMALL.into(),\n  616 |                 STATUS_INFO_LENGTH_MISMATCH.into(),\n  617 |             ]\n  618 |             .contains(&err.code())\n  619 |         {\n  620 |             return None;\n  621 |         }\n  622 | \n  623 |         let mut return_length = return_length.assume_init();","lines":22,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/process.rs#L602-L623"}]},{"id":"API_13","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In `get_users`, `std::slice::from_raw_parts_mut(uids.0, nb_sessions as _)` is called\nunconditionally after `LsaEnumerateLogonSessions` succeeds. If the call reports 0 sessions and\nleaves `uids.0` null (allowed by the API contract), constructing a slice from a null pointer is\nundefined behavior even for length 0.","fix":"Guard with `if nb_sessions != 0 && !uids.0.is_null()` before forming the slice.","locations":[{"ref":"src/windows/users.rs:235-240","code":"  235 |         let mut nb_sessions = 0;\n  236 |         let mut uids: LsaBuffer<LUID> = Default::default();\n  237 |         if LsaEnumerateLogonSessions(&mut nb_sessions, uids.inner_mut()).is_err() {\n  238 |             sysinfo_debug!(\"LsaEnumerateLogonSessions failed\");\n  239 |         } else {\n  240 |             let entries = std::slice::from_raw_parts_mut(uids.0, nb_sessions as _);","lines":6,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/users.rs#L235-L240"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`/proc/cpuinfo` is read and parsed redundantly. On the very first CPU refresh, `get_vendor_id_and_brand`\nreads and parses the entire `/proc/cpuinfo`; then for each CPU core, `get_cpu_frequency` is called\n(in parallel) and, whenever `scaling_cur_freq` is missing (common on VMs/containers/ARM), each call\nre-opens and re-reads the whole `/proc/cpuinfo` again and linearly scans it. For an N-core machine\nwithout `cpufreq` sysfs this is N full reads+parses of `/proc/cpuinfo` per frequency refresh, plus\nthe separate vendor/brand read.","fix":"Read `/proc/cpuinfo` once per refresh and pass the parsed per-core MHz map down, instead of\nre-reading the file inside `get_cpu_frequency` for every core. Cache the parsed cpuinfo for the\nduration of a single `refresh`.","locations":[{"ref":"src/unix/linux/cpu.rs:441-475","code":"  441 | pub(crate) fn get_cpu_frequency(cpu_core_index: usize) -> u64 {\n  442 |     let mut s = String::new();\n  443 |     if File::open(format!(\n  444 |         \"/sys/devices/system/cpu/cpu{cpu_core_index}/cpufreq/scaling_cur_freq\",\n  445 |     ))\n  446 |     .and_then(|mut f| f.read_to_string(&mut s))\n  447 |     .is_ok()\n  448 |     {\n  449 |         let freq_option = s.trim().split('\\n').next();\n  450 |         if let Some(freq_string) = freq_option\n  451 |             && let Ok(freq) = freq_string.parse::<u64>()\n  452 |         {\n  453 |             return freq / 1000;\n  454 |         }\n  455 |     }\n  456 |     s.clear();\n  457 |     if File::open(\"/proc/cpuinfo\")\n  458 |         .and_then(|mut f| f.read_to_string(&mut s))\n  459 |         .is_err()\n  460 |     {\n  461 |         return 0;\n  462 |     }\n  463 |     let find_cpu_mhz = s.split('\\n').find(|line| {\n  464 |         cpuinfo_is_key(line, b\"cpu MHz\\t\")\n  465 |             || cpuinfo_is_key(line, b\"CPU MHz\\t\")\n  466 |             || cpuinfo_is_key(line, b\"BogoMIPS\")\n  467 |             || cpuinfo_is_key(line, b\"clock\\t\")\n  468 |             || cpuinfo_is_key(line, b\"bogomips per cpu\")\n  469 |     });\n  470 |     find_cpu_mhz\n  471 |         .and_then(|line| line.split(':').next_back())\n  472 |         .and_then(|val| val.replace(\"MHz\", \"\").trim().parse::<f64>().ok())\n  473 |         .map(|speed| speed as u64)\n  474 |         .unwrap_or_default()\n  475 | }","lines":35,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/cpu.rs#L441-L475"},{"ref":"src/unix/linux/cpu.rs:757-766","code":"  757 | pub(crate) fn get_vendor_id_and_brand() -> HashMap<usize, (String, String)> {\n  758 |     let mut s = String::new();\n  759 |     if File::open(\"/proc/cpuinfo\")\n  760 |         .and_then(|mut f| f.read_to_string(&mut s))\n  761 |         .is_err()\n  762 |     {\n  763 |         return HashMap::new();\n  764 |     }\n  765 |     get_vendor_id_and_brand_inner(&s)\n  766 | }","lines":10,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/cpu.rs#L757-L766"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`arm::ComponentsInner::refresh` and `x86` both create fresh `CFString` keys on every refresh call\n(`CFString::from_static_str(...)` per refresh, and in the gpu code `CFString::from_str(\"Device\nUtilization %\")` etc. are allocated inside the per-device loop). These are constant keys that could be\ncreated once. The GPU loop allocates several CFStrings per accelerator per refresh.","fix":"Hoist constant CFString key creation out of the per-iteration/per-refresh paths (create once, reuse).","locations":[{"ref":"src/unix/apple/gpu.rs:152-154","code":"  152 |                     && let Some(usage) = usage_dict\n  153 |                         .get(&CFString::from_str(\"Device Utilization %\"))\n  154 |                         .or_else(|| usage_dict.get(&CFString::from_str(\"Device Utilization\")))","lines":3,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/gpu.rs#L152-L154"},{"ref":"src/unix/apple/macos/component/arm.rs:56-64","code":"   56 |         let keys = [\n   57 |             &*CFString::from_static_str(HID_DEVICE_PROPERTY_PRIMARY_USAGE_PAGE),\n   58 |             &*CFString::from_static_str(HID_DEVICE_PROPERTY_PRIMARY_USAGE),\n   59 |         ];\n   60 | \n   61 |         let nums = [\n   62 |             &*CFNumber::new_i32(kHIDPage_AppleVendor),\n   63 |             &*CFNumber::new_i32(kHIDUsage_AppleVendor_TemperatureSensor),\n   64 |         ];","lines":9,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/apple/macos/component/arm.rs#L56-L64"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`get_disks_mapping` re-queries and re-parses the entire `kern.geom.conftxt` sysctl text on every call to `get_all_list` (i.e. on every disk refresh), even though the disk->geom-label mapping is essentially static. For frequent disk refreshes this is wasted sysctl + string parsing work.","fix":"Cache the mapping (e.g. in a `OnceLock` or on the `DisksInner`) and only rebuild it when a new disk that is not yet mapped appears.","locations":[{"ref":"src/unix/bsd/freebsd/disk.rs:310-339","code":"  310 | fn get_disks_mapping() -> HashMap<String, String> {\n  311 |     let mut disk_mapping = HashMap::new();\n  312 |     let Some(mapping) = get_sys_value_str_by_name(b\"kern.geom.conftxt\\0\") else {\n  313 |         return disk_mapping;\n  314 |     };\n  315 | \n  316 |     let mut last_id = String::new();\n  317 | \n  318 |     for line in mapping.lines() {\n  319 |         let mut parts = line.split_whitespace();\n  320 |         let Some(kind) = parts.next() else { continue };\n  321 | \n  322 |         #[allow(clippy::collapsible_if)]\n  323 |         if kind == \"0\" {\n  324 |             if let Some(\"DISK\") = parts.next()\n  325 |                 && let Some(id) = parts.next()\n  326 |             {\n  327 |                 last_id.clear();\n  328 |                 last_id.push_str(id);\n  329 |             }\n  330 |         } else if kind == \"2\" && !last_id.is_empty() {\n  331 |             if let Some(\"LABEL\") = parts.next()\n  332 |                 && let Some(path) = parts.next()\n  333 |             {\n  334 |                 disk_mapping.insert(format!(\"/dev/{path}\"), last_id.clone());\n  335 |             }\n  336 |         }\n  337 |     }\n  338 |     disk_mapping\n  339 | }","lines":30,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/freebsd/disk.rs#L310-L339"},{"ref":"src/unix/bsd/freebsd/disk.rs:353","code":"  353 |     let disk_mapping = get_disks_mapping();","lines":1,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/freebsd/disk.rs#L353"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`refresh_networks_list_from_sysfs` reads each statistics file (rx_bytes, tx_bytes, rx_packets,\ntx_packets, rx_errors, tx_errors, mtu, operstate) with a separate `File::open`/`read` syscall pair\nper interface per refresh - 8 opens per interface every refresh cycle. This is a fixed set of small\nsysfs files; the cost is mostly syscall overhead but adds up with many interfaces and frequent\nrefreshes.","fix":"Acceptable as-is, but could be reduced by reading the combined per-interface counters (e.g. parsing `/proc/net/dev` once) rather than 8 individual sysfs opens per interface.","locations":[{"ref":"src/unix/linux/network.rs:93-105","code":"   93 |             let rx_bytes = read(parent, \"rx_bytes\", &mut num_buf);\n   94 |             let tx_bytes = read(parent, \"tx_bytes\", &mut num_buf);\n   95 |             let rx_packets = read(parent, \"rx_packets\", &mut num_buf);\n   96 |             let tx_packets = read(parent, \"tx_packets\", &mut num_buf);\n   97 |             let rx_errors = read(parent, \"rx_errors\", &mut num_buf);\n   98 |             let tx_errors = read(parent, \"tx_errors\", &mut num_buf);\n   99 |             // let rx_compressed = read(parent, \"rx_compressed\", &mut num_buf);\n  100 |             // let tx_compressed = read(parent, \"tx_compressed\", &mut num_buf);\n  101 |             let mtu = read(entry_path, \"mtu\", &mut num_buf);\n  102 | \n  103 |             let operational_state = InterfaceOperationalState::from_data(\n  104 |                 read_str(entry_path, \"operstate\", &mut str_buf).trim_ascii(),\n  105 |             );","lines":13,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/linux/network.rs#L93-L105"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`refresh_processes_specifics` rebuilds the `(filter_array, filter_callback)` pair and uses a\nboxed `dyn Fn` indirection (`real_filter`/`empty_filter`) for the common `ProcessesToUpdate::All`\ncase, invoking a virtual call per process. With hundreds/thousands of processes this is a\nneedless indirection on a hot path.","fix":"Match on `processes_to_update` once and run two specialized loop bodies, or pass a plain slice and check `filter.is_empty()` inline rather than via a trait object.","locations":[{"ref":"src/windows/system.rs:199-221","code":"  199 |         #[inline(always)]\n  200 |         fn real_filter(e: Pid, filter: &[Pid]) -> bool {\n  201 |             filter.contains(&e)\n  202 |         }\n  203 | \n  204 |         #[inline(always)]\n  205 |         fn empty_filter(_e: Pid, _filter: &[Pid]) -> bool {\n  206 |             true\n  207 |         }\n  208 | \n  209 |         #[allow(clippy::type_complexity)]\n  210 |         let (filter_array, filter_callback): (\n  211 |             &[Pid],\n  212 |             &(dyn Fn(Pid, &[Pid]) -> bool + Sync + Send),\n  213 |         ) = match processes_to_update {\n  214 |             ProcessesToUpdate::All => (&[], &empty_filter),\n  215 |             ProcessesToUpdate::Some(pids) => {\n  216 |                 if pids.is_empty() {\n  217 |                     return 0;\n  218 |                 }\n  219 |                 (pids, &real_filter)\n  220 |             }\n  221 |         };","lines":23,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/system.rs#L199-L221"},{"ref":"src/windows/system.rs:271","code":"  271 |             if filter_callback(proc_id, filter_array) {","lines":1,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/windows/system.rs#L271"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"sysinfo_processes returns `entries.len()` as the count after potentially breaking the callback loop early, so the returned size_t is the total process count rather than the number actually visited. Not incorrect per the doc (it documents the equivalent of `processes()`), but combined with early-break it can mislead callers who expect the count of visited entries. Worth clarifying.","fix":"Document that the return value is always the total number of processes regardless of early termination, or track and return the number of entries actually passed to the callback.","locations":[{"ref":"src/c_interface.rs:361-374","code":"  361 |     if let Some(fn_pointer) = fn_pointer {\n  362 |         unsafe {\n  363 |             let system: Box<System> = Box::from_raw(system as *mut System);\n  364 |             let len = {\n  365 |                 let entries = system.processes();\n  366 |                 for (pid, process) in entries {\n  367 |                     if !fn_pointer(pid.0 as _, process as *const Process as CProcess, data) {\n  368 |                         break;\n  369 |                     }\n  370 |                 }\n  371 |                 entries.len() as size_t\n  372 |             };\n  373 |             let _ = Box::into_raw(system);\n  374 |             len","lines":14,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/c_interface.rs#L361-L374"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`MacAddr::from_str` builds the parser as a lazy iterator of `Result`, pulls six\nitems via `let-else`, then checks for a 7th, then propagates each `?`. Functionally\ncorrect but the manual six-fold `parts.next()` unrolling is verbose and easy to\nget wrong; it also evaluates the radix parse for all parts even when an earlier\none is invalid (the deferred `?` masks which one). Not a correctness bug, just\nfragile/duplicative code.","fix":"Collect into a fixed-size array via `arrayvec`/`try_into`, or parse in a loop with an index bound check, to remove the repeated `let-else` blocks.","locations":[{"ref":"src/common/network.rs:468-497","code":"  468 |     fn from_str(s: &str) -> Result<Self, Self::Err> {\n  469 |         let mut parts = s\n  470 |             .split(':')\n  471 |             .map(|s| u8::from_str_radix(s, 16).map_err(MacAddrFromStrError::IntError));\n  472 | \n  473 |         let Some(data0) = parts.next() else {\n  474 |             return Err(MacAddrFromStrError::InvalidAddrFormat);\n  475 |         };\n  476 |         let Some(data1) = parts.next() else {\n  477 |             return Err(MacAddrFromStrError::InvalidAddrFormat);\n  478 |         };\n  479 |         let Some(data2) = parts.next() else {\n  480 |             return Err(MacAddrFromStrError::InvalidAddrFormat);\n  481 |         };\n  482 |         let Some(data3) = parts.next() else {\n  483 |             return Err(MacAddrFromStrError::InvalidAddrFormat);\n  484 |         };\n  485 |         let Some(data4) = parts.next() else {\n  486 |             return Err(MacAddrFromStrError::InvalidAddrFormat);\n  487 |         };\n  488 |         let Some(data5) = parts.next() else {\n  489 |             return Err(MacAddrFromStrError::InvalidAddrFormat);\n  490 |         };\n  491 | \n  492 |         if parts.next().is_some() {\n  493 |             return Err(MacAddrFromStrError::InvalidAddrFormat);\n  494 |         }\n  495 | \n  496 |         Ok(MacAddr([data0?, data1?, data2?, data3?, data4?, data5?]))\n  497 |     }","lines":30,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/common/network.rs#L468-L497"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`from_cstr_array` walks the NUL-terminated pointer array twice: once to count entries and once to build the `Vec`. For process argv/environ this is minor, but it could be a single pass that pushes as it walks (the only reason to pre-count is the `with_capacity`, which a small initial guess plus amortized growth would handle just as well).","fix":"Single-pass walk pushing each `OsString` until the NULL terminator.","locations":[{"ref":"src/unix/bsd/freebsd/utils.rs:177-203","code":"  177 | pub(crate) unsafe fn from_cstr_array(ptr: *const *const libc::c_char) -> Vec<OsString> {\n  178 |     if ptr.is_null() {\n  179 |         return Vec::new();\n  180 |     }\n  181 |     let mut max = 0;\n  182 |     loop {\n  183 |         unsafe {\n  184 |             let ptr = ptr.add(max);\n  185 |             if (*ptr).is_null() {\n  186 |                 break;\n  187 |             }\n  188 |         }\n  189 |         max += 1;\n  190 |     }\n  191 |     if max == 0 {\n  192 |         return Vec::new();\n  193 |     }\n  194 |     let mut ret = Vec::with_capacity(max);\n  195 | \n  196 |     for pos in 0..max {\n  197 |         unsafe {\n  198 |             let p = ptr.add(pos);\n  199 |             ret.push(OsStr::from_bytes(CStr::from_ptr(*p).to_bytes()).to_os_string());\n  200 |         }\n  201 |     }\n  202 |     ret\n  203 | }","lines":27,"link":"https://github.com/GuillaumeGomez/sysinfo/blob/071c430cb8aa4060e6d48ac8842fa8da0a167da1/src/unix/bsd/freebsd/utils.rs#L177-L203"},{"ref":"src/unix/bsd/netbsd/utils.rs:213-239","code":"  213 | pub(crate) unsafe fn from_cstr_array(ptr: *const *const libc::c_char) -> Vec<OsString> {\n  214 |     if ptr.is_null() {\n  215 |         return Vec::new();\n  216 |     }\n  217 |     let mut max = 0;\n  218 |     loop {\n  219 |         unsafe {\n  220 |             let ptr = ptr.add(max);\n  221 |             if (*ptr).is_null() {\n  222 |                 break;\n  223 |             }\n  224 |         }\n
