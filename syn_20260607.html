<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"low","description":"scope_delimiter and start_of_buffer both `unreachable!()` if a Cursor's `scope` pointer does not point at an Entry::End. This is an internal invariant (all cursors are created via create/begin/empty, whose scope is always an End entry), so it is not currently reachable. However scope_delimiter is pub(crate) and consumed by lookahead error formatting; if a future refactor ever constructs a Cursor whose scope is a non-End entry, these become a hard panic during error reporting rather than a graceful path. The invariant is undocumented at the call sites.","fix":"Add a short comment at each unreachable!() documenting the invariant 'scope always points at an Entry::End (see Cursor::create)', so future editors do not break it inadvertently.","locations":[{"ref":"src/buffer.rs:374-382","code":"  374 |     pub(crate) fn scope_delimiter(self) -> Delimiter {\n  375 |         match unsafe { &*self.scope } {\n  376 |             Entry::End(_, offset) => match unsafe { &*self.scope.offset(*offset) } {\n  377 |                 Entry::Group(group, _) => group.delimiter(),\n  378 |                 _ => Delimiter::None,\n  379 |             },\n  380 |             _ => unreachable!(),\n  381 |         }\n  382 |     }","lines":9},{"ref":"src/buffer.rs:419-426","code":"  419 | fn start_of_buffer(cursor: Cursor) -> *const Entry {\n  420 |     unsafe {\n  421 |         match &*cursor.scope {\n  422 |             Entry::End(offset, _) => cursor.scope.offset(*offset),\n  423 |             _ => unreachable!(),\n  424 |         }\n  425 |     }\n  426 | }","lines":8}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","description":"`multi_index` parses a field-access float token like `1.2` by splitting `float_repr` on '.' and feeding each part to `crate::parse_str::<Index>`. Each `Index::parse` runs `base10_digits().parse::<u32>()` (line 3042-3045). For a token such as `999999999999.0` the integer part exceeds u32 and produces a parse error that is surfaced as a normal syn error, which is fine; but note `multi_index` is reached from `trailer_helper` for any `<expr>.<float>` produced by proc-macro2 tokenization, so the u32 truncation boundary is externally driven. This is correctly returned as an Err (not a panic), so impact is limited; flagging the externally-derived integer parse for completeness.","fix":"No change required for correctness (overflow is reported as a parse error). Optionally document that tuple field indices are limited to u32 so callers are aware of the bound.","locations":[{"ref":"src/expr.rs:3054-3086","code":" 3054 |     fn multi_index(e: &mut Expr, dot_token: &mut Token![.], float: LitFloat) -> Result<bool> {\n 3055 |         let float_token = float.token();\n 3056 |         let float_span = float_token.span();\n 3057 |         let mut float_repr = float_token.to_string();\n 3058 |         let trailing_dot = float_repr.ends_with('.');\n 3059 |         if trailing_dot {\n 3060 |             float_repr.truncate(float_repr.len() - 1);\n 3061 |         }\n 3062 | \n 3063 |         let mut offset = 0;\n 3064 |         for part in float_repr.split('.') {\n 3065 |             let mut index: Index =\n 3066 |                 crate::parse_str(part).map_err(|err| Error::new(float_span, err))?;\n 3067 |             let part_end = offset + part.len();\n 3068 |             index.span = float_token.subspan(offset..part_end).unwrap_or(float_span);\n 3069 | \n 3070 |             let base = mem::replace(e, Expr::PLACEHOLDER);\n 3071 |             *e = Expr::Field(ExprField {\n 3072 |                 attrs: Vec::new(),\n 3073 |                 base: Box::new(base),\n 3074 |                 dot_token: Token![.](dot_token.span),\n 3075 |                 member: Member::Unnamed(index),\n 3076 |             });\n 3077 | \n 3078 |             let dot_span = float_token\n 3079 |                 .subspan(part_end..part_end + 1)\n 3080 |                 .unwrap_or(float_span);\n 3081 |             *dot_token = Token![.](dot_span);\n 3082 |             offset = part_end + 1;\n 3083 |         }\n 3084 | \n 3085 |         Ok(!trailing_dot)\n 3086 |     }","lines":33},{"ref":"src/expr.rs:3037-3052","code":" 3037 |     impl Parse for Index {\n 3038 |         fn parse(input: ParseStream) -> Result<Self> {\n 3039 |             let lit: LitInt = input.parse()?;\n 3040 |             if lit.suffix().is_empty() {\n 3041 |                 Ok(Index {\n 3042 |                     index: lit\n 3043 |                         .base10_digits()\n 3044 |                         .parse()\n 3045 |                         .map_err(|err| Error::new(lit.span(), err))?,\n 3046 |                     span: lit.span(),\n 3047 |                 })\n 3048 |             } else {\n 3049 |                 Err(Error::new(lit.span(), \"expected unsuffixed integer\"))\n 3050 |             }\n 3051 |         }\n 3052 |     }","lines":16}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","description":"`xid_ok` calls `chars.next().unwrap()` on the first character, assuming the\ninput is never empty. It is a `pub(crate)` helper; every current caller happens\nto guarantee a non-empty slice (the float/int suffix paths guard with\n`suffix.is_empty() ||` and `Lifetime::new` rejects the lone `'` first), so the\npanic is not reachable today. But the invariant is implicit and undocumented:\nany future caller passing an empty string would hit an index-style panic rather\nthan getting `false`. The function would be both safer and more obviously\ncorrect using `chars.next()` with a match/`?`-style early return.","fix":"Handle the empty case explicitly, e.g.:\n`let Some(first) = chars.next() else { return false; };`\nThis makes the \"empty is not a valid identifier\" decision local and removes the\nlatent panic, with no behavior change for existing callers.","locations":[{"ref":"src/ident.rs:37-49","code":"   37 | pub(crate) fn xid_ok(symbol: &str) -> bool {\n   38 |     let mut chars = symbol.chars();\n   39 |     let first = chars.next().unwrap();\n   40 |     if !(first == '_' || unicode_ident::is_xid_start(first)) {\n   41 |         return false;\n   42 |     }\n   43 |     for ch in chars {\n   44 |         if !unicode_ident::is_xid_continue(ch) {\n   45 |             return false;\n   46 |         }\n   47 |     }\n   48 |     true\n   49 | }","lines":13}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"`Members::next` increments a `u32` index with `self.index += 1` without checked arithmetic. A struct/variant with more than u32::MAX fields would overflow (panic in debug, wrap in release). This is not reachable in practice since such an input could never be parsed or compiled, so impact is negligible.","fix":"No change needed; field counts are bounded far below u32::MAX in any real input.","locations":[{"ref":"src/data.rs:206","code":"  206 | }","lines":1},{"ref":"src/data.rs:226","code":"  226 |         self.index += 1;","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`impl From<usize> for Index` asserts `index < u32::MAX as usize`, which rejects exactly `u32::MAX`. The `Index::index` field is a `u32`, so the full valid range is `0..=u32::MAX`; the strict `<` makes the largest representable tuple index (`u32::MAX`) panic even though it fits. This is an off-by-one in the bound and is inconsistent with the field's actual capacity.","fix":"Use an inclusive bound: `assert!(index <= u32::MAX as usize);` (or `u32::try_from(index).expect(...)`), so the full u32 range is accepted.","locations":[{"ref":"src/expr.rs:1060-1068","code":" 1060 | impl From<usize> for Index {\n 1061 |     fn from(index: usize) -> Index {\n 1062 |         assert!(index < u32::MAX as usize);\n 1063 |         Index {\n 1064 |             index: index as u32,\n 1065 |             span: Span::call_site(),\n 1066 |         }\n 1067 |     }\n 1068 | }","lines":9}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"Token matching uses byte length `token.len()` as the terminal-character index while iterating over `token.chars()`. The two only agree because every token literal fed in via the `define_punctuation!` / `Token!` macros is pure ASCII. This is a latent coupling: if any non-ASCII punctuation token were ever added, `i == token.len() - 1` would no longer mark the final char, silently breaking parse/peek/print. The same byte-vs-char assumption appears in `printing::punct` (asserts `s.len() == spans.len()`). Not a live bug given the current ASCII-only token set.","fix":"Either count chars (`token.chars().count()`) for the terminal-index comparison, or document/enforce the ASCII-only invariant on the token literals. Lowest-risk fix is to compute `let last = token.chars().count() - 1;` once and compare `i == last`.","locations":[{"ref":"src/token.rs:1015-1030","code":" 1015 |             for (i, ch) in token.chars().enumerate() {\n 1016 |                 match cursor.punct() {\n 1017 |                     Some((punct, rest)) => {\n 1018 |                         spans[i] = punct.span();\n 1019 |                         if punct.as_char() != ch {\n 1020 |                             break;\n 1021 |                         } else if i == token.len() - 1 {\n 1022 |                             return Ok(((), rest));\n 1023 |                         } else if punct.spacing() != Spacing::Joint {\n 1024 |                             break;\n 1025 |                         }\n 1026 |                         cursor = rest;\n 1027 |                     }\n 1028 |                     None => break,\n 1029 |                 }\n 1030 |             }","lines":16},{"ref":"src/token.rs:1037-1054","code":" 1037 |     pub fn peek_punct(mut cursor: Cursor, token: &str) -> bool {\n 1038 |         for (i, ch) in token.chars().enumerate() {\n 1039 |             match cursor.punct() {\n 1040 |                 Some((punct, rest)) => {\n 1041 |                     if punct.as_char() != ch {\n 1042 |                         break;\n 1043 |                     } else if i == token.len() - 1 {\n 1044 |                         return true;\n 1045 |                     } else if punct.spacing() != Spacing::Joint {\n 1046 |                         break;\n 1047 |                     }\n 1048 |                     cursor = rest;\n 1049 |                 }\n 1050 |                 None => break,\n 1051 |             }\n 1052 |         }\n 1053 |         false\n 1054 |     }","lines":18},{"ref":"src/token.rs:1067-1078","code":" 1067 |         assert_eq!(s.len(), spans.len());\n 1068 | \n 1069 |         let mut chars = s.chars();\n 1070 |         let mut spans = spans.iter();\n 1071 |         let ch = chars.next_back().unwrap();\n 1072 |         let span = spans.next_back().unwrap();\n 1073 |         for (ch, span) in chars.zip(spans) {\n 1074 |             tokens.append(Punct::new_spanned(ch, Spacing::Joint, *span));\n 1075 |         }\n 1076 | \n 1077 |         tokens.append(Punct::new_spanned(ch, Spacing::Alone, *span));\n 1078 |     }","lines":12}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","description":"In `punct_helper`, on a character mismatch the loop writes `spans[i] = punct.span()` before checking `punct.as_char() != ch`, so when it breaks and constructs the error it reports `spans[0]`, which for a multi-char token may have just been overwritten by the span of a partially-matched punct rather than the start of the expected token. Only affects the diagnostic span of an already-failing parse, never correctness.","fix":"Capture the original start span (e.g. `let begin = input.span();`) and use it in `Error::new` instead of `spans[0]`, or perform the `as_char` check before mutating `spans[i]`.","locations":[{"ref":"src/token.rs:1010-1033","code":" 1010 |     fn punct_helper(input: ParseStream, token: &str, spans: &mut [Span]) -> Result<()> {\n 1011 |         input.step(|cursor| {\n 1012 |             let mut cursor = *cursor;\n 1013 |             assert_eq!(token.len(), spans.len());\n 1014 | \n 1015 |             for (i, ch) in token.chars().enumerate() {\n 1016 |                 match cursor.punct() {\n 1017 |                     Some((punct, rest)) => {\n 1018 |                         spans[i] = punct.span();\n 1019 |                         if punct.as_char() != ch {\n 1020 |                             break;\n 1021 |                         } else if i == token.len() - 1 {\n 1022 |                             return Ok(((), rest));\n 1023 |                         } else if punct.spacing() != Spacing::Joint {\n 1024 |                             break;\n 1025 |                         }\n 1026 |                         cursor = rest;\n 1027 |                     }\n 1028 |                     None => break,\n 1029 |                 }\n 1030 |             }\n 1031 | \n 1032 |             Err(Error::new(spans[0], format!(\"expected `{}`\", token)))\n 1033 |         })","lines":24}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"The six filtering iterators (Lifetimes, LifetimesMut, TypeParams, TypeParamsMut, ConstParams, ConstParamsMut) all implement `next` by recursing via `self.next()` to skip non-matching params instead of looping. This recursion has depth proportional to the number of consecutively-skipped params. Rust does not guarantee tail-call elimination, so in debug builds (and any build where LLVM declines the optimization) iterating e.g. `generics.lifetimes()` over a `Generics` containing tens of thousands of type/const params can overflow the stack. A `while let` loop would be both clearer and immune to this.","fix":"Replace the recursive `self.next()` tail call with a loop, e.g. `while let Some(param) = self.0.next() { if let GenericParam::Lifetime(lifetime) = param { return Some(lifetime); } } None`.","locations":[{"ref":"src/generics.rs:191-197","code":"  191 |     fn next(&mut self) -> Option<Self::Item> {\n  192 |         if let GenericParam::Lifetime(lifetime) = self.0.next()? {\n  193 |             Some(lifetime)\n  194 |         } else {\n  195 |             self.next()\n  196 |         }\n  197 |     }","lines":7},{"ref":"src/generics.rs:205-211","code":"  205 |     fn next(&mut self) -> Option<Self::Item> {\n  206 |         if let GenericParam::Lifetime(lifetime) = self.0.next()? {\n  207 |             Some(lifetime)\n  208 |         } else {\n  209 |             self.next()\n  210 |         }\n  211 |     }","lines":7},{"ref":"src/generics.rs:219-225","code":"  219 |     fn next(&mut self) -> Option<Self::Item> {\n  220 |         if let GenericParam::Type(type_param) = self.0.next()? {\n  221 |             Some(type_param)\n  222 |         } else {\n  223 |             self.next()\n  224 |         }\n  225 |     }","lines":7},{"ref":"src/generics.rs:233-239","code":"  233 |     fn next(&mut self) -> Option<Self::Item> {\n  234 |         if let GenericParam::Type(type_param) = self.0.next()? {\n  235 |             Some(type_param)\n  236 |         } else {\n  237 |             self.next()\n  238 |         }\n  239 |     }","lines":7},{"ref":"src/generics.rs:247-253","code":"  247 |     fn next(&mut self) -> Option<Self::Item> {\n  248 |         if let GenericParam::Const(const_param) = self.0.next()? {\n  249 |             Some(const_param)\n  250 |         } else {\n  251 |             self.next()\n  252 |         }\n  253 |     }","lines":7},{"ref":"src/generics.rs:261-267","code":"  261 |     fn next(&mut self) -> Option<Self::Item> {\n  262 |         if let GenericParam::Const(const_param) = self.0.next()? {\n  263 |             Some(const_param)\n  264 |         } else {\n  265 |             self.next()\n  266 |         }\n  267 |     }","lines":7}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"`peek_signature` forks the input and runs up to five speculative `parse`/`peek` calls (const, async, unsafe, abi, fn). In each of `parse_rest_of_item`, `Parse for ForeignItem`, `Parse for TraitItem`, and `Parse for ImplItem` it is invoked as `lookahead.peek(Token![fn]) || peek_signature(&ahead, allow_safe)` where `ahead` is itself already a fork of the input. So on the common non-fn item path the parser forks twice and does the full speculative signature parse before falling through to the next branch. This is redundant work on a hot parsing path.","fix":"Short-circuit cheaply before the full fork: peek only the leading keyword set (`const`/`async`/`unsafe`/`extern`/`fn`) on `ahead` and bail out early when none is present, so the expensive multi-parse fork in `peek_signature` only runs when a signature is plausible.","locations":[{"ref":"src/item.rs:1497-1507","code":" 1497 |     fn peek_signature(input: ParseStream, allow_safe: bool) -> bool {\n 1498 |         let fork = input.fork();\n 1499 |         fork.parse::<Option<Token![const]>>().is_ok()\n 1500 |             && fork.parse::<Option<Token![async]>>().is_ok()\n 1501 |             && ((allow_safe\n 1502 |                 && token::parsing::peek_keyword(fork.cursor(), \"safe\")\n 1503 |                 && token::parsing::keyword(&fork, \"safe\").is_ok())\n 1504 |                 || fork.parse::<Option<Token![unsafe]>>().is_ok())\n 1505 |             && fork.parse::<Option<Abi>>().is_ok()\n 1506 |             && fork.peek(Token![fn])\n 1507 |     }","lines":11},{"ref":"src/item.rs:960","code":"  960 |         let mut item = if lookahead.peek(Token![fn]) || peek_signature(&ahead, allow_safe) {","lines":1},{"ref":"src/item.rs:1876","code":" 1876 |             let mut item = if lookahead.peek(Token![fn]) || peek_signature(&ahead, allow_safe) {","lines":1},{"ref":"src/item.rs:2367","code":" 2367 |             let mut item = if lookahead.peek(Token![fn]) || peek_signature(&ahead, allow_safe) {","lines":1},{"ref":"src/item.rs:2705","code":" 2705 |             let mut item = if lookahead.peek(Token![fn]) || peek_signature(&ahead, allow_safe) {","lines":1}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","description":"`MetaList::parse_args_with` clones the entire `tokens` TokenStream on every invocation (`self.tokens.clone()`). For attributes with large argument token streams this is a needless allocation each time args are parsed. It is unavoidable given the by-reference `&self` API and the fact that `parse_scoped` consumes a TokenStream, so this is informational only.","fix":"No straightforward fix without an owned/borrowed parse variant; acceptable given the API contract. Noted for completeness.","locations":[{"ref":"src/attr.rs:581-584","code":"  581 |     pub fn parse_args_with<F: Parser>(&self, parser: F) -> Result<F::Output> {\n  582 |         let scope = self.delimiter.span().close();\n  583 |         crate::parse::parse_scoped(parser, scope, self.tokens.clone())\n  584 |     }","lines":4}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","description":"`peek_precedence` calls `input.fork().parse()` to try a `BinOp`, allocating/cloning a fork of the parse stream cursor on every call. It is invoked once per iteration of `parse_binop_rhs`'s inner loop (1450), which itself runs inside the main precedence-climbing loop, so for deeply nested binary expressions this fork-and-discard happens on a hot path. proc-macro2 ParseStream forks are cheap (Cell-based copy of a cursor), so impact is negligible, but the speculative `BinOp` parse on a fork could be replaced by direct `peek` checks for the operator tokens to avoid constructing a throwaway BinOp value.","fix":"Where feasible, peek operator tokens directly (as the later `else if` arms already do) instead of `input.fork().parse::<BinOp>()`, to avoid building and dropping a BinOp on each call.","locations":[{"ref":"src/expr.rs:1474-1486","code":" 1474 |     fn peek_precedence(input: ParseStream) -> Precedence {\n 1475 |         if let Ok(op) = input.fork().parse() {\n 1476 |             Precedence::of_binop(&op)\n 1477 |         } else if input.peek(Token![=]) && !input.peek(Token![=>]) {\n 1478 |             Precedence::Assign\n 1479 |         } else if input.peek(Token![..]) {\n 1480 |             Precedence::Range\n 1481 |         } else if input.peek(Token![as]) {\n 1482 |             Precedence::Cast\n 1483 |         } else {\n 1484 |             Precedence::MIN\n 1485 |         }\n 1486 |     }","lines":13}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","description":"In `parse_impl`, the leading `Type::Group` wrappers are peeled twice: first read-only over `&first_ty` via `first_ty_ref` (lines 2627-2630) to test for `Type::Path { qself: None }`, then again by-value consuming `first_ty` (lines 2632-2634) to extract the path. The second loop re-walks the same group nesting that was just walked. Group nesting is normally shallow so impact is tiny, but the double traversal is avoidable.","fix":"Peel the groups once into an owned value, then match on it to decide trait_ vs error, avoiding the second `while let Type::Group` loop.","locations":[{"ref":"src/item.rs:2624-2648","code":" 2624 |         let is_impl_for = input.peek(Token![for]);\n 2625 |         if is_impl_for {\n 2626 |             let for_token: Token![for] = input.parse()?;\n 2627 |             let mut first_ty_ref = &first_ty;\n 2628 |             while let Type::Group(ty) = first_ty_ref {\n 2629 |                 first_ty_ref = &ty.elem;\n 2630 |             }\n 2631 |             if let Type::Path(TypePath { qself: None, .. }) = first_ty_ref {\n 2632 |                 while let Type::Group(ty) = first_ty {\n 2633 |                     first_ty = *ty.elem;\n 2634 |                 }\n 2635 |                 if let Type::Path(TypePath { qself: None, path }) = first_ty {\n 2636 |                     trait_ = Some((polarity, path, for_token));\n 2637 |                 } else {\n 2638 |                     unreachable!();\n 2639 |                 }\n 2640 |             } else if !allow_verbatim_impl {\n 2641 |                 #[cfg(feature = \"printing\")]\n 2642 |                 return Err(Error::new_spanned(first_ty_ref, \"expected trait path\"));\n 2643 |                 #[cfg(not(feature = \"printing\"))]\n 2644 |                 return Err(Error::new(first_ty_span, \"expected trait path\"));\n 2645 |             } else {\n 2646 |                 trait_ = None;\n 2647 |             }\n 2648 |             self_ty = input.parse()?;","lines":25}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","description":"`parse_lit_float` eagerly allocates a fresh heap buffer for every float literal\nvia `input.to_owned().into_bytes()` even when the literal contains no\nunderscores and no `+` to strip (the common case, e.g. `1.0`, `3.14f64`). In\nthat case the in-place compaction copies each byte onto itself and the buffer is\nthen re-wrapped into a `String`/`Box<str>`, so the allocation+copy is pure\noverhead relative to slicing the original. This is a hot path (every float\ntoken in a token stream), but the cost is a single small allocation, hence\nnegligible severity.","fix":"Optionally scan for the first `_`/`+` and, if none is present before the\nsuffix, slice `input` directly into (digits, suffix) without allocating; fall\nback to the existing compaction only when ignorable characters are actually\npresent.","locations":[{"ref":"src/lit.rs:1843-1921","code":" 1843 |         let mut bytes = input.to_owned().into_bytes();\n 1844 | \n 1845 |         let start = (*bytes.first()? == b'-') as usize;\n 1846 |         match bytes.get(start)? {\n 1847 |             b'0'..=b'9' => {}\n 1848 |             _ => return None,\n 1849 |         }\n 1850 | \n 1851 |         let mut read = start;\n 1852 |         let mut write = start;\n 1853 |         let mut has_dot = false;\n 1854 |         let mut has_e = false;\n 1855 |         let mut has_sign = false;\n 1856 |         let mut has_exponent = false;\n 1857 |         while read < bytes.len() {\n 1858 |             match bytes[read] {\n 1859 |                 b'_' => {\n 1860 |                     // Don't increase write\n 1861 |                     read += 1;\n 1862 |                     continue;\n 1863 |                 }\n 1864 |                 b'0'..=b'9' => {\n 1865 |                     if has_e {\n 1866 |                         has_exponent = true;\n 1867 |                     }\n 1868 |                     bytes[write] = bytes[read];\n 1869 |                 }\n 1870 |                 b'.' => {\n 1871 |                     if has_e || has_dot {\n 1872 |                         return None;\n 1873 |                     }\n 1874 |                     has_dot = true;\n 1875 |                     bytes[write] = b'.';\n 1876 |                 }\n 1877 |                 b'e' | b'E' => {\n 1878 |                     match bytes[read + 1..]\n 1879 |                         .iter()\n 1880 |                         .find(|b| **b != b'_')\n 1881 |                         .unwrap_or(&b'\\0')\n 1882 |                     {\n 1883 |                         b'-' | b'+' | b'0'..=b'9' => {}\n 1884 |                         _ => break,\n 1885 |                     }\n 1886 |                     if has_e {\n 1887 |                         if has_exponent {\n 1888 |                             break;\n 1889 |                         } else {\n 1890 |                             return None;\n 1891 |                         }\n 1892 |                     }\n 1893 |                     has_e = true;\n 1894 |                     bytes[write] = b'e';\n 1895 |                 }\n 1896 |                 b'-' | b'+' => {\n 1897 |                     if has_sign || has_exponent || !has_e {\n 1898 |                         return None;\n 1899 |                     }\n 1900 |                     has_sign = true;\n 1901 |                     if bytes[read] == b'-' {\n 1902 |                         bytes[write] = bytes[read];\n 1903 |                     } else {\n 1904 |                         // Omit '+'\n 1905 |                         read += 1;\n 1906 |                         continue;\n 1907 |                     }\n 1908 |                 }\n 1909 |                 _ => break,\n 1910 |             }\n 1911 |             read += 1;\n 1912 |             write += 1;\n 1913 |         }\n 1914 | \n 1915 |         if has_e && !has_exponent {\n 1916 |             return None;\n 1917 |         }\n 1918 | \n 1919 |         let mut digits = String::from_utf8(bytes).unwrap();\n 1920 |         let suffix = digits.split_off(read);\n 1921 |         digits.truncate(write);","lines":79}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"negligible","description":"inner_unexpected walks the Unexpected chain calling cell_clone at each link, and cell_clone does take() + clone() + set() on the Cell. For Unexpected::Chain this clones an Rc (atomic-free refcount bump) per hop. This runs only at group/delimiter boundaries and parse completion (not per-token), so impact is minimal, but for deeply nested fork/advance_to chains the per-hop Rc clone is avoidable since the chain is only being traversed, not mutated.","fix":"Traverse the chain by inspecting the Cell without cloning the Rc at intermediate Chain links (e.g. a dedicated read that returns the terminal cell), reserving the clone for the returned terminal Rc only.","locations":[{"ref":"src/parse.rs:422-440","code":"  422 | // We call this on Cell<Unexpected> and Cell<Option<T>> where temporarily\n  423 | // swapping in a None is cheap.\n  424 | fn cell_clone<T: Default + Clone>(cell: &Cell<T>) -> T {\n  425 |     let prev = cell.take();\n  426 |     let ret = prev.clone();\n  427 |     cell.set(prev);\n  428 |     ret\n  429 | }\n  430 | \n  431 | fn inner_unexpected(buffer: &ParseBuffer) -> (Rc<Cell<Unexpected>>, Option<(Span, Delimiter)>) {\n  432 |     let mut unexpected = get_unexpected(buffer);\n  433 |     loop {\n  434 |         match cell_clone(&unexpected) {\n  435 |             Unexpected::None => return (unexpected, None),\n  436 |             Unexpected::Some(span, delimiter) => return (unexpected, Some((span, delimiter))),\n  437 |             Unexpected::Chain(next) => unexpected = next,\n  438 |         }\n  439 |     }\n  440 | }","lines":19}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In the `full` version of `parse_expr`, the loop's first arm at line 1324 unconditionally `break`s when `lhs` is an `Expr::Range`. Consequently the two later guards that re-test for `Expr::Range` are dead: the `if let Expr::Range(_) = lhs { break; }` inside the `Assign` precedence branch (1332-1336) can never be true, and the `match lhs { Expr::Range(_) => false, _ => true }` guard on the `=` assignment branch (1355-1358) is always `true`. The non-`full` variant of `parse_expr` (1397) confirms these checks are not needed. This is redundant code that obscures the actual control flow.","fix":"Remove the inner `if let Expr::Range(_) = lhs { break; }` block (1332-1336) and replace the `&& match lhs { Expr::Range(_) => false, _ => true }` condition on the assignment branch (1355-1358) with nothing, since the top-of-loop guard already guarantees `lhs` is not a Range.","locations":[{"ref":"src/expr.rs:1322-1358","code":" 1322 |         loop {\n 1323 |             let ahead = input.fork();\n 1324 |             if let Expr::Range(_) = lhs {\n 1325 |                 // A range cannot be the left-hand side of another binary operator.\n 1326 |                 break;\n 1327 |             } else if let Ok(op) = ahead.parse::<BinOp>() {\n 1328 |                 let precedence = Precedence::of_binop(&op);\n 1329 |                 if precedence < base {\n 1330 |                     break;\n 1331 |                 }\n 1332 |                 if precedence == Precedence::Assign {\n 1333 |                     if let Expr::Range(_) = lhs {\n 1334 |                         break;\n 1335 |                     }\n 1336 |                 }\n 1337 |                 if precedence == Precedence::Compare {\n 1338 |                     if let Expr::Binary(lhs) = &lhs {\n 1339 |                         if Precedence::of_binop(&lhs.op) == Precedence::Compare {\n 1340 |                             return Err(input.error(\"comparison operators cannot be chained\"));\n 1341 |                         }\n 1342 |                     }\n 1343 |                 }\n 1344 |                 input.advance_to(&ahead);\n 1345 |                 let right = parse_binop_rhs(input, allow_struct, precedence)?;\n 1346 |                 lhs = Expr::Binary(ExprBinary {\n 1347 |                     attrs: Vec::new(),\n 1348 |                     left: Box::new(lhs),\n 1349 |                     op,\n 1350 |                     right,\n 1351 |                 });\n 1352 |             } else if Precedence::Assign >= base\n 1353 |                 && input.peek(Token![=])\n 1354 |                 && !input.peek(Token![=>])\n 1355 |                 && match lhs {\n 1356 |                     Expr::Range(_) => false,\n 1357 |                     _ => true,\n 1358 |                 }","lines":37}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In `Pat::parse_single`, the branch at line 312 tests `lookahead.peek(Token![const])` and routes to `pat_lit_or_range` (which handles a `const` bound via `pat_range_bound` -> `PatRangeBound::Const`). Because that branch is checked first, the later `else if lookahead.peek(Token![const])` branch at lines 329-330 that calls `pat_const` can never be reached. Consequently the entire `pat_const` helper (lines 798-808) is unreachable dead code. A `const { ... }` pattern is parsed by the earlier `const` branch, not by `pat_const`.","fix":"Remove the unreachable `else if lookahead.peek(Token![const])` arm (lines 329-330) and delete the now-unused `pat_const` function, or reorder/restructure the branches if `pat_const` was intended to handle a case that `pat_lit_or_range` does not.","locations":[{"ref":"src/pat.rs:312","code":"  312 |             } else if input.peek(Token![-]) || lookahead.peek(Lit) || lookahead.peek(Token![const])","lines":1},{"ref":"src/pat.rs:329-330","code":"  329 |             } else if lookahead.peek(Token![const]) {\n  330 |                 input.call(pat_const).map(Pat::Verbatim)","lines":2},{"ref":"src/pat.rs:798-808","code":"  798 |     fn pat_const(input: ParseStream) -> Result<TokenStream> {\n  799 |         let begin = input.fork();\n  800 |         input.parse::<Token![const]>()?;\n  801 | \n  802 |         let content;\n  803 |         braced!(content in input);\n  804 |         content.call(Attribute::parse_inner)?;\n  805 |         content.call(Block::parse_within)?;\n  806 | \n  807 |         Ok(verbatim::between(&begin, input))\n  808 |     }","lines":11}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment on Entry::End states the second field is 'offset (negative) to the matching Group entry'. This is true for group-close End entries, but the single top-level End entry pushed in TokenBuffer::new2 stores 0 in that field (no matching Group). Code in Cursor::span and scope_delimiter relies on that 0 meaning 'no group' (offset(0) lands back on the End itself), so the comment's 'negative' qualifier is not universally accurate and slightly understates the sentinel meaning of 0.","fix":"Amend the comment to note that the top-level End entry uses 0 in the second field as a sentinel meaning there is no enclosing group.","locations":[{"ref":"src/buffer.rs:27-29","code":"   27 |     // End entries contain the offset (negative) to the start of the buffer, and\n   28 |     // offset (negative) to the matching Group entry.\n   29 |     End(isize, isize),","lines":3},{"ref":"src/buffer.rs:77","code":"   77 |         entries.push(Entry::End(-(entries.len() as isize), 0));","lines":1}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Inconsistent inline annotation in the doc-comment for `leftmost_subexpression_in_optional_operand`. The first example line is annotated `needs parens` without the leading `//` comment marker, whereas the parallel second line uses `// no parens`. Every other paired example in this struct (e.g. lines 23/25, 50/58, 85/88, 96/99, 107/109) consistently prefixes the annotation with `//`. The missing marker makes this one example read inconsistently.","fix":"Change the annotation to `//     if break ({ x }).field + 1 {}  // needs parens` to match the `// no parens` style on the following line.","locations":[{"ref":"src/fixup.rs:116","code":"  116 |     //     if break ({ x }).field + 1 {}  needs parens","lines":1}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Doc examples for several items use module paths that no longer match the prose: ItemUse documents `use alloc::collections::HashMap` (line 310/77) and ItemConst/others reference `core`/`alloc`, while the type docstrings elsewhere use `std`-style examples. These are cosmetic doc inconsistencies (HashMap is not in alloc::collections), not code bugs, but the `use alloc::collections::HashMap` example is factually wrong as a real import.","fix":"Use a path that actually exists, e.g. `use std::collections::HashMap`, or pick a type that lives in alloc::collections (e.g. BTreeMap).","locations":[{"ref":"src/item.rs:77","code":"   77 |         /// A use declaration: `use alloc::collections::HashMap`.","lines":1},{"ref":"src/item.rs:310-311","code":"  310 |     /// A use declaration: `use alloc::collections::HashMap`.\n  311 |     #[cfg_attr(docsrs, doc(cfg(feature = \"full\")))]","lines":2}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Grammatical error in the `Fold` module doc example caption: \"This fold inserts parentheses to fully parenthesizes any expression.\" The verb after \"to fully\" should be the base form \"parenthesize\", not \"parenthesizes\".","fix":"Change to \"This fold inserts parentheses to fully parenthesize any expression.\"","locations":[{"ref":"src/lib.rs:605","code":"  605 |     /// This fold inserts parentheses to fully parenthesizes any expression.","lines":1}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Subject-verb agreement error in the `VisitMut` module doc example caption: \"This mut visitor replace occurrences of u256 ...\" — \"visitor\" is singular so the verb should be \"replaces\".","fix":"Change to \"This mut visitor replaces occurrences of u256 suffixed integer literals\".","locations":[{"ref":"src/lib.rs:806","code":"  806 |     /// This mut visitor replace occurrences of u256 suffixed integer literals","lines":1}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment on `byte()` says it returns \"a default of `b'\\0'`\" past the end\nof the buffer, but the code returns the integer literal `0` (which equals\n`b'\\0'`, so behavior is correct). Minor: the surrounding parsers rely on this\nsentinel `0` being treated as \"no more input\"; the comment is accurate in value\nbut it is worth keeping the wording (`b'\\0'`) and the literal (`0`) consistent\nso a reader does not assume a different sentinel.","fix":"Write the sentinel as `b'\\0'` in the code (or `0` in the comment) so the\ndocumented value and the returned value are textually identical; no logic\nchange.","locations":[{"ref":"src/lit.rs:1294-1303","code":" 1294 |     /// Get the byte at offset idx, or a default of `b'\\0'` if we're looking\n 1295 |     /// past the end of the input buffer.\n 1296 |     pub(crate) fn byte<S: AsRef<[u8]> + ?Sized>(s: &S, idx: usize) -> u8 {\n 1297 |         let s = s.as_ref();\n 1298 |         if idx < s.len() {\n 1299 |             s[idx]\n 1300 |         } else {\n 1301 |             0\n 1302 |         }\n 1303 |     }","lines":10}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"Cursor::group, Cursor::any_group, and Cursor::any_group_token share an almost identical body: matching Entry::Group, computing end_of_group = self.ptr.add(*end_offset), and building inside_of_group / after_group cursors via Cursor::create. The triplication means any future change to the group-entry pointer math (e.g. the offset convention) has to be applied in three places, and is exactly the kind of place where a copy-paste slip could introduce an unsoundness in unsafe pointer arithmetic. Could be factored into one private helper returning (inside, end_of_group, after) that the three public methods wrap.","fix":"Extract a private `fn enter_group(self) -> Option<(Group, *const Entry)>` (or similar) that does the single `self.ptr.add(*end_offset)` computation, and have group/any_group/any_group_token call Cursor::create on its result.","locations":[{"ref":"src/buffer.rs:242-286","code":"  242 |     pub fn group(mut self, delim: Delimiter) -> Option<(Cursor<'a>, DelimSpan, Cursor<'a>)> {\n  243 |         // If we're not trying to enter a none-delimited group, we want to\n  244 |         // ignore them. We have to make sure to _not_ ignore them when we want\n  245 |         // to enter them, of course. For obvious reasons.\n  246 |         if delim != Delimiter::None {\n  247 |             self.ignore_none();\n  248 |         }\n  249 | \n  250 |         if let Entry::Group(group, end_offset) = self.entry() {\n  251 |             if group.deli arse()?);\n  433 |                             if content.is_empty() {\n  434 |                                 break;\n  435 |                             }\n  436 |                             elems.push_punct(content.parse()?);\n  437 |                         }\n  438 |                         elems\n  439 |                     },\n  440 |                 }));","lines":16},{"ref":"src/ty.rs:755-771","code":"  755 |             let first: Type = content.parse()?;\n  756 |             Ok(TypeTuple {\n  757 |                 paren_token,\n  758 |                 elems: {\n  759 |                     let mut elems = Punctuated::new();\n  760 |                     elems.push_value(first);\n  761 |                     elems.push_punct(content.parse()?);\n  762 |                     while !content.is_empty() {\n  763 |                         elems.push_value(content.parse()?);\n  764 |                         if content.is_empty() {\n  765 |                             break;\n  766 |                         }\n  767 |                         elems.push_punct(content.parse()?);\n  768 |                     }\n  769 |                     elems\n  770 |                 },\n  771 |             })","lines":17}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"negligible","description":"The compile-time assertion that `Error: Send + Sync` (struct `_Test`) is gated behind `#[cfg(test)]`, so the Send/Sync guarantee that ecosystem error-handling crates rely on is only verified when building syn's own test target, not in ordinary library builds. A regression that broke Send/Sync (e.g. a future field change) would compile fine for downstream users and only surface in syn's test runs. Making the assertion unconditional (or a `const _`) would catch such regressions in every build.","fix":"Drop the `#[cfg(test)]` gate and express the bound as an always-compiled assertion, e.g. `const _: fn() = || { fn assert<T: Send + Sync>() {} assert::<Error>(); };`","locations":[{"ref":"src/error.rs:127-130","code":"  127 | #[cfg(test)]\n  128 | struct _Test\n  129 | where\n  130 |     Error: Send + Sync;","lines":4}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"negligible","description":"Lookahead1::peek (via peek_impl) pushes display() into the comparisons list every time a peek fails, with no deduplication. Peeking the same token type twice against one Lookahead1, or peeking both End and a literal close-paren token (both of which display as `)`), produces duplicate entries in the generated 'expected one of: ...' error message. The retain_mut pass in error() rewrites `)` per the scope delimiter but does not dedup, so duplicate alternatives can appear in the message. Cosmetic only.","fix":"Optionally dedup comparisons (e.g. skip pushing a display string already present) before formatting the message, or dedup after the retain_mut pass.","locations":[{"ref":"src/lookahead.rs:79-89","code":"   79 | fn peek_impl(\n   80 |     lookahead: &Lookahead1,\n   81 |     peek: fn(Cursor) -> bool,\n   82 |     display: fn() -> &'static str,\n   83 | ) -> bool {\n   84 |     if peek(lookahead.cursor) {\n   85 |         return true;\n   86 |     }\n   87 |     lookahead.comparisons.borrow_mut().push(display());\n   88 |     false\n   89 | }","lines":11},{"ref":"src/lookahead.rs:115-148","code":"  115 |     pub fn error(self) -> Error {\n  116 |         let mut comparisons = self.comparisons.into_inner();\n  117 |         comparisons.retain_mut(|display| {\n  118 |             if *display == \"`)`\" {\n  119 |                 *display = match self.cursor.scope_delimiter() {\n  120 |                     Delimiter::Parenthesis => \"`)`\",\n  121 |                     Delimiter::Brace => \"`}`\",\n  122 |                     Delimiter::Bracket => \"`]`\",\n  123 |                     Delimiter::None => return false,\n  124 |                 }\n  125 |             }\n  126 |             true\n  127 |         });\n  128 |         match comparisons.len() {\n  129 |             0 => {\n  130 |                 if self.cursor.eof() {\n  131 |                     Error::new(self.scope, \"unexpected end of input\")\n  132 |                 } else {\n  133 |                     Error::new(self.cursor.span(), \"unexpected token\")\n  134 |                 }\n  135 |             }\n  136 |             1 => {\n  137 |                 let message = format!(\"expected {}\", comparisons[0]);\n  138 |                 error::new_at(self.scope, self.cursor, message)\n  139 |             }\n  140 |             2 => {\n  141 |                 let message = format!(\"expected {} or {}\", comparisons[0], comparisons[1]);\n  142 |                 error::new_at(self.scope, self.cursor, message)\n  143 |             }\n  144 |             _ => {\n  145 |                 let message = format!(\"expected one of: {}\", CommaSeparated(&comparisons));\n  146 |                 error::new_at(self.scope, self.cursor, message)\n  147 |             }\n  148 |         }","lines":34}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"negligible","description":"Inconsistent guard for distinguishing `!` from `!=`: the never-type branch uses `!input.peek(Token![=])`, while the macro branch uses `!input.peek(Token![!=])`. Peeking a bare `Token![=]` while the next token is `!` can never match, so the never-type guard is effectively a no-op and relies on the `!=` operator never appearing in type position. The macro-style `!input.peek(Token![!=])` is the more precise idiom.","fix":"For consistency and clarity, use `!input.peek(Token![!=])` in the never-type branch as well (behavior is unchanged in practice).","locations":[{"ref":"src/ty.rs:604","code":"  604 |         } else if lookahead.peek(Token![!]) && !input.peek(Token![=]) {","lines":1},{"ref":"src/ty.rs:524","code":"  524 |             if input.peek(Token![!]) && !input.peek(Token![!=]) && ty.path.is_mod_style() {","lines":1}]},{"id":"ARCHIT_1","type":"architecture","type_label":"Architecture","severity":"medium","description":"expr.rs is a single 4180-line module that mixes three distinct responsibilities: (1) the ~700 lines of `ast_struct!`/`ast_enum!` AST type definitions for ~40 Expr variants plus Member/Index/FieldValue/Arm/etc., (2) the ~1950-line `parsing` submodule, and (3) the ~1050-line `printing` submodule. Each concern is independently large and the parsing/printing logic is intricate (precedence, fixups, struct-vs-block ambiguity). Keeping all three in one file makes navigation and review harder, and the two big submodules duplicate the same long import lists. Splitting into expr/types, expr/parsing, expr/printing (as the crate already does conceptually with `mod parsing`/`mod printing`) would improve maintainability.","fix":"Move the `parsing` and `printing` submodules into separate files (e.g. src/expr/parsing.rs and src/expr/printing.rs via `#[path]` or a directory module), leaving the AST type definitions in the top-level file. This is a mechanical refactor that does not change the public API.","locations":[{"ref":"src/expr.rs:1-4180","code":"    1 | use crate::attr::Attribute;\n    2 | #[cfg(all(feature = \"parsing\", feature = \"full\"))]\n    3 | use crate::error::Result;\n    4 | #[cfg(feature = \"parsing\")]\n    5 | use crate::ext::IdentExt as _;\n    6 | #[cfg(feature = \"full\")]\n    7 | use crate::generics::BoundLifetimes;\n    8 | use crate::ident::Ident;\n    9 | #[cfg(any(feature = \"parsing\", feature = \"full\"))]\n   10 | use crate::lifetime::Lifetime;\n   11 | use crate::lit::Lit;\n   12 | use crate::mac::Macro;\n   13 | use crate::op::{BinOp, UnOp};\n   14 | #[cfg(feature = \"parsing\")]\n   15 | use crate::parse::ParseStream;\n   16 | #[cfg(feature = \"full\")]\n   17 | use crate::pat::Pat;\n   18 | use crate::path::{AngleBracketedGenericArguments, Path, QSelf};\n   19 | use crate::punctuated::Punctuated;\n   20 | #[cfg(feature = \"full\")]\n   21 | use crate::stmt::Block;\n   22 | use crate::to <div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-06-07 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
