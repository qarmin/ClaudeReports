<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"Argument parsing for -l, -j, -w, -bs, -b, -s, -speed= and -bytescore= all call .unwrap() on parse::<T>(). Any non-numeric or out-of-range user input causes an unconditional panic instead of a user-friendly error message.","fix":"Replace each .unwrap() with .unwrap_or_else(|_| { eprintln!(\"invalid argument ...\"); std::process::exit(1); }) or return an error.","locations":[{"ref":"src/bin/brotli.rs:686","code":"  686 |                     .unwrap();","lines":1},{"ref":"src/bin/brotli.rs:696","code":"  696 |                             .parse::<i32>()","lines":1},{"ref":"src/bin/brotli.rs:717","code":"  717 |                     .unwrap();","lines":1},{"ref":"src/bin/brotli.rs:725","code":"  725 |                     .unwrap();","lines":1},{"ref":"src/bin/brotli.rs:738","code":"  738 |                     .parse::<usize>()","lines":1},{"ref":"src/bin/brotli.rs:783","code":"  783 |                     .unwrap();","lines":1},{"ref":"src/bin/brotli.rs:797","code":"  797 |                     let data = s.parse::<u16>().unwrap();","lines":1},{"ref":"src/bin/brotli.rs:824","code":"  824 |                     .parse::<usize>()","lines":1}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"H10::FindLongestMatch calls unimplemented!(). H10 is supposed to be used only via StoreAndFindMatchesH10, but nothing prevents it from being dispatched through the AnyHasher trait path (e.g. via match_all_hashers!), which would panic at runtime with no useful diagnostic.","fix":"Return a sentinel HasherSearchResult (score=0, len=0) instead of unimplemented!().","locations":[{"ref":"src/enc/backward_references/hash_to_binary_tree.rs:351-351","code":"  351 |         unimplemented!();","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"ComputeDistanceShortcut performs pos.wrapping_sub(clen).wrapping_sub(ilen) and uses the result directly as a usize array index into nodes[]. When pos < clen + ilen the wrapping subtraction yields a huge usize, causing an out-of-bounds panic.","fix":"Check that pos >= clen + ilen before computing the index, or saturate instead of wrapping.","locations":[{"ref":"src/enc/backward_references/hq.rs:440-440","code":"  440 |         match (nodes[(pos.wrapping_sub(clen).wrapping_sub(ilen) as usize)]).u {","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"UnionHasher::Uninit match arms in match_all_hashers_mut! and match_all_hashers! macros panic with the string \"UNINTIALIZED\" (also a typo - missing an 'I'). Any code path that reaches these macros when the hasher is in the Uninit state will crash. BrotliCreateBackwardReferences also panics unconditionally on Uninit.","fix":"Return an error or use a no-op instead of panicking; fix the typo in the message too.","locations":[{"ref":"src/enc/backward_references/mod.rs:2193-2193","code":" 2193 |      &mut UnionHasher::Uninit => panic!(\"UNINTIALIZED\"),","lines":1},{"ref":"src/enc/backward_references/mod.rs:2210-2210","code":" 2210 |      &UnionHasher::Uninit => panic!(\"UNINTIALIZED\"),","lines":1},{"ref":"src/enc/backward_references/mod.rs:2576-2576","code":" 2576 |         &mut UnionHasher::Uninit => panic!(\"working with uninitialized hash map\"),","lines":1}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"BrotliWriteBits in brotli_bit_stream.rs writes 8 bytes to array[ptr_offset..ptr_offset+8] using an unaligned store with no bounds check. If the output buffer is not large enough the indexing will panic.","fix":"Assert or check array.len() >= ptr_offset + 8 before the store, or use checked indexing.","locations":[{"ref":"src/enc/brotli_bit_stream.rs:742-757","code":"  742 | fn BrotliWriteBits(n_bits: u8, bits: u64, pos: &mut usize, array: &mut [u8]) {\n  743 |     assert_eq!(bits >> n_bits, 0);\n  744 |     assert!(n_bits <= 56);\n  745 |     let ptr_offset: usize = ((*pos >> 3) as u32) as usize;\n  746 |     let mut v = array[ptr_offset] as u64;\n  747 |     v |= bits << ((*pos) as u64 & 7);\n  748 |     array[ptr_offset + 7] = (v >> 56) as u8;\n  749 |     array[ptr_offset + 6] = ((v >> 48) & 0xff) as u8;\n  750 |     array[ptr_offset + 5] = ((v >> 40) & 0xff) as u8;\n  751 |     array[ptr_offset + 4] = ((v >> 32) & 0xff) as u8;\n  752 |     array[ptr_offset + 3] = ((v >> 24) & 0xff) as u8;\n  753 |     array[ptr_offset + 2] = ((v >> 16) & 0xff) as u8;\n  754 |     array[ptr_offset + 1] = ((v >> 8) & 0xff) as u8;\n  755 |     array[ptr_offset] = (v & 0xff) as u8;\n  756 |     *pos += n_bits as usize\n  757 | }","lines":16}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"BrotliStoreHuffmanTreeOfHuffmanTreeToBitMask indexes kHuffmanBitLengthHuffmanCodeBitLengths[l] where l is taken from code_length_bitdepth[], a u8 value. The array has only 6 elements (indices 0-5). Any code_length_bitdepth value >= 6 causes an out-of-bounds panic. The Brotli spec allows code lengths up to 7 for code-length trees, so this is reachable.","fix":"Validate that l < kHuffmanBitLengthHuffmanCodeBitLengths.len() before indexing, or use .get(l) and handle the None case.","locations":[{"ref":"src/enc/brotli_bit_stream.rs:800-800","code":"  800 |         let l = code_length_bitdepth[kStorageOrder[i as usize] as usize] as usize;","lines":1}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"compute_combined_cost and compute_cost both contain the pattern `if stride_pdf[i] == 0 { assert_ne!(stride_pdf[i], 0); }` and the same for stride_max/pdf/max. This is a guaranteed panic whenever a CDF bucket pdf is zero, which legitimately occurs with sparse symbol distributions. The assert inside an equality check serves no diagnostic purpose and will never fire except as a panic.","fix":"Remove the dead assert_ne! calls. To avoid zero-pdf cost explosions, replace with a skip or substitute a floor value: `if stride_pdf[i] == 0 { singleton_cost[i] = floatX::MAX; continue; }`.","locations":[{"ref":"src/enc/context_map_entropy.rs:122-128","code":"  122 |     for i in 0..NUM_SPEEDS_TO_TRY {\n  123 |         if stride_pdf[i] == 0 {\n  124 |             assert_ne!(stride_pdf[i], 0);\n  125 |         }\n  126 |         if stride_max[i] == 0 {\n  127 |             assert_ne!(stride_max[i], 0);\n  128 |         }","lines":7},{"ref":"src/enc/context_map_entropy.rs:164-170","code":"  164 |     for i in 0..NUM_SPEEDS_TO_TRY {\n  165 |         if pdf[i] == 0 {\n  166 |             assert_ne!(pdf[i], 0);\n  167 |         }\n  168 |         if max[i] == 0 {\n  169 |             assert_ne!(max[i], 0);\n  170 |         }","lines":7}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"BlockSplitIterator::next() unconditionally indexes into split_.types and split_.lengths by the incremented idx_ without bounds checking. When the iterator is called after all blocks have been consumed (length_ just reached 0 on the last block), idx_ is incremented past num_blocks-1 and the slice indexing panics. BrotliBuildHistogramsWithContext drives this iterator once per literal and never checks for exhaustion.","fix":"Add a bounds check before indexing: `if self.idx_ >= self.split_.num_blocks { return; }` (or restructure the caller to call next() only when more symbols remain).","locations":[{"ref":"src/enc/histogram.rs:347-354","code":"  347 |     fn next(&mut self) {\n  348 |         if self.length_ == 0 {\n  349 |             self.idx_ = self.idx_.wrapping_add(1);\n  350 |             self.type_ = self.split_.types.slice()[self.idx_] as usize;\n  351 |             self.length_ = self.split_.lengths.slice()[self.idx_] as usize;\n  352 |         }\n  353 |         self.length_ = self.length_.wrapping_sub(1);\n  354 |     }","lines":8}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"WorkerPool::Drop calls th.join().unwrap() (line 102) on each worker thread. If a worker thread panicked, JoinHandle::join() returns Err, and unwrap() panics inside Drop, causing a double-panic and process abort.","fix":"Replace th.join().unwrap() with let _ = th.join(); to silently absorb a thread panic, or log/record the error but do not propagate it from Drop.","locations":[{"ref":"src/enc/worker_pool.rs:100-104","code":"  100 |         for thread_handle in self.join.iter_mut() {\n  101 |             if let Some(th) = thread_handle.take() {\n  102 |                 th.join().unwrap();\n  103 |             }\n  104 |         }","lines":5}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"CompressorWriterCustomIo::flush_or_close calls error_if_invalid_data.take().unwrap() (line 224) to convert an encoder failure into an ErrType. Once consumed the Option is None. When the struct is later dropped, Drop calls flush_or_close again; if compress_stream still returns false (e.g. encoder is in a broken state), the second take() returns None and unwrap() panics inside the Drop impl, which may cause a process abort. The same path is reachable if write_all consumes error_if_invalid_data via the fallback closure (line 216) before the compress_stream failure check on line 223.","fix":"Set self.output = None before returning any error from flush_or_close so the Drop guard (if self.output.is_some()) skips the second flush attempt. Alternatively replace .take().unwrap() with .take().unwrap_or_else(|| /* synthesise a default error */).","locations":[{"ref":"src/enc/writer.rs:224","code":"  224 |                 return Err(self.error_if_invalid_data.take().unwrap());","lines":1},{"ref":"src/enc/writer.rs:253-265","code":"  253 | impl<ErrType, W: CustomWrite<ErrType>, BufferType: SliceWrapperMut<u8>, Alloc: BrotliAlloc> Drop\n  254 |     for CompressorWriterCustomIo<ErrType, W, BufferType, Alloc>\n  255 | {\n  256 |     fn drop(&mut self) {\n  257 |         if self.output.is_some() {\n  258 |             match self.flush_or_close(BrotliEncoderOperation::BROTLI_OPERATION_FINISH) {\n  259 |                 Ok(_) => {}\n  260 |                 Err(_) => {}\n  261 |             }\n  262 |         }\n  263 |         BrotliEncoderDestroyInstance(&mut self.state);\n  264 |     }\n  265 | }","lines":13}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"From<BroccoliState> for BroCatli calls BroCatli::deserialize_from_buffer(...).unwrap() unconditionally. If the BroccoliState has been corrupted (e.g. by C-side memory corruption or an outdated serialization format), deserialize_from_buffer returns Err and this panics. On std the surrounding catch_panic in each FFI entry-point absorbs it, but on no-std (pass-through-ffi-panics or no-stdlib-ffi-binding) the panic reaches the loop{} panic handler, hanging the process. The conversion is also called inside From<BroCatli> for BroccoliState (line 42), which panics if serialize_to_buffer returns Err.","fix":"Change both conversions to return Result and propagate the error to callers, or at minimum use unwrap_or_else to map the error to a safe default and log it.","locations":[{"ref":"src/ffi/broccoli.rs:42","code":"   42 |         data.serialize_to_buffer(&mut buffer[..]).unwrap();","lines":1},{"ref":"src/ffi/broccoli.rs:51","code":"   51 |         BroCatli::deserialize_from_buffer(&val.current_data[..]).unwrap()","lines":1}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In the seccomp decompress path, after a successful decompression the code calls syscall(60) (exit_group) and then hits unreachable!(). If syscall returns (e.g. on a non-Linux kernel or a permission error), the unreachable!() causes a panic instead of returning an error.","fix":"Check the return value of syscall and return an Err if it is non-zero, rather than relying on unreachable!().","locations":[{"ref":"src/bin/brotli.rs:266-272","code":"  266 |         Ok(()) => {\n  267 |             unsafe {\n  268 |                 syscall(60);\n  269 |             };\n  270 |             unreachable!()\n  271 |         }\n  272 |     }","lines":7}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"read_custom_dictionary panics on file-open failure and on oversized dictionaries instead of returning an error to the caller. This makes the binary impossible to use as a library and gives poor diagnostics.","fix":"Return Result<Vec<u8>, io::Error> and propagate errors up to main() where they can be printed cleanly.","locations":[{"ref":"src/bin/brotli.rs:508-520","code":"  508 |     let mut dict = match File::open(Path::new(&filename)) {\n  509 |         Err(why) => panic!(\"couldn't open custom dictionary {:}\\n{:}\", filename, why),\n  510 |         Ok(file) => file,\n  511 |     };\n  512 |     let mut ret = Vec::<u8>::new();\n  513 |     dict.read_to_end(&mut ret).unwrap();\n  514 |     if ret.len() > kMaxDictionarySize {\n  515 |         panic!(\n  516 |             \"dictionary [{}] is larger than maximum allowed: {}\\n\",\n  517 |             filename, kMaxDictionarySize\n  518 |         );\n  519 |     }\n  520 |     ret","lines":13}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"BasicHasher::FindLongestMatch indexes data[cur_ix_masked.wrapping_add(best_len)] without a bounds check. If cur_ix_masked + best_len >= data.len() the index is out of range and the program panics.","fix":"Guard the access with a check that cur_ix_masked + best_len < data.len() before indexing.","locations":[{"ref":"src/enc/backward_references/mod.rs:376-376","code":"  376 |         let mut compare_char: i32 = data[cur_ix_masked.wrapping_add(best_len_in)] as i32;","lines":1}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"adv_prepare_distance_cache writes to distance_cache[4] through distance_cache[15] without checking the slice length. If the caller provides a slice shorter than 16 elements the function will panic on an out-of-bounds index.","fix":"Assert or check distance_cache.len() >= 16 at the top of the function, or restrict writes to the actual slice length.","locations":[{"ref":"src/enc/backward_references/mod.rs:634-650","code":"  634 |         let last_distance: i32 = distance_cache[0];\n  635 |         distance_cache[4] = last_distance - 1i32;\n  636 |         distance_cache[5] = last_distance + 1i32;\n  637 |         distance_cache[6] = last_distance - 2i32;\n  638 |         distance_cache[7] = last_distance + 2i32;\n  639 |         distance_cache[8] = last_distance - 3i32;\n  640 |         distance_cache[9] = last_distance + 3i32;\n  641 |         if num_distances > 10i32 {\n  642 |             let next_last_distance: i32 = distance_cache[1];\n  643 |             distance_cache[10] = next_last_distance - 1i32;\n  644 |             distance_cache[11] = next_last_distance + 1i32;\n  645 |             distance_cache[12] = next_last_distance - 2i32;\n  646 |             distance_cache[13] = next_last_distance + 2i32;\n  647 |             distance_cache[14] = next_last_distance - 3i32;\n  648 |             distance_cache[15] = next_last_distance + 3i32;\n  649 |         }\n  650 |     }","lines":17}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"BulkStoreRangeOptMemFetch slices data starting at ix_offset and then immediately takes a sub-slice of length REG_SIZE + lookahead4 - 1. If data.len() < ix_offset + REG_SIZE + lookahead4 - 1 the split_at call panics.","fix":"Add a length guard before the split_at chain and return early if data is not long enough.","locations":[{"ref":"src/enc/backward_references/mod.rs:1259-1259","code":" 1259 |                 data64[..REG_SIZE + lookahead4 - 1].clone_from_slice(","lines":1}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"process_command_queue calls command_queue.free(callback).unwrap() unconditionally. If the queue was overfull (the overfull flag is true earlier in the same function) the Result may be Err and the unwrap panics.","fix":"Propagate the error instead of unwrapping, or match on the overfull flag before calling free.","locations":[{"ref":"src/enc/brotli_bit_stream.rs:630-630","code":"  630 |     command_queue.free(callback).unwrap();","lines":1}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"JumpToByteBoundary writes to storage[*storage_ix >> 3] without checking that the index is within bounds. If the storage buffer is exactly full the index equals storage.len() and the write panics.","fix":"Check storage.len() > *storage_ix >> 3 before the write.","locations":[{"ref":"src/enc/brotli_bit_stream.rs:2032-2032","code":" 2032 |     storage[(*storage_ix >> 3)] = 0u8;","lines":1}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"The test helper helperCommandDistanceIndexAndOffset (command.rs test module) computes `dist_prefix = cmd.dist_prefix_ & 0x3ff` but then on line 348 indexes the lookup table with the raw unmasked `cmd.dist_prefix_ as usize`. Since the upper 6 bits of dist_prefix_ encode the number of extra bits, cmd.dist_prefix_ can be much larger than 15, producing an out-of-bounds index into a 16-element array. The production function distance_index_and_offset at line 229 correctly uses the masked `dprefix`.","fix":"Change `table[cmd.dist_prefix_ as usize]` to `table[dist_prefix as usize]` on line 348.","locations":[{"ref":"src/enc/command.rs:328-348","code":"  328 |         let dist_prefix = cmd.dist_prefix_ & 0x3ff;\n  329 |         if dist_prefix < 16 {\n  330 |             let table: [(usize, isize); 16] = [\n  331 |                 (1, 0),\n  332 |                 (2, 0),\n  333 |                 (3, 0),\n  334 |                 (4, 0),\n  335 |                 (1, -1),\n  336 |                 (1, 1),\n  337 |                 (1, -2),\n  338 |                 (1, 2),\n  339 |                 (1, -3),\n  340 |                 (1, 3),\n  341 |                 (2, -1),\n  342 |                 (2, 1),\n  343 |                 (2, -2),\n  344 |                 (2, 2),\n  345 |                 (2, -3),\n  346 |                 (2, 3),\n  347 |             ];\n  348 |             return table[cmd.dist_prefix_ as usize];","lines":21}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"BrotliWriteBits in compress_fragment_two_pass.rs calls BROTLI_UNALIGNED_STORE64 which writes 8 bytes to array[*pos >> 3..]. There is no check that array is long enough to hold these 8 bytes, so a short buffer causes a panic inside clone_from_slice.","fix":"Ensure the output buffer has at least (*pos >> 3) + 8 bytes before calling this function.","locations":[{"ref":"src/enc/compress_fragment_two_pass.rs:408-413","code":"  408 | pub fn BrotliWriteBits(n_bits: usize, bits: u64, pos: &mut usize, array: &mut [u8]) {\n  409 |     let p = &mut array[(*pos >> 3)..];\n  410 |     let mut v: u64 = p[0] as (u64);\n  411 |     v |= bits << (*pos & 7);\n  412 |     BROTLI_UNALIGNED_STORE64(p, v);\n  413 |     *pos = pos.wrapping_add(n_bits);","lines":6}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"HasherPrependCustomDictionary (encode.rs line 1192) has an arm for UnionHasher::Uninit that calls panic!(\"Uninitialized\"). This arm is reachable: hasher_setup initialises the hasher, but if the internal BrotliMakeHasher call returns Uninit (which it cannot today but is not statically impossible), or if a future refactor introduces a new variant without updating this match, the panic fires at runtime.","fix":"Return early or skip the StoreLookaheadThenStore call if the hasher is Uninit, instead of panicking. Add a debug_assert before returning if the invariant that the hasher is always initialised before this function is called should be enforced.","locations":[{"ref":"src/enc/encode.rs:1192","code":" 1192 |         &mut UnionHasher::Uninit => panic!(\"Uninitialized\"),","lines":1}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"InternalSendAlloc::unwrap_input, SendAlloc::unwrap_view_mut, and SendAlloc::unwrap (threading/mod.rs lines 95, 133-136, 141-144) all call panic!(\"Bad state for allocator\") or panic!(\"Item permanently borrowed/leaked\") if the enum is not in state A. These panics propagate through CompressMulti and can unwind through the thread boundary in the std::thread::spawn closure (multithreading.rs line 80-87), which would cause a panic in the spawned thread and ultimately propagate as a thread join error, but also terminates that thread's work without producing a result or error for the orchestration loop.","fix":"Return a Result from unwrap_input/unwrap_view_mut/unwrap and propagate the error through CompressMulti instead of panicking. This avoids the logic error becoming an unhandled abort in production.","locations":[{"ref":"src/enc/threading/mod.rs:95-97","code":"   95 |             _ => panic!(\"Bad state for allocator\"),\n   96 |         }\n   97 |     }","lines":3},{"ref":"src/enc/threading/mod.rs:133-144","code":"  133 |             InternalSendAlloc::SpawningOrJoining(_) | InternalSendAlloc::Join(_) => {\n  134 |                 panic!(\"Item permanently borrowed/leaked\")\n  135 |             }\n  136 |         }\n  137 |     }\n  138 |     pub fn unwrap(self) -> (Alloc, ExtraInput) {\n  139 |         match self.0 {\n  140 |             InternalSendAlloc::A(alloc, extra_input) => (alloc, extra_input),\n  141 |             InternalSendAlloc::SpawningOrJoining(_) | InternalSendAlloc::Join(_) => {\n  142 |                 panic!(\"Item permanently borrowed/leaked\")\n  143 |             }\n  144 |         }","lines":12},{"ref":"src/enc/threading/mod.rs:441","code":"  441 |     let mut owned_input_pair = Owned::new((actually_owned_mem.unwrap(), params.clone()));","lines":1}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"parse_as_utf8 accesses input[0] on its first line without checking whether the slice is empty. is_mostly_utf8 calls it with `&data[(pos.wrapping_add(i) & mask)..]`, which is a suffix of the ring-buffer array starting at a masked position. When the masked offset falls near the end of the backing array, this suffix can be shorter than `length - i` bytes, and if the suffix is empty the index-0 access panics.","fix":"Add an early return at the top of parse_as_utf8: `if input.is_empty() { return (1, 0x11_0000); }`.","locations":[{"ref":"src/enc/utf8_util.rs:3-8","code":"    3 | fn parse_as_utf8(input: &[u8], size: usize) -> (usize, i32) {\n    4 |     if (input[0] & 0x80) == 0 {\n    5 |         if input[0] > 0 {\n    6 |             return (1, i32::from(input[0]));\n    7 |         }\n    8 |     }","lines":6}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"WorkerPool::spawn (line 373-374) permits jobs + in_progress + results <= MAX_THREADS (<=, inclusive). FixedQueue has exactly MAX_THREADS slots. If all MAX_THREADS jobs complete before any result is joined, results.push(ret).unwrap() at line 159 tries to push into a full queue; push() returns Err(()) and unwrap() panics. The internal _push_job helper correctly uses < MAX_THREADS, but the BatchSpawnableLite::spawn implementation does not. In practice CompressMulti only ever spawns num_threads-1 jobs, so this is not triggered by default usage, but the public API permits it.","fix":"Change the spawn condition from <= MAX_THREADS to < MAX_THREADS, matching the _push_job / _try_push_job helpers.","locations":[{"ref":"src/enc/worker_pool.rs:373-374","code":"  373 |             if local_queue.jobs.size() + local_queue.num_in_progress + local_queue.results.size()\n  374 |                 <= MAX_THREADS","lines":2},{"ref":"src/enc/worker_pool.rs:159","code":"  159 |                 local_queue.results.push(ret).unwrap();","lines":1}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"help_brotli_encoder_compress_single initializes total_out as Some(0) and then calls total_out.unwrap() on line 87 after compress_stream returns. compress_stream is permitted to set the Option to None (it is a mutable Option<usize>), in which case the unwrap panics. The caller BrotliEncoderCompressMulti wraps this in catch_panic, so on std the panic is caught and returns 0 (failure), but the encoded_size output parameter is left uninitialised/unchanged rather than being set to 0, which confuses the caller. In compressor.rs the analogous code correctly uses unwrap_or(0).","fix":"Replace total_out.unwrap() with total_out.unwrap_or(0), mirroring the pattern in compressor.rs:337.","locations":[{"ref":"src/ffi/multicompress/mod.rs:87","code":"   87 |     *encoded_size = total_out.unwrap();","lines":1}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"catbrotli's main panics with 'Unexpected state: Success when streaming before finish' if BroCatli::stream ever returns Success during streaming. The BroCatli contract does allow Success when num_bytes_written == num_bytes_read (all header bytes were flushed in one shot), so this panic could fire on valid input with a large enough output buffer, causing a spurious crash.","fix":"Treat BroCatliResult::Success the same as NeedsMoreInput and break from the inner loop, since all header data has been emitted.","locations":[{"ref":"src/bin/catbrotli.rs:126","code":"  126 |                                 panic!(\"Unexpected state: Success when streaming before finish\");","lines":1}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"to_context_enum().unwrap() in compute_huffman_table_index_for_context_map (ir_interpret.rs) panics if the prediction_mode nibble does not map to a known ContextType. The conversion is infallible for valid encoder state but produces a panic with no diagnostic if ever handed invalid data.","fix":"Return a Result or a default ContextType instead of unwrapping.","locations":[{"ref":"src/enc/ir_interpret.rs:96-96","code":"   96 |         prediction_mode.to_context_enum().unwrap(),","lines":1}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"FastPow2 in the no-std build (util.rs line 83) contains `assert!(v >= 0 as floatX)`, which panics on any negative input. The function is called from entropy cost calculations where negative values can arise from floating-point subtraction. The std build uses libm powf which simply returns NaN for negative bases, so the no-std and std builds have divergent behavior.","fix":"Replace the assert with a clamp: `let v = if v < 0.0 { 0.0 } else { v };` and proceed, or return 0.0 for negative inputs to match the graceful std behavior.","locations":[{"ref":"src/enc/util.rs:82-84","code":"   82 | pub fn FastPow2(v: floatX) -> floatX {\n   83 |     assert!(v >= 0 as floatX);\n   84 |     let round_down = v as i32;","lines":3}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"compute_normalized_weight in weights.rs divides by `total_8bit as u16` on line 66. total = model_weights[0] + model_weights[1]; if both weights are shifted to 0 by fix_weights (possible when ilog > max_log and the shift amount exceeds the bit width of the values), total_8bit is 0 and the division panics. fix_weights only runs when both weights are large, but repeated right-shifts in a tight loop can drive them to zero.","fix":"After computing total_8bit, add: `if total_8bit == 0 { return 1 << (BLEND_FIXED_POINT_PRECISION - 1); }` to return the neutral 50/50 weight instead of panicking.","locations":[{"ref":"src/enc/weights.rs:57-67","code":"   57 | fn compute_normalized_weight(model_weights: [i32; 2]) -> Prob {\n   58 |     let total = i64::from(model_weights[0]) + i64::from(model_weights[1]);\n   59 |     let leading_zeros = total.leading_zeros();\n   60 |     let shift = max(56 - (leading_zeros as i8), 0);\n   61 |     let total_8bit = total >> shift;\n   62 |     /*::probability::numeric::fast_divide_16bit_by_8bit(\n   63 |     ((model_weights[0] >> shift) as u16)<< 8,\n   64 |     ::probability::numeric::lookup_divisor8(total_8bit as u8)) << (BLEND_FIXED_POINT_PRECISION - 8)\n   65 |     */\n   66 |     ((((model_weights[0] >> shift) as u16) << 8) / total_8bit as u16/*fixme??*/)\n   67 |         << (BLEND_FIXED_POINT_PRECISION - 8)","lines":11},{"ref":"src/enc/weights.rs:72-79","code":"   72 | fn fix_weights(weights: &mut [i32; 2]) {\n   73 |     let ilog = 32 - min(weights[0].leading_zeros(), weights[1].leading_zeros());\n   74 |     let max_log = 24;\n   75 |     if ilog >= max_log {\n   76 |         weights[0] >>= ilog - max_log;\n   77 |         weights[1] >>= ilog - max_log;\n   78 |     }\n   79 | }","lines":8}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":true,"description":"In BrotliEncoderDestroyInstance, core::ptr::read(state_ptr) logically moves the value out of *state_ptr (line 135), but then (*state_ptr).custom_allocator.opaque is read again on line 137 to pass to free_fn. After ptr::read the memory is in a 'moved-out' state; reading it again is undefined behaviour. In practice the bytes are still physically present because free has not been called yet, so the read happens to work, but the compiler is entitled to assume the value is uninitialized after ptr::read and to reorder or elide the subsequent read. The same pattern is duplicated in BrotliEncoderDestroyWorkPool.","fix":"Save the opaque pointer into a local variable before calling ptr::read: let opaque = (*state_ptr).custom_allocator.opaque; let _to_free = ptr::read(state_ptr); free_fn(opaque, ptr);","locations":[{"ref":"src/ffi/compressor.rs:135-137","code":"  135 |             let _to_free = core::ptr::read(state_ptr);\n  136 |             let ptr = core::mem::transmute::<*mut BrotliEncoderState, *mut c_void>(state_ptr);\n  137 |             free_fn((*state_ptr).custom_allocator.opaque, ptr);","lines":3},{"ref":"src/ffi/multicompress/mod.rs:299-301","code":"  299 |                 let _to_free = core::ptr::read(wpp.0);\n  300 |                 let ptr = core::mem::transmute::<*mut BrotliEncoderWorkPool, *mut c_void>(wpp.0);\n  301 |                 free_fn((*wpp.0).custom_allocator.opaque, ptr);","lines":3}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"BrotliEncoderStateStruct intentionally has no Drop implementation (the commented-out Drop on encode.rs lines 527-532 with a TODO note). All allocation sites that create a BrotliEncoderStateStruct on the stack (e.g. encoder_compress lines 1475-1519, BrotliCompressCustomIoCustomDict lines 257-341 in mod.rs, compress_part lines 352-394 in threading/mod.rs) rely on a manual BrotliEncoderDestroyInstance call. If any code between creation and the explicit destroy call panics (assert failures, OOB slices, custom allocator panics), all encoder sub-allocations (storage_, commands_, ringbuffer data, large_table_, etc.) are permanently leaked.","fix":"Implement Drop for BrotliEncoderStateStruct calling self.cleanup(), or use a RAII guard (like the existing StateWrapper in reader.rs) at all call sites. The TODO comment acknowledges this intent.","locations":[{"ref":"src/enc/encode.rs:527-532","code":"  527 | // TODO: use drop trait ins e, this wraps silently in release builds, causing the copy-progress check to succeed prematurely and leaving data un-written.","fix":"Use checked or saturating addition, or assert that to_copy fits in u8 before casting.","locations":[{"ref":"src/bin/../concat/mod.rs:433-435","code":"  433 |         new_stream_pending.num_bytes_written =\n  434 |             Some((new_stream_pending.num_bytes_written.unwrap() + to_copy as u8));\n  435 |         if new_stream_pending.num_bytes_written.unwrap() != new_stream_pending.num_bytes_read {","lines":3}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"InitialEntropyCodes computes `block_length = length.wrapping_div(num_histograms)` (line 146). When num_histograms is 0, wrapping_div panics with integer division by zero in both debug and release builds (integer division by zero is always a panic in Rust, wrapping or not). Additionally, on line 153-154, when `pos.wrapping_add(stride) >= length` with `length < stride + 1`, the computed `pos = length.wrapping_sub(stride).wrapping_sub(1)` underflows to a huge usize, causing an out-of-bounds slice access on line 156.","fix":"Guard at the top of InitialEntropyCodes: `if num_histograms == 0 { return; }`. For the underflow: replace line 153-154 with `if length <= stride { pos = 0; } else if pos.wrapping_add(stride) >= length { pos = length - stride - 1; }`.","locations":[{"ref":"src/enc/block_splitter.rs:146-156","code":"  146 |     let block_length: usize = length.wrapping_div(num_histograms);\n  147 |     ClearHistograms(histograms, num_histograms);\n  148 |     for i in 0usize..num_histograms {\n  149 |         let mut pos: usize = length.wrapping_mul(i).wrapping_div(num_histograms);\n  150 |         if i != 0usize {\n  151 |             pos = pos.wrapping_add((MyRand(&mut seed) as usize).wrapping_rem(block_length));\n  152 |         }\n  153 |         if pos.wrapping_add(stride) >= length {\n  154 | elf::worker_pool::new_work_pool(alloc_per_thread.len() - 1);","lines":1}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"BrotliEncoderMallocUsize computes size * core::mem::size_of::<usize>() to pass to the custom alloc_func as a byte count. On a 64-bit target, size_of::<usize>() is 8, so a caller supplying size > usize::MAX / 8 (~2.3e18) causes a wrapping integer overflow in debug builds and undefined behaviour in release builds, leading to under-allocation followed by out-of-bounds writes.","fix":"Use size.checked_mul(core::mem::size_of::<usize>()).unwrap_or(0) and return null on overflow, or validate that size is below a sane threshold.","locations":[{"ref":"src/ffi/compressor.rs:397","code":"  397 |             size * core::mem::size_of::<usize>(),","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In flush_previous_stream the loop that finds the highest set bit uses a u16 variable 'last_bytes' but the mask '(1 << index)' is a plain i32 literal. When 'index' reaches 15 (valid for a 2-byte stream), '1 << 15' is 0x8000 as i32, but the comparison '((1 << index) & last_bytes) != 0' compares i32 with u16 after implicit widening. For index >= 16 this would be UB in C but in Rust it silently results in 0 because Rust truncates the shift, causing the highest-bit search to yield wrong results and potentially accepting corrupt streams.","fix":"Cast the literal to u16 or use '1u16 << index' throughout the bit-scan loop.","locations":[{"ref":"src/bin/../concat/mod.rs:293-298","code":"  293 |             for i in 0..max {\n  294 |                 index = max - 1 - i;\n  295 |                 if ((1 << index) & last_bytes) != 0 {\n  296 |                     break; // find the highest set bit\n  297 |                 }\n  298 |             }","lines":6}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In concat/mod.rs, parse_window_size accepts bytes_so_far[0] == 0x11 (i.e. 17 in decimal, value 0x11 = 17) via the branch at line 59 (match 0x1) which maps to window_size 17. However the sufficient() check at line 32 returns true after 4 bytes when 'bytes_so_far[0] & 127 != 17', meaning a stream whose first byte is 0x11 (17) requires 5 bytes. But parse_window_size is called with only num_bytes_read bytes (possibly 4) in shift_and_check_new_stream_header when sufficient() is true. For that specific byte value the fifth byte may never be passed to parse_window_size, causing it to parse with a truncated slice.","fix":"Ensure that the number of bytes passed to parse_window_size always matches what sufficient() required, or unify the sufficiency predicate with the parser's actual byte consumption.","locations":[{"ref":"src/bin/../concat/mod.rs:31-36","code":"   31 |     fn sufficient(&self) -> bool {\n   32 |         if self.num_bytes_read == 4 && (127 & self.bytes_so_far[0]) != 17 {\n   33 |             return true;\n   34 |         }\n   35 |         self.num_bytes_read == 5\n   36 |     }","lines":6},{"ref":"src/bin/../concat/mod.rs:338-344","code":"  338 |             let (window_size, window_offset) = if let Ok(results) = parse_window_size(\n  339 |                 &new_stream_pending.bytes_so_far[..usize::from(new_stream_pending.num_bytes_read)],\n  340 |             ) {\n  341 |                 results\n  342 |             } else {\n  343 |                 return BroCatliResult::InvalidWindowSize;\n  344 |             };","lines":7}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In concat/mod.rs append_eof_metablock_to_last_bytes, last_bytes_len is incremented unconditionally when the new bit_offset wraps past 8 (line 578). However last_bytes is only a 2-byte array, so if last_bytes_len is already 2 before the call, incrementing it to 3 silently makes last_bytes_le         Ok(())\n  252 |     }","lines":11}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"BrotliEncoderMaxCompressedSize (encode.rs line 1279) computes num_large_blocks as input_size >> 14 (dividing by 16 KiB), but then uses num_large_blocks << 24 (multiplying by 16 MiB) to compute the tail remainder via wrapping_sub. The shift magnitudes are inconsistent: the block granularity for the overhead formula should be 2^24 bytes (16 MiB), so the shift should be >> 24. Because wrapping_sub produces a very large usize when input_size < num_large_blocks * 16 MiB (i.e. for all inputs between 16 KiB and 16 MiB), tail is always treated as > 1 MiB and tail_overhead is always 4 instead of 3. This causes a constant overestimate of 1 overhead byte per call, which is safe but incorrect. The function still satisfies its contract of returning an upper bound.","fix":"Change num_large_blocks to input_size >> 24 so the division matches the 16 MiB block granularity used in the tail subtraction.","locations":[{"ref":"src/enc/encode.rs:1279-1280","code":" 1279 |     let num_large_blocks: usize = input_size >> 14;\n 1280 |     let tail: usize = input_size.wrapping_sub(num_large_blocks << 24);","lines":2}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In CreateCommands (min_match==4 branch), the hash update for the position ip_index-1 uses HashBytesAtOffset with offset 0 instead of offset 2. The other two updates in the same block correctly use offsets 0 and 1 for positions ip_index-3 and ip_index-2. Compare with the analogous loop body at lines 339-343 which uses offsets 0, 1, 2 correctly. Storing the wrong hash for position ip_index-1 corrupts the hash table and reduces compression ratio.","fix":"Change HashBytesAtOffset(input_bytes, 0i32, ...) on line 284 to HashBytesAtOffset(input_bytes, 2i32, ...).","locations":[{"ref":"src/enc/compress_fragment_two_pass.rs:284-284" nction that is actively used.","fix":"Rename _write_all to write_all (without the underscore) to match its actual usage.","locations":[{"ref":"src/bin/integration_tests.rs:64","code":"   64 | fn _write_all<OutputType>(w: &mut OutputType, buf: &[u8]) -> Result<(), io::Error>","lines":1},{"ref":"src/bin/integration_tests.rs:157","code":"  157 |                     _write_all(&mut w, &output.slice()[..output_offset]).unwrap();","lines":1},{"ref":"src/bin/integration_tests.rs:182","code":"  182 |                 _write_all(&mut w, &output.slice()[..output_offset]).unwrap();","lines":1}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"Multiple locations in hq.rs contain `if !(0i32 == 0) { return; }` guards. The condition `0 == 0` is always true so `!(0 == 0)` is always false, meaning the body never executes. These are leftover C-to-Rust translation artifacts where a null-allocation check was mechanically converted to an always-false branch.","fix":"Remove the dead branches entirely.","locations":[{"ref":"src/enc/backward_references/hq.rs:897-897","code":"  897 |     if !(0i32 == 0) {","lines":1},{"ref":"src/enc/backward_references/hq.rs:1009-1009","code":" 1009 |     if !(0i32 == 0) {","lines":1},{"ref":"src/enc/backward_references/hq.rs:1027-1027","code":" 1027 |     if !(0i32 == 0) {","lines":1},{"ref":"src/enc/backward_references/hq.rs:1385-1385","code":" 1385 |     if !(0i32 == 0) {","lines":1},{"ref":"src/enc/backward_references/hq.rs:1389-1389","code":" 1389 |     if !(0i32 == 0) {","lines":1}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The more_data: *mut c_void field in BroccoliState is always initialised to null_mut() and never read or written by any code in the codebase. It occupies space in the repr(C) struct (which is part of the ABI), making the layout larger than necessary and creating a misleading implication that it holds meaningful state.","fix":"Remove the more_data field from BroccoliState if it serves no purpose. If it is reserved for future ABI extension, add a comment explaining that.","locations":[{"ref":"src/ffi/broccoli.rs:17-19","code":"   17 |     more_data: *mut c_void,\n   18 |     current_data: [u8; 120],\n   19 | }","lines":3},{"ref":"src/ffi/broccoli.rs:26","code":"   26 |             more_data: self.more_data,","lines":1},{"ref":"src/ffi/broccoli.rs:44","code":"   44 |             more_data: core::ptr::null_mut(),","lines":1}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"Both src/ffi/compressor.rs and src/ffi/multicompress/mod.rs begin with #![cfg(not(feature = \"safe\"))]. The \"safe\" feature is not declared in Cargo.toml and therefore can never be enabled. This cfg guard is permanently true and provides no actual conditional compilation. It misleads readers into thinking there is a safe-mode build variant that excludes these modules.","fix":"Either declare a \"safe\" feature in Cargo.toml and wire it up properly, or remove the cfg guard entirely.","locations":[{"ref":"src/ffi/compressor.rs:1","code":"    1 | #![cfg(not(feature = \"safe\"))]","lines":1},{"ref":"src/ffi/multicompress/mod.rs:1","code":"    1 | #![cfg(not(feature = \"safe\"))]","lines":1}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"ChooseHasher sets hparams.type_ to 40, 41, or 42 for lgwin <= 16 at encode.rs lines 855-862. BrotliMakeHasher has no match arm for any of these values and falls through to the default InitializeH6 call at line 1114. The type_ field is overwritten before it is used to construct a hasher. The resulting hasher is H6 regardless of the 40/41/42 assignment, so the conditional selection logic at lines 855-862 is effectively dead.","fix":"Either implement hasher types 40-42 or remove the lgwin<=16 branch and let the code fall through to the H5/H6 selection that already exists.","locations":[{"ref":"src/enc/encode.rs:855-862","code":"  855 |     } else if params.lgwin <= 16 {\n  856 |         hparams.type_ = if params.quality < 7 {\n  857 |             40i32\n  858 |         } else if params.quality < 9 {\n  859 |             41i32\n  860 |         } else {\n  861 |             42i32\n  862 |         };","lines":8},{"ref":"src/enc/encode.rs:1072-1114","code":" 1072 | fn BrotliMakeHasher<Alloc: alloc::Allocator<u16> + alloc::Allocator<u32>>(\n 1073 |     m: &mut Alloc,\n 1074 |     params: &BrotliEncoderParams,\n 1075 |     ringbuffer_break: Option<core::num::NonZeroUsize>,\n 1076 | ) -> UnionHasher<Alloc> {\n 1077 |     let hasher_type: i32 = params.hasher.type_;\n 1078 |     if hasher_type == 2i32 {\n 1079 |         return UnionHasher::H2(InitializeH2(m, params));\n 1080 |     }\n 1081 |     if hasher_type == 3i32 {\n 1082 |         return UnionHasher::H3(InitializeH3(m, params));\n 1083 |     }\n 1084 |     if hasher_type == 4i32 {\n 1085 |         return UnionHasher::H4(InitializeH4(m, params));\n 1086 |     }\n 1087 |     if hasher_type == 5i32 {\n 1088 |         return InitializeH5(m, params);\n 1089 |     }\n 1090 |     if hasher_type == 6i32 {\n 1091 |         return InitializeH6(m, params);\n 1092 |     }\n 1093 |     if hasher_type == 9i32 {\n 1094 |         return UnionHasher::H9(InitializeH9(m, params));\n 1095 |     }\n 1096 |     /*\n 1097 |         if hasher_type == 40i32 {\n 1098 |           return InitializeH40(params);\n 1099 |         }\n 1100 |         if hasher_type == 41i32 {\n 1101 |           return InitializeH41(params);\n 1102 |         }\n 1103 |         if hasher_type == 42i32 {\n 1104 |           return InitializeH42(params);\n 1105 |         }\n 1106 |     */\n 1107 |     if hasher_type == 54i32 {\n 1108 |         return UnionHasher::H54(InitializeH54(m, params));\n 1109 |     }\n 1110 |     if hasher_type == 10i32 {\n 1111 |         return UnionHasher::H10(InitializeH10(m, false, params, ringbuffer_break, 0));\n 1112 |     }\n 1113 |     // since we don't support all of these, fall back to something sane\n 1114 |     InitializeH6(m, params)","lines":43}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"bit_cost_of_data_subset in find_stride.rs increments scratch.bucket_populations[65535] by 1 and then immediately decrements it by 1. The comment says 'to demonstrate that we have write capability' - this is leftover debug scaffolding that performs a no-op mutation on live data.","fix":"Remove both lines. If write-capability demonstration is needed for testing, put it in a #[cfg(test)] block.","locations":[{"ref":"src/enc/find_stride.rs:129-130","code":"  129 |         scratch.bucket_populations.slice_mut()[65535] += 1; // to demonstrate that we have\n  130 |         scratch.bucket_populations.slice_mut()[65535] -= 1; // to demonstrate that we have write capability","lines":2}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"In HistogramSelfAddHistogram (histogram.rs), h0a is assigned `xself[i0].slice().len()` which is identical to h0 on the preceding line. The subsequent `min(h0, min(h0a, h1))` always equals `min(h0, h1)`. h0a provides no value and the dead variable adds reader confusion.","fix":"Remove h0a and simplify to `let n = min(h0, h1);`.","locations":[{"ref":"src/enc/histogram.rs:437-440","code":"  437 |     let h0 = xself[i0].slice().len();\n  438 |     let h0a = xself[i0].slice().len();\n  439 |     let h1 = xself[i1].slice().len();\n  440 |     let n = min(h0, min(h0a, h1));","lines":4}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"src/enc/pdf.rs contains only a single struct PDF([i16; 16]) annotated with #[allow(dead_code)] and a FIXME comment. The struct is instantiated only in test scaffolding (define_allocator_memory_pool in test.rs) and is not used anywhere in production code paths. The file exists as a stub placeholder.","fix":"Either implement the intended SIMD PDF type or remove the file and all references to it in the allocator setup.","locations":[{"ref":"src/enc/pdf.rs:1-6","code":"    1 | //TODO: replace with builtin SIMD type\n    2 | \n    3 | // FIXME!!!\n    4 | #[allow(dead_code)]\n    5 | #[derive(Copy, Clone, Default, Debug)]\n    6 | pub struct PDF([i16; 16]);","lines":6}]},{"id":"DEAD_9","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"kUppercaseFirst and kOmitLastNTransforms in static_dict.rs are both annotated #[allow(unused)] but kOmitLastNTransforms is actually used in BrotliFindAllStaticDictionaryMatches at line 372. The suppression attribute on kOmitLastNTransforms is unnecessary and misleading; the one on kUppercaseFirst is correct.","fix":"Remove #[allow(unused)] from kOmitLastNTransforms since it is used.","locations":[{"ref":"src/enc/static_dict.rs:10-14","code":"   10 | #[allow(unused)]\n   11 | static kUppercaseFirst: u8 = 10u8;\n   12 | \n   13 | #[allow(unused)]\n   14 | static kOmitLastNTransforms: [u8; 10] = [0, 12, 27, 23, 42, 63, 56, 48, 59, 64];","lines":5}]},{"id":"DEAD_10","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"FindMatchLengthWithLimit, SlowerFindMatchLengthWithLimit, and slowFindMatchLengthWithLimit are all marked #[allow(unused)] and are never called in production code. They exist as reference implementations and benchmarks. The three duplicate slow implementations add maintenance burden.","fix":"Remove or gate unused reference implementations behind #[cfg(test)] or a feature flag.","locations":[{"ref":"src/enc/static_dict.rs:114-131","code":"  114 | #[allow(unused)]\n  115 | pub fn SlowerFindMatchLengthWithLimit(s1: &[u8], s2: &[u8], limit: usize) -> usize {\n  116 |     for index in 0..limit {\n  117 |         if s1[index] != s2[index] {\n  118 |             return index;\n  119 | // Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {

      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';

  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];

  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).

    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));

    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));

  return chunks.join('\n\n') + '\n';

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');

  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)

  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
