<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"HuffmanCode::build() indexes lengths[0] (line 36) after popping, with no guard for an empty values list. A HuffmanCode parsed with all 17 counts == 0 yields sum_counts == 0, so values is empty and lengths is empty; lengths.pop() is a no-op and lengths[0] panics with out-of-bounds. counts/values come straight from attacker-controlled bitstream data (lib.rs HuffmanCode::parse, lines 70-83) with no validation that the table is non-empty. build() is invoked from DHT marker processing (reconstruct.rs:483), so a crafted jbrd box causes a panic during reconstruction.","fix":"Return crate::Error::InvalidData (make build() fallible) when values.is_empty(), or guard: if lengths.is_empty() return an empty/invalid table error instead of indexing lengths[0]. Validate sum_counts > 0 at parse time.","locations":[{"ref":"crates/jxl-jbr/src/huffman.rs:34-45","code":"   34 |         let mut bits = Vec::with_capacity(values.len());\n   35 |         let mut next_code = 0u64;\n   36 |         let mut prev_len = lengths[0];\n   37 |         for &len in &lengths {\n   38 |             let shift_len = 64 - len;\n   39 |             if len != prev_len {\n   40 |                 next_code <<= len - prev_len;\n   41 |                 prev_len = len;\n   42 |             }\n   43 |             bits.push(next_code << shift_len);\n   44 |             next_code += 1;\n   45 |         }","lines":12,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/huffman.rs#L34-L45"},{"ref":"crates/jxl-jbr/src/huffman.rs:36","code":"   36 |         let mut prev_len = lengths[0];","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/huffman.rs#L36"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"expected_icc_len/expected_exif_len/expected_xmp_len compute am.length - 5 - HEADER_ICC.len() (=17), am.length - 3 - 6 (=9), am.length - 3 - 29 (=32) respectively. am.length is read_bits(16)+1 (1..=65536), fully attacker-controlled. If a marker of the corresponding type has length below the subtracted constant, the usize subtraction underflows and panics. These are called from JpegBitstreamReconstructor::new (reconstruct.rs:64-66) during reconstruction setup with attacker data.","fix":"Use checked_sub and treat None / too-short markers as Error::InvalidData; validate marker lengths against the required header prefix length at parse time.","locations":[{"ref":"crates/jxl-jbr/src/lib.rs:266-288","code":"  266 |     pub fn expected_icc_len(&self) -> usize {\n  267 |         self.app_markers\n  268 |             .iter()\n  269 |             .filter(|am| am.ty == 1)\n  270 |             .map(|am| am.length as usize - 5 - HEADER_ICC.len())\n  271 |             .sum::<usize>()\n  272 |     }\n  273 | \n  274 |     pub fn expected_exif_len(&self) -> usize {\n  275 |         self.app_markers\n  276 |             .iter()\n  277 |             .find(|am| am.ty == 2)\n  278 |             .map(|am| am.length as usize - 3 - HEADER_EXIF.len())\n  279 |             .unwrap_or(0)\n  280 |     }\n  281 | \n  282 |     pub fn expected_xmp_len(&self) -> usize {\n  283 |         self.app_markers\n  284 |             .iter()\n  285 |             .find(|am| am.ty == 3)\n  286 |             .map(|am| am.length as usize - 3 - HEADER_XMP.len())\n  287 |             .unwrap_or(0)\n  288 |     }","lines":23,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/lib.rs#L266-L288"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"DHT processing computes &hc.values[..hc.values.len() - 1]. If hc.values is empty (sum_counts == 0, all counts zero, fully attacker-controlled), values.len() - 1 underflows (usize 0-1) and panics. Same crafted input that triggers the huffman.rs:36 panic reaches here.","fix":"Validate hc.values is non-empty before subtracting, or reject empty Huffman tables during header parsing with Error::InvalidData.","locations":[{"ref":"crates/jxl-jbr/src/reconstruct.rs:480","code":"  480 |                         .write_all(&hc.values[..hc.values.len() - 1])","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct.rs#L480"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"ScanComponentInfo.comp_idx is read as a 2-bit field (0..=3) with no validation (lib.rs:386), but it is used to index self.header.components (which has 1..=4 entries). If comp_idx >= components.len() this panics with out-of-bounds indexing during SOS marker processing.","fix":"Validate comp_idx < components.len() for every scan component during header parse or before indexing, returning Error::InvalidData otherwise.","locations":[{"ref":"crates/jxl-jbr/src/reconstruct.rs:537","code":"  537 |                     let id = self.header.components[c.comp_idx as usize].id;","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct.rs#L537"},{"ref":"crates/jxl-jbr/src/lib.rs:386","code":"  386 |             comp_idx: bitstream.read_bits(2)? as u8,","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/lib.rs#L386"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"comp_idx (0..=3, attacker-controlled, no validation) is used to index jpeg_upsampling_ycbcr which is a [u32; 3] array. comp_idx == 3 panics with out-of-bounds. Two occurrences (hsamples and vsamples computation) in SOS processing.","fix":"Validate comp_idx is within 0..3 (and within the actual component count) during header parse; reject larger values with Error::InvalidData.","locations":[{"ref":"crates/jxl-jbr/src/reconstruct.rs:556","code":"  556 |                     .map(|c| [1u32, 2, 2, 1][jpeg_upsampling_ycbcr[c.comp_idx as usize] as usize])","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct.rs#L556"},{"ref":"crates/jxl-jbr/src/reconstruct.rs:560","code":"  560 |                     .map(|c| [1u32, 2, 1, 2][jpeg_upsampling_ycbcr[c.comp_idx as usize] as usize])","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct.rs#L560"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In process_scan, ss = si.ss.max(1) and se = si.se + 1, both derived from unvalidated 6-bit fields. For progressive scans (process_scan::<1> and ::<2>) there is no validation of ss/se (only the sequential path at reconstruct.rs:597 enforces ss==0, se==0x3f). If si.ss > si.se+1 then ss > se, so DCT8_NATURAL_ORDER[ss as usize..se as usize] (a 64-element slice) is sliced with start > end and panics. The same ss>se also makes Vec::with_capacity((se - ss) as usize) underflow (usize subtraction) at scan.rs:479.","fix":"Validate ss <= se and se <= 64 (i.e. si.ss <= si.se and si.se <= 0x3f) for progressive scans during header parse or at the start of process_scan; reject with Error::InvalidData.","locations":[{"ref":"crates/jxl-jbr/src/reconstruct/scan.rs:400-401","code":"  400 |         let ss = si.ss.max(1);\n  401 |         let se = si.se + 1;","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct/scan.rs#L400-L401"},{"ref":"crates/jxl-jbr/src/reconstruct/scan.rs:479-480","code":"  479 |                             let mut ac_coeffs: Vec<i16> = Vec::with_capacity((se - ss) as usize);\n  480 |                             for &(x, y) in &jxl_vardct::DCT8_NATURAL_ORDER[ss as usize..se as usize]","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct/scan.rs#L479-L480"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In process_scan, when do_ycbcr is false, the component index is mapped via the 3-element array literal [1, 0, 2][c.comp_idx as usize]. comp_idx is 0..=3 and unvalidated, so comp_idx == 3 panics with out-of-bounds indexing.","fix":"Validate comp_idx < 3 (or < number of components) at parse time; reject otherwise with Error::InvalidData.","locations":[{"ref":"crates/jxl-jbr/src/reconstruct/scan.rs:443","code":"  443 |                         [1, 0, 2][c.comp_idx as usize]","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct/scan.rs#L443"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In the slow palette inverse path, `1i32 << bit_depth` is evaluated with `bit_depth` taken directly from image metadata `bits_per_sample`. For float samples `bits_per_sample` may be 32 (jxl-image only clamps the *integer* sample case to <= 31). A shift of an i32 by 32 or more is an unconditional panic in Rust (\"attempt to shift left with overflow\") in both debug and release builds. An attacker can craft a 32-bit-float image whose color channels use a Palette transform with at least one out-of-range (non-simple) index, reaching this code and crashing the decoder (DoS).","fix":"Clamp/validate the shift amount before shifting, e.g. compute `let scale = 1i64 << bit_depth.min(31);` (or use checked/saturating arithmetic on i64) and reject bit_depth values that cannot be represented, instead of `1i32 << bit_depth`.","locations":[{"ref":"crates/jxl-modular/src/transform/palette.rs:72-85","code":"   72 |                     if index < 64 {\n   73 |                         for (c, sample) in channels_it.enumerate() {\n   74 |                             *sample = S::from_i32(\n   75 |                                 ((index >> (2 * c)) % 4) * ((1i32 << bit_depth) - 1) / 4\n   76 |                                     + (1i32 << bit_depth.saturating_sub(3)),\n   77 |                             );\n   78 |                         }\n   79 |                     } else {\n   80 |                         let mut index = index - 64;\n   81 |                         for sample in channels_it {\n   82 |                             *sample = S::from_i32((index % 5) * ((1i32 << bit_depth) - 1) / 4);\n   83 |                             index /= 5;\n   84 |                         }\n   85 |                     }","lines":14,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-modular/src/transform/palette.rs#L72-L85"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"DHT and DQT processing call .expect(\"is_last not found\") on the result of finding a Huffman code / quant table with is_last set. The is_last flags are attacker-controlled (lib.rs HuffmanCode::parse / QuantTable::parse). If a marker stream contains a DHT/DQT marker but the corresponding huffman_code_ptr/quant_ptr slice has no entry with is_last == true (or is empty), .expect panics.","fix":"Replace .expect with ok_or(Error::InvalidData)? and propagate, rather than panicking on malformed marker/table data.","locations":[{"ref":"crates/jxl-jbr/src/reconstruct.rs:456-457","code":"  456 |                 let last_idx = self.huffman_code_ptr.iter().position(|hc| hc.is_last);\n  457 |                 let num_tables = last_idx.expect(\"is_last not found\") + 1;","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct.rs#L456-L457"},{"ref":"crates/jxl-jbr/src/reconstruct.rs:620-621","code":"  620 |                 let last_idx = self.quant_ptr.iter().position(|qt| qt.is_last);\n  621 |                 let num_tables = last_idx.expect(\"is_last not found\") + 1;","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct.rs#L620-L621"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"process_next pulls from several iterators / slices with .next().unwrap() and split_at(length) keyed on marker bytes and lengths that are attacker-controlled. APPn (app_marker_ptr.next().unwrap()), COM (com_length.next().unwrap() + com_data.split_at(length)), and intermarker (intermarker_length.next().unwrap() + intermarker_data.split_at(length)). If the marker sequence in `markers` does not match the counts/lengths arrays (counted independently during header parse), unwrap panics or split_at panics on out-of-range length.","fix":"Return Error::InvalidData on iterator exhaustion (ok_or) and use checked slicing (split_at_checked / len checks) instead of unwrap/split_at panics.","locations":[{"ref":"crates/jxl-jbr/src/reconstruct.rs:697","code":"  697 |                 let am = self.app_marker_ptr.next().unwrap();","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct.rs#L697"},{"ref":"crates/jxl-jbr/src/reconstruct.rs:763-764","code":"  763 |                 let length = *self.com_length.next().unwrap();\n  764 |                 let (com_data, next) = self.com_data.split_at(length as usize);","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct.rs#L763-L764"},{"ref":"crates/jxl-jbr/src/reconstruct.rs:776-777","code":"  776 |                 let length = *self.intermarker_length.next().unwrap();\n  777 |                 let (data, next) = self.intermarker_data.split_at(length as usize);","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct.rs#L776-L777"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"ICC APPn reconstruction computes len = am.length as usize - 5 - HEADER_ICC.len() (= am.length - 17). am.length is attacker-controlled (1..=65536); if < 17 this underflows and panics. Even when not underflowing, self.icc_profile[from..][..len] can panic out-of-bounds if the per-marker lengths exceed the actual icc_profile (only the total is checked against icc_profile.len() in new(), not each marker).","fix":"Compute len with checked_sub, and slice with get(from..).and_then(|s| s.get(..len)), returning Error::InvalidData on None instead of panicking.","locations":[{"ref":"crates/jxl-jbr/src/reconstruct.rs:724-731","code":"  724 |                         let from = self.icc_marker_offset;\n  725 |                         let len = am.length as usize - 5 - HEADER_ICC.len();\n  726 |                         self.next_icc_marker += 1;\n  727 |                         self.icc_marker_offset += len;\n  728 | \n  729 |                         writer\n  730 |                             .write_all(&self.icc_profile[from..][..len])\n  731 |                             .map_err(Error::ReconstructionWrite)?;","lines":8,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct.rs#L724-L731"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"emit_eobrun calls self.last_ac_table.expect(\"last_ac_table not initialized\"). If a progressive scan produces a nonzero eobrun before any AC table was initialized (try_init_ac_table is only called inside the per-block loop, and update_ac_table only runs when eobrun == 0), reaching emit_eobrun with last_ac_table == None panics. flush_bit_writer/restart call emit_eobrun; reachability depends on crafted scan data, but it is an expect on a data-dependent invariant.","fix":"Return Error::InvalidData when last_ac_table is None and eobrun != 0, instead of panicking via expect.","locations":[{"ref":"crates/jxl-jbr/src/reconstruct/scan.rs:70","code":"   70 |         let ac_table = self.last_ac_table.expect(\"last_ac_table not initialized\");","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/reconstruct/scan.rs#L70"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`prepare_groups` calls `.find(...).unwrap()` to map a channel shift to a pass index. `shift = hshift.min(vshift)` (with shift < 3 in this branch) is derived from attacker-controlled Squeeze transforms, while the pass-shift ranges come from frame header passes. If a decoded channel's shift is not covered by any `(minshift..maxshift)` range in `pass_shifts`, the `unwrap()` panics, crashing the decoder on malformed input.","fix":"Replace the `unwrap()` with a proper error: return e.g. `Error::InvalidSqueezeParams` if no pass range contains the shift, instead of panicking.","locations":[{"ref":"crates/jxl-modular/src/image.rs:257-264","code":"  257 |             let (groups, grids) = if hshift < 3 || vshift < 3 {\n  258 |                 let shift = hshift.min(vshift); // shift < 3\n  259 |                 let pass_idx = *pass_shifts\n  260 |                     .iter()\n  261 |                     .find(|&(_, &(minshift, maxshift))| (minshift..maxshift).contains(&shift))\n  262 |                     .unwrap()\n  263 |                     .0;\n  264 |                 let pass_idx = pass_idx as usize;","lines":8,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-modular/src/image.rs#L257-L264"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In `stream_to_buf`, the fallback branch taken when the output buffer is not bytemuck-castable to `Sample` allocates the temporary row with `Vec::with_capacity(width)` and then calls `row.fill_with(Sample::default)`. `fill_with` operates on the slice, which has length 0 (capacity != length), so the vector stays empty. `stream.write_to_buffer(&mut row)` then writes nothing, and `buf_row[..stride].copy_from_slice(row)` panics because `row` has length 0 while `stride > 0`. The whole branch produces wrong/empty output even if the lengths happened to match. This path is normally avoided because u8/u16/f32 are castable, but it is reachable on misaligned buffers.","fix":"Allocate the row with the correct length, e.g. `let mut row = vec![Sample::default(); stream.width() as usize * stream.channels() as usize];`, and write into it before casting/copying.","locations":[{"ref":"crates/jxl-oxide/src/integration/image.rs:436-444","code":"  436 |         let mut row = Vec::with_capacity(stream.width() as usize);\n  437 |         row.fill_with(Sample::default);\n  438 |         for buf_row in buf.chunks_exact_mut(stride) {\n  439 |             stream.write_to_buffer(&mut row);\n  440 | \n  441 |             let row = bytemuck::cast_slice::<Sample, u8>(&row);\n  442 |             buf_row[..stride].copy_from_slice(row);\n  443 |         }\n  444 |     }","lines":9,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide/src/integration/image.rs#L436-L444"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`read_varint`/`read_varint_with_multiplier` index `self.inner.clusters[ctx as usize]` without bounds checking. `ctx` is supplied by the caller; an out-of-range context (e.g. a context table mismatch elsewhere in the decoder) panics instead of returning an error. This is a public API entry point reachable on attacker-controlled images via the context computed by higher-level decoders.","fix":"Either document the precondition and have all callers validate `ctx < clusters.len()`, or use `clusters.get(ctx as usize)` and return a decoding error on overflow.","locations":[{"ref":"crates/jxl-coding/src/lib.rs:63-72","code":"   63 |     #[inline]\n   64 |     pub fn read_varint_with_multiplier(\n   65 |         &mut self,\n   66 |         bitstream: &mut Bitstream,\n   67 |         ctx: u32,\n   68 |         dist_multiplier: u32,\n   69 |     ) -> CodingResult<u32> {\n   70 |         let cluster = self.inner.clusters[ctx as usize];\n   71 |         self.read_varint_with_multiplier_clustered(bitstream, cluster, dist_multiplier)\n   72 |     }","lines":10,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-coding/src/lib.rs#L63-L72"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`colour_encoding_to_icc` (ICC synthesis from an enum encoding) contains several `panic!`/`todo!` reachable from a fully-decoded `EnumColourEncoding`: `TransferFunction::Unknown => panic!()`, `ColourSpace::Xyb => todo!()` (twice), and `ColourSpace::Unknown => panic!(...)`. A JXL stream can signal `ColourSpace::Unknown` and `TransferFunction::Unknown`; if such an encoding reaches ICC synthesis (e.g. an Enum->ICC transform target, or embedding a generated profile), the decoder panics instead of returning an error. Lower severity because it is the output/synthesis path rather than parsing of untrusted bytes, but it is still a panic on attacker-influenced metadata.","fix":"Change `colour_encoding_to_icc` to return `Result` and surface `Error::UnsupportedColorEncoding` for Unknown/Xyb/Unknown-tf cases instead of panicking.","locations":[{"ref":"crates/jxl-color/src/icc/synthesize.rs:97-99","code":"   97 |     if colour_space == ColourSpace::Xyb {\n   98 |         todo!(\"ICC profile for XYB color space is not supported yet\");\n   99 |     }","lines":3,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/icc/synthesize.rs#L97-L99"},{"ref":"crates/jxl-color/src/icc/synthesize.rs:211","code":"  211 |         TransferFunction::Unknown => panic!(),","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/icc/synthesize.rs#L211"},{"ref":"crates/jxl-color/src/icc/synthesize.rs:271-272","code":"  271 |         ColourSpace::Xyb => todo!(),\n  272 |         ColourSpace::Unknown => panic!(\"Unknown color space, ICC profile not embedded?\"),","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/icc/synthesize.rs#L271-L272"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`pq_table(n)` and `hlg_table(n)` compute `(n - 1)` (and `(n-1)*(n-1)`) in `usize`; `n == 0` underflows (panic in checked builds / huge index otherwise) and `n == 1` causes division by zero producing NaN/Inf that is then cast to u16. Both are currently only called internally with the constant `4096`, so not reachable from untrusted input today, but the functions are fragile and have no guard.","fix":"Add `assert!(n >= 2)` (or handle small `n` explicitly) at the top of both table builders.","locations":[{"ref":"crates/jxl-color/src/tf/pq.rs:441","code":"  441 |         let e = idx as f64 / (n - 1) as f64;","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/tf/pq.rs#L441"},{"ref":"crates/jxl-color/src/tf.rs:180-186","code":"  180 |     for (idx, out) in out[..=(n - 1) / 2].iter_mut().enumerate() {\n  181 |         let d = (idx * idx) as f64 / (3 * (n - 1) * (n - 1)) as f64;\n  182 |         *out = (d * 65535.0) as u16; // clamped\n  183 |     }\n  184 |     for (idx, out) in out[(n - 1) / 2 + 1..].iter_mut().enumerate() {\n  185 |         let idx = idx + (n - 1) / 2 + 1;\n  186 |         let e = idx as f64 / (n - 1) as f64;","lines":7,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/tf.rs#L180-L186"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`HfGlobalParams::new` panics with `panic!(\"VarDCT not initialized\")` if `lf_global.vardct` is None. This is an invariant-relies-on-caller panic reachable only when the caller mis-sequences parsing (HfGlobal requested for a frame whose LfGlobal had no VarDCT). try_parse_hf_global guards Modular frames, so it is not directly attacker-triggerable today, but it is a hard panic in a decoder library rather than a typed error.","fix":"Return a `Result`/typed error (e.g. Error::IncompleteFrameData or a validation error) instead of panicking.","locations":[{"ref":"crates/jxl-frame/src/data/hf_global.rs:30-32","code":"   30 |         let Some(lf_vardct) = &lf_global.vardct else {\n   31 |             panic!(\"VarDCT not initialized\")\n   32 |         };","lines":3,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-frame/src/data/hf_global.rs#L30-L32"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"compute_default_width ends with _ => panic!(\"Invalid ratio const: {ratio}\"). ratio is a 3-bit field (0..=7) and all 8 arms are covered, so unreachable today, but it is an attacker-field-driven panic that becomes live if the ratio bit-width or this helper's reuse changes. A decoder of untrusted data should not panic! on a header field value.","fix":"Make the function fallible and return Error::ValidationFailed, or use unreachable!() only with a statically-enforced 3-bit invariant at the call site.","locations":[{"ref":"crates/jxl-image/src/lib.rs:107-122","code":"  107 |     fn compute_default_width(ratio: u32, w_div8: u32, height: u32) -> u32 {\n  108 |         let height = height as u64;\n  109 |         let res = match ratio {\n  110 |             0 => 8 * w_div8 as u64,\n  111 |             1 => height,\n  112 |             2 => height * 12 / 10,\n  113 |             3 => height * 4 / 3,\n  114 |             4 => height * 3 / 2,\n  115 |             5 => height * 16 / 9,\n  116 |             6 => height * 5 / 4,\n  117 |             7 => height * 2,\n  118 |             _ => panic!(\"Invalid ratio const: {ratio}\"),\n  119 |         };\n  120 |         res as u32\n  121 |     }\n  122 | }","lines":16,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-image/src/lib.rs#L107-L122"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Squeeze::set_default_params` indexes `channels.info[first as usize]` (first = nb_meta_channels) and later computes `channels.info.len() as u32 - first` without first checking that `first < channels.info.len()`. If a preceding transform leaves `nb_meta_channels >= channels.info.len()`, the index panics or the subtraction underflows (debug panic). The default-params path runs on transform-derived channel state, so this is reachable from crafted transform sequences.","fix":"Guard with `if first as usize >= channels.info.len() { return; }` (or return an error) before indexing and computing `len - first`.","locations":[{"ref":"crates/jxl-modular/src/transform.rs:285-294","code":"  285 |     fn set_default_params(&mut self, channels: &super::ModularChannels) {\n  286 |         if !self.sp.is_empty() {\n  287 |             return;\n  288 |         }\n  289 | \n  290 |         let first = channels.nb_meta_channels;\n  291 |         let first_ch = &channels.info[first as usize];\n  292 |         let mut w = first_ch.width;\n  293 |         let mut h = first_ch.height;\n  294 |         if channels.info.len() as u32 - first >= 3 {","lines":10,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-modular/src/transform.rs#L285-L294"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"LoadProgress arithmetic divides by total_bytes / unit_step without guarding zero. `try_increase_step` computes `self.bytes_read * 100 / self.total_bytes` and `progress()` divides by `total_bytes`; `step_cap` computes `self.total_bytes.div_ceil(self.unit_step * 100)`. If `total_bytes` is 0 (input metadata().len() failed, e.g. a pipe/FIFO) and the second loop is reached, this panics with divide-by-zero; if unit_step ends up 0 (when both unit_step arg and total_bytes are 0) step_cap also panics.","fix":"Guard total_bytes == 0 (already partially handled in Display) before the divisions, and ensure unit_step is at least 1.","locations":[{"ref":"crates/jxl-oxide-cli/src/progressive.rs:99-157","code":"   99 |     fn new(mut unit_step: usize, total_bytes: usize) -> Self {\n  100 |         if unit_step == 0 {\n  101 |             // divide by 1500 (10% divided by 30 * 5), round up to unit of 100 bytes\n  102 |             unit_step = total_bytes.div_ceil(150000) * 100;\n  103 |         }\n  104 | \n  105 |         Self {\n  106 |             iter: 0,\n  107 |             unit_step,\n  108 |             current_step: unit_step,\n  109 |             bytes_read: 0,\n  110 |             total_bytes,\n  111 |         }\n  112 |     }\n  113 | \n  114 |     #[inline]\n  115 |     fn add_iter(&mut self, bytes_read: usize) {\n  116 |         self.bytes_read += bytes_read;\n  117 |         self.iter += 1;\n  118 |     }\n  119 | \n  120 |     #[inline]\n  121 |     fn try_increase_step(&mut self) -> Option<usize> {\n  122 |         let progress_int = self.bytes_read * 100 / self.total_bytes;\n  123 |         let multiplier = match progress_int {\n  124 |             ..=9 => 1,\n  125 |             10..=24 => 2,\n  126 |             25..=49 => 4,\n  127 |             _ => 8,\n  128 |         };\n  129 |         let new_step = (self.unit_step * multiplier).min(self.step_cap());\n  130 |         if self.current_step != new_step {\n  131 |             self.current_step = new_step;\n  132 |             Some(new_step)\n  133 |         } else {\n  134 |             None\n  135 |         }\n  136 |     }\n  137 | \n  138 |     #[inline]\n  139 |     fn iter(&self) -> usize {\n  140 |         self.iter\n  141 |     }\n  142 | \n  143 |     #[inline]\n  144 |     fn current_step(&self) -> usize {\n  145 |         self.current_step\n  146 |     }\n  147 | \n  148 |     #[inline]\n  149 |     fn step_cap(&self) -> usize {\n  150 |         self.total_bytes.div_ceil(self.unit_step * 100) * self.unit_step\n  151 |     }\n  152 | \n  153 |     #[inline]\n  154 |     fn progress(&self) -> f64 {\n  155 |         self.bytes_read as f64 / self.total_bytes as f64\n  156 |     }\n  157 | }","lines":59,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide-cli/src/progressive.rs#L99-L157"}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In the slow-motion (and progressive) loops the read buffer is sliced as `buf[buf_valid..][..bytes_per_frame]`. `buf` is a fixed 4096-byte vector (slow_motion) and never grown; `buf_valid` accumulates bytes that the decoder did not consume. Once `buf_valid + bytes_per_frame > buf.len()` the inner slice `[..bytes_per_frame]` panics (index out of bounds). bytes_per_frame is clamped to <=1024 but buf_valid can exceed 3072 when the codestream withholds consumption (e.g. a frame header that needs more data).","fix":"Grow the buffer when `buf_valid + bytes_per_frame` exceeds its length, or read into `buf[buf_valid..]` capped to the available space without the unconditional `[..bytes_per_frame]` slice.","locations":[{"ref":"crates/jxl-oxide-cli/src/slow_motion.rs:83-89","code":"   83 |         let filled_buf = fill_buf(&mut input, &mut buf[buf_valid..][..bytes_per_frame])?;\n   84 |         if filled_buf.is_empty() {\n   85 |             tracing::warn!(\"Partial image\");\n   86 |             return Ok(());\n   87 |         }\n   88 |         progress.add_iter(filled_buf.len());\n   89 |         buf_valid += filled_buf.len();","lines":7,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide-cli/src/slow_motion.rs#L83-L89"},{"ref":"crates/jxl-oxide-cli/src/slow_motion.rs:119-127","code":"  119 |         let filled_buf = fill_buf(&mut input, &mut buf[buf_valid..][..bytes_per_frame])?;\n  120 |         if filled_buf.is_empty() {\n  121 |             if !image.is_loading_done() {\n  122 |                 tracing::warn!(\"Partial image\");\n  123 |             }\n  124 |             break;\n  125 |         }\n  126 |         progress.add_iter(filled_buf.len());\n  127 |         buf_valid += filled_buf.len();","lines":9,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide-cli/src/slow_motion.rs#L119-L127"}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"render_loading_frame_cropped can underflow. After `render_loading_keyframe()` succeeds it does `self.ctx.frame(self.ctx.loaded_frames()).or_else(|| self.ctx.frame(self.ctx.loaded_frames() - 1)).unwrap()`. If `loaded_frames()` is 0 and `frame(0)` returns None, `loaded_frames() - 1` underflows (panic in debug, huge index in release) and the trailing `.unwrap()` panics. Relies on an invariant (a loading frame implies at least one frame) that is not locally enforced.","fix":"Use checked_sub: `.or_else(|| self.ctx.loaded_frames().checked_sub(1).and_then(|i| self.ctx.frame(i)))` and handle the None case with a proper error instead of unwrap.","locations":[{"ref":"crates/jxl-oxide/src/lib.rs:758-762","code":"  758 |         let frame = self\n  759 |             .ctx\n  760 |             .frame(self.ctx.loaded_frames())\n  761 |             .or_else(|| self.ctx.frame(self.ctx.loaded_frames() - 1))\n  762 |             .unwrap();","lines":5,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide/src/lib.rs#L758-L762"}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`transform_with_lf_grouped` does `<[_; 3]>::try_from(&lf.regions_and_shifts()[..3]).unwrap()`. If the LF `ImageWithRegion` ever has fewer than 3 channels, the `[..3]` slice index panics on untrusted data rather than producing a decode error. In the VarDCT path this should always hold (3 color channels), but the invariant is not checked here and a malformed frame reaching this code would crash.","fix":"Validate the channel count and return `Error` instead of slicing+unwrapping, or document/assert the invariant clearly.","locations":[{"ref":"crates/jxl-render/src/vardct/mod.rs:612","code":"  612 |     let lf_regions = <[_; 3]>::try_from(&lf.regions_and_shifts()[..3]).unwrap();","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/vardct/mod.rs#L612"}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"info.rs unwraps `image.original_icc()` in the IccProfile color-encoding branch. This relies on the invariant that an IccProfile tagged encoding always has an embedded ICC profile available after header parse. If that invariant is ever violated by malformed/partial input the CLI panics instead of reporting an error.","fix":"Handle None gracefully (print a diagnostic) rather than unwrap.","locations":[{"ref":"crates/jxl-oxide-cli/src/info.rs:52-53","code":"   52 |         ColourEncoding::IccProfile(colour_space) => {\n   53 |             let icc = image.original_icc().unwrap();","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide-cli/src/info.rs#L52-L53"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"negligible","easy":false,"description":"`sec_half` computes the large secant tables (n >= 64) on demand and stores them via `table.leak()` into a `Mutex<BTreeMap<usize, &'static [f32]>>`. The `or_insert_with` caches per `n`, so the leak is bounded (one table per distinct large transform size, at most a handful), but it is a deliberate permanent leak of heap memory for the process lifetime. Acceptable for a long-lived decoder but worth noting.","fix":"Acceptable as-is; if desired, store owned `Box<[f32]>` in the map and return references into it instead of leaking.","locations":[{"ref":"crates/jxl-render/src/vardct/dct_common.rs:52-70","code":"   52 | pub fn sec_half(n: usize) -> &'static [f32] {\n   53 |     let idx = n.trailing_zeros() as usize - 2;\n   54 | \n   55 |     static SEC_HALF_LARGE: Mutex<BTreeMap<usize, &'static [f32]>> = Mutex::new(BTreeMap::new());\n   56 | \n   57 |     if let Some(idx) = idx.checked_sub(4) {\n   58 |         let mut map = SEC_HALF_LARGE.lock().unwrap();\n   59 |         map.entry(idx).or_insert_with(|| {\n   60 |             let mut table = vec![0f32; n / 2];\n   61 |             for (k, val) in table.iter_mut().enumerate() {\n   62 |                 let theta = (2 * k + 1) as f32 / (2 * n) as f32 * std::f32::consts::PI;\n   63 |                 *val = theta.cos().recip() / 2.0;\n   64 |             }\n   65 |             &*table.leak()\n   66 |         })\n   67 |     } else {\n   68 |         SEC_HALF_SMALL[idx]\n   69 |     }\n   70 | }","lines":19,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/vardct/dct_common.rs#L52-L70"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"In `parse_icc_raw`, `tag_count` is read as a raw `u32` directly from the untrusted ICC profile (up to ~4.29 billion). The bounds check `if size < 0x84 + 12 * tag_count` performs the multiplication `12 * tag_count` in `u32` arithmetic, which overflows for `tag_count > 357_913_941`. In overflow-checked builds (debug, fuzzing) this is an immediate panic on attacker data. In release it wraps to a small value, so the check is bypassed; then line 270 computes `12 * tag_count as usize` in `usize` (64-bit, no wrap to small), producing a huge length and panicking at the slice `&profile[0x84..][..huge]`. Either way an attacker-controlled embedded ICC profile triggers a panic (DoS).","fix":"Use checked/`u64` arithmetic and validate against the actual buffer length, e.g.\n`let need = 0x84u64 + 12u64 * tag_count as u64; if (size as u64) < need { return Err(...) }`\nand likewise compute the slice length as `12usize * tag_count as usize` only after that bound is known to fit.","locations":[{"ref":"crates/jxl-color/src/icc/parse.rs:263","code":"  263 |     if size < 0x84 + 12 * tag_count {","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/icc/parse.rs#L263"},{"ref":"crates/jxl-color/src/icc/parse.rs:270","code":"  270 |     let tag_bytes = &profile[0x84..][..12 * tag_count as usize];","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/icc/parse.rs#L270"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"In the tag loop of `parse_icc_raw`, `offset` and `tag_size` are raw `u32` values from the untrusted profile, and `let tag_end = offset + tag_size;` is computed in `u32`. This overflows for large attacker values: in overflow-checked builds it panics directly; in release it wraps so `tag_end` may become smaller than `offset`, bypassing the `if size < tag_end` check, after which `&profile[offset as usize..tag_end as usize]` panics because `start > end` (or `offset` exceeds the buffer). Reachable via any embedded ICC profile.","fix":"Compute in u64 and validate both bounds explicitly:\n`let end = offset as u64 + tag_size as u64; if end > size as u64 || offset as u64 > end { return Err(...) }`\nthen index with `offset as usize..end as usize` (now known in range).","locations":[{"ref":"crates/jxl-color/src/icc/parse.rs:275-284","code":"  275 |         let tag_end = offset + tag_size;\n  276 |         if size < tag_end {\n  277 |             return Err(Error::IccParseFailure(\n  278 |                 \"unexpected end of profile while reading tag data\",\n  279 |             ));\n  280 |         }\n  281 | \n  282 |         tags.push(RawTag {\n  283 |             tag,\n  284 |             data: &profile[offset as usize..tag_end as usize],","lines":10,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/icc/parse.rs#L275-L284"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"`image_size = (header.width * header.height) as u64` multiplies two `u32` values in u32 arithmetic before the cast to u64, so for valid frames with width*height between 2^32 and 2^40 (allowed by Frame::parse, which caps the product at 2^40) the multiply overflows u32 (panic in debug, wrap in release). The wrapped `image_size` is then used to bound the spline estimated-area limit (`1024 * image_size + ...`) and the modular MA node limit (`header.width as u64 * header.height as u64 * ...`, which is correct, but the spline path uses the broken value), weakening DoS protections.","fix":"Cast before multiplying: `let image_size = header.width as u64 * header.height as u64;`.","locations":[{"ref":"crates/jxl-frame/src/data/lf_global.rs:57","code":"   57 |         let image_size = (header.width * header.height) as u64;","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-frame/src/data/lf_global.rs#L57"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"`num_pixels = (header.width * header.height) as usize` multiplies two `u32` values in u32 arithmetic before casting. Frame::parse only caps width and height at 2^30 each and the product at 2^40, so a frame with e.g. width=height=2^20 already overflows u32 here (panic in debug, wrap in release). The wrapped `num_pixels` then feeds the `max_num_splines`/`max_num_points` conformance limits (`num_pixels / 4`, `num_pixels / 2`), which can become tiny or huge, defeating the spline-count bounds that exist precisely to stop resource-exhaustion attacks.","fix":"Compute in u64/usize: `let num_pixels = header.width as usize * header.height as usize;` (or `header.width as u64 * header.height as u64`).","locations":[{"ref":"crates/jxl-frame/src/data/spline.rs:25","code":"   25 |         let num_pixels = (header.width * header.height) as usize;","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-frame/src/data/spline.rs#L25"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"AllocTracker::alloc computes the byte size as an unchecked multiplication `count * std::mem::size_of::<T>()`. With attacker-influenced `count` this can overflow usize and wrap to a tiny value, so the tracker reserves far fewer bytes than the caller then proceeds to allocate (defeating the memory limit) or in debug builds panics. The limit-tracking purpose of this type is to bound allocations driven by untrusted sizes, so this is the one place that must use checked arithmetic. Note that callers like AlignedGrid pass a checked `buf_len`, but the multiply by size_of can still overflow for large element types / counts.","fix":"Use `count.checked_mul(std::mem::size_of::<T>())` and return `Err(OutOfMemory::new(...))` (or saturate to usize::MAX) when it overflows, instead of `let bytes = count * std::mem::size_of::<T>();`.","locations":[{"ref":"crates/jxl-grid/src/alloc_tracker.rs:30-36","code":"   30 |     pub fn alloc<T>(&self, count: usize) -> Result<AllocHandle, crate::OutOfMemory> {\n   31 |         let bytes = count * std::mem::size_of::<T>();\n   32 |         let result = self.inner.bytes_left.fetch_update(\n   33 |             Ordering::Relaxed,\n   34 |             Ordering::Relaxed,\n   35 |             |bytes_left| bytes_left.checked_sub(bytes),\n   36 |         );","lines":7,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-grid/src/alloc_tracker.rs#L30-L36"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`fast_pow2f_generic` computes `((x_floor as i32 + 127) as u32) << 23`. Rust's float-to-int `as` saturates, so a large input `x` gives `x_floor as i32 == i32::MAX`, and `i32::MAX + 127` overflows `i32`. In overflow-checked builds (debug/fuzz) this panics. This is reachable on attacker data: `fast_powf_generic(base, exp) = fast_pow2f(fast_log2f(base) * exp)`, and via `apply_gamma` the exponent comes from a bitstream/ICC-derived gamma (see related Gamma g=0 finding producing exp = +inf, or simply very large gamma), so `fast_log2f(base) * exp` can be huge. The SIMD variants instead use `_mm_cvtps_epi32`/`vcvtq_s32_f32` (wrapping/saturating in-register, no Rust overflow check), so only the scalar path is affected, causing inconsistent behavior.","fix":"Clamp before the integer add, e.g. `let e = (x_floor as i32).clamp(-126, 127) + 127;` (matching the representable f32 exponent range), or perform the add in `i64`/saturating arithmetic. The function should also be made robust to non-finite inputs.","locations":[{"ref":"crates/jxl-color/src/fastmath/powf.rs:8-9","code":"    8 |     let x_floor = x.floor();\n    9 |     let exp = f32::from_bits(((x_floor as i32 + 127) as u32) << 23);","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/fastmath/powf.rs#L8-L9"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Container box sizes are stored as `u64` but truncated to `usize` via `x as usize` when computing `bytes_left` for codestream / jxlp / aux boxes. On 32-bit targets a box declaring a size larger than `usize::MAX` (e.g. > 4 GiB) silently wraps to a small value, causing the parser to treat far too few bytes as belonging to the box and mis-frame the rest of the container.","fix":"Use `usize::try_from(x)` and return `Error::InvalidBox` (or keep tracking `bytes_left` as `u64`) instead of a lossy `as usize` cast.","locations":[{"ref":"crates/jxl-bitstream/src/container/parse.rs:88-93","code":"   88 |                             let bytes_left = header.box_size().map(|x| x as usize);\n   89 |                             *state = DetectState::InCodestream {\n   90 |                                 kind: BitstreamKind::Container,\n   91 |                                 bytes_left,\n   92 |                                 pending_no_more_aux_box: bytes_left.is_none(),\n   93 |                             };","lines":6,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-bitstream/src/container/parse.rs#L88-L93"},{"ref":"crates/jxl-bitstream/src/container/parse.rs:120-121","code":"  120 |                             let bytes_left = header.box_size().map(|x| x as usize);\n  121 |                             let ty = header.box_type();","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-bitstream/src/container/parse.rs#L120-L121"},{"ref":"crates/jxl-bitstream/src/container/parse.rs:181-186","code":"  181 |                     let bytes_left = header.box_size().map(|x| x as usize - 4);\n  182 |                     *state = DetectState::InCodestream {\n  183 |                         kind: BitstreamKind::Container,\n  184 |                         bytes_left,\n  185 |                         pending_no_more_aux_box: bytes_left.is_none(),\n  186 |                     };","lines":6,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-bitstream/src/container/parse.rs#L181-L186"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`size - skip` (line 11) and `size - skip - idx` (line 21) are computed with unchecked subtraction on the public API parameters `size` and `skip`. If a caller passes `skip > size`, the first subtraction underflows: panic in debug builds, wraparound to a huge value in release (which then makes the `end > size - skip` validation pass and allows building a huge `lehmer`/`temp`). Current in-tree callers (hf_pass.rs uses skip = size/64, toc.rs uses skip = 0) keep skip <= size, but the invariant is not enforced inside the function.","fix":"Validate `skip <= size` at the top and return `Error::InvalidPermutation` otherwise, or use `size.checked_sub(skip)` and propagate an error on `None`.","locations":[{"ref":"crates/jxl-coding/src/permutation.rs:4-26","code":"    4 | pub fn read_permutation(\n    5 |     bitstream: &mut Bitstream,\n    6 |     decoder: &mut crate::Decoder,\n    7 |     size: u32,\n    8 |     skip: u32,\n    9 | ) -> crate::CodingResult<Vec<usize>> {\n   10 |     let end = decoder.read_varint(bitstream, get_context(size))?;\n   11 |     if end > size - skip {\n   12 |         tracing::error!(size, skip, end, \"Invalid permutation\");\n   13 |         return Err(crate::Error::InvalidPermutation);\n   14 |     }\n   15 | \n   16 |     let mut lehmer = vec![0u32; end as usize];\n   17 |     let mut prev_val = 0u32;\n   18 |     for (idx, val) in lehmer.iter_mut().enumerate() {\n   19 |         let idx = idx as u32;\n   20 |         *val = decoder.read_varint(bitstream, get_context(prev_val))?;\n   21 |         if *val >= size - skip - idx {\n   22 |             tracing::error!(idx = idx + skip, size, lehmer = *val, \"Invalid permutation\");\n   23 |             return Err(crate::Error::InvalidPermutation);\n   24 |         }\n   25 |         prev_val = *val;\n   26 |     }","lines":23,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-coding/src/permutation.rs#L4-L26"}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`prepare_groups` computes group counts as `(original_width + group_dim - 1) as usize >> ...` and `(original_width + (group_dim << 3) - 1) as usize >> ...`. The additions are performed in u32 before the `as usize` cast. `original_width`/`original_height` are derived as `grid.width() << hshift` and can be large; `original_width + group_dim` (or `original_width + (group_dim << 3)`) can overflow u32, panicking in debug and wrapping in release (producing a wrong, too-small group count).","fix":"Cast to usize (or u64) before adding, e.g. `(original_width as usize + group_dim as usize - 1) >> group_dim_shift`, and/or use checked arithmetic.","locations":[{"ref":"crates/jxl-modular/src/image.rs:278-303","code":"  278 |                 let grids = grid.into_groups_with_fixed_count(\n  279 |                     group_width as usize,\n  280 |                     group_height as usize,\n  281 |                     (original_width + group_dim - 1) as usize >> group_dim_shift,\n  282 |                     (original_height + group_dim - 1) as usize >> group_dim_shift,\n  283 |                 );\n  284 |                 (&mut pass_groups[pass_idx], grids)\n  285 |             } else {\n  286 |                 // hshift >= 3 && vshift >= 3\n  287 |                 let lf_group_width = group_dim >> (hshift - 3);\n  288 |                 let lf_group_height = group_dim >> (vshift - 3);\n  289 |                 if lf_group_width == 0 || lf_group_height == 0 {\n  290 |                     tracing::error!(\n  291 | riting multi-page image in APNG\");\n   81 |                 } else {\n   82 |                     tracing::warn!(numer, denom, \"Frame duration is not representable in APNG\");\n   83 |                 }\n   84 |                 let duration = (numer as f32 / denom as f32) * 65535.0;\n   85 |                 (duration as u16, 0xffffu16)\n   86 |             } else {\n   87 |                 (numer as u16, denom as u16)\n   88 |             };","lines":14,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide-cli/src/output.rs#L75-L88"}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Same attacker-controlled u32 overflow in the WASM render path: `tps_numer * duration` where both come from the animation header. Overflows/panics on large but valid header values.","fix":"Compute the product in u64 (and store frame_duration_numer as u64, or saturate).","locations":[{"ref":"crates/jxl-oxide-wasm/src/lib.rs:224-228","code":"  224 |         let (frame_duration_numer, frame_duration_denom) = if frame.duration() == 0xffffffff {\n  225 |             (duration, 0)\n  226 |         } else {\n  227 |             (tps_numer * duration, tps_denom)\n  228 |         };","lines":5,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide-wasm/src/lib.rs#L224-L228"}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`Region` arithmetic helpers use unchecked `+` / `<<` on i32/u32 that can overflow/panic in debug or wrap in release given large attacker-derived coordinates/sizes. `translate` uses `self.left + x` / `self.top + y`; `pad` uses `self.width + size * 2` and `self.height + size * 2`; `upsample_separate` uses `self.left << factor_x`, `self.width << factor_x`, etc. Most call sites clamp regions to image bounds first, but these public/`pub(crate)` helpers offer no protection and are easy to misuse. Compare with `right()`/`bottom()`/`merge()` which deliberately use saturating ops.","fix":"Use saturating/checked arithmetic (saturating_add, saturating_add_unsigned, checked shifts) consistent with right()/bottom()/merge(), or document the no-overflow precondition.","locations":[{"ref":"crates/jxl-render/src/region.rs:54-60","code":"   54 |     pub fn translate(self, x: i32, y: i32) -> Self {\n   55 |         Self {\n   56 |             left: self.left + x,\n   57 |             top: self.top + y,\n   58 |             ..self\n   59 |         }\n   60 |     }","lines":7,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/region.rs#L54-L60"},{"ref":"crates/jxl-render/src/region.rs:131-138","code":"  131 |     pub fn pad(self, size: u32) -> Self {\n  132 |         Self {\n  133 |             left: self.left.saturating_sub_unsigned(size),\n  134 |             top: self.top.saturating_sub_unsigned(size),\n  135 |             width: self.width + size * 2,\n  136 |             height: self.height + size * 2,\n  137 |         }\n  138 |     }","lines":8,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/region.rs#L131-L138"},{"ref":"crates/jxl-render/src/region.rs:201-209","code":"  201 |     #[inline]\n  202 |     pub fn upsample_separate(self, factor_x: u32, factor_y: u32) -> Self {\n  203 |         Self {\n  204 |             left: self.left << factor_x,\n  205 |             top: self.top << factor_y,\n  206 |             width: self.width << factor_x,\n  207 |             height: self.height << factor_y,\n  208 |         }\n  209 |     }","lines":9,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/region.rs#L201-L209"}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"HF coefficient values are accumulated with `*coeff_grid.get_mut(x, y) += coeff`, where `coeff = unpack_signed(ucoeff) << coeff_shift`. Both the left shift by an attacker-influenced `coeff_shift` and the running `+=` accumulation across passes operate on `i32` with no checked/saturating handling. With adversarial coefficient streams these can overflow (panic in debug builds, wrap in release). Impact is limited to wrong pixels / a debug-only panic, but it is attacker-controlled arithmetic.","fix":"Use `wrapping_shl`/`wrapping_add` (matching libjxl's defined wrapping behavior) or validate that `coeff_shift` and accumulated magnitudes stay in range, so debug builds cannot panic on hostile input.","locations":[{"ref":"crates/jxl-vardct/src/hf_coeff.rs:228-236","code":"  228 |                     let coeff = jxl_bitstream::unpack_signed(ucoeff) << coeff_shift;\n  229 |                     let (mut dx, mut dy) = coeff_coord;\n  230 |                     if dct_select.need_transpose() {\n  231 |                         std::mem::swap(&mut dx, &mut dy);\n  232 |                     }\n  233 |                     let x = sx * 8 + dx as usize;\n  234 |                     let y = sy * 8 + dy as usize;\n  235 | \n  236 |                     *coeff_grid.get_mut(x, y) += coeff;","lines":9,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-vardct/src/hf_coeff.rs#L228-L236"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The `cicp` tag handling reads the wrong bytes. `cicp = data[..4].try_into().ok();` stores the first four bytes of the tag data, which are the ICC type signature `\"cicp\"` (`[0x63,0x69,0x63,0x70]`), not the CICP payload. The override logic then tests `Some([_, 16, _, _])` / `Some([_, 18, _, _])` against `cicp[1]`, which is always `0x69` (`b'i'`) and never 16 (PQ) or 18 (HLG). As a result the CICP-based PQ/HLG transfer-function override is dead code and never fires. Per the ICC `cicpType`, the actual ColourPrimaries/TransferCharacteristics/MatrixCoefficients/VideoFullRange bytes live at `data[8..12]`.","fix":"Require `data.len() >= 12` and read the CICP fields from the correct offset, e.g.\n`cicp = data.get(8..12).and_then(|s| <[u8;4]>::try_into(s).ok());`\nThen the existing `[_, 16, _, _]` / `[_, 18, _, _]` matches (on transfer characteristics) will work.","locations":[{"ref":"crates/jxl-color/src/icc/parse.rs:464-466","code":"  464 |             [b'c', b'i', b'c', b'p'] => {\n  465 |                 cicp = data[..4].try_into().ok();\n  466 |             }","lines":3,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/icc/parse.rs#L464-L466"},{"ref":"crates/jxl-color/src/icc/parse.rs:471-477","code":"  471 |     let override_trc = if let Some([_, 16, _, _]) = cicp {\n  472 |         Some(KnownIccTrc::Pq)\n  473 |     } else if let Some([_, 18, _, _]) = cicp {\n  474 |         Some(KnownIccTrc::Hlg)\n  475 |     } else {\n  476 |         None\n  477 |     };","lines":7,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/icc/parse.rs#L471-L477"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`AlignedGrid::with_alloc_tracker`/`empty_aligned` divide by `std::mem::size_of::<S>()` (`(Self::ALIGN - 1) / std::mem::size_of::<S>()` and `... / std::mem::size_of::<S>()` when computing offset). For a zero-sized type S this is a divide-by-zero panic, and the alignment-offset logic is meaningless for ZSTs. While the crate is generic, this is an unhandled edge that panics rather than erroring. Lower severity because no current caller instantiates AlignedGrid with a ZST on attacker data.","fix":"Special-case `size_of::<S>() == 0` (treat offset as 0 / buf_len as len), or document/assert that S must be non-zero-sized.","locations":[{"ref":"crates/jxl-grid/src/lib.rs:88-97","code":"   88 |         let buf_len = len\n   89 |             .checked_add((Self::ALIGN - 1) / std::mem::size_of::<S>())\n   90 |             .expect(\"aligned grid buffer length overflows usize\");\n   91 |         let handle = tracker\n   92 |             .map(|tracker| tracker.alloc::<S>(buf_len))\n   93 |             .transpose()?;\n   94 |         let mut buf = vec![S::default(); buf_len];\n   95 | \n   96 |         let extra = buf.as_ptr() as usize & (Self::ALIGN - 1);\n   97 |         let offset = ((Self::ALIGN - extra) % Self::ALIGN) / std::mem::size_of::<S>();","lines":10,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-grid/src/lib.rs#L88-L97"},{"ref":"crates/jxl-grid/src/lib.rs:121-130","code":"  121 |         let buf_len = len\n  122 |             .checked_add((Self::ALIGN - 1) / std::mem::size_of::<S>())\n  123 |             .expect(\"aligned grid buffer length overflows usize\");\n  124 |         let handle = tracker\n  125 |             .map(|tracker| tracker.alloc::<S>(buf_len))\n  126 |             .transpose()?;\n  127 |         let mut buf = Vec::with_capacity(buf_len);\n  128 | \n  129 |         let extra = buf.as_ptr() as usize & (Self::ALIGN - 1);\n  130 |         let offset = ((Self::ALIGN - extra) % Self::ALIGN) / std::mem::size_of::<S>();","lines":10,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-grid/src/lib.rs#L121-L130"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`rct_type` is parsed with `U32(6, u(2), 2 + u(4), 10 + u(6))` (max 73) and never validated. `permutation = rct_type / 7` (range 0..=10) and `ty = rct_type % 7`. The spec only allows permutation 0..=5 and ty 0..=6, i.e. rct_type in 0..=41. For permutation values 6..=10, `inverse_permute` falls through to the `_ => {}` arm and performs NO permutation (identity), silently producing incorrect pixels instead of rejecting the invalid stream. Conformant decoders should reject rct_type > 41.","fix":"After parsing Rct, validate `rct_type <= 41` (permutation < 6 and ty < 7) in `Rct::transform_channel_info` or at parse time, returning `Error::InvalidRctParams` otherwise.","locations":[{"ref":"crates/jxl-modular/src/transform.rs:117-118","code":"  117 |         begin_c: ty(U32(u(3), 8 + u(6), 72 + u(10), 1096 + u(13))),\n  118 |         rct_type: ty(U32(6, u(2), 2 + u(4), 10 + u(6))),","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-modular/src/transform.rs#L117-L118"},{"ref":"crates/jxl-modular/src/transform.rs:188-209","code":"  188 |     fn inverse<S: Sample>(&self, grids: &mut [TransformedGrid<'_, S>], pool: &JxlThreadPool) {\n  189 |         let permutation = self.rct_type / 7;\n  190 |         let ty = self.rct_type % 7;\n  191 | \n  192 |         let begin_c = self.begin_c as usize;\n  193 |         let mut channels = grids.iter_mut().skip(begin_c);\n  194 |         let a = channels.next().unwrap().grid_mut();\n  195 |         let b = channels.next().unwrap().grid_mut();\n  196 |         let c = channels.next().unwrap().grid_mut();\n  197 |         let grids = [a, b, c];\n  198 | \n  199 |         match ty {\n  200 |             0 => rct::inverse_rct::<_, 0>(permutation, grids, pool),\n  201 |             1 => rct::inverse_rct::<_, 1>(permutation, grids, pool),\n  202 |             2 => rct::inverse_rct::<_, 2>(permutation, grids, pool),\n  203 |             3 => rct::inverse_rct::<_, 3>(permutation, grids, pool),\n  204 |             4 => rct::inverse_rct::<_, 4>(permutation, grids, pool),\n  205 |             5 => rct::inverse_rct::<_, 5>(permutation, grids, pool),\n  206 |             6 => rct::inverse_rct::<_, 6>(permutation, grids, pool),\n  207 |             _ => unreachable!(),\n  208 |         }\n  209 |     }","lines":22,"link":"https://github.com/tirr-c/jxl-o mit_pos] = (1 << 12) - acc`, assert/validate that the full distribution sums to exactly `1 << 12` and that `omit_pos` was a valid strict-maximum slot; reject otherwise. Cross-check against libjxl's `ReadHistogram` validation.","locations":[{"ref":"crates/jxl-coding/src/ans.rs:131-177","code":"  131 |             let Some((_, omit_pos)) = omit_data else {\n  132 |                 return Err(Error::InvalidAnsHistogram);\n  133 |             };\n  134 |             if dist.get(omit_pos + 1) == Some(&13) {\n  135 |                 return Err(Error::InvalidAnsHistogram);\n  136 |             }\n  137 | \n  138 |             let mut repeat_range_idx = 0usize;\n  139 |             let mut acc = 0;\n  140 |             let mut prev_dist = 0u16;\n  141 |             for (idx, code) in dist.iter_mut().enumerate() {\n  142 |                 if repeat_range_idx < repeat_ranges.len()\n  143 |                     && repeat_ranges[repeat_range_idx].start <= idx\n  144 |                 {\n  145 |                     if repeat_ranges[repeat_range_idx].end == idx {\n  146 |                         repeat_range_idx += 1;\n  147 |                     } else {\n  148 |                         *code = prev_dist;\n  149 |                         acc += *code;\n  150 |                         if acc > (1 << 12) {\n  151 |                             return Err(Error::InvalidAnsHistogram);\n  152 |                         }\n  153 |                         continue;\n  154 |                     }\n  155 |                 }\n  156 | \n  157 |                 if *code == 0 {\n  158 |                     prev_dist = 0;\n  159 |                     continue;\n  160 |                 }\n  161 |                 if idx == omit_pos {\n  162 |                     prev_dist = 0;\n  163 |                     continue;\n  164 |                 }\n  165 |                 if *code > 1 {\n  166 |                     let zeros = (*code - 1) as i16;\n  167 |                     let bitcount = (shift - ((12    for (idx, v) in input.iter_mut().enumerate() {","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/tf/pq.rs#L519-L520"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Splines::parse pushes the first start point unconditionally and then parses `num_splines` additional ones (after `num_splines += 1`), but the conformance check uses `num_splines >= max_num_splines` against the value BEFORE the +1. With the corrected (non-overflowing) num_pixels this is benign, but combined with the u32 overflow of num_pixels (see other finding) the effective bound can be wrong. Flagging the off-by-one relationship between the checked value and the actual allocated `num_splines + 1` for review.","fix":"Confirm the bound matches libjxl semantics; check against the post-increment count (`num_splines + 1`) if that is the number actually allocated/processed.","locations":[{"ref":"crates/jxl-frame/src/data/spline.rs:24-33","code":"   24 |         let num_splines = decoder.read_varint(bitstream, 2)? as usize;\n   25 |         let num_pixels = (header.width * header.height) as usize;\n   26 |         let max_num_splines = usize::min(MAX_NUM_SPLINES, num_pixels / 4);\n   27 |         if num_splines >= max_num_splines {\n   28 |             tracing::error!(num_splines, max_num_splines, \"Too many splines\");\n   29 |             return Err(jxl_bitstream::Error::ProfileConformance(\"too many splines\").into());\n   30 |         }\n   31 |         let num_splines = num_splines + 1;\n   32 | \n   33 |         let mut start_points = vec![(0i64, 0i64); num_splines];","lines":10,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-frame/src/data/spline.rs#L24-L33"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"PreviewHeader.w_div8 is read with cond(div8) (line 180), whereas the parallel SizeHeader.w_div8 is read with cond(div8 && ratio == 0) (line 98). If the spec intends the preview field to match the main size header, the preview reads an extra U32 when ratio != 0, desynchronizing the rest of the header bitstream. The asymmetry between the two otherwise-parallel structs is suspicious and should be checked against ISO/IEC 18181-1.","fix":"Verify against the JXL spec; if preview should match SizeHeader, change to cond(div8 && ratio == 0).","locations":[{"ref":"crates/jxl-image/src/lib.rs:180","code":"  180 |         w_div8: ty(U32(16, 32, 1 + u(5), 33 + u(9))) cond(div8) default(1),","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-image/src/lib.rs#L180"},{"ref":"crates/jxl-image/src/lib.rs:98","code":"   98 |         w_div8: ty(1 + u(5)) cond(div8 && ratio == 0) default(0),","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-image/src/lib.rs#L98"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"DQT processing: last_quant_val is a single reusable buffer that is only overwritten when the channel lookup (q) is Some. When q is None for a given quant table, the previously written quant values are silently reused for this DQT entry. If the first table in a DQT group has q == None and last_quant_val is still None, the code returns Error::InvalidData (line 659-661), but for subsequent tables a None lookup silently emits a stale/previous table's values, which may produce an incorrect (but non-crashing) reconstruction.","fix":"Confirm against libjxl semantics whether reuse of the previous quant table is intended; if not, error out when the channel lookup fails for a non-first table.","locations":[{"ref":"crates/jxl-jbr/src/reconstruct.rs:633-680","code":"  633 |                 for qt in qts {\n  634 |                     let channel = self\n
