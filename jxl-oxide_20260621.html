abel":"Logic Error","severity":"negligible","easy":false,"description":"`adaptive_lf_smoothing_impl` writes results in place into `in_x[x]` while iterating, and uses `in_x_prev = x_self` (the pre-update value) to feed the next column. This is correct only because the up/down neighbor sums (`udsum_*`) were fully precomputed into separate grids before any in-place mutation, and the left neighbor is captured via `*_prev` before overwrite. The dependency on that precompute ordering is load-bearing and undocumented; reordering or fusing the `udsum` precompute into the main loop would introduce a read-after-write data corruption bug.","fix":"Add a comment noting that `udsum_*` must be fully precomputed before the in-place update loop (it reads original neighbor values).","locations":[{"ref":"crates/jxl-render/src/vardct/generic/mod.rs:35-96","code":"   35 |     for (g, out) in [\n   36 |         (&mut *in_x, udsum_x.buf_mut()),\n   37 |         (&mut *in_y, udsum_y.buf_mut()),\n   38 |         (&mut *in_b, udsum_b.buf_mut()),\n   39 |     ] {\n   40 |         let up = g.chunks_exact(width);\n   41 |         let down = g[width * 2..].chunks_exact(width);\n   42 |         let out = out.chunks_exact_mut(width);\n   43 |         for ((up, down), out) in up.zip(down).zip(out) {\n   44 |             for ((&u, &d), out) in up.iter().zip(down).zip(out) {\n   45 |                 *out = u + d;\n   46 |             }\n   47 |         }\n   48 |     }\n   49 | \n   50 |     let mut in_x_row = in_x.chunks_exact_mut(width).skip(1);\n   51 |     let mut in_y_row = in_y.chunks_exact_mut(width).skip(1);\n   52 |     let mut in_b_row = in_b.chunks_exact_mut(width).skip(1);\n   53 | \n   54 |     let udsum_x_row = udsum_x.buf_mut().chunks_exact(width);\n   55 |     let mut udsum_y_row = udsum_y.buf_mut().chunks_exact(width);\n   56 |     let mut udsum_b_row = udsum_b.buf_mut().chunks_exact(width);\n   57 | \n   58 |     for udsum_x in udsum_x_row {\n   59 |         let udsum_y = udsum_y_row.next().unwrap();\n   60 |         let udsum_b = udsum_b_row.next().unwrap();\n   61 |         let in_x = in_x_row.next().unwrap();\n   62 |         let in_y = in_y_row.next().unwrap();\n   63 |         let in_b = in_b_row.next().unwrap();\n   64 | \n   65 |         let mut in_x_prev = in_x[0];\n   66 |         let mut in_y_prev = in_y[0];\n   67 |         let mut in_b_prev = in_b[0];\n   68 |         for x in 1..(width - 1) {\n   69 |             let x_self = in_x[x];\n   70 |             let x_side = in_x_prev + in_x[x + 1] + udsum_x[x];\n   71 |             let x_diag = udsum_x[x - 1] + udsum_x[x + 1];\n   72 |             let x_wa = x_self * SCALE_SELF + x_side * SCALE_SIDE + x_diag * SCALE_DIAG;\n   73 |             let x_gap_t = (x_wa - x_self).abs() / lf_x;\n   74 | \n   75 |             let y_self = in_y[x];\n   76 |             let y_side = in_y_prev + in_y[x + 1] + udsum_y[x];\n   77 |             let y_diag = udsum_y[x - 1] + udsum_y[x + 1];\n   78 |             let y_wa = y_self * SCALE_SELF + y_side * SCALE_SIDE + y_diag * SCALE_DIAG;\n   79 |             let y_gap_t = (y_wa - y_self).abs() / lf_y;\n   80 | \n   81 |             let b_self = in_b[x];\n   82 |             let b_side = in_b_prev + in_b[x + 1] + udsum_b[x];\n   83 |             let b_diag = udsum_b[x - 1] + udsum_b[x + 1];\n   84 |             let b_wa = b_self * SCALE_SELF + b_side * SCALE_SIDE + b_diag * SCALE_DIAG;\n   85 |             let b_gap_t = (b_wa - b_self).abs() / lf_b;\n   86 | \n   87 |             let gap = 0.5f32.max(x_gap_t).max(y_gap_t).max(b_gap_t);\n   88 |             let gap_scale = (3.0 - 4.0 * gap).max(0.0);\n   89 | \n   90 |             in_x[x] = (x_wa - x_self) * gap_scale + x_self;\n   91 |             in_y[x] = (y_wa - y_self) * gap_scale + y_self;\n   92 |             in_b[x] = (b_wa - b_self) * gap_scale + b_self;\n   93 |             in_x_prev = x_self;\n   94 |             in_y_prev = y_self;\n   95 |             in_b_prev = b_self;\n   96 |         }","lines":62,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/vardct/generic/mod.rs#L35-L96"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"parse_crop_info has a copy-paste bug in the 3-argument case. When the crop string contains exactly three whitespace-separated integers (w, h, x), the `y` branch's fallback constructs `CropInfo { width: w, height: w, left: h, top: x }`. It wrongly uses `w` for `height` (should be `h`) and shifts the parsed `h` and `x` into `left`/`top`. A user passing `--crop \"100 50 10\"` gets width=100, height=100, left=50, top=10 instead of the intended width=100, height=50, left=10. The two-argument fallback above it is also suspicious (height: w) but is at least internally consistent; the three-argument case is clearly wrong relative to the documented `'width height left top'` format.","fix":"Return `CropInfo { width: w, height: h, left: x, top: 0 }` for the 3-argument case (and review the 2-argument case at lines 122-129, which currently sets height to `w`).","locations":[{"ref":"crates/jxl-oxide-cli/src/commands/decode.rs:138-145","code":"  138 |     let Some(y) = it.next().transpose()? else {\n  139 |         return Ok(CropInfo {\n  140 |             width: w,\n  141 |             height: w,\n  142 |             left: h,\n  143 |             top: x,\n  144 |         });\n  145 |     };","lines":8,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide-cli/src/commands/decode.rs#L138-L145"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In the `tone_map` unit tests the result-verification loop is `for (idx, ((r, g), b)) in r.into_iter().zip(b).zip(b)`. It zips `b` twice and never references `g`, so the binding named `g` is actually the first `b` channel and the real green channel is never checked. The green output is therefore untested, and `b` is consumed/iterated twice. Pure test bug, but it silently weakens coverage.","fix":"Use `r.into_iter().zip(g).zip(b)` so each of the r/g/b channels is checked against the expected value.","locations":[{"ref":"crates/jxl-color/src/convert/tone_map.rs:785","code":"  785 |         for (idx, ((r, g), b)) in r.into_iter().zip(b).zip(b).enumerate() {","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/convert/tone_map.rs#L785"},{"ref":"crates/jxl-color/src/convert/tone_map.rs:814","code":"  814 |         for (idx, ((r, g), b)) in r.into_iter().zip(b).zip(b).enumerate() {","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/convert/tone_map.rs#L814"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`read_uint_prefilled` consumes the extra bits with `bitstream.consume_bits(n as usize).ok()`, silently discarding an `UnexpectedEof`. On truncated input the consume fails but decoding continues with stale/zero bits and the position counters are not advanced, so the decoder keeps reading from the same offset and produces garbage instead of surfacing a truncation error. For prefix-code streams `finalize()` always returns Ok, so a truncated prefix stream is never detected here; for ANS it is only caught later (and only sometimes) by the final-state check.","fix":"Propagate the error: make `read_uint_prefilled` return `CodingResult<u32>` and use `consume_bits(n as usize)?`, or document and guarantee elsewhere that enough bits are always buffered. Do not swallow EOF with `.ok()`.","locations":[{"ref":"crates/jxl-coding/src/lib.rs:571-605","code":"  571 |     #[inline]\n  572 |     fn read_uint_prefilled(\n  573 |         &self,\n  574 |         bitstream: &mut Bitstream,\n  575 |         config: &IntegerConfig,\n  576 |         token: u32,\n  577 |     ) -> u32 {\n  578 |         let &IntegerConfig {\n  579 |             split_exponent,\n  580 |             split,\n  581 |             msb_in_token,\n  582 |             lsb_in_token,\n  583 |             ..\n  584 |         } = config;\n  585 |         if token < split {\n  586 |             return token;\n  587 |         }\n  588 | \n  589 |         let n = split_exponent - (msb_in_token + lsb_in_token)\n  590 |             + ((token - split) >> (msb_in_token + lsb_in_token));\n  591 |         // n < 32.\n  592 |         let n = n & 31;\n  593 |         let rest_bits = bitstream.peek_bits_prefilled(n as usize) as u64;\n  594 |         bitstream.consume_bits(n as usize).ok();\n  595 | \n  596 |         let low_bits = token & ((1 << lsb_in_token) - 1);\n  597 |         let low_bits = low_bits as u64;\n  598 |         let token = token >> lsb_in_token;\n  599 |         let token = token & ((1 << msb_in_token) - 1);\n  600 |         let token = token | (1 << msb_in_token);\n  601 |         let token = token as u64;\n  602 |         let result = (((token << n) | rest_bits) << lsb_in_token) | low_bits;\n  603 |         // result fits in u32.\n  604 |         result as u32\n  605 |     }","lines":35,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-coding/src/lib.rs#L571-L605"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`convert_color_for_record` unwraps two fallible color-management results on attacker-controlled color encoding metadata: `ColorTransform::new(...).unwrap()` and `transform.run_with_threads(...).unwrap()`. A malformed/unsupported signalled color encoding (XYB path) can make either call return `Err`, turning a decode error into a panic on untrusted input. Note the sibling code in `lib.rs::postprocess_keyframe` correctly propagates these with `?`.","fix":"Propagate the errors with `?` (the closure already returns `Result`) instead of `.unwrap()`.","locations":[{"ref":"crates/jxl-render/src/util.rs:353-365","code":"  353 |             let transform = ColorTransform::new(\n  354 |                 &ColorEncodingWithProfile::new(EnumColourEncoding::xyb(\n  355 |                     jxl_color::RenderingIntent::Perceptual,\n  356 |                 )),\n  357 |                 &ColorEncodingWithProfile::new(encoding.clone()),\n  358 |                 &metadata.opsin_inverse_matrix,\n  359 |                 &metadata.tone_mapping,\n  360 |                 &jxl_color::NullCms,\n  361 |             )\n  362 |             .unwrap();\n  363 |             let output_channels = transform\n  364 |                 .run_with_threads(&mut [x.buf_mut(), y.buf_mut(), b.buf_mut()], pool)\n  365 |                 .unwrap();","lines":13,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/util.rs#L353-L365"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`run_with_threads` accumulates the per-chunk result into a single shared `Mutex<Result<usize>>` that each worker overwrites with `*ret.lock().unwrap() = Ok(num_channels)`. If one chunk fails after another chunk has already stored `Ok(...)` (or vice versa), the final returned value is whichever worker happened to write last, so an error from one chunk can be silently masked by a success from another. Output channel count is also racy in the same way. Because each chunk runs the identical op pipeline the channel count is consistent, but the error-masking is a genuine correctness hazard if any op (e.g. `IccToIcc`) fails for only some chunks.","fix":"Track failure with a sticky error (only overwrite when the stored value is still Ok, or collect errors), so the first error is preserved regardless of worker completion order.","locations":[{"ref":"crates/jxl-color/src/convert.rs:636-652","code":"  636 |         let ret = std::sync::Mutex::new(Ok(self.begin_channels));\n  637 |         pool.for_each_vec(chunks, |mut channels| {\n  638 |             let mut num_channels = self.begin_channels;\n  639 |             for op in &self.ops {\n  640 |                 match op.run(&mut channels, num_channels) {\n  641 |                     Ok(x) => {\n  642 |                         num_channels = x;\n  643 |                     }\n  644 |                     err => {\n  645 |                         *ret.lock().unwrap() = err;\n  646 |                         return;\n  647 |                     }\n  648 |                 }\n  649 |             }\n  650 |             *ret.lock().unwrap() = Ok(num_channels);\n  651 |         });\n  652 |         ret.into_inner().unwrap()","lines":17,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/convert.rs#L636-L652"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Several `bitstream.skip_bits(offset).unwrap()` / `try_parse_lf_global().unwrap()` calls in Frame's single-entry parsing path will panic if the stored offset is inconsistent (e.g. larger than the available bytes) or if the lf_global re-parse unexpectedly returns None. These offsets come from previously-parsed attacker data stored in atomics; a crafted stream that makes a later re-parse diverge could turn these into panics rather than decode errors.","fix":"Propagate errors instead of unwrapping: map skip_bits failures to a decode error and handle the None case from try_parse_lf_global as an IncompleteFrameData/HadError result.","locations":[{"ref":"crates/jxl-frame/src/lib.rs:383","code":"  383 |             bitstream.skip_bits(offset).unwrap();","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-frame/src/lib.rs#L383"},{"ref":"crates/jxl-frame/src/lib.rs:505","code":"  505 |             bitstream.skip_bits(offset).unwrap();","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-frame/src/lib.rs#L505"},{"ref":"crates/jxl-frame/src/lib.rs:588","code":"  588 |             bitstream.skip_bits(offset).unwrap();","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-frame/src/lib.rs#L588"},{"ref":"crates/jxl-frame/src/lib.rs:377","code":"  377 |                 let lf_global = self.try_parse_lf_global::<S>().unwrap();","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-frame/src/lib.rs#L377"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"TransferFunction::Gamma parsing always reads a 24-bit gamma and sets inverted: true without validating the documented invariant (doc at color.rs:538-541 states g <= 10_000_000 when inverted). A 24-bit value can be up to 16_777_215 (> 10_000_000), and g == 0 is also accepted, so the stated invariant is not enforced at parse time. Downstream code that divides by g or trusts the doc could misbehave.","fix":"Validate g (reject 0 and values > 10_000_000) at parse with Error::ValidationFailed, or update the doc to state where the invariant is enforced.","locations":[{"ref":"crates/jxl-image/src/color.rs:580-591","code":"  580 |     fn parse(bitstream: &mut Bitstream, _ctx: Ctx) -> BitstreamResult<Self> {\n  581 |         let has_gamma = bitstream.read_bool()?;\n  582 |         if has_gamma {\n  583 |             let gamma = bitstream.read_bits(24)?;\n  584 |             Ok(Self::Gamma {\n  585 |                 g: gamma,\n  586 |                 inverted: true,\n  587 |             })\n  588 |         } else {\n  589 |             bitstream.read_enum::<TransferFunction>()\n  590 |         }\n  591 |     }","lines":12,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-image/src/color.rs#L580-L591"},{"ref":"crates/jxl-image/src/color.rs:538-542","code":"  538 |         /// Whether the gamma value is inverted.\n  539 |         ///\n  540 |         /// If `true`, `g <= 10_000_000`.\n  541 |         inverted: bool,\n  542 |     },","lines":5,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-image/src/color.rs#L538-L542"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`RleState::decode` stores only the first decoder error and then returns the stale `self.value` while `self.repeat = self.repeat.wrapping_sub(1)` turns 0 into u32::MAX, so after an error the rest of the channel is silently filled with stale values and no further bitstream reads happen. The error is surfaced later via `check_error`, but the comment-free wrapping_sub on the error path is subtle and easy to misread as a normal counter decrement.","fix":"On the error branch, set `self.repeat = 0` (or otherwise stop) and add a comment documenting that the stored error is intentionally surfaced later by `check_error`, to make the control flow explicit.","locations":[{"ref":"crates/jxl-modular/src/image.rs:676-702","code":"  676 |     #[inline(always)]\n  677 |     fn decode(\n  678 |         &mut self,\n  679 |         bitstream: &mut Bitstream,\n  680 |         decoder: &mut DecoderRleMode,\n  681 |         cluster: u8,\n  682 |     ) -> S {\n  683 |         if self.repeat == 0 {\n  684 |             let result = decoder.read_varint_clustered(bitstream, cluster);\n  685 |             match result {\n  686 |                 Ok(RleToken::Value(v)) => {\n  687 |                     self.value = S::unpack_signed_u32(v);\n  688 |                     self.repeat = 1;\n  689 |                 }\n  690 |                 Ok(RleToken::Repeat(len)) => {\n  691 |                     self.repeat = len;\n  692 |                 }\n  693 |                 Err(e) if self.error.is_none() => {\n  694 |                     self.error = Some(Box::new(e));\n  695 |                 }\n  696 |                 _ => {}\n  697 |             }\n  698 |         }\n  699 | \n  700 |         self.repeat = self.repeat.wrapping_sub(1);\n  701 |         self.value\n  702 |     }","lines":27,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-modular/src/image.rs#L676-L702"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"AuxBoxReader contains `panic!()`/`unreachable!()` calls reachable from state transitions driven by container parse events. `ensure_raw` panics if the box was already started as Brotli (or finalized to NoData), `ensure_brotli` panics if already Raw, and `feed_data` has `unreachable!()` for the NoData arm. While the container parser is expected to emit consistent AuxBoxStart/AuxBoxData sequences, these are hard panics on a decoder that processes untrusted input; a parser bug or unexpected event ordering becomes a crash rather than a decode error.","fix":"Return a Result/decode error instead of panicking on unexpected box state transitions.","locations":[{"ref":"crates/jxl-oxide/src/aux_box.rs:49-81","code":"   49 |     pub(super) fn ensure_raw(&mut self) {\n   50 |         if self.done {\n   51 |             return;\n   52 |         }\n   53 | \n   54 |         match self.data {\n   55 |             DataKind::Init => {\n   56 |                 self.data = DataKind::Raw(Vec::new());\n   57 |             }\n   58 |             DataKind::NoData | DataKind::Brotli(_) => {\n   59 |                 panic!();\n   60 |             }\n   61 |             DataKind::Raw(_) => {}\n   62 |         }\n   63 |     }\n   64 | \n   65 |     pub(super) fn ensure_brotli(&mut self) -> Result<()> {\n   66 |         if self.done {\n   67 |             return Ok(());\n   68 |         }\n   69 | \n   70 |         match self.data {\n   71 |             DataKind::Init => {\n   72 |                 let writer = DecompressorWriter::new(Vec::<u8>::new(), 4096);\n   73 |                 self.data = DataKind::Brotli(Box::new(writer));\n   74 |             }\n   75 |             DataKind::NoData | DataKind::Raw(_) => {\n   76 |                 panic!();\n   77 |             }\n   78 |             DataKind::Brotli(_) => {}\n   79 |         }\n   80 |         Ok(())\n   81 |     }","lines":33,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide/src/aux_box.rs#L49-L81"},{"ref":"crates/jxl-oxide/src/aux_box.rs:94-108","code":"   94 |         match self.data {\n   95 |             DataKind::Init => {\n   96 |                 self.data = DataKind::Raw(data.to_vec());\n   97 |             }\n   98 |             DataKind::NoData => {\n   99 |                 unreachable!();\n  100 |             }\n  101 |             DataKind::Raw(ref mut buf) => {\n  102 |                 buf.extend_from_slice(data);\n  103 |             }\n  104 |             DataKind::Brotli(ref mut writer) => {\n  105 |                 writer.write_all(data)?;\n  106 |             }\n  107 |         }\n  108 |         Ok(())","lines":15,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide/src/aux_box.rs#L94-L108"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the pass-group decode loop, partial-decode results are silently swallowed: `if !allow_partial && r.is_err() { *result = r }`. When `allow_partial` is true, a real (non-EOF) decoder error from `decode_pass_group` is discarded entirely and the group is treated as successfully (partially) decoded. There is no distinction between \"ran out of bits\" (expected for partial) and a genuine malformed-stream error, so corruption can be masked. Lower severity because partial decoding is opt-in.","fix":"When `allow_partial` is set, still propagate errors that are not `unexpected_eof()`; only swallow the expected truncation error.","locations":[{"ref":"crates/jxl-render/src/vardct/mod.rs:283-308","code":"  283 |                     scope.spawn(move |_| {\n  284 |                         let vardct = Some(PassGroupParamsVardct {\n  285 |                             lf_vardct: lf_global_vardct,\n  286 |                             hf_global,\n  287 |                             hf_coeff_output: &mut grid_xyb,\n  288 |                         });\n  289 | \n  290 |                         let r = jxl_frame::data::decode_pass_group(\n  291 |                             &mut bitstream,\n  292 |                             PassGroupParams {\n  293 |                                 frame_header,\n  294 |                                 lf_group,\n  295 |                                 pass_idx,\n  296 |                                 group_idx,\n  297 |                                 global_ma_config,\n  298 |                                 modular,\n  299 |                                 vardct,\n  300 |                                 allow_partial,\n  301 |                                 tracker,\n  302 |                                 pool,\n  303 |                             },\n  304 |                         );\n  305 |                         if !allow_partial && r.is_err() {\n  306 |                             *result.write().unwrap() = r.map_err(From::from);\n  307 |                         }\n  308 |                     });","lines":26,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/vardct/mod.rs#L283-L308"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"main.rs prints only the top-level error Display (`tracing::error!(\"{e}\")`) and does not walk the error `source()` chain, even though Error implements source() with meaningful inner causes (ReadJxl/Render/Reconstruct wrap Box<dyn Error>). Underlying root causes are lost from CLI output unless they happen to be embedded in the Display string.","fix":"Iterate e.source() and log the full chain, or use `{e:?}`/an error-reporting helper.","locations":[{"ref":"crates/jxl-oxide-cli/src/main.rs:67-72","code":"   67 |     if let Err(e) = result {\n   68 |         tracing::error!(\"{e}\");\n   69 |         std::process::ExitCode::FAILURE\n   70 |     } else {\n   71 |         std::process::ExitCode::SUCCESS\n   72 |     }","lines":6,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide-cli/src/main.rs#L67-L72"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"Permutation reconstruction uses `temp.remove(idx)` inside a loop over `lehmer`. `Vec::remove` is O(n) (shifts all following elements), making the whole reconstruction O(n^2) in the permutation length. For HF coefficient orders the size can be up to ~4096 entries (32x32 block * many components/passes), and this runs for every used order in every HfPass, on attacker-controlled `end`/`lehmer` values. A crafted stream maximizing `end` turns this into a quadratic-time hot path.","fix":"Reconstruct the permutation in O(n log n) using a Fenwick/BIT tree (or a balanced structure) to map each Lehmer index to the i-th remaining element, instead of repeatedly calling `Vec::remove` on a shrinking vector.","locations":[{"ref":"crates/jxl-coding/src/permutation.rs:28-36","code":"   28 |     let mut temp = ((skip as usize)..(size as usize)).collect::<Vec<_>>();\n   29 |     let mut permutation = Vec::with_capacity(size as usize);\n   30 |     for idx in 0..skip {\n   31 |         permutation.push(idx as usize);\n   32 |     }\n   33 |     for idx in lehmer {\n   34 |         permutation.push(temp.remove(idx as usize));\n   35 |     }\n   36 |     permutation.extend(temp);","lines":9,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-coding/src/permutation.rs#L28-L36"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`HfBlockContext::parse` computes `bsize` from up to three 4-bit LF-threshold counts and one 4-bit QF-threshold count, so `bsize` can reach 16*16*16*16 = 65536. It then calls `read_clusters(bitstream, bsize * 39)`, i.e. up to ~2.5 million distribution entries, allocating a `Vec<u8>` of that size and running the cluster decoder that many times. The spec-violating case (`bsize > 64`) is only logged with `tracing::warn!` and decoding proceeds, so a tiny crafted header can force large allocations / CPU work. `num_clusters > 16` is likewise only warned, not rejected.","fix":"Treat `bsize > 64` and `num_clusters > 16` as hard validation failures (return an error) instead of just warning, matching the spec limits, before allocating the cluster map.","locations":[{"ref":"crates/jxl-vardct/src/lf.rs:95-104","code":"   95 |             if bsize > 64 {\n   96 |                 tracing::warn!(bsize, \"bsize > 64\");\n   97 |             }\n   98 | \n   99 |             let (num_clusters, ctx_map) = jxl_coding::read_clusters(bitstream, bsize * 39)?;\n  100 |             if num_clusters > 16 {\n  101 |                 tracing::warn!(num_clusters, \"num_clusters > 16\");\n  102 |             }\n  103 | \n  104 |             (num_clusters, ctx_map)","lines":10,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-vardct/src/lf.rs#L95-L104"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`render_noise::init_noise` always allocates and convolves noise for the full upsampled frame (`header.width` x `header.height`) regardless of the much smaller `actual_region` that is actually consumed in `render_noise`. For large images decoded with a small requested region, this allocates 3 full-frame f32 grids plus per-group noise buffers and convolves all of them, which can be substantially more work and memory than needed.","fix":"Restrict noise generation/convolution to the groups intersecting the actual rendered region.","locations":[{"ref":"crates/jxl-render/src/features/noise.rs:88-175","code":"   88 | fn init_noise(\n   89 |     visible_frames: usize,\n   90 |     invisible_frames: usize,\n   91 |     header: &FrameHeader,\n   92 |     tracker: Option<&AllocTracker>,\n   93 |     pool: &JxlThreadPool,\n   94 | ) -> Result<[AlignedGrid<f32>; 3]> {\n   95 |     let seed0 = rng_seed0(visible_frames, invisible_frames);\n   96 | \n   97 |     // We use header.width and header.height because\n   98 |     // these are the dimensions after upsampling (the \"actual\" frame size),\n   99 |     // and noise synthesis is done after upsampling.\n  100 |     let width = header.width as usize;\n  101 |     let height = header.height as usize;\n  102 | \n  103 |     let group_dim = header.group_dim() as usize;\n  104 |     let groups_per_row = width.div_ceil(group_dim);\n  105 |     let num_groups = groups_per_row * height.div_ceil(group_dim);\n  106 | \n  107 |     let mut noise_groups = Vec::with_capacity(num_groups);\n  108 |     for group_idx in 0..num_groups {\n  109 |         let group_x = group_idx % groups_per_row;\n  110 |         let group_y = group_idx / groups_per_row;\n  111 |         let x0 = group_x * group_dim;\n  112 |         let y0 = group_y * group_dim;\n  113 |         let seed1 = rng_seed1(x0, y0);\n  114 | \n  115 |         let group_width = group_dim.min(width - x0);\n  116 |         let group_height = group_dim.min(height - y0);\n  117 |         let noise_group = NoiseGroup::new(group_width, group_height, seed0, seed1, tracker)?;\n  118 |         noise_groups.push(noise_group);\n  119 |     }\n  120 | \n  121 |     let mut convolved: [AlignedGrid<f32>; 3] = [\n  122 |         AlignedGrid::with_alloc_tracker(width, height, tracker)?,\n  123 |         AlignedGrid::with_alloc_tracker(width, height, tracker)?,\n  124 |         AlignedGrid::with_alloc_tracker(width, height, tracker)?,\n  125 |     ];\n  126 | \n  127 |     // Each channel is convolved by the 5×5 kernel\n  128 |     let mut jobs = Vec::with_capacity(num_groups * 3);\n  129 |     for (channel_idx, out) in convolved.iter_mut().enumerate() {\n  130 |         for (group_idx, out_subgrid) in out\n  131 |             .as_subgrid_mut()\n  132 |             .into_groups(group_dim, group_dim)\n  133 |             .into_iter()\n  134 |             .enumerate()\n  135 |         {\n  136 |             let group_x = group_idx % groups_per_row;\n  137 |             let group_y = group_idx / groups_per_row;\n  138 | \n  139 |             // `adjacent_groups[4] == this`\n  140 |             let adjacent_groups: [_; 9] = std::array::from_fn(|idx| {\n  141 |                 let offset_x = (idx % 3) as isize - 1;\n  142 |                 let offset_y = (idx / 3) as isize - 1;\n  143 |                 if let (Some(x), Some(y)) = (\n  144 |                     group_x.checked_add_signed(offset_x),\n  145 |                     group_y.checked_add_signed(offset_y),\n  146 |                 ) {\n  147 |                     let group_idx = y * groups_per_row + x;\n  148 |                     if x < groups_per_row {\n  149 |                         noise_groups\n  150 |                             .get(group_idx)\n  151 |                             .map(|group| group.as_subgrid(channel_idx))\n  152 |                     } else {\n  153 |                         None\n  154 |                     }\n  155 |                 } else {\n  156 |                     None\n  157 |                 }\n  158 |             });\n  159 | \n  160 |             jobs.push((out_subgrid, adjacent_groups));\n  161 |         }\n  162 |     }\n  163 | \n  164 |     let result = std::sync::Mutex::new(Ok(()));\n  165 |     pool.for_each_vec(jobs, |job| {\n  166 |         let (out_subgrid, adjacent_groups) = job;\n  167 |         let r = convolve_fill(out_subgrid, adjacent_groups, tracker);\n  168 |         if r.is_err() {\n  169 |             *result.lock().unwrap() = r;\n  170 |         }\n  171 |     });\n  172 |     result.into_inner().unwrap()?;\n  173 | \n  174 |     Ok(convolved)\n  175 | }","lines":88,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/features/noise.rs#L88-L175"},{"ref":"crates/jxl-render/src/features/noise.rs:36-42","code":"   36 |     let noise_buffer = init_noise(\n   37 |         visible_frames_num,\n   38 |         invisible_frames_num,\n   39 |         header,\n   40 |         tracker.as_ref(),\n   41 |         pool,\n   42 |     )?;","lines":7,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/features/noise.rs#L36-L42"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`read_clusters` builds a `HashSet<u8>` of all cluster values purely to count distinct clusters and compare against `max+1`. For up to `num_dist` entries this allocates a hash set each parse; since values are bounded to 0..=255, a fixed `[bool; 256]` or bitset is both faster and allocation-free.","fix":"Replace the `HashSet` with a stack `[bool; 256]` (or `u64` bitset array) seen-flags array and count set entries.","locations":[{"ref":"crates/jxl-coding/src/lib.rs:729-748","code":"  729 |     let num_clusters = *cluster.iter().max().unwrap() as u32 + 1;\n  730 |     let set = cluster\n  731 |         .iter()\n  732 |         .copied()\n  733 |         .collect::<std::collections::HashSet<_>>();\n  734 |     let num_expected_clusters = num_clusters;\n  735 |     let num_actual_clusters = set.len() as u32;\n  736 |     if num_actual_clusters != num_expected_clusters {\n  737 |         tracing::error!(\n  738 |             num_expected_clusters,\n  739 |             num_actual_clusters,\n  740 |             \"distribution cluster has a hole\"\n  741 |         );\n  742 |         Err(Error::ClusterHole {\n  743 |             num_expected_clusters,\n  744 |             num_actual_clusters,\n  745 |         })\n  746 |     } else {\n  747 |         Ok((num_clusters, cluster))\n  748 |     }","lines":20,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-coding/src/lib.rs#L729-L748"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In `PredictorState::reset`, the capacity top-up uses `(width as usize).checked_sub(self.prev_row.capacity())` to compute how much to reserve. This is a correct micro-optimization but the intent (only grow, never shrink) is non-obvious; if `width` ever shrinks the rows keep the larger capacity, which is fine but undocumented.","fix":"Add a one-line comment that the reserve is a grow-only top-up, or simply use `self.prev_row.reserve(width as usize)` and rely on Vec's amortized growth, since the explicit checked_sub adds little.","locations":[{"ref":"crates/jxl-modular/src/predictor.rs:179-203","code":"  179 |     pub fn reset(\n  180 |         &mut self,\n  181 |         width: u32,\n  182 |         prev_channels_rev: &[&'a MutableSubgrid<'prev, S>],\n  183 |         wp_header: Option<&WpHeader>,\n  184 |     ) {\n  185 |         self.self_correcting =\n  186 |             wp_header.map(|wp_header| SelfCorrectingPredictor::new(width, wp_header.clone()));\n  187 |         self.prev_row.clear();\n  188 |         self.curr_row.clear();\n  189 |         if let Some(additional) = (width as usize).checked_sub(self.prev_row.capacity()) {\n  190 |             self.prev_row.reserve(additional);\n  191 |         }\n  192 |         if let Some(additional) = (width as usize).checked_sub(self.curr_row.capacity()) {\n  193 |             self.curr_row.reserve(additional);\n  194 |         }\n  195 |         self.prev_channels_rev = prev_channels_rev.to_vec();\n  196 |         self.width = width;\n  197 |         self.y = 0;\n  198 |         self.x = 0;\n  199 |         self.w = 0;\n  200 |         self.n = 0;\n  201 |         self.nw = 0;\n  202 |         self.prev_grad = 0;\n  203 |     }","lines":25,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-modular/src/predictor.rs#L179-L203"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"rendered_icc() recomputes/allocates the ICC profile on every call (colour_encoding_to_icc or to_vec). It is called in hot/per-frame contexts (e.g. integration icc_profile(), write_png, wasm render) and for enum encodings re-synthesizes the profile each time. Minor, but avoidable repeated allocation.","fix":"Cache the rendered ICC bytes and invalidate when the requested color encoding changes.","locations":[{"ref":"crates/jxl-oxide/src/lib.rs:547-555","code":"  547 |     pub fn rendered_icc(&self) -> Vec<u8> {\n  548 |         let encoding = self.ctx.requested_color_encoding();\n  549 |         match encoding.encoding() {\n  550 |             color::ColourEncoding::Enum(encoding) => {\n  551 |                 jxl_color::icc::colour_encoding_to_icc(encoding)\n  552 |             }\n  553 |             color::ColourEncoding::IccProfile(_) => encoding.icc_profile().to_vec(),\n  554 |         }\n  555 |     }","lines":9,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide/src/lib.rs#L547-L555"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`RenderCache::new` computes `jpeg_upsampling`, `shifts_cbycr`, `lf_width`, `lf_height`, and an entire `whd` array (including a loop that fills it via `shift.shift_size`), but the returned `Self { lf_global: None, hf_global: None, lf_groups: HashMap::new() }` does not use any of these values. All of this is dead computation that the optimizer may or may not elide; it is misleading to a reader who assumes `whd` is stored somewhere.","fix":"Delete the unused local computations (lines 25-37); keep only the struct construction.","locations":[{"ref":"crates/jxl-render/src/state.rs:24-43","code":"   24 |     pub fn new(frame: &crate::IndexedFrame) -> Self {\n   25 |         let frame_header = frame.header();\n   26 |         let jpeg_upsampling = frame_header.jpeg_upsampling;\n   27 |         let shifts_cbycr: [_; 3] =\n   28 |             std::array::from_fn(|idx| ChannelShift::from_jpeg_upsampling(jpeg_upsampling, idx));\n   29 | \n   30 |         let lf_width = frame_header.color_sample_width().div_ceil(8);\n   31 |         let lf_height = frame_header.color_sample_height().div_ceil(8);\n   32 |         let mut whd = [(lf_width, lf_height); 3];\n   33 |         for ((w, h), shift) in whd.iter_mut().zip(shifts_cbycr) {\n   34 |             let (shift_w, shift_h) = shift.shift_size((lf_width, lf_height));\n   35 |             *w = shift_w;\n   36 |             *h = shift_h;\n   37 |         }\n   38 |         Self {\n   39 |             lf_global: None,\n   40 |             hf_global: None,\n   41 |             lf_groups: HashMap::new(),\n   42 |         }\n   43 |     }","lines":20,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/state.rs#L24-L43"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`xyb::run_x86_64_avx2`/`run_aarch64_neon` and `ycbcr::run_x86_64_avx2`/`run_aarch64_neon` are `#[target_feature]`-annotated wrappers that simply call the generic implementation; there is no actual SIMD code path. They add an unsafe indirection and a feature-detection branch for no benefit. Additionally `xyb::run` gates on `is_x86_feature_detected!(\"avx\")` but the wrapper enables `avx2` (`#[target_feature(enable = \"avx2\")]`) - a feature-mismatch that is currently harmless only because the body is pure-scalar generic code.","fix":"Either implement real SIMD in these wrappers or remove them and call `run_generic` directly; if kept, align the detected feature with the enabled `target_feature`.","locations":[{"ref":"crates/jxl-color/src/xyb.rs:2-32","code":"    2 |     #[cfg(target_arch = \"x86_64\")]\n    3 |     {\n    4 |         if is_x86_feature_detected!(\"avx\") && is_x86_feature_detected!(\"fma\") {\n    5 |             // SAFETY: Feature set is checked above.\n    6 |             return unsafe { run_x86_64_avx2(xyb, ob, intensity_target) };\n    7 |         }\n    8 |     }\n    9 | \n   10 |     #[cfg(target_arch = \"aarch64\")]\n   11 |     {\n   12 |         if std::arch::is_aarch64_feature_detected!(\"neon\") {\n   13 |             // SAFETY: Feature set is checked above.\n   14 |             return unsafe { run_aarch64_neon(xyb, ob, intensity_target) };\n   15 |         }\n   16 |     }\n   17 | \n   18 |     run_generic(xyb, ob, intensity_target)\n   19 | }\n   20 | \n   21 | #[cfg(target_arch = \"x86_64\")]\n   22 | #[target_feature(enable = \"avx2\")]\n   23 | #[target_feature(enable = \"fma\")]\n   24 | unsafe fn run_x86_64_avx2(xyb: [&mut [f32]; 3], ob: [f32; 3], intensity_target: f32) {\n   25 |     run_generic(xyb, ob, intensity_target)\n   26 | }\n   27 | \n   28 | #[cfg(target_arch = \"aarch64\")]\n   29 | #[target_feature(enable = \"neon\")]\n   30 | unsafe fn run_aarch64_neon(xyb: [&mut [f32]; 3], ob: [f32; 3], intensity_target: f32) {\n   31 |     run_generic(xyb, ob, intensity_target)\n   32 | }","lines":31,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/xyb.rs#L2-L32"},{"ref":"crates/jxl-color/src/ycbcr.rs:7-37","code":"    7 |     #[cfg(target_arch = \"x86_64\")]\n    8 |     {\n    9 |         if is_x86_feature_detected!(\"avx\") && is_x86_feature_detected!(\"fma\") {\n   10 |             // SAFETY: Feature set is checked above.\n   11 |             return unsafe { run_x86_64_avx2([cb, y, cr]) };\n   12 |         }\n   13 |     }\n   14 | \n   15 |     #[cfg(target_arch = \"aarch64\")]\n   16 |     {\n   17 |         if std::arch::is_aarch64_feature_detected!(\"neon\") {\n   18 |             // SAFETY: Feature set is checked above.\n   19 |             return unsafe { run_aarch64_neon([cb, y, cr]) };\n   20 |         }\n   21 |     }\n   22 | \n   23 |     run_generic([cb, y, cr])\n   24 | }\n   25 | \n   26 | #[cfg(target_arch = \"x86_64\")]\n   27 | #[target_feature(enable = \"avx2\")]\n   28 | #[target_feature(enable = \"fma\")]\n   29 | unsafe fn run_x86_64_avx2(buf_cbycr: [&mut [f32]; 3]) {\n   30 |     run_generic(buf_cbycr)\n   31 | }\n   32 | \n   33 | #[cfg(target_arch = \"aarch64\")]\n   34 | #[target_feature(enable = \"neon\")]\n   35 | unsafe fn run_aarch64_neon(buf_cbycr: [&mut [f32]; 3]) {\n   36 |     run_generic(buf_cbycr)\n   37 | }","lines":31,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/ycbcr.rs#L7-L37"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`render_loading_frame` has two `_ => todo!()` arms for the `match state` over `FrameRender`. `Self::do_render` can only return `InProgress`, `Err`, or `Done`, so the `todo!()` arms are unreachable in practice, but a `todo!()` panics rather than returning an error if that invariant is ever broken (e.g. by a future refactor of `do_render`).","fix":"Replace `todo!()` with `unreachable!(\"...\")` or return `Err(Error::NotReady)` to avoid a panic path.","locations":[{"ref":"crates/jxl-render/src/lib.rs:815","code":"  815 |                 _ => todo!(),","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/lib.rs#L815"},{"ref":"crates/jxl-render/src/lib.rs:877","code":"  877 |                 _ => todo!(),","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/lib.rs#L877"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`lbh` is bound but never used in `const_compute_natural_order` (only `lbw` is used; the LLF loop bound is `lbw * lbh` but `lbh` there refers to the parameter destructuring, while the local `lbh` binding at line 162 is unused). This is the same value duplicated; the unused local just adds noise and masks the intent discussed in the comment finding.","fix":"Remove the unused `let lbh = bh / 8;` binding in `const_compute_natural_order` (it is used in `fill_natural_order`).","locations":[{"ref":"crates/jxl-vardct/src/hf_pass.rs:161-162","code":"  161 |     let lbw = bw / 8;\n  162 |     let lbh = bh / 8;","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-vardct/src/hf_pass.rs#L161-L162"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Comment `// n < 32.` on line 591 is followed immediately by `let n = n & 31;` which only guarantees `n <= 31`. The masking is what enforces the bound; the unmasked `n` (computed from attacker-controlled `token` and config) can be >= 32, and the shifts later (`token << n`, in u64) rely on the mask, not on the asserted comment. The comment states an invariant that does not hold for the value it annotates (it holds only after the mask).","fix":"Reword to e.g. `// mask n to <32 so the u64 shift is well-defined` to reflect that the mask is load-bearing, not a pre-existing invariant.","locations":[{"ref":"crates/jxl-coding/src/lib.rs:589-602","code":"  589 |         let n = split_exponent - (msb_in_token + lsb_in_token)\n  590 |             + ((token - split) >> (msb_in_token + lsb_in_token));\n  591 |         // n < 32.\n  592 |         let n = n & 31;\n  593 |         let rest_bits = bitstream.peek_bits_prefilled(n as usize) as u64;\n  594 |         bitstream.consume_bits(n as usize).ok();\n  595 | \n  596 |         let low_bits = token & ((1 << lsb_in_token) - 1);\n  597 |         let low_bits = low_bits as u64;\n  598 |         let token = token >> lsb_in_token;\n  599 |         let token = token & ((1 << msb_in_token) - 1);\n  600 |         let token = token | (1 << msb_in_token);\n  601 |         let token = token as u64;\n  602 |         let result = (((token << n) | rest_bits) << lsb_in_token) | low_bits;","lines":14,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-coding/src/lib.rs#L589-L602"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `const_compute_natural_order` and `fill_natural_order` the LLF-region skip test reads `if x < lbw && y < lbw`. The second bound uses `lbw` (low-frequency block *width*) where, read literally, one expects `lbh` (height). The code is actually correct, but only by a non-obvious identity: the stored vertical coordinate is `y / y_scale` with `y_scale = lbw / lbh`, so `y < lbw` is equivalent to `y / y_scale < lbh`. This subtlety is undocumented and the bare `y < lbw` looks like a copy-paste typo (`lbh` is even computed but unused in `const_compute_natural_order`). A future edit could easily \"fix\" it to `y < lbh` and silently corrupt the coefficient order for non-square transforms (e.g. DCT32x16).","fix":"Add a one-line comment explaining that `y < lbw` is intentional (equivalent to `stored_y < lbh` because `y` is in pre-`y_scale` units), or rewrite the check in terms of the stored coordinate so the intent is self-evident. Also `lbh` in `const_compute_natural_order` is computed but never read.","locations":[{"ref":"crates/jxl-vardct/src/hf_pass.rs:183","code":"  183 |             if x < lbw && y < lbw {","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-vardct/src/hf_pass.rs#L183"},{"ref":"crates/jxl-vardct/src/hf_pass.rs:221","code":"  221 |             if x < lbw && y < lbw {","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-vardct/src/hf_pass.rs#L221"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"`PRIMARIES_P3` is documented as `Primaries specified in SMPTE ST 428-1` but the values `[[0.680,0.320],[0.265,0.690],[0.150,0.060]]` are the DCI-P3 / SMPTE RP 431-2 (theater) RGB primaries. SMPTE ST 428-1 actually specifies the CIE XYZ encoding (X'Y'Z'), not these RGB primaries. The constant is also named/used as the generic \"P3\" primaries throughout, so the doc comment is misleading.","fix":"Correct the doc comment to reference DCI-P3 (SMPTE RP 431-2) primaries, matching the actual values and the `Primaries::P3` usage.","locations":[{"ref":"crates/jxl-color/src/consts.rs:32-33","code":"   32 | /// Primaries specified in SMPTE ST 428-1.\n   33 | pub const PRIMARIES_P3: [[f32; 2]; 3] = [[0.680, 0.320], [0.265, 0.690], [0.150, 0.060]];","lines":2,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-color/src/consts.rs#L32-L33"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Three doc-comment / debug-label typos in scope. huffman.rs Debug impl prints the struct name as \"BulitHuffmanTable\" (should be BuiltHuffmanTable). jxl-threadpool has \"Spanws\" and \"paralleism\" typos in doc comments.","fix":"Fix spelling: BuiltHuffmanTable, Spawns, parallelism.","locations":[{"ref":"crates/jxl-jbr/src/huffman.rs:124","code":"  124 |         f.debug_struct(\"BulitHuffmanTable\")","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-jbr/src/huffman.rs#L124"},{"ref":"crates/jxl-threadpool/src/lib.rs:233","code":"  233 |     /// Spanws the given closure in current fork-join scope.","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-threadpool/src/lib.rs#L233"},{"ref":"crates/jxl-threadpool/src/lib.rs:49","code":"   49 |     ///","lines":1,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-threadpool/src/lib.rs#L49"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Comment claims a fixed allocation size that no longer matches the constant. In VideoContext::new the panic message says \"cannot allocate memory of 4 KiB\" and is tied to BUFFER_SIZE; it is correct today (4096) but the literal is hardcoded in the message while the size is a named constant, so they can silently drift. Minor.","fix":"Interpolate BUFFER_SIZE into the message instead of hardcoding \"4 KiB\".","locations":[{"ref":"crates/jxl-oxide-cli/src/output/video/context.rs:82-88","code":"   82 |         let buffer = unsafe {\n   83 |             let buffer = ffmpeg::av_malloc(Self::BUFFER_SIZE);\n   84 |             if buffer.is_null() {\n   85 |                 panic!(\"cannot allocate memory of 4 KiB\");\n   86 |             }\n   87 |             buffer\n   88 |         };","lines":7,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide-cli/src/output/video/context.rs#L82-L88"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"Three decode functions (`decode_single_node_slow`, `decode_simple_table_slow`, `decode_slow`) contain a nearly identical body: the first 2 rows with EDGE=true, then for each l IndexedFrame {\n 1009 |     fn new(frame: Frame, index: usize) -> Self {\n 1010 |         IndexedFrame {\n 1011 |             f: frame,\n 1012 |             idx: index,\n 1013 |         }\n 1014 |     }\n 1015 | \n 1016 |     /// Returns the frame index.\n 1017 |     pub fn index(&self) -> usize {\n 1018 |         self.idx\n 1019 |     }\n 1020 | }\n 1021 | \n 1022 | impl std::ops::Deref for IndexedFrame {\n 1023 |     type Target = Frame;\n 1024 | \n 1025 |     fn deref(&self) -> &Self::Target {\n 1026 |         &self.f\n 1027 |     }\n 1028 | }\n 1029 | \n 1030 | impl std::ops::DerefMut for IndexedFrame {\n 1031 |     fn deref_mut(&mut self) -> &mut Self::Target {\n 1032 |         &mut self.f\n 1033 |     }\n 1034 | }\n 1035 | \n 1036 | #[derive(Debug, Copy, Clone)]\n 1037 | struct FrameDependence {\n 1038 |     pub(crate) lf: usize,\n 1039 |     pub(crate) ref_slots: [usize; 4],\n 1040 | }\n 1041 | \n 1042 | #[derive(Debug, Clone, Default)]\n 1043 | struct ReferenceFrames<S: Sample> {\n 1044 |     pub(crate) lf: Option<Reference<S>>,\n 1045 |     pub(crate) refs: [Option<Reference<S>>; 4],\n 1046 | }\n 1047 | \n 1048 | #[derive(Debug, Clone)]\n 1049 | struct Reference<S: Sample> {\n 1050 |     pub(crate) frame: Arc<IndexedFrame>,\n 1051 |     pub(crate) image: Arc<FrameRenderHandle<S>>,\n 1052 | }","lines":1053,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/lib.rs#L1-L1053"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"high","easy":false,"description":"Soundness: the safe `get_row`/`try_get_row`/`try_get_row_mut` APIs compute `self.ptr.as_ptr().add(offset)` with `offset = row * stride` (non-wrapping `add`, which requires the result to stay within the same allocation). For an empty subgrid created at the bottom edge of a strided buffer (e.g. via split_vertical at height, subgrid(.., h..h), or into_groups_with_fixed_count overshoot), the base pointer is already `base + height*stride`, which is one-past-or-beyond the backing allocation when the last row has stride padding. Offsetting it with `add` is UB. The crate's own `miri_ub` test module documents these as currently-unsound safe APIs (zero_width_mutable_subgrid_row_offsets_empty_slice_pointer, mutable_split_vertical_at_bottom_with_padded_stride, etc.). Reachable from frame decoding which constructs subgrids over attacker-sized buffers.","fix":"Never form an out-of-allocation base pointer. Either store offsets and only materialize the pointer when an in-bounds element is accessed, or use `wrapping_add` consistently and guard reads with explicit width/height checks (the row helpers already early-return for width==0 but still offset by stride first). At minimum, clamp the row base so it is never computed past the allocation for empty subgrids.","locations":[{"ref":"crates/jxl-grid/src/shared_subgrid.rs:150-156","code":"  150 |         Some(unsafe {\n  151 |             let offset = row\n  152 |                 .checked_mul(self.stride)\n  153 |                 .expect(\"subgrid row offset overflows usize\");\n  154 |             let ptr = self.ptr.as_ptr().add(offset);\n  155 |             std::slice::from_raw_parts(ptr as *const _, self.width)\n  156 |         })","lines":7,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-grid/src/shared_subgrid.rs#L150-L156"},{"ref":"crates/jxl-grid/src/mutable_subgrid.rs:192-198","code":"  192 |         Some(unsafe {\n  193 |             let offset = row\n  194 |                 .checked_mul(self.stride)\n  195 |                 .expect(\"subgrid row offset overflows usize\");\n  196 |             let ptr = self.ptr.as_ptr().add(offset);\n  197 |             std::slice::from_raw_parts(ptr as *const _, self.width)\n  198 |         })","lines":7,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-grid/src/mutable_subgrid.rs#L192-L198"},{"ref":"crates/jxl-grid/src/mutable_subgrid.rs:251-257","code":"  251 |         Some(unsafe {\n  252 |             let offset = row\n  253 |                 .checked_mul(self.stride)\n  254 |                 .expect(\"subgrid row offset overflows usize\");\n  255 |             let ptr = self.ptr.as_ptr().add(offset);\n  256 |             std::slice::from_raw_parts_mut(ptr, self.width)\n  257 |         })","lines":7,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-grid/src/mutable_subgrid.rs#L251-L257"},{"ref":"crates/jxl-grid/src/test/subgrids.rs:307-372","code":"  307 | mod miri_ub {\n  308 |     use super::*;\n  309 | \n  310 |     // These intentionally exercise currently unsound safe APIs\n  311 | \n  312 |     // `MutableSubgrid::from_buf` accepts `width == 0` with `height > 0` over an empty slice.\n  313 |     // The grid has no elements, but `get_row(1)` still treats the second row as in-bounds and\n  314 |     // computes `dangling.add(stride)` before creating a zero-length slice; `get_row_mut` uses the\n  315 |     // same calculation. Offsetting the dangling pointer from the empty backing slice is UB and is\n  316 |     // reported by Miri under:\n  317 |     // cargo +nightly miri test -p jxl-grid --release zero_width_mutable_subgrid_row_offsets_empty_slice_pointer\n  318 |     #[test]\n  319 |     fn zero_width_mutable_subgrid_row_offsets_empty_slice_pointer() {\n  320 |         let mut buf = [];\n  321 |         let grid = MutableSubgrid::<u8>::from_buf(&mut buf, 0, 2, 1);\n  322 |         let row = grid.get_row(1);\n  323 |         std::hint::black_box(row);\n  324 |     }\n  325 | \n  326 |     // Splitting a strided grid at its bottom edge creates an empty bottom subgrid.\n  327 |     // The implementation still computes `base + height * stride`, which is past the allocation\n  328 |     // when the final row has padding.\n  329 |     #[test]\n  330 |     fn mutable_split_vertical_at_bottom_with_padded_stride() {\n  33 for the lazily-computed large natural orders. `natural_order_lazy` initializes `LARGE_NATURAL_ORDER[idx]` inside a per-index `Once` via `&mut LARGE_NATURAL_ORDER[idx]`, then later returns `&LARGE_NATURAL_ORDER[idx]` as a `&'static`. Because all four entries live in the same `static mut` array, one thread can be holding/returning a shared `&` to one element while another thread is concurrently creating a `&mut` to a *different* element of the same static (DCT64/DCT128/DCT256 orders initialize independently). Deriving a `&'static` shared reference from a `static mut` while a `&mut` into the same static is live is undefined behavior under Rust's aliasing model, even for disjoint indices. The SAFETY comments only reason about same-index access and miss the cross-index aliasing of the backing static.","fix":"Replace the `static mut` + array-of-`Once` pattern with four independent `OnceLock<Vec<(u16,u16)>>` (now stable) or a single `OnceLock<[Vec<(u16,u16)>; 4]>`, returning `&'static` from the `OnceLock` rather than from a `static mut`.","locations":[{"ref":"crates/jxl-vardct/src/hf_pass.rs:134-154","code":"  134 |     static INITIALIZER: [std::sync::Once; 4] = [\n  135 |         std::sync::Once::new(),\n  136 |         std::sync::Once::new(),\n  137 |         std::sync::Once::new(),\n  138 |         std::sync::Once::new(),\n  139 |     ];\n  140 |     static mut LARGE_NATURAL_ORDER: [Vec<(u16, u16)>; 4] =\n  141 |         [Vec::new(), Vec::new(), Vec::new(), Vec::new()];\n  142 | \n  143 |     // TODO: Replace this with `OnceLock` when it is available in stable.\n  144 |     INITIALIZER[idx].call_once(|| {\n  145 |         // SAFETY: this is the only thread accessing LARGE_NATURAL_ORDER[idx],\n  146 |         // as we're in call_once\n  147 |         let natural_order = unsafe { &mut LARGE_NATURAL_ORDER[idx] };\n  148 |         natural_order.resize(block_size.0 * block_size.1, (0, 0));\n  149 |         fill_natural_order(block_size, natural_order);\n  150 |     });\n  151 |     // SAFETY: none of the threads will have mutable access to LARGE_NATURAL_ORDER[idx],\n  152 |     // as we used call_once\n  153 |     unsafe { &LARGE_NATURAL_ORDER[idx] }\n  154 | }","lines":21,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-vardct/src/hf_pass.rs#L134-L154"}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","easy":false,"description":"ANS `read_symbol` contains `assert_eq!(std::mem::size_of::<Bucket>(), 8)` in an `#[inline(always)]` hot loop executed once per decoded symbol. The size is already statically guaranteed by the `const _` assertion at lines 25-27, so this runtime assert is redundant work in the entropy-decoding inner loop (and a panic path on a condition that can never be false).","fix":"Remove the runtime `assert_eq!`; the compile-time check at lines 25-27 already enforces `size_of::<Bucket>() == 8`.","locations":[{"ref":"crates/jxl-coding/src/ans.rs:275-277","code":"  275 |     #[inline(always)]\n  276 |     pub fn read_symbol(&self, bitstream: &mut Bitstream, state: &mut u32) -> CodingResult<u32> {\n  277 |         assert_eq!(std::mem::size_of::<Bucket>(), 8);","lines":3,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-coding/src/ans.rs#L275-L277"}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"low","easy":false,"description":"AllocTracker::shrink_limit returns OutOfMemory::new(by_bytes) but does not distinguish a genuine failure (current allocations exceed the new limit) from success; more importantly, expand_limit/shrink_limit pair with fetch_add/checked_sub can let the tracked `bytes_left` drift if expand_limit is called more than the originally reserved amount (it is an unchecked fetch_add). Not directly a memory-safety bug but the limit accounting can be corrupted by API misuse, undermining the DoS bound the tracker provides.","fix":"Document the invariant that expand/shrink must s.len(), frame_index);\n  980 |             self.frame_offsets.push(self.buffer_offset);","lines":3,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-oxide/src/lib.rs#L978-L980"}]},{"id":"OTHER_7","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`x86_64::adaptive_lf_smoothing_core_avx2` is annotated `#[target_feature(enable = \"avx2\"/\"fma\")]` and gated behind `is_x86_feature_detected!`, but its body merely calls the scalar `generic::adaptive_lf_smoothing_impl` (which contains no explicit SIMD and is not `#[inline(always)]`-forced into an AVX2 context for autovectorization to differ meaningfully). The same is true for the aarch64 NEON wrapper. The result is runtime feature detection and an `unsafe` call boundary that buys essentially nothing; the adaptive LF smoothing has no real SIMD implementation despite the per-arch scaffolding suggesting otherwise.","fix":"Either provide a genuine SIMD implementation of adaptive LF smoothing, or drop the feature-detected `unsafe` wrappers and call the generic implementation directly to avoid dead `unsafe`/`target_feature` scaffolding.","locations":[{"ref":"crates/jxl-render/src/vardct/x86_64/mod.rs:26-36","code":"   26 | #[target_feature(enable = \"avx2\")]\n   27 | #[target_feature(enable = \"fma\")]\n   28 | unsafe fn adaptive_lf_smoothing_core_avx2(\n   29 |     width: usize,\n   30 |     height: usize,\n   31 |     lf_image: [&mut [f32]; 3],\n   32 |     lf_scale: [f32; 3],\n   33 |     tracker: Option<&AllocTracker>,\n   34 | ) -> crate::Result<()> {\n   35 |     generic::adaptive_lf_smoothing_impl(width, height, lf_image, lf_scale, tracker)\n   36 | }","lines":11,"link":"https://github.com/tirr-c/jxl-oxide/blob/f8ae722ef2d6b782941c89517d19cfbf605c4a9d/crates/jxl-render/src/vardct/x86_64/mod.rs#L26-L36"},{"ref":"crates/jxl-render/src/vardct/aarch64/mod.rs:28-37","code":"   28 | #[target_feature(enable = \"neon\")]\n   29 | unsafe fn adapti
