*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `read_events`, the match arm `_ if num_bytes < 0` calls `panic!` for any negative `read` return value that is not -1. Although the POSIX spec says `read` returns -1 on error, 0 on EOF, or a positive value, a library should never panic on an edge case the caller cannot predict or catch. Panicking here terminates the caller's process rather than returning an `Err`.","fix":"Replace the `panic!` with `return Err(io::Error::new(io::ErrorKind::Other, format!(\"unexpected return value from read: {}\", num_bytes)))`. Remove the intermediate `isize` reassignment and simplify the match arm to just the error return.","locations":[{"ref":"src/inotify.rs:220-229","code":"  220 |             _ if num_bytes < 0 => {\n  221 |                 panic!(\n  222 |                     \"{} {} {} {} {} {}\",\n  223 |                     \"Unexpected return value from `read`. Received a negative\",\n  224 |                     \"value that was not `-1`. According to the `read` man page\",\n  225 |                     \"this shouldn't happen, as either `-1` is returned on\",\n  226 |                     \"error, `0` on end-of-file, or a positive value for the\",\n  227 |                     \"number of bytes read. Returned value:\",\n  228 |                     num_bytes,\n  229 |                 );","lines":10}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Event::from_buffer` calls `EventMask::from_bits(event.mask).expect(...)`. `from_bits` returns `None` when any bit is set that is not declared in `EventMask`. If a newer Linux kernel introduces a new inotify flag, every event with that flag would cause a panic instead of being handled gracefully. This is in the hot event-reading path.","fix":"Replace `EventMask::from_bits(event.mask).expect(...)` with `EventMask::from_bits_retain(event.mask)` (available since bitflags 2.x). Unknown bits are preserved but do not cause a panic; callers can inspect them via the existing `EventMask` API.","locations":[{"ref":"src/events.rs:104-105","code":"  104 |         let mask = EventMask::from_bits(event.mask)\n  105 |             .expect(\"Failed to convert event mask. This indicates a bug.\");","lines":2}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Watches::remove` panics with `panic!` on any `inotify_rm_watch` return value other than 0 or -1. While the manpage specifies only these two values, panicking in a public library method is poor practice; the caller has no way to recover.","fix":"Replace the catch-all `panic!` arm with `return Err(io::Error::new(io::ErrorKind::Other, format!(\"unexpected return code from inotify_rm_watch: {}\", result)))`.","locations":[{"ref":"src/watches.rs:393-398","code":"  393 |         let result = unsafe { ffi::inotify_rm_watch(**self.fd, wd.id) };\n  394 |         match result {\n  395 |             0 => Ok(()),\n  396 |             -1 => Err(io::Error::last_os_error()),\n  397 |             _ => panic!(\"unexpected return code from inotify_rm_watch ({})\", result),\n  398 |         }","lines":6}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`read_events_blocking` sets the fd to blocking mode via `fcntl(F_SETFL, flags & !O_NONBLOCK)`, then calls `read_events`, then restores `O_NONBLOCK`. If either the second `F_GETFL` or the `F_SETFL` restore call fails (lines 141-145), the function returns the `fcntl` error immediately and the fd is permanently left in blocking mode. All subsequent `read_events` calls on this instance will block indefinitely rather than returning `WouldBlock`, silently changing the contract of the API. Additionally, if `read_events` already returned an error, that result is silently discarded and the unrelated `fcntl` error is returned instead.","fix":"Use a RAII guard or a `finally`-like pattern to guarantee the restore runs. One approach: save the original flags before clearing O_NONBLOCK, and in a deferred-cleanup guard restore them unconditionally. If restore fails, at minimum log or annotate the returned error so the caller knows the fd state is now broken. Also call `read_events` before the restore guard scope so its result is not dropped.","locations":[{"ref":"src/inotify.rs:128-149","code":"  128 |     pub fn read_events_blocking<'a>(&mut self, buffer: &'a mut [u8]) -> io::Result<Events<'a>> {\n  129 |         unsafe {\n  130 |             let res = fcntl(**self.fd, F_GETFL);\n  131 |             if res == -1 {\n  132 |                 return Err(io::Error::last_os_error());\n  133 |             }\n  134 |             if fcntl(**self.fd, F_SETFL, res & !O_NONBLOCK) == -1 {\n  135 |                 return Err(io::Error::last_os_error());\n  136 |             }\n  137 |         };\n  138 |         let result = self.read_events(buffer);\n  139 |         unsafe {\n  140 |             let res = fcntl(**self.fd, F_GETFL);\n  141 |             if res == -1 {\n  142 |                 return Err(io::Error::last_os_error());\n  143 |             }\n  144 |             if fcntl(**self.fd, F_SETFL, res | O_NONBLOCK) == -1 {\n  145 |                 return Err(io::Error::last_os_error());\n  146 |             }\n  147 |         };\n  148 | \n  149 |         result","lines":22}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`get_absolute_path_buffer_size` adds `parent_path_len` (the byte length of the watched path's parent directory) to `INOTIFY_EVENT_SIZE`. This is incorrect: inotify events contain only the bare filename in the `name` field (relative to the watched directory), never the full path. The minimum buffer needed is always `sizeof(inotify_event) + NAME_MAX + 1` regardless of how deep the watched path is. As a result the function returns inflated sizes (e.g., watching `/mnt/storage/data/backups` returns ~45 extra bytes beyond what is needed), and the public documentation is misleading.","fix":"Remove the `parent_path_len` calculation entirely and simply return `INOTIFY_EVENT_SIZE`. Update the function doc to state that the buffer size does not depend on the watched path's location, only on the maximum filename length (NAME_MAX).","locations":[{"ref":"src/util.rs:52-61","code":"   52 | pub fn get_absolute_path_buffer_size(path: &Path) -> usize {\n   53 |     // Get the length of the absolute parent path, if the path is not the root directory.\n   54 |     // Because we canonicalize the path, we do not need to worry about prefixes.\n   55 |     let parent_path_len = path\n   56 |         .parent()\n   57 |         .map(|parent_path| parent_path.as_os_str().len())\n   58 |         .unwrap_or(0);\n   59 | \n   60 |     INOTIFY_EVENT_SIZE + parent_path_len\n   61 | }","lines":10}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"low","easy":false,"description":"`Inotify::close` calls `should_not_close()` unconditionally (so the `FdGuard` Drop will not close again) and then calls `ffi::close` on the raw fd. However, `Watches::new` clones the inner `Arc<FdGuard>`, so a `Watches` instance obtained before `close()` is called still holds a live `Arc`. After `Inotify::close` returns, that `Watches` holds a reference to an `FdGuard` whose underlying fd is already closed and may have been reused by the OS. Any subsequent `inotify_add_watch` or `inotify_rm_watch` call through that `Watches` instance uses the (potentially reused) fd, which is undefined behavior.","fix":"Document clearly that all `Watches` instances must be dropped before calling `close()`. Alternatively, use a weak-reference pattern: have `Watches` hold a `Weak<FdGuard>` and upgrade it before each syscall, returning an error if the upgrade fails (i.e., the inotify instance has been closed).","locations":[{"ref":"src/inotify.rs:306-317","code":"  306 |     pub fn close(self) -> io::Result<()> {\n  307 |         // `self` will be dropped when this method returns. If this is the only\n  308 |         // owner of `fd`, the `Arc` will also be dropped. The `Drop`\n  309 |         // implementation for `FdGuard` will attempt to close the file descriptor\n  310 |         // again, unless this flag here is cleared.\n  311 |         self.fd.should_not_close();\n  312 | \n  313 |         match unsafe { ffi::close(**self.fd) } {\n  314 |             0 => Ok(()),\n  315 |             _ => Err(io::Error::last_os_error()),\n  316 |         }\n  317 |     }","lines":12},{"ref":"src/watches.rs:244-252","code":"  244 | pub struct Watches {\n  245 |     pub(crate) fd: Arc<FdGuard>,\n  246 | }\n  247 | \n  248 | impl Watches {\n  249 |     /// Init watches with an inotify file descriptor\n  250 |     pub(crate) fn new(fd: Arc<FdGuard>) -> Self {\n  251 |         Watches { fd }\n  252 |     }","lines":9}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"The `Display` implementation for `EventMaskParseError` uses `writeln!` in both match arms, which appends a `\\n` after every formatted message. The `fmt::Display` contract expects no trailing newline; standard error-printing code such as `eprintln!(\"{}\", err)` or `format!(\"{}\", err)` will produce a double newline or unexpected blank line.","fix":"Change both `writeln!(f, ...)` calls to `write!(f, ...)`.","locations":[{"ref":"src/events.rs:560-572","code":"  560 | impl Display for EventMaskParseError {\n  561 |     fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {\n  562 |         match self {\n  563 |             Self::TooManyBitsSet(mask) => {\n  564 |                 writeln!(\n  565 |                     f,\n  566 |                     \"Error parsing event mask: too many event type bits set | {mask:?}\"\n  567 |                 )\n  568 |             }\n  569 |             Self::QueueOverflow => writeln!(f, \"Error: the kernel's event queue overflowed\"),\n  570 |         }\n  571 |     }\n  572 | }","lines":13}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`FdGuard::PartialEq` uses the `kcmp(2)` syscall to compare file descriptions when the raw fd integers differ. If `kcmp` fails (e.g., `EPERM` on hardened kernels or containers with restricted `ptrace` capabilities), the error is silently swallowed and `false` is returned. This means two `FdGuard` values that genuinely refer to the same inotify instance (via dup'd fds) will compare as unequal. In practice this breaks the `Watches::remove` check at `watches.rs:386`, causing it to reject a valid `WatchDescriptor` with `InvalidInput` when the kernel denies `kcmp`.","fix":"When `kcmp` returns an error, consider falling back to comparing `self.fd == other.fd` (raw integer equality) and documenting that duplicated-fd equality is not supported on kernels that deny `kcmp`. Alternatively, expose a method that lets callers learn whether the comparison was inconclusive.","locations":[{"ref":"src/fd_guard.rs:81-107","code":"   81 | impl PartialEq for FdGuard {\n   82 |     fn eq(&self, other: &FdGuard) -> bool {\n   83 |         let initial = self.fd == other.fd;\n   84 |         if initial {\n   85 |             return true;\n   86 |         }\n   87 |         // This allows comparing duplicated Inotify descriptors that point to the\n   88 |         // same Inotify instance, which allows for scenarios where an Inotify\n   89 |         // wrapper both owns a file descriptor for control purposes and spawns a\n   90 |         // second thread that needs a separate unowned descriptor to use the `epoll-rs`\n   91 |         // crate.\n   92 |         const KCMP_FILE: i32 = 0;\n   93 |         let current_process = std::process::id();\n   94 |         match util::libc_convert(unsafe {\n   95 |             libc::syscall(\n   96 |                 libc::SYS_kcmp,\n   97 |                 current_process,\n   98 |                 current_process,\n   99 |                 KCMP_FILE,\n  100 |                 self.fd,\n  101 |                 other.fd,\n  102 |             ) as i64\n  103 |         }) {\n  104 |             Err(_) => false,\n  105 |             Ok(cmp) => cmp == 0,\n  106 |         }\n  107 |     }","lines":27},{"ref":"src/watches.rs:385-391","code":"  385 |     pub fn remove(&mut self, wd: WatchDescriptor) -> io::Result<()> {\n  386 |         if wd.fd.upgrade().as_ref() != Some(&self.fd) {\n  387 |             return Err(io::Error::new(\n  388 |                 io::ErrorKind::InvalidInput,\n  389 |                 \"Invalid WatchDescriptor\",\n  390 |             ));\n  391 |         }","lines":7}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In the async `read` helper inside `stream.rs`, when `try_io` returns `Err(WouldBlock)` (meaning the fd was not actually ready despite the readiness guard firing), the code calls `cx.waker().wake_by_ref()` before returning `Poll::Pending`. This triggers an immediate re-poll of the future on the executor, burning a redundant iteration before `poll_read_ready` can correctly park the task until the fd is readable again.","fix":"Remove the `cx.waker().wake_by_ref()` call. When `try_io` returns `WouldBlock`, the `AsyncFd` guard has already cleared the readiness interest; returning `Poll::Pending` without waking is sufficient -- tokio will re-register interest and wake the task when the fd becomes readable.","locations":[{"ref":"src/stream.rs:107-113","code":"  107 |     match result {\n  108 |         Ok(result) => Poll::Ready(result),\n  109 |         Err(_would_block) => {\n  110 |             cx.waker().wake_by_ref();\n  111 |             Poll::Pending\n  112 |         }\n  113 |     }","lines":7}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Two typos in `EventMaskParseError` doc comments: (1) line 551 `occured` should be `occurred`; (2) line 554 `repesenting` should be `representing`.","fix":"Fix both typos: `occurred` and `representing`.","locations":[{"ref":"src/events.rs:551-558","code":"  551 | /// An error that occured from parsing an raw event mask\n  552 | #[derive(Debug, Clone, Copy, PartialEq, Eq)]\n  553 | pub enum EventMaskParseError {\n  554 |     /// More than one bit repesenting the event type was set\n  555 |     TooManyBitsSet(EventMask),\n  556 |     /// The event is a signal that the kernels event queue overflowed\n  557 |     QueueOverflow,\n  558 | }","lines":8}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The error message string on line 214 reads `\"`read` return \\`0\\`\"` — `return` should be `returned` (past tense).","fix":"Change `\"`read` return \\`0\\`, signaling end-of-file\"` to `\"`read` returned \\`0\\`, signaling end-of-file\"`.","locations":[{"ref":"src/inotify.rs:212-215","code":"  212 |                     io::ErrorKind::UnexpectedEof,\n  213 |                     \"`read` return `0`, signaling end-of-file\",\n  214 |                 ));\n  215 |             }","lines":4}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The constant `INOTIFY_EVENT_SIZE` adds 257 instead of 256 for the maximum name buffer. The inotify man page formula is `sizeof(struct inotify_event) + NAME_MAX + 1` where NAME_MAX = 255, giving a total name portion of 256 bytes. Using 257 over-estimates by one byte.","fix":"Change `+ 257` to `+ 256` and add a comment referencing the man page formula `sizeof(struct inotify_event) + NAME_MAX + 1`.","locations":[{"ref":"src/util.rs:6","code":"    6 | const INOTIFY_EVENT_SIZE: usize = mem::size_of::<ffi::inotify_event>() + 257;","lines":1}]}]</script>

    <h1>Code Audit Report &mdash; inotify-rs</h1>
    <div class="meta">Generated 2026-06-15 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="project-info"><div class="pi-name">inotify-rs</div><div class="pi-row"><a class="pi-repo-btn" href="https://github.com/hannobraun/inotify-rs" target="_blank" rel="noopener">&#128279; https://github.com/hannobraun/inotify-rs</a><span><span class="pi-k">branch</span> <code>main</code></span><span><span class="pi-k">commit</span> <a href="https://github.com/hannobraun/inotify-rs/commit/3de023dbf2f830d371df679e93eefacc9daee25e" target="_blank" rel="noopener"><code>3de023dbf2</code></a></span></div></div>

<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
  <button class="action-btn" data-action="download-md">&#11015; MD</button>
  <button class="action-btn" data-action="download-md-short">&#11015; MD Short</button>
  <button class="action-btn" data-action="download-toml">&#11015; TOML</button>
</div>

<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
