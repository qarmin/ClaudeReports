<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"service_start_transient_unit() unconditionally dereferences service->active_data->argv[0] when building the ExecStart array. service_activate() only sets is_transient (the path leading here) when active_data->argc > 0, so in practice argv[0] exists; however there is no assert or guard at this call site, and the surrounding code treats argc==0 as a valid 'self-activating' service elsewhere. If the invariant is ever broken (e.g. future change to activation flow), this is an out-of-bounds read of argv[0].","fix":"Add c_assert(service->active_data->argc > 0) at the top of service_start_transient_unit(), or guard the argv[0] access explicitly.","locations":[{"ref":"src/launch/service.c:491-492","code":"  491 |                                                 r = sd_bus_message_append(method_call, \"s\", service->active_data->argv[0]);\n  492 |                                                 if (r < 0)","lines":2},{"ref":"src/launch/service.c:933-952","code":"  933 |         } else if (service->active_data->argc > 0) {\n  934 |                 r = sd_bus_get_unique_name(launcher->bus_regular, &unique_name);\n  935 |                 if (r < 0)\n  936 |                         return error_origin(r);\n  937 | \n  938 |                 r = systemd_escape_unit(&escaped_name, service->name);\n  939 |                 if (r)\n  940 |                         return error_fold(r);\n  941 | \n  942 |                 r = asprintf(\n  943 |                         &service->active_unit,\n  944 |                         \"dbus-%s-%s@%\"PRIu64\".service\",\n  945 |                         unique_name,\n  946 |                         escaped_name,\n  947 |                         service->instance++\n  948 |                 );\n  949 |                 if (r < 0)\n  950 |                         return error_origin(-errno);\n  951 | \n  952 |                 service->is_transient = true;","lines":20}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"policy-denial log_commitf() calls pass message->metadata.fields.interface and .member (and .path/.destination) directly as %s arguments with no NULL guard. For a method_call the interface field is optional and may be NULL, and broadcasts have a NULL destination; elsewhere in the codebase (diag_append_message) these are always guarded with `?: \"<missing>\"`. Passing NULL to %s is undefined behavior; glibc prints \"(null)\" but this is fragile and inconsistent with the rest of the code.","fix":"Guard each optional field, e.g. `message->metadata.fields.interface ?: \"<missing>\"`, matching diag_append_message().","locations":[{"ref":"src/bus/peer.c:794-798","code":"  794 |                         r = log_commitf(receiver->bus->log, \"A security policy denied %s to receive %s %s:%s.%s from :1.%llu.\",\n  795 |                                         message->metadata.fields.destination,\n  796 |                                         message->header->type == DBUS_MESSAGE_TYPE_METHOD_CALL ? \"method call\" : \"signal\",\n  797 |                                         message->metadata.fields.path, message->metadata.fields.interface, message->metadata.fields.member,\n  798 |                                         sender_id);","lines":5},{"ref":"src/bus/peer.c:830-834","code":"  830 |                         r = log_commitf(receiver->bus->log, \"A security policy denied :1.%llu to send %s %s:%s.%s to %s.\",\n  831 |                                         sender_id,\n  832 |                                         message->header->type == DBUS_MESSAGE_TYPE_METHOD_CALL ? \"method call\" : \"signal\",\n  833 |                                         message->metadata.fields.path, message->metadata.fields.interface, message->metadata.fields.member,\n  834 |                                         message->metadata.fields.destination);","lines":5}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"policy_import_verdict() computes priority as 'UINT64_MAX / _CONFIG_POLICY_N * context + ++policy->i_priority'. i_priority is an unbounded incrementing counter; with enough policy records (per-context band width is UINT64_MAX/7) the additive term can spill into the next context's priority band, inverting the intended priority ordering between policy contexts. Not reachable with realistic config sizes (needs ~2.6e18 records), but the math has no guard.","fix":"Either document/assert an upper bound on i_priority well below the band width, or clamp/saturate the per-context counter so it cannot exceed the band size.","locations":[{"ref":"src/launch/policy.c:236-240","code":"  236 |         record->verdict = (cnode->type == CONFIG_NODE_ALLOW);\n  237 |         record->priority = UINT64_MAX / _CONFIG_POLICY_N *\n  238 |                            cnode->parent->policy.context +\n  239 |                            ++policy->i_priority;\n  240 | }","lines":5}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"metrics_compile() fills client->buffer via asprintf() but never sets client->n_buffer. Since the struct was calloc()'d, n_buffer stays 0. In metrics_client_dispatch() the EPOLLOUT path then calls send(fd, buffer + i_buffer, n_buffer - i_buffer = 0, ...), which returns 0, and the immediately following check `i_buffer (0) >= n_buffer (0)` is true, so the client is hung up. The metrics payload is therefore never actually transmitted to any client - the metrics endpoint is effectively non-functional.","fix":"After asprintf succeeds, set client->n_buffer to the returned length: `client->n_buffer = r;` (and keep client->i_buffer == 0).","locations":[{"ref":"src/bus/metrics.c:116-129","code":"  116 | static int metrics_compile(MetricsClient *client) {\n  117 |         int r;\n  118 | \n  119 |         c_assert(!client->buffer);\n  120 | \n  121 |         r = asprintf(\n  122 |                 (void *)&client->buffer,\n  123 |                 \"# EOF\"\n  124 |         );\n  125 |         if (r < 0)\n  126 |                 return error_origin(-errno);\n  127 | \n  128 |         return 0;\n  129 | }","lines":14},{"ref":"src/bus/metrics.c:38-76","code":"   38 |         } else if (events & EPOLLOUT) {\n   39 |                 ssize_t len;\n   40 | \n   41 |                 len = send(\n   42 |                         client->socket_fd,\n   43 |                         client->buffer + client->i_buffer,\n   44 |                         client->n_buffer - client->i_buffer,\n   45 |                         MSG_DONTWAIT | MSG_NOSIGNAL\n   46 |                 );\n   47 |                 if (len < 0) {\n   48 |                         switch (errno) {\n   49 |                         case EAGAIN:\n   50 |                                 dispatch_file_clear(file, EPOLLOUT);\n   51 |                                 break;\n   52 |                         case ECOMM:\n   53 |                         case ECONNABORTED:\n   54 |                         case ECONNRESET:\n   55 |                         case EHOSTDOWN:\n   56 |                         case EHOSTUNREACH:\n   57 |                         case EIO:\n   58 |                         case ENOBUFS:\n   59 |                         case ENOMEM:\n   60 |                         case EPIPE:\n   61 |                         case EPROTO:\n   62 |                         case EREMOTEIO:\n   63 |                         case ESHUTDOWN:\n   64 |                         case ETIMEDOUT:\n   65 |                                 hup = true;\n   66 |                                 break;\n   67 |                         default:\n   68 |                                 return error_origin(-errno);\n   69 |                         }\n   70 |                 } else {\n   71 |                         client->i_buffer += len;\n   72 |                         if (client->i_buffer >= client->n_buffer)\n   73 |                                 hup = true;\n   74 |                         else\n   75 |                                 dispatch_file_clear(file, EPOLLOUT);\n   76 |                 }","lines":39}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In bus_apparmor_check_own() the audit-log format string is terminated by a stray comma after the `mask=\"bind\"` literal, so the intended `\" label=\\\"%s\\\"\"` fragment is NOT concatenated into the format string but instead becomes the FIRST variadic argument. The result: the format string has only 3 `%s` conversions (apparmor, bus, name), and the arguments are misaligned. `%s`#1 binds to the literal \" label=\\\"%s\\\"\", `%s`#2 binds to the ALLOWED/DENIED string, `%s`#3 binds to registry->bustype, while `name` and `security_label` are never consumed. The emitted AVC audit record is therefore garbled (e.g. `apparmor=\" label=\"%s\"\"`), the actual name and label are dropped, and the `mask=`/`label=` fields are missing/corrupt. Audit logs are security-relevant, so corrupted records can hide policy violations.","fix":"Remove the comma after the `\" mask=\\\"bind\\\"\"` literal so the `\" label=\\\"%s\\\"\"` fragment is concatenated into the format string (string-literal concatenation), matching the four `%s` to apparmor-result, bustype, name, security_label.","locations":[{"ref":"src/util/apparmor.c:413-423","code":"  413 |                         \"apparmor=\\\"%s\\\"\"\n  414 |                         \" operation=\\\"dbus_bind\\\"\"\n  415 |                         \" bus=\\\"%s\\\"\"\n  416 |                         \" name=\\\"%s\\\"\"\n  417 |                         \" mask=\\\"bind\\\"\",\n  418 |                         \" label=\\\"%s\\\"\",\n  419 |                         allow ? \"ALLOWED\" : \"DENIED\",\n  420 |                         registry->bustype,\n  421 |                         name,\n  422 |                         security_label\n  423 |                 );","lines":11}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"driver_method_get_adt_audit_session_data() performs a peer lookup\n(bus_find_peer_by_name) and stores the result in `connection`, which is then\nnever used; the function unconditionally returns DRIVER_E_ADT_NOT_SUPPORTED. The\nlookup's only purpose is to return DRIVER_E_PEER_NOT_FOUND for a nonexistent\nname, but this leaks whether a name exists before reporting the feature\nunsupported, and the dead `connection` assignment is confusing. The reference\ndbus-daemon returns the not-supported error without first probing name\nexistence.","fix":"Either drop the peer lookup entirely and just return DRIVER_E_ADT_NOT_SUPPORTED, or mark the lookup's intent clearly; remove the unused `connection` result.","locations":[{"ref":"src/bus/driver.c:1482-1503","code":" 1482 | static int driver_method_get_adt_audit_session_data(Peer *peer, const char *path, CDVar *in_v, uint32_t serial, CDVar *out_v) {\n 1483 |         Peer *connection;\n 1484 |         const char *name;\n 1485 |         int r;\n 1486 | \n 1487 |         c_dvar_read(in_v, \"(s)\", &name);\n 1488 | \n 1489 |         r = driver_end_read(in_v);\n 1490 |         if (r)\n 1491 |                 return error_trace(r);\n 1492 | \n 1493 |         if (strcmp(name, \"org.freedesktop.DBus\")) {\n 1494 |                 connection = bus_find_peer_by_name(peer->bus, NULL, name);\n 1495 |                 if (!connection)\n 1496 |                         return DRIVER_E_PEER_NOT_FOUND;\n 1497 |         }\n 1498 | \n 1499 |         /*\n 1500 |          * ADT Audit Session Data is not supported on Linux\n 1501 |          */\n 1502 |         return DRIVER_E_ADT_NOT_SUPPORTED;\n 1503 | }","lines":22}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"config_parser_attrs_* handlers report invalid attribute values via CONFIG_ERR (which only prints to stderr) and then continue/return 0 as if successful, leaving the corresponding node field at its default. For example an invalid send_type/recv_type/limit-name value just logs and proceeds, so a typo in a security policy attribute is not fatal and yields a policy different from what the admin wrote. dbus-daemon(1) compatibility may justify this, but the failure mode (silently weakened policy) is worth flagging.","fix":"Confirm this lenient behavior is intended for compatibility; if not, escalate invalid security-relevant attribute values to a CONFIG_E_INVALID so the bad config is rejected rather than silently misinterpreted.","locations":[{"ref":"src/launch/config.c:475-485","code":"  475 |                 } else if (!strcmp(k, \"send_type\")) {\n  476 |                         if (!strcmp(v, \"method_call\"))\n  477 |                                 node->allow_deny.send_type = DBUS_MESSAGE_TYPE_METHOD_CALL;\n  478 |                         else if (!strcmp(v, \"method_return\"))\n  479 |                                 node->allow_deny.send_type = DBUS_MESSAGE_TYPE_METHOD_RETURN;\n  480 |                         else if (!strcmp(v, \"signal\"))\n  481 |                                 node->allow_deny.send_type = DBUS_MESSAGE_TYPE_SIGNAL;\n  482 |                         else if (!strcmp(v, \"error\"))\n  483 |                                 node->allow_deny.send_type = DBUS_MESSAGE_TYPE_ERROR;\n  484 |                         else\n  485 |                                 CONFIG_ERR(state, \"Invalid value\", \": %s=\\\"%s\\\"\", k, v);","lines":11},{"ref":"src/launch/config.c:344-405","code":"  344 | static int config_parser_attrs_limit(ConfigState *state, ConfigNode *node, const XML_Char **attrs) {\n  345 |         const char *k, *v;\n  346 | \n  347 |         while (*attrs) {\n  348 |                 k = *(attrs++);\n  349 |                 v = *(attrs++);\n  350 | \n  351 |                 if (!strcmp(k, \"name\")) {\n  352 |                         if (!strcmp(v, \"max_incoming_bytes\"))\n  353 |                                 node->limit.name = CONFIG_LIMIT_MAX_INCOMING_BYTES;\n  354 |                         else if (!strcmp(v, \"max_incoming_unix_fds\"))\n  355 |                                 node->limit.name = CONFIG_LIMIT_MAX_INCOMING_UNIX_FDS;\n  356 |                         else if (!strcmp(v, \"max_outgoing_bytes\"))\n  357 |                                 node->limit.name = CONFIG_LIMIT_MAX_OUTGOING_BYTES;\n  358 |                         else if (!strcmp(v, \"max_outgoing_unix_fds\"))\n  359 |                                 node->limit.name = CONFIG_LIMIT_MAX_OUTGOING_UNIX_FDS;\n  360 |                         else if (!strcmp(v, \"max_message_size\"))\n  361 |                                 node->limit.name = CONFIG_LIMIT_MAX_MESSAGE_SIZE;\n  362 |                         else if (!strcmp(v, \"max_message_unix_fds\"))\n  363 |                                 node->limit.name = CONFIG_LIMIT_MAX_MESSAGE_UNIX_FDS;\n  364 |                         else if (!strcmp(v, \"service_start_timeout\"))\n  365 |                                 node->limit.name = CONFIG_LIMIT_SERVICE_START_TIMEOUT;\n  366 |                         else if (!strcmp(v, \"auth_timeout\"))\n  367 |                                 node->limit.name = CONFIG_LIMIT_AUTH_TIMEOUT;\n  368 |                         else if (!strcmp(v, \"pending_fd_timeout\"))\n  369 |                                 node->limit.name = CONFIG_LIMIT_PENDING_FD_TIMEOUT;\n  370 |                         else if (!strcmp(v, \"max_completed_connections\"))\n  371 |                                 node->limit.name = CONFIG_LIMIT_MAX_COMPLETED_CONNECTIONS;\n  372 |                         else if (!strcmp(v, \"max_incomplete_connections\"))\n  373 |                                 node->limit.name = CONFIG_LIMIT_MAX_INCOMPLETE_CONNECTIONS;\n  374 |  |                         CONFIG_ERR(state, \"Unknown attribute\", \": %s=\\\"%s\\\"\", k, v);\n  398 |                 }\n  399 |         }\n  400 | \n  401 |         if (!node->limit.name)\n  402 |                 CONFIG_ERR(state, \"Required attribute 'name' missing\", \"\");\n  403 | \n  404 |         return 0;\n  405 | }","lines":62}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"nss_cache_get_uid()/nss_cache_get_gid() treat a numeric name as an id only when 'id < UINT32_MAX'. This excludes the value 4294967295 (UINT32_MAX) from ever being resolved by-id; such an input falls through to a name lookup (getpwnam(\"4294967295\")) which will fail. While UINT32_MAX is the (uint32_t)-1 'invalid' sentinel and is unlikely to be a real uid, the boundary should be '<= UINT32_MAX' or explicitly documented, since dbus-daemon accepts the full 32-bit range for numeric ids.","fix":"Use 'id <= UINT32_MAX' (with the existing -1 sentinel handled separately), or add a comment explaining the deliberate exclusion of UINT32_MAX.","locations":[{"ref":"src/launch/nss-cache.c:333-335","code":"  333 |         id = strtoull(name, &end, 10);\n  334 |         if (end != name && *end == '\\0' && errno == 0 && id < UINT32_MAX)\n  335 |                 by_id = true;","lines":3},{"ref":"src/launch/nss-cache.c:422-423","code":"  422 |         id = strtoull(name, &end, 10);\n  423 |         if (end != name && *end == '\\0' && errno == 0 && id < UINT32_MAX)","lines":2}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"policy_import_connect() rejects a record when '(cnode->allow_deny.user == cnode->allow_deny.group)'. Because policy_import() only routes to policy_import_connect() when user||group is set, the both-false case never occurs here, so this is effectively 'reject when user && group both set'. That intent is fine, but the comparison is obscure and silently 'returns ng before bus_selinux_log is set or after bus_selinux_deinit_global() sets it back to NULL. It dereferences bus_selinux_log only under a NULL check (good), but it also calls util_audit_log()/getuid() unconditionally for AVC/POLICYLOAD/SETENFORCE types; if the callback fires during deinit teardown after util_audit_deinit_global() already ran, util_audit_log() returns UTIL_AUDIT_E_UNAVAILABLE and then tries bus_selinux_log which may be NULL -> message silently dropped. Ordering of deinit (audit vs selinux) is a latent coupling: if selinux is destroyed after audit, late callbacks lose their record.","fix":"Ensure avc_destroy()/selinux callback removal happens before util_audit_deinit_global(), or clear the SELINUX_CB_LOG callback at the start of bus_selinux_deinit_global().","locations":[{"ref":"src/util/selinux.c:308-380","code":"  308 | static int bus_selinux_log_fn(int type, const char *fmt, ...) {\n  309 |         _c_cleanup_(c_freep) char *message = NULL;\n  310 |         const char *loghdr = NULL;\n  311 |         va_list ap;\n  312 |         int r, loglvl = 0;\n  313 | \n  314 |         va_start(ap, fmt);\n  315 |         r = vasprintf(&message, fmt, ap);\n  316 |         va_end(ap);\n  317 |         if (r < 0)\n  318 |                 return r;\n  319 | \n  320 |         switch (type) {\n  321 |         case SELINUX_AVC:\n  322 |                 /* XXX: we don't have access to any context, so can't find\n  323 |                  * the right UID to use, follow dbus-daemon(1) and use our\n  324 |                  * own. */\n  325 |                 r = util_audit_log(UTIL_AUDIT_TYPE_AVC, message, getuid());\n  326 |                 if (r == UTIL_AUDIT_E_UNAVAILABLE) {\n  327 |                         loghdr = \"selinux/avc\";\n  328 |                         loglvl = LOG_INFO;\n  329 |                 } else if (r) {\n  330 |                         return error_fold(r);\n  331 |                 }\n  332 | \n  333 |                 break;\n  334 |         case SELINUX_POLICYLOAD:\n  335 |                 r = util_audit_log(UTIL_AUDIT_TYPE_POLICYLOAD, message, getuid());\n  336 |                 if (r == UTIL_AUDIT_E_UNAVAILABLE) {\n  337 |                         loghdr = \"selinux/policyload\";\n  338 |                         loglvl = LOG_INFO;\n  339 |                 } else if (r) {\n  340 |                         return error_fold(r);\n  341 |                 }\n  342 | \n  343 |                 break;\n  344 |         case SELINUX_SETENFORCE:\n  345 |                 r = util_audit_log(UTIL_AUDIT_TYPE_MAC_STATUS, message, getuid());\n  346 |                 if (r == UTIL_AUDIT_E_UNAVAILABLE) {\n  347 |                         loghdr = \"selinux/macstatus\";\n  348 |                         loglvl = LOG_INFO;\n  349 |                 } else if (r) {\n  350 |                         return error_fold(r);\n  351 |                 }\n  352 | \n  353 |                 break;\n  354 |         case SELINUX_ERROR:\n  355 |                 loghdr = \"selinux/error\";\n  356 |                 loglvl = LOG_ERR;\n  357 |                 break;\n  358 |         case SELINUX_WARNING:\n  359 |                 loghdr = \"selinux/warning\";\n  360 |                 loglvl = LOG_WARNING;\n  361 |                 break;\n  362 |         case SELINUX_INFO:\n  363 |                 loghdr = \"selinux/info\";\n  364 |                 loglvl = LOG_INFO;\n  365 |                 break;\n  366 |         default:\n  367 |                 loghdr = \"selinux/unknown\";\n  368 |                 loglvl = LOG_WARNING;\n  369 |                 break;\n  370 |         }\n  371 | \n  372 |         if (loghdr && bus_selinux_log) {\n  373 |                 log_append_here(bus_selinux_log, loglvl, 0, NULL);\n  374 |                 r = log_commitf(bus_selinux_log, \"%s: %s\", loghdr, message);\n  375 |                 if (r)\n  376 |                         return error_fold(r);\n  377 |         }\n  378 | \n  379 |         return 0;\n  380 | }","lines":73},{"ref":"src/util/selinux.c:450-465","code":"  450 | void bus_selinux_deinit_global(void) {\n  451 |         if (!is_selinux_enabled())\n  452 |                 return;\n  453 | \n  454 |         if (bus_selinux_status_open) {\n  455 |                 selinux_status_close();\n  456 |                 bus_selinux_status_open = false;\n  457 |         }\n  458 | \n  459 |         if (bus_selinux_avc_open) {\n  460 |                 avc_destroy();\n  461 |                 bus_selinux_avc_open = false;\n  462 |         }\n  463 | \n  464 |         bus_selinux_log = NULL;\n  465 | }","lines":16}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"sockopt_get_peergroups() getgrouplist() fallback uses passwd->pw_name and passwd->pw_gid as the base group, ignoring the primary_gid argument that the SO_PEERGROUPS path uses as gids[0]. The two code paths therefore can return different group sets for the same peer (the credential-derived primary_gid versus the nss-database pw_gid), which is an inconsistency in the security-relevant group list used for policy decisions.","fix":"Use the passed primary_gid (the credential-derived gid) as the base group in the getgrouplist() fallback as well, for consistency with the SO_PEERGROUPS path.","locations":[{"ref":"src/util/sockopt.c:166-193","code":"  166 |         {\n  167 |                 struct passwd *passwd;\n  168 |                 int n_gids_previous;\n  169 | \n  170 |                 passwd = getpwuid(uid);\n  171 |                 if (!passwd)\n  172 |                         return error_origin(-errno);\n  173 | \n  174 |                 n_gids = 8;\n  175 |                 do {\n  176 |                         n_gids_previous = n_gids;\n  177 |                         tmp = realloc(gids, sizeof(*gids) * n_gids);\n  178 |                         if (!tmp)\n  179 |                                 return error_origin(-ENOMEM);\n  180 | \n  181 |                         gids = tmp;\n  182 |                         r = getgrouplist(passwd->pw_name, passwd->pw_gid, gids, &n_gids);\n  183 |                         if (r == -1 && n_gids <= n_gids_previous)\n  184 |                                 return error_origin(-ENOTRECOVERABLE);\n  185 |                 } while (r == -1);\n  186 | \n  187 |                 if (gidsp) {\n  188 |                         *gidsp = gids;\n  189 |                         gids = NULL;\n  190 |                 }\n  191 |                 if (n_gidsp)\n  192 |                         *n_gidsp = n_gids;\n  193 |         }","lines":28},{"ref":"src/util/sockopt.c:101-119","code":"  101 |                 gids[0] = primary_gid;\n  102 | \n  103 |                 r = getsockopt(fd, SOL_SOCKET, SO_PEERGROUPS, gids + 1, &socklen);\n  104 |                 if (r < 0 && errno == ERANGE) {\n  105 |                         tmp = realloc(gids, sizeof(*gids) + socklen);\n  106 |                         if (!tmp)\n  107 |                                 return error_origin(-ENOMEM);\n  108 |                         gids = tmp;\n  109 |                         gids[0] = primary_gid;\n  110 | \n  111 |                         r = getsockopt(fd, SOL_SOCKET, SO_PEERGROUPS, gids + 1, &socklen);\n  112 |                 }\n  113 |                 if (r < 0 && errno != ENOPROTOOPT) {\n  114 |                         return error_origin(-errno);\n  115 |                 } else if (r >= 0) {\n  116 |                         n_gids = 1 + socklen / sizeof(*gids);\n  117 | \n  118 |                         /* Sort and deduplicate for deterministic behavior. */\n  119 |                         qsort(gids, n_gids, sizeof(*gids), gid_compare);","lines":19}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"In the METHOD_RETURN log branch the reply-serial field is emitted as 'MESSAGE_REPLY_SERIAL' while every other field uses the 'DBUS_BROKER_MESSAGE_*' namespace (the ERROR branch correctly uses 'DBUS_BROKER_MESSAGE_REPLY_SERIAL'). The inconsistent key makes log filtering/parsing miss the field for method-return messages.","fix":"Rename the key to 'DBUS_BROKER_MESSAGE_REPLY_SERIAL' for consistency with the rest of the log schema.","locations":[{"ref":"src/dbus/message.c:681-686","code":"  681 |         case DBUS_MESSAGE_TYPE_METHOD_RETURN:\n  682 |                 log_appendf(log,\n  683 |                             \"DBUS_BROKER_MESSAGE_TYPE=method_return\\n\"\n  684 |                             \"MESSAGE_REPLY_SERIAL=%\"PRIu32\"\\n\",\n  685 |                             message->metadata.fields.reply_serial);\n  686 |                 break;","lines":6}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"log_journal_send() out_drop path: on the memfd-send branch it consumes log->mem_fd (sets to -1) and munmaps before sealing/sending. If misc_memfd_add_seals() or log_fd_send() fails it returns an error, but log->map is already MAP_FAILED and log->mem_fd is -1, so the next log_alloc() will re-allocate a fresh memfd (mem_fd was moved into local mfd and closed by cleanup). State is consistent. However, the inflight-memfd accounting note (lines 410-417) warns clients must never trigger this path; there is no runtime guard preventing a peer from inducing oversized log messages, relying entirely on callers not logging attacker-sized data. Documented risk, not enforced.","fix":"No code change strictly required; ensure callers never format attacker-controlled unbounded data into peer-triggered log messages (enforced by convention only).","locations":[{"ref":"src/util/log.c:426-450","code":"  426 |         if (log->lossy || log->mem_fd < 0)\n  427 |                 goto out_drop;\n  428 | \n  429 |         mfd = log->mem_fd;\n  430 |         log->mem_fd = -1;\n  431 |         munmap(log->map, log->map_size);\n  432 |         log->map = MAP_FAILED;\n  433 | \n  434 |         r = ftruncate(mfd, log->offset);\n  435 |         if (r < 0)\n  436 |                 return error_origin(-errno);\n  437 | \n  438 |         r = misc_memfd_add_seals(\n  439 |                 mfd,\n  440 |                 MISC_F_SEAL_SEAL | MISC_F_SEAL_SHRINK |\n  441 |                 MISC_F_SEAL_GROW | MISC_F_SEAL_WRITE\n  442 |         );\n  443 |         if (r < 0)\n  444 |                 return error_origin(-errno);\n  445 | \n  446 |         r = log_fd_send(log->log_fd, mfd);\n  447 |         if (r < 0)\n  448 |                 return error_trace(r);\n  449 | \n  450 |         return 0;","lines":25}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"sockopt_get_peergroups() ERANGE retry: after the first getsockopt fails with ERANGE, socklen is updated to the required size and gids is realloc'd to sizeof(*gids)+socklen, then getsockopt is retried once. If the second call again returns ERANGE (the kernel's required size grew between calls, e.g. group membership changed) the loop is not retried; instead control falls to the `r < 0 && errno != ENOPROTOOPT` check and the function returns error_origin(-ERANGE). Single-retry rather than a loop; benign but not robust to a racing group change.","fix":"Loop the SO_PEERGROUPS getsockopt on ERANGE until it succeeds or fails with a non-ERANGE error.","locations":[{"ref":"src/util/sockopt.c:103-115","code":"  103 |                 r = getsockopt(fd, SOL_SOCKET, SO_PEERGROUPS, gids + 1, &socklen);\n  104 |                 if (r < 0 && errno == ERANGE) {\n  105 |                         tmp = realloc(gids, sizeof(*gids) + socklen);\n  106 |                         if (!tmp)\n  107 |                                 return error_origin(-ENOMEM);\n  108 |                         gids = tmp;\n  109 |                         gids[0] = primary_gid;\n  110 | \n  111 |                         r = getsockopt(fd, SOL_SOCKET, SO_PEERGROUPS, gids + 1, &socklen);\n  112 |                 }\n  113 |                 if (r < 0 && errno != ENOPROTOOPT) {\n  114 |                         return error_origin(-errno);\n  115 |                 } else if (r >= 0) {","lines":13}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"user_charge_check() computes `users + 1` in unsigned int without overflow check before passing to __builtin_mul_overflow. If users (User.n_usages) ever reached UINT_MAX, users+1 wraps to 0, the multiply yields 0 with no overflow flagged, and the subsequent sub_overflow(0, share) underflows and is caught -> USER_E_QUOTA. So the failure mode is safe (denies). Reachability requires ~4 billion distinct UIDs pinning one user's resources, which is not practically attainable.","fix":"Optionally guard users == UINT_MAX explicitly; practically unreachable so low priority.","locations":[{"ref":"src/util/user.c:128-159","code":"  128 | static int user_charge_check(unsigned int remaining,\n  129 |                              unsigned int users,\n  130 |                              unsigned int share,\n  131 |                              unsigned int charge) {\n  132 |         unsigned int limit;\n  133 | \n  134 |         /*\n  135 |          * For a given allocation scheme `A(users)`, a single allocation is\n  136 |          * allowed to request anything less than, or equal to:\n  137 |          *\n  138 |          *               remaining + share\n  139 |          *     charge <= ~~~~~~~~~~~~~~~~~ - share\n  140 |          *                   A(users)\n  141 |          *\n  142 |          * We want to avoid a division, so instead we modify the equation to\n  143 |          * end up as:\n  144 |          *\n  145 |          *     A(users) * (charge + share) - share <= remaining\n  146 |          *\n  147 |          * Note that currently we use an allocator with polynomial guarantees:\n  148 |          *\n  149 |          *     A(users) = users + 1\n  150 |          */\n  151 | \n  152 |         if (!__builtin_add_overflow(share, charge, &limit) &&\n  153 |             !__builtin_mul_overflow(limit, users + 1, &limit) &&\n  154 |             !__builtin_sub_overflow(limit, share, &limit) &&\n  155 |             limit <= remaining)\n  156 |                 return 0;\n  157 | \n  158 |         return USER_E_QUOTA;\n  159 | }","lines":32}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In policy_import_connect(), the group branch checks 'cnode->allow_deny.gid != (uint32_t)-1' but then passes 'cnode->allow_deny.uid' to policy_at_gid() instead of '.gid'. A '<allow group=\"...\"/>' connect policy is therefore keyed by the wrong id (the uid field, which for a group-only rule is uninitialized/zero), so group-based connection policies are silently attached to the wrong GID node and do not take effect as configured. This is a security-relevant policy mis-application reachable from any system.conf using group connect rules.","fix":"Pass cnode->allow_deny.gid to policy_at_gid(): r = policy_at_gid(policy, &node, cnode->allow_deny.gid);","locations":[{"ref":"src/launch/policy.c:322-327","code":"  322 |         } else if (cnode->allow_deny.group && cnode->allow_deny.gid != (uint32_t)-1) {\n  323 |                 r = policy_at_gid(policy, &node, cnode->allow_deny.uid);\n  324 |                 if (r)\n  325 |                         return error_trace(r);\n  326 | \n  327 |                 c_list_link_tail(&node->entries.connect_list, &record->link);","lines":6}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":false,"description":"In metrics_client_new_with_fd(), after initializing the per-client dispatch file (client->socket_file), the code calls dispatch_file_select(&metrics->socket_file, EPOLLHUP | EPOLLOUT) on the parent listener's socket_file instead of the newly created client's socket_file. This selects EPOLLOUT on the listening socket (wrong object) and fails to arm output-readiness wakeups on the client connection. The client's events were only set via dispatch_file_init's mask argument; the explicit select targets the wrong file.","fix":"Select on the client file: `dispatch_file_select(&client->socket_file, EPOLLHUP | EPOLLOUT);`.","locations":[{"ref":"src/bus/metrics.c:86-114","code":"   86 | static int metrics_client_new_with_fd(MetricsClient **clientp, Metrics *metrics, int fd) {\n   87 |         _c_cleanup_(metrics_client_freep) MetricsClient *client = NULL;\n   88 |         int r;\n   89 | \n   90 |         client = calloc(1, sizeof(*client));\n   91 |         if (!client)\n   92 |                 return error_origin(-ENOMEM);\n   93 | \n   94 |         c_list_link_tail(&metrics->client_list, &client->metrics_link);\n   95 |         client->socket_fd = -1;\n   96 | \n   97 |         r = dispatch_file_init(\n   98 |                 &client->socket_file,\n   99 |                 metrics->socket_file.context,\n  100 |                 metrics_client_dispatch,\n  101 |                 fd,\n  102 |                 EPOLLHUP | EPOLLOUT,\n  103 |                 EPOLLOUT\n  104 |         );\n  105 |         if (r)\n  106 |                 return error_fold(r);\n  107 | \n  108 |         client->socket_fd = fd;\n  109 |         dispatch_file_select(&metrics->socket_file, EPOLLHUP | EPOLLOUT);\n  110 | \n  111 |         *clientp = client;\n  112 |         client = NULL;\n  113 |         return 0;\n  114 | }","lines":29}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"diag_append_message() logs DBUS_BROKER_MESSAGE_TYPE=method_return for messages of type DBUS_MESSAGE_TYPE_ERROR. The ERROR branch is a copy of the METHOD_RETURN branch and was not updated, so error messages are mislabeled as method returns in diagnostic logs, which can confuse policy/quota debugging.","fix":"Change the ERROR branch format string to `DBUS_BROKER_MESSAGE_TYPE=error\\n`.","locations":[{"ref":"src/bus/diag.c:62-71","code":"   62 |         case DBUS_MESSAGE_TYPE_ERROR:\n   63 |                 log_appendf(\n   64 |                         log,\n   65 |                         \"DBUS_BROKER_MESSAGE_TYPE=method_return\\n\"\n   66 |                         \"DBUS_BROKER_MESSAGE_ERROR_NAME=%s\\n\"\n   67 |                         \"DBUS_BROKER_MESSAGE_REPLY_SERIAL=%\"PRIu32\"\\n\",\n   68 |                         message->metadata.fields.error_name,\n   69 |                         message->metadata.fields.reply_serial\n   70 |                 );\n   71 |                 break;","lines":10}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In the structured log output, the DBUS_MESSAGE_TYPE_ERROR case emits 'DBUS_BROKER_MESSAGE_TYPE=method_return' instead of 'error'. This is a copy-paste from the METHOD_RETURN branch and produces misleading audit/journal logs that mislabel error replies as method returns.","fix":"Change the type string for the ERROR case to 'DBUS_BROKER_MESSAGE_TYPE=error'.","locations":[{"ref":"src/dbus/message.c:687-694","code":"  687 |         case DBUS_MESSAGE_TYPE_ERROR:\n  688 |                 log_appendf(log,\n  689 |                             \"DBUS_BROKER_MESSAGE_TYPE=method_return\\n\"\n  690 |                             \"DBUS_BROKER_MESSAGE_ERROR_NAME=%s\\n\"\n  691 |                             \"DBUS_BROKER_MESSAGE_REPLY_SERIAL=%\"PRIu32\"\\n\",\n  692 |                             message->metadata.fields.error_name,\n  693 |                             message->metadata.fields.reply_serial);\n  694 |                 break;","lines":8}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"launcher_reload_config() sends sd_notifyf(\"RELOADING=1\") at the top, and the 'out:' label re-sends \"READY=1\". But several error paths use bare 'return error_trace(r)' / 'return error_fold(r)' instead of 'goto out': the at_console resolve failure (1281-1282), the apparmor_apply failure (1294-1295), and the CONFIG_APPARMOR_REQUIRED branch (1296-1301). Taking any of these paths leaves systemd believing the unit is permanently in the 'reloading' state (READY=1 is never sent), which can block dependent jobs and the service-manager state machine. The CONFIG_APPARMOR_REQUIRED path additionally calls sd_event_exit() but still skips READY=1.","fix":"Replace the bare 'return' statements in the reload flow with 'goto out' (storing the error in r) so the READY=1 notification is always re-sent after a RELOADING=1 was issued.","locations":[{"ref":"src/launch/launcher.c:1259-1301","code":" 1259 |         r = sd_notifyf(/* unset_environment = */ false,\n 1260 |                        \"RELOADING=1\\n\"\n 1261 |                        \"MONOTONIC_USEC=%\" NSEC_PRI,\n 1262 |                        nsec_to_usec(nsec_now(CLOCK_MONOTONIC)));\n 1263 |         if (r < 0)\n 1264 |                 return error_origin(r);\n 1265 | \n 1266 |         c_rbtree_for_each_entry(service, &launcher->services, rb)\n 1267 |                 service->reload_tag = false;\n 1268 | \n 1269 |         r = nss_cache_populate(&nss_cache);\n 1270 |         if (r)\n 1271 |                 goto out;\n 1272 | \n 1273 |         r = launcher_parse_config(launcher, &root, &nss_cache);\n 1274 |         if (r)\n 1275 |                 goto out;\n 1276 | \n 1277 |         if (launcher->at_console) {\n 1278 |                 r = nss_cache_resolve_system_console_users(&nss_cache,\n 1279 |                                                            &system_console_users,\n 1280 |                                                            &n_system_console_users);\n 1281 |                 if (r)\n 1282 |                         return error_trace(r);\n 1283 |         }\n 1284 | \n 1285 |         r = launcher_load_services(launcher, root, &nss_cache);\n 1286 |         if (r)\n 1287 |                 goto out;\n 1288 | \n 1289 |         r = launcher_load_policy(launcher, root, &policy);\n 1290 |         if (r)\n 1291 |                 goto out;\n 1292 | \n 1293 |         r = launcher_apparmor_apply(&policy.apparmor_mode);\n 1294 |         if (r < 0)\n 1295 |                 return error_fold(r);\n 1296 |         if (policy.apparmor_mode == CONFIG_APPARMOR_REQUIRED) {\n 1297 |                 r = sd_event_exit(launcher->event, 0);\n 1298 |                 if (r < 0)\n 1299 |                         return error_fold(r);\n 1300 |                 return 0;\n 1301 |         }","lines":43},{"ref":"src/launch/launcher.c:1315-1320","code":" 1315 | out:\n 1316 |         res = sd_notify(false, \"READY=1\");\n 1317 |         if (res < 0)\n 1318 |                 return error_origin(res);\n 1319 | \n 1320 |         return error_trace(r);","lines":6}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"driver_method_get_connection_credentials() builds the reply containing the\npeer's pidfd. cred.pid_fd is the *original* peer fd (from peer->pid_fd). It is\npassed to driver_send_reply_with_fds() which calls fdlist_new_dup_fds() to dup\nit, so the original is not consumed - good. However, if message_new_outgoing()\nor fdlist_new_dup_fds() fails after c_dvar_end_write() succeeds, the function\nreturns a folded fatal error and the broker treats the whole dispatch as fatal.\nThat is the intended \"fatal on reply-build failure\" contract, but note the fd is\nnever explicitly closed here because it is borrowed; this is correct only as\nlong as peer->pid_fd lifetime is owned elsewhere. Flagging for confirmation that\npeer->pid_fd is never closed by this path on error.","fix":"Confirm peer->pid_fd ownership stays with the Peer (it does, since only a dup is queued); add a comment documenting that pid_fd is borrowed and must not be closed here, to prevent a future double-close/use-after-free.","locations":[{"ref":"src/bus/driver.c:1462-1477","code":" 1462 |         driver_fetch_credentials(peer->bus, connection, &cred);\n 1463 |         n_fds_expected = (cred.pid_fd >= 0) ? 1 : 0;\n 1464 |         driver_write_reply_header(out_v, peer, serial, driver_type_out_apsv, n_fds_expected);\n 1465 | \n 1466 |         c_dvar_write(out_v, \"(\");\n 1467 |         driver_append_credentials(out_v, &cred, &n_fds);\n 1468 |         c_dvar_write(out_v, \")\");\n 1469 | \n 1470 |         c_assert(n_fds == n_fds_expected);\n 1471 | \n 1472 |         if (n_fds == 1)\n 1473 |                 r = driver_send_reply_with_fds(peer, out_v, serial, &cred.pid_fd, n_fds);\n 1474 |         else\n 1475 |                 r = driver_send_reply(peer, out_v, serial);\n 1476 |         if (r)\n 1477 |                 return error_trace(r);","lines":16},{"ref":"src/bus/driver.c:527-531","code":"  527 |         if (n_fds > 0) {\n  528 |                 r = fdlist_new_dup_fds(&message->fds, fds, n_fds);\n  529 |                 if (r)\n  530 |                         return error_fold(r);\n  531 |         }","lines":5}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"launcher_apparmor_apply() prints 'AppArmor required, but not supported. Exiting.' for the CONFIG_APPARMOR_REQUIRED case but returns 0 and leaves *apparmor_mode == CONFIG_APPARMOR_REQUIRED. The caller in launcher_run() then returns 0 (success) on this path (line 1432-1433), so the launcher exits with status 0 despite a fatal 'required AppArmor missing' condition. A required-but-unavailable security feature should cause a non-zero/visible failure, not a silent clean exit.","fix":"Return a distinct error (or set an explicit failure flag) from launcher_apparmor_apply() in the REQUIRED-but-unsupported case and propagate a non-zero exit, rather than relying on the ambiguous mode value and returning 0.","locations":[{"ref":"src/launch/launcher.c:1239-1244","code":" 1239 |         } else if (*apparmor_mode == CONFIG_APPARMOR_REQUIRED) {\n 1240 |                 if (enabled && supported)\n 1241 |                         *apparmor_mode = CONFIG_APPARMOR_ENABLED;\n 1242 |                 else\n 1243 |                         fprintf(stderr, \"AppArmor required, but not supported. Exiting.\\n\");\n 1244 |         }","lines":6},{"ref":"src/launch/launcher.c:1429-1433","code":" 1429 |         r = launcher_apparmor_apply(&policy.apparmor_mode);\n 1430 |         if (r < 0)\n 1431 |                 return error_fold(r);\n 1432 |         if (policy.apparmor_mode == CONFIG_APPARMOR_REQUIRED)\n 1433 |                 return 0;","lines":5}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"bus_apparmor_log() returns the result of util_audit_log() through error_fold() for ALL outcomes except UTIL_AUDIT_E_UNAVAILABLE. util_audit_log() returns 0 on success, so on success this path does `return error_fold(0)` which is 0 (fine), but the early-return structure is inverted relative to intent: the only non-error case explicitly handled is E_UNAVAILABLE. If util_audit_log() returns 0 (success) the function correctly returns 0 via fall-through to `return 0`? No - it returns error_fold(0)=0 inside the if, which is correct, but a genuine success of audit is folded. The real issue is the comment `// XXX: use a log fallback`: when audit is unavailable the message is silently dropped with no fallback to the normal log, so AppArmor AVC denials produce no record at all when libaudit is not usable, unlike SELinux which falls back to bus_selinux_log.","fix":"When util_audit_log() returns UTIL_AUDIT_E_UNAVAILABLE, fall back to writing the message via the broker Log (as bus_selinux_log_fn does) instead of silently discarding it.","locations":[{"ref":"src/util/apparmor.c:181-185","code":"  181 |         r = util_audit_log(UTIL_AUDIT_TYPE_AVC, message, uid);\n  182 |         if (r != UTIL_AUDIT_E_UNAVAILABLE) // XXX: use a log fallback\n  183 |                 return error_fold(r);\n  184 | \n  185 |         return 0;","lines":5}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"broker_run() returns early via MAIN_EXIT when connection_open() reports CONNECTION_E_EOF (broker.c:168-169) without restoring the signal mask saved into sigold and without running the peer_registry_flush()/diag_dispatch_stats() teardown that the normal exit path performs (broker.c:183-189). The leaked block mask is benign because the process exits shortly after, but the early return also skips the final statistics dispatch, which is a behavioral inconsistency with the normal exit path.","fix":"Use a goto to a common teardown label (restore sigmask, flush peers, dispatch stats) for both the early-EOF return and the normal loop exit, or at minimum restore the signal mask before returning MAIN_EXIT.","locations":[{"ref":"src/broker/broker.c:157-192","code":"  157 | int broker_run(Broker *broker) {\n  158 |         sigset_t signew, sigold;\n  159 |         int r, k;\n  160 | \n  161 |         sigemptyset(&signew);\n  162 |         sigaddset(&signew, SIGTERM);\n  163 |         sigaddset(&signew, SIGINT);\n  164 | \n  165 |         sigprocmask(SIG_BLOCK, &signew, &sigold);\n  166 | \n  167 |         r = connection_open(&broker->controller.connection);\n  168 |         if (r == CONNECTION_E_EOF)\n  169 |                 return MAIN_EXIT;\n  170 |         else if (r)\n  171 |                 return error_fold(r);\n  172 | \n  173 |         do {\n  174 |                 r = dispatch_context_dispatch(&broker->dispatcher);\n  175 |                 if (r == DISPATCH_E_EXIT)\n  176 |                         r = MAIN_EXIT;\n  177 |                 else if (r == DISPATCH_E_FAILURE)\n  178 |                         r = MAIN_FAILED;\n  179 |                 else\n  180 |                         r = error_fold(r);\n  181 |         } while (!r);\n  182 | \n  183 |         peer_registry_flush(&broker->bus.peers);\n  184 | \n  185 |         k = diag_dispatch_stats(&broker->bus, LOG_PROVENANCE_HERE);\n  186 |         if (k)\n  187 |                 r = error_fold(k);\n  188 | \n  189 |         sigprocmask(SIG_SETMASK, &sigold, NULL);\n  190 | \n  191 |         return r;\n  192 | }","lines":36}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"metrics_client_dispatch() EPOLLOUT send() success path treats a short or zero-length send as completion: after `i_buffer += len`, if `i_buffer >= n_buffer` it hups. With the n_buffer bug this always fires, but even after fixing n_buffer, a send() returning 0 (peer closed) is indistinguishable from completion only because the >= happens to hup anyway; more importantly EAGAIN handling clears EPOLLOUT but the send loop does not retry within the same dispatch, relying on re-arm. This is acceptable but the success branch lacks a retry loop, so each writable event sends at most one chunk.","fix":"Optional: loop on send() until EAGAIN or completion within a single dispatch to reduce wakeups; at minimum ensure n_buffer is set so the completion check is meaningful.","locations":[{"ref":"src/bus/metrics.c:70-76","code":"   70 |                 } else {\n   71 |                         client->i_buffer += len;\n   72 |                         if (client->i_buffer >= client->n_buffer)\n   73 |                                 hup = true;\n   74 |                         else\n   75 |                                 dispatch_file_clear(file, EPOLLOUT);\n   76 |                 }","lines":7}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"service_watch_unit_load_handler() calls service_reset_activation() on the error path (when LoadUnit returned a bus error) but discards its return value, then returns 1. Every other caller of service_reset_activation() checks and propagates its result. A failure here (e.g. the controller bus call inside reset failing) is silently swallowed, potentially leaving a pending activation un-reset.","fix":"Capture the return value: r = service_reset_activation(...); if (r) return error_trace(r);","locations":[{"ref":"src/launch/service.c:793-796","code":"  793 |         if (sd_bus_message_get_error(message)) {\n  794 |                 service_reset_activation(service, CONTROLLER_NAME_ERROR_UNIT_FAILURE);\n  795 |                 return 1;\n  796 |         }","lines":4}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"misc_memfd() only retries with the EXEC/NOEXEC flags stripped when the first memfd_create() fails with EINVAL. On kernels lacking memfd_create() entirely the syscall fails with ENOSYS, which is returned verbatim. log_alloc() in turn only treats -EINVAL as 'memfd unavailable, use anonymous mmap fallback' (log.c:241); an ENOSYS from a very old kernel is treated as a hard log error instead of triggering the anonymous-memory fallback, contradicting the comment at log.c:237-240 that claims the fallback covers 'memfd_create() is not available'.","fix":"In log_alloc(), treat both -EINVAL and -ENOSYS (and -EOPNOTSUPP) from misc_memfd() as 'unavailable' and fall back to anonymous mmap.","locations":[{"ref":"src/util/misc.c:92-98","code":"   92 |         fd = syscall_memfd_create(name, flags);\n   93 |         if (fd < 0 && errno == EINVAL) {\n   94 |                 flags &= ~(MISC_MFD_EXEC | MISC_MFD_NOEXEC_SEAL);\n   95 |                 fd = syscall_memfd_create(name, flags);\n   96 |         }\n   97 |         if (fd < 0)\n   98 |                 return error_origin(-errno);","lines":7},{"ref":"src/util/log.c:236-251","code":"  236 |         if (mem_fd < 0) {\n  237 |                 /*\n  238 |                  * In case of EINVAL, memfd_create() is not available. We then\n  239 |                  * use normal anonymous memory as backing.\n  240 |                  */\n  241 |                 if (mem_fd != -EINVAL) {\n  242 |                         log->error = error_fold(mem_fd);\n  243 |                         return false;\n  244 |                 }\n  245 |                 mem_fd = -1;\n  246 | \n  247 |                 p = mmap(NULL, log->map_size, PROT_READ | PROT_WRITE, MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);\n  248 |                 if (p == MAP_FAILED) {\n  249 |                         log->error = error_origin(-errno);\n  250 |                         return false;\n  251 |                 }","lines":16}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"bus_selinux_log_fn() returns negative error codes (via error_fold) into libselinux, which is a void/int callback whose nonzero return is generally ignored by libselinux; more importantly vasprintf failure path `return r` (line 318) returns a raw negative errno without error_origin() wrapping, inconsistent with the codebase error-tracing convention and bypassing the trace hook.","fix":"Wrap the vasprintf failure return in error_origin(-errno) for consistent tracing; note libselinux ignores the return value anyway.","locations":[{"ref":"src/util/selinux.c:315-318","code":"  315 |         r = vasprintf(&message, fmt, ap);\n  316 |         va_end(ap);\n  317 |         if (r < 0)\n  318 |                 return r;","lines":4}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"dispatch_context_poll() sizes the event buffer with alloca(n) where n = ctx->n_files * sizeof(struct epoll_event), and passes ctx->n_files as maxevents to epoll_wait(). When n_files is 0 (no files registered) this calls alloca(0) (implementation-defined pointer) and epoll_wait(..., events, 0, ...) which returns EINVAL; the EINTR special-case does not cover this, so a poll with zero files yields error_origin(-EINVAL). More importantly, alloca() of an attacker-influenced size up to ~128KiB is on the stack with no guard; the 128KiB threshold switches to malloc, but 128KiB of alloca is still a large stack allocation that can collide with the stack guard on constrained stacks.","fix":"Guard against n_files == 0 (return 0 early). Consider lowering the alloca threshold substantially or always using a small fixed on-stack buffer plus heap for the remainder.","locations":[{"ref":"src/util/dispatch.c:261-285","code":"  261 | int dispatch_context_poll(DispatchContext *ctx, int timeout) {\n  262 |         _c_cleanup_(c_freep) void *buffer = NULL;\n  263 |         struct epoll_event *events, *e;\n  264 |         DispatchFile *f;\n  265 |         size_t n;\n  266 |         int r;\n  267 | \n  268 |         n = ctx->n_files * sizeof(*events);\n  269 |         if (n > 128UL * 1024UL) {\n  270 |                 buffer = malloc(n);\n  271 |                 if (!buffer)\n  272 |                         return error_origin(-ENOMEM);\n  273 | \n  274 |                 events = buffer;\n  275 |         } else {\n  276 |                 events = alloca(n);\n  277 |         }\n  278 | \n  279 |         r = epoll_wait(ctx->epoll_fd, events, ctx->n_files, timeout);\n  280 |         if (r < 0) {\n  281 |                 if (errno == EINTR)\n  282 |                         return 0;\n  283 | \n  284 |                 return error_origin(-errno);\n  285 |         }","lines":25}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"connection_init_server() dereferences user->uid to pass it to sasl_server_init(), but socket_init()/connection_init() accept a NULL user (socket_init does user_ref(NULL)). If a NULL user is ever passed for a server connection this is a NULL dereference. The contract that server connections always have a non-NULL user is implicit and unchecked.","fix":"Add 'c_assert(user)' in connection_init_server() (or document/enforce the non-NULL precondition) to make the requirement explicit.","locations":[{"ref":"src/dbus/connection.c:43-62","code":"   43 | int connection_init_server(Connection *c,\n   44 |                            DispatchContext *dispatch_ctx,\n   45 |                            DispatchFn dispatch_fn,\n   46 |                            User *user,\n   47 |                            const char *guid,\n   48 |                            int fd) {\n   49 |         int r;\n   50 | \n   51 |         r = connection_init(c,\n   52 |                             dispatch_ctx,\n   53 |                             dispatch_fn,\n   54 |                             user,\n   55 |                             fd);\n   56 |         if (r)\n   57 |                 return error_trace(r);\n   58 | \n   59 |         c->server = true;\n   60 |         sasl_server_init(&c->sasl_server, user->uid, guid);\n   61 |         return 0;\n   62 | }","lines":20}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"proc_get_seclabel() uses fixed `char path[64]` with sprintf(\"/proc/%u/attr/current\", (uint32_t)pid). Max length is `/proc/` (6) + 10 digits + `/attr/current` (13) + NUL = 30, so no overflow today. proc_resolve_pidfd() likewise uses path[64] with sprintf(\"/proc/self/fdinfo/%d\", pidfd) (max ~30). These are safe but rely on unchecked sprintf into fixed buffers; a future format change could overflow silently.","fix":"Use snprintf with sizeof(path) (and assert the result < sizeof(path)) to make the bound explicit and overflow-proof against future edits.","locations":[{"ref":"src/util/proc.c:150-160","code":"  150 | int proc_get_seclabel(pid_t pid, char **labelp, size_t *n_labelp) {\n  151 |         _c_cleanup_(c_fclosep) FILE *f = NULL;\n  152 |         char path[64], buffer[LINE_MAX] = {}, *c, *label;\n  153 | \n ":"log_alloc() maps a fixed LOG_SIZE_MAX (2 MiB) region the first time any field is appended, for every Log context, and keeps it mapped for the lifetime of the context. With many concurrent log contexts this reserves 2 MiB of address space (and, for the memfd path, 2 MiB of actual tmpfs/shared backing after ftruncate + MAP_SHARED writes) per context. The mapping is lazily allocated but never shrunk after a small message.","fix":"Consider mapping a smaller initial region and growing on demand, or releasing the mapping after commit when the high-water mark is small.","locations":[{"ref":"src/util/log.c:214-270","code":"  214 | static bool log_alloc(Log *log) {\n  215 |         _c_cleanup_(c_closep) int mem_fd = -1;\n  216 |         void *p;\n  217 |         int r;\n  218 | \n  219 |         if (log->error)\n  220 |                 return false;\n  221 |         if (log->map != MAP_FAILED)\n  222 |                 return true;\n  223 | \n  224 |         c_assert(!log->offset);\n  225 | \n  226 |         /*\n  227 |          * systemd-journald used to verify seals explicitly, and any new seal\n  228 |          * showing up was refused. Hence, we cannot set MFD_NOEXEC but have to\n  229 |          * use MFD_EXEC.\n  230 |          */\n  231 |         mem_fd = misc_memfd(\n  232 |                 \"dbus-broker-log\",\n  233 |                 MISC_MFD_CLOEXEC | MISC_MFD_ALLOW_SEALING | MISC_MFD_EXEC,\n  234 |                 0\n  235 |         );\n  236 |         if (mem_fd < 0) {\n  237 |                 /*\n  238 |                  * In case of EINVAL, memfd_create() is not available. We then\n  239 |                  * use normal anonymous memory as backing.\n  240 |                  */\n  241 |                 if (mem_fd != -EINVAL) {\n  242 |                         log->error = error_fold(mem_fd);\n  243 |                         return false;\n  244 |                 }\n  245 |                 mem_fd = -1;\n  246 | \n  247 |                 p = mmap(NULL, log->map_size, PROT_READ | PROT_WRITE, MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);\n  248 |                 if (p == MAP_FAILED) {\n  249 |                         log->error = error_origin(-errno);\n  250 |                         return false;\n  251 |                 }\n  252 |         } else {\n  253 |                 r = ftruncate(mem_fd, log->map_size);\n  254 |                 if (r < 0) {\n  255 |                         log->error = error_origin(-errno);\n  256 |                         return false;\n  257 |                 }\n  258 | \n  259 |                 p = mmap(NULL, log->map_size, PROT_READ | PROT_WRITE, MAP_SHARED, mem_fd, 0);\n  260 |                 if (p == MAP_FAILED) {\n  261 |                         log->error = error_origin(-errno);\n  262 |                         return false;\n  263 |                 }\n  264 |         }\n  265 | \n  266 |         log->mem_fd = mem_fd;\n  267 |         log->map = p;\n  268 |         mem_fd = -1;\n  269 |         return true;\n  270 | }","lines":57},{"ref":"src/util/log.c:90-91","code":"   90 | /* lets retrict log records to 2MiB */\n   91 | #define LOG_SIZE_MAX (2ULL * 1024ULL * 1024ULL)","lines":2}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"Linear dispatch over method tables using strcmp per entry. Each controller method dispatch (controller_dispatch_controller/name/listener/metrics) scans its small static array calling strcmp for every candidate (controller-dbus.c:535-542 and the three analogous loops). The tables are tiny (1-3 entries) so this is not a real hot path, but it is O(n*strlen) per call where a length-prefixed or first-char comparison would short-circuit faster.","fix":"Acceptable as-is given table sizes; if ever extended, consider a first-character switch or perfect hash. No action strictly required.","locations":[{"ref":"src/broker/controller-dbus.c:535-542","code":"  535 |         for (size_t i = 0; i < C_ARRAY_SIZE(methods); i+ l tree traversals (peers + names) on every call; for a bus with\nmany connections this is O(n) work driven by any unprivileged client. This is\ninherent to the API but worth noting as an unauthenticated amplification vector\n(client sends a tiny request, broker serializes a potentially large reply).","fix":"No code change required for correctness; ensure send-quota accounting bounds the reply size so a client cannot cheaply force unbounded serialization work.","locations":[{"ref":"src/bus/driver.c:1106-1138","code":" 1106 | static int driver_method_list_names(Peer *peer, const char *path, CDVar *in_v, uint32_t serial, CDVar *out_v) {\n 1107 |         Peer *p;\n 1108 |         Name *name;\n 1109 |         int r;\n 1110 | \n 1111 |         c_dvar_read(in_v, \"()\");\n 1112 | \n 1113 |         r = driver_end_read(in_v);\n 1114 |         if (r)\n 1115 |                 return error_trace(r);\n 1116 | \n 1117 |         c_dvar_write(out_v, \"([\");\n 1118 |         c_dvar_write(out_v, \"s\", \"org.freedesktop.DBus\");\n 1119 |         c_rbtree_for_each_entry(p, &peer->bus->peers.peer_tree, registry_node) {\n 1120 |                 if (!peer_is_registered(p))\n 1121 |                         continue;\n 1122 | \n 1123 |                 driver_dvar_write_unique_name(out_v, p);\n 1124 |         }\n 1125 |         c_rbtree_for_each_entry(name, &peer->bus->names.name_tree, registry_node) {\n 1126 |                 if (!name_primary(name))\n 1127 |                         continue;\n 1128 | \n 1129 |                 c_dvar_write(out_v, \"s\", name->name);\n 1130 |         }\n 1131 |         c_dvar_write(out_v, \"])\");\n 1132 | \n 1133 |         r = driver_send_reply(peer, out_v, serial);\n 1134 |         if (r)\n 1135 |                 return error_trace(r);\n 1136 | \n 1137 |         return 0;\n 1138 | }","lines":33},{"ref":"src/bus/driver.c:1140-1165","code":" 1140 | static int driver_method_list_activatable_names(Peer *peer, const char *path, CDVar *in_v, uint32_t serial, C "code":"   27 | int fs_dirlist_new(FsDirlist **listp, size_t n_allocated) {\n   28 |         _c_cleanup_(fs_dirlist_freep) FsDirlist *list = NULL;\n   29 | \n   30 |         if (n_allocated < 8)\n   31 |                 n_allocated = 8;\n   32 | \n   33 |         list = calloc(1, sizeof(*list));\n   34 |         if (!list)\n   35 |                 return error_origin(-ENOMEM);\n   36 | \n   37 |         list->entries = calloc(n_allocated, sizeof(*list->entries));\n   38 |         if (!list->entries)\n   39 |                 return error_origin(-ENOMEM);\n   40 | \n   41 |         list->n_allocated = n_allocated;\n   42 | \n   43 |         *listp = list;\n   44 |         list = NULL;\n   45 |         return 0;\n   46 | }","lines":20}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"DRIVER_E_UNEXPECTED_ENVIRONMENT_UPDATE is defined, given a human-readable string\n(line 349) and handled in the driver_dispatch() switch (line 2810), but it is\nnever returned anywhere. driver_method_update_activation_environment() returns\nDRIVER_E_PEER_NOT_PRIVILEGED for the unauthorized case instead, so the dedicated\nerror code and its message (\"User is not authorized to update environment\nvariables\") are unreachable.","fix":"Either return DRIVER_E_UNEXPECTED_ENVIRONMENT_UPDATE from the privilege check in driver_method_update_activation_environment(), or remove the unused enum value, its string, and its switch case.","locations":[{"ref":"src/bus/driver.c:349-349","code":"  349 |                 [DRIVER_E_UNEXPECTED_ENVIRONMENT_UPDATE]        = \"User is not authorized to update environment variables\",","lines":1},{"ref":"src/bus/driver.c:2810-2810","code":" 2810 |         case DRIVER_E_UNEXPECTED_ENVIRONMENT_UPDATE:","lines":1},{"ref":"src/bus/driver.c:1238-1239","code":" 1238 |         if (!peer_is_privileged(peer))\n 1239 |                 return DRIVER_E_PEER_NOT_PRIVILEGED;","lines":2}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"In socket_recvmsg the earlier '*fdsp && n_fds' workaround (lines 637-646) closes the spurious fds and sets n_fds to 0 whenever fds were already collected for the pending message. Consequently the later block guarded by 'if (n_fds)' only runs when *fdsp is NULL, which makes the inner 'if (*fdsp)' protocol-violation check (lines 663-667) unreachable dead code. The intended spec behavior (reject a second fd-set as a violation) is silently shadowed by the sd-bus compatibility hack.","fix":"Remove the now-dead inner '*fdsp' check at 663-667, or, if the spec-conformant rejection is desired, gate the spurious-fd workaround so it does not preempt the violation path. Either way the two overlapping branches should be reconciled.","locations":[{"ref":"src/dbus/socket.c:637-667","code":"  637 |         if (_c_unlikely_(*fdsp && n_fds)) {\n  638 |                 /* XXX: this is a protocol violation, but for now simply drop the\n  639 |                  *      spurios fds as sd-bus is broken and passes us this.\n  640 |                  *      This whole conditional should simply be dropped.\n  641 |                  */\n  642 |                 while (n_fds)\n  643 |                         close(fds[--n_fds]);\n  644 | \n  645 |                 fprintf(stderr, \"socket: discarded unexpected file descriptors.\\n\");\n  646 |         }\n  647 | \n  648 |         if (_c_unlikely_(n_fds)) {\n  649 |                 /*\n  650 |                  * So we received FDs with this hunk. If we already got FDs for\n  651 |                  * this pending message, we must follow the D-Bus spec and\n  652 |                  * treat this as protocol violation. So close the socket\n  653 |                  * immediately. We also close the socket immediately in case\n  654 |                  * the sending user's fd quota has been exceeded.\n  655 |                  * Otherwise, remember the FDs in the socket. Note that FDs\n  656 |                  * always belong to the *last* byte of a received hunk, since\n  657 |                  * the kernel breaks SKBs *AFTER* FDs, but not before them.\n  658 |                  * This also means we must never call into recvmsg(2) if there\n  659 |                  * is unparsed data in our buffers, since we might incorrectly\n  660 |                  * merge two messages.\n  661 |                  */\n  662 | \n  663 |                 if (_c_unlikely_(*fdsp)) {\n  664 |                         socket_close(socket);\n  665 |                         r = SOCKET_E_LOST_INTEREST;\n  666 |                         goto error;\n  667 |                 }","lines":31}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"CONTROLLER_E_UNEXPECTED_MESSAGE_TYPE is handled in the post-dispatch switch of controller_dbus_dispatch (controller-dbus.c:699-701, grouped with UNEXPECTED_PATH to send AccessDenied) but no code path in the audited dispatch routines ever returns this error code (unknown message types are mapped to CONTROLLER_E_PROTOCOL_VIOLATION at controller-dbus.c:691). The case is dead.","fix":"Remove the unreachable CONTROLLER_E_UNEXPECTED_MESSAGE_TYPE case, or document/route an actual code path to it if it was intended to be used.","locations":[{"ref":"src/broker/controller-dbus.c:699-702","code":"  699 |         case CONTROLLER_E_UNEXPECTED_MESSAGE_TYPE:\n  700 |         case CONTROLLER_E_UNEXPECTED_PATH:\n  701 |                 r = controller_send_error(connection, message_read_serial(message), \"org.freedesktop.DBus.Error.AccessDenied\");\n  702 |                 break;","lines":4}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The comment at line 825 in driver_name_activated() reads \"in case the name is\ndropped again in the future, we should request it again\" to justify setting\nactivation->pending = 0. The phrasing is
