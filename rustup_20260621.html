<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`download_hash` unconditionally slices the downloaded hash file with `s[0..64]`. If the `.sha256` file the server returns is shorter than 64 bytes (truncated/empty download, or a server that does not return a 64-hex-char SHA-256), this byte-range slice panics instead of returning an error. It also slices on byte indices, so a multi-byte UTF-8 char straddling index 64 would also panic.","fix":"Validate length before slicing: `let s = utils::read_file(...)?; let hash = s.get(0..64).ok_or_else(|| anyhow!(\"hash file too short\"))?.to_owned();` and reject non-hex content.","locations":[{"ref":"src/dist/download.rs:138-146","code":"  138 |     async fn download_hash(&self, url: &str) -> Result<String> {\n  139 |         let hash_url = utils::parse_url(&(url.to_owned() + \".sha256\"))?;\n  140 |         let hash_file = self.tmp_cx.new_file()?;\n  141 |         DownloadOptions::try_from(self.process)?\n  142 |             .start(&hash_url, &hash_file)\n  143 |             .download()\n  144 |             .await?;\n  145 |         utils::read_file(\"hash\", &hash_file).map(|s| s[0..64].to_owned())\n  146 |     }","lines":9,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/dist/download.rs#L138-L146"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"The `man` subcommand calls `.expect(\"failed to open man page\")` on the result of spawning the external `man` binary. If `man` is not installed (common on minimal Linux/container images), `Command::status()` returns `Err` and rustup panics with a backtrace instead of returning a clean error. User-triggerable via `rustup man <cmd>`.","fix":"Replace `.expect(...)` with `?`-based error handling, e.g. `.status().context(\"failed to open man page; is `man` installed?\")?;` and propagate a `Result`.","locations":[{"ref":"src/cli/rustup_mode.rs:1944-1948","code":" 1944 |     std::process::Command::new(\"man\")\n 1945 |         .env(\"MANPATH\", manpaths)\n 1946 |         .arg(command)\n 1947 |         .status()\n 1948 |         .expect(\"failed to open man page\");","lines":5,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/rustup_mode.rs#L1944-L1948"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"ImmediateUnpacker::deque calls `state.item.take().unwrap()` when `state.finished` is true. `finished` is set to true inside IncrementalFileWriter::write/chunk_submit on EOF or on a write error, which can occur before dispatch() stores the Item into `state.item` (the chunk submit callback and the dispatch of the IncrementalFile Item are independent code paths). If finished is observed with `item == None`, this unwrap panics during extraction.","fix":"Handle `state.item` being `None` gracefully (return an empty iterator / defer) instead of unwrapping, or guarantee the Item is stored before any chunk can mark the state finished.","locations":[{"ref":"src/diskio/immediate.rs:43-44","code":"   43 |             if state.finished {\n   44 |                 let mut item = state.item.take().unwrap();","lines":2,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/diskio/immediate.rs#L43-L44"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Manifest::query_components` uses `.expect(...)`/`panic!` in four places when looking up the `rust` package, the toolchain target, each component's package, and each component's target. These read an installed manifest; if it is hand-edited, partially written, or comes from a non-standard channel layout, any of these lookups can be `None` and crash rustup rather than surfacing a recoverable error.","fix":"Replace the `.expect`/`panic!` calls with `ok_or_else(|| anyhow!(...))?` and make `query_components` return the error to the caller.","locations":[{"ref":"src/dist/manifest.rs:462-489","code":"  462 |         let rust_pkg = self\n  463 |             .packages\n  464 |             .get(\"rust\")\n  465 |             .expect(\"manifest should contain a rust package\");\n  466 |         let targ_pkg = rust_pkg\n  467 |             .targets\n  468 |             .get(&desc.target)\n  469 |             .expect(\"installed manifest should have a known target\");\n  470 | \n  471 |         for component in &targ_pkg.components {\n  472 |             let installed = component.contained_within(&config.components);\n  473 | \n  474 |             let component_target = TargetTuple::new(component.target());\n  475 | \n  476 |             // Get the component so we can check if it is available\n  477 |             let component_pkg = self\n  478 |                 .get_package(component.short_name())\n  479 |                 .unwrap_or_else(|_| {\n  480 |                     panic!(\n  481 |                         \"manifest should contain component {}\",\n  482 |                         self.short_name(component)\n  483 |                     )\n  484 |                 });\n  485 |             let component_target_pkg = component_pkg\n  486 |                 .targets\n  487 |                 .get(&component_target)\n  488 |                 .expect(\"component should have target toolchain\");\n  489 | ","lines":28,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/dist/manifest.rs#L462-L489"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`DistributableToolchain::add_components` uses `.expect(\"manifest should contain a rust package\")` and `.expect(\"installed manifest should have a known target\")` on manifest lookups. A corrupt or unexpected installed manifest (hand-edited, partial install, or a server-supplied manifest missing the `rust` package / the toolchain's own target) would panic the process instead of returning a `RustupError`.","fix":"Replace these `expect`s with proper error returns (e.g. `RustupError::CorruptComponent`/`MissingPackageForComponent`) so malformed manifests degrade gracefully.","locations":[{"ref":"src/toolchain/distributable.rs:72-79","code":"   72 |         let rust_pkg = manifest\n   73 |             .packages\n   74 |             .get(\"rust\")\n   75 |             .expect(\"manifest should contain a rust package\");\n   76 |         let targ_pkg = rust_pkg\n   77 |             .targets\n   78 |             .get(&self.desc.target)\n   79 |             .expect(\"installed manifest should have a known target\");","lines":8,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/toolchain/distributable.rs#L72-L79"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`rustc_or_cargo_exists_in_path` does `path.to_str().unwrap()` when constructing the error message. A `PATH` entry containing non-UTF-8 bytes (possible on Unix) would panic during the pre-install Rust-existence check.","fix":"Use `path.display()` instead of `path.to_str().unwrap()` so non-UTF-8 paths are rendered lossily rather than panicking.","locations":[{"ref":"src/cli/self_update.rs:694-696","code":"  694 |             if rustc.exists() || cargo.exists() {\n  695 |                 return Err(anyhow!(\"{}\", path.to_str().unwrap().to_owned()));\n  696 |             }","lines":3,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/self_update.rs#L694-L696"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`try_install_msvc` calls `exit_status.code().unwrap()` on the Visual Studio installer's exit status. On Windows a process terminated by a signal/exception can yield `None` from `code()`, panicking instead of reporting an install failure.","fix":"Handle the `None` case explicitly, e.g. `match exit_status.code() { Some(c) => VsInstallError(c), None => return Err(...) }`.","locations":[{"ref":"src/cli/self_update/windows.rs:308","code":"  308 |         match VsInstallError(exit_status.code().unwrap()) {","lines":1,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/self_update/windows.rs#L308"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Threaded::find_bucket panics via the trailing `assert!(capacity <= pool.size, ...)` for any capacity larger than the largest bucket (16 MiB). The loop only `break`s when a bucket's size >= capacity; for an oversized request it falls through to SixteenM and then asserts, aborting the process instead of returning an error. get_buffer/buffer_available/reclaim all route through this.","fix":"Either cap requested buffer sizes to IO_CHUNK_SIZE before calling find_bucket, or return a Result/clamp to the largest bucket instead of asserting.","locations":[{"ref":"src/diskio/threaded.rs:206-222","code":"  206 |     fn find_bucket(&self, capacity: usize) -> Bucket {\n  207 |         let mut bucket = Bucket::FourK;\n  208 |         for (next_bucket, pool) in &self.vec_pools {\n  209 |             bucket = next_bucket;\n  210 |             if pool.size >= capacity {\n  211 |                 break;\n  212 |             }\n  213 |         }\n  214 |         let pool = &self.vec_pools[bucket];\n  215 |         assert!(\n  216 |             capacity <= pool.size,\n  217 |             \"capacity <= pool.size: {} > {}\",\n  218 |             capacity,\n  219 |             pool.size\n  220 |         );\n  221 |         bucket\n  222 |     }","lines":17,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/diskio/threaded.rs#L206-L222"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`ToolchainDesc::manifest_v1_url` calls `panic!(\"not a real-world case\")` for the `(Some(date), do_staging=true)` branch. `do_manifest_staging` is driven by the `RUSTUP_STAGED_MANIFEST` env var; a user setting that var while also using a dated toolchain (e.g. `nightly-2024-01-01`) reaches this branch and aborts the process.","fix":"Return a normal error or build a sensible staged+dated URL instead of panicking on user-controllable input.","locations":[{"ref":"src/dist/mod.rs:678-686","code":"  678 |     pub(crate) fn manifest_v1_url(&self, dist_root: &str, process: &Process) -> String {\n  679 |         let do_manifest_staging = process.var(\"RUSTUP_STAGED_MANIFEST\").is_ok();\n  680 |         match (self.date.as_ref(), do_manifest_staging) {\n  681 |             (None, false) => format!(\"{}/channel-rust-{}\", dist_root, self.channel),\n  682 |             (Some(date), false) => format!(\"{}/{}/channel-rust-{}\", dist_root, date, self.channel),\n  683 |             (None, true) => format!(\"{}/staging/channel-rust-{}\", dist_root, self.channel),\n  684 |             (Some(_), true) => panic!(\"not a real-world case\"),\n  685 |         }\n  686 |     }","lines":9,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/dist/mod.rs#L678-L686"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In the nightly backtracking loop, `date_from_manifest_date(toolchain_date).unwrap_or_else(|| panic!(...))` and the subsequent `.pred_opt().unwrap()` will panic on a malformed/min date. `toolchain_date` can come from `fetched` (the server-provided manifest date); a malformed server date crashes instead of erroring.","fix":"Convert both to recoverable errors (`?` with a contextual message) rather than `panic`/`unwrap`.","locations":[{"ref":"src/dist/mod.rs:1090-1094","code":" 1090 |             let toolchain_date = toolchain.date.as_ref().unwrap_or(&fetched);\n 1091 |             let try_next = date_from_manifest_date(toolchain_date)\n 1092 |                 .unwrap_or_else(|| panic!(\"Malformed manifest date: {toolchain_date:?}\"))\n 1093 |                 .pred_opt()\n 1094 |                 .unwrap();","lines":5,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/dist/mod.rs#L1090-L1094"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`component.target.expect(\"component target should be known\")` is used in both `add_components` and `remove_component`. A component without a target (which the type system permits, `target: Option<...>`) reaching these paths panics. Reachability depends on manifest contents.","fix":"Convert to a `RustupError` (e.g. CorruptComponent) rather than panicking on a `None` target.","locations":[{"ref":"src/toolchain/distributable.rs:119","code":"  119 |             let target = component.target.expect(\"component target should be known\");","lines":1,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/toolchain/distributable.rs#L119"},{"ref":"src/toolchain/distributable.rs:413","code":"  413 |                         target: component.target.expect(\"component target should be known\"),","lines":1,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/toolchain/distributable.rs#L413"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`get_component_suggestion` calls `.expect(\"There should be always at least one component\")` on `min_by_key` over the component list. If `manifest.query_components` ever returns an empty list (e.g. an empty/edge-case manifest), both `min_by_key().expect(...)` calls panic. The surrounding code already tolerates a query error (returns None), but not an empty-but-Ok result.","fix":"Return `None` when the components iterator is empty instead of `expect`-ing a minimum element."," i32::MAX) would overflow and panic in debug builds / wrap in release. Practically bounded by RUST_RECURSION_COUNT_MAX checks elsewhere, but `inc` itself does not enforce that bound.","fix":"Use `old_value.saturating_add(1)` and an explicit integer type (e.g. u32 to match RUST_RECURSION_COUNT_MAX).","locations":[{"ref":"src/env_var.rs:41-49","code":"   41 | pub(crate) fn inc(name: &str, cmd: &mut Command, process: &Process) {\n   42 |     let old_value = process\n   43 |         .var(name)\n   44 |         .ok()\n   45 |         .and_then(|v| v.parse().ok())\n   46 |         .unwrap_or(0);\n   47 | \n   48 |     cmd.env(name, (old_value + 1).to_string());\n   49 | }","lines":9,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/env_var.rs#L41-L49"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Unix PATH cleanup in `do_remove_from_path`/`remove_legacy_source_command` finds the source line via a raw byte-window search and splices it out by byte offset (`file_bytes[..idx]` + `file_bytes[idx+len..]`). As the FIXME comments admit, this is whitespace-sensitive and can leave a stray blank line or fail to match if the user reformatted the line, and splicing mid-file can corrupt surrounding content if the source string happens to appear inside another line.","fix":"Match and remove on a per-line basis (iterate `lines()`, drop the line equal to the source command), rather than byte-offset splicing.","locations":[{"ref":"src/cli/self_update/unix.rs:50-75","code":"   50 | pub(crate) fn do_remove_from_path(process: &Process) -> Result<()> {\n   51 |     for sh in shell::get_available_shells(process) {\n   52 |         let source_bytes = format!(\"{}\\n\", sh.source_string(process)?).into_bytes();\n   53 | \n   54 |         // Check more files for cleanup than normally are updated.\n   55 |         for rc in sh.rcfiles(process).iter().filter(|rc| rc.is_file()) {\n   56 |             let file = utils::read_file(\"rcfile\", rc)?;\n   57 |             let file_bytes = file.into_bytes();\n   58 |             // FIXME: This is whitespace sensitive where it should not be.\n   59 |             if let Some(idx) = file_bytes\n   60 |                 .windows(source_bytes.len())\n   61 |                 .position(|w| w == source_bytes.as_slice())\n   62 |             {\n   63 |                 // Here we rewrite the file without the offending line.\n   64 |                 let mut new_bytes = file_bytes[..idx].to_vec();\n   65 |                 new_bytes.extend(&file_bytes[idx + source_bytes.len()..]);\n   66 |                 let new_file = String::from_utf8(new_bytes).unwrap();\n   67 |                 utils::write_file(\"rcfile\", rc, &new_file)?;\n   68 |             }\n   69 |         }\n   70 |     }\n   71 | \n   72 |     remove_legacy_paths(process)?;\n   73 | \n   74 |     Ok(())\n   75 | }","lines":26,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/self_update/unix.rs#L50-L75"},{"ref":"src/cli/self_update/unix.rs:145-163","code":"  145 | fn remove_legacy_source_command(source_cmd: String, process: &Process) -> Result<()> {\n  146 |     let cmd_bytes = source_cmd.into_bytes();\n  147 |     for rc in shell::legacy_paths(process).filter(|rc| rc.is_file()) {\n  148 |         let file = utils::read_file(\"rcfile\", &rc)?;\n  149 |         let file_bytes = file.into_bytes();\n  150 |         // FIXME: This is whitespace sensitive where it should not be.\n  151 |         if let Some(idx) = file_bytes\n  152 |             .windows(cmd_bytes.len())\n  153 |             .position(|w| w == cmd_bytes.as_slice())\n  154 |         {\n  155 |             // Here we rewrite the file without the offending line.\n  156 |             let mut new_bytes = file_bytes[..idx].to_vec();\n  157 |             new_bytes.extend(&file_bytes[idx + cmd_bytes.len()..]);\n  158 |             let new_file = String::from_utf8(new_bytes).unwrap();\n  159 |             utils::write_file(\"rcfile\", &rc, &new_file)?;\n  160 |         }\n  161 |     }\n  162 |     Ok(())\n  163 | }","lines":19,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/self_update/unix.rs#L145-L163"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Windows PATH membership check in `_add_to_path` uses a raw UTF-16 substring scan (`old_path.windows(path_str.len()).any(...)`). It matches the cargo-bin path even when it appears as a substring of an unrelated, longer directory (e.g. existing entry `C:\\Users\\me\\.cargo\\binx` would make rustup believe `C:\\Users\\me\\.cargo\\bin` is already present and skip adding it). It ignores `;` delimiters entirely.","fix":"Split `old_path` on `;` and compare whole entries, rather than doing a delimiter-agnostic substring search.","locations":[{"ref":"src/cli/self_update/windows.rs:518-532","code":"  518 | fn _add_to_path(old_path: HSTRING, path_str: HSTRING) -> Option<HSTRING> {\n  519 |     if old_path.is_empty() {\n  520 |         Some(path_str)\n  521 |     } else if old_path\n  522 |         .windows(path_str.len())\n  523 |         .any(|path| *path == *path_str)\n  524 |     {\n  525 |         None\n  526 |     } else {\n  527 |         let mut new_path = path_str.to_os_string();\n  528 |         new_path.push(\";\");\n  529 |         new_path.push(old_path.to_os_string());\n  530 |         Some(HSTRING::from(new_path))\n  531 |     }\n  532 | }","lines":15,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/self_update/windows.rs#L518-L532"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Windows PATH removal in `_remove_from_path` has the same delimiter-agnostic substring problem: it finds the cargo-bin path anywhere in the PATH string and only checks the single character following it for a `;`. It does not verify that the match begins at an entry boundary, so a longer path that merely contains the cargo-bin substring can be partially mangled.","fix":"Tokenize PATH on `;` and remove the exact matching entry instead of a positional substring splice.","locations":[{"ref":"src/cli/self_update/windows.rs:535-556","code":"  535 | fn _remove_from_path(old_path: HSTRING, path_str: HSTRING) -> Option<HSTRING> {\n  536 |     let idx = old_path\n  537 |         .windows(path_str.len())\n  538 |         .position(|path| *path == *path_str)?;\n  539 |     // If there's a trailing semicolon (likely, since we probably added one\n  540 |     // during install), include that in the substring to remove. We don't search\n  541 |     // for that to find the string, because if it's the last string in the path,\n  542 |     // there may not be.\n  543 |     let mut len = path_str.len();\n  544 |     if old_path.get(idx + path_str.len()) == Some(&(b';' as u16)) {\n  545 |         len += 1;\n  546 |     }\n  547 | \n  548 |     let mut new_path = old_path[..idx].to_owned();\n  549 |     new_path.extend_from_slice(&old_path[idx + len..]);\n  550 |     // Don't leave a trailing ; though, we don't want an empty string in the\n  551 |     // path.\n  552 |     if new_path.last() == Some(&(b';' as u16)) {\n  553 |         new_path.pop();\n  554 |     }\n  555 |     Some(HSTRING::from_wide(&new_path))\n  556 | }","lines":22,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/self_update/windows.rs#L535-L556"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`ToolchainSection::is_empty` ignores the `profile` field. An override file (e.g. rust-toolchain.toml) that sets only `profile = \"default\"` and nothing else is treated as empty and rejected with `OverrideFileConfigError::Invalid`, even though `profile` is a real toolchain p cations":[{"ref":"src/config.rs:192-210","code":"  192 |             (None, Some(path)) => {\n  193 |                 if file.toolchain.targets.is_some()\n  194 |                     || file.toolchain.components.is_some()\n  195 |                     || file.toolchain.profile.is_some()\n  196 |                 {\n  197 |                     bail!(\n  198 |                         \"toolchain options are ignored for path toolchain ({})\",\n  199 |                         path.display()\n  200 |                     )\n  201 |                 }\n  202 |                 // We -do not- support relative paths, they permit trivial\n  203 |                 // completely arbitrary code execution in a directory.\n  204 |                 // Longer term we'll not support path based toolchains at\n  205 |                 // all, because they also permit arbitrary code execution,\n  206 |                 // though with more challenges to exploit.\n  207 |                 return Ok(Self::PathBased(PathBasedToolchainName::try_from(\n  208 |                     &path as &Path,\n  209 |                 )?));\n  210 |             }","lines":19,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/config.rs#L192-L210"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `find_override_from_dir_walk`, when both `rust-toolchain` and `rust-toolchain.toml` exist, a warning is emitted and `path_rust_toolchain` (the legacy file) is used with `ParseMode::Both`. The warning text uses `{0}` to say 'using contents of {0}' referencing the legacy file — correct — but silently ignoring `rust-toolchain.toml` means a project that migrated to the `.toml` form while leaving a stale legacy file will use the stale config. This is by-design precedence but is a foot-gun worth surfacing more loudly (warn is easy to miss) given the TOML is the documented modern format.","fix":"Consider preferring `rust-toolchain.toml` when both exist (or at minimum elevating the diagnostic), aligning with the documented modern format.","locations":[{"ref":"src/config.rs:656-672","code":"  656 |                 (Ok(contents), Ok(_)) => {\n  657 |                     // both `rust-toolchain` and `rust-toolchain.toml` exist\n  658 | \n  659 |                     warn!(\n  660 |                         \"both {} and {} exist; using contents of {0}\",\n  661 |                         path_rust_toolchain\n  662 |                             .canonicalize()\n  663 |                             .unwrap_or_else(|_| PathBuf::from(&path_rust_toolchain))\n  664 |                             .display(),\n  665 |                         path_rust_toolchain_toml\n  666 |                             .canonicalize()\n  667 |                             .unwrap_or_else(|_| PathBuf::from(&path_rust_toolchain_toml))\n  668 |                             .display(),\n  669 |                     );\n  670 | \n  671 |                     (path_rust_toolchain, Ok(contents), ParseMode::Both)\n  672 |                 }","lines":17,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/config.rs#L656-L672"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`rustc_version` reads only the first line of stdout via `read_line`, but on the timeout path (`Ok(None)`) it kills the child and returns a timeout string; on `Ok(Some(_))` non-success or `Err(_)` it falls through to return '(error reading rustc version)'. However, when `read_line` returns Ok(0) (empty stdout but success), `line` is empty and `line1 = Some(\"\")` — the function then returns an empty string as the version rather than an error marker. An empty success-but-no-output case yields a misleading empty version string.","fix":"Treat an empty read result as the '(error reading rustc version)' case (check `line.is_empty()` / read count > 0 before setting `line1`).","locations":[{"ref":"src/toolchain.rs:300-327","code":"  300 |                 let mut line1 = None;\n  301 |                 if let Ok(mut child) = cmd.spawn() {\n  302 |                     let timeout = Duration::new(10, 0);\n  303 |                     match child.wait_timeout(timeout) {\n  304 |                         Ok(Some(status)) if status.success() => {\n  305 |                             let out = child\n  306 |                                 .stdout\n  307 |                                 .expect(\"Child::stdout requested but not present\");\n  308 |                             let mut line = String::new();\n  309 |                             if BufReader::new(out).read_line(&mut line).is_ok() {\n  310 |                                 let lineend = line.trim_end_matches(&['\\r', '\\n'][..]).len();\n  311 |                                 line.truncate(lineend);\n  312 |                                 line1 = Some(line);\n  313 |                             }\n  314 |                         }\n  315 |                         Ok(None) => {\n  316 |                             let _ = child.kill();\n  317 |                             return String::from(\"(timeout reading rustc version)\");\n  318 |                         }\n  319 |                         Ok(Some(_)) | Err(_) => {}\n  320 |                     }\n  321 |                 }\n  322 | \n  323 |                 if let Some(line1) = line1 {\n  324 |                     line1\n  325 |                 } else {\n  326 |                     String::from(\"(error reading rustc version)\")\n  327 |                 }","lines":28,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/toolchain.rs#L300-L327"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Toolchain::ensure_removed` handles a dangling symlink by calling `fs::remove_dir_all(&path)`. If the toolchain path is a symlink to (or itself is) a file rather than a directory, `remove_dir_all` fails with an error on most platforms, leaving the dangling link in place and surfacing a confusing error. The branch assumes a dangling *directory* symlink.","fix":"Use `fs::remove_file` for symlinks (removing the link itself, not its target), or detect file-vs-dir symlink and dispatch accordingly.","locations":[{"ref":"src/toolchain.rs:560-564","code":"  560 |                 // Might be a dangling symlink\n  561 |                 if path.is_symlink() {\n  562 |                     info!(\"uninstalling toolchain {name}\");\n  563 |                     fs::remove_dir_all(&path)?;\n  564 |                     true","lines":5,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/toolchain.rs#L560-L564"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"format_path_for_display locates the UNC prefix `\\\\?\\` anywhere in the string with `path.find`, but then unconditionally strips the first 4 bytes via `path[4..]`, ignoring the actual match position. If the prefix is not at byte 0 (or appears after other characters), the wrong 4 bytes are removed, corrupting the displayed path. The match index returned by `find` is discarded.","fix":"Only strip when the prefix is at the start, e.g. `path.strip_prefix(r\"\\\\?\\\").map(str::to_owned).unwrap_or_else(|| path.to_owned())`, or use the returned index from `find` instead of the hardcoded `4`.","locations":[{"ref":"src/utils/mod.rs:390-397","code":"  390 | pub(crate) fn format_path_for_display(path: &str) -> String {\n  391 |     let unc_present = path.find(r\"\\\\?\\\");\n  392 | \n  393 |     match unc_present {\n  394 |         None => path.to_owned(),\n  395 |         Some(_) => path[4..].to_owned(),\n  396 |     }\n  397 | }","lines":8,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/utils/mod.rs#L390-L397"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`confirm` treats any unrecognized answer as `false` (decline) rather than re-prompting or honoring the default. Typing e.g. `Y ` (trailing space), `yes please`, or a typo silently aborts the action even though the prompt implies a default. The empty-input case respects the default, but a non-empty non-matching input ignores it. Compare `question_bool`, which falls back to the default for unrecognized input - the two helpers are inconsistent.","fix":"For unrecognized non-empty input, either re-prompt or fall back to `default`, matching `question_bool` semantics.","locations":[{"ref":"src/cli/common.rs:35-40","code":"   35 |     let r = match &*input.to_lowercase() {\n   36 |         \"y\" | \"yes\" => true,\n   37 |         \"n\" | \"no\" => false,\n   38 |         \"\" => default,\n   39 |         _ => false,\n   40 |     };","lines":6,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/common.rs#L35-L40"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`get_target` is named/typed as returning `Option<TargetTuple>` but can never return `None`: when `target` is `None` it falls back to `Some(distributable.desc().target.clone())`. The `Option` wrapper is misleading - callers always get `Some`, so component-add/remove can never operate target-agnostically even if that were intended.","fix":"If a wildcard (None) target is never desired, change the return type to `TargetTuple`; otherwise add a code path that yields `None`.","locations":[{"ref":"src/cli/rustup_mode.rs:1544-1551","code":" 1544 | fn get_target(\n 1545 |     target: Option<String>,\n 1546 |     distributable: &DistributableToolchain<'_>,\n 1547 | ) -> Option<TargetTuple> {\n 1548 |     target\n 1549 |         .map(TargetTuple::new)\n 1550 |         .or_else(|| Some(distributable.desc() new(|| Regex::new(r\"[0-9]+.[0-9]+.[0-9]+[0-9a-zA-Z-]*\").unwrap());","lines":2,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/self_update.rs#L1317-L1318"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`DownloadCfg::clean` computes `used_file = self.download_dir.join(hash)` (already absolute), then checks `self.download_dir.join(&used_file).exists()`. Joining an already-absolute path discards `download_dir`, so this happens to be equivalent to `used_file.exists()`, but the double-join is misleading and fragile: if `hash` were ever a relative-looking path it would change behaviour between the existence check and the `remove_file(used_file)` call (which uses the single-join path).","fix":"Use `used_file.exists()` directly to match the path passed to `remove_file`.","locations":[{"ref":"src/dist/download.rs:128-136","code":"  128 |     pub(crate) fn clean(&self, hashes: &[impl AsRef<Path>]) -> Result<()> {\n  129 |         for hash in hashes.iter() {\n  130 |             let used_file = self.download_dir.join(hash);\n  131 |             if self.download_dir.join(&used_file).exists() {\n  132 |                 fs::remove_file(used_file).context(\"cleaning up cached downloads\")?;\n  133 |             }\n  134 |         }\n  135 |         Ok(())\n  136 |     }","lines":9,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/dist/download.rs#L128-L136"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`PartialVersion::from_str` splits off the prerelease with `ver.split_once('-')`, taking everything after the FIRST `-` as the prerelease. For a SemVer prerelease containing further hyphens, only the first segment boundary is honored, and any build-metadata (`+...`) is silently folded into the comparator parse rather than rejected/handled. Combined with the leading-digit guard, inputs like `1.2.3-` (empty pre after the dash) are passed to `Prerelease::new(\"\")` which yields EMPTY, silently dropping the trailing dash rather than erroring.","fix":"Parse the version and prerelease via a single `semver::Comparator`/`Version` parse, or explicitly reject a trailing empty prerelease, to avoid silent normalization of malformed inputs.","locations":[{"ref":"src/dist/mod.rs:222-246","code":"  222 | impl FromStr for PartialVersion {\n  223 |     type Err = anyhow::Error;\n  224 |     fn from_str(ver: &str) -> Result<Self> {\n  225 |         // `semver::Comparator::from_str` supports an optional operator\n  226 |         // (e.g. `=`, `>`, `>=`, `<`, `<=`, `~`, `^`, `*`) before the\n  227 |         // partial version, so we should exclude that case first.\n  228 |         if let Some(ch) = ver.chars().nth(0)\n  229 |             && !ch.is_ascii_digit()\n  230 |         {\n  231 |             return Err(\n  232 |                 anyhow!(\"expected ASCII digit at the beginning of `{ver}`, found `{ch}`\")\n  233 |                     .context(\"error parsing `PartialVersion`\"),\n  234 |             );\n  235 |         }\n  236 |         let (ver, pre) = ver.split_once('-').unwrap_or((ver, \"\"));\n  237 |         let comparator =\n  238 |             semver::Comparator::from_str(ver).context(\"error parsing `PartialVersion`\")?;\n  239 |         Ok(Self {\n  240 |             major: comparator.major,\n  241 |             minor: comparator.minor,\n  242 |             patch: comparator.patch,\n  243 |             pre: semver::Prerelease::new(pre).context(\"error parsing `PartialVersion`\")?,\n  244 |         })\n  245 |     }\n  246 | }","lines":25,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/dist/mod.rs#L222-L246"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"is_network_failure only returns true for the Reqwest variant gated behind `#[cfg(any(reqwest-rustls-tls, reqwest-native-tls))]`; with neither TLS feature the function is compiled to always return false. download() uses this to decide whether to preserve a partial download on resume failure. If a build ever lacks both features (or for the file: scheme path, where errors are never Reqwest), a transient failure is misclassified as fatal and the cached partial download is deleted, defeating resume.","fix":"Also classify io::Error kinds (TimedOut, ConnectionReset, etc.) as network failures so resume works regardless of the TLS backend.","locations":[{"ref":"src/download/mod.rs:335-341","code":"  335 | pub(crate) fn is_network_failure(err: &anyhow::Error) -> bool {\n  336 |     match err.downcast_ref::<DownloadError>() {\n  337 |         #[cfg(any(feature = \"reqwest-rustls-tls\", feature = \"reqwest-native-tls\"))]\n  338 |         Some(DownloadError::Reqwest(e)) => e.is_timeout() || e.is_connect(),\n  339 |         _ => false,\n  340 |     }\n  341 | }","lines":7,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/download/mod.rs#L335-L341"},{"ref":"src/download/mod.rs:147-153","code":"  147 |         let e = if !(self.resume && is_network_failure(&err))\n  148 |             && let Err(file_err) = remove_file(self.path).context(\"cleaning up cached downloads\")\n  149 |         {\n  150 |             file_err.context(err)\n  151 |         } else {\n  152 |             err\n  153 |         };","lines":7,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/download/mod.rs#L147-L153"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Process::var` and `var_os` treat an empty environment variable value identically to an unset variable (returning `NotPresent`/`None`). This means a user cannot explicitly set, e.g., `RUSTUP_DIST_SERVER=\"\"` or any flag to an empty string; an empty value is silently indistinguishable from absence. Several callers (e.g. `permit_copy_rename` which uses `var_os(...).is_some()`) therefore behave differently from a raw env check. Note `permit_copy_rename` for the real OsProcess uses `env::var_os(...).is_some()` directly, so an empty value DOES enable it there, but the TestProcess branch uses `vars.contains_key`, also true for empty — yet `var`/`var_os` elsewhere would reject empty, creating inconsistent empty-string semantics across the abstraction.","fix":"Document the empty-equals-unset convention explicitly, and make `permit_copy_rename` use the same `var_os` helper so the OsProcess and TestProcess paths agree on empty-string handling.","locations":[{"ref":"src/process.rs:108-122","code":"  108 |     pub fn var(&self, key: &str) -> Result<String, env::VarError> {\n  109 |         let value = match self {\n  110 |             Process::OsProcess(_) => env::var(key)?,\n  111 |             #[cfg(feature = \"test\")]\n  112 |             Process::TestProcess(p) => match p.vars.get(key) {\n  113 |                 Some(val) => val.to_owned(),\n  114 |                 None => return Err(env::VarError::NotPresent),\n  115 |             },\n  116 |         };\n  117 | \n  118 |         match value.is_empty() {\n  119 |             false => Ok(value),\n  120 |             true => Err(env::VarError::NotPresent),\n  121 |         }\n  122 |     }","lines":15,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/process.rs#L108-L122"},{"ref":"src/process.rs:124-149","code":"  124 |     #[cfg(not(target_os = \"linux\"))]\n  125 |     pub fn permit_copy_rename(&self) -> bool {\n  126 |         false\n  127 |     }\n  128 | \n  129 |     #[cfg(target_os = \"linux\")]\n  130 |     pub fn permit_copy_rename(&self) -> bool {\n  131 |         match self {\n  132 |             Process::OsProcess(_) => env::var_os(\"RUSTUP_PERMIT_COPY_RENAME\").is_some(),\n  133 |             #[cfg(feature = \"test\")]\n  134 |             Process::TestProcess(p) => p.vars.contains_key(\"RUSTUP_PERMIT_COPY_RENAME\"),\n  135 |         }\n  136 |     }\n  137 | \n  138 |     pub(crate) fn var_os(&self, key: &str) -> Option<OsString> {\n  139 |         let value = match self {\n  140 |             Process::OsProcess(_) => env::var_os(key)?,\n  141 |             #[cfg(feature = \"test\")]\n  142 |             Process::TestProcess(p) => p.vars.get(key).map(OsString::from)?,\n  143 |         };\n  144 | \n  145 |         match value.is_empty() {\n  146 |             false => Some(value),\n  147 |             true => None,\n  148 |         }\n  149 |     }","lines":26,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/process.rs#L124-L149"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`get_component_suggestion`: the `closest_match` selection logic is convoluted and has an asymmetry. In the `short > long` branch it may set `closest_match` to a *target* string (`long_name_distance.1.component.target()`) when only targets differ; in the `else` branch it likewise may set a target. But `closest_distance` is only reassigned in the `short > long` branch, so the final `MAX_DISTANCE` comparison can use `short_name_distance` while `closest_match` was derived from logic that conflated short-name and target suggestions. The result can suggest a target string while gating on a short-name distance, producing an inconsistent suggestion.","fix":"Compute the chosen (distance, match) pair atomically (pick the smaller of short/long once, then derive the display string from that same choice) so the gating distance and the suggested string always come from the same candidate.","locations":[{"ref":"src/toolchain/distributable.rs:290-319","code":"  290 |             let mut closest_distance = short_name_distance;\n  291 |             let mut closest_match = manifest\n  292 |                 .short_name(&short_name_distance.1.component)\n  293 |                 .to_owned();\n  294 | \n  295 |             // Find closer suggestion\n  296 |             if short_name_distance.0 > long_name_distance.0 {\n  297 |                 closest_distance = long_name_distance;\n  298 | \n  299 |                 // Check if only targets differ\n  300 |                 if closest_distance.1.component.short_name() == component.short_name() {\n  301 |                     closest_match = long_name_distance.1.component.target();\n  302 |                 } else {\n  303 |                     closest_match = long_name_distance.1.component.short_name().to_string();\n  304 |                 }\n  305 |             } else {\n  306 |                 // Check if only targets differ\n  307 |                 if manifest.short_name(&closest_distance.1.component)\n  308 |                     == manifest.short_name(component)\n  309 |                 {\n  310 |                     closest_match = short_name_distance.1.component.target();\n  311 |                 }\n  312 |             }\n  313 | \n  314 |             // If suggestion is too different don't suggest anything\n  315 |             if closest_distance.0 > MAX_DISTANCE {\n  316 |                 None\n  317 |             } else {\n  318 |                 Some(closest_match)\n  319 |             }","lines":30,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/toolchain/distributable.rs#L290-L319"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`PathBasedToolchainName::try_from(&Path)` rejects any path that parses as a `PartialToolchainDesc` OR that contains no path separator. The condition `PartialToolchainDesc::from_str(&as_str).is_ok() || !(contains '/' || contains '\\\\')` means a legitimate single-component absolute path on a platform without the checked separators, or a path that coincidentally matches a partial desc grammar (e.g. an absolute path whose final form parses as a channel), is misclassified. The `as_str` is derived from `value.display()` which is lossy for non-UTF-8 paths, so validation runs on a lossy rendering.","fix":"Validate against the raw path components (e.g. `value.is_absolute()` and `value.components().count()`) rather than a lossy display string, and reorder so the absolute-path check happens before the desc-grammar heuristic.","locations":[{"ref":"src/toolchain/names.rs:436-453","code":"  436 |     fn try_from(value: &Path) -> Result<Self, Self::Error> {\n  437 |         // if official || at least a single path component\n  438 |         let as_str = value.display().to_string();\n  439 |         if PartialToolchainDesc::from_str(&as_str).is_ok()\n  440 |             || !(as_str.contains('/') || as_str.contains('\\\\'))\n  441 |         {\n  442 |             Err(InvalidName::PathToolchain(as_str))\n  443 |         } else {\n  444 |             // Perform minimal validation; there should at least be a `bin/` that might\n  445 |             // contain things for us to run.\n  446 |             if !value.is_absolute() {\n  447 |                 Err(InvalidName::PathToolchainRelative(as_str))\n  448 |             } else if !value.join(\"bin\").is_dir() {\n  449 |                 Err(InvalidName::ToolchainPath(as_str))\n  450 |             } else {\n  451 |                 Ok(PathBasedToolchainName(value.into(), as_str))\n  452 |             }\n  453 |         }","lines":18,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/toolchain/names.rs#L436-L453"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"In `show`, `last_index = installed_toolchains.len().wrapping_sub(1)` is used to decide whether to print a trailing blank line between verbose entries. If there are zero installed toolchains, `wrapping_sub(1)` yields `usize::MAX`; harmless here because the loop body never runs with an empty list, but the `wrapping_sub` obscures intent and would misbehave if the loop were ever entered.","fix":"Use `len().saturating_sub(1)` or guard the empty case explicitly for clarity.","locations":[{"ref":"src/cli/rustup_mode.rs:1223-1249","code":" 1223 |     let last_index = installed_toolchains.len().wrapping_sub(1);\n 1224 |     for (n, toolchain_name) in installed_toolchains.into_iter().enumerate() {\n 1225 |         let is_default_toolchain = default_toolchain_name.as_ref() == Some(&toolchain_name);\n 1226 |         let is_active_toolchain = active_toolchain_name == Some(&toolchain_name);\n 1227 | \n 1228 |         let status_str = match (is_active_toolchain, is_default_toolchain) {\n 1229 |             (true, true) => \" (active, default)\",\n 1230 |             (true, false) => \" (active)\",\n 1231 |             (false, true) => \" (default)\",\n 1232 |             (false, false) => \"\",\n 1233 |         };\n 1234 | \n 1235 |         let mut t = t.lock();\n 1236 | \n 1237 |         writeln!(t, \"{toolchain_name}{CONTEXT}{status_str}{CONTEXT:#}\")?;\n 1238 | \n 1239 |         if verbose {\n 1240 |             let toolchain = Toolchain::new(cfg, toolchain_name.into())?;\n 1241 |             writeln!(\n 1242 |                 t,\n 1243 |                 \"  {}\\n  path: {}\",\n 1244 |                 toolchain.rustc_version(),\n 1245 |                 toolchain.path().display()\n 1246 |             )?;\n 1247 |             if n != last_index {\n 1248 |                 writeln!(t)?;\n 1249 |             }","lines":27,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/rustup_mode.rs#L1223-L1249"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"`file_hash` reads with `while let Ok(n) = downloaded.read(&mut buf)`. If `read` returns an `Err` (I/O error mid-file), the loop silently terminates and returns the SHA-256 of only the bytes read so far. The caller (`download`) then compares this partial hash against the expected hash: a transient read error on a fully-valid cached file would make it look like a checksum mismatch (and delete a good file), and the error is swallowed entirely.","fix":"Propagate the error: use `loop { let n = downloaded.read(&mut buf)?; if n == 0 { break; } hasher.update(&buf[..n]); }` or `io::copy` into the hasher.","locations":[{"ref":"src/dist/download.rs:447-459","code":"  447 | fn file_hash(path: &Path) -> Result<String> {\n  448 |     let mut hasher = Sha256::new();\n  449 |     let mut downloaded = utils::buffered(path)?;\n  450 |     let mut buf = vec![0; 32768];\n  451 |     while let Ok(n) = downloaded.read(&mut buf) {\n  452 |         if n == 0 {\n  453 |             break;\n  454 |         }\n  455 |         hasher.update(&buf[..n]);\n  456 |     }\n  457 | \n  458 |     Ok(faster_hex::hex_string(&hasher.finalize()))\n  459 | }","lines":13,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/dist/download.rs#L447-L459"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `doc`, the topic-less / no-page path uses `toolchain.doc_path(\"\").unwrap()` (line 1900) while a sibling branch correctly uses `?` on the same call (line 1895). The `.unwrap()` will panic if `doc_path` fails (e.g. toolchain path resolution error) instead of returning the error.","fix":"Replace `.unwrap()` with `?` to propagate the error like the neighboring branch.","locations":[{"ref":"src/cli/rustup_mode.rs:1900","code":" 1900 |             let doc_path = topical_doc::local_path(&toolchain.doc_path(\"\").unwrap(), topic)?;","lines":1,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/rustup_mode.rs#L1900"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`do_remove_from_path` and `remove_legacy_source_command` unwrap `String::from_utf8(new_bytes)` of rewritten rcfile contents. An rcfile containing valid-but-non-UTF-8 bytes (e.g. a latin-1 comment) that was read via `utils::read_file` would already have errored, but if read succeeds and the splice lands on a char boundary incorrectly this `.unwrap()` could panic. Low likelihood but it is a hard unwrap on user file content.","fix":"Operate on the `String` directly (line-based) so re-encoding is unnecessary, or use `String::from_utf8_lossy`/propagate the error.","locations":[{"ref":"src/cli/self_update/unix.rs:66","code":"   66 |                 let new_file = String::from_utf8(new_bytes).unwrap();","lines":1,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/self_update/unix.rs#L66"},{"ref":"src/cli/self_update/unix.rs:158","code":"  158 |             let new_file = String::from_utf8(new_bytes).unwrap();","lines":1,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/self_update/unix.rs#L158"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`list_toolchains` deliberately discards directory-entry read errors via `.filter_map(io::Result::ok)`, as the inline TODO comment acknowledges: a short read could silently report fewer toolchains than exist. This can cause `rustup` to act as though an installed toolchain is missing (e.g. trigger reinstall or 'not installed' errors).","fix":"Propagate read-entry errors (or at least warn) instead of silently dropping them, so a partial listing does not masquerade as an authoritative one.","locations":[{"ref":"src/config.rs:914-928","code":"  914 |     pub(crate) fn list_toolchains(&self) -> Result<Vec<ToolchainName>> {\n  915 |         if utils::is_directory(&self.toolchains_dir) {\n  916 |             let mut toolchains: Vec<_> = utils::read_dir(\"toolchains\", &self.toolchains_dir)?\n  917 |                 // TODO: this discards errors reading the directory, is that\n  918 |                 // correct? could we get a short-read and report less toolchains\n  919 |                 // than exist?\n  920 |                 .filter_map(io::Result::ok)\n  921 |                 .filter(|e| e.file_type().map(|f| !f.is_file()).unwrap_or(false))\n  922 |                 .filter_map(|e| e.file_name().into_string().ok())\n  923 |                 .filter_map(|n| ToolchainName::try_from(&n).ok())\n  924 |                 .collect();\n  925 | \n  926 |             toolchains.sort();\n  927 | \n  928 |             Ok(toolchains)","lines":15,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/config.rs#L914-L928"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"write_file_incremental does `let contents = recv.recv().unwrap();` in the threaded write loop. The comment justifies it by saying the sender only closes on a tar read failure that propagates in the main thread, but a panic in the producer thread (or any future refactor that drops the sender early) turns a recoverable I/O path into a hard panic inside a pool worker thread.","fix":"Treat `recv.recv()` returning Err as a clean termination (break) or convert it into an io::Error returned from the function, instead of unwrapping.","locations":[{"ref":"src/diskio/mod.rs:410-414","code":"  410 |     if let IncrementalFile::ThreadedReceiver(recv) = content_callback {\n  411 |         loop {\n  412 |             // We unwrap here because the documented only reason for recv to fail is a close by the sender, which is reading\n  413 |             // from the tar file: a failed read there will propagate the error in the main thread directly.\n  414 |             let contents = recv.recv().unwrap();","lines":5,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/diskio/mod.rs#L410-L414"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `download` (cached-file path), a checksum mismatch on a cached file triggers `fs::remove_file(&target_file)` and then falls through to re-download. But if `file_hash` returned a wrong hash due to a swallowed read error (see the `file_hash` finding), a perfectly good cached file is deleted and re-downloaded without any error being reported, masking the underlying I/O problem.","fix":"Once `file_hash` propagates read errors, surface them here instead of treating every non-match as a stale cache; only delete on a genuine content mismatch.","locations":[{"ref":"src/dist/download.rs:61-71","code":"   61 |         if target_file.exists() {\n   62 |             let cached_result = file_hash(&target_file)?;\n   63 |             if hash == cached_result {\n   64 |                 debug!(\"reusing previously downloaded file\");\n   65 |                 debug!(url = url.as_ref(), \"checksum passed\");\n   66 |                 return Ok(File { path: target_file });\n   67 |             } else {\n   68 |                 warn!(\"bad checksum for cached download\");\n   69 |                 fs::remove_file(&target_file).context(\"cleaning up previous download\")?;\n   70 |             }\n   71 |         }","lines":11,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/dist/download.rs#L61-L71"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `Toolchain::new`, when the toolchain does not exist it calls `cfg.active_toolchain()` to compute `is_active`, discarding any error with `matches!(cfg.active_toolchain(), Ok(Some((t, _))) if t == name)`. An error determining the active toolchain is silently treated as 'not active'. This is only for an error message field, but a failing settings read here is masked.","fix":"This is acceptable for a cosmetic flag, but consider logging at trace level when `active_toolchain()` errors so the masked failure is diagnosable.","locations":[{"ref":"src/toolchain.rs:116-117","code":"  116 |                     let is_active = matches!(cfg.active_toolchain(), Ok(Some((t, _))) if t == name);\n  117 |                     RustupError::ToolchainNotInstalled { name, is_active }","lines":2,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/toolchain.rs#L116-L117"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"canonicalize_path silently swallows all canonicalization errors and returns the original path after a warn! log. Callers cannot distinguish a successfully canonicalized path from a fallback, which can mask real filesystem problems (e.g. permission errors) and lead to later operations acting on a non-canonical path.","fix":"Where the caller needs correctness, return a Result; otherwise document clearly that the fallback is best-effort and ensure callers tolerate a non-canonical path.","locations":[{"ref":"src/utils/mod.rs:139-144","code":"  139 | pub(crate) fn canonicalize_path(path: &Path) -> PathBuf {\n  140 |     fs::canonicalize(path).unwrap_or_else(|_| {\n  141 |         warn!(\"could not canonicalize path {}\", path.display());\n  142 |         PathBuf::from(path)\n  143 |     })\n  144 | }","lines":6,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/utils/mod.rs#L139-L144"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"`maybe_install_msvc` and friends call `info!(\"aborting installation\")` when the user declines the MSVC prerequisite prompt, but the function then returns ocess (and is compiled out under `panic=abort`/release asserts disabled would change behaviour) instead of returning a clean error.","fix":"Return `bail!(...)` errors for the 'not installed' and 'fresh install' cases instead of `assert!`/`expect`.","locations":[{"ref":"src/dist/manifestation.rs:59-75","code":"   59 |     fn check_invariants(&self, config: &Option<Config>) -> Result<()> {\n   60 |         for component_to_add in self.iter_add_components() {\n   61 |             if self.remove_components.contains(component_to_add) {\n   62 |                 bail!(\"can't both add and remove components\");\n   63 |             }\n   64 |         }\n   65 |         for component_to_remove in &self.remove_components {\n   66 |             let config = config\n   67 |                 .as_ref()\n   68 |                 .expect(\"removing component on fresh install?\");\n   69 |             assert!(\n   70 |                 config.components.contains(component_to_remove),\n   71 |                 \"removing package that isn't installed\"\n   72 |             );\n   73 |         }\n   74 |         Ok(())\n   75 |     }","lines":17,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/dist/manifestation.rs#L59-L75"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Pool::claim and buffer_available compare RefCell<usize> values directly (`self.in_use == self.high_watermark`, `pool.in_use < pool.high_watermark`). These rely on RefCell's PartialEq/PartialOrd, which transparently borrow the cells. It works today, but it obscures that a runtime borrow occurs and will panic at runtime if any of these cells is already mutably borrowed on the same thread during the comparison. The intent (compare inner counts) is far from obvious.","fix":"Read the values explicitly (`*self.in_use.borrow() == *self.high_watermark.borrow()`) so the borrows are visible, or switch these counters to Cell<usize> which is the correct primitive for single-threaded Copy counters.","locations":[{"ref":"src/diskio/threaded.rs:72-77","code":"   72 |     fn claim(&self) {\n   73 |         if self.in_use == self.high_watermark {\n   74 |             *self.high_watermark.borrow_mut() += self.size;\n   75 |         }\n   76 |         *self.in_use.borrow_mut() += self.size;\n   77 |     }","lines":6,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/diskio/threaded.rs#L72-L77"},{"ref":"src/diskio/threaded.rs:308-319","code":"  308 |     fn buffer_available(&self, len: usize) -> bool {\n  309 |         // if either: there is room in the budget to assign a new slab entry of\n  310 |         // this size, or there is an unused slab entry of this size.\n  311 |         let bucket = self.find_bucket(len);\n  312 |         let pool = &self.vec_pools[bucket];\n  313 |         if pool.in_use < pool.high_watermark {\n  314 |             return true;\n  315 |         }\n  316 |         let size = pool.size;\n  317 |         let total_used = Threaded::ram_highwater(&self.vec_pools);\n  318 |         total_used + size < self.ram_budget\n  319 |     }","lines":12,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/diskio/threaded.rs#L308-L319"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`ColorableTerminal::width` always queries `Term::stdout().size().1` as the fallback width, even when the terminal instance is a stderr stream (`ColorableTerminal::stderr`). The width of stderr's terminal can differ from stdout's (or stdout may be redirected while stderr is a tty), so progress bars/wrapping on stderr can use the wrong width.","fix":"Track which stream the terminal wraps and query `Term::stderr().size()` for stderr terminals, or store the stream selector.","locations":[{"ref":"src/process/terminal_source.rs:110-116","code":"  110 | impl TermLike for ColorableTerminal {\n  111 |     fn width(&self) -> u16 {\n  112 |         match self.width {\n  113 |             Some(n) => n.get(),\n  114 |             None => Term::stdout().size().1,\n  115 |         }\n  116 |     }","lines":7,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/process/terminal_source.rs#L110-L116"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`find_override_from_dir_walk` reads both `rust-toolchain` and `rust-toolchain.toml` from disk on every directory in the walk up the tree, for every directory, even when neither is present. Each iteration issues two `read_file` syscalls (open+read) regardless. For deep directory trees this multiplies filesystem traffic; a stat/exists check first, or short-circuiting, would avoid the redundant reads.","fix":"Probe existence (or read lazily) and avoid attempting to read the second file once the first is found, reducing two reads-per-dir to the minimum needed.","locations":[{"ref":"src/config.rs:644-673","code":"  644 |             let (toolchain_file, contents, parse_mode) = match (\n  645 |                 utils::read_file(\"toolchain file\", &path_rust_toolchain),\n  646 |                 utils::read_file(\"toolchain file\", &path_rust_toolchain_toml),\n  647 |             ) {\n  648 |                 (contents, Err(_)) => {\n  649 |                     // no `rust-toolchain.toml` exists\n  650 |                     (path_rust_toolchain, contents, ParseMode::Both)\n  651 |                 }\n  652 |                 (Err(_), Ok(contents)) => {\n  653 |                     // only `rust-toolchain.toml` exists\n  654 |                     (path_rust_toolchain_toml, Ok(contents), ParseMode::OnlyToml)\n  655 |                 }\n  656 |                 (Ok(contents), Ok(_)) => {\n  657 |                     // both `rust-toolchain` and `rust-toolchain.toml` exist\n  658 | \n  659 |                     warn!(\n  660 |                         \"both {} and {} exist; using contents of {0}\",\n  661 |                         path_rust_toolchain\n  662 |                             .canonicalize()\n  663 |                             .unwrap_or_else(|_| PathBuf::from(&path_rust_toolchain))\n  664 |                             .display(),\n  665 |                         path_rust_toolchain_toml\n  666 |                             .canonicalize()\n  667 |                             .unwrap_or_else(|_| PathBuf::from(&path_rust_toolchain_toml))\n  668 |                             .display(),\n  669 |                     );\n  670 | \n  671 |                     (path_rust_toolchain, Ok(contents), ParseMode::Both)\n  672 |                 }\n  673 |             };","lines":30,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/config.rs#L644-L673"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`list_toolchains()` is invoked inside the directory-walk loop whenever a fully-qualified channel name (with a target tuple) is found in a toolchain file. `list_toolchains` performs a full directory read + parse of every toolchain dir entry. While this path is uncommon, it re-reads the toolchains directory on each matching dir in the walk.","fix":"Cache the installed-toolchain list once per `find_override_from_dir_walk` call (or lift it out of the loop).","locations":[{"ref":"src/config.rs:696-706","code":"  696 |                     if let ResolvableToolchainName::Official(name) = &toolchain_name\n  697 |                         && !name.target.is_empty()\n  698 |                     {\n  699 |                         // Permit fully qualified names IFF the toolchain is installed. TODO(robertc): consider\n  700 |                         // disabling this and backing out https://github.com/rust-lang/rustup/pull/2141 (but provide\n  701 |                         // the base name in uffix is not mistaken for a bug.","locations":[{"ref":"src/dist/mod.rs:461-485","code":"  461 |             /// Get the host architecture using `GetNativeSystemInfo`.\n  462 |             /// Does not support detecting aarch64.\n  463 |             fn arch_fallback() -> Option<&'static str> {\n  464 |                 use windows_sys::Win32::System::SystemInformation::GetNativeSystemInfo;\n  465 | \n  466 |                 const PROCESSOR_ARCHITECTURE_AMD64: u16 = 9;\n  467 |                 const PROCESSOR_ARCHITECTURE_INTEL: u16 = 0;\n  468 | \n  469 |                 let mut sys_info;\n  470 |                 unsafe {\n  471 |                     sys_info = mem::zeroed();\n  472 |                     GetNativeSystemInfo(&mut sys_info);\n  473 |                 }\n  474 | \n  475 |                 match unsafe { sys_info.Anonymous.Anonymous }.wProcessorArchitecture {\n  476 |                     PROCESSOR_ARCHITECTURE_AMD64 => Some(\"x86_64\"),\n  477 |                     PROCESSOR_ARCHITECTURE_INTEL => Some(\"i686\"),\n  478 |                     _ => None,\n  479 |                 }\n  480 |             }\n  481 | \n  482 |             // Default to msvc\n  483 |             let arch = arch_primary().or_else(arch_fallback)?;\n  484 |             let msvc_tuple = format!(\"{arch}-pc-windows-msvc\");\n  485 |             Some(TargetTuple(msvc_tuple))","lines":25,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/dist/mod.rs#L461-L485"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The doc comment on `Toolchain::ensure_removed` is empty (just `/// Remove the toolchain from disk` followed by two blank doc lines), and `installed_paths`/`get_hash_file` etc. carry stale 'XXX'/'TODO' breadcrumbs. Minor, but the empty trailing doc lines are noise.","fix":"Trim the empty doc lines; convert actionable TODO/XXX notes into tracked issues.","locations":[{"ref":"sr :"Duplicate Code","severity":"low","easy":false,"description":"The active/default status-string match and the toolchain-listing scaffolding are duplicated between `show` (rustup_mode.rs) and `list_toolchains::print_toolchain` (common.rs). Both compute the same `(is_active, is_default) -> \" (active, default)\"` mapping and iterate installed toolchains with near-identical formatting.","fix":"Extract the status-string mapping into a shared helper and reuse it in both places.","locations":[{"ref":"src/cli/rustup_mode.rs:1228-1237","code":" 1228 |         let status_str = match (is_active_toolchain, is_default_toolchain) {\n 1229 |             (true, true) => \" (active, default)\",\n 1230 |             (true, false) => \" (active)\",\n 1231 |             (false, true) => \" (default)\",\n 1232 |             (false, false) => \"\",\n 1233 |         };\n 1234 | \n 1235 |         let mut t = t.lock();\n 1236 | \n 1237 |         writeln!(t, \"{toolchain_name}{CONTEXT}{status_str}{CONTEXT:#}\")?;","lines":10,"link":"https://github.com/rust-lang/rustup/blob/957b0c392a7e67817104ade2baeb03d4f7e874a1/src/cli/rustup_mode.rs#L1228-L1237"},{"ref":"src/cli/common.rs:336-358","code":"  336 |         let status_str = match (is_default, is_active) {\n  337 |             (true, true) => \" (active, default)\",\n  338 |             (true, false) => \" (default)\",\n  339 |             (false, true) => \" (active)\",\n  340 |             (false, false) => \"\",\n  341 |         };\n  342 | \n  343 |         let toolchain_path = cfg.toolchains_dir.join(toolchain);\n  344 |         let toolchain_meta = fs::symlink_metadata(&toolchain_path)?;\n  345 |         let toolchain_path = if verbose {\n  346 |             if toolchain_meta.is_dir() {\n  347 |                 format!(\" {}\", toolchain_path.display())\n  348 |             } else {\n  349 |                 format!(\" {}\", fs::read_link(toolchain_path)?.display())\n  350 |             }\n  351 |         } else {\n  352 |             S
