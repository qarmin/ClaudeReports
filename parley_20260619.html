|                 }\n  135 |             }\n  136 |         }\n  137 |         synth.len = len as u8;\n  138 |         synth","lines":49},{"ref":"fontique/src/font.rs:338","code":"  338 |     vars: [(Tag, f32); 3],","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`DWriteSystemFonts::new(false).unwrap()` will panic the whole `SystemFonts::new` (and thus `Collection::new` with system fonts enabled) if DirectWrite factory creation or system font collection retrieval fails (e.g. in restricted/headless Windows sessions). Every other backend degrades gracefully to an empty `SystemFonts` on failure; the Windows backend hard-unwraps.","fix":"Make `SystemFonts::new` fall back to an empty/default collection when `DWriteSystemFonts::new` returns `Err`, matching the fontconfig/coretext backends.","locations":[{"ref":"fontique/src/backend/dwrite.rs:53-54","code":"   53 |     pub(crate) fn new() -> Self {\n   54 |         let dwrite_fonts = DWriteSystemFonts::new(false).unwrap();","lines":2},{"ref":"fontique/src/backend/dwrite.rs:142-160","code":"  142 |     fn new(update: bool) -> windows_core::Result<Self> {\n  143 |         unsafe {\n  144 |             let factory = DWriteCreateFactory::<IDWriteFactory>(DWRITE_FACTORY_TYPE_SHARED)?;\n  145 |             let mut collection: Option<IDWriteFontCollection> = None;\n  146 |             factory.GetSystemFontCollection(&mut collection, update)?;\n  147 |             let collection = collection.ok_or_else(|| {\n  148 |                 windows_core::Error::new(STATUS_NOT_FOUND.to_hresult(), \"no collection\")\n  149 |             })?;\n  150 |             let fallback = factory\n  151 |                 .cast::<IDWriteFactory2>()\n  152 |                 .and_then(|f| f.GetSystemFontFallback())\n  153 |                 .ok();\n  154 |             Ok(Self {\n  155 |                 collection,\n  156 |                 fallback,\n  157 |                 map_buf: vec![],\n  158 |             })\n  159 |         }\n  160 |     }","lines":19}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"FontRef construction in the shaping hot path uses `.unwrap()` with an adjacent `// TODO: How do we want to handle errors like this?`. A font blob that fontique returned as a match but harfrust cannot parse (corrupt/unsupported table layout) will panic the entire layout instead of falling back. This is reachable with malformed system fonts.","fix":"Handle the error: on `Err`, skip this font segment (or fall back to the next candidate font) rather than unwrapping; at minimum log/debug-assert and `continue` so one bad font does not abort layout.","locations":[{"ref":"parley/src/shape/mod.rs:372-374","code":"  372 |         // TODO: How do we want to handle errors like this?\n  373 |         let font_ref =\n  374 |             harfrust::FontRef::from_index(font.font.blob.as_ref(), font.font.index).unwrap();","lines":3}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Throughout the fontconfig backend, boolean-returning FFI setters (`add_string`, `add_charset`, `add_langset`, `add`) have their return values silently discarded at the call sites in `new`, `fallback`, and `family_uncached`. A failure to add a family/charset/langset to a pattern (e.g. OOM) is ignored and silently produces a degraded match rather than an error or retry.","fix":"Check the boolean results and propagate failure (return None / skip the entry) where a failed add would otherwise corrupt the query semantics.","locations":[{"ref":"fontique/src/backend/fontconfig.rs:677-678","code":"  677 |             let mut pattern = Pattern::new().unwrap();\n  678 |             pattern.add_string(FC_FAMILY, name);","lines":2},{"ref":"fontique/src/backend/fontconfig.rs:748-753","code":"  748 |         if let Some(set) = locale_lang_set {\n  749 |             pattern.add_langset(FC_LANG, &set);\n  750 |         }\n  751 |         if let Some(set) = script_char_set {\n  752 |             pattern.add_charset(FC_CHARSET, set);\n  753 |         }","lines":6},{"ref":"fontique/src/backend/fontconfig.rs:772","code":"  772 |         pattern.add_string(FC_FAMILY, CString::new(name.name()).ok()?.as_c_str());","lines":1}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`SystemFonts::new` (fontconfig) uses `.unwrap()` on `Pattern::new()` and `config.font_sort(&pattern, true)` while building the generic family map. `Pattern::new` returns None on fontconfig OOM and `font_sort` returns `Err` on a non-match; either unwrap panics during collection construction even though the surrounding code is otherwise written to degrade gracefully (returns `Self::default()` on earlier failures).","fix":"Replace the `.unwrap()`s with graceful handling (`let Some(..) = ... else { continue; }` / `let Ok(..) = ... else { continue; }`) so a single generic-family resolution failure does not panic the whole collection.","locations":[{"ref":"fontique/src/backend/fontconfig.rs:677","code":"  677 |             let mut pattern = Pattern::new().unwrap();","lines":1},{"ref":"fontique/src/backend/fontconfig.rs:685","code":"  685 |             let font_set = config.font_sort(&pattern, true).unwrap();","lines":1}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the non-quoted font-family branch, when the UTF-8 decode of the token fails the error is reported at byte offset `start`, but the slice that failed decoding is `start..end` and `start` here is the (whitespace-untrimmed) token start; for a token preceded by whitespace inside the field the reported offset points at leading whitespace rather than the offending byte. Minor diagnostic inaccuracy (UTF-8 validity of a &str-derived slice cannot actually fail here, so this branch is also effectively unreachable for `&str` input).","fix":"Since `source` originates from a `&str`, the `from_utf8` of any sub-slice on char boundaries cannot fail; either remove the unreachable error branch or, if kept for defensiveness, point the offset at the precise failing index.","locations":[{"ref":"parlance/src/font_family.rs:342-355","code":"  342 |         let name = match self\n  343 |             .source\n  344 |             .get(start..end)\n  345 |             .and_then(|bytes| core::str::from_utf8(bytes).ok())\n  346 |         {\n  347 |             Some(s) => s.trim(),\n  348 |             None => {\n  349 |                 self.done = true;\n  350 |                 return Some(Err(ParseFontFamilyError::new(\n  351 |                     ParseFontFamilyErrorKind::InvalidSyntax,\n  352 |                     start,\n  353 |                 )));\n  354 |             }\n  355 |         };","lines":14}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"hard_line_start contains an `unreachable!` that asserts a smaller line index must exist if a larger one does. This is an invariant about Layout internals enforced from the editing layer; if Layout ever produces a sparse/Non-contiguous line index set (or the focus line index is computed against a different/refreshed layout), this becomes a hard panic in production rather than a graceful fallback.","fix":"Replace the unreachable! with a graceful break (treat as start-of-document) so a layout inconsistency degrades gracefully instead of panicking.","locations":[{"ref":"parley/src/editing/selection.rs:347-353","code":"  347 |                 let Some(line) = layout.get(prev_index) else {\n  348 |                     unreachable!(\n  349 |                         \"{hard_line_start_index} is a valid line in the layout, but {prev_index} isn't, despite the latter being smaller.\\n\\\n  350 |                         The layout has {} lines.\",\n  351 |                         layout.len()\n  352 |                     );\n  353 |                 };","lines":7}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`TextSource` (an `IDWriteTextAnalysisSource` implementation) hands DirectWrite raw pointers into `self.text`/`self.locale` slices via `transmute` to `*mut u16`. The COM object is constructed on the stack inside `family_name_for_text` and passed by reference to `MapCharacters`. This is sound only because `MapCharacters` does not retain the source past the call, but the `'a` lifetime is erased through the COM boundary and the implementation casts `*const` to `*mut` for data DirectWrite must treat as read-only. If DirectWrite ever held the reference or wrote through the pointer this would be UB; there is no comment documenting the retain assumption.","fix":"Document the invariant that DirectWrite treats the analysis source as borrowed read-only for the duration of `MapCharacters`, and avoid the `*const -> *mut` transmute by keeping the buffers in a form whose pointer is legitimately mutable, or assert the API contract in a comment.","locations":[{"ref":"fontique/src/backend/dwrite.rs:333-396","code":"  333 | #[implement(IDWriteTextAnalysisSource)]\n  334 | struct TextSource<'a> {\n  335 |     text: &'a [u16],\n  336 |     locale: &'a [u16],\n  337 | }\n  338 | \n  339 | impl IDWriteTextAnalysisSource_Impl for TextSource_Impl<'_> {\n  340 |     fn GetLocaleName(\n  341 |         &self,\n  342 |         textposition: u32,\n  343 |         textlength: *mut u32,\n  344 |         localename: *mut *mut u16,\n  345 |     ) -> windows::core::Result<()> {\n  346 |         unsafe {\n  347 |             *textlength = (self.text.len() as u32).saturating_sub(textposition);\n  348 |             *localename = core::mem::transmute::<*const u16, *mut u16>(self.locale.as_ptr());\n  349 |         }\n  350 |         Ok(())\n  351 |     }\n  352 | \n  353 |     fn GetNumberSubstitution(\n  354 |         &self,\n  355 |         textposition: u32,\n  356 |         textlength: *mut u32,\n  357 |         numbersubstitution: OutRef<'_, IDWriteNumberSubstitution>,\n  358 |     ) -> windows::core::Result<()> {\n  359 |         numbersubstitution.write(None)?;\n  360 |         unsafe {\n  361 |             *textlength = (self.text.len() as u32).saturating_sub(textposition);\n  362 |         }\n  363 |         Ok(())\n  364 |     }\n  365 | \n  366 |     fn GetParagraphReadingDirection(&self) -> DWRITE_READING_DIRECTION {\n  367 |         DWRITE_READING_DIRECTION_LEFT_TO_RIGHT\n  368 |     }\n  369 | \n  370 |     fn GetTextAtPosition(\n  371 |         &self,\n  372 |         textposition: u32,\n  373 |         textstring: *mut *mut u16,\n  374 |         textlength: *mut u32,\n  375 |     ) -> windows::core::Result<()> {\n  376 |         unsafe {\n  377 |             let text = self.text.get(textposition as usize..).unwrap_or_default();\n  378 |             *textlength = text.len() as _;\n  379 |             *textstring = core::mem::transmute::<*const u16, *mut u16>(text.as_ptr());\n  380 |         }\n  381 |         Ok(())\n  382 |     }\n  383 | \n  384 |     fn GetTextBeforePosition(\n  385 |         &self,\n  386 |         textposition: u32,\n  387 |         textstring: *mut *mut u16,\n  388 |         textlength: *mut u32,\n  389 |     ) -> windows::core::Result<()> {\n  390 |         unsafe {\n  391 |             let text = self.text.get(..textposition as usize).unwrap_or_default();\n  392 |             *textlength = text.len() as _;\n  393 |             *textstring = core::mem::transmute::<*const u16, *mut u16>(text.as_ptr());\n  394 |         }\n  395 |         Ok(())\n  396 |     }","lines":64}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"CoreText `create_base_font` calls `CFDictionary::new(...)` and then `attrs.unwrap()`. If dictionary creation returns None this panics inside system-font discovery. Given the rest of the backend is written to fall back gracefully (`scan_system_fonts` returns Option, `unwrap_or_default`), this lone unwrap can abort font enumeration.","fix":"Handle the None case (return a sensible default font or propagate Option) rather than unwrapping.","locations":[{"ref":"fontique/src/backend/coretext.rs:180-184","code":"  180 |     unsafe {\n  181 |         let attrs = CFDictionary::new(None, null_mut(), null_mut(), 0, null(), null());\n  182 |         let desc = CTFontDescriptor::with_attributes(&attrs.unwrap());\n  183 |         CTFont::with_font_descriptor(&desc, 0.0, null())\n  184 |     }","lines":5}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"StyleRunBuilder::push_style asserts `style_index <= u16::MAX as usize` AFTER reading `self.lcx.style_table.len()` as the new index, but the index it returns is the pre-push length. The assert allows a table length of exactly u16::MAX (65535) to push a 65536th style returning index 65535, but the next push would have len == 65536 and `65536 <= 65535` is false so it panics. The boundary is off by one in spirit: a u16 index space supports indices 0..=65535, i.e. 65536 entries, but the assert `len <= u16::MAX` permits pushing at index 65535 and then refuses the 65537th rather than capping cleanly. More importantly it is a hard panic (`assert!`) on a recoverable, data-dependent condition reachable from a public API.","fix":"Assert `style_index < u16::MAX as usize` (so the returned index always fits) or return a `Result`/`Option` instead of panicking when the style table is exhausted.","locations":[{"ref":"parley/src/builder.rs:113-125","code":"  113 |     pub fn push_style<'family, 'settings>(\n  114 |         &mut self,\n  115 |         style: TextStyle<'family, 'settings, B>,\n  116 |     ) -> u16 {\n  117 |         let resolved = self\n  118 |             .lcx\n  119 |             .rcx\n  120 |             .resolve_entire_style_set(self.fcx, &style, self.scale);\n  121 |         let style_index = self.lcx.style_table.len();\n  122 |         assert!(style_index <= u16::MAX as usize, \"too many styles\");\n  123 |         self.lcx.style_table.push(resolved);\n  124 |         style_index as u16\n  125 |     }","lines":13}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"DirectWrite `family_name_for_text` advances the scan position by a single UTF-16 code unit per iteration (`cur_offset += 1`) instead of using the `mapped_len` returned by `MapCharacters`. For multi-character script samples it re-runs the (expensive) fallback mapping for every code unit until a font is found, and never uses the reported `mapped_len`. The early `return Some(...)` on the first successful mapping masks the correctness impact but the per-codepoint loop is wasteful.","fix":"Advance `cur_offset += mapped_len.max(1) as usize` after a successful `MapCharacters` call (or simply return after the first mapping, dropping the loop entirely since the function returns on first match).","locations":[{"ref":"fontique/src/backend/dwrite.rs:200-248","code":"  200 |     fn family_name_for_text(&mut self, text: &str, locale: Option<&str>) -> Option<String> {\n  201 |         self.map_buf.clear();\n  202 |         self.map_buf.extend(text.encode_utf16());\n  203 |         let text_len = self.map_buf.len();\n  204 |         if let Some(locale) = locale {\n  205 |             self.map_buf.extend(locale.encode_utf16());\n  206 |         }\n  207 |         self.map_buf.push(0);\n  208 |         let (text, locale) = self.map_buf.split_at(text_len);\n  209 |         let source: IDWriteTextAnalysisSource = TextSource { text, locale }.into();\n  210 |         unsafe {\n  211 |             let mut cur_offset = 0;\n  212 |             while cur_offset < text_len {\n  213 |                 let mut mapped_len = 0;\n  214 |                 let mut mapped_font = None;\n  215 |                 if let Some(fallback) = self.fallback.as_ref() {\n  216 |                     if fallback\n  217 |                         .MapCharacters(\n  218 |                             &source,\n  219 |                             cur_offset as u32,\n  220 |                             (text_len - cur_offset) as u32,\n  221 |                             &self.collection,\n  222 |                             None,\n  223 |                             DWRITE_FONT_WEIGHT_REGULAR,\n  224 |                             DWRITE_FONT_STYLE_NORMAL,\n  225 |                             DWRITE_FONT_STRETCH_NORMAL,\n  226 |                             &mut mapped_len,\n  227 |                             &mut mapped_font,\n  228 |                             &mut 1.0,\n  229 |                         )\n  230 |                         .is_ok()\n  231 |                     {\n  232 |                         if let Some(font) = mapped_font {\n  233 |                             let family = font.GetFontFamily().ok()?;\n  234 |                             let names = family.GetFamilyNames().ok()?;\n  235 |                             let name_len = names.GetStringLength(0).ok()? as usize;\n  236 |                             let mut name_buf = smallvec::SmallVec::<[u16; 128]>::default();\n  237 |                             name_buf.resize(name_len + 1, 0);\n  238 |                             names.GetString(0, &mut name_buf).ok()?;\n  239 |                             name_buf.pop();\n  240 |                             return Some(String::from_utf16_lossy(&name_buf));\n  241 |                         }\n  242 |                     }\n  243 |                 }\n  244 |                 cur_offset += 1;\n  245 |             }\n  246 |         }\n  247 |         None\n  248 |     }","lines":49}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`Cache::insert` does a linear scan over all existing entries, and for each same-length entry performs a full element-by-element slice equality (`existing == items`). This is O(entries * len) per insert and runs during style resolution for every font-family/variations/features set. For documents with many distinct style spans this is quadratic in the number of cached sequences.","fix":"Index entries by a hash of the item slice (e.g. a `HashMap<u64, SmallVec<index>>` keyed on a content hash) and only do full comparison on hash collisions, or store a hash alongside each entry to skip the slice compare for non-matching lengths/hashes.","locations":[{"ref":"parley/src/resolve/mod.rs:92-116","code":"   92 |     pub(crate) fn insert(&mut self, items: &[T]) -> Resolved<T> {\n   93 |         for (i, entry) in self.entries.iter().enumerate() {\n   94 |             let range = entry.0..entry.1;\n   95 |             if range.len() != items.len() {\n   96 |                 continue;\n   97 |             }\n   98 |             if let Some(existing) = self.items.get(range) {\n   99 |                 if existing == items {\n  100 |                     return Resolved {\n  101 |                         index: i,\n  102 |                         _phantom: core::marker::PhantomData,\n  103 |                     };\n  104 |                 }\n  105 |             }\n  106 |         }\n  107 |         let index = self.entries.len();\n  108 |         let start = self.items.len();\n  109 |         self.items.extend(items.iter().cloned());\n  110 |         let end = self.items.len();\n  111 |         self.entries.push((start, end));\n  112 |         Resolved {\n  113 |             index,\n  114 |             _phantom: core::marker::PhantomData,\n  115 |         }\n  116 |     }","lines":25}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"In the harfrust shaping segment loop, `item_text[..segment_start_offset].chars().count()` and `segment_text.chars().count()` re-walk substrings of the item text on every font segment to recover char counts that were already known while building clusters. For long runs split into many font segments this is repeated O(n) UTF-8 scanning in the hottest path (shaping).","fix":"Track the running char index/count as clusters are consumed in the segmentation loop (the cluster boundaries already give char counts) and pass the segment's char start/count directly instead of recomputing with `chars().count()`.","locations":[{"ref":"parley/src/shape/mod.rs:474-478","code":"  474 |         let char_start = char_range.start + item_text[..segment_start_offset].chars().count();\n  475 |         let segment_char_start = char_start - char_range.start;\n  476 |         let segment_char_count = segment_text.chars().count();\n  477 |         let segment_infos =\n  478 |             &item_infos[segment_char_start..(segment_char_start + segment_char_count)];","lines":5}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`update_active_for_boundary` maintains the active set with `Vec::binary_search` + `Vec::insert`/`Vec::remove`, each O(n) due to element shifting. For a segment with many simultaneously active spans this makes per-boundary work O(active_len) per event and O(active_len^2) worst case across a boundary, undercutting the otherwise linear bucketed-events design.","fix":"If active-set sizes can be large, consider a different structure (e.g. a presence bitset/array indexed by span id with a separate ordered list, or tombstoning) so removals/insertions avoid mid-vector shifts; for small active sets the current approach is fine and this can be left as-is with a note.","locations":[{"ref":"attributed_text/src/attribute_segments.rs:163-180","code":"  163 | fn update_active_for_boundary(workspace: &mut AttributeSegmentsWorkspace, boundary_index: usize) {\n  164 |     let end_range = workspace.end_offsets[boundary_index] as usize\n  165 |         ..workspace.end_offsets[boundary_index + 1] as usize;\n  166 |     for &id in &workspace.end_events[end_range] {\n  167 |         if let Ok(ix) = workspace.active.binary_search(&id) {\n  168 |             workspace.active.remove(ix);\n  169 |         }\n  170 |     }\n  171 | \n  172 |     let start_range = workspace.start_offsets[boundary_index] as usize\n  173 |         ..workspace.start_offsets[boundary_index + 1] as usize;\n  174 |     for &id in &workspace.start_events[start_range] {\n  175 |         match workspace.active.binary_search(&id) {\n  176 |             Ok(_) => {}\n  177 |             Err(ix) => workspace.active.insert(ix, id),\n  178 |         }\n  179 |     }\n  180 | }","lines":18}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`SystemFonts::new` (fontconfig) iterates every system font pattern only to populate the family-name map, then for each generic family does a separate `font_sort` with `trim` and dedup via a fresh `HashSet`. The initial full enumeration over `font_set.iter()` constructs a `Pattern` (with an `FcPatternReference` refcount bump) for every system font just to read FC_FAMILY strings, which is the dominant cost of collection construction on systems with many fonts.","fix":"This is largely inherent to fontconfig, but consider avoiding the per-font `Pattern` wrapper (and its refcount churn) by reading FC_FAMILY directly from the raw `FcPattern` during the initial enumeration, or lazily building the name map.","locations":[{"ref":"fontique/src/backend/fontconfig.rs:656-672","code":"  656 |         let mut name_map = FamilyNameMap::default();\n  657 |         for pattern in font_set.iter() {\n  658 |             let mut i = 0;\n  659 | \n  660 |             let mut first_name_id = None;\n  661 |             // For fonts with more than one family name, the second one is\n  662 | ide) {\n  451 |             let forced = lb_override(LineBreakContext {\n  452 |                 before_before: prev_prev_char,\n  453 |                 before: prev,\n  454 |                 after: ch,\n  455 |             });\n  456 |             if let Some(forced) = forced {\n  457 |                 is_line = forced;\n  458 |             }\n  459 |         }\n  460 |         prev_prev_char = prev_char;\n  461 |         prev_char = Some(ch);","lines":12}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"build_into_layout sorts inline_boxes with `sort_by_key(|b| b.index)` on every build even when there are zero or one inline boxes, and copies the full style table into the layout via `extend(... .map(as_layout_style))`. as_layout_style is called once per style-table entry per build. For the common hot path of many small re-layouts these are minor but unconditional; the sort in particular allocates/recurses for the general case when a cheap `is_sorted` check or len<=1 early-out would skip it.","fix":"Guard the sort with `if lcx.inline_boxes.len() > 1` (and optionally a sortedness check), since the typical case has no inline boxes.","locations":[{"ref":"parley/src/builder.rs:321-329","code":"  321 |     // Copy the visual styles into the layout\n  322 |     layout\n  323 |         .data\n  324 |         .styles\n  325 |         .extend(lcx.style_table.iter().map(|s| s.as_layout_style()));\n  326 | \n  327 |     // Sort the inline boxes as subsequent code assumes that they are in text index order.\n  328 |     // Note: It's important that this is a stable sort to allow users to control the order of contiguous inline boxes\n  329 |     lcx.inline_boxes.sort_by_key(|b| b.index);","lines":9}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"next_visual_word / previous_visual_word call self.next_visual/previous_visual in a loop, and each iteration recomputes visual_clusters (which itself does two Cluster::from_byte_index lookups). For long whitespace runs or long lines this is O(n) cluster lookups per word jump, repeated; on large buffers word navigation can become noticeably slow. Same pattern in hard_line_start/hard_line_end which scan line-by-line.","fix":"Consider caching the cluster pair across the loop iterations (the `right` of one step is the `left` of the next) to avoid redundant from_byte_index lookups.","locations":[{"ref":"parley/src/editing/cursor.rs:195-243","code":"  195 |     pub fn next_visual_word<B: Brush>(&self, layout: &Layout<B>) -> Self {\n  196 |         let mut cur = *self;\n  197 |         loop {\n  198 |             let next = cur.next_visual(layout);\n  199 |             if next == cur {\n  200 |                 break;\n  201 |             }\n  202 |             cur = next;\n  203 |             let [Some(left), Some(right)] = cur.visual_clusters(layout) else {\n  204 |                 break;\n  205 |             };\n  206 |             if left.is_rtl() {\n  207 |                 if left.is_word_boundary() && !left.is_space_or_nbsp() {\n  208 |                     break;\n  209 |                 }\n  210 |             } else if right.is_word_boundary() && !left.is_space_or_nbsp() {\n  211 |                 break;\n  212 |             }\n  213 |         }\n  214 |         cur\n  215 |     }\n  216 | \n  217 |     /// Returns a new cursor that is positioned at the previous word boundary\n  218 |     /// in visual order.\n  219 |     #[must_use]\n  220 |     pub fn previous_visual_word<B: Brush>(&self, layout: &Layout<B>) -> Self {\n  221 |         let mut cur = *self;\n  222 |         loop {\n  223 |             let next = cur.previous_visual(layout);\n  224 |             if next == cur {\n  225 |                 break;\n  226 |             }\n  227 |             cur = next;\n  228 |             let [Some(left), Some(right)] = cur.visual_clusters(layout) else {\n  229 |                 break;\n  230 |             };\n  231 |             if left.is_rtl() {\n  232 |                 if left.is_word_boundary()\n  233 |                     && (left.is_space_or_nbsp()\n  234 |                         || (right.is_word_boundary() && !right.is_space_or_nbsp()))\n  235 |                 {\n  236 |                     break;\n  237 |                 }\n  238 |             } else if right.is_word_boundary() && !right.is_space_or_nbsp() {\n  239 |                 break;\n  240 |             }\n  241 |         }\n  242 |         cur\n  243 |     }","lines":49},{"ref":"parley/src/editing/selection.rs:339-429","code":"  339 |     pub fn hard_line_start<B: Brush>(&self, layout: &Layout<B>, extend: bool) -> Self {\n  340 |         if let Some((mut hard_line_start_index, line)) = self.focus.line(layout) {\n  341 |             let mut result_byte_index = line.text_range().start;\n  342 |             loop {\n  343 |                 if hard_line_start_index == 0 {\n  344 |                     break;\n  345 |                 }\n  346 |                 let prev_index = hard_line_start_index - 1;\n  347 |                 let Some(line) = layout.get(prev_index) else {\n  348 |                     unreachable!(\n  349 |                         \"{hard_line_start_index} is a valid line in the layout, but {prev_index} isn't, despite the latter being smaller.\\n\\\n  350 |                         The layout has {} lines.\",\n  351 |                         layout.len()\n  352 |                     );\n  353 |                 };\n  354 |                 if matches!(line.break_reason(), BreakReason::Explicit) {\n  355 |                     // The start of the line 'hard_line_start_index' is the target point.\n  356 |                     break;\n  357 |                 }\n  358 |                 result_byte_index = line.text_range().start;\n  359 |                 hard_line_start_index = prev_index;\n  360 |             }\n  361 |             self.maybe_extend(\n  362 |                 Cursor::from_byte_index(layout, result_byte_index, Affinity::Downstream),\n  363 |                 extend,\n  364 |             )\n  365 |         } else {\n  366 |             *self\n  367 |         }\n  368 |     }\n  369 | \n  370 |     /// Returns a new selection with the focus moved to the end of the\n  371 |     /// current line.\n  372 |     ///\n  373 |     /// If `extend` is `true` then the current anchor will be retained,\n  374 |     /// otherwise the new selection will be collapsed.\n  375 |     #[must_use]\n  376 |     pub fn line_end<B: Brush>(&self, layout: &Layout<B>, extend: bool) -> Self {\n  377 |         if let Some((_, line)) = self.focus.line(layout) {\n  378 |             let (index, affinity) = (line.break_reason() == BreakReason::Explicit)\n  379 |                 .then(|| {\n  380 |                     Cluster::from_byte_index(layout, line.text_range().end - 1)\n  381 |                         .map(|cluster| (cluster.text_range().start, Affinity::Downstream))\n  382 |                 })\n  383 |                 .flatten()\n  384 |                 .unwrap_or_else(|| (line.text_range().end, Affinity::Upstream));\n  385 |             self.maybe_extend(Cursor::from_byte_index(layout, index, affinity), extend)\n  386 |         } else {\n  387 |             *self\n  388 |         }\n  389 |     }\n  390 | \n  391 |     /// Returns a new selection with the focus moved to just before the next hard line break.\n  392 |     ///\n  393 |     /// If `extend` is `true` then the current anchor will be retained,\n  394 |     /// otherwise the new selection will be collapsed.\n  395 |     #[must_use]\n  396 |     pub fn hard_line_end<B: Brush>(&self, layout: &Layout<B>, extend: bool) -> Self {\n  397 |         if let Some((mut hard_line_end_index, line)) = self.focus.line(layout) {\n  398 |             let mut result_byte_index = line.text_range().end;\n  399 |             // If we're already on the last line of the hard line, use that.\n  400 |             if !matches!(line.break_reason(), BreakReason::Explicit) {\n  401 |                 // Otherwise, check if any of the following lines are the last line of the hard line.\n  402 |                 loop {\n  403 |                     let next_index = hard_line_end_index + 1;\n  404 |                     if let Some(line) = layout.get(next_index) {\n  405 |                         result_byte_index = line.text_range().end;\n  406 |                         hard_line_end_index = next_index;\n  407 |                         if matches!(line.break_reason(), BreakReason::Explicit) {\n  408 |                             // result_byte_index is the last byte of the previous line, so is the value we need\n  409 |                             break;\n  410 |                         }\n  411 |                     } else {\n  412 |                         // We hit the end of text. Select to the end of the \"final\" line, which was not an EOF.\n  413 |                         return self.maybe_extend(\n  414 |                             Cursor::from_byte_index(layout, result_byte_index, Affinity::Upstream),\n  415 |                             extend,\n  416 |                         );\n  417 |                     }\n  418 |                 }\n  419 |             }\n  420 | \n  421 |             // We want to select to \"before\" the newline character in the hard line, so we have downstream affinity on the boundary before it.\n  422 |             self.maybe_extend(\n  423 |                 Cursor::from_byte_index(layout, result_byte_index - 1, Affinity::Downstream),\n  424 |                 extend,\n  425 |             )\n  426 |         } else {\n  427 |             *self\n  428 |         }\n  429 |     }","lines":91}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`finish_span` is called with cloned vectors (`character_lengths.clone()`, `character_positions.clone()`, `character_widths.clone()`, `word_starts.clone()`, `span_text.clone()`) on every style-boundary span split, then the originals are immediately `.clear()`ed. This allocates and copies the entire span's character data twice per intermediate span.","fix":"Pass the vectors by move using `core::mem::take`, then the originals are already empty and the subsequent `.clear()` calls become no-ops, avoiding the clone+clear churn.","locations":[{"ref":"parley/src/layout/accessibility.rs:217-237","code":"  217 |                             finish_span(\n  218 |                                 &mut node,\n  219 |                                 x_offset,\n  220 |                                 y_offset,\n  221 |                                 metrics,\n  222 |                                 run_offset,\n  223 |                                 span_offset,\n  224 |                                 span_advance,\n  225 |                                 span_text.clone(),\n  226 |                                 character_lengths.clone(),\n  227 |                                 character_positions.clone(),\n  228 |                                 character_widths.clone(),\n  229 |                                 word_starts.clone(),\n  230 |                             );\n  231 |                             span_offset += span_advance;\n  232 |                             span_advance = 0.0;\n  233 |                             span_text.clear();\n  234 |                             character_lengths.clear();\n  235 |                             character_positions.clear();\n  236 |                             character_widths.clear();\n  237 |                             word_starts.clear();","lines":21}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Cluster::from_byte_index` does a linear scan over every run and every cluster in the line to find the cluster containing a byte index. It is called from hot paths like `next_logical`/`previous_logical` when crossing run boundaries. The containing line is already found via binary search, but within the line the cluster lookup is O(clusters).","fix":"Binary-search clusters within the run by text range (clusters are in logical/text order within a run for LTR; handle RTL), instead of a full linear scan.","locations":[{"ref":"parley/src/layout/cluster.rs:36-54","code":"   36 |     pub fn from_byte_index(layout: &'a Layout<B>, byte_index: usize) -> Option<Self> {\n   37 |         let mut path = ClusterPath::default();\n   38 |         if let Some((line_index, line)) = layout.line_for_byte_index(byte_index) {\n   39 |             path.line_index = line_index as u32;\n   40 |             for run in line.runs() {\n   41 |                 path.run_index = run.index;\n   42 |                 if !run.text_range().contains(&byte_index) {\n   43 |                     continue;\n   44 |                 }\n   45 |                 for (cluster_index, cluster) in run.clusters().enumerate() {\n   46 |                     path.logical_index = cluster_index as u32;\n   47 |                     if cluster.text_range().contains(&byte_index) {\n   48 |                         return path.cluster(layout);\n   49 |                     }\n   50 |                 }\n   51 |             }\n   52 |         }\n   53 |         None\n   54 |     }","lines":19}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"LruCache::entry takes `make_data: impl FnOnce() -> T` and `id: K` by value and always converts `id.into()` only on miss, which is fine, but `entry` increments `self.epoch` on every access including pure hits and never resets it. epoch is a `u64` so practical overflow is negligible, however every hit also performs a full linear scan that early-returns - acceptable given the documented design. The real concern: on a miss with a full cache the eviction picks the entry with the smallest epoch via a single pass, but `lowest_index` is initialized to 0 and only updated when `entry.epoch < lowest_serial` where `lowest_serial` starts at the current `epoch`. The most-recently-touched entry has `epoch == self.epoch` (set in `entry` after increment) so it is correctly never selected; this is correct but fragile and entirely undocumented.","fix":"Add a comment explaining the epoch invariant (stored epochs are always < the live `self.epoch` at scan time, so the LRU victim is well-defined), or initialize `lowest_serial`/`lowest_index` from the first entry to make the intent explicit.","locations":[{"ref":"parley/src/lru_cache.rs:37-78","code":"   37 |     pub(crate) fn entry<K>(&mut self, id: K, make_data: impl FnOnce() -> T) -> &T\n   38 |     where\n   39 |         K: Equivalent<ID> + Into<ID>,\n   40 |     {\n   41 |         let index = self.find_entry(id, make_data);\n   42 |         self.epoch += 1;\n   43 |         let entry = &mut self.entries[index];\n   44 |         entry.epoch = self.epoch;\n   45 |         &entry.data\n   46 |     }\n   47 | \n   48 |     fn find_entry<K>(&mut self, id: K, make_data: impl FnOnce() -> T) -> usize\n   49 |     where\n   50 |         K: Equivalent<ID> + Into<ID>,\n   51 |     {\n   52 |         let epoch = self.epoch;\n   53 |         let mut lowest_serial = epoch;\n   54 |         let mut lowest_index = 0;\n   55 |         for (i, entry) in self.entries.iter().enumerate() {\n   56 |             if id.equivalent(&entry.id) {\n   57 |                 return i;\n   58 |             }\n   59 |             if entry.epoch < lowest_serial {\n   60 |                 lowest_serial = entry.epoch;\n   61 |                 lowest_index = i;\n   62 |             }\n   63 |         }\n   64 |         if self.entries.len() < self.max_entries {\n   65 |             lowest_index = self.entries.len();\n   66 |             self.entries.push(Entry {\n   67 |                 epoch,\n   68 |                 id: id.into(),\n   69 |                 data: make_data(),\n   70 |             });\n   71 |         } else {\n   72 |             let entry = &mut self.entries[lowest_index];\n   73 |             entry.epoch = epoch;\n   74 |             entry.id = id.into();\n   75 |             entry.data = make_data();\n   76 |         }\n   77 |         lowest_index\n   78 |     }","lines":42}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"ShapeInstanceKey/ShapePlanKey equivalence compares the full feature/variation slices element-by-element on every cache probe (`features.iter().zip(...).all(...)` and `variations == ...as_deref()`). For runs with many features this adds linear comparison cost to each shaping lookup. Acceptable given small feature counts, but the From conversion also allocates a fresh Vec/Box for features and variations on every cache miss.","fix":"If feature/variation lists grow, consider hashing the lists into the key id once and comparing the hash first; the per-miss allocation is unavoidable for owned keys but could reuse a pool.","locations":[{"ref":"parley/src/shape/cache.rs:145-177","code":"  145 | impl<'a> Equivalent<ShapePlanId> for ShapePlanKey<'a> {\n  146 |     #[inline(always)]\n  147 |     fn equivalent(&self, key: &ShapePlanId) -> bool {\n  148 |         self.font_blob_id == key.font_blob_id\n  149 |             && self.font_index == key.font_index\n  150 |             && *self.synthesis == key.synthesis\n  151 |             && self.direction == key.direction\n  152 |             && self.script == key.script\n  153 |             && self.language == key.language\n  154 |             && self.features.len() == key.features.len()\n  155 |             && self.variations == key.variations.as_deref()\n  156 |             && self\n  157 |                 .features\n  158 |                 .iter()\n  159 |                 .zip(key.features.iter())\n  160 |                 .all(|(a, b)| a == b)\n  161 |     }\n  162 | }\n  163 | \n  164 | impl<'a> From<ShapePlanKey<'a>> for ShapePlanId {\n  165 |     #[inline(always)]\n  166 |     fn from(key: ShapePlanKey<'a>) -> Self {\n  167 |         Self {\n  168 |             font_blob_id: key.font_blob_id,\n  169 |             font_index: key.font_index,\n  170 |             synthesis: *key.synthesis,\n  171 |             direction: key.direction,\n  172 |             script: key.script,\n  173 |             language: key.language,\n  174 |             features: key.features.to_vec().into(),\n  175 |             variations: key.variations.map(|v| v.to_vec().into()),\n  176 |         }\n  177 |     }","lines":33}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In shape_item the harfrust unicode buffer is filled char-by-char with `buffer.add(ch, i as u32)` in a manual loop specifically to keep cluster indices aligned to `infos`. This is correct but bypasses any bulk reserve/copy fast path; combined with the recomputed `chars().count()` it means the segment text is iterated multiple times (fill clusters, count chars for infos slice, add to buffer). Consolidating these passes would reduce per-segment overhead in the shaping hot loop.","fix":"Compute the segment's char count once during the `buffer.add` loop and reuse it for the `segment_infos` slice, eliminating the separate `chars().count()` passes.","locations":[{"ref":"parley/src/shape/mod.rs:444-455","code":"  444 |         // Use the entire segment text including newlines\n  445 |         buffer.reserve(segment_text.len());\n  446 |         for (i, ch) in segment_text.chars().enumerate() {\n  447 |             // Ensure that each cluster's index matches the index into `infos`. This is required\n  448 |             // for efficient cluster lookup within `data.rs`.\n  449 |             //\n  450 |             // In other words, instead of using `buffer.push_str`, which iterates `segment_text`\n  451 |             // with `char_indices`, push each char individually via `.chars` with a cluster index\n  452 |             // that matches its `infos` counterpart. This allows us to lookup `infos` via cluster\n  453 |             // index in `data.rs`.\n  454 |             buffer.add(ch, i as u32);\n  455 |         }","lines":12},{"ref":"parley/src/shape/mod.rs:474-478","code":"  474 |         let char_start = char_range.start + item_text[..segment_start_offset].chars().count();\n  475 |         let segment_char_start = char_start - char_range.start;\n  476 |         let segment_char_count = segment_text.chars().count();\n  477 |         let segment_infos =\n  478 |             &item_infos[segment_char_start..(segment_char_start + segment_char_count)];","lines":5}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Inner::sync_shared` performs a full deep clone of `CommonData` (family names, families map, generic families, fallbacks) whenever the shared version differs. Combined with `fallback_families`, `family_names`, `family_id`, etc. all calling `sync_shared` on entry, any concurrent modification triggers a complete copy of the registered-font metadata on the next call from each clone. The code comments acknowledge this ('ugly deep copy').","fix":"If shared mutation becomes common, switch to finer-grained change tracking or persistent/immutable data structures to avoid full deep copies on every version bump.","locations":[{"ref":"fontique/src/collection/mod.rs:567-581","code":"  567 |     fn sync_shared(&mut self) {\n  568 |         #[cfg(feature = \"std\")]\n  569 |         if let Some(shared) = &self.shared {\n  570 |             let version = shared.version.load(Ordering::Acquire);\n  571 |             if self.shared_version != version {\n  572 |                 // This is an ugly deep copy, but the assumption is that\n  573 |                 // modifications to font collections are fairly rare.\n  574 |                 // If this becomes a problem, do more fine grained tracking\n  575 |                 // of changes.\n  576 |                 self.data = shared.data.lock().unwrap().clone();\n  577 |                 self.shared_version = version;\n  578 |                 self.fallback_cache.reset();\n  579 |             }\n  580 |         }\n  581 |     }","lines":15}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`parse_u16_feature_value` performs redundant range checking: it already bails with OutOfRange when `value > u16::MAX as u32` inside the loop, then still calls `u16::try_from(value)` with a fresh `OutOfRange` mapping. The `try_from` can never fail at that point.","fix":"Replace `u16::try_from(value).map_err(...)` with `Ok(value as u16)` (the in-loop guard already ensures `value <= u16::MAX`), or drop the in-loop guard and rely solely on `try_from`.","locations":[{"ref":"parlance/src/tag.rs:163-174","code":"  163 |             let mut value: u32 = 0;\n  164 |             for &b in value_str.as_bytes() {\n  165 |                 let digit = (b - b'0') as u32;\n  166 |                 value = value\n  167 |                     .checked_mul(10)\n  168 |                     .and_then(|v| v.checked_add(digit))\n  169 |                     .ok_or(ParseSettingsErrorKind::OutOfRange)?;\n  170 |                 if value > u16::MAX as u32 {\n  171 |                     return Err(ParseSettingsErrorKind::OutOfRange);\n  172 |                 }\n  173 |             }\n  174 |             u16::try_from(value).map_err(|_| ParseSettingsErrorKind::OutOfRange)","lines":12}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In bidi resolve_sequence's N0 rule, for every OtherNeutral character a binary search over all brackets in the paragraph is performed (`self.brackets.binary_search_by(|x| x.0.cmp(&index))`). For text with many neutrals and many brackets this is O(neutrals * log brackets) per sequence. Brackets are already collected in index order, so a merge-style single pass aligned with the sequence indices could replace the repeated binary searches.","fix":"Walk the brackets list with a cursor advanced alongside the sequence positions (both are ordered by original index) instead of binary-searching per neutral character.","locations":[{"ref":"parley/src/bidi.rs:491-512","code":"  491 |             for i in 0..len {\n  492 |                 if types[i] != BidiClass::OtherNeutral {\n  493 |                     continue;\n  494 |                 }\n  495 |                 let index = self.indices[i];\n  496 |                 if let Ok(index) = self.brackets.binary_search_by(|x| x.0.cmp(&index)) {\n  497 |                     let (_, ch, bracket) = self.brackets[index];\n  498 |                     match bracket.paired_bracket_type {\n  499 |                         BidiPairedBracketType::Open => {\n  500 |                             if bracket_stack.depth == MAX_BRACKET_STACK {\n  501 |                                 break;\n  502 |                             }\n  503 |                             bracket_stack.push(i, bracket.mirroring_glyph.unwrap());\n  504 |                         }\n  505 |                         BidiPairedBracketType::Close => {\n  506 |                             if let Some(open) = bracket_stack.find_and_pop(ch) {\n  507 |                                 self.bracket_pairs.push((open, i));\n  508 |                             }\n  509 |                         }\n  510 |                         _ => {}\n  511 |                     }\n  512 |                 }","lines":22}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`_reorder`, `_is_reset` and `_RESET_MASK` are defined but never used anywhere in the crate (only the line-break code has its own local reorder logic). They are underscore-prefixed to suppress warnings, i.e. intentionally-retained dead code that adds maintenance surface and can drift out of correctness silently.","fix":"Remove `_reorder`, `_is_reset`, and `_RESET_MASK`, or document why they are kept and wire them in. If kept for future use, add a `// TODO`/`#[allow]` with a concrete reason.","locations":[{"ref":"parley/src/bidi.rs:680-717","code":"  680 | pub(crate) fn _reorder<F>(order: &mut [usize], levels: F)\n  681 | where\n  682 |     F: Fn(usize) -> BidiLevel,\n  683 | {\n  684 |     let mut max_level = 0;\n  685 |     let mut lowest_odd_level = 255;\n  686 |     for (i, o) in order.iter_mut().enumerate() {\n  687 |         *o = i;\n  688 |         let level = levels(i);\n  689 |         if level > max_level {\n  690 |             max_level = level;\n  691 |         }\n  692 |         if level & 1 != 0 && level < lowest_odd_level {\n  693 |             lowest_odd_level = level;\n  694 |         }\n  695 |     }\n  696 |     let len = order.len();\n  697 |     for level in (lowest_odd_level..=max_level).rev() {\n  698 |         let mut i = 0;\n  699 |         while i < len {\n  700 |             if levels(i) >= level {\n  701 |                 let mut end = i + 1;\n  702 |                 while end < len && levels(end) >= level {\n  703 |                     end += 1;\n  704 |                 }\n  705 |                 let mut j = i;\n  706 |                 let mut k = end - 1;\n  707 |                 while j < k {\n  708 |                     order.swap(j, k);\n  709 |                     j += 1;\n  710 |                     k -= 1;\n  711 |                 }\n  712 |                 i = end;\n  713 |             }\n  714 |             i += 1;\n  715 |         }\n  716 |     }\n  717 | }","lines":38},{"ref":"parley/src/bidi.rs:742-755","code":"  742 | const _RESET_MASK: u32 =\n  743 |     ISOLATE_MASK | mask(BidiClass::PopDirectionalIsolate) | mask(BidiClass::WhiteSpace);\n  744 | \n  745 | fn is_isolate_initiator(ty: BidiClass) -> bool {\n  746 |     mask(ty) & ISOLATE_MASK != 0\n  747 | }\n  748 | \n  749 | pub(crate) fn is_remov <script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);

const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};

// State
const S = {

  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));

}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
