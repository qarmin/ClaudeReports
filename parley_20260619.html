<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"WordBreakSegmentIter advances `self.char_indices` with `.next().unwrap()` while scanning to a style boundary (`while self.current_char.0 < style_start_index { ... self.char_indices.next().unwrap() }`). This assumes every `style_run.range.start` lands on a char boundary at or before text end. If style run ranges are ever inconsistent with the text (e.g. a range.start beyond the last char, or not on a char boundary), this unwraps `None` and panics. `new()` similarly unwraps the first `char_indices.next()`.","fix":"These rely on invariants established by the style builders; add a debug assertion documenting the invariant, and consider returning/handling `None` gracefully (break out and emit the remaining substring) rather than panicking, since the input ultimately derives from user style ranges.","locations":[{"ref":"parley/src/analysis/mod.rs:295-298","code":"  295 |                 while self.current_char.0 < style_start_index {\n  296 |                     prev_char_index = self.current_char;\n  297 |                     self.current_char = self.char_indices.next().unwrap();\n  298 |                 }","lines":4},{"ref":"parley/src/analysis/mod.rs:258-259","code":"  258 |             let mut char_indices = text.char_indices();\n  259 |             let current_char_len = char_indices.next().unwrap();","lines":2}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In the bidi N0 bracket-pair rule, an opening bracket's mirroring glyph is unwrapped unconditionally: `bracket_stack.push(i, bracket.mirroring_glyph.unwrap())`. The code only checks `paired_bracket_type == Open`, but does not guarantee that `mirroring_glyph` is `Some`. If ICU ever reports a paired-bracket-type of Open without a mirroring glyph (or for any future data inconsistency), this panics inside the hot bidi resolution path on attacker-supplied text.","fix":"Use `if let Some(mirror) = bracket.mirroring_glyph { bracket_stack.push(i, mirror); }` (or `let Some(..) else { continue; }`) instead of `.unwrap()`, so malformed/unexpected bracket data is skipped rather than panicking.","locations":[{"ref":"parley/src/bidi.rs:498-504","code":"  498 |                     match bracket.paired_bracket_type {\n  499 |                         BidiPairedBracketType::Open => {\n  500 |                             if bracket_stack.depth == MAX_BRACKET_STACK {\n  501 |                                 break;\n  502 |                             }\n  503 |                             bracket_stack.push(i, bracket.mirroring_glyph.unwrap());\n  504 |                         }","lines":7}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"set_compose computes the new preedit range as `start..start + text.len()` without checking that `start` is a valid char boundary in all paths. When not already composing and the selection is non-collapsed, `start = self.editor.selection.text_range().start`, which is a cursor index and is a char boundary. However the bigger risk is that `start + text.len()` and the subsequent `cursor_at(start + cursor.0)` / `cursor_at(start + cursor.1)` can land on non-char-boundary or out-of-range indices because `cursor` byte offsets come from the IME and are only debug_asserted (`cursor.1 <= text.len()`) - in release builds an IME supplying a cursor offset that is not on a char boundary of `text`, or `cursor.0 > text.len()`, will produce indices that are not char boundaries. cursor_at -> Cursor::from_byte_index tolerates out-of-range (clamps to text_len) but a mid-char index will snap via Cluster::from_byte_index; this is at least a correctness hazard and the asserts give a false sense of validation.","fix":"Validate IME-provided cursor offsets at runtime (not just debug_assert): clamp each to `text.len()` and round to the nearest char boundary of `text` before adding to `start`, and reject/clamp if not on a boundary.","locations":[{"ref":"parley/src/editing/editor.rs:359-392","code":"  359 |     pub fn set_compose(&mut self, text: &str, cursor: Option<(usize, usize)>) {\n  360 |         debug_assert!(!text.is_empty());\n  361 |         debug_assert!(cursor.map(|cursor| cursor.1 <= text.len()).unwrap_or(true));\n  362 | \n  363 |         let start = if let Some(preedit_range) = &self.editor.compose {\n  364 |             self.editor\n  365 |                 .buffer\n  366 |                 .replace_range(preedit_range.clone(), text);\n  367 |             preedit_range.start\n  368 |         } else {\n  369 |             if self.editor.selection.is_collapsed() {\n  370 |                 self.editor\n  371 |                     .buffer\n  372 |                     .insert_str(self.editor.selection.text_range().start, text);\n  373 |             } else {\n  374 |                 self.editor\n  375 |                     .buffer\n  376 |                     .replace_range(self.editor.selection.text_range(), text);\n  377 |             }\n  378 |             self.editor.selection.text_range().start\n  379 |         };\n  380 |         self.editor.compose = Some(start..start + text.len());\n  381 |         self.editor.show_cursor = cursor.is_some();\n  382 |         self.update_layout();\n  383 | \n  384 |         // Select the location indicated by the IME. If `cursor` is none, collapse the selection to\n  385 |         // a caret at the start of the preedit text. As `self.editor.show_cursor` is `false`, it\n  386 |         // won't show up.\n  387 |         let cursor = cursor.unwrap_or((0, 0));\n  388 |         self.editor.set_selection(Selection::new(\n  389 |             self.editor.cursor_at(start + cursor.0),\n  390 |             self.editor.cursor_at(start + cursor.1),\n  391 |         ));\n  392 |     }","lines":34}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`process_clusters` calls `char_indices_iter.next().unwrap()` in several places (lines 662, 753, 773) and `glyph_infos.first().unwrap()` (665) and indexes `char_infos[cluster_id as usize]` (667, 758-759, 778, 841-842). These assume HarfRust glyph cluster IDs and component counts stay perfectly in sync with the source char iterator and char_infos length. If shaping returns a cluster id / num_components that exceeds the available chars (e.g. malformed font, unexpected ligature merge), the `unwrap()` on an exhausted iterator panics, or the `char_infos[...]` index goes out of bounds.","fix":"Replace the `unwrap()`s with graceful fallbacks (break out of the loop on `None`) and use checked indexing (`char_infos.get(idx)`) so malformed shaping output cannot panic the layout.","locations":[{"ref":"parley/src/layout/data.rs:662-667","code":"  662 |     let mut cluster_start_char = char_indices_iter.next().unwrap();\n  663 |     let mut total_glyphs: u32 = 0;\n  664 |     let mut cluster_glyph_offset: u32 = 0;\n  665 |     let start_cluster_id = glyph_infos.first().unwrap().cluster;\n  666 |     let mut cluster_id = start_cluster_id;\n  667 |     let mut char_info = char_infos[cluster_id as usize];","lines":6},{"ref":"parley/src/layout/data.rs:751-778","code":"  751 |                 // Skip characters until we reach the current cluster\n  752 |                 for i in 1..num_components {\n  753 |                     cluster_start_char = char_indices_iter.next().unwrap();\n  754 |                     if to_whitespace(cluster_start_char.1) == Whitespace::Space {\n  755 |                         break;\n  756 |                     }\n  757 |                     let char_info_ = match direction {\n  758 |                         Direction::Ltr => char_infos[(cluster_id + i) as usize],\n  759 |                         Direction::Rtl => char_infos[(cluster_id + num_components - i) as usize],\n  760 |                     };\n  761 |                     push_cluster(\n  762 |                         clusters,\n  763 |                         char_info_,\n  764 |                         cluster_start_char,\n  765 |                         cluster_glyph_offset,\n  766 |                         cluster_advance,\n  767 |                         total_glyphs,\n  768 |                         ClusterType::LigatureComponent,\n  769 |                         None,\n  770 |                     );\n  771 |                 }\n  772 |             }\n  773 |             cluster_start_char = char_indices_iter.next().unwrap();\n  774 | \n  775 |             cluster_advance = 0.0;\n  776 |             last_cluster_id = cluster_id;\n  777 |             cluster_id = glyph_info.cluster;\n  778 |             char_info = char_infos[cluster_id as usize];","lines":28},{"ref":"parley/src/layout/data.rs:836-843","code":"  836 |             for (i, char) in (1..).zip(char_indices_iter) {\n  837 |                 if to_whitespace(char.1) == Whitespace::Space {\n  838 |                     break;\n  839 |                 }\n  840 |                 let component_char_info = match direction {\n  841 |                     Direction::Ltr => char_infos[(cluster_id + i) as usize],\n  842 |                     Direction::Rtl => char_infos[(cluster_id + num_components - i) as usize],\n  843 |                 };","lines":8}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`enclosing_char_span` contains `unreachable!()` if the backward scan reaches index 0 without finding a char boundary. This is reached only via a `TextStorage` implementor whose `is_char_boundary` is inconsistent (reports a non-boundary index but reports index 0 as a non-boundary too). Because `TextStorage` is a public, user-implementable trait, a buggy or adversarial impl turns a validation error into a hard panic inside error construction.","fix":"Replace the `unreachable!()` with a graceful fallback: break out of the loop (or return `Some((0, index))`/`None`) when `s == 0`, so a misbehaving `TextStorage` yields a best-effort `BoundaryInfo` rather than panicking.","locations":[{"ref":"attributed_text/src/error.rs:195-207","code":"  195 |     let mut s = index;\n  196 |     for _ in 0..4 {\n  197 |         // We can never wrap around `0` here, as when `s == 0` before the decrement,\n  198 |         // the previous call to `text.is_char_boundary` (either in this loop or above)\n  199 |         // will have returned `true`.\n  200 |         if s == 0 {\n  201 |             unreachable!(\"`s` should never reach 0 before finding a char boundary\");\n  202 |         }\n  203 |         s -= 1;\n  204 |         if text.is_char_boundary(s) {\n  205 |             break;\n  206 |         }\n  207 |     }","lines":13}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"build_into_layout walks style_runs and indexes `lcx.info[char_index]` once per char in each run's byte range, incrementing char_index unconditionally. If the supplied style runs collectively contain more characters than the analyzed text (e.g. overlapping byte ranges supplied through StyleRunBuilder, or ranges extending past text after clamping inconsistencies), this indexes out of bounds and panics. The only guards are StyleRunBuilder's contiguity/coverage asserts; a malformed-but-asserts-passing run set (or RangedBuilder producing runs whose byte ranges slice multi-byte chars) is not defended here.","fix":"Use `lcx.info.get_mut(char_index)` and break/clamp on `None`, or assert `char_index == lcx.info.len()` after the loop with a clear message rather than relying on an implicit panic.","locations":[{"ref":"parley/src/builder.rs:313-319","code":"  313 |     let mut char_index = 0;\n  314 |     for style_run in &lcx.style_runs {\n  315 |         for _ in text[style_run.range.clone()].chars() {\n  316 |             lcx.info[char_index].1 = style_run.style_index;\n  317 |             char_index += 1;\n  318 |         }\n  319 |     }","lines":7}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"to_access_position unwraps `layout_access.span_paths_by_cluster_path.get(&path)` directly. Every other map lookup in this function uses `?` to return None on a miss; this lone `.unwrap()` will panic if the cluster path is not present in the accessibility map (e.g. a stale LayoutAccessibility relative to the layout, or a path produced for a phantom/edge cluster).","fix":"Replace `.unwrap()` with `?` to gracefully return None, consistent with the surrounding lookups.","locations":[{"ref":"parley/src/editing/cursor.rs:416-420","code":"  416 |             let span_path = layout_access.span_paths_by_cluster_path.get(&path).unwrap();\n  417 |             (\n  418 |                 *span_path,\n  419 |                 path.logical_index() - span_path.logical_index() + offset,\n  420 |             )","lines":5}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`finish_line` accesses `self.lines.lines[idx - 1]` (line 901) and indexes `self.lines.lines[line_idx]` (903) directly. It is called from `start_new_line` with `self.lines.lines.len() - 1`, which underflows/panics if `commit_line` did not push a line. `commit_line` always pushes, so it is safe today, but the direct indexing is fragile relative to the unwrap on `last_line_data` (line 365) which already assumes a line exists.","fix":"Since the invariant is that commit_line always pushes, add a debug_assert documenting it, or return early/Option to make the dependency explicit.","locations":[{"ref":"parley/src/layout/line_break.rs:898-903","code":"  898 |     fn finish_line(&mut self, line_idx: usize, line_height: f32) {\n  899 |         let prev_line_metrics = match line_idx {\n  900 |             0 => None,\n  901 |             idx => Some(self.lines.lines[idx - 1].metrics),\n  902 |         };\n  903 |         let line = &mut self.lines.lines[line_idx];","lines":6},{"ref":"parley/src/layout/line_break.rs:354-365","code":"  354 |         self.finish_line(self.lines.lines.len() - 1, line_height);\n  355 | \n  356 |         self.state.line_y += line_height as f64;\n  357 | \n  358 |         Some(YieldData::LineBreak(\n  359 |             self.last_line_data(reason, line_y_start),\n  360 |         ))\n  361 |     }\n  362 | \n  363 |     #[inline(always)]\n  364 |     fn last_line_data(&self, reason: BreakReason, line_y_start: f64) -> LineBreakData {\n  365 |         let line = self.lines.lines.last().unwrap();","lines":12}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`text_offset` is stored as `u16` (ClusterData.text_offset) and computed as `cluster_start_char.0 as u16` where `.0` is a byte offset into the source text. For runs whose text spans more than 65535 bytes, this truncates the offset, producing wrong `text_range()` results (cluster.rs text_range uses `run.text_range.start + text_offset`). Large text runs are externally-influenced input.","fix":"Either document/enforce a max run byte length, or widen `text_offset` to `u32`, or store offsets relative to the run start with a checked cast that splits runs before overflow.","locations":[{"ref":"parley/src/layout/data.rs:959","code":"  959 |         text_offset: cluster_start_char.0 as u16,","lines":1},{"ref":"parley/src/layout/data.rs:32","code":"   32 |     pub(crate) text_offset: u16,","lines":1}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`FontInfo::synthesis` casts an oblique angle to `i8` via `synth.skew = degrees as i8`. `degrees` comes from font data / `FontStyle::Oblique(angle)` and is an unclamped `f32`. An out-of-range or NaN angle truncates/saturates unexpectedly (e.g. 200.0 -> -56, NaN -> 0), producing a wrong faux-oblique skew. The italic branch hardcodes 14 which is safe, but the oblique branch does not clamp.","fix":"Clamp the angle before casting, e.g. `synth.skew = degrees.clamp(-90.0, 90.0) as i8;` and handle NaN explicitly.","locations":[{"ref":"fontique/src/font.rs:121-132","code":"  121 |                 FontStyle::Oblique(angle) => {\n  122 |                     if self.style == FontStyle::Normal {\n  123 |                         let degrees = angle.unwrap_or(14.0);\n  124 |                         if self.has_slant_axis() {\n  125 |                             synth.vars[len] = (Tag::new(b\"slnt\"), degrees);\n  126 |                             len += 1;\n  127 |                         } else if self.has_italic_axis() && degrees > 0. {\n  128 |                             synth.vars[len] = (Tag::new(b\"ital\"), 1.0);\n  129 |                             len += 1;\n  130 |                         } else {\n  131 |                             synth.skew = degrees as i8;\n  132 |                         }","lines":12}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`FontWeight::from_fontconfig` divides by `fc_b - fc_a` during linear interpolation. The first two MAP entries are `(0,0)` and `(100,0)`, both with fontconfig value 0. For a negative `weight` input the loop enters the `weight < fc_b` branch at i=1 with fc_a=0, fc_b=0, yielding a division by zero (`t` becomes +/-inf or NaN) and a garbage `FontWeight`. Fontconfig FC_WEIGHT values are read from font/config data and are not validated to be non-negative.","fix":"Guard against `fc_b == fc_a` (skip/clamp), or clamp `weight` to `>= 0` before interpolation.","locations":[{"ref":"fontique/src/impl_fontconfig.rs:50-69","code":"   50 |         for i in 1..MAP.len() {\n   51 |             let (ot_b, fc_b) = MAP[i];\n   52 |             if weight == fc_b {\n   53 |                 return Self::new(ot_b as f32);\n   54 |             }\n   55 | \n   56 |             // Linear interpolation if not an exact match.\n   57 |             if weight < fc_b {\n   58 |                 let weight = weight as f32;\n   59 |                 let fc_b = fc_b as f32;\n   60 |                 let ot_b = ot_b as f32;\n   61 | \n   62 |                 let (ot_a, fc_a) = MAP[i - 1];\n   63 |                 let fc_a = fc_a as f32;\n   64 |                 let ot_a = ot_a as f32;\n   65 | \n   66 |                 let t = (weight - fc_a) / (fc_b - fc_a);\n   67 |                 return Self::new(ot_a + (ot_b - ot_a) * t);\n   68 |             }\n   69 |         }","lines":20}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"resolve_range computes `*n + 1` for both an excluded start bound and an included end bound without overflow protection. If a caller passes a range whose start is `Bound::Excluded(usize::MAX)` or whose end is `Bound::Included(usize::MAX)` the addition overflows, panicking in debug builds and wrapping to 0 in release builds (turning a tail range into an empty/inverted range silently). Such ranges are reachable from the public `RangedBuilder::push` / `StyleRunBuilder::push_style_run` APIs which accept arbitrary `impl RangeBounds<usize>`.","fix":"Use saturating/checked arithmetic, e.g. `n.saturating_add(1)` for the `Excluded` start and `Included` end arms (then clamp with `.min(len)` as already done).","locations":[{"ref":"parley/src/builder.rs:354-366","code":"  354 | fn resolve_range(range: impl RangeBounds<usize>, len: usize) -> Range<usize> {\n  355 |     let start = match range.start_bound() {\n  356 |         Bound::Unbounded => 0,\n  357 |         Bound::Included(n) => *n,\n  358 |         Bound::Excluded(n) => *n + 1,\n  359 |     };\n  360 |     let end = match range.end_bound() {\n  361 |         Bound::Unbounded => len,\n  362 |         Bound::Included(n) => *n + 1,\n  363 |         Bound::Excluded(n) => *n,\n  364 |     };\n  365 |     start.min(len)..end.min(len)\n  366 | }","lines":13}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Style indices are stored and cast as u16 throughout (StyleRun::style_index, Char::style_index, ResolvedStyle table index `as u16`). resolve_current_style_id does `self.style_table.len() as u16` and range.rs does `style_index as u16` with no bounds check. A document with more than 65535 distinct resolved styles silently truncates the index, mapping runs to the wrong style (and potentially out-of-bounds on lookup if the truncated value collides differently).","fix":"Add a debug assertion (`debug_assert!(self.style_table.len() <= u16::MAX as usize)`) or return an error when the style table exceeds u16 capacity, so truncation is detected rather than silently corrupting style assignment.","locations":[{"ref":"parley/src/resolve/tree.rs:155-157","code":"  155 |         let style_id = self.style_table.len() as u16;\n  156 |         self.style_table.push(self.current_style());\n  157 |         self.tree[self.current_span].style_id = Some(style_id);","lines":3},{"ref":"parley/src/resolve/range.rs:158-163","code":"  158 |         for (style_index, style) in styles.drain(..).enumerate() {\n  159 |             style_table.push(style.style);\n  160 |             style_runs.push(StyleRun {\n  161 |                 style_index: style_index as u16,\n  162 |                 range: style.range,\n  163 |             });","lines":6}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In the ligature-advance loop, `run.get` expects an index relative to the run's `cluster_range.start` (it adds `range.start` internally, see run.rs:118-130). Everywhere else in this loop the absolute `self.state.cluster_idx` is converted to relative via `- cluster_start` (line 558). But here the absolute `self.state.cluster_idx + 1` is passed directly to `run.get`, which then adds `cluster_start` again. For any run whose `cluster_range.start != 0` (i.e. every run except the first), this reads/accumulates the wrong clusters and advances `cluster_idx` based on the wrong cluster, corrupting ligature advance and line-break iteration.","fix":"Use a relative index: `run.get(self.state.cluster_idx - cluster_start + 1)`, matching the conversion used at line 558.","locations":[{"ref":"parley/src/layout/line_break.rs:607-615","code":"  607 |                         if cluster.is_ligature_start() {\n  608 |                             while let Some(cluster) = run.get(self.state.cluster_idx + 1) {\n  609 |                                 if !cluster.is_ligature_continuation() {\n  610 |                                     break;\n  611 |                                 } else {\n  612 |                                     advance += cluster.advance();\n  613 |                                     self.state.cluster_idx += 1;\n  614 |                                 }\n  615 |                             }","lines":9}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"LayoutContext::clone discards all internal state and returns a brand new instance (`Self::new()`). This silently violates the usual `Clone` contract that a clone equals the original. While the internal state is scratch space, callers cloning a configured/warmed context (font caches, shape caches, analysis data sources) get a cold default instead, which is surprising and can cause performance cliffs or subtle behavioral differences. The behavior is documented only in a terse inline comment.","fix":"Either implement a real clone, or do not implement `Clone` at all (force callers to construct a new context explicitly), or rename to a `fresh()`/`new_like()` method so the non-cloning semantics are explicit.","locations":[{"ref":"parley/src/context.rs:199-204","code":"  199 | impl<B: Brush> Clone for LayoutContext<B> {\n  200 |     fn clone(&self) -> Self {\n  201 |         // None of the internal state is visible so just return a new instance.\n  202 |         Self::new()\n  203 |     }\n  204 | }","lines":6}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"previous_visual_word and next_visual_word use asymmetric word-boundary conditions that look like a copy/paste/refactor divergence. next_visual_word's non-RTL branch tests `right.is_word_boundary() && !left.is_space_or_nbsp()` (mixing right's boundary flag with left's space check), while previous_visual_word's non-RTL branch tests `right.is_word_boundary() && !right.is_space_or_nbsp()`. The RTL branches also differ (next checks `left.is_word_boundary() && !left.is_space_or_nbsp()`; previous has a compound condition involving both left and right). The `!left.is_space_or_nbsp()` in next_visual_word's else branch is suspicious - it pairs right's boundary with left's whitespace, which can cause the word-forward stop to skip or stop at the wrong boundary around spaces.","fix":"Audit the four branches against the intended word-navigation semantics; the non-RTL forward branch most likely should test `right.is_word_boundary() && !right.is_space_or_nbsp()` (matching the backward variant) so forward/backward word motion is symmetric around whitespace.","locations":[{"ref":"parley/src/editing/cursor.rs:195-243","code":"  195 |     pub fn next_visual_word<B: Brush>(&self, layout: &Layout<B>) -> Self {\n  196 |         let mut cur = *self;\n  197 |         loop {\n  198 |             let next = cur.next_visual(layout);\n  199 |             if next == cur {\n  200 |                 break;\n  201 |             }\n  202 |             cur = next;\n  203 |             let [Some(left), Some(right)] = cur.visual_clusters(layout) else {\n  204 |                 break;\n  205 |             };\n  206 |             if left.is_rtl() {\n  207 |                 if left.is_word_boundary() && !left.is_space_or_nbsp() {\n  208 |                     break;\n  209 |                 }\n  210 |             } else if right.is_word_boundary() && !left.is_space_or_nbsp() {\n  211 |                 break;\n  212 |             }\n  213 |         }\n  214 |         cur\n  215 |     }\n  216 | \n  217 |     /// Returns a new cursor that is positioned at the previous word boundary\n  218 |     /// in visual order.\n  219 |     #[must_use]\n  220 |     pub fn previous_visual_word<B: Brush>(&self, layout: &Layout<B>) -> Self {\n  221 |         let mut cur = *self;\n  222 |         loop {\n  223 |             let next = cur.previous_visual(layout);\n  224 |             if next == cur {\n  225 |                 break;\n  226 |             }\n  227 |             cur = next;\n  228 |             let [Some(left), Some(right)] = cur.visual_clusters(layout) else {\n  229 |                 break;\n  230 |             };\n  231 |             if left.is_rtl() {\n  232 |                 if left.is_word_boundary()\n  233 |                     && (left.is_space_or_nbsp()\n  234 |                         || (right.is_word_boundary() && !right.is_space_or_nbsp()))\n  235 |                 {\n  236 |                     break;\n  237 |                 }\n  238 |             } else if right.is_word_boundary() && !right.is_space_or_nbsp() {\n  239 |                 break;\n  240 |             }\n  241 |         }\n  242 |         cur\n  243 |     }","lines":49}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"update_compose_for_replaced_range only adjusts the compose range for shrink/grow when the edit is entirely before (`compose.start >= old_range.end`) or entirely after, or an overlap that shrinks. For an edit that overlaps the compose region and GROWS (new_len > old_range.len() with old_range overlapping compose), no branch handles it: the final `if new_len < old_range.len()` block is skipped and compose end is left stale, so the preedit range no longer covers the intended text. Most callers pass new_len=0 (deletion) so this is latent, but replace_selection passes s.len() and could overlap a compose region.","fix":"Add handling for the overlap-and-grow case (clamp/extend compose.end relative to old_range.start + new_len), or document/guarantee that edits never overlap an active compose region.","locations":[{"ref":"parley/src/editing/editor.rs:1133-1160","code":" 1133 |     fn update_compose_for_replaced_range(&mut self, old_range: Range<usize>, new_len: usize) {\n 1134 |         if new_len == old_range.len() {\n 1135 |             return;\n 1136 |         }\n 1137 |         let Some(compose) = &mut self.compose else {\n 1138 |             return;\n 1139 |         };\n 1140 |         if compose.end <= old_range.start {\n 1141 |             return;\n 1142 |         }\n 1143 |         if compose.start >= old_range.end {\n 1144 |             if new_len > old_range.len() {\n 1145 |                 let diff = new_len - old_range.len();\n 1146 |                 *compose = compose.start + diff..compose.end + diff;\n 1147 |             } else {\n 1148 |                 let diff = old_range.len() - new_len;\n 1149 |                 *compose = compose.start - diff..compose.end - diff;\n 1150 |             }\n 1151 |             return;\n 1152 |         }\n 1153 |         if new_len < old_range.len() {\n 1154 |             if compose.start >= (old_range.start + new_len) {\n 1155 |                 self.compose = None;\n 1156 |                 return;\n 1157 |             }\n 1158 |             compose.end = compose.end.min(old_range.start + new_len);\n 1159 |         }\n 1160 |     }","lines":28}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"move_lines treats `delta` inconsistently at the extremes. For `delta < 0` it uses `line_index.checked_add_signed(delta).is_none()` to detect underflow and then jumps to line 0 + line_start. For `delta > 0` it uses `new_line_index > line_limit` where `new_line_index = line_index.saturating_add_signed(delta)`. Because the negative branch relies on checked_add_signed returning None, a moderate negative delta that does NOT underflow but still goes below 0 cannot happen (saturating_add_signed already saturates to 0), so a delta like -5 from line 2 lands on line 0 via the fall-through `move_to_line(new_line_index=0)` WITHOUT the `line_start` adjustment that the underflow branch applies. This makes move_to_text_start (isize::MIN) and a plain previous-line-past-top behave differently: only the saturating-to-MIN path gets line_start. Inconsistent caret column at the top of the document.","fix":"Treat clamping-to-0 and clamping-to-line_limit symmetrically: when the computed target is clamped (delta<0 and result==0 while line_index>0, or delta>0 and result==line_limit while line_index<line_limit), apply line_start/line_end respectively, rather than keying off checked_add_signed overflow.","locations":[{"ref":"parley/src/editing/selection.rs:266-287","code":"  266 |     pub fn move_lines<B: Brush>(&self, layout: &Layout<B>, delta: isize, extend: bool) -> Self {\n  267 |         if delta == 0 {\n  268 |             return *self;\n  269 |         }\n  270 |         let line_limit = layout.len().saturating_sub(1);\n  271 |         let geometry = self.focus.geometry(layout, 0.0);\n  272 |         let line_index = layout\n  273 |             .line_for_offset(geometry.y0 as f32)\n  274 |             .map(|(ix, _)| ix)\n  275 |             .unwrap_or(line_limit);\n  276 |         let new_line_index = line_index.saturating_add_signed(delta);\n  277 |         if delta < 0 && line_index.checked_add_signed(delta).is_none() {\n  278 |             return self\n  279 |                 .move_to_line(layout, 0, extend)\n  280 |                 .line_start(layout, extend);\n  281 |         } else if delta > 0 && new_line_index > line_limit {\n  282 |             return self\n  283 |                 .move_to_line(layout, line_limit, extend)\n  284 |                 .line_end(layout, extend);\n  285 |         }\n  286 |         self.move_to_line(layout, new_line_index, extend)\n  287 |     }","lines":22}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`is_emoji` claims to detect emoji but only matches a hand-picked set of Unicode blocks and the comment itself notes it should defer to ICU4X properties. It misses many emoji (e.g. regional indicators, U+1F900-1FAFF supplemental symbols, keycaps, skin-tone modifiers) and includes non-emoji codepoints in 0x2600-0x27BF (e.g. dingbats). Callers relying on `Cluster::is_emoji()` will get wrong results.","fix":"Use proper Unicode Emoji property data (ICU4X `Emoji`/`Emoji_Presentation`) as the TODO indicates, or clearly document the limited coverage.","locations":[{"ref":"parley/src/layout/data.rs:88-91","code":"   88 |     pub(crate) fn is_emoji(self) -> bool {\n   89 |         // TODO: Defer to ICU4X properties (see: https://docs.rs/icu/latest/icu/properties/props/struct.Emoji.html).\n   90 |         matches!(self.source_char as u32, 0x1F600..=0x1F64F | 0x1F300..=0x1F5FF | 0x1F680..=0x1F6FF | 0x2600..=0x26FF | 0x2700..=0x27BF)\n   91 |     }","lines":4}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`finish` (data.rs) applies word/letter spacing by mutating `cluster.advance` and the last glyph's advance, but it can be called only once safely. There is no guard preventing double application; if the layout pipeline calls `finish` more than once (or after justification which also mutates advances) spacing is applied repeatedly. Unlike justification (which has `is_aligned_justified` + `unjustify`), there is no idempotency tracking for spacing.","fix":"Document that `finish` must be called exactly once, or track an applied flag; ensure interaction with unjustify/re-align does not re-run spacing.","locations":[{"ref":"parley/src/layout/data.rs:525-551","code":"  525 |     pub(crate) fn finish(&mut self) {\n  526 |         for run in &self.runs {\n  527 |             let word = run.word_spacing;\n  528 |             let letter = run.letter_spacing;\n  529 |             if nearly_zero(word) && nearly_zero(letter) {\n  530 |                 continue;\n  531 |             }\n  532 |             let clusters = &mut self.clusters[run.cluster_range.clone()];\n  533 |             for cluster in clusters {\n  534 |                 let mut spacing = letter;\n  535 |                 if !nearly_zero(word) && cluster.info.whitespace().is_space_or_nbsp() {\n  536 |                     spacing += word;\n  537 |                 }\n  538 |                 if !nearly_zero(spacing) {\n  539 |                     cluster.advance += spacing;\n  540 |                     if cluster.glyph_len != 0xFF {\n  541 |                         let start = run.glyph_start + cluster.glyph_offset as usize;\n  542 |                         let end = start + cluster.glyph_len as usize;\n  543 |                         let glyphs = &mut self.glyphs[start..end];\n  544 |                         if let Some(last) = glyphs.last_mut() {\n  545 |                             last.advance += spacing;\n  546 |                         }\n  547 |                     }\n  548 |                 }\n  549 |             }\n  550 |         }\n  551 |     }","lines":27}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`break_next_with_length`: after `append_inline_box_to_line` for a non-InFlow box, it `continue`s the `while self.state.item_idx < item_count` loop. `append_inline_box_to_line` increments `item_idx`, so progress is made, but the box is appended to the line with height 0.0 and is NOT counted toward `char_count`, contradicting the doc comment 'Each inline box also counts as 1 character.' Non-InFlow boxes silently break the documented character accounting.","fix":"Either count non-InFlow boxes as a character to match the docs, or update the documentation to state only InFlow boxes count.","locations":[{"ref":"parley/src/layout/line_break.rs:737-740","code":"  737 |                     if inline_box.kind != InlineBoxKind::InFlow {\n  738 |                         self.state.append_inline_box_to_line(self.state.line.x, 0.0);\n  739 |                         continue;\n  740 |                     }","lines":4},{"ref":"parley/src/layout/line_break.rs:717-718","code":"  717 |     ///\n  718 |     /// Inline boxes are supported and each contributes as 1 character.","lines":2}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`commit_line` computes `first_run_pos`/`last_run_pos` with `position(is_text_run).unwrap_or(0)` / `rposition(is_text_run).unwrap_or(0)`. When the committed item slice contains NO text run (e.g. only inline boxes), both default to 0, so the cluster-range override logic at lines 1208-1213 is applied to item index 0 even though it is not a text run. Because that item is an InlineBox the override branch is never hit for it, so the effect is benign today, but the `unwrap_or(0)` silently masks the 'no text run' case and is a latent bug if item 0's kind changes.","fix":"Guard the override with an explicit check that a text run exists (e.g. use `Option<usize>` and only apply start/end overrides when `Some`), instead of defaulting the position to 0.","locations":[{"ref":"parley/src/layout/line_break.rs:1172-1174","code":" 1172 |     let is_text_run = |item: &LayoutItem| item.kind == LayoutItemKind::TextRun;\n 1173 |     let first_run_pos = items_to_commit.iter().position(is_text_run).unwrap_or(0);\n 1174 |     let last_run_pos = items_to_commit.iter().rposition(is_text_run).unwrap_or(0);","lines":3}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`reorder_line_items` initializes `lowest_odd_level = 255`. If no run has an odd bidi level, `lowest_odd_level` stays 255 and the loop `(lowest_odd_level..=max_level).rev()` is empty (since max_level < 255 for any real text), so no reordering happens - correct. But if `max_level` itself were 255 (pathological deeply-nested bidi), the range `255..=255` runs even with no odd levels. More importantly the function is only invoked when `needs_reorder` (any non-zero level) is true, so the guard is external; the 255 sentinel is an implicit coupling that is easy to break.","fix":"Use `Option<u8>` for the lowest odd level (skip the loop when None) instead of the 255 sentinel.","locations":[{"ref":"parley/src/layout/line_break.rs:1305-1325","code":" 1305 | fn reorder_line_items(runs: &mut [LineItemData]) {\n 1306 |     let run_count = runs.len();\n 1307 | \n 1308 |     // Find the max level and the min *odd* level\n 1309 |     let mut max_level = 0;\n 1310 |     let mut lowest_odd_level = 255;\n 1311 |     for run in runs.iter() {\n 1312 |         let level = run.bidi_level;\n 1313 |         let is_odd = level & 1 != 0;\n 1314 | \n 1315 |         // Update max level\n 1316 |         if level > max_level {\n 1317 |             max_level = level;\n 1318 |         }\n 1319 | \n 1320 |         // Update min odd level\n 1321 |         if is_odd && level < lowest_odd_level {\n 1322 |             lowest_odd_level = level;\n 1323 |         }\n 1324 |     }\n 1325 | ","lines":21}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In select_font, the Status::Discard branch records the *first* discarded font (`if selected_font.is_none()`), but the Status::Keep branch overwrites `selected_font` every time a better-or-equal ratio font is seen and returns Continue. Because `cluster.map` only returns Keep when `best_ratio` strictly improves, fonts with equal coverage to the current best return Discard and are ignored - correct. However, if the very first font yields Keep (partial coverage) and a later font yields Discard with the same partial ratio, the Keep font is retained, which is intended; but if the first font yields Discard (records it) and no later font ever yields Keep/Complete, the returned font is whichever was recorded first regardless of relative coverage among discards. This means among multiple zero/low-coverage fonts the selection is order-dependent rather than best-coverage.","fix":"If the intent is to fall back to the best-coverage font even among discards, track and keep the highest-ratio font seen rather than only the first discarded one; otherwise document that discard fallback is intentionally first-match.","locations":[{"ref":"parley/src/shape/mod.rs:633-657","code":"  633 |             match map_status {\n  634 |                 Status::Complete => {\n  635 |                     selected_font = Some(SelectedFont {\n  636 |                         font: font.clone(),\n  637 |                         attrs: self.attrs,\n  638 |                     });\n  639 |                     fontique::QueryStatus::Stop\n  640 |                 }\n  641 |                 Status::Keep => {\n  642 |                     selected_font = Some(SelectedFont {\n  643 |                         font: font.clone(),\n  644 |                         attrs: self.attrs,\n  645 |                     });\n  646 |                     fontique::QueryStatus::Continue\n  647 |                 }\n  648 |                 Status::Discard => {\n  649 |                     if selected_font.is_none() {\n  650 |                         selected_font = Some(SelectedFont {\n  651 |                             font: font.clone(),\n  652 |                             attrs: self.attrs,\n  653 |                         });\n  654 |                     }\n  655 |                     fontique::QueryStatus::Continue\n  656 |                 }\n  657 |             }","lines":25}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`AttributedText::attributes_for_range` is documented to yield attributes that 'overlap the given range', but `TextRange::overlaps` uses strictly-less comparisons (`start < other.end && end > other.start`), so a zero-length query range (start == end) never overlaps anything and a zero-length attribute span is never reported. Callers querying an insertion point (caret position) get no attributes even when a span covers that point. This may be intended but is undocumented and surprising.","fix":"Document that empty ranges never overlap (and that empty spans are excluded), or provide a point-query path (reuse `attributes_at`) for callers needing caret-position semantics.","locations":[{"ref":"attributed_text/src/text_range.rs:104-107","code":"  104 |     #[inline]\n  105 |     pub const fn overlaps(self, other: Self) -> bool {\n  106 |         self.start < other.end && self.end > other.start\n  107 |     }","lines":4},{"ref":"attributed_text/src/attributed_text.rs:131-142","code":"  131 |     pub fn attributes_for_range(\n  132 |         &self,\n  133 |         range: TextRange,\n  134 |     ) -> impl Iterator<Item = (TextRange, &Attr)> {\n  135 |         self.attributes.iter().filter_map(move |(attr_span, attr)| {\n  136 |             if attr_span.overlaps(range) {\n  137 |                 Some((*attr_span, attr))\n  138 |             } else {\n  139 |                 None\n  140 |             }\n  141 |         })\n  142 |     }","lines":12}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Android `fonts.xml` parsing: when a `<family>` has a `name` attribute, the inner loop over `child.children()` is an empty body (only TODO comments) so no fonts are ever associated with the named family from XML; and the `und-<script>` branch uses `scr.parse().unwrap_or(Script::UNKNOWN)`, silently mapping malformed script tags to UNKNOWN which then pollutes `script_fallback` with bogus UNKNOWN -> family y":"low","easy":false,"description":"`unicode_to_mac_roman` truncates the input codepoint to `u16` (`let u = c as u16`) before searching `UNICODE_TO_MAC_ROMAN`. A supplementary-plane codepoint that shares the low 16 bits with a Mac Roman entry (e.g. U+1F8FF vs U+F8FF) would falsely match. The caller only invokes this for `is_mac_roman && c > 0x7F`, and Mac Roman targets are all BMP, but the silent truncation is a latent correctness hazard for codepoints > 0xFFFF.","fix":"Return 0 early when `c > 0xFFFF` before truncating, or compare against `c` (u32) widened entries.","locations":[{"ref":"fontique/src/charmap.rs:121-127","code":"  121 | fn unicode_to_mac_roman(c: u32) -> u32 {\n  122 |     let u = c as u16;\n  123 |     let Some(index) = UNICODE_TO_MAC_ROMAN.iter().position(|m| *m == u) else {\n  124 |         return 0;\n  125 |     };\n  126 |     (0x80 + index) as u32\n  127 | }","lines":7}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Inner::clear` (non-no_std shared branch) clears the shared store under the lock, bumps the version, and then unconditionally falls through to `self.data.clear()` at the end of the function. The trailing `self.data.clear()` runs in BOTH the shared and unshared branches, so in the unshared branch `self.data.clear()` executes twice. It is harmless (idempotent) but indicates the control flow was not intended; the shared branch also clears local `data` immediately, which will be re-synced from the shared store on next `sync_shared`, making the intent unclear.","fix":"Move `self.data.clear()` into the `else` branch only (mirroring the other shared/unshared methods), so the shared branch relies on `sync_shared` and the unshared branch clears once.","locations":[{"ref":"fontique/src/collection/mod.rs:556-565","code":"  556 |     pub fn clear(&mut self) {\n  557 |         #[cfg(feature = \"std\")]\n  558 |         if let Some(shared) = &self.shared {\n  559 |             shared.data.lock().unwrap().clear();\n  560 |             shared.bump_version();\n  561 |         } else {\n  562 |             self.data.clear();\n  563 |         }\n  564 |         self.data.clear();\n  565 |     }","lines":10}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`scan_path_impl` checks `if depth > max_depth { return None; }` only AFTER confirming the path is a directory, and recurses with `depth + 1`. With `max_depth = 0` (used by the CoreText backend and the default `from_paths(..., 0)`), the top-level directory has depth 0 so it is read, and its entries are visited at depth 1 which exceeds max_depth and are skipped only if they are themselves directories - regular font files at depth 1 are still scanned. The semantics of `max_depth` are therefore off-by-one / ambiguous (it limits directory recursion depth, not file depth), and the CoreText path relies on this quirk implicitly.","fix":"Clarify and document the meaning of `max_depth`; check the depth bound before issuing the `read_dir` recursion so the limit is consistent for both files and directories.","locations":[{"ref":"fontique/src/scan.rs:147-168","code":"  147 | #[cfg(feature = \"std\")]\n  148 | fn scan_path_impl(\n  149 |     path: &Path,\n  150 |     max_depth: u32,\n  151 |     f: &mut impl FnMut(&ScannedFont<'_>),\n  152 |     depth: u32,\n  153 | ) -> Option<()> {\n  154 |     let metadata = path.metadata().ok()?;\n  155 |     if metadata.is_dir() {\n  156 |         if depth > max_depth {\n  157 |             return None;\n  158 |         }\n  159 |         for entry in std::fs::read_dir(path).ok()?.filter_map(|entry| entry.ok()) {\n  160 |             scan_path_impl(entry.path().as_path(), max_depth, f, depth + 1);\n  161 |         }\n  162 |     } else {\n  163 |         let file = std::fs::File::open(path).ok()?;\n  164 |         let mapped = unsafe { memmap2::Mmap::map(&file) }.ok()?;\n  165 |         scan_memory_impl(&mapped, Some(path), f);\n  166 |     }\n  167 |     Some(())\n  168 | }","lines":22}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The fast-path in analyze_text (single word-break style, `substring_index == 0 && last`) calls `line_boundary_positions.pop()` to drop ICU's trailing boundary, but only after confirming at least three boundaries exist. If the text is a single grapheme such that the segmenter yields exactly two boundaries (start + end), the code `continue`s before pushing anything (second.is_none()/third.is_none() guards), which is fine; but the comment 'Remove the unnecessary boundary at the end added by ICU4X' assumes the popped value is always the trailing sentinel. If ICU ever emits the final real boundary at the same position as the sentinel only once (no duplicate), this pop removes a real line boundary at end-of-text. Worth verifying against ICU's documented contract.","fix":"Instead of unconditionally popping the last collected boundary, drop boundaries equal to `substring.len()` explicitly (as the slow path does with `pos == substring.len()`), making both paths consistent and robust to ICU emitting a single end boundary.","locations":[{"ref":"parley/src/analysis/mod.rs:346-369","code":"  346 |         // Fast path for text with a single word-break option.\n  347 |         if substring_index == 0 && last {\n  348 |             let mut lb_iter = lcx\n  349 |                 .analysis_data_sources\n  350 |                 .line_segmenter(word_break_strength)\n  351 |                 .segment_str(substring);\n  352 | \n  353 |             let _first = lb_iter.next();\n  354 |             let second = lb_iter.next();\n  355 |             if second.is_none() {\n  356 |                 continue;\n  357 |             }\n  358 |             let third = lb_iter.next();\n  359 |             if third.is_none() {\n  360 |                 continue;\n  361 |             }\n  362 | \n  363 |             let iter = [second.unwrap(), third.unwrap()].into_iter().chain(lb_iter);\n  364 | \n  365 |             line_boundary_positions.extend(iter);\n  366 |             // Remove the unnecessary boundary at the end added by ICU4X.\n  367 |             line_boundary_positions.pop();\n  368 |             break;\n  369 |         }","lines":24}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The doc comment above the boundary fold says it shifts line-break data forward one ('Shift line break data forward one ...'), but the fold body does not perform any shift; the shifting is actually done earlier via the mandatory-linebreak fold accumulator and the `pos == substring.len() - last_len` carry-back logic in the line-boundary collection loop. The comment describes behavior that is not where it is attached, which is misleading for future maintainers.","fix":"Move/rewrite the comment to describe what the fold actually does (promoting boundary to Mandatory when the previous char was a mandatory line break via `is_mandatory_linebreak`), and document the real forward-shift mechanism where it occurs.","locations":[{"ref":"parley/src/analysis/mod.rs:479-499","code":"  479 |     boundary_iter\n  480 |         // Shift line break data forward one, as line boundaries corresponding with line-breaking\n  481 |         // characters (like '\\n') exist at an index position one higher than the respective\n  482 |         // character's index, but we need our iterators to align, and the rest are simply\n  483 |         // character-indexed.\n  484 |         .fold(false, |is_mandatory_linebreak, (boundary, ch)| {\n  485 |             let properties = properties(ch);\n  486 |             let script = properties.script();\n  487 |             let grapheme_cluster_break = properties.grapheme_cluster_break();\n  488 |             let bidi_class = properties.bidi_class();\n  489 |             let general_category = properties.general_category();\n  490 |             let is_emoji_or_pictograph = properties.is_emoji_or_pictograph();\n  491 |             let is_variation_selector = properties.is_variation_selector();\n  492 |             let is_region_indicator = properties.is_region_indicator();\n  493 |             let next_mandatory_linebreak = properties.is_mandatory_linebreak();\n  494 | \n  495 |             let boundary = if is_mandatory_linebreak {\n  496 |                 Boundary::Mandatory\n  497 |             } else {\n  498 |                 boundary\n  499 |             };","lines":21}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"When `needs_bidi_resolution` is false, analyze_text never calls `lcx.bidi.resolve`, leaving `lcx.bidi.levels()` as an empty slice (cleared in begin()) rather than a slice of length text.len() filled with the base level. shape_text then relies on `levels.get(char_index).copied().unwrap_or(0)` for every char. This works only because base level is implicitly 0 in this path; if any caller ever expects `levels()` to be paragraph-length for the no-bidi case, it silently gets an empty slice. The empty-vs-filled inconsistency between the bidi and no-bidi paths is fragile.","fix":"Either always populate `levels` to text length (the fast path inside resolve() at lines 88-92 already does this when called), i.e. call resolve() unconditionally, or document clearly at `levels()` that it may be empty when no bidi resolution was needed and that consumers must default to base level.","locations":[{"ref":"parley/src/analysis/mod.rs:538-547","code":"  538 |     if needs_bidi_resolution {\n  539 |         lcx.bidi.resolve(\n  540 |             text.chars().zip(\n  541 |                 lcx.info\n  542 |                     .iter()\n  543 |                     .map(|info| (info.0.bidi_class, info.0.bracket)),\n  544 |             ),\n  545 |             None,\n  546 |         );\n  547 |     }","lines":10},{"ref":"parley/src/bidi.rs:88-92","code":"   88 |         if !needs_bidi && self.base_level == 0 {\n   89 |             self.flags |= 1;\n   90 |             self.levels.resize(len, self.base_level);\n   91 |             return;\n   92 |         }","lines":5}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In next_visual the two soft-line-break sub-branches (RTL-downstream and LTR-upstream) compute `index` with identical bodies (both: if right.is_rtl() right.text_range().end else right.text_range().start), only the resulting affinity differs (Upstream vs Downstream). The duplicated index computation suggests at least one branch may be using the wrong endpoint relative to its affinity; the parallel structure in previous_visual uses left.text_range() for one branch and right.text_range() for the other. Worth verifying the LTR-upstream branch isn't a copy-paste of the RTL-downstream branch.","fix":"Verify both soft-line-break branches against intended visual movement; if correct, hoist the shared index computation and only vary affinity to make the intent explicit.","locations":[{"ref":"parley/src/editing/cursor.rs:156-173","code":"  156 |         if let (Some(left), Some(right)) = (&left, &right) {\n  157 |             if left.is_soft_line_break() {\n  158 |                 if left.is_rtl() && self.affinity == Affinity::Downstream {\n  159 |                     let index = if right.is_rtl() {\n  160 |                         right.text_range().end\n  161 |                     } else {\n  162 |                         right.text_range().start\n  163 |                     };\n  164 |                     return Self::from_byte_index(layout, index, Affinity::Upstream);\n  165 |                 } else if !left.is_rtl() && self.affinity == Affinity::Upstream {\n  166 |                     let index = if right.is_rtl() {\n  167 |                         right.text_range().end\n  168 |                     } else {\n  169 |                         right.text_range().start\n  170 |                     };\n  171 |                     return Self::from_byte_index(layout, index, Affinity::Downstream);\n  172 |                 }\n  173 |             }","lines":18}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"cursor_at uses `index >= self.buffer.len()` to decide Upstream vs Downstream affinity, but it is called from set_compose/clear_compose/ime_cursor_area with indices into a buffer that may currently include the preedit text. At index == buffer.len() it forces Upstream and clamps to buffer.len(); that is fine, but the threshold `>=` means a caret at exactly end-of-buffer always gets Upstream affinity even when the IME explicitly requested a downstream position, subtly altering cursor visual placement at the buffer end.","fix":"Consider preserving the requested affinity rather than unconditionally forcing Upstream at the end of the buffer, or document why end-of-buffer is always upstream.","locations":[{"ref":"parley/src/editing/editor.rs:1122-1131","code":" 1122 |     /// Make a cursor at a given byte index.\n 1123 |     fn cursor_at(&self, index: usize) -> Cursor {\n 1124 |         // TODO: Do we need to be non-dirty?\n 1125 |         // FIXME: `Selection` should make this easier\n 1126 |         if index >= self.buffer.len() {\n 1127 |             Cursor::from_byte_index(&self.layout, self.buffer.len(), Affinity::Upstream)\n 1128 |         } else {\n 1129 |             Cursor::from_byte_index(&self.layout, index, Affinity::Downstream)\n 1130 |         }\n 1131 |     }","lines":10}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"shift_click_extension picks the new anchor with `if target.index < start.index { end } else { start }`. When the click lands exactly at `start.index` (target.index == start.index), it chooses `start` as the anchor and `target` as focus, collapsing the selection to a single point even though the user shift-clicked the existing anchor-base boundary. With word/line anchor bases this discards the granularity that the user expects to be preserved; the boundary case `target.index == start.index` arguably should keep `end` as anchor so the word/line remains selected.","fix":"Reconsider the tie case `target.index == start.index`; likely should use `<=` or otherwise keep the far edge so a shift-click on the anchor boundary does not collapse the word/line selection.","locations":[{"ref":"parley/src/editing/selection.rs:464-483","code":"  464 |     pub fn shift_click_extension<B: Brush>(&self, layout: &Layout<B>, x: f32, y: f32) -> Self {\n  465 |         let target = Cursor::from_point(layout, x, y);\n  466 |         match self.anchor_base {\n  467 |             AnchorBase::Cluster => Self::new(self.anchor, target),\n  468 |             AnchorBase::Word(start, end) | AnchorBase::Line(start, end) => {\n  469 |                 // Place the focus where the user just clicked, and the anchor on the \"far\" side of the anchorbase.\n  470 |                 let anchor = if target.index < start.index {\n  471 |                     end\n  472 |                 } else {\n  473 |                     start\n  474 |                 };\n  475 |                 Self {\n  476 |                     anchor,\n  477 |                     focus: target,\n  478 |                     anchor_base: self.anchor_base,\n  479 |                     h_pos: None,\n  480 |                 }\n  481 |             }\n  482 |         }\n  483 |     }","lines":20}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In geometry_with, when the focus/anchor line cannot be resolved the end line index falls back to `layout.len() + 1`. As the upper bound of an inclusive range `line_start_ix..=line_end_ix`, this iterates one line index (`layout.len()`) that is always out of bounds (lines are 0..layout.len()-1), plus `layout.len()+1` is never reachable since get() returns None and continues. The `+ 1` is meaningless and misleading; the intended fallback was presumably `layout.len().saturating_sub(1)` (last valid line).","fix":"Use `.unwrap_or(layout.len().saturating_sub(1))` for the fallback end line index, matching how line_start_ix would resolve to a valid line.","locations":[{"ref":"parley/src/editing/selection.rs:525-529","code":"  525 |         let line_end_ix = end\n  526 |             .line(layout)\n  527 |             .map(|(ix, _)| ix)\n  528 |             .unwrap_or(layout.len() + 1);\n  529 |         for line_ix in line_start_ix..=line_end_ix {","lines":5}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`from_point_impl` fallback at the end returns the nearest cluster only when `y <= 0.0 && !exact` (above the layout). There is no symmetric fallback for `y` below the last line: when the point is below all lines and not exact, `line_for_offset` clamps to the last line and the inner loop runs, so it is usually handled, but a point past the end of the last line's content on the x-axis falls through to `None` for the non-exact case because `is_last_cluster`/`is_last_run` short-circuits only handle the in-line case. Behavior for below-and-past-end points is inconsistent with the above-layout fallback.","fix":"Review and document the intended nearest-cluster behavior for points below/right of all content in the non-exact mode; add a symmetric fallback if needed.","locations":[{"ref":"parley/src/layout/cluster.rs:123-127","code":"  123 |         if y <= 0.0 && !exact {\n  124 |             Some((path.cluster(layout)?, ClusterSide::Left))\n  125 |         } else {\n  126 |             None\n  127 |         }","lines":5}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`calculate_content_widths` is documented (and the inline ` p_mode == TextWrapMode::Wrap {\n  609 |                             let trailing_whitespace = whitespace_advance(prev_cluster);\n  610 |                             min_width = min_width.max(running_min_width - trailing_whitespace);\n  611 |                             min_width = min_width.max(ibox.width);\n  612 |                             running_min_width = 0.0;\n  613 |                         } else {\n  614 |                             running_min_width += ibox.width;\n  615 |                         }\n  616 |                     }\n  617 |                     prev_cluster = None;\n  618 |                 }\n  619 |             }\n  620 |             let trailing_whitespace = whitespace_advance(prev_cluster);\n  621 |             max_width = max_width.max(running_max_width - trailing_whitespace);\n  622 |         }\n  623 | \n  624 |         let trailing_whitespace = whitespace_advance(prev_cluster);\n  625 |         min_width = min_width.max(running_min_width - trailing_whitespace);","lines":73}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `process_clusters`, when handling a multi-component cluster the loop `for i in 1..num_components` (line 752) breaks early if `to_whitespace(cluster_start_char.1) == Whitespace::Space` (line 754) after advancing the char iterator, but it does NOT push a ligature component for that consumed char, and continues the outer glyph loop with `cluster_start_char` pointing at the space. This special-casing of an embedded space inside a ligature is subtle and undocumented; if a ligature legitimately spans a space the component is silently dropped, which can desync text offsets.","fix":"Document why a space terminates ligature-component expansion, and verify text-offset bookkeeping stays correct when this break fires (add a test).","locations":[{"ref":"parley/src/layout/data.rs:750-772","code":"  750 |             if num_components > 1 {\n  751 |
