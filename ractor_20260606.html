d_channel();\n  220 |         self.rx = rx;\n  221 |         let period_ms = self.period.as_millis() as f64;\n  222 |         // Set up a new interval.\n  223 |         let closure = Closure::wrap(Box::new(move || {\n  224 |             let _ = tx.send(());\n  225 |         }) as Box<dyn Fn()>);\n  226 |         self.interval_id = set_interval(closure.as_ref().unchecked_ref(), period_ms);\n  227 |         // Release memory management of this closure from Rust to the JS GC.\n  228 |         closure.forget();\n  229 |     }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"reply_with_available_capacity computes `std::cmp::max(limit - self.queue.len(), 0)`. Both `limit` and `queue.len()` are `usize`, so `limit - self.queue.len()` underflows and panics (in debug) or wraps to a huge value (in release) whenever the queue length exceeds the configured limit. The `max(.., 0)` is dead code because a usize is never negative. Queue length can exceed `limit` in DiscardMode::Oldest (a job is pushed before the over-limit trim) or with non-discardable priority jobs that bypass the limit.","fix":"Use saturating subtraction: `let count = limit.saturating_sub(self.queue.len()) + worker_availability;` and remove the useless `max(.., 0)`.","locations":[{"ref":"ractor/src/factory/factoryimpl.rs:775-786","code":"  775 |         match self.discard_settings.get_limit_and_mode() {\n  776 |             Some((limit, _)) => {\n  777 |                 // get the queue space and add it to the worker availability\n  778 |                 let count = std::cmp::max(limit - self.queue.len(), 0) + worker_availability;\n  779 |                 let _ = reply.send(count);\n  780 |             }\n  781 |             None => {\n  782 |                 // there's no queueing limit, so we just report worker\n  783 |                 // availability\n  784 |                 let _ = reply.send(worker_availability);\n  785 |             }\n  786 |         }"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"The vectorized `BytesConvertable::into_bytes` computes the output buffer size as `self.len() * std::mem::size_of::<$ty>()` (e.g. up to *16 for i128/u128). For very large input vectors this multiplication can overflow `usize` in debug builds (panic) or wrap in release builds, producing an undersized allocation followed by out-of-bounds slice writes / panics. While reaching this requires an enormous in-memory Vec, it is unchecked arithmetic on a length-derived size in serialization code.","fix":"Use checked multiplication (`len.checked_mul(size_of)`) and return/handle an error, or rely on `Vec::with_capacity` semantics that already guard against overflow.","locations":[{"ref":"ractor/src/serialization.rs:122-128","code":"  122 |             impl BytesConvertable for Vec<$ty> {\n  123 |                 fn into_bytes(self) -> Vec<u8> {\n  124 |                     let mut result = vec![0u8; self.len() * std::mem::size_of::<$ty>()];\n  125 |                     for (offset, item) in self.into_iter().enumerate() {\n  126 |                         result[offset * std::mem::size_of::<$ty>() .. offset * std::mem::size_of::<$ty>() + std::mem::size_of::<$ty>()].copy_from_slice(&item.to_be_bytes());\n  127 |                     }\n  128 |                     result"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`encode_network_message` writes `len.to_be_bytes()` where `len = msg.encoded_len()` is a `usize`. On a 64-bit host this is 8 bytes (matching the u64 reader), but on a 32-bit target `usize::to_be_bytes()` produces 4 bytes, which would desynchronize framing with the `read_u64` reader and corrupt the stream. The format silently depends on a 64-bit `usize`.","fix":"Cast explicitly to `u64`: `(len as u64).to_be_bytes()` so the on-wire prefix width is platform-independent.","locations":[{"ref":"ractor_cluster/src/net/session.rs:303-309","code":"  303 | fn encode_network_message(msg: &crate::protocol::NetworkMessage, buf: &mut Vec<u8>) {\n  304 |     let len = msg.encoded_len();\n  305 |     buf.write_all(&len.to_be_bytes())\n  306 |         .expect(\"Vec write should not fail\");\n  307 |     msg.encode(buf).expect(\"Vec write should not fail\");\n  308 |     tracing::trace!(\"Batching payload (len={len})\");\n  309 | }"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"When the authentication state is already `Close`, `handle_auth` calls `myself.stop(...)` (and stops the tcp child) but does NOT return. Execution falls through into the `match &state.auth` block which then runs `client_auth.next(...)` / `server_auth.next(...)` and may send further auth messages and overwrite `state.auth` on a session that is being torn down. The shutdown is asynchronous, so additional handshake processing continues against a peer that has already failed authentication.","fix":"Add a `return;` after stopping the session in the `is_close()` branch so no further authentication processing occurs once the FSM has decided to close.","locations":[{"ref":"ractor_cluster/src/node/node_session.rs:155-166","code":"  155 |         if state.auth.is_close() {\n  156 |             tracing::info!(\n  157 |                 \"Node Session {} is shutting down due to authentication failure\",\n  158 |                 self.node_id\n  159 |             );\n  160 |             // we need to shutdown, the session needs to be terminated\n  161 |             myself.stop(Some(\"auth_fail\".to_string()));\n  162 |             if let Some(tcp) = &state.tcp {\n  163 |                 tcp.stop(Some(\"auth_fail\".to_string()));\n  164 |             }\n  165 |         }\n  166 | "}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"The Pong RTT computation subtracts two durations that originate from different, unrelated epochs. The sender encodes its own `epoch.elapsed()` into the Pong timestamp (see schedule_tcp_ping), so `inst` here is the *peer's* elapsed-since-its-epoch, while `state.epoch.elapsed()` is *this* node's elapsed-since-its-epoch. `Duration - Duration` panics on overflow when the peer's value exceeds the local value (which is the common case across machines with different start times), so this both computes a meaningless latency and can panic.","fix":"Use a wall-clock timestamp (`SystemTime::now()`) when generating the Ping/Pong, or compute the delta with `checked_sub`/`saturating_sub`. RTT cannot be derived by subtracting two independent monotonic epochs across different processes.","locations":[{"ref":"ractor_cluster/src/node/node_session.rs:539-548","code":"  539 |                     let ts: std::time::SystemTime = pong\n  540 |                         .timestamp\n  541 |                         .expect(\"Timestamp missing in Pong\")\n  542 |                         .try_into()\n  543 |                         .expect(\"Failed to convert Pong(Timestamp) to SystemTime\");\n  544 |                     let inst = ts\n  545 |                         .duration_since(SystemTime::UNIX_EPOCH)\n  546 |                         .expect(\"Time went backwards\");\n  547 |                     let delta_ms = (state.epoch.elapsed() - inst).as_millis();\n  548 |                     tracing::debug!(\"Ping -> Pong took {delta_ms}ms\");"},{"ref":"ractor_cluster/src/node/node_session.rs:856-878","code":"  856 |     fn schedule_tcp_ping(&self) {\n  857 |         let epoch = self.epoch;\n  858 |         if let Some(tcp) = &self.tcp {\n  859 |             #[allow(clippy::let_underscore_future)]\n  860 |             let _ = tcp.send_after(Self::get_send_delay(), move || {\n  861 |                 let ping = control_protocol::ControlMessage {\n  862 |                     msg: Some(control_protocol::control_message::Msg::Ping(\n  863 |                         control_protocol::Ping {\n  864 |                             timestamp: Some(prost_types::Timestamp::from(\n  865 |                                 SystemTime::UNIX_EPOCH + epoch.elapsed(),\n  866 |                             )),\n  867 |                         },\n  868 |                     )),\n  869 |                 };\n  870 |                 let net_msg = crate::protocol::NetworkMessage {\n  871 |                     message: Some(crate::protocol::meta::network_message::Message::Control(\n  872 |                         ping,\n  873 |                     )),\n  874 |                 };\n  875 |                 SessionMessage::Send(net_msg)\n  876 |             });\n  877 |         }\n  878 |     }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"On wasm the `Interval` is backed by JS `setInterval`, which does NOT fire immediately; the first `tick()` awaits `rx.recv()` and only completes after one full `period` has elapsed. The tokio backend's interval ticks once immediately. `send_interval` (and the doc comment on `interval`) explicitly rely on the \"ticks 1 time immediately\" semantics: it calls `timer.tick().await` once to consume the immediate tick, then ticks again before each send. On wasm this means the first send is delayed by two full periods instead of one, and the documented \"Ticks 1 time immediately\" comment is wrong for the wasm backend.","fix":"Make the wasm `Interval` deliver an immediate first tick (e.g. seed the channel with one `()` on creation, or have `tick()` return immediately the first time) to match tokio/async-std semantics, or fix the comments and `send_interval` to not assume an immediate tick.","locations":[{"ref":"ractor/src/concurrency/wasm_browser_primitives/time.rs:176-209","code":"  176 | /// Creates a new interval that ticks every `period` duration.\n  177 | pub(super) fn interval(period: Duration) -> Interval {\n  178 |     let (tx, rx) = tokio::sync::mpsc::unbounded_channel();\n  179 |     let period_ms = period.as_millis() as f64;\n  180 |     // Create a closure that sends a tick via the channel.\n  181 |     let closure = Closure::wrap(Box::new(move || {\n  182 |         let _ = tx.send(());\n  183 |     }) as Box<dyn Fn()>);\n  184 |     // Register an interval with the closure.\n  185 |     let interval_id = set_interval(closure.as_ref().unchecked_ref(), period_ms);\n  186 |     // Release memory management of this closure from Rust to the JS GC.\n  187 |     closure.forget();\n  188 |     Interval {\n  189 |         period,\n  190 |         rx,\n  191 |         interval_id,\n  192 |     }\n  193 | }\n  194 | \n  195 | /// A structure that represents an interval that ticks at a specified period.\n  196 | /// It provides methods to wait for the next tick, reset the interval,\n  197 | /// and ensure the interval is cleaned up when it is dropped.\n  198 | #[derive(Debug)]\n  199 | pub struct Interval {\n  200 |     period: Duration,\n  201 |     rx: tokio::sync::mpsc::UnboundedReceiver<()>,\n  202 |     interval_id: i32,\n  203 | }\n  204 | \n  205 | impl Interval {\n  206 |     /// Waits until the next tick.\n  207 |     pub async fn tick(&mut self) {\n  208 |         self.rx.recv().await;\n  209 |     }"},{"ref":"ractor/src/concurrency/wasm_browser_primitives.rs:33-38","code":"   33 | /// Build a new interval at the given duration starting at now\n   34 | ///\n   35 | /// Ticks 1 time immediately\n   36 | pub fn interval(dur: Duration) -> Interval {\n   37 |     time::interval(dur)\n   38 | }"},{"ref":"ractor/src/time.rs:120-130","code":"  120 |         let mut timer = crate::concurrency::interval(period);\n  121 |         // timer tick's immediately the first time\n  122 |         timer.tick().await;\n  123 |         while ACTIVE_STATES.contains(&actor.get_status()) {\n  124 |             timer.tick().await;\n  125 |             // if we receive an error trying to send, the channel is closed and we should stop trying\n  126 |             // actor died\n  127 |             if actor.send_message::<TMessage>(msg()).is_err() {\n  128 |                 break;\n  129 |             }\n  130 |         }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"shrink_pool computes the worker id range as `(curr_size - to_remove)..curr_size` using unchecked usize subtraction. resize_pool guarantees to_remove <= curr_size, but shrink_pool is a separate method operating on `self.pool_size`; any future/independent caller (or a logic change) with to_remove > curr_size underflows and panics. More importantly, shrinking assumes worker ids are exactly the contiguous range `0..pool_size`, but the pool is a HashMap and grow_pool/shrink_pool only ever add/remove at the high end, so a draining worker that is not yet removed leaves a gap and a subsequent grow re-adds ids that may still be Occupied — the id bookkeeping is fragile and not validated.","fix":"Use checked/saturating subtraction for the range bound and assert/document the contiguous-id invariant; consider tracking the set of live worker ids explicitly rather than assuming a contiguous range.","locations":[{"ref":"ractor/src/factory/factoryimpl.rs:429-451","code":"  429 |     fn shrink_pool(&mut self, to_remove: usize) {\n  430 |         let curr_size = self.pool_size;\n  431 |         for wid in (curr_size - to_remove)..curr_size {\n  432 |             match self.pool.entry(wid) {\n  433 |                 std::collections::hash_map::Entry::Occupied(mut existing_worker) => {\n  434 |                     let mut_worker = existing_worker.get_mut();\n  435 |                     if mut_worker.is_working() {\n  436 |                         // mark the worker as draining\n  437 |                         mut_worker.set_draining(true);\n  438 |                     } else {\n  439 |                         // drained, stop and drop\n  440 |                         tracing::trace!(\"Stopping worker {wid}\");\n  441 |                         self.router.on_worker_availability_change(wid, false);\n  442 |                         mut_worker.actor.stop(None);\n  443 |                         existing_worker.remove();\n  444 |                     }\n  445 |                 }\n  446 |                 std::collections::hash_map::Entry::Vacant(_) => {\n  447 |                     // worker doesn't exist, ignore\n  448 |                 }\n  449 |             }\n  450 |         }\n  451 |     }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"RoundRobinRouting::choose_target_worker returns `Some(key)` computed purely from `last_worker`/`pool_size` without verifying the worker exists or is alive. When pool_size==0 it computes key=0 and returns Some(0); route_message then does `worker_pool.get_mut(&0)` which is None, so the job is silently dropped while route_message still returns RouteResult::Handled and the dispatch increments processing_messages. The job is lost with no discard-handler callback and the counter is leaked.","fix":"Return None when pool_size==0, and in route_message return RouteResult::Backlog (or invoke discard) when the chosen worker id is not present in the pool, instead of unconditionally returning Handled.","locations":[{"ref":"ractor/src/factory/routing.rs:464-483","code":"  464 |     fn choose_target_worker(\n  465 |         &mut self,\n  466 |         _job: &Job<TKey, TMsg>,\n  467 |         pool_size: usize,\n  468 |         worker_hint: Option<WorkerId>,\n  469 |         worker_pool: &HashMap<WorkerId, WorkerProperties<TKey, TMsg>>,\n  470 |     ) -> Option<WorkerId> {\n  471 |         if let Some(worker) = worker_hint.and_then(|worker| worker_pool.get(&worker)) {\n  472 |             if worker.is_available() {\n  473 |                 return worker_hint;\n  474 |             }\n  475 |         }\n  476 | \n  477 |         let mut key = self.last_worker + 1;\n  478 |         if key >= pool_size {\n  479 |             key = 0;\n  480 |         }\n  481 |         self.last_worker = key;\n  482 |         Some(key)\n  483 |     }"},{"ref":"ractor/src/factory/routing.rs:448-462","code":"  448 |     fn route_message(\n  449 |         &mut self,\n  450 |         job: Job<TKey, TMsg>,\n  451 |         pool_size: usize,\n  452 |         worker_hint: Option<WorkerId>,\n  453 |         worker_pool: &mut HashMap<WorkerId, WorkerProperties<TKey, TMsg>>,\n  454 |     ) -> Result<RouteResult<TKey, TMsg>, ActorProcessingErr> {\n  455 |         if let Some(worker) = self\n  456 |             .choose_target_worker(&job, pool_size, worker_hint, worker_pool)\n  457 |             .and_then(|wid| worker_pool.get_mut(&wid))\n  458 |         {\n  459 |             worker.enqueue_job(job)?;\n  460 |         }\n  461 |         Ok(RouteResult::Handled)\n  462 |     }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Worker-internal queued jobs that are discarded as TTL-expired in get_next_non_expired_job never decrement the factory's `processing_messages` counter. Each job routed to a worker (whether dispatched immediately or pushed into the worker's `message_queue`) increments `processing_messages` once in dispatch/try_route_next_active_job, and it is only decremented in worker_finished_job via FactoryMessage::Finished. Jobs that expire while sitting in the worker queue are dropped inside get_next_non_expired_job and no Finished is ever sent, so `processing_messages` (and the in-flight metric derived from it) permanently over-counts.","fix":"Decrement the factory's processing counter for jobs dropped from the worker queue (e.g. have worker_complete/enqueue_job report the number of expired-discarded queued jobs back to FactoryState so it can subtract them), or compute processing_messages by summing worker states instead of maintaining a separate counter.","locations":[{"ref":"ractor/src/factory/worker.rs:552-564","code":"  552 |     fn get_next_non_expired_job(&mut self) -> Option<Job<TKey, TMsg>> {\n  553 |         while let Some(mut job) = self.message_queue.pop_front() {\n  554 |             if !job.is_expired() {\n  555 |                 return Some(job);\n  556 |             } else {\n  557 |                 if let Some(handler) = &self.discard_handler {\n  558 |                     handler.discard(DiscardReason::TtlExpired, &mut job);\n  559 |                 }\n  560 |                 self.stats.job_ttl_expired(&self.factory_name, 1);\n  561 |             }\n  562 |         }\n  563 |         None\n  564 |     }"},{"ref":"ractor/src/factory/factoryimpl.rs:556-559","code":"  556 |     fn worker_finished_job(&mut self, who: WorkerId, key: TKey) -> Result<(), ActorProcessingErr> {\n  557 |         if self.processing_messages > 0 {\n  558 |             self.processing_messages -= 1;\n  559 |         }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `Message::box_message` (cluster build), when a message type is NOT serializable AND the target pid is remote, the function falls through to the `else` branch returning `Err(BoxedDowncastErr)`. However the ordering of the `if Self::serializable() && !pid.is_local()` / `else if pid.is_local()` chain means a serializable message destined to a remote pid is serialized with `span: None` (span propagation is dropped for remote sends, expected), but a non-serializable message to a remote pid yields a generic `BoxedDowncastErr` with no indication that the real problem is \"this message type is not serializable for remote delivery\", making remote-send failures hard to diagnose.","fix":"Return a more descriptive error (or distinct variant) when a non-serializable message is sent to a remote pid, rather than the same `BoxedDowncastErr` used for downcast failures.","locations":[{"ref":"ractor/src/message.rs:133-161","code":"  133 |     #[cfg(feature = \"cluster\")]\n  134 |     fn box_message(self, pid: &ActorId) -> Result<BoxedMessage, BoxedDowncastErr> {\n  135 |         let span = {\n  136 |             #[cfg(feature = \"message_span_propogation\")]\n  137 |             {\n  138 |                 Some(tracing::Span::current())\n  139 |             }\n  140 |             #[cfg(not(feature = \"message_span_propogation\"))]\n  141 |             {\n  142 |                 None\n  143 |             }\n  144 |         };\n  145 |         if Self::serializable() && !pid.is_local() {\n  146 |             // it's a message to a remote actor, serialize it and send it over the wire!\n  147 |             Ok(BoxedMessage {\n  148 |                 msg: None,\n  149 |                 serialized_msg: Some(self.serialize()?),\n  150 |                 span: None,\n  151 |             })\n  152 |         } else if pid.is_local() {\n  153 |             Ok(BoxedMessage {\n  154 |                 msg: Some(Box::new(self)),\n  155 |                 serialized_msg: None,\n  156 |                 span,\n  157 |             })\n  158 |         } else {\n  159 |             Err(BoxedDowncastErr)\n  160 |         }\n  161 |     }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`which_scopes()` iterates the entire group `map` and emits one scope name per (scope, group) entry with members, with NO deduplication. A scope that contains N non-empty groups is returned N times. Compare `which_groups()` (lines 466-476) which explicitly sorts and dedups. Callers expecting a set of distinct scope names get spurious duplicates.","fix":"Deduplicate the result (sort_unstable + dedup), or better, read distinct scopes directly from the `index` DashMap keys (which is already keyed by scope) instead of scanning the full group map.","locations":[{"ref":"ractor/src/pg.rs:510-518","code":"  510 | pub fn which_scopes() -> Vec<ScopeName> {\n  511 |     let monitor = get_monitor();\n  512 |     monitor\n  513 |         .map\n  514 |         .iter()\n  515 |         .filter(|kvp| !kvp.value().members.is_empty())\n  516 |         .map(|kvp| kvp.key().scope.to_owned())\n  517 |         .collect::<Vec<_>>()\n  518 | }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In the v2 output port fan-out task's first loop, an `OutportMessage::SetSubscriber(Some(..))` message is reprocessed once per already-present subscriber (the loop body iterates the whole `batch` for every existing subscriber index `i`). The handler only acts when `subscriber.id() == subscribers[i].0`, otherwise `continue`s, but `opt_subscriber.take()` mutates the batch entry in place. After the first matching subscriber takes the boxed subscriber, later iterations see `None` and skip — yet for a brand-new subscriber whose id matches none of the existing ones, the SetSubscriber is silently never applied in this first loop and is only handled in the second `batch.drain` loop. The interleaving of in-place `take()` with per-subscriber iteration is fragile and order-dependent; a subscriber that replaces an existing one (duplicate id) versus a new subscriber take divergent paths, making subscription handling hard to reason about and prone to dropping or duplicating subscriptions under batching.","fix":"Process control messages (SetSubscriber) once per batch outside the per-subscriber loop rather than re-walking them for every existing subscriber, separating data fan-out from subscriber-set mutation to make the ordering deterministic.","locations":[{"ref":"ractor/src/port/output.rs:289-338","code":"  289 |                         'subs: while i < subscribers.len() {\n  290 |                             // We processes the messages but only\n  291 |                             // apply change to subscribers that do affact\n  292 |                             // the current subscriber. The aim is to preserve\n  293 |                             // the sequentiality a process that would send to\n  294 |                             // the output port my expect.\n  295 |                             for msg in batch.iter_mut() {\n  296 |                                 match msg {\n  297 |                                     OutportMessage::Data(v) => {\n  298 |                                         if !subscribers[i].1.send(v) {\n  299 |                                             subscribers.remove(i);\n  300 |                                             continue 'subs;\n  301 |                                         } else {\n  302 |                                             coop_count = coop_count.wrapping_add(1);\n  303 |                                             #[cfg(feature = \"tokio_runtime\")]\n  304 |                                             if coop_count % CONSUME_BUDGET_FACTOR == 0 {\n  305 |                                                 tokio::task::coop::consume_budget().await\n  306 |                                             }\n  307 |                                         }\n  308 |                                     }\n  309 |                                     OutportMessage::SetSubscriber(opt_subscriber) => {\n  310 |                                         let sid = if let Some(subscriber) = opt_subscriber {\n  311 |                                             let sid = subscriber.id();\n  312 |                                             if sid != subscribers[i].0 {\n  313 |                                                 continue;\n  314 |                                             }\n  315 |                                             sid\n  316 |                                         } else {\n  317 |                                             continue;\n  318 |                                         };\n  319 |                                         let subscriber = opt_subscriber.take().unwrap();\n  320 | \n  321 |                                         // We ensure there is no duplicate subscription\n  322 |                                         if !allow_duplicate_subscription {\n  323 |                                             if let Some((_, prev_subscriber)) =\n  324 |                                                 subscribers.iter_mut().find(|(id, _)| id == &sid)\n  325 |                                             {\n  326 |                                                 // In case of duplication, previous subscription is overrided\n  327 |                                                 *prev_subscriber = subscriber;\n  328 |                                             } else {\n  329 |                                                 subscribers.push((subscriber.id(), subscriber));\n  330 |                                             }\n  331 |                                         } else {\n  332 |                                             subscribers.push((subscriber.id(), subscriber));\n  333 |                                         }\n  334 |                                     }\n  335 |                                 }\n  336 |                             }\n  337 |                             i += 1;\n  338 |                         }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`check_peers` only deduplicates connections when BOTH peers already know each other's name. Because the name exchange and the CheckSession RPC happen together during the server handshake, two simultaneous reciprocal connections can both pass the check before either has recorded the other's name, defeating the simultaneous-connection deduplication the protocol is designed to provide and leaving two live sessions to the same peer.","fix":"Record the peer name in the NodeServer (UpdateSession) BEFORE issuing the CheckSession query so the dedup comparison sees the most current peer set, and/or have check_peers also account for sessions whose name is still pending.","locations":[{"ref":"ractor_cluster/src/node/node_session.rs:255-280","code":"  255 |             AuthenticationState::AsServer(server_auth) => {\n  256 |                 let mut next = server_auth.next(message, &self.cookie);\n  257 | \n  258 |                 match &next {\n  259 |                     auth::ServerAuthenticationProcess::HavePeerName(peer_name) => {\n  260 |                         // store the peer node's name in the session state\n  261 |                         state.name = Some(peer_name.clone());\n  262 |                         // send the status message, followed by the server's challenge\n  263 |                         let server_status_result = self\n  264 |                             .node_server\n  265 |                             .call(\n  266 |                                 |tx| super::NodeServerMessage::CheckSession {\n  267 |                                     peer_name: peer_name.clone(),\n  268 |                                     reply: tx,\n  269 |                                 },\n  270 |                                 Some(Duration::from_millis(500)),\n  271 |                             )\n  272 |                             .await;\n  273 |                         // tell the node server that we now know this peer's name information\n  274 |                         let _ = self\n  275 |                             .node_server\n  276 |                             .cast(super::NodeServerMessage::UpdateSession {\n  277 |                                 actor_id: myself.get_id(),\n  278 |                                 name: peer_name.clone(),\n  279 |                             });\n  280 |                         match server_status_result {"},{"ref":"ractor_cluster/src/node.rs:336-366","code":"  336 | impl NodeServerState {\n  337 |     fn check_peers(&self, new_peer: auth_protocol::NameMessage) -> SessionCheckReply {\n  338 |         for (_key, value) in self.node_sessions.iter() {\n  339 |             if let Some(existing_peer) = &value.peer_name {\n  340 |                 if existing_peer.name == new_peer.name {\n  341 |                     match (\n  342 |                         existing_peer.name.cmp(&self.this_node_name.name),\n  343 |                         value.is_server,\n  344 |                     ) {\n  345 |                         // the peer's name is > this node's name and they connected to us\n  346 |                         // or\n  347 |                         // the peer's name is < this node's name and we connected to them\n  348 |                         (Ordering::Greater, true) | (Ordering::Less, false) => {\n  349 |                             value.actor.stop(Some(\"duplicate_connection\".to_string()));\n  350 |                             return SessionCheckReply::OtherConnectionContinues;\n  351 |                         }\n  352 |                         (Ordering::Greater, false) | (Ordering::Less, true) => {\n  353 |                             // the inverse of the first two conditions, terminate the other\n  354 |                             // connection and let this one continue\n  355 |                             return SessionCheckReply::ThisConnectionContinues;\n  356 |                         }\n  357 |                         _ => {\n  358 |                             // something funky is going on...\n  359 |                             return SessionCheckReply::DuplicateConnection;\n  360 |                         }\n  361 |                     }\n  362 |                 }\n  363 |             }\n  364 |         }\n  365 |         SessionCheckReply::NoOtherConnection\n  366 |     }"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `handle_control`, the `PgLeave` branch builds `cells` from `state.remote_actors.get(&pid)` but does not remove the actors from `remote_actors`, and the EnumerateNodeSessions filter at lines 620-625 uses `&&` so a peer is excluded only if BOTH its name AND connection_string differ from the asker. As written the dedup is overly permissive: a peer whose name matches the asker but connection_string differs (or vice-versa) is still sent back, which can encourage self/duplicate connection attempts in transitive mode.","fix":"Use `||` so the asker is filtered if EITHER its name OR its connection_string matches, matching the intent of 'don't send back the node who's asking'.","locations":[{"ref":"ractor_cluster/src/node/node_session.rs:618-626","code":"  618 |                             .into_values()\n  619 |                             .filter_map(|local_session| local_session.peer_name)\n  620 |                             .filter(|local_session| {\n  621 |                                 // don't send back the node who's asking so we don't trigger self-connections\n  622 |                                 whos_asking.name != local_session.name\n  623 |                                     && whos_asking.connection_string\n  624 |                                         != local_session.connection_string\n  625 |                             })\n  626 |                             .collect::<Vec<_>>();"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The self-connection guard in `handle` runs on EVERY message after `state.name` is set and uses `myself.stop(...)` then `return Ok(())`. However it compares only name/connection_string; a legitimate distinct peer that happens to share a connection_string (e.g. behind NAT, or mis-set hostname) is permanently unable to connect. More importantly, the check is performed lazily per-message instead of once when the name is learned, so the session may already have processed control/node messages from a self-connection before the guard fires.","fix":"Perform the self-connection check exactly once, immediately when the peer name is recorded (in handle_auth where `state.name` is set), and reject before any control/node processing.","locations":[{"ref":"ractor_cluster/src/node/node_session.rs:962-971","code":"  962 |         if let Some(peer) = &state.name {\n  963 |             if self.this_node_name.connection_string == peer.connection_string\n  964 |                 || self.this_node_name.name == peer.name\n  965 |             {\n  966 |                 // self-connection detected, exit session\n  967 |                 tracing::warn!(\"Cannot establish a connection to self. Exiting\");\n  968 |                 myself.stop(Some(\"self_connection\".to_string()));\n  969 |                 return Ok(());\n  970 |             }\n  971 |         }"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In the cluster JobOptions::from_bytes, when the byte length is not exactly 16 the code silently returns Default::default() (a fresh JobOptions with `submit_time = now`) instead of signaling an error. A corrupted/truncated wire payload is thus interpreted as a brand-new just-submitted job, silently discarding the real submit_time and any TTL, which can defeat TTL-based loadshedding for remote jobs.","fix":"Return a decode error (propagate BoxedDowncastErr) on unexpected lengths rather than fabricating default timing values.","locations":[{"ref":"ractor/src/factory/job.rs:155-161","code":"  155 |     fn from_bytes(mut data: Vec<u8>) -> Self {\n  156 |         if data.len() != 16 {\n  157 |             Self {\n  158 |                 span: None,\n  159 |                 ..Default::default()\n  160 |             }\n  161 |         } else {"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`notify_world_listeners` always notifies the listeners registered under both `scoped_key` (scope=<actual scope>, group=ALL_GROUPS) and `global_key` (scope=ALL_SCOPES_NOTIFICATION, group=ALL_GROUPS). When a join/leave happens in a scope literally named `ALL_SCOPES_NOTIFICATION`, `scoped_key == global_key`, so the loop over `[scoped_key, global_key]` notifies every listener under that key twice for a single membership change.","fix":"Deduplicate the keys before iterating (skip the global key when it equals the scoped key), e.g. only push `global_key` into the iteration set when `scope != ALL_SCOPES_NOTIFICATION`.","locations":[{"ref":"ractor/src/pg.rs:184-209","code":"  184 |     let scoped_key = ScopeGroupKey {\n  185 |         scope: scope.to_owned(),\n  186 |         group: ALL_GROUPS_NOTIFICATION.to_owned(),\n  187 |     };\n  188 |     let global_key = ScopeGroupKey {\n  189 |         scope: ALL_SCOPES_NOTIFICATION.to_owned(),\n  190 |         group: ALL_GROUPS_NOTIFICATION.to_owned(),\n  191 |     };\n  192 | \n  193 |     for key in [scoped_key, global_key] {\n  194 |         let listeners = monitor\n  195 |             .world_listeners\n  196 |             .get(&key)\n  197 |             .map(|entry| entry.value().clone());\n  198 |         if let Some(listeners) = listeners {\n  199 |             let change = if is_join {\n  200 |                 GroupChangeMessage::Join(scope.to_owned(), group.clone(), actors.to_vec())\n  201 |             } else {\n  202 |                 GroupChangeMessage::Leave(scope.to_owned(), group.clone(), actors.to_vec())\n  203 |             };\n  204 |             for listener in &listeners {\n  205 |                 let _ = listener\n  206 |                     .send_supervisor_evt(SupervisionEvent::ProcessGroupChanged(change.clone()));\n  207 |             }\n  208 |         }\n  209 |     }"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`monitor`/`monitor_scope` (and pid_registry has no such issue since it uses a map keyed by ActorId) append the actor into a `Vec` of listeners with no duplicate check. Calling `monitor(group, actor)` twice for the same actor pushes it twice, so the actor receives every `ProcessGroupChanged` notification twice; `demonitor` (which uses `retain(... != actor)`) removes all copies at once, so a single demonitor cannot undo a double-monitor symmetrically.","fix":"De-duplicate listener registration (e.g. check the actor id is not already present before pushing, or store listeners in a map keyed by ActorId like the PID listeners).","locations":[{"ref":"ractor/src/pg.rs:525-546","code":"  525 | pub fn monitor(group: GroupName, actor: ActorCell) {\n  526 |     let key = ScopeGroupKey {\n  527 |         scope: DEFAULT_SCOPE.to_owned(),\n  528 |         group,\n  529 |     };\n  530 |     let monitor = get_monitor();\n  531 |     monitor.map.entry(key).or_default().listeners.push(actor);\n  532 | }\n  533 | \n  534 | /// Subscribes the provided [crate::Actor] to the scope for updates\n  535 | ///\n  536 | /// * `scope` - the scope to monitor\n  537 | /// * `actor` - The [ActorCell] representing who will receive updates\n  538 | pub fn monitor_scope(scope: ScopeName, actor: ActorCell) {\n  539 |     let key = ScopeGroupKey {\n  540 |         scope: scope.to_owned(),\n  541 |         group: ALL_GROUPS_NOTIFICATION.to_owned(),\n  542 |     };\n  543 |     let monitor = get_monitor();\n  544 |     // Register ONLY in world_listeners (not per-group) to avoid duplicate notifications\n  545 |     monitor.world_listeners.entry(key).or_default().push(actor);\n  546 | }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`is_reply_port_type` decides whether a field is a reply port purely by checking that the last path segment ident equals the literal string `RpcReplyPort`. This both over-matches and under-matches: a user type alias or unrelated type that happens to be named `RpcReplyPort` (not `ractor::RpcReplyPort`) is treated as a reply port (and its data is dropped from the serialized args, with a oneshot bridge spawned), while a reply port referenced through a re-export under a different final name would not be detected. Because reply-port detection drives the exactly-one-reply-port validation and which fields get serialized vs. bridged, a false match silently changes the wire format and an RPC's behavior with no diagnostic.","fix":"Document this as a deliberate name-based heuristic and/or tighten matching (e.g. accept `RpcReplyPort`, `ractor::RpcReplyPort`, and `rpc::RpcReplyPort` path shapes) so accidental name collisions are less likely to silently reinterpret a data field as a reply port.","locations":[{"ref":"ractor_cluster_derive/src/parse.rs:96-108","code":"   96 | /// Check if a type's last path segment is `RpcReplyPort`.\n   97 | fn is_reply_port_type(ty: &syn::Type) -> bool {\n   98 |     if let syn::Type::Path(type_path) = ty {\n   99 |         type_path\n  100 |             .path\n  101 |             .segments\n  102 |             .last()\n  103 |             .map(|seg| seg.ident == \"RpcReplyPort\")\n  104 |             .unwrap_or(false)\n  105 |     } else {\n  106 |         false\n  107 |     }\n  108 | }"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"In the v2 output port fan-out task, the tokio cooperative-budget check is performed inconsistently between the two send loops. In the first loop the counter is incremented and THEN checked (`coop_count = coop_count.wrapping_add(1); if coop_count % CONSUME_BUDGET_FACTOR == 0 ...`), while in the second (new-subscriber) loop the check `if coop_count % CONSUME_BUDGET_FACTOR == 0` runs BEFORE the increment. Because `coop_count` carries over between loops, the off-by-one ordering changes when `consume_budget().await` is actually invoked and can yield/consume budget on an unintended iteration, undermining the careful budgeting the surrounding comment claims to optimize.","fix":"Make the increment/check order identical in both loops (preferably increment first, then check `coop_count % CONSUME_BUDGET_FACTOR == 0`) so budget consumption is consistent.","locations":[{"ref":"ractor/src/port/output.rs:301-307","code":"  301 |                                         } else {\n  302 |                                             coop_count = coop_count.wrapping_add(1);\n  303 |                                             #[cfg(feature = \"tokio_runtime\")]\n  304 |                                             if coop_count % CONSUME_BUDGET_FACTOR == 0 {\n  305 |                                                 tokio::task::coop::consume_budget().await\n  306 |                                             }\n  307 |                                         }"},{"ref":"ractor/src/port/output.rs:355-362","code":"  355 |                                         } else {\n  356 |                                             i += 1;\n  357 |                                             #[cfg(feature = \"tokio_runtime\")]\n  358 |                                             if coop_count % CONSUME_BUDGET_FACTOR == 0 {\n  359 |                                                 tokio::task::coop::consume_budget().await\n  360 |                                             }\n  361 |                                             coop_count = coop_count.wrapping_add(1);\n  362 |                                         }"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In the TCP reader, non-EOF read errors are silently swallowed. In `WaitForObject` the `Err(_other_err)` arm only traces and then re-loops `WaitForObject`, and in `ReadObject` the `Err(_other_err)` arm is an empty TODO that falls through to `WaitForObject`. A persistent socket error (e.g. ConnectionReset that does not surface as UnexpectedEof) causes a tight infinite re-read loop that never terminates the session, leaking the connection and spinning the actor.","fix":"On any non-recoverable read error, drop the reader and `myself.stop(...)` the session (mirroring the EOF handling) instead of silently looping.","locations":[{"ref":"ractor_cluster/src/net/session.rs:422-425","code":"  422 |                         Err(_other_err) => {\n  423 |                             tracing::trace!(\"Error ({_other_err:?}) on stream\");\n  424 |                             // some other TCP error, more handling necessary\n  425 |                         }"},{"ref":"ractor_cluster/src/net/session.rs:460-462","code":"  460 |                         Err(_other_err) => {\n  461 |                             // TODO: some other TCP error, more handling necessary\n  462 |                         }"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `handle_node`, all `send_serialized` results and `where_is_pid` misses are dropped with `let _ =` / silent if-let, with no logging when the target actor does not exist or send fails. Inbound Cast/Call/Reply for a now-dead or unknown local pid are silently discarded, making remote-call timeouts hard to diagnose.","fix":"Log at debug/warn when `where_is_pid` returns None or `send_serialized` errors so dropped inter-node messages are observable.","locations":[{"ref":"ractor_cluster/src/node/node_session.rs:381-465","code":"  381 |                 node_protocol::node_message::Msg::Cast(cast_args) => {\n  382 |                     if let Some(actor) =\n  383 |                         ractor::registry::where_is_pid(ActorId::Local(cast_args.to))\n  384 |                     {\n  385 |                         let _ = actor.send_serialized(SerializedMessage::Cast {\n  386 |                             variant: cast_args.variant,\n  387 |                             args: cast_args.what,\n  388 |                             metadata: cast_args.metadata,\n  389 |                         });\n  390 |                     }\n  391 |                 }\n  392 |                 node_protocol::node_message::Msg::Call(call_args) => {\n  393 |                     let to = call_args.to;\n  394 |                     let tag = call_args.tag;\n  395 |                     if let Some(actor) =\n  396 |                         ractor::registry::where_is_pid(ActorId::Local(call_args.to))\n  397 |                     {\n  398 |                         let (tx, rx) = ractor::concurrency::oneshot();\n  399 | \n  400 |                         // send off the transmission in the serialized format, letting the message's own deserialization handle\n  401 |                         // the conversion\n  402 |                         let maybe_timeout = call_args.timeout_ms.map(Duration::from_millis);\n  403 |                         if let Some(timeout) = maybe_timeout {\n  404 |                             let _ = actor.send_serialized(SerializedMessage::Call {\n  405 |                                 args: call_args.what,\n  406 |                                 reply: (tx, timeout).into(),\n  407 |                                 variant: call_args.variant,\n  408 |                                 metadata: call_args.metadata,\n  409 |                             });\n  410 |                         } else {\n  411 |                             let _ = actor.send_serialized(SerializedMessage::Call {\n  412 |                                 args: call_args.what,\n  413 |                                 reply: tx.into(),\n  414 |                                 variant: call_args.variant,\n  415 |                                 metadata: call_args.metadata,\n  416 |                             });\n  417 |                         }\n  418 | \n  419 |                         // kick off a background task to reply to the channel request, threading the tag and who to reply to\n  420 |                         #[allow(clippy::let_underscore_future)]\n  421 |                         let _ = ractor::concurrency::spawn(async move {\n  422 |                             if let Some(timeout) = maybe_timeout {\n  423 |                                 if let Ok(Ok(result)) =\n  424 |                                     ractor::concurrency::timeout(timeout, rx).await\n  425 |                                 {\n  426 |                                     let reply = node_protocol::node_message::Msg::Reply(\n  427 |                                         node_protocol::CallReply {\n  428 |                                             tag,\n  429 |                                             to,\n  430 |                                             what: result,\n  431 |                                         },\n  432 |                                     );\n  433 |                                     let _ = ractor::cast!(\n  434 |                                         myself,\n  435 |                                         super::NodeSessionMessage::SendMessage(\n  436 |                                             node_protocol::NodeMessage { msg: Some(reply) }\n  437 |                                         )\n  438 |                                     );\n  439 |                                 }\n  440 |                             } else if let Ok(result) = rx.await {\n  441 |                                 let reply = node_protocol::node_message::Msg::Reply(\n  442 |                                     node_protocol::CallReply {\n  443 |                                         tag,\n  444 |                                         to,\n  445 |                                         what: result,\n  446 |                                     },\n  447 |                                 );\n  448 |                                 let _ = ractor::cast!(\n  449 |                                     myself,\n  450 |                                     super::NodeSessionMessage::SendMessage(\n  451 |                                         node_protocol::NodeMessage { msg: Some(reply) }\n  452 |                                     )\n  453 |                                 );\n  454 |                             }\n  455 |                         });\n  456 |                     }\n  457 |                 }\n  458 |                 node_protocol::node_message::Msg::Reply(call_reply_args) => {\n  459 |                     if let Some(actor) = state.remote_actors.get(&call_reply_args.to) {\n  460 |                         let _ = actor.send_serialized(SerializedMessage::CallReply(\n  461 |                             call_reply_args.tag,\n  462 |                             call_reply_args.what,\n  463 |                         ));\n  464 |                     }\n  465 |                 }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"StickyQueuerRouting::choose_target_worker scans the entire worker pool linearly (`worker_pool.iter().find(...is_processing_key...)`) on every routed job to find a worker already processing the key. For large worker pools under high job rates this is an O(pool_size) operation per dispatch on the hot path, defeating the O(1) available-worker deque maintained for the fallback case.","fix":"Maintain a `HashMap<TKey, WorkerId>` index of in-flight keys (updated on enqueue/complete) so sticky lookup is O(1) instead of scanning the whole pool.","locations":[{"ref":"ractor/src/factory/routing.rs:349-369","code":"  349 |     fn choose_target_worker(\n  350 |         &mut self,\n  351 |         job: &Job<TKey, TMsg>,\n  352 |         _pool_size: usize,\n  353 |         worker_hint: Option<WorkerId>,\n  354 |         worker_pool: &HashMap<WorkerId, WorkerProperties<TKey, TMsg>>,\n  355 |     ) -> Option<WorkerId> {\n  356 |         // check sticky first\n  357 |         if let Some(worker) = worker_hint.and_then(|worker| worker_pool.get(&worker)) {\n  358 |             if worker.is_processing_key(&job.key) {\n  359 |                 return worker_hint;\n  360 |             }\n  361 |         }\n  362 | \n  363 |         let maybe_worker = worker_pool\n  364 |             .iter()\n  365 |             .find(|(_, worker)| worker.is_processing_key(&job.key))\n  366 |             .map(|(a, _)| *a);\n  367 |         if maybe_worker.is_some() {\n  368 |             return maybe_worker;\n  369 |         }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"`which_groups()`, `which_scopes()` and `which_scopes_and_groups()` each scan the entire group `map` (every shard, every entry) and clone every matching key/name, even though a scope->groups secondary `index` already exists that could answer `which_groups`/`which_scopes` far more cheaply. Under many groups this is unnecessary lock contention and allocation on what look like read-mostly query paths.","fix":"Answer scope/group enumeration from the `index` DashMap (already maintained for `which_scoped_groups`) instead of full scans of `map`, falling back to `map` only where the index cannot answer.","locations":[{"ref":"ractor/src/pg.rs:466-477","code":"  466 | pub fn which_groups() -> Vec<GroupName> {\n  467 |     let monitor = get_monitor();\n  468 |     let mut groups = monitor\n  469 |         .map\n  470 |         .iter()\n  471 |         .filter(|kvp| !kvp.value().members.is_empty())\n  472 |         .map(|kvp| kvp.key().group.to_owned())\n  473 |         .collect::<Vec<_>>();\n  474 |     groups.sort_unstable();\n  475 |     groups.dedup();\n  476 |     groups\n  477 | }"},{"ref":"ractor/src/pg.rs:497-505","code":"  497 | pub fn which_scopes_and_groups() -> Vec<ScopeGroupKey> {\n  498 |     let monitor = get_monitor();\n  499 |     monitor\n  500 |         .map\n  501 |         .iter()\n  502 |         .filter(|kvp| !kvp.value().members.is_empty())\n  503 |         .map(|kvp| kvp.key().clone())\n  504 |         .collect::<Vec<_>>()\n  505 | }"},{"ref":"ractor/src/pg.rs:510-518","code":"  510 | pub fn which_scopes() -> Vec<ScopeName> {\n  511 |     let monitor = get_monitor();\n  512 |     monitor\n  513 |         .map\n  514 |         .iter()\n  515 |         .filter(|kvp| !kvp.value().members.is_empty())\n  516 |         .map(|kvp| kvp.key().scope.to_owned())\n  517 |         .collect::<Vec<_>>()\n  518 | }"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"The v1 (default) output port allocates a fresh `Vec<u8>`/heap for the broadcast on every `send`, and more importantly `subscribe` takes a write lock on `subscriptions` and linearly scans+`retain`s all subscriptions to prune dead ones on each subscribe call. With many subscribers and frequent subscriptions this is O(n) work under an exclusive lock. Additionally the broadcast channel buffer is hard-capped at 10 (`pubsub::channel(10)`), so a subscriber whose forwarding task falls more than 10 messages behind will silently drop messages (lagged receiver), which the module docs acknowledge only as \"high probability\" of delivery.","fix":"Document the lossy 10-message bound prominently, and consider pruning dead subscriptions lazily or under a cheaper structure; the v2 implementation already addresses the lossiness and should be the recommended path.","locations":[{"ref":"ractor/src/port/output.rs:73-81","code":"   73 |         fn default() -> Self {\n   74 |             // We only need enough buffer for the subscription task to forward to the input port\n   75 |             // of the receiving actor. Hence 10 should be plenty.\n   76 |             let (tx, _rx) = pubsub::channel(10);\n   77 |             Self {\n   78 |                 tx,\n   79 |                 subscriptions: RwLock::new(vec![]),\n   80 |             }\n   81 |         }"},{"ref":"ractor/src/port/output.rs:100-110","code":"  100 |             let mut subs = self.subscriptions.write().unwrap();\n  101 | \n  102 |             // filter out dead subscriptions, since they're no longer valid\n  103 |             subs.retain(|sub| !sub.is_dead());\n  104 | \n  105 |             let sub = OutputPortSubscription::new::<TMsg, F, TReceiverMsg>(\n  106 |                 self.tx.subscribe(),\n  107 |                 converter,\n  108 |                 receiver,\n  109 |             );\n  110 |             subs.push(sub);"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"The reader uses a two-message round-trip through the actor mailbox per frame: `WaitForObject` reads the u64 length and then casts `ReadObject(length)` back to itself, awaiting the body read inside the actor handler. Because the body read `.await`s inside `handle`, the actor is blocked anyway, so the extra mailbox hop per frame adds latency and allocation with no concurrency benefit.","fix":"Read the length and body in a single handler invocation (or a dedicated read loop task), eliminating the self-cast hop per frame.","locations":[{"ref":"ractor_cluster/src/net/session.rs:407-468","code":"  407 |         match message {\n  408 |             Self::Msg::WaitForObject if state.reader.is_some() => {\n  409 |                 if let Some(stream) = &mut state.reader {\n  410 |                     match stream.read_u64().await {\n  411 |                         Ok(length) => {\n  412 |                             tracing::trace!(\"Payload length message ({length}) received\");\n  413 |                             let _ = myself.cast(SessionReaderMessage::ReadObject(length));\n  414 |                             return Ok(());\n  415 |                         }\n  416 |                         Err(err) if err.kind() == ErrorKind::UnexpectedEof => {\n  417 |                             tracing::trace!(\"Error (EOF) on stream\");\n  418 |                             // EOF, close the stream by dropping the stream\n  419 |                             drop(state.reader.take());\n  420 |                             myself.stop(Some(\"channel_closed\".to_string()));\n  421 |                         }\n  422 |                         Err(_other_err) => {\n  423 |                             tracing::trace!(\"Error ({_other_err:?}) on stream\");\n  424 |                             // some other TCP error, more handling necessary\n  425 |                         }\n  426 |                     }\n  427 |                 }\n  428 | \n  429 |                 let _ = myself.cast(SessionReaderMessage::WaitForObject);\n  430 |             }\n  431 |             Self::Msg::ReadObject(length) if state.reader.is_some() => {\n  432 |                 if let Some(stream) = &mut state.reader {\n  433 |                     match read_n_bytes(stream, length as usize).await {\n  434 |                         Ok(buf) => {\n  435 |                             tracing::trace!(\"Payload of length({}) received\", buf.len());\n  436 |                             // NOTE: Our implementation writes 2 messages when sending something over the wire, the first\n  437 |                             // is exactly 8 bytes which constitute the length of the payload message (u64 in big endian format),\n  438 |                             // followed by the payload. This tells our TCP reader how much data to read off the wire\n  439 | \n  440 |                             // [buf] here should contain the exact amount of data to decode an object properly.\n  441 |                             let bytes = Bytes::from(buf);\n  442 |                             match crate::protocol::NetworkMessage::decode(bytes) {\n  443 |                                 Ok(msg) => {\n  444 |                                     // we decoded a message, pass it up the chain\n  445 |                                     let _ = self.session.cast(SessionMessage::ObjectAvailable(msg));\n  446 |                                 }\n  447 |                                 Err(decode_err) => {\n  448 |                                     tracing::error!(\n  449 |                                         \"Error decoding network message: '{decode_err}'. Discarding\"\n  450 |                                     );\n  451 |                                 }\n  452 |                             }\n  453 |                         }\n  454 |                         Err(err) if err.kind() == ErrorKind::UnexpectedEof => {\n  455 |                             // EOF, close the stream by dropping the stream\n  456 |                             drop(state.reader.take());\n  457 |                             myself.stop(Some(\"channel_closed\".to_string()));\n  458 |                             return Ok(());\n  459 |                         }\n  460 |                         Err(_other_err) => {\n  461 |                             // TODO: some other TCP error, more handling necessary\n  462 |                         }\n  463 |                     }\n  464 |                 }\n  465 | \n  466 |                 // we've read the object, now wait for next object\n  467 |                 let _ = myself.cast(SessionReaderMessage::WaitForObject);\n  468 |             }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","description":"ActorCell::get_name clones the Option<ActorName> (an Arc<str>/String clone) on every call, and it is invoked frequently for debug formatting (Debug impl, tracing fields, set_status cleanup). For hot paths this is an unnecessary allocation/refcount bump when only a borrow is needed.","fix":"Where call sites only need to read the name (Debug, logging), expose a borrowing accessor or pass the &Option<ActorName> through, reserving the cloning get_name for cases that genuinely need an owned value.","locations":[{"ref":"ractor/src/actor/actor_cell.rs:306-308","code":"  306 |     pub fn get_name(&self) -> Option<ActorName> {\n  307 |         self.inner.name.clone()\n  308 |     }"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","description":"is_stuck builds a formatted multi-line string of every in-flight job key (via fold + format! per key) every time it is called for a worker, even though the resulting string is only used inside a tracing::warn! that may be filtered out. On factories with the dead-man's switch enabled and many keys per worker this allocates unnecessarily on a periodic scan.","fix":"Only build the key string when the warn level is enabled, or pass the keys lazily to the tracing macro so formatting is skipped when the log is filtered.","locations":[{"ref":"ractor/src/factory/worker.rs:637-648","code":"  637 |     pub(crate) fn is_stuck(&self, duration: Duration) -> bool {\n  638 |         if Instant::now() - self.last_ping > duration {\n  639 |             let key_strings = self\n  640 |                 .curr_jobs\n  641 |                 .keys()\n  642 |                 .cloned()\n  643 |                 .fold(String::new(), |a, key| format!(\"{a}\\nJob key: {key:?}\"));\n  644 |             tracing::warn!(\"Stuck worker: {}. Last jobs:\\n{key_strings}\", self.wid);\n  645 |             true\n  646 |         } else {\n  647 |             false\n  648 |         }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"process_message handles MessagingErr::InvalidActorType and MessagingErr::SendErr from listen_in_priority, but listen_in_priority can only ever return MessagingErr::ChannelClosed (all its mapping arms produce ChannelClosed). The two extra arms are unreachable in practice and exist only to satisfy the match; the accompanying comments ('not possible') confirm this.","fix":"Change listen_in_priority's error type to MessagingErr<()> with a tighter contract or collapse the unreachable arms into a single `_ =>` arm to make the impossibility explicit and reduce duplicated handling.","locations":[{"ref":"ractor/src/actor.rs:928-941","code":"  928 |             Err(MessagingErr::InvalidActorType) => {\n  929 |                 // not possible. Treat like a channel closed\n  930 |                 Ok(ActorLoopResult::signal(Self::handle_signal(\n  931 |                     myself.clone(),\n  932 |                     Signal::Kill,\n  933 |                 )))\n  934 |             }\n  935 |             Err(MessagingErr::SendErr(_)) => {\n  936 |                 // not possible. Treat like a channel closed\n  937 |                 Ok(ActorLoopResult::signal(Self::handle_signal(\n  938 |                     myself.clone(),\n  939 |                     Signal::Kill,\n  940 |                 )))\n  941 |             }"},{"ref":"ractor/src/actor/actor_cell.rs:158-195","code":"  158 |     pub(crate) async fn listen_in_priority(\n  159 |         &mut self,\n  160 |     ) -> Result<ActorPortMessage, MessagingErr<()>> {\n  161 |         #[cfg(feature = \"async-std\")]\n  162 |         {\n  163 |             crate::concurrency::select! {\n  164 |                 signal = (&mut self.signal_rx).fuse() => {\n  165 |                     signal.map(ActorPortMessage::Signal).map_err(|_| MessagingErr::ChannelClosed)\n  166 |                 }\n  167 |                 stop = (&mut self.stop_rx).fuse() => {\n  168 |                     stop.map(ActorPortMessage::Stop).map_err(|_| MessagingErr::ChannelClosed)\n  169 |                 }\n  170 |                 supervision = self.supervisor_rx.recv().fuse() => {\n  171 |                     supervision.map(ActorPortMessage::Supervision).ok_or(MessagingErr::ChannelClosed)\n  172 |                 }\n  173 |                 message = self.message_rx.recv().fuse() => {\n  174 |                     message.map(ActorPortMessage::Message).ok_or(MessagingErr::ChannelClosed)\n  175 |                 }\n  176 |             }\n  177 |         }\n  178 |         #[cfg(not(feature = \"async-std\"))]\n  179 |         {\n  180 |             crate::concurrency::select! {\n  181 |                 signal = &mut self.signal_rx => {\n  182 |                     signal.map(ActorPortMessage::Signal).map_err(|_| MessagingErr::ChannelClosed)\n  183 |                 }\n  184 |                 stop = &mut self.stop_rx => {\n  185 |                     stop.map(ActorPortMessage::Stop).map_err(|_| MessagingErr::ChannelClosed)\n  186 |                 }\n  187 |                 supervision = self.supervisor_rx.recv() => {\n  188 |                     supervision.map(ActorPortMessage::Supervision).ok_or(MessagingErr::ChannelClosed)\n  189 |                 }\n  190 |                 message = self.message_rx.recv() => {\n  191 |                     message.map(ActorPortMessage::Message).ok_or(MessagingErr::ChannelClosed)\n  192 |                 }\n  193 |             }\n  194 |         }\n  195 |     }"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"Commented-out variants and imports remain in the v2 output port inner module: the `OutportMessage` enum has commented `RemoveSubscriber(Id)` / `Subscribers(...)` variants and an associated commented `use` line for `oneshot`/`OneshotSender`. This is leftover scaffolding that adds noise.","fix":"Remove the commented-out enum variants and the commented import line, or implement them if intended.","locations":[{"ref":"ractor/src/port/output.rs:232-249","code":"  232 |         //use crate::concurrency::{mpsc_unbounded, oneshot, MpscUnboundedSender, OneshotSender};\n  233 |         use crate::{ActorId, ActorRef, DerivedActorRef, Message};\n  234 | \n  235 |         #[cfg(feature = \"tokio_runtime\")]\n  236 |         /// As we do a lot of iteratio without calling async\n  237 |         /// method while dispatching message, we consume 1 tokio\n  238 |         /// task budget unit every CONSUMBE_BUDGET_FACTOR message sent\n  239 |         const CONSUME_BUDGET_FACTOR: u32 = 32;\n  240 |         /// Each subscriber may receive a batch of MAX_BATCH_SIZE\n  241 |         /// before another batch is sent to an other subscriber\n  242 |         const MAX_BATCH_SIZE: usize = 32;\n  243 | \n  244 |         enum OutportMessage<Id, TMsg> {\n  245 |             Data(TMsg),\n  246 |             SetSubscriber(Option<Box<dyn Subscriber<Id, TMsg>>>),\n  247 |             //RemoveSubscriber(Id),\n  248 |             //Subscribers(OneshotSender<Vec<Id>>),\n  249 |         }"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`ReadyState::SyncReceived` -> `Ready` transition is reachable in two places (handle_control Ready and after_authenticated), and `after_authenticated`'s match on `ReadyState::SyncReceived` sets Ready but never notifies the NodeServer of ConnectionReady from that path; only the SyncSent->Ready path in handle_control sends it. As a result the SyncReceived->Ready completion (peer sent Ready before we did) produces a Ready session that is never reported as ready to subscribers.","fix":"When `after_authenticated` transitions SyncReceived->Ready, also cast `NodeServerMessage::ConnectionReady(myself.get_id())` so both orderings notify subscribers.","locations":[{"ref":"ractor_cluster/src/node/node_session.rs:768-774","code":"  768 |         match state.ready {\n  769 |             ReadyState::Open => state.ready = ReadyState::SyncSent,\n  770 |             ReadyState::SyncReceived => state.ready = ReadyState::Ready,\n  771 |             ReadyState::SyncSent | ReadyState::Ready => {\n  772 |                 unreachable!(\"after_authenticated() executed twice\")\n  773 |             }\n  774 |         }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"medium","description":"The module-level doc comment claims that enum variants are encoded over the wire by a numeric `index` field assigned from their lexicographical ordering, and that this is the `index` field on `ractor::message::SerializedMessage`. This is false and contradicts both the actual implementation and the `RactorClusterMessage` doc immediately below it. The generated code uses the variant *name string* as the discriminator (`variant: #variant_name.to_string()`), there is no numeric index, no lexicographical sorting, and `SerializedMessage` has a `variant: String` field, not an `index` field. A reader relying on this comment would wrongly assume variant *ordering* (rather than names) must be kept stable across cluster nodes for wire compatibility, which is exactly backwards from the real (name-based) compatibility guarantee documented at lines 57-58 and 65.","fix":"Rewrite the comment to describe name-based tagging: each variant is identified over the wire by its variant name string (carried in the `variant: String` field of `SerializedMessage::Cast`/`Call`), so variant names (not ordering) must remain stable across nodes until all are upgraded.","locations":[{"ref":"ractor_cluster_derive/src/lib.rs:19-20","code":"   19 | //!    a. All variants of the enum will be numbered based on their lexicographical ordering, which is sent over-the-wire in order to decode which\n   20 | //!    variant was called. This is the `index` field on any variant of `ractor::message::SerializedMessage`"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The async-std `JoinSet::join_next` is documented to mirror tokio's `JoinSet` and returns `Option<Result<T, ()>>`, but it always wraps results in `Ok` (`self.set.next().await.map(|item| Ok(item))`) and can never produce `Err`. Callers like `rpc::multi_call` contain a `_ => return Err(MessagingErr::ChannelClosed)` arm intended to handle a cancelled/panicked joined task; with the async-std backend that arm is dead, so a panicking spawned task is silently lost instead of surfacing an error, diverging from tokio behavior where a `JoinError` would be returned.","fix":"Document the behavioral difference, or have the async-std `JoinSet` catch task failures (e.g. via a wrapper that detects cancellation) and return `Err(())` on failure to match tokio's contract.","locations":[{"ref":"ractor/src/concurrency/async_std_primitives.rs:146-149","code":"  146 |     /// Join the next future\n  147 |     pub async fn join_next(&mut self) -> Option<Result<T, ()>> {\n  148 |         self.set.next().await.map(|item| Ok(item))\n  149 |     }"},{"ref":"ractor/src/rpc.rs:254-259","code":"  254 |     while let Some(result) = join_set.join_next().await {\n  255 |         match result {\n  256 |             Ok((i, r)) => results[i] = r,\n  257 |             _ => return Err(MessagingErr::ChannelClosed),\n  258 |         }\n  259 |     }"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The comment for the `PgLeave` branch says 'join the remote actors to the local PG group' but the code performs a leave (`leave_scoped`). Copy-paste from the PgJoin branch above.","fix":"Correct the comment to 'leave the remote actors from the local PG group'.","locations":[{"ref":"ractor_cluster/src/node/node_session.rs:592-600","code":"  592 |                     // join the remote actors to the local PG group\n  593 |                     if !cells.is_empty() {\n  594 |                         tracing::debug!(\n  595 |                             \"PG Leave scope '{}' and group '{}' for {} remote actors\",\n  596 |                             leave.scope,\n  597 |                             leave.group,\n  598 |                             cells.len()\n  599 |                         );\n  600 |                         ractor::pg::leave_scoped(leave.scope, leave.group, cells);"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment for ActorProperties::send_message_unchecked is labeled 'SAFETY: Callers must ensure the message type matches the actor's expected type', implying memory-unsafety semantics, but the function is not `unsafe` and a type mismatch only yields a logical error / SendErr, never undefined behavior (the message is still type-erased via Any). The 'SAFETY' wording is misleading for a safe function.","fix":"Reword the comment as a normal invariant note (e.g. 'NOTE: callers must ensure ...') rather than 'SAFETY', since no unsafe code or UB is involved.","locations":[{"ref":"ractor/src/actor/actor_properties.rs:157-169","code":"  157 |     /// Send a message without runtime type checking.\n  158 |     ///\n  159 |     /// This is an internal optimization for strongly-typed ActorRef which has compile-time\n  160 |     /// type safety guarantees, avoiding the redundant runtime TypeId comparison.\n  161 |     ///\n  162 |     /// SAFETY: Callers must ensure the message type matches the actor's expected type.\n  163 |     pub(crate) fn send_message_unchecked<TMessage>(\n  164 |         &self,\n  165 |         message: TMessage,\n  166 |     ) -> Result<(), MessagingErr<TMessage>>\n  167 |     where\n  168 |         TMessage: Message,\n  169 |     {"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The async-std `JoinHandle` Debug impl labels the `is_done` atomic field as \"name\" (`.field(\"name\", &self.is_done.load(...))`), which is misleading — it prints the completion flag under the key `name`, not any task name.","fix":"Rename the debug field key from \"name\" to \"is_done\" (and \"handle\" already correctly reflects handle presence).","locations":[{"ref":"ractor/src/concurrency/async_std_primitives.rs:33-40","code":"   33 | impl<T> Debug for JoinHandle<T> {\n   34 |     fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {\n   35 |         f.debug_struct(\"JoinHandle\")\n   36 |             .field(\"name\", &self.is_done.load(Ordering::Relaxed))\n   37 |             .field(\"handle\", &self.handle.is_some())\n   38 |             .finish()\n   39 |     }\n   40 | }"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"update_settings logs the discard handler update with the label `HashValue` (\"Updating discard handler: HashValue={}\") while logging `discard_handler.is_some()`. This is a copy-paste typo of `HasValue` used in the surrounding log lines and prints a boolean under a misleading key.","fix":"Change the format string label from `HashValue` to `HasValue` to match the other update_settings log lines.","locations":[{"ref":"ractor/src/factory/factoryimpl.rs:715-719","code":"  715 |         if let Some(discard_handler) = discard_handler {\n  716 |             tracing::debug!(\n  717 |                 \"Updating discard handler: HashValue={}\",\n  718 |                 discard_handler.is_some()\n  719 |             );"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment on WorkerProperties.discard_settings says \"will cause an oldest job at the head of the queue will be dropped\" — this is grammatically broken (\"an oldest ... will be dropped\") and also misleading because the discard direction (oldest vs newest) actually depends on the configured DiscardMode, not always the oldest.","fix":"Reword to: \"When the queue is at its max length, a job at the head (oldest) or the incoming job (newest) is dropped depending on the configured DiscardMode.\"","locations":[{"ref":"ractor/src/factory/worker.rs:506-510","code":"  506 |     /// Maximum queue length. Any job arriving when the queue is at its max length\n  507 |     /// will cause an oldest job at the head of the queue will be dropped.\n  508 |     ///\n  509 |     /// Default is [WorkerDiscardSettings::None]\n  510 |     pub(crate) discard_settings: WorkerDiscardSettings,"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment on the status filter says actors that are 'already stopping or stopped' are filtered out, but the predicate `(a.get_status() as u8) <= (ActorStatus::Draining as u8)` actually admits Unstarted, Starting, Running, Upgrading AND Draining, only excluding Stopping/Stopped. Draining actors (which are winding down) are still accepted into the group, contradicting the implication of the comment.","fix":"Clarify the comment to state that only Stopping/Stopped actors are excluded (Draining is still admitted), or tighten the predicate to `< Draining` if Draining actors should not be added.","locations":[{"ref":"ractor/src/pg.rs:232-236","code":"  232 |     // Filter out actors that are already stopping or stopped\n  233 |     let actors: Vec<ActorCell> = actors\n  234 |         .into_iter()\n  235 |         .filter(|a| (a.get_status() as u8) <= (ActorStatus::Draining as u8))\n  236 |         .collect();"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The NetworkStream::External doc comment states the framing is 'u64/usize big-endian length prefix', but the actual wire format is strictly a u64 big-endian prefix (write_all of `len.to_be_bytes()` where len is usize cast/encoded, read via `read_u64`). The 'usize' wording is misleading and could lead an external-transport implementer to use the wrong prefix width on 32-bit targets.","fix":"Reword to specify an unambiguous 8-byte (u64) big-endian length prefix.","locations":[{"ref":"ractor_cluster/src/net.rs:55-70","code":"   55 |     /// External transport injected by the user\n   56 |     ///\n   57 |     /// This variant enables custom transports to be used while preserving\n   58 |     /// the existing TCP/TLS paths. The provided reader/writer must be a\n   59 |     /// connected, bidirectional byte stream using the same framing\n   60 |     /// (u64/usize big-endian length prefix + prost payload).\n   61 |     External {\n   62 |         /// Optional label for the peer (used for diagnostics)\n   63 |         peer_label: Option<String>,\n   64 |         /// Optional label for the local endpoint (used for diagnostics)\n   65 |         local_label: Option<String>,\n   66 |         /// Read half\n   67 |         reader: BoxRead,\n   68 |         /// Write half\n   69 |         writer: BoxWrite,\n   70 |     },"}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"handle_supervisor_evt handles SupervisionEvent::ActorTerminated and SupervisionEvent::ActorFailed with virtually identical bodies (find worker by pid
