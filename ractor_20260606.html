<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","description":"The TCP reader reads a u64 length prefix straight off an untrusted, unauthenticated network socket and immediately allocates a buffer of that size via `vec![0u8; len]` in `read_n_bytes`. A malicious or buggy peer can send a length prefix of up to 2^64-1, causing an enormous allocation that aborts the process (OOM) — a trivial unauthenticated remote DoS. The handshake has not yet completed when the first frames arrive, so no authentication gates this.","fix":"Enforce a sane maximum frame size before allocating. After `read_u64()` (session.rs:410), reject any `length` greater than a configurable cap (e.g. a few MB) by stopping the reader/session instead of allocating. Optionally grow the buffer incrementally rather than allocating the full claimed size up front.","locations":[{"ref":"ractor_cluster/src/net/session.rs:33-57","code":"   33 | async fn read_n_bytes(stream: &mut ActorReadHalf, len: usize) -> Result<Vec<u8>, tokio::io::Error> {\n   34 |     let mut buf = vec![0u8; len];\n   35 |     let mut c_len = 0;\n   36 |     if let ActorReadHalf::Regular(r) = stream {\n   37 |         r.readable().await?;\n   38 |     }\n   39 | \n   40 |     while c_len < len {\n   41 |         let n = match stream {\n   42 |             ActorReadHalf::ServerTls(t) => t.read(&mut buf[c_len..]).await?,\n   43 |             ActorReadHalf::ClientTls(t) => t.read(&mut buf[c_len..]).await?,\n   44 |             ActorReadHalf::Regular(t) => t.read(&mut buf[c_len..]).await?,\n   45 |             ActorReadHalf::External(t) => t.read(&mut buf[c_len..]).await?,\n   46 |         };\n   47 |         if n == 0 {\n   48 |             // EOF\n   49 |             return Err(tokio::io::Error::new(\n   50 |                 tokio::io::ErrorKind::UnexpectedEof,\n   51 |                 \"EOF\",\n   52 |             ));\n   53 |         }\n   54 |         c_len += n;\n   55 |     }\n   56 |     Ok(buf)\n   57 | }"},{"ref":"ractor_cluster/src/net/session.rs:431-433","code":"  431 |             Self::Msg::ReadObject(length) if state.reader.is_some() => {\n  432 |                 if let Some(stream) = &mut state.reader {\n  433 |                     match read_n_bytes(stream, length as usize).await {"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"hash_with_max computes `dh.finish() % (excluded_max as u64)`. If `excluded_max` (the worker pool size) is 0, this is an integer modulo by zero which panics and crashes the factory actor. A pool size of 0 is reachable: `num_initial_workers` is user-supplied (the builder default is 1, but 0 is accepted), and KeyPersistentRouting / CustomRouting call hash_with_max with `pool_size` on every dispatch. A Dispatch arriving while pool_size==0 panics.","fix":"Guard against a zero space, e.g. `if excluded_max == 0 { return 0; }` at the top of hash_with_max, and/or reject/refuse routing when pool_size == 0 in the routers.","locations":[{"ref":"ractor/src/factory/hash.rs:14-22","code":"   14 | pub fn hash_with_max<TKey>(key: &TKey, excluded_max: usize) -> usize\n   15 | where\n   16 |     TKey: Hash,\n   17 | {\n   18 |     let mut dh = DefaultHasher::new();\n   19 |     key.hash(&mut dh);\n   20 |     let bounded_hash = dh.finish() % (excluded_max as u64);\n   21 |     bounded_hash as usize\n   22 | }"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"The non-`blanket_serde` `BytesConvertable::from_bytes` implementations panic on malformed or truncated input. The numeric impl slices `&bytes[..size_of::<Self>()]` (panics if `bytes` is shorter than the type size), `String::from_bytes` calls `String::from_utf8(bytes).unwrap()` (panics on invalid UTF-8), `bool::from_bytes` indexes `bytes[0]` (panics on empty slice), and `char::from_bytes` / `Vec<char>::from_bytes` call `char::from_u32(u).unwrap()` (panics on invalid scalar values). These functions deserialize bytes that, with the `cluster` feature, arrive from a remote peer over the network. A malicious or buggy peer can therefore crash (panic) the actor/runtime decoding the message — a remote denial-of-service. The doc comment claims \"Panics are acceptable\" but that is unsafe for attacker-controlled wire data.","fix":"Change `BytesConvertable::from_bytes` to return `Result<Self, _>` (or add a fallible variant) and have the cluster deserialization path propagate a `BoxedDowncastErr` instead of panicking on short slices, invalid UTF-8, or invalid char code points.","locations":[{"ref":"ractor/src/serialization.rs:54-57","code":"   54 |                 fn from_bytes(bytes: Vec<u8>) -> Self {\n   55 |                     let mut data = [0u8; std::mem::size_of::<Self>()];\n   56 |                     data.copy_from_slice(&bytes[..std::mem::size_of::<Self>()]);\n   57 |                     Self::from_be_bytes(data)"},{"ref":"ractor/src/serialization.rs:93-95","code":"   93 |         fn from_bytes(bytes: Vec<u8>) -> Self {\n   94 |             bytes[0] == 1u8\n   95 |         }"},{"ref":"ractor/src/serialization.rs:103-106","code":"  103 |         fn from_bytes(bytes: Vec<u8>) -> Self {\n  104 |             let u = u32::from_bytes(bytes);\n  105 |             Self::from_u32(u).unwrap()\n  106 |         }"},{"ref":"ractor/src/serialization.rs:113-115","code":"  113 |         fn from_bytes(bytes: Vec<u8>) -> Self {\n  114 |             String::from_utf8(bytes).unwrap()\n  115 |         }"},{"ref":"ractor/src/serialization.rs:195-200","code":"  195 |         fn from_bytes(bytes: Vec<u8>) -> Self {\n  196 |             let u32s = <Vec<u32>>::from_bytes(bytes);\n  197 |             u32s.into_iter()\n  198 |                 .map(|u| char::from_u32(u).unwrap())\n  199 |                 .collect::<Vec<_>>()\n  200 |         }"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"The Pong control-message handler calls `.expect(...)` three times on values derived from network input: `pong.timestamp.expect(\"Timestamp missing in Pong\")`, `.try_into().expect(...)`, and `duration_since(UNIX_EPOCH).expect(\"Time went backwards\")`. A peer can send a Pong with `timestamp = None` or with a timestamp that fails `prost_types::Timestamp` -> `SystemTime` conversion, panicking the NodeSession actor. This is reachable from authenticated peers but still untrusted-network input.","fix":"Replace the `expect` calls with graceful handling: match on `Option`/`Result`, and on `None`/`Err` log a warning and ignore the malformed Pong (or close the session) rather than panicking.","locations":[{"ref":"ractor_cluster/src/node/node_session.rs:538-547","code":"  538 |                 control_protocol::control_message::Msg::Pong(pong) => {\n  539 |                     let ts: std::time::SystemTime = pong\n  540 |                         .timestamp\n  541 |                         .expect(\"Timestamp missing in Pong\")\n  542 |                         .try_into()\n  543 |                         .expect(\"Failed to convert Pong(Timestamp) to SystemTime\");\n  544 |                     let inst = ts\n  545 |                         .duration_since(SystemTime::UNIX_EPOCH)\n  546 |                         .expect(\"Time went backwards\");\n  547 |                     let delta_ms = (state.epoch.elapsed() - inst).as_millis();"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","description":"Job::is_expired calls `self.options.submit_time.elapsed().unwrap()`. SystemTime::elapsed returns Err if the system clock has moved backwards relative to submit_time (clock adjustments, NTP steps), which would panic the worker/factory while checking expiry on the hot dispatch/queue-drain path. SystemTime is not monotonic so this is a real possibility in production.","fix":"Handle the Err case gracefully, e.g. `self.options.submit_time.elapsed().map(|e| e > ttl).unwrap_or(false)`, or store submit_time as a monotonic Instant for expiry purposes.","locations":[{"ref":"ractor/src/factory/job.rs:356-362","code":"  356 |     pub fn is_expired(&self) -> bool {\n  357 |         if let Some(ttl) = self.options.ttl {\n  358 |             self.options.submit_time.elapsed().unwrap() > ttl\n  359 |         } else {\n  360 |             false\n  361 |         }\n  362 |     }"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"LeakyBucketRateLimiter::refresh divides by `millis = self.interval.as_millis()` (`since / millis` and `since % millis`). If the limiter is constructed with `interval = Duration::ZERO` (or any sub-millisecond interval, which truncates to 0 ms), `millis` is 0 and the division/modulo panics. The builder accepts an arbitrary `interval` with no validation.","fix":"Validate `interval` is non-zero in the builder (or clamp `millis` to a minimum of 1), e.g. `let millis = self.interval.as_millis().max(1);`.","locations":[{"ref":"ractor/src/factory/ratelim.rs:139-162","code":"  139 |     fn refresh(&mut self, now: Instant) {\n  140 |         if now < self.deadline {\n  141 |             return;\n  142 |         }\n  143 | \n  144 |         // Time elapsed in milliseconds since the last deadline.\n  145 |         let millis = self.interval.as_millis();\n  146 |         let since = now.saturating_duration_since(self.deadline).as_millis();\n  147 | \n  148 |         let periods = usize::try_from(since / millis + 1).unwrap_or(usize::MAX);\n  149 | \n  150 |         let tokens = periods\n  151 |             .checked_mul(self.refill)\n  152 |             .unwrap_or(MAX_LB_BALANCE)\n  153 |             .min(MAX_LB_BALANCE);\n  154 | \n  155 |         let remaining_millis_until_next_deadline =\n  156 |             u64::try_from(since % millis).unwrap_or(u64::MAX);\n  157 |         self.deadline = now\n  158 |             + self\n  159 |                 .interval\n  160 |                 .saturating_sub(Duration::from_millis(remaining_millis_until_next_deadline));\n  161 |         self.balance = (self.balance + tokens).min(self.max);\n  162 |     }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","description":"`derive_serialization_for_prost_type!` generates a `from_bytes` that calls `decode_length_delimited(buffer).unwrap()`. Any prost-derived message type using this macro will panic on malformed/truncated bytes. While the macro is user-invoked, it is the documented mechanism for cluster message types and the deserialized bytes come from the network, so a malformed payload from a peer panics the deserializing actor.","fix":"Document that `from_bytes` cannot return an error in the current `BytesConvertable` contract, but at minimum avoid `unwrap()` by returning a default or trapping the error; better, propagate a decode error if/when the trait allows it.","locations":[{"ref":"ractor_cluster/src/macros.rs:22-25","code":"   22 |             fn from_bytes(bytes: Vec<u8>) -> Self {\n   23 |                 let buffer = bytes::Bytes::from(bytes);\n   24 |                 <Self as prost::Message>::decode_length_delimited(buffer).unwrap()\n   25 |             }"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","description":"The generated per-field deserialization code indexes `__args` with `__args[__ptr..__ptr+8]` and `__args[__ptr..__ptr+__len]` without any bounds checking. `deserialize` runs on data received from a remote node over the network; a truncated, corrupt, or maliciously crafted `args` buffer (e.g. a declared length larger than the remaining bytes, or fewer than 8 bytes for the length prefix) will trigger an out-of-bounds slice panic inside the actor's message-handling task rather than returning `Err(BoxedDowncastErr)`. The surrounding `deserialize` signature returns a `Result`, so other failure modes are reported as errors, making this an inconsistent and remotely-triggerable panic / DoS vector.","fix":"Generate length-checked reads: verify `__ptr + 8 <= __args.len()` before reading the length prefix and `__ptr + __len <= __args.len()` before reading the payload, returning `Err(ractor::message::BoxedDowncastErr)` on failure instead of slicing directly.","locations":[{"ref":"ractor_cluster_derive/src/codegen.rs:297-311","code":"  297 | fn unpack_arg(field: &Ident, target_type: &syn::Type) -> impl ToTokens {\n  298 |     quote! {\n  299 |         let #field = {\n  300 |             let mut __len_bytes = [0u8; 8];\n  301 |             __len_bytes.copy_from_slice(&__args[__ptr..__ptr+8]);\n  302 |             let __len = u64::from_be_bytes(__len_bytes) as usize;\n  303 | \n  304 |             __ptr += 8;\n  305 |             let __data_bytes = __args[__ptr..__ptr+__len].to_vec();\n  306 |             let __t_result = <#target_type as ractor::BytesConvertable>::from_bytes(__data_bytes);\n  307 |             __ptr += __len;\n  308 |             __t_result\n  309 |         };\n  310 |     }\n  311 | }"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","description":"send_message_unchecked unwraps TMessage::from_boxed(m) when the channel send fails and the boxed message is returned, in order to hand the original message back inside SendErr. This round-trips a message that was just boxed locally, so it normally succeeds, but it is an unwrap on a fallible downcast in a non-test code path; any future change that lets a non-round-trippable message reach here (or a logic error in box/unbox) turns a benign SendErr into a hard panic inside the sender's thread.","fix":"Avoid the down-cast round trip: keep a way to recover the original typed value without re-boxing (e.g. send by value through a wrapper that retains the original on failure), or degrade gracefully to MessagingErr::ChannelClosed instead of unwrapping.","locations":[{"ref":"ractor/src/actor/actor_properties.rs:179-185","code":"  179 |         self.message\n  180 |             .send(MuxedMessage::Message(boxed))\n  181 |             .map_err(|e| match e.0 {\n  182 |                 MuxedMessage::Message(m) => MessagingErr::SendErr(TMessage::from_boxed(m).unwrap()),\n  183 |                 _ => panic!(\"Expected a boxed message but got a drain message\"),\n  184 |             })\n  185 |     }"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","description":"try_route_next_active_job contains an explicit `panic!` on the RouteResult::Backlog branch, asserting an invariant that a targeted worker can never backlog. This depends entirely on every Router implementation (including user-supplied custom routers via the public Router trait) honoring the contract that choose_target_worker returning Some guarantees route_message will not return Backlog. A buggy or reasonable custom router will hard-panic the entire factory rather than logging and recovering.","fix":"Replace the panic with error logging and re-enqueue the job (or return an ActorProcessingErr) so a misbehaving router degrades gracefully instead of crashing the factory.","locations":[{"ref":"ractor/src/factory/factoryimpl.rs:329-335","code":"  329 |                     RouteResult::Backlog(_) => {\n  330 |                         tracing::error!(\n  331 |                             \"Error routing job to {worker}. Invariant violated with backlog when we have a targeted worker\"\n  332 |                         );\n  333 | \n  334 |                         panic!(\"Received invalid variant of `RouteResult::Backlog` because a worker is unavailable, but we already targeted a worker.\");\n  335 |                     }"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","description":"JobOptions::into_bytes uses `.duration_since(UNIX_EPOCH).expect(\"Time went backwards\")` (cluster feature). If submit_time is before the UNIX epoch (e.g. a deserialized/zeroed value or a misconfigured clock) this panics during serialization of a job destined for a remote node, crashing the sender actor.","fix":"Use `duration_since(UNIX_EPOCH).unwrap_or_default()` to encode 0 when the time precedes the epoch rather than panicking.","locations":[{"ref":"ractor/src/factory/job.rs:134-153","code":"  134 | #[cfg(feature = \"cluster\")]\n  135 | impl BytesConvertable for JobOptions {\n  136 |     fn into_bytes(self) -> Vec<u8> {\n  137 |         let submit_time = (self\n  138 |             .submit_time\n  139 |             .duration_since(std::time::UNIX_EPOCH)\n  140 |             .expect(\"Time went backwards\")\n  141 |             .as_nanos() as u64)\n  142 |             .to_be_bytes();\n  143 |         let ttl = self\n  144 |             .ttl\n  145 |             .map(|t| t.as_nanos() as u64)\n  146 |             .unwrap_or(0)\n  147 |             .to_be_bytes();\n  148 | \n  149 |         let mut data = vec![0u8; 16];\n  150 |         data[0..8].copy_from_slice(&submit_time);\n  151 |         data[8..16].copy_from_slice(&ttl);\n  152 |         data\n  153 |     }"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"negligible","description":"DerivedActorRef::get_derived's send closure panics if a returned SendErr message cannot be converted back from the full TMessage to TFrom via TryFrom. This is documented as 'should never happen', and indeed From/TryFrom for a subset type are inverses in correct usage, but a user supplying inconsistent From/TryFrom impls converts a recoverable send failure into a panic on the caller's thread.","fix":"Return a dedicated error (e.g. map to MessagingErr::ChannelClosed or a new variant) instead of panicking when the reverse conversion fails, so misconfigured conversions degrade gracefully rather than aborting the caller.","locations":[{"ref":"ractor/src/actor/derived_actor.rs:211-226","code":"  211 |         let cast_and_send = move |msg: TFrom| {\n  212 |             actor_ref.send_message(msg.into()).map_err(|err| match err {\n  213 |                 MessagingErr::SendErr(returned) => {\n  214 |                     let Ok(err) = TFrom::try_from(returned) else {\n  215 |                         panic!(\n  216 |                             \"Failed to deconvert message from {} to {} when sending to: {actor_ref:?}\",\n  217 |                             std::any::type_name::<TMessage>(),\n  218 |                             std::any::type_name::<TFrom>()\n  219 |                         );\n  220 |                     };\n  221 |                     MessagingErr::SendErr(err)\n  222 |                 }\n  223 |                 MessagingErr::ChannelClosed => MessagingErr::ChannelClosed,\n  224 |                 MessagingErr::InvalidActorType => MessagingErr::InvalidActorType,\n  225 |             })\n  226 |         };"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"negligible","description":"`ThreadLocalActorSpawner::new()` (tokio variant) builds a current-thread runtime with `.build().unwrap()`. If runtime construction fails (e.g. resource exhaustion building the new thread/runtime), this panics rather than surfacing an error. Since `new()` returns `Self` (not a Result) and is part of the public API, the only options are panic, but the failure is silent to callers until it aborts.","fix":"Document that `new()` may panic on runtime-construction failure, or provide a fallible `try_new() -> Result<Self, _>` constructor that propagates the build error.","locations":[{"ref":"ractor/src/thread_local.rs:414-417","code":"  414 |         let rt = tokio::runtime::Builder::new_current_thread()\n  415 |             .enable_all()\n  416 |             .build()\n  417 |             .unwrap();"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"notify_stop_listener() calls notify_waiters() followed by notify_one(). notify_one() stores a single permit so that a caller who begins waiting AFTER the actor has already stopped returns immediately. However only ONE such late waiter can be served: the first late caller of wait()/drain_and_wait/send_stop_and_wait/send_signal_and_wait consumes the single stored permit, and any subsequent late waiter will block forever because no further permit is ever produced. Multiple consumers awaiting an already-dead actor can deadlock.","fix":"Replace the Notify-based one-shot stop signaling with a primitive that latches permanently once stopped (e.g. a tokio watch channel or an AtomicBool checked before awaiting, or a Notify guarded by a 'stopped' flag so late waiters short-circuit). Any wait API should observe a sticky 'stopped' state rather than relying on a single stored notify permit.","locations":[{"ref":"ractor/src/actor/actor_properties.rs:272-278","code":"  272 |     pub(crate) fn notify_stop_listener(&self) {\n  273 |         self.wait_handler.notify_waiters();\n  274 |         // make sure that any future caller immediately returns by pre-storing\n  275 |         // a notify permit (i.e. the actor stops, but you are only start waiting\n  276 |         // after the actor has already notified it's dead.)\n  277 |         self.wait_handler.notify_one();\n  278 |     }"},{"ref":"ractor/src/actor/actor_properties.rs:254-258","code":"  254 |     /// Wait for the actor to exit\n  255 |     pub(crate) async fn wait(&self) {\n  256 |         let rx = self.wait_handler.notified();\n  257 |         rx.await;\n  258 |     }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"`join_scoped` filters out actors whose status is > Draining (line 233-236) and then inserts the survivors into the group. This is a TOCTOU: an actor can pass the filter and then transition to Stopping and run its `set_status` cleanup (`leave_all`/`demonitor_all`) BEFORE `join_scoped` performs the insert at lines 246-248. Because `leave_all` already ran, the late insert leaves the dead actor permanently stuck as a member of the group, leaking the entry and causing `get_members` to hand out a dead ActorCell.","fix":"Re-check the actor status while holding the group's map entry lock just before inserting, or have `set_status` cleanup and `join` coordinate so a join that races a shutdown cannot resurrect a removed member.","locations":[{"ref":"ractor/src/pg.rs:232-248","code":"  232 |     // Filter out actors that are already stopping or stopped\n  233 |     let actors: Vec<ActorCell> = actors\n  234 |         .into_iter()\n  235 |         .filter(|a| (a.get_status() as u8) <= (ActorStatus::Draining as u8))\n  236 |         .collect();\n  237 | \n  238 |     if actors.is_empty() {\n  239 |         return;\n  240 |     }\n  241 | \n  242 |     // Lock map entry, insert members, clone per-group listeners, then drop the guard\n  243 |     let listeners = {\n  244 |         let mut entry = monitor.map.entry(key).or_default();\n  245 |         let gs = entry.value_mut();\n  246 |         for actor in actors.iter() {\n  247 |             gs.members.insert(actor.get_id(), actor.clone());\n  248 |         }"}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"`join_scoped` and `leave_scoped` (and `leave_all`) update the members map and the scope->groups secondary `index` under two separate, non-atomic DashMap lock acquisitions. A concurrent interleaving can permanently desynchronize them: T1 (leave) removes the last member from the map and computes all_members_left=true and drops the map guard; T2 (join) inserts a member into the map and adds the group to the index; T1 then runs its index-removal step and deletes the group from the index. The group now has a live member in `map` but is absent from `index`, so `which_scoped_groups` will permanently fail to report it.","fix":"Make the members-map mutation and the index mutation atomic with respect to each other, e.g. hold a single per-scope lock covering both structures, or derive `which_scoped_groups`/index lazily from the authoritative `map` instead of maintaining a separately-locked secondary index.","locations":[{"ref":"ractor/src/pg.rs:242-257","code":"  242 |     // Lock map entry, insert members, clone per-group listeners, then drop the guard\n  243 |     let listeners = {\n  244 |         let mut entry = monitor.map.entry(key).or_default();\n  245 |         let gs = entry.value_mut();\n  246 |         for actor in actors.iter() {\n  247 |             gs.members.insert(actor.get_id(), actor.clone());\n  248 |         }\n  249 |         gs.listeners.clone()\n  250 |     };\n  251 | \n  252 |     // Update index\n  253 |     monitor\n  254 |         .index\n  255 |         .entry(scope.to_owned())\n  256 |         .or_default()\n  257 |         .insert(group.to_owned());"},{"ref":"ractor/src/pg.rs:290-320","code":"  290 |     // Lock map entry, remove members, clone listeners, check emptiness\n  291 |     let result = if let Occupied(mut occupied) = monitor.map.entry(key) {\n  292 |         let gs = occupied.get_mut();\n  293 |         for actor in actors.iter() {\n  294 |             gs.members.remove(&actor.get_id());\n  295 |         }\n  296 |         let listeners = gs.listeners.clone();\n  297 |         let all_members_left = gs.members.is_empty();\n  298 |         let fully_empty = all_members_left && gs.listeners.is_empty();\n  299 |         if fully_empty {\n  300 |             occupied.remove();\n  301 |         }\n  302 |         Some((listeners, all_members_left))\n  303 |     } else {\n  304 |         None\n  305 |     };\n  306 | \n  307 |     let Some((listeners, all_members_left)) = result else {\n  308 |         return;\n  309 |     };\n  310 | \n  311 |     // Update index only if all members left\n  312 |     if all_members_left {\n  313 |         if let Some(mut groups) = monitor.index.get_mut(&scope) {\n  314 |             groups.remove(&group);\n  315 |             if groups.is_empty() {\n  316 |                 drop(groups);\n  317 |                 monitor.index.remove(&scope);\n  318 |             }\n  319 |         }\n  320 |     }"}]},{"id":"RACE_4","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"`ConnectionReady` can be missed. In the auth-completion path (handle, lines 981-991) the session only sends `ConnectionReady` if `state.ready.is_ok()` immediately after `after_authenticated`. But `after_authenticated` sets ready to `SyncSent` (if Open) and only transitions to `Ready` upon receiving the peer's `Ready` control message in `handle_control`. If the peer's `Ready` message was already processed-and-dropped earlier (it is only accepted once auth.is_ok), or arrives in a different interleaving, the ConnectionReady notification to the NodeServer can be lost, so subscribers never get `node_session_ready`.","fix":"Drive the ConnectionReady notification solely from the ReadyState transition to `Ready` (in handle_control) rather than also speculatively checking it right after authentication, and ensure Ready control messages received before local sync are buffered/handled.","locations":[{"ref":"ractor_cluster/src/node/node_session.rs:481-497","code":"  481 |         if let Some(msg) = message.msg {\n  482 |             match msg {\n  483 |                 control_protocol::control_message::Msg::Ready(_) => match state.ready {\n  484 |                     ReadyState::Open => {\n  485 |                         state.ready = ReadyState::SyncReceived;\n  486 |                     }\n  487 |                     ReadyState::SyncSent => {\n  488 |                         state.ready = ReadyState::Ready;\n  489 |                         ractor::cast!(\n  490 |                             self.node_server,\n  491 |                             NodeServerMessage::ConnectionReady(myself.get_id())\n  492 |                         )?;\n  493 |                     }\n  494 |                     ReadyState::SyncReceived | ReadyState::Ready => {\n  495 |                         tracing::warn!(\"Received duplicate Ready signal\");\n  496 |                     }\n  497 |                 },"},{"ref":"ractor_cluster/src/node/node_session.rs:763-774","code":"  763 |         state.tcp_send_control(control_protocol::ControlMessage {\n  764 |             msg: Some(control_protocol::control_message::Msg::Ready(\n  765 |                 control_protocol::Ready {},\n  766 |             )),\n  767 |         });\n  768 |         match state.ready {\n  769 |             ReadyState::Open => state.ready = ReadyState::SyncSent,\n  770 |             ReadyState::SyncReceived => state.ready = ReadyState::Ready,\n  771 |             ReadyState::SyncSent | ReadyState::Ready => {\n  772 |                 unreachable!(\"after_authenticated() executed twice\")\n  773 |             }\n  774 |         }"},{"ref":"ractor_cluster/src/node/node_session.rs:981-991","code":"  981 |                             if !p_state && state.auth.is_ok() {\n  982 |                                 self.node_server.cast(\n  983 |                                     NodeServerMessage::ConnectionAuthenticated(myself.get_id()),\n  984 |                                 )?;\n  985 |                                 self.after_authenticated(myself.clone(), state);\n  986 |                                 if state.ready.is_ok() {\n  987 |                                     self.node_server.cast(NodeServerMessage::ConnectionReady(\n  988 |                                         myself.get_id(),\n  989 |                                     ))?;\n  990 |                                 }\n  991 |                             }"}]},{"id":"RACE_5","type":"race_condition","type_label":"Race Condition","severity":"low","description":"ActorCell::set_status performs a non-atomic read-modify-write: it reads get_status(), branches on `< Stopping` to run one-time cleanup, then stores the new status via inner.set_status (a plain SeqCst store, not a CAS). Two threads transitioning the actor to Stopping/Stopped concurrently can both observe `< Stopping` and both run the full registry/pg/pid cleanup. Cleanup is idempotent so this is wasted work rather than corruption, but the 'only run cleanup once' invariant the comment claims is not actually guaranteed.","fix":"Use an atomic compare-and-swap / fetch_update on the status byte to claim the Stopping transition exactly once (mirroring the pattern already used in ActorProperties::drain) and only run cleanup for the thread that wins the transition.","locations":[{"ref":"ractor/src/actor/actor_cell.rs:331-362","code":"  331 |     pub(crate) fn set_status(&self, status: ActorStatus) {\n  332 |         // The actor is shut down — only run cleanup once, on the first transition\n  333 |         // to Stopping. This avoids redundant full-DashMap iterations on the\n  334 |         // Stopping → Stopped transition.\n  335 |         if (status == ActorStatus::Stopped || status == ActorStatus::Stopping)\n  336 |             && self.get_status() < ActorStatus::Stopping\n  337 |         {\n  338 |             #[cfg(feature = \"cluster\")]\n  339 |             {\n  340 |                 // stop monitoring for updates\n  341 |                 crate::registry::pid_registry::demonitor(self.get_id());\n  342 |                 // unregistry from the PID registry\n  343 |                 crate::registry::pid_registry::unregister_pid(self.get_id());\n  344 |             }\n  345 |             // If it's enrolled in the registry, remove it\n  346 |             if let Some(name) = self.get_name() {\n  347 |                 crate::registry::unregister(name);\n  348 |             }\n  349 |             // Leave all + stop monitoring pg groups (if any)\n  350 |             crate::pg::demonitor_all(self.get_id());\n  351 |             crate::pg::leave_all(self.get_id());\n  352 |         }\n  353 | \n  354 |         // Fix for #254. We should only notify the stop listener AFTER post_stop\n  355 |         // has executed, which is when the state gets set to `Stopped`.\n  356 |         if status == ActorStatus::Stopped {\n  357 |             // notify whoever might be waiting on the stop signal\n  358 |             self.inner.notify_stop_listener();\n  359 |         }\n  360 | \n  361 |         self.inner.set_status(status)\n  362 |     }"},{"ref":"ractor/src/actor/actor_properties.rs:119-121","code":"  119 |     pub(crate) fn set_status(&self, status: ActorStatus) {\n  120 |         self.status.store(status as u8, Ordering::SeqCst);\n  121 |     }"}]},{"id":"RACE_6","type":"race_condition","type_label":"Race Condition","severity":"low","description":"ActorProperties::set_status is a bare atomic store with no ordering guarantees relative to other status setters. External callers (e.g. drain() which uses fetch_update to Draining) can race with the actor's own processing loop setting Stopping/Stopped. A late Draining store could clobber a Stopping/Stopped status, re-opening the message gate (send_message_unchecked only rejects when status >= Draining), allowing messages to be enqueued onto an actor that is actually shutting down.","fix":"Make all status transitions go through fetch_update with monotonicity checks so the status can never move backwards (e.g. never overwrite Stopping/Stopped with Draining).","locations":[{"ref":"ractor/src/actor/actor_properties.rs:119-121","code":"  119 |     pub(crate) fn set_status(&self, status: ActorStatus) {\n  120 |         self.status.store(status as u8, Ordering::SeqCst);\n  121 |     }"},{"ref":"ractor/src/actor/actor_properties.rs:187-200","code":"  187 |     pub(crate) fn drain(&self) -> Result<(), MessagingErr<()>> {\n  188 |         let _ = self\n  189 |             .status\n  190 |             .fetch_update(Ordering::SeqCst, Ordering::SeqCst, |f| {\n  191 |                 if f < (ActorStatus::Stopping as u8) {\n  192 |                     Some(ActorStatus::Draining as u8)\n  193 |                 } else {\n  194 |                     None\n  195 |                 }\n  196 |             });\n  197 |         self.message\n  198 |             .send(MuxedMessage::Drain)\n  199 |             .map_err(|_| MessagingErr::SendErr(()))\n  200 |     }"}]},{"id":"RACE_7","type":"race_condition","type_label":"Race Condition","severity":"low","description":"`register_pid` holds the write lock on the matched PID-registry DashMap shard (the `Vacant` entry guard) while iterating all PID listeners and calling `send_supervisor_evt` on each (lines 63-74). Unlike `pg::notify_world_listeners`, which clones listeners out and drops the guard before notifying, this keeps a registry shard locked across an arbitrary number of channel sends, increasing contention and lock-hold time on the hot spawn path.","fix":"Insert under the entry lock, drop the guard, then snapshot the listeners and send notifications outside the lock (mirroring the pattern in `pg::notify_world_listeners`).","locations":[{"ref":"ractor/src/registry/pid_registry.rs:63-74","code":"   63 |             Vacant(v) => {\n   64 |                 v.insert(actor.clone());\n   65 |                 // notify lifecycle listeners\n   66 |                 for listener in get_pid_listeners().iter() {\n   67 |                     let _ =\n   68 |                         listener\n   69 |                             .value()\n   70 |                             .send_supervisor_evt(SupervisionEvent::PidLifecycleEvent(\n   71 |                                 PidLifecycleEvent::Spawn(actor.clone()),\n   72 |                             ));\n   73 |                 }\n   74 |                 Ok(())"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"Thread-local actors that fail or panic in `pre_start` are never unregistered from the named registry or the PID registry. `new_thread_local` registers the actor in both the named registry (line 65) and the PID registry (line 61) before startup, but the thread-local `start` routine returns `Err(SpawnErr)` on a `pre_start` failure/panic WITHOUT calling `set_status(ActorStatus::Stopped)`. Only `set_status(Stopping/Stopped)` triggers `registry::unregister`, `pid_registry::unregister_pid`, `pg::leave_all`, and `pg::demonitor_all`. Contrast with the regular `Actor::start` path (ractor/src/actor.rs:734 and :739) which explicitly calls `set_status(ActorStatus::Stopped)` on the same error paths. The result is that the actor's name stays permanently reserved (subsequent spawns with that name fail with AlreadyRegistered) and its PID entry leaks forever.","fix":"In the thread-local `start` builder closure, before returning `Err` on the `Ok(Err(e))` and `Err(e)` arms, call `actor_ref.set_status(ActorStatus::Stopped)` (mirroring ractor/src/actor.rs:734/739) so the registry, PID registry and pg cleanup hooks fire.","locations":[{"ref":"ractor/src/thread_local/inner.rs:307-324","code":"  307 |                 let result = Self::do_pre_start(actor_ref.clone(), &handler, startup_args).await;\n  308 |                 let mut state = match result {\n  309 |                     Ok(Ok(state)) => state,\n  310 |                     Ok(Err(e)) => {\n  311 |                         // cleanup supervision on pre_start failure\n  312 |                         if let Some(sup) = &supervisor {\n  313 |                             actor_ref.unlink(sup.clone());\n  314 |                         }\n  315 |                         return Err(SpawnErr::StartupFailed(e));\n  316 |                     }\n  317 |                     Err(e) => {\n  318 |                         // cleanup supervision on panic\n  319 |                         if let Some(sup) = &supervisor {\n  320 |                             actor_ref.unlink(sup.clone());\n  321 |                         }\n  322 |                         return Err(e);\n  323 |                     }\n  324 |                 };"},{"ref":"ractor/src/thread_local/inner.rs:64-66","code":"   64 |         if let Some(r_name) = name {\n   65 |             crate::registry::register(r_name, cell.clone())?;\n   66 |         }"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"In `new_thread_local`, the actor is first registered in the PID registry (via `register_pid`, line 61) and then in the named registry (line 65). If the named-registration fails with `AlreadyRegistered`, `new_thread_local` returns `Err` and the freshly-built `ActorCell` is dropped. There is no `Drop` impl on `ActorProperties` and `set_status(Stopping)` is never reached, so the PID-registry entry inserted at line 61 leaks permanently. The same ordering exists in the non-thread-local path (ractor/src/actor/actor_cell.rs:250/254), so the leak is shared, but the cleanup must live in pid_registry/registry semantics.","fix":"If named registration fails after `register_pid` succeeded, explicitly call `pid_registry::unregister_pid(cell.get_id())` before returning the error, or perform the name registration first and the PID registration second so a name conflict cannot leave a dangling PID entry.","locations":[{"ref":"ractor/src/thread_local/inner.rs:58-66","code":"   58 |         #[cfg(feature = \"cluster\")]\n   59 |         {\n   60 |             // registry to the PID registry\n   61 |             crate::registry::pid_registry::register_pid(cell.get_id(), cell.clone())?;\n   62 |         }\n   63 | \n   64 |         if let Some(r_name) = name {\n   65 |             crate::registry::register(r_name, cell.clone())?;\n   66 |         }"},{"ref":"ractor/src/registry/pid_registry.rs:57-80","code":"   57 | pub(crate) fn register_pid(id: ActorId, actor: ActorCell) -> Result<(), super::ActorRegistryErr> {\n   58 |     if id.is_local() {\n   59 |         match get_pid_registry().entry(id) {\n   60 |             Occupied(_o) => Err(super::ActorRegistryErr::AlreadyRegistered(format!(\n   61 |                 \"PID {id} already alive\"\n   62 |             ))),\n   63 |             Vacant(v) => {\n   64 |                 v.insert(actor.clone());\n   65 |                 // notify lifecycle listeners\n   66 |                 for listener in get_pid_listeners().iter() {\n   67 |                     let _ =\n   68 |                         listener\n   69 |                             .value()\n   70 |                             .send_supervisor_evt(SupervisionEvent::PidLifecycleEvent(\n   71 |                                 PidLifecycleEvent::Spawn(actor.clone()),\n   72 |                             ));\n   73 |                 }\n   74 |                 Ok(())\n   75 |             }\n   76 |         }\n   77 |     } else {\n   78 |         Ok(())\n   79 |     }\n   80 | }"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"In `NodeServer::handle`, when `Actor::spawn_linked` for a NodeSession succeeds the session info is inserted keyed by `actor.get_id()`, but `node_id_counter` is only incremented inside the success branch. That is correct, however if the same `node_id` (counter value) is ever reused after wraparound it is a u64 so effectively safe — the real issue is that on the failure branch the boxed `stream`/external transport is dropped, which closes the socket, but no event/log distinguishes transient vs fatal spawn failure and the peer is never told, leaving the remote side to time out. Minor, but combined with no backpressure on accept() it allows rapid connect/spawn-fail churn.","fix":"Consider logging at error level with the peer address on spawn failure and/or applying connection rate limiting in the Listener to avoid churn; ensure the socket is explicitly shut down.","locations":[{"ref":"ractor_cluster/src/node.rs:411-444","code":"  411 |             Self::Msg::ConnectionOpened { stream, is_server } => {\n  412 |                 let node_id = state.node_id_counter;\n  413 |                 let peer_addr = stream.peer_addr().to_string();\n  414 |                 if let Ok((actor, _)) = Actor::spawn_linked(\n  415 |                     None,\n  416 |                     NodeSession::new(\n  417 |                         node_id,\n  418 |                         is_server,\n  419 |                         self.cookie.clone(),\n  420 |                         myself.clone(),\n  421 |                         state.this_node_name.clone(),\n  422 |                         self.connection_mode,\n  423 |                     ),\n  424 |                     *stream,\n  425 |                     myself.get_cell(),\n  426 |                 )\n  427 |                 .await\n  428 |                 {\n  429 |                     let ses = NodeServerSessionInformation::new(\n  430 |                         actor.clone(),\n  431 |                         is_server,\n  432 |                         node_id,\n  433 |                         peer_addr,\n  434 |                     );\n  435 |                     for (_, sub) in state.subscriptions.iter() {\n  436 |                         sub.node_session_opened(ses.clone());\n  437 |                     }\n  438 |                     state.node_sessions.insert(actor.get_id(), ses);\n  439 |                     state.node_id_counter += 1;\n  440 |                 } else {\n  441 |                     // failed to startup actor, drop the socket\n  442 |                     tracing::warn!(\"Failed to startup `NodeSession`, dropping connection\");\n  443 |                 }\n  444 |             }"},{"ref":"ractor_cluster/src/node.rs:489-493","code":"  489 |                 } else {\n  490 |                     tracing::warn!(\n  491 |                         \"Failed to startup `NodeSession` for external transport, dropping connection\"\n  492 |                     );\n  493 |                 }"}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"When an actor that is being monitored shuts down, set_status cleanup unregisters it from the name registry, pg groups, and (cluster) pid registry, but it never clears its own SupervisionTree.monitors map. The monitored actor's tree holds strong ActorCell clones of every monitoring actor. As long as anything still holds an ActorCell to the stopped monitored actor, those monitor ActorCells (and their Arc<ActorProperties>) are kept alive, and can form a reference cycle if two actors monitor each other.","fix":"On terminate/stop, also clear the monitors map (and supervisor link) so the tree drops its strong references to monitoring actors, mirroring how terminate_all_children clears the children map.","locations":[{"ref":"ractor/src/actor/actor_cell.rs:331-362","code":"  331 |     pub(crate) fn set_status(&self, status: ActorStatus) {\n  332 |         // The actor is shut down — only run cleanup once, on the first transition\n  333 |         // to Stopping. This avoids redundant full-DashMap iterations on the\n  334 |         // Stopping → Stopped transition.\n  335 |         if (status == ActorStatus::Stopped || status == ActorStatus::Stopping)\n  336 |             && self.get_status() < ActorStatus::Stopping\n  337 |         {\n  338 |             #[cfg(feature = \"cluster\")]\n  339 |             {\n  340 |                 // stop monitoring for updates\n  341 |                 crate::registry::pid_registry::demonitor(self.get_id());\n  342 |                 // unregistry from the PID registry\n  343 |                 crate::registry::pid_registry::unregister_pid(self.get_id());\n  344 |             }\n  345 |             // If it's enrolled in the registry, remove it\n  346 |             if let Some(name) = self.get_name() {\n  347 |                 crate::registry::unregister(name);\n  348 |             }\n  349 |             // Leave all + stop monitoring pg groups (if any)\n  350 |             crate::pg::demonitor_all(self.get_id());\n  351 |             crate::pg::leave_all(self.get_id());\n  352 |         }\n  353 | \n  354 |         // Fix for #254. We should only notify the stop listener AFTER post_stop\n  355 |         // has executed, which is when the state gets set to `Stopped`.\n  356 |         if status ==
