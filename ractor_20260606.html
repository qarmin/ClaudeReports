w.is_available()) {\n  974 |                         state.router.on_worker_availability_change(wid, true);\n  975 |                     }\n  976 |                 }\n  977 |             }\n  978 |             SupervisionEvent::ActorFailed(who, reason) => {\n  979 |                 let wid = if let Some(worker) = state\n  980 |                     .pool\n  981 |                     .values_mut()\n  982 |                     .find(|actor| actor.is_pid(who.get_id()))\n  983 |                 {\n  984 |                     tracing::warn!(\n  985 |                         factory = ?myself, \"Factory's worker {} panicked with {}\",\n  986 |                         worker.wid,\n  987 |                         reason\n  988 |                     );\n  989 |                     let (new_worker, custom_start) = state.worker_builder.build(worker.wid);\n  990 |                     let spec = WorkerStartContext {\n  991 |                         wid: worker.wid,\n  992 |                         factory: myself.clone(),\n  993 |                         custom_start,\n  994 |                     };\n  995 |                     let (replacement, replacement_handle) =\n  996 |                         Actor::spawn_linked(None, new_worker, spec, myself.get_cell()).await?;\n  997 | \n  998 |                     worker.replace_worker(replacement, replacement_handle)?;\n  999 |                     Some(worker.wid)\n 1000 |                 } else {\n 1001 |                     None\n 1002 |                 };\n 1003 |                 if let Some(wid) = wid {\n 1004 |                     state.try_route_next_active_job(wid)?;\n 1005 |                     if matches!(state.pool.get(&wid), Some(w) if w.is_available()) {\n 1006 |                         state.router.on_worker_availability_change(wid, true);\n 1007 |                     }\n 1008 |                 }\n 1009 |             }\n 1010 |             _ => {}\n 1011 |         }"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","description":"For struct-style (named) variants the generated code binds the user's own field identifiers directly in the match pattern (e.g. `Self::Variant { a, b }`) while also introducing helper bindings such as `__data`, `__ptr`, `__args`, `__variant`, `__reply`, `__target_port`, `__len`, `__len_bytes`. The codegen header comment asserts the `__` prefix avoids collisions with user-chosen field names, but a user is free to name a struct field with a leading double underscore (e.g. a field literally named `__data` or `__ptr`). In that case the pattern binding of the user field and the generated `let mut __data`/`let mut __ptr` collide/shadow, producing either a silent miscompilation of that field or a confusing error, contradicting the stated guarantee.","fix":"Either generate the helper bindings with `proc_macro2::Span::mixed_site()`/`quote::format_ident!` hygiene that cannot collide, or reject (with a `compile_error!`) any named field whose identifier begins with `__`, and update the header comment to state the actual constraint.","locations":[{"ref":"ractor_cluster_derive/src/codegen.rs:6-9","code":"    6 | //! Code generation from parsed IR for `RactorClusterMessage`.\n    7 | //!\n    8 | //! Internal generated variables use `__` prefix to avoid collisions with\n    9 | //! user-chosen field names in named (struct-style) variants."},{"ref":"ractor_cluster_derive/src/codegen.rs:220-227","code":"  220 |         quote! {\n  221 |             #variant_name => {\n  222 |                 let mut __ptr = 0usize;\n  223 |                 #(#unpacked;)*\n  224 |                 Ok(#construct)\n  225 |             }\n  226 |         }\n  227 |     }"}]},{"id":"ARCHIT_1","type":"architecture","type_label":"Architecture","severity":"low","description":"factoryimpl.rs is a 1068-line file mixing many responsibilities: the Factory marker type, FactoryArguments + builder, FactoryState, all routing/queueing/draining/resizing/metrics/ping/stuck-worker/update-settings logic, and the full Actor impl. FactoryState alone has ~15 methods spanning routing, lifecycle, metrics, and pool management. This makes the dispatch hot path hard to reason about and the file hard to maintain.","fix":"Split FactoryState behavior into focused modules (pool management/resize, metrics/ping, draining, settings updates) to isolate the hot dispatch/route path from periodic/administrative concerns.","locations":[{"ref":"ractor/src/factory/factoryimpl.rs:1-1068","code":"    1 | // Copyright (c) Sean Lawlor\n    2 | //\n    3 | // This source code is licensed under both the MIT license found in the\n    4 | // LICENSE-MIT file in the root directory of this source tree.\n    5 | \n    6 | //! Factory definition\n    7 | \n    8 | use std::cmp::Ordering;\n    9 | use std::collections::HashMap;\n   10 | use std::fmt::Debug;\n   11 | use std::marker::PhantomData;\n   12 | use std::sync::Arc;\n   13 | \n   14 | use self::routing::RouteResult;\n   15 | use super::queues::Queue;\n   16 | use super::routing::Router;\n   17 | use super::*;\n   18 | use crate::concurrency::Duration;\n   19 | use crate::concurrency::Instant;\n   20 | use crate::Actor;\n   21 | use crate::ActorProcessingErr;\n   22 | use crate::ActorRef;\n   23 | use crate::Message;\n   24 | use crate::SpawnErr;\n   25 | use crate::SupervisionEvent;\n   26 | \n   27 | /// The global execution limit, any more than 1M and realistically\n   28 | /// we'll get into scheduling problems unless the requests have an\n   29 | /// incredibly low reception rate and high processing latency. At\n   30 | /// which point, a factory probably doesn't make great sense for\n   31 | /// load-shedding customization\n   32 | const GLOBAL_WORKER_POOL_MAXIMUM: usize = 1_000_000;\n   33 | \n   34 | #[cfg(test)]\n   35 | const PING_FREQUENCY: Duration = Duration::from_millis(150);\n   36 | #[cfg(not(test))]\n   37 | const PING_FREQUENCY: Duration = Duration::from_millis(10_000);\n   38 | const CALCULATE_FREQUENCY: Duration = Duration::from_millis(100);\n   39 | \n   40 | #[derive(Debug, Eq, PartialEq)]\n   41 | enum DrainState {\n   42 |     NotDraining,\n   43 |     Draining,\n   44 |     Drained,\n   45 | }\n   46 | \n   47 | /// Factory definition.\n   48 | ///\n   49 | /// This is a placeholder instance which contains all of the type specifications\n   50 | /// for the factories properties\n   51 | #[derive(Debug)]\n   52 | pub struct Factory<TKey, TMsg, TWorkerStart, TWorker, TRouter, TQueue>\n   53 | where\n   54 |     TKey: JobKey,\n   55 |     TMsg: Message,\n   56 |     TWorkerStart: Message,\n   57 |     TWorker: Actor<\n   58 |         Msg = WorkerMessage<TKey, TMsg>,\n   59 |         Arguments = WorkerStartContext<TKey, TMsg, TWorkerStart>,\n   60 |     >,\n   61 |     TRouter: Router<TKey, TMsg>,\n   62 |     TQueue: Queue<TKey, TMsg>,\n   63 | {\n   64 |     _key: PhantomData<fn() -> TKey>,\n   65 |     _msg: PhantomData<fn() -> TMsg>,\n   66 |     _worker_start: PhantomData<fn() -> TWorkerStart>,\n   67 |     _worker: PhantomData<fn() -> TWorker>,\n   68 |     _router: PhantomData<fn() -> TRouter>,\n   69 |     _queue: PhantomData<fn() -> TQueue>,\n   70 | }\n   71 | \n   72 | impl<TKey, TMsg, TWorkerStart, TWorker, TRouter, TQueue> Default\n   73 |     for Factory<TKey, TMsg, TWorkerStart, TWorker, TRouter, TQueue>\n   74 | where\n   75 |     TKey: JobKey,\n   76 |     TMsg: Message,\n   77 |     TWorkerStart: Message,\n   78 |     TWorker: Actor<\n   79 |         Msg = WorkerMessage<TKey, TMsg>,\n   80 |         Arguments = WorkerStartContext<TKey, TMsg, TWorkerStart>,\n   81 |     >,\n   82 |     TRouter: Router<TKey, TMsg>,\n   83 |     TQueue: Queue<TKey, TMsg>,\n   84 | {\n   85 |     fn default() -> Self {\n   86 |         Self {\n   87 |             _key: PhantomData,\n   88 |             _msg: PhantomData,\n   89 |             _worker_start: PhantomData,\n   90 |             _worker: PhantomData,\n   91 |             _router: PhantomData,\n   92 |             _queue: PhantomData,\n   93 |         }\n   94 |     }\n   95 | }\n   96 | \n   97 | /// Arguments for configuring and starting a [Factory] actor instance.\n   98 | #[derive(bon::Builder)]\n   99 | #[builder(on(String, into))]\n  100 | pub struct FactoryArguments<TKey, TMsg, TWorkerStart, TWorker, TRouter, TQueue>\n  101 | where\n  102 |     TKey: JobKey,\n  103 |     TMsg: Message,\n  104 |     TWorkerStart: Message,\n  105 |     TWorker: Actor<\n  106 |         Msg = WorkerMessage<TKey, TMsg>,\n  107 |         Arguments = WorkerStartContext<TKey, TMsg, TWorkerStart>,\n  108 |     >,\n  109 |     TRouter: Router<TKey, TMsg>,\n  110 |     TQueue: Queue<TKey, TMsg>,\n  111 | {\n  112 |     /// The factory is responsible for spawning workers and re-spawning workers\n  113 |     /// under failure scenarios. This means that it needs to understand how to\n  114 |     /// build workers. The WorkerBuilder trait is used by the factory to\n  115 |     /// construct new workers when needed.\n  116 |     pub worker_builder: Box<dyn WorkerBuilder<TWorker, TWorkerStart>>,\n  117 |     /// Number of (initial) workers in the factory\n  118 |     ///\n  119 |     /// Default = `1` worker\n  120 |     #[builder(default = 1)]\n  121 |     pub num_initial_workers: usize,\n  122 |     /// Message routing handler\n  123 |     pub router: TRouter,\n  124 |     /// Message queue implementation for the factory\n  125 |     pub queue: TQueue,\n  126 |     /// Discard callback when a job is discarded.\n  127 |     ///\n  128 |     /// Default is [None]\n  129 |     pub discard_handler: Option<Arc<dyn DiscardHandler<TKey, TMsg>>>,\n  130 |     /// Maximum queue length. Any job arriving when the queue is at its max length\n  131 |     /// will cause a job at the head or tail of the queue to be dropped (which is\n  132 |     /// controlled by `discard_mode`).\n  133 |     ///\n  134 |     /// * For factories using routing protocols like [routing::QueuerRouting],\n  135 |     ///   [routing::StickyQueuerRouting] routing, these are applied to the factory's internal queue.\n  136 |     /// * For all other routing non-factory-queueing protocols,\n  137 |     ///   this applies to the worker's message queue\n  138 |     ///\n  139 |     /// Default is [DiscardSettings::None]\n  140 |     #[builder(default = DiscardSettings::None)]\n  141 |     pub discard_settings: DiscardSettings,\n  142 |     /// Controls the \"dead man's\" switching logic on the factory. Periodically\n  143 |     /// the factory will scan for stuck workers. If detected, the worker information\n  144 |     /// will be logged along with the current job key information. Optionally the worker\n  145 |     /// can be killed and replaced by the factory\n  146 |     ///\n  147 |     /// Default is [None]\n  148 |     pub dead_mans_switch: Option<DeadMansSwitchConfiguration>,\n  149 |     /// Controls the parallel capacity of the worker pool by dynamically growing/shrinking the pool\n  150 |     ///\n  151 |     /// Default is [None]\n  152 |     pub capacity_controller: Option<Box<dyn WorkerCapacityController>>,\n  153 |     /// Lifecycle hooks provide access to points in the factory's lifecycle\n  154 |     /// for shutdown/startup/draining where user-defined logic can execute (and\n  155 |     /// block factory lifecycle at critical points). For example, this means\n  156 |     /// the factory won't start accepting requests until the complete startup routine\n  157 |     /// is completed.\n  158 |     ///\n  159 |     /// Default is [None]\n  160 |     pub lifecycle_hooks: Option<Box<dyn FactoryLifecycleHooks<TKey, TMsg>>>,\n  161 |     /// Defines the statistics collection layer for the factory. Useful for tracking factory properties.\n  162 |     ///\n  163 |     /// Default is [None]\n  164 |     pub stats: Option<Arc<dyn FactoryStatsLayer>>,\n  165 | }\n  166 | \n  167 | impl<TKey, TMsg, TWorkerStart, TWorker, TRouter, TQueue> Debug\n  168 |     for FactoryArguments<TKey, TMsg, TWorkerStart, TWorker, TRouter, TQueue>\n  169 | where\n  170 |     TKey: JobKey,\n  171 |     TMsg: Message,\n  172 |     TWorkerStart: Message,\n  173 |     TWorker: Actor<\n  174 |         Msg = WorkerMessage<TKey, TMsg>,\n  175 |         Arguments = WorkerStartContext<TKey, TMsg, TWorkerStart>,\n  176 |     >,\n  177 |     TRouter: Router<TKey, TMsg>,\n  178 |     TQueue: Queue<TKey, TMsg>,\n  179 | {\n  180 |     fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {\n  181 |         f.debug_struct(\"FactoryArguments\")\n  182 |             .field(\"num_initial_workers\", &self.num_initial_workers)\n  183 |             .field(\"router\", &std::any::type_name::<TRouter>())\n  184 |             .field(\"queue\", &std::any::type_name::<TQueue>())\n  185 |             .field(\"discard_settings\", &self.discard_settings)\n  186 |             .field(\"dead_mans_switch\", &self.dead_mans_switch)\n  187 |             .field(\n  188 |                 \"has_capacity_controller\",\n  189 |                 &self.capacity_controller.is_some(),\n  190 |             )\n  191 |             .field(\"has_lifecycle_hooks\", &self.lifecycle_hooks.is_some())\n  192 |             .field(\"has_stats\", &self.stats.is_some())\n  193 |             .field(\"has_discard_handler\", &self.discard_handler.is_some())\n  194 |             .finish()\n  195 |     }\n  196 | }\n  197 | \n  198 | /// State of a factory (backlogged jobs, handler, etc)\n  199 | pub struct FactoryState<TKey, TMsg, TWorker, TWorkerStart, TRouter, TQueue>\n  200 | where\n  201 |     TKey: JobKey,\n  202 |     TMsg: Message,\n  203 |     TWorker: Actor<\n  204 |         Msg = WorkerMessage<TKey, TMsg>,\n  205 |         Arguments = WorkerStartContext<TKey, TMsg, TWorkerStart>,\n  206 |     >,\n  207 |     TWorkerStart: Message,\n  208 |     TRouter: Router<TKey, TMsg>,\n  209 |     TQueue: Queue<TKey, TMsg>,\n  210 | {\n  211 |     factory_name: String,\n  212 |     worker_builder: Box<dyn WorkerBuilder<TWorker, TWorkerStart>>,\n  213 |     pool_size: usize,\n  214 |     pool: HashMap<WorkerId, WorkerProperties<TKey, TMsg>>,\n  215 |     stats: Option<Arc<dyn FactoryStatsLayer>>,\n  216 |     router: TRouter,\n  217 |     queue: TQueue,\n  218 |     discard_handler: Option<Arc<dyn DiscardHandler<TKey, TMsg>>>,\n  219 |     discard_settings: DiscardSettings,\n  220 |     drain_state: DrainState,\n  221 |     dead_mans_switch: Option<DeadMansSwitchConfiguration>,\n  222 |     capacity_controller: Option<Box<dyn WorkerCapacityController>>,\n  223 |     lifecycle_hooks: Option<Box<dyn FactoryLifecycleHooks<TKey, TMsg>>>,\n  224 |     // Local counter to avoid having to sum over the worker states for more performant metrics capturing\n  225 |     // in large worker-count factories\n  226 |     processing_messages: usize,\n  227 | }\n  228 | \n  229 | impl<TKey, TMsg, TWorkerStart, TWorker, TRouter, TQueue> Debug\n  230 |     for FactoryState<TKey, TMsg, TWorker, TWorkerStart, TRouter, TQueue>\n  231 | where\n  232 |     TKey: JobKey,\n  233 |     TMsg: Message,\n  234 |     TWorkerStart: Message,\n  235 |     TWorker: Actor<\n  236 |         Msg = WorkerMessage<TKey, TMsg>,\n  237 |         Arguments = WorkerStartContext<TKey, TMsg, TWorkerStart>,\n  238 |     >,\n  239 |     TRouter: Router<TKey, TMsg>,\n  240 |     TQueue: Queue<TKey, TMsg>,\n  241 | {\n  242 |     fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {\n  243 |         f.debug_struct(\"FactoryState\")\n  244 |             .field(\"factory_name\", &self.factory_name)\n  245 |             .field(\"pool_size\", &self.pool_size)\n  246 |             .field(\"router\", &std::any::type_name::<TRouter>())\n  247 |             .field(\"queue\", &std::any::type_name::<TQueue>())\n  248 |             .field(\"discard_settings\", &self.discard_settings)\n  249 |             .field(\"dead_mans_switch\", &self.dead_mans_switch)\n  250 |             .field(\"drain_state\", &self.drain_state)\n  251 |             .field(\n  252 |                 \"has_capacity_controller\",\n  253 |                 &self.capacity_controller.is_some(),\n  254 |             )\n  255 |             .field(\"has_lifecycle_hooks\", &self.lifecycle_hooks.is_some())\n  256 |             .field(\"has_stats\", &self.stats.is_some())\n  257 |             .field(\"has_discard_handler\", &self.discard_handler.is_some())\n  258 |             .field(\"processing_messages\", &self.processing_messages)\n  259 |             .finish()\n  260 |     }\n  261 | }\n  262 | \n  263 | impl<TKey, TMsg, TWorker, TWorkerStart, TRouter, TQueue>\n  264 |     FactoryState<TKey, TMsg, TWorker, TWorkerStart, TRouter, TQueue>\n  265 | where\n  266 |     TKey: JobKey,\n  267 |     TMsg: Message,\n  268 |     TWorker: Actor<\n  269 |         Msg = WorkerMessage<TKey, TMsg>,\n  270 |         Arguments = WorkerStartContext<TKey, TMsg, TWorkerStart>,\n  271 |     >,\n  272 |     TWorkerStart: Message,\n  273 |     TRouter: Router<TKey, TMsg>,\n  274 |     TQueue: Queue<TKey, TMsg>,\n  275 | {\n  276 |     /// This method tries to\n  277 |     ///\n  278 |     /// 1. Cleanup expired jobs at the head of the queue, discarding them\n  279 |     /// 2. Route the next non-expired job (if any)\n  280 |     ///     - If a worker-hint was provided, and the worker is available, route it there (this is used\n  281 |     ///       for when workers have just completed work, and should immediately receive a new job)\n  282 |     ///     - If no hint provided, route to the next worker by routing protocol.\n  283 |     fn try_route_next_active_job(\n  284 |         &mut self,\n  285 |         worker_hint: WorkerId,\n  286 |     ) -> Result<(), ActorProcessingErr> {\n  287 |         // cleanup expired messages at the head of the queue\n  288 |         while let Some(true) = self.queue.peek().map(|m| m.is_expired()) {\n  289 |             // remove the job from the queue\n  290 |             if let Some(mut job) = self.queue.pop_front() {\n  291 |            }\n  445 |                 }\n  446 |                 std::collections::hash_map::Entry::Vacant(_) => {\n  447 |                     // worker doesn't exist, ignore\n  448 |                 }\n  449 |             }\n  450 |         }\n  451 |     }\n  452 | \n  453 |     async fn resize_pool(\n  454 |         &mut self,\n  455 |         myself: &ActorRef<FactoryMessage<TKey, TMsg>>,\n  456 |         requested_pool_size: usize,\n  457 |     ) -> Result<(), SpawnErr> {\n  458 |         if requested_pool_size == 0 {\n  459 |             return Ok(());\n  460 |         }\n  461 | \n  462 |         let curr_size = self.pool_size;\n  463 |         let new_pool_size = std::cmp::min(GLOBAL_WORKER_POOL_MAXIMUM, requested_pool_size);\n  464 | \n  465 |         match new_pool_size.cmp(&curr_size) {\n  466 |             Ordering::Greater => {\n  467 |                 tracing::debug!(\n  468 |                     factory = ?myself, \"Resizing factory worker pool from {} -> {}\",\n  469 |                     curr_size,\n  470 |                     new_pool_size\n  471 |                 );\n  472 |                 // grow pool\n  473 |                 let to_add = new_pool_size - curr_size;\n  474 |                 self.grow_pool(myself, to_add).await?;\n  475 |             }\n  476 |             Ordering::Less => {\n  477 |                 tracing::debug!(\n  478 |                     factory = ?myself, \"Resizing factory worker pool from {} -> {}\",\n  479 |                     curr_size,\n  480 |                     new_pool_size\n  481 |                 );\n  482 |                 // shrink pool\n  483 |                 let to_remove = curr_size - new_pool_size;\n  484 |                 self.shrink_pool(to_remove);\n  485 |             }\n  486 |             Ordering::Equal => {\n  487 |                 // no-op\n  488 |             }\n  489 |         }\n  490 | \n  491 |         self.pool_size = new_pool_size;\n  492 |         Ok(())\n  493 |     }\n  494 | \n  495 |     fn is_drained(&mut self) -> bool {\n  496 |         match &self.drain_state {\n  497 |             DrainState::NotDraining => false,\n  498 |             DrainState::Drained => true,\n  499 |             DrainState::Draining => {\n  500 |                 let are_all_workers_free = self.pool.values().all(|worker| worker.is_available());\n  501 |                 if are_all_workers_free && self.queue.len() == 0 {\n  502 |                     tracing::debug!(\"Worker pool is free and queue is empty.\");\n  503 |                     // everyone is free, all requests are drainined\n  504 |                     self.drain_state = DrainState::Drained;\n  505 |                     true\n  506 |                 } else {\n  507 |                     false\n  508 |                 }\n  509 |             }\n  510 |         }\n  511 |     }\n  512 | \n  513 |     fn dispatch(&mut self, mut job: Job<TKey, TMsg>) -> Result<(), ActorProcessingErr> {\n  514 |         // set the time the factory received the message\n  515 |         job.set_factory_time();\n  516 |         self.stats.new_job(&self.factory_name);\n  517 | \n  518 |         // Check if TTL has been exceeded prior to trying anything.\n  519 |         if job.is_expired() {\n  520 |             self.stats.job_ttl_expired(&self.factory_name, 1);\n  521 |             if let Some(discard_handler) = &self.discard_handler {\n  522 |                 discard_handler.discard(DiscardReason::TtlExpired, &mut job);\n  523 |             }\n  524 |             job.reject();\n  525 |         } else if self.drain_state == DrainState::NotDraining {\n  526 |             match self\n  527 |                 .router\n  528 |                 .route_message(job, self.pool_size, None, &mut self.pool)?\n  529 |             {\n  530 |                 RouteResult::Handled => {\n  531 |                     // message was routed\n  532 |                     self.processing_messages += 1;\n  533 |                 }\n  534 |                 RouteResult::RateLimited(mut job) => {\n  535 |                     self.stats.job_rate_limited(&self.factory_name);\n  536 |                     if let Some(handler) = &self.discard_handler {\n  537 |                         handler.discard(DiscardReason::RateLimited, &mut job);\n  538 |                     }\n  539 |                     job.reject();\n  540 |                 }\n  541 |                 RouteResult::Backlog(busy_job) => {\n  542 |                     // workers are busy, we need to queue a job\n  543 |                     self.maybe_enqueue(busy_job);\n  544 |                 }\n  545 |             }\n  546 |         } else {\n  547 |             tracing::debug!(\"Factory is draining but a job was received\");\n  548 |             if let Some(discard_handler) = &self.discard_handler {\n  549 |                 discard_handler.discard(DiscardReason::Shutdown, &mut job);\n  550 |             }\n  551 |             job.reject();\n  552 |         }\n  553 |         Ok(())\n  554 |     }\n  555 | \n  556 |     fn worker_finished_job(&mut self, who: WorkerId, key: TKey) -> Result<(), ActorProcessingErr> {\n  557 |         if self.processing_messages > 0 {\n  558 |             self.processing_messages -= 1;\n  559 |         }\n  560 | \n  561 |         let (is_worker_draining, should_drop_worker) = if let Some(worker) = self.pool.get_mut(&who)\n  562 |         {\n  563 |             if let Some(job_options) = worker.worker_complete(key)? {\n  564 |                 self.stats.job_completed(&self.factory_name, &job_options);\n  565 |             }\n  566 | \n  567 |             if worker.is_draining {\n  568 |                 // don't schedule more work\n  569 |                 (true, !worker.is_working())\n  570 |             } else {\n  571 |                 (false, false)\n  572 |             }\n  573 |         } else {\n  574 |             (false, false)\n  575 |         };\n  576 | \n  577 |         if should_drop_worker {\n  578 |             let worker = se {\n  516 |                     for pid in termination.ids {\n  517 |                         if let Some(actor) = state.remote_actors.remove(&pid) {\n  518 |                             actor\n  519 |                                 .stop_and_wait(Some(\"remote\".to_string()), None)\n  520 |                                 .await?;\n  521 |                             tracing::debug!(\n  522 |                                 \"Actor {pid} on node {} exited, terminating local `RemoteActor` {}\",\n  523 |                                 self.node_id,\n  524 |                                 actor.get_id()\n  525 |                             );\n  526 |                         }\n  527 |                     }\n  528 |                 }\n  529 |                 control_protocol::control_message::Msg::Ping(ping) => {\n  530 |                     state.tcp_send_control(control_protocol::ControlMessage {\n  531 |                         msg: Some(control_protocol::control_message::Msg::Pong(\n  532 |                             control_protocol::Pong {\n  533 |                                 timestamp: ping.timestamp,\n  534 |                             },\n  535 |                         )),\n  536 |                     });\n  537 |                 }\n  538 |                 control_protocol::control_message::Msg::Pong(pong) => {\n  539 |                     let ts: std::time::SystemTime = pong\n  540 |                         .timestamp\n  541 |                         .expect(\"Timestamp missing in Pong\")\n  542 |                         .try_into()\n  543 |                         .expect(\"Failed to convert Pong(Timestamp) to SystemTime\");\n  544 |                     let inst = ts\n  545 |                         .duration_since(SystemTime::UNIX_EPOCH)\n  546 |                         .expect(\"Time went backwards\");\n  547 |                     let delta_ms = (state.epoch.elapsed() - inst).as_millis();\n  548 |                     tracing::debug!(\"Ping -> Pon  |         &self,\n  684 |         myself: ActorRef<super::NodeSessionMessage>,\n  685 |         state: &mut NodeSessionState,\n  686 |     ) {\n  687 |         tracing::info!(\n  688 |             \"Session authenticated on NodeSession {} - ({:?})\",\n  689 |             self.node_id,\n  690 |             state.peer_addr\n  691 |         );\n  692 | \n  693 |         // startup the ping healthcheck activity\n  694 |         state.schedule_tcp_ping();\n  695 | \n  696 |         // trigger enumeration of the remote peer's node sessions for transitive connections\n  697 |         if let NodeConnectionMode::Transitive = self.connection_mode {\n  698 |             state.tcp_send_control(control_protocol::ControlMessage {\n  699 |                 msg: Some(\n  700 |                     control_protocol::control_message::Msg::EnumerateNodeSessions(\n  701 |                         self.this_node_name.clone(),\n  702 |                     ),\n  703 |                 ),\n  704 |             });\n  705 |         }\n  706 | \n  707 |         // setup PID monitoring\n  708 |         ractor::registry::pid_registry::monitor(myself.get_cell());\n  709 | \n  710 |         // Scan all PIDs and spawn them on the remote host\n  711 |         let pids = ractor::registry::pid_registry::get_all_pids()\n  712 |             .into_iter()\n  713 |             .filter(|act| act.supports_remoting())\n  714 |             .map(|a| control_protocol::Actor {\n  715 |                 name: a.get_name(),\n  716 |                 pid: a.get_id().pid(),\n  717 |             })\n  718 |             .collect::<Vec<_>>();\n  719 |         if !pids.is_empty() {\n  720 |             let msg = control_protocol::ControlMessage {\n  721 |                 msg: Some(control_protocol::control_message::Msg::Spawn(\n  722 |                     control_protocol::Spawn { actors: pids },\n  723 |                 )),\n  724 |             };\n  725 |             state.tcp_send_control(msg);\n  726 |         }\n  727 | <script>
(function(){

  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}

  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}

function syncHash() {
  const p = new URLSearchParams();

  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
