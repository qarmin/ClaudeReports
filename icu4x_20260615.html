         .or_else(|| region_units.get(\"001\"))\n  573 |             .is_some_and(|units| Self::unit_matches_any(unit, units));\n  574 | \n  575 |         let found_anywhere = region_units\n  576 |             .values()\n  577 |             .any(|units| Self::unit_matches_any(unit, units));\n  578 | \n  579 |         if found_in_region {\n  580 |             UnitType::Core\n  581 |         } else if found_anywhere {\n  582 |             UnitType::Extended\n  583 |         } else {\n  584 |             UnitType::Outlier\n  585 |         }\n  586 |     }","lines":28}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Empty-input check uses Vec::capacity() instead of the source length. After `let mut zones = Vec::with_capacity(raw_zones.len());` the code checks `if zones.capacity() == 0` to detect the no-zones case. with_capacity may over-allocate, so capacity is not a reliable proxy for the requested length; it only happens to work because with_capacity(0) is guaranteed to yield capacity 0. The intent is to reject empty input and should test the actual count.","fix":"Check `if raw_zones.is_empty()` instead of `zones.capacity() == 0`.","locations":[{"ref":"utils/zoneinfo64/src/deserialize.rs:34-40","code":"   34 |     let mut zones = Vec::with_capacity(raw_zones.len());\n   35 | \n   36 |     if zones.capacity() == 0 {\n   37 |         return Err(BinaryDeserializerError::unknown(\n   38 |             \"at least one zone is required\",\n   39 |         ));\n   40 |     }","lines":7}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"The `Bake` impl for `alloc::sync::Arc<T>` uses the constructor path `alloc::arc::Arc::new`, but there is no `alloc::arc` module (the correct path is `alloc::sync::Arc`). Any value baked through `Arc<T>` therefore emits Rust code (`alloc::arc::Arc::new(..)`) that fails to compile. The bug went unnoticed because there is an `rc` test but no `arc` test (rc uses the correct `alloc::rc::Rc::new`).","fix":"Change the macro invocation to `smart_pointer!(alloc::sync::Arc<T>, alloc::sync::Arc::new);` and add a round-trip test for `Arc`.","locations":[{"ref":"utils/databake/src/alloc.rs:215","code":"  215 | smart_pointer!(alloc::sync::Arc<T>, alloc::arc::Arc::new);","lines":1}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"GeneralCategoryGroup::separator() returns the wrong general-category group. The method is named `separator()` and is meant to return the Separator group, but its body returns `props::GeneralCategoryGroup::Other` (and its `#[diplomat::rust_link(...)]` also wrongly points at `GeneralCategoryGroup::Other`). The underlying icu_properties API has distinct `Separator` and `Other` constants (components/properties/src/props.rs:328 and :349), so an FFI caller asking for the Separator group silently gets the Other group instead. This is a logic bug visible across the C/C++/Dart/JS/Kotlin FFI surface. Paired with the `other()` bug below, it looks like a copy-paste mistake where the wrong constant was filled in.","fix":"Return the correct constant: `props::GeneralCategoryGroup::Separator.into()` and fix the rust_link to reference `GeneralCategoryGroup::Separator`.","locations":[{"ref":"ffi/capi/src/properties_gcg.rs:90-96","code":"   90 |         #[diplomat::rust_link(\n   91 |             icu::properties::props::GeneralCategoryGroup::Other,\n   92 |             AssociatedConstantInStruct\n   93 |         )]\n   94 |         pub fn separator() -> Self {\n   95 |             props::GeneralCategoryGroup::Other.into()\n   96 |         }","lines":7}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"GeneralCategoryGroup::other() returns the wrong general-category group. The method is named `other()` and is meant to return the Other group, but its body returns `props::GeneralCategoryGroup::Letter` (and its `#[diplomat::rust_link(...)]` also wrongly points at `GeneralCategoryGroup::Letter`, duplicating the `letter()` method just above it). The underlying icu_properties API has a distinct `Other` constant (components/properties/src/props.rs:349). An FFI caller asking for the Other group silently receives the Letter group. Genuine logic/copy-paste bug exposed across the FFI boundary.","fix":"Return the correct constant: `props::GeneralCategoryGroup::Other.into()` and fix the rust_link to reference `GeneralCategoryGroup::Other`.","locations":[{"ref":"ffi/capi/src/properties_gcg.rs:97-103","code":"   97 |         #[diplomat::rust_link(\n   98 |             icu::properties::props::GeneralCategoryGroup::Letter,\n   99 |             AssociatedConstantInStruct\n  100 |         )]\n  101 |         pub fn other() -> Self {\n  102 |             props::GeneralCategoryGroup::Letter.into()\n  103 |         }","lines":7}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"IsoDurationParser's UTF-16 constructor is mis-named and mis-typed: the impl block is `impl<'a> IsoDurationParser<'a, Utf16>` but the constructor is named `from_utf8` and takes `&'a [u16]`. This is a copy-paste error from the Utf8 impl. As a result there is no `from_utf16` constructor for IsoDurationParser (inconsistent with IxdtfParser and TimeZoneParser which both expose `from_utf16`), and a `from_utf8(&[u16])` that is confusing and wrong.","fix":"Rename the method to `from_utf16` (keeping the `&'a [u16]` signature) to match IxdtfParser/TimeZoneParser.","locations":[{"ref":"utils/ixdtf/src/parsers/mod.rs:482-490","code":"  482 | #[cfg(feature = \"duration\")]\n  483 | impl<'a> IsoDurationParser<'a, Utf16> {\n  484 |     /// Creates a new `IsoDurationParser` from a slice of utf-16 bytes.\n  485 |     #[inline]\n  486 |     #[must_use]\n  487 |     pub fn from_utf8(source: &'a [u16]) -> Self {\n  488 |         Self::new(source)\n  489 |     }\n  490 | }","lines":9}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In the baked exporter's flush_singleton, the generated IterableDataProvider impl declares the return type as std::collections::BtreeSet (lowercase 't') instead of std::collections::BTreeSet. This is the iterable_body emitted for singleton markers. It is reachable via the generated macro arms `($provider:ty, ITER)` and `($provider:ty, DRY, ITER)` in write_impl_macros (lines 409-413, 381-385). The non-singleton flush path correctly uses BTreeSet (lines 600 and 816). The typo has already propagated into checked-in generated .rs.data files. It does not break the default build because the standard impl_data_provider! macro invokes the marker macros without the ITER selector (line 891), so this arm is currently dead, but any consumer that bakes a singleton marker and invokes its macro with ITER (to get IterableDataProvider) will hit a compile error (BtreeSet does not exist).","fix":"Change `std::collections::BtreeSet` to `std::collections::BTreeSet` on line 544 so the generated singleton iter_ids impl matches the non-singleton arms and compiles when the ITER macro variant is used.","locations":[{"ref":"provider/baked/src/export.rs:544","code":"  544 |                 fn iter_ids(&self) -> Result<std::collections::BtreeSet<icu_provider::DataIdentifierCow<'static>>, icu_provider::DataError> {","lines":1}]},{"id":"CPY_6","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"`DataProvider<TimezoneNamesLocationsRootV1>::load` calls `self.check_req::<TimezoneNamesLocationsOverrideV1>(req)?` instead of `check_req::<TimezoneNamesLocationsRootV1>`. The request is validated against, and any IdentifierNotFound/InvalidRequest error is tagged with, the wrong marker (Override instead of Root). The two markers currently share the same iter_ids set (impl_iterable_data_provider! in time_zones/mod.rs:615-626 gives all these markers the same gregorian locale list), so it does not change which requests succeed today, but error messages reference the wrong marker and the coupling is fragile if the iter sets ever diverge. Copy-paste from the adjacent Override impl at line 215.","fix":"Change the call to `self.check_req::<TimezoneNamesLocationsRootV1>(req)?`.","locations":[{"ref":"provider/source/src/time_zones/convert.rs:245-250","code":"  245 | impl DataProvider<TimezoneNamesLocationsRootV1> for SourceDataProvider {\n  246 |     fn load(\n  247 |         &self,\n  248 |         req: DataRequest,\n  249 |     ) -> Result<DataResponse<TimezoneNamesLocationsRootV1>, DataError> {\n  250 |         self.check_req::<TimezoneNamesLocationsOverrideV1>(req)?;","lines":6}]},{"id":"CPY_7","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"`DataProvider<TimezoneNamesStandardLongV1>::load` calls `self.check_req::<TimezoneNamesGenericLongV1>(req)?` instead of `check_req::<TimezoneNamesStandardLongV1>`. Same class of issue as the Locations/Root case: the request is validated against, and errors are tagged with, the wrong marker (GenericLong instead of StandardLong). The markers share the same iter_ids today so behavior is unaffected functionally, but the marker attached to errors is wrong. Copy-paste from the GenericLong impl at line 400.","fix":"Change the call to `self.check_req::<TimezoneNamesStandardLongV1>(req)?`.","locations":[{"ref":"provider/source/src/time_zones/convert.rs:454-459","code":"  454 | impl DataProvider<TimezoneNamesStandardLongV1> for SourceDataProvider {\n  455 |     fn load(\n  456 |         &self,\n  457 |         req: DataRequest,\n  458 |     ) -> Result<DataResponse<TimezoneNamesStandardLongV1>, DataError> {\n  459 |         self.check_req::<TimezoneNamesGenericLongV1>(req)?;","lines":6}]},{"id":"CPY_8","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"In chinese_based_date_from_fixed, the debug_assert that is supposed to validate the day-of-month range instead checks month_i64 in both its range predicate and its format message. The variable day_i64 is computed on line 430 but never validated; the assertion duplicated from the month check above (lines 425-428) was not updated to reference day_i64. Effect: in debug builds an out-of-range day (which is then truncated by `day_i64 as u8` on line 435) will silently pass the assertion instead of being caught, defeating the intended invariant check. The message also misleadingly prints the month value while claiming to report the day.","fix":"Change the assertion to test day_i64: `((u8::MIN as i64)..=(u8::MAX as i64)).contains(&day_i64)` and update the message to interpolate `{day_i64}` instead of `{month_i64}`.","locations":[{"ref":"utils/calendrical_calculations/src/chinese_based.rs:430-435","code":"  430 |     let day_i64 = date - new_moon + 1;\n  431 |     debug_assert!(\n  432 |         ((u8::MIN as i64)..=(u8::MAX as i64)).contains(&month_i64),\n  433 |         \"Day should be in range of u8! Value {month_i64} failed for RD {date:?}\"\n  434 |     );\n  435 |     let day = day_i64 as u8;","lines":6}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The `Ord` impl for `Date<A>` falls back to comparing inner dates even when `check_date_compatibility` fails, with an explicit `// TODO: this is incorrect` comment. For calendars whose parameterization affects date identity (e.g. two different `Hijri<TabularAlgorithm>` configurations, which return `MismatchedCalendarError`), `Ord::cmp` will silently compare the raw packed inner values and can produce a nonsensical ordering, whereas `PartialEq`/`PartialOrd` correctly treat them as incomparable/unequal. This is an inconsistency between the total and partial ordering implementations, acknowledged by the authors but still a latent correctness issue reachable from the public `Ord` API.","fix":"Either restrict the `Ord` impl to calendars where `DateCompatibilityError = Infallible`, or define a deterministic-but-documented total order that does not claim to be meaningful across incompatible calendars; at minimum, resolve the acknowledged TODO so `Ord` and `PartialOrd` cannot disagree.","locations":[{"ref":"components/calendar/src/date.rs:634-648","code":"  634 | impl<C, A> Ord for Date<A>\n  635 | where\n  636 |     C: Calendar,\n  637 |     C::DateInner: Ord,\n  638 |     A: AsCalendar<Calendar = C>,\n  639 | {\n  640 |     fn cmp(&self, other: &Self) -> core::cmp::Ordering {\n  641 |         match self.calendar().check_date_compatibility(other.calendar()) {\n  642 |             Ok(_) => self.inner().cmp(other.inner()),\n  643 |             Err(_) => {\n  644 |                 // TODO: this is incorrect\n  645 |                 self.inner().cmp(other.inner())\n  646 |             }\n  647 |         }\n  648 |     }","lines":15}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`name_order_derive` loops over the locale fallback chain calling `fallback_iterator.step()` until a locale matches `given_first` or `surname_first`, with no termination guard. If neither list contains an entry matching any locale in the chain (including the terminal `und`), the loop never returns. CLDR data normally includes an `und` entry in given_first so this terminates in practice, but malformed/incomplete provider data would cause an infinite hang rather than a graceful fallback.","fix":"Break out of the loop when the fallback iterator reaches the root/empty locale and return a default (e.g. FormattingOrder::GivenFirst) instead of looping forever.","locations":[{"ref":"components/experimental/src/personnames/specifications/derive_name_order.rs:26-48","code":"   26 |     loop {\n   27 |         let chain_locale = fallback_iterator.get();\n   28 |         let chain_locale_str = chain_locale.write_to_string();\n   29 | \n   30 |         // switch lookup with UND\n   31 |         let mut chain_locale_und = *chain_locale;\n   32 |         chain_locale_und.language = Language::UNKNOWN;\n   33 |         let chain_locale_und_str = chain_locale_und.write_to_string();\n   34 | \n   35 |         if given_first\n   36 |             .iter()\n   37 |             .any(|i| i == chain_locale_str || i == chain_locale_und_str)\n   38 |         {\n   39 |             return FormattingOrder::GivenFirst;\n   40 |         }\n   41 |         if surname_first\n   42 |             .iter()\n   43 |             .any(|i| i == chain_locale_str || i == chain_locale_und_str)\n   44 |         {\n   45 |             return FormattingOrder::SurnameFirst;\n   46 |         }\n   47 |         fallback_iterator.step();\n   48 |     }","lines":23}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`ZoneNameTimestamp` does not round-trip through its human-readable serde representation for the special timestamps it tracks. `Serialize` appends `:SS` seconds when the recovered second is non-zero (e.g. the special epoch value 63593070 recovers to a time with second=30), producing a 19-character string. The matching `Deserialize` requires exactly 16 characters (`if parts.len() != 16 { return Err(...) }`) and never parses a seconds component, so such serialized values fail to deserialize.","fix":"Make the deserializer accept the optional `:SS` suffix (length 19) and parse the seconds, or make the serializer never emit seconds for these timestamps (round to the minute before formatting).","locations":[{"ref":"components/time/src/zone/zone_name_timestamp.rs:256-262","code":"  256 |             let mut s = alloc::format!(\"{year:04}-{month:02}-{day:02} {hour:02}:{minute:02}\");\n  257 |             if second != 0 {\n  258 |                 use core::fmt::Write;\n  259 |                 let _infallible = write!(&mut s, \":{second:02}\");\n  260 |             }\n  261 |             // don't serialize the metadata for now\n  262 |             return serializer.serialize_str(&s);","lines":7},{"ref":"components/time/src/zone/zone_name_timestamp.rs:283-295","code":"  283 |             if parts.len() != 16 {\n  284 |                 return Err(e0);\n  285 |             }\n  286 |             let year = parts[0..4].parse::<i32>().map_err(e1)?;\n  287 |             let month = parts[5..7].parse::<u8>().map_err(e1)?;\n  288 |             let day = parts[8..10].parse::<u8>().map_err(e1)?;\n  289 |             let hour = parts[11..13].parse::<u8>().map_err(e1)?;\n  290 |             let minute = parts[14..16].parse::<u8>().map_err(e1)?;\n  291 |             return Ok(Self::from_zoned_date_time(ZonedDateTime {\n  292 |                 date: icu_calendar::Date::try_new_iso(year, month, day).map_err(e2)?,\n  293 |                 time: Time::try_new(hour, minute, 0, 0).map_err(e3)?,\n  294 |                 zone: UtcOffset::zero(),\n  295 |             }));","lines":13}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"A leftover debug `println!(\"{err}\")` prints to stdout from inside the library's binary-resource text parser whenever hex parsing of a binary resource fails. A library should not write to stdout; this is stray debug output, not real error reporting (the actual error is returned via the `make_error` below it).","fix":"Remove the `println!(\"{err}\");` line (or route it through the `logging` feature like the deserializer does with `log::warn!`).","locations":[{"ref":"utils/resb/src/text/reader.rs:438","code":"  438 |             println!(\"{err}\");","lines":1}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`From<chrono::NaiveTime> for Time` constructs `Nanosecond(chrono.nanosecond())` directly, bypassing range validation. chrono encodes leap seconds by storing nanoseconds in the range [1_000_000_000, 1_999_999_999]; for a leap-second `NaiveTime` this yields a `Nanosecond` greater than the documented invariant max of 999_999_999. No panic or memory unsafety, but it silently produces an out-of-range value that downstream formatting code may mishandle.","fix":"Clamp/normalize the leap-second nanosecond (e.g. fold the extra second into `second` and take `nanosecond % 1_000_000_000`), matching how the second field handles leap seconds.","locations":[{"ref":"components/time/src/chrono.rs:12-22","code":"   12 | impl From<chrono::NaiveTime> for Time {\n   13 |     fn from(chrono: chrono::NaiveTime) -> Self {\n   14 |         use chrono::Timelike;\n   15 |         Time {\n   16 |             hour: Hour(chrono.hour() as u8),\n   17 |             minute: Minute(chrono.minute() as u8),\n   18 |             second: Second(chrono.second() as u8),\n   19 |             subsecond: Nanosecond(chrono.nanosecond()),\n   20 |         }\n   21 |     }\n   22 | }","lines":11}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`get_display_name_iter_ids_cached` reads/parses `supplemental/unitPreferenceData.json` and rebuilds the categorized units list via `categorized_units_list()` inside the per-locale loop. While `read_and_parse` is cached, `categorized_units_list()` reconstructs the full BTreeMap/HashSet structure on every locale iteration. With this macro instantiated for 15 markers x all numbers locales, this is repeated O(markers * locales) times.","fix":"Hoist the `preferences` read and `categorized_units_list()` computation out of the `for locale in locales` loop (compute once before the loop).","locations":[{"ref":"provider/source/src/units/categorized_display_name.rs:73-80","code":"   73 |         for locale in locales {\n   74 |             // Load and parse the unit constants from the supplemental data file.\n   75 |             let preferences: &cldr_serde::units::preferences::Resource = self\n   76 |                 .cldr()?\n   77 |                 .core()\n   78 |                 .read_and_parse(\"supplemental/unitPreferenceData.json\")?;\n   79 | \n   80 |             let categorized_units_list = preferences.supplemental.categorized_units_list();","lines":8}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"In the neo RuleBreakIterator::next hot loop, the next symbol is peeked via `iter.clone().peekable().next()`. Wrapping the cloned iterator in a Peekable adds no value since only `.next()` is called on it; it is equivalent to `iter.clone().next()`. Minor needless indirection in a per-code-point hot path.","fix":"Replace `iter.clone().peekable().next()` with `iter.clone().next()`.","locations":[{"ref":"components/segmenter/src/neo/mod.rs:128-141","code":"  128 |             let symbol = if let Some((_, next)) = iter.clone().peekable().next() {\n  129 |                 let pseudo_symbol_or_symbol = self.data.symbols.get32(next.into());\n  130 |                 if let Some(pseudo_symbol) =\n  131 |                     pseudo_symbol_or_symbol.checked_sub(self.data.num_symbols)\n  132 |                 {\n  133 |                     self.pseudo_symbol_map\n  134 |                         .get(pseudo_symbol as usize)\n  135 |                         .unwrap_or(pseudo_symbol_or_symbol)\n  136 |                 } else {\n  137 |                     pseudo_symbol_or_symbol\n  138 |                 }\n  139 |             } else {\n  140 |                 SegmenterStateMachine::EOT_SYMBOL\n  141 |             };","lines":14}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"rata_die's AddAssign (line 133-137) and SubAssign (line 150-154) deliberately skip the `check()` range guard that the by-value Add (line 101-106) and Sub (line 142-148) impls perform in debug builds. This means the documented invariant 'RataDie is not designed to store values near the overflow boundary' is not enforced for `+=`/`-=`, an inconsistency that weakens the debug safety net the rest of the type relies on.","fix":"Have add_assign/sub_assign route through the checked add/sub (e.g. `*self = self.add(rhs)`), or add a `#[cfg(debug_assertions)] self.check()` after mutating, to keep the range guard consistent.","locations":[{"ref":"utils/calendrical_calculations/src/rata_die.rs:133-154","code":"  133 | impl AddAssign<i64> for RataDie {\n  134 |     fn add_assign(&mut self, rhs: i64) {\n  135 |         self.0 += rhs;\n  136 |     }\n  137 | }\n  138 | \n  139 | /// Shift a [`RataDie`] N days into the past\n  140 | impl Sub<i64> for RataDie {\n  141 |     type Output = Self;\n  142 |     fn sub(self, rhs: i64) -> Self::Output {\n  143 |         let result = Self(self.0 - rhs);\n  144 |         #[cfg(debug_assertions)]\n  145 |         result.check();\n  146 |         result\n  147 |     }\n  148 | }\n  149 | \n  150 | impl SubAssign<i64> for RataDie {\n  151 |     fn sub_assign(&mut self, rhs: i64) {\n  152 |         self.0 -= rhs;\n  153 |     }\n  154 | }","lines":22}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The Hebrew calendar doc comment lists the leap years of the 19-year Metonic cycle as \"years 3, 6, 8, 11, 17, 19\", omitting year 14. The actual leap-year rule used (calendrical_calculations::hebrew::is_hebrew_leap_year = `(7*year+1).rem_euclid(19) < 7`) makes year 14 a leap year (7*14+1=99, 99 mod 19 = 4 < 7). The correct internal comment in the same file (min_months_from, line 178) correctly lists \"3, 6, 8, 11, 14, 17, and 19\". The public doc is simply missing 14.","fix":"Change the list to \"years 3, 6, 8, 11, 14, 17, 19 in a 19-year cycle\" to match the actual leap-year rule and the internal comment at hebrew.rs:178.","locations":[{"ref":"components/calendar/src/cal/hebrew.rs:48","code":"   48 | /// In leap years (years 3, 6, 8, 11, 17, 19 in a 19-year cycle), the leap month Adar I (`M05L`, 30 days)","lines":1}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The comment claims `Collator::try_new` validates the length of `last_primaries` before this `unwrap()`, but no length check exists in `try_new_unstable`/`try_new` (comparison.rs loads special_primaries without validating its length). The invariant that `last_primaries` has at least `MaxVariable::Currency as usize + 1` (4) entries is actually enforced by the serde `Deserialize` impl (provider.rs:635, `split_at_checked(MaxVariable::Currency as usize + 1)`), and for baked data by the build. So the unwrap is safe, but the stated reason is wrong and could mislead a future maintainer into thinking constructor-side validation guards this when it does not. Likewise the `new_root` const constructor relies on baked data, not on try_new.","fix":"Update the comment to reference the actual source of the invariant, e.g. \"`unwrap` is OK because the serde `Deserialize` impl for `CollationSpecialPrimaries` (and the baked-data build) guarantee `last_primaries.len() >= MaxVariable::Currency as usize + 1`.\"","locations":[{"ref":"components/collator/src/provider.rs:704-711","code":"  704 |     #[expect(clippy::unwrap_used)]\n  705 |     pub(crate) fn last_primary_for_group(&self, max_variable: MaxVariable) -> u32 {\n  706 |         // `unwrap` is OK, because `Collator::try_new` validates the length.\n  707 |         //\n  708 |         // Minus one to generate the right lower 16 bits from the high 16 bits.\n  709 |         // See parse.cpp in genrb and getLastPrimaryForGroup in ICU4C.\n  710 |         (u32::from(self.last_primaries.get(max_variable as usize).unwrap()) << 16) - 1\n  711 |     }","lines":8}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In MeasureUnit::try_from_utf8 the comment above the match guard reads \"If the sign is negative, this means that the identifier may contain more than one `per-` keyword.\" but the guard it annotates is `Err(_) if sign == 1` (i.e. the branch taken only when the sign is still positive / no `per-` has been seen yet). The comment describes the opposite condition from the guard it precedes, making the control flow harder to follow.","fix":"Reword to reflect that this branch handles the FIRST `per-` (sign still positive); a second `per-` (sign already negative) falls through to the error return on the following arm.","locations":[{"ref":"components/experimental/src/measure/parser/mod.rs:70-71","code":"   70 |                                 // If the sign is negative, this means that the identifier may contain more than one `per-` keyword.\n   71 |                                 Err(_) if sign == 1 => {","lines":2}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Copy-paste comment error: the match arm for U+FF9F labels it \"HALFWIDTH KATAKANA VOICED SOUND MARK\", but U+FF9F is actually \"HALFWIDTH KATAKANA SEMI-VOICED SOUND MARK\" (the preceding arm for U+FF9E is the VOICED one). The code itself is correct (maps to U+309A, the semi-voiced combining mark with KanaVoicing ccc); only the comment is wrong, duplicated from the U+FF9E arm above.","fix":"Change the comment on the U+FF9F arm to \"HALFWIDTH KATAKANA SEMI-VOICED SOUND MARK\".","locations":[{"ref":"components/normalizer/src/lib.rs:973-976","code":"  973 |                     '\\u{FF9F}' => {\n  974 |                         // HALFWIDTH KATAKANA VOICED SOUND MARK\n  975 |                         CharacterAndClass::new('\\u{309A}', CanonicalCombiningClass::KanaVoicing)\n  976 |                     }","lines":4}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment claims `filter_map` is used \"to avoid cloning the locale\", but the code actually uses `.filter(...)`. The comment was apparently copy-pasted from an older implementation that used `filter_map`. The current `.filter()` on an owned `into_iter()` is correct and does not clone, so the comment is simply wrong/stale and misleading. It appears identically in both `iter_ids_for_marker` and `iter_ids`.","fix":"Remove or rewrite the comment, e.g. `// filter keeps owned ids without cloning`.","locations":[{"ref":"provider/adapters/src/filter/mod.rs:136-140","code":"  136 |             // Use filter_map instead of filter to avoid cloning the locale\n  137 |             set.into_iter()\n  138 |                 .filter(|id| (self.predicate)(id.as_borrowed()))\n  139 |                 .collect()\n  140 |         })","lines":5},{"ref":"provider/adapters/src/filter/mod.rs:152-156","code":"  152 |             // Use filter_map instead of filter to avoid cloning the locale\n  153 |             vec.into_iter()\n  154 |                 .filter(|id| (self.predicate)(id.as_borrowed()))\n  155 |                 .collect()\n  156 |         })","lines":5}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The displaydoc format string for `DataErrorKind::Downcast(&'static str)` is `\"Downcast: expected {0}, found\"` - it dangles at \"found\" without interpolating the found type. The found type is actually carried separately in `str_context` (see `DataError::for_type`), so the user-facing message reads as truncated/incomplete (e.g. `Downcast: expected Foo, found`).","fix":"Either drop the trailing \", found\" or rephrase to `\"Downcast: expected {0}\"`, so the message is complete on its own.","locations":[{"ref":"provider/core/src/error.rs:36-37","code":"   36 |     #[displaydoc(\"Downcast: expected {0}, found\")]\n   37 |     Downcast(&'static str),","lines":2}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Comment refers to `MissingDataMarker`, a variant name that does not exist; the actual `DataErrorKind` variant is `MarkerNotFound` (and is the one compared against on the next line). Stale name from a rename.","fix":"Change the comment to reference `MarkerNotFound`.","locations":[{"ref":"provider/core/src/error.rs:200-201","code":"  200 |         // Don't write out a log for MissingDataMarker since there is no context to add\n  201 |         if !self.silent && self.kind != DataErrorKind::MarkerNotFound {","lines":2}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Typo in doc comment: 'saturate at th ebounds' (misplaced space / spelling). On a public exported function.","fix":"Reword to 'saturate at the bounds'.","locations":[{"ref":"utils/calendrical_calculations/src/helpers.rs:318","code":"  318 | /// Convert an i64 to i32 but saturate at th ebounds","lines":1}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Malformed escape sequence in PotentialUtf16's Debug implementation. For an unpaired surrogate it writes `\\0x{:x}`, producing output like `\\0xd83e`. The leading `0` is a typo; the intended escape is presumably `\\u{...}` or `\\x...`. This makes the Debug output misleading (it looks like an octal-zero followed by `x`). Note also the Ok arm writes the raw char via `{c}` rather than Debug-escaping it, so the whole impl is an unconventional Debug representation, but the `\\0x` is the clear bug.","fix":"Change the format string to a well-formed escape, e.g. `write!(f, \"\\\\u{{{:x}}}\", e.unpaired_surrogate())?` so an unpaired surrogate 0xD83E prints as `\\u{d83e}`.","locations":[{"ref":"utils/potential_utf/src/ustr.rs:273","code":"  273 |                 Err(e) => write!(f, \"\\\\0x{:x}\", e.unpaired_surrogate())?,","lines":1}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"ut_local_indicators takes a parameter named `isstdcnt` and its count is documented/derived from isstdcnt semantics, but the function parses UT/local indicators whose count is specified by isutcnt. The call site correctly passes `header.isutcnt`, so behavior is correct, but the parameter name is a copy-paste from standard_wall_indicators and is misleading.","fix":"Rename the parameter from `isstdcnt` to `isutcnt`.","locations":[{"ref":"utils/tzif/src/parse/tzif.rs:610-616","code":"  610 | fn ut_local_indicators<Input>(isstdcnt: usize) -> impl Parser<Input, Output = Vec<UtLocalIndicator>>\n  611 | where\n  612 |     Input: Stream<Token = u8>,\n  613 |     Input::Error: ParseError<Input::Token, Input::Range, Input::Position>,\n  614 | {\n  615 |     count_min_max(isstdcnt, isstdcnt, ut_local_indicator())\n  616 | }","lines":7}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Stray characters in a doc comment: line reads `///s s` (leftover typo) between the `See [Self::fold()]` line and the `# Examples` heading of `fold_string`. Renders as garbage in the rustdoc output.","fix":"Replace `///s s` with `///`.","locations":[{"ref":"components/casemap/src/casemapper.rs:392","code":"  392 |     ///s s","lines":1}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Typo in comment: \"Greek capital sigman\" should be \"Greek capital sigma\" in the final-sigma special-casing branch.","fix":"Fix \"sigman\" -> \"sigma\".","locations":[{"ref":"components/casemap/src/internals.rs:481","code":"  481 |             // Greek capital sigman maps depending on surrounding cased letters.","lines":1}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Documentation/comment typos. lib.rs:71 \"If an lower level\" (should be \"a lower level\"). lib.rs:89 an ","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc-example comment claims \"Missing data is filled in on a best-effort basis, and an error is signaled.\" but the surrounding example formats a fully-specified value (\"-987654.321\") with no missing data and no error path involved. The comment appears copied from an unrelated context and is misleading in the `parts` module documentation.","fix":"Remove the stale comment or replace it with one that actually describes what the example demonstrates (mapping of output substrings to decimal Parts).","locations":[{"ref":"components/decimal/src/parts.rs:23","code":"   23 | //! // Missing data is filled in on a best-effort basis, and an error is signaled.","lines":1}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment typo: \"Note: The will assume a 12-bit layout.\" is missing a noun (should read \"The trie/value will assume...\").","fix":"Reword to e.g. \"Note: The value assumes a 12-bit layout.\"","locations":[{"ref":"components/properties/src/script.rs:33-34","code":"   33 | /// Note: The will assume a 12-bit layout. The 2 higher order bits in positions\n   34 | /// 11..10 will indicate how to deduce the Script value and Script_Extensions,","lines":2}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Docs on the `DataMarkerAttributes` constructors state only that they error \"if the string contains characters other than `[a-zA-Z0-9_\\-/]`\", but `validate` additionally rejects leading slashes, trailing slashes, and double slashes (see the field comment at line 237 and the slash logic in `validate`). The documented contract is incomplete: callers may be surprised that e.g. `\"/leading\"` or `\"double//slash\"` are rejected despite containing only allowed characters.","fix":"Mention in the doc comments that leading/trailing/doub (function(){

const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).

    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
