<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"PluralRules::select(number, ...) panics for any negative non-integer input. fixed_format() extracts the fractional digits via `&raw_frac_part[2..]` where raw_frac_part = format!(\"{}\", n.fract()). This assumes the formatted fraction starts with \"0.\" (2 chars to skip). For negative n, n.fract() is negative and formats with a leading minus, e.g. (-1.5).fract() = -0.5 -> \"-0.5\", so [2..] yields \".5\" (still contains the dot) instead of \"5\". The resulting decimal string is malformed (e.g. fixed_format(-1.5, default-ish opts) produces \"1..5\" with two dots), and to_icu4x_operands then calls Decimal::from_str(&nstr).unwrap() which fails to parse and panics. Reachable from the public ecma402 PluralRules::select API with a negative number (a valid plural-selection input). NaN input triggers the same path (\"NaN\"[2..] -> \"N\"). Verified by reproducing the malformed string outside the crate.","fix":"Strip the sign before formatting/slicing. E.g. compute the fraction from n.abs(): `let raw_frac_part = format!(\"{}\", n.abs().fract());` (int_part already uses n.abs().floor(), so operands ignore sign anyway). Alternatively, find the '.' in raw_frac_part and slice after it (raw_frac_part.split_once('.').map(|(_, f)| f).unwrap_or(\"\")) instead of hardcoding [2..], and guard against non-finite n.","locations":[{"ref":"ffi/ecma402/src/pluralrules.rs:46-51","code":"   46 |         let raw_frac_part = format!(\"{}\", n.fract()); // 0.5\n   47 |         let frac_part = if n.fract() == 0.0 {\n   48 |             \"\"\n   49 |         } else {\n   50 |             &raw_frac_part[2..]\n   51 |         };","lines":6},{"ref":"ffi/ecma402/src/pluralrules.rs:97-101","code":"   97 |     pub fn to_icu4x_operands(n: f64, opts: Options) -> PluralOperands {\n   98 |         let nstr = fixed_format(n, &opts);\n   99 |         #[expect(clippy::unwrap_used)] // TODO(#1668) Clippy exceptions need docs or fixing.\n  100 |         PluralOperands::from(&Decimal::from_str(&nstr).unwrap())\n  101 |     }","lines":5}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`ZeroHashMap::get`/`contains_key` (via private `index`) call `split_hash64(hash, self.len())`, and `split_hash64` computes `(hash >> 48) as usize % m`. When the map is empty, `self.len()` is 0, so this is `% 0`, which panics with \"attempt to calculate the remainder with a divisor of zero\". An empty `ZeroHashMap` is trivially constructible from public API (`ZeroHashMap::from_iter([])`, or by deserializing serialized empty maps: the serde Deserialize impl only checks that displacements/keys/values lengths match, and all-zero lengths pass). Any lookup on such a map panics. I confirmed the `% 0` panic with a standalone repro of `split_hash64`.","fix":"Guard the lookup against an empty map before hashing: in `index()`, early-return `None` when `self.len() == 0` (i.e. `if self.displacements.is_empty() { return None; }`). Alternatively make `split_hash64` defensive when `m == 0`. The serde Deserialize impl could also be left as-is since the runtime guard fixes both construction paths.","locations":[{"ref":"utils/zerovec/src/hashmap/algorithms.rs:23-29","code":"   23 | pub const fn split_hash64(hash: u64, m: usize) -> (usize, u32, u32) {\n   24 |     (\n   25 |         ((hash >> 48) as usize % m),\n   26 |         ((hash >> 24) as u32 & 0xffffff),\n   27 |         ((hash & 0xffffff) as u32),\n   28 |     )\n   29 | }","lines":7},{"ref":"utils/zerovec/src/hashmap/mod.rs:67-85","code":"   67 |     fn index<A>(&self, key: &A) -> Option<usize>\n   68 |     where\n   69 |         A: Borrow<K> + ?Sized,\n   70 |     {\n   71 |         let hash = compute_hash(key.borrow());\n   72 |         let (g, f0, f1) = split_hash64(hash, self.len());\n   73 | \n   74 |         #[expect(clippy::unwrap_used)] // g is in-range\n   75 |         let (d0, d1) = self.displacements.get(g).unwrap();\n   76 |         let index = compute_index((f0, f1), (d0, d1), self.displacements.len() as u32)?;\n   77 | \n   78 |         #[expect(clippy::unwrap_used)] // index is in 0..self.keys.len()\n   79 |         let found = self.keys.zvl_get(index).unwrap();\n   80 |         if K::Container::zvl_get_as_t(found, |found| found == key.borrow()) {\n   81 |             Some(index)\n   82 |         } else {\n   83 |             None\n   84 |         }\n   85 |     }","lines":19},{"ref":"utils/zerovec/src/hashmap/mod.rs:100-120","code":"  100 |     pub fn get<'b, A>(&'b self, key: &A) -> Option<&'b V::GetType>\n  101 |     where\n  102 |         A: Borrow<K> + ?Sized + 'b,\n  103 |     {\n  104 |         self.index(key).and_then(|i| self.values.zvl_get(i))\n  105 |     }\n  106 | \n  107 |     /// Returns whether `key` is contained in this hashmap\n  108 |     ///\n  109 |     /// # Example\n  110 |     /// ```rust\n  111 |     /// use zerovec::ZeroHashMap;\n  112 |     ///\n  113 |     /// let hashmap = ZeroHashMap::<str, str>::from_iter([(\"a\", \"A\"), (\"z\", \"Z\")]);\n  114 |     ///\n  115 |     /// assert!(hashmap.contains_key(\"a\"));\n  116 |     /// assert!(!hashmap.contains_key(\"p\"));\n  117 |     /// ```\n  118 |     pub fn contains_key(&self, key: &K) -> bool {\n  119 |         self.index(key).is_some()\n  120 |     }","lines":21}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`effective_locale` unwraps `formatter_locale.id.script` and `person_name_locale.id.script`. The person-name locale always has a script (set in `likely_person_name_locale`), but `formatter_locale` is `self.default_options.target_locale`, taken from `PersonNamesFormatterOptions`. All fields of `PersonNamesFormatterOptions` are public and the struct is freely constructible, so a caller using `try_new_unstable` with hand-built options whose `target_locale` has no script subtag (e.g. `locale!(\"en\")`, not maximized) will reach `formatter_locale.id.script.unwrap()` on `None` and panic inside `format_to_string`. The `new()` helper maximizes the locale, but it is gated behind `compiled_data` and is not the only construction path.","fix":"Handle missing scripts gracefully (treat `None` as a wildcard / fall back to formatter_locale) instead of unwrapping, or document+enforce maximization by maximizing target_locale inside `try_new_unstable`.","locations":[{"ref":"components/experimental/src/personnames/specifications/derive_locale.rs:24-25","code":"   24 |     let name_script = person_name_locale.id.script.unwrap();\n   25 |     let formatter_script = formatter_locale.id.script.unwrap();","lines":2},{"ref":"components/experimental/src/personnames/formatter.rs:83-86","code":"   83 |         let effective_locale = specifications::effective_locale(\n   84 |             &self.default_options.target_locale,\n   85 |             person_name_locale,\n   86 |         );","lines":4}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`Value::remove_subtag(idx)` has an off-by-one bounds check. It returns `None` only when `self.0.len() < idx`, i.e. when `idx > len`. When `idx == len` the guard is false and it calls `ShortBoxSlice::remove(idx)`, whose `assert!(index < self.len())` then panics. So calling `remove_subtag(len)` on any `Value` (a public API, e.g. a Value with 3 subtags and `remove_subtag(3)`) panics instead of returning None. The sibling `get_subtag` correctly returns None for out-of-range indices. The check should be `if idx >= self.0.len()` (equivalently `self.0.len() <= idx`).","fix":"Change the guard to `if idx >= self.0.len() { None } else { Some(self.0.remove(idx)) }` so that `idx == len` returns None rather than panicking.","locations":[{"ref":"components/locale_core/src/extensions/unicode/value.rs:212-219","code":"  212 |     pub fn remove_subtag(&mut self, idx: usize) -> Option<Subtag> {\n  213 |         if self.0.len() < idx {\n  214 |             None\n  215 |         } else {\n  216 |             let item = self.0.remove(idx);\n  217 |             Some(item)\n  218 |         }\n  219 |     }","lines":8}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"The human-readable `Deserialize` impl for `ZoneNameTimestamp` validates only the byte length of the input string (`parts.len() != 16`) and then slices it with hardcoded byte ranges (`parts[0..4]`, `parts[5..7]`, `parts[8..10]`, `parts[11..13]`, `parts[14..16]`). `str` indexing panics if an index is not on a UTF-8 char boundary. A 16-byte string containing multibyte UTF-8 (e.g. four U+1F600 emoji = 16 bytes) passes the length check but `parts[5..7]` lands inside a multibyte char, causing a panic. This is reachable when deserializing attacker-controlled human-readable data (JSON etc.). Verified by reproducing the panic on `\"😀😀😀😀\"[5..7]`.","fix":"Parse the string by splitting on the known ASCII separators (or use `get(..)` returning Option and bail with the custom error), or verify the string is ASCII before byte-indexing. E.g. `if !parts.is_ascii() { return Err(e0); }` after the length check, or replace each `parts[a..b]` with `parts.get(a..b).ok_or(e0)?`.","locations":[{"ref":"components/time/src/zone/zone_name_timestamp.rs:283-294","code":"  283 |             if parts.len() != 16 {\n  284 |                 return Err(e0);\n  285 |             }\n  286 |             let year = parts[0..4].parse::<i32>().map_err(e1)?;\n  287 |             let month = parts[5..7].parse::<u8>().map_err(e1)?;\n  288 |             let day = parts[8..10].parse::<u8>().map_err(e1)?;\n  289 |             let hour = parts[11..13].parse::<u8>().map_err(e1)?;\n  290 |             let minute = parts[14..16].parse::<u8>().map_err(e1)?;\n  291 |             return Ok(Self::from_zoned_date_time(ZonedDateTime {\n  292 |                 date: icu_calendar::Date::try_new_iso(year, month, day).map_err(e2)?,\n  293 |                 time: Time::try_new(hour, minute, 0, 0).map_err(e3)?,\n  294 |                 zone: UtcOffset::zero(),","lines":12}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`derive_missing_initials` unwraps `SinglePlaceholderPattern::try_from_str` and `DoublePlaceholderPattern::try_from_str` on the initial_pattern / initial_sequence_pattern strings. These come from provider data (`initial_pattern`, `initial_pattern_sequence`) with safe built-in defaults; malformed provider data would panic instead of producing a data error. Not user-input-controllable, but a hard panic on bad data.","fix":"Propagate the parse error (return Result) or fall back to the default pattern instead of unwrapping.","locations":[{"ref":"components/experimental/src/personnames/specifications/derive_missing_initials.rs:21-25","code":"   21 |     let initial_pattern =\n   22 |         SinglePlaceholderPattern::try_from_str(initial_pattern_str, Default::default()).unwrap();\n   23 |     let initial_sequence_pattern =\n   24 |         DoublePlaceholderPattern::try_from_str(initial_sequence_pattern_str, Default::default())\n   25 |             .unwrap();","lines":5}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In the `From<icu_calendar::error::DateDurationParseError>` conversion, the catch-all arm is `_ => unreachable!()`, unlike every other error `From` impl in this file which uses `_ => Self::Unknown`. The upstream `icu_calendar::error::DateDurationParseError` is `#[non_exhaustive]` (confirmed at components/calendar/src/error.rs:661). This conversion is reachable from the public FFI function `DateDuration::from_string` (date.rs:64) via `try_from_utf8(...)?`. The crate denies `clippy::panic`/`unwrap_used`/`indexing_slicing` (lib.rs:7-15) but NOT `clippy::unreachable`, so this panic path is not caught by lints. If the upstream enum gains a new variant in a future version, parsing a duration string that triggers it would panic and unwind across the C ABI (UB). Currently the 6 explicit arms cover all existing variants, so it is a latent/defensive issue rather than presently triggerable.","fix":"Replace `_ => unreachable!()` with `_ => Self::InvalidStructure` (or add an `Unknown` variant to the FFI `DateDurationParseError` enum and map to it), matching the defensive pattern used by all other `From` impls in this file.","locations":[{"ref":"ffi/capi/src/errors.rs:315-327","code":"  315 | impl From<icu_calendar::error::DateDurationParseError> for DateDurationParseError {\n  316 |     fn from(e: icu_calendar::error::DateDurationParseError) -> Self {\n  317 |         match e {\n  318 |             icu_calendar::error::DateDurationParseError::InvalidStructure => Self::InvalidStructure,\n  319 |             icu_calendar::error::DateDurationParseError::TimeNotSupported => Self::TimeNotSupported,\n  320 |             icu_calendar::error::DateDurationParseError::MissingValue => Self::MissingValue,\n  321 |             icu_calendar::error::DateDurationParseError::DuplicateUnit => Self::DuplicateUnit,\n  322 |             icu_calendar::error::DateDurationParseError::NumberOverflow => Self::NumberOverflow,\n  323 |             icu_calendar::error::DateDurationParseError::PlusNotAllowed => Self::PlusNotAllowed,\n  324 |             _ => unreachable!(),\n  325 |         }\n  326 |     }\n  327 | }","lines":13}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`DataMarkerId::from_name` is a `pub const fn` (in the public `marker` module, though `#[doc(hidden)]`) that indexes `name.as_bytes()[name.len() - 1]` and later `name.as_bytes()[i - 1]` without guarding against short inputs. For `name == \"\"`, `name.len() - 1` underflows (panic). For a single-character all-digit name like `\"1\"`, the first check passes (last byte is a digit), then `i` becomes 0 and `name.as_bytes()[i - 1]` indexes at `usize::MAX` (panic). In practice it is only invoked by the `data_marker!` macro with compile-time string literals, so it is not reachable with attacker input, but it is a public API that can panic on trivial input rather than returning the documented `Err`.","fix":"Add an early `if name.is_empty() { return Err((\"[0-9]\", 0)); }` guard and use checked indexing / bounds checks before `i - 1` accesses.","locations":[{"ref":"provider/core/src/marker.rs:369-380","code":"  369 |     pub const fn from_name(name: &'static str) -> Result<Self, (&'static str, usize)> {\n  370 |         #![allow(clippy::indexing_slicing)]\n  371 |         if !name.as_bytes()[name.len() - 1].is_ascii_digit() {\n  372 |             return Err((\"[0-9]\", name.len()));\n  373 |         }\n  374 |         let mut i = name.len() - 1;\n  375 |         while name.as_bytes()[i - 1].is_ascii_digit() {\n  376 |             i -= 1;\n  377 |         }\n  378 |         if name.as_bytes()[i - 1] != b'V' {\n  379 |             return Err((\"V\", i));\n  380 |         }","lines":12}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"In the Bidi_Mirroring datagen path, `bidi_mirroring[&cp]` indexes the HashMap built from BidiMirroring.txt using a code point taken from BidiBrackets.txt. If a bracket code point were absent from BidiMirroring.txt this would panic instead of producing the intended warning. This is guarded only by Unicode data invariants (all bracket characters are mirrored) and runs only under the `use_wasm`/`use_icu4c` features on trusted UCD input.","fix":"Use `bidi_mirroring.get(&cp)` and emit the existing warning (or skip) when absent rather than panicking via index.","locations":[{"ref":"provider/source/src/properties/bidi.rs:77-81","code":"   77 |                 if bidi_mirroring[&cp] as u32 != mirror {\n   78 |                     log::warn!(\n   79 |                         \"BidiMirroring.txt and BidiBrackets.txt disagree for U+{cp:X}: {:?} vs U+{mirror:X}\", \n   80 |                         bidi_mirroring[&cp]\n   81 |                     );","lines":5}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"`PluralOperands::from_significand_and_exponent` adds the decimal's magnitude (an i16 that can be up to i16::MAX, see fixed_decimal docs / `multiply_pow10(i16::MAX)`) to the compact exponent `exp_i16` (0..=255) using plain i16 addition. When the significand has a large magnitude and a nonzero exponent, `*mag_range.end() + exp_i16` (and the `.start()` variant, and the same expression at line 274) overflows i16. This panics in debug/fuzz builds and silently wraps to a wrong value in release, yielding an incorrect plural category. It is reachable from the public, non-datagen API `PluralOperands::from(&CompactDecimal)` (and thus `PluralRules::category_for(&CompactDecimal)` / `CompactDecimalFormatter`), because `CompactDecimal::from_significand_and_exponent(significand, exponent)` is fully public and accepts an arbitrary significand magnitude and an exponent up to 255. The `From<&Decimal>`/`From<&UnsignedDecimal>` paths are safe only because they pass exp=0.","fix":"Promote to a wider type before adding, e.g. compute `let high = i32::from(*mag_range.end()) + i32::from(exp_i16);` and `let low = i32::from(*mag_range.start()) + i32::from(exp_i16);`, then clamp into the small i16 ranges (0..=17 / -18..=0) and only convert back afterwards. Apply the same widening to the `> 17` check at line 274.","locations":[{"ref":"components/plurals/src/operands.rs:262-276","code":"  262 |         let exp_i16 = i16::from(exp);\n  263 | \n  264 |         let mag_range = dec.magnitude_range();\n  265 |         let mag_high = (*mag_range.end() + exp_i16).clamp(0, 17);\n  266 |         let mag_low = (*mag_range.start() + exp_i16).clamp(-18, 0);\n  267 | \n  268 |         let mut i: u64 = 0;\n  269 |         for magnitude in (0..=mag_high).rev() {\n  270 |             i *= 10;\n  271 |             i += dec.digit_at(magnitude - exp_i16) as u64;\n  272 |         }\n  273 | \n  274 |         if *mag_range.end() + exp_i16 > 17 {\n  275 |             i += LIMIT_18_DIGITS;\n  276 |         }","lines":15}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Exponent parsing in `try_from_no_sign_utf8` accumulates the exponent into an `i16` accumulator (`pow *= 10; pow += (digit - b'0') as i16;`) with NO bound on the number of exponent digits. This is reachable from the public API via `UnsignedDecimal::from_str`/`try_from_utf8`, `Decimal::from_str`, `ScientificDecimal::from_str`, and `CompactDecimal` parsing (all route through here). Verified by building the crate: `UnsignedDecimal::from_str(\"1e99999\")` panics in debug mode with 'attempt to multiply with overflow' at decimal.rs:2089. In release mode it silently wraps: `from_str(\"1e32768\")` returns Ok with a totally wrong value (pow wraps 32768 -> -32768, yielding a tiny fraction instead of a huge number) - silent data corruption on attacker-controllable input. `pos_neg * pow` is a secondary overflow site on the same line 2093.","fix":"Parse the exponent into a wider type (e.g. i32/i64) with checked arithmetic, or cap the number of exponent digits, and return ParseError::Limit when the magnitude cannot fit in i16 (similar to the existing temp_upper_magnitude/temp_lower_magnitude > i16::MAX checks). Replace `pow *= 10; pow += d` with checked_mul/checked_add returning ParseError::Limit on overflow.","locations":[{"ref":"utils/fixed_decimal/src/decimal.rs:2079-2093","code":" 2079 |         if has_exponent {\n 2080 |             let mut pow = 0;\n 2081 |             let mut pos_neg = 1;\n 2082 |             #[expect(clippy::indexing_slicing)]\n 2083 |             // exponent_index is exist, then exponent_index + 1 will equal at most no_sign_str.len().\n 2084 |             for digit in &no_sign_str[exponent_index + 1..] {\n 2085 |                 if *digit == b'-' {\n 2086 |                     pos_neg = -1;\n 2087 |                     continue;\n 2088 |                 }\n 2089 |                 pow *= 10;\n 2090 |                 pow += (digit - b'0') as i16;\n 2091 |             }\n 2092 | \n 2093 |             dec.multiply_pow10(pos_neg * pow);","lines":15}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"TzRuleDate::new computes `let month = zero_based_month + 1;` where `zero_based_month` is `value[0] as u8` taken directly from untrusted resb rule bytes (TzRule::from_raw passes `value[0] as u8`, which can be 0..=255). When the byte is 255, `255u8 + 1` overflows u8 and panics in debug/overflow-checked builds (wraps to 0 in release, silently producing a bogus month). Line 200 repeats the same expression. Reachable from the public API ZoneInfo64::try_from_u32s -> deserialize -> rules() -> TzRule::from_raw with crafted/untrusted resource-bundle data.","fix":"Validate zero_based_month before adding (e.g. `if zero_based_month >= 12 { return None; }`) or use checked_add, before computing `month`.","locations":[{"ref":"utils/zoneinfo64/src/rule.rs:142","code":"  142 |         let month = zero_based_month + 1;","lines":1},{"ref":"utils/zoneinfo64/src/rule.rs:200","code":"  200 |             month: zero_based_month + 1,","lines":1},{"ref":"utils/zoneinfo64/src/rule.rs:109-127","code":"  109 |     pub(crate) fn from_raw(value: &[i32; 11]) -> Option<Self> {\n  110 |         Some(Self {\n  111 |             additional_offset_secs: value[10],\n  112 |             start: TzRuleDate::new(\n  113 |                 value[1] as i8,\n  114 |                 value[2] as i8,\n  115 |                 value[0] as u8,\n  116 |                 value[3] as u32,\n  117 |                 value[4] as i8,\n  118 |             )?,\n  119 |             end: TzRuleDate::new(\n  120 |                 value[6] as i8,\n  121 |                 value[7] as i8,\n  122 |                 value[5] as u8,\n  123 |                 value[8] as u32,\n  124 |                 value[9] as i8,\n  125 |             )?,\n  126 |         })\n  127 |     }","lines":19}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"The reference pattern parser increments u8 counters (`length`, `integer_digits`, `fraction_digits`) once per repeated identical field symbol, with no overflow guard and no cap on input length. A pattern string with 256 or more consecutive identical field symbols (e.g. 256+ 'y' or 's'/'S' characters) overflows the u8. In debug builds this panics with \"attempt to add with overflow\"; in release builds it wraps silently, so e.g. 259 repeated 'y' wraps `length` to 3 and `FieldLength::from_idx` accepts it, producing a valid-but-wrong field (FieldLength::Three) instead of the expected length-error. This is reachable from the public API `DateTimePattern::try_from_pattern_str` / `FromStr` with arbitrary user-supplied pattern strings (runtime::Pattern::from_str -> reference::Pattern::from_str -> Parser::parse). Confirmed the overflow with a standalone reproduction.","fix":"Use checked/saturating increments (e.g. `*length = length.saturating_add(1)`), or cap the counter at a small value beyond the max valid field length (e.g. stop incrementing once it exceeds LAST_NUMERIC_OVERRIDE) so that an over-long run reliably produces PatternError::FieldLengthInvalid rather than panicking or silently wrapping to a valid length.","locations":[{"ref":"components/datetime/src/provider/pattern/reference/parser.rs:252-252","code":"  252 |                             *length += 1;","lines":1},{"ref":"components/datetime/src/provider/pattern/reference/parser.rs:259-259","code":"  259 |                             *integer_digits += 1;","lines":1},{"ref":"components/datetime/src/provider/pattern/reference/parser.rs:284-284","code":"  284 |                             *length += 1;","lines":1},{"ref":"components/datetime/src/provider/pattern/reference/parser.rs:302-302","code":"  302 |                             second_symbol.fraction_digits += 1;","lines":1}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `add_fractional_digits`, `let val = val + prev_val / 1000;` adds a u64 unit value (microseconds/milliseconds/seconds, fully caller-controlled via the public `Duration` struct whose fields are `pub u64`) to a carry. With large field values (e.g. microseconds near u64::MAX plus nonzero nanoseconds) this addition overflows: panic in debug builds, silent wraparound (wrong output) in release. Reachable from the public `DurationFormatter::format` path with default options, since sub-second units default to fractional style.","fix":"Use checked/saturating arithmetic (e.g. `val.saturating_add(prev_val / 1000)`) or widen the accumulation type, matching whatever overflow policy the formatter intends.","locations":[{"ref":"components/experimental/src/duration/format.rs:232-258","code":"  232 |     fn add_fractional_digits(&self) -> Decimal {\n  233 |         let mut prev_val = self.duration.nanoseconds;\n  234 |         let mut prev_formatted = Decimal::from(prev_val % 1000);\n  235 |         for (style, val) in [\n  236 |             (self.fmt.options.microsecond, self.duration.microseconds),\n  237 |             (self.fmt.options.millisecond, self.duration.milliseconds),\n  238 |             (self.fmt.options.second, self.duration.seconds),\n  239 |         ] {\n  240 |             if style == FieldStyle::Fractional {\n  241 |                 let val = val + prev_val / 1000;\n  242 |                 prev_formatted.absolute = UnsignedDecimal::from(val % 1000)\n  243 |                     .concatenated_end(prev_formatted.absolute.multiplied_pow10(-3))\n  244 |                     .unwrap();\n  245 | \n  246 |                 prev_val = val;\n  247 |             } else {\n  248 |                 return Decimal::new(\n  249 |                     prev_formatted.sign,\n  250 |                     UnsignedDecimal::from(val)\n  251 |                         .concatenated_end(prev_formatted.absolute.multiplied_pow10(-3))\n  252 |                         .unwrap(),\n  253 |                 );\n  254 |             }\n  255 |         }\n  256 | \n  257 |         prev_formatted\n  258 |     }","lines":27}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"Fraction::to_truncated_nanoseconds() overflows when the parsed fraction has 29 or more digits. The parser (parse_fraction) accepts an unbounded number of fraction digits and only saturates the digit counter at 255 while accumulating `value` for the first 18 digits. When `digits > 9`, to_nanoseconds() returns None and to_truncated_nanoseconds falls through to `self.value / 10u64.pow(self.digits.get() - 9)`. For 29+ fraction digits the exponent is >= 20 and `10u64.pow(20)` overflows u64, panicking in debug/overflow-checked builds (and producing a wrong/zero divisor in release). Reachable from public API: e.g. `IxdtfParser::from_str(\"2025-02-17T05:41:32.\" + 29*'1').parse().unwrap().time.unwrap().fraction.unwrap().to_truncated_nanoseconds()` on untrusted input.","fix":"Cap the divisor exponent (e.g. saturate digits used to a small max such as 19, or early-return when `digits - 9 >= 19`). Alternatively clamp `digits` during parsing to a sane maximum, or use checked_pow and return 0 / handle overflow gracefully.","locations":[{"ref":"utils/ixdtf/src/records.rs:357-360","code":"  357 |     pub fn to_truncated_nanoseconds(&self) -> u32 {\n  358 |         self.to_nanoseconds()\n  359 |             .unwrap_or_else(|| (self.value / 10u64.pow(u32::from(self.digits.get() - 9))) as u32)\n  360 |     }","lines":4},{"ref":"utils/ixdtf/src/parsers/time.rs:181-193","code":"  181 |     let mut value = 0;\n  182 |     let mut digits: u8 = 0;\n  183 |     while cursor.check_or(false, |ch| ch.is_ascii_digit())? {\n  184 |         let next_value = u64::from(cursor.next_digit()?.ok_or(ParseError::ImplAssert)?);\n  185 |         if digits < 18 {\n  186 |             value = value * 10 + next_value;\n  187 |         }\n  188 |         digits = digits.saturating_add(1);\n  189 |     }\n  190 | \n  191 |     let digits = NonZeroU8::new(digits).ok_or(ParseError::FractionPart)?;\n  192 | \n  193 |     Ok(Some(Fraction { digits, value }))","lines":13}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In `deserialize_map` for a `Table`, the entry count `length` is a `u16` read directly from attacker-controllable bundle bytes. The padding calculation `length + ((length + 1) % 2)` is performed in `u16` arithmetic; when `length == 0xFFFF`, `length + 1` overflows `u16`, which panics in debug builds (and wraps in release, producing a wrong `values_offset`). This is reachable from the public `from_words` API with crafted input.","fix":"Promote to a wider type before the arithmetic, e.g. `let length_with_padding = (length as usize) + (((length as usize) + 1) % 2);` (or compute padding as `(length as usize).next_multiple_of(2)`).","locations":[{"ref":"utils/resb/src/binary/deserializer.rs:582","code":"  582 |                 let length_with_padding = (length + ((length + 1) % 2)) as usize;","lines":1}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"natural() computes the value of a run of ASCII digits via `digit * 10i64.pow(n)` where `n` is the digit position, with no limit on the number of digits (digits() is many1(digit())). A POSIX TZ string containing a run of 19 or more digits causes `10i64.pow(19)` to overflow i64 and panic in debug/overflow-checked builds (and the sum can overflow in release). This bounds-check happens only AFTER the value is computed, so even bounded fields (hours/minutes/day) are affected. Reachable from the public APIs `tzif::parse_posix_tz_string(bytes)` and `tzif::parse_tzif_file` (footer), both of which parse untrusted input. Example: parse_posix_tz_string(b\"EST99999999999999999999\").","fix":"Use checked arithmetic (checked_pow / checked_mul / checked_add) and return a parse error on overflow, or limit the number of accepted digits (e.g. many1 with a max count) before computing the value.","locations":[{"ref":"utils/tzif/src/parse/posix.rs:99-113","code":"   99 | fn natural<Input>() -> impl Parser<Input, Output = i64>\n  100 | where\n  101 |     Input: Stream<Token = u8>,\n  102 |     Input::Error: ParseError<Input::Token, Input::Range, Input::Position>,\n  103 | {\n  104 |     digits().map(|digits| {\n  105 |         digits\n  106 |             .into_iter()\n  107 |             .map(|digit| i64::from(digit - b'0'))\n  108 |             .rev()\n  109 |             .zip(0u32..)\n  110 |             .map(|(digit, n)| digit * 10i64.pow(n))\n  111 |             .sum::<i64>()\n  112 |     })\n  113 | }","lines":15}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In the dense-trie builder, add_prefix computes min/max over the per-prefix values map with min initialized to usize::MAX and max to 0. If the inner values map is empty, the loop never runs and `max - min` evaluates to `0 - usize::MAX`, which panics in debug builds (and wraps in release). This is reachable from the public API `ZeroAsciiDenseSparse2dTrieOwned::try_from_btree_map_str` when a caller supplies an entry whose inner BTreeMap is empty (e.g. `data.insert(\"xx\", BTreeMap::new())`), which is valid API usage and not rejected anywhere upstream. Even in release, the subsequent `let sentinel = row_value_offset + usize::from(DenseType::MAX)` (line 71) overflows when row_value_offset became usize::MAX, causing a second debug panic / release wrap. The function should early-return or skip prefixes whose values map is empty.","fix":"Guard against an empty `values` map at the top of `add_prefix` (e.g. `if values.is_empty() { return; }`), or compute min/max with `Option` and bail out when there are no values. Also ensure `try_from_btree_map_str` does not pass empty inner maps to `add_prefix`.","locations":[{"ref":"utils/zerotrie/src/builder/dense.rs:58-71","code":"   58 |     pub(crate) fn add_prefix(&mut self, prefix: &'a str, values: &BTreeMap<&'a str, usize>) {\n   59 |         // Is there a more Rusty way to compute min and max together?\n   60 |         let mut min = usize::MAX;\n   61 |         let mut max = 0;\n   62 |         for value in values.values() {\n   63 |             min = core::cmp::min(min, *value);\n   64 |             max = core::cmp::max(max, *value);\n   65 |         }\n   66 |         // >= because DenseType::MAX is the sentinel\n   67 |         let mut row_value_offset = min;\n   68 |         if max - min >= usize::from(DenseType::MAX) {\n   69 |             row_value_offset = Self::find_window(values);\n   70 |         }\n   71 |         let sentinel = row_value_offset + usize::from(DenseType::MAX);","lines":14}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In ConverterFactory::is_reciprocal, the per-base-unit power accumulators PowersInfo.diffs/sums are i16 and are accumulated across all single units of both input and output MeasureUnits (insert_base_units: `powers.diffs += signed_item_power; powers.sums += item_power;`). The number of single units is bounded only by the length of the user-supplied unit identifier string passed to MeasureUnit::try_from_str. A pathological identifier such as \"square-meter-square-meter-...\" repeated thousands of times accumulates a single map entry's power beyond i16::MAX. This overflows: in debug builds it panics, in release builds it wraps silently and can yield an incorrect reciprocal/convertible classification (wrong conversion result). Reachable from the public API ConverterFactory::converter.","fix":"Use a saturating or checked accumulation (e.g. i32 accumulators, or saturating_add and treat saturation as InvalidConversionError), or cap the number of single units allowed in MeasureUnit during parsing.","locations":[{"ref":"components/experimental/src/units/converter_factory.rs:215-237","code":"  215 |         fn insert_base_units(\n  216 |             basic_units: &ZeroSlice<SingleUnit>,\n  217 |             original_power: i16,\n  218 |             sign: i16,\n  219 |             map: &mut LiteMap<u16, PowersInfo>,\n  220 |         ) {\n  221 |             for item in basic_units.iter() {\n  222 |                 let item_power = (item.power as i16) * original_power;\n  223 |                 let signed_item_power = item_power * sign;\n  224 |                 if let Some(powers) = map.get_mut(&item.unit_id) {\n  225 |                     powers.diffs += signed_item_power;\n  226 |                     powers.sums += item_power;\n  227 |                 } else {\n  228 |                     map.insert(\n  229 |                         item.unit_id,\n  230 |                         PowersInfo {\n  231 |                             diffs: (signed_item_power),\n  232 |                             sums: (item_power),\n  233 |                         },\n  234 |                     );\n  235 |                 }\n  236 |             }\n  237 |         }","lines":23},{"ref":"components/experimental/src/units/converter_factory.rs:222-223","code":"  222 |                 let item_power = (item.power as i16) * original_power;\n  223 |                 let signed_item_power = item_power * sign;","lines":2}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"LstmDataFloat32::try_from_parts computes `num_classes - 1` where `num_classes = embedding.dims[0]` is a u16 taken directly from deserialized data. If a malformed/attacker-supplied data buffer (via serde BufferProvider) has embedding.dims[0] == 0, this subtraction underflows: it panics in debug builds and wraps to 65535 in release builds. This is a validation routine specifically meant to reject bad data, so a panic on bad input here is undesirable. (In release the subsequent `!= dic_len` comparison would usually still reject it, but the debug-build panic is reachable from deserialization of untrusted data.)","fix":"Guard against an empty embedding before subtracting, e.g. check `num_classes == 0` up front and return the dimension-mismatch DataError, or use `num_classes.checked_sub(1)` and treat None as a mismatch.","locations":[{"ref":"components/segmenter/src/provider/lstm.rs:200-217","code":"  200 |         let dic_len = u16::try_from(dic.len())\n  201 |             .map_err(|_| DataError::custom(\"Dictionary does not fit in u16\"))?;\n  202 | \n  203 |         let num_classes = embedding.dims[0];\n  204 |         let embedd_dim = embedding.dims[1];\n  205 |         let hunits = fw_u.dims[2];\n  206 |         if num_classes - 1 != dic_len\n  207 |             || fw_w.dims != [4, hunits, embedd_dim]\n  208 |             || fw_u.dims != [4, hunits, hunits]\n  209 |             || fw_b.dims != [4, hunits]\n  210 |             || bw_w.dims != [4, hunits, embedd_dim]\n  211 |             || bw_u.dims != [4, hunits, hunits]\n  212 |             || bw_b.dims != [4, hunits]\n  213 |             || time_w.dims != [2, 4, hunits]\n  214 |             || time_b.dims != [4]\n  215 |         {\n  216 |             return Err(DataError::custom(\"LSTM dimension mismatch\"));\n  217 |         }","lines":18}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"Three code-point enumeration loops use the half-open range `0..(char::MAX as u32)`, which excludes the final code point U+10FFFF (char::MAX). In properties/bin_cp_set.rs this means the SegmentStarter and CaseSensitive sets never consider U+10FFFF; in properties/script.rs the script-with-extensions trie never explicitly sets a value for U+10FFFF (it keeps the trie default). U+10FFFF is a noncharacter with default property values so the output is correct in practice, but it is an off-by-one inconsistency: the analogous loop in properties/bidi.rs (line 100) and collator/mod.rs (line 269) correctly use the inclusive `0..=(char::MAX as u32)`.","fix":"Use the inclusive range `0..=(char::MAX as u32)` (matching bidi.rs and collator/mod.rs) so U+10FFFF is included, for consistency and correctness if a future Unicode revision assigns properties there.","locations":[{"ref":"provider/source/src/properties/bin_cp_set.rs:398-398","code":"  398 |         let non_initial_decomposition_characters = (0..(char::MAX as u32))","lines":1},{"ref":"provider/source/src/properties/bin_cp_set.rs:444-444","code":"  444 |         let set = (0..(char::MAX as u32))","lines":1},{"ref":"provider/source/src/properties/script.rs:106-106","code":"  106 |                 for cp in 0..(char::MAX as u32) {","lines":1}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`MetazoneId::new(idx as u8 + 1).unwrap()` truncates the metazone index to u8 and adds 1. If CLDR ever defines more than 254 metazones, `idx as u8` truncates (wrapping) and/or `idx as u8 + 1` can wrap to 0, causing either silently wrong metazone IDs or a panic in `.unwrap()` when `MetazoneId::new(0)` returns None. Input is trusted CLDR data (currently ~190 metazones), so this is not currently reachable, but the cast is unchecked and fragile.","fix":"Use a checked conversion, e.g. `u8::try_from(idx).ok().and_then(|i| MetazoneId::new(i + 1))` with a descriptive error if it overflows, instead of `idx as u8 + 1` plus `.unwrap()`.","locations":[{"ref":"provider/source/src/time_zones/mod.rs:374-381","code":"  374 |                 let ids: BTreeMap<String, MetazoneId> = all_metazones\n  375 |                     .iter()\n  376 |                     .enumerate()\n  377 |                     .map(|(idx, &alias)| {\n  378 |                         alias.hash(&mut hash);\n  379 |                         (String::from(alias), MetazoneId::new(idx as u8 + 1).unwrap())\n  380 |                     })\n  381 |                     .collect();","lines":8}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"days_in_month computes `(month - 1) as i64 * 29` where month is u8. If a caller passes month == 0, `month - 1` underflows; in debug builds this panics (attempt to subtract with overflow), in release it wraps to 255. month_days (line 487-492) forwards its `month: u8` argument here directly. The crate's lints deny clippy::panic but not arithmetic overflow, and month is part of a public API surface. The same pattern appears in days_until_month (line 591) which guards with saturating_mul on the multiply but still does `u16::from(month) - 1` first, underflowing for month == 0.","fix":"Use `month.saturating_sub(1)` (or document/validate that month must be >= 1) before the multiplication in both days_in_month and days_until_month.","locations":[{"ref":"utils/calendrical_calculations/src/chinese_based.rs:501","code":"  501 |     let approx = new_year + ((month - 1) as i64 * 29);","lines":1},{"ref":"utils/calendrical_calculations/src/chinese_based.rs:591","code":"  591 |     let month_approx = 28_u16.saturating_mul(u16::from(month) - 1);","lines":1}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Alias resolution truncates a u32 index to u16. deserialize validates an alias index `i: u32` against the full raw_zones array, but ZoneInfo64::get and Zone::from_raw_parts store/use the resolved index as `i as u16`, and Zone fields idx/resolved_idx are u16. If a zone table ever contains more than 65536 zones (or an alias pointing past 65535), the cast silently truncates and resolves to the wrong zone. Currently latent because real timezone data has only a few hundred zones, but it is an unchecked narrowing of validated data.","fix":"Either validate during deserialize that zones.len() <= u16::MAX (and that alias indices fit u16), or store indices as u32/usize.","locations":[{"ref":"utils/zoneinfo64/src/lib.rs:196-209","code":"  196 |         #[expect(clippy::indexing_slicing)] // just validated\n  197 |         let resolved_idx = if let TzZone::Int(i) = self.zones[idx] {\n  198 |             i as u16\n  199 |         } else {\n  200 |             idx as u16\n  201 |         };\n  202 | \n  203 |         // idx is a valid index into info.names by binary search\n  204 |         // zone_idx is a valid index into info.zones by the invariant that links don't point to links\n  205 |         Some(Zone {\n  206 |             idx: idx as u16,\n  207 |             resolved_idx,\n  208 |             info: self,\n  209 |         })","lines":14},{"ref":"utils/zoneinfo64/src/lib.rs:235-253","code":"  235 |     pub fn from_raw_parts(parts: (u16, &'a ZoneInfo64<'a>)) -> Self {\n  236 |         let (idx, info) = parts;\n  237 |         // info.zones.len() > 0 by invariant, so this doesn't underflow ...\n  238 |         let idx = core::cmp::min(info.zones.len() - 1, idx as usize);\n  239 |         #[expect(clippy::indexing_slicing)] // ... and idx is a valid index\n  240 |         let resolved_idx = if let TzZone::Int(i) = info.zones[idx] {\n  241 |             i as u16\n  242 |         } else {\n  243 |             idx as u16\n  244 |         };\n  245 | \n  246 |         // idx is a valid index into info.names by safety invariant\n  247 |         // zone_idx is a valid index into info.zones by the invariant that links don't point to links\n  248 |         Self {\n  249 |             idx: idx as u16,\n  250 |             resolved_idx,\n  251 |             info,\n  252 |         }\n  253 |     }","lines":19}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"TzRuleDate::day_in_year computes `self.day - days_to_subtract` (u8) for RuleMode::DOW_LEQ_DOM. `days_to_subtract` can be up to 6, so if a rule has an anchor `day` of 1..=6 the subtraction underflows u8 (panic in debug/overflow-checked builds). Real TZDB only uses DOW_LEQ_DOM with day=31 (\"last weekday\"), so this is not hit by genuine data, but TzRule::from_raw accepts such a rule from untrusted resb (day>=1 passes validation), making it reachable via ZoneInfo64::try_from_u32s + for_timestamp/for_date_time on crafted data.","fix":"Use saturating/checked subtraction or compute day_of_month as a signed value before converting, and reject rules that would place the transition outside the month.","locations":[{"ref":"utils/zoneinfo64/src/rule.rs:246-254","code":"  246 |             RuleMode::DOW_LEQ_DOM => {\n  247 |                 let weekday_of_anchor = (weekday_before_month + self.day) % 7;\n  248 |                 let days_to_subtract = if self.weekday <= weekday_of_anchor {\n  249 |                     0\n  250 |                 } else {\n  251 |                     7\n  252 |                 } + weekday_of_anchor - self.weekday;\n  253 |                 self.day - days_to_subtract\n  254 |             }","lines":9}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"The reference rule lexer accumulates multi-digit numbers into a u32 via `value += (digit) * 10_u32.pow((end - ptr - 1) as u32)`. A numeric literal with more than ~10 digits overflows u32 (panics in debug, wraps in release). This is only reachable through the `#[cfg(feature = \"datagen\")]`-gated `reference::parse`/`Lexer`, whose input is CLDR plural-rule strings (values are tiny in practice), so impact is minimal, but the parser does not guard against oversized literals.","fix":"Use checked/saturating arithmetic (e.g. `u32::checked_pow` and `checked_mul`/`checked_add`) and return a lexer error on overflow instead of relying on the literals always being small.","locations":[{"ref":"components/plurals/src/provider/rules/reference/lexer.rs:139-155","code":"  139 |                     b'1'..=b'9' => {\n  140 |                         let start = self.ptr - 1;\n  141 | \n  142 |                         while let Some(b'0'..=b'9') = self.chars.get(self.ptr) {\n  143 |                             self.ptr += 1;\n  144 |                         }\n  145 |                         let end = self.ptr;\n  146 | \n  147 |                         let mut value = 0;\n  148 |                         #[expect(clippy::indexing_slicing)]\n  149 |                         // start..end are calculated to be within bounds.\n  150 |                         for ptr in start..end {\n  151 |                             let mul = 10_u32.pow((end - ptr - 1) as u32);\n  152 |                             value += ((self.chars[ptr] - b'0') as u32) * mul;\n  153 |                         }\n  154 |                         Token::Number(value)\n  155 |                     }","lines":17}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`CodePointInversionList::contains_set` uses an off-by-one comparison: `check_range.end() <= &(range.end() + 1)`. Since both ranges are end-inclusive (`iter_ranges` already subtracts 1), the `+1` makes the function consider a set element that lies exactly one past the end of a containing range as contained. Example: self = {0x41..=0x44} (inv_list [0x41,0x45]), set = {0x45} (inv_list [0x45,0x46]); `contains_set` returns `true` even though 0x45 is not in self. Verified by extracting and running the algorithm.","fix":"Drop the `+ 1`: compare `check_range.end() <= range.end()` (i.e. `if check_range.start() >= range.start() && check_range.end() <= range.end()`).","locations":[{"ref":"components/collections/src/codepointinvlist/cpinvlist.rs:690-692","code":"  690 |                     if check_range.start() >= range.start()\n  691 |                         && check_range.end() <= &(range.end() + 1)\n  692 |                     {","lines":3}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"The key block is supposed to be padded so its end lands on a 32-bit boundary (see comment), but the padding amount is computed with `% 3` instead of a 4-byte alignment formula. For a total length whose remainder mod 4 is e.g. 1, the code adds `total % 3` bytes which does not produce a multiple of 4. Because `keys_end` is later passed to `build_index` as `keys_end >> 2` (serializer.rs:271), a non-4-aligned key block truncates on the `>> 2`, corrupting the offset to the 16-bit data block and every following block. Round-tripped bundles become unreadable for many key-block sizes.","fix":"Compute the alignment padding correctly, e.g. `let total = block_start_position as usize + key_block.len(); let padding = (size_of::<u32>() - total % size_of::<u32>()) % size_of::<u32>();` then `key_block.resize(key_block.len() + padding, 0xaa);`","locations":[{"ref":"utils/resb/src/binary/serializer.rs:363-364","code":"  363 |         let padding = (block_start_position as usize + key_block.len()) % 3;\n  364 |         key_block.resize(key_block.len() + padding, 0xaa);","lines":2}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In the binary serializer, the single-word UTF-16 string length marker is encoded with bitwise AND instead of OR. The deserializer extracts the length as `first & 0x03ff` (deserializer.rs:1116), so the encoder must set the marker as `0xdc00 | length`. Using `0xdc00 & (length as u16)` instead clears the length bits: e.g. for length 41 (0x29) the result is 0x0000 (since 0xdc00 & 0x29 == 0), producing a corrupt/unreadable string. This affects every string whose char count is in 41..=0x3ee (the single-marker range), silently corrupting serialized bundles.","fix":"Change `data_16_bit.push(0xdc00 & length as u16);` to `data_16_bit.push(0xdc00 | length as u16);` so the marker matches the `first & 0x03ff` decode path.","locations":[{"ref":"utils/resb/src/binary/serializer.rs:536","code":"  536 |                 1 => data_16_bit.push(0xdc00 & length as u16),","lines":1}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Inverted boolean logic in the digital-base unit-option resolution. The spec step is \"If unit is NOT one of hours, minutes, or seconds\", whose correct De Morgan form is `unit != Hour && unit != Minute && unit != Second`. The code uses `||`, so the condition `unit != Unit::Hour || unit != Unit::Minute || unit != Unit::Second` is ALWAYS true for every unit (any unit differs from at least two of the three). As a result `default_visibility` is unconditionally set to Auto even for hours/minutes/seconds, instead of leaving them at the default Always. This produces wrong visibility defaults for the digital base style.","fix":"Change the operator from `||` to `&&`: `if unit != Unit::Hour && unit != Unit::Minute && unit != Unit::Second {`","locations":[{"ref":"components/experimental/src/duration/validated_options.rs:114-117","code":"  114 |                     if unit != Unit::Hour || unit != Unit::Minute || unit != Unit::Second {\n  115 |                         // 1. Set displayDefault to \"auto\".\n  116 |                         default_visibility = FieldDisplay::Auto;\n  117 |                     }","lines":4}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Same inverted-logic bug in the non-digital branch. The spec step is \"If unit is NOT one of minutes or seconds\". The code `if unit != Unit::Minute || unit != Unit::Second` is always true, so `default_visibility` is forced to Auto for every unit (including minutes/seconds) when the previous style was fractional/numeric/2-digit. Should use `&&`.","fix":"Change to `if unit != Unit::Minute && unit != Unit::Second {`","locations":[{"ref":"components/experimental/src/duration/validated_options.rs:129-132","code":"  129 |                         if unit != Unit::Minute || unit != Unit::Second {\n  130 |                             // a. Set displayDefault to \"auto\".\n  131 |                             default_visibility = FieldDisplay::Auto;\n  132 |                         }","lines":4}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In try_load_block_set, the Arabic and Thaana Unicode blocks are added with exclusive `..` ranges instead of inclusive `..=` ranges. The Arabic block is U+0600..=U+06FF and the Thaana block is U+0780..=U+07BF, but `'\\u{0600}'..'\\u{06FF}'` and `'\\u{0780}'..'\\u{07BF}'` exclude the final code point of each block (U+06FF ARABIC LETTER HEH WITH INVERTED V, and U+07BF THAANA LETTER NAA respectively). This is reachable from the public `parse()` / `parse_with_variables()` API via `[:block=arabic:]` or `[:block=thaana:]`, producing a set that is missing one code point at the top of each block.","fix":"Use inclusive ranges: `\"arabic\" => '\\u{0600}'..='\\u{06FF}'` and `\"thaana\" => '\\u{0780}'..='\\u{07BF}'` (and switch `add_range` to accept the inclusive range, which it already does via `RangeBounds<char>`).","locations":[{"ref":"components/properties/src/unicodeset_parse/parse.rs:1562-1571","code":" 1562 |         self.single_set\n 1563 |             .add_range(match name.to_ascii_lowercase().as_str() {\n 1564 |                 \"arabic\" => '\\u{0600}'..'\\u{06FF}',\n 1565 |                 \"thaana\" => '\\u{0780}'..'\\u{07BF}',\n 1566 |                 _ => {\n 1567 |                     #[cfg(feature = \"log\")]\n 1568 |                     log::warn!(\"Skipping :block={name}:\");\n 1569 |                     return Err(PEK::Unimplemented.into());\n 1570 |                 }\n 1571 |             });","lines":10}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"The CLI `--include-collations searchji` value maps to the datagen attribute string \"searchji\", but the actual collation marker attribute is \"searchjl\" (search + JAMO_L; see components/locale_core/src/preferences/extensions/unicode/keywords/collation.rs:31 `(\"searchjl\" => Searchjl)` and the export test cases in export_impl.rs which use \"searchjl\"). Because `with_additional_collations` builds a filter that checks `set.contains(attrs.as_str())`, the produced filter never matches the real \"searchjl\" attribute. So a user requesting `--include-collations searchji` silently gets the search-JAMO collation table excluded from the output rather than included. This looks like a transcription typo (ji vs jl).","fix":"Change `Self::Searchji => \"searchji\"` to return \"searchjl\" (and consider renaming the enum variant `Searchji`->`Searchjl` and its ValueEnum CLI value to match), so the filter matches the real collation attribute.","locations":[{"ref":"provider/icu4x-datagen/src/main.rs:361-369","code":"  361 | impl CollationTable {\n  362 |     fn to_datagen_value(self) -> &'static str {\n  363 |         match self {\n  364 |             Self::Search => \"search\",\n  365 |             Self::Searchji => \"searchji\",\n  366 |             Self::SearchAll => \"search*\",\n  367 |         }\n  368 |     }\n  369 | }","lines":9}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"When building a `Table16` resource, the code writes key offsets by iterating over `key_position_map.values()` - the position map for EVERY key in the whole bundle - rather than only this table's keys. Compare the correct 32-bit table path (serializer.rs:791-796) which iterates `map.keys()` and looks up each. The Table16 branch therefore writes the wrong number of, and wrong, key offsets (and writes `size` from `map.len()` while the offsets come from the global map), producing corrupt output. (Less severe because Table16 is currently un-deserializable - deserializer.rs:595 is `todo!()` - but the writer still emits invalid data.)","fix":"Iterate the table's own keys and look up each position, mirroring the 32-bit path: `data_16_bit.push(size as u16); for key in map.keys() { let position = key_position_map.get(key).ok_or_else(...)?; data_16_bit.push(*position as u16); } for descriptor in data_16_bit_offsets { data_16_bit.push(descriptor); }`","locations":[{"ref":"utils/resb/src/binary/serializer.rs:663-669","code":"  663 |                 data_16_bit.push(size as u16);\n  664 |                 for position in key_position_map.values() {\n  665 |                     data_16_bit.push(*position as u16);\n  666 |                 }\n  667 |                 for descriptor in data_16_bit_offsets {\n  668 |                     data_16_bit.push(descriptor);\n  669 |                 }","lines":7}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`CodePointInversionListAndStringList::try_from` does not validate the length-1 invariant for the final string in the list. The first element is checked (line 84), and each subsequent element becomes `x` and is checked on the next iteration (line 91), but the last element is assigned to `x` after the final iteration and never checked. A list whose last entry is a length-1 string (e.g. `[\"abc\", \"z\"]`) passes validation despite violating the documented weak invariant 'no input string is length 1'.","fix":"After the loop, check the final `x` for `x.len() == 1` (or restructure so the length check covers every element, e.g. check `y.len() == 1` inside the loop instead of/in addition to `x`).","locations":[{"ref":"components/collections/src/codepointinvliststringlist/mod.rs:82-113","code":"   82 |             let mut it = str_list.iter();\n   83 |             if let Some(mut x) = it.next() {\n   84 |                 if x.len() == 1 {\n   85 |                     return Err(InvalidStringList::InvalidStringLength(\n   86 |                         #[cfg(feature = \"alloc\")]\n   87 |                         x.to_string(),\n   88 |                     ));\n   89 |                 }\n   90 |                 for y in it {\n   91 |                     if x.len() == 1 {\n   92 |                         return Err(InvalidStringList::InvalidStringLength(\n   93 |                             #[cfg(feature = \"alloc\")]\n   94 |                             x.to_string(),\n   95 |                         ));\n   96 |                     } else if x == y {\n   97 |                         return Err(InvalidStringList::StringListNotUnique(\n   98 |                             #[cfg(feature = \"alloc\")]\n   99 |                             x.to_string(),\n  100 |                         ));\n  101 |                     } else if x > y {\n  102 |                         return Err(InvalidStringList::StringListNotSorted(\n  103 |                             #[cfg(feature = \"alloc\")]\n  104 |                             x.to_string(),\n  105 |                             #[cfg(feature = \"alloc\")]\n  106 |                             y.to_string(),\n  107 |                         ));\n  108 |                     }\n  109 | \n  110 |                     // Next window begins. Update `x` here, `y` will be updated in next loop iteration.\n  111 |                     x = y;\n  112 |                 }\n  113 |             }","lines":32}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"CompileError::explain computes the line/column of a parse error by iterating source.lines() and subtracting `line.len() + 1` per skipped line, attributing exactly one byte (`\\n`) to each line break. But str::lines() also strips a trailing `\\r`, so for CRLF (or lone-CR) line endings the byte accounting is off by one per such line: the reported column (and potentially the chosen snippet) is wrong. Verified with a standalone reproduction: source \"abc\\r\\ndef;\" with the real error byte-offset of 'f' (7) reports column 3 instead of 2, and longer CRLF inputs accumulate the error. This only affects the human-readable error location surfaced at compile/datagen time (the error itself is still returned correctly), so functional impact is cosmetic. Note also that the same closure does `col_number -= line.len()` unguarded; if an offset ever fell on a non-char-boundary it would underflow and panic, but parser-produced offsets are always char-start boundaries so that path is not reachable from the current code.","fix":"Account for the stripped line terminator length instead of hard-coding 1. Either iterate over byte ranges using split_inclusive('\\n') / source.match_indices('\\n') and compute the line containing `offset` directly, or track consumed bytes as `consumed += line.len() + terminator_len` where terminator_len is derived from the original source (1 for \\n, 2 for \\r\\n). Also guard the subtraction (use checked_sub) to avoid a potential underflow panic on unexpected offsets.","locations":[{"ref":"components/experimental/src/transliterate/compile/mod.rs:561-576","code":"  561 |             if let Some(snippet) = source\n  562 |                 .lines()\n  563 |                 .filter_map(|line| {\n  564 |                     if let Some(snippet) = line.get(col_number..) {\n  565 |                         Some(snippet)\n  566 |                     } else {\n  567 |                         col_number -= line.len();\n  568 |                         col_number -= 1; // \\n\n  569 |                         line_number += 1;\n  570 |                         None\n  571 |                     }\n  572 |                 })\n  573 |                 .next()\n  574 |             {\n  575 |                 e.with_display_context(&format!(\"at {line_number}:{col_number} '{snippet}'\"));\n  576 |             }","lines":16}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In the `no_std` (not `alloc`) build, `ShortBoxSlice::remove` ignores the `index` argument for the two-element `Two` case: `Two([f, s]) => (ZeroOne(Some(f)), s)` always removes and returns the second element `s` and keeps the first `f`, regardless of `index`. Calling `remove(0)` should return `f` and keep `s`. This corrupts results for `Value::remove_subtag` and `Variants::remove` when built without the `alloc` feature (the `alloc` path correctly uses `Vec::remove(index)`).","fix":"Handle the index in the Two case, e.g. `Two([f, s]) => if index == 0 { (ZeroOne(Some(s)), f) } else { (ZeroOne(Some(f)), s) }`.","locations":[{"ref":"components/locale_core/src/shortvec/mod.rs:223-224","code":"  223 |             #[cfg(not(feature = \"alloc\"))]\n  224 |             Two([f, s]) => (ZeroOne(Some(f)), s),","lines":2}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"DoublePlaceholder::validate_store never bounds the first placeholder's offset against the store length when there is only one placeholder. Line 329 bounds only ph_second.offset, and line 326 (`ph_first.offset > ph_second.offset && ph_second.offset > 0`) only fires when a second placeholder is present. So for a single-placeholder double store an arbitrarily large ph_first.offset passes validation. This is not memory-unsafe (DoublePlaceholderPatternIterator::next uses store.get(..), falling back to \"\" with a debug_assert), but it means validate_store accepts stores that produce silently-wrong interpolation (placeholder/literals dropped), which the function is meant to reject. Compare the encoder (try_from_items, double.rs:383-390) which always derives the offset from result.len(), guaranteeing it is in range.","fix":"Also validate ph_first.offset against the store length, e.g. add `if ph_first.offset > store.len() - initial_offset + 1 { return Err(Error::InvalidPattern); }` (mirroring the existing ph_second check), so a single-placeholder store with an out-of-range first offset is rejected.","locations":[{"ref":"components/pattern/src/double.rs:326-331","code":"  326 |         if ph_first.offset > ph_second.offset && ph_second.offset > 0 {\n  327 |             return Err(Error::InvalidPattern);\n  328 |         }\n  329 |         if ph_second.offset > store.len() - initial_offset + 1 {\n  330 |             return Err(Error::InvalidPattern);\n  331 |         }","lines":6}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"DoublePlaceholder::validate_store checks the raw second-placeholder *char value* against 0xD800 instead of the decoded *offset*, so it disagrees with the encoder (try_from_items). In the encoding, the char stored for the second placeholder is `(offset << 1) | key`. try_from_items (double.rs:384) rejects when `offset >= 0xD800`, allowing char values up to ~0x1B000. But validate_store (double.rs:332) rejects when the *char* value `>= 0xD800`, i.e. when `offset >= ~0x6C00`. Consequence: a DoublePlaceholder pattern whose second placeholder lies at byte offset roughly 0x7000 (about 28 KB into the pattern) is constructed successfully by try_from_str/try_from_items and serializes fine, but FAILS to deserialize because validate_store rejects it (used on untrusted input via the serde non-human-readable Deserialize impls and the zerovec VarULE::validate_bytes). In debug builds the debug_assert in try_from_str also fires. Verified by constructing a pattern with a 0x7000-byte prefix: try_from_str produces store char 0xE007 for the second placeholder, and validate_store then returns InvalidPattern. The SinglePlaceholder backend does not have this bug because it does not bit-shift the offset, so its validate_store and encoder both compare the same quantity (single.rs:223 vs single.rs:262).","fix":"Compare the decoded offset, not the char value: replace `if (ph_second_char as usize) >= 0xD800` with `if ph_second.offset >= 0xD800` so validate_store matches the bound enforced by try_from_items. (ph_second.offset is already computed at line 322.)","locations":[{"ref":"components/pattern/src/double.rs:332","code":"  332 |         if (ph_second_char as usize) >= 0xD800 {","lines":1},{"ref":"components/pattern/src/double.rs:384","code":"  384 |                     if placeholder_offset >= 0xD800 {","lines":1}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In get_language(), the Lao code-point range is written as an exclusive range `0x0E8C..0x0EA3`, while every other range in the same match arm (and the entire function) uses inclusive `..=`. This excludes U+0EA3 (LAO LETTER LO LING, ຣ), an assigned Lao consonant with Line_Break=SA. As a result U+0EA3 is classified as Language::Unknown instead of Language::Lao, so when it appears in complex (SA) text the dictionary/LSTM model is not selected for that span and the run is emitted as a single unsegmented chunk (select(Unknown) returns None -> result.push(whole slice)), degrading Lao word/line segmentation quality around that character. The lone exclusive `..` among many `..=` ranges strongly indicates an off-by-one typo; it should be `0x0E8C..=0x0EA3`.","fix":"Change `0x0E8C..0x0EA3` to `0x0E8C..=0x0EA3` so U+0EA3 is included in the Lao range (matching the inclusive convention used by all other ranges).","locations":[{"ref":"components/segmenter/src/complex/language.rs:21-31","code":"   21 |         0x0E81\n   22 |         | 0x0E82\n   23 |         | 0x0E84\n   24 |         | 0x0E86..=0x0E8A\n   25 |         | 0x0E8C..0x0EA3\n   26 |         | 0x0EA5\n   27 |         | 0x0EA7..=0x0EBD\n   28 |         | 0x0EC0..=0x0EC4\n   29 |         | 0x0EC6\n   30 |         | 0x0EC8..=0x0ECE\n   31 |         | 0x0EDC..=0x0EDF => Language::Lao,","lines":11}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Supplemental::unit_matches_any` decides whether a unit belongs to a region/category set using a plain substring test `u.contains(target_unit)`. The comment justifies this for compound/mixed units (e.g. \"foot\" inside \"foot-and-inch\"), but a bare substring match also produces false positives across distinct unit names that share a suffix without a separator, e.g. `\"kilometer\".contains(\"meter\")` is true, so \"meter\" would be classified as Core/Extended whenever \"kilometer\" is present even if \"meter\" itself is not listed. This only affects the Core/Extended/Outlier categorization of unit display-name data at datagen time (all names are still emitted), so impact is limited.","fix":"Match on whole hyphen-separated subunit tokens rather than raw substring, e.g. split `u` on '-' (and \"-and-\") and compare each component to `target_unit`, or require the match to be bounded by '-' or string ends.","locations":[{"ref":"provider/source/src/units/helpers.rs:514-516","code":"  514 |     fn unit_matches_any(target_unit: &str, units: &HashSet<String>) -> bool {\n  515 |         units.iter().any(|u| u.contains(target_unit))\n  516 |     }","lines":3},{"ref":"provider/source/src/units/helpers.rs:559-586","code":"  559 |     pub(crate) fn unit_type(\n  560 |         category: &str,\n  561 |         unit: &str,\n  562 |         region: &str,\n  563 |         categorized_units_list: &CategorizedUnitsList,\n  564 |     ) -> UnitType {\n  565 |         let region_units = match categorized_units_list.get(category) {\n  566 |             Some(units) => units,\n  567 |             None => return UnitType::Outlier,\n  568 |         };\n  569 | \n  570 |         let found_in_region = region_units\n  571 |             .get(region)\n  572 |
