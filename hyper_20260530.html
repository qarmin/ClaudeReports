command: 'editor:copy',\n   29 |       accelerator: commandKeys['editor:copy'],\n   30 |       registerAccelerator: true\n   31 |     } as any,"}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"filterCutCopy is used as an Array.filter callback but returns the menuItem object or undefined instead of a boolean. Array.prototype.filter coerces the return to boolean, so for cut/copy items with no selection it returns undefined (falsy, filtered out) and otherwise returns a truthy object (kept) — it happens to work, but relying on truthiness of returned objects is fragile and the menuItem.role! non-null assertion will throw at runtime if a menu item has no role (regex .test on undefined).","fix":"Return an explicit boolean and guard role: return !(menuItem.role && /^(cut|copy)$/.test(menuItem.role)) || Boolean(selection); and avoid the non-null assertion on role.","locations":[{"ref":"app/ui/contextmenu.ts:18-24","code":"   18 | // only display cut/copy when there's a cursor selection\n   19 | const filterCutCopy = (selection: string, menuItem: MenuItemConstructorOptions) => {\n   20 |   if (/^cut$|^copy$/.test(menuItem.role!) && !selection) {\n   21 |     return;\n   22 |   }\n   23 |   return menuItem;\n   24 | };"}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"addBinToUserPath opens the Environment registry key with ALL_ACCESS but on the early reject paths (registry key type unsupported) it returns without calling Registry.closeKey(envKey), leaking the open registry handle. Only the success and 'already in PATH' paths close it.","fix":"Close envKey before every reject/return (e.g. in a finally block) to avoid leaking the native registry handle.","locations":[{"ref":"app/utils/cli-install.ts:94-99","code":"   94 |       if (pathItem) {\n   95 |         type = Registry.queryValueRaw(envKey, pathItem)!.type;\n   96 |         if (type !== Registry.ValueType.SZ && type !== Registry.ValueType.EXPAND_SZ) {\n   97 |           reject(`Registry key type is ${type}`);\n   98 |           return;\n   99 |         }"}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"system-context-menu add() relies on Registry.openKey(...) || Registry.createKey(...). If openKey returns null (key absent) createKey runs, fine; but ALL_ACCESS openKey can also throw for permission reasons, and any throw aborts the whole regKey iteration via the outer catch, silently skipping remaining keys. Also hyperKey/commandKey are closed only on the success path; if addValues throws, closeKey is skipped, leaking handles.","fix":"Wrap key usage in try/finally to always closeKey, and handle openKey throwing separately from createKey.","locations":[{"ref":"app/utils/system-context-menu.ts:34-49","code":"   34 | export const add = () => {\n   35 |   regKeys.forEach((regKey) => {\n   36 |     try {\n   37 |       const hyperKey =\n   38 |         Registry.openKey(Registry.HKCU, regKey, Registry.Access.ALL_ACCESS) ||\n   39 |         Registry.createKey(Registry.HKCU, regKey, Registry.Access.ALL_ACCESS);\n   40 |       const commandKey =\n   41 |         Registry.openKey(Registry.HKCU, `${regKey}\\\\${regParts[0].key}`, Registry.Access.ALL_ACCESS) ||\n   42 |         Registry.createKey(Registry.HKCU, `${regKey}\\\\${regParts[0].key}`, Registry.Access.ALL_ACCESS);\n   43 |       addValues(hyperKey, commandKey);\n   44 |       Registry.closeKey(hyperKey);\n   45 |       Registry.closeKey(commandKey);\n   46 |     } catch (error) {\n   47 |       console.error(error);\n   48 |     }\n   49 |   });"}]},{"id":"API_12","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"useEffect dependency array uses `inputRef.current` (a mutable ref value). React does not re-run effects when a ref's `.current` changes, and refs are explicitly discouraged in dependency arrays. The intent (focus the input on mount) is achieved only incidentally; the dependency is misleading and lint-flagged.","fix":"Use an empty dependency array `[]` to focus once on mount, or attach focus via the ref callback.","locations":[{"ref":"lib/components/searchBox.tsx:121-123","code":"  121 |   useEffect(() => {\n  122 |     inputRef.current?.focus();\n  123 |   }, [inputRef.current]);"}]},{"id":"API_13","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"loadModules iterates ObjectTypedKeys(mod) and assigns mod[i]._pluginName/_pluginVersion on every exported value without checking the value is a non-null object/function. If a plugin exports a primitive (e.g. a string or number) at top level, assigning a property to it is a no-op in sloppy mode but throws in strict mode (modules are strict), aborting plugin load with an uncaught error.","fix":"Skip non-object/function exports: if (mod[i] && (typeof mod[i] === 'object' || typeof mod[i] === 'function')) before assigning metadata.","locations":[{"ref":"lib/utils/plugins.ts:291-296","code":"  291 |       ObjectTypedKeys(mod).forEach((i) => {\n  292 |         if (Object.hasOwnProperty.call(mod, i)) {\n  293 |           mod[i]._pluginName = pluginName;\n  294 |           mod[i]._pluginVersion = pluginVersion;\n  295 |         }\n  296 |       });"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"Term's render creates three new inline arrow functions (toggleCaseSensitive/toggleWholeWord/toggleRegex) and passes them to SearchBox on every render. Combined with SearchBox being a decorated/forwardRef component, this defeats any memoization and causes SearchBox subtree to re-render whenever Term re-renders while search is open.","fix":"Define the toggle handlers as stable class methods (bound once) instead of inline arrows in render.","locations":[{"ref":"lib/components/term.tsx:528-545","code":"  528 |             toggleCaseSensitive={() =>\n  529 |               this.setState({\n  530 |                 ...this.state,\n  531 |                 searchOptions: {...this.state.searchOptions, caseSensitive: !this.state.searchOptions.caseSensitive}\n  532 |               })\n  533 |             }\n  534 |             toggleWholeWord={() =>\n  535 |               this.setState({\n  536 |                 ...this.state,\n  537 |                 searchOptions: {...this.state.searchOptions, wholeWord: !this.state.searchOptions.wholeWord}\n  538 |               })\n  539 |             }\n  540 |             toggleRegex={() =>\n  541 |               this.setState({\n  542 |                 ...this.state,\n  543 |                 searchOptions: {...this.state.searchOptions, regex: !this.state.searchOptions.regex}\n  544 |               })\n  545 |             }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"getId(plugins) serializes the entire plugins config via JSON.stringify on every config.subscribe firing (not just plugin changes) to compare ids, and updatePlugins/getPluginVersions also re-JSON.stringify. For frequent config updates this is wasteful, though plugin lists are small.","fix":"Short-circuit the comparison earlier or cache the serialized form keyed by reference identity.","locations":[{"ref":"app/plugins.ts:41-43","code":"   41 | function getId(plugins_: any) {\n   42 |   return JSON.stringify(plugins_);\n   43 | }"},{"ref":"app/plugins.ts:49-59","code":"   49 | config.subscribe(() => {\n   50 |   const plugins_ = config.getPlugins();\n   51 |   if (plugins !== plugins_) {\n   52 |     const id_ = getId(plugins_);\n   53 |     if (id !== id_) {\n   54 |       id = id_;\n   55 |       plugins = plugins_;\n   56 |       updatePlugins();\n   57 |     }\n   58 |   }\n   59 | });"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"getRootGroups is a reselect memoized selector keyed only on termGroups.termGroups, but moveTo (ui actions) bypasses it and recomputes the same root-group filter inline via Object.keys(...).map(...).filter(...), and findNextSessionUid/getGroupUids call getRootGroups with a freshly constructed wrapper object {termGroups: state} that defeats reselect's reference-equality memoization in some call sites. The root-group list is recomputed redundantly on hot paths (pane/tab navigation).","fix":"Reuse getRootGroups(state) consistently for the last-tab computation in moveTo, and pass the real state object so reselect can memoize across calls.","locations":[{"ref":"lib/actions/ui.ts:206-215","code":"  206 | export function moveTo(i: number | 'last') {\n  207 |   return (dispatch: HyperDispatch, getState: () => HyperState) => {\n  208 |     if (i === 'last') {\n  209 |       // Finding last tab index\n  210 |       const {termGroups} = getState().termGroups;\n  211 |       i =\n  212 |         Object.keys(termGroups)\n  213 |           .map((uid) => termGroups[uid])\n  214 |           .filter(({parentUid}) => !parentUid).length - 1;\n  215 |     }"},{"ref":"lib/actions/term-groups.ts:104-106","code":"  104 |     const rootGroups = getRootGroups({termGroups: state});\n  105 |     const nextGroup = findPrevious(rootGroups, group);\n  106 |     return findFirstSession(state, nextGroup);"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"split-pane computes a fresh fallback sizes array `new Array(children.length).fill(...)` on every render even when props.sizes is usually present, and getSizes is also called repeatedly during drag. Minor allocation churn on a hot drag path.","fix":"Only allocate the fallback when props.sizes is absent (it already short-circuits via `||`, but the fill runs eagerly); acceptable but could be memoized with useMemo keyed on children.length and sizes.","locations":[{"ref":"lib/components/split-pane.tsx:94","code":"   94 |   const sizes = props.sizes || new Array<number>(children.length).fill(1 / children.length);"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"renderTerm creates a new `onTermRef` arrow is fine (bound method), but the comment acknowledges `ref_={this.onTermRef}` is passed as a method while every other handler is memoized via this.bind. The actual perf concern: getTermProps builds a large fresh props object every render and several inline functions/arrays are recreated; documented by the inline comment but left unaddressed.","fix":"Memoize the ref_ callback per-uid like the other handlers via this.bind, to avoid Term receiving a changing ref_ each render.","locations":[{"ref":"lib/components/term-group.tsx:116-119","code":"  116 |     // This will create a new ref_ function for every render,\n  117 |     // which is inefficient. Should maybe do something similar\n  118 |     // to this.bind.\n  119 |     return <Term ref_={this.onTermRef} key={uid} {...props} />;"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"On every config change, the subscribe callback calls config.getConfig() (which runs plugins.getDecoratedConfig via the synchronous @electron/remote bridge) up to three times: once for configInfo, and twice more in the bellSoundURL comparison. getDecoratedConfig is comparatively expensive and the remote round-trip is synchronous on the renderer's main thread.","fix":"Call config.getConfig() once and reuse the result for the comparison and dispatch.","locations":[{"ref":"lib/index.tsx:56-68","code":"   56 | config.subscribe(() => {\n   57 |   const configInfo = config.getConfig();\n   58 |   configInfo.bellSound = store_.getState().ui.bellSound;\n   59 |   // The only async part of the config is the bellSound so we will check if the bellSoundURL\n   60 |   // has changed to determine if we should re-read this file and dispatch an update to the config\n   61 |   if (store_.getState().ui.bellSoundURL !== config.getConfig().bellSoundURL) {\n   62 |     fetchFileData(configInfo);\n   63 |   } else {\n   64 |     // No change in the bellSoundURL so continue with a normal reloadConfig, reusing the value\n   65 |     // we already have for `bellSound`\n   66 |     store_.dispatch(reloadConfig(configInfo));\n   67 |   }\n   68 | });"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"negligible","description":"createMenu calls getConfig() three times in quick succession: once stored in `config`, then again twice inline (getConfig().profiles in the menu array and via showAbout closures). getConfig() recomputes the merged profile config (getProfileConfig spreads and deep-merges objects) on every call. The already-computed `config` local should be reused.","fix":"Reuse the `config` local: `shellMenu(commandKeys, execCommand, config.profiles.map((p) => p.name))`.","locations":[{"ref":"app/menus/menu.ts:29-69","code":"   29 |   const config = getConfig();\n   30 |   // We take only first shortcut in array for each command\n   31 |   const allCommandKeys = getDecoratedKeymaps();\n   32 |   const commandKeys = Object.keys(allCommandKeys).reduce((result: Record<string, string>, command) => {\n   33 |     result[command] = allCommandKeys[command][0];\n   34 |     return result;\n   35 |   }, {});\n   36 | \n   37 |   let updateChannel = 'stable';\n   38 | \n   39 |   if (config?.updateChannel && config.updateChannel === 'canary') {\n   40 |     updateChannel = 'canary';\n   41 |   }\n   42 | \n   43 |   const showAbout = () => {\n   44 |     const loadedPlugins = getLoadedPluginVersions();\n   45 |     const pluginList =\n   46 |       loadedPlugins.length === 0 ? 'none' : loadedPlugins.map((plugin) => `\\n  ${plugin.name} (${plugin.version})`);\n   47 | \n   48 |     const rendererCounts = Object.values(getRendererTypes()).reduce((acc: Record<string, number>, type) => {\n   49 |       acc[type] = acc[type] ? acc[type] + 1 : 1;\n   50 |       return acc;\n   51 |     }, {});\n   52 |     const renderers = Object.entries(rendererCounts)\n   53 |       .map(([type, count]) => type + (count > 1 ? ` (${count})` : ''))\n   54 |       .join(', ');\n   55 | \n   56 |     void dialog.showMessageBox({\n   57 |       title: `About ${appName}`,\n   58 |       message: `${appName} ${appVersion} (${updateChannel})`,\n   59 |       detail: `Renderers: ${renderers}\\nPlugins: ${pluginList}\\n\\nCreated by Guillermo Rauch\\nCopyright © 2022 Vercel, Inc.`,\n   60 |       buttons: [],\n   61 |       icon: icon as any\n   62 |     });\n   63 |   };\n   64 |   const menu = [\n   65 |     ...(process.platform === 'darwin' ? [darwinMenu(commandKeys, execCommand, showAbout)] : []),\n   66 |     shellMenu(\n   67 |       commandKeys,\n   68 |       execCommand,\n   69 |       getConfig().profiles.map((p) => p.name)"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","description":"positionIsValid calls electron.screen.getAllDisplays() on every invocation and iterates all displays; fine for occasional calls but if invoked per window-move event it re-queries displays repeatedly. Minor.","fix":"If called frequently, cache displays and refresh on the screen 'display-*' events.","locations":[{"ref":"app/utils/window-utils.ts:3-10","code":"    3 | export function positionIsValid(position: [number, number]) {\n    4 |   const displays = electron.screen.getAllDisplays();\n    5 |   const [x, y] = position;\n    6 | \n    7 |   return displays.some(({workArea}) => {\n    8 |     return x >= workArea.x && x <= workArea.x + workArea.width && y >= workArea.y && y <= workArea.y + workArea.height;\n    9 |   });\n   10 | }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"Object.assign(classOpts) is called with a single argument, so it just returns the {uid} object unchanged; the Object.assign wrapper is pointless. Separately, window.uid = classOpts.uid is assigned twice (lines 64 and 67) around app.plugins.onWindowClass — the second assignment is redundant unless onWindowClass is expected to mutate uid, which is not documented.","fix":"Use const classOpts = {uid: uuidv4()} directly, and remove the duplicate window.uid assignment (or add a comment explaining why re-assignment after onWindowClass is needed).","locations":[{"ref":"app/ui/window.ts:35-35","code":"   35 |   const classOpts = Object.assign({uid: uuidv4()});"},{"ref":"app/ui/window.ts:64-67","code":"   64 |   window.uid = classOpts.uid;\n   65 | \n   66 |   app.plugins.onWindowClass(window);\n   67 |   window.uid = classOpts.uid;"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"helpMenu and toolsMenu declare their first parameter as `commands`/unused command map but reference it only partially (toolsMenu uses commands for one accelerator, helpMenu never uses its `commands` parameter at all). helpMenu's `commands` parameter is dead.","fix":"Remove the unused `commands` parameter from helpMenu (and update its single caller in menu.ts), or use it for the menu accelerators.","locations":[{"ref":"app/menus/menus/help.ts:11","code":"   11 | const helpMenu = (commands: Record<string, string>, showAbout: () => void): MenuItemConstructorOptions => {"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"buildFeedUrl always uses 'deb' for Linux regardless of actual package format (AppImage, rpm, snap). For non-deb Linux installs the feed URL is wrong; combined with the Linux auto-updater being a custom fetch-based implementation, this may point updates at the wrong artifact path.","fix":"Detect the actual Linux package format or document that only deb is supported for updates.","locations":[{"ref":"app/updater.ts:40-44","code":"   40 | const buildFeedUrl = (canary: boolean, currentVersion: string) => {\n   41 |   const updatePrefix = canary ? 'releases-canary' : 'releases';\n   42 |   const archSuffix = process.arch === 'arm64' || app.runningUnderARM64Translation ? '_arm64' : '';\n   43 |   return `https://${updatePrefix}.hyper.is/update/${isLinux ? 'deb' : platform}${archSuffix}/${currentVersion}`;\n   44 | };"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"execSync, execFileSync, spawn, spawnSync and fork are exported stubs that only console.error and return undefined. They are wired into the IPCChildProcess object used as a child_process replacement on darwin, but a plugin calling e.g. spawn() gets undefined back (no thrown error, no ChildProcess), which will cause downstream .stdout/.on access to crash with an opaque error rather than a clear 'not supported' failure.","fix":"Throw an explicit Error('spawn is not supported in the renderer') from these stubs so misuse fails fast with a clear message.","locations":[{"ref":"lib/utils/ipc-child-process.ts:16-50","code":"   16 | export function execSync() {\n   17 |   console.error('Calling execSync from renderer is disabled');\n   18 | }\n   19 | \n   20 | export function execFile(file: string, args: string[], options: ExecFileOptions, callback: (..._args: any) => void) {\n   21 |   if (typeof options === 'function') {\n   22 |     callback = options;\n   23 |     options = {};\n   24 |   }\n   25 |   if (typeof args === 'function') {\n   26 |     callback = args;\n   27 |     args = [];\n   28 |     options = {};\n   29 |   }\n   30 |   ipcRenderer.invoke('child_process.execFile', file, args, options).then(\n   31 |     ({stdout, stderr}) => callback?.(null, stdout, stderr),\n   32 |     (error) => callback?.(error, '', '')\n   33 |   );\n   34 | }\n   35 | \n   36 | export function execFileSync() {\n   37 |   console.error('Calling execFileSync from renderer is disabled');\n   38 | }\n   39 | \n   40 | export function spawn() {\n   41 |   console.error('Calling spawn from renderer is disabled');\n   42 | }\n   43 | \n   44 | export function spawnSync() {\n   45 |   console.error('Calling spawnSync from renderer is disabled');\n   46 | }\n   47 | \n   48 | export function fork() {\n   49 |   console.error('Calling fork from renderer is disabled');\n   50 | }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment says 'This mimics shell.openItem' but shell.openItem was removed from Electron long ago; the code uses shell.openPath. The comment references a non-existent API and is misleading.","fix":"Update the comment to reference shell.openPath (or remove the stale reference).","locations":[{"ref":"app/config/open.ts:55-56","code":"   55 | // This mimics shell.openItem, true if it worked, false if not.\n   56 | const openNotepad = (file: string) =>"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment in rpc.ts destroy() says 'mark for `genUid` in constructor' but there is no genUid function anywhere; the constructor uses uuidv4 directly and the destroyed flag is never read meaningfully (see dead-code finding). The comment is misleading.","fix":"Remove or correct the comment to reflect actual behavior.","locations":[{"ref":"app/rpc.ts:72-74","code":"   72 |     } else {\n   73 |       // mark for `genUid` in constructor\n   74 |       this.destroyed = true;"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment claims xterm rendering is paused via IntersectionObserver when the term group is moved offscreen with `left: -9999em`. There is no IntersectionObserver in this codebase path; xterm uses its own renderer and offscreen positioning does not guarantee paused rendering. The comment is misleading.","fix":"Correct or remove the comment to reflect the actual mechanism (offscreen positioning), and verify whether rendering is actually paused.","locations":[{"ref":"lib/components/terms.tsx:188-190","code":"  188 |             top: 0;\n  189 |             left: -9999em; /* Offscreen to pause xterm rendering, thanks to IntersectionObserver */\n  190 |           }"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment on SESSION_PTY_DATA in the sessions reducer says 'we avoid a direct merge for perf reasons as this is the most common action', but the branch in fact performs state.merge(..., {deep: true}) whenever the session was cleared. The comment describes the common (non-cleared) fast path that returns state unchanged, but is positioned as if it applies to the whole case including the merge, which is misleading.","fix":"Clarify the comment to state that the fast path (no merge) is taken for the common non-cleared case, and the deep merge only runs once to clear the 'cleared' flag.","locations":[{"ref":"lib/reducers/sessions.ts:79-94","code":"   79 |     case SESSION_PTY_DATA:\n   80 |       // we avoid a direct merge for perf reasons\n   81 |       // as this is the most common action\n   82 |       if (state.sessions[action.uid]?.cleared) {\n   83 |         return state.merge(\n   84 |           {\n   85 |             sessions: {\n   86 |               [action.uid]: {\n   87 |                 cleared: false\n   88 |               }\n   89 |             }\n   90 |           },\n   91 |           {deep: true}\n   92 |         );\n   93 |       }\n   94 |       return state;"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The commented-out line `// window.profileName = profileName;` is left in the init handler, and profileName is received but unused (eslint-disabled). config.ts instead defines profileName as a read-only getter backed by getCurrentWindow().profileName, so this dead assignment comment is misleading about how profileName is wired.","fix":"Remove the dead comment and the unused profileName parameter (or document that profileName now comes from the window object via config.ts).","locations":[{"ref":"lib/utils/rpc.ts:32-37","code":"   32 |       this.ipc.on('init', (ev: IpcRendererEvent, uid: string, profileName: string) => {\n   33 |         // we cache so that if the object\n   34 |         // gets re-instantiated we don't\n   35 |         // wait for a `init` event\n   36 |         window.__rpcId = uid;\n   37 |         // window.profileName = profileName;"}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"medium","description":"The thunk middleware is applied twice in the middleware chain: applyMiddleware(thunk, plugins.middleware, thunk, writeMiddleware, effects). redux-thunk only needs to be present once; the second instance is dead/redundant and any thunk dispatched by plugins.middleware would already be handled by the first thunk. This duplication appears in both prod and dev store config and is almost certainly a copy/paste mistake.","fix":"Remove the second 'thunk' argument from applyMiddleware in both files: applyMiddleware(thunk, plugins.middleware, writeMiddleware, effects).","locations":[{"ref":"lib/store/configure-store.prod.ts:15","code":"   15 |   createStore(rootReducer, applyMiddleware(thunk, plugins.middleware, thunk, writeMiddleware, effects));"},{"ref":"lib/store/configure-store.dev.ts:16","code":"   16 |   const enhancer = composeWithDevTools(applyMiddleware(thunk, plugins.middleware, thunk, writeMiddleware, effects));"}]},{"id":"DUPLIC_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"rpc.on('new') sets the session into the sessions map a second time (sessions.set(options.uid, session)) even though createSession already did sessions.set(uid, session) with the same uid (options.uid === uid). The redundant set is dead/confusing.","fix":"Remove the duplicate sessions.set(options.uid, session) call in the 'new' handler since createSession already registers the session.","locations":[{"ref":"app/ui/window.ts:178-185","code":"  178 |     sessions.set(uid, session);\n  179 |     return {session, options};\n  180 |   }\n  181 | \n  182 |   rpc.on('new', (extraOptions) => {\n  183 |     const {session, options} = createSession(extraOptions);\n  184 | \n  185 |     sessions.set(options.uid, session);"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","description":"_extract runs arbitrary user config JS via vm.runInNewContext with no timeout option. A config (or migrated legacy .hyper.js) containing an infinite loop or heavy computation will hang the main process indefinitely during startup/reload. vm contexts are not a security boundary either, but the missing timeout is the practical hang risk.","fix":"Pass a timeout (and breakOnSigint) to runInNewContext, e.g. script.runInNewContext({module}, {displayErrors: true, timeout: 5000}), and surface failures via notify().","locations":[{"ref":"app/config/init.ts:9-17","code":"    9 | const _extract = (script?: vm.Script): Record<string, any> => {\n   10 |   const module: Record<string, any> = {};\n   11 |   script?.runInNewContext({module}, {displayErrors: true});\n   12 |   if (!module.exports) {\n   13 |     throw new Error('Error reading configuration: `module.exports` not set');\n   14 |   }\n   15 |   // eslint-disable-next-line @typescript-eslint/no-unsafe-return\n   16 |   return module.exports;\n   17 | };"}]},{"id":"SECURI_1","type":"security","type_label":"Security","severity":"high","description":"ipcMain.handle('child_process.exec') runs arbitrary command strings from the renderer through promisify(exec), and 'child_process.execFile' runs arbitrary files/args. exec invokes a shell, so any renderer/plugin (or compromised web content) with access to these channels can execute arbitrary shell commands on the host. No validation, allowlist, or sender check is performed.","fix":"Validate event.senderFrame, restrict to trusted senders, and avoid exposing a generic shell-exec channel; provide narrow, validated operations instead.","locations":[{"ref":"app/plugins.ts:467-473","code":"  467 | ipcMain.handle('child_process.exec', (event, command, options) => {\n  468 |   return promisify(exec)(command, options);\n  469 | });\n  470 | \n  471 | ipcMain.handle('child_process.execFile', (event, file, args, options) => {\n  472 |   return promisify(execFile)(file, args, options);\n  473 | });"}]},{"id":"SECURI_2","type":"security","type_label":"Security","severity":"medium","description":"openNotepad builds a shell command by string interpolation: `start notepad.exe ${file}`. The path is unquoted, so any config path containing spaces (very common on Windows, e.g. 'C:\\Users\\First Last\\AppData') breaks the command, and any shell metacharacters in the path would be interpreted by cmd.exe. This is a command-injection / robustness bug.","fix":"Quote and escape the path, or better use execFile('cmd', ['/c', 'start', 'notepad.exe', file]) / spawn with an argument array so the path is passed verbatim rather than parsed by the shell.","locations":[{"ref":"app/config/open.ts:56-61","code":"   56 | const openNotepad = (file: string) =>\n   57 |   new Promise<boolean>((resolve) => {\n   58 |     exec(`start notepad.exe ${file}`, (error) => {\n   59 |       resolve(!error);\n   60 |     });\n   61 |   });"}]},{"id":"SECURI_3","type":"security","type_label":"Security","severity":"low","description":"On win32, processClipboard reads the 'FileNameW' clipboard format and immediately calls .replace on it. clipboard.read returns '' when the format is absent, so .replace is safe, but the returned raw file path is later interpolated into a shell paste with no quoting/escaping (unlike darwin which wraps each path in single quotes). A path containing spaces or shell metacharacters pasted into a terminal can be split or interpreted, a paste-injection footgun.","fix":"Quote/escape the Windows path before returning it, mirroring the darwin single-quote wrapping, and account for multiple newline-separated paths.","locations":[{"ref":"lib/utils/paste.ts:16-19","code":"   16 |     case 'win32': {\n   17 |       const filepath = clipboard.read('FileNameW');\n   18 |       return filepath.replace(new RegExp(String.fromCharCode(0), 'g'), '');\n   19 |     }"}]}]</script>
<div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-05-30 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
