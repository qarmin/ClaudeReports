<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","description":"getDefaultProfile() reads cfg.config.profiles[0]?.name. If the user's config is missing the top-level `config` key, _init() can return `{} as configOptions` (init.ts:52) which has no `profiles` array; accessing `.profiles[0]` then throws 'Cannot read properties of undefined'. The optional chaining is on [0], not on profiles itself, so it does not guard the undefined-array case.","fix":"Guard the array access: `cfg.config.defaultProfile || cfg.config.profiles?.[0]?.name || 'default'`.","locations":[{"ref":"app/config.ts:84-86","code":"   84 | export const getDefaultProfile = () => {\n   85 |   return cfg.config.defaultProfile || cfg.config.profiles[0]?.name || 'default';\n   86 | };"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"getProfileConfig() destructures `profiles` from cfg.config and immediately calls `profiles.find(...)`. If cfg.config lacks a `profiles` array (e.g. the `{} as configOptions` fallback from _init when both user and default config are missing the `config` key), this throws a TypeError. getConfig()/getProfileConfig is called widely (menus, plugins), so this can crash startup.","fix":"Default the destructured value: `const {profiles = [], defaultProfile, ...baseConfig} = cfg.config;` and return safe defaults when empty.","locations":[{"ref":"app/config.ts:97-99","code":"   97 | export const getProfileConfig = (profileName: string): configOptions => {\n   98 |   const {profiles, defaultProfile, ...baseConfig} = cfg.config;\n   99 |   const profileConfig = profiles.find((p) => p.name === profileName)?.config || {};"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"The ref callback's else branch calls `this.resizeObserver.disconnect()` unconditionally when `component` is null. If the wrapper element is detached before a ResizeObserver was ever created (e.g. an early unmount where onTermWrapperRef(null) runs without a prior non-null call), `this.resizeObserver` is undefined and this throws a TypeError.","fix":"Guard the disconnect: `this.resizeObserver?.disconnect();`.","locations":[{"ref":"lib/components/term.tsx:491-493","code":"  491 |     } else {\n  492 |       this.resizeObserver.disconnect();\n  493 |     }"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"In the contextmenu handler, `this.getActiveTerm()` may return undefined (no active session, or the term ref not yet registered). Destructuring `props: {uid}` from undefined throws a TypeError, crashing the handler on right-click in edge cases.","fix":"Guard for a missing term: `const term = this.getActiveTerm(); if (!term) return; this.props.onContextMenu(term.props.uid, selection);`.","locations":[{"ref":"lib/components/terms.tsx:53-59","code":"   53 |     window.addEventListener('contextmenu', () => {\n   54 |       const selection = window.getSelection()!.toString();\n   55 |       const {\n   56 |         props: {uid}\n   57 |       } = this.getActiveTerm();\n   58 |       this.props.onContextMenu(uid, selection);\n   59 |     });"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","description":"In componentDidUpdate, when a session is removed `this.terms[uid].term.dispose()` is called, but `this.terms[uid]` is only populated for sessions whose Term ref fired. If a session existed in prevProps.sessions but never had a registered term (or was already cleaned), `this.terms[uid]` is undefined and accessing `.term` throws.","fix":"Guard the access: `const t = this.terms[uid]; if (t) { t.term.dispose(); } delete this.terms[uid];`.","locations":[{"ref":"lib/components/terms.tsx:62-69","code":"   62 |   componentDidUpdate(prevProps: TermsProps) {\n   63 |     for (const uid in prevProps.sessions) {\n   64 |       if (!this.props.sessions[uid]) {\n   65 |         this.terms[uid].term.dispose();\n   66 |         delete this.terms[uid];\n   67 |       }\n   68 |     }\n   69 |   }"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"getTabs maps each root group to sessions[activeSessionUid] and unconditionally reads session.title and session.uid. If activeSessions[t.uid] is undefined/stale or the session was removed, sessions[activeSessionUid] is undefined and accessing .title throws a TypeError, crashing the header render selector.","fix":"Guard for a missing session (e.g. const session = sessions[activeSessionUid]; if (!session) skip/return a placeholder) before reading title/uid.","locations":[{"ref":"lib/containers/header.ts:19-28","code":"   19 |     rootGroups.map((t): ITab => {\n   20 |       const activeSessionUid = activeSessions[t.uid];\n   21 |       const session = sessions[activeSessionUid];\n   22 |       return {\n   23 |         uid: t.uid,\n   24 |         title: session.title,\n   25 |         isActive: t.uid === activeRootGroup,\n   26 |         hasActivity: activityMarkers[session.uid]\n   27 |       };\n   28 |     })"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","description":"onDrag divides by `panesSize.current!` and reads `dragPanePosition.current`. If a mousemove arrives without a preceding handleDragStart (panesSize.current is null), the non-null assertion masks a division by null producing NaN sizes propagated to onResize. While guarded in practice by the listener lifecycle, the bug in the listener-removal (separate finding) makes a stale mousemove plausible.","fix":"Bail out early if `panesSize.current == null` before computing `d`.","locations":[{"ref":"lib/components/split-pane.tsx:61-66","code":"   61 |   const onDrag = (ev: MouseEvent) => {\n   62 |     const sizes_ = getSizes();\n   63 | \n   64 |     const i = paneIndex.current;\n   65 |     const pos = ev[d3];\n   66 |     const d = Math.abs(dragPanePosition.current - pos) / panesSize.current!;"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"When notifications.updates is set, ui.updateNotes is force-unwrapped with `ui.updateNotes!.split('\\n')[0]`. If an 'update available' event arrives with null/undefined release notes, .split throws and breaks the notifications container.","fix":"Use (ui.updateNotes ?? '').split('\\n')[0] or guard before splitting.","locations":[{"ref":"lib/containers/notifications.ts:51-59","code":"   51 |   if (notifications.updates) {\n   52 |     state_ = {\n   53 |       ...state_,\n   54 |       updateShowing: true,\n   55 |       updateVersion: ui.updateVersion,\n   56 |       updateNote: ui.updateNotes!.split('\\n')[0],\n   57 |       updateReleaseUrl: ui.updateReleaseUrl,\n   58 |       updateCanInstall: ui.updateCanInstall\n   59 |     };"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","description":"GetWindow() uses {}.hasOwnProperty.call(app, 'createWindow') to decide whether the app is ready. app.createWindow is only assigned inside the async 'ready' handler after installDevExtensions resolves. If open-file/open-url fires before that (or app.createWindow exists but a window is mid-creation), the callback can be dropped: windowCallback is set but there is no code in this file that ever consumes app.windowCallback, so the deferred callback is never invoked.","fix":"Have createWindow (or the ready handler) check for and invoke app.windowCallback once createWindow becomes available, or queue pending callbacks and flush them on ready.","locations":[{"ref":"app/index.ts:220-237","code":"  220 | function GetWindow(callback: (win: BrowserWindow) => void) {\n  221 |   const lastWindow = app.getLastFocusedWindow();\n  222 |   if (lastWindow) {\n  223 |     callback(lastWindow);\n  224 |   } else if (!lastWindow && {}.hasOwnProperty.call(app, 'createWindow')) {\n  225 |     app.createWindow(callback);\n  226 |   } else {\n  227 |     // If createWindow doesn't exist yet ('ready' event was not fired),\n  228 |     // sets his callback to an app.windowCallback property.\n  229 |     app.windowCallback = callback;\n  230 |   }\n  231 | }\n  232 | \n  233 | app.on('open-file', (_event, path) => {\n  234 |   GetWindow((win: BrowserWindow) => {\n  235 |     win.rpc.emit('open file', {path});\n  236 |   });\n  237 | });"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"high","description":"install.ts spawnQueue.start() is called both inside the queue.push callback (line 35, in the execFile completion handler) and immediately after push (line 40), and again the queue is a fresh instance created per install() call. The combination of calling start() before the job is added vs after, plus start() inside the completion callback of a concurrency-1 queue, is redundant/confused; restarting an already-drained queue is a no-op but the design indicates misunderstanding and the per-call queue with concurrency 1 provides no real serialization across concurrent install() invocations.","fix":"Create a single shared queue (or just call execFile directly), and call start() exactly once after pushing the job; remove the start() inside the completion callback.","locations":[{"ref":"app/plugins/install.ts:8-41","code":"    8 | export const install = (fn: (err: string | null) => void) => {\n    9 |   const spawnQueue = queue({concurrency: 1});\n   10 |   function yarnFn(args: string[], cb: (err: string | null) => void) {\n   11 |     const env = {\n   12 |       NODE_ENV: 'production',\n   13 |       ELECTRON_RUN_AS_NODE: 'true'\n   14 |     };\n   15 |     spawnQueue.push((end) => {\n   16 |       const cmd = [process.execPath, yarn].concat(args).join(' ');\n   17 |       console.log('Launching yarn:', cmd);\n   18 | \n   19 |       cp.execFile(\n   20 |         process.execPath,\n   21 |         [yarn].concat(args),\n   22 |         {\n   23 |           cwd: plugs.base,\n   24 |           env,\n   25 |           timeout: ms('5m'),\n   26 |           maxBuffer: 1024 * 1024\n   27 |         },\n   28 |         (err, stdout, stderr) => {\n   29 |           if (err) {\n   30 |             cb(stderr);\n   31 |           } else {\n   32 |             cb(null);\n   33 |           }\n   34 |           end?.();\n   35 |           spawnQueue.start();\n   36 |         }\n   37 |       );\n   38 |     });\n   39 | \n   40 |     spawnQueue.start();\n   41 |   }"}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"args.command callbacks for install/uninstall/search/list-remote assign the async work to the module-global commandPromise, but args.parse() (which triggers these callbacks) is called inside main() AFTER the callbacks may already have run during command registration parsing. More importantly, several callbacks call process.exit() synchronously (list, docs, version) while others set commandPromise; if two matching commands or a default plus subcommand interact, only the last-assigned commandPromise is awaited. The single shared commandPromise cannot represent more than one command and silently drops earlier ones.","fix":"Return/await the promise from the command handler path explicitly rather than relying on a single mutable module global; or assert that only one command can set commandPromise.","locations":[{"ref":"cli/index.ts:20-20","code":"   20 | let commandPromise: Promise<void> | undefined;"},{"ref":"cli/index.ts:203-205","code":"  203 |   if (commandPromise) {\n  204 |     return commandPromise;\n  205 |   }"}]},{"id":"RACE_4","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"ptyExitTermGroup captures termGroups via getState() once at thunk start, then uses that stale snapshot inside the effect() callback which runs later (after the TERM_GROUP_EXIT action has already mutated the store). activeSessions/termGroups read in the effect reflect pre-exit state, so findNextSessionUid and the 'Object.keys(termGroups.termGroups).length > 1' check operate on outdated data, potentially selecting an already-removed group as the next active session.","fix":"Re-read getState() inside effect() (after the reducer has applied the exit) instead of using the snapshot captured before dispatch, or compute the next session before dispatching the exit and pass it explicitly.","locations":[{"ref":"lib/actions/term-groups.ts:114-136","code":"  114 | export function ptyExitTermGroup(sessionUid: string) {\n  115 |   return (dispatch: HyperDispatch, getState: () => HyperState) => {\n  116 |     const {termGroups} = getState();\n  117 |     const group = findBySession(termGroups, sessionUid);\n  118 |     // This might have already been closed:\n  119 |     if (!group) {\n  120 |       return dispatch(ptyExitSession(sessionUid));\n  121 |     }\n  122 | \n  123 |     dispatch({\n  124 |       type: TERM_GROUP_EXIT,\n  125 |       uid: group.uid,\n  126 |       effect: () => {\n  127 |         const activeSessionUid = termGroups.activeSessions[termGroups.activeRootGroup!];\n  128 |         if (Object.keys(termGroups.termGroups).length > 1 && activeSessionUid === sessionUid) {\n  129 |           const nextSessionUid = findNextSessionUid(termGroups, group);\n  130 |           dispatch(setActiveSession(nextSessionUid!));\n  131 |         }\n  132 | \n  133 |         dispatch(ptyExitSession(sessionUid));\n  134 |       }\n  135 |     });\n  136 |   };"}]},{"id":"RACE_5","type":"race_condition","type_label":"Race Condition","severity":"low","description":"migrateHyper3Config copies the schema using the asynchronous fs-extra copy() (fire-and-forget, errors only logged). The surrounding migration logic then synchronously reads defaultCfg and writes cfgPath without awaiting the schema copy. While the schema file is unrelated to cfgPath, the async copy can still be in flight after migration 'completes', and errors are swallowed. Mixing one async copy among otherwise synchronous file operations is fragile.","fix":"Use copySync for the schema copy to keep the migration fully synchronous and deterministic, or await an async version consistently.","locations":[{"ref":"app/config/migrate.ts:147-152","code":"  147 | export const migrateHyper3Config = () => {\n  148 |   copy(schemaPath, resolve(cfgDir, schemaFile), (err) => {\n  149 |     if (err) {\n  150 |       console.error(err);\n  151 |     }\n  152 |   });"}]},{"id":"RACE_6","type":"race_condition","type_label":"Race Condition","severity":"low","description":"The first branch caches window.__rpcId and wires up listeners inside a setTimeout(0). Any caller that constructs the RPC client and synchronously calls emit() before the timer fires will hit `if (!this.id) throw new Error('Not ready')` because this.id is only assigned in the deferred callback. The 'ready' event is also emitted asynchronously, creating an ordering dependency that is easy to violate.","fix":"Assign this.id synchronously when window.__rpcId is already known, and only defer the 'ready' emit if listeners must attach first; document the contract that emit() is unsafe before 'ready'.","locations":[{"ref":"lib/utils/rpc.ts:24-29","code":"   24 |     if (window.__rpcId) {\n   25 |       setTimeout(() => {\n   26 |         this.id = window.__rpcId;\n   27 |         this.ipc.on(this.id, this.ipcListener);\n   28 |         this.emitter.emit('ready');\n   29 |       }, 0);"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"Server subscribes to this.wc.on('did-finish-load', ...) in the constructor but never removes that listener. On destroy() it calls this.wc.removeAllListeners(), which is dangerous API misuse: webContents has many internal Electron listeners, and removeAllListeners() with no event name strips them all, potentially breaking Electron internals. It also does not remove the did-finish-load listener specifically if destroy is not called.","fix":"Store the did-finish-load handler and remove it by reference in destroy(); never call webContents.removeAllListeners() without an event name.","locations":[{"ref":"app/rpc.ts:33-35","code":"   33 |     this.wc.on('did-finish-load', () => {\n   34 |       this.wc.send('init', uid, win.profileName);\n   35 |     });"},{"ref":"app/rpc.ts:67-69","code":"   67 |   destroy() {\n   68 |     this.emitter.removeAllListeners();\n   69 |     this.wc.removeAllListeners();"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"updater() registers app.config.subscribe(...) and autoUpdater.on('update-available'/'update-downloaded') for every window, but on window 'close' it only removes the update listener; the config subscription is never unsubscribed. autoUpdater is a module-level singleton, so every opened window leaks one config subscriber that keeps a reference to the (closed) window's rpc, accumulating listeners and leaking BrowserWindow objects over the app's lifetime.","fix":"Capture the unsubscribe function returned by app.config.subscribe and call it inside the win.on('close') handler alongside removing the update listener.","locations":[{"ref":"app/updater.ts:97-117","code":"   97 |   app.config.subscribe(async () => {\n   98 |     const {updateChannel} = await getDecoratedConfigWithRetry();\n   99 |     const newUpdateIsCanary = isCanary(updateChannel);\n  100 | \n  101 |     if (newUpdateIsCanary !== canaryUpdates) {\n  102 |       const feedURL = buildFeedUrl(newUpdateIsCanary, version);\n  103 | \n  104 |       autoUpdater.setFeedURL({url: feedURL});\n  105 |       void checkForUpdates();\n  106 | \n  107 |       canaryUpdates = newUpdateIsCanary;\n  108 |     }\n  109 |   });\n  110 | \n  111 |   win.on('close', () => {\n  112 |     if (isLinux) {\n  113 |       autoUpdater.removeListener('update-available', onupdate);\n  114 |     } else {\n  115 |       autoUpdater.removeListener('update-downloaded', onupdate);\n  116 |     }\n  117 |   });"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"The `onBell` listener registered on the xterm Terminal is never added to `disposableListeners`, so it is not disposed in `componentWillUnmount`. Because the terminal instance is preserved across mounts/unmounts (split/unsplit, tab moves), the bell handler accumulates: each remount of a Term adds another `onBell` subscription that is never cleaned up, leaking listeners and causing the bell to fire multiple times.","fix":"Push the subscription into disposableListeners: `this.disposableListeners.push(this.term.onBell(() => this.ringBell()));` so it is disposed alongside the other listeners on unmount.","locations":[{"ref":"lib/components/term.tsx:279-281","code":"  279 |     this.term.onBell(() => {\n  280 |       this.ringBell();\n  281 |     });"}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"`resizeTimeout` is a debounce timer created in the ResizeObserver callback but it is never cleared in `componentWillUnmount`. If the component unmounts within the 500ms debounce window, the pending timeout fires `fitResize()` after unmount, operating on a torn-down terminal and observer. The ResizeObserver itself is also only disconnected via the ref callback (when called with null), which is not guaranteed to run on unmount.","fix":"In componentWillUnmount, call `clearTimeout(this.resizeTimeout)` and `this.resizeObserver?.disconnect()` to guarantee the timer and observer are torn down regardless of ref-callback ordering.","locations":[{"ref":"lib/components/term.tsx:484-494","code":"  484 |       this.resizeObserver = new ResizeObserver(() => {\n  485 |         clearTimeout(this.resizeTimeout);\n  486 |         this.resizeTimeout = setTimeout(() => {\n  487 |           this.fitResize();\n  488 |         }, 500);\n  489 |       });\n  490 |       this.resizeObserver.observe(component);\n  491 |     } else {\n  492 |       this.resizeObserver.disconnect();\n  493 |     }\n  494 |   };"},{"ref":"lib/components/term.tsx:496-511","code":"  496 |   componentWillUnmount() {\n  497 |     terms[this.props.uid] = null;\n  498 |     this.termWrapperRef?.removeChild(this.termRef!);\n  499 |     this.props.ref_(this.props.uid, null);\n  500 | \n  501 |     // to clean up the terminal, we remove the listeners\n  502 |     // instead of invoking `destroy`, since it will make the\n  503 |     // term insta un-attachable in the future (which we need\n  504 |     // to do in case of splitting, see `componentDidMount`\n  505 |     this.disposableListeners.forEach((handler) => handler.dispose());\n  506 |     this.disposableListeners = [];\n  507 | \n  508 |     window.removeEventListener('paste', this.onWindowPaste, {\n  509 |       capture: true\n  510 |     });\n  511 |   }"}]},{"id":"RES_5","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"The `contextmenu` window listener added in componentDidMount is never removed in componentWillUnmount. Every time the Terms component mounts (e.g. window re-init) another global listener accumulates, and the listener keeps the component alive after unmount.","fix":"Store the handler in a class field and remove it in componentWillUnmount with `window.removeEventListener('contextmenu', this.handler)`.","locations":[{"ref":"lib/components/terms.tsx:52-60","code":"   52 |   componentDidMount() {\n   53 |     window.addEventListener('contextmenu', () => {\n   54 |       const selection = window.getSelection()!.toString();\n   55 |       const {\n   56 |         props: {uid}\n   57 |       } = this.getActiveTerm();\n   58 |       this.props.onContextMenu(uid, selection);\n   59 |     });\n   60 |   }"},{"ref":"lib/components/terms.tsx:71-73","code":"   71 |   componentWillUnmount() {\n   72 |     this.props.ref_(null);\n   73 |   }"}]},{"id":"RES_6","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"notify() registers app.on('ready', ...) every time it is called before the app is ready. Each pre-ready notify() adds a new one-time-style 'ready' listener using on() (not once()), so 'ready' listeners accumulate and (because 'ready' fires once) they all fire on ready but the listeners are never removed, and using on instead of once for a one-shot event is incorrect.","fix":"Use app.once('ready', ...) so the listener is auto-removed after firing.","locations":[{"ref":"app/notify.ts:10-16","code":"   10 |   if (app.isReady()) {\n   11 |     _createNotification(title, body);\n   12 |   } else {\n   13 |     app.on('ready', () => {\n   14 |       _createNotification(title, body);\n   15 |     });\n   16 |   }"}]},{"id":"RES_7","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"On shell fallback, init() is called recursively to respawn with a new shell. A brand new DataBatcher is created each time and a fresh batcher.on('flush') listener is added, but the previous DataBatcher's 'flush' listener and the previous pty's onData/onExit subscriptions are never removed. Repeated fallbacks (e.g. a misconfigured shell that keeps exiting) accumulate listeners and DataBatcher instances.","fix":"Before re-initializing, dispose the old batcher (removeAllListeners) and old pty listeners; or reuse a single batcher instance across re-inits.","locations":[{"ref":"app/session.ts:170-219","code":"  170 |     this.batcher = new DataBatcher(uid);\n  171 |     this.pty.onData((chunk) => {\n  172 |       if (this.ended) {\n  173 |         return;\n  174 |       }\n  175 |       this.batcher?.write(chunk);\n  176 |     });\n  177 | \n  178 |     this.batcher.on('flush', (data: string) => {\n  179 |       this.emit('data', data);\n  180 |     });\n  181 | \n  182 |     this.pty.onExit((e) => {\n  183 |       if (!this.ended) {\n  184 |         // fall back to default shell config if the shell exits within 1 sec with non zero exit code\n  185 |         // this will inform users in case there are errors in the config instead of instant exit\n  186 |         const runDuration = new Date().getTime() - this.initTimestamp;\n  187 |         if (e.exitCode > 0 && runDuration < 1000) {\n  188 |           const fallBackShellConfig = getFallBackShellConfig(shell, shellArgs, defaultShell, defaultShellArgs);\n  189 |           if (fallBackShellConfig) {\n  190 |             const msg = `\n  191 | shell exited in ${runDuration} ms with exit code ${e.exitCode}\n  192 | please check the shell config: ${JSON.stringify({shell, shellArgs}, undefined, 2)}\n  193 | using fallback shell config: ${JSON.stringify(fallBackShellConfig, undefined, 2)}\n  194 | `;\n  195 |             console.warn(msg);\n  196 |             this.batcher?.write(msg.replace(/\\n/g, '\\r\\n'));\n  197 |             this.init({\n  198 |               uid,\n  199 |               rows,\n  200 |               cols,\n  201 |               cwd,\n  202 |               shell: fallBackShellConfig.shell,\n  203 |               shellArgs: fallBackShellConfig.shellArgs,\n  204 |               profile\n  205 |             });\n  206 |           } else {\n  207 |             const msg = `\n  208 | shell exited in ${runDuration} ms with exit code ${e.exitCode}\n  209 | No fallback available, please check the shell config.\n  210 | `;\n  211 |             console.warn(msg);\n  212 |             this.batcher?.write(msg.replace(/\\n/g, '\\r\\n'));\n  213 |           }\n  214 |         } else {\n  215 |           this.ended = true;\n  216 |           this.emit('exit');\n  217 |         }\n  218 |       }\n  219 |     });"}]},{"id":"RES_8","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"Window event listeners registered with window.on('maximize'/'unmaximize'/'minimize'/'restore'/'move'/'focus') and webContents.on('did-navigate'/'will-navigate') plus setWindowOpenHandler are never removed in window.clean(). clean() only destroys rpc, sessions, and unsubscribes config/plugins. The onGeometryChange/updateFocusTime closures capture window and rpc; if the BrowserWindow object is retained anywhere these listeners keep references alive. At minimum the listeners are leaked relative to the documented cleanup contract.","fix":"In clean(), call window.removeAllListeners() / window.webContents.removeAllListeners() for the events added here, or store and remove the specific handlers.","locations":[{"ref":"app/ui/window.ts:359-365","code":"  359 |   window.clean = () => {\n  360 |     app.config.winRecord(window);\n  361 |     rpc.destroy();\n  362 |     deleteSessions();\n  363 |     cfgUnsubscribe();\n  364 |     pluginsUnsubscribe();\n  365 |   };"},{"ref":"app/ui/window.ts:260-269","code":"  260 |   const onGeometryChange = () => rpc.emit('windowGeometry change', {isMaximized: window.isMaximized()});\n  261 |   window.on('maximize', onGeometryChange);\n  262 |   window.on('unmaximize', onGeometryChange);\n  263 |   window.on('minimize', onGeometryChange);\n  264 |   window.on('restore', onGeometryChange);\n  265 | \n  266 |   window.on('move', () => {\n  267 |     const position = window.getPosition();\n  268 |     rpc.emit('move', {bounds: {x: position[0], y: position[1]}});\n  269 |   });"}]},{"id":"RES_9","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"handleDragStart adds `mousemove`/`mouseup` listeners referencing the closures `onDrag`/`onDragEnd`. Because SplitPane is a function component, `onDrag` and `onDragEnd` are recreated on every render with new identities. If the component re-renders between mousedown and mouseup (which it does on every onResize via props.sizes change during drag), removeEventListener in the later onDragEnd is a different function reference than the addEventListener-ed one for onDrag, so the mousemove listener may not be removed and leaks after drag ends.","fix":"Hold stable handler references in refs (or useCallback with the latest props read from refs), so add/removeEventListener use identical function identities across re-renders.","locations":[{"ref":"lib/components/split-pane.tsx:33-44","code":"   33 |   const handleDragStart = (ev: React.MouseEvent<HTMLDivElement>, index: number) => {\n   34 |     ev.preventDefault();\n   35 |     setDragging(true);\n   36 |     window.addEventListener('mousemove', onDrag);\n   37 |     window.addEventListener('mouseup', onDragEnd);\n   38 | \n   39 |     const target = ev.target as HTMLDivElement;\n   40 |     dragTarget.current = target;\n   41 |     dragPanePosition.current = dragTarget.current.getBoundingClientRect()[d2];\n   42 |     panesSize.current = target.parentElement!.getBoundingClientRect()[d1];\n   43 |     paneIndex.current = index;\n   44 |   };"},{"ref":"lib/components/split-pane.tsx:61-81","code":"   61 |   const onDrag = (ev: MouseEvent) => {\n   62 |     const sizes_ = getSizes();\n   63 | \n   64 |     const i = paneIndex.current;\n   65 |     const pos = ev[d3];\n   66 |     const d = Math.abs(dragPanePosition.current - pos) / panesSize.current!;\n   67 |     if (pos > dragPanePosition.current) {\n   68 |       sizes_[i] += d;\n   69 |       sizes_[i + 1] -= d;\n   70 |     } else {\n   71 |       sizes_[i] -= d;\n   72 |       sizes_[i + 1] += d;\n   73 |     }\n   74 |     props.onResize(sizes_);\n   75 |   };\n   76 | \n   77 |   const onDragEnd = () => {\n   78 |     window.removeEventListener('mousemove', onDrag);\n   79 |     window.removeEventListener('mouseup', onDragEnd);\n   80 |     setDragging(false);\n   81 |   };"}]},{"id":"RES_10","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"The WebglAddon `onContextLoss` callback is registered but its returned disposable is discarded and never disposed. Since the term instance is preserved across mounts, this subscription leaks on remount.","fix":"Capture and push the disposable into disposableListeners (or dispose it in componentWillUnmount): `this.disposableListeners.push(webglAddon.onContextLoss(...))`.","locations":[{"ref":"lib/components/term.tsx:227-231","code":"  227 |         webglAddon.onContextLoss(() => {\n  228 |           console.warn('WebGL context lost. Falling back to canvas-based rendering.');\n  229 |           webglAddon.dispose();\n  230 |           this.term.loadAddon(new CanvasAddon());\n  231 |         });"}]},{"id":"RES_11","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"rpc.on('term selectAll', handleSelectAll) is registered inside a useEffect with an empty dependency array but the effect returns no cleanup, so the listener is never removed. handleSelectAll also closes over terms.current. On Hyper component remount/HMR this leaks listeners on the shared singleton rpc emitter (whose EventEmitter warns past 10 listeners).","fix":"Return a cleanup that calls window.rpc.removeListener('term selectAll', handleSelectAll); from the effect.","locations":[{"ref":"lib/containers/hyper.tsx:72-75","code":"   72 |   useEffect(() => {\n   73 |     void attachKeyListeners();\n   74 |     window.rpc.on('term selectAll', handleSelectAll);\n   75 |   }, []);"}]},{"id":"RES_12","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"subscribe() registers the callback on two IPC channels ('config change' and 'plugins change') but the returned unsubscribe function only removes the 'config change' listener. The 'plugins change' listener leaks and keeps firing after the subscriber thinks it has unsubscribed, accumulating across re-subscriptions.","fix":"In the returned cleanup function also call ipcRenderer.removeListener('plugins change', fn);","locations":[{"ref":"lib/utils/config.ts:21-27","code":"   21 | export function subscribe(fn: (event: Electron.IpcRendererEvent, ...args: any[]) => void) {\n   22 |   ipcRenderer.on('config change', fn);\n   23 |   ipcRenderer.on('plugins change', fn);\n   24 |   return () => {\n   25 |     ipcRenderer.removeListener('config change', fn);\n   26 |   };\n   27 | }"}]},{"id":"RES_13","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"In the Client constructor the 'init' IPC listener is registered with this.ipc.on (not once). After the first 'init' arrives it is never removed, so the renderer keeps a permanent listener on the 'init' channel; a second 'init' would re-run the ready setup and re-register the per-id listener, double-firing renderer events.","fix":"Use this.ipc.once('init', ...) or call this.ipc.removeListener('init', handler) inside the handler after caching window.__rpcId.","locations":[{"ref":"lib/utils/rpc.ts:31-42","code":"   31 |       // eslint-disable-next-line @typescript-eslint/no-unused-vars\n   32 |       this.ipc.on('init', (ev: IpcRendererEvent, uid: string, profileName: string) => {\n   33 |         // we cache so that if the object\n   34 |         // gets re-instantiated we don't\n   35 |         // wait for a `init` event\n   36 |         window.__rpcId = uid;\n   37 |         // window.profileName = profileName;\n   38 |         this.id = uid;\n   39 |         this.ipc.on(uid, this.ipcListener);\n   40 |         this.emitter.emit('ready');\n   41 |       });\n   42 |     }"}]},{"id":"RES_14","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"The chokidar watcher's 'before-quit' cleanup only closes the watcher when getWatched() reports at least one watched path. If the watch failed to attach (e.g. the config file did not exist yet at watch time, leaving getWatched() empty) the FSWatcher and its internal handles are never closed. The condition is an unusual guard that can skip cleanup of a live watcher.","fix":"Always call _watcher.close() in before-quit (it is a no-op/safe if nothing is watched) instead of gating on getWatched() length.","locations":[{"ref":"app/config.ts:63-69","code":"   63 |   app.on('before-quit', () => {\n   64 |     if (Object.keys(_watcher.getWatched()).length > 0) {\n   65 |       _watcher.close().catch((err) => {\n   66 |         console.warn(err);\n   67 |       });\n   68 |     }\n   69 |   });"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"The 'Select Tab' jump menu entries (1-8 and 'Last') only set an accelerator and have no click handler, role, or command. Activating these items via the menu (mouse click) does nothing. Every other actionable item in these menus uses click()/execCommand or a role; the tab-jump items silently do nothing when clicked, and only work via the keyboard accelerator.","fix":"Add a click handler to each generated tabJump item, e.g. click: (item, focusedWindow) => execCommand(`tab:jump:${label.toLowerCase()}`, focusedWindow), mirroring the command IDs registered in app/commands.ts (tab:jump:1..tab:jump:8, tab:jump:last).","locations":[{"ref":"app/menus/menus/window.ts:8-16","code":"    8 |   const tabJump: MenuItemConstructorOptions[] = [];\n    9 |   for (let i = 1; i <= 9; i++) {\n   10 |     // 9 is a special number because it means 'last'\n   11 |     const label = i === 9 ? 'Last' : `${i}`;\n   12 |     tabJump.push({\n   13 |       label,\n   14 |       accelerator: commandKeys[`tab:jump:${label.toLowerCase()}`]\n   15 |     });\n   16 |   }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Server constructor checks `if (this.destroyed) return;` immediately after `destroyed = false` initialization, so the early return is dead and can never trigger. The accompanying destroy() logic that sets this.destroyed=true 'to mark for genUid in constructor' is therefore meaningless: id is always assigned in the constructor before any destroy could run, so the else branch in destroy() is dead code referencing a non-existent genUid mechanism.","fix":"Remove the dead destroyed check in the constructor and the dead else branch in destroy(); the id is always set so always call ipcMain.removeListener.","locations":[{"ref":"app/rpc.ts:21-23","code":"   21 |     if (this.destroyed) {\n   22 |       return;\n   23 |     }"},{"ref":"app/rpc.ts:67-76","code":"   67 |   destroy() {\n   68 |     this.emitter.removeAllListeners();\n   69 |     this.wc.removeAllListeners();\n   70 |     if (this.id) {\n   71 |       ipcMain.removeListener(this.id, this.ipcListener);\n   72 |     } else {\n   73 |       // mark for `genUid` in constructor\n   74 |       this.destroyed = true;\n   75 |     }\n   76 |   }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Session.destroy() always emits 'exit' and sets this.ended=true unconditionally. The pty.onExit handler also emits 'exit' in the normal exit path. When the user closes a session, destroy() emits 'exit' and then pty.kill() triggers onExit which (if this.ended was not yet true at that point due to async ordering) could emit 'exit' a second time. Conversely destroy() emits 'exit' even when there was never a pty, signalling exit for a session that never started.","fix":"Set this.ended=true before killing the pty and guard the 'exit' emission so it fires exactly once; do not emit 'exit' when no pty ever existed.","locations":[{"ref":"app/session.ts:249-262","code":"  249 |   destroy() {\n  250 |     if (this.pty) {\n  251 |       try {\n  252 |         this.pty.kill();\n  253 |       } catch (_err) {\n  254 |         const err = _err as {stack: any};\n  255 |         console.error('exit error', err.stack);\n  256 |       }\n  257 |     } else {\n  258 |       console.warn('Warning: Attempted to destroy a session with no pty');\n  259 |     }\n  260 |     this.emit('exit');\n  261 |     this.ended = true;\n  262 |   }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"checkInstall compares the raw readlink target against cliScriptPath with strict equality. readlink returns the link target exactly as stored, which may differ from cliScriptPath by being relative, non-normalized, or having a different but equivalent path. A mismatch makes checkInstall return false even when a correct (or stale) symlink already exists, then symlink() throws EEXIST, which addSymlink surfaces as 'File already exists' and the install fails instead of being treated as already-installed.","fix":"Normalize/resolve both sides before comparing (e.g. path.resolve(path.dirname(cliLinkPath), link) === path.resolve(cliScriptPath)), or use fs.realpath on the link path and compare resolved paths.","locations":[{"ref":"app/utils/cli-install.ts:19-28","code":"   19 | const checkInstall = () => {\n   20 |   return readLink(cliLinkPath)\n   21 |     .then((link) => link === cliScriptPath)\n   22 |     .catch((err) => {\n   23 |       if (err.code === 'ENOENT') {\n   24 |         return false;\n   25 |       }\n   26 |       throw err;\n   27 |     });\n   28 | };"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"toElectronBackgroundColor builds the alpha-prefixed hex by hand with Math.round(alpha*255).toString(16), but does not zero-pad to 2 digits. For any alpha whose 0-255 value is < 16 (alpha below ~0.06, e.g. 0.01 -> '3'), the result is a malformed 7-character string like '#3000000'. Electron's setBackgroundColor / Chromium will reject or misparse this, producing wrong window background colors.","fix":"Pad the alpha component: const alphaHex = Math.round(color.alpha() * 255).toString(16).padStart(2, '0'); then concatenate.","locations":[{"ref":"app/utils/to-electron-background-color.ts:14-16","code":"   14 |   // http://stackoverflow.com/a/11019879/1202488\n   15 |   const alphaHex = Math.round(color.alpha() * 255).toString(16);\n   16 |   return `#${alphaHex}${color.hex().toString().slice(1)}`;"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","description":"The `webkitTransitionEnd` listener captures `dismissing` by closure at the moment the ref callback runs (initial render, when dismissing is false). When the user later dismisses, the opacity transition fires this stale handler with dismissing===false, so `props.onDismiss()` is never called and the notification is never removed from the store. The handler is also re-attached every time the ref callback fires and is never removed, leaking listeners.","fix":"Use a useRef to hold the latest `dismissing` value (or read from a ref), attach the transitionend listener once via useEffect, and remove it in the cleanup. Alternatively trigger onDismiss from an effect watching `dismissing` plus a transition-end promise.","locations":[{"ref":"lib/components/notification.tsx:24-41","code":"   24 |   const onElement = (el: HTMLDivElement | null) => {\n   25 |     if (el) {\n   26 |       el.addEventListener('webkitTransitionEnd', () => {\n   27 |         if (dismissing) {\n   28 |           props.onDismiss();\n   29 |         }\n   30 |       });\n   31 |       const {backgroundColor} = props;\n   32 |       if (backgroundColor) {\n   33 |         el.style.setProperty('background-color', backgroundColor, 'important');\n   34 |       }\n   35 | \n   36 |       if (ref) {\n   37 |         if (typeof ref === 'function') ref(el);\n   38 |         else ref.current = el;\n   39 |       }\n   40 |     }\n   41 |   };"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","description":"replaceParent sets a non-existent state key 'activeTermGroup'. The ITermState shape (typings/hyper.d.ts) only defines 'termGroups', 'activeSessions' and 'activeRootGroup'. When a parent group is collapsed into its remaining child and that parent was a root group, the code writes 'activeTermGroup' (a typo/leftover of 'activeRootGroup'). This bloats state with a phantom field that nothing ever reads, and signals the intended state migration may be incomplete.","fix":"Remove the stray .set('activeTermGroup', child.uid) line; 'activeRootGroup' is already set on the next line. If a separate active-term-group concept is genuinely needed, add it to ITermState and read it somewhere.","locations":[{"ref":"lib/reducers/term-groups.ts:152-156","code":"  152 |     state = state\n  153 |       .set('activeTermGroup', child.uid)\n  154 |       .set('activeRootGroup', child.uid)\n  155 |       .set('activeSessions', newSessions);\n  156 |   }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"auto-updater-linux setFeedURL stores options.url, but Electron's FeedURLOptions.url may be undefined per its type; checkForUpdates only guards against falsy updateURL. Additionally, on a non-204/non-JSON response (e.g. HTML error page) res.json() rejects and is caught by emitError, but a 200 with empty body silently does nothing (neither update-available nor update-not-available emitted), leaving the updater in limbo.","fix":"Emit 'update-not-available' for any non-update response and handle JSON parse failures distinctly from network errors.","locations":[{"ref":"app/auto-updater-linux.ts:18-40","code":"   18 |   checkForUpdates() {\n   19 |     if (!this.updateURL) {\n   20 |       return this.emitError('Update URL is not set');\n   21 |     }\n   22 |     this.emit('checking-for-update');\n   23 | \n   24 |     fetch(this.updateURL)\n   25 |       .then((res) => {\n   26 |         if (res.status === 204) {\n   27 |           this.emit('update-not-available');\n   28 |           return;\n   29 |         }\n   30 |         return res.json().then(({name, notes, pub_date}: {name: string; notes: string; pub_date: string}) => {\n   31 |           // Only name is mandatory, needed to construct release URL.\n   32 |           if (!name) {\n   33 |             throw new Error('Malformed server response: release name is missing.');\n   34 |           }\n   35 |           const date = pub_date ? new Date(pub_date) : new Date();\n   36 |           this.emit('update-available', {}, notes, name, date);\n   37 |         });\n   38 |       })\n   39 |       .catch(this.emitError.bind(this));\n   40 |   }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Profile-specific commands are generated once at module load from getConfig().profiles. If the user edits profiles in config at runtime, the commands map is never rebuilt, so newly added profiles have no window:new:<name>/tab:new:<name> commands and removed profiles leave stale commands. Unlike the menu, commands are not re-subscribed to config changes.","fix":"Rebuild profile-specific commands on config.subscribe.","locations":[{"ref":"app/commands.ts:149-163","code":"  149 | //Profile specific commands\n  150 | getConfig().profiles.forEach((profile) => {\n  151 |   commands[`window:new:${profile.name}`] = () => {\n  152 |     setTimeout(() => app.createWindow(undefined, undefined, profile.name), 0);\n  153 |   };\n  154 |   commands[`tab:new:${profile.name}`] = (focusedWindow) => {\n  155 |     focusedWindow?.rpc.emit('termgroup add req', {profile: profile.name});\n  156 |   };\n  157 |   commands[`pane:splitRight:${profile.name}`] = (focusedWindow) => {\n  158 |     focusedWindow?.rpc.emit('split request vertical', {profile: profile.name});\n  159 |   };\n  160 |   commands[`pane:splitDown:${profile.name}`] = (focusedWindow) => {\n  161 |     focusedWindow?.rpc.emit('split request horizontal', {profile: profile.name});\n  162 |   };\n  163 | });"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"User profiles are merged into the default config with lodash `merge`, which deep-merges arrays by index. The default config ships profiles: [{name:'default', config:{}}]. When a user defines a different profiles array, lodash merges element 0 of the default into element 0 of the user array, leaking default profile fields (and the 'default' name/config) into the user's first profile instead of replacing the array. This produces incorrect, surprising profile config.","fix":"Avoid index-wise array merging for profiles. Either use a merge customizer that replaces arrays, or merge base/default first and assign conf.profiles explicitly after the merge (e.g. result.profiles = conf.profiles).","locations":[{"ref":"app/config/init.ts:41-49","code":"   41 |         conf.profiles = conf.profiles.map((p, i) => ({\n   42 |           ...p,\n   43 |           name: p.name || `profile-${i + 1}`,\n   44 |           config: p.config || {}\n   45 |         }));\n   46 |         if (!conf.profiles.map((p) => p.name).includes(conf.defaultProfile)) {\n   47 |           conf.defaultProfile = conf.profiles[0].name;\n   48 |         }\n   49 |         return merge({}, defaultCfg.config, conf);"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"app.getLastFocusedWindow reduces over windowSet comparing win.focusTime, but does not exclude destroyed windows from windowSet. A window is only removed on its 'close' event; between a crash/destroy and close it may still be present, and callers (e.g. GetWindow) may invoke rpc on a window whose webContents is gone.","fix":"Filter out destroyed windows (win.isDestroyed()) before reducing, and guard callers against destroyed windows.","locations":[{"ref":"app/index.ts:49-56","code":"   49 | app.getLastFocusedWindow = () => {\n   50 |   if (!windowSet.size) {\n   51 |     return null;\n   52 |   }\n   53 |   return Array.from(windowSet).reduce((lastWindow, win) => {\n   54 |     return win.focusTime > lastWindow.focusTime ? win : lastWindow;\n   55 |   });\n   56 | };"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"updatePlugins captures `const id_ = id;` at call time, but the config.subscribe handler that triggers updates mutates the module-level `id` synchronously before calling updatePlugins, and a second config change during an in-progress install is dropped (updating guard returns early with only a notification). After the install completes it caches id_ (the stale id), so the dropped newer config change is never installed, leaving plugins out of sync until the next trigger.","fix":"When an update is requested while updating, set a pending flag and re-run updatePlugins after completion so the latest plugin set is installed.","locations":[{"ref":"app/plugins.ts:49-59","code":"   49 | config.subscribe(() => {\n   50 |   const plugins_ = config.getPlugins();\n   51 |   if (plugins !== plugins_) {\n   52 |     const id_ = getId(plugins_);\n   53 |     if (id !== id_) {\n   54 |       id = id_;\n   55 |       plugins = plugins_;\n   56 |       updatePlugins();\n   57 |     }\n   58 |   }\n   59 | });"},{"ref":"app/plugins.ts:105-119","code":"  105 | function updatePlugins({force = false} = {}) {\n  106 |   if (updating) {\n  107 |     return notify('Plugin update in progress');\n  108 |   }\n  109 |   updating = true;\n  110 |   syncPackageJSON();\n  111 |   const id_ = id;\n  112 |   install((err) => {\n  113 |     updating = false;\n  114 | \n  115 |     if (err) {\n  116 |       notify('Error updating plugins.', err, {error: err});\n  117 |     } else {\n  118 |       // flag successful plugin update\n  119 |       cache.set('hyper.plugins', id_);"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"toDependencies parses plugin specs with regex /.(@|#)/ to split name from version. The leading '.' matches any character, so for a scoped package like '@org/pkg@1.0.0' the match index lands inconsistently, and for specs where '@' or '#' is the first character the (match.index + 1) offset mis-splits. Scoped packages whose only '@' is the leading scope char get treated as having a version delimiter incorrectly.","fix":"Use a robust npm-spec parser (e.g. handle leading-scope '@' explicitly) instead of the broad /.(@|#)/ regex.","locations":[{"ref":"app/plugins.ts:235-253","code":"  235 | function toDependencies(plugins_: {plugins: string[]}) {\n  236 |   const obj: Record<string, string> = {};\n  237 |   plugins_.plugins.forEach((plugin) => {\n  238 |     const regex = /.(@|#)/;\n  239 |     const match = regex.exec(plugin);\n  240 | \n  241 |     if (match) {\n  242 |       const index = match.index + 1;\n  243 |       const pieces: string[] = [];\n  244 | \n  245 |       pieces[0] = plugin.substring(0, index);\n  246 |       pieces[1] = plugin.substring(index + 1, plugin.length);\n  247 |       obj[pieces[0]] = pieces[1];\n  248 |     } else {\n  249 |       obj[plugin] = 'latest';\n  250 |     }\n  251 |   });\n  252 |   return obj;\n  253 | }"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"BATCH_MAX_SIZE is a character-count threshold, but chunk.length for a Buffer is its byte length, while this.data is a decoded UTF-8 string whose character length differs from byte length. Mixing byte length (chunk) and char length (this.data) makes the flush threshold inaccurate for multibyte/non-ASCII output.","fix":"Decode the chunk first (or track byte length separately) so the size comparison uses a consistent unit.","locations":[{"ref":"app/session.ts:61-71","code":"   61 |   write(chunk: Buffer | string) {\n   62 |     if (this.data.length + chunk.length >= BATCH_MAX_SIZE) {\n   63 |       // We've reached the max batch size. Flush it and start another one\n   64 |       if (this.timeout) {\n   65 |         clearTimeout(this.timeout);\n   66 |         this.timeout = null;\n   67 |       }\n   68 |       this.flush();\n   69 |     }\n   70 | \n   71 |     this.data += typeof chunk === 'string' ? chunk : this.decoder.write(chunk);"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"DataBatcher.write flushes when this.data.length + chunk.length >= BATCH_MAX_SIZE, but it flushes BEFORE appending the current chunk and never re-checks afterwards. If a single chunk is itself larger than BATCH_MAX_SIZE, it is appended whole after the flush, so a single batch can exceed the documented max by far more than the ~4k the comment claims.","fix":"After appending, if this.data.length exceeds BATCH_MAX_SIZE, flush again; or split oversized chunks. At minimum correct the comment about the ~4k overshoot bound.","locations":[{"ref":"app/session.ts:61-76","code":"   61 |   write(chunk: Buffer | string) {\n   62 |     if (this.data.length + chunk.length >= BATCH_MAX_SIZE) {\n   63 |       // We've reached the max batch size. Flush it and start another one\n   64 |       if (this.timeout) {\n   65 |         clearTimeout(this.timeout);\n   66 |         this.timeout = null;\n   67 |       }\n   68 |       this.flush();\n   69 |     }\n   70 | \n   71 |     this.data += typeof chunk === 'string' ? chunk : this.decoder.write(chunk);\n   72 | \n   73 |     if (!this.timeout) {\n   74 |       this.timeout = setTimeout(() => this.flush(), BATCH_DURATION_MS);\n   75 |     }\n   76 |   }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"createSession sets argPath from process.argv[1] and, if it is an absolute path, uses it as the new session's working directory for EVERY new tab/window for the lifetime of the process. process.argv[1] is the script/entry path passed at launch, not a per-session directory, so once Hyper is started with an absolute first arg, all sessions ignore the profile workingDirectory and CWD preservation. This also means a launch arg leaks into every later session.","fix":"Resolve the launch directory once at startup and only apply it to the initial session, not on every createSession; or guard so process.argv[1] is only honored for the first session.","locations":[{"ref":"app/ui/window.ts:146-159","code":"  146 |     // set working directory\n  147 |     let argPath = process.argv[1];\n  148 |     if (argPath && process.platform === 'win32') {\n  149 |       if (/[a-zA-Z]:\"/.test(argPath)) {\n  150 |         argPath = argPath.replace('\"', sep);\n  151 |       }\n  152 |       argPath = normalize(argPath + sep);\n  153 |     }\n  154 |     let workingDirectory = homeDirectory;\n  155 |     if (argPath && isAbsolute(argPath)) {\n  156 |       workingDirectory = argPath;\n  157 |     } else if (profileCfg.workingDirectory && isAbsolute(profileCfg.workingDirectory)) {\n  158 |       workingDirectory = profileCfg.workingDirectory;\n  159 |     }"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"getColorMap maps a colors array positionally onto colorList, where colorList ends with 'colorCubes' and 'grayscale' (indexes 16,17). These two are conventionally arrays of colors (216-color cube and grayscale ramp), not single color strings, yet getColorMap assigns a single array element to each. If a config supplies a flat 18-element array, colorCubes/grayscale receive single strings, and if it supplies the standard 16 colors they are simply absent — but a longer array silently corrupts the colorCubes/grayscale shape expected by the renderer.","fix":"Only map the 16 named ANSI colors positionally and handle colorCubes/grayscale separately, or document that array input is only valid for the first 16 entries and reject longer arrays.","locations":[{"ref":"app/utils/colors.ts:1-36","code":"    1 | const colorList = [\n    2 |   'black',\n    3 |   'red',\n    4 |   'green',\n    5 |   'yellow',\n    6 |   'blue',\n    7 |   'magenta',\n    8 |   'cyan',\n    9 |   'white',\n   10 |   'lightBlack',\n   11 |   'lightRed',\n   12 |   'lightGreen',\n   13 |   'lightYellow',\n   14 |   'lightBlue',\n   15 |   'lightMagenta',\n   16 |   'lightCyan',\n   17 |   'lightWhite',\n   18 |   'colorCubes',\n   19 |   'grayscale'\n   20 | ];\n   21 | \n   22 | export const getColorMap: {\n   23 |   <T>(colors: T): T extends (infer U)[] ? {[k: string]: U} : T;\n   24 | } = (colors) => {\n   25 |   if (!Array.isArray(colors)) {\n   26 |     return colors;\n   27 |   }\n   28 |   // eslint-disable-next-line @typescript-eslint/no-unsafe-return\n   29 |   return colors.reduce((result, color, index) => {\n   30 |     if (index < colorList.length) {\n   31 |       result[colorList[index]] = color;\n   32 |     }\n   33 |     // eslint-disable-next-line @typescript-eslint/no-unsafe-return\n   34 |     return result;\n   35 |   }, {});\n   36 | };"},{"ref":"app/utils/colors.ts:29-35","code":"   29 |   return colors.reduce((result, color, index) => {\n   30 |     if (index < colorList.length) {\n   31 |       result[colorList[index]] = color;\n   32 |     }\n   33 |     // eslint-disable-next-line @typescript-eslint/no-unsafe-return\n   34 |     return result;\n   35 |   }, {});"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"mapKeys uses indexOf('cmd') and replace('cmd', ...) on each shortcut to migrate deprecated 'cmd' to 'command'. This is a substring match: any modifier or key literally containing 'cmd' is affected, and crucially replace() without /g only replaces the FIRST occurrence, so a combo like 'cmd+cmd' (or repeated bindings) only migrates the first. It also mis-fires on the already-correct 'command' token? No — 'command' contains 'cmd'? It does not, but a custom key named e.g. 'cmdline' would be wrongly rewritten to 'commandline'.","fix":"Match the modifier as a whole token (split on '+' and compare segments, or use a word-boundary regex with the global flag) before replacing.","locations":[{"ref":"app/utils/map-keys.ts:25-29","code":"   25 |       if (newShortcut.indexOf('cmd') !== -1) {\n   26 |         // Mousetrap use `command` and not `cmd`\n   27 |         console.warn('Your config use deprecated `cmd` in key combination. Please use `command` instead.');\n   28 |         newShortcut = newShortcut.replace('cmd', 'command');\n   29 |       }"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"On macOS the CLI spawns 'open -b co.zeit.hyper ${args_}' by interpolating the args_ array directly into a shell command string. Array-to-string coercion joins with commas (so two paths become '/a,/b'), and the paths are not shell-quoted, so paths containing spaces or shell metacharacters break the command or allow command injection. Also when args_ is empty an extra trailing space is produced.","fix":"Pass arguments safely, e.g. build the open command with properly quoted args ('open -b co.zeit.hyper --args ' + args_.map(a => JSON.stringify(a)).join(' ')) or use spawn with an args array instead of exec with string interpolation.","locations":[{"ref":"cli/index.ts:235-242","code":"  235 |     if (process.platform === 'darwin') {\n  236 |       //Use `open` to prevent multiple Hyper process\n  237 |       const cmd = `open -b co.zeit.hyper ${args_}`;\n  238 |       const opts = {\n  239 |         env\n  240 |       };\n  241 |       return promisify(exec)(cmd, opts);\n  242 |     }"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"findPrevious has fragile index logic. It returns list[index-1] when index is truthy, but when index===0 (old is first element) it returns list[1] (the second element). If the list has only one element, list[1] is undefined; if indexOf returns -1 (old not found), index is -1 which is truthy so it returns list[-2] === undefined. Callers (findNextSessionUid) pass the result straight into findFirstSession(state, state.termGroups[nextUid]) where an undefined nextUid causes state.termGroups[undefined] -> undefined and a crash when findFirstSession reads group.sessionUid.","fix":"Guard against single-element lists and not-found: compute index via indexOf, bail/return undefined if index < 0 or list.length < 2, and pick a deterministic neighbor (e.g. index > 0 ? list[index-1] : list[index+1]).","locations":[{"ref":"lib/actions/term-groups.ts:93-112","code":"   93 | const findPrevious = <T>(list: T[], old: T) => {\n   94 |   const index = list.indexOf(old);\n   95 |   // If `old` was the first item in the list,\n   96 |   // choose the other item available:\n   97 |   return index ? list[index - 1] : list[1];\n   98 | };\n   99 | \n  100 | const findNextSessionUid = (state: ITermState, group: ITermGroup) => {\n  101 |   // If we're closing a root group (i.e. a whole tab),\n  102 |   // the next group needs to be a root group as well:\n  103 |   if (state.activeRootGroup === group.uid) {\n  104 |     const rootGroups = getRootGroups({termGroups: state});\n  105 |     const nextGroup = findPrevious(rootGroups, group);\n  106 |     return findFirstSession(state, nextGroup);\n  107 |   }\n  108 | \n  109 |   const {children} = state.termGroups[group.parentUid!];\n  110 |   const nextUid = findPrevious(children.asMutable(), group.uid);\n  111 |   return findFirstSession(state, state.termGroups[nextUid]);\n  112 | };"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"shouldComponentUpdate compares props but explicitly excludes the `write` key from triggering updates while still iterating both prevProps and nextProps keys. The two `.some` scans are redundant/asymmetric: the second scan over this.props duplicates work and the only difference it catches is a key removed between renders, which is extremely rare. More importantly excluding `write` means a changed write handler is silently ignored, which can be a subtle correctness bug if write is ever swapped.","fix":"Use a single key union scan and document why `write` is excluded, or remove the special-casing if `write` is a stable reference.","locations":[{"ref":"lib/components/terms.tsx:27-32","code":"   27 |   shouldComponentUpdate(nextProps: TermsProps & {children: any}) {\n   28 |     return (\n   29 |       ObjectTypedKeys(nextProps).some((i) => i !== 'write' && this.props[i] !== nextProps[i]) ||\n   30 |       ObjectTypedKeys(this.props).some((i) => i !== 'write' && this.props[i] !== nextProps[i])\n   31 |     );\n   32 |   }"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"SESSION_CLEAR_ACTIVE in the sessions reducer dereferences state.activeUid! as a merge key without checking it is non-null. If no session is active (activeUid === null), the action builds an object keyed by the string 'null' and creates a bogus sessions['null'] = {cleared: true} entry, polluting the sessions map. The clearActiveSession action creator (actions/sessions.ts) does no guarding either.","fix":"Return state unchanged when state.activeUid is null before performing the merge.","locations":[{"ref":"lib/reducers/sessions.ts:67-77","code":"   67 |     case SESSION_CLEAR_ACTIVE:\n   68 |       return state.merge(\n   69 |         {\n   70 |           sessions: {\n   71 |             [state.activeUid!]: {\n   72 |               cleared: true\n   73 |             }\n   74 |           }\n   75 |         },\n   76 |         {deep: true}\n   77 |       );"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"SESSION_PTY_DATA handler in the ui reducer reads state.openAt[action.uid] which can be undefined for a session whose openAt entry was never set or was deleted on PTY exit. action.now - undefined evaluates to NaN, and 'NaN < 1000' is false, so the early-return guard meant to suppress activity markers right after open is silently bypassed. This can produce spurious activity markers.","fix":"Guard for a missing openAt entry, e.g. 'const opened = state.openAt[action.uid]; if (opened === undefined || action.now - opened < 1000) break;'.","locations":[{"ref":"lib/reducers/ui.ts:361-368","code":"  361 |     case SESSION_PTY_DATA:\n  362 |       // ignore activity markers for current tab\n  363 |       if (action.uid === state.activeUid) {\n  364 |         break;\n  365 |       }\n  366 | \n  367 |       // if first data events after open, ignore\n  368 |       if (action.now - state.openAt[action.uid] < 1000) {"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"values() and keys() memoize results in a WeakMap keyed by the object identity, but they never invalidate. For an immutable/frozen object this is fine, yet the parameter type is Record<string, any> (mutable). If a caller mutates the same object reference and calls values()/keys() again, the stale cached array is returned, producing incorrect results.","fix":"Document/enforce that inputs must be immutable, or drop the cache; if kept, only use it for known-immutable Redux state slices.","locations":[{"ref":"lib/utils/object.ts:3-18","code":"    3 | const valsCache = new WeakMap();\n    4 | \n    5 | export function values(imm: Record<string, any>) {\n    6 |   if (!valsCache.has(imm)) {\n    7 |     valsCache.set(imm, Object.values(imm));\n    8 |   }\n    9 |   return valsCache.get(imm);\n   10 | }\n   11 | \n   12 | const keysCache = new WeakMap();\n   13 | export function keys(imm: Record<string, any>) {\n   14 |   if (!keysCache.has(imm)) {\n   15 |     keysCache.set(imm, Object.keys(imm));\n   16 |   }\n   17 |   return keysCache.get(imm);\n   18 | }"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","description":"commands 'window:new' and 'tab:new' pass app.createWindow directly to setTimeout: setTimeout(app.createWindow, 0). setTimeout invokes the callback with a timeout-id argument, so app.createWindow receives that numeric id as its first parameter (fn), which createWindow then treats as the per-window callback fn and may attempt to call a number as a function.","fix":"Wrap in an arrow: setTimeout(() => app.createWindow(), 0).","locations":[{"ref":"app/commands.ts:10-13","code":"   10 |   'window:new': () => {\n   11 |     // If window is created on the same tick, it will consume event too\n   12 |     setTimeout(app.createWindow, 0);\n   13 |   },"},{"ref":"app/commands.ts:17-19","code":"   17 |     } else {\n   18 |       setTimeout(app.createWindow, 0);\n   19 |     }"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","description":"When user config parsing fails, the fallback parses defaultCfgRaw (raw contents of config-default.json) as the userCfg. defaultCfgRaw defaults to '{}' if config-default.json could not be read, so on a double failure userCfg becomes {} with no `config` key, which then triggers the 'config key is missing' path in _init and the brittle empty-config fallback. The default raw is also the platform-default JSON, not a validated user-shaped config.","fix":"Fall back to the already-parsed _defaultCfg (defaultCfg returned from _importConf) rather than re-parsing defaultCfgRaw, ensuring a well-formed config object even when the default file is unreadable.","locations":[{"ref":"app/config/import.ts:42-48","code":"   42 |   let userCfg: rawConfig;\n   43 |   try {\n   44 |     userCfg = JSON.parse(readFileSync(cfgPath, 'utf8'));\n   45 |   } catch (err) {\n   46 |     notify(\"Couldn't parse config file. Using default config instead.\");\n   47 |     userCfg = JSON.parse(defaultCfgRaw);\n   48 |   }"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","description":"cleanEnv is computed with shellEnv.sync(_shell || defaultShell) only when running as an AppImage, but the spawned shell uses the resolved `shell` variable. If a profile sets shellArgs but relies on default shell, _shell is undefined and shellEnv falls back to defaultShell, which is consistent; however the duplicated `_shell || defaultShell` expression diverges from the `shell` used for spawning if defaultShell resolution ever differs, making the env potentially built for a different shell than the one spawned.","fix":"Reuse the already-resolved `shell` variable for shellEnv.sync to keep env and spawn target consistent.","locations":[{"ref":"app/session.ts:118-122","code":"  118 |     const shell = _shell || defaultShell;\n  119 |     const shellArgs = _shellArgs || defaultShellArgs;\n  120 | \n  121 |     const cleanEnv =\n  122 |       process.env['APPIMAGE'] && process.env['APPDIR'] ? shellEnv.sync(_shell || defaultShell) : process.env;"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","description":"getCommandKeys takes keymaps[command][0] without checking the array is non-empty. A command mapped to an empty shortcut array (possible via user config / plugin keymaps) yields undefined, which then flows into the menu accelerator strings. Not a crash but produces undefined accelerators.","fix":"Guard against empty arrays: only set commandKeys[command] when keymaps[command]?.length > 0.","locations":[{"ref":"app/ui/contextmenu.ts:11-16","code":"   11 | const getCommandKeys = (keymaps: Record<string, string[]>): Record<string, string> =>\n   12 |   Object.keys(keymaps).reduce((commandKeys: Record<string, string>, command) => {\n   13 |     return Object.assign(commandKeys, {\n   14 |       [command]: keymaps[command][0]\n   15 |     });\n   16 |   }, {});"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The Windows argPath cleanup regex /[a-zA-Z]:\"/ tests for a drive letter immediately followed by a double quote, but replaces the quote with sep via argPath.replace('\"', sep) which replaces only the FIRST quote and uses a plain string match, not the tested pattern. The regex and the replace target are inconsistent, so a path like 'C:\"foo' becomes 'C:\\foo' but the intent (handling quoted drive paths) is unclear and likely incorrect; comment/intent is misleading.","fix":"Clarify the intended transformation and make the regex and replacement consistent (e.g. replace the matched quote position, or strip surrounding quotes properly).","locations":[{"ref":"app/ui/window.ts:147-153","code":"  147 |     let argPath = process.argv[1];\n  148 |     if (argPath && process.platform === 'win32') {\n  149 |       if (/[a-zA-Z]:\"/.test(argPath)) {\n  150 |         argPath = argPath.replace('\"', sep);\n  151 |       }\n  152 |       argPath = normalize(argPath + sep);\n  153 |     }"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","description":"checkForUpdates awaits getDecoratedConfigWithRetry which retries indefinitely (async-retry default ~10 attempts, but on persistent failure throws). The thrown rejection from checkForUpdates is only swallowed by `void checkForUpdates()` at the call sites, producing an unhandled rejection if config never loads, and silently disabling update checks.","fix":"Add .catch() handlers at the void call sites to log failures.","locations":[{"ref":"app/updater.ts:29-34","code":"   29 | const checkForUpdates = async () => {\n   30 |   const config = await getDecoratedConfigWithRetry();\n   31 |   if (!config.disableAutoUpdates) {\n   32 |     autoUpdater.checkForUpdates();\n   33 |   }\n   34 | };"},{"ref":"app/updater.ts:64-70","code":"   64 |   setTimeout(() => {\n   65 |     void checkForUpdates();\n   66 |   }, ms('10s'));\n   67 | \n   68 |   setInterval(() => {\n   69 |     void checkForUpdates();\n   70 |   }, ms('30m'));"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","description":"generatePrefixedCommand maps i=1..9 to result keys ':1'..':8' and ':last' for 9, but the shortcut suffix uses the numeric i in every case ('shortcut+9' for the last entry). The accelerator for the 'last' command is therefore '<mod>+9' which is intentional, but the comment '9 is a special number because it means last' is placed on the index remap only; the generated shortcut still literally uses 9. If a user expects tab:last bound to something other than +9 this is surprising. Minor: confirm intent matches comment.","fix":"If +9 should map to 'last', the code is correct b
