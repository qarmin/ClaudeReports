ut add a clarifying comment; otherwise adjust the shortcut generation to match the index semantics.","locations":[{"ref":"app/utils/map-keys.ts:4-9","code":"    4 |   for (let i = 1; i <= 9; i++) {\n    5 |     // 9 is a special number because it means 'last'\n    6 |     const index = i === 9 ? 'last' : i;\n    7 |     const prefixedShortcuts = shortcuts.map((shortcut) => `${shortcut}+${i}`);\n    8 |     result[`${baseCmd}:${index}`] = prefixedShortcuts;\n    9 |   }"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","description":"positionIsValid requires BOTH x and y to fall within a single display's workArea to be valid. A window whose top-left x is on display A but y aligns within display B (multi-monitor staggered layouts) would be reported invalid even though it is on-screen. The point-in-rect test should also consider that a window position only needs its title bar visible, not the exact top-left corner inside one display's full rect.","fix":"Consider window bounds intersection against the union of work areas rather than requiring the exact (x,y) point inside one display.","locations":[{"ref":"app/utils/window-utils.ts:7-9","code":"    7 |   return displays.some(({workArea}) => {\n    8 |     return x >= workArea.x && x <= workArea.x + workArea.width && y >= workArea.y && y <= workArea.y + workArea.height;\n    9 |   });"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","description":"exists() returns getFileContents() !== undefined, but getFileContents (memoized fs.readFileSync) never returns undefined — it either returns a string or throws (ENOENT). So exists() either returns true or throws an uncaught exception, instead of returning false when the config file is missing. checkConfig() relies on api.exists() returning false to print a friendly message, which it can never do.","fix":"Wrap the read in try/catch and return false on ENOENT: function exists() { try { return getFileContents() !== undefined; } catch { return false; } }","locations":[{"ref":"cli/api.ts:60-62","code":"   60 | function exists() {\n   61 |   return getFileContents() !== undefined;\n   62 | }"},{"ref":"cli/index.ts:29-37","code":"   29 | const checkConfig = () => {\n   30 |   if (api.exists()) {\n   31 |     return true;\n   32 |   }\n   33 |   let msg = chalk.red(`Error! Config file not found: ${api.configPath}\\n`);\n   34 |   msg += 'Please launch Hyper and retry.';\n   35 |   console.error(msg);\n   36 |   process.exit(1);\n   37 | };"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","description":"columnify computes descriptionWidth = process.stdout.columns - maxNameLength - 1. When output is piped (not a TTY), process.stdout.columns is undefined, making descriptionWidth NaN, which columnify's maxWidth then receives as NaN and may mis-wrap or throw.","fix":"Default columns: const cols = process.stdout.columns || 80; and use that.","locations":[{"ref":"cli/index.ts:39-53","code":"   39 | const columnify = (data: {name: string; description: string}[]) => {\n   40 |   const maxNameLength = Math.max(...data.map((entry) => entry.name.length), 0);\n   41 |   const descriptionWidth = process.stdout.columns - maxNameLength - 1;\n   42 |   return _columnify(data, {\n   43 |     showHeaders: false,\n   44 |     config: {\n   45 |       description: {\n   46 |         maxWidth: descriptionWidth\n   47 |       },\n   48 |       name: {\n   49 |         dataTransform: (nameValue) => chalk.green(nameValue)\n   50 |       }\n   51 |     }\n   52 |   }).replace(/\\s+$/gm, ''); // remove padding from the end of all lines\n   53 | };"}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","description":"decreaseFontSize clamps at >5 using the *current* override/fontSize, but increaseFontSize has no upper bound. More importantly the lower-bound branch returns 'old' unchanged when old <= 5, then still dispatches UI_FONT_SIZE_SET with the unchanged value, triggering the font-size notification logic in the ui reducer (state_.fontSizeOverride !== state.fontSizeOverride may already match, but a no-op SET still fires a redundant action and may set fontSizeOverride from null to the same number, flipping the 'font' notification).","fix":"When old <= 5, skip dispatching UI_FONT_SIZE_SET entirely instead of dispatching a no-op set.","locations":[{"ref":"lib/actions/ui.ts:70-86","code":"   70 | export function decreaseFontSize() {\n   71 |   return (dispatch: HyperDispatch, getState: () => HyperState) => {\n   72 |     dispatch({\n   73 |       type: UI_FONT_SIZE_DECR,\n   74 |       effect() {\n   75 |         const state = getState();\n   76 |         const old = state.ui.fontSizeOverride || state.ui.fontSize;\n   77 |         // when the font-size is really small, below 5px, xterm starts showing up issues.\n   78 |         const value = old > 5 ? old - 1 : old;\n   79 |         dispatch({\n   80 |           type: UI_FONT_SIZE_SET,\n   81 |           value\n   82 |         });\n   83 |       }\n   84 |     });\n   85 |   };\n   86 | }"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","description":"getRegisteredKeys builds a shortcut->actionName map by iterating actionName then its shortcuts and writing result[shortcut] = actionName. If two actions register the same shortcut, the later one silently overwrites the earlier with no warning, so a keybinding conflict is resolved by undefined iteration order rather than reported.","fix":"Detect collisions (if result[shortcut] already set, warn/log) so conflicting keymaps are surfaced rather than silently dropped.","locations":[{"ref":"lib/command-registry.ts:13-23","code":"   13 | export const getRegisteredKeys = async () => {\n   14 |   const keymaps = await ipcRenderer.invoke('getDecoratedKeymaps');\n   15 | \n   16 |   return Object.keys(keymaps).reduce((result: Record<string, string>, actionName) => {\n   17 |     const commandKeys = keymaps[actionName];\n   18 |     commandKeys.forEach((shortcut) => {\n   19 |       result[shortcut] = actionName;\n   20 |     });\n   21 |     return result;\n   22 |   }, {});\n   23 | };"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","description":"getWindowHeaderConfig returns `showHamburgerMenu`/`showWindowControls` directly when not empty string, but these config values may be string 'true'/'false' or booleans; the truthiness checks `=== ''` only filter the empty-string default. A string 'false' would be truthy and incorrectly show the control. The comparison conflates 'unset' with falsy values.","fix":"Normalize the config to booleans before comparison, treating only an explicit unset/empty as falling back to defaults.","locations":[{"ref":"lib/components/header.tsx:73-76","code":"   73 |     return {\n   74 |       hambMenu: showHamburgerMenu === '' ? defaults.hambMenu : showHamburgerMenu,\n   75 |       winCtrls: showWindowControls === '' ? defaults.winCtrls : showWindowControls\n   76 |     };"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The notification `useEffect([props.text])` resets the dismiss timer and sets dismissing=false on every text change, but the mount effect `useEffect([], setDismissTimer)` also starts a timer; on first mount both effects run (the text-effect runs on mount too), starting a timer in the mount effect and then immediately resetting it in the text effect. Redundant timer creation; the first setTimeout is created then cleared, harmless but wasteful and indicates duplicated logic.","fix":"Consolidate timer setup into the [props.text] effect (which runs on mount anyway) and remove the separate mount effect.","locations":[{"ref":"lib/components/notification.tsx:9-18","code":"    9 |   useEffect(() => {\n   10 |     setDismissTimer();\n   11 |   }, []);\n   12 | \n   13 |   useEffect(() => {\n   14 |     // if we have a timer going and the notification text\n   15 |     // changed we reset the timer\n   16 |     resetDismissTimer();\n   17 |     setDismissing(false);\n   18 |   }, [props.text]);"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","description":"attachKeyListeners() is invoked from two effects on mount: the [props.lastConfigUpdate] effect and the [] effect both run on first render. On the very first mount mousetrap.current is null in the first call (creates instance and binds), then the second call sees a non-null instance and resets+rebinds. This causes redundant work and relies on ordering; if order changed it could double-bind keys.","fix":"Consolidate the mount-time attach into a single effect, or guard against the duplicate initial invocation.","locations":[{"ref":"lib/containers/hyper.tsx:23-25","code":"   23 |   useEffect(() => {\n   24 |     void attachKeyListeners();\n   25 |   }, [props.lastConfigUpdate]);"},{"ref":"lib/containers/hyper.tsx:72-75","code":"   72 |   useEffect(() => {\n   73 |     void attachKeyListeners();\n   74 |     window.rpc.on('term selectAll', handleSelectAll);\n   75 |   }, []);"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","description":"fetchFileData mutates the passed-in config object: it builds configInfo as a shallow copy with bellSound: null, then in the async branch sets configInfo.bellSound and dispatches. In the subscribe path the object passed already had bellSound set from current state, but fetchFileData immediately overwrites it back to null in the copy; if getBase64FileData resolves to null (file read error) the previously valid bellSound is lost rather than preserved.","fix":"On read failure, fall back to the previous store bellSound instead of forcing null, or only null out bellSound when the URL actually changed.","locations":[{"ref":"lib/index.tsx:37-50","code":"   37 | const fetchFileData = (configData: configOptions) => {\n   38 |   const configInfo: configOptions = {...configData, bellSound: null};\n   39 |   if (!configInfo.bell || configInfo.bell.toUpperCase() !== 'SOUND' || !configInfo.bellSoundURL) {\n   40 |     store_.dispatch(reloadConfig(configInfo));\n   41 |     return;\n   42 |   }\n   43 | \n   44 |   void getBase64FileData(configInfo.bellSoundURL).then((base64FileData) => {\n   45 |     // prepend \"base64,\" to the result of this method in order for this to work properly within xterm.js\n   46 |     const bellSound = !base64FileData ? null : 'base64,' + base64FileData;\n   47 |     configInfo.bellSound = bellSound;\n   48 |     store_.dispatch(reloadConfig(configInfo));\n   49 |   });\n   50 | };"},{"ref":"lib/index.tsx:56-62","code":"   56 | config.subscribe(() => {\n   57 |   const configInfo = config.getConfig();\n   58 |   configInfo.bellSound = store_.getState().ui.bellSound;\n   59 |   // The only async part of the config is the bellSound so we will check if the bellSoundURL\n   60 |   // has changed to determine if we should re-read this file and dispatch an update to the config\n   61 |   if (store_.getState().ui.bellSoundURL !== config.getConfig().bellSoundURL) {\n   62 |     fetchFileData(configInfo);"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"The 'session del line end req' handler sends '\\x10B' to the pty. \\x10 is Ctrl-P (previous-history / DLE), followed by a literal 'B'. This is a typo: the intended kill-to-end-of-line control code is \\x0b (Ctrl-K). As written the menu/keyboard action moves through history and inserts a 'B' instead of deleting to end of line.","fix":"Send the correct kill-to-end-of-line sequence: sendSessionData(null, '\\x0b').","locations":[{"ref":"lib/index.tsx:132-134","code":"  132 | rpc.on('session del line end req', () => {\n  133 |   store_.dispatch(sessionActions.sendSessionData(null, '\\x10B'));\n  134 | });"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"notifications.ts validates the message with `typeof message !== 'object' && message !== ''` then emits it, but it never validates the shape (text/url/dismissable) of the object, and data.json() result is fully trusted. A malformed object (e.g. message present but not matching the type) bypasses the check (typeof 'object' is true) and is forwarded to the renderer as a notification, and the comment-typed shape is not enforced.","fix":"Validate that message has the expected string fields before emitting; reject otherwise.","locations":[{"ref":"app/notifications.ts:25-37","code":"   25 |     .then((res) => res.json())\n   26 |     .then((data) => {\n   27 |       const message: {text: string; url: string; dismissable: boolean} | '' = data.message || '';\n   28 |       if (typeof message !== 'object' && message !== '') {\n   29 |         throw new Error('Bad response');\n   30 |       }\n   31 |       if (message === '') {\n   32 |         console.log('No matching notification messages');\n   33 |       } else {\n   34 |         rpc.emit('add notification', message);\n   35 |       }\n   36 | \n   37 |       retry();"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"syncPackageJSON catches write errors and calls alert(), but alert() calls dialog.showMessageBox which may be invoked before app 'ready' (the initial updatePlugins is scheduled 1s after module load with no ready guarantee) — showMessageBox before ready throws. Also the original write error is swallowed entirely (not logged), losing diagnostics.","fix":"Log the underlying error and guard the dialog behind app.isReady() (fall back to notify/console otherwise).","locations":[{"ref":"app/plugins.ts:207-233","code":"  207 | function syncPackageJSON() {\n  208 |   const dependencies = toDependencies(plugins);\n  209 |   const pkg = {\n  210 |     name: 'hyper-plugins',\n  211 |     description: 'Auto-generated from `hyper.json`!',\n  212 |     private: true,\n  213 |     version: '0.0.1',\n  214 |     repository: 'vercel/hyper',\n  215 |     license: 'MIT',\n  216 |     homepage: 'https://hyper.is',\n  217 |     dependencies\n  218 |   };\n  219 | \n  220 |   const file = resolve(path, 'package.json');\n  221 |   try {\n  222 |     writeFileSync(file, JSON.stringify(pkg, null, 2));\n  223 |   } catch (err) {\n  224 |     alert(`An error occurred writing to ${file}`);\n  225 |   }\n  226 | }\n  227 | \n  228 | function alert(message: string) {\n  229 |   void dialog.showMessageBox({\n  230 |     message,\n  231 |     buttons: ['Ok']\n  232 |   });\n  233 | }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In install.ts the execFile error callback passes stderr (a string, possibly empty) as the error to cb, discarding the actual err object (exit code, ETIMEDOUT, etc.). If the process times out or fails with empty stderr, cb receives '' which is falsy, so updatePlugins treats it as success and caches the plugin id despite the install having failed.","fix":"Pass a meaningful error string derived from err (err.message plus stderr) when err is set, never an empty stderr.","locations":[{"ref":"app/plugins/install.ts:28-37","code":"   28 |         (err, stdout, stderr) => {\n   29 |           if (err) {\n   30 |             cb(stderr);\n   31 |           } else {\n   32 |             cb(null);\n   33 |           }\n   34 |           end?.();\n   35 |           spawnQueue.start();\n   36 |         }\n   37 |       );"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"StringDecoder is used for partial multibyte UTF-8 sequences, but on session exit/destroy the decoder is never flushed (decoder.end()). Any trailing incomplete multibyte sequence buffered inside the StringDecoder is silently dropped, truncating final terminal output.","fix":"On exit, call this.decoder.end() and write/emit any remaining bytes before emitting 'exit'.","locations":[{"ref":"app/session.ts:170-180","code":"  170 |     this.batcher = new DataBatcher(uid);\n  171 |     this.pty.onData((chunk) => {\n  172 |       if (this.ended) {\n  173 |         return;\n  174 |       }\n  175 |       this.batcher?.write(chunk);\n  176 |     });\n  177 | \n  178 |     this.batcher.on('flush', (data: string) => {\n  179 |       this.emit('data', data);\n  180 |     });"},{"ref":"app/session.ts:249-262","code":"  249 |   destroy() {\n  250 |     if (this.pty) {\n  251 |       try {\n  252 |         this.pty.kill();\n  253 |       } catch (_err) {\n  254 |         const err = _err as {stack: any};\n  255 |         console.error('exit error', err.stack);\n  256 |       }\n  257 |     } else {\n  258 |       console.warn('Warning: Attempted to destroy a session with no pty');\n  259 |     }\n  260 |     this.emit('exit');\n  261 |     this.ended = true;\n  262 |   }"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In addSymlink, after the sudoExec ln command fails, error is assigned (_error as any[])[0] assuming sudo-prompt rejects with an array. promisify(sudoPrompt.exec) actually rejects with an Error object (or the callback's error arg), not an array, so [0] is undefined and the user sees 'undefined' as the failure reason instead of the real message.","fix":"Use the rejected value directly: error = (_error as Error)?.message || String(_error); do not index it as an array.","locations":[{"ref":"app/utils/cli-install.ts:65-69","code":"   65 |           await sudoExec(`ln -sf \"${cliScriptPath}\" \"${cliLinkPath}\"`, {name: 'Hyper'});\n   66 |           return;\n   67 |         } catch (_error) {\n   68 |           error = (_error as any[])[0];\n   69 |         }"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"resizeSession assumes findBySession always returns a group (non-null assertion '!'). If the session's term group was already removed (a known race the codebase handles elsewhere, e.g. ptyExitTermGroup guards 'if (!group)'), group is undefined and the next line 'group.parentUid' throws, crashing the resize thunk.","fix":"Check the group: 'const group = findBySession(termGroups, uid); if (!group) return;' before reading parentUid/children.","locations":[{"ref":"lib/actions/sessions.ts:118-123","code":"  118 | export function resizeSession(uid: string, cols: number, rows: number) {\n  119 |   return (dispatch: HyperDispatch, getState: () => HyperState) => {\n  120 |     const {termGroups} = getState();\n  121 |     const group = findBySession(termGroups, uid)!;\n  122 |     const isStandaloneTerm = !group.parentUid && !group.children.length;\n  123 |     const now = Date.now();"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"On config parse failure, notify() is called with a single argument. notify(title, body) treats the first arg as the TITLE, so the entire sentence becomes the notification title with an empty body, instead of a proper title/message pair. Inconsistent with other notify() calls in the codebase.","fix":"Call notify('Configuration error', \"Couldn't parse config file. Using default config instead.\").","locations":[{"ref":"app/config/import.ts:45-48","code":"   45 |   } catch (err) {\n   46 |     notify(\"Couldn't parse config file. Using default config instead.\");\n   47 |     userCfg = JSON.parse(defaultCfgRaw);\n   48 |   }"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Session.resize/destroy access err.stack on a value typed/cast as {stack: any}, but a thrown value may be a non-Error (string, undefined) with no stack property, logging undefined and discarding the real error message.","fix":"Log the error itself (console.error(err)) rather than only err.stack, or check the type before accessing .stack.","locations":[{"ref":"app/session.ts:240-243","code":"  240 |       } catch (_err) {\n  241 |         const err = _err as {stack: any};\n  242 |         console.error(err.stack);\n  243 |       }"},{"ref":"app/session.ts:253-255","code":"  253 |       } catch (_err) {\n  254 |         const err = _err as {stack: any};\n  255 |         console.error('exit error', err.stack);"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"handleDroppedURL passes url straight to new URL(url) inside will-navigate / setWindowOpenHandler. If url is not a valid absolute URL, new URL throws, which is unhandled in the will-navigate handler and would surface as an uncaught exception in the main process during navigation. The typeof url === 'string' guard does not prevent malformed-string throws.","fix":"Wrap new URL(url) in try/catch and return undefined on parse failure.","locations":[{"ref":"app/ui/window.ts:300-308","code":"  300 |   const handleDroppedURL = (url: string) => {\n  301 |     const protocol = typeof url === 'string' && new URL(url).protocol;\n  302 |     if (protocol === 'file:') {\n  303 |       const path = fileURLToPath(url);\n  304 |       return {uid: null, data: path, escaped: true};\n  305 |     } else if (protocol === 'http:' || protocol === 'https:') {\n  306 |       return {uid: null, data: url};\n  307 |     }\n  308 |   };"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"uninstall() and install() are typed/used as async-style but uninstall returns Promise.reject(...) for the not-installed case while otherwise returning undefined (it's an async function so resolves). The save() failures (writeFileSync) are synchronous throws not wrapped, so a write error rejects the returned promise in install but in uninstall it throws synchronously inside the async function (becomes a rejection) — inconsistent error surfaces. More notably, install reads `array` once at function top via getLocalPlugins/getPlugins (memoized) and spreads [...array, plugin]; because getParsedFile is memoized, config and array are the same cached object, so save writes correctly, but any concurrent CLI invocation races on the file with no locking.","fix":"Acknowledge there is no file locking; at minimum document the race, and make error handling consistent between install and uninstall.","locations":[{"ref":"cli/api.ts:100-129","code":"  100 | function install(plugin: string, locally?: boolean) {\n  101 |   const array = locally ? getLocalPlugins() : getPlugins();\n  102 |   return existsOnNpm(plugin)\n  103 |     .catch((err: any) => {\n  104 |       const {statusCode} = err;\n  105 |       if (statusCode && (statusCode === 404 || statusCode === 200)) {\n  106 |         return Promise.reject(`${plugin} not found on npm`);\n  107 |       }\n  108 |       return Promise.reject(`${err.message}\\nPlugin check failed. Check your internet connection or retry later.`);\n  109 |     })\n  110 |     .then(() => {\n  111 |       if (isInstalled(plugin, locally)) {\n  112 |         return Promise.reject(`${plugin} is already installed`);\n  113 |       }\n  114 | \n  115 |       const config = getParsedFile();\n  116 |       config[locally ? 'localPlugins' : 'plugins'] = [...array, plugin];\n  117 |       save(config);\n  118 |     });\n  119 | }\n  120 | \n  121 | async function uninstall(plugin: string) {\n  122 |   if (!isInstalled(plugin)) {\n  123 |     return Promise.reject(`${plugin} is not installed`);\n  124 |   }\n  125 | \n  126 |   const config = getParsedFile();\n  127 |   config.plugins = getPlugins().filter((p) => p !== plugin);\n  128 |   save(config);\n  129 | }"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"checkConfig() and assertPluginName() call process.exit() synchronously inside args.command handlers. Because they are invoked during args.parse (within main), process.exit prevents the outer main().then(eventuallyExit) flow and bypasses eventuallyExit's 100ms delay used elsewhere to flush stdout. Mixing immediate process.exit with the eventuallyExit pattern can truncate buffered console output on some platforms.","fix":"Use eventuallyExit(1) consistently instead of raw process.exit, so buffered output is flushed.","locations":[{"ref":"cli/index.ts:29-37","code":"   29 | const checkConfig = () => {\n   30 |   if (api.exists()) {\n   31 |     return true;\n   32 |   }\n   33 |   let msg = chalk.red(`Error! Config file not found: ${api.configPath}\\n`);\n   34 |   msg += 'Please launch Hyper and retry.';\n   35 |   console.error(msg);\n   36 |   process.exit(1);\n   37 | };"},{"ref":"cli/index.ts:22-27","code":"   22 | const assertPluginName = (pluginName: string) => {\n   23 |   if (!pluginName) {\n   24 |     console.error(chalk.red('Plugin name is required'));\n   25 |     process.exit(1);\n   26 |   }\n   27 | };"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Both setting of `this.term.element.style.padding` are wrapped in try/catch that merely `console.log(error)`. `this.term.element` can be null/undefined transiently; swallowing with a bare console.log hides real failures and the non-null assertion `element!` will throw into the catch routinely, masking initialization-order problems.","fix":"Guard with `if (this.term.element) { this.term.element.style.padding = ... }` instead of try/catch swallowing, or log via the app's error reporter.","locations":[{"ref":"lib/components/term.tsx:252-256","code":"  252 |     try {\n  253 |       this.term.element!.style.padding = props.padding;\n  254 |     } catch (error) {\n  255 |       console.log(error);\n  256 |     }"},{"ref":"lib/components/term.tsx:459-463","code":"  459 |     try {\n  460 |       this.term.element!.style.padding = this.props.padding;\n  461 |     } catch (error) {\n  462 |       console.log(error);\n  463 |     }"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"splitGroup / SESSION_ADD term-groups reducer dereferences findBySession(state, activeUid!)! with a non-null assertion. If activeUid refers to a session whose group is not yet present (out-of-order actions during rapid split creation), activeGroup is undefined and 'activeGroup.parentUid' throws inside the reducer, which would crash the whole dispatch.","fix":"Validate activeGroup is defined before use and return state unchanged (or fall back to a standalone group) if not.","locations":[{"ref":"lib/reducers/term-groups.ts:72-78","code":"   72 | const splitGroup = (state: ITermState, action: SessionAddAction) => {\n   73 |   const {splitDirection, uid, activeUid} = action;\n   74 |   const activeGroup = findBySession(state, activeUid!)!;\n   75 |   // If we're splitting in the same direction as the current active\n   76 |   // group's parent - or if it's the first split for that group -\n   77 |   // we want the parent to get another child:\n   78 |   let parentGroup = activeGroup.parentUid ? state.termGroups[activeGroup.parentUid] : activeGroup;"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"getDecorated checks `typeof class__.prototype.render !== 'function'` to validate a plugin's return value. If a plugin returns a function component (no prototype.render) or an object whose prototype is null, accessing class__.prototype.render throws a TypeError that is not caught here (the surrounding try only wraps the fn() call), crashing decoration instead of showing the intended 'Invalid return value' notification.","fix":"Guard the access: if (!class__ || typeof class__.prototype?.render !== 'function') and treat missing prototype as invalid.","locations":[{"ref":"lib/utils/plugins.ts:123-129","code":"  123 |         if (!class__ || typeof class__.prototype.render !== 'function') {\n  124 |           notify(\n  125 |             'Plugin error',\n  126 |             `${fn._pluginName}: Invalid return value of \\`${method}\\`. No \\`render\\` method found. Please return a \\`React.Component\\`.`\n  127 |           );\n  128 |           return;\n  129 |         }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"process.argv[1] is checked for help/version flags, but in a packaged Electron app argv[1] is not reliably the first user argument (it is often the path to the app or the main script). The intended flags (--help, -v, --version) are typically found elsewhere in process.argv, so this diagnostic branch will frequently never trigger, or trigger on the wrong argument.","fix":"Scan the whole process.argv array (e.g. process.argv.some((a) => ['--help','-v','--version'].includes(a))) rather than indexing a single fixed position.","locations":[{"ref":"app/index.ts:5-12","code":"    5 | if (['--help', '-v', '--version'].includes(process.argv[1])) {\n    6 |   // eslint-disable-next-line @typescript-eslint/no-var-requires\n    7 |   const {version} = require('./package');\n    8 |   console.log(`Hyper version ${version}`);\n    9 |   console.log('Hyper does not accept any command line arguments. Please modify the config file instead.');\n   10 |   console.log(`Hyper configuration file located at: ${cfgPath}`);\n   11 |   process.exit();\n   12 | }"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"Server.emit checks this.win.isDestroyed() before sending, but does not check this.wc (webContents) validity or whether wc is destroyed independently. After window close the webContents can be destroyed while the BrowserWindow wrapper transiently reports otherwise, and send() on a destroyed webContents throws.","fix":"Also guard with this.wc.isDestroyed() and wrap send() in try/catch.","locations":[{"ref":"app/rpc.ts:55-65","code":"   55 |   emit<U extends Exclude<keyof RendererEvents, FilterNever<RendererEvents>>>(ch: U): boolean;\n   56 |   emit<U extends FilterNever<RendererEvents>>(ch: U, data: RendererEvents[U]): boolean;\n   57 |   emit<U extends keyof RendererEvents>(ch: U, data?: RendererEvents[U]) {\n   58 |     // This check is needed because data-batching can cause extra data to be\n   59 |     // emitted after the window has already closed\n   60 |     if (!this.win.isDestroyed()) {\n   61 |       this.wc.send(this.id, {ch, data});\n   62 |       return true;\n   63 |     }\n   64 |     return false;\n   65 |   }"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"config.subscribe callback in updater is declared async and awaits getDecoratedConfigWithRetry(). isCanary(updateChannel) is called with updateChannel possibly undefined (config may not define updateChannel), which is fine for === comparison, but the async subscriber also means errors thrown by getDecoratedConfigWithRetry produce an unhandled promise rejection because subscribe does not await/catch its callbacks.","fix":"Wrap the async body in try/catch and log failures, or make the subscriber synchronous and handle the promise explicitly with .catch().","locations":[{"ref":"app/updater.ts:97-109","code":"   97 |   app.config.subscribe(async () => {\n   98 |     const {updateChannel} = await getDecoratedConfigWithRetry();\n   99 |     const newUpdateIsCanary = isCanary(updateChannel);\n  100 | \n  101 |     if (newUpdateIsCanary !== canaryUpdates) {\n  102 |       const feedURL = buildFeedUrl(newUpdateIsCanary, version);\n  103 | \n  104 |       autoUpdater.setFeedURL({url: feedURL});\n  105 |       void checkForUpdates();\n  106 | \n  107 |       canaryUpdates = newUpdateIsCanary;\n  108 |     }\n  109 |   });"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"existsOnNpm treats HTTP 200 the same as 404 as 'not found' in install(). got with responseType json rejects only on error status codes by default; a 200 means the package exists. Rejecting on statusCode===200 is contradictory and can never legitimately fire from a got rejection (200 is not an error), but if it ever does (e.g. via a thrown res in the .then), a found package would be reported as 'not found on npm'.","fix":"Remove the statusCode===200 branch; only treat 404 as not-found and surface other errors as connection failures.","locations":[{"ref":"cli/api.ts:103-108","code":"  103 |     .catch((err: any) => {\n  104 |       const {statusCode} = err;\n  105 |       if (statusCode && (statusCode === 404 || statusCode === 200)) {\n  106 |         return Promise.reject(`${plugin} not found on npm`);\n  107 |       }\n  108 |       return Promise.reject(`${err.message}\\nPlugin check failed. Check your internet connection or retry later.`);"},{"ref":"cli/api.ts:87-98","code":"   87 | function existsOnNpm(plugin: string) {\n   88 |   const name = getPackageName(plugin);\n   89 |   return got\n   90 |     .get<any>(registryUrl + name.toLowerCase(), {timeout: {request: 10000}, responseType: 'json'})\n   91 |     .then((res) => {\n   92 |       if (!res.body.versions) {\n   93 |         return Promise.reject(res);\n   94 |       } else {\n   95 |         return res;\n   96 |       }\n   97 |     });\n   98 | }"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"exec()/execFile() declare a `typeof options === 'function'` (and `typeof args === 'function'`) shorthand to support omitting options, but the parameters are typed as ExecOptions/ExecFileOptions and string[], so TypeScript callers cannot use the shorthand, and the spawn-style child_process callback signature is only partially emulated. More importantly the resolved value is destructured as {stdout, stderr} without checking it is defined; if the IPC handler resolves with undefined the destructure throws inside the promise callback and is swallowed.","fix":"Destructure defensively (const {stdout = '', stderr = ''} = result ?? {}) and align the runtime overloads with the declared types.","locations":[{"ref":"lib/utils/ipc-child-process.ts:5-14","code":"    5 | export function exec(command: string, options: ExecOptions, callback: (..._args: any) => void) {\n    6 |   if (typeof options === 'function') {\n    7 |     callback = options;\n    8 |     options = {};\n    9 |   }\n   10 |   ipcRenderer.invoke('child_process.exec', command, options).then(\n   11 |     ({stdout, stderr}) => callback?.(null, stdout, stderr),\n   12 |     (error) => callback?.(error, '', '')\n   13 |   );\n   14 | }"},{"ref":"lib/utils/ipc-child-process.ts:20-34","code":"   20 | export function execFile(file: string, args: string[], options: ExecFileOptions, callback: (..._args: any) => void) {\n   21 |   if (typeof options === 'function') {\n   22 |     callback = options;\n   23 |     options = {};\n   24 |   }\n   25 |   if (typeof args === 'function') {\n   26 |     callback = args;\n   27 |     args = [];\n   28 |     options = {};\n   29 |   }\n   30 |   ipcRenderer.invoke('child_process.execFile', file, args, options).then(\n   31 |     ({stdout, stderr}) => callback?.(null, stdout, stderr),\n   32 |     (error) => callback?.(error, '', '')\n   33 |   );\n   34 | }"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"notify() constructs `new Notification(title, {body})` on every call with no check that the Notification API is available or permission has been granted. In contexts where Notification permission is 'denied'/'default' this silently produces nothing or throws, and there is no fallback. The leading console.log of every notification is also noisy for what is meant to be a
