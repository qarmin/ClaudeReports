ef":"crates/oxc_transformer/src/common/helper_loader.rs:336-344","code":"  336 |     fn transform_for_external_helper(helper: Helper, ctx: &mut TraverseCtx<'a>) -> Expression<'a> {\n  337 |         static HELPER_VAR: &str = \"babelHelpers\";\n  338 | \n  339 |         let helper_var = ctx.ast.ident(HELPER_VAR);\n  340 |         let symbol_id = ctx.scoping().find_binding(ctx.current_scope_id(), helper_var);\n  341 |         let object = ctx.create_ident_expr(SPAN, helper_var, symbol_id, ReferenceFlags::Read);\n  342 |         let property = ctx.ast.identifier_name(SPAN, helper.name());\n  343 |         Expression::from(ctx.ast.member_expression_static(SPAN, object, property, false))\n  344 |     }","lines":9}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`debug_assert_token_ascii_only_and_no_linebreaks` validates `token()` input only in debug builds. In release, a `token()` containing non-ASCII or `\\n` / `\\t` is later printed through `print_bytes_unchecked` and counted with `text.len()` (byte length) as the column width (printer `print_text`, Token branch). A multi-byte or newline-containing token therefore corrupts width tracking and line-break decisions silently. Builders for `text()` similarly only debug-assert the no-`\\r` invariant.","fix":"Document the hard safety contract on `token()` (callers must guarantee ASCII, no line breaks/tabs) and audit call sites; consider a release-time assertion in the few non-hot construction paths, since a violated invariant produces silently wrong formatting rather than a clear failure.","locations":[{"ref":"crates/oxc_formatter_core/src/builders.rs:165-176","code":"  165 | #[inline]\n  166 | pub fn token(text: &'static str) -> Token {\n  167 |     debug_assert_token_ascii_only_and_no_linebreaks(text);\n  168 |     Token { text }\n  169 | }\n  170 | \n  171 | fn debug_assert_token_ascii_only_and_no_linebreaks(text: &str) {\n  172 |     debug_assert!(\n  173 |         text.as_bytes().iter().all(|&c| c.is_ascii() && !matches!(c, b'\\r' | b'\\n' | b'\\t')),\n  174 |         \"`FormatElement::Token` can only contain ASCII characters without line breaks or tab characters. Found invalid content: '{text}'\"\n  175 |     );\n  176 | }","lines":12},{"ref":"crates/oxc_formatter_core/src/printer/mod.rs:677-684","code":"  677 |         match text {\n  678 |             Text::Token(text) => {\n  679 |                 // SAFETY: `text` is a ASCII-only string\n  680 |                 unsafe {\n  681 |                     self.state.buffer.print_bytes_unchecked(text.as_bytes());\n  682 |                 }\n  683 |                 self.state.line_width += text.len();\n  684 |             }","lines":8}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`run_external_rules` converts a `*const Program` obtained from `Semantic` into a `&mut Program` via pointer provenance gymnastics. The code itself documents (lines 521-523) that the required invariant - `Program` being the last allocation in the same allocator chunk as `cursor_ptr` - is only enforced by convention at the call sites and 'strictly speaking it's unsound'. The debug_assert bounds checks (lines 529-530) do not run in release builds, so a future caller that supplies a `Semantic`/`Allocator` pair from different allocations would get UB with no detection.","fix":"Encapsulate the `Semantic`+`Allocator` pairing in a type that statically guarantees co-allocation (as the TODO suggests), or restructure external-rule execution to avoid needing `&mut Program` at all.","locations":[{"ref":"crates/oxc_linter/src/lib.rs:503-535","code":"  503 |         // Extract `Semantic` from `ContextHost`, and get a mutable reference to `Program`.\n  504 |         //\n  505 |         // It's not possible to obtain a `&mut Program` while `Semantic` exists, because `Semantic`\n  506 |         // contains `AstNodes`, which contains `AstKind`s for every AST nodes, each of which contains\n  507 |         // an immutable `&` ref to an AST node.\n  508 |         // Obtaining a `&mut Program` while `Semantic` exists would be illegal aliasing.\n  509 |         //\n  510 |         // So instead we get a pointer to `Program`.\n  511 |         // The pointer is obtained initially from `&Program` in `Semantic`, but that pointer\n  512 |         // has no provenance for mutation, so can't be converted to `&mut Program`.\n  513 |         // So create a new pointer to `Program` which inherits `cursor_ptr`'s provenance, which does allow mutation.\n  514 |         //\n  515 |         // We then drop `Semantic`, after which no references to any AST nodes remain.\n  516 |         // We can then safely convert the pointer to `&mut Program`.\n  517 |         //\n  518 |         // `Program` was created in `allocator`, and `Program` is the last thing to be allocated, so is in current chunk.\n  519 |         // So `cursor_ptr` and `Program` are within the same allocation.\n  520 |         // All callers of `Linter::run` obtain `allocator` and `Semantic` from `ModuleContent`,\n  521 |         // which ensure they are in same allocation.\n  522 |         // However, we have no static guarantee of this, so strictly speaking it's unsound.\n  523 |         // TODO: It would be better to avoid the need for a `&mut Program` here, and so avoid this\n  524 |         // sketchy behavior.\n  525 |         let ctx_host = Rc::get_mut(ctx_host).unwrap();\n  526 |         let semantic = mem::take(ctx_host.semantic_mut());\n  527 |         let program_addr = NonNull::from(semantic.nodes().program()).addr();\n  528 |         // Check `Program` is in `Allocator`'s current chunk\n  529 |         debug_assert!(program_addr >= allocator.cursor_ptr().addr());\n  530 |         debug_assert!(program_addr < allocator.data_end_ptr().addr());\n  531 |         let mut program_ptr = allocator.cursor_ptr().cast::<Program<'a>>().with_addr(program_addr);\n  532 |         drop(semantic);\n  533 |         // SAFETY: Now that we've dropped `Semantic`, no references to any AST nodes remain,\n  534 |         // so can get a mutable reference to `Program` without aliasing violations\n  535 |         let program = unsafe { program_ptr.as_mut() };","lines":33}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Tailwind class sorting allocates a fresh heap `String` for every emitted class run via `.to_string()` on each write path (string literal content, preserve-whitespace, and three template-element branches). For class-heavy files this is one allocation per class attribute/quasi even though the underlying text is already arena-resident `&str`. The collected strings are only ever read back for sorting.","fix":"Store `&'a str` (arena/source slices) or `Cow<'a, str>` in the tailwind-class collection instead of owned `String`s, allocating only for the rare normalized/trimmed cases, to avoid an allocation per class.","locations":[{"ref":"crates/oxc_formatter/src/utils/tailwindcss.rs:266","code":"  266 |         let index = f.context_mut().add_tailwind_class(content.to_string());","lines":1},{"ref":"crates/oxc_formatter/src/utils/tailwindcss.rs:293","code":"  293 |     let index = f.context_mut().add_tailwind_class(trimmed.to_string());","lines":1},{"ref":"crates/oxc_formatter/src/utils/tailwindcss.rs:330","code":"  330 |         let index = f.context_mut().add_tailwind_class(content.to_string());","lines":1},{"ref":"crates/oxc_formatter/src/utils/tailwindcss.rs:368","code":"  368 |         let index = f.context_mut().add_tailwind_class(trimmed.to_string());","lines":1}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Config::apply_overrides` is run on every linted file when any override exists. It collects the base rules into an `FxHashMap`, mutates it, then collects back into a `Vec`. This produces a non-deterministic rule 8 | \n  159 |         for override_config in overrides_to_apply.clone() {\n  160 |             if let Some(override_plugins) = override_config.plugins {\n  161 |                 plugins |= override_plugins;\n  162 |             }\n  163 |         }\n  164 | \n  165 |         let builtin_rule_plugins = Self::builtin_rule_plugins(plugins);\n  166 |         let mut rules = self\n  167 |             .base_rules\n  168 |             .iter()\n  169 |             .filter(|(rule, _)| {\n  170 |                 LintPlugins::try_from(rule.plugin_name())\n  171 |                     .is_ok_and(|plugin| builtin_rule_plugins.contains(plugin))\n  172 |             })\n  173 |             .cloned()\n  174 |             .collect::<FxHashMap<_, _>>();\n  175 | \n  176 |         let all_rules = RULES\n  177 |             .iter()\n  178 |             .filter(|rule| {\n  179 |                 LintPlugins::try_from(rule.plugin_name())\n  180 |                     .is_ok_and(|plugin| builtin_rule_plugins.contains(plugin))\n  181 |             })\n  182 |             .cloned()\n  183 |             .collect::<Vec<_>>();\n  184 | \n  185 |         // Build a hashmap of existing external rules keyed by rule id with value (options_id, severity)\n  186 |         let mut external_rules = self\n  187 |             .base\n  188 |             .external_rules\n  189 |             .iter()\n  190 |             .map(|&(rule_id, options_id, severity)| (rule_id, (options_id, severity)))\n  191 |             .collect::<FxHashMap<_, _>>();\n  192 | \n  193 |         // Track which plugins have already had their category rules applied.\n  194 |         // Start with the root plugins since they already have categories applied in base_rules.\n  195 |         let mut configured_plugins = self.base.config.plugins;\n  196 | \n  197 |         for override_config in overrides_to_apply {\n  198 |             if let Some(override_plugins) = override_config.plugins\n  199 |                 && override_plugins != plu pe_label":"Performance","severity":"low","easy":false,"description":"`DirectivesStore::report_unused` reads each file's full source from disk again via `std::fs::read_to_string` (falling back to an empty string on error) purely to wrap diagnostics with source context. The source text was already in memory during linting. On large projects this re-reads every file with a disable directive.","fix":"Carry the already-loaded source text (or a cheap handle to it) alongside the stored `DisableDirectives` so unused-directive diagnostics can be wrapped without a second disk read.","locations":[{"ref":"crates/oxc_linter/src/lint_runner.rs:91-109","code":"   91 |     pub fn report_unused(&self, severity: AllowWarnDeny, cwd: &Path, tx_error: &DiagnosticSender) {\n   92 |         use crate::create_unused_directives_diagnostics;\n   93 | \n   94 |         let map = self.map.lock().expect(\"DirectivesStore mutex poisoned in report_unused\");\n   95 |         for (path, directives) in map.iter() {\n   96 |             let diagnostics = create_unused_directives_diagnostics(directives, severity);\n   97 | \n   98 |             if !diagnostics.is_empty() {\n   99 |                 let source_text = std::fs::read_to_string(path.as_path()).unwrap_or_default();\n  100 |                 let wrapped = DiagnosticService::wrap_diagnostics(\n  101 |                     cwd,\n  102 |                     path.clone(),\n  103 |                     &source_text,\n  104 |                     diagnostics,\n  105 |                 );\n  106 |                 tx_error.send(wrapped).expect(\"failed to send unused directive diagnostics\");\n  107 |             }\n  108 |         }\n  109 |     }","lines":19}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"The `ReactLikeVisitor` prefilter allocates a `String` (via `to_string()`) for every variable declarator binding name and every assignment-target identifier name, even when the initializer/RHS is not a function or arrow and the name is never consulted. The name is only needed when the value is an anonymous function/arrow; the common case (any non-function declarator) pays an allocation for nothing. This runs on the whole program for every file that reaches the prefilter.","fix":"Defer the `to_string()` until a function/arrow value is actually encountered (e.g. store an `Option<&str>`/span and only allocate when needed), or only capture the name when `decl.init`/`expr.right` is a function or arrow expression.","locations":[{"ref":"crates/oxc_react_compiler/src/prefilter.rs:60-96","code":"   60 |     fn visit_variable_declarator(&mut self, decl: &VariableDeclarator<'a>) {\n   61 |         if self.found {\n   62 |             return;\n   63 |         }\n   64 | \n   65 |         let name = match &decl.id {\n   66 |             oxc_ast::ast::BindingPattern::BindingIdentifier(ident) => Some(ident.name.to_string()),\n   67 |             _ => None,\n   68 |         };\n   69 | \n   70 |         let prev_name = self.current_name.take();\n   71 |         self.current_name = name;\n   72 | \n   73 |         if let Some(init) = &decl.init {\n   74 |             self.visit_expression(init);\n   75 |         }\n   76 | \n   77 |         self.current_name = prev_name;\n   78 |     }\n   79 | \n   80 |     fn visit_assignment_expression(&mut self, expr: &oxc_ast::ast::AssignmentExpression<'a>) {\n   81 |         if self.found {\n   82 |             return;\n   83 |         }\n   84 | \n   85 |         let name = match &expr.left {\n   86 |             AssignmentTarget::AssignmentTargetIdentifier(ident) => Some(ident.name.to_string()),\n   87 |             _ => None,\n   88 |         };\n   89 | \n   90 |         let prev_name = self.current_name.take();\n   91 |         self.current_name = name;\n   92 | \n   93 |         self.visit_expression(&expr.right);\n   94 | \n   95 |         self.current_name = prev_name;\n   96 |     }","lines":37}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`check_class` allocates a one-element heap `Vec` (`vec![None]`) on every TypeScript class checked, purely to append a sentinel `None` to the element iterator for the `tuple_windows` overload-group scan. This runs for every non-declare TS class.","fix":"Replace `.chain(vec![None])` with `.chain(std::iter::once(None))` to avoid the allocation.","locations":[{"ref":"crates/oxc_semantic/src/checker/typescript.rs:208","code":"  208 |         for (a, b) in class.body.body.iter().map(Some).chain(vec![None]).tuple_windows() {","lines":1}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`add_root_unresolved_reference` clones `name` into the arena allocator unconditionally, even when an entry for that name already exists (the `entry` API takes the key by value). For programs with many repeated unresolved references to the same global (e.g. many `console.*` calls), this clones the identifier string into the arena once per occurrence instead of once per distinct name.","fix":"Look up the entry with `get_mut(name.as_str())` first and only `clone_in` the name when inserting a new key, mirroring the pattern used elsewhere for arena maps.","locations":[{"ref":"crates/oxc_semantic/src/scoping.rs:800-808","code":"  800 |     pub fn add_root_unresolved_reference(&mut self, name: Ident<'_>, reference_id: ReferenceId) {\n  801 |         self.cell.with_dependent_mut(|allocator, cell| {\n  802 |             let name = name.clone_in(allocator);\n  803 |             cell.root_unresolved_references\n  804 |                 .entry(name)\n  805 |                 .or_insert_with(|| ArenaVec::new_in(allocator))\n  806 |                 .push(reference_id);\n  807 |         });\n  808 |     }","lines":9}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"JSX `__source` line/column computation builds and rescans the source `Rope` per-offset. `get_line_column` lazily builds a `Rope` once (good), but `get_line_column(rope, offset, source_text)` performs an O(log n)+ lookup for every JSX opening element, and the code's own TODO acknowledges this is expensive. For files with many JSX elements in development mode this is repeated work that could be replaced by a precomputed line-start table giving O(log lines) lookups with far less constant overhead.","fix":"Build a sorted `Vec<u32>` of line-start byte offsets once on first use and binary-search it for line/column, as the existing TODO comment suggests, instead of relying on `Rope` per call.","locations":[{"ref":"crates/oxc_transformer/src/jsx/jsx_source.rs:81-87","code":"   81 |     pub fn get_line_column(&mut self, offset: u32, ctx: &TraverseCtx<'a>) -> (u32, u32) {\n   82 |         let source_rope =\n   83 |             self.source_rope.get_or_insert_with(|| Rope::from_str(ctx.state.source_text));\n   84 |         let (line, column) = get_line_column(source_rope, offset, ctx.state.source_text);\n   85 |         // line and column are zero-indexed, but we want 1-indexed\n   86 |         (line + 1, column + 1)\n   87 |     }","lines":7},{"ref":"crates/oxc_transformer/src/jsx/jsx_source.rs:122-125","code":"  122 |         // TODO: We shouldn't calculate line + column from scratch each time as it's expensive.\n  123 |         // Build a table of byte indexes of each line's start on first usage, and save it.\n  124 |         // Then calculate line and column from that.\n  125 |         let (line, column) = self.get_line_column(elem.span.start, ctx);","lines":4}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`convert_and_call_external_linter` builds two fresh `Vec<u32>` for every linted file by mapping over `external_rules` twice (`map(...).collect()` for rule ids and again for option ids), allocating on each file even though `external_rules` is a stable slice for the file's resolved config.","fix":"If the JS callback signature allows it, pass iterators/slices, or precompute and cache these id vectors per resolved config rather than per file.","locations":[{"ref":"crates/oxc_linter/src/lib.rs:790-793","code":"  790 |         let result = (external_linter.lint_file)(\n  791 |             path_string.to_owned(),\n  792 |             external_rules.iter().map(|(rule_id, _, _)| rule_id.raw()).collect(),\n  793 |             external_rules.iter().map(|(_, options_id, _)| options_id.raw()).collect(),","lines":4}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`get_component_name` walks all ancestors and ends with `unreachable!()` as the loop's final fallthrough. The `unreachable!()` at line 602 relies on always hitting an `is_parent_of_statement` ancestor before exhausting the iterator. This holds because the root is always a `Program`, but the contract is implicit; if `ctx.ancestors()` is ever called in a context detached from a statement (future refactor), this becomes a panic instead of returning `None`.","fix":"Replace the trailing `unreachable!()` with `assignment_name` (or `None`) so exhausting ancestors degrades gracefully instead of panicking.","locations":[{"ref":"crates/oxc_transformer/src/plugins/styled_components.rs:546-603","code":"  546 |     fn get_component_name(ctx: &TraverseCtx<'a>) -> Option<Str<'a>> {\n  547 |         let mut assignment_name = None;\n  548 | \n  549 |         for ancestor in ctx.ancestors() {\n  550 |             match ancestor {\n  551 |                 // `X = styled` or `X.prop = styled`\n  552 |                 Ancestor::AssignmentExpressionRight(assignment) => {\n  553 |                     assignment_name = match assignment.left() {\n  554 |                         // we've got an displayName (if we need it) no need to continue\n  555 |                         // However if this is an assignment expression like X = styled then we\n  556 |                         // want to keep going up incase there is Y = X = styled; in this case we\n  557 |                         // want to pick the outer name because react-refresh will add HMR variables\n  558 |                         // like this: X = _a = styled. We could also consider only doing this if the\n  559 |                         // name starts with an underscore.\n  560 |                         AssignmentTarget::AssignmentTargetIdentifier(ident) => {\n  561 |                             Some(ident.name.into())\n  562 |                         }\n  563 |                         AssignmentTarget::StaticMemberExpression(member) => {\n  564 |                             Some(member.property.name.into())\n  565 |                         }\n  566 |                         _ => return None,\n  567 |                     };\n  568 |                 }\n  569 |                 // `const X = styled`\n  570 |                 Ancestor::VariableDeclaratorInit(declarator) => {\n  571 |                     return if let BindingPattern::BindingIdentifier(ident) = &declarator.id() {\n  572 |                         Some(ident.name.into())\n  573 |                     } else {\n  574 |                         None\n  575 |                     };\n  576 |                 }\n  577 |                 // `const X = { Y: styled }`\n  578 |                 Ancestor::ObjectPropertyValue(property) => {\n  579 |                     return if let PropertyKey::StaticIdentifier(ident) = property.key() {\n  580 |                         Some(ident.name.into())\n  581 |                     } else {\n  582 |                         None\n  583 |                     };\n  584 |                 }\n  585 |                 // `class Y { (static) X = styled }`\n  586 |                 Ancestor::PropertyDefinitionValue(property) => {\n  587 |                     return if let PropertyKey::StaticIdentifier(ident) = property.key() {\n  588 | ed. A reader could plausibly assume a panic or wrong value.","fix":"Special-case `value == 0.0` to return 1 (plus sign handling), or add a comment explaining the `-inf as usize == 0` reliance.","locations":[{"ref":"crates/oxc_minifier/src/peephole/fold_constants.rs:352-364","code":"  352 |     fn approximate_printed_int_char_count(value: f64) -> usize {\n  353 |         let mut count = if value.is_infinite() {\n  354 |             \"Infinity\".len()\n  355 |         } else if value.is_nan() {\n  356 |             \"NaN\".len()\n  357 |         } else {\n  358 |             1 + value.abs().log10().floor() as usize\n  359 |         };\n  360 |         if value.is_sign_negative() {\n  361 |             count += 1;\n  362 |         }\n  363 |         count\n  364 |     }","lines":13}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"`get_offset_from_line_and_column` iterates over `rope.line(line)`, whose char sequence includes the trailing newline for non-final lines. The trailing comment 'If column equals the line length, return end-of-line byte offset' does not match the loop: when `column` exceeds the line's char length, the loop breaks (for the newline char, since `utf16_count > column` once the newline is counted) or runs off the end, and the returned offset can include or exclude the newline depending on the column value. The comment describes a single clean case that the code does not actually special-case.","fix":"Either clarify the comment to describe the actual clamping behavior, or explicitly clamp `column` to the line's char length (excluding the trailing newline) before computing the byte offset.","locations":[{"ref":"crates/oxc_data_structures/src/rope.rs:24-37","code":"   24 |     let line_text = rope.line(line);\n   25 |     let mut utf16_count = 0;\n   26 |     let mut byte_count = 0;\n   27 |     for ch in line_text.chars() {\n   28 |         utf16_count += ch.len_utf16();\n   29 gn_count, .. } if indent_style.is_tab() => {\n  856 |                 Indention::Level(level + align_count + 1)\n  857 |             }\n  858 |             Indention::Align { level: indent, align, align_count } => {\n  859 |                 Indention::Align { level: indent + 1, align, align_count }\n  860 |             }\n  861 |         }\n  862 |     }","lines":19}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The comment in `Linter::run_with_disable_directives` says 'Report unused directives is now handled differently with type-aware linting' immediately above code that *does* still report unused directives for partial-loader files, making the comment misleading about the surrounding block's behavior.","fix":"Clarify the comment to state that unused-directive reporting here is only for partial-loader (Vue/Astro/Svelte) files, while non-partial files are handled via the shared `DirectivesStore`.","locations":[{"ref":"crates/oxc_linter/src/lib.rs:454-461","code":"  454 |             // Report unused directives is now handled differently with type-aware linting\n  455 | \n  456 |             if let Some(severity) = self.options.report_unused_directive\n  457 |                 && severity.is_warn_deny()\n  458 |                 && is_partial_loader_file\n  459 |             {\n  460 |                 ctx_host.report_unused_directives(severity.into());\n  461 |             }","lines":8}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on `change_scope_parent_id` claims it 'will also remove the scope from the child list of the old parent and add it to the new parent', but the implementation only overwrites the scope's own `parent_ids` entry (there is no child list maintained, identical to `set_scope_parent_id`). The comment describes behavior the function does not perform.","fix":"Update the doc comment <div class="project-info"><div class="pi-name">oxc</div><div class="pi-row"><a class="pi-repo-btn" href="https://github.com/oxc-project/oxc" target="_blank" rel="noopener">&#128279; https://github.com/oxc-project/oxc</a><span><span class="pi-k">branch</span> <code>main</code></span><span><span class="pi-k">commit</span> <a href="https://github.com/oxc-project/oxc/commit/278329563950c3f02472f7c554b61f0f1f447ac0" target="_blank" rel="noopener"><code>2783295639</code></a></span></div></div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
