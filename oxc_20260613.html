<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"search_original_line_and_column indexes the per-line `columns` table with `original_column - byte_offset_to_first` without an upper-bounds check. The table is sized to cover the line up to (and including) its terminator / EOF, so for in-source spans it is safe; but any caller passing a `position` that lands past the recorded columns on a Unicode-containing line (e.g. a synthesized span end beyond the line's last recorded byte) would index out of bounds and panic. The neighbouring `add_source_mapping_for_name` already guards with a debug_assert on `span.end <= source.len()`, but this hot path has no such guard for the column dimension.","fix":"Clamp the column index to `columns.len() - 1` (or `.get(...).copied().unwrap_or(last)`) so an out-of-range position degrades to the last known column instead of panicking.","locations":[{"ref":"crates/oxc_codegen/src/sourcemap_builder.rs:127-136","code":"  127 |         let line = &self.line_offset_tables.lines[original_line];\n  128 |         let mut original_column = position - line.byte_offset_to_start_of_line;\n  129 |         if let Some(column_offsets_id) = line.column_offsets_id {\n  130 |             let column_offsets = &self.line_offset_tables.column_offsets[column_offsets_id];\n  131 |             if original_column >= column_offsets.byte_offset_to_first {\n  132 |                 original_column = column_offsets.columns\n  133 |                     [(original_column - column_offsets.byte_offset_to_first) as usize];\n  134 |             }\n  135 |         }\n  136 |         (original_line as u32, original_column)","lines":10}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"print_lossy_replacement reads `bytes.as_slice()[3..7]` assuming exactly 4 hex bytes always follow a U+FFFD escape marker when `lone_surrogates` is set. This relies entirely on the upstream invariant that every U+FFFD in a lone-surrogate string is followed by 4 ASCII hex digits. If that invariant is ever violated (e.g. a malformed/truncated lone-surrogate-encoded StringLiteral reaches codegen), this slice index panics instead of degrading gracefully.","fix":"Use a checked slice (`get(3..7)`) and fall back to printing the replacement char verbatim when fewer than 4 bytes follow, rather than indexing unconditionally.","locations":[{"ref":"crates/oxc_codegen/src/str.rs:654-693","code":"  654 |         if next2 == LOSSY_REPLACEMENT_CHAR_LAST_2_BYTES {\n  655 |             // Get the 4 hex bytes\n  656 |             let bytes = &mut state.bytes;\n  657 |             let hex: [u8; 4] = bytes.as_slice()[3..7].try_into().unwrap();\n  658 | \n  659 |             if hex == *b\"fffd\" {\n  660 |                 // Actual lossy replacement character.\n  661 |                 // Flush up to and including the lossy replacement character, then skip the 4 hex bytes.\n  662 |                 // SAFETY: 0xEF is always the start of a 3-byte Unicode character\n  663 |                 unsafe { state.consume_bytes_unchecked(3) };\n  664 |                 state.flush(codegen);\n  665 |                 // SAFETY: 0xEF is always the start of a 3-byte Unicode character.\n  666 |                 // `bytes.as_slice()[3..7]` would have panicked if there weren't 4 more bytes after it.\n  667 |                 // All those bytes are ASCII, so this leaves `bytes` on a UTF-8 char boundary.\n  668 |                 unsafe { state.consume_bytes_unchecked(4) };\n  669 |                 // Start next chunk after the 4 hex bytes\n  670 |                 state.start_chunk();\n  671 |                 return;\n  672 |             }\n  673 | \n  674 |             // Flush text before the lossy replacement character\n  675 |             state.flush(codegen);\n  676 | \n  677 |             // Check all 4 hex bytes are ASCII\n  678 |             assert_eq!(u32::from_ne_bytes(hex) & 0x8080_8080, 0);\n  679 | \n  680 |             // SAFETY: `bytes.as_slice()[3..7]` would have panicked if there weren't at least 7 bytes\n  681 |             // remaining. First 3 bytes are lossy replacement character, and we just checked that\n  682 |             // next 4 bytes are ASCII, so this leaves `bytes` on a UTF-8 char boundary.\n  683 |             unsafe { state.consume_bytes_unchecked(7) };\n  684 | \n  685 |             // Start next chunk after the 4 hex bytes\n  686 |             state.start_chunk();\n  687 | \n  688 |             codegen.print_str(\"\\\\u\");\n  689 |             // SAFETY: Just checked all 4 hex bytes are ASCII\n  690 |             unsafe { codegen.code.print_bytes_unchecked(&hex) };\n  691 | \n  692 |             return;\n  693 |         }","lines":40}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`GroupModes::unwrap_print_mode` panics (with a formatted message) when a `StartConditionalContent` / `StartIndentIfGroupBreaks` / `EndIndentIfGroupBreaks` references a group id that has not been seen yet. The printer's `print_element` calls this for `StartIndentIfGroupBreaks` (line 285) and `EndIndentIfGroupBreaks` (line 307) unconditionally, so a malformed IR with a dangling group id reference aborts the whole format with a panic instead of returning a `PrintError::InvalidDocument` like the other invalid-document paths in this file (`invalid_start_tag` / `invalid_end_tag`).","fix":"Make the indent-if-group-breaks paths fall back gracefully (e.g. treat a missing group mode as `Flat`, as the `FitsMeasurer` already does via `get_print_mode(...).unwrap_or_else(|| args.mode())`) or surface a `PrintError::InvalidDocument` rather than panicking.","locations":[{"ref":"crates/oxc_formatter_core/src/printer/mod.rs:802-806","code":"  802 |     fn unwrap_print_mode(&self, group_id: GroupId, next_element: &FormatElement) -> PrintMode {\n  803 |         self.get_print_mode(group_id).unwrap_or_else(|| {\n  804 |             panic!(\"Expected group with id {group_id:?} to exist but it wasn't present in the document. Ensure that a group with such a document appears in the document before the element {next_element:?}.\")\n  805 |         })\n  806 |     }","lines":5},{"ref":"crates/oxc_formatter_core/src/printer/mod.rs:284-313","code":"  284 |             FormatElement::Tag(StartIndentIfGroupBreaks(group_id)) => {\n  285 |                 let group_mode = self.state.group_modes.unwrap_print_mode(*group_id, element);\n  286 | \n  287 |                 if group_mode == PrintMode::Expanded {\n  288 |                     indent_stack.indent(self.options.indent_style);\n  289 |                 }\n  290 | \n  291 |                 stack.push(TagKind::IndentIfGroupBreaks, args);\n  292 |             }\n  293 | \n  294 |             FormatElement::Tag(StartLineSuffix) => {\n  295 |                 indent_stack.push_suffix(indent_stack.indention());\n  296 |                 self.state.line_suffixes.extend(args, queue.iter_content(TagKind::LineSuffix));\n  297 |             }\n  298 |             FormatElement::Tag(tag @ (StartLabelled(_) | StartEntry)) => {\n  299 |                 stack.push(tag.kind(), args);\n  300 |             }\n  301 |             FormatElement::Tag(\n  302 |                 tag @ (EndLabelled | EndEntry | EndGroup | EndConditionalContent | EndFill),\n  303 |             ) => {\n  304 |                 stack.pop(tag.kind())?;\n  305 |             }\n  306 |             FormatElement::Tag(tag @ EndIndentIfGroupBreaks(group_id)) => {\n  307 |                 if self.state.group_modes.unwrap_print_mode(*group_id, element)\n  308 |                     == PrintMode::Expanded\n  309 |                 {\n  310 |                     indent_stack.pop();\n  311 |                 }\n  312 |                 stack.pop(tag.kind())?;\n  313 |             }","lines":30}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"`character_to_string` calls `char::from_u32(cp).expect(\"Invalid surrogate pair `Character`!\")` after combining a lead+trail surrogate pair during Display. The combine is only guarded by `is_lead_surrogate`/`is_trail_surrogate` range checks; if the AST were ever constructed with a `Character` value that is itself outside the BMP yet flagged as a surrogate (e.g. via direct AST mutation rather than the parser), this `expect` would panic in the Display path. Parser-produced ASTs cannot hit this, so impact is limited to external AST construction.","fix":"Fall back to emitting `\\u{X}` escapes when `char::from_u32` returns `None` instead of unwrapping, making Display total over all `Character` values.","locations":[{"ref":"crates/oxc_regular_expression/src/ast_impl/display.rs:308-321","code":"  308 |         if is_lead_surrogate(cp) {\n  309 |             if let Some(peek) = peek.filter(|peek| is_trail_surrogate(peek.value)) {\n  310 |                 // Lead+Trail\n  311 |                 let cp = combine_surrogate_pair(cp, peek.value);\n  312 |                 let ch = char::from_u32(cp).expect(\"Invalid surrogate pair `Character`!\");\n  313 |                 return (Cow::Owned(format!(\"{ch}\")), true);\n  314 |             }\n  315 | \n  316 |             // Lead only\n  317 |             return (Cow::Owned(format!(r\"\\u{cp:X}\")), false);\n  318 |         }\n  319 |     }\n  320 | \n  321 |     let ch = char::from_u32(cp).expect(\"Invalid `Character`!\");","lines":14}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`FunctionReturnType::return_statement_count` is a `u8`. `visit_return_statement` increments it for every `return` it visits, with no cap. A function body with 256 or more `return` statements overflows the counter: in debug builds this panics, and in release builds it wraps to 0. After wrapping, the `return_statement_count > 1` checks used to decide whether to union the inferred type with `undefined` produce wrong results, so the emitted `.d.ts` return type can be silently incorrect.","fix":"Use a wider integer (`u32`) for `return_statement_count`, or saturate the counter (`self.return_statement_count = self.return_statement_count.saturating_add(1)`), since only the distinction between 0, 1 and >1 matters.","locations":[{"ref":"crates/oxc_isolated_declarations/src/return_type.rs:47","code":"   47 |     return_statement_count: u8,","lines":1},{"ref":"crates/oxc_isolated_declarations/src/return_type.rs:156-171","code":"  156 |     fn visit_return_statement(&mut self, stmt: &ReturnStatement<'a>) {\n  157 |         self.return_statement_count += 1;\n  158 |         if self.return_statement_count > 1 {\n  159 |             if let Some(expr) = &self.return_expression {\n  160 |                 // if last return statement is not empty, we can't infer return type\n  161 |                 if expr.is_some() {\n  162 |                     self.return_expression = None;\n  163 |                     return;\n  164 |                 }\n  165 |             } else {\n  166 |                 return;\n  167 |             }\n  168 |         }\n  169 | \n  170 |         self.return_expression = Some(stmt.argument.clone_in(self.ast.allocator));\n  171 |     }","lines":16}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`consume_decimal_escape` returns `index as u32` after truncating the `u64` produced by `consume_decimal_digits`. For a back-reference whose decimal value exceeds `u32::MAX` but stays within the `u64` overflow guard (e.g. `\\4294967297`), the truncation yields a small number (here `1`). In unicode mode this truncated index is then compared against `num_of_capturing_groups`, so a deliberately huge index can be accepted as a valid `IndexedReference` instead of being rejected as out of range.","fix":"Reject values larger than `u32::MAX` before truncating (return the out-of-range path / rewind), e.g. `let Ok(index) = u32::try_from(index) else { self.reader.rewind(checkpoint); return Ok(None); };`.","locations":[{"ref":"crates/oxc_regular_expression/src/parser/pattern_parser/pattern_parser_impl.rs:1785-1799","code":" 1785 |     fn consume_decimal_escape(&mut self) -> Result<Option<u32>> {\n 1786 |         let checkpoint = self.reader.checkpoint();\n 1787 | \n 1788 |         if let Some(index) = self.consume_decimal_digits()? {\n 1789 |             // \\0 is CharacterEscape, not DecimalEscape\n 1790 |             if index != 0 {\n 1791 |                 #[expect(clippy::cast_possible_truncation)]\n 1792 |                 return Ok(Some(index as u32));\n 1793 |             }\n 1794 | \n 1795 |             self.reader.rewind(checkpoint);\n 1796 |         }\n 1797 | \n 1798 |         Ok(None)\n 1799 |     }","lines":15}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`Span::sized(start, size)` computes `start + size` with a plain (non-saturating, non-checked) addition. Every other arithmetic constructor on `Span` (`expand`, `shrink`, `move_left`, `move_right`, etc.) uses saturating arithmetic, but `sized` does not. If `start + size` exceeds `u32::MAX` this panics in debug builds and silently wraps in release builds, producing a `Span` whose `end < start` (violating the type's documented invariant), which then yields a reversed/garbage byte range when used to index source text.","fix":"Use `start.saturating_add(size)` (or `checked_add` with a documented panic), matching the saturating behavior of the other `Span` constructors.","locations":[{"ref":"crates/oxc_span/src/span.rs:141-143","code":"  141 |     pub const fn sized(start: u32, size: u32) -> Self {\n  142 |         Self::new(start, start + size)\n  143 |     }","lines":3}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"In `grow_amortized`, `cmp::max((self.capacity_u32() as usize) * 2, required_cap)` doubles capacity. For zero-sized types `capacity_u32()` returns `u32::MAX`, so on 32-bit platforms `u32::MAX as usize * 2` overflows `usize` (panics in debug, wraps in release) before the `alloc_guard` check that the comment says will catch overflow. This is inherited bumpalo-derived code; oxc does not currently allocate ZST `Vec`s on 32-bit targets, so impact is negligible, but the comment's claim that the guard catches the overflow is inaccurate because the wrap happens first.","fix":"Use `saturating_mul` / `checked_mul` for the doubling, or special-case ZSTs before the multiply, so the capacity-overflow path is reached deterministically on 32-bit.","locations":[{"ref":"crates/oxc_allocator/src/vec2/raw_vec.rs:739-744","code":"  739 |             let required_cap =\n  740 |                 (len as usize).checked_add(additional).ok_or(AllocError::CapacityOverflow)?;\n  741 | \n  742 |             // This guarantees exponential growth. The doubling cannot overflow\n  743 |             // because `cap <= isize::MAX` and the type of `cap` is `u32`.\n  744 |             let cap = cmp::max((self.capacity_u32() as usize) * 2, required_cap);","lines":6}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"`compute_layout` accumulates the total allocation size with unchecked `+=` (`size = (size + align - 1) & ...; size += size_of * cap`). Only the per-field `size_of::<T>() * cap` product is guarded by `checked_mul`; the running `size` sum across multiple fields and the alignment round-up are not checked. With several large fields and a near-`u32::MAX` capacity this could wrap before `Layout::from_size_align` validates it. Practically unreachable given current field sizes and index ranges, but the asymmetry (one product checked, the sum unchecked) is a latent soundness gap in unsafe allocation code.","fix":"Use `checked_add` for the running `size` accumulation (and the alignment round-up) and return `None`/panic on overflow, consistent with the existing `checked_mul`.","locations":[{"ref":"crates/oxc_semantic/src/multi_index_vec.rs:77-86","code":"   77 |                 let mut size = 0usize;\n   78 |                 let mut max_align = 1usize;\n   79 |                 $(\n   80 |                     let align = ::core::mem::align_of::<$fty>();\n   81 |                     if align > max_align { max_align = align; }\n   82 |                     size = (size + align - 1) & !(align - 1);\n   83 |                     size += ::core::mem::size_of::<$fty>().checked_mul(cap).expect(\"capacity overflow\");\n   84 |                 )*\n   85 |                 Some(::core::alloc::Layout::from_size_align(size, max_align).expect(\"invalid layout\"))\n   86 |             }","lines":10}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`parseFloat` constant folding incorrectly accepts numeric separators (`_`), which are not part of the spec's StrDecimalLiteral grammar. `match_decimal_digits` treats `_` as a valid digit separator, so `parseFloat(\"1_1\")` folds to the prefix `\"1_1\"`, strips the underscore, and yields `11`. Real JS `parseFloat(\"1_1\")` is `1` (it stops at the underscore). This is a miscompilation that changes program output.","fix":"Remove the `b'_'` handling from `match_decimal_digits` entirely (and the `cow_replace('_', \"\")` at line 690). The parseFloat StrDecimalLiteral grammar has no numeric separators, so the prefix must stop at the first `_`.","locations":[{"ref":"crates/oxc_ecmascript/src/constant_evaluation/call_expr.rs:704-728","code":"  704 |     fn match_decimal_digits(s: &str) -> Option<usize> {\n  705 |         let bytes = s.as_bytes();\n  706 |         if bytes.first().is_none_or(|b| !b.is_ascii_digit()) {\n  707 |             // must have at least one digit\n  708 |             return None;\n  709 |         }\n  710 |         let mut iter = bytes.iter().enumerate().skip(1);\n  711 |         while let Some((i, &b)) = iter.next() {\n  712 |             match b {\n  713 |                 b'0'..=b'9' => {}\n  714 |                 b'_' => {\n  715 |                     let Some((i, &b)) = iter.next() else {\n  716 |                         // must have at least one digit after _\n  717 |                         return Some(i); // without _\n  718 |                     };\n  719 |                     if !b.is_ascii_digit() {\n  720 |                         // must have at least one digit after _\n  721 |                         return Some(i); // without _\n  722 |                     }\n  723 |                 }\n  724 |                 _ => return Some(i),\n  725 |             }\n  726 |         }\n  727 |         Some(s.len())\n  728 |     }","lines":25},{"ref":"crates/oxc_ecmascript/src/constant_evaluation/call_expr.rs:690-695","code":"  690 |     let parsed = trimmed_prefix.cow_replace('_', \"\").parse::<f64>().unwrap_or_else(|_| {\n  691 |         unreachable!(\n  692 |             \"StrDecimalLiteral should be parse-able with Rust FromStr for f64: {trimmed_prefix}\"\n  693 |         )\n  694 |     });\n  695 |     Some(ConstantValue::Number(parsed))","lines":6}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`String.prototype.indexOf`/`lastIndexOf` constant folding mixes byte offsets and char counts and ignores UTF-16 semantics. In `index_of`, `find` returns a byte offset into the char-collected suffix, which is then added to `from_index` (a char count). `\"ééx\".indexOf(\"x\", 1)` returns 3 instead of the JS result 2. JS indexOf returns UTF-16 code unit indices, so the result is wrong for any non-ASCII string.","fix":"Compute indices over UTF-16 code units (encode_utf16) consistently, or bail out (return None / leave the call un-folded) when either the receiver or the search string contains non-ASCII characters.","locations":[{"ref":"crates/oxc_ecmascript/src/string_index_of.rs:11-18","code":"   11 |     fn index_of(&self, search_value: Option<&str>, from_index: Option<f64>) -> isize {\n   12 |         let from_index = from_index.map_or(0, |x| x.to_int_32().max(0)) as usize;\n   13 |         let Some(search_value) = search_value else {\n   14 |             return -1;\n   15 |         };\n   16 |         let result = self.chars().skip(from_index).collect::<String>().find(search_value);\n   17 |         result.map(|index| index + from_index).map_or(-1, |index| index as isize)\n   18 |     }","lines":8},{"ref":"crates/oxc_ecmascript/src/string_last_index_of.rs:11-20","code":"   11 |     fn last_index_of(&self, search_value: Option<&str>, from_index: Option<f64>) -> isize {\n   12 |         let Some(search_value) = search_value else { return -1 };\n   13 |         let from_index =\n   14 |             from_index.map_or(usize::MAX, |x| x.to_int_32().max(0) as usize + search_value.len());\n   15 |         self.chars()\n   16 |             .take(from_index)\n   17 |             .collect::<String>()\n   18 |             .rfind(search_value)\n   19 |             .map_or(-1, |index| index as isize)\n   20 |     }","lines":10}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`String.prototype.substring` constant folding operates on the wrong index space. JS `substring` indexes by UTF-16 code units, but `substring()` clamps `start`/`end` against `self.len()` (byte length) and then slices with `chars().skip(start).take(end-start)` (Unicode scalar values). For non-ASCII input the result is wrong, e.g. `\"𝟙abc\".substring(0,2)` produces `\"𝟙a\"` instead of `\"𝟙\"`. The bailout in `try_fold_string_substring_or_slice` only compares against byte `len()`, so it does not catch the mismatch.","fix":"Operate on UTF-16 code units: convert the string to a Vec<u16> (or compute UTF-16 length), clamp start/end to that length, slice the UTF-16 units, and re-decode. Alternatively bail out (return None) whenever the string is not all-ASCII.","locations":[{"ref":"crates/oxc_ecmascript/src/string_substring.rs:11-20","code":"   11 |     fn substring(&self, start: Option<f64>, end: Option<f64>) -> String {\n   12 |         let start = start.map_or(0, |x| x.to_int_32().max(0) as usize);\n   13 |         let end = end.map_or(usize::MAX, |x| x.to_int_32().max(0) as usize);\n   14 |         let start = start.min(self.len());\n   15 |         let end = end.min(self.len());\n   16 |         if start > end {\n   17 |             return String::new();\n   18 |         }\n   19 |         self.chars().skip(start).take(end - start).collect()\n   20 |     }","lines":10},{"ref":"crates/oxc_ecmascript/src/constant_evaluation/call_expr.rs:166-201","code":"  166 | fn try_fold_string_substring_or_slice<'a>(\n  167 |     args: &Vec<'a, Argument<'a>>,\n  168 |     object: &Expression<'a>,\n  169 |     ctx: &impl ConstantEvaluationCtx<'a>,\n  170 | ) -> Option<ConstantValue<'a>> {\n  171 |     if args.len() > 2 {\n  172 |         return None;\n  173 |     }\n  174 |     let Expression::StringLiteral(s) = object else { return None };\n  175 |     let start_idx = match args.first() {\n  176 |         Some(Argument::SpreadElement(_)) => return None,\n  177 |         Some(arg @ match_expression!(Argument)) => {\n  178 |             Some(arg.to_expression().get_side_free_number_value(ctx)?)\n  179 |         }\n  180 |         None => None,\n  181 |     };\n  182 |     let end_idx = match args.get(1) {\n  183 |         Some(Argument::SpreadElement(_)) => return None,\n  184 |         Some(arg @ match_expression!(Argument)) => {\n  185 |             Some(arg.to_expression().get_side_free_number_value(ctx)?)\n  186 |         }\n  187 |         None => None,\n  188 |     };\n  189 |     if start_idx.is_some_and(|start| start > s.value.len() as f64 || start < 0.0)\n  190 |         || end_idx.is_some_and(|end| end > s.value.len() as f64 || end < 0.0)\n  191 |     {\n  192 |         return None;\n  193 |     }\n  194 |     if let (Some(start), Some(end)) = (start_idx, end_idx)\n  195 |         && start > end\n  196 |     {\n  197 |         return None;\n  198 |     }\n  199 | \n  200 |     Some(ConstantValue::String(Cow::Owned(s.value.as_str().substring(start_idx, end_idx))))\n  201 | }","lines":36}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In `Backend::initialized`, the inner loop over `known_uris` (which runs diagnostics on every open file) is nested inside the outer loop over `needed_configurations.values()`. The inner loop does not use the outer `worker` variable at all - it independently calls `get_worker_for_uri(uri)` for each URI. So with N workers needing configuration and M open files, diagnostics are computed N*M times instead of M times, and each file's diagnostics are pushed into `new_diagnostics` N times, causing duplicate diagnostics to be published. The diagnostics pass should run once after all workers are started, not once per worker.","fix":"Move the `for uri in &known_uris { ... }` block out of the `for (index, worker) in needed_configurations.values()...` loop so it runs once after every worker has been started.","locations":[{"ref":"crates/oxc_language_server/src/backend.rs:221-254","code":"  221 |             for (index, worker) in needed_configurations.values().copied().enumerate() {\n  222 |                 // get the configuration from the response and start the worker\n  223 |                 let configuration = configurations.get(index).unwrap_or(&serde_json::Value::Null);\n  224 |                 debug!(\"starting worker in initialize with options: {configuration:?}\");\n  225 |                 worker.start_worker(configuration.clone()).await;\n  226 | \n  227 |                 // run diagnostics for all known files in the workspace of the worker.\n  228 |                 // This is necessary because the worker was not started before.\n  229 |                 // On Pull diagnostic model, we will ask the client to refresh diagnostics instead of sending them all.\n  230 |                 if capabilities.diagnostic_mode != DiagnosticMode::Push {\n  231 |                     continue;\n  232 |                 }\n  233 | \n  234 |                 for uri in &known_uris {\n  235 |                     // Check if this worker is the most specific one for this URI\n  236 |                     let Some(worker) = self.worker_manager.get_worker_for_uri(uri).await else {\n  237 |                         continue;\n  238 |                     };\n  239 |                     let document = self.file_system.get_document(uri);\n  240 |                     let diagnostics = worker.run_diagnostic(&document).await;\n  241 |                     match diagnostics {\n  242 |                         Err(err) => {\n  243 |                             error!(\n  244 |                                 \"running diagnostics for {} failed: {err}\",\n  245 |                                 document.uri.as_str()\n  246 |                             );\n  247 |                             if self.capabilities.get().is_some_and(|cap| cap.show_message) {\n  248 |                                 self.client.show_message(MessageType::ERROR, err).await;\n  249 |                             }\n  250 |                         }\n  251 |                         Ok(diagnostics) => new_diagnostics.extend(diagnostics),\n  252 |                     }\n  253 |                 }\n  254 |             }","lines":34}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`neighbors_filtered_by_edge_weight` pushes the initial `node` onto the work queue but never inserts it into the `visited` set (only targets discovered via edges are inserted at line 50). If any edge points back to the start node (e.g. a loop whose header is the start block, common in CFGs), the start node is re-visited and the visitor closure is invoked on it a second time with a path-derived state, producing incorrect aggregated states. This utility is used by several lint rules (no_this_before_super, constructor_super, no_fallthrough, require_render_return).","fix":"Insert the start node into `visited` before/when it is pushed onto `q` (e.g. `visited.insert(node);` alongside the initial `q.push((node, new_state));`).","locations":[{"ref":"crates/oxc_cfg/src/visit.rs:27-60","code":"   27 |     let (new_state, keep_walking_this_path) = visitor(&node, Default::default());\n   28 |     // if we will continue walking push this node\n   29 |     if keep_walking_this_path {\n   30 |         q.push((node, new_state));\n   31 |     } else {\n   32 |         final_states.push(new_state);\n   33 |     }\n   34 | \n   35 |     while let Some((graph_ix, state)) = q.pop() {\n   36 |         let mut edges = 0;\n   37 | \n   38 |         for edge in graph.edges_directed(graph_ix, Direction::Outgoing) {\n   39 |             if visited.contains(&edge.target()) {\n   40 |                 continue;\n   41 |             }\n   42 |             if let Some(result_of_edge_filtering) = edge_filter(edge.weight()) {\n   43 |                 final_states.push(result_of_edge_filtering);\n   44 |             } else {\n   45 |                 let target = edge.target();\n   46 |                 let (new_state, keep_walking_this_path) = visitor(&target, state.clone());\n   47 |                 visited.insert(target);\n   48 |                 if keep_walking_this_path {\n   49 |                     q.push((target, new_state.clone()));\n   50 |                 } else {\n   51 |                     final_states.push(new_state.clone());\n   52 |                 }\n   53 |                 edges += 1;\n   54 |             }\n   55 |         }\n   56 | \n   57 |         if edges == 0 {\n   58 |             final_states.push(state);\n   59 |         }\n   60 |     }","lines":34}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"print_comments_in_range iterates FxHashMap keys with `find` and only prints the comments attached to the single, arbitrarily-ordered key it happens to encounter first. When more than one comment key falls in the (start, end) range, all but one are silently dropped, and which one survives is nondeterministic across runs (HashMap iteration order). Used for `{ /*a*/ /*b*/ ...spread }` JSX attributes, where multiple leading comments before the spread argument get dropped/reordered.","fix":"Collect every key in the range (sorted ascending), remove and print them in source order, instead of `keys().find(...)` over a single key.","locations":[{"ref":"crates/oxc_codegen/src/comment.rs:219-231","code":"  219 |     pub(crate) fn print_comments_in_range(&mut self, start: u32, end: u32) -> bool {\n  220 |         if self.comments.is_empty() {\n  221 |             return false;\n  222 |         }\n  223 |         // Find and remove the first key in the range.\n  224 |         let key = self.comments.keys().find(|&&k| k > start && k < end).copied();\n  225 |         if let Some(key) = key {\n  226 |             let comments = self.comments.remove(&key).unwrap();\n  227 |             self.print_comments(&comments);\n  228 |             return true;\n  229 |         }\n  230 |         false\n  231 |     }","lines":13},{"ref":"crates/oxc_codegen/src/gen.rs:2693-2703","code":" 2693 | impl Gen for JSXSpreadAttribute<'_> {\n 2694 |     fn r#gen(&self, p: &mut Codegen, _ctx: Context) {\n 2695 |         p.print_ascii_byte(b'{');\n 2696 |         if p.print_comments_in_range(self.span.start, self.argument.span().start) {\n 2697 |             p.print_indent();\n 2698 |         }\n 2699 |         p.print_str(\"...\");\n 2700 |         self.argument.print_expr(p, Precedence::Comma, Context::empty());\n 2701 |         p.print_ascii_byte(b'}');\n 2702 |     }\n 2703 | }","lines":11}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"JSX attribute string value is emitted by picking a single quote char (single quote if the value contains `\"`, double otherwise) and then printing the raw value with no escaping. When the value contains BOTH `'` and `\"` (e.g. parsed value `x'\"y`), it selects single quote because the value contains `\"`, then prints the unescaped `'`, prematurely terminating the attribute and producing invalid/broken JSX output.","fix":"When the value contains both quote characters, escape the chosen quote (or emit the value via a JSX expression container `{\"...\"}`) so the output round-trips.","locations":[{"ref":"crates/oxc_codegen/src/gen.rs:2682-2687","code":" 2682 |             Self::StringLiteral(lit) => {\n 2683 |                 let quote = if lit.value.contains('\"') { b'\\'' } else { b'\"' };\n 2684 |                 p.print_ascii_byte(quote);\n 2685 |                 p.print_str(&lit.value);\n 2686 |                 p.print_ascii_byte(quote);\n 2687 |             }","lines":6}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`JavaScriptSource::as_str` (and `as_ref`, which delegates to it) slices the section text by `self.start`, but `source_text` is already the section slice extracted by the partial loaders while `start` is the offset of that section within the *original* file (e.g. vue.rs returns `&source_text[js_start..js_end]` with `start = js_start`). For any embedded script not at file offset 0 this produces a wrong substring, and panics with an out-of-bounds slice whenever `start > section_len`. The methods are currently unused by the engine (runtime.rs reads `section_source.source_text` directly), so this is a latent footgun rather than an active crash.","fix":"Either delete `as_str`/`as_ref` (they are dead and incorrect), or return `self.source_text` unchanged since the field already holds only the section text. Do not re-slice by `start`.","locations":[{"ref":"crates/oxc_linter/src/loader/source.rs:49-58","code":"   49 |     pub fn as_str(&self) -> &'a str {\n   50 |         &self.source_text[(self.start as usize)..]\n   51 |     }\n   52 | }\n   53 | \n   54 | impl AsRef<str> for JavaScriptSource<'_> {\n   55 |     fn as_ref(&self) -> &str {\n   56 |         self.as_str()\n   57 |     }\n   58 | }","lines":10},{"ref":"crates/oxc_linter/src/loader/partial_loader/vue.rs:86-89","code":"   86 |         let source_text = &self.source_text[js_start..js_end];\n   87 |         // NOTE: loader checked that source_text.len() is less than u32::MAX\n   88 |         #[expect(clippy::cast_possible_truncation)]\n   89 |         Some(JavaScriptSource::partial_with_framework_options(","lines":4}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `find_jsx_pragma`, the preceding-character check that prevents matching pragmas inside inline code spans only inspects the byte immediately before `@`. After a non-`@jsx` `@`-prefixed token is skipped via `get_unchecked(at_sign_index + 1..)`, subsequent `@` scans compute `at_sign_index` relative to the *trimmed* slice, so `comment_str.as_bytes()[at_sign_index - 1]` reads the byte before `@` within the trimmed slice — which is correct — but when a quasi/comment begins exactly at an `@` that was produced by trimming (at_sign_index == 0), the guard at line 117 is skipped entirely, allowing a pragma to be recognized even when the original preceding char (now removed) was a non-whitespace like a backtick. e.g. `` `x@jsx h` `` is split after the first non-matching `@`-less scan and can mis-recognize. This weakens the backtick-guard the function intends to enforce.","fix":"Track the absolute position into the original comment (or pass the original preceding byte along when re-slicing) so the preceding-character check uses the true previous byte rather than treating any trim point as start-of-comment.","locations":[{"ref":"crates/oxc_transformer/src/jsx/comments.rs:117-137","code":"  117 |         if at_sign_index > 0 {\n  118 |             let prev_byte = comment_str.as_bytes()[at_sign_index - 1];\n  119 |             if !matches!(prev_byte, b' ' | b'\\t' | b'\\r' | b'\\n' | b'*') {\n  120 |                 // SAFETY: Byte at `at_sign_index` is `@`, so `at_sign_index + 1` is either within\n  121 |                 // string or end of string, and on a UTF-8 char boundary.\n  122 |                 comment_str = unsafe { comment_str.get_unchecked(at_sign_index + 1..) };\n  123 |                 continue;\n  124 |             }\n  125 |         }\n  126 | \n  127 |         // Check `@` is start of `@jsx`.\n  128 |         // Note: Checking 4 bytes including leading `@` is faster than checking the 3 bytes after `@`,\n  129 |         // because 4 bytes is a `u32`.\n  130 |         let next4 = comment_str.as_bytes().get(at_sign_index..at_sign_index + 4)?;\n  131 |         if next4 != b\"@jsx\" {\n  132 |             // Not `@jsx`. Trim off up to and including `@` and search again.\n  133 |             // SAFETY: Byte at `at_sign_index` is `@`, so `at_sign_index + 1` is either within string\n  134 |             // or end of string, and on a UTF-8 char boundary.\n  135 |             comment_str = unsafe { comment_str.get_unchecked(at_sign_index + 1..) };\n  136 |             continue;\n  137 |         }","lines":21}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"print_minified_number applies the trailing-zero-to-exponent rewrite (`base + 'e' + len`) on a candidate that may already be in scientific notation (already contains an `e`). The length guard prevents the rewrite from being committed in the cases observed, but the transformation itself is unsound for `e`-containing strings (it would treat exponent digits as mantissa trailing zeros, e.g. conceptually `1e30` -> `1e3` + `e1`). The correctness currently rests entirely on the `expected_len < best_candidate.len()` guard never being satisfied for such inputs, which is fragile.","fix":"Skip the trailing-zero rewrite when `best_candidate` already contains an `e`/`x`, mirroring the explicit `!is_hex` guard already present for hex.","locations":[{"ref":"crates/oxc_codegen/src/lib.rs:928-943","code":"  928 |         // Check for numbers ending with zeros (but not hex numbers)\n  929 |         // The `!is_hex` check is necessary to prevent hex numbers like `0x8000000000000000`\n  930 |         // from being incorrectly converted to scientific notation\n  931 |         if !is_hex\n  932 |             && best_candidate.ends_with('0')\n  933 |             && let Some(len) = best_candidate.bytes().rev().position(|c| c != b'0')\n  934 |         {\n  935 |             let base = &best_candidate[0..best_candidate.len() - len];\n  936 |             let exp_str_len = itoa::Buffer::new().format(len).len();\n  937 |             // Calculate expected length: base + 'e' + len\n  938 |             let expected_len = base.len() + 1 + exp_str_len;\n  939 |             if expected_len < best_candidate.len() {\n  940 |                 best_candidate = format!(\"{base}e{len}\").into();\n  941 |                 debug_assert_eq!(best_candidate.len(), expected_len);\n  942 |             }\n  943 |         }","lines":16}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Number.isInteger`/`Number.isSafeInteger` folding uses `extracted.fract().abs() < f64::EPSILON` instead of `== 0.0`. f64::EPSILON (~2.22e-16) is an absolute threshold that is meaningless for large magnitudes and can misclassify near-integer literals. Since only numeric literals reach this path their fract is exact, so `== 0.0` is both correct and simpler; the epsilon test risks classifying a non-integer with a tiny fractional part as an integer.","fix"                  value\n  255 |                 };\n  256 |                 return Some(value);\n  257 |             }\n  258 |         };","lines":13}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`transform_import_declaration` returns `None` (drops the import entirely) whenever `decl.specifiers` is `None`. A side-effect-only import such as `import \"./styles.css\";` has no specifiers and is therefore silently removed from the generated `.d.ts`. TypeScript's declaration emit preserves side-effect imports, so dropping them can change the module's evaluation semantics for consumers of the declarations.","fix":"When `decl.specifiers` is `None`, clone the import declaration through unchanged (preserve the side-effect import) rather than returning `None`.","locations":[{"ref":"crates/oxc_isolated_declarations/src/module.rs:140-177","code":"  140 |     pub(crate) fn transform_import_declaration(\n  141 |         &self,\n  142 |         decl: &ImportDeclaration<'a>,\n  143 |     ) -> Option<ArenaBox<'a, ImportDeclaration<'a>>> {\n  144 |         let specifiers = decl.specifiers.as_ref()?;\n  145 | \n  146 |         let mut new_specifiers = self.ast.vec_with_capacity(specifiers.len());\n  147 |         specifiers.iter().for_each(|specifier| {\n  148 |             let is_referenced = match specifier {\n  149 |                 ImportDeclarationSpecifier::ImportSpecifier(specifier) => {\n  150 |                     self.scope.has_reference(&specifier.local.name)\n  151 |                 }\n  152 |                 ImportDeclarationSpecifier::ImportDefaultSpecifier(specifier) => {\n  153 |                     self.scope.has_reference(&specifier.local.name)\n  154 |                 }\n  155 |                 ImportDeclarationSpecifier::ImportNamespaceSpecifier(_) => {\n  156 |                     self.scope.has_reference(&specifier.name())\n  157 |                 }\n  158 |             };\n  159 |             if is_referenced {\n  160 |                 new_specifiers.push(specifier.clone_in(self.ast.allocator));\n  161 |             }\n  162 |         });\n  163 | \n  164 |         if new_specifiers.is_empty() {\n  165 |             // We don't need to print this import statement\n  166 |             None\n  167 |         } else {\n  168 |             Some(self.ast.alloc_import_declaration(\n  169 |                 decl.span,\n  170 |                 Some(new_specifiers),\n  171 |                 decl.source.clone(),\n  172 |                 None,\n  173 |                 decl.with_clause.clone_in(self.ast.allocator),\n  174 |                 decl.import_kind,\n  175 |             ))\n  176 |         }\n  177 |     }","lines":38}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`DisableLine` directives are stored with `is_next_line: true` (lines 686 and 705). The `is_next_line` flag in `contains` selects the 'diagnostic must *start* within the interval' matching rather than 'any overlap'. For a `disable-line` directive the interval covers `[line_start, comment_start)`; a diagnostic for a construct that begins on a previous line but extends onto this line (e.g. a multi-line statement) will not be suppressed even though it visually occupies the disabled line. This may or may not match ESLint exactly, but the shared `is_next_line` name conflates 'next-line' and 'this-line' semantics and is a likely source of subtle suppression mismatches.","fix":"Rename the flag to something like `match_start_only` to reflect its actual meaning, and verify against ESLint that `disable-line` suppression of constructs starting on earlier lines behaves as intended.","locations":[{"ref":"crates/oxc_linter/src/disable_directives.rs:678-688","code":"  678 |                     if rule_names.is_empty() {\n  679 |                         self.add_interval(\n  680 |                             start,\n  681 |                             stop,\n  682 |                             DisabledRule::All {\n  683 |                                 directive_prefix,\n  684 |                                 comment_span: outer_span,\n  685 |                                 fix_span: comment_fix_span,\n  686 |                                 is_next_line: true,\n  687 |                             },\n  688 |                         );","lines":11},{"ref":"crates/oxc_linter/src/disable_directives.rs:346-357","code":"  346 |             let span_covered = if interval.val.is_next_line() {\n  347 |                 // For next-line directives, only check if the diagnostic starts within the interval\n  348 |                 // We intentionally only check span.start (not span.end) to avoid suppressing\n  349 |                 // diagnostics for large constructs that merely contain the disabled line\n  350 |                 #[expect(clippy::suspicious_operation_groupings)]\n  351 |                 {\n  352 |                     span.start >= interval.start && span.start < interval.stop\n  353 |                 }\n  354 |             } else {\n  355 |                 // For regular disable directives, check if there's any overlap\n  356 |                 span.start < interval.stop && span.end > interval.start\n  357 |             };","lines":12}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"When the fold accumulator becomes `Stop` and the recursion `break`s (after `fold` or after the recursive call), `self.depth` is not decremented even though it was incremented at the start of the iteration, and the `Leave` event / `leave` callback are skipped. Because `ModuleGraphVisitor` is shared across the whole recursive traversal, the inflated `depth` can later cause `max_depth` to be hit prematurely if the traversal continued. The enter/leave imbalance is currently masked only because the `enter`/`leave` builder setters are commented out (always no-ops).","fix":"Decrement `self.depth` and emit the Leave event before breaking on `accumulator.is_done()`, or restructure so the depth bookkeeping uses a guard/RAII pattern that runs on every exit path.","locations":[{"ref":"crates/oxc_linter/src/module_graph_visitor.rs:226-246","code":"  226 |             self.depth += 1;\n  227 | \n  228 |             event(ModuleGraphVisitorEvent::Enter, pair, module_record);\n  229 |             enter(pair, module_record);\n  230 | \n  231 |             accumulator = fold(accumulator.into_inner(), pair, module_record);\n  232 |             if accumulator.is_done() {\n  233 |                 break;\n  234 |             }\n  235 | \n  236 |             accumulator =\n  237 |                 self.filter_fold_recursive(accumulator, pair.1, filter, fold, event, enter, leave);\n  238 |             if accumulator.is_done() {\n  239 |                 break;\n  240 |             }\n  241 | \n  242 |             event(ModuleGraphVisitorEvent::Leave, pair, module_record);\n  243 |             leave(pair, module_record);\n  244 | \n  245 |             self.depth -= 1;\n  246 |         }","lines":21}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The size-guard filter for folding integer subtraction is effectively a tautology. The condition `left.is_nan() || left.is_finite() || right.is_nan() || right.is_finite() || (small-int clause)` is true for every value except when both operands are non-finite non-NaN (i.e. infinities). The trailing `&&`-joined small-int clause that the comment describes as the actual guard is dead code, since the leading `||` terms already short-circuit. Impact is limited because subtraction output is never longer than the operands, but the guard does not do what the comment says.","fix":"Replace the `||` chain with the intended guard, e.g. require both operands finite and either small integers or already representable without growing the printed form, matching the Multiplication/Division filters that use `&&` for the small-int clause.","locations":[{"ref":"crates/oxc_minifier/src/peephole/fold_constants.rs:285-299","code":"  285 |             BinaryOperator::Subtraction => {\n  286 |                 // Subtraction of small-ish integers can definitely be folded without issues\n  287 |                 Self::extract_numeric_values(e)\n  288 |                     .filter(|(left, right)| {\n  289 |                         left.is_nan()\n  290 |                             || left.is_finite()\n  291 |                             || right.is_nan()\n  292 |                             || right.is_finite()\n  293 |                             || (left.fract() == 0.0\n  294 |                                 && right.fract() == 0.0\n  295 |                                 && (left.abs() as usize) <= 0xFFFF_FFFF\n  296 |                                 && (right.abs() as usize) <= 0xFFFF_FFFF)\n  297 |                     })\n  298 |                     .and_then(|_| ctx.eval_binary(e))\n  299 |             }","lines":15}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`TriviaBuilder::irregular_whitespaces` is a plain `Vec<Span>` that is never truncated or rewound. The lexer's `rewind` (lexer/mod.rs) restores source position, token, errors and the `tokens` vec, and comments are protected against rewind via the `processed` index and the `add_comment` dedup, but irregular whitespaces are only protected by the `start <= last.start` dedup in `add_irregular_whitespace`. During speculative parsing (`try_parse` / lookahead) the lexer can advance past irregular whitespace, record it, then rewind; if the committed parse path stops before that whitespace (so it is never re-lexed), the abandoned whitespace stays in the list and is reported to oxlint. The dedup only prevents re-recording the same start, it does not remove already-recorded entries from abandoned branches.","fix":"Snapshot `irregular_whitespaces.len()` in `LexerCheckpoint` and truncate back to it in `Lexer::rewind`, mirroring how `tokens` are handled, so speculatively-lexed whitespace from abandoned branches is discarded.","locations":[{"ref":"crates/oxc_parser/src/lexer/trivia_builder.rs:74-84","code":"   74 |     pub fn add_irregular_whitespace(&mut self, start: u32, end: u32) {\n   75 |         // The irregular whitespaces array is ordered; only add if not added before, to avoid\n   76 |         // duplicates when the parser looks ahead (e.g. `peek_token`) and rewinds, then re-lexes the\n   77 |         // same whitespace. Same approach as `add_comment`.\n   78 |         if let Some(last) = self.irregular_whitespaces.last()\n   79 |             && start <= last.start\n   80 |         {\n   81 |             return;\n   82 |         }\n   83 |         self.irregular_whitespaces.push(Span::new(start, end));\n   84 |     }","lines":11},{"ref":"crates/oxc_parser/src/lexer/mod.rs:221-232","code":"  221 |     pub fn rewind(&mut self, checkpoint: LexerCheckpoint<'a>) {\n  222 |         match checkpoint.errors_snapshot {\n  223 |             ErrorSnapshot::Empty => self.errors.clear(),\n  224 |             ErrorSnapshot::Count(len) => self.errors.truncate(len),\n  225 |             ErrorSnapshot::Full(errors) => self.errors = errors,\n  226 |         }\n  227 |         self.tokens.truncate(checkpoint.tokens_len);\n  228 |         self.source.set_position(checkpoint.source_position);\n  229 |         self.token = checkpoint.token;\n  230 |         self.trivia_builder.pure_comment = checkpoint.pure_comment;\n  231 |         self.trivia_builder.has_no_side_effects_comment = checkpoint.has_no_side_effects_comment;\n  232 |     }","lines":12}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`is_identifier_part_char` (used for `RegExpIdentifierPart`, i.e. characters in named capture group names) only accepts `is_id_continue` and `$`. Per the ECMAScript grammar `IdentifierPartChar :: UnicodeIDContinue | $ | <ZWNJ> | <ZWJ>`, U+200C (ZWNJ) and U+200D (ZWJ) are also valid. Oxc's own identifier code (`oxc_syntax::identifier::is_identifier_part_unicode`) correctly includes `c == ZWNJ || c == ZWJ`, so the regex parser is inconsistent and will reject otherwise-valid named group identifiers such as `(?<a‍>)`.","fix":"Mirror `oxc_syntax`: `char::from_u32(cp).is_some_and(|ch| unicode_id_start::is_id_continue(ch) || ch == '$' || ch == '\\u{200c}' || ch == '\\u{200d}')`.","locations":[{"ref":"crates/oxc_regular_expression/src/parser/pattern_parser/character.rs:111-113","code":"  111 | pub fn is_identifier_part_char(cp: u32) -> bool {\n  112 |     char::from_u32(cp).is_some_and(|ch| unicode_id_start::is_id_continue(ch) || ch == '$')\n  113 | }","lines":3}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The trailing-comma arm of the `assert_ge!` macro expands to `assert_le!($lhs, $rhs)`, but no `assert_le!` macro exists in this crate. Any use of `assert_ge!(a, b,)` (trailing comma, no message) would fail to compile. It is a copy-paste leftover (the body should be `assert_ge!`). Currently dead because the only call site passes a message, but it is a latent footgun.","fix":"Change the macro body to `assert_ge!($lhs, $rhs);` (or delete the trailing-comma arm entirely since it is unused).","locations":[{"ref":"crates/oxc_semantic/src/stats.rs:35-37","code":"   35 |     ($lhs:expr, $rhs:expr,) => {\n   36 |         assert_le!($lhs, $rhs);\n   37 |     };","lines":3}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`best_match` pre-filters candidates with `candidate.len().abs_diff(needle.len()) > threshold`, comparing byte lengths, but `threshold` is a Levenshtein distance measured in chars (`min_edit_distance` iterates over `char`s). For strings containing multi-byte UTF-8 characters, a candidate within `threshold` edits can have a byte-length difference larger than `threshold` and be wrongly skipped, so a valid typo suggestion is silently dropped.","fix":"Compare char counts in the pre-filter, e.g. `candidate.chars().count().abs_diff(needle.chars().count())`, or drop the byte-length fast path. For ASCII identifiers (the common case) behavior is unchanged.","locations":[{"ref":"crates/oxc_span/src/edit_distance.rs:38-41","code":"   38 |         // no need to calculate distance if length difference exceeds threshold\n   39 |         if candidate.len().abs_diff(needle.len()) > threshold {\n   40 |             continue;\n   41 |         }","lines":4}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"CJS require emission drops all but the first import for a given source. `get_require` pattern-matches `names.into_iter().next()` and discards the remaining `Import`s scheduled for the same source. If two transforms (or a transform plus helper-loader) ever `add_default_import` the same source string in a Script (CommonJS) source type, the second and later bindings are silently lost, producing references to an undeclared variable. Helpers currently use distinct per-helper module paths so the collision is not hit today, but the store API allows it and ESM's `get_import` handles multiple correctly, so this is an inconsistent latent bug.","fix":"Either emit one `var x = require(source)` declarator per `Import` in `names` (loop over all of them building multiple declarators), or assert/panic explicitly when more than one require is scheduled for a single source so the silent data loss cannot occur.","locations":[{"ref":"crates/oxc_transformer/src/common/module_imports.rs:169-195","code":"  169 |     pub(crate) fn get_require(\n  170 |         source: Str<'a>,\n  171 |         names: std::vec::Vec<Import<'a>>,\n  172 |         require_symbol_id: Option<SymbolId>,\n  173 |         ctx: &mut TraverseCtx<'a>,\n so the URL guard remains correct after comment-merge re-slicing.","locations":[{"ref":"crates/oxc_transformer/src/plugins/styled_components.rs:1034-1049","code":" 1034 |                             // Skip line comments, but be careful not to break URLs like `https://...`\n 1035 |                             b'/' if paren_depth == 0 && (i == 0 || bytes[i - 1] != b':') => {\n 1036 |                                 let end_index =\n 1037 |                                     bytes[i + 2..].iter().position(|&b| matches!(b, b'\\n' | b'\\r'));\n 1038 |                                 if let Some(end_index) = end_index {\n 1039 |                                     // Insert space in place of `\\n` / `\\r`\n 1040 |                                     insert_space_if_required(&mut output, is_first_output);\n 1041 | \n 1042 |                                     i += end_index + 3; // After `\\n` or `\\r`\n 1043 |                                     continue;\n 1044 |                                 }\n 1045 | \n 1046 |                                 // Comment is not complete at end of quasi\n 1047 |                                 comment_type = Some(false);\n 1048 |                                 break;\n 1049 |                             }","lines":16},{"ref":"crates/oxc_transformer/src/plugins/styled_components.rs:948-953","code":"  948 |                 // Trim off to end of comment\n  949 |                 bytes = &bytes[start_index..];\n  950 | \n  951 |                 comment_type = None;\n  952 | \n  953 |                 // Don't touch `output`. This quasi continues appending to existing `output`.","lines":6}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Negative-zero enum member values lose their sign. In `get_initializer_expr`, `let is_negative = value < 0.0;` is `false` for `-0.0` (IEEE-754: `-0.0 < 0.0` is false), so a constant enum member evaluated to `-0.0` is emitted as the positive numer 640 |                 if matches!(wildcard_status, WildCardStatus::None | WildCardStatus::Matched)\n  641 |                     || has_matched_part\n  642 |                 {\n  643 |                     return false;\n  644 |                 }\n  645 |                 wildcard_status = WildCardStatus::Matched;\n  646 |             }\n  647 | \n  648 |             current_part_member_expression = if let Some(member) = current_part_member_expression {\n  649 |                 match &member.object {\n  650 |                     Expression::StaticMemberExpression(member) => {\n  651 |                         cur_part_name = &member.property.name;\n  652 |                         Some(member)\n  653 |                     }\n  654 |                     Expression::MetaProperty(_) => {\n  655 |                         if meta_define.postfix_wildcard {\n  656 |                             // `import.meta.env` should not match `import.meta.env.*`\n  657 |                             return has_matched_part && !is_full_match;\n  658 |                         }\n  659 |                         return i == 0;\n  660 |                     }\n  661 |                     Expression::Identifier(_) => {\n  662 |                         return false;\n  663 |                     }\n  664 |                     _ => None,\n  665 |                 }\n  666 |             } else {\n  667 |                 return false;\n  668 |             };","lines":50}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`find_function_params_start` guards keyword skipping with strict `i + N < len` (e.g. `text[i..].starts_with(\"export\") && i + 6 < len`). When a recognized keyword sits exactly at the end of the slice (`i + N == len`), the keyword is not consumed and parameter extraction bails, so `@param` reordering is silently skipped. This is an off-by-one in the boundary check (`<` should be `<=`), though in practice a function always has more source after these keywords so the path is unreachable for real inputs.","fix":"Use `i + N <= len` (or check the byte only when present) so a keyword ending exactly at the slice boundary is still recognized; harmless but removes a latent off-by-one.","locations":[{"ref":"crates/oxc_formatter/src/formatter/jsdoc/param_order.rs:113-124","code":"  113 |         if text[i..].starts_with(\"export\") && i + 6 < len && !is_id_continue(bytes[i + 6]) {\n  114 |             i += 6;\n  115 |             continue;\n  116 |         }\n  117 |         if text[i..].starts_with(\"async\") && i + 5 < len && !is_id_continue(bytes[i + 5]) {\n  118 |             i += 5;\n  119 |             continue;\n  120 |         }\n  121 |         if text[i..].starts_with(\"default\") && i + 7 < len && !is_id_continue(bytes[i + 7]) {\n  122 |             i += 7;\n  123 |             continue;\n  124 |         }","lines":12}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`eval?.member` (optional member access, not a call) is rewritten through the indirect-eval `(0, eval)` wrapper. In `transform_optional_expression` the `ident.name == \"eval\"` branch fires regardless of `is_call`, so `eval?.foo` becomes `... ? void 0 : (0, eval).foo` instead of `eval.foo`. The two are semantically equivalent for member access (the direct/indirect-eval distinction only matters for the *call* form), so output is correct but contains an unnecessary sequence expression that Babel does not emit, slightly bloating output.","fix":"Guard the `eval` indirect-call rewrite with `is_call`, i.e. only apply the `(0, eval)` wrapper when this optional element is the callee of an optional call.","locations":[{"ref":"crates/oxc_transformer/src/es2020/optional_chaining.rs:534-543","code":"  534 |         if let Expression::Identifier(ident) = expr\n  535 |             && let Some(binding) = self.get_existing_binding_for_identifier(ident, ctx)\n  536 |                    // `&#0123;`\n 1147 |                             buffer.push(c);\n 1148 |                             continue;\n 1149 |                         }","lines":15}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`offset_to_position` detects CRLF with the condition `i + 1 < offset && bytes[i + 1] == b'\\n'`. The bound should be against `source_text.len()` (the slice length), not `offset`. When `offset` lands exactly between the `\\r` and `\\n` of a CRLF (i.e. `\\r` at index `offset-1`), the `\\n` is not seen and the `\\r` is treated as a lone CR, advancing by 1 and ending on the `\\n` boundary - yielding a position with `character == 0` on the new line instead of staying on the CR. LSP positions are not supposed to point inside a CRLF, so impact is small, but the bound is conceptually wrong.","fix":"Compare against the text length, e.g. `i + 1 < source_text.len()`, so CRLF is detected even when `offset` falls on the `\\n`.","locations":[{"ref":"crates/oxc_language_server/src/position.rs:26-30","code":"   26 |             b'\\r' => {\n   27 |                 i += if i + 1 < offset && bytes[i + 1] == b'\\n' { 2 } else { 1 };\n   28 |                 line += 1;\n   29 |                 line_start = i;\n   30 |             }","lines":5}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`LintIgnoreMatcher::new` silently swallows errors from individual ignore patterns (`let _ = builder.add_line(None, pat)`) and from `builder.build().ok()`. A malformed ignore glob in a user config therefore disappears with no diagnostic; if `build()` fails, the entire matcher becomes `None` and *no* files are ignored, which can cause the linter to lint files the user explicitly excluded.","fix":"Propagate or at least surface pattern/build errors (collect them and emit a warning diagnostic) instead of discarding with `let _ =` / `.ok()`.","locations":[{"ref":"crates/oxc_linter/src/config/ignore_matcher.rs:21-48","code":"   21 |         let base_gi = {\n   22 |             let mut builder = GitignoreBuilder::new(base_root);\n   23 |             for pat in base_patterns {\n   24 |                 let _ = builder.add_line(None, pat);\n   25 |             }\n   26 |             builder.build().ok()\n   27 |         };\n   28 | \n   29 |         // Sort nested configs deepest-to-shallowest for correct precedence\n   30 |         nested.sort_unstable_by(|a, b| {\n   31 |             let a_len = a.1.components().count();\n   32 |             let b_len = b.1.components().count();\n   33 |             b_len.cmp(&a_len)\n   34 |         });\n   35 |         let nested = nested\n   36 |             .into_iter()\n   37 |             .map(|(patterns, root)| {\n   38 |                 if patterns.is_empty() {\n   39 |                     (None, root)\n   40 |                 } else {\n   41 |                     let mut builder = GitignoreBuilder::new(&root);\n   42 |                     for pat in &patterns {\n   43 |                         let _ = builder.add_line(None, pat);\n   44 |                     }\n   45 |                     (builder.build().ok(), root)\n   46 |                 }\n   47 |             })\n   48 |             .collect();","lines":28}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In non-unicode mode, a lone quantifier metacharacter (`*`, `+`, `?`) at a position with no preceding atom is reported via the InvalidBracedQuantifier path in `parse_extended_atom`: `consume_quantifier` succeeds on `*`/`+`/`?` and the code unconditionally raises `invalid_braced_quantifier`. The input contains no braces, so the diagnostic message (\"Invalid braced quantifier\") misdescribes the actual error and never reaches the more accurate `lone_quantifier` branch in `parse_term`.","fix":"On
