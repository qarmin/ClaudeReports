"type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`biome --where-am-i` silently succeeds and prints nothing if `env::current_exe()` fails (e.g. the executable was deleted/moved). Returning `Ok(())` with no output gives no signal that the lookup failed.","fix":"Emit an error/diagnostic (or non-zero exit) when `current_exe()` returns `Err`.","locations":[{"ref":"crates/biome_cli/src/lib.rs:325-330","code":"  325 |             BiomeCommand::WhereAmI => {\n  326 |                 if let Ok(path) = env::current_exe() {\n  327 |                     print!(\"{}\", path.display());\n  328 |                 }\n  329 |                 Ok(())\n  330 |             }","lines":6,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/lib.rs#L325-L330"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"GitLab `try_from_diagnostic` substitutes a span of `TextRange::new(1, 1)` when the diagnostic has no span. Offset 1 is an arbitrary in-text position, so `SourceFile::location` reports line/column based on byte offset 1 rather than a sensible file-start default.","fix":"Default the missing span to `TextRange::empty(TextSize::from(0))` (file start) or skip emitting a line number.","locations":[{"ref":"crates/biome_cli/src/reporter/gitlab.rs:213-222","code":"  213 |         let location = diagnostic.location();\n  214 |         let span = location\n  215 |             .span\n  216 |             .unwrap_or(TextRange::new(TextSize::from(1), TextSize::from(1)));\n  217 |         let source_code = location.source_code?;\n  218 |         let description = PrintDescription(diagnostic).to_string();\n  219 |         let begin = match SourceFile::new(source_code).location(span.start()) {\n  220 |             Ok(start) => start.line_number.get(),\n  221 |             Err(_) => return None,\n  222 |         };","lines":10,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/reporter/gitlab.rs#L213-L222"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"JUnit reporter silently drops any diagnostic that lacks a span/source_code/resource: the TestCase construction is nested inside `if let (Some(span), Some(source_code), Some(resource))`. Diagnostics without a location never appear, even though `summary.errors` still counts them, yielding a report whose `errors` count can exceed the number of emitted test cases.","fix":"Emit a TestCase even when location info is missing (omit line/column extras) so the count of failures matches the reported error total.","locations":[{"ref":"crates/biome_cli/src/reporter/junit.rs:88-134","code":"   88 |         for diagnostic in diagnostics {\n   89 |             let mut status = TestCaseStatus::non_success(NonSuccessKind::Failure);\n   90 |             let message = format!(\"{}\", JunitDiagnostic { diagnostic });\n   91 |             status.set_message(message.clone());\n   92 | \n   93 |             let location = diagnostic.location();\n   94 | \n   95 |             if let (Some(span), Some(source_code), Some(resource)) =\n   96 |                 (location.span, location.source_code, location.resource)\n   97 |             {\n   98 |                 let source = SourceFile::new(source_code);\n   99 |                 let start = source.location(span.start())?;\n  100 | \n  101 |                 status.set_description(format!(\n  102 |                     \"line {row:?}, col {col:?}, {body}\",\n  103 |                     row = start.line_number.get(),\n  104 |                     col = start.column_number.get(),\n  105 |                     body = message\n  106 |                 ));\n  107 |                 let mut case = TestCase::new(\n  108 |                     format!(\n  109 |                         \"org.biome.{}\",\n  110 |                         diagnostic\n  111 |                             .category()\n  112 |                             .map(|c| c.name())\n  113 |                             .unwrap_or_default()\n  114 |                             .replace('/', \".\")\n  115 |                     ),\n  116 |                     status,\n  117 |                 );\n  118 | \n  119 |                 if let Resource::File(path) = resource {\n  120 |                     let mut test_suite = TestSuite::new(path);\n  121 |                     case.extra\n  122 |                         .insert(\"line\".into(), start.line_number.get().to_string().into());\n  123 |                     case.extra.insert(\n  124 |                         \"column\".into(),\n  125 |                         start.column_number.get().to_string().into(),\n  126 |                     );\n  127 |                     test_suite\n  128 |                         .extra\n  129 |                         .insert(\"package\".into(), \"org.biome\".into());\n  130 |                     test_suite.add_test_case(case);\n  131 |                     self.0.add_test_suite(test_suite);\n  132 |                 }\n  133 |             }\n  134 |         }","lines":47,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/reporter/junit.rs#L88-L134"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Windows `ensure_daemon` loops with an unbounded `loop` retrying `open_socket`/`spawn_daemon` indefinitely, with no attempt limit and no handle to the spawned child. If the daemon repeatedly fails to come up, this spins forever and can spawn multiple daemon processes in a tight 50ms loop. The Unix counterpart bounds this to 10 attempts and tracks the child.","fix":"Bound the retry loop (e.g. 10 attempts) and only spawn once, mirroring the Unix `ensure_daemon` implementation.","locations":[{"ref":"crates/biome_cli/src/service/windows.rs:189-213","code":"  189 | pub(crate) async fn ensure_daemon(\n  190 |     stop_on_disconnect: bool,\n  191 |     watcher_options: WatcherOptions,\n  192 |     log_options: LogOptions,\n  193 | ) -> io::Result<bool> {\n  194 |     let mut did_spawn = false;\n  195 | \n  196 |     loop {\n  197 |         match open_socket().await {\n  198 |             Ok(Some(_)) => break,\n  199 |             Ok(None) => {\n  200 |                 spawn_daemon(\n  201 |                     stop_on_disconnect,\n  202 |                     watcher_options.clone(),\n  203 |                     log_options.clone(),\n  204 |                 )?;\n  205 |                 did_spawn = true;\n  206 |                 time::sleep(Duration::from_millis(50)).await;\n  207 |             }\n  208 |             Err(err) => return Err(err),\n  209 |         }\n  210 |     }\n  211 | \n  212 |     Ok(did_spawn)\n  213 | }","lines":25,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/service/windows.rs#L189-L213"}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`EditorconfigValue::from_str` maps both `\"unset\"` and `\"off\"` to `Self::Default` for every option type. In the EditorConfig spec, `unset` is the reset keyword; `off` is not a generic reset keyword (and is not a valid value for any of these properties). Treating `off` as a universal reset means e.g. `indent_size = off` silently resolves to the Biome default instead of reporting an unrecognized value.","fix":"Only treat `\"unset\"` as `Default`; let `\"off\"` fall through to `T::from_str` so invalid values produce the proper diagnostic.","locations":[{"ref":"crates/biome_configuration/src/editorconfig.rs:422-430","code":"  422 | impl<T: FromStr> FromStr for EditorconfigValue<T> {\n  423 |     type Err = T::Err;\n  424 |     fn from_str(s: &str) -> Result<Self, Self::Err> {\n  425 |         match s {\n  426 |             \"unset\" | \"off\" => Ok(Self::Default),\n  427 |             _ => T::from_str(s).map(EditorconfigValue::Explicit),\n  428 |         }\n  429 |     }\n  430 | }","lines":9,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_configuration/src/editorconfig.rs#L422-L430"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`Version::parse_version` uses `filter_map(|part| part.parse::<u32>().ok())`, silently dropping any non-numeric segment. A version like `\"1.x.3\"` parses to `[1, 3]`, comparing equal to `\"1.3\"` and less than `\"1.2.4\"`. This feeds the `$schema` version-mismatch warning, so malformed version strings can produce a misleading or absent diagnostic. The final `len().cmp(&len())` tiebreaker also treats `\"1.2\"` as less than `\"1.2.0\"`.","fix":"Treat unparsable segments as 0 (`.map(|p| p.parse().unwrap_or(0))`) or treat the whole version as incomparable; ignore trailing zero components in the length tiebreaker.","locations":[{"ref":"crates/biome_configuration/src/lib.rs:568-573","code":"  568 |     fn parse_version(&self) -> Vec<u32> {\n  569 |         self.0\n  570 |             .split('.')\n  571 |             .filter_map(|part| part.parse::<u32>().ok())\n  572 |             .collect()\n  573 |     }","lines":6,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_configuration/src/lib.rs#L568-L573"},{"ref":"crates/biome_configuration/src/lib.rs:594","code":"  594 |         self_parts.len().cmp(&other_parts.len())","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_configuration/src/lib.rs#L594"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"noInvalidDirectionInLinearGradient uses the regex `\\bin\\b` (IN_KEYWORD) on only the first comma-separated argument's text to detect a color-interpolation clause (`to top in srgb`) and skip validation. The color-interpolation `in <colorspace>` clause belongs to the whole function, not just the first argument, and matching a bare word `in` anywhere in the first argument is a fragile heuristic that can both over-skip (any direction containing a standalone `in` token) and under-skip valid interpolation syntax.","fix":"Anchor the check to the actual color-interpolation-method position (e.g. only when the argument ends with `in <colorspace>`) rather than matching `\\bin\\b` anywhere in the first argument.","locations":[{"ref":"crates/biome_css_analyze/src/lint/correctness/no_invalid_direction_in_linear_gradient.rs:60-60","code":"   60 | pub static IN_KEYWORD: LazyLock<Regex> = LazyLock::new(|| Regex::new(r\"(?i)\\bin\\b\").unwrap());","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_analyze/src/lint/correctness/no_invalid_direction_in_linear_gradient.rs#L60"},{"ref":"crates/biome_css_analyze/src/lint/correctness/no_invalid_direction_in_linear_gradient.rs:93-95","code":"   93 |         let first_expression = arguments.first()?.ok()?;\n   94 |         let first_expression_text = first_expression.to_trimmed_text();\n   95 |         if IN_KEYWORD.is_match(&first_expression_text) {","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_analyze/src/lint/correctness/no_invalid_direction_in_linear_gradient.rs#L93-L95"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"noDescendingSpecificity stores only the FIRST occurrence's specificity per tail selector and never updates it; stylelint tracks the running maximum specificity. A sequence like `a {}` `.c.d a {}` `a {}` will not flag the final `a` as descending relative to `.c.d a`, because comparison is always against the first `a`. The rule's rustdoc admits it reports fewer errors than it should, but the non-updating store widens the gap.","fix":"When the current selector's specificity exceeds the stored one (the valid ascending case), update visited_selectors to the higher specificity so later selectors are compared against the maximum seen.","locations":[{"ref":"crates/biome_css_analyze/src/lint/style/no_descending_specificity.rs:154-167","code":"  154 |         if let Some((last_text_range, last_specificity)) = visited_selectors.get(&tail_selector_str)\n  155 |         {\n  156 |             if last_specificity > &selector.specificity() {\n  157 |                 descending_selectors.push(DescendingSelector {\n  158 |                     high: (*last_text_range, *last_specificity),\n  159 |                     low: (selector.range(root), selector.specificity()),\n  160 |                 });\n  161 |             }\n  162 |         } else {\n  163 |             visited_selectors.insert(\n  164 |                 tail_selector_str,\n  165 |                 (selector.range(root), selector.specificity()),\n  166 |             );\n  167 |         }","lines":14,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_analyze/src/lint/style/no_descending_specificity.rs#L154-L167"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`normalize_string`'s `\\r` handling calls `bytes.next()` to peek the following byte; when that byte is NOT `\\n`, the consumed byte is silently discarded from further processing (copy_start is not advanced so it is still copied verbatim, but it is never re-checked for being a preferred_quote that needs escaping or a `\\` starting a new escape). A bare CR (not part of CRLF) followed by e.g. a quote char would thus not get escaped. Applies to both the escaped `\\r` sub-case and the bare `\\r` case. Low severity because JS/CSS string literals practically never contain a raw CR, but the logic is incorrect for that input.","fix":" {\n 1402 |                 continue;\n 1403 |             }\n 1404 | \n 1405 |             let parameter = parse_parameter(\n 1406 |                 p,\n 1407 |                 ExpressionContext::default().and_object_expression_allowed(!first || has_l_paren),\n 1408 |             );","lines":19,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_js_parser/src/syntax/function.rs#L1390-L1408"}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Closure::all_captures` filters parent-scope references with `is_reference_within_scope(scope, reference)`, but that helper ignores the position of the specific `reference` it is passed. It returns `true` if the binding has *any* reference whose `range_start` falls inside the closure scope, so a parent-scope reference is kept as a capture candidate whenever the same binding is referenced anywhere inside the closure, even when this particular reference is not. This can over-approximate the capture set.","fix":"Test the passed reference's own position (`binding.references[reference.index()].range_start`) against the closure scope range instead of `.any(...)` over all references of the binding.","locations":[{"ref":"crates/biome_js_semantic/src/semantic_model/closure.rs:254-265","code":"  254 |     fn is_reference_within_scope(\n  255 |         &self,\n  256 |         scope: &SemanticModelScopeData,\n  257 |         reference: &ReferenceId,\n  258 |     ) -> bool {\n  259 |         let binding_id = reference.binding_id();\n  260 |         let binding = self.data.binding(binding_id);\n  261 |         binding\n  262 |             .references\n  263 |             .iter()\n  264 |             .any(|semantic_reference| scope.range.contains(semantic_reference.range_start))\n  265 |     }","lines":12,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_js_semantic/src/semantic_model/closure.rs#L254-L265"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `transitive_importers_of`, JS/HTML importers are pushed to `result` whenever they import `current`, but are never inserted into `visited` (only CSS files, which go through the work queue, are deduped). Because the importer scan re-runs for every `current` popped from the queue, a single JS/HTML file that imports two different CSS files which both transitively reach the target module is pushed into `result` twice. Downstream consumers iterating `importers` then process the same file multiple times.","fix":"Deduplicate the result (track pushed paths in a `FxHashSet`, or insert JS/HTML paths into `visited` as well).","locations":[{"ref":"crates/biome_module_graph/src/db/queries.rs:96-105","code":"   96 |             if imports_current && !visited.contains(file_path) {\n   97 |                 match module_info {\n   98 |                     ModuleInfoKind::Js(_) | ModuleInfoKind::Html(_) => {\n   99 |                         result.push(file_path.to_path_buf());\n  100 |                     }\n  101 |                     ModuleInfoKind::Css(_) => {\n  102 |                         queue.push_back(file_path.to_path_buf());\n  103 |                     }\n  104 |                 }\n  105 |             }","lines":10,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_module_graph/src/db/queries.rs#L96-L105"}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`widen_binding_from_writable_references` computes `reference_scope = reference.scope().id()` and uses it only to skip same-scope writes, but infers the assignment RHS type with `TypeData::from_any_js_expression(self, scope_id, &right)` using the binding's *declaration* `scope_id` rather than the scope where the assignment occurs. If the RHS references identifiers that resolve differently in the assignment scope vs. the declaration scope, the widened type can be wrong. Possibly intentional, hence low confidence.","fix":"Use `reference_scope` (the assignment's scope) when inferring the RHS type, or document why the declaration scope is correct.","locations":[{"ref":"crates/biome_module_graph/src/js_module_info/collector.rs:552-571","code":"  552 |         for reference in references {\n  553 |             let node = reference.syntax();\n  554 |             let reference_scope = reference.scope().id();\n  555 | \n  556 |             // We don't want to widen types inside the same scope\n  557 |             if binding.scope_id == reference_scope {\n  558 |                 continue;\n  559 |             }\n  560 |             let assignment = node\n  561 |                 .ancestors()\n  562 |                 .skip(1)\n  563 |                 .find_map(|ancestor| JsAssignmentExpression::cast_ref(&ancestor))\n  564 |                 .and_then(|assignment| assignment.right().ok());\n  565 |             if let Some(right) = assignment {\n  566 |                 let data = TypeData::from_any_js_expression(self, scope_id, &right);\n  567 |                 let assigned_type = self.reference_to_owned_data(data);\n  568 |                 union_collector.add(assigned_type);\n  569 |                 saw_widening_reference = true;\n  570 |             }\n  571 |         }","lines":20,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_module_graph/src/js_module_info/collector.rs#L552-L571"}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`SpdxExpression` parsing silently discards the `WITH <exception>` clause and only trusts the base license id. A license such as `GPL-2.0-only WITH Classpath-exception-2.0` is trust-checked as plain `GPL-2.0-only`, so the exception (which materially changes license obligations) is ignored. This is documented as de_js_package/mod.rs:32-58","code":"   32 |     pub fn insert_serialized_tsconfig(\n   33 |         &mut self,\n   34 |         content: &ProjectLanguageRoot<TsConfigJson>,\n   35 |         path: &Utf8Path,\n   36 |     ) {\n   37 |         let tsconfig = TsConfigJson::deserialize_manifest(content, path);\n   38 |         let (tsconfig, deserialize_diagnostics) = tsconfig.consume();\n   39 |         self.tsconfig = Some(tsconfig.unwrap_or_default());\n   40 |         self.diagnostics = deserialize_diagnostics\n   41 |             .into_iter()\n   42 |             .map(biome_diagnostics::serde::Diagnostic::new)\n   43 |             .collect();\n   44 |     }\n   45 | \n   46 |     pub fn insert_serialized_turbo_json(\n   47 |         &mut self,\n   48 |         content: &ProjectLanguageRoot<TurboJson>,\n   49 |         path: &Utf8Path,\n   50 |     ) {\n   51 |         let turbo_json = TurboJson::deserialize_manifest(content, path);\n   52 |         let (turbo_json, deserialize_diagnostics) = turbo_json.consume();\n   53 |         self.turbo_json = Some(Arc::new(turbo_json.unwrap_or_default()));\n   54 |         self.diagnostics = deserialize_diagnostics\n   55 |             .into_iter()\n   56 |             .map(biome_diagnostics::serde::Diagnostic::new)\n   57 |             .collect();\n   58 |     }","lines":27,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_package/src/node_js_package/mod.rs#L32-L58"},{"ref":"crates/biome_package/src/node_js_package/mod.rs:84-96","code":"   84 |     fn insert_serialized_manifest(\n   85 |         &mut self,\n   86 |         content: &ProjectLanguageRoot<Self::Manifest>,\n   87 |         path: &Utf8Path,\n   88 |     ) {\n   89 |         let deserialized = Self::Manifest::deserialize_manifest(content, path);\n   90 |         let (manifest, diagnostics) = deserialized.consume();\n   91 |         self.manifest = manifest;\n   92 |         self.diagnostics = diagnostics\n   93 | k(num_b)) => match num_a.cmp(&num_b) {\n  394 |                 Ordering::Equal => {}\n  395 |                 other => return other,\n  396 |             },\n  397 |             (Ok(_), Err(_)) => return Ordering::Less,\n  398 |             (Err(_), Ok(_)) => return Ordering::Greater,\n  399 |             (Err(_), Err(_)) => match part_a.cmp(part_b) {\n  400 |                 Ordering::Equal => {}\n  401 |                 other => return other,\n  402 |             },\n  403 |         }\n  404 |     }\n  405 | \n  406 |     a.len().cmp(&b.len())\n  407 | }","lines":18,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_package/src/node_semver/version.rs#L390-L407"}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`Children::size_hint` forwards `self.slots.size_hint()` (an `Enumerate<Slots>` that counts ALL slots including `Slot::Empty`), but `Children::next`/`next_back` skip empty slots and only yield occupied ones. The reported lower bound is therefore higher than the number of items actually produced, violating the Iterator size_hint contract. Callers that pre-allocate to the lower bound can be misled. (Not memory-unsafe: Children is not ExactSizeIterator/TrustedLen.)","fix":"Return `(0, upper)`: `let (_, upper) = self.slots.size_hint(); (0, upper)`.","locations":[{"ref":"crates/biome_rowan/src/green/node.rs:473-475","code":"  473 |     fn size_hint(&self) -> (usize, Option<usize>) {\n  474 |         self.slots.size_hint()\n  475 |     }","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_rowan/src/green/node.rs#L473-L475"}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`is_dir` resolves a relative symlink target against the process CWD rather than the symlink's parent directory. `read_link_utf8()` returns the raw (possibly relative,          duration: Default::default(),\n  159 |                 configuration_files: Default::default(),\n  160 |             });\n  161 |         }\n  162 | \n  163 |         let scanned_project = ScannedProject {\n  164 |             scan_kind: scan_options.scan_kind.clone_without_targeting_info(),\n  165 |             watched: scan_options.watch,\n  166 |         };\n  167 | \n  168 |         let result = self.scan(\n  169 |             workspace,\n  170 |             project_key,\n  171 |             &project_path,\n  172 |             IndexTrigger::InitialScan,\n  173 |             scan_options,\n  174 |         )?;\n  175 | \n  176 |         self.projects.pin().insert(project_key, scanned_project);","lines":22,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/scanner.rs#L155-L176"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"When migrating the deprecated `recommended` option to the new `preset` field, the new member name copies the original name's LEADING trivia into the TRAILING position. `with_trailing_trivia_pieces(name.leading_trivia().pieces())` should use `name.trailing_trivia()`. As a result the leading whitespace/newline/indentation of the key is duplicated after the key text, producing malformed/incorrectly-formatted JSON output from `biome migrate`.","fix":"Change line 78 to `.with_trailing_trivia_pieces(name.trailing_trivia().pieces())`.","locations":[{"ref":"crates/biome_migrate/src/analyzers/recommended.rs:77-78","code":"   77 |                     .with_leading_trivia_pieces(name.leading_trivia().pieces())\n   78 |                     .with_trailing_trivia_pieces(name.leading_trivia().pieces()),","lines":2,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_migrate/src/analyzers/recommended.rs#L77-L78"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"The colon token of the new `preset` member calls `.with_leading_trivia_pieces(...)` twice. The first call sets the colon's leading trivia, but the second call (intended for trailing trivia) is also `with_leading_trivia_pieces`, so it OVERWRITES the leading trivia and the colon's trailing trivia (the space after `:`) is dropped/misplaced. The space separating `:` from the value is lost, and the colon leading trivia is wrong.","fix":"Change line 83 to `.with_trailing_trivia_pieces(node.colon_token().ok()?.trailing_trivia().pieces())`.","locations":[{"ref":"crates/biome_migrate/src/analyzers/recommended.rs:82-83","code":"   82 |                 .with_leading_trivia_pieces(node.colon_token().ok()?.leading_trivia().pieces())\n   83 |                 .with_leading_trivia_pieces(node.colon_token().ok()?.trailing_trivia().pieces()),","lines":2,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_migrate/src/analyzers/recommended.rs#L82-L83"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"Windows `enumerate_pipes` strips the prefix `\"rome-service\"` (the old pre-rename project name) when scanning `\\\\.\\pipe`, but `get_pipe_name` creates pipes named `biome-service-{VERSION}`. Current Biome pipes start with `biome-service`, so the filter never matches any live pipe and `enumerate_pipes` (used by `biome rage`/discovery) always returns an empty iterator on Windows. The Unix counterpart correctly uses `biome-socket`.","fix":"Change the `strip_prefix(\"rome-service\")` to `strip_prefix(\"biome-service\")` to match the name produced by `get_pipe_name`.","locations":[{"ref":"crates/biome_cli/src/service/windows.rs:37","code":"   37 |             let version = file_name.strip_prefix(\"rome-service\")?;","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/service/windows.rs#L37 ntWidth::MIN` (0)..=`IndentWidth::MAX` (24). An out-of-range indent width (e.g. 30) yields the wrong-on-both-bounds message \"...should be between 1 and 320, got 30\". The struct's doc comment is also copy-pasted from `LineWidthFromIntError` (\"converting a u16 to a [LineWidth]\"; should be u8/IndentWidth).","fix":"Use `IndentWidth::MIN`/`IndentWidth::MAX` in the message and correct the doc comment to reference a u8 and `IndentWidth`.","locations":[{"ref":"crates/biome_formatter/src/lib.rs:532-546","code":"  532 | /// Error type returned when converting a u16 to a [LineWidth] fails\n  533 | #[derive(Clone, Copy, Debug)]\n  534 | pub struct IndentWidthFromIntError(pub u8);\n  535 | \n  536 | impl std::fmt::Display for IndentWidthFromIntError {\n  537 |     fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {\n  538 |         writeln!(\n  539 |             f,\n  540 |             \"The indent width should be between {} and {}, got {}\",\n  541 |             LineWidth::MIN,\n  542 |             LineWidth::MAX,\n  543 |             self.0,\n  544 |         )\n  545 |     }\n  546 | }","lines":15,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_formatter/src/lib.rs#L532-L546"}]},{"id":"CPY_8","type":"copy_paste","type_label":"Copy Paste","severity":"negligible","easy":true,"description":"`expected_any_query_feature` lists `<query-in-parens>` as one of the expected alternatives for a query feature, but a query feature is `<mf-plain>`/`<mf-boolean>`/`<mf-range>`, not a query-in-parens. The entry appears copied from a query-in-parens diagnostic and is incorrect.","fix":"Remove the `<query-in-parens>` alternative from `expected_any_query_feature`.","locations":[{"ref":"crates/biome_css_parser/src/syntax/at_rule/feature.rs:157-168","code":"  157 | pub(crate) fn expected_any_query_feature(p: &CssParser, range: TextRange) -> ParseDiagnostic {\n  158 |     expect_one_of(\n  159 |         &[\n  160 |             \"<mf-plain>\",\n  161 |             \"<mf-boolean>\",\n  162 |             \"<mf-range>\",\n  163 |             \"<query-in-parens> or <query-in-parens>\",\n  164 |         ],\n  165 |         range,\n  166 |     )\n  167 |     .into_diagnostic(p)\n  168 | }","lines":12,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_parser/src/syntax/at_rule/feature.rs#L157-L168"}]},{"id":"CPY_9","type":"copy_paste","type_label":"Copy Paste","severity":"negligible","easy":true,"description":"`parse_custom_identifier_pseudo_class` uses `p.expect(T!['('])` where the presence of `(` is already guaranteed by the preceding `is_at_*` guard. Every sibling pseudo-class function parser uses `p.bump(T!['('])` in this position. Using `expect` here is inconsistent (it could emit an unexpected diagnostic if the invariant ever changes).","fix":"Use `p.bump(T!['('])` for consistency with the other pseudo-class function parsers.","locations":[{"ref":"crates/biome_css_parser/src/syntax/selector/pseudo_class/function_custom_identifier.rs:30","code":"   30 |     p.expect(T!['(']);","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_parser/src/syntax/selector/pseudo_class/function_custom_identifier.rs#L30"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"noDuplicateAtImportRules aborts the entire rule (returns None for the whole file) the moment any single media-query entry fails to parse: the match arms `_ => return None` at lines 104 and 116 bail out of run() instead of skipping that one entry. Similarly `at_rule.rule().ok()?` at line 74 returns None for the whole file if any at-rule fails to cast. A single malformed media query or at-rule silently suppresses duplicate-import detection for every other import in the file.","fix":"Replace `_ => return None` with skipping that media entry (e.g. `Err(_) => continue`), and replace `at_rule.rule().ok()?` with a `let ... else { continue; }` so a single parse failure only skips that rule.","locations":[{"ref":"crates/biome_css_analyze/src/lint/suspicious/no_duplicate_at_import_rules.rs:74-74","code":"   74 |             let AnyCssAtRule::CssImportAtRule(import_rule) = at_rule.rule().ok()? else {","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_analyze/src/lint/suspicious/no_duplicate_at_import_rules.rs#L74"},{"ref":"crates/biome_css_analyze/src/lint/suspicious/no_duplicate_at_import_rules.rs:104-104","code":"  104 |                         _ => return None,","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_analyze/src/lint/suspicious/no_duplicate_at_import_rules.rs#L104"},{"ref":"crates/biome_css_analyze/src/lint/suspicious/no_duplicate_at_import_rules.rs:116-116","code":"  116 |                         _ => return None,","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_analyze/src/lint/suspicious/no_duplicate_at_import_rules.rs#L116"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`biome clean` does `remove_dir_all(logs_path).and_then(|_| create_dir(logs_path))?`. If the log directory does not exist, `remove_dir_all` returns `Err(NotFound)` and the `and_then` short-circuits, so the whole command fails instead of just (re)creating the directory. `biome clean` therefore errors out on a fresh install or after the directory was already removed.","fix":"Ignore a `NotFound` error from `remove_dir_all` (e.g. match the error kind) before creating the directory, or use `create_dir_all` after a best-effort remove.","locations":[{"ref":"crates/biome_cli/src/commands/clean.rs:8-14","code":"    8 | pub fn clean(_cli_session: CliSession) -> Result<(), CliDiagnostic> {\n    9 |     let logs_path = biome_env()\n   10 |         .value_for(\"BIOME_LOG_PATH\")\n   11 |         .map_or(default_biome_log_path(), Utf8PathBuf::from);\n   12 |     remove_dir_all(logs_path.clone()).and_then(|_| create_dir(logs_path))?;\n   13 |     Ok(())\n   14 | }","lines":7,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/commands/clean.rs#L8-L14"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the LSP proxy the two forwarding tasks are awaited with `let _ = input_handle.await;` and `let _ = out_put_handle.await;`, discarding both the join result and the inner io error. A failure copying stdin->socket or socket->stdout is silently swallowed and the proxy returns `Ok(())`, making transport failures invisible to the LSP client.","fix":"Inspect the join/io results, convert a real error into a `CliDiagnostic`, and consider racing the two halves so the proxy exits when either side closes.","locations":[{"ref":"crates/biome_cli/src/commands/daemon.rs:148-178","code":"  148 |             let input_handle = rt.spawn(async move {\n  149 |                 loop {\n  150 |                     match io::copy(&mut stdin, &mut owned_write_half).await {\n  151 |                         Ok(b) => {\n  152 |                             if b == 0 {\n  153 |                                 return Ok(());\n  154 |                             }\n  155 |                         }\n  156 |                         Err(err) => return Err(err),\n  157 |                     };\n  158 |                 }\n  159 |             });\n  160 | \n  161 |             // receive socket response to stdout\n  162 |             let mut stdout = io::stdout();\n  163 |             let out_put_handle = rt.spawn(async move {\n  164 |                 loop {\n  165 |                     match io::copy(&mut owned_read_half, &mut stdout).await {\n  166 |                         Ok(b) => {\n  167 |                             if b == 0 {\n  168 |                                 return Ok(());\n  169 |                             }\n  170 |                         }\n  171 |                         Err(err) => return Err(err),\n  172 |                     };\n  173 |                 }\n  174 |             });\n  175 | \n  176 |             let _ = input_handle.await;\n  177 |             let _ = out_put_handle.await;\n  178 |             Ok(())","lines":31,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/commands/daemon.rs#L148-L178"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Utf8PathBuf::from_path_buf(...).expect(\"To be UTF-8 path\")` panics when a relativized path contains non-UTF-8 bytes. On a filesystem with non-UTF-8 file names this aborts the GitLab report run instead of falling back to the absolute path (which the caller already handles for the `None` case).","fix":"Return `None` on the UTF-8 conversion failure (`.ok()`), letting the caller fall back to `absolute_path.to_string()`.","locations":[{"ref":"crates/biome_cli/src/reporter/gitlab.rs:121","code":"  121 |         Some(Utf8PathBuf::from_path_buf(relativized.to_path_buf()).expect(\"To be UTF-8 path\"))","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/reporter/gitlab.rs#L121"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`diagnostic.advices(&mut visitor).unwrap()` unwraps the io::Result from advice traversal inside functions that themselves return io::Result, so a visit error aborts the process via panic instead of propagating. Fragile and inconsistent with the surrounding `?`-based handling.","fix":"Propagate the error with `?` (make the helper return `io::Result<...>`), or document why it cannot fail.","locations":[{"ref":"crates/biome_cli/src/reporter/json.rs:319-328","code":"  319 | fn to_advices(diagnostic: &Error) -> Vec<JsonSuggestion> {\n  320 |     let mut visitor = SuggestionsVisitor {\n  321 |         suggestions: vec![],\n  322 |         last_diagnostic_length: 0,\n  323 |         current_message: None,\n  324 |     };\n  325 |     diagnostic.advices(&mut visitor).unwrap();\n  326 | \n  327 |     visitor.suggestions\n  328 | }","lines":10,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/reporter/json.rs#L319-L328"},{"ref":"crates/biome_cli/src/reporter/rdjson.rs:184-192","code":"  184 | fn to_rdjson_suggestions(diagnostic: &Error) -> Vec<RdJsonSuggestion> {\n  185 |     let mut visitor = SuggestionsVisitor {\n  186 |         suggestions: vec![],\n  187 |     };\n  188 | \n  189 |     diagnostic.advices(&mut visitor).unwrap();\n  190 | \n  191 |     visitor.suggestions\n  192 | }","lines":9,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/reporter/rdjson.rs#L184-L192"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`self.0.to_string().expect(\"To serialize report to string\")` panics if quick_junit fails to serialize the report, surfacing serialization errors as a process panic rather than an io::Error, inconsistent with the surrounding `io::Result` return type.","fix":"Map the serialization error into an `io::Error` and return it via `?` instead of `.expect`.","locations":[{"ref":"crates/biome_cli/src/reporter/junit.rs:136-138","code":"  136 |         writer.log(markup! {\n  137 |             {self.0.to_string().expect(\"To serialize report to string\")}\n  138 |         });","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/reporter/junit.rs#L136-L138"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the stdin path of `LintAssistProcessFile::process_std_in`, when content is unchanged (`Cow::Borrowed`) and the execution does not require write access, the function returns `Err(StdinDiagnostic::new_not_formatted())` before reaching the `workspace.close_file(...)` cleanup. The file opened earlier is therefore never closed in this branch, unlike the format stdin path which always closes the file.","fix":"Close the file before the early `Err` return (or restructure so `close_file` runs on all paths).","locations":[{"ref":"crates/biome_cli/src/runner/impls/process_file/lint_and_assist.rs:305-327","code":"  305 |         match new_content {\n  306 |             Cow::Borrowed(original_content) => {\n  307 |                 console.append(markup! {\n  308 |                     {original_content}\n  309 |                 });\n  310 | \n  311 |                 if !execution.requires_write_access() {\n  312 |                     return Err(StdinDiagnostic::new_not_formatted().into());\n  313 |                 }\n  314 |             }\n  315 |             Cow::Owned(ref new_content) => {\n  316 |                 console.append(markup! {\n  317 |                     {new_content}\n  318 |                 });\n  319 |             }\n  320 |         }\n  321 |         workspace\n  322 |             .close_file(CloseFileParams {\n  323 |                 project_key,\n  324 |                 path: biome_path.clone(),\n  325 |             })\n  326 |             .map_err(|e| e.into())\n  327 |     }","lines":23,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/runner/impls/process_file/lint_and_assist.rs#L305-L327"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In useBaseline's check_property, the `?` on `let tok = ident.value_token().ok()?;` sits inside a `for component in value_list` loop. If any single value's value_token() returns Err, check_property returns None, silently skipping baseline checks for all subsequent values in the same declaration. A single malformed value token suppresses diagnostics for the rest of the values.","fix":"Replace the `?` with `continue` (e.g. `let Ok(tok) = ident.value_token() else { continue; };`) so a bad value only skips that value.","locations":[{"ref":"crates/biome_css_analyze/src/lint/nursery/use_baseline.rs:485-514","code":"  485 |     for component in value_list {\n  486 |         if let AnyCssGenericComponentValue::AnyCssValue(value) = &component\n  487 |             && let AnyCssValue::CssIdentifier(ident) = value\n  488 |         {\n  489 |             let tok = ident.value_token().ok()?;\n  490 |             let val_text = tok.token_text_trimmed();\n  491 | \n  492 |             // Skip named colors\n  493 |             if is_named_color(&val_text.to_ascii_lowercase_cow()) {\n  494 |                 continue;\n  495 |             }\n  496 | \n  497 |             // Skip if in property value allow list\n  498 |             if is_allowed_property_value(&prop_text, &val_text, &options.allow_property_values) {\n  499 |                 continue;\n  500 |             }\n  501 | \n  502 |             if let Some(status) = find_property_value_baseline(\n  503 |                 &prop_text.to_ascii_lowercase_cow(),\n  504 |                 &val_text.to_ascii_lowercase_cow(),\n  505 |             ) && !is_acceptable(options, status.tier, status.year)\n  506 |             {\n  507 |                 return Some(UseBaselineState {\n  508 |                     feature_name: (prop_text, val_text).into(),\n  509 |                     category: \"property value\",\n  510 |                     range: tok.text_trimmed_range(),\n  511 |                 });\n  512 |             }\n  513 |         }\n  514 |     }","lines":30,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_analyze/src/lint/nursery/use_baseline.rs#L485-L514"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In `parse_any_if_test_boolean_expr_group`, the parenthesized-group branch parses a general `<boolean-expr>` via `parse_any_if_test_boolean_expr` but recovers with `expected_if_test_boolean_not_expr` (the `not`-specific diagnostic, which says \"not boolean expression\"). The dedicated `expected_if_test_boolean_expr_group` exists and is used correctly elsewhere (e.g. if.rs:361 after `not`). The diagnostic and the parsed production are swapped, producing a confusing error message on malformed `if(( ... ))` input.","fix":"Use `expected_if_test_boolean_expr_group` for the parenthesized boolean-expression group recovery instead of `expected_if_test_boolean_not_expr`.","locations":[{"ref":"crates/biome_css_parser/src/syntax/value/if.rs:320-326","code":"  320 |         parse_any_if_test_boolean_expr(p)\n  321 |             .or_recover_with_token_set(\n  322 |                 p,\n  323 |                 &ParseRecoveryTokenSet::new(CSS_BOGUS_IF_TEST_BOOLEAN_EXPR, token_set![T![')']]),\n  324 |                 expected_if_test_boolean_not_expr,\n  325 |             )\n  326 |             .ok();","lines":7,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_parser/src/syntax/value/if.rs#L320-L326"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`impl Format<FormatTypeContext> for Imports` builds a `JoinBuilder`, adds entries, then returns `Ok(())` directly instead of calling `joiner.finish()`. `JoinBuilder::entry` writes immediately but stores any `FormatResult` error internally; only `finish()` surfaces it. So formatting errors produced while writing an import entry are silently swallowed and reported as success. The sibling impls `Exports` and `CssImports` correctly call `joiner.finish()`.","fix":"Replace the final `Ok(())` with `joiner.finish()`.","locations":[{"ref":"crates/biome_module_graph/src/format_module_graph.rs:127-161","code":"  127 | impl Format<FormatTypeContext> for Imports {\n  128 |     fn fmt(\n  129 |         &self,\n  130 |         f: &mut biome_formatter::formatter::Formatter<FormatTypeContext>,\n  131 |     ) -> FormatResult<()> {\n  132 |         let mut joiner = f.join();\n  133 | \n  134 |         for (import_name, import) in &self.0 {\n  135 |             let name = format_with(|f| {\n  136 |                 write!(f, [text(&std::format!(\"{:?}\", import_name.text()), None),])\n  137 |             });\n  138 |             let arrow = format_with(|f| write!(f, [&format_args![space(), token(\"=>\"), space()]]));\n  139 | \n  140 |             let export = format_with(|f| {\n  141 |                 write!(\n  142 |                     f,\n  143 |                     [&format_args![\n  144 |                         token(\"{\"),\n  145 |                         &group(&block_indent(&format_args![import]),),\n  146 |                         token(\"}\")\n  147 |                     ]]\n  148 |                 )\n  149 |             });\n  150 |             let line = format_with(|f| {\n  151 |                 write!(\n  152 |                     f,\n  153 |                     [&format_args![&name, &arrow, &export, soft_line_break()]]\n  154 |                 )\n  155 |             });\n  156 |             joiner.entry(&group(&format_args![line, soft_line_break_or_space()]));\n  157 |         }\n  158 | \n  159 |         Ok(())\n  160 |     }\n  161 | }","lines":35,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_module_graph/src/format_module_graph.rs#L127-L161"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`parse_range` is declared to return `Result<Version, VersionError>` but it can never return `Err`: the failure path maps the error to `Ok(Version::Literal(...))`. Callers (`From<&str>`/`From<String>` for Version, the `Deserializable` impl) then do `.ok().unwrap_or(...)` / match on `Err`, treating an outcome that is statically unreachable. The `Result` wrapper is misleading dead error-handling: a parse failure is silently swallowed into a `Literal` rather than surfaced, and the never-`Err` signature hides that.","fix":"Change `parse_range` to return `Version` directly (it always succeeds), and simplify the `From`/`Deserializable` impls accordingly; or actually propagate the parse error if a distinction between SemVer and literal is desired.","locations":[{"ref":"crates/biome_package/src/node_js_package/package_json.rs:767-772","code":"  767 | fn parse_range(range: &str) -> Result<Version, VersionError> {\n  768 |     match Range::from_str(range).map(Version::SemVer) {\n  769 |         Ok(result) => Ok(result),\n  770 |         Err(_) => Ok(Version::Literal(range.to_string())),\n  771 |     }\n  772 | }","lines":6,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_package/src/node_js_package/package_json.rs#L767-L772"},{"ref":"crates/biome_package/src/node_js_package/package_json.rs:603-615","code":"  603 | impl From<&str> for Version {\n  604 |     fn from(value: &str) -> Self {\n  605 |         parse_range(value)\n  606 |             .ok()\n  607 |             .unwrap_or(Self::Literal(value.to_string()))\n  608 |     }\n  609 | }\n  610 | \n  611 | impl From<String> for Version {\n  612 |     fn from(value: String) -> Self {\n  613 |         parse_range(&value).ok().unwrap_or(Self::Literal(value))\n  614 |     }\n  615 | }","lines":13,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_package/src/node_js_package/package_json.rs#L603-L615"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":true,"description":"Typo in `FileGuard::drop` comment: 'it's generally better to silently matcher the error' - 'matcher' should be 'swallow'/'ignore'. The comment is load-bearing (it explains why the error is intentionally dropped in a Drop impl).","fix":"Fix wording to: 'it's generally better to silently ignore the error than panic'.","locations":[{"ref":"crates/biome_service/src/workspace.rs:2042-2045","code":" 2042 |             // `close_file` can only error if the file was already closed, in\n 2043 |             // this case it's generally better to silently matcher the error\n 2044 |             // than panic (especially in a drop handler)\n 2045 |             .ok();","lines":4,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/workspace.rs#L2042-L2045"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`node::load_config` interpolates the untrusted `specifier` directly into JavaScript source passed to `node --eval` (`import('{specifier}')` and `require('{specifier}')`). A specifier containing a single quote, newline, or `')` (which can come from an ESLint config's `extends`/module names or resolved paths) breaks out of the string literal, producing a syntax error at best and arbitrary JS execution at worst. Also `uncycle(c.default)` calls `Object.entries` on the default export; if the default export is `null` this throws a TypeError.","fix":"Pass the specifier to node via an argument/env var or JSON-encode it instead of string-interpolating into source, and guard `uncycle` against non-object inputs.","locations":[{"ref":"crates/biome_cli/src/execute/migrate/node.rs:11-13","code":"   11 |         .arg(format!(\n   12 |             \"{UNCYCLE_FUNCTION} import('{specifier}').then((c) => console.log(JSON.stringify(uncycle(c.default), null, 2)))\"\n   13 |         ))","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/execute/migrate/node.rs#L11-L13"},{"ref":"crates/biome_cli/src/execute/migrate/node.rs:35-37","code":"   35 |                     .arg(format!(\n   36 |                         \"{UNCYCLE_FUNCTION} console.log(JSON.stringify(uncycle(require('{specifier}'))))\"\n   37 |                     ))","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/execute/migrate/node.rs#L35-L37"},{"ref":"crates/biome_cli/src/execute/migrate/node.rs:69-72","code":"   69 | const UNCYCLE_FUNCTION: &str = \"function uncycle(obj, seen = new Set()) {\n   70 |     seen.add(obj);\n   71 |     for (const [key, val] of Object.entries(obj)) {\n   72 |         if (val != null && typeof val == 'object') {","lines":4,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/execute/migrate/node.rs#L69-L72"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"`impl From<u8> for IndentSize` constructs `Self::Value(value)` for any u8 with no bound check, bypassing the `MIN..=MAX` (0..=24) validation that `FromStr` enforces. An out-of-range value would later fail `IndentWidth::try_from` and be silently dropped, but the API is an inconsistent foot-gun versus the validated FromStr path.","fix":"Remove the unused `From<u8>` impl, or replace it with a `TryFrom<u8>` that enforces the same MIN..=MAX bound.","locations":[{"ref":"crates/biome_configuration/src/editorconfig.rs:132-136","code":"  132 | impl From<u8> for IndentSize {\n  133 |     fn from(value: u8) -> Self {\n  134 |         Self::Value(value)\n  135 |     }\n  136 | }","lines":5,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_configuration/src/editorconfig.rs#L132-L136"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"`ScopeBindingsIter` implements `ExactSizeIterator::len()` by returning the total number of bindings in the scope, ignoring `binding_index` (the number already consumed). The `ExactSizeIterator` contract requires `len()` to return the count of *remaining* items, so after any `next()`/`nth()` call `len()` over-reports and the derived `size_hint()` becomes inconsistent. This can cause incorrect pre-allocations or logic in any consumer that partially consumes the iterator and then checks `len()`.","fix":"Return `self.data.scopes[self.id.index()].bindings.len() - self.binding_index as usize`.","locations":[{"ref":"crates/biome_js_semantic/src/semantic_model/scope.rs:265-273","code":"  265 | impl ExactSizeIterator for ScopeBindingsIter {\n  266 |     fn len(&self) -> usize {\n  267 |         // scope_id will always be a valid scope because\n  268 |         // it was created by [Scope::bindings] method.\n  269 |         debug_assert!(self.scope_id.index() < self.data.scopes.len());\n  270 | \n  271 |         self.data.scopes[self.scope_id.index()].bindings.len()\n  272 |     }\n  273 | }","lines":9,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_js_semantic/src/semantic_model/scope.rs#L265-L273"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":true,"description":"`NumberFormatOptions::keep_one_trailing_decimal_zero` constructs `Self { keep_one_trailing_decimal_zero: true }`, discarding `self`. It works only because the struct currently has one field; adding any future field would silently reset it to default - a footgun in a builder.","fix":"Use `Self { keep_one_trailing_decimal_zero: true, ..self }`.","locations":[{"ref":"crates/biome_formatter/src/token/number.rs:16-20","code":"   16 |     pub fn keep_one_trailing_decimal_zero(self) -> Self {\n   17 |         Self {\n   18 |             keep_one_trailing_decimal_zero: true,\n   19 |         }\n   20 |     }","lines":5,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_formatter/src/token/number.rs#L16-L20"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`WorkspaceFile::new` reads the entire file into `input` at lines 266-268, but that value is never used: in the `file_exists` branch it is dropped, and in the `else` branch a fresh `input` is declared and the file is read again. The first read is wasted I/O performed for every file the crawler processes.","fix":"Delete the unconditional read at lines 266-268 and read the content only inside the `else` branch where `open_file` consumes it.","locations":[{"ref":"crates/biome_cli/src/runner/process_file.rs:266-293","code":"  266 |         let mut input = String::new();\n  267 |         file.read_to_string(&mut input)\n  268 |             .with_file_path(path.to_string())?;\n  269 | \n  270 |         let guard = FileGuard::new(ctx.workspace(), ctx.project_key(), path.clone())\n  271 |             .with_file_path_and_code(path.to_string(), category!(\"internalError/fs\"))?;\n  272 | \n  273 |         if ctx.workspace().file_exists(FileExistsParams {\n  274 |             file_path: path.clone(),\n  275 |         })? {\n  276 |             Ok(Self { guard, path, file })\n  277 |         } else {\n  278 |             let mut input = String::new();\n  279 |             file.read_to_string(&mut input)\n  280 |                 .with_file_path(path.to_string())?;\n  281 | \n  282 |             ctx.workspace().open_file(OpenFileParams {\n  283 |                 project_key: ctx.project_key(),\n  284 |                 document_file_source: None,\n  285 |                 path: path.clone(),\n  286 |                 content: FileContent::from_client(&input),\n  287 |                 persist_node_cache: false,\n  288 |                 inline_config: None,\n  289 |                 editor_features: None,\n  290 |             })?;\n  291 | \n  292 |             Ok(Self { guard, path, file })\n  293 |         }","lines":28,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/runner/process_file.rs#L266-L293"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"noIrregularWhitespace uses `Ast<AnyCssRule>` as its query, so run() fires once per rule including every nested rule. Each invocation first scans the entire subtree text via text_with_trivia() and then iterates all descendant tokens. Because rules nest (e.g. rules inside @media), the same text is rescanned at every nesting level (quadratic in nesting depth), and the same tokens are visited by both a parent rule's run and the child rule's run, which can also produce duplicate diagnostics for the same whitespace.","fix":"Query a top-level node (e.g. Ast<CssRoot>) and scan its tokens once, or restrict descendants_tokens to the rule's own non-nested tokens to avoid rescanning and duplicate reporting.","locations":[{"ref":"crates/biome_css_analyze/src/lint/suspicious/no_irregular_whitespace.rs:44-51","code":"   44 | impl Rule for NoIrregularWhitespace {\n   45 |     type Query = Ast<AnyCssRule>;\n   46 |     type State = TextRange;\n   47 |     type Signals = Box<[Self::State]>;\n   48 |     type Options = NoIrregularWhitespaceOptions;\n   49 | \n   50 |     fn run(ctx: &RuleContext<Self>) -> Self::Signals {\n   51 |         get_irregular_whitespace(ctx.query().syntax()).into_boxed_slice()","lines":8,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_analyze/src/lint/suspicious/no_irregular_whitespace.rs#L44-L51"},{"ref":"crates/biome_css_analyze/src/lint/suspicious/no_irregular_whitespace.rs:77-95","code":"   77 | \n   78 | fn get_irregular_whitespace(syntax: &CssSyntaxNode) -> Vec<TextRange> {\n   79 |     if !syntax\n   80 |         .text_with_trivia()\n   81 |         .chars()\n   82 |         .any(is_irregular_whitespace)\n   83 |     {\n   84 |         return vec![];\n   85 |     }\n   86 | \n   87 |     let mut results = vec![];\n   88 |     for token in syntax.descendants_tokens(Direction::Next) {\n   89 |         if !token.has_leading_comments()\n   90 |             && !token.has_trailing_comments()\n   91 |             && token.text().chars().any(is_irregular_whitespace)\n   92 |         {\n   93 |             results.push(token.text_range());\n   94 |         }\n   95 |     }","lines":19,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_analyze/src/lint/suspicious/no_irregular_whitespace.rs#L77-L95"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"Every license lookup (`is_valid`, `is_deprecated`, `is_osi_approved`, `is_fsf_libre`) performs a full O(n) linear scan over the ~1198-entry static license list. `SpdxExpression::check_trust` for a single identifier can trigger up to four separate full scans (valid, deprecated, OSI, FSF), and `NodeJsPackage::analyze` scans twice per license. For projects with many dependencies/licenses this is repeated linear work that could be a single hashed lookup.","fix":"Build a `HashMap<&'static str, &'static Licence>` (e.g. via `LazyLock`) keyed by `license_id` and add a single `find(id) -> Option<&Licence>` accessor, then derive the boolean checks from one lookup instead of four scans.","locations":[{"ref":"crates/biome_package/src/license/mod.rs:6-42","code":"    6 | impl LicenseList {\n    7 |     pub fn is_valid(&self, license_id: &str) -> bool {\n    8 |         let license_found = self\n    9 |             .license_list\n   10 |             .iter()\n   11 |             .find(|license| license.license_id == license_id);\n   12 | \n   13 |         license_found.is_some()\n   14 |     }\n   15 | \n   16 |     pub fn is_deprecated(&self, license_id: &str) -> bool {\n   17 |         let license_found = self\n   18 |             .license_list\n   19 |             .iter()\n   20 |             .find(|license| license.license_id == license_id);\n   21 | \n   22 |         license_found.is_some_and(|license| license.is_deprecated_license_id)\n   23 |     }\n   24 | \n   25 |     pub fn is_osi_approved(&self, license_id: &str) -> bool {\n   26 |         let license_found = self\n   27 |             .license_list\n   28 |             .iter()\n   29 |             .find(|license| license.license_id == license_id);\n   30 | \n   31 |         license_found.is_some_and(|license| license.is_osi_approved)\n   32 |     }\n   33 | \n   34 |     pub fn is_fsf_libre(&self, license_id: &str) -> bool {\n   35 |         let license_found = self\n   36 |             .license_list\n   37 |             .iter()\n   38 |             .find(|license| license.license_id == license_id);\n   39 | \n   40 |         license_found.is_some_and(|license| license.is_fsf_libre)\n   41 |     }\n   42 | }","lines":37,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_package/src/license/mod.rs#L6-L42"},{"ref":"crates/biome_package/src/license/expression.rs:89-107","code":"   89 |                 let valid_spdx = LICENSE_LIST.is_valid(id);\n   90 |                 if !valid_spdx {\n   91 |                     return Err(RejectReason::Untrusted);\n   92 |                 }\n   93 | \n   94 |                 // Deprecated check (reject when ignore_deprecated is false)\n   95 |                 if !config.ignore_deprecated && LICENSE_LIST.is_deprecated(id) {\n   96 |                     return Err(RejectReason::Deprecated);\n   97 |                 }\n   98 | \n   99 |                 // OSI check\n  100 |                 if config.require_osi_approved && !LICENSE_LIST.is_osi_approved(id) {\n  101 |                     return Err(RejectReason::NotOsiApproved);\n  102 |                 }\n  103 | \n  104 |                 // FSF check\n  105 |                 if config.require_fsf_libre && !LICENSE_LIST.is_fsf_libre(id) {\n  106 |                     return Err(RejectReason::NotFsfLibre);\n  107 |                 }","lines":19,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_package/src/license/expression.rs#L89-L107"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`embedded_bindings()` and `embedded_value_references()` deep-clone the full service data (Vec<Vec<EmbeddedBinding>> / Vec<Vec<(TextRange, TokenText)>>) on every call. They are invoked on every JS lint/analyze pass of a document with embedded snippets, and once per matching ancestor in HTML go-to. The callers consume them read-only (lookups, or re-shaping), so the clone is pure overhead on a hot path.","fix":"Return references (`Option<&EmbeddedExportedBindings>` / `Option<&EmbeddedValueReferences>`) instead of clones, and clone only the (range, text) pairs actually needed by `bindings_without_source`. Update callers to borrow.","locations":[{"ref":"crates/biome_service/src/workspace/document/mod.rs:331-338","code":"  331 |     pub fn embedded_bindings(&self) -> Option<EmbeddedExportedBindings> {\n  332 |         self.exported_bindings.clone()\n  333 |     }\n  334 | \n  335 |     pub fn embedded_value_references(&self) -> Option<EmbeddedValueReferences> {\n  336 |         self.value_references.clone()\n  337 |     }\n  338 | }","lines":8,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/workspace/document/mod.rs#L331-L338"},{"ref":"crates/biome_service/src/workspace/document/services/embedded_bindings.rs:95-105","code":"   95 |     pub(crate) fn bindings_without_source(self) -> Vec<Vec<(TextRange, TokenText)>> {\n   96 |         self.bindings\n   97 |             .into_iter()\n   98 |             .map(|bindings| {\n   99 |                 bindings\n  100 |                     .into_iter()\n  101 |                     .map(|b| (b.range, b.text))\n  102 |                     .collect::<Vec<_>>()\n  103 |             })\n  104 |             .collect::<Vec<_>>()\n  105 |     }","lines":11,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/workspace/document/services/embedded_bindings.rs#L95-L105"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`overlapping_line_suppressions` runs `binary_search_by` over `line_suppressions` assuming the slice is totally ordered by `text_range`, then linearly expands left/right. Line-suppression ranges are expanded over time (`expand_range`/`overlap_last_suppression` call `text_range.cover(...)`), so adjacent entries' ranges can overlap and the slice may not satisfy the strict ordering invariant `binary_search_by` requires. When the invariant is violated, the search can land on the wrong index and the subsequent bounded left/right scan may miss an overlapping suppression, causing a suppression to be incorrectly treated as having no effect (false `suppressions/unused`) or a signal to escape suppression. Hard to confirm without targeted fuzzing, hence low confidence.","fix":"Either guarantee the ordering invariant (store and search by `comment_span`, which is fixed at push time, instead of the mutated `text_range`), or replace the binary search with a linear scan / interval structure that does not assume non-overlapping sorted ranges.","locations":[{"ref":"crates/biome_analyze/src/suppressions.rs:657-686","code":"  657 |     pub(crate) fn overlapping_line_suppressions(\n  658 |         &mut self,\n  659 |         target: &TextRange,\n  660 |     ) -> &mut [LineSuppression] {\n  661 |         let Ok(middle_index) = self.line_suppressions.binary_search_by(|s| {\n  662 |             if s.text_range.end() < target.start() {\n  663 |                 Ordering::Less\n  664 |             } else if target.end() < s.text_range.start() {\n  665 |                 Ordering::Greater\n  666 |             } else {\n  667 |                 Ordering::Equal\n  668 |             }\n  669 |         }) else {\n  670 |             return &mut [];\n  671 |         };\n  672 |         // Perf: normally just traversing in both directions should be faster - more than 2\n  673 |         // comments in a row should be rare, and 2-3 extra comparisons are faster than\n  674 |         // bisecting twice for left and right border.\n  675 |         let mut left = middle_index;\n  676 |         while left > 0 && self.line_suppressions[left - 1].text_range.end() >= target.start() {\n  677 |             left -= 1;\n  678 |         }\n  679 |         let mut right = middle_index;\n  680 |         while right < self.line_suppressions.len() - 1\n  681 |             && self.line_suppressions[right + 1].text_range.start() <= target.end()\n  682 |         {\n  683 |             right += 1;\n  684 |         }\n  685 |         &mut self.line_suppressions[left..=right]\n  686 |     }","lines":30,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_analyze/src/suppressions.rs#L657-L686"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"write_fill_comma_groups builds nested heap-allocated Vec<Vec<I>> (groups + current_group), pushing every list element, then calls element.clone().into_format() on each. This runs on the formatter hot path for every comma-separated value list taking the Fill layout. The grouping could be expressed by recording comma boundary indices over the existing node list and formatting slices, avoiding the nested Vec allocations and per-element clone.","fix":"Record comma boundary indices (Vec<usize> or (start,end) ranges) over the original node and format sub-ranges via node.iter(), avoiding Vec<Vec<I>> and the clone().","locations":[{"ref":"crates/biome_css_formatter/src/utils/component_value_list.rs:100-127","code":"  100 |     let mut groups: Vec<Vec<I>> = Vec::new();\n  101 |     let mut current_group: Vec<I> = Vec::new();\n  102 | \n  103 |     for element in node.iter() {\n  104 |         let is_comma = is_comma_delimiter(&element);\n  105 |         // Keep the comma token in the current group so we print `group1,` before breaking to `group2`.\n  106 |         current_group.push(element);\n  107 | \n  108 |         if is_comma {\n  109 |             groups.push(current_group);\n  110 |             current_group = Vec::new();\n  111 |         }\n  112 |     }\n  113 | \n  114 |     if !current_group.is_empty() {\n  115 |         groups.push(current_group);\n  116 |     }\n  117 | \n  118 |     let group_separator = soft_line_break_or_space();\n  119 |     let mut outer_fill = f.fill();\n  120 | \n  121 |     for group_items in &groups {\n  122 |         let content = format_with(|f: &mut Formatter<'_, CssFormatContext>| {\n  123 |             let mut inner_fill = f.fill();\n  124 | \n  125 |             for element in group_items {\n  126 |                 let is_comma = is_comma_delimiter(element);\n  127 |                 let formatted = element.clone().into_format();","lines":28,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_formatter/src/utils/component_value_list.rs#L100-L127"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"For each parent-scope reference, `is_reference_within_scope` iterates over *all* references of the referenced binding (`binding.references.iter().any(...)`). With N references per binding in a large parent scope this is O(N*M) where it should be O(1) per reference. Tied to the correctness issue: once the check uses the reference's own `range_start`, the inner scan disappears.","fix":"Resolve the reference's own range directly and check scope containment in O(1), removing the inner iteration over `binding.references`.","locations":[{"ref":"crates/biome_js_semantic/src/semantic_model/closure.rs:254-265","code":"  254 |     fn is_reference_within_scope(\n  255 |         &self,\n  256 |         scope: &SemanticModelScopeData,\n  257 |         reference: &ReferenceId,\n  258 |     ) -> bool {\n  259 |         let binding_id = reference.binding_id();\n  260 |         let binding = self.data.binding(binding_id);\n  261 |         binding\n  262 |             .references\n  263 |             .iter()\n  264 |             .any(|semantic_reference| scope.range.contains(semantic_reference.range_start))\n  265 |     }","lines":12,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_js_semantic/src/semantic_model/closure.rs#L254-L265"},{"ref":"crates/biome_js_semantic/src/semantic_model/closure.rs:295-308","code":"  295 |             let parent_read_references: Vec<_> = parent_scope\n  296 |                 .read_references\n  297 |                 .iter()\n  298 |                 .filter(|reference| self.is_reference_within_scope(scope, reference))\n  299 |                 .collect();\n  300 |             let parent_write_references: Vec<_> = parent_scope\n  301 |                 .write_references\n  302 |                 .iter()\n  303 |                 .filter(|reference| self.is_reference_within_scope(scope, reference))\n  304 |                 .collect();\n  305 | \n  306 |             references.extend(parent_read_references.iter().copied());\n  307 |             references.extend(parent_write_references.iter().copied());\n  308 |         }","lines":14,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_js_semantic/src/semantic_model/closure.rs#L295-L308"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`build_parent_nodes` calls `db.all_modules()` (which materializes/clones every module's `ModuleInfoKind`) on every recursive invocation, and clones the `visited` set per parent (`branch_visited = visited.clone()`) before recursing. In a project with a dense import graph this is O(modules) work per node plus per-branch set copies, giving worst-case exponential time and large allocation churn while building the diagnostic import tree.","fix":"Hoist `all_modules()` out of the recursion (or iterate without cloning kinds), and avoid cloning the full `visited` set per branch (use a shared set with backtracking).","locations":[{"ref":"crates/biome_module_graph/src/db/queries.rs:578-645","code":"  578 | pub(crate) fn build_parent_nodes(\n  579 |     db: &dyn ModuleDb,\n  580 |     current_path: &Utf8Path,\n  581 |     visited: &mut FxHashSet<Utf8PathBuf>,\n  582 | ) -> Vec<ImportTreeNode> {\n  583 |     let all_modules = db.all_modules();\n  584 |     let mut parents = Vec::new();\n  585 | \n  586 |     for (file_path, module_info) in &all_modules {\n  587 |         if visited.contains(file_path.as_path()) {\n  588 |             continue;\n  589 |         }\n  590 | \n  591 |         let imports_current = match module_info {\n  592 |             ModuleInfoKind::Js(js_info) => js_info\n  593 |                 .static_import_paths\n  594 |                 .values()\n  595 |                 .chain(js_info.dynamic_import_paths.values())\n  596 |                 .any(|p| p.as_path() == Some(current_path)),\n  597 |             ModuleInfoKind::Html(html_info) => html_info\n  598 |                 .imported_stylesheets\n  599 |                 .iter()\n  600 |                 .chain(html_info.static_import_paths.values())\n  601 |                 .chain(html_info.dynamic_import_paths.values())\n  602 |                 .any(|p| p.as_path() == Some(current_path)),\n  603 |             ModuleInfoKind::Css(_) => false,\n  604 |         };\n  605 | \n  606 |         if imports_current {\n  607 |             let css_imports: Vec<Utf8PathBuf> = match module_info {\n  608 |                 ModuleInfoKind::Js(js_info) => js_info\n  609 |                     .static_import_paths\n  610 |                     .values()\n  611 |                     .filter_map(|import_path| {\n  612 |                         let path = import_path.as_path()?;\n  613 |                         db.css_module_info_for_path(path)?;\n  614 |                         Some(path.to_path_buf())\n  615 |                     })\n  616 |                     .collect(),\n  617 |                 ModuleInfoKind::Html(html_info) => html_info\n  618 |                     .imported_stylesheets\n  619 |                     .iter()\n  620 |                     .chain(html_info.static_import_paths.values())\n  621 |                     .chain(html_info.dynamic_import_paths.values())\n  622 |                     .filter_map(|stylesheet_path| {\n  623 |                         let path = stylesheet_path.as_path()?;\n  624 |                         db.css_module_info_for_path(path)?;\n  625 |                         Some(path.to_path_buf())\n  626 |                     })\n  627 |                     .collect(),\n  628 |                 ModuleInfoKind::Css(_) => Vec::new(),\n  629 |             };\n  630 | \n  631 |             let mut branch_visited = visited.clone();\n  632 |             branch_visited.insert(file_path.clone());\n  633 | \n  634 |             let parent_components = build_parent_nodes(db, file_path, &mut branch_visited);\n  635 | \n  636 |             parents.push(ImportTreeNode {\n  637 |                 file_path: file_path.clone(),\n  638 |                 css_imports,\n  639 |                 parent_components,\n  640 |             });\n  641 |         }\n  642 |     }\n  643 | \n  644 |     parents\n  645 | }","lines":68,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_module_graph/src/db/queries.rs#L578-L645"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`format_embedded` resolves each requested range with a linear scan `embedded_nodes.iter().find(|node| node.range == range)`. The closure is invoked once per embedded region the formatter encounters, making range resolution O(n^2) in the number of embeds. Usually few embeds per file, but it scales poorly for documents with many script/style/expression embeds.","fix":"Build a HashMap<TextRange, &FormatEmbedNode> (or sort + binary search) once before formatting, and look up by range in the closure.","locations":[{"ref":"crates/biome_service/src/file_handlers/html.rs:487-489","code":"  487 |     formatted.format_embedded(move |range| {\n  488 |         let mut iter = embedded_nodes.iter();\n  489 |         let node = iter.find(|node| node.range == range)?;","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/file_handlers/html.rs#L487-L489"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`search_pattern` calls `self.projects.get_settings_based_on_path(project_key, &path)` twice with identical arguments. The first result (lines 3081-3084) is used for capabilities and the `experimental_full_html_support_enabled()` check; the second identical lookup at lines 3091-3094 simply re-fetches and shadows it. This doubles a non-trivial settings lookup on every search request.","fix":"Fetch the settings once and reuse the value; remove the redundant second `get_settings_based_on_path` call.","locations":[{"ref":"crates/biome_service/src/workspace/server.rs:3081-3099","code":" 3081 |         let settings = self\n 3082 |             .projects\n 3083 |             .get_settings_based_on_path(project_key, &path)\n 3084 |             .ok_or_else(WorkspaceError::no_project)?;\n 3085 |
