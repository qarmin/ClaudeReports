<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","easy":true,"description":"In `parse_keyframes_scoped_name`, when CSS Modules is unsupported (the DEFAULT for plain CSS) and a `@keyframes` uses a `:local`/`:global` scoped name, recovery runs `while !p.at(T!['{']) { p.bump_any(); }` with no EOF guard. If the input ends before any `{`, `bump_any()` is called at EOF, which asserts `kind != EOF` (biome_parser/src/lib.rs:333) and panics. Confirmed by running `parse_css(\"@keyframes :local(x)\", CssFileSource::css(), default())`, which panics.","fix":"Add an EOF guard: `while !p.at(T!['{']) && !p.at(EOF) { p.bump_any(); }`.","locations":[{"ref":"crates/biome_css_parser/src/syntax/at_rule/keyframes.rs:123-125","code":"  123 |         while !p.at(T!['{']) {\n  124 |             p.bump_any();\n  125 |         }","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_parser/src/syntax/at_rule/keyframes.rs#L123-L125"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"critical","easy":true,"description":"In `parse_value_at_rule`, when CSS Modules is unsupported (the DEFAULT for plain CSS), the `@value` rule is skipped with `while !p.eat(T![;]) { p.bump_any(); }`. At EOF, `eat(T![;])` returns false and `bump_any()` is then called at EOF, hitting the `assert_ne!(kind, EOF)` and panicking. Confirmed by running `parse_css(\"@value\", CssFileSource::css(), default())`, which panics. Contrast value.rs:262-267 which correctly guards with `p.at(EOF)`.","fix":"Add an EOF guard: `while !p.at(EOF) && !p.eat(T![;]) { p.bump_any(); }`.","locations":[{"ref":"crates/biome_css_parser/src/syntax/at_rule/value.rs:48-50","code":"   48 |         while !p.eat(T![;]) {\n   49 |             p.bump_any();\n   50 |         }","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_parser/src/syntax/at_rule/value.rs#L48-L50"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `resolve_binding_in_document_or_snippets`, `let local_cursor = cursor_offset - snippet_offset;` is computed unconditionally at the top of the loop, BEFORE the bounds check that follows. `TextSize` subtraction panics on underflow (debug) / wraps (release). When the cursor is positioned before an embedded snippet (cursor_offset < snippet_offset), this aborts the go-to-definition request instead of skipping the snippet. The guard on the next lines (cursor_offset < snippet_range.start()) would have correctly skipped it, but it runs too late.","fix":"Move the `if cursor_offset < snippet_range.start() || cursor_offset >= snippet_range.end() { continue; }` check above the `local_cursor` computation, so the subtraction only runs when the cursor is known to be inside the snippet.","locations":[{"ref":"crates/biome_service/src/workspace/server.rs:948-955","code":"  948 |         for snippet in embedded_snippets {\n  949 |             let snippet_offset = snippet.content_offset();\n  950 |             let local_cursor = cursor_offset - snippet_offset;\n  951 | \n  952 |             let snippet_range = snippet.content_range();\n  953 |             if cursor_offset < snippet_range.start() || cursor_offset >= snippet_range.end() {\n  954 |                 continue;\n  955 |             }","lines":8,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/workspace/server.rs#L948-L955"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`compute_initial_fingerprint` slices the source text with `&source_code.text[span]` without any bounds/char-boundary guard. `Index<TextRange> for str` panics if the span end exceeds `text.len()` or falls on a non-UTF-8 char boundary. Other consumers in these reporters guard via `SourceFile::location(...).ok()`; this one indexes raw, so a diagnostic whose span does not match its attached source code panics the whole CLI run.","fix":"Use a checked slice, e.g. `source_code.text.get(Range::<usize>::from(span)).unwrap_or(\"\")`, before hashing.","locations":[{"ref":"crates/biome_cli/src/reporter/gitlab.rs:124-144","code":"  124 |     fn compute_initial_fingerprint(&self, diagnostic: &Error, path: &str) -> u64 {\n  125 |         let location = diagnostic.location();\n  126 |         let code = match location.span {\n  127 |             Some(span) => match location.source_code {\n  128 |                 Some(source_code) => &source_code.text[span],\n  129 |                 None => \"\",\n  130 |             },\n  131 |             None => \"\",\n  132 |         };\n  133 | \n  134 |         let check_name = diagnostic\n  135 |             .category()\n  136 |             .map(|category| category.name())\n  137 |             .unwrap_or_default();\n  138 | \n  139 |         calculate_hash(&Fingerprint {\n  140 |             check_name,\n  141 |             path,\n  142 |             code,\n  143 |         })\n  144 |     }","lines":21,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/reporter/gitlab.rs#L124-L144"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`SuggestionsVisitor::record_frame` calls `source.location(span.start()).expect(\"Invalid span\")` and `span.end()).expect(\"Invalid span\")`. If the diagnostic carries a span out of range for its source_code, `SourceFile::location` returns Err and this panics during `--reporter=json`. The analogous code in rdjson/sarif/json `to_location` uses `.ok()?` to skip gracefully; only this path panics.","fix":"Replace the two `.expect(\"Invalid span\")` with guards that return early, matching the rdjson/sarif handling.","locations":[{"ref":"crates/biome_cli/src/reporter/json.rs:414-431","code":"  414 |     fn record_frame(&mut self, location: Location<'_>) -> std::io::Result<()> {\n  415 |         if let (Some(span), Some(source_code)) = (location.span, location.source_code) {\n  416 |             let source = SourceFile::new(source_code);\n  417 |             let start = source.location(span.start()).expect(\"Invalid span\");\n  418 |             let end = source.location(span.end()).expect(\"Invalid span\");\n  419 | \n  420 |             self.suggestions.push(JsonSuggestion {\n  421 |                 end: LocationSpan {\n  422 |                     line: end.line_number.get(),\n  423 |                     column: end.column_number.get(),\n  424 |                 },\n  425 |                 start: LocationSpan {\n  426 |                     line: start.line_number.get(),\n  427 |                     column: start.column_number.get(),\n  428 |                 },\n  429 |                 text: self.current_message.take().unwrap_or_default(),\n  430 |             })\n  431 |         }","lines":18,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/reporter/json.rs#L414-L431"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In the `EqualLines` branch of `text_edit`, both `line_index.line_col(offset).expect(...)` and `line_index.offset(line_col).expect(...)` panic if `doc.line_index` (the previous document revision) does not correspond to the revision the TextEdit diff was computed against. Because `insert_document` (which sets line_index) and `change_file` (which sets workspace content) are separate non-atomic steps reachable concurrently from async handlers, an interleaved didChange can desynchronize them, after which an edit diff produced against newer content is converted with a stale line index and panics.","fix":"Replace the two `expect` with `?` plus `.context(...)` so the handler degrades to producing no edits instead of crashing the request.","locations":[{"ref":"crates/biome_lsp/src/utils.rs:75-90","code":"   75 |             CompressedOp::EqualLines { line_count } => {\n   76 |                 let mut line_col = line_index\n   77 |                     .line_col(offset)\n   78 |                     .expect(\"diff length is overflowing the line count in the original file\");\n   79 | \n   80 |                 line_col.line += line_count.get() + 1;\n   81 |                 line_col.col = 0;\n   82 | \n   83 |                 // SAFETY: This should only happen if `line_index` wasn't built\n   84 |                 // from the same string as the old revision of `diff`\n   85 |                 let new_offset = line_index\n   86 |                     .offset(line_col)\n   87 |                     .expect(\"diff length is overflowing the line count in the original file\");\n   88 | \n   89 |                 offset = new_offset;\n   90 |             }","lines":16,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_lsp/src/utils.rs#L75-L90"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`SyntaxSlots::nth_back(n)` does `self.back_pos -= n as u32` with no bounds check, then calls `next_back()`. The DoubleEndedIterator::nth_back contract requires that `n >= remaining` consume the iterator and return None. Here, if `n >= len()`, the subtraction underflows: it panics in debug, and in release wraps `back_pos` to a huge value, after which `slice()` evaluates `self.pos < self.back_pos` as true and indexes `green().slice()[pos..huge]`, causing an out-of-bounds slice panic. The forward `nth` (line 811-815) is safe only because `slice()` clamps `pos`; `nth_back` mutates `back_pos` before any guard.","fix":"Clamp before subtracting, mirroring the forward direction: if `n` would push `back_pos` to or below `pos`, set `back_pos = pos` and return None; otherwise `back_pos -= n as u32; next_back()`.","locations":[{"ref":"crates/biome_rowan/src/cursor/node.rs:836-840","code":"  836 |     #[inline]\n  837 |     fn nth_back(&mut self, n: usize) -> Option<Self::Item> {\n  838 |         self.back_pos -= n as u32;\n  839 |         self.next_back()\n  840 |     }","lines":5,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_rowan/src/cursor/node.rs#L836-L840"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`format_on_type` panics on inputs reachable from the LSP/CLI. `TokenAtOffset::None => panic!(\"empty file\")` is hit for an empty (or trivia-only) document, and the parent lookup is `panic!(\"found a token with no parent\")`. The preceding range check only guards the offset against the tree's byte range, not emptiness, so a format-on-type request on an empty file aborts the worker thread instead of returning a `WorkspaceError`. The same copy-pasted panics exist in five handlers.","fix":"Return `Ok(Printed::default())` (or a `WorkspaceError`) for `TokenAtOffset::None` and for a token without a parent, instead of `panic!`.","locations":[{"ref":"crates/biome_service/src/file_handlers/javascript.rs:1413-1425","code":" 1413 |     let token = match tree.token_at_offset(offset) {\n 1414 |         // File is empty, do nothing\n 1415 |         TokenAtOffset::None => panic!(\"empty file\"),\n 1416 |         TokenAtOffset::Single(token) => token,\n 1417 |         // The cursor should be right after the closing character that was just typed,\n 1418 |         // select the previous token as the correct one\n 1419 |         TokenAtOffset::Between(token, _) => token,\n 1420 |     };\n 1421 | \n 1422 |     let root_node = match token.parent() {\n 1423 |         Some(node) => node,\n 1424 |         None => panic!(\"found a token with no parent\"),\n 1425 |     };","lines":13,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/file_handlers/javascript.rs#L1413-L1425"},{"ref":"crates/biome_service/src/file_handlers/json.rs:505-517","code":"  505 |     let token = match tree.token_at_offset(offset) {\n  506 |         // File is empty, do nothing\n  507 |         TokenAtOffset::None => panic!(\"empty file\"),\n  508 |         TokenAtOffset::Single(token) => token,\n  509 |         // The cursor should be right after the closing character that was just typed,\n  510 |         // select the previous token as the correct one\n  511 |         TokenAtOffset::Between(token, _) => token,\n  512 |     };\n  513 | \n  514 |     let root_node = match token.parent() {\n  515 |         Some(node) => node,\n  516 |         None => panic!(\"found a token with no parent\"),\n  517 |     };","lines":13,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/file_handlers/json.rs#L505-L517"},{"ref":"crates/biome_service/src/file_handlers/css.rs:536-548","code":"  536 |     let token = match tree.token_at_offset(offset) {\n  537 |         // File is empty, do nothing\n  538 |         TokenAtOffset::None => panic!(\"empty file\"),\n  539 |         TokenAtOffset::Single(token) => token,\n  540 |         // The cursor should be right after the closing character that was just typed,\n  541 |         // select the previous token as the correct one\n  542 |         TokenAtOffset::Between(token, _) => token,\n  543 |     };\n  544 | \n  545 |     let root_node = match token.parent() {\n  546 |         Some(node) => node,\n  547 |         None => panic!(\"found a token with no parent\"),\n  548 |     };","lines":13,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/file_handlers/css.rs#L536-L548"},{"ref":"crates/biome_service/src/file_handlers/graphql.rs:423-435","code":"  423 |     let token = match tree.token_at_offset(offset) {\n  424 |         // File is empty, do nothing\n  425 |         TokenAtOffset::None => panic!(\"empty file\"),\n  426 |         TokenAtOffset::Single(token) => token,\n  427 |         // The cursor should be right after the closing character that was just typed,\n  428 |         // select the previous token as the correct one\n  429 |         TokenAtOffset::Between(token, _) => token,\n  430 |     };\n  431 | \n  432 |     let root_node = match token.parent() {\n  433 |         Some(node) => node,\n  434 |         None => panic!(\"found a token with no parent\"),\n  435 |     };","lines":13,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/file_handlers/graphql.rs#L423-L435"},{"ref":"crates/biome_service/src/file_handlers/grit.rs:404-416","code":"  404 |     let token = match tree.token_at_offset(offset) {\n  405 |         // File is empty, do nothing\n  406 |         TokenAtOffset::None => panic!(\"empty file\"),\n  407 |         TokenAtOffset::Single(token) => token,\n  408 |         // The cursor should be right after the closing character that was just typed,\n  409 |         // select the previous token as the correct one\n  410 |         TokenAtOffset::Between(token, _) => token,\n  411 |     };\n  412 | \n  413 |     let root_node = match token.parent() {\n  414 |         Some(node) => node,\n  415 |         None => panic!(\"found a token with no parent\"),\n  416 |     };","lines":13,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/file_handlers/grit.rs#L404-L416"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`default_biome_log_path` reads `BIOME_LOG_PATH` via `env::var_os` and calls `.to_str().unwrap()`, which panics if the env var contains non-UTF-8 bytes (possible on Unix). Other call sites for the same variable use `biome_env().value_for(...)` returning `Option<String>` and never panic.","fix":"Handle the non-UTF-8 case gracefully, or use `biome_env().value_for(\"BIOME_LOG_PATH\")` consistently.","locations":[{"ref":"crates/biome_cli/src/commands/daemon.rs:240-245","code":"  240 | pub fn default_biome_log_path() -> Utf8PathBuf {\n  241 |     match env::var_os(\"BIOME_LOG_PATH\") {\n  242 |         Some(directory) => Utf8PathBuf::from(directory.as_os_str().to_str().unwrap()),\n  243 |         None => biome_fs::ensure_cache_dir().join(\"biome-logs\"),\n  244 |     }\n  245 | }","lines":6,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/commands/daemon.rs#L240-L245"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Inside a `Display::fmt` impl (expected to only fail via `io::Error`), `settings.merge_with_configuration(...).unwrap()` panics if merging the loaded configuration fails. A malformed-but-loadable configuration could trigger this during `biome rage`, aborting the process rather than printing a diagnostic.","fix":"Handle the `Result` instead of unwrapping, printing a fallback failure line via the formatter.","locations":[{"ref":"crates/biome_cli/src/commands/rage.rs:226-233","code":"  226 |                     let mut settings = Settings::default();\n  227 |                     settings\n  228 |                         .merge_with_configuration(\n  229 |                             configuration.clone(),\n  230 |                             None,\n  231 |                             extended_configurations,\n  232 |                         )\n  233 |                         .unwrap();","lines":8,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/commands/rage.rs#L226-L233"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`setup_cli_subscriber` calls `File::create(file)...expect(\"Failed to create log file\")`. When the user passes `--log-file`/`BIOME_LOG_FILE` pointing at an unwritable path (no permission, missing parent dir), the CLI panics during logging setup instead of returning a clean diagnostic.","fix":"Propagate the error (make the function fallible) or fall back to stdout with a warning instead of `expect`.","locations":[{"ref":"crates/biome_cli/src/logging.rs:102-107","code":"  102 |     let make_writer = file\n  103 |         .map(File::create)\n  104 |         .transpose()\n  105 |         .expect(\"Failed to create log file\")\n  106 |         .optional()\n  107 |         .or_else(std::io::stdout);","lines":6,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/logging.rs#L102-L107"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`DefaultWatcher::new` calls `recommended_watcher(tx).expect(\"watcher created\")`. Creating an OS file watcher can genuinely fail at runtime (e.g. inotify instance/fd limits exhausted on Linux), which would panic the CLI in `--watch` mode instead of surfacing a `WatcherDiagnostic`.","fix":"Make `new` fallible or store the construction error and surface it as a `WatcherEvent::Error` on first poll rather than panicking.","locations":[{"ref":"crates/biome_cli/src/runner/impls/watchers/default.rs:17-23","code":"   17 |     pub fn new() -> Self {\n   18 |         let (tx, rx) = channel();\n   19 |         Self {\n   20 |             rx,\n   21 |             watcher: Box::new(recommended_watcher(tx).expect(\"watcher created\")),\n   22 |         }\n   23 |     }","lines":7,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/runner/impls/watchers/default.rs#L17-L23"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`should_hug_type` computes `union_type.types().len() - 1 == void_count` on a `TsUnionTypeVariantList`. The variant list is a separated list that can be empty in error-recovery parses (e.g. a malformed `type T = |;`). `len()` returning 0 makes the subtraction underflow and panic in debug builds. The expression is evaluated unconditionally before the `|| successful.count() == 1` branch.","fix":"Guard against an empty list, e.g. `union_type.types().len().checked_sub(1) == Some(void_count)`, or early-return when the list is empty.","locations":[{"ref":"crates/biome_js_formatter/src/utils/typescript.rs:94-95","code":"   94 |         union_type.types().len() - 1 == void_count && has_object_type && comments == 0\n   95 |             || successful.count() == 1","lines":2,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_js_formatter/src/utils/typescript.rs#L94-L95"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`diagnostic.advices(&mut visitor).unwrap()` panics if a diagnostic advice's Display/io path ever returns an error. Diagnostics are produced from analyzing untrusted source, so a custom advice could trigger it; the function already returns Result.","fix":"Replace `.unwrap()` with `?`.","locations":[{"ref":"crates/biome_lsp/src/utils.rs:283","code":"  283 |     diagnostic.advices(&mut visitor).unwrap();","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_lsp/src/utils.rs#L283"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`element_in_slot` does `self.slots().nth(slot_index as usize).expect(\"Slot index out of bounds\")`. `SyntaxSlots::nth` returns None past the end (it just advances `pos`), so this `expect` is reachable and panics on an invalid index instead of returning None. The trailing `.map(|element| element)` is also a no-op identity map.","fix":"Return `Option<SyntaxElement>` and use `?`/`and_then`, or document/assert the precondition if the method is meant to be infallible. Remove the identity `.map(|element| element)`.","locations":[{"ref":"crates/biome_rowan/src/cursor/node.rs:73-80","code":"   73 |     pub(crate) fn element_in_slot(&self, slot_index: u32) -> Option<SyntaxElement> {\n   74 |         let slot = self\n   75 |             .slots()\n   76 |             .nth(slot_index as usize)\n   77 |             .expect(\"Slot index out of bounds\");\n   78 | \n   79 |         slot.map(|element| element)\n   80 |     }","lines":8,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_rowan/src/cursor/node.rs#L73-L80"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`AstroFileHandler::output` slices `&input[..start.end() + 1]`. `start.end()` is the end of the `^---\\s*$` match (just before the line's newline); `+1` assumes a single `\\n` follows. With CRLF endings the byte at `start.end()` is `\\r`, so `start.end()+1` falls inside the `\\r\\n` pair (panic on non-char-boundary slice), and for a fence at EOF with no trailing byte it indexes out of bounds. Reached from CLI/LSP Astro formatting.","fix":"Avoid the unconditional +1; locate the next newline relative to `start.end()` or use a char-boundary-safe offset instead of assuming a single-byte newline immediately follows.","locations":[{"ref":"crates/biome_service/src/file_handlers/astro.rs:54-66","code":"   54 |     pub fn output(input: &str, output: &str) -> String {\n   55 |         let mut matches = Self::matches(input);\n   56 |         if let (Some(start), Some(end)) = (matches.next(), matches.next()) {\n   57 |             format!(\n   58 |                 \"{}{}{}\",\n   59 |                 &input[..start.end() + 1],\n   60 |                 output.trim_start(),\n   61 |                 &input[end.start()..]\n   62 |             )\n   63 |         } else {\n   64 |             input.to_string()\n   65 |         }\n   66 |     }","lines":13,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/file_handlers/astro.rs#L54-L66"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"The verbatim-marker source position is computed as `TextSize::from(self.state.buffer.len() as u32)`, truncating a `usize` byte length to `u32`. For output larger than 4 GiB this silently produces wrong offsets. Everywhere else the printer uses `text_len()`, which returns `TextSize` and asserts the u32 bound; this raw `as u32` is the only place that truncates instead of asserting. Practically unreachable for formatting, hence low.","fix":"Use `self.state.buffer.text_len()` (returns `TextSize`, asserts the bound) instead of `TextSize::from(self.state.buffer.len() as u32)`.","locations":[{"ref":"crates/biome_formatter/src/printer/mod.rs:284-290","code":"  284 |             FormatElement::Tag(StartVerbatim(kind)) => {\n  285 |                 if let VerbatimKind::Verbatim { length } = kind {\n  286 |                     self.state.verbatim_markers.push(TextRange::at(\n  287 |                         TextSize::from(self.state.buffer.len() as u32),\n  288 |                         *length,\n  289 |                     ));\n  290 |                 }","lines":7,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_formatter/src/printer/mod.rs#L284-L290"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`Indention::increment_level` (`Self::Level(count + 1)`, `Self::Level(level + align_count + 1)`) and `Indention::set_align` (`align_count + 1`, `level + 1`) use non-saturating `u16` arithmetic, while the `align` (u8) field deliberately uses `saturating_add`. With pathological (>65535) nesting these panic in debug / wrap in release. Not reachable in practice, but the saturation was applied inconsistently.","fix":"Use `saturating_add` consistently for the `level` and `align_count` fields, matching the `align` field.","locations":[{"ref":"crates/biome_formatter/src/printer/mod.rs:955-996","code":"  955 |     fn increment_level(self, indent_style: IndentStyle) -> Self {\n  956 |         match self {\n  957 |             Self::Level(count) => Self::Level(count + 1),\n  958 |             // Increase the indent AND convert the align to an indent\n  959 |             Self::Align {\n  960 |                 level, align_count, ..\n  961 |             } if indent_style.is_tab() => Self::Level(level + align_count + 1),\n  962 |             Self::Align {\n  963 |                 level: indent,\n  964 |                 align,\n  965 |                 align_count,\n  966 |             } => Self::Align {\n  967 |                 level: indent + 1,\n  968 |                 align,\n  969 |                 align_count,\n  970 |             },\n  971 |         }\n  972 |     }\n  973 | \n  974 |     /// Adds an `align` of `count` spaces to the current indention.\n  975 |     ///\n  976 |     /// It increments the `level` value if the current value is [Indent::IndentAlign].\n  977 |     fn set_align(self, count: NonZeroU8) -> Self {\n  978 |         match self {\n  979 |             Self::Level(indent_count) => Self::Align {\n  980 |                 level: indent_count,\n  981 |                 align: count,\n  982 |                 align_count: 1,\n  983 |             },\n  984 | \n  985 |             // Convert the existing align to an indent\n  986 |             Self::Align {\n  987 |                 level: indent,\n  988 |                 align,\n  989 |                 align_count,\n  990 |             } => Self::Align {\n  991 |                 level: indent,\n  992 |                 align: align.saturating_add(count.get()),\n  993 |                 align_count: align_count + 1,\n  994 |             },\n  995 |         }\n  996 |     }","lines":42,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_formatter/src/printer/mod.rs#L955-L996"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`SourceMap::text_slice` computes `&self.text[range - self.offset]`; the precondition `range.start() >= self.offset` is enforced only by `debug_assert!`. In release, a range starting before `offset` underflows the `TextSize` subtraction (panic) or yields a bogus range causing an OOB slice panic. All current callers are internal, so this is defensive rather than an active bug.","fix":"Acceptable given internal usage; if hardening is desired, clamp or return a Result instead of relying on debug-only assertion.","locations":[{"ref":"crates/biome_formatter/src/source_map.rs:308-317","code":"  308 |     pub fn text_slice(&self, range: TextRange) -> &str {\n  309 |         debug_assert!(\n  310 |             range.start() >= self.offset,\n  311 |             \"Range {:?} should be bigger than offset {:?}.\",\n  312 |             range,\n  313 |             self.offset\n  314 |         );\n  315 | \n  316 |         &self.text[range - self.offset]\n  317 |     }","lines":10,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_formatter/src/source_map.rs#L308-L317"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`span.start().add(TextSize::from(offset))` / `span.end().add(...)` use unchecked `Add` on TextSize. For a span near u32::MAX plus an embedded-language frontmatter offset, this panics in debug / wraps in release. Values are partly derived from file content.","fix":"Use `checked_add` and return an error on overflow.","locations":[{"ref":"crates/biome_lsp/src/utils.rs:240-247","code":"  240 |     let span = if let Some(offset) = offset {\n  241 |         TextRange::new(\n  242 |             span.start().add(TextSize::from(offset)),\n  243 |             span.end().add(TextSize::from(offset)),\n  244 |         )\n  245 |     } else {\n  246 |         span\n  247 |     };","lines":8,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_lsp/src/utils.rs#L240-L247"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"The multiplicative growth check `new.saturating_mul(RATIO_Q) >= self.previous.saturating_mul(RATIO_GROWTH)` saturates both sides to u32::MAX for large lengths (previous*150 saturates above ~28.6M chars, new*100 above ~42.9M). Once both saturate, the comparison is always true, so `growth_streak` increments every iteration regardless of actual growth, and a large-but-stable file can be falsely flagged as conflicting after STREAK_LIMIT iterations. Also, when previous==new==0, `0*100 >= 0*150` is true, falsely counting a growth streak for an empty/unchanged value. Used in the fix-all loop in file_handlers/mod.rs.","fix":"Compute the ratio in u64 to avoid saturation, e.g. `(new as u64) * RATIO_Q as u64 >= (previous as u64) * RATIO_GROWTH as u64`, and guard the equal/zero case so a non-growing value does not accumulate a streak.","locations":[{"ref":"crates/biome_service/src/utils/growth_guard.rs:44","code":"   44 |         if new.saturating_mul(RATIO_Q) >= self.previous.saturating_mul(RATIO_GROWTH) {","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/utils/growth_guard.rs#L44"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`RuleCategory::from_str` accepts \"action\" but not \"assist\", while the suppression-comment category for assists is \"assist\" (see `as_suppression_category` returning \"assist\" and the category registry naming it \"assist\"). In `to_analyzer_suppressions`, a whole-category assist suppression like `// biome-ignore assist` / `// biome-ignore-all assist` is parsed via `RuleCategory::from_str(key.name())` where `key.name()` == \"assist\"; this returns `Err`, so the suppression is silently dropped and the assist signals are NOT suppressed. The `Everything(assist)` suppression therefore never works.","fix":"Make `RuleCategory::from_str` accept \"assist\" (mapping it to `RuleCategory::Action`) in addition to (or instead of) \"action\", so it round-trips with `as_suppression_category`. Alternatively, in `to_analyzer_suppressions` map the `assist` key explicitly to `RuleCategory::Action` rather than going through `from_str`.","locations":[{"ref":"crates/biome_analyze/src/categories.rs:42-50","code":"   42 |     fn from_str(s: &str) -> Result<Self, Self::Err> {\n   43 |         match s {\n   44 |             \"syntax\" => Ok(Self::Syntax),\n   45 |             \"lint\" => Ok(Self::Lint),\n   46 |             \"action\" => Ok(Self::Action),\n   47 |             \"transformation\" => Ok(Self::Transformation),\n   48 |             _ => Err(\"Invalid rule category\"),\n   49 |         }\n   50 |     }","lines":9,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_analyze/src/categories.rs#L42-L50"},{"ref":"crates/biome_analyze/src/lib.rs:739-745","code":"  739 |         if key == category!(\"lint\") || key == category!(\"assist\") {\n  740 |             if let Ok(category) = RuleCategory::from_str(key.name()) {\n  741 |                 result.push(\n  742 |                     AnalyzerSuppression::everything(category, reason)\n  743 |                         .with_variant(&suppression.kind),\n  744 |                 );\n  745 |             }","lines":7,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_analyze/src/lib.rs#L739-L745"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Prettier's `bracketSameLine` option is never migrated. The field is named `bracket_line` and the Deserializable macro defaults to camelCase serialized names, so it deserializes from the JSON key `bracketLine` - which is not a real Prettier option (the real option is `bracketSameLine`, with the older deprecated alias `jsxBracketSameLine`). Consequently a user's `bracketSameLine` setting is silently dropped and Biome's `bracketSameLine` always takes the default. Same misnamed field is used for both top-level config and per-override options; the doc-comment URL `#bracket-line` is also wrong.","fix":"Rename the field to `bracket_same_line` (deserializing from `bracketSameLine`), or add `#[deserializable(rename = \"bracketSameLine\")]`, and fix the doc-comment link.","locations":[{"ref":"crates/biome_cli/src/execute/migrate/prettier.rs:52-53","code":"   52 |     /// https://prettier.io/docs/en/options#bracket-line\n   53 |     bracket_line: bool,","lines":2,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/execute/migrate/prettier.rs#L52-L53"},{"ref":"crates/biome_cli/src/execute/migrate/prettier.rs:112-116","code":"  112 |     single_quote: Option<bool>,\n  113 |     /// https://prettier.io/docs/en/options#bracket-spcing\n  114 |     bracket_spacing: Option<bool>,\n  115 |     /// https://prettier.io/docs/en/options#bracket-line\n  116 |     bracket_line: Option<bool>,","lines":5,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/execute/migrate/prettier.rs#L112-L116"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"PrettierConfiguration's Default impl inverts two Prettier defaults. Prettier's real defaults are `semi: true` and `singleQuote: false`, but here `semi` defaults to `false` and `single_quote` to `true`. The derived Deserializable builds the struct via this Default and only overwrites fields present in the JSON, so any Prettier config that omits `semi` or `singleQuote` migrates to the wrong Biome setting (e.g. it produces `semicolons: asNeeded` and single quotes when Prettier would use semicolons and double quotes).","fix":"Set the Default impl to match Prettier: `semi: true` and `single_quote: false`.","locations":[{"ref":"crates/biome_cli/src/execute/migrate/prettier.rs:77-79","code":"   77 |             semi: false,\n   78 |             single_quote: true,\n   79 |             bracket_spacing: true,","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/execute/migrate/prettier.rs#L77-L79"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"GitLab reporter inverts verbose filtering compared to every other reporter. When `verbose` is true it keeps ONLY verbose-tagged diagnostics and drops all normal ones; when `verbose` is false it keeps ALL diagnostics including verbose-tagged ones (which should be hidden). Every other reporter uses: always keep non-verbose, additionally keep verbose only when the flag is set. So `--reporter=gitlab` with verbose off leaks verbose diagnostics, and with verbose on hides all real diagnostics.","fix":"Replace the filter with the standard convention: `.filter(|d| !d.tags().is_verbose() || *verbose)`.","locations":[{"ref":"crates/biome_cli/src/reporter/gitlab.rs:160-166","code":"  160 |             .filter(|d| {\n  161 |                 if *verbose {\n  162 |                     d.tags().is_verbose()\n  163 |                 } else {\n  164 |                     true\n  165 |                 }\n  166 |             })","lines":7,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/reporter/gitlab.rs#L160-L166"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Operator precedence bug in the diff `is_error` computation. The comment states a diff is an error 'in CI mode and in format/check command in non-write mode', i.e. `is_ci() || ((is_format() || is_check()) && !requires_write_access())`. Because `&&` binds tighter than `||`, the expression actually evaluates as `is_ci() || is_format() || (is_check() && !requires_write_access())`. As a result a `format` diff is always counted as an error regardless of write access, skewing the error count and exit code.","fix":"Group explicitly: `let is_error = execution.is_ci() || ((execution.is_format() || execution.is_check()) && !execution.requires_write_access());`","locations":[{"ref":"crates/biome_cli/src/runner/impls/collectors/default.rs:275-277","code":"  275 |                     let is_error = execution.is_ci()\n  276 |                         || (execution.is_format()\n  277 |                             || execution.is_check() && !execution.requires_write_access());","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/runner/impls/collectors/default.rs#L275-L277"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"noInvalidGridAreas decides whether grid-template-areas rows are consistent by comparing the UTF-8 byte length of the trimmed row string (cleaned_text.len() != first_len) instead of comparing the number of cell tokens. The rule's documented semantics require the same number of cell tokens per row. Rows with the same byte length but different token counts are wrongly accepted, e.g. `\"aaa b\"` (2 tokens, len 5) vs `\"a b c\"` (3 tokens, len 5) is a false negative; multi-byte cell names also distort the comparison.","fix":"Compare token counts, not byte lengths: let first_len = first_prop.split_whitespace().count(); and compare cleaned_text.split_whitespace().count() != first_len.","locations":[{"ref":"crates/biome_css_analyze/src/lint/correctness/no_invalid_grid_areas.rs:188-212","code":"  188 |     let first_prop = inner_string_text(&grid_areas_props[0].0);\n  189 |     let first_len = first_prop.len();\n  190 |     let mut shortest = &grid_areas_props[0];\n  191 | \n  192 |     for grid_areas_prop in &grid_areas_props {\n  193 |         let cleaned_text = inner_string_text(&grid_areas_prop.0);\n  194 |         // Check if the grid areas are empty\n  195 |         if cleaned_text.is_empty() {\n  196 |             return Some(UseConsistentGridAreasState {\n  197 |                 text: None,\n  198 |                 span: grid_areas_prop.1,\n  199 |                 reason: GridAreaValidationError::EmptyGridArea,\n  200 |             });\n  201 |         }\n  202 |         // Check if all elements have the same length\n  203 |         if cleaned_text.len() != first_len {\n  204 |             if cleaned_text.len() < inner_string_text(&shortest.0).len() {\n  205 |                 shortest = grid_areas_prop;\n  206 |             }\n  207 |             return Some(UseConsistentGridAreasState {\n  208 |                 text: None,\n  209 |                 span: shortest.1,\n  210 |                 reason: GridAreaValidationError::InconsistentCellCount,\n  211 |             });\n  212 |         }","lines":25,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_analyze/src/lint/correctness/no_invalid_grid_areas.rs#L188-L212"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"The range-format frontmatter-offset guard is broken in two ways. `format_range.start() - TextSize::from(offset)` uses TextSize's plain `Sub`, so when `start < offset` the subtraction underflows (panics in debug, wraps in release) BEFORE the comparison is evaluated. Additionally `>= TextSize::from(0)` is an unsigned comparison that is always true, so the `else` branch is unreachable. The correct pattern is already used in analysis.rs (`cursor_range.start().gt(&TextSize::from(offset))`). For a Vue/Astro/Svelte file where a range-format request starts inside the leading frontmatter region, this is reachable from untrusted editor input.","fix":"Mirror analysis.rs: only (module) = db.module_for_path(path)\n  403 |                         {\n  404 |                             stack.push(SymbolFromModuleInfo::new(db, symbol.name(db), module));\n  405 |                         }\n  406 |                     }","lines":7,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_module_graph/src/db/queries.rs#L400-L406"},{"ref":"crates/biome_module_graph/src/db/queries.rs:257-264","code":"  257 |                     ImportSymbol::Default => {\n  258 |                         if let Ok(path) = reexport.import.resolved_path.as_deref()\n  259 |                             && seen_paths.insert(path.to_path_buf())\n  260 |                             && let Some(module) = db.module_for_path(path)\n  261 |                         {\n  262 |                             stack.push(SymbolFromModuleInfo::new(db, symbol.name(db), module));\n  263 |                         }\n  264 |                     }","lines":8,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_module_graph/src/db/queries.rs#L257-L264"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`indentation_trivia_pieces` is documented to return the run of whitespace pieces immediately preceding the token (the indentation, stopping at the first non-whitespace). The `skip_count` math is wrong in two ways. (1) `.map(|pos| pos + 1)` skips one extra piece: for leading trivia `[Newline, Whitespace(\"    \")]` it computes `skip_count = 0` and returns `[Newline, Whitespace]`, wrongly including the newline. (2) For an all-whitespace leading trivia (`position` returns `None`), `.unwrap_or(0)` yields `skip_count = len`, returning EMPTY instead of all the whitespace. This function feeds code actions (no_switch_declarations, use_single_var_declarator, biome_migrate) that copy a token's indentation onto a newly created token, so the bug injects a stray newline or drops indentation, corrupting the generated fix's formatting.","fix":"Count trailing-whitespace pieces correctly: `let pieces = self.leading_trivia().pieces(); let kept = pieces.clone().rev().position(|x| !x.is_whitespace()).unwrap_or(pieces.len()); let skip_count = pieces.len() - kept; pieces.skip(skip_count)`. Add tests for `[Newline, Whitespace]`, all-whitespace, and no-whitespace inputs.","locations":[{"ref":"crates/biome_rowan/src/syntax/token.rs:434-446","code":"  434 |     /// Return whitespace that juxtapose the token until the first non-whitespace item.\n  435 |     pub fn indentation_trivia_pieces(\n  436 |         &self,\n  437 |     ) -> impl ExactSizeIterator<Item = SyntaxTriviaPiece<L>> + Clone + use<L> {\n  438 |         let leading_trivia = self.leading_trivia().pieces();\n  439 |         let skip_count = leading_trivia.len()\n  440 |             - leading_trivia\n  441 |                 .rev()\n  442 |                 .position(|x| !x.is_whitespace())\n  443 |                 .map(|pos| pos + 1)\n  444 |                 .unwrap_or(0);\n  445 |         self.leading_trivia().pieces().skip(skip_count)\n  446 |     }","lines":13,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_rowan/src/syntax/token.rs#L434-L446"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In the watcher batch-unload loops, when `find_project_for_path` returns `None` for a path, the function does `return Ok(vec![])`, which discards all diagnostics accumulated for earlier paths AND skips all remaining paths in the batch. A single path outside any project (common when rename/remove events touch mixed locations) aborts unloading of the rest of the batch. The per-path `index_path` correctly handles 'no project' as a per-path skip; the loop variants must do the same.","fix":"Replace `else { return Ok(vec![]); }` with `else { continue; }` in both `unload_files` and `unload_paths`.","locations":[{"ref":"crates/biome_service/src/scanner/watcher.rs:392-397","code":"  392 |         for path in paths {\n  393 |             let Some(project_key) = workspace.find_project_for_path(&path) else {\n  394 |                 return Ok(vec![]);\n  395 |             };\n  396 |             diagnostics.extend(workspace.unload_file(&path, project_key)?);\n  397 |         }","lines":6,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/scanner/watcher.rs#L392-L397"},{"ref":"crates/biome_service/src/scanner/watcher.rs:411-417","code":"  411 |         for path in &paths {\n  412 |             let Some(project_key) = workspace.find_project_for_path(path) else {\n  413 |                 return Ok(vec![]);\n  414 |             };\n  415 |             let result = workspace.unload_path(path, project_key)?;\n  416 |             diagnostics.extend(result);\n  417 |         }","lines":7,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/scanner/watcher.rs#L411-L417"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"The `Debug` impl for `RuleCategories` never reports the `Transformation` category: it checks Syntax/Lint/Assist but omits the `Categories::Transformation` branch before `list.finish()`. A `RuleCategories` value that contains only `Transformation` will Debug-format as an empty list (and `Display` delegates to `Debug`), producing misleading diagnostic/log output. The `serde::Serialize` impl right below correctly includes Transformation, so this is an inconsistency.","fix":"Add `if self.0.contains(Categories::Transformation) { list.entry(&RuleCategory::Transformation); }` before `list.finish()`.","locations":[{"ref":"crates/biome_analyze/src/categories.rs:266-284","code":"  266 | impl Debug for RuleCategories {\n  267 |     fn fmt(&self, f: &mut Formatter< rator);\n   72 | \n   73 |         let mut iter = attrs.iter_mut().peekable();\n   74 | \n   75 |         while let Some(sorted_attr) = iter.next() {\n   76 |             if iter.peek().is_some() {\n   77 |                 // Make sure sorted_attr has trailing whitespace if it is not the last attribute in the group\n   78 |                 let ends_in_whitespace = sorted_attr\n   79 |                     .node()\n   80 |                     .syntax()\n   81 |                     .last_trailing_trivia()\n   82 |                     .and_then(|last_trivia| last_trivia.last())\n   83 |                     .is_some_and(|last| last.is_whitespace() || last.is_newline());\n   84 | \n   85 |                 let next_starts_with_whitespace = iter\n   86 |                     .peek()\n   87 |                     .and_then(|next_sorted_attr| {\n   88 |                         next_sorted_attr.node().syntax().first_leading_trivia()\n   89 |                     })\n   90 |                     .and_then(|first_trivia| first_trivia.first())\n   91 |                     .is_some_and(|first| first.is_whitespace() || first.is_newline());\n   92 | \n   93 |                 if !ends_in_whitespace && !next_starts_with_whitespace {\n   94 |                     let old_last_token = sorted_attr.node().syntax().last_token().unwrap();\n   95 |                     let new_last_token =\n   96 |                         old_last_token.with_trailing_trivia([(TriviaPieceKind::Whitespace, \" \")]);\n   97 | \n   98 |                     *sorted_attr = sorted_attr\n   99 |                         .clone()\n  100 |                         .replace_token(old_last_token, new_last_token)?;\n  101 |                 }\n  102 |             }\n  103 |         }\n  104 | \n  105 |         Some(attrs)\n  106 |     }","lines":41,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_analyze/src/shared/sort_attributes.rs#L66-L106"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`format_with_errors` is only applied when `--formatter-enabled` is also passed in `biome ci`. The assignment sits inside `if self.formatter_enabled.is_some()`, so `biome ci --format-with-errors=true` (without `--formatter-enabled`) silently drops the setting. check.rs applies the two options in separate independent `if` blocks, confirming this is an unintended coupling / copy-paste divergence.","fix":"Move the `format_with_errors` assignment out of the `formatter_enabled` block into its own `if self.format_with_errors.is_some()` guard, mirroring check.rs.","locations":[{"ref":"crates/biome_cli/src/commands/ci.rs:187-190","code":"  187 |         if self.formatter_enabled.is_some() {\n  188 |             formatter.enabled = self.formatter_enabled;\n  189 |             formatter.format_with_errors = self.format_with_errors;\n  190 |         }","lines":4,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/commands/ci.rs#L187-L190"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`check_fix_incompatible_arguments` passes the explanatory reason string as the `subcommand` argument of `CliDiagnostic::unexpected_argument(argument, subcommand)`. That second argument is used by `CliAdvice` to build a help command `biome <subcommand> --help`, so the produced advice becomes a nonsensical command like ``biome `--reason` is only valid when `--suppress` is used. --help``. The actual reason text is never shown as a reason and the suggested command is broken.","fix":"Use a diagnostic variant that takes a reason/explanation (e.g. an incompatible/illegal-argument diagnostic) rather than `unexpected_argument`, whose second parameter must be a subcommand name.","locations":[{"ref":"crates/biome_cli/src/commands/mod.rs:984-989","code":"  984 |     } else if !suppress && suppression_reason.is erences` (not `write_references`) in both the `Write` and `HoistedWrite` arms of `SemanticModelBuilder::push_event`. As a result `SemanticModelScopeData::write_references` is never populated anywhere in the crate, making the field dead and the closure-capture code that reads `scope.write_references` effectively a no-op (it always iterates an empty vector). Capturing of writes still happens incidentally because writes land in `read_references`, but the field name is actively misleading and any future code relying on `write_references` will silently get nothing.","fix":"Push `reference_id` into `scope.write_references` in the Write/HoistedWrite arms, or remove the `write_references` field and the dead reads in `closure.rs` if a single combined list is intended.","locations":[{"ref":"crates/biome_js_semantic/src/semantic_model/builder.rs:323-358","code":"  323 |             Write {\n  324 |                 range,\n  325 |                 declaration_at,\n  326 |                 scope_id,\n  327 |             } => {\n  328 |                 let binding_id = self.bindings_by_start[&declaration_at];\n  329 |                 let binding = &mut self.bindings[binding_id.index()];\n  330 |                 let reference_id = ReferenceId::new(binding_id, binding.references.len());\n  331 |                 binding.references.push(SemanticModelReference {\n  332 |                     range_start: range.start(),\n  333 |                     ty: SemanticModelReferenceType::Write { hoisted: false },\n  334 |                 });\n  335 | \n  336 |                 let scope = &mut self.scopes[scope_id.index()];\n  337 |                 scope.read_references.push(reference_id);\n  338 | \n  339 |                 self.declared_at_by_start.insert(range.start(), binding_id);\n  340 |             }\n  341 |             HoistedWrite {\n  342 |                 range,\n  343 |                 declaration_at,\n  344 |                 scope_id,\n  345 |             } => {\n  346 | r_path` iterates a papaya HashMap (unordered) and returns the FIRST project whose root path is a prefix of `path` via `find_map`. When projects are nested (one project folder inside another), the returned project is non-deterministic, so a file can be attributed to the outer or the inner project depending on hash iteration order. Other methods (`path_belongs_only_to_project_with_path`) explicitly account for multiple matching projects, confirming nested projects are a real scenario.","fix":"Select the most specific (longest path) matching project instead of the first match, e.g. iterate and keep the candidate whose `project_data.path` is the longest prefix of `path`.","locations":[{"ref":"crates/biome_service/src/projects.rs:353-358","code":"  353 |     pub fn find_project_for_path(&self, path: &Utf8Path) -> Option<ProjectKey> {\n  354 |         self.0\n  355 |             .pin()\n  356 |             .iter()\n  357 |             .find_map(|(key, project_data)| path.starts_with(&project_data.path).then_some(*key))\n  358 |     }","lines":6,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/projects.rs#L353-L358"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`is_protected` is missing the `.filter(|support_kind| !support_kind.is_not_requested())` that all three sibling methods (`is_ignored`, `is_not_supported`, `is_not_enabled`) apply before their `.all(...)` check. As a result, a file whose requested features are all genuinely protected but which also carries a `NotRequested` feature reports `is_protected() == false`, inconsistent with the documented 'all the features marked it as protected' semantics and with the parallel methods. Looks like a copy/omission bug.","fix":"Add `.filter(|support_kind| !support_kind.is_not_requested())` before `.all(...)` in `is_protected`, matching the sibling methods.","locations":[{"ref":"crates/biome_service/src/workspace.rs:361-366","code":"  361 |     /// The file is protected only if all the features marked it as protected\n  362 |     pub fn is_protected(&self) -> bool {\n  363 |         self.0\n  364 |             .iter()\n  365 |             .all(|support_kind| support_kind.is_protected())\n  366 |     }","lines":6,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/workspace.rs#L361-L366"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ActionCategory::to_str` places the `.biome` suffix inconsistently across variants: QuickFix -> `quickfix.biome.{tag}`, Source::Other -> `source.biome.{tag}`, but Refactor::Other -> `refactor.{tag}.biome` and Generic -> `{tag}.biome`. Because `matches(filter)` is a `starts_with` against this string, the inconsistent placement means filters like `source.fixAll` will not match `Source(Other(\"fixAll\"))` (which becomes `source.biome.fixAll`), and the LSP `quickfix` filtering relies on these prefixes. The encoding is not self-consistent with the documented LSP CodeActionKind hierarchy (e.g. `quickfix.biome.{tag}` breaks the `quickfix` -> `quickfix.x` hierarchy expected by clients).","fix":"Standardize the kind string format so the category hierarchy comes first and the `.biome` vendor suffix is appended consistently (e.g. always `{kind-hierarchy}.biome`), matching the doctest expectations and LSP semantics.","locations":[{"ref":"crates/biome_analyze/src/categories.rs:138-171","code":"  138 |     pub fn to_str(&self) -> Cow<'static, str> {\n  139 |         match self {\n  140 |             Self::QuickFix(tag) => {\n  141 |                 if tag.is_empty() {\n  142 |                     Cow::Borrowed(\"quickfix.biome\")\n  143 |                 } else {\n  144 |                     Cow::Owned(format!(\"quickfix.biome.{tag}\"))\n  145 |                 }\n  146 |             }\n  147 | \n  148 |             Self::Refactor(RefactorKind::None) => Cow::Borrowed(\"refactor.biome\"),\n  149 |             Self::Refactor(RefactorKind::Extract) => Cow::Borrowed(\"refactor.extract.biome\"),\n  150 |             Self::Refactor(RefactorKind::Inline) => Cow::Borrowed(\"refactor.inline.biome\"),\n  151 |             Self::Refactor(RefactorKind::Rewrite) => Cow::Borrowed(\"refactor.rewrite.biome\"),\n  152 |             Self::Refactor(RefactorKind::Other(tag)) => Cow::Owned(format!(\"refactor.{tag}.biome\")),\n  153 | \n  154 |             Self::Source(SourceActionKind::None) => Cow::Borrowed(\"source.biome\"),\n  155 |             Self::Source(SourceActionKind::FixAll) => Cow::Borrowed(\"source.fixAll.biome\"),\n  156 |             Self::Source(SourceActionKind::OrganizeImports) => {\n  157 |                 Cow::Borrowed(\"source.organizeImports.biome\")\n  158 |             }\n  159 |             Self::Source(SourceActionKind::Other(tag)) => Cow::Owned(format!(\"source.biome.{tag}\")),\n  160 | \n  161 |             Self::Other(other_action) => match other_action {\n  162 |                 OtherActionCategory::InlineSuppression => {\n  163 |                     Cow::Borrowed(\"quickfix.suppressRule.inline.biome\")\n  164 |                 }\n  165 |                 OtherActionCategory::ToplevelSuppression => {\n  166 |                     Cow::Borrowed(\"quickfix.suppressRule.topLevel.biome\")\n  167 |                 }\n  168 |                 OtherActionCategory::Generic(tag) => Cow::Owned(format!(\"{tag}.biome\")),\n  169 |             },\n  170 |         }\n  171 |     }","lines":34,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_analyze/src/categories.rs#L138-L171"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`is_version_newer`/upgrade relies on `node_semver::Version` ordering, but the latest-version endpoint and the embedded `VERSION` may include prerelease tags. With semver precedence a prerelease (e.g. `2.0.0-beta.1`) is older than its release, and Biome uses odd-minor prereleases, so depending on what `latest.txt` serves, `biome upgrade` on a prerelease build may refuse a valid upgrade or offer an unexpected channel switch.","fix":"Define explicit channel/prerelease handling rather than relying on raw semver `>`.","locations":[{"ref":"crates/biome_cli/src/commands/upgrade.rs:110-115","code":"  110 |     if !is_version_newer(VERSION, &latest_version)? {\n  111 |         session.app.console.log(markup! {\n  112 |             \"Biome is already up to date at version \"<Emphasis>{VERSION}<\/Emphasis>\".\"\n  113 |         });\n  114 |         return Ok(());\n  115 |     }","lines":6,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/commands/upgrade.rs#L110-L115"},{"ref":"crates/biome_cli/src/commands/upgrade.rs:211-215","code":"  211 | fn is_version_newer(current: &str, latest: &str) -> Result<bool, CliDiagnostic> {\n  212 |     let current = parse_version(current)?;\n  213 |     let latest = parse_version(latest)?;\n  214 |     Ok(latest > current)\n  215 | }","lines":5,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/commands/upgrade.rs#L211-L215"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The 'ignore file has been successfully migrated' message can fire spuriously. `old_biome_config` is captured before the Prettier/ESLint config is merged in, but the message is gated on `write && biome_config != old_biome_config`. So even when the ignore file contributes no patterns, the message still prints whenever the surrounding Prettier/ESLint migration changed the config, falsely claiming the ignore file was migrated.","fix":"Gate the message on whether the ignore patterns were actually non-empty and applied (capture the config state immediately
