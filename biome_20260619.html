rts a marker, immediately abandons it, and returns `Absent` - the `assert` acceptance in the guard is effectively dead and the marker start/abandon is wasted work.","fix":"Drop `assert` from the guard (`if !p.at(T![with]) { return Absent; }`), or add an explicit `T![assert]` arm that emits the deprecation diagnostic.","locations":[{"ref":"crates/biome_js_parser/src/syntax/module.rs:534-551","code":"  534 | fn parse_import_attribute(p: &mut JsParser) -> ParsedSyntax {\n  535 |     if p.has_preceding_line_break() {\n  536 |         return Absent;\n  537 |     }\n  538 |     if !p.at(T![assert]) && !p.at(T![with]) {\n  539 |         return Absent;\n  540 |     }\n  541 | \n  542 |     let m = p.start();\n  543 |     match p.cur() {\n  544 |         T![with] => {\n  545 |             p.expect(T![with]);\n  546 |         }\n  547 |         _ => {\n  548 |             m.abandon(p);\n  549 |             return Absent;\n  550 |         }\n  551 |     };","lines":18,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_js_parser/src/syntax/module.rs#L534-L551"}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`indent` is built from the last member's first-token indentation trivia (lines 302-307), but is then immediately shadowed by a fresh empty `let mut indent = Vec::new();` at line 309 before being used. The first computation is entirely wasted work and dead code; only the second `indent` (computed from `old_rules_list.last()`) is actually consumed.","fix":"Delete the first `indent` block (lines 302-307); keep only the computation at lines 309-314.","locations":[{"ref":"crates/biome_migrate/src/analyzers/rule_mover.rs:302-309","code":"  302 |             let mut indent = Vec::new();\n  303 |             if let Some((last_node, _)) = new_elements.last()\n  304 |                 && let Some(first_token) = last_node.syntax().first_token()\n  305 |             {\n  306 | ion":"Unreachable branch in `record_rule_from_domains`: an early return already handles the case where `domains` is `None` or empty. The later condition `... && domains.as_ref().is_none_or(|d| d.is_empty())` can therefore never be true at that point (the conjunct is always false), so the `disabled_rules.insert` / `return` is dead code.","fix":"Remove the dead `if` block, or move the recommended-with-domains disabling logic above the early return if it was meant to run.","locations":[{"ref":"crates/biome_service/src/file_handlers/mod.rs:1338-1351","code":" 1338 |         // no domains, no need to record the rule\n 1339 |         if domains.as_ref().is_none_or(|d| d.is_empty()) {\n 1340 |             return;\n 1341 |         }\n 1342 | \n 1343 |         // If the rule is recommended, and it has some domains, it should be disabled, but only if the configuration doesn't enable some domains.\n 1344 |         if R::METADATA.recommended\n 1345 |             && !R::METADATA.domains.is_empty()\n 1346 |             && domains.as_ref().is_none_or(|d| d.is_empty())\n 1347 |         {\n 1348 |             self.disabled_rules.insert(rule_filter);\n 1349 |             return;\n 1350 |         }\n 1351 | ","lines":14,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/file_handlers/mod.rs#L1338-L1351"}]},{"id":"DEAD_12","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"The `_ => CSS_BOGUS` arm in the SCSS nth pseudo-class parser completes a zero-width bogus node without consuming a token. It is currently unreachable given the entry guard, but if a future guard change makes it reachable inside a list parser it would stall recovery (no forward progress). Harden it now.","fix":"In the `_` fallback arm, bump the offending token (or return `Absent`) so the parser always makes progress.","locations":[{"ref":"crates/biome_css_parser/src/syntax/scss/selector/pseudo_class_nth.rs:72-81", lete the `{};` line.","locations":[{"ref":"crates/biome_formatter/src/printer/mod.rs:1084-1090","code":" 1084 |                 Fits::Maybe => {\n 1085 |                     if predicate.is_end(element)? {\n 1086 |                         break;\n 1087 |                     }\n 1088 | \n 1089 |                     {};\n 1090 |                 }","lines":7,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_formatter/src/printer/mod.rs#L1084-L1090"}]},{"id":"DEAD_15","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`is_reserved_module_name` checks `name.len() == 4 && matches!(name, \"void\" | \"null\")`. Both `\"void\"` and `\"null\"` already have length 4, so the `name.len() == 4` conjunct can never change the result; it is redundant.","fix":"Simplify to `matches!(name, \"void\" | \"null\")`.","locations":[{"ref":"crates/biome_js_parser/src/syntax/typescript/types.rs:172-174","code":"  172 | pub(crate) fn is_reserved_module_name(name: &str) -> bool {\n  173 |     name.len() == 4 && matches!(name, \"void\" | \"null\")\n  174 | }","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_js_parser/src/syntax/typescript/types.rs#L172-L174"}]},{"id":"DEAD_16","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`parse_ts_import_type_assertion_block` returns `Absent` at the top unless `p.at(T!['{'])`, then re-tests the identical `if p.at(T!['{'])` before bumping. Nothing between the two checks advances the parser, so the inner `if` is always true and is redundant nesting.","fix":"Remove the inner `if p.at(T!['{'])` guard and bump unconditionally.","locations":[{"ref":"crates/biome_js_parser/src/syntax/typescript/types.rs:1703-1721","code":" 1703 | fn parse_ts_import_type_assertion_block(p: &mut JsParser) -> ParsedSyntax {\n 1704 |     if !p.at(T!['{']) {\n 1705 |         return Absent;\ ge/package_json.rs#L485-L499"}]},{"id":"DEAD_19","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"In `print_debug_str`, for strings of length >= 25 the loop scans byte indices 21..25 for a char boundary. Since max UTF-8 scalar is 4 bytes, any 4-index window contains a boundary, so the final `write!(f, \"\")` fallback is unreachable; if ever reached it silently prints nothing (losing debug output) instead of a truncated string.","fix":"Document why the loop always succeeds, or compute a safe boundary deterministically (e.g. floor_char_boundary) and always emit a truncated string.","locations":[{"ref":"crates/biome_rowan/src/syntax/trivia.rs:649-661","code":"  649 | fn print_debug_str<S: AsRef<str>>(text: S, f: &mut fmt::Formatter<'_>) -> fmt::Result {\n  650 |     let text = text.as_ref();\n  651 |     if text.len() < 25 {\n  652 |         write!(f, \"{text:?}\")\n  653 |     } else {\n  654 |         for idx in 21..25 {\n  655 |             if text.is_char_boundary(idx) {\n  656 |                 let text = format!(\"{} ...\", &text[..idx]);\n  657 |                 return write!(f, \"{text:?}\");\n  658 |             }\n  659 |         }\n  660 |         write!(f, \"\")\n  661 |     }","lines":13,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_rowan/src/syntax/trivia.rs#L649-L661"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Doc comments on `fix_file_mode` reference CLI flags `--apply`/`--apply-suggested` that no longer exist; the actual flags are `--write`/`--fix`/`--unsafe`. Stale documentation, present in both check.rs and lint.rs.","fix":"Update the comments to reference `--write`/`--fix`/`--unsafe`.","locations":[{"ref":"crates/biome_cli/src/commands/check.rs:54-56","code":"   54 |     /// It's [None] if the `check` command is called without `--apply` or `--apply-suggested`\n   55 |     /// arguments.\n   56 |     fix_file_mode: Option<FixFileMode>,","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/commands/check.rs#L54-L56"},{"ref":"crates/biome_cli/src/commands/lint.rs:58-60","code":"   58 |     ///\n   59 |     /// It's [None] if the `lint` command is called without `--apply` or `--apply-suggested`\n   60 |     /// arguments.","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/commands/lint.rs#L58-L60"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Contradictory comments about the jest `consistent-test-it` `withinDescribe` default. The field doc states `withinDescribe` defaults to the value of `fn` (which defaults to `\"test\"`). But the conversion comment and code map a missing `withinDescribe` to `It`. Either the comment is wrong or the migration uses `it` where ESLint would use `test`.","fix":"Reconcile the comments and, if matching ESLint, default `within_describe` to the resolved `fn_kind` rather than a hard-coded `It`.","locations":[{"ref":"crates/biome_cli/src/execute/migrate/eslint_jest.rs:16-18","code":"   16 |     /// The function to prefer inside `describe` blocks. Defaults to the value of `fn`.\n   17 |     #[deserializable(rename = \"withinDescribe\")]\n   18 |     pub within_describe: Option<EslintTestFunctionKind>,","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/execute/migrate/eslint_jest.rs#L16-L18"},{"ref":"crates/biome_cli/src/execute/migrate/eslint_jest.rs:39-47","code":"   39 |         // ESLint's defaults: `fn` → \"test\", `withinDescribe` → \"it\".\n   40 |         // Always set both explicitly so the migrated config preserves ESLint behavior\n   41 |         // regardless of Biome's own defaults.\n   42 |         let fn_kind = val\n   43 |             .function\n   44 |             .map_or(TestFunctionKind::Test, TestFunctionKind::from);\n   45 |         let within_describe = val\n   46 |             .within_describe\n   47 |             .map_or(TestFunctionKind::It, TestFunctionKind::from);","lines":9,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/execute/migrate/eslint_jest.rs#L39-L47"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Broken/misleading rustdoc intra-doc links to `CommandRunner::should_write`. The `CommandRunner` trait has no `should_write` method (only `CustomExecutionCmd` defines it), so both the doc list entry in mod.rs and the 'Alias of [crate::runner::CommandRunner::should_write]' comment in custom_execution.rs reference a nonexistent item.","fix":"Remove the `should_write` line from the `CommandRunner` doc method list, and fix the custom_execution.rs comment to reference `CustomExecutionCmd::should_write`.","locations":[{"ref":"crates/biome_cli/src/runner/mod.rs:178","code":"  178 | /// - [CommandRunner::should_write]","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/runner/mod.rs#L178"},{"ref":"crates/biome_cli/src/runner/impls/commands/custom_execution.rs:45","code":"   45 |     /// Alias of [crate::runner::CommandRunner::should_write]","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_cli/src/runner/impls/commands/custom_execution.rs#L45"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment on `insert_final_newline` says it is \"not a biome option, but we need it to emit a diagnostic when this is set to false.\" No such diagnostic is ever emitted (`validate()` returns `vec![]`), and the field is now actually applied as the `trailing_newline` formatter option in `to_biome`/`to_biome_override`, so the comment is doubly wrong. The module doc table (lines 3-9) also omits the `insert_final_newline -> trailing_newline` mapping.","fix":"Update the comment to state it maps to `trailing_newline`, add the row to the doc table, and remove the always-empty `validate()` or implement the intended diagnostic.","locations":[{"ref":"crates/biome_configuration/src/editorconfig.rs:363-364","code":"  363 |     // Not a biome option, but we need it to emit a diagnostic when this is set to false.\n  364 |     pub insert_final_newline: EditorconfigValue<TrailingNewline>,","lines":2,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_configuration/src/editorconfig.rs#L363-L364"},{"ref":"crates/biome_configuration/src/editorconfig.rs:401-403","code":"  401 |     fn validate(&self) -> Vec<EditorConfigDiagnostic> {\n  402 |         vec![]\n  403 |     }","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_configuration/src/editorconfig.rs#L401-L403"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The detail label on noDuplicateFontNames points at the FIRST (original) occurrence (`duplicate.range()`) but reads \"This is where the duplicate font name is found:\". `this` is the later duplicate occurrence and `duplicate` is the earlier stored value retrieved from the HashSet, so the label is inverted: it points the user at the original declaration while calling it the duplicate.","fix":"Reword the detail to indicate it points at the original/first occurrence (e.g. \"This font name was already declared here:\"), or swap which range is primary vs detail.","locations":[{"ref":"crates/biome_css_analyze/src/lint/suspicious/no_duplicate_font_names.rs:93-94","code":"   93 |             if let Some(duplicate) = family_names.get(&css_value) {\n   94 |                 return Some((css_value.clone(), duplicate.clone()));","lines":2,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_analyze/src/lint/suspicious/no_duplicate_font_names.rs#L93-L94"},{"ref":"crates/biome_css_analyze/src/lint/suspicious/no_duplicate_font_names.rs:114-116","code":"  114 |             .detail(duplicate.range(), markup! {\n  115 |                 \"This is where the duplicate font name is found:\"\n  116 |             })","lines":3,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_analyze/src/lint/suspicious/no_duplicate_font_names.rs#L114-L116"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on get_value_list_layout states \"Until the parser supports comma-separated lists, this will always return [ValueListLayout::Fill], since all space-separated lists are intentionally printed compactly.\" This is false: the body returns PreserveInline, SingleValue, OneGroupPerLine, OneGroupPerLineWithDanglingComments, OnePerLine, or Fill depending on many conditions, and the function explicitly inspects comma delimiters (is_comma_separated). The comment misleads readers about the function's contract.","fix":"Replace with an accurate summary describing that the layout is chosen between SingleValue, Fill, PreserveInline, OnePerLine and the per-group layouts based on the parent property, comments, comma separation, and total width.","locations":[{"ref":"crates/biome_css_formatter/src/utils/component_value_list.rs:400-403","code":"  400 | /// Returns the layout to use when printing the provided CssComponentValueList.\n  401 | /// Until the parser supports comma-separated lists, this will always return\n  402 | /// [ValueListLayout::Fill], since all space-separated lists are intentionally\n  403 | /// printed compactly.","lines":4,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_formatter/src/utils/component_value_list.rs#L400-L403"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `CssCustomIdentifierSpaceSeparatedListParseRecovery` describes it as the separator for `CssFontFamilyNameList` (copied from the font-family-name recovery struct earlier in the file). It actually recovers a custom-identifier list, so the comment is misleading.","fix":"Update the comment to describe the custom-identifier space-separated list recovery.","locations":[{"ref":"crates/biome_css_parser/src/syntax/at_rule/font_feature_values.rs:213","code":"  213 |     /// - A comma ',', indicating the `CssFontFamilyNameList` list separator.","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_css_parser/src/syntax/at_rule/font_feature_values.rs#L213"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `parse_import_attribute`, the comment `// bump \"with\"` sits AFTER the match block that already bumped `with`, and immediately before `p.expect(T!['{'])`. The comment describes neither the line above nor below it, so it misleads readers into thinking the `{` expectation is the `with` bump.","fix":"Delete the misplaced comment or move/correct it next to the actual `with` bump.","locations":[{"ref":"crates/biome_js_parser/src/syntax/module.rs:553","code":"  553 |     // bump \"with\"","lines":1,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_js_parser/src/syntax/module.rs#L553"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Stale comment in the embed registry references a function that no longer exists: 'Mirrors current logic in html.rs parse_embedded_script (978-1065)'. `parse_embedded_script` does not exist anywhere in the codebase and html.rs has no such range, misleading future readers cross-referencing the logic.","fix":"Remove the stale reference or replace it with an accurate description of where the equivalent logic now lives.","locations":[{"ref":"crates/biome_service/src/embed/registry.rs:106-107","code":"  106 | /// Resolves the guest language for a <script> tag based on attributes and host framework.\n  107 | /// Mirrors current logic in html.rs parse_embedded_script (978-1065).","lines":2,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/embed/registry.rs#L106-L107"}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"`read_trailing_trivia`'s doc comment and (ignored) doctest claim an all-whitespace input returns an empty string: `assert_eq!(read_trailing_trivia(\"   \"), \"\")`. The implementation returns the whole string: count == value.len(), so it returns `&value[len-count..]`, i.e. the full input. The comment's justification ('leading trivia would have consumed it all') is false because the function has no knowledge of leading trivia. Callers in `update_snippets` format `leading + reindented + trailing`, so if a token's text is entirely whitespace the leading+trailing readers can both return it and duplicate it.","fix":"Either fix the doc/doctest to describe the real behavior, or make `read_trailing_trivia` not overlap with leading whitespace (e.g. return \"\" when count == value.len()), since the format! usage assumes leading and trailing are disjoint.","locations":[{"ref":"crates/biome_service/src/file_handlers/html.rs:968-992","code":"  968 | /// # Returns\n  969 | /// A `Cow<'_, str>` containing the trailing whitespace. If the entire string is whitespace,\n  970 | /// returns an empty string (because leading trivia would have consumed it all). If there's no\n  971 | /// trailing whitespace, returns an empty string.\n  972 | ///\n  973 | /// # Examples\n  974 | /// ```ignore\n  975 | /// assert_eq!(read_trailing_trivia(\"console.log('Hi');\\n\"), \"\\n\");\n  976 | /// assert_eq!(read_trailing_trivia(\"console.log('Hi');\"), \"\");\n  977 | /// assert_eq!(read_trailing_trivia(\"   \"), \"\");\n  978 | /// ```\n  979 | fn read_trailing_trivia(value: &str) -> Cow<'_, str> {\n  980 |     let bytes = value.as_bytes();\n  981 |     let count = bytes\n  982 |         .iter()\n  983 |         .rev()\n  984 |         .take_while(|&&b| matches!(b, b' ' | b'\\t' | b'\\n' | b'\\r'))\n  985 |         .count();\n  986 | \n  987 |     if count > 0 {\n  988 |         Cow::Borrowed(&value[value.len() - count..])\n  989 |     } else {\n  990 |         Cow::Borrowed(\"\")\n  991 |     }\n  992 | }","lines":25,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/file_handlers/html.rs#L968-L992"}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `support_kind_for` ('Returns the SupportKind for the given feature, but only if it is not enabled.') is copy-pasted from `support_kind_if_not_enabled` and is wrong: `support_kind_for` always returns the kind unconditionally.","fix":"Change the `support_kind_for` doc comment to 'Returns the SupportKind for the given feature.'","locations":[{"ref":"crates/biome_service/src/workspace.rs:318-323","code":"  318 |     /// Returns the [`SupportKind`] for the given `feature`, but only if it is\n  319 |     /// not enabled.\n  320 |     #[inline(always)]\n  321 |     pub fn support_kind_for(&self, feature: FeatureKind) -> SupportKind {\n  322 |         self.0[feature.index()]\n  323 |     }","lines":6,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_service/src/workspace.rs#L318-L323"}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true," ted tree: a node thinks it is a token: {:?}\", self.data().green().kind())`.","locations":[{"ref":"crates/biome_rowan/src/cursor/token.rs:49-59","code":"   49 |     pub(crate) fn green(&self) -> &GreenTokenData {\n   50 |         match self.data().green().as_token() {\n   51 |             Some(token) => token,\n   52 |             None => {\n   53 |                 panic!(\n   54 |                     \"corrupted tree: a node thinks it is a token: {:?}\",\n   55 |                     self.data().green().as_node().unwrap().to_string()\n   56 |                 );\n   57 |             }\n   58 |         }\n   59 |     }","lines":11,"link":"https://github.com/biomejs/biome/blob/f719af657d79744c22afb6cbdfad77c0f2a43ee9/crates/biome_rowan/src/cursor/token.rs#L49-L59"}]},{"id":"OTHER_8","type":"other","type_label":"Other","severity":"negligible","easy":true,"description":"In `make_separated_list_syntax`, when an unexpected element is found in the \"expecting separator\" state, `valid = false` is set but the loop does NOT `break`, unlike the symmetric \"expecting node\" invalid case which does `break`. No observable bug (result is unconditionally `to_bogus()` once invalid) but the asymmetry is confusing and wastes iterations.","fix":"Add `break;` after `valid = false;` in the \"expecting separator\" else branch for consistency.","locations":[{"ref":"crates/biome_rowan/src/syntax_factory.rs:88-101","code":"   88 |                 } else {\n   89 |                     // an invalid element\n   90 |                     valid = false;\n   91 |                     break;\n   92 |                 }\n   93 |             } else if kind == separator {\n   94 |                 next_node = true;\n   95 |             } else if can_cast(kind) {\n   96 |                 // a missing separator\n   97 |                 missing_count += 1;\n   98 |             } else {\n   99 |                 // something unexpected\n  100 |                 valid = false;\n  101 |             }","lines":14 (function(){

  hiddenStatus: new Set(), hiddenGroup: new Set(),

function loadStatuses() {

}

  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}

  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }

  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));

  if (p.has('e'))   S.easyOnly = p.get('e') === '1';

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');

  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
