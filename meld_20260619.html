<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"shell_to_regex() crashes with an unhandled IndexError on the pattern '[]' (or any pattern containing an empty bracket expression like 'foo[]bar') because it accesses stuff[0] without checking that stuff is non-empty. This is reachable live from the Preferences filter editor (on_pattern_edited -> check_filter -> compile_shell_pattern -> shell_to_regex) while the user types, with no try/except around it, crashing the application.","fix":"Guard against an empty bracket body, e.g. 'if stuff and stuff[0] == \"!\": ...' and skip/escape the bracket when stuff is empty, similar to how empty patterns are already handled in compile_shell_pattern.","locations":[{"ref":"meld/filters.py:124-136","code":"  124 |         elif c == '[':\n  125 |             try:\n  126 |                 j = pat.index(']', i)\n  127 |             except ValueError:\n  128 |                 res += r'\\['\n  129 |             else:\n  130 |                 stuff = pat[i:j]\n  131 |                 i = j + 1\n  132 |                 if stuff[0] == '!':\n  133 |                     stuff = '^%s' % stuff[1:]\n  134 |                 elif stuff[0] == '^':\n  135 |                     stuff = r'\\^%s' % stuff[1:]\n  136 |                 res += '[%s]' % stuff","lines":13},{"ref":"meld/preferences.py:108-112","code":"  108 |     @Gtk.Template.Callback()\n  109 |     def on_pattern_edited(self, ren, path, text):\n  110 |         valid = FilterEntry.check_filter(text, self.filter_type)\n  111 |         self.model[path][2] = text\n  112 |         self.model[path][3] = valid","lines":5}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"SyncPointMyersSequenceMatcher.get_opcodes() unconditionally iterates self.split_matching_blocks, but that attribute is only ever set inside the 'else' branch of initialise() (i.e., when syncpoints is non-empty). When syncpoints is None or an empty list, initialise() takes the 'if' branch and delegates to the base MyersSequenceMatcher.initialise(), which never sets split_matching_blocks. Calling get_opcodes() (or get_difference_opcodes()) on such a matcher raises AttributeError. This is trivially reproduced with the exact same input used by the existing unit test test_sync_point_matcher0 in test/test_matchers.py, which happens to only call get_matching_blocks() and therefore never exercises the crash. The simplest possible usage, SyncPointMyersSequenceMatcher(None, a, b).get_opcodes(), crashes immediately.","fix":"In the empty-syncpoints branch of initialise(), also populate self.split_matching_blocks (e.g. set it to [self.matching_blocks] after build_matching_blocks runs, or simply have get_opcodes() fall back to the inherited difflib implementation when split_matching_blocks is unset).","locations":[{"ref":"meld/matchers/myers.py:379-419","code":"  379 |     def initialise(self):\n  380 |         if self.syncpoints is None or len(self.syncpoints) == 0:\n  381 |             for i in super().initialise():\n  382 |                 yield i\n  383 |         else:\n  384 |             chunks = []\n  385 |             ai = 0\n  386 |             bi = 0\n  387 |             for aj, bj in self.syncpoints:\n  388 |                 chunks.append((ai, bi, self.a[ai:aj], self.b[bi:bj]))\n  389 |                 ai = aj\n  390 |                 bi = bj\n  391 |             if ai < len(self.a) or bi < len(self.b):\n  392 |                 chunks.append((ai, bi, self.a[ai:], self.b[bi:]))\n  393 | \n  394 |             self.split_matching_blocks = []\n  395 |             self.matching_blocks = []\n  396 |             for ai, bi, a, b in chunks:\n  397 |                 matching_blocks = []\n  398 |                 matcher = MyersSequenceMatcher(self.isjunk, a, b)\n  399 |                 for i in matcher.initialise():\n  400 |                     yield None\n  401 |                 blocks = matcher.get_matching_blocks()\n  402 |                 mb_len = len(matching_blocks) - 1\n  403 |                 if mb_len >= 0 and len(blocks) > 1:\n  404 |                     aj = matching_blocks[mb_len][0]\n  405 |                     bj = matching_blocks[mb_len][1]\n  406 |                     bl = matching_blocks[mb_len][2]\n  407 |                     if (aj + bl == ai and bj + bl == bi and\n  408 |                             blocks[0][0] == 0 and blocks[0][1] == 0):\n  409 |                         block = blocks.pop(0)\n  410 |                         matching_blocks[mb_len] = (aj, bj, bl + block[2])\n  411 |                 for x, y, length in blocks[:-1]:\n  412 |                     matching_blocks.append((ai + x, bi + y, length))\n  413 |                 self.matching_blocks.extend(matching_blocks)\n  414 |                 # Split matching blocks each need to be terminated to get our\n  415 |                 # split chunks correctly created\n  416 |                 self.split_matching_blocks.append(\n  417 |                     matching_blocks + [(ai + len(a), bi + len(b), 0)])\n  418 |             self.matching_blocks.append((len(self.a), len(self.b), 0))\n  419 |             yield 1","lines":41},{"ref":"meld/matchers/myers.py:421-445","code":"  421 |     def get_opcodes(self):\n  422 |         # This is just difflib.SequenceMatcher.get_opcodes in which we instead\n  423 |         # iterate over our internal set of split matching blocks.\n  424 |         if self.opcodes is not None:\n  425 |             return self.opcodes\n  426 |         i = j = 0\n  427 |         self.opcodes = opcodes = []\n  428 |         self.get_matching_blocks()\n  429 |         for matching_blocks in self.split_matching_blocks:\n  430 |             for ai, bj, size in matching_blocks:\n  431 |                 tag = ''\n  432 |                 if i < ai and j < bj:\n  433 |                     tag = 'replace'\n  434 |                 elif i < ai:\n  435 |                     tag = 'delete'\n  436 |                 elif j < bj:\n  437 |                     tag = 'insert'\n  438 |                 if tag:\n  439 |                     opcodes.append((tag, i, ai, j, bj))\n  440 |                 i, j = ai + size, bj + size\n  441 |                 # the list of matching blocks is terminated by a\n  442 |                 # sentinel with size 0\n  443 |                 if size:\n  444 |                     opcodes.append(('equal', ai, i, bj, j))\n  445 |         return [DiffChunk._make(chunk) for chunk in opcodes]","lines":25}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"update_patch() unconditionally builds names from self.filediff.textbuffer[i] for i in range(3), but textbuffer only has num_panes entries (2 for a 2-way file comparison). Clicking 'Format as Patch' on a 2-way FileDiff raises IndexError and crashes the dialog.","fix":"Use range(self.filediff.num_panes) (or range(len(self.filediff.textbuffer))) instead of the hardcoded range(3).","locations":[{"ref":"meld/patchdialog.py:108","code":"  108 |         names = [self.filediff.textbuffer[i].data.label for i in range(3)]","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"svn.py's get_path_for_conflict uses glob.glob(...)[0] / glob.glob(...)[-1] in four places (CONFLICT_BASE, CONFLICT_THIS x2, CONFLICT_OTHER x2) without checking the result is non-empty. If the expected conflict marker files (e.g. '*.merge-left.r*', '*.r*') are missing -- e.g. the user already resolved the conflict outside Meld, or SVN's naming differs -- glob.glob returns [] and indexing raises IndexError, crashing the diff/conflict-resolution flow instead of raising the InvalidVCPath error this function already uses elsewhere for similar conditions.","fix":"Check the glob result length before indexing and raise _vc.InvalidVCPath(self, path, \"No conflict file found\") (consistent with the existing handling at line 121) instead of letting IndexError propagate.","locations":[{"ref":"meld/vc/svn.py:123-134","code":"  123 |         if conflict == _vc.CONFLICT_BASE:\n  124 |             return base[0], False\n  125 |         elif conflict == _vc.CONFLICT_THIS:\n  126 |             if conflict_type == CONFLICT_TYPE_MERGE:\n  127 |                 return glob.glob('%s.merge-left.r*' % path)[0], False\n  128 |             else:\n  129 |                 return glob.glob('%s.r*' % path)[0], False\n  130 |         elif conflict == _vc.CONFLICT_OTHER:\n  131 |             if conflict_type == CONFLICT_TYPE_MERGE:\n  132 |                 return glob.glob('%s.merge-right.r*' % path)[0], False\n  133 |             else:\n  134 |                 return glob.glob('%s.r*' % path)[-1], False","lines":12}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"MeldBufferData._mtime and _disk_mtime are only ever assigned inside update_mtime(), and update_mtime() only assigns them when self._gfile is truthy (the gfile setter always calls update_mtime(), but update_mtime() itself is a no-op when _gfile is None). Since reset(gfile=None, ...) is called from __init__ for new/empty buffers, _mtime/_disk_mtime are never initialised as instance attributes for gfile-less buffers. Any call to current_on_disk() on such a buffer (e.g. meld/filediff.py calls bufdata.current_on_disk() before save) raises AttributeError: 'MeldBufferData' object has no attribute '_mtime'.","fix":"Initialise self._mtime = self._disk_mtime = None in MeldBufferData.__init__ before reset() is called, or make update_mtime() always set both attributes (to None) even when _gfile is falsy.","locations":[{"ref":"meld/meldbuffer.py:101-107","code":"  101 |     def __init__(self):\n  102 |         super().__init__()\n  103 |         self._gfile = None\n  104 |         self._label = None\n  105 |         self._monitor = None\n  106 |         self._sourcefile = None\n  107 |         self.reset(gfile=None, state=MeldBufferState.EMPTY)","lines":7},{"ref":"meld/meldbuffer.py:171-180","code":"  171 |     @gfile.setter\n  172 |     def gfile(self, value):\n  173 |         self.disconnect_monitor()\n  174 |         self._gfile = value\n  175 |         self._sourcefile = GtkSource.File()\n  176 |         self._sourcefile.set_location(value)\n  177 |         self._sourcefile.bind_property(\n  178 |             'encoding', self, 'encoding', GObject.BindingFlags.DEFAULT)\n  179 | \n  180 |         self.update_mtime()","lines":10},{"ref":"meld/meldbuffer.py:221-227","code":"  221 |     def update_mtime(self):\n  222 |         if self._gfile:\n  223 |             self._disk_mtime = self._query_mtime(self._gfile)\n  224 |             self._mtime = self._disk_mtime\n  225 | \n  226 |     def current_on_disk(self):\n  227 |         return self._mtime == self._disk_mtime","lines":7}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"apply_text_filters() asserts that a matched/filtered span never crosses a newline (assert txt[start:end].count(newline) == 0). Text filter regexes are arbitrary user-supplied patterns (Preferences > Text Filters) compiled only with re.M, not re.S, but a pattern that explicitly matches a literal newline (e.g. 'foo\\n.*bar') can still produce a match spanning a newline once merge_intervals merges overlapping spans, tripping this assertion and crashing diff rendering. Assertions are also stripped under python -O, turning this into silent corruption instead of a controlled error.","fix":"Validate/reject filter regexes that can match across a newline before accepting them in the filter UI, or replace the assert with a graceful fallback that drops or clamps the offending interval instead of crashing.","locations":[{"ref":"meld/misc.py:387-437","code":"  387 | def apply_text_filters(\n  388 |     txt: AnyStr,\n  389 |     regexes: Sequence[Pattern],\n  390 |     apply_fn: Optional[Callable[[int, int], None]] = None\n  391 | ) -> AnyStr:\n  392 |     \"\"\"Apply text filters\n  393 | \n  394 |     Text filters \"regexes\", resolved as regular expressions are applied\n  395 |     to \"txt\". \"txt\" may be either strings or bytes, but the supplied\n  396 |     regexes must match the type.\n  397 | \n  398 |     \"apply_fn\" is a callable run for each filtered interval\n  399 |     \"\"\"\n  400 |     empty_string = b\"\" if isinstance(txt, bytes) else \"\"\n  401 |     newline = b\"\\n\" if isinstance(txt, bytes) else \"\\n\"\n  402 | \n  403 |     filter_ranges = []\n  404 |     for r in regexes:\n  405 |         if not r:\n  406 |             continue\n  407 | \n  408 |         for match in r.finditer(txt):\n  409 | \n  410 |             # If there are no groups in the match, use the whole match\n  411 |             if not r.groups:\n  412 |                 span = match.span()\n  413 |                 if span[0] != span[1]:\n  414 |                     filter_ranges.append(span)\n  415 |                 continue\n  416 | \n  417 |             # If there are groups in the regex, include all groups that\n  418 |             # participated in the match\n  419 |             for i in range(r.groups):\n  420 |                 span = match.span(i + 1)\n  421 |                 if span != (-1, -1) and span[0] != span[1]:\n  422 |                     filter_ranges.append(span)\n  423 | \n  424 |     filter_ranges = merge_intervals(filter_ranges)\n  425 | \n  426 |     if apply_fn:\n  427 |         for (start, end) in reversed(filter_ranges):\n  428 |             apply_fn(start, end)\n  429 | \n  430 |     offset = 0\n  431 |     result_txts = []\n  432 |     for (start, end) in filter_ranges:\n  433 |         assert txt[start:end].count(newline) == 0\n  434 |         result_txts.append(txt[offset:start])\n  435 |         offset = end\n  436 |     result_txts.append(txt[offset:])\n  437 |     return empty_string.join(result_txts)","lines":51}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"git.py calls `self.DIFF_RE.search(e).groups()` in two places without checking the match succeeded. DIFF_RE only matches the single-letter status codes X, A, D, M, T, U (`[XADMTU]`). If git ever emits a line with a different status letter not covered here (e.g. 'C' for copy, or a two-character rename/copy code like 'R100' if rename detection were ever enabled, or any unexpected diff-index/diff-files output), `.search()` returns None and `.groups()` raises AttributeError, crashing the VC scan or commit-file-list computation.","fix":"Guard the match result (`m = self.DIFF_RE.search(e); if not m: continue/log and skip`) instead of assuming it always succeeds, so unexpected git output degrades gracefully rather than crashing.","locations":[{"ref":"meld/vc/git.py:142","code":"  142 |                     self.DIFF_RE.search(e).groups()[5] for e in all_entries","lines":1},{"ref":"meld/vc/git.py:354","code":"  354 |                 columns = self.DIFF_RE.search(entry).groups()","lines":1}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"svn.py's valid_repo computes `repo_version` by reading the first line of '.svn/format' or '.svn/entries' if present, else falling back to 12 if 'wc.db' exists, else leaving it as None. If none of these files/markers exist (e.g. corrupted or unusual working copy), repo_version stays None and is passed to `_repo_version_support(version)`, which does `version >= 12`. Comparing None >= 12 raises TypeError in Python 3, crashing repository detection instead of returning False as a normal 'not a valid repo' result.","fix":"Default repo_version to 0 instead of None, or explicitly return False when repo_version is None before calling _repo_version_support.","locations":[{"ref":"meld/vc/svn.py:153-173","code":"  153 |     @classmethod\n  154 |     def valid_repo(cls, path):\n  155 |         if _vc.call([cls.CMD, \"info\"], cwd=path):\n  156 |             return False\n  157 | \n  158 |         root, location = cls.is_in_repo(path)\n  159 |         vc_dir = os.path.join(root, cls.VC_DIR)\n  160 | \n  161 |         # Check for repository version, trusting format file then entries file\n  162 |         repo_version = None\n  163 |         for filename in (\"format\", \"entries\"):\n  164 |             path = os.path.join(vc_dir, filename)\n  165 |             if os.path.exists(path):\n  166 |                 with open(path) as f:\n  167 |                     repo_version = int(f.readline().strip())\n  168 |                 break\n  169 | \n  170 |         if not repo_version and os.path.exists(os.path.join(vc_dir, \"wc.db\")):\n  171 |             repo_version = 12\n  172 | \n  173 |         return cls._repo_version_support(repo_version)","lines":21}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"TreeViewChunkMap.chunk_coords_by_tag() calls next(iter(model)) with no guard for an empty tree model, which raises StopIteration. This is only reached from do_draw(), which is itself guarded by 'if not self.adjustment or self.adjustment.get_upper() <= 0: return False' in the base ChunkMap.do_draw, making the empty-model case unlikely in practice (an empty tree typically yields a zero-height adjustment), but the function has no explicit defence of its own if it is ever called directly or if the adjustment/model become inconsistent.","fix":"Guard with 'first = next(iter(model), None)' and return an empty dict early if first is None, instead of relying entirely on the caller's adjustment check.","locations":[{"ref":"meld/chunkmap.py:424-436","code":"  424 |     def chunk_coords_by_tag(self):\n  425 |         def recurse_tree_states(rowiter):\n  426 |             row_states.append(\n  427 |                 model.get_state(rowiter.iter, self.treeview_idx))\n  428 |             if self.treeview.row_expanded(rowiter.path):\n  429 | ne)\n 1034 |                         continue\n 1035 | \n 1036 |                     if stat.S_ISLNK(s.st_mode):\n 1037 |                         if self.props.ignore_symlinks:\n 1038 |                             continue\n 1039 |                         key = (s.st_dev, s.st_ino)\n 1040 |                         if key in symlinks_followed:\n 1041 |                             continue\n 1042 |                         symlinks_followed.add(key)\n 1043 |                         try:\n 1044 |                             s = os.stat(os.path.join(root, e))\n 1045 |                             if stat.S_ISREG(s.st_mode):\n 1046 |                                 files.add(pane, e)\n 1047 |                             elif stat.S_ISDIR(s.st_mode):\n 1048 |                                 dirs.add(pane, e)\n 1049 |                         except OSError as err:\n 1050 |                             if err.errno == errno.ENOENT:\n 1051 |                                 error_string = e + \": Dangling symlink\"\n 1052 |                             else:\n 1053 |                                 error_string = e + err.strerror\n 1054 |                             self.model.add_error(it, error_string, pane)\n 1055 |                             differences = True\n 1056 |                     elif stat.S_ISREG(s.st_mode):\n 1057 |                         files.add(pane, e)\n 1058 |                     elif stat.S_ISDIR(s.st_mode):\n 1059 |                         dirs.add(pane, e)\n 1060 |                     else:\n 1061 |                         # FIXME: Unhandled stat type\n 1062 |                         pass\n 1063 | \n 1064 |             for pane, f in encoding_errors:\n 1065 |                 invalid_filenames.append((pane, roots[pane], f))\n 1066 | \n 1067 |             for pane, f1, f2 in dirs.errors + files.errors:\n 1068 |                 shadowed_entries.append((pane, roots[pane], f1, f2))\n 1069 | \n 1070 |             for pane, f in dirs.whitespace + files.whitespa  checks in this method.","locations":[{"ref":"meld/filediff.py:2764-2784","code":" 2764 |     def remove(self, pane_idx: int, cursor_point):\n 2765 |         cursor_key = self._comparator(pane_idx, cursor_point)\n 2766 | \n 2767 |         index = -1\n 2768 | \n 2769 |         for (i, point) in enumerate(self._points[pane_idx]):\n 2770 |             if self._comparator(pane_idx, point) == cursor_key:\n 2771 |                 index = i\n 2772 |                 break\n 2773 | \n 2774 |         assert index is not None\n 2775 | \n 2776 |         pane_state = self._pane_state(pane_idx)\n 2777 | \n 2778 |         assert pane_state != self.PaneState.SHORT\n 2779 | \n 2780 |         if pane_state == self.PaneState.MATCHED:\n 2781 |             for pane in self._points:\n 2782 |                 pane.pop(index)\n 2783 |         elif pane_state == self.PaneState.DANGLING:\n 2784 |             self._points[pane_idx].pop()","lines":21}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"svn.py's get_path_for_conflict resolves CONFLICT_OTHER (the 'higher'/remote revision) for update conflicts via `glob.glob('%s.r*' % path)[-1]`, relying on glob's result order to put the higher revision number last. glob.glob does not guarantee any particular ordering (typically OS directory order), and even if the results were lexically sorted, multi-digit revision numbers sort incorrectly as strings (e.g. 'foo.r10' < 'foo.r2' < 'foo.r9' lexically), so `[-1]` can pick the wrong (lower) revision file as 'remote'.","fix":"Extract the numeric revision from each matched filename and pick by numeric value (max for OTHER, min for THIS) instead of relying on glob/string ordering.","locations":[{"ref":"meld/vc/svn.py:130-134","code":"  130 |         elif conflict == _vc.CONFLICT_OTHER:\n  131 |             if conflict_type == CONFLICT_TYPE_MERGE:\n  132 |                 return glob.glob('%s.merge-right.r*' % path)[0], False\n  133 |             else:\n  134 |                 return glob.glob('%s.r*' % path)[-1], False","lines":5}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"VcView.find_iter_by_name uses bare `name.startswith(path)` (twice) to decide whether a changed file path is contained within a tree row's directory path. Without checking for a following path separator, a sibling entry whose name shares a prefix is misidentified as a descendant, e.g. path='/repo/foo' incorrectly matches name='/repo/foo2/file.txt' since '/repo/foo2/file.txt'.startswith('/repo/foo') is True. Every VC backend in this same codebase (bzr.py, svn.py, darcs.py, mercurial.py, cvs.py) correctly guards this exact pattern with `path.startswith(self.root + os.path.sep)`, making this an inconsistency/regression in vcview.py specifically.","fix":"Compare with the path separator included, e.g. `name == path or name.startswith(path + os.sep)`, consistent with how the VC backend modules guard the same kind of prefix check.","locations":[{"ref":"meld/vcview.py:860-879","code":"  860 |     def find_iter_by_name(self, name):\n  861 |         it = self.model.get_iter_first()\n  862 |         path = self.model.get_file_path(it)\n  863 |         while it:\n  864 |             if name == path:\n  865 |                 return it\n  866 |             elif name.startswith(path):\n  867 |                 child = self.model.iter_children(it)\n  868 |                 while child:\n  869 |                     path = self.model.get_file_path(child)\n  870 |                     if name == path:\n  871 |                         return child\n  872 |                     elif name.startswith(path):\n  873 |                         break\n  874 |                     else:\n  875 |                         child = self.model.iter_next(child)\n  876 |                 it = child\n  877 |             else:\n  878 |                 break\n  879 |         return None","lines":20}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"get_background_rgba() caches the module-global _background_rgba on first call, but does not check the 'background_set' boolean returned by lookup_color(); if the lookup fails (background_set is False), the function still permanently caches and returns the failed/invalid Gdk.RGBA result because the 'if _background_rgba is None' guard on subsequent calls is no longer true (a returned RGBA object, even from a failed lookup, is not None). There is no retry or explicit fallback color.","fix":"Check background_set before caching: only assign to the module-global cache (and return it) when background_set is True; otherwise return/use an explicit fallback color without caching the failed lookup.","locations":[{"ref":"meld/gutterrendererchunk.py:26-43","code":"   26 | def get_background_rgba(renderer):\n   27 |     '''Get and cache the expected background for the renderer widget\n   28 | \n   29 |     Current versions of GTK+ don't paint the background of text view\n   30 |     gutters with the actual expected widget background, which causes\n   31 |     them to look wrong when put next to any other widgets. This hack\n   32 |     just gets the background from the renderer's view, and then caches\n   33 |     it for performance, and on the basis that all renderers will be\n   34 |     assigned to similarly-styled views. This is fragile, but the\n   35 |     alternative is really significantly slower.\n   36 |     '''\n   37 |     global _background_rgba\n   38 |     if _background_rgba is None:\n   39 |         if renderer.props.view:\n   40 |             stylecontext = renderer.props.view.get_style_context()\n   41 |             background_set, _background_rgba = (\n   42 |                 stylecontext.lookup_color('theme_bg_color'))\n   43 |     return _background_rgba","lines":18}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"find_shared_parent_path() walks up from paths[0].get_parent() looking for an ancestor that is a valid relative-path root for every input path, using 'all(current_parent.get_relative_path(path) for path in paths)'. Gio.File.get_relative_path() returns an empty string (falsy) when a path equals current_parent itself (zero-depth relative path), so if one of the compared files/folders IS the common parent directory, is_valid_parent evaluates False for an otherwise-correct candidate and the loop walks one level too far up, returning a less specific common ancestor than the true closest one.","fix":"Treat an empty-string return from get_relative_path distinctly from None, e.g. check 'result is not None' rather than relying on truthiness, since '' is a valid (zero-depth) relative path.","locations":[{"ref":"meld/iohelpers.py:127-151","code":"  127 | def find_shared_parent_path(\n  128 |     paths: Sequence[Optional[Gio.File]],\n  129 | ) -> Optional[Gio.File]:\n  130 | \n  131 |     if not paths or not paths[0] or any(path is None for path in paths):\n  132 |         return None\n  133 | \n  134 |     current_parent = paths[0].get_parent()\n  135 |     if len(paths) == 1:\n  136 |         return current_parent\n  137 | \n  138 |     while current_parent:\n  139 |         is_valid_parent = all(\n  140 |             current_parent.get_relative_path(path)\n  141 |             for path in paths\n  142 |         )\n  143 |         if is_valid_parent:\n  144 |             break\n  145 | \n  146 |         current_parent = current_parent.get_parent()\n  147 | \n  148 |     # Either we've broken out of the loop early, in which case we have\n  149 |     # a valid common parent path, or we've fallen through, in which\n  150 |     # case the path return is None.\n  151 |     return current_parent","lines":25}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"copy2() only treats a path as a copyable symlink when both os.path.islink(src) AND os.path.isfile(src) are true; os.path.isfile() follows symlinks, so a broken/dangling symlink (or a symlink to a directory) fails both that branch and the elif os.path.isfile(src) branch, falling into 'else: raise OSError(\"Not a file\")'. By contrast, copytree() handles all symlinks uniformly via os.path.islink() alone. This makes folder-copy operations in DirDiff (misc.copy2 is called from dirdiff.py) fail with an unhelpful error when copying a directory containing a dangling symlink, instead of copying the symlink as-is like copytree's own recursive case does.","fix":"Change the symlink branch to 'if os.path.islink(src): ... os.symlink(os.readlink(src), dst)' without the additional os.path.isfile(src) check, mirroring copytree's handling.","locations":[{"ref":"meld/misc.py:296-316","code":"  296 | def copy2(src: str, dst: str) -> None:\n  297 |     \"\"\"Like shutil.copy2 but ignores chmod errors, and copies symlinks as links\n  298 |     See [Bug 568000] Copying to NTFS fails\n  299 |     \"\"\"\n  300 |     if os.path.isdir(dst):\n  301 |         dst = os.path.join(dst, os.path.basename(src))\n  302 | \n  303 |     if os.path.islink(src) and os.path.isfile(src):\n  304 |         if os.path.lexists(dst):\n  305 |             os.unlink(dst)\n  306 |         os.symlink(os.readlink(src), dst)\n  307 |     elif os.path.isfile(src):\n  308 |         shutil.copyfile(src, dst)\n  309 |     else:\n  310 |         raise OSError(\"Not a file\")\n  311 | \n  312 |     try:\n  313 |         shutil.copystat(src, dst)\n  314 |     except OSError as e:\n  315 |         if e.errno not in (errno.EPERM, errno.ENOTSUP):\n  316 |             raise","lines":21}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"_make_map_base_colors() copies the 'base' fallback assignment into the text and border fallback branches instead of assigning to 'text' and 'border'. When theme_text_color lookup fails, 'text' is left as whatever lookup_color() returned (not the intended black fallback) while 'base' is incorrectly overwritten to black; similarly when the 'borders' lookup fails, 'border' is left unset and 'base' is incorrectly overwritten to light grey. This corrupts the chunkmap/treeview overview-map theming fallback colors whenever a theme is missing one of these named colors.","fix":"Assign the fallback color to the correct variable in each branch: 'text = make_gdk_rgba(0.0, 0.0, 0.0, 1.0)' when text_set is False, and 'border = make_gdk_rgba(0.95, 0.95, 0.95, 1.0)' when border_set is False, instead of reassigning 'base' in both cases.","locations":[{"ref":"meld/chunkmap.py:122-143","code":"  122 |     def _make_map_base_colors(\n  123 |             self, widget) -> Tuple[Gdk.RGBA, Gdk.RGBA, Gdk.RGBA, Gdk.RGBA]:\n  124 |         stylecontext = widget.get_style_context()\n  125 |         base_set, base = (\n  126 |             stylecontext.lookup_color('theme_base_color'))\n  127 |         if not base_set:\n  128 |             base = make_gdk_rgba(1.0, 1.0, 1.0, 1.0)\n  129 |         text_set, text = (\n  130 |             stylecontext.lookup_color('theme_text_color'))\n  131 |         if not text_set:\n  132 |             base = make_gdk_rgba(0.0, 0.0, 0.0, 1.0)\n  133 |         border_set, border = (\n  134 |             stylecontext.lookup_color('borders'))\n  135 |         if not border_set:\n  136 |             base = make_gdk_rgba(0.95, 0.95, 0.95, 1.0)\n  137 | \n  138 |         handle_overdraw = text.copy()\n  139 |         handle_overdraw.alpha = self.handle_overdraw_alpha\n  140 |         handle_outline = text.copy()\n  141 |         handle_outline.alpha = self.handle_outline_alpha\n  142 | \n  143 |         return base, border, handle_overdraw, handle_outline","lines":22}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"ActionGutter.do_button_release_event() chains up to Gtk.DrawingArea.do_button_press_event() instead of do_button_release_event(). This means the parent class's release handling is never invoked (its press handling is invoked instead, with release-event data), which can cause incorrect default GTK button/gesture state handling on this widget.","fix":"Change line 242 to 'return Gtk.DrawingArea.do_button_release_event(self, event)'.","locations":[{"ref":"meld/actiongutter.py:237-242","code":"  237 |     def do_button_release_event(self, event):\n  238 |         if self.pointer_chunk and self.pointer_chunk == self.pressed_chunk:\n  239 |             self.activate(self.pressed_chunk)\n  240 |         self.pressed_chunk = None\n  241 | \n  242 |         return Gtk.DrawingArea.do_button_press_event(self, event)","lines":6}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"EmblemCellRenderer.do_render() clips/fills the emblem overlay using cell_area.width as the rectangle width (context.rectangle(x_offset, 0, cell_area.width, self._emblem_size)), instead of the emblem pixbuf's own width like the base icon does a few lines above (context.rectangle(0, height_offset, pixbuf.get_width(), pixbuf.get_height())). This looks like a copy-paste where 'pixbuf.get_width()' was changed to 'cell_area.width' instead of the emblem's actual width, making the clip/fill rectangle for the emblem unnecessarily (and incorrectly) wide relative to the rest of the rendering logic's pattern.","fix":"Use pixbuf.get_width() (the emblem pixbuf's width) instead of cell_area.width for the emblem's fill rectangle, consistent with the base-icon rendering above it.","locations":[{"ref":"meld/ui/emblemcellrenderer.py:109-116","code":"  109 |             if self.emblem_name:\n  110 |                 pixbuf = self._get_pixbuf(self.emblem_name, self._emblem_size)\n  111 |                 if pixbuf:\n  112 |                     x_offset = self._icon_size - self._emblem_size\n  113 |                     context.set_operator(cairo.OPERATOR_OVER)\n  114 |                     Gdk.cairo_set_source_pixbuf(context, pixbuf, x_offset, 0)\n  115 |                     context.rectangle(x_offset, 0, cell_area.width, self._emblem_size)\n  116 |                     context.fill()","lines":8}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"open_cb is registered as the callback for query_info_async but does not guard against failures: (1) gfile.query_info_finish(result) at the top can raise GLib.Error (e.g. file deleted between the query and the callback firing) and (2) make_custom_editor_command(path, line) can raise ValueError from shlex.split() if the user's custom-editor-command gsetting contains an unbalanced quote. Neither is caught, so an uncaught exception escapes a GIO async callback instead of showing the user a normal error dialog like the rest of this function does for subprocess.Popen failures.","fix":"Wrap query_info_finish in try/except GLib.Error and show a modal_dialog on failure; wrap the make_custom_editor_command call in try/except ValueError to report a clear 'invalid custom editor command' error instead of crashing.","locations":[{"ref":"meld/externalhelpers.py:77-101","code":"   77 | def open_cb(\n   78 |     gfile: Gio.File,\n   79 |     result: Gio.AsyncResult,\n   80 |     user_data: Mapping[str, int],\n   81 | ) -> None:\n   82 |     info = gfile.query_info_finish(result)\n   83 |     file_type = info.get_file_type()\n   84 | \n   85 |     if file_type == Gio.FileType.DIRECTORY:\n   86 |         launch_with_default_handler(gfile)\n   87 |     elif file_type == Gio.FileType.REGULAR:\n   88 |         # If we can't access a content type, we assume it's text because\n   89 |         # context types aren't reliably detected cross-platform.\n   90 |         content_type = info.get_content_type()\n   91 |         if not content_type or Gio.content_type_is_a(content_type, \"text/plain\"):\n   92 |             if get_settings().get_boolean(\"use-system-editor\"):\n   93 |                 if sys.platform == \"win32\":\n   94 |                     handler = gfile.query_default_handler(None)\n   95 |                     result = handler.launch([gfile], None)\n   96 |                 else:\n   97 |                     Gio.AppInfo.launch_default_for_uri(gfile.get_uri(), None)\n   98 |             else:\n   99 |                 line = user_data.get(\"line\", 0)\n  100 |                 path = gfile.get_path()\n  101 |                 editor = make_custom_editor_command(path, line)","lines":25}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"SchedulerBase.iteration() catches bare 'except Exception' around running a scheduled task, prints a traceback to stderr via traceback.print_exc(), and silently drops the task from the queue. Background operations (file loads, diffs, VC commands) that raise will fail with no user-visible indication beyond a console traceback that most users never see, giving the impression the operation simply never completed.","fix":"Log via the standard logging module (so it's consistent with the rest of the app) and/or surface a user-visible error (e.g. via the existing error_dialog/modal_dialog helpers) when a scheduled task raises, rather than only printing to stderr.","locations":[{"ref":"meld/task.py:100-119","code":"  100 |     def iteration(self):\n  101 |         \"\"\"Perform one iteration of the current task\"\"\"\n  102 |         try:\n  103 |             task = self.get_current_task()\n  104 |         except StopIteration:\n  105 |             return 0\n  106 |         try:\n  107 |             if hasattr(task, \"__iter__\"):\n  108 |                 ret = next(task)\n  109 |             else:\n  110 |                 ret = task()\n  111 |         except StopIteration:\n  112 |             pass\n  113 |         except Exception:\n  114 |             traceback.print_exc()\n  115 |         else:\n  116 |             if ret:\n  117 |                 return ret\n  118 |         self.tasks.remove(task)\n  119 |         return 0","lines":20}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"cvs.py's _update_tree_state_cache uses a bare `raise` (no active exception) when the filename parsed from `cvs status` output doesn't match the expected entry: `if os.path.basename(name) not in entry[1]: raise`. Since this isn't inside an except block, there is no exception to re-raise, so Python itself raises `RuntimeError: No active exception to re-raise` -- a confusing, unrelated error that masks the actual CVS-output-mismatch problem the check was meant to surface.","fix":"Raise a meaningful exception instead, e.g. `raise RuntimeError(f\"cvs status output mismatch: expected {name!r} in {entry[1]!r}\")`, or log and skip the entry instead of crashing the whole scan.","locations":[{"ref":"meld/vc/cvs.py:147-150","code":"  147 |                 if os.path.basename(name) not in entry[1]:\n  148 |                     # ? The short filename got from\n  149 |                     # 'cvs -Q status <path/file>' does not match <file>\n  150 |                     raise","lines":4}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"The module-level `_cache` dict in dirdiff.py (used by _files_same to memoize file-content comparisons) is never pruned, cleared, or bounded. Every unique (files, need_contents, regexes, ignore_blank_lines) tuple encountered during any folder comparison in the application's lifetime is added and never evicted, even after the comparison view is closed or the files no longer exist. In long-running sessions with many folder comparisons across large trees, this accumulates an ever-growing amount of memory (cached stats plus, indirectly, repeated comparisons keep adding entries) with no eviction policy.","fix":"Bound the cache (e.g. functools.lru_cache with maxsize, or an explicit LRU/dict size cap with eviction), or clear/scope the cache per-DirDiff-instance and drop it when the view is closed instead of using a single unbounded module-level dict shared for the process lifetime.","locations":[{"ref":"meld/dirdiff.py:93","code":"   93 | _cache = {}","lines":1},{"ref":"meld/dirdiff.py:251","code":"  251 |     _cache[cache_key] = CacheResult(stats, result)","lines":1}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In read_pipe_iter's Sentinel.__call__, stdout is read in 4096-byte chunks (childout.read(4096)) but stderr is read one byte at a time (childerr.read(1)) every time select() reports it's ready. For subprocesses that emit substantial stderr output (e.g. verbose VC tool errors), this performs a read() syscall per byte, which is needlessly slow compared to the chunked stdout path.","fix":"Read stderr in a reasonably sized chunk (e.g. childerr.read(4096)) instead of one byte at a time, matching the stdout handling.","locations":[{"ref":"meld/misc.py:279-285","code":"  279 |                 if childerr in state[0]:\n  280 |                     try:\n  281 |                         # how many chars?\n  282 |                         errorstream.error(childerr.read(1))\n  283 |                     except IOError:\n  284 |                         # FIXME: ick need to fix\n  285 |                         break","lines":7}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"git.py's get_commits_to_push runs one `git rev-list` subprocess per local branch returned by `for-each-ref` (inside a Python loop). For repositories with many local branches, this means many separate subprocess invocations every time get_commits_to_push_summary() is called (once per VcView._set_location, i.e. once per repository open/refresh). Each subprocess has non-trivial startup overhead compared to a single batched git invocation.","fix":"If this becomes a bottleneck for repos with many branches, consider batching with a single `git rev-list --all --not <remotes>` style invocation or caching results, though for typical branch counts this is unlikely to be a practical problem.","locations":[{"ref":"meld/vc/git.py:117-133","code":"  117 |     def get_commits_to_push(self):\n  118 |         proc = self.run(\n  119 |             \"for-each-ref\", \"--format=%(refname:short) %(upstream:short) %(upstream:trackshort)\",\n  120 |             \"refs/heads\")\n  121 |         branch_remotes = proc.stdout.read().split(\"\\n\")[:-1]\n  122 | \n  123 |         branch_revisions = {}\n  124 |         for line in branch_remotes:\n  125 |             try:\n  126 |                 branch, remote, track = line.split()\n  127 |             except ValueError:\n  128 |                 continue\n  129 | \n  130 |             proc = self.run(\"rev-list\", branch, \"^\" + remote, \"--\")\n  131 |             revisions = proc.stdout.read().split(\"\\n\")[:-1]\n  132 |             branch_revisions[branch] = revisions\n  133 |         return branch_revisions","lines":17}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"ScrollLinkMap is defined with only a __gtype_name__ and no __init__, do_draw, or any link-drawing logic, despite being instantiated from dirdiff.ui (linkmap0/linkmap1) where its name implies it should render link curves between two tree views analogous to what LinkMap does for text views. As written it is just a bare Gtk.DrawingArea with a custom GType name and draws nothing diff-related.","fix":"Either implement the intended link-drawing behaviour for tree view diffs, or remove the class/replace its use in dirdiff.ui with a plain Gtk.DrawingArea if it is genuinely unused/vestigial.","locations":[{"ref":"meld/linkmap.py:138-141","code":"  138 | class ScrollLinkMap(Gtk.DrawingArea):\n  139 | \n  140 |     __gtype_name__ = \"ScrollLinkMap\"","lines":4}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The module-level `partition()` helper in _vc.py uses `itertools.ifilterfalse` and `itertools.ifilter`, which are Python 2 APIs that do not exist in the `itertools` module under Python 3 (this codebase is Python 3 only, per `universal_newlines`/f-strings usage elsewhere). Calling this function would immediately raise AttributeError. It is not called anywhere in the dirdiff/vcview/vc modules (or, per a repo-wide grep, anywhere else), so it is unreachable, broken dead code.","fix":"Remove the unused, Python-2-only partition() function, or if still needed, reimplement with itertools.filterfalse and the builtin filter().","locations":[{"ref":"meld/vc/_vc.py:62-66","code":"   62 | # Lifted from the itertools recipes section\n   63 | def partition(pred, iterable):\n   64 |     t1, t2 = itertools.tee(iterable)\n   65 |     return (list(itertools.ifilterfalse(pred, t1)),\n   66 |             list(itertools.ifilter(pred, t2)))","lines":5}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"CellRendererFileMode.file_mode GObject.Property has nick=\"Byte size to display\", which is copy-pasted from the unrelated CellRendererByteSize.bytesize property above it. The nick is shown in GObject introspection/property docs and is misleading for a file-mode (permissions) property.","fix":"Change the nick to something like \"File mode (permissions) to display\".","locations":[{"ref":"meld/ui/cellrenderers.py:123-128","code":"  123 |     file_mode = GObject.Property(\n  124 |         type=int,\n  125 |         nick=\"Byte size to display\",\n  126 |         getter=get_file_mode,\n  127 |         setter=set_file_mode,\n  128 |     )","lines":6}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"medium","easy":false,"description":"FileDiff (meld/filediff.py) is a single Gtk.Box subclass with 145 methods across 2860 lines, mixing many distinct responsibilities: file loading/saving and encoding handling, undo/redo wiring, cursor and chunk-action sensitivity tracking, diff computation orchestration and inline-highlight scheduling, chunk push/pull/copy/delete editing operations, scroll synchronization across panes, syncpoint management (plus the separate but co-located Syncpoints/SyncpointAction classes), text-filter management, drag-and-drop handling, and menu/action-group setup. This makes the class hard to navigate, test in isolation, or safely modify without risking unrelated regressions, and several methods (e.g. on_diffs_changed, _sync_vscroll, on_current_diff_changed) are doing multiple unrelated things in one function body.","fix":"Split FileDiff into smaller collaborating components, e.g. extract file load/save handling, scroll synchronization, and syncpoint coordination into separate helper classes/mixins that FileDiff composes, rather than one monolithic class. At minimum, move Syncpoints/SyncpointAction (already self-contained) to their own module.","locations":[{"ref":"meld/filediff.py:117-2727","code":"  117 | class FileDiff(Gtk.Box, MeldDoc):\n  118 |     \"\"\"Two or three way comparison of text files\"\"\"\n  119 | \n  120 |     __gtype_name__ = \"FileDiff\"\n  121 | \n  122 |     close_signal = MeldDoc.close_signal\n  123 |     create_diff_signal = MeldDoc.create_diff_signal\n  124 |     file_changed_signal = MeldDoc.file_changed_signal\n  125 |     label_changed = MeldDoc.label_changed\n  126 |     move_diff = MeldDoc.move_diff\n  127 |     tab_state_changed = MeldDoc.tab_state_changed\n  128 | \n  129 |     __gsettings_bindings_view__ = (\n  130 |         ('ignore-blank-lines', 'ignore-blank-lines'),\n  131 |         ('show-overview-map', 'show-overview-map'),\n  132 |         ('overview-map-style', 'overview-map-style'),\n  133 |     )\n  134 | \  in do_unrealize(), or connecting only once in __init__ instead of in do_realize().","locations":[{"ref":"meld/sourceview.py:283-321","code":"  283 |     def do_realize(self):\n  284 |         bind_settings(self)\n  285 | \n  286 |         def wrap_mode_from_bool(binding, from_value):\n  287 |             if from_value:\n  288 |                 settings_mode = settings.get_enum('wrap-mode')\n  289 |                 if settings_mode == Gtk.WrapMode.NONE:\n  290 |                     mode = Gtk.WrapMode.WORD\n  291 |                 else:\n  292 |                     mode = settings_mode\n  293 |             else:\n  294 |                 mode = Gtk.WrapMode.NONE\n  295 |             return mode\n  296 | \n  297 |         def wrap_mode_to_bool(binding, from_value):\n  298 |             return bool(from_value)\n  299 | \n  300 |         self.bind_property(\n  301 |             'wrap-mode-bool', self, 'wrap-mode',\n  302 |             GObject.BindingFlags.BIDIRECTIONAL,\n  303 |             wrap_mode_from_bool,\n  304 |             wrap_mode_to_bool,\n  305 |         )\n  306 |         self.wrap_mode_bool = wrap_mode_to_bool(None, self.props.wrap_mode)\n  307 | \n  308 |         self.bind_property(\n  309 |             'draw-spaces-bool', self.props.space_drawer, 'enable-matrix',\n  310 |             GObject.BindingFlags.DEFAULT | GObject.BindingFlags.SYNC_CREATE,\n  311 |         )\n  312 | \n  313 |         meld_settings = get_meld_settings()\n  314 | \n  315 |         self.on_setting_changed(meld_settings, 'font')\n  316 |         self.on_setting_changed(meld_settings, 'style-scheme')\n  317 |         self.get_buffer().set_style_scheme(meld_settings.style_scheme)\n  318 | \n  319 |         meld_settings.connect('changed', self.on_setting_changed)\n  320 | \n  321 |         return GtkSource.View.do_realize(self)","lines":39}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","easy":true,"description":"LinkMap.__init__ does not call super().__init__(), unlike every other GObject/Gtk.DrawingArea-derived widget class in this file set (ChunkMap, ActionGutter, DiffGrid all correctly call super().__init__()). LinkMap is instantiated via GtkBuilder/Gtk.Template from filediff.ui, so the underlying GObject is constructed by the type system regardless, but skipping super().__init__() is inconsistent with the codebase's own convention and risks breaking GObject-level construction (e.g. any future construct-only properties or base-class init logic) silently.","fix":"Add 'super().__init__()' as the first line of LinkMap.__init__, matching the pattern used by ChunkMap, ActionGutter, and DiffGrid.","locations":[{"ref":"meld/linkmap.py:33-35","code":"   33 |     def __init__(self):\n   34 |         self.filediff = None\n   35 |         self.views = []","lines":3}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"low","easy":true,"description":"In BufferLines.__init__, three consecutive buf.connect(...) calls each end with a trailing comma, turning each statement into a throwaway 1-tuple expression (e.g. 'buf.connect(\"insert-text\", self.on_insert_text),'). The connect() calls still execute (so the signal handlers are wired up correctly), but the handler IDs returned by connect() are discarded into unused tuples instead of being stored, so there is no way to later disconnect these specific handlers (e.g. for cleanup when the BufferLines wrapper is dropped but the underlying GtkTextBuffer outlives it).","fix":"Remove the stray trailing commas, and store the returned handler IDs (e.g. self._handler_ids = [...]) so they can be disconnected if/when needed.","locations":[{"ref":"meld/meldbuffer.py:255-257","code":"  255 |         buf.connect(\"insert-text\", self.on_insert_text),\n  256 |         buf.connect(\"delete-range\", self.on_delete_range),\n  257 |         buf.connect_after(\"insert-text\", self.after_insert_text),","lines":3}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","easy":false,"description":"action_fullscreen_change calls self.get_window().get_state() without checking that the underlying Gdk.Window exists. Gtk.Widget.get_window() returns None before the widget is realized. While in practice this action is only triggered via the bound win.fullscreen accelerator after the window is shown, the method itself provides no defensive check, unlike other realize-dependent code paths in the same file (e.g. do_realize gates GTK template child setup explicitly).  A future programmatic call (e.g. for a command-line '--fullscreen' option or tests) before realization would raise AttributeError on None.get_state().","fix":"Guard with 'window = self.get_window(); if window is None: return' (or use self.is_maximized()-style GTK4-ready properties) before dereferencing get_window().","locations":[{"ref":"meld/meldwindow.py:273-280","code":"  273 |     def action_fullscreen_change(self, action, state):\n  274 |         window_state = self.get_window().get_state()\n  275 |         is_full = window_state & Gdk.WindowState.FULLSCREEN\n  276 |         action.set_state(state)\n  277 |         if state and not is_full:\n  278 |             self.fullscreen()\n  279 |         elif is_full:\n  280 |             self.unfullscreen()","lines":8}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","easy":false,"description":"FindBar.set_text_view() creates a new GtkSource.SearchContext and connects a 'notify::occurrences-count' handler, storing the new handler id in self.notify_id, every time it's called with a non-None textview -- including when switching directly between two non-None textviews (e.g. via start_find_next/start_find_previous/start_find while already attached to a different pane). The previous search_context's signal connection is only ever explicitly disconnected in the 'textview is None' branch; when going from one non-None textview straight to another, the old search_context is simply dropped without disconnecting first. This happ
