<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In try_compile, when cross-compiling C++ to wasm32-unknown-linux (musl), the code calls `self.wasm_musl_sysroot().unwrap()` which panics if the `WASM_MUSL_SYSROOT` env var is not set. The parallel wasi branch just above handles the identical missing-env-var case gracefully with `if let Ok(wasi_sysroot) = self.wasi_sysroot() { ... }` and silently skips emitting metadata. try_compile is documented to return a Result instead of panicking, so this is an inconsistent, undocumented panic path.","fix":"Mirror the wasi branch: use `if let Ok(musl_sysroot) = self.wasm_musl_sysroot() { ... }` instead of `.unwrap()`, so a missing WASM_MUSL_SYSROOT degrades gracefully instead of panicking inside a non-panicking function.","locations":[{"ref":"src/lib.rs:1663-1669","code":" 1663 |                 } else if target.os == \"linux\" {\n 1664 |                     let musl_sysroot = self.wasm_musl_sysroot().unwrap();\n 1665 |                     self.cargo_output.print_metadata(&format_args!(\n 1666 |                         \"cargo:rustc-flags=-L {}/lib -lstatic=c++ -lstatic=c++abi\",\n 1667 |                         Path::new(&musl_sysroot).display(),\n 1668 |                     ));\n 1669 |                 }","lines":7,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/lib.rs#L1663-L1669"},{"ref":"src/lib.rs:4254-4263","code":" 4254 |     fn wasm_musl_sysroot(&self) -> Result<OsString, Error> {\n 4255 |         if let Some(musl_sysroot_path) = self.get_env(\"WASM_MUSL_SYSROOT\") {\n 4256 |             Ok(musl_sysroot_path)\n 4257 |         } else {\n 4258 |             Err(Error::new(\n 4259 |                 ErrorKind::EnvVarNotFound,\n 4260 |                 \"Environment variable WASM_MUSL_SYSROOT not defined for wasm32. Download sysroot from GitHub & setup environment variable MUSL_SYSROOT targeting the folder.\",\n 4261 |             ))\n 4262 |         }\n 4263 |     }","lines":10,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/lib.rs#L4254-L4263"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"On the wasm32-linux clang path, `self.wasm_musl_sysroot().unwrap()` panics the whole build process with a generic unwrap message if `WASM_MUSL_SYSROOT` is not set, instead of propagating a proper `Error` like the sibling wasi branch a few lines above (which uses `if let Ok(wasi_sysroot) = self.wasi_sysroot()`). Users get an unhelpful panic instead of the descriptive error message `wasm_musl_sysroot()` was designed to produce.","fix":"Replace `self.wasm_musl_sysroot().unwrap()` with proper error propagation, e.g. `let musl_sysroot = self.wasm_musl_sysroot()?;`, matching the established pattern for the wasi sysroot case.","locations":[{"ref":"src/lib.rs:2277","code":" 2277 |                         let musl_sysroot = self.wasm_musl_sysroot().unwrap();","lines":1,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/lib.rs#L2277"},{"ref":"src/lib.rs:2167-2171","code":" 2167 |                     if let Ok(wasi_sysroot) = self.wasi_sysroot() {\n 2168 |                         cmd.push_cc_arg(\n 2169 |                             format!(\"--sysroot={}\", Path::new(&wasi_sysroot).display()).into(),\n 2170 |                         );\n 2171 |                     }","lines":5,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/lib.rs#L2167-L2171"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `apple_deployment_target`, `maybe_cpp_version_baseline` parses each dot-separated component of the deployment target version with `.parse::<u32>().expect(\"integer version\")`. The version can come directly from the user-controlled `MACOSX_DEPLOYMENT_TARGET` or `IPHONEOS_DEPLOYMENT_TARGET` environment variables via `deployment_from_env`. Any non-numeric or empty component (e.g. `MACOSX_DEPLOYMENT_TARGET=14.0-beta`, or an empty string) causes an immediate panic instead of a graceful fallback, even though this code path is only reachable when `self.cpp` is true.","fix":"Replace the `.expect(\"integer version\")` with a fallible parse (e.g. `.ok()?` or default to 0 on parse failure) and fall through to `default_deployment_from_sdk`/the hardcoded fallback instead of panicking on malformed environment input.","locations":[{"ref":"src/lib.rs:4152-4167","code":" 4152 |         let deployment_from_env = |name: &str| -> Option<Arc<str>> {\n 4153 |             self.get_env_overridable(name)?.to_str().map(Arc::from)\n 4154 |         };\n 4155 | \n 4156 |         // Determines if the acquired deployment target is too low to support modern C++ on some Apple platform.\n 4157 |         //\n 4158 |         // A long time ago they used libstdc++, but since macOS 10.9 and iOS 7 libc++ has been the library the SDKs provide to link against.\n 4159 |         // If a `cc`` config wants to use C++, we round up to these versions as the baseline.\n 4160 |         let maybe_cpp_version_baseline = |deployment_target_ver: Arc<str>| -> Option<Arc<str>> {\n 4161 |             if !self.cpp {\n 4162 |                 return Some(deployment_target_ver);\n 4163 |             }\n 4164 | \n 4165 |             let mut deployment_target = deployment_target_ver\n 4166 |                 .split('.')\n 4167 |                 .map(|v| v.parse::<u32>().expect(\"integer version\"));","lines":16,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/lib.rs#L4152-L4167"},{"ref":"src/lib.rs:4213-4228","code":" 4213 |             \"macos\" => deployment_from_env(\"MACOSX_DEPLOYMENT_TARGET\")\n 4214 |                 .and_then(maybe_cpp_version_baseline)\n 4215 |                 .or_else(default_deployment_from_sdk)\n 4216 |                 .unwrap_or_else(|| {\n 4217 |                     if target.arch == \"aarch64\" {\n 4218 |                         \"11.0\".into()\n 4219 |                     } else {\n 4220 |                         let default: Arc<str> = Arc::from(\"10.7\");\n 4221 |                         maybe_cpp_version_baseline(default.clone()).unwrap_or(default)\n 4222 |                     }\n 4223 |                 }),\n 4224 | \n 4225 |             \"ios\" => deployment_from_env(\"IPHONEOS_DEPLOYMENT_TARGET\")\n 4226 |                 .and_then(maybe_cpp_version_baseline)\n 4227 |                 .or_else(default_deployment_from_sdk)\n 4228 |                 .unwrap_or_else(|| \"7.0\".into()),","lines":16,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/lib.rs#L4213-L4228"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"add_env() calls env::join_paths(new).unwrap() to build the LIB/PATH/INCLUDE environment values. env::join_paths returns an Err if any path component contains the platform path-list separator (';' on Windows), which can occur if the user's pre-existing PATH/LIB/INCLUDE environment variable (read via env_getter.get_env) or a discovered SDK/VS install directory contains a semicolon. The unwrap() turns that recoverable condition into a panic inside what is otherwise an Option-returning, panic-free search routine.","fix":"Propagate the error instead of unwrapping, e.g. change into_tool/add_env to return Option<Tool> and use `env::join_paths(new).ok()?`, or fall back to the new paths only (skipping the unjoinable previous value) with a warning.","locations":[{"ref":"find-msvc-tools/src/find_tools.rs:1040-1052","code":" 1040 |     fn add_env(\n 1041 |         tool: &mut Tool,\n 1042 |         env: &'static str,\n 1043 |         paths: Vec<PathBuf>,\n 1044 |         env_getter: &dyn EnvGetter,\n 1045 |     ) {\n 1046 |         let prev = env_getter.get_env(env);\n 1047 |         let prev = prev.as_ref().map(AsRef::as_ref).unwrap_or_default();\n 1048 |         let prev = env::split_paths(&prev);\n 1049 |         let new = paths.into_iter().chain(prev);\n 1050 |         tool.env\n 1051 |             .push((env.to_string().into(), env::join_paths(new).unwrap()));\n 1052 |     }","lines":13,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/find-msvc-tools/src/find_tools.rs#L1040-L1052"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"try_compile() is documented (\"This will return a result instead of panicking\") yet it calls the panicking `self.get_compiler()` (not `try_get_compiler()`) when resolving the nvcc path for CUDA runtime linking. If compiler resolution fails at this point (e.g. misconfigured target/compiler), it panics via `fail()` instead of returning an `Err`, breaking the function's documented non-panicking contract.","fix":"Replace `self.get_compiler()` with `self.try_get_compiler()?` (or reuse the already-resolved compiler) so failures propagate as `Error` instead of panicking.","locations":[{"ref":"src/lib.rs:1678","code":" 1678 |             if let Some(nvcc) = self.which(&self.get_compiler().path, None) {","lines":1,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/lib.rs#L1678"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`is_duplicate_opt_arg` calls `flag.to_str().unwrap()` on the OsString being pushed, which will panic if any optimization flag built from caller-controlled data (e.g. via `Build::flag`/`Build::opt_level` combined with user-provided strings) is not valid UTF-8. The existing-args check on line 354 already defensively uses `to_str().unwrap_or(\"\")`, showing the author was aware OsStrings can be non-UTF8, but the same care was not applied to `flag` itself.","fix":"Use `flag.to_str()` and return false (not a duplicate / skip the check) when conversion fails, instead of unwrapping, mirroring the `unwrap_or(\"\")` pattern already used for the comparison side.","locations":[{"ref":"src/tool.rs:336-358","code":"  336 |     pub(crate) fn is_duplicate_opt_arg(&self, flag: &OsString) -> bool {\n  337 |         let flag = flag.to_str().unwrap();\n  338 |         let mut chars = flag.chars();\n  339 | \n  340 |         // Only duplicate check compiler flags\n  341 |         if self.is_like_msvc() {\n  342 |             if chars.next() != Some('/') {\n  343 |                 return false;\n  344 |             }\n  345 |         } else if (self.is_like_gnu() || self.is_like_clang()) && chars.next() != Some('-') {\n  346 |             return false;\n  347 |         }\n  348 | \n  349 |         // Check for existing optimization flags (-O, /O)\n  350 |         if chars.next() == Some('O') {\n  351 |             return self\n  352 |                 .args()\n  353 |                 .iter()\n  354 |                 .any(|a| a.to_str().unwrap_or(\"\").chars().nth(1) == Some('O'));\n  355 |         }\n  356 | \n  357 |         // TODO Check for existing -m..., -m...=..., /arch:... flags\n  358 |         false","lines":23,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/tool.rs#L336-L358"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In the Android-NDK standalone-clang-wrapper rewrite path (Windows + android target only), `path.to_str().unwrap()` will panic if the compiler's file name is not valid UTF-8. This is a narrow edge case but an unwrap on externally-influenced filesystem data inside otherwise carefully error-handled compiler-detection code.","fix":"Use `path.to_str()` with a fallback (e.g. skip the rewrite, or return an `Error::new(ErrorKind::InvalidTarget, ...)`) instead of unwrapping.","locations":[{"ref":"src/lib.rs:3155-3157","code":" 3155 |             if let Some(path) = tool.path.file_name() {\n 3156 |                 let file_name = path.to_str().unwrap().to_owned();\n 3157 |                 let (target, clang) = file_name.split_at(file_name.rfind('-').unwrap());","lines":3,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/lib.rs#L3155-L3157"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`custom_wrapper.as_deref().unwrap().to_str().unwrap()` panics if the user sets `CC_KNOWN_WRAPPER_CUSTOM` to a non-UTF-8 value. All other env var paths in this method use lossy/checked conversions; this one will abort the build with an unhelpful unwrap panic instead of a normal cc-rs `Error`.","fix":"Use `custom_wrapper.as_deref().and_then(|w| w.to_str())` and skip pushing into `known_wrappers` (or error out cleanly) when the value isn't valid UTF-8, instead of unwrapping.","locations":[{"ref":"src/lib.rs:3286-3289","code":" 3286 |         let custom_wrapper = self.get_env(\"CC_KNOWN_WRAPPER_CUSTOM\");\n 3287 |         if custom_wrapper.is_some() {\n 3288 |             known_wrappers.push(custom_wrapper.as_deref().unwrap().to_str().unwrap());\n 3289 |         }","lines":4,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/lib.rs#L3286-L3289"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"bytes_available() converts the FIONREAD ioctl result (a C `int`, signed) to `usize` via `try_into().unwrap()`. While FIONREAD is documented to return a non-negative byte count on success, the unwrap will panic the whole build script if the OS/ioctl implementation ever returns a negative value without the ioctl call itself returning a nonzero error status (the function only checks the ioctl return code, not the written value).","fix":"Use a checked conversion that returns an Error instead of unwrap, e.g. `bytes_available.try_into().map_err(|_| Error::new(ErrorKind::IOError, \"negative           self.cmd(&name)","lines":11,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/lib.rs#L3491-L3501"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The generated LLVM_TARGETS table maps the rustc target name \"x86_64-unknown-motor\" to \"x86_64-unknown-none-elf\", but the actual rustc target (and the one exercised by the test suite in parser.rs at line 507) is \"x86_64-unknown-moturus\". Because llvm_target() does a binary search on the exact rustc_target string, the real \"x86_64-unknown-moturus\" target will never hit this table entry and instead always falls through to the generic triple-construction logic, making the table entry dead/unreachable for the real-world target name.","fix":"Regenerate generated.rs via dev-tools/gen-target-info (or manually fix the entry) so the key is \"x86_64-unknown-moturus\" to match the actual rustc target triple, keeping the table's sort order intact for binary_search_by_key.","locations":[{"ref":"src/target/generated.rs:319","code":"  319 |     (\"x86_64-unknown-motor\", \"x86_64-unknown-none-elf\"),","lines":1,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/target/generated.rs#L319"},{"ref":"src/target/parser.rs:507","code":"  507 |             \"x86_64-unknown-moturus\",","lines":1,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/target/parser.rs#L507"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `is_duplicate_opt_arg`, the duplicate-optimization check `a.to_str().unwrap_or(\"\").chars().nth(1) == Some('O')` inspects the second character of each existing argument without first verifying the existing argument actually starts with the expected prefix ('-' or '/'). An unrelated two-character argument whose second character happens to be 'O' (e.g. a path or flag ://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/parallel/command_runner.rs#L116-L138"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"get_target_specs_from_json, get_targets_msrv, and get_target_spec_from_msrv all panic via cmd.output().unwrap() if rustc/cargo cannot even be spawned (e.g. missing +nightly or +1.63 toolchain), giving a raw 'No such file or directory (os error 2)' or toolchain-not-installed error with no context about which subprocess failed or how to fix it, instead of a clearer message.","fix":"Replace .unwrap() on cmd.output() with .unwrap_or_else(|e| panic!(\"failed to spawn {:?}: {}\", cmd, e)) to surface which rustc invocation failed and why (e.g. missing +1.63/+nightly toolchain).","locations":[{"ref":"dev-tools/gen-target-info/src/read.rs:11","code":"   11 |     let process::Output { status, stdout, .. } = cmd.output().unwrap();","lines":1,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/dev-tools/gen-target-info/src/read.rs#L11"},{"ref":"dev-tools/gen-target-info/src/read.rs:34","code":"   34 |     let process::Output { status, stdout, .. } = cmd.output().unwrap();","lines":1,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/dev-tools/gen-target-info/src/read.rs#L34"},{"ref":"dev-tools/gen-target-info/src/read.rs:54","code":"   54 |     let process::Output { status, stdout, .. } = cmd.output().unwrap();","lines":1,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/dev-tools/gen-target-info/src/read.rs#L54"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Throughout setup_config.rs and com.rs, COM HRESULT failures are propagated as a bare i32 (Err(err)) with no formatting/decoding, and many call sites in find_tools.rs (vs15plus_instances_using_com, SetupConfiguration::new, etc.) immediately discard the error via `.ok()?`, silently falling through to the vswhere-based fallback or to None. This makes it impossible for a caller of find_tool/find to diagnose why MSVC detection failed (e.g. COM not registered vs. a real registration corruption) since all failure modes collapse to the same None result with no diagnostic trail.","fix":"Consider retaining the last HRESULT/error along the fallback chain (e.g. via a Result-returning internal API or logging) so that find_tool failures can be diagnosed; at minimum this is a usability/debuggability gap rather than a correctness bug.","locations":[{"ref":"find-msvc-tools/src/find_tools.rs:673-680","code":"  673 |     fn vs15plus_instances_using_com() -> Option<VsInstances> {\n  674 |         com::initialize().ok()?;\n  675 | \n  676 |         let config = SetupConfiguration::new().ok()?;\n  677 |         let enum_setup_instances = config.enum_all_instances().ok()?;\n  678 | \n  679 |         Some(VsInstances::ComBased(enum_setup_instances))\n  680 |     }","lines":8,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/find-msvc-tools/src/find_tools.rs#L673-L680"},{"ref":"find-msvc-tools/src/setup_config.rs:163-206","code":"  163 | impl SetupConfiguration {\n  164 |     pub fn new() -> Result<SetupConfiguration, i32> {\n  165 |         let mut obj = null_mut();\n  166 |         let err = unsafe {\n  167 |             CoCreateInstance(\n  168 |                 &CLSID_SetupConfiguration,\n  169 |                 null_mut(),\n  170 |                 CLSCTX_ALL,\n  171 |                 &ISetupConfiguration::uuidof(),\n  172 |                 &mut obj,\n  173 |             )\n  174 |         };\n  175 |         if err < 0 {\n  176 |             return Err(err);\n  177 |         }\n  178 |         let obj = unsafe { ComPtr::from_raw(obj as *mut ISetupConfiguration) };\n  179 |         Ok(SetupConfiguration(obj))\n  180 | zeEx succeeded (and wasn't S_FALSE, i.e. someone else already owns initialization) and call CoUninitialize on the same thread once the COM-based lookups are done, or use a thread-local RAII guard that calls CoUninitialize on drop only when this call was the one that performed the initialization.","locations":[{"ref":"find-msvc-tools/src/com.rs:24-32","code":"   24 | pub fn initialize() -> Result<(), HRESULT> {\n   25 |     let err = unsafe { CoInitializeEx(null(), COINIT_MULTITHREADED.try_into().unwrap()) };\n   26 |     if err != S_OK && err != S_FALSE {\n   27 |         // S_FALSE just means COM is already initialized\n   28 |         Err(err)\n   29 |     } else {\n   30 |         Ok(())\n   31 |     }\n   32 | }","lines":9,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/find-msvc-tools/src/com.rs#L24-L32"},{"ref":"find-msvc-tools/src/find_tools.rs:673-680","code":"  673 |     fn vs15plus_instances_using_com() -> Option<VsInstances> {\n  674 |         com::initialize().ok()?;\n  675 | \n  676 |         let config = SetupConfiguration::new().ok()?;\n  677 |         let enum_setup_instances = config.enum_all_instances().ok()?;\n  678 | \n  679 |         Some(VsInstances::ComBased(enum_setup_instances))\n  680 |     }","lines":8,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/find-msvc-tools/src/find_tools.rs#L673-L680"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`Tool::cflags_env` builds the CFLAGS string by pushing every arg in `self.args` joined with spaces, but does not filter out `self.removed_args` the way `to_command` does (`cmd.args(self.args.iter().filter(|a| !self.removed_args.contains(a)))`). This means flags explicitly marked for removal via `remove_arg` still leak into the `CFLAGS` value returned to configure scripts, inconsistent with what is actually passed to the compiler via `to_command`.","fix":"Filter `s alls `file.to_string_lossy()` for both `basename` and `dirname` and then conditionally allocates a `Cow::Owned` for `dirname` via `strip_prefix`, inside a per-file loop. For projects with many source files this performs repeated lossy UTF-8 conversions and string allocations (plus a `format!` and a `DefaultHasher`) per file when a simpler path-based join could avoid some of the intermediate String work, though the impact is minor relative to actual compilation cost.","fix":"Low priority; if optimizing, compute the CARGO_MANIFEST_DIR-relative stripping once outside the loop where possible, and avoid re-deriving `to_string_lossy` results that are only used for hashing by hashing the raw OsStr bytes directly (already partially done via `hasher.write(dirname.as_bytes())`).","locations":[{"ref":"src/command_helpers.rs:283-341","code":"  283 | pub(crate) fn objects_from_files(files: &[Arc<Path>], dst: &Path) -> Result<Vec<Object>, Error> {\n  284 |     let mut objects = Vec::with_capacity(files.len());\n  285 |     for file in files {\n  286 |         let basename = file\n  287 |             .file_name()\n  288 |             .ok_or_else(|| {\n  289 |                 Error::new(\n  290 |                     ErrorKind::InvalidArgument,\n  291 |                     \"No file_name for object file path!\",\n  292 |                 )\n  293 |             })?\n  294 |             .to_string_lossy();\n  295 |         let dirname = file\n  296 |             .parent()\n  297 |             .ok_or_else(|| {\n  298 |                 Error::new(\n  299 |                     ErrorKind::InvalidArgument,\n  300 |                     \"No parent for object file path!\",\n  301 |                 )\n  302 |             })?\n  303 |             .to_string_lossy();\n  304 | \n  305 |         // Hash the dirname. This should prevent conflicts if we have multiple\n  306 |         // object files with the same filename in different subfolders.\n  307 |         let mut hasher = hash_map::DefaultHasher::new();\n  308 | \n  309 |         // Make the dirname relative (if possible) to avoid full system paths influencing the sha\n  310 |         // and making the output system-dependent\n  311 |         let dirname = if let Some(root) = cargo_env_var_os(\"CARGO_MANIFEST_DIR\") {\n  312 |             let root = root.to_string_lossy();\n  313 |             Cow::Borrowed(dirname.strip_prefix(&*root).unwrap_or(&dirname))\n  314 |         } else {\n  315 |             dirname\n  316 |         };\n  317 | \n  318 |         hasher.write(dirname.as_bytes());\n  319 |         if let Some(extension) = file.extension() {\n  320 |             hasher.write(extension.to_string_lossy().as_bytes());\n  321 |         }\n  322 | \n  323 |         let obj = dst\n  324 |             .join(format!(\"{:016x}-{}\", hasher.finish(), basename))\n  325 |             .with_extension(\"o\");\n  326 | \n  327 |         match obj.parent() {\n  328 |             Some(s) => fs::create_dir_all(s)?,\n  329 |             None => {\n  330 |                 return Err(Error::new(\n  331 |                     ErrorKind::InvalidArgument,\n  332 |                     \"dst is an invalid path with no parent\",\n  333 |                 ));\n  334 |             }\n  335 |         };\n  336 | \n  337 |         objects.push(Object::new(file.to_path_buf(), obj));\n  338 |     }\n  339 | \n  340 |     Ok(objects)\n  341 | }","lines":59,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/command_helpers.rs#L283-L341"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"RUSTC_BOOTSTRAP=1 plus -Zunstable-options is set for the MSRV (1.63) rustc invocation in get_target_spec_from_msrv, but the same -Zunstable-options flag is used without RUSTC_BOOTSTRAP in get_target_specs_from_json (nightly invocation), relying on nightly rustc allowing -Z flags without the bootstrap override. This asymmetry is correct as writte ob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/tempfile.rs#L44-L58"}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"main.rs silently keeps whichever entry already exists when merging MSRV-derived target specs into the nightly-derived map (target_specs.0.entry(...).or_insert_with(...)), so if a target exists in both nightly and the 1.63 MSRV target list, only the nightly version is ever used and the MSRV codepath for that target is never exercised or validated, even though the comment implies MSRV data is specifically for 'old, removed targets'. Currently harmless since nightly's target list is a superset, but the code provides no safeguard if that assumption stops holding (e.g. a target temporarily missing from a nightly snapshot would silently fall back to MSRV data without any log/warning).","fix":"Optionally log when a target is filled in from MSRV vs nightly, so regressions in nightly's target-spec-json output are visible in the generation output/PR diff context rather than silent.","locations":[{"ref":"dev-tools/gen-target-info/src/main.rs:36-45","code":"   36 |     {\n   37 |         for target_name in get_targets_msrv().lines() {\n   38 |             let target_name = target_name.unwrap();\n   39 |             let target_name = target_name.trim();\n   40 |             target_specs\n   41 |                 .0\n   42 |                 .entry(target_name.to_string())\n   43 |                 .or_insert_with(|| get_target_spec_from_msrv(target_name));\n   44 |         }\n   45 |     }","lines":10,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/dev-tools/gen-target-info/src/main.rs#L36-L45"}]},{"id":"ARCH_2","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`prefix_for_target` (used by `get_base_archiver_variant` to derive the archiver/ranlib prefix for cross compilation) has no match arms for the 'kmc' vendor targ n  231 |         pub(super) fn new() -> Self {\n  232 |             // Use `NUM_JOBS` if set (it's configured by Cargo) and otherwise\n  233 |             // just fall back to the number of cores on the local machine, or a reasonable\n  234 |             // default if that cannot be determined.\n  235 | \n  236 |             let parallelism = cargo_env_var_os(\"NUM_JOBS\")\n  237 |                 .and_then(|j| j.to_str()?.parse::<u32>().ok())\n  238 |                 .or_else(|| Some(std::thread::available_parallelism().ok()?.get() as u32))\n  239 |                 .unwrap_or(4);\n  240 | \n  241 |             Self(AtomicU32::new(parallelism))\n  242 |         }\n  243 | \n  244 |         pub(super) async fn acquire(&self) -> JobToken {\n  245 |             loop {\n  246 |                 let res = self\n  247 |                     .0\n  248 |                     .fetch_update(AcqRel, Acquire, |tokens| tokens.checked_sub(1));\n  249 | \n  250 |                 if res.is_ok() {\n  251 |                     break JobToken::new();\n  252 |                 }\n  253 | \n  254 |                 YieldOnce::default().await\n  255 |             }\n  256 |         }","lines":27,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/parallel/job_token.rs#L230-L256"}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","easy":false,"description":"If `try_wait_on_child` (invoked inside the `cell_update` closure on `pendings`) ever panics, `cell_update`'s `cell.take()` has already replaced the Cell's contents with the Default `Vec::new()`, and because the closure panics before `cell.set(new)` runs, the Cell is left holding the default empty Vec permanently. All in-flight child processes and their JobTokens referenced by the previous Vec are leaked (their Drop impls never run since the Vec holding them was moved into the panicking closure and then unwound), so jobserver tokens for those children are never released for the remainder of the process unless the whole build script aborts anyway.","fix":"Wrap the body of try_wait_on_child / retain_mut in catch_unwind, or avoid the take/set Cell pattern in favor of a RefCell<Vec<..>> so panics don't leave the Cell holding a fresh empty default that discards the in-flight children without dropping them properly (drop still occurs on unwind via the moved Vec being dropped during stack unwinding, but verify this is intended given the take/set window).","locations":[{"ref":"src/parallel/command_runner.rs:25-33","code":"   25 | fn cell_update<T, F>(cell: &Cell<T>, f: F)\n   26 | where\n   27 |     T: Default,\n   28 |     F: FnOnce(T) -> T,\n   29 | {\n   30 |     let old = cell.take();\n   31 |     let new = f(old);\n   32 |     cell.set(new);\n   33 | }","lines":9,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/parallel/command_runner.rs#L25-L33"},{"ref":"src/parallel/command_runner.rs:114-141","code":"  114 |             cell_update(&pendings, |mut pendings| {\n  115 |                 // Try waiting on them.\n  116 |                 pendings.retain_mut(|(cmd, child, _token)| {\n  117 |                     match try_wait_on_child(cmd, &mut child.0, &mut stdout, &mut child.1) {\n  118 |                         Ok(Some(())) => {\n  119 |                             // Task done, remove the entry\n  120 |                             has_made_progress.set(true);\n  121 |                             false\n  122 |                         }\n  123 |                         Ok(None) => true, // Task still not finished, keep the entry\n  124 |                         Err(err) => {\n  125 |                             // Task fail, remove the entry.\n  126 |                             // Since we can only return one error, log the error to make\n  127 |                             // sure users always see all the compilation failures.\n  128 |                             has_made_progress.set(true);\n  129 | \n  130 |                             if cargo_output.warnings {\n  131 |                                 let _ = writeln!(stdout, \"cargo:warning={}\", err);\n  132 |                             }\n  133 |                             error = Some(err);\n  134 | \n  135 |                             false\n  136 |                         }\n  137 |                     }\n  138 |                 });\n  139 |                 pendings_is_empty = pendings.is_empty();\n  140 |                 pendings\n  141 |             });","lines":28,"link":"https://github.com/rust-lang/cc-rs/blob/640c66a8b8a225146a16068bad637d5e3417ffbf/src/parallel/command_runner.rs#L114-L141"}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","easy":false,"description":"JobToken::drop() releases a token by calling the process-global JobTokenServer::new() rather than referencing the specific server instance/variant that issued the token. This works correctly today only because JobTokenServer::new() is a OnceLock singleton so the Inherited/InProcess choice is fixed for the process lifetime, but the coupling is implicit: nothing in the type system prevents a future refactor (e.g. supporting multiple jobservers, or tests constructing JobServer directly) from creating a JobToken whose drop releases into the wrong server.","fix":"Consider having JobToken carry a reference/tag to the server it was acquired from (even just an enum discriminant) so release_token_raw is called on the originating server rather than re-resolving the global singleton, making the invariant explicit rather than implicit.","locations":[{"ref":"src/parallel/job_token.rs:13-20","code":"   13 | impl Drop for JobToken {\n   14 |     fn drop(&mut self) {\n   15 |         match JobTokenServer::new() {\n   16 |             JobTokenServer::Inherited(jobserver) => jobserver.release_token_raw(),\n   17 |             JobTokenServer::InProcess(jobserver) => jobserver.release_token_raw(),\n   18 |         }\n   19 |     } (function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.

// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.

const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;

  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);

    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
