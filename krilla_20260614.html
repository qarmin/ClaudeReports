<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In `util.rs`, `PathExt::to_krilla` calls `pb.finish().unwrap()` unconditionally. `PathBuilder::finish` returns `None` when the builder is empty, has only a single `MoveTo` verb, or all points are identical (causing `Rect::from_points` to return `None`). Although usvg typically produces valid paths, a degenerate path (e.g. a collapsed shape with coincident points) could trigger this panic at runtime.","fix":"Return an `Option<Path>` from `to_krilla` and propagate `None` up to `draw_path`, or use `unwrap_or_else` with a documented safe default (a zero-length line segment at the origin) as is already done in the clip-path fallback.","locations":[{"ref":"crates/krilla-svg/src/util.rs:263","code":"  263 |         pb.finish().unwrap()","lines":1}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"Index out of bounds on empty stop list. `ShadingFunction::serialize` unconditionally indexes `stops[0]` on both `RadialAxialGradient` and `PostScriptGradient` to determine the color space (lines 240 and 255). If a caller constructs a gradient with zero stops, this panics at runtime. The `debug_assert!(stops.len() > 1)` guards inside the lower-level helpers are not `assert!`, so in release builds nothing prevents reaching the index.","fix":"Add an early return or a hard assert at the top of `ShadingFunction::serialize` that rejects empty stop lists with a meaningful error rather than panicking on the index.","locations":[{"ref":"crates/krilla/src/graphics/shading_function.rs:240-255","code":"  240 |                     shading_color_space(sc, rag.stops[0].color.clone(), self.0.use_opacities);\n  241 |                 let registered_cs = sc.register_colorspace(chunk_container, shading_cs);\n  242 |                 let chunk = &mut chunk_container.non_stream.shading_functions;\n  243 |                 serialize_axial_radial_shading(\n  244 |                     sc,\n  245 |                     chunk,\n  246 |                     root_ref,\n  247 |                     rag,\n  248 |                     self.0.use_opacities,\n  249 |                     registered_cs,\n  250 |                 )\n  251 |             }\n  252 |             GradientProperties::PostScriptGradient(psg) => {\n  253 |                 sc.register_validation_error(ValidationError::ContainsPostScript(sc.location));\n  254 |                 let shading_cs =\n  255 |                     shading_color_space(sc, psg.stops[0].color.clone(), self.0.use_opacities);","lines":16}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `codegen/src/main.rs`, `write_setter_comment` (lines 582-591) does `let first = line.chars().next().unwrap()` where `line = comment.trim_start()`. If a TOML doc comment contains only whitespace (e.g. `# ` with just a trailing space), `trim_start()` yields `\"\"` and `.next()` returns `None`, causing a panic. Such comments are syntactically valid TOML.","fix":"Guard with `if let Some(first) = line.chars().next() { ... }` and skip writing the setter comment if the comment text is empty after trimming.","locations":[{"ref":"codegen/src/main.rs:582-591","code":"  582 | fn write_setter_comment(f: &mut impl std::fmt::Write, comments: &[&str]) {\n  583 |     if let Some(comment) = comments.first() {\n  584 |         let line = comment.trim_start();\n  585 |         let first = line.chars().next().unwrap();\n  586 |         let remainder = &line[first.len_utf8()..];\n  587 |         writeln!(f, \"    /// Set {}{remainder}\", first.to_lowercase()).ok();\n  588 |     }\n  589 |     for comment in comments.iter().skip(1) {\n  590 |         writeln!(f, \"    ///{comment}\").ok();\n  591 |     }","lines":10}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `codegen/src/main.rs`, `comment_lines` calls `repr.kind.comments().unwrap()` (line 756). The `comments()` method on `MapTableEntryReprKind` returns `None` for `InlineTableAssignment` entries. If any TOML entry in `generate.toml` uses inline-table assignment syntax, this unwrap panics and crashes the code generator with no user-friendly error.","fix":"Replace `.unwrap()` with `.unwrap_or_else(|| report_error(\"inline table assignments are not supported here\", repr.repr_span()))` so that the error is reported in the same style as other codegen errors.","locations":[{"ref":"codegen/src/main.rs:756","code":"  756 |     let comments = repr.kind.comments().unwrap();","lines":1}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `clip_path.rs`, the fallback path builder at lines 87-91 constructs a path with `move_to(0.0, 0.0)` then `line_to(0.0, 0.0)` (two identical points at the origin) and calls `builder.finish().unwrap()`. `PathBuilder::finish` calls `Rect::from_points`, which calls `Rect::from_ltrb(0, 0, 0, 0)`. While `from_ltrb` allows equal left/right and top/bottom (zero-area rect is accepted), this is fragile and relies on an undocumented implementation detail of tiny-skia. If the tiny-skia invariant ever tightens to require strictly positive dimensions, this unwrap will panic.","fix":"Use a non-degenerate fallback, e.g. `line_to(0.0, 1.0)`, so the path always has a valid bounding box. Alternatively, check `finish()` and handle `None` gracefully instead of unwrapping.","locations":[{"ref":"crates/krilla-svg/src/clip_path.rs:86-92","code":"   86 |         path_builder.finish().unwrap_or_else(|| {\n   87 |             let mut builder = PathBuilder::new();\n   88 |             builder.move_to(0.0, 0.0);\n   89 |             builder.line_to(0.0, 0.0);\n   90 |             builder.finish().unwrap()\n   91 |         }),\n   92 |         convert_fill_rule(&clip_rule),","lines":7}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`GraphicsStates::restore_state` (line 232) calls `self.graphics_states.pop()` without checking whether the stack is empty. If `restore_state` is called more times than `save_state`, the stack empties and the subsequent `cur()` / `cur_mut()` calls on line 220 / 224 panic via `unwrap()` on an empty slice. There is no API-level protection against mismatched save/restore pairs.","fix":"Either add a `debug_assert!(!self.graphics_states.is_empty())` (plus a comment explaining the invariant is maintained by the content builder), or guard with an `if` and log/panic with a descriptive message.","locations":[{"ref":"crates/krilla/src/graphics/graphics_state.rs:232-234","code":"  232 |     pub(crate) fn restore_state(&mut self) {\n  233 |         self.graphics_states.pop();\n  234 |     }","lines":3},{"ref":"crates/krilla/src/graphics/graphics_state.rs:219-225","code":"  219 |     pub(crate) fn cur(&self) -> &GraphicsState {\n  220 |         self.graphics_states.last().unwrap()\n  221 |     }\n  222 | \n  223 |     pub(crate) fn cur_mut(&mut self) -> &mut GraphicsState {\n  224 |         self.graphics_states.last_mut().unwrap()\n  225 |     }","lines":7}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `TagGroup::serialize`, when a `LayoutAttr::BBox` contains a `page_idx` that is out of range, the code panics with a message about the page count. This condition is a user error (providing an invalid page index in a tag bounding box) and should return a `KrillaError` instead of panicking, consistent with the error handling used elsewhere in the serialization pipeline.","fix":"Return `Err(KrillaError::...)` with an appropriate error variant instead of calling `panic!`. Add a new `KrillaError` variant if needed (e.g., `InvalidTagBBoxPageIndex`).","locations":[{"ref":"crates/krilla/src/interchange/tagging/mod.rs:941-948","code":"  941 |                 &LayoutAttr::BBox(BBox { page_idx, rect }) => {\n  942 |                     let Some(page_info) = sc.page_infos().get(page_idx) else {\n  943 |                         panic!(\n  944 |                             \"tag tree contains bounding box with page index {page_idx}, \\\n  945 |                             but document only has {} pages\",\n  946 |                             sc.page_infos().len()\n  947 |                         );\n  948 |                     };","lines":8}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In `serialize_children` (tagging), there are multiple panics triggered by user errors: (1) a page-index-out-of-bounds on a PageTagIdentifier, (2) a duplicate PageTagIdentifier in the tag tree, (3) a page-index-out-of-bounds on an AnnotationIdentifier, and (4) an annotation-index-out-of-bounds. All of these represent mis-uses of the tagging API that are detectable at serialization time. They should result in returned `KrillaResult` errors rather than aborting the process.","fix":"Propagate these conditions as `Err(KrillaError::...)` variants. The function already returns `KrillaResult<()>`, so only the error variants and the call chain need updating.","locations":[{"ref":"crates/krilla/src/interchange/tagging/mod.rs:1247-1250","code":" 1247 |                             .unwrap_or_else(|| panic!(\"tag tree contains identifier from page {}, but document only has {} pages\",\n 1248 |                                 pi.page_index + 1,\n 1249 |                                 sc.page_infos().len()))\n 1250 |                             .ref_();","lines":4},{"ref":"crates/krilla/src/interchange/tagging/mod.rs:1257","code":" 1257 |                         panic!(\"the identifier {pi:?} appears twice in the tag tree\");","lines":1},{"ref":"crates/krilla/src/interchange/tagging/mod.rs:1273-1278","code":" 1273 |                         panic!(\n 1274 |                             \"tag tree contains identifier from page {}, but document only has {} pages\",\n 1275 |                             ai.page_index + 1,\n 1276 |                             sc.page_infos().len()\n 1277 |                         );\n 1278 |                     };","lines":6},{"ref":"crates/krilla/src/interchange/tagging/mod.rs:1284-1290","code":" 1284 |                         panic!(\n 1285 |                             \"tag tree contains identifier from annotation {} on page {}, but page only has {} annotations\",\n 1286 |                             ai.annot_index + 1,\n 1287 |                             ai.page_index + 1,\n 1288 |                             page_info.annotations().len()\n 1289 |                         );\n 1290 |                     };","lines":7},{"ref":"crates/krilla/src/interchange/tagging/mod.rs:1293","code":" 1293 |                         panic!(\"identifier {ai:?} appears twice in the tag tree\");","lines":1}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `serialize_tag_tree`, when a `PageTagIdentifier` is not found in `parent_tree_map`, the code calls `unwrap_or_else(|| panic!(...))`. This is an internal invariant violation, but it surfaces as an unrecoverable process abort rather than a returned `KrillaError`. Callers have no way to handle this gracefully, and the panic message is the only diagnostic.","fix":"Return a `KrillaError` (e.g. a new `KrillaError::Internal` variant, or by reusing an existing one) instead of panicking. Alternatively, use `debug_assert!` for the invariant and return an error in release builds.","locations":[{"ref":"crates/krilla/src/serialize.rs:886-889","code":"  886 |                                 refs.item(parent_tree_map.get(&rci.into()).unwrap_or_else(|| {\n  887 |                                     panic!(\n  888 |                                         \"page tag identifier {rci:?} doesn't appear in the tag tree\"\n  889 |                                     )","lines":4}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `serialize_tag_tree`, when an `AnnotationIdentifier` is not found via `OnceCell::get()`, the code panics with `unwrap_or_else(|| panic!(...))`. Same issue as the PageTagIdentifier panic: this is an internal consistency check that should be a returned error, not a process-terminating panic.","fix":"Convert to a returned `KrillaError` instead of panicking, matching the error-handling style of the rest of the serialization code.","locations":[{"ref":"crates/krilla/src/serialize.rs:906-907","code":"  906 |                                 *page_annotations[ai.annot_index].1.get().unwrap_or_else(|| {\n  907 |                                     panic!(\"annotation identifier {ai:?} doesn't appear in the tag tree\")","lines":2}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In CIDFont::add_glyph(), u16::try_from(glyph_id.to_u32()).unwrap() on line 161 will panic for any glyph ID above 65535. GlyphId stores a u32 which can hold values beyond u16::MAX. While the OpenType spec limits GIDs to u16, a malformed font could contain CID values that exceed this limit, causing a panic during serialization.","fix":"Return an error or skip the glyph instead: if let Ok(id16) = u16::try_from(glyph_id.to_u32()) { self.glyph_remapper.remap(id16) } else { return 0; /* fallback to .notdef */ }","locations":[{"ref":"crates/krilla/src/text/cid.rs:161","code":"  161 |             .remap(u16::try_from(glyph_id.to_u32()).unwrap());","lines":1}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In FontInfo::new(), metrics.cap_height.map(|n| FiniteF32::new(n).unwrap()) on line 277 will panic if a font reports a cap_height value that is NaN or infinite. FiniteF32::new() returns None for non-finite values. Similarly, FiniteF32::new(metrics.italic_angle).unwrap() on line 278 can panic for NaN/infinite italic_angle values. While uncommon, malformed fonts or unusual system fonts could trigger this.","fix":"For cap_height, use: metrics.cap_height.and_then(FiniteF32::new) (dropping None caps are already handled). For italic_angle, use FiniteF32::new(metrics.italic_angle).unwrap_or_default() or propagate None via ?.","locations":[{"ref":"crates/krilla/src/text/font.rs:277-278","code":"  277 |         let cap_height = metrics.cap_height.map(|n| FiniteF32::new(n).unwrap());\n  278 |         let italic_angle = FiniteF32::new(metrics.italic_angle).unwrap();","lines":2}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In FontInfo::new(), var_coords iteration on line 319 uses FiniteF32::new(v.1).unwrap_or_default(). If a user passes a NaN or infinite variation coordinate value, it is silently replaced with 0.0 (default). The original user-supplied coordinate is lost without any error or warning, which can result in rendering the font at a different position in the variation space than intended.","fix":"Return None from FontInfo::new() if any variation coordinate is non-finite, propagating the failure to Font::new_variable() which already returns Option.","locations":[{"ref":"crates/krilla/src/text/font.rs:317-320","code":"  317 |             var_coords: var_coords\n  318 |                 .iter()\n  319 |                 .map(|v| (v.0, FiniteF32::new(v.1).unwrap_or_default()))\n  320 |                 .collect(),","lines":4}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In shape.rs::naive_shape(), rustybuzz::Face::from_slice(...).unwrap() on line 9 will panic if the font data is not parseable by rustybuzz. While Font construction validates the font via skrifa, rustybuzz uses a different parser (ttf-parser) that may reject fonts accepted by skrifa, or the font could contain a glyf/CFF table that skrifa accepts but rustybuzz does not.","fix":"Return an empty Vec or a Result instead of panicking: let Some(rb_font) = rustybuzz::Face::from_slice(data.as_ref(), font.index()) else { return vec![] };","locations":[{"ref":"crates/krilla/src/text/shape.rs:9","code":"    9 |     let mut rb_font = rustybuzz::Face::from_slice(data.as_ref(), font.index()).unwrap();","lines":1}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In `image.rs`, `render` calls `Size::from_wh(image.size().width(), image.size().height()).unwrap()` on line 22 inside a function that returns `Option<()>`. If usvg ever supplies an image with zero or non-finite dimensions (e.g. from a malformed embedded image), this unwrap panics instead of returning `None`.","fix":"Replace `.unwrap()` with `?` to propagate `None` through the `Option<()>` return type, matching the error handling pattern used elsewhere in the function.","locations":[{"ref":"crates/krilla-svg/src/image.rs:22","code":"   22 |     let size = Size::from_wh(image.size().width(), image.size().height()).unwrap();","lines":1}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In `lib.rs`, `render_svg_glyph` calls `usvg::Size::from_wh(default_size.0, default_size.1).unwrap()` on line 130. `Size::from_wh` returns `None` when either dimension is zero, negative, or non-finite. The `default_size` parameter comes from the caller (font metrics), and while it should always be positive, malformed font data could supply a zero or negative value, causing a panic.","fix":"Replace `.unwrap()` with `?` (returning `None` to the caller) to match the function's `-> Option<()>` return type and handle malformed input gracefully.","locations":[{"ref":"crates/krilla-svg/src/lib.rs:130","code":"  130 |     let default_size = usvg::Size::from_wh(default_size.0, default_size.1).unwrap();","lines":1}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`Image::from_custom` uses `assert_eq!` macros inside a `Deferred::new` closure (lines 299 and 303) to validate that the color channel and alpha channel lengths match the expected sizes. These panics occur lazily during serialization (not at construction time), which makes them hard to diagnose. The public doc comment says 'Panics if the dimensions of the image and the length of the data doesn't match' but the actual panic is deferred.","fix":"Perform the dimension checks eagerly in `from_custom` before constructing the `Deferred`, returning a `Result<Image, String>` error instead of a deferred panic, consistent with how other constructors handle errors.","locations":[{"ref":"crates/krilla/src/graphics/image.rs:279-316","code":"  279 |     pub fn from_custom<T: CustomImage>(image: T, interpolate: bool) -> Result<Image, String> {\n  280 |         let hash = (image.clone(), interpolate).sip_hash();\n  281 |         let metadata = ImageMetadata {\n  282 |             size: image.size(),\n  283 |             color_space: image.color_space(),\n  284 |             has_alpha: image.alpha_channel().is_some(),\n  285 |             bits_per_component: image.bits_per_component(),\n  286 |             icc: image\n  287 |                 .icc_profile()\n  288 |                 .and_then(|d| get_icc_profile_type(d, image.color_space())),\n  289 |         };\n  290 | \n  291 |         Ok(Self(Arc::new(ImageRepr {\n  292 |             inner: Deferred::new(move || {\n  293 |                 let bytes_per_component = (image.bits_per_component().as_u8() / 8) as u32;\n  294 |                 let color_channel_len = bytes_per_component\n  295 |                     * image.color_space().num_components() as u32\n  296 |                     * metadata.size.0\n  297 |                     * metadata.size.1;\n  298 |                 let color_channel = image.color_channel();\n  299 |                 assert_eq!(color_channel.len(), color_channel_len as usize);\n  300 | \n  301 |                 let alpha_channel_len = bytes_per_component * metadata.size.0 * metadata.size.1;\n  302 |                 let alpha_channel = image.alpha_channel();\n  303 |                 if let Some(alpha_channel) = alpha_channel {\n  304 |                     assert_eq!(alpha_channel.len(), alpha_channel_len as usize);\n  305 |                 }\n  306 | \n  307 |                 Ok(Repr::Sampled(SampledRepr {\n  308 |                     color_channel: deflate_encode(color_channel),\n  309 |                     alpha_channel: image.alpha_channel().map(deflate_encode),\n  310 |                     bits_per_component: image.bits_per_component(),\n  311 |                 }))\n  312 |             }),\n  313 |             metadata,\n  314 |             sip: hash,\n  315 |             interpolate,\n  316 |         })))","lines":38}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`select_postscript_function` contains a `todo!()` branch (line 411) that is dead under the current `GradientType` enum (which only has `Linear` and `Sweep`). However, if `GradientType` is extended in the future without updating this match, the code will panic at runtime in release builds. The `if/else if/else` structure also does not benefit from exhaustiveness checking.","fix":"Replace the `if/else if/else` chain with a `match` on `GradientType` so the compiler enforces exhaustiveness. Remove the `todo!()` or convert it to `unreachable!()`.","locations":[{"ref":"crates/krilla/src/graphics/shading_function.rs:406-412","code":"  406 |     if properties.gradient_type == GradientType::Linear {\n  407 |         serialize_linear_postscript(properties, chunk, sc, use_opacities)\n  408 |     } else if properties.gradient_type == GradientType::Sweep {\n  409 |         serialize_sweep_postscript(properties, chunk, sc, bump, use_opacities)\n  410 |     } else {\n  411 |         todo!();\n  412 |     }","lines":7}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`LinkAnnotation::new_with_quad_points` panics via `assert!` if the caller provides an empty `quad_points` vector. Since this is a public API, it should return a `Result` or an `Option` rather than panicking, to allow callers to handle the error gracefully.","fix":"Change the function signature to return `Option<Self>` (returning `None` on empty input) or `Result<Self, ...>`, and remove the `assert!`.","locations":[{"ref":"crates/krilla/src/interactive/annotation.rs:187","code":"  187 |         assert!(!quad_points.is_empty());","lines":1}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`register_page_struct_parent` and `register_annotation_parent` call `i32::try_from(id).unwrap()` where `id` is the current length of `struct_parents` (a `usize`). If more than `i32::MAX` (~2.1 billion) tagged content items and annotations are registered, this panics. While practically unreachable for normal documents, there is no graceful error path.","fix":"Use `i32::try_from(id).ok()` and return `None` (or a `KrillaError`) instead of unwrapping. Add a comment explaining the practical limit.","locations":[{"ref":"crates/krilla/src/serialize.rs:527","code":"  527 |             Some(i32::try_from(id).unwrap())","lines":1},{"ref":"crates/krilla/src/serialize.rs:541","code":"  541 |             Some(i32::try_from(id).unwrap())","lines":1}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In `StreamFilter::apply` (stream.rs line 177), `StreamFilter::Dct` panics with `panic!(\"can't apply dct decode\")`. The comment acknowledges this should never be called. If a future refactor causes `apply` to be invoked on a `Dct` filter instance, this produces an unrecoverable panic with a misleading message (it says 'decode' instead of 'encode'). The message also contradicts what the function does (it encodes, not decodes).","fix":"Change the panic message to `\"DCT filter is pre-encoded; apply() must not be called on it\"`. Consider using `unreachable!()` with a clear comment instead of `panic!`.","locations":[{"ref":"crates/krilla/src/stream.rs:174-178","code":"  174 |             // this is only used for JPEG images which are already encoded,\n  175 |             // so this shouldn't be called at all.\n  176 |             #[cfg(feature = \"raster-images\")]\n  177 |             StreamFilter::Dct => panic!(\"can't apply dct decode\"),\n  178 |         }","lines":5}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`deflate_encode` (stream.rs lines 350-351) calls `e.write_all(data).unwrap()` and `e.finish().unwrap()`. The `ZlibEncoder` backed by a `Vec<u8>` writes to in-memory storage; `write_all` on it can fail only on OOM (which Rust would abort for, not return an error). The `unwrap()` calls are safe in practice but hide the OOM case. In contrast, `finish()` can also theoretically return an IO error that would surface as a panic rather than a returned error.","fix":"Low-priority: consider propagating the error from `deflate_encode` if callers gain a proper error-propagation path, or add a comment explaining why unwrap is safe here.","locations":[{"ref":"crates/krilla/src/stream.rs:345-352","code":"  345 | pub(crate) fn deflate_encode(data: &[u8]) -> Vec<u8> {\n  346 |     use std::io::Write;\n  347 | \n  348 |     const COMPRESSION_LEVEL: u8 = 6;\n  349 |     let mut e = ZlibEncoder::new(Vec::new(), Compression::new(COMPRESSION_LEVEL as u32));\n  350 |     e.write_all(data).unwrap();\n  351 |     e.finish().unwrap()\n  352 | }","lines":8}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In base_font_name() in both cid.rs and type3.rs, the PostScript name is sliced with &postscript_name[..max_len]. If the PostScript name contains multibyte UTF-8 characters and max_len falls in the middle of one, this will panic with 'byte index is not a char boundary'. PostScript names are technically ASCII-only per spec, but malformed fonts may violate this.","fix":"Use a char-boundary-safe truncation: let trimmed = postscript_name.char_indices().take_while(|(i, _)| *i < max_len).map(|(_, c)| c).collect::<String>(); or use a crate like unicode-truncate.","locations":[{"ref":"crates/krilla/src/text/cid.rs:430","code":"  430 |     let trimmed = &postscript_name[..postscript_name.len().min(max_len)];","lines":1},{"ref":"crates/krilla/src/text/type3.rs:483","code":"  483 |     let trimmed = &postscript_name[..postscript_name.len().min(max_len)];","lines":1}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"negligible","easy":true,"description":"`NaiveRgbColor::new_f32` panics if any color component is outside `[0.0, 1.0]`. While the panic message is clear, this is a public API that would be better served by returning a `Result` or clamping the values, since NaN and out-of-range floats are easy to produce from arithmetic.","fix":"Either clamp the components silently with a note in the doc comment, or return `Option<Self>` / `Result<Self, ...>` so callers can handle invalid input without a panic.","locations":[{"ref":"crates/krilla/src/interchange/tagging/tag.rs:378-384","code":"  378 |     pub fn new_f32(red: f32, green: f32, blue: f32) -> Self {\n  379 |         if !(0.0..=1.0).contains(&red)\n  380 |             || !(0.0..=1.0).contains(&green)\n  381 |             || !(0.0..=1.0).contains(&blue)\n  382 |         {\n  383 |             panic!(\"RGB color components must be in the range [0.0, 1.0]\");\n  384 |         }","lines":7}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In `PageLabelContainer::serialize` (page.rs line 588), the expression `label.offset.map(|n| n.get() + 1)` uses plain `u32` arithmetic. If `label.offset` holds `NonZeroU32::MAX` (u32::MAX), then `n.get() + 1` overflows: it panics in debug builds and wraps to 0 in release builds, producing a wrong comparison result and silently misclassifying the page label as non-consecutive.","fix":"Use `n.get().checked_add(1)` (returning `Option<u32>`) and compare against `n_prev.offset.map(|n| n.get())`.","locations":[{"ref":"crates/krilla/src/page.rs:588","code":"  588 |                     || n_prev.offset.map(|n| n.get()) != label.offset.map(|n| n.get() + 1)","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Bug in `TilingPattern::new`: when `base_opacity != ONE`, the code builds a new `stream` inside a block that shadows the parameter, then returns that inner `stream` - but it also stores it into `pattern_stream`. However the field assigned to `Self { stream: pattern_stream, ... }` uses the variable from the outer `let pattern_stream = ...` binding whose `else` branch assigns the _newly built_ stream correctly. This is actually correct at a glance, but the inner `let stream = { ... }; stream` on lines 54-62 shadows the function parameter `stream` and immediately drops it, meaning the original `stream` passed in is silently dropped and the new opacified stream is used. The comment and code are consistent, but the variable shadowing is deeply confusing and error-prone; the original `stream` argument (now inaccessible) is moved into `draw_opacified_stream` inside the block, so the semantics work, but the `base_opacity` field stored in `Self` records the original opacity even though the stream has already been opacified. If the `TilingPattern` is used to generate a second-level opacity wrapping it will be double-applied.","fix":"Store `base_opacity: NormalizedF32::ONE` (or remove the field) after baking opacity into the stream, or document clearly that `base_opacity` is pre-baked so callers never apply it again.","locations":[{"ref":"crates/krilla/src/graphics/tiling_pattern.rs:51-72","code":"   51 |         let pattern_stream = if base_opacity == NormalizedF32::ONE {\n   52 |             stream\n   53 |         } else {\n   54 |             let stream = {\n   55 |                 let mut builder = StreamBuilder::new(serializer_context, chunk_container);\n   56 |                 let mut surface = builder.surface();\n   57 |                 surface.draw_opacified_stream(base_opacity, stream);\n   58 |                 surface.finish();\n   59 |                 builder.finish()\n   60 |             };\n   61 | \n   62 |             stream\n   63 |         };\n   64 | \n   65 |         Self {\n   66 |             stream: pattern_stream,\n   67 |             transform,\n   68 |             base_opacity,\n   69 |             width,\n   70 |             height,\n   71 |         }\n   72 |     }","lines":22}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In `draw_glyphs` (surface.rs), the complex fill+stroke path calls `self.outline_glyphs(...)` (line 306) while both `self.fill` and `self.stroke` are still set. `outline_glyphs` calls `surface.draw_path` which uses the current fill AND stroke. The comment at line 292 says the intent is to stroke the glyphs as a path (after already having filled them as text), but the fill is applied a second time, causing double-fill rendering artifacts in PDFs with complex fill+stroke glyph combinations.","fix":"Temporarily set `self.fill = None` before calling `self.outline_glyphs(...)` and restore it afterward, so only the stroke is applied to the outlined path.","locations":[{"ref":"crates/krilla/src/surface.rs:289-306","code":"  289 |                 (Some(f), Some(s)) => {\n  290 |                     if self.has_complex_fill_or_stroke() {\n  291 |                         // We need to draw fill and stroke separately. In order to avoid embedding\n  292 |                         // text twice, we fill the text as normal text and then stroke it as a path.\n  293 |                         self.bd.get_mut().draw_glyphs(\n  294 |                             start,\n  295 |                             self.sc,\n  296 |                             self.chunk_container,\n  297 |                             Some(f),\n  298 |                             None,\n  299 |                             context_color,\n  300 |                             glyphs,\n  301 |                             font.clone(),\n  302 |                             text,\n  303 |                             font_size,\n  304 |                         );\n  305 | \n  306 |                         self.outline_glyphs(glyphs, context_color, start, font, font_size);","lines":18}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"has_svg_data() always returns true whenever the font has an SVG table, regardless of whether the specific glyph has SVG data. The call chain is: font_ref().svg() returns Result<Svg, ReadError>; .map(|svg_table| svg_table.glyph_data(...).is_ok()) transforms Ok(table) to Ok(bool), leaving Err as Err; .is_ok() then returns true for any Ok, i.e. whenever the table exists. The inner boolean (whether the specific glyph has SVG data) is discarded. This makes should_outline() return false for every glyph in a font that has an SVG table, causing all such glyphs to be routed through Type3 rendering even when they have no SVG data. Additionally, glyph_data() returns Result<Option<_>> so even with a corrected outer check, is_ok() on the inner result would still be true when the option is None (glyph absent from SVG table).","fix":"Replace with: font.font_ref().svg().is_ok_and(|svg_table| matches!(svg_table.glyph_data(glyph.to_skrifa()), Ok(Some(_))))","locations":[{"ref":"crates/krilla/src/text/glyph/svg.rs:8-13","code":"    8 | pub(crate) fn has_svg_data(font: &Font, glyph: GlyphId) -> bool {\n    9 |     font.font_ref()\n   10 |         .svg()\n   11 |         .map(|svg_table| svg_table.glyph_data(glyph.to_skrifa()).is_ok())\n   12 |         .is_ok()\n   13 | }","lines":6}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `util.rs`, `convert_line_join` maps `usvg::LineJoin::MiterClip` to `LineJoin::Miter` (line 111). `MiterClip` is a CSS/SVG join style where the miter is clipped to a specific length rather than falling back to a bevel. Silently treating it as an unclipped miter can produce visually incorrect output (over-extended miter spikes) when the miter limit is exceeded in an SVG that intentionally uses `stroke-linejoin: miter-clip`.","fix":"If krilla does not yet support `MiterClip`, fall back to `LineJoin::Bevel` (the SVG spec's fallback for exceeded miter limits), or add a `MiterClip` variant to `krilla::paint::LineJoin` with proper PDF rendering. Document the fallback with an inline comment.","locations":[{"ref":"crates/krilla-svg/src/util.rs:110-111","code":"  110 |         usvg::LineJoin::Miter => LineJoin::Miter,\n  111 |         usvg::LineJoin::MiterClip => LineJoin::Miter,","lines":2}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `handle_u16_image`, the alpha channel is emitted whenever `alphas` is non-empty (line 800-803), without checking whether all alpha values are fully-opaque (0xFFFF). This is inconsistent with the u8 version (`handle_u8_image`, line 761) which skips emitting the alpha channel when all values are 255. For 16-bit PNG images that are fully opaque, an unnecessary soft-mask XObject will be emitted, causing a spurious transparency validation error and a larger PDF.","fix":"Apply the same `alphas.iter().any(|v| *v != 0xFFFF)` guard in `handle_u16_image` before emitting the encoded mask (treating the 16-bit alpha as two u8 bytes, checking both, or comparing the pair to `[0xFF, 0xFF]`).","locations":[{"ref":"crates/krilla/src/graphics/image.rs:800-804","code":"  800 |     let encoded_mask = if !alphas.is_empty() {\n  801 |         Some(deflate_encode(&alphas))\n  802 |     } else {\n  803 |         None\n  804 |     };","lines":5},{"ref":"crates/krilla/src/graphics/image.rs:761-764","code":"  761 |     let alpha_channel = if !alphas.is_empty() && alphas.iter().any(|v| *v != 255) {\n  762 |         Some(deflate_encode(&alphas))\n  763 |     } else {\n  764 |         None","lines":4}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`PostScriptGradient` implements `Hash` and `Eq` but its hash omits the `cx` and `cy` fields (lines 70-78). These fields are used when `gradient_type == GradientType::Sweep` to shift the sweep gradient center. Two `PostScriptGradient` values that differ only in `cx`/`cy` will have the same hash but will compare unequal via the derived `PartialEq`, violating the `Hash`/`Eq` contract. This can cause silent cache collisions when the struct is used as a HashMap key.","fix":"Add `self.cx.to_bits().hash(state)` and `self.cy.to_bits().hash(state)` to the manual `Hash` implementation.","locations":[{"ref":"crates/krilla/src/graphics/shading_function.rs:67-79","code":"   67 | impl Eq for PostScriptGradient {}\n   68 | \n   69 | impl Hash for PostScriptGradient {\n   70 |     fn hash<H: Hasher>(&self, state: &mut H) {\n   71 |         self.min.to_bits().hash(state);\n   72 |         self.max.to_bits().hash(state);\n   73 |         self.stops.hash(state);\n   74 |         self.domain.hash(state);\n   75 |         self.spread_method.hash(state);\n   76 |         self.gradient_type.hash(state);\n   77 |         self.anti_alias.hash(state);\n   78 |     }\n   79 | }","lines":13}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The sweep-gradient PostScript function hardcodes a `range` of `[0.0, 1.0, 0.0, 1.0, 0.0, 1.0]` (three components, line 503) regardless of the color space of the gradient stops. If a sweep gradient uses CMYK stops (4 components) or luma stops (1 component), the range declaration will be wrong, producing a malformed PDF PostScript function. The linear PostScript path has the same issue (line 569).","fix":"Derive the range dynamically from `use_opacities` and the actual number of color components of the stops (e.g., call `stops[0].color.to_pdf_color().len()` and repeat `[0.0, 1.0]` that many times).","locations":[{"ref":"crates/krilla/src/graphics/shading_function.rs:500-504","code":"  500 |     if use_opacities {\n  501 |         postscript_function.range([0.0, 1.0]);\n  502 |     } else {\n  503 |         postscript_function.range([0.0, 1.0, 0.0, 1.0, 0.0, 1.0]);\n  504 |     }","lines":5},{"ref":"crates/krilla/src/graphics/shading_function.rs:566-570","code":"  566 |     if use_opacities {\n  567 |         postscript_function.range([0.0, 1.0]);\n  568 |     } else {\n  569 |         postscript_function.range([0.0, 1.0, 0.0, 1.0, 0.0, 1.0]);\n  570 |     }","lines":5}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"The `encode_postscript_stops` function always prepends a duplicate of the first stop (with offset 0) and appends a duplicate of the last stop (with offset 1), even if those stops already have those offsets (lines 690-699). This means the padded stop list passed to `encode_stops_impl` always has at least two extra entries whose colors and opacities are copies of the first/last real stops. When the original first stop already has offset 0.0 and the last stop already has offset 1.0, the padded list duplicates them, generating redundant PostScript code for an extra interpolation segment of zero-length at both ends.","fix":"Mirror the logic in `select_axial_radial_function` (lines 352-365) that only inserts a boundary stop when the offset does not already equal 0.0 or 1.0.","locations":[{"ref":"crates/krilla/src/graphics/shading_function.rs:690-699","code":"  690 |     if let Some(first) = stops.first() {\n  691 |         let mut first = first.clone();\n  692 |         first.offset = NormalizedF32::ZERO;\n  693 |         stops.insert(0, first);\n  694 |     }\n  695 | \n  696 |     if let Some(last) = stops.last() {\n  697 |         let mut last = last.clone();\n  698 |         last.offset = NormalizedF32::ONE;\n  699 |         stops.push(last);","lines":10}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `xmp_date()`, when `utc_offset_hour` is `None`, the function returns `Some(Timezone::Utc)` which explicitly encodes the timezone as UTC (appending 'Z' to the XMP date string). However, the doc comment on `DateTime::utc_offset_hour` states 'If not specified, the time will be assumed to be local to the viewer's time zone.' To express 'unspecified/local' timezone in XMP (ISO 8601), the timezone field should be `None`, not `Timezone::Utc`. As written, any date without an explicit timezone is silently converted to UTC in the XMP metadata, contradicting the documented behavior and potentially reporting incorrect timestamps for PDF/A conformance.","fix":"Change the `_ =>` arm in `xmp_date()` to return `None` instead of `Some(Timezone::Utc)` so that an unspecified timezone is left unspecified in the XMP output, matching the documented behavior. Also update or remove the corresponding doc comment on `utc_offset_hour` if the intent really is to default to UTC.","locations":[{"ref":"crates/krilla/src/interchange/metadata.rs:407-413","code":"  407 |     let timezone = match (datetime.utc_offset_hour, datetime.utc_offset_minute) {\n  408 |         (Some(h), m) => Some(Timezone::Local {\n  409 |             hour: h,\n  410 |             minute: m as i8,\n  411 |         }),\n  412 |         _ => Some(Timezone::Utc),\n  413 |     };","lines":7},{"ref":"crates/krilla/src/interchange/metadata.rs:373-374","code":"  373 |     /// Add the offset from UTC in hours. If not specified, the time will be\n  374 |     /// assumed to be local to the viewer's time zone. It will be clamped within","lines":2}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `PageLabelContainer::serialize` (page.rs line 588), the consecutive-offset check is inverted. The intent is to detect that the current label is a continuation of the previous one (cur.offset == prev.offset + 1), so redundant entries can be omitted. The code compares `n_prev.offset.map(|n| n.get()) != label.offset.map(|n| n.get() + 1)`, which checks `prev_offset != cur_offset + 1` (i.e., whether prev is one more than cur - a descending sequence). The correct check is `n_prev.offset.map(|n| n.get() + 1) != label.offset.map(|n| n.get())`. As a result, consecutive ascending page label sequences are never collapsed, and every page emits a redundant label entry in the PDF number tree.","fix":"Change line 588 to: `|| n_prev.offset.map(|n| n.get() + 1) != label.offset.map(|n| n.get())`","locations":[{"ref":"crates/krilla/src/page.rs:584-597","code":"  584 |         for (i, label) in self.labels.iter().enumerate() {\n  585 |             if let Some(n_prev) = &prev {\n  586 |                 if n_prev.style != label.style\n  587 |                     || n_prev.prefix != label.prefix\n  588 |                     || n_prev.offset.map(|n| n.get()) != label.offset.map(|n| n.get() + 1)\n  589 |                 {\n  590 |                     filtered_entries.push((i, label.clone()));\n  591 |                     prev = Some(label.clone());\n  592 |                 }\n  593 |             } else {\n  594 |                 filtered_entries.push((i, label.clone()));\n  595 |                 prev = Some(label.clone());\n  596 |             }\n  597 |         }","lines":14}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"The `hex_encode` function used for the ASCIIHexDecode PDF stream filter is missing the mandatory end-of-data marker `>`. The PDF specification (section 7.4.2) requires the ASCIIHex encoded data stream to end with a `>` character. Without it, conforming PDF readers may fail to decode the stream, producing corrupt output when `ascii_compatible` mode is enabled.","fix":"Append `>` to the output before converting to bytes: add `output.push('>')` before `output.into_bytes()`.","locations":[{"ref":"crates/krilla/src/stream.rs:354-368","code":"  354 | fn hex_encode(data: &[u8]) -> Vec<u8> {\n  355 |     use std::fmt::Write;\n  356 | \n  357 |     const COLUMNS: usize = 35;\n  358 |     let len = data.len();\n  359 |     let capacity = 2 * len + len / COLUMNS;\n  360 |     let mut output = String::with_capacity(capacity);\n  361 |     for (index, byte) in data.iter().enumerate() {\n  362 |         write!(output, \"{byte:02X}\").unwrap();\n  363 |         if index % COLUMNS == COLUMNS - 1 {\n  364 |             output.push('\\n');\n  365 |         }\n  366 |     }\n  367 |     output.into_bytes()\n  368 | }","lines":15}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In Type3Font::serialize(), the ascender and descender for the font descriptor are assigned from the wrong fields of font_bbox. Line 237 sets ascender = font_bbox.bottom() and line 238 sets descender = font_bbox.top(). In tiny-skia's coordinate system (y-down), 'bottom' is the numerically larger y value (below baseline in screen space) and 'top' is the numerically smaller value (above baseline in screen space). For a PDF font descriptor, Ascent should be the positive value above the baseline and Descent the negative value below. So the assignments should be swapped: ascender should come from font_bbox.top() and descender from font_bbox.bottom().","fix":"Swap the assignments: let ascender = font_bbox.top(); let descender = font_bbox.bottom();","locations":[{"ref":"crates/krilla/src/text/type3.rs:237-238","code":"  237 |         let ascender = font_bbox.bottom();\n  238 |         let descender = font_bbox.top();","lines":2}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `group.rs`, `push_blend_mode` and `push_opacity` are always pushed for every group (lines 31-33), even when `blend_mode == BlendMode::Normal` and `opacity == 1.0`. When `should_isolate` is false, this still pushes two graphics state saves per group. For SVGs with deeply nested groups (common in icon sets), this generates unnecessary PDF q/Q pairs and blend-mode/opacity graphics state dictionary entries, bloating the output and increasing rendering overhead.","fix":"Skip `push_blend_mode` when `group.blend_mode() == BlendMode::Normal` and skip `push_opacity` when `group.opacity() == Opacity::ONE`, analogous to how `push_isolated` is already conditionally applied.","locations":[{"ref":"crates/krilla-svg/src/group.rs:31-48","code":"   31 |     surface.push_blend_mode(convert_blend_mode(&group.blend_mode()));\n   32 |     surface.push_opacity(NormalizedF32::new(group.opacity().get()).unwrap());\n   33 |     pop_count += 2;\n   34 | \n   35 |     // There is the `group.should_isolate` method which also returns true if\n   36 |     // there is a clip path, since strictly speaking, just a clip path\n   37 |     // also requires layer isolation. However, clip paths are very common\n   38 |     // and it would be wasteful to generate new isolated XObjects for that\n   39 |     // (especially since it shouldn't make any visual difference), so we\n   40 |     // don't include this here.\n   41 |     let should_isolate = group.isolate()\n   42 |         || group.opacity() != Opacity::ONE\n   43 |         || group.mask().is_some()\n   44 |         || group.blend_mode() != BlendMode::Normal;\n   45 | \n   46 |     if should_isolate {\n   47 |         surface.push_isolated();\n   48 |         pop_count += 1","lines":18}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `PdfVersion::supports_icc`, the `Pdf15` branch only checks `metadata.major <= 4` with no upper bound on `minor`. This is inconsistent with `Pdf14` (checks major+minor), `Pdf16` (checks 4.1), and `Pdf17` (checks 4.2). If PDF 1.5 was meant to support only ICC 4.0, then the condition should also check `metadata.minor <= 0`. Without the minor bound, PDF 1.5 would accept ICC 4.3, 4.4, etc., which were not defined at the time PDF 1.5 was released.","fix":"Add a minor version check consistent with the expected ICC support for PDF 1.5, e.g. `metadata.major <= 4 && metadata.minor <= 0` if only ICC v4.0 was intended, or document the intentional absence of a minor check.","locations":[{"ref":"crates/krilla/src/configure/version.rs:79","code":"   79 |             PdfVersion::Pdf16 => metadata.major <= 4 && metadata.minor <= 1,","lines":1}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The `encode_spread_method` comment at line 599 says step 4 is 'calculate o = length - 0 if i % 2 == 1', which contains a typo ('length - 0' instead of 'length - o'). The actual PostScript code is correct (it subtracts `o` from `length`), but the comment is misleading.","fix":"Fix the comment to read 'calculate o = length - o if i % 2 == 1'.","locations":[{"ref":"crates/krilla/src/graphics/shading_function.rs:596-600","code":"  596 |         // 1. Normalize by doing n = x - min.\n  597 |         // 2. Calculate the \"interval\" we are in by doing i = floor(n / length)\n  598 |         // 3. Calculate the offset by doing o = n - i * length\n  599 |         // 4. If the spread method is repeat, we additionally calculate o = length - 0 if i % 2 == 1\n  600 |         // 5. Calculate the final value with x_new = min + o.","lines":5}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `serialize_xmp_metadata`, both the 'saved' and 'converted' xmpMM:History events are assigned the same `instance_id` value: `\"{instance_id}_source\"`. According to the XMP/PDF-A spec for file provenance, the 'saved' event should reference the source document's instance ID (the document before conversion), while the 'converted' event should reference the resulting document's instance ID (typically just `instance_id` without the `_source` suffix). Having both events point to the same identifier makes the history semantically incorrect.","fix":"Change the `converted.instance_id(...)` call at line 239 to use `&format!(\"{instance_id}\")` (or simply `instance_id`) instead of `&format!(\"{instance_id}_source\")` so the converted event references the current document's instance ID.","locations":[{"ref":"crates/krilla/src/interchange/metadata.rs:219","code":"  219 |                     saved.instance_id(&format!(\"{instance_id}_source\"));","lines":1},{"ref":"crates/krilla/src/interchange/metadata.rs:239","code":"  239 |                     converted.instance_id(&format!(\"{instance_id}_source\"));","lines":1}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In type3.rs::base_font_name(), REST_LEN is computed as 1 + 1 + IDENTITY_H.len() where IDENTITY_H = 'Identity-H'. This reserves room as if the name will contain '+Identity-H', but Type3 font names do not use this suffix - only CID font names do. The constant was likely copy-pasted from the CID font code. The max_len is therefore 12 bytes shorter than necessary, unnecessarily truncating PostScript names.","fix":"Change REST_LEN to reflect the actual Type3 font name format. Type3 font names are just the PostScript name with no suffix, so REST_LEN should be 0 (no suffix reserved) and max_len = 127.","locations":[{"ref":"crates/krilla/src/text/type3.rs:477-485","code":"  477 | pub(crate) fn base_font_name(font: &Font) -> String {\n  478 |     const REST_LEN: usize = 1 + 1 + IDENTITY_H.len();\n  479 |     let postscript_name = font.postscript_name().unwrap_or(\"unknown\");\n  480 | \n  481 |     let max_len = 127 - REST_LEN;\n  482 | \n  483 |     let trimmed = &postscript_name[..postscript_name.len().min(max_len)];\n  484 | \n  485 |     trimmed.to_string()","lines":9}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Prehashed<T>` implements `PartialEq` by comparing only the precomputed 128-bit SipHash values, not the underlying values themselves. This means two structurally different values with the same hash (a collision) would incorrectly compare as equal. `PdfDocument` is wrapped in `Prehashed` and used as a `HashMap` key in `PdfSerializerContext::infos`, so a hash collision between two distinct PDF documents would cause them to share extraction state and produce a corrupted output PDF with no error.","fix":"Add a value comparison fallback: `fn eq(&self, other: &Self) -> bool { self.hash == other.hash && self.value == other.value }`. This requires `T: PartialEq`, which `PdfDocumentRepr` would need to implement (e.g. by comparing the underlying `Arc` pointer).","locations":[{"ref":"crates/krilla/src/util.rs:59-64","code":"   59 | impl<T: Hash + ?Sized + 'static> PartialEq for Prehashed<T> {\n   60 |     #[inline]\n   61 |     fn eq(&self, other: &Self) -> bool {\n   62 |         self.hash == other.hash\n   63 |     }\n   64 | }","lines":6},{"ref":"crates/krilla/src/pdf.rs:69","code":"   69 | pub struct PdfDocument(Arc<Prehashed<PdfDocumentRepr>>);","lines":1}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"`self.quad_points.as_ref().map(|p| { annotation.quad_points(...) });` uses `Option::map` solely for its side effect (writing to the PDF annotation), discarding the returned `Option`. This is idiomatic for closures with side effects only when written as `if let Some(p) = ...`. As written, it may trigger a `clippy::map_unwrap_or` or similar lint in the future, and communicates the wrong intent to readers.","fix":"Replace the `self.quad_points.as_ref().map(|p| { ... });` pattern with `if let Some(p) = &self.quad_points { annotation.quad_points(...); }`.","locations":[{"ref":"crates/krilla/src/interactive/annotation.rs:267-273","code":"  267 |             self.quad_points.as_ref().map(|p| {\n  268 |                 annotation.quad_points(p.iter().flat_map(|q| q.0).flat_map(|p| {\n  269 |                     let mut p = p.to_tsp();\n  270 |                     page_root_transform(page_height).to_tsp().map_point(&mut p);\n  271 |                     [p.x, p.y]\n  272 |                 }))\n  273 |             });","lines":7}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"`Surface::get_fill` and `Surface::get_stroke` (surface.rs lines 118-131) take `&mut self` even though they only read the fill/stroke fields. Taking `&mut self` unnecessarily restricts callers - for example, holding the return value while also calling another `&self` method is impossible. This is an API ergonomics bug that may force callers to work around the borrow checker.","fix":"Change the receiver of `get_fill` and `get_stroke` from `&mut self` to `&self`.","locations":[{"ref":"crates/krilla/src/surface.rs:118-131","code":"  118 |     pub fn get_fill(&mut self) -> Option<&Fill> {\n  119 |         self.fill.as_ref()\n  120 |     }\n  121 | \n  122 |     /// Set the stroke that should be used for drawing operations.\n  123 |     ///\n  124 |     /// You can set it to `None` if you want to disable stroking.\n  125 |     pub fn set_stroke(&mut self, stroke: Option<Stroke>) {\n  126 |         self.stroke = stroke;\n  127 |     }\n  128 | \n  129 |     /// Get the currently active stroke.\n  130 |     pub fn get_stroke(&mut self) -> Option<&Stroke> {\n  131 |         self.stroke.as_ref()","lines":14}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"In `lib.rs`, `render_node` (called once per SVG glyph from `render_svg_glyph`) accepts `Arc<Database>` by value and immediately calls `Arc::make_mut`, which clones the entire `fontdb::Database` whenever the Arc's reference count is greater than one. Since `tree.fontdb()` holds one reference and we clone it to pass in (refcount = 2), `Arc::make_mut` always performs a full deep clone of the database. For emoji SVG fonts such as Noto Color Emoji that embed hundreds of SVG glyphs in a single document, this means cloning the font database once per glyph, which is O(n * db_size) total work where n can be in the hundreds.","fix":"Pass `&mut Database` directly (obtained once by the caller via `Arc::make_mut`) rather than cloning the Arc into `render_node`. Alternatively, split `Fonts::retrieve` into a read-only path (when the source is already `SharedFile`) and a mutable path (initial file mapping), so that `ProcessContext` can hold `&Database` most of the time.","locations":[{"ref":"crates/krilla-svg/src/lib.rs:108-115","code":"  108 | pub(crate) fn render_node(\n  109 |     node: &Node,\n  110 |     mut tree_fontdb: Arc<Database>,\n  111 |     svg_settings: SvgSettings,\n  112 |     surface: &mut Surface,\n  113 | ) {\n  114 |     let mut fc = ProcessContext::new(Arc::make_mut(&mut tree_fontdb), svg_settings);\n  115 |     group::render_node(node, surface, &mut fc);","lines":8},{"ref":"crates/krilla-svg/src/lib.rs:178","code":"  178 |         render_node(node, tree.fontdb().clone(), settings, surface)","lines":1}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In `text.rs`, the `draw_op` closure takes `Font` by value. In the `PaintOrder::FillAndStroke` branch (and the `fill.is_none() || stroke.is_none()` branch, line 116-123), `font.clone()` is passed to the single `draw_op` call even though `font` is not used afterwards in that branch - the clone is immediately consumed and the original is dropped. Similarly in the `StrokeAndFill` branch, the last `draw_op` call at line 132-138 clones `font` unnecessarily.","fix":"Pass `font` by move (without `.clone()`) to the final `draw_op` call in each branch. In the FillAndStroke branch, replace `font.clone()` with `font`. In the StrokeAndFill branch, replace the last `font.clone()` with `font`.","locations":[{"ref":"crates/krilla-svg/src/text.rs:117-123","code":"  117 |                 draw_op(\n  118 |                     surface,\n  119 |                     fill,\n  120 |                     stroke,\n  121 |                     font.clone(),\n  122 |                     process_context.svg_settings.embed_text,\n  123 |                 );","lines":7},{"ref":"crates/krilla-svg/src/text.rs:130-138","code":"  130 |                 draw_op(surface, None, stroke, font.clone(), false);\n  131 | \n  132 |                 draw_op(\n  133 |                     surface,\n  134 |                     fill,\n  135 |                     None,\n  136 |                     font.clone(),\n  137 |                     process_context.svg_settings.embed_text,\n  138 |                 );","lines":9}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `ChunkContainer::finish`, `chunks_byte_len` (a `usize`) is cast to `f32` to compute the allocation capacity. For documents larger than ~16 MB (2^24 bytes), the cast silently loses precision since `f32` has only 24 bits of mantissa. The resulting capacity estimate may be significantly too small, causing extra heap re-allocations. For very large PDFs (>= ~4 GB on 64-bit), the capacity could overflow back to zero, forcing a full re-allocation.","fix":"Use `f64` for the intermediate computation: `let capacity = (chunks_byte_len as f64 * 1.1 + 200.0) as usize;` which preserves precision up to 2^53 bytes.","locations":[{"ref":"crates/krilla/src/chunk_container.rs:126","code":"  126 |         let capacity = (chunks_byte_len as f32 * 1.1 + 200.0) as usize;","lines":1}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`cmyk::color_space` clones the entire `SerializeSettings` struct (line 283) only to access the `cmyk_profile` field. `SerializeSettings` can be large (it contains an `ICCProfile` wrapped in `Arc`, plus other fields), making this clone unnecessary. The function signature takes `&SerializeSettings`, so the clone is not needed for ownership.","fix":"Replace `ss.clone().cmyk_profile` with `ss.cmyk_profile.clone()` to clone only the `Option<ICCProfile<4>>` (an `Arc`-backed cheap clone) instead of the whole settings struct.","locations":[{"ref":"crates/krilla/src/graphics/color.rs:281-289","code":"  281 |     pub(crate) fn color_space(ss: &SerializeSettings) -> Option<RegularColorSpace> {\n  282 |         if ss.no_device_cs {\n  283 |             ss.clone()\n  284 |                 .cmyk_profile\n  285 |                 .map(|p| CieBasedColorSpace::Cmyk(ICCBasedColorSpace::<4>(p.clone())).into())\n  286 |         } else {\n  287 |             Some(DeviceColorSpace::Cmyk.into())\n  288 |         }\n  289 |     }","lines":9}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `new_auto_compressed` (stream.rs line 265), the expression `100 * filter_stream.content.len() / content.len()` computes a percentage to compare against `MAX_COMPRESSED_SIZE = 75`. On 32-bit targets, `100 * filter_stream.content.len()` can overflow `usize` for inputs larger than ~42 MB (usize::MAX / 100). On 64-bit targets this is harmless in practice. The overflow would cause an incorrect comparison and return uncompressed data instead of compressed.","fix":"Use saturating multiplication or cast to u64 before multiplying: `(filter_stream.content.len() as u64 * 100 / content.len() as u64) as usize`.","locations":[{"ref":"crates/krilla/src/stream.rs:260-271","code":"  260 |     pub(crate) fn new_auto_compressed(content: &'a [u8]) -> Self {\n  261 |         let filter_stream = Self::new_from_binary_data(content);\n  262 | \n  263 |         const MAX_COMPRESSED_SIZE: usize = 75;\n  264 |         if content.is_empty()\n  265 |             || 100 * filter_stream.content.len() / content.len() > MAX_COMPRESSED_SIZE\n  266 |         {\n  267 |             return Self::binary(content);\n  268 |         }\n  269 | \n  270 |         filter_stream\n  271 |     }","lines":12}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"ColoredGlyph implements Copy (derived in type3.rs:31), yet throughout mod.rs it is called with .to_owned() (lines 87, 124, 134, 136) and in group.rs the get_gid call passes &glyph.to_owned() (mod.rs:187). For a Copy type, to_owned() is equivalent to a copy and adds no semantic value; it is noise that obscures intent.","fix":"Replace all .to_owned() calls on ColoredGlyph with direct use of the value (it is Copy so no clone is needed).","locations":[{"ref":"crates/krilla/src/text/mod.rs:87","code":"   87 |             .or_else(|| self.type3_cache.get(&glyph.to_owned()))?;","lines":1},{"ref":"crates/krilla/src/text/mod.rs:124","code":"  124 |             .or_else(|| self.type3_cache.get(&glyph.to_owned()))","lines":1},{"ref":"crates/krilla/src/text/mod.rs:134","code":"  134 |             let (identifier, gid) = self.type3_mapper.add_glyph(glyph.to_owned());","lines":1},{"ref":"crates/krilla/src/text/mod.rs:136","code":"  136 |             self.type3_cache.insert(glyph.to_owned(), res.clone());","lines":1},{"ref":"crates/krilla/src/text/mod.rs:187","code":"  187 |         self.get_gid(&glyph.to_owned()).map(PDFGlyph::Type3)","lines":1}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Type3FontMapper::font_from_id() and font_mut_from_id() perform a linear search through all Type3 fonts by comparing identifiers (lines 418, 429). Type3FontMapper::id_from_glyph() also does a linear search (line 408). In Type3FontMapper::add_glyph(), id_from_glyph() is called first and then font_from_id() is called again with the found id (line 446), performing two linear scans. A font can have at most ceil(num_used_glyphs / 256) Type3 sub-fonts, so in extreme cases this could be O(n) per glyph lookup.","fix":"In add_glyph(), once id_from_glyph() returns Some(id), retrieve the position directly instead of calling font_from_id() again. Also consider storing a HashMap<FontIdentifier, usize> to allow O(1) identifier lookups.","locations":[{"ref":"crates/krilla/src/text/type3.rs:405-410","code":"  405 |     pub(crate) fn id_from_glyph(&self, glyph: &ColoredGlyph) -> Option<FontIdentifier> {\n  406 |         self.fonts\n  407 |             .iter()\n  408 |             .position(|f| f.covers(glyph))\n  409 |             .map(|p| self.fonts[p].identifier())\n  410 |     }","lines":6},{"ref":"crates/krilla/src/text/type3.rs:414-420","code":"  414 |     pub(crate) fn font_from_id(&self, identifier: FontIdentifier) -> Option<&Type3Font> {\n  415 |         let pos = self\n  416 |             .fonts\n  417 |             .iter()\n  418 |             .position(|f| f.identifier() == identifier)?;\n  419 |         self.fonts.get(pos)\n  420 |     }","lines":7},{"ref":"crates/krilla/src/text/type3.rs:422-431","code":"  422 |     pub(crate) fn font_mut_from_id(\n  423 |         &mut self,\n  424 |         identifier: FontIdentifier,\n  425 |     ) -> Option<&mut Type3Font> {\n  426 |         let pos = self\n  427 |             .fonts\n  428 |             .iter()\n  429 |             .position(|f| f.identifier() == identifier)?;\n  430 |         self.fonts.get_mut(pos)\n  431 |     }","lines":10},{"ref":"crates/krilla/src/text/type3.rs:441-474","code":"  441 |     pub(crate) fn add_glyph(&mut self, glyph: ColoredGlyph) -> (FontIdentifier, Gid) {\n  442 |         // If the glyph has already been added, return the font identifier of\n  443 |         // the type 3 font as well as the Type3 gid in that font.\n  444 |         if let Some(id) = self.id_from_glyph(&glyph) {\n  445 |             let gid = self\n  446 |                 .font_from_id(id.clone())\n  447 |                 .unwrap()\n  448 |                 .get_gid(&glyph)\n  449 |                 .unwrap();\n  450 |             return (id, gid);\n  451 |         }\n  452 | \n  453 |         if let Some(last_font) = self.fonts.last_mut() {\n  454 |             if last_font.is_full() {\n  455 |                 // If the last Type3 font is full, create a new one.\n  456 |                 let mut font = Type3Font::new(self.font.clone(), self.fonts.len());\n  457 |                 let id = font.identifier();\n  458 |                 let gid = font.add_glyph(glyph);\n  459 |                 self.fonts.push(font);\n  460 |                 (id, gid)\n  461 |             } else {\n  462 |                 // Otherwise, insert it into the last Type3 font.\n  463 |                 let id = last_font.identifier();\n  464 |                 (id, last_font.add_glyph(glyph))\n  465 |             }\n  466 |         } else {\n  467 |             // If not Type3 font exists yet, create a new one.\n  468 |             let mut font = Type3Font::new(self.font.clone(), self.fonts.len());\n  469 |             let id = font.identifier();\n  470 |             let gid = font.add_glyph(glyph);\n  471 |             self.fonts.push(font);\n  472 |             (id, gid)\n  473 |         }\n  474 |     }","lines":34}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"In `Validators::len()`, the method uses an if-else expression for each field rather than `usize::from(bool)`. This is a trivial style issue with negligible runtime impact, but `usize::from(self.a.is_some()) + usize::from(self.ua.is_some())` is more idiomatic.","fix":"Replace with `usize::from(self.a.is_some()) + usize::from(self.ua.is_some())`.","locations":[{"ref":"crates/krilla/src/configure/validate.rs:193-195","code":"  193 |     pub fn len(self) -> usize {\n  194 |         (if self.a.is_some() { 1 } else { 0 }) + (if self.ua.is_some() { 1 } else { 0 })\n  195 |     }","lines":3}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In `fill_stroke_glyph_group` (content.rs lines 823-826), `glyph_group.font_identifier.clone()` is called to look up a font, but the identifier value is also moved into `encode_consecutive_glyph_run` on line 843. The clone is necessary here because both are needed, but the borrow on `borrowed` keeps the borrow of `font_container` alive across the call. This forces an extra clone of the font identifier. A minor structural refactor could eliminate it by dropping `borrowed` before passing the identifier.","fix":"Extract the font identifier before borrowing the container, or restructure so the borrow is released before `encode_consecutive_glyph_run` is called, avoiding the clone.","locations":[{"ref":"crates/krilla/src/content.rs:823-851","code":"  823 |         let borrowed = font_container.borrow();\n  824 |         let pdf_font = borrowed\n  825 |             .get_from_identifier(glyph_group.font_identifier.clone())\n  826 |             .unwrap();\n  827 | \n  828 |         if fill_render_mode == TextRenderingMode::Fill || pdf_font.force_fill() {\n  829 |             self.content\n  830 |                 .set_text_rendering_mode(TextRenderingMode::Fill);\n  831 |         } else if fill_render_mode == TextRenderingMode::FillStroke {\n  832 |             self.content\n  833 |                 .set_text_rendering_mode(TextRenderingMode::FillStroke);\n  834 |         } else {\n  835 |             self.content\n  836 |                 .set_text_rendering_mode(TextRenderingMode::Stroke);\n  837 |         }\n  838 | \n  839 |         self.encode_consecutive_glyph_run(\n  840 |             sc,\n  841 |             cur_x,\n  842 |             *cur_y - glyph_group.y_offset * font_size,\n  843 |             glyph_group.f
