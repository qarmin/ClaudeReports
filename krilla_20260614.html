ont_identifier,\n  844 |             pdf_font,\n  845 |             font_size,\n  846 |             context_color,\n  847 |             glyph_group.glyphs,\n  848 |             text,\n  849 |         );\n  850 | \n  851 |         *cur_y -= glyph_group.y_advance * font_size;","lines":29}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"In `Document::start_page` and `Document::start_page_with`, the page index is computed as `self.serializer_context.page_infos().iter().len()`. Calling `.iter().len()` on a slice allocates an iterator only to call `len()` on it - this is equivalent to just `.len()` and the compiler likely optimises it away, but it is needlessly indirect.","fix":"Use `self.serializer_context.page_infos().len()` directly.","locations":[{"ref":"crates/krilla/src/document.rs:67","code":"   67 |         let page_index = self.serializer_context.page_infos().iter().len();","lines":1},{"ref":"crates/krilla/src/document.rs:78","code":"   78 |         let page_index = self.serializer_context.page_infos().iter().len();","lines":1}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`ContentBuilder::draw_xobject_by_reference` (content.rs line 879) is annotated `#[allow(dead_code)]`, meaning the compiler would otherwise flag it as unused. However, it is actually called from `surface.rs:460` inside the `#[cfg(feature = \"pdf\")]` block. The `#[allow(dead_code)]` suppresses the warning only because the caller is feature-gated while this method itself is not. The annotation is misleading - the method is not truly dead code, just conditionally used.","fix":"Gate `draw_xobject_by_reference` with `#[cfg(feature = \"pdf\")]` to match its only call site, and remove the `#[allow(dead_code)]` attribute.","locations":[{"ref":"crates/krilla/src/content.rs:878-900","code":"  878 |     #[allow(dead_code)]\n  879 |     pub(crate) fn draw_xobject_by_reference(\n  880 |         &mut self,\n  881 |         sc: &mut SerializeContext,\n  882 |         chunk_container: &mut ChunkContainer,\n  883 |         bbox: Rect,\n  884 |         x_object: Ref,\n  885 |     ) {\n  886 |         // TODO: Consider bbox of XObject somehow?\n  887 |         self.apply_isolated_op(\n  888 |             |sb, _, _| {\n  889 |                 sb.expand_bbox(bbox);\n  890 |             },\n  891 |             move |sb, _, _| {\n  892 |                 let x_object_name = sb\n  893 |                     .rd_builder\n  894 |                     .register_resource(resource::XObject::new(x_object));\n  895 |                 sb.content.x_object(x_object_name.to_pdf_name());\n  896 |             },\n  897 |             sc,\n  898 |             chunk_container,\n  899 |         );\n  900 |     }","lines":23}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In Type3Font::serialize(), a Vec<GlyphId> named 'gids' is built by iterating glyph_set, then sorted, and then never used again. The variable and its construction (including the sort) are entirely dead code.","fix":"Remove the gids variable and its associated computation entirely.","locations":[{"ref":"crates/krilla/src/text/type3.rs:240-245","code":"  240 |         let mut gids = self\n  241 |             .glyph_set\n  242 |             .iter()\n  243 |             .map(|g| g.glyph_id)\n  244 |             .collect::<Vec<_>>();\n  245 |         gids.sort();","lines":6}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"medium","easy":true,"description":"The doc comments for the `month` and `day` fields in `DateTime` are wrong. `month` is documented as '(0-11)' but `month()` clamps to 1..=12. `day` is documented as '(0-31)' but `day()` clamps to 1..=31. Users relying on the docs could pass 0 expecting a valid month/day, but would instead get it silently clamped to 1.","fix":"Change the comments to '(1-12)' for month and '(1-31)' for day to match the actual clamping behavior.","locations":[{"ref":"crates/krilla/src/interchange/metadata.rs:304-306","code":"  304 |     /// The month (0-11).\n  305 |     pub(crate) month: Option<u8>,\n  306 |     /// The day (0-31).","lines":3}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `lib.rs` line 119, the doc comment for `render_svg_glyph` ends with a double period: `krilla..`. This is a minor documentation defect.","fix":"Change `krilla..` to `krilla.` to fix the trailing double period in the doc comment.","locations":[{"ref":"crates/krilla-svg/src/lib.rs:119","code":"  119 | /// `render_svg_glyph_fn` field of `SerializeSettings` in krilla..","lines":1}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for ValidationError says 'An error that occurred during validation/' - it ends with a forward slash instead of a period. This is a typo in the doc comment.","fix":"Change 'validation/' to 'validation.' to fix the typo.","locations":[{"ref":"crates/krilla/src/configure/validate.rs:42","code":"   42 | /// An error that occurred during validation/","lines":1}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `Archival::prohibits`, the comment at line 697 says 'Allowed under PDF/A-4 but forbidden under other profiles.' for `EmbeddedFile(EmbedError::MissingDescription)`. The actual code (`=> self == Self::A4`) means the error is forbidden only for `A4` itself, not `A4F` or `A4E`. The comment has the meaning backwards: it is forbidden under the base `A4` profile and allowed under `A4F`/`A4E`.","fix":"Change the comment to 'Forbidden under A4 but allowed under A4F and A4E.' to correctly reflect the code logic.","locations":[{"ref":"crates/krilla/src/configure/validate.rs:697-700","code":"  697 |             (\n  698 |                 Self::A4 | Self::A4F | Self::A4E,\n  699 |                 ValidationError::EmbeddedFile(EmbedError::MissingDescription, _),\n  700 |             ) => self == Self::A4,","lines":4}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In the `set_stroke_opacity` closure inside `draw_glyphs` (content.rs lines 451-452), the outer-block comment is repeated verbatim inside the `if` branch. The inner comment (lines 451-452) is identical to the outer comment (lines 448-449) and adds no information. Additionally, the comment at line 455 references `stroke-action` which is a different closure name (`stroke_action`) - a minor but misleading naming mismatch.","fix":"Remove the duplicate inner comment (lines 451-452). Fix the cross-reference at line 455 from `stroke-action` to `stroke_action`.","locations":[{"ref":"crates/krilla/src/content.rs:447-458","code":"  447 |         let set_stroke_opacity = |sb: &mut ContentBuilder, stroke: &Stroke| {\n  448 |             // PDF viewers don't show patterns with fill/stroke opacities consistently.\n  449 |             // Because of this, the opacity is accounted for in the pattern itself.\n  450 |             if !matches!(&stroke.paint.0, &InnerPaint::Pattern(_)) {\n  451 |                 // PDF viewers don't show patterns with fill/stroke opacities consistently.\n  452 |                 // Because of this, the opacity is accounted for in the pattern itself.\n  453 |                 sb.set_stroke_opacity(stroke.opacity);\n  454 | \n  455 |                 // See the comment in `stroke-action` for why we also set the fill opacity.\n  456 |                 sb.set_fill_opacity(stroke.opacity);\n  457 |             }\n  458 |         };","lines":12}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `Transform::ky()` says \"Return the `kx` component\" (copy-pasted from `kx()`), but the function actually returns the `ky` component. This is a misleading public API doc.","fix":"Change the comment to \"Return the `ky` component\".","locations":[{"ref":"crates/krilla/src/geom.rs:234-236","code":"  234 |     /// Return the `kx` component\n  235 |     pub fn ky(&self) -> f32 {\n  236 |         self.0.ky","lines":3}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"`rgb::Color::new_linear` (lines 312-315) is documented as creating a \"new linear RGB color\" but its body is identical to `rgb::Color::new`, storing the same raw u8 values without any gamma/linearization. The function name and doc comment suggest it accepts linearly-encoded values (i.e. already in linear light) distinct from the gamma-encoded `new`, but there is no actual difference in storage or treatment. This misleads callers into thinking linear and gamma RGB are handled differently.","fix":"Either remove `new_linear` as a duplicate of `new`, or implement the distinction (e.g., tag the value so downstream code treats it as linear-light when writing the color space).","locations":[{"ref":"crates/krilla/src/graphics/color.rs:312-315","code":"  312 |         /// Create a new linear RGB color.\n  313 |         pub fn new_linear(red: u8, green: u8, blue: u8) -> Self {\n  314 |             Color(red, green, blue)\n  315 |         }","lines":4}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In cid.rs line 285, the comment says 'IN CID fonts' - the 'IN' is incorrectly capitalized (appears to be a leftover artifact).","fix":"Change 'IN CID fonts' to 'In CID fonts'.","locations":[{"ref":"crates/krilla/src/text/cid.rs:285","code":"  285 |         // IN CID fonts, a upem value of 1000 is assumed for all fonts, so we need to convert.","lines":1}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In type3.rs::Type3FontMapper::add_glyph(), the comment on line 466 says 'If not Type3 font exists yet' - typo: should be 'no Type3 font'.","fix":"Change 'If not Type3 font exists yet' to 'If no Type3 font exists yet'.","locations":[{"ref":"crates/krilla/src/text/type3.rs:467","code":"  467 |             // If not Type3 font exists yet, create a new one.","lines":1}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The comment at `chunk_container.rs:124` contains the typo \"re-alloactions\" instead of \"re-allocations\".","fix":"Correct \"re-alloactions\" to \"re-allocations\".","locations":[{"ref":"crates/krilla/src/chunk_container.rs:124","code":"  124 |         // for the document catalog. This hopefully allows us to avoid re-alloactions in the general","lines":1}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment at `chunk_container.rs:367` refers to `SerializerContex` (missing the trailing 't') when it means `SerializeContext`.","fix":"Correct \"SerializerContex\" to \"SerializeContext\".","locations":[{"ref":"crates/krilla/src/chunk_container.rs:367","code":"  367 |         // pages (stored in `SerializerContex::page_infos`), but `hayro_write` created new references","lines":1}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"`ConfigurationBuilder` has the same doc comment as `Configuration`: 'A configuration of validator and PDF version.' This is a copy-paste error; `ConfigurationBuilder` is a builder, not the final configuration.","fix":"Change the doc comment on `ConfigurationBuilder` to something like 'A builder for constructing a [`Configuration`].'.","locations":[{"ref":"crates/krilla/src/configure/mod.rs:30-31","code":"   30 | /// A configuration of validator and PDF version.\n   31 | #[derive(Clone, Copy, Debug, PartialEq, Eq, Default)]","lines":2}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The module-level documentation comment for the tagging module contains a typo: 'maping' should be 'mapping'.","fix":"Change 'maping' to 'mapping'.","locations":[{"ref":"crates/krilla/src/interchange/tagging/mod.rs:46","code":"   46 | //! maping the different \"snippets\" of the PDF file to the tree-like structure in a way","lines":1}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment at `pdf.rs:189` says \"each PDF has it's own reference\" - \"it's\" (it is) should be \"its\" (possessive).","fix":"Change \"it's\" to \"its\".","locations":[{"ref":"crates/krilla/src/pdf.rs:189","code":"  189 |                 // We can't share the serializer context between threads, so each PDF has it's own","lines":1}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment for `SerializeSettings::render_svg_glyph_fn` at line 115 contains a typo: \"yu can\" instead of \"you can\".","fix":"Change \"yu can\" to \"you can\".","locations":[{"ref":"crates/krilla/src/serialize.rs:115","code":"  115 |     /// A function that should be used to render SVG glyphs. If you don't need this, yu can","lines":1}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The comment at line 856 says \"Custom krilla namspace\" (missing 'e'), and line 1040 says \"standard structure namspace\". Both are typos of \"namespace\". These appear in public documentation strings and internal comments.","fix":"Correct both occurrences of \"namspace\" to \"namespace\".","locations":[{"ref":"crates/krilla/src/serialize.rs:856","code":"  856 |                 // Custom krilla namspace","lines":1},{"ref":"crates/krilla/src/serialize.rs:1040","code":" 1040 |     /// The ref of the PDF 2.0 standard structure namspace (`https://www.iso.org/pdf2/ssn`).","lines":1}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`SerializeContext::finish` is a long method (~50 lines) that sequences serialisation of many independent sub-systems (fonts, pages, outlines, tags, destinations, validation) and also owns validation-error deduplication logic. Each sub-task is delegated to a private method, which is good, but the sequencing, error collection, and the sanity assertion are all interleaved in one function. A future re-ordering of serialization steps (e.g. to support streaming) would be error-prone.","fix":"Consider extracting the validation-deduplication block (lines 475-488) into a helper `fn finish_validation(&mut self) -> KrillaResult<()>` and document the required ordering constraints between each serialization call explicitly.","locations":[{"ref":"crates/krilla/src/serialize.rs:449-498","code":"  449 |     pub(crate) fn finish(mut self, mut chunk_container: ChunkContainer) -> KrillaResult<Pdf> {\n  450 |         // We need to be careful here that we serialize the objects in the right order,\n  451 |         // as in some cases we use MaybeTake::take to remove an object, which means that\n  452 |         // no object that is serialized afterwards must depend on it.\n  453 | \n  454 |         // Serialize all objects that can only be written in the end.\n  455 |         self.serialize_destination_profiles(&mut chunk_container);\n  456 |         self.serialize_page_label_tree(&mut chunk_container);\n  457 |         self.serialize_outline(&mut chunk_container);\n  458 |         self.serialize_fonts(&mut chunk_container)?;\n  459 |         self.serialize_pages(&mut chunk_container)?;\n  460 |         self.serialize_page_tree(&mut chunk_container);\n  461 |         #[cfg(feature = \"pdf\")]\n  462 |         self.serialize_embedded_pdfs(&mut chunk_container)?;\n  463 |         self.serialize_xyz_destinations(&mut chunk_container)?;\n  464 |         // It is important that we serialize the tags AFTER we have serialized the pages,\n  465 |         // because page serialization will update the annotation refs of the page infos,\n  466 |         // and when serializing the parent tree map we need to know the refs of the annotations\n  467 |         self.serialize_tag_tree(&mut chunk_container)?;\n  468 | \n  469 |         // Create the final PDF.\n  470 |         let pdf = chunk_container.finish(&mut self)?;\n  471 |         self.register_limits(pdf.limits());\n  472 | \n  473 |         self.check_validator_limits();\n  474 | \n  475 |         if !self.validation_errors.is_empty() {\n  476 |             // Deduplicate errors, while still preserving order.\n  477 |             let mut errors = vec![];\n  478 |             let mut seen = HashSet::new();\n  479 | \n  480 |             for error in self.validation_errors {\n  481 |                 if !seen.contains(&error) {\n  482 |                     seen.insert(error.clone());\n  483 |                     errors.push(error);\n  484 |                 }\n  485 |             }\n  486 | \n  487 |             return Err(KrillaError::Validation(errors));\n  488 |         }\n  489 | \n  490 |         if let Some(limit_error) = self.check_version_limits() {\n  491 |             return Err(KrillaError::Limit(limit_error));\n  492 |         }\n  493 | \n  494 |         // Just a sanity check that we've actually processed all items.\n  495 |         self.global_objects.assert_all_taken();\n  496 | \n  497 |         Ok(pdf)\n  498 |     }","lines":50}]},{"id":"ARCH_2","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`register_font_identifier` (lines 640-649) and `register_cacheable` / `register_cached` (lines 573-586) share the same `cached_mappings: HashMap<u128, Ref>`. This means a `FontIdentifier` and any other `Cacheable` type could theoretically collide in the cache. Although `SipHashable` includes the `TypeId` in the hash to mitigate cross-type collisions, the cache was not designed to hold two semantically different kinds of entries. A collision between a `FontIdentifier` hash and a cached object hash (even from the same type due to birthday paradox over many objects) would return the wrong `Ref` with no error.","fix":"Use a separate `HashMap<u128, Ref>` for font identifier caching to eliminate the possibility of cross-kind collisions, or document clearly that this is intentional and explain why it is safe.","locations":[{"ref":"crates/krilla/src/serialize.rs:573-586","code":"  573 |     fn register_cached<T: SipHashable>(\n  574 |         &mut self,\n  575 |         item: T,\n  576 |         mut func: impl FnMut(&mut Self, T, Ref),\n  577 |     ) -> Ref {\n  578 |         let hash = item.sip_hash();\n  579 |         if let Some(_ref) = self.cached_mappings.get(&hash) {\n  580 |             *_ref\n  581 |         } else {\n  582 |             let root_ref = self.new_ref();\n  583 |             func(self, item, root_ref);\n  584 |             self.cached_mappings.insert(hash, root_ref);\n  585 |             root_ref\n  586 |         }","lines":14},{"ref":"crates/krilla/src/serialize.rs:640-649","code":"  640 |     pub(crate) fn register_font_identifier(&mut self, f: FontIdentifier) -> resource::Font {\n  641 |         let hash = f.sip_hash();\n  642 |         if let Some(_ref) = self.cached_mappings.get(&hash) {\n  643 |             resource::Font::new(*_ref)\n  644 |         } else {\n  645 |             let root_ref = self.new_ref();\n  646 |             self.cached_mappings.insert(hash, root_ref);\n  647 |             resource::Font::new(root_ref)\n  648 |         }\n  649 |     }","lines":10}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","easy":true,"description":"YokeData implements Deref<Target = YokeData>, i.e. it dereferences to itself. This is a circular no-op Deref. Yoke::attach_to_cart requires C: Deref where C = Box<YokeData>; Box<T> already provides Deref<Target = T>, so the extra impl Deref for YokeData is unnecessary. The closure receives &YokeData from Box's deref, not from YokeData's deref. The impl is dead code that adds confusing noise.","fix":"Remove the impl Deref for YokeData block entirely.","locations":[{"ref":"crates/krilla/src/text/font.rs:194-200","code":"  194 | impl Deref for YokeData {\n  195 |     type Target = YokeData;\n  196 | \n  197 |     fn deref(&self) -> &Self::Target {\n  198 |         self\n  199 |     }\n  200 | }","lines":7}]}]</script>

<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildToml() {
  function tomlStr(s) {
    return '"' + String(s == null ? '' : s)
      .replace(/\\/g, '\\\\')
      .replace(/"/g, '\\"')
      .replace(/\n/g, '\\n')
      .replace(/\r/g, '\\r')
      .replace(/\t/g, '\\t') + '"';
  }
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml')     { downloadText(buildToml(),    'findings.toml', 'application/toml'); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
